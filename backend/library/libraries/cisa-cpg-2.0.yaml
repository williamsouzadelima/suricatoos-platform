    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
      ref_id: 1.A
      name: Establish Cybersecurity Responsibilities
      description: Roles, responsibilities, and authorities related to the organization's
        cybersecurity program are established, communicated, enforced, and aligned
        within the organization and external partners.
      annotation: 'Outcome: Roles, responsibilities, and authorities related to the
        organization''s cybersecurity program are established, communicated, enforced,
        and aligned within the organization and external partners.


        TTP/Risk Addressed: Lack of sufficient cybersecurity accountability, investment,
        or effectiveness.


        Recommended Actions:

        - Document all cybersecurity roles and responsibilities in organizational
        policy

        - Distribute cybersecurity responsibilities across the organization; third
        parties may assist

        - Implement legal and regulatory cybersecurity requirements, including privacy

        - Establish continuous IT/OT team collaboration for security and operational
        effectiveness


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-01
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-01
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-03
      translations:
        fr:
          name: "\xC9tablir les responsabilit\xE9s en cybers\xE9curit\xE9"
          description: "Les r\xF4les, responsabilit\xE9s et autorit\xE9s li\xE9s au\
            \ programme de cybers\xE9curit\xE9 de l'organisation sont \xE9tablis,\
            \ communiqu\xE9s, appliqu\xE9s et align\xE9s au sein de l'organisation\
            \ et avec les partenaires externes."
          annotation: "R\xE9sultat attendu : Les r\xF4les, responsabilit\xE9s et autorit\xE9\
            s li\xE9s au programme de cybers\xE9curit\xE9 de l'organisation sont \xE9\
            tablis, communiqu\xE9s, appliqu\xE9s et align\xE9s au sein de l'organisation\
            \ et avec les partenaires externes.\n\nTTP/Risque trait\xE9 : Manque de\
            \ responsabilit\xE9, d'investissement ou d'efficacit\xE9 en mati\xE8re\
            \ de cybers\xE9curit\xE9 en raison de l'absence ou de l'inad\xE9quation\
            \ des politiques, des r\xF4les et des proc\xE9dures de gestion des risques\
            \ cyber.\n\nActions recommand\xE9es :\n- Documenter tous les r\xF4les\
            \ et responsabilit\xE9s en cybers\xE9curit\xE9 dans la politique organisationnelle\n\
            - R\xE9partir les responsabilit\xE9s en cybers\xE9curit\xE9 au sein de\
            \ l'organisation ; des tiers peuvent y contribuer\n- Mettre en \u0153\
            uvre les exigences l\xE9gales et r\xE9glementaires en cybers\xE9curit\xE9\
            , y compris la protection de la vie priv\xE9e\n- \xC9tablir une collaboration\
            \ continue entre les \xE9quipes IT et OT pour l'efficacit\xE9 de la s\xE9\
            curit\xE9 et des op\xE9rations\n\nCo\xFBt : Faible | Impact : \xC9lev\xE9\
            \ | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Estabelecer Responsabilidades de Ciberseguran\xE7a"
          description: "Os pap\xE9is, responsabilidades e autoridades relacionados\
            \ ao programa de ciberseguran\xE7a da organiza\xE7\xE3o s\xE3o estabelecidos,\
            \ comunicados, aplicados e alinhados dentro da organiza\xE7\xE3o e com\
            \ parceiros externos."
          annotation: "Resultado: Os pap\xE9is, responsabilidades e autoridades relacionados\
            \ ao programa de ciberseguran\xE7a da organiza\xE7\xE3o s\xE3o estabelecidos,\
            \ comunicados, aplicados e alinhados dentro da organiza\xE7\xE3o e com\
            \ parceiros externos.\n\nTTP/Risco Tratado: Falta de responsabiliza\xE7\
            \xE3o (accountability), investimento ou efic\xE1cia suficiente em ciberseguran\xE7\
            a.\n\nA\xE7\xF5es Recomendadas:\n- Documentar todos os pap\xE9is e responsabilidades\
            \ de ciberseguran\xE7a na pol\xEDtica organizacional\n- Distribuir as\
            \ responsabilidades de ciberseguran\xE7a por toda a organiza\xE7\xE3o;\
            \ terceiros podem auxiliar\n- Implementar os requisitos legais e regulat\xF3\
            rios de ciberseguran\xE7a, incluindo privacidade\n- Estabelecer colabora\xE7\
            \xE3o cont\xEDnua entre as equipes de TI/TO para efic\xE1cia de seguran\xE7\
            a e operacional\n\nCusto: Baixo | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-b
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
      ref_id: 1.B
      name: Manage Cybersecurity Oversight
      description: The organization's cybersecurity risk management strategy, expectations,
        and policies are established.
      annotation: 'Outcome: The organization''s cybersecurity risk management strategy,
        expectations, and policies are established.


        TTP/Risk Addressed: Insufficient cybersecurity policies and procedures/practices
        that can manage cybersecurity risk for the organization''s technologies and
        processes.


        Recommended Actions:

        - Review cybersecurity policies annually; update when requirements, risks,
        threats, or technology changes

        - Communicate and enforce policies reflecting organizational strategy and
        priorities

        - Establish governance encompassing regulatory, legal, risk, environmental,
        and operational obligations

        - Develop OT-specific policies acknowledging IT program limitations and critical
        function priorities


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-01
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-02
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-03
      translations:
        fr:
          name: "G\xE9rer la gouvernance de la cybers\xE9curit\xE9"
          description: "La strat\xE9gie, les attentes et les politiques de gestion\
            \ des risques de cybers\xE9curit\xE9 de l'organisation sont \xE9tablies."
          annotation: "R\xE9sultat attendu : La strat\xE9gie, les attentes et les\
            \ politiques de gestion des risques de cybers\xE9curit\xE9 de l'organisation\
            \ sont \xE9tablies.\n\nTTP/Risque trait\xE9 : Manque de responsabilit\xE9\
            , d'investissement ou d'efficacit\xE9 en mati\xE8re de cybers\xE9curit\xE9\
            \ en raison de l'absence ou de l'inad\xE9quation des politiques, des r\xF4\
            les et des proc\xE9dures de gestion des risques cyber.\n\nActions recommand\xE9\
            es :\n- R\xE9viser les politiques de cybers\xE9curit\xE9 annuellement\
            \ ; les mettre \xE0 jour en cas de changement des exigences, risques,\
            \ menaces ou technologies\n- Communiquer et appliquer les politiques refl\xE9\
            tant la strat\xE9gie et les priorit\xE9s organisationnelles\n- \xC9tablir\
            \ une gouvernance englobant les obligations r\xE9glementaires, juridiques,\
            \ environnementales et op\xE9rationnelles\n- D\xE9velopper des politiques\
            \ sp\xE9cifiques aux OT tenant compte des limitations des programmes IT\
            \ et des priorit\xE9s des fonctions critiques\n\nCo\xFBt : Faible | Impact\
            \ : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Gerenciar a Supervis\xE3o de Ciberseguran\xE7a"
          description: "A estrat\xE9gia, as expectativas e as pol\xEDticas de gest\xE3\
            o de riscos de ciberseguran\xE7a da organiza\xE7\xE3o s\xE3o estabelecidas."
          annotation: "Resultado: A estrat\xE9gia, as expectativas e as pol\xEDticas\
            \ de gest\xE3o de riscos de ciberseguran\xE7a da organiza\xE7\xE3o s\xE3\
            o estabelecidas.\n\nTTP/Risco Tratado: Pol\xEDticas e procedimentos/pr\xE1\
            ticas de ciberseguran\xE7a insuficientes, incapazes de gerenciar os riscos\
            \ de ciberseguran\xE7a das tecnologias e dos processos da organiza\xE7\
            \xE3o.\n\nA\xE7\xF5es Recomendadas:\n- Revisar as pol\xEDticas de ciberseguran\xE7\
            a anualmente; atualiz\xE1-las quando houver mudan\xE7as em requisitos,\
            \ riscos, amea\xE7as ou tecnologia\n- Comunicar e fazer cumprir pol\xED\
            ticas que reflitam a estrat\xE9gia e as prioridades organizacionais\n\
            - Estabelecer governan\xE7a que abranja obriga\xE7\xF5es regulat\xF3rias,\
            \ legais, de risco, ambientais e operacionais\n- Desenvolver pol\xEDticas\
            \ espec\xEDficas para TO (Tecnologia Operacional) que reconhe\xE7am as\
            \ limita\xE7\xF5es do programa de TI e as prioridades de fun\xE7\xF5es\
            \ cr\xEDticas\n\nCusto: Baixo | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-c
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
      ref_id: 1.C
      name: Manage Incident Response Plans
      description: Identify improvements by practicing cybersecurity and incident
        response plans to maintain and update the organization's cybersecurity program.
      annotation: 'Outcome: Identify improvements by practicing cybersecurity and
        incident response plans to maintain and update the organization''s cybersecurity
        program.


        TTP/Risk Addressed: Inability to quickly and effectively isolate, contain,
        eradicate, remediate, and communicate about cybersecurity incidents.


        Recommended Actions:

        - Develop, maintain, update, and regularly exercise IR plans for common and
        organizationally specific scenarios

        - Ensure realistic drills including all relevant stakeholders

        - Review and drill IR plans minimum annually

        - Account for OT-specific safety and containment considerations


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-04
      translations:
        fr:
          name: "G\xE9rer les plans de r\xE9ponse aux incidents"
          description: "Identifier les am\xE9liorations en pratiquant les plans de\
            \ cybers\xE9curit\xE9 et de r\xE9ponse aux incidents pour maintenir et\
            \ mettre \xE0 jour le programme de cybers\xE9curit\xE9 de l'organisation."
          annotation: "R\xE9sultat attendu : Identifier les am\xE9liorations en pratiquant\
            \ les plans de cybers\xE9curit\xE9 et de r\xE9ponse aux incidents pour\
            \ maintenir et mettre \xE0 jour le programme de cybers\xE9curit\xE9 de\
            \ l'organisation.\n\nTTP/Risque trait\xE9 : Incapacit\xE9 \xE0 isoler,\
            \ contenir, \xE9radiquer, rem\xE9dier et communiquer rapidement et efficacement\
            \ lors d'incidents de cybers\xE9curit\xE9. Les d\xE9faillances de communication\
            \ ralentissent la r\xE9solution, augmentent les temps d'arr\xEAt et amplifient\
            \ les dommages.\n\nActions recommand\xE9es :\n- D\xE9velopper, maintenir,\
            \ mettre \xE0 jour et exercer r\xE9guli\xE8rement les plans de RI pour\
            \ des sc\xE9narios courants et sp\xE9cifiques \xE0 l'organisation\n- Garantir\
            \ des exercices r\xE9alistes incluant toutes les parties prenantes\n-\
            \ R\xE9viser et tester les plans de RI au minimum annuellement\n- Prendre\
            \ en compte les consid\xE9rations de s\xFBret\xE9 et de confinement sp\xE9\
            cifiques aux OT\n\nCo\xFBt : Faible | Impact : \xC9lev\xE9 | Complexit\xE9\
            \ : Mod\xE9r\xE9"
        pt:
          name: Gerenciar Planos de Resposta a Incidentes
          description: "Identificar melhorias por meio da pr\xE1tica dos planos de\
            \ ciberseguran\xE7a e de resposta a incidentes, a fim de manter e atualizar\
            \ o programa de ciberseguran\xE7a da organiza\xE7\xE3o."
          annotation: "Resultado: Identificar melhorias por meio da pr\xE1tica dos\
            \ planos de ciberseguran\xE7a e de resposta a incidentes, a fim de manter\
            \ e atualizar o programa de ciberseguran\xE7a da organiza\xE7\xE3o.\n\n\
            TTP/Risco Tratado: Incapacidade de isolar, conter, erradicar, remediar\
            \ e comunicar de forma r\xE1pida e eficaz sobre incidentes de ciberseguran\xE7\
            a.\n\nA\xE7\xF5es Recomendadas:\n- Desenvolver, manter, atualizar e exercitar\
            \ regularmente planos de resposta a incidentes (RI) para cen\xE1rios comuns\
            \ e espec\xEDficos da organiza\xE7\xE3o\n- Garantir simula\xE7\xF5es realistas\
            \ que incluam todas as partes interessadas relevantes\n- Revisar e exercitar\
            \ os planos de RI no m\xEDnimo anualmente\n- Considerar aspectos de seguran\xE7\
            a e conten\xE7\xE3o espec\xEDficos de TO (Tecnologia Operacional)\n\n\
            Custo: Baixo | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-d
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
      ref_id: 1.D
      name: Supply Chain Incident Reporting & Vulnerability Disclosure
      description: Organizations more rapidly learn about and respond to known incidents
        or breaches across vendors and service providers.
      annotation: 'Outcome: Organizations more rapidly learn about and respond to
        known incidents or breaches across vendors and service providers.


        TTP/Risk Addressed: Insufficient cybersecurity supply chain risk management
        (C-SCRM) practices that cannot securely support the organization''s technologies
        and processes.


        Recommended Actions:

        - Require vendors/service providers to notify customers of security incidents
        and vulnerabilities within risk-informed timeframes via SLAs and contracts

        - Document and track OT asset serial numbers, checksums, digital certificates/signatures
        to verify authenticity of hardware, software, and firmware


        Cost: Moderate | Impact: Moderate | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-05
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-06
      translations:
        fr:
          name: "Signalement des incidents et divulgation des vuln\xE9rabilit\xE9\
            s de la cha\xEEne d'approvisionnement"
          description: "Les organisations apprennent et r\xE9pondent plus rapidement\
            \ aux incidents ou violations connus chez les fournisseurs et prestataires\
            \ de services."
          annotation: "R\xE9sultat attendu : Les organisations apprennent et r\xE9\
            pondent plus rapidement aux incidents ou violations connus chez les fournisseurs\
            \ et prestataires de services.\n\nTTP/Risque trait\xE9 : Les adversaires\
            \ exploitent les vuln\xE9rabilit\xE9s en abusant des relations de confiance\
            \ avec des tiers, en manipulant les produits ou les m\xE9canismes de livraison\
            \ avant qu'ils n'atteignent les utilisateurs finaux, ou en compromettant\
            \ les environnements des fournisseurs.\n\nActions recommand\xE9es :\n\
            - Exiger des fournisseurs et prestataires qu'ils notifient les clients\
            \ des incidents de s\xE9curit\xE9 et des vuln\xE9rabilit\xE9s dans des\
            \ d\xE9lais adapt\xE9s au risque via des SLA et des contrats\n- Documenter\
            \ et suivre les num\xE9ros de s\xE9rie, sommes de contr\xF4le, certificats\
            \ num\xE9riques et signatures des actifs OT pour v\xE9rifier l'authenticit\xE9\
            \ du mat\xE9riel, des logiciels et des micrologiciels\n\nCo\xFBt : Mod\xE9\
            r\xE9 | Impact : Mod\xE9r\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Notifica\xE7\xE3o de Incidentes na Cadeia de Suprimentos e Divulga\xE7\
            \xE3o de Vulnerabilidades"
          description: "As organiza\xE7\xF5es tomam conhecimento e respondem mais\
            \ rapidamente a incidentes ou viola\xE7\xF5es conhecidas envolvendo fornecedores\
            \ e prestadores de servi\xE7os."
          annotation: "Resultado: As organiza\xE7\xF5es tomam conhecimento e respondem\
            \ mais rapidamente a incidentes ou viola\xE7\xF5es conhecidas envolvendo\
            \ fornecedores e prestadores de servi\xE7os.\n\nTTP/Risco Tratado: Pr\xE1\
            ticas insuficientes de gest\xE3o de riscos de ciberseguran\xE7a na cadeia\
            \ de suprimentos (C-SCRM), incapazes de apoiar de forma segura as tecnologias\
            \ e os processos da organiza\xE7\xE3o.\n\nA\xE7\xF5es Recomendadas:\n\
            - Exigir que fornecedores/prestadores de servi\xE7os notifiquem os clientes\
            \ sobre incidentes de seguran\xE7a e vulnerabilidades dentro de prazos\
            \ informados por risco, por meio de SLAs e contratos\n- Documentar e rastrear\
            \ n\xFAmeros de s\xE9rie, somas de verifica\xE7\xE3o (checksums), certificados/assinaturas\
            \ digitais de ativos de TO para verificar a autenticidade de hardware,\
            \ software e firmware\n\nCusto: Moderado | Impacto: Moderado | Complexidade:\
            \ Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:1-e
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:gv
      ref_id: 1.E
      name: Manage Risks from Managed Service Providers
      description: The risks posed by a managed service provider (MSP) are identified,
        recorded, assessed, prioritized, monitored, and updated over the course of
        the relationship.
      annotation: 'Outcome: The risks posed by a managed service provider (MSP) are
        identified, recorded, assessed, prioritized, monitored, and updated over the
        course of the relationship.


        TTP/Risk Addressed: Adversaries can exploit vulnerabilities by abusing trusted
        third-party relationships.


        Recommended Actions:

        - Develop understanding of MSP services and security products

        - Understand contractual agreements and proactively address security gaps
        outside contract scope

        - Ensure contracts detail how and when MSPs notify customers of incidents
        affecting their environment


        Cost: Moderate | Impact: Moderate | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-07
      translations:
        fr:
          name: "G\xE9rer les risques li\xE9s aux prestataires de services manag\xE9\
            s"
          description: "Les risques pos\xE9s par un prestataire de services manag\xE9\
            s (MSP) sont identifi\xE9s, enregistr\xE9s, \xE9valu\xE9s, prioris\xE9\
            s, surveill\xE9s et mis \xE0 jour tout au long de la relation."
          annotation: "R\xE9sultat attendu : Les risques pos\xE9s par un prestataire\
            \ de services manag\xE9s (MSP) sont identifi\xE9s, enregistr\xE9s, \xE9\
            valu\xE9s, prioris\xE9s, surveill\xE9s et mis \xE0 jour tout au long de\
            \ la relation.\n\nTTP/Risque trait\xE9 : Les adversaires exploitent les\
            \ vuln\xE9rabilit\xE9s en abusant des relations de confiance avec des\
            \ tiers, en manipulant les produits ou les m\xE9canismes de livraison\
            \ avant qu'ils n'atteignent les utilisateurs finaux, ou en compromettant\
            \ les environnements des fournisseurs.\n\nActions recommand\xE9es :\n\
            - D\xE9velopper la compr\xE9hension des services et produits de s\xE9\
            curit\xE9 du MSP\n- Comprendre les accords contractuels et combler proactivement\
            \ les lacunes de s\xE9curit\xE9 hors du p\xE9rim\xE8tre contractuel\n\
            - S'assurer que les contrats pr\xE9cisent comment et quand les MSP notifient\
            \ les clients des incidents affectant leur environnement\n\nCo\xFBt :\
            \ Mod\xE9r\xE9 | Impact : Mod\xE9r\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Gerenciar Riscos de Provedores de Servi\xE7os Gerenciados"
          description: "Os riscos representados por um provedor de servi\xE7os gerenciados\
            \ (MSP) s\xE3o identificados, registrados, avaliados, priorizados, monitorados\
            \ e atualizados ao longo do relacionamento."
          annotation: "Resultado: Os riscos representados por um provedor de servi\xE7\
            os gerenciados (MSP) s\xE3o identificados, registrados, avaliados, priorizados,\
            \ monitorados e atualizados ao longo do relacionamento.\n\nTTP/Risco Tratado:\
            \ Advers\xE1rios podem explorar vulnerabilidades abusando de rela\xE7\xF5\
            es de confian\xE7a com terceiros.\n\nA\xE7\xF5es Recomendadas:\n- Desenvolver\
            \ entendimento dos servi\xE7os e produtos de seguran\xE7a do MSP\n- Compreender\
            \ os acordos contratuais e tratar proativamente as lacunas de seguran\xE7\
            a fora do escopo do contrato\n- Garantir que os contratos detalhem como\
            \ e quando os MSPs notificam os clientes sobre incidentes que afetem seu\
            \ ambiente\n\nCusto: Moderado | Impacto: Moderado | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
      ref_id: 2.A
      name: Manage Organizational Assets
      description: A maintained asset inventory to improve cybersecurity resilience
        by reducing downtime, aiding recovery, bolstering defenses, and improving
        preparedness.
      annotation: 'Outcome: A maintained asset inventory to improve cybersecurity
        resilience by reducing downtime, aiding recovery, bolstering defenses, and
        improving preparedness.


        TTP/Risk Addressed: Adversaries might use computer accessories, networking
        hardware, or other devices as entry points to infiltrate systems or networks.


        Recommended Actions:

        - Maintain regularly updated inventory of all organizational assets including
        data, hardware, software, systems, facilities, and personnel

        - Update critical IT/OT assets more frequently


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-08
      translations:
        fr:
          name: "G\xE9rer les actifs organisationnels"
          description: "Un inventaire maintenu des actifs pour am\xE9liorer la r\xE9\
            silience en cybers\xE9curit\xE9 en r\xE9duisant les temps d'arr\xEAt,\
            \ en facilitant la reprise, en renfor\xE7ant les d\xE9fenses et en am\xE9\
            liorant la pr\xE9paration."
          annotation: "R\xE9sultat attendu : Un inventaire maintenu des actifs pour\
            \ am\xE9liorer la r\xE9silience en cybers\xE9curit\xE9 en r\xE9duisant\
            \ les temps d'arr\xEAt, en facilitant la reprise, en renfor\xE7ant les\
            \ d\xE9fenses et en am\xE9liorant la pr\xE9paration.\n\nTTP/Risque trait\xE9\
            \ : Compr\xE9hension incompl\xE8te ou inexacte des actifs organisationnels,\
            \ de la topologie r\xE9seau et des journaux de s\xE9curit\xE9, entravant\
            \ la d\xE9tection efficace, la r\xE9ponse aux incidents et la reprise\
            \ d'activit\xE9.\n\nActions recommand\xE9es :\n- Maintenir un inventaire\
            \ r\xE9guli\xE8rement mis \xE0 jour de tous les actifs organisationnels\
            \ incluant les donn\xE9es, le mat\xE9riel, les logiciels, les syst\xE8\
            mes, les installations et le personnel\n- Mettre \xE0 jour plus fr\xE9\
            quemment les actifs IT/OT critiques\n\nCo\xFBt : Faible | Impact : \xC9\
            lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: Gerenciar Ativos Organizacionais
          description: "Um invent\xE1rio de ativos mantido para melhorar a resili\xEA\
            ncia de ciberseguran\xE7a, reduzindo o tempo de inatividade, auxiliando\
            \ na recupera\xE7\xE3o, fortalecendo as defesas e aprimorando a prepara\xE7\
            \xE3o."
          annotation: "Resultado: Um invent\xE1rio de ativos mantido para melhorar\
            \ a resili\xEAncia de ciberseguran\xE7a, reduzindo o tempo de inatividade,\
            \ auxiliando na recupera\xE7\xE3o, fortalecendo as defesas e aprimorando\
            \ a prepara\xE7\xE3o.\n\nTTP/Risco Tratado: Advers\xE1rios podem usar\
            \ acess\xF3rios de computador, hardware de rede ou outros dispositivos\
            \ como pontos de entrada para se infiltrar em sistemas ou redes.\n\nA\xE7\
            \xF5es Recomendadas:\n- Manter um invent\xE1rio regularmente atualizado\
            \ de todos os ativos organizacionais, incluindo dados, hardware, software,\
            \ sistemas, instala\xE7\xF5es e pessoal\n- Atualizar com maior frequ\xEA\
            ncia os ativos cr\xEDticos de TI/TO\n\nCusto: Baixo | Impacto: Alto |\
            \ Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-b
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
      ref_id: 2.B
      name: Mitigate Known Vulnerabilities
      description: Reduced likelihood of threat actors exploiting known vulnerabilities
        to breach organizational networks.
      annotation: 'Outcome: Reduced likelihood of threat actors exploiting known vulnerabilities
        to breach organizational networks.


        TTP/Risk Addressed: Adversaries frequently target unpatched and misconfigured
        systems, particularly those exposed to the internet. Adversaries often leverage
        software vulnerabilities, temporary malfunctions, or configuration errors
        to gain initial access to a network.


        Recommended Actions:

        - Implement vulnerability management program to patch and mitigate misconfigured
        software timely

        - Monitor risk response progress via POA&M, risk registers, and risk detail
        reports

        - Document potential risks of proposed changes; provide rollback guidance

        - Assign responsibilities for processing cybersecurity threat, vulnerability,
        or incident disclosures

        - Incorporate compensating security controls for legacy systems where possible

        - For OT assets where patching is infeasible, apply compensating controls
        (segmentation, monitoring)


        Cost: High | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-09
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-10
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-27
      translations:
        fr:
          name: "Att\xE9nuer les vuln\xE9rabilit\xE9s connues"
          description: "R\xE9duction de la probabilit\xE9 que des acteurs malveillants\
            \ exploitent des vuln\xE9rabilit\xE9s connues pour compromettre les r\xE9\
            seaux de l'organisation."
          annotation: "R\xE9sultat attendu : R\xE9duction de la probabilit\xE9 que\
            \ des acteurs malveillants exploitent des vuln\xE9rabilit\xE9s connues\
            \ pour compromettre les r\xE9seaux de l'organisation.\n\nTTP/Risque trait\xE9\
            \ : Les adversaires ciblent les syst\xE8mes non corrig\xE9s et mal configur\xE9\
            s, en particulier ceux expos\xE9s \xE0 Internet, en exploitant les vuln\xE9\
            rabilit\xE9s logicielles, les dysfonctionnements temporaires ou les erreurs\
            \ de configuration pour obtenir un acc\xE8s initial.\n\nActions recommand\xE9\
            es :\n- Mettre en \u0153uvre un programme de gestion des vuln\xE9rabilit\xE9\
            s pour corriger et att\xE9nuer les logiciels mal configur\xE9s en temps\
            \ voulu\n- Suivre l'avancement de la r\xE9ponse aux risques via les POA&M,\
            \ les registres de risques et les rapports d\xE9taill\xE9s\n- Documenter\
            \ les risques potentiels des changements propos\xE9s ; fournir des instructions\
            \ de retour en arri\xE8re\n- Attribuer les responsabilit\xE9s pour le\
            \ traitement des divulgations de menaces, vuln\xE9rabilit\xE9s ou incidents\n\
            - Incorporer des contr\xF4les de s\xE9curit\xE9 compensatoires pour les\
            \ syst\xE8mes existants lorsque possible\n- Pour les actifs OT o\xF9 la\
            \ correction est impossible, appliquer des contr\xF4les compensatoires\
            \ (segmentation, surveillance)\n\nCo\xFBt : \xC9lev\xE9 | Impact : \xC9\
            lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: Mitigar Vulnerabilidades Conhecidas
          description: "Redu\xE7\xE3o da probabilidade de agentes de amea\xE7a explorarem\
            \ vulnerabilidades conhecidas para violar as redes da organiza\xE7\xE3\
            o."
          annotation: "Resultado: Redu\xE7\xE3o da probabilidade de agentes de amea\xE7\
            a explorarem vulnerabilidades conhecidas para violar as redes da organiza\xE7\
            \xE3o.\n\nTTP/Risco Tratado: Advers\xE1rios frequentemente atacam sistemas\
            \ n\xE3o corrigidos e mal configurados, particularmente aqueles expostos\
            \ \xE0 internet. Os advers\xE1rios costumam tirar proveito de vulnerabilidades\
            \ de software, falhas tempor\xE1rias ou erros de configura\xE7\xE3o para\
            \ obter acesso inicial a uma rede.\n\nA\xE7\xF5es Recomendadas:\n- Implementar\
            \ um programa de gest\xE3o de vulnerabilidades para corrigir e mitigar\
            \ tempestivamente software mal configurado\n- Monitorar o progresso da\
            \ resposta a riscos por meio de POA&M, registros de risco e relat\xF3\
            rios detalhados de risco\n- Documentar os riscos potenciais das mudan\xE7\
            as propostas; fornecer orienta\xE7\xF5es de revers\xE3o (rollback)\n-\
            \ Atribuir responsabilidades pelo processamento de divulga\xE7\xF5es de\
            \ amea\xE7as, vulnerabilidades ou incidentes de ciberseguran\xE7a\n- Incorporar\
            \ controles de seguran\xE7a compensat\xF3rios para sistemas legados sempre\
            \ que poss\xEDvel\n- Para ativos de TO em que a aplica\xE7\xE3o de patches\
            \ \xE9 invi\xE1vel, aplicar controles compensat\xF3rios (segmenta\xE7\xE3\
            o, monitoramento)\n\nCusto: Alto | Impacto: Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-c
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
      ref_id: 2.C
      name: Obtain Independent Validation of Cybersecurity Controls
      description: Validate that implemented security controls are properly configured
        and working as intended.
      annotation: 'Outcome: Validate that implemented security controls are properly
        configured and working as intended.


        TTP/Risk Addressed: Gaps in cyber defenses or overconfidence in existing protections.


        Recommended Actions:

        - Regularly engage third-party cybersecurity experts for penetration tests,
        bug bounties, incident simulations, and table-top exercises

        - Assess ability of adversaries to infiltrate and move laterally within networks
        targeting critical systems

        - Ensure findings from tests are addressed


        Cost: High | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-05
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-11
      translations:
        fr:
          name: "Obtenir une validation ind\xE9pendante des contr\xF4les de cybers\xE9\
            curit\xE9"
          description: "Valider que les contr\xF4les de s\xE9curit\xE9 mis en \u0153\
            uvre sont correctement configur\xE9s et fonctionnent comme pr\xE9vu."
          annotation: "R\xE9sultat attendu : Valider que les contr\xF4les de s\xE9\
            curit\xE9 mis en \u0153uvre sont correctement configur\xE9s et fonctionnent\
            \ comme pr\xE9vu.\n\nTTP/Risque trait\xE9 : Lacunes dans les d\xE9fenses\
            \ cyber ou exc\xE8s de confiance dans les protections existantes en raison\
            \ d'un manque de validation ind\xE9pendante du bon fonctionnement et de\
            \ la configuration des contr\xF4les mis en place.\n\nActions recommand\xE9\
            es :\n- Engager r\xE9guli\xE8rement des experts tiers en cybers\xE9curit\xE9\
            \ pour des tests d'intrusion, des bug bounties, des simulations d'incidents\
            \ et des exercices sur table\n- \xC9valuer la capacit\xE9 des adversaires\
            \ \xE0 infiltrer et se d\xE9placer lat\xE9ralement dans les r\xE9seaux\
            \ ciblant les syst\xE8mes critiques\n- S'assurer que les conclusions des\
            \ tests sont trait\xE9es\n\nCo\xFBt : \xC9lev\xE9 | Impact : \xC9lev\xE9\
            \ | Complexit\xE9 : Complexe"
        pt:
          name: "Obter Valida\xE7\xE3o Independente dos Controles de Ciberseguran\xE7\
            a"
          description: "Validar que os controles de seguran\xE7a implementados est\xE3\
            o devidamente configurados e funcionando conforme o pretendido."
          annotation: "Resultado: Validar que os controles de seguran\xE7a implementados\
            \ est\xE3o devidamente configurados e funcionando conforme o pretendido.\n\
            \nTTP/Risco Tratado: Lacunas nas defesas cibern\xE9ticas ou excesso de\
            \ confian\xE7a nas prote\xE7\xF5es existentes.\n\nA\xE7\xF5es Recomendadas:\n\
            - Engajar regularmente especialistas em ciberseguran\xE7a de terceiros\
            \ para testes de invas\xE3o (pentests), programas de recompensa por bugs\
            \ (bug bounties), simula\xE7\xF5es de incidentes e exerc\xEDcios de mesa\
            \ (table-top)\n- Avaliar a capacidade de advers\xE1rios de se infiltrarem\
            \ e se moverem lateralmente nas redes visando sistemas cr\xEDticos\n-\
            \ Garantir que as constata\xE7\xF5es dos testes sejam tratadas\n\nCusto:\
            \ Alto | Impacto: Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-d
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
      ref_id: 2.D
      name: Maintain Vulnerability Disclosure/Reporting Process
      description: Organizations more rapidly learn about vulnerabilities or weaknesses.
      annotation: 'Outcome: Organizations more rapidly learn about vulnerabilities
        or weaknesses.


        TTP/Risk Addressed: Unreported security vulnerabilities in software, networks,
        devices, and systems can be exploited by adversaries before they are mitigated.


        Recommended Actions:

        - Maintain public, easily discoverable method for notifying security teams
        of vulnerable, misconfigured, or exploitable assets via email or web form

        - Acknowledge valid submissions and respond timely considering completeness
        and complexity

        - Mitigate validated, exploitable weaknesses consistently with severity

        - Protect individuals identifying/reporting vulnerabilities in good faith
        under safe harbor provisions

        - Apply security.txt files conforming to RFC 9116 on all public-facing web
        domains


        Cost: Low | Impact: Low | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-12
      translations:
        fr:
          name: "Maintenir un processus de divulgation et de signalement des vuln\xE9\
            rabilit\xE9s"
          description: "Les organisations apprennent plus rapidement les vuln\xE9\
            rabilit\xE9s ou faiblesses."
          annotation: "R\xE9sultat attendu : Les organisations apprennent plus rapidement\
            \ les vuln\xE9rabilit\xE9s ou faiblesses.\n\nTTP/Risque trait\xE9 : Les\
            \ adversaires ciblent les syst\xE8mes non corrig\xE9s et mal configur\xE9\
            s, en particulier ceux expos\xE9s \xE0 Internet, en exploitant les vuln\xE9\
            rabilit\xE9s logicielles, les dysfonctionnements temporaires ou les erreurs\
            \ de configuration pour obtenir un acc\xE8s initial.\n\nActions recommand\xE9\
            es :\n- Maintenir une m\xE9thode publique et facilement accessible pour\
            \ signaler aux \xE9quipes de s\xE9curit\xE9 les actifs vuln\xE9rables,\
            \ mal configur\xE9s ou exploitables par courriel ou formulaire web\n-\
            \ Accuser r\xE9ception des soumissions valides et r\xE9pondre dans des\
            \ d\xE9lais raisonnables\n- Att\xE9nuer les faiblesses valid\xE9es et\
            \ exploitables proportionnellement \xE0 leur s\xE9v\xE9rit\xE9\n- Prot\xE9\
            ger les personnes identifiant ou signalant les vuln\xE9rabilit\xE9s de\
            \ bonne foi\n- Appliquer les fichiers security.txt conformes \xE0 la RFC\
            \ 9116 sur tous les domaines web publics\n\nCo\xFBt : Faible | Impact\
            \ : Faible | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Manter Processo de Divulga\xE7\xE3o/Notifica\xE7\xE3o de Vulnerabilidades"
          description: "As organiza\xE7\xF5es tomam conhecimento de vulnerabilidades\
            \ ou fragilidades mais rapidamente."
          annotation: "Resultado: As organiza\xE7\xF5es tomam conhecimento de vulnerabilidades\
            \ ou fragilidades mais rapidamente.\n\nTTP/Risco Tratado: Vulnerabilidades\
            \ de seguran\xE7a n\xE3o notificadas em software, redes, dispositivos\
            \ e sistemas podem ser exploradas por advers\xE1rios antes de serem mitigadas.\n\
            \nA\xE7\xF5es Recomendadas:\n- Manter um m\xE9todo p\xFAblico e facilmente\
            \ localiz\xE1vel para notificar as equipes de seguran\xE7a sobre ativos\
            \ vulner\xE1veis, mal configurados ou explor\xE1veis, por e-mail ou formul\xE1\
            rio web\n- Confirmar o recebimento de submiss\xF5es v\xE1lidas e responder\
            \ tempestivamente, considerando a completude e a complexidade\n- Mitigar\
            \ fragilidades validadas e explor\xE1veis de forma consistente com a severidade\n\
            - Proteger as pessoas que identificam/notificam vulnerabilidades de boa-f\xE9\
            \ sob disposi\xE7\xF5es de porto seguro (safe harbor)\n- Aplicar arquivos\
            \ security.txt em conformidade com a RFC 9116 em todos os dom\xEDnios\
            \ web voltados ao p\xFAblico\n\nCusto: Baixo | Impacto: Baixo | Complexidade:\
            \ Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:2-e
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:id
      ref_id: 2.E
      name: Document Network Topology
      description: More efficiently and effectively respond to incidents and maintain
        service continuity.
      annotation: 'Outcome: More efficiently and effectively respond to incidents
        and maintain service continuity.


        TTP/Risk Addressed: Incomplete or inaccurate understanding of network topology
        inhibits effective incident response and recovery.


        Recommended Actions:

        - Maintain accurate documentation describing current network topology and
        relevant information across all IT and OT networks

        - Perform network reviews and track annually; update when topology changes


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-13
      translations:
        fr:
          name: "Documenter la topologie r\xE9seau"
          description: "R\xE9pondre plus efficacement aux incidents et maintenir la\
            \ continuit\xE9 de service."
          annotation: "R\xE9sultat attendu : R\xE9pondre plus efficacement aux incidents\
            \ et maintenir la continuit\xE9 de service.\n\nTTP/Risque trait\xE9 :\
            \ Compr\xE9hension incompl\xE8te ou inexacte des actifs organisationnels,\
            \ de la topologie r\xE9seau et des journaux de s\xE9curit\xE9, entravant\
            \ la d\xE9tection efficace, la r\xE9ponse aux incidents et la reprise\
            \ d'activit\xE9.\n\nActions recommand\xE9es :\n- Maintenir une documentation\
            \ pr\xE9cise d\xE9crivant la topologie r\xE9seau actuelle et les informations\
            \ pertinentes pour tous les r\xE9seaux IT et OT\n- Effectuer des revues\
            \ r\xE9seau et les suivre annuellement ; mettre \xE0 jour en cas de changement\
            \ de topologie\n\nCo\xFBt : Faible | Impact : \xC9lev\xE9 | Complexit\xE9\
            \ : Mod\xE9r\xE9"
        pt:
          name: Documentar a Topologia de Rede
          description: "Responder a incidentes de forma mais eficiente e eficaz e\
            \ manter a continuidade dos servi\xE7os."
          annotation: "Resultado: Responder a incidentes de forma mais eficiente e\
            \ eficaz e manter a continuidade dos servi\xE7os.\n\nTTP/Risco Tratado:\
            \ O entendimento incompleto ou impreciso da topologia de rede prejudica\
            \ a efic\xE1cia da resposta a incidentes e da recupera\xE7\xE3o.\n\nA\xE7\
            \xF5es Recomendadas:\n- Manter documenta\xE7\xE3o precisa que descreva\
            \ a topologia de rede atual e as informa\xE7\xF5es relevantes em todas\
            \ as redes de TI e TO\n- Realizar revis\xF5es de rede e acompanh\xE1-las\
            \ anualmente; atualizar quando a topologia mudar\n\nCusto: Baixo | Impacto:\
            \ Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.A
      name: Changing Default Passwords
      description: Prevent threat actors from using default passwords to achieve initial
        access and move laterally in a network.
      annotation: 'Outcome: Prevent threat actors from using default passwords to
        achieve initial access and move laterally in a network.


        TTP/Risk Addressed: Adversaries might acquire and exploit default account
        credentials to gain initial access, maintain persistence, escalate privileges,
        or evade defenses.


        Recommended Actions:

        - Require changing default manufacturer passwords for all hardware, software,
        and firmware before network connection

        - If infeasible (hard-coded passwords), document and implement compensating
        controls; monitor logs for network traffic and login attempts

        - Change default passwords on existing OT systems; establish policy for all
        new/future devices


        Cost: Low | Impact: High | Complexity: Simple'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-07
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-14
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
      translations:
        fr:
          name: "Changer les mots de passe par d\xE9faut"
          description: "Emp\xEAcher les acteurs malveillants d'utiliser les mots de\
            \ passe par d\xE9faut pour obtenir un acc\xE8s initial et se d\xE9placer\
            \ lat\xE9ralement dans un r\xE9seau."
          annotation: "R\xE9sultat attendu : Emp\xEAcher les acteurs malveillants\
            \ d'utiliser les mots de passe par d\xE9faut pour obtenir un acc\xE8s\
            \ initial et se d\xE9placer lat\xE9ralement dans un r\xE9seau.\n\nTTP/Risque\
            \ trait\xE9 : Les adversaires acqui\xE8rent et exploitent les identifiants\
            \ de comptes par d\xE9faut du fabricant pour obtenir un acc\xE8s initial,\
            \ maintenir la persistance, \xE9lever les privil\xE8ges ou contourner\
            \ les d\xE9fenses.\n\nActions recommand\xE9es :\n- Exiger le changement\
            \ des mots de passe par d\xE9faut du fabricant pour tout mat\xE9riel,\
            \ logiciel et micrologiciel avant la connexion au r\xE9seau\n- Si impossible\
            \ (mots de passe cod\xE9s en dur), documenter et mettre en \u0153uvre\
            \ des contr\xF4les compensatoires ; surveiller les journaux de trafic\
            \ r\xE9seau et de tentatives de connexion\n- Changer les mots de passe\
            \ par d\xE9faut sur les syst\xE8mes OT existants ; \xE9tablir une politique\
            \ pour tous les nouveaux dispositifs\n\nCo\xFBt : Faible | Impact : \xC9\
            lev\xE9 | Complexit\xE9 : Simple"
        pt:
          name: "Alterar Senhas Padr\xE3o"
          description: "Impedir que agentes de amea\xE7a utilizem senhas padr\xE3\
            o para obter acesso inicial e se mover lateralmente em uma rede."
          annotation: "Resultado: Impedir que agentes de amea\xE7a utilizem senhas\
            \ padr\xE3o para obter acesso inicial e se mover lateralmente em uma rede.\n\
            \nTTP/Risco Tratado: Advers\xE1rios podem adquirir e explorar credenciais\
            \ de contas padr\xE3o para obter acesso inicial, manter persist\xEAncia,\
            \ escalar privil\xE9gios ou evadir defesas.\n\nA\xE7\xF5es Recomendadas:\n\
            - Exigir a altera\xE7\xE3o das senhas padr\xE3o de f\xE1brica de todo\
            \ hardware, software e firmware antes da conex\xE3o \xE0 rede\n- Se invi\xE1\
            vel (senhas codificadas/hard-coded), documentar e implementar controles\
            \ compensat\xF3rios; monitorar logs em busca de tr\xE1fego de rede e tentativas\
            \ de login\n- Alterar as senhas padr\xE3o em sistemas de TO existentes;\
            \ estabelecer pol\xEDtica para todos os dispositivos novos/futuros\n\n\
            Custo: Baixo | Impacto: Alto | Complexidade: Simples"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-b
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.B
      name: Establish Minimum Password Strength
      description: Organizational passwords are harder for threat actors to guess
        or crack.
      annotation: 'Outcome: Organizational passwords are harder for threat actors
        to guess or crack.


        TTP/Risk Addressed: Adversaries use brute force techniques to crack passwords
        when unknown or hashes are obtained. They systematically guess passwords using
        repetitive or iterative methods.


        Recommended Actions:

        - Enforce system policy establishing minimum password strength including 16+
        character length for all password-protected IT and OT assets

        - Leverage passphrases and password managers for longer passwords

        - When minimum lengths are infeasible, apply compensating controls and record
        them; log all login attempts

        - Prioritize upgrade/replacement of assets unable to support sufficient strength
        passwords


        Cost: Low | Impact: High | Complexity: Simple'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-08
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-15
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
      translations:
        fr:
          name: "\xC9tablir une robustesse minimale des mots de passe"
          description: "Les mots de passe de l'organisation sont plus difficiles \xE0\
            \ deviner ou craquer pour les acteurs malveillants."
          annotation: "R\xE9sultat attendu : Les mots de passe de l'organisation sont\
            \ plus difficiles \xE0 deviner ou craquer pour les acteurs malveillants.\n\
            \nTTP/Risque trait\xE9 : Les adversaires utilisent des techniques de force\
            \ brute pour craquer les mots de passe, en devinant syst\xE9matiquement\
            \ les identifiants par des m\xE9thodes r\xE9p\xE9titives ou it\xE9ratives\
            \ sur des mots de passe inconnus ou des condensats obtenus.\n\nActions\
            \ recommand\xE9es :\n- Appliquer une politique syst\xE8me \xE9tablissant\
            \ une robustesse minimale des mots de passe incluant une longueur de 16\
            \ caract\xE8res ou plus pour tous les actifs IT et OT prot\xE9g\xE9s par\
            \ mot de passe\n- Utiliser des phrases de passe et des gestionnaires de\
            \ mots de passe\n- Lorsque les longueurs minimales sont impossibles, appliquer\
            \ des contr\xF4les compensatoires et les enregistrer ; journaliser toutes\
            \ les tentatives de connexion\n- Prioriser la mise \xE0 niveau ou le remplacement\
            \ des actifs ne supportant pas une robustesse suffisante\n\nCo\xFBt :\
            \ Faible | Impact : \xC9lev\xE9 | Complexit\xE9 : Simple"
        pt:
          name: "Estabelecer For\xE7a M\xEDnima de Senha"
          description: "As senhas organizacionais tornam-se mais dif\xEDceis de serem\
            \ adivinhadas ou quebradas por agentes de amea\xE7a."
          annotation: "Resultado: As senhas organizacionais tornam-se mais dif\xED\
            ceis de serem adivinhadas ou quebradas por agentes de amea\xE7a.\n\nTTP/Risco\
            \ Tratado: Advers\xE1rios usam t\xE9cnicas de for\xE7a bruta para quebrar\
            \ senhas quando estas s\xE3o desconhecidas ou quando hashes s\xE3o obtidos.\
            \ Eles adivinham sistematicamente as senhas usando m\xE9todos repetitivos\
            \ ou iterativos.\n\nA\xE7\xF5es Recomendadas:\n- Aplicar pol\xEDtica de\
            \ sistema que estabele\xE7a for\xE7a m\xEDnima de senha, incluindo comprimento\
            \ de 16 ou mais caracteres para todos os ativos de TI e TO protegidos\
            \ por senha\n- Aproveitar frases-senha (passphrases) e gerenciadores de\
            \ senhas para senhas mais longas\n- Quando os comprimentos m\xEDnimos\
            \ forem invi\xE1veis, aplicar controles compensat\xF3rios e registr\xE1\
            -los; registrar (log) todas as tentativas de login\n- Priorizar a atualiza\xE7\
            \xE3o/substitui\xE7\xE3o de ativos incapazes de suportar senhas de for\xE7\
            a suficiente\n\nCusto: Baixo | Impacto: Alto | Complexidade: Simples"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-c
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.C
      name: Create Unique Credentials
      description: Adversaries are unable to reuse compromised credentials to move
        laterally across the organization, particularly between IT and OT networks.
      annotation: 'Outcome: Adversaries are unable to reuse compromised credentials
        to move laterally across the organization, particularly between IT and OT
        networks.


        TTP/Risk Addressed: Adversaries can obtain and exploit account credentials
        to gain access, maintain persistence, escalate privileges, or evade defenses.
        Compromised credentials can bypass network access controls.


        Recommended Actions:

        - Create distinct, separate credentials for similar services and asset access
        across IT/OT networks

        - Users refrain from reusing passwords across accounts, applications, and
        services

        - System administrators and service/machine accounts have unique passwords

        - No universal non-person entity (NPE) account passwords

        - Utilize role-based accounts for IT/OT systems when possible


        Cost: Low | Impact: High | Complexity: Simple'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-16
      translations:
        fr:
          name: "Cr\xE9er des identifiants uniques"
          description: "Les adversaires ne peuvent pas r\xE9utiliser des identifiants\
            \ compromis pour se d\xE9placer lat\xE9ralement dans l'organisation, en\
            \ particulier entre les r\xE9seaux IT et OT."
          annotation: "R\xE9sultat attendu : Les adversaires ne peuvent pas r\xE9\
            utiliser des identifiants compromis pour se d\xE9placer lat\xE9ralement\
            \ dans l'organisation, en particulier entre les r\xE9seaux IT et OT.\n\
            \nTTP/Risque trait\xE9 : Les adversaires obtiennent et exploitent des\
            \ identifiants de comptes par vol, r\xE9utilisation ou abus de comptes\
            \ inactifs pour obtenir un acc\xE8s, maintenir la persistance, \xE9lever\
            \ les privil\xE8ges ou contourner les contr\xF4les d'acc\xE8s r\xE9seau.\n\
            \nActions recommand\xE9es :\n- Cr\xE9er des identifiants distincts et\
            \ s\xE9par\xE9s pour des services similaires et l'acc\xE8s aux actifs\
            \ entre les r\xE9seaux IT/OT\n- Les utilisateurs s'abstiennent de r\xE9\
            utiliser les mots de passe entre les comptes, applications et services\n\
            - Les administrateurs syst\xE8me et les comptes de service/machine ont\
            \ des mots de passe uniques\n- Pas de mot de passe universel pour les\
            \ comptes non personnels (NPE)\n- Utiliser des comptes bas\xE9s sur les\
            \ r\xF4les pour les syst\xE8mes IT/OT lorsque possible\n\nCo\xFBt : Faible\
            \ | Impact : \xC9lev\xE9 | Complexit\xE9 : Simple"
        pt:
          name: "Criar Credenciais \xDAnicas"
          description: "Os advers\xE1rios ficam impossibilitados de reutilizar credenciais\
            \ comprometidas para se mover lateralmente pela organiza\xE7\xE3o, particularmente\
            \ entre as redes de TI e TO."
          annotation: "Resultado: Os advers\xE1rios ficam impossibilitados de reutilizar\
            \ credenciais comprometidas para se mover lateralmente pela organiza\xE7\
            \xE3o, particularmente entre as redes de TI e TO.\n\nTTP/Risco Tratado:\
            \ Advers\xE1rios podem obter e explorar credenciais de contas para obter\
            \ acesso, manter persist\xEAncia, escalar privil\xE9gios ou evadir defesas.\
            \ Credenciais comprometidas podem contornar controles de acesso \xE0 rede.\n\
            \nA\xE7\xF5es Recomendadas:\n- Criar credenciais distintas e separadas\
            \ para servi\xE7os semelhantes e para acesso a ativos nas redes de TI/TO\n\
            - Usu\xE1rios se abst\xEAm de reutilizar senhas em contas, aplica\xE7\xF5\
            es e servi\xE7os\n- Administradores de sistema e contas de servi\xE7o/m\xE1\
            quina possuem senhas \xFAnicas\n- N\xE3o h\xE1 senhas universais para\
            \ contas de entidades n\xE3o humanas (NPE)\n- Utilizar contas baseadas\
            \ em fun\xE7\xE3o (role-based) para sistemas de TI/TO sempre que poss\xED\
            vel\n\nCusto: Baixo | Impacto: Alto | Complexidade: Simples"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-d
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.D
      name: Revoking Credentials for Departing Staff
      description: Prevent unauthorized access to organizational accounts or resources
        by former staff.
      annotation: 'Outcome: Prevent unauthorized access to organizational accounts
        or resources by former staff.


        TTP/Risk Addressed: Adversaries can exploit inactive accounts of former staff
        to evade detection.


        Recommended Actions:

        - Establish defined, enforced administrative offboarding process for staff,
        contractors, vendors including return of physical tokens/badges and revocation
        of all system/facility access

        - Review user access and disable inactive accounts after specified period
        (e.g., 30 days), ideally via automated process


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-17
      translations:
        fr:
          name: "R\xE9voquer les identifiants du personnel sortant"
          description: "Emp\xEAcher l'acc\xE8s non autoris\xE9 aux comptes ou ressources\
            \ de l'organisation par d'anciens employ\xE9s."
          annotation: "R\xE9sultat attendu : Emp\xEAcher l'acc\xE8s non autoris\xE9\
            \ aux comptes ou ressources de l'organisation par d'anciens employ\xE9\
            s.\n\nTTP/Risque trait\xE9 : Les adversaires obtiennent et exploitent\
            \ des identifiants de comptes par vol, r\xE9utilisation ou abus de comptes\
            \ inactifs pour obtenir un acc\xE8s, maintenir la persistance, \xE9lever\
            \ les privil\xE8ges ou contourner les contr\xF4les d'acc\xE8s r\xE9seau.\n\
            \nActions recommand\xE9es :\n- \xC9tablir un processus administratif d\xE9\
            fini et appliqu\xE9 de d\xE9part pour le personnel, les prestataires et\
            \ les fournisseurs, incluant la restitution des jetons physiques et badges\
            \ et la r\xE9vocation de tous les acc\xE8s\n- R\xE9viser les acc\xE8s\
            \ utilisateurs et d\xE9sactiver les comptes inactifs apr\xE8s une p\xE9\
            riode d\xE9finie (par ex. 30 jours), id\xE9alement via un processus automatis\xE9\
            \n\nCo\xFBt : Faible | Impact : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9\
            r\xE9"
        pt:
          name: "Revogar Credenciais de Funcion\xE1rios Desligados"
          description: "Impedir o acesso n\xE3o autorizado a contas ou recursos organizacionais\
            \ por ex-funcion\xE1rios."
          annotation: "Resultado: Impedir o acesso n\xE3o autorizado a contas ou recursos\
            \ organizacionais por ex-funcion\xE1rios.\n\nTTP/Risco Tratado: Advers\xE1\
            rios podem explorar contas inativas de ex-funcion\xE1rios para evadir\
            \ detec\xE7\xE3o.\n\nA\xE7\xF5es Recomendadas:\n- Estabelecer um processo\
            \ administrativo de desligamento (offboarding) definido e exigido para\
            \ funcion\xE1rios, terceirizados e fornecedores, incluindo a devolu\xE7\
            \xE3o de tokens/crach\xE1s f\xEDsicos e a revoga\xE7\xE3o de todo o acesso\
            \ a sistemas/instala\xE7\xF5es\n- Revisar o acesso dos usu\xE1rios e desabilitar\
            \ contas inativas ap\xF3s um per\xEDodo especificado (por exemplo, 30\
            \ dias), idealmente por meio de um processo automatizado\n\nCusto: Baixo\
            \ | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-e
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.E
      name: Monitor Unsuccessful (Automated) Login Attempts
      description: Protect organizations from automated, credential-based attacks.
      annotation: 'Outcome: Protect organizations from automated, credential-based
        attacks.


        TTP/Risk Addressed: Adversaries might acquire and exploit default account
        credentials to gain access, maintain persistence, escalate privileges, or
        evade defenses.


        Recommended Actions:

        - Capture and log all unsuccessful logins per organization''s security policy

        - Notify security personnel after consecutive unsuccessful attempts and deviations
        from normal behavior

        - Log and store alerts in relevant security or ticketing system for retroactive
        analysis


        Cost: Moderate | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-07
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-30
      translations:
        fr:
          name: "Surveiller les tentatives de connexion infructueuses (automatis\xE9\
            es)"
          description: "Prot\xE9ger les organisations contre les attaques automatis\xE9\
            es bas\xE9es sur les identifiants."
          annotation: "R\xE9sultat attendu : Prot\xE9ger les organisations contre\
            \ les attaques automatis\xE9es bas\xE9es sur les identifiants.\n\nTTP/Risque\
            \ trait\xE9 : Les adversaires acqui\xE8rent et exploitent les identifiants\
            \ de comptes par d\xE9faut du fabricant pour obtenir un acc\xE8s initial,\
            \ maintenir la persistance, \xE9lever les privil\xE8ges ou contourner\
            \ les d\xE9fenses.\n\nActions recommand\xE9es :\n- Capturer et journaliser\
            \ toutes les tentatives de connexion infructueuses conform\xE9ment \xE0\
            \ la politique de s\xE9curit\xE9 de l'organisation\n- Notifier le personnel\
            \ de s\xE9curit\xE9 apr\xE8s des tentatives cons\xE9cutives infructueuses\
            \ et des \xE9carts par rapport au comportement normal\n- Journaliser et\
            \ stocker les alertes dans le syst\xE8me de s\xE9curit\xE9 ou de tickets\
            \ pertinent pour analyse r\xE9trospective\n\nCo\xFBt : Mod\xE9r\xE9 |\
            \ Impact : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: Monitorar Tentativas de Login Malsucedidas (Automatizadas)
          description: "Proteger as organiza\xE7\xF5es contra ataques automatizados\
            \ baseados em credenciais."
          annotation: "Resultado: Proteger as organiza\xE7\xF5es contra ataques automatizados\
            \ baseados em credenciais.\n\nTTP/Risco Tratado: Advers\xE1rios podem\
            \ adquirir e explorar credenciais de contas padr\xE3o para obter acesso,\
            \ manter persist\xEAncia, escalar privil\xE9gios ou evadir defesas.\n\n\
            A\xE7\xF5es Recomendadas:\n- Capturar e registrar (log) todos os logins\
            \ malsucedidos conforme a pol\xEDtica de seguran\xE7a da organiza\xE7\xE3\
            o\n- Notificar o pessoal de seguran\xE7a ap\xF3s tentativas malsucedidas\
            \ consecutivas e desvios do comportamento normal\n- Registrar e armazenar\
            \ alertas no sistema de seguran\xE7a ou de chamados (ticketing) relevante\
            \ para an\xE1lise retroativa\n\nCusto: Moderado | Impacto: Alto | Complexidade:\
            \ Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-f
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.F
      name: Implement Multi-factor Authentication
      description: Add a critical, additional layer of security to protect asset accounts.
      annotation: 'Outcome: Add a critical, additional layer of security to protect
        asset accounts.


        TTP/Risk Addressed: Adversaries without prior knowledge of legitimate credentials
        might try commonly used passwords across various accounts. They might also
        systematically guess passwords using repetitive or iterative methods.


        Recommended Actions:

        - Require MFA using strongest available method for assets with remote access

        - MFA options ranked by strength: (1) Phishing-resistant MFA (FIDO/WebAuthn
        or PKI-based), (2) Mobile app-based soft tokens, (3) SMS/voice only when no
        other options available

        - All IT accounts leverage MFA; prioritize highest-risk accounts

        - OT: Enable MFA on all remotely accessible accounts/systems; if unavailable,
        remove remote access, add segmentation


        Cost: Moderate | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-08
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-19
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
      translations:
        fr:
          name: "Mettre en \u0153uvre l'authentification multifacteur"
          description: "Ajouter une couche de s\xE9curit\xE9 critique et suppl\xE9\
            mentaire pour prot\xE9ger les comptes des actifs."
          annotation: "R\xE9sultat attendu : Ajouter une couche de s\xE9curit\xE9\
            \ critique et suppl\xE9mentaire pour prot\xE9ger les comptes des actifs.\n\
            \nTTP/Risque trait\xE9 : Les adversaires utilisent des techniques de force\
            \ brute pour craquer les mots de passe, en devinant syst\xE9matiquement\
            \ les identifiants par des m\xE9thodes r\xE9p\xE9titives ou it\xE9ratives\
            \ sur des mots de passe inconnus ou des condensats obtenus.\n\nActions\
            \ recommand\xE9es :\n- Exiger l'AMF en utilisant la m\xE9thode la plus\
            \ forte disponible pour les actifs avec acc\xE8s \xE0 distance\n- Options\
            \ d'AMF class\xE9es par robustesse : (1) AMF r\xE9sistante \xE0 l'hame\xE7\
            onnage (FIDO/WebAuthn ou bas\xE9e sur PKI), (2) Jetons logiciels d'application\
            \ mobile, (3) SMS/voix uniquement en l'absence d'autre option\n- Tous\
            \ les comptes IT utilisent l'AMF ; prioriser les comptes \xE0 plus haut\
            \ risque\n- OT : Activer l'AMF sur tous les comptes et syst\xE8mes accessibles\
            \ \xE0 distance ; si indisponible, supprimer l'acc\xE8s distant, ajouter\
            \ la segmentation\n\nCo\xFBt : Mod\xE9r\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9\
            \ : Mod\xE9r\xE9"
        pt:
          name: "Implementar Autentica\xE7\xE3o Multifator"
          description: "Adicionar uma camada de seguran\xE7a cr\xEDtica e adicional\
            \ para proteger as contas de ativos."
          annotation: "Resultado: Adicionar uma camada de seguran\xE7a cr\xEDtica\
            \ e adicional para proteger as contas de ativos.\n\nTTP/Risco Tratado:\
            \ Advers\xE1rios sem conhecimento pr\xE9vio de credenciais leg\xEDtimas\
            \ podem tentar senhas comumente usadas em v\xE1rias contas. Eles tamb\xE9\
            m podem adivinhar senhas sistematicamente usando m\xE9todos repetitivos\
            \ ou iterativos.\n\nA\xE7\xF5es Recomendadas:\n- Exigir MFA usando o m\xE9\
            todo mais forte dispon\xEDvel para ativos com acesso remoto\n- Op\xE7\xF5\
            es de MFA classificadas por for\xE7a: (1) MFA resistente a phishing (FIDO/WebAuthn\
            \ ou baseado em PKI), (2) tokens de software baseados em aplicativo m\xF3\
            vel, (3) SMS/voz apenas quando nenhuma outra op\xE7\xE3o estiver dispon\xED\
            vel\n- Todas as contas de TI utilizam MFA; priorizar as contas de maior\
            \ risco\n- TO: Habilitar MFA em todas as contas/sistemas acess\xEDveis\
            \ remotamente; se indispon\xEDvel, remover o acesso remoto e adicionar\
            \ segmenta\xE7\xE3o\n\nCusto: Moderado | Impacto: Alto | Complexidade:\
            \ Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-g
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.G
      name: Administrators Maintain Separate User and Privileged Accounts
      description: Make it harder for threat actors to gain access to administrator
        or privileged accounts, even if common user accounts are compromised.
      annotation: 'Outcome: Make it harder for threat actors to gain access to administrator
        or privileged accounts, even if common user accounts are compromised.


        TTP/Risk Addressed: Adversaries might obtain and exploit credentials from
        existing accounts for initial access, persistence, privilege escalation, or
        defense evasion.


        Recommended Actions:

        - User accounts lack administrator privileges

        - Administrators maintain separate user accounts for non-admin activities

        - Re-evaluate privileges on recurring basis validating continued need

        - Maintain separation of duties distributing responsibilities across multiple
        individuals/roles


        Cost: Low | Impact: High | Complexity: Simple'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-20
      translations:
        fr:
          name: "Les administrateurs maintiennent des comptes utilisateurs et privil\xE9\
            gi\xE9s s\xE9par\xE9s"
          description: "Rendre plus difficile l'acc\xE8s des acteurs malveillants\
            \ aux comptes d'administrateur ou privil\xE9gi\xE9s, m\xEAme si les comptes\
            \ utilisateurs courants sont compromis."
          annotation: "R\xE9sultat attendu : Rendre plus difficile l'acc\xE8s des\
            \ acteurs malveillants aux comptes d'administrateur ou privil\xE9gi\xE9\
            s, m\xEAme si les comptes utilisateurs courants sont compromis.\n\nTTP/Risque\
            \ trait\xE9 : Les adversaires obtiennent et exploitent des identifiants\
            \ de comptes par vol, r\xE9utilisation ou abus de comptes inactifs pour\
            \ obtenir un acc\xE8s, maintenir la persistance, \xE9lever les privil\xE8\
            ges ou contourner les contr\xF4les d'acc\xE8s r\xE9seau.\n\nActions recommand\xE9\
            es :\n- Les comptes utilisateurs ne disposent pas de privil\xE8ges d'administrateur\n\
            - Les administrateurs maintiennent des comptes utilisateurs s\xE9par\xE9\
            s pour les activit\xE9s non administratives\n- R\xE9\xE9valuer les privil\xE8\
            ges p\xE9riodiquement pour valider le besoin continu\n- Maintenir la s\xE9\
            paration des t\xE2ches en r\xE9partissant les responsabilit\xE9s entre\
            \ plusieurs individus et r\xF4les\n\nCo\xFBt : Faible | Impact : \xC9\
            lev\xE9 | Complexit\xE9 : Simple"
        pt:
          name: "Administradores Mant\xEAm Contas de Usu\xE1rio e Privilegiadas Separadas"
          description: "Dificultar que agentes de amea\xE7a obtenham acesso a contas\
            \ de administrador ou privilegiadas, mesmo que contas de usu\xE1rio comuns\
            \ sejam comprometidas."
          annotation: "Resultado: Dificultar que agentes de amea\xE7a obtenham acesso\
            \ a contas de administrador ou privilegiadas, mesmo que contas de usu\xE1\
            rio comuns sejam comprometidas.\n\nTTP/Risco Tratado: Advers\xE1rios podem\
            \ obter e explorar credenciais de contas existentes para acesso inicial,\
            \ persist\xEAncia, escalonamento de privil\xE9gios ou evas\xE3o de defesas.\n\
            \nA\xE7\xF5es Recomendadas:\n- As contas de usu\xE1rio n\xE3o possuem\
            \ privil\xE9gios de administrador\n- Os administradores mant\xEAm contas\
            \ de usu\xE1rio separadas para atividades n\xE3o administrativas\n- Reavaliar\
            \ privil\xE9gios de forma recorrente, validando a necessidade cont\xED\
            nua\n- Manter a segrega\xE7\xE3o de fun\xE7\xF5es, distribuindo responsabilidades\
            \ entre m\xFAltiplos indiv\xEDduos/pap\xE9is\n\nCusto: Baixo | Impacto:\
            \ Alto | Complexidade: Simples"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-h
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.H
      name: Implement the Principles of Least Privilege
      description: Minimizes unauthorized access to systems, data, and processes,
        reduces human error, and prevents malicious actions.
      annotation: 'Outcome: Minimizes unauthorized access to systems, data, and processes,
        reduces human error, and prevents malicious actions.


        TTP/Risk Addressed: Unauthorized access to network resources and the potential
        for adversaries to move across systems undetected, compromising sensitive
        data and critical systems.


        Recommended Actions:

        - All user accounts, system roles, and processes operate with minimum privileges
        necessary

        - Perform quarterly reviews of access permissions and role assignments validating
        policy compliance


        Cost: Low | Impact: High | Complexity: Simple'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-21
      translations:
        fr:
          name: "Mettre en \u0153uvre les principes du moindre privil\xE8ge"
          description: "Minimise l'acc\xE8s non autoris\xE9 aux syst\xE8mes, donn\xE9\
            es et processus, r\xE9duit les erreurs humaines et pr\xE9vient les actions\
            \ malveillantes."
          annotation: "R\xE9sultat attendu : Minimise l'acc\xE8s non autoris\xE9 aux\
            \ syst\xE8mes, donn\xE9es et processus, r\xE9duit les erreurs humaines\
            \ et pr\xE9vient les actions malveillantes.\n\nTTP/Risque trait\xE9 :\
            \ Acc\xE8s non autoris\xE9 aux ressources r\xE9seau permettant aux adversaires\
            \ de se d\xE9placer entre les syst\xE8mes sans \xEAtre d\xE9tect\xE9s,\
            \ d'\xE9lever les privil\xE8ges et de compromettre les donn\xE9es sensibles\
            \ et les syst\xE8mes critiques.\n\nActions recommand\xE9es :\n- Tous les\
            \ comptes utilisateurs, r\xF4les syst\xE8me et processus fonctionnent\
            \ avec les privil\xE8ges minimaux n\xE9cessaires\n- Effectuer des revues\
            \ trimestrielles des permissions d'acc\xE8s et des attributions de r\xF4\
            les pour valider la conformit\xE9 \xE0 la politique\n\nCo\xFBt : Faible\
            \ | Impact : \xC9lev\xE9 | Complexit\xE9 : Simple"
        pt:
          name: "Implementar os Princ\xEDpios do Menor Privil\xE9gio"
          description: "Minimiza o acesso n\xE3o autorizado a sistemas, dados e processos,\
            \ reduz o erro humano e previne a\xE7\xF5es maliciosas."
          annotation: "Resultado: Minimiza o acesso n\xE3o autorizado a sistemas,\
            \ dados e processos, reduz o erro humano e previne a\xE7\xF5es maliciosas.\n\
            \nTTP/Risco Tratado: Acesso n\xE3o autorizado a recursos de rede e o potencial\
            \ de os advers\xE1rios se moverem entre sistemas sem serem detectados,\
            \ comprometendo dados sens\xEDveis e sistemas cr\xEDticos.\n\nA\xE7\xF5\
            es Recomendadas:\n- Todas as contas de usu\xE1rio, fun\xE7\xF5es de sistema\
            \ e processos operam com os privil\xE9gios m\xEDnimos necess\xE1rios\n\
            - Realizar revis\xF5es trimestrais das permiss\xF5es de acesso e das atribui\xE7\
            \xF5es de fun\xE7\xE3o, validando a conformidade com a pol\xEDtica\n\n\
            Custo: Baixo | Impacto: Alto | Complexidade: Simples"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-i
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.I
      name: Implement Logical/Physical Network Segmentation
      description: Limiting the impact of a potential breach and preventing adversaries
        from accessing sensitive data, spaces, and/or critical infrastructure.
      annotation: 'Outcome: Limiting the impact of a potential breach and preventing
        adversaries from accessing sensitive data, spaces, and/or critical infrastructure.


        TTP/Risk Addressed: If a network is compromised by an unauthorized user, a
        securely segregated network can contain malicious occurrences.


        Recommended Actions:

        - Place routers between networks creating boundaries, increasing broadcast
        domains, and filtering broadcast traffic

        - Use boundaries to contain security breaches by restricting traffic to separate
        segments and shutting down segments during intrusion

        - Physically segment OT enclaves (e.g., data diodes) when applicable


        Cost: High | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-13
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
      translations:
        fr:
          name: "Mettre en \u0153uvre la segmentation r\xE9seau logique et physique"
          description: "Limiter l'impact d'une compromission potentielle et emp\xEA\
            cher les adversaires d'acc\xE9der aux donn\xE9es sensibles, aux espaces\
            \ et/ou aux infrastructures critiques."
          annotation: "R\xE9sultat attendu : Limiter l'impact d'une compromission\
            \ potentielle et emp\xEAcher les adversaires d'acc\xE9der aux donn\xE9\
            es sensibles, aux espaces et/ou aux infrastructures critiques.\n\nTTP/Risque\
            \ trait\xE9 : Si un r\xE9seau est compromis par un utilisateur non autoris\xE9\
            , l'absence de segmentation permet \xE0 l'activit\xE9 malveillante de\
            \ se propager de mani\xE8re incontr\xF4l\xE9e \xE0 travers les r\xE9seaux\
            \ et les infrastructures critiques.\n\nActions recommand\xE9es :\n- Placer\
            \ des routeurs entre les r\xE9seaux cr\xE9ant des limites, augmentant\
            \ les domaines de diffusion et filtrant le trafic\n- Utiliser les limites\
            \ pour contenir les violations de s\xE9curit\xE9 en restreignant le trafic\
            \ \xE0 des segments s\xE9par\xE9s et en isolant les segments lors d'une\
            \ intrusion\n- Segmenter physiquement les enclaves OT (par ex. diodes\
            \ de donn\xE9es) le cas \xE9ch\xE9ant\n\nCo\xFBt : \xC9lev\xE9 | Impact\
            \ : \xC9lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Implementar Segmenta\xE7\xE3o L\xF3gica/F\xEDsica de Rede"
          description: "Limitar o impacto de uma poss\xEDvel viola\xE7\xE3o e impedir\
            \ que advers\xE1rios acessem dados sens\xEDveis, espa\xE7os e/ou infraestrutura\
            \ cr\xEDtica."
          annotation: "Resultado: Limitar o impacto de uma poss\xEDvel viola\xE7\xE3\
            o e impedir que advers\xE1rios acessem dados sens\xEDveis, espa\xE7os\
            \ e/ou infraestrutura cr\xEDtica.\n\nTTP/Risco Tratado: Se uma rede for\
            \ comprometida por um usu\xE1rio n\xE3o autorizado, uma rede segregada\
            \ de forma segura pode conter ocorr\xEAncias maliciosas.\n\nA\xE7\xF5\
            es Recomendadas:\n- Posicionar roteadores entre redes, criando fronteiras,\
            \ aumentando os dom\xEDnios de broadcast e filtrando o tr\xE1fego de broadcast\n\
            - Usar fronteiras para conter viola\xE7\xF5es de seguran\xE7a, restringindo\
            \ o tr\xE1fego a segmentos separados e desativando segmentos durante uma\
            \ intrus\xE3o\n- Segmentar fisicamente os enclaves de TO (por exemplo,\
            \ diodos de dados/data diodes) quando aplic\xE1vel\n\nCusto: Alto | Impacto:\
            \ Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-j
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.J
      name: Implement Cybersecurity Training
      description: Organizational users learn and perform more secure behaviors.
      annotation: 'Outcome: Organizational users learn and perform more secure behaviors.


        TTP/Risk Addressed: Users vulnerable to spear phishing, social engineering,
        and other techniques that involve user interaction.


        Recommended Actions:

        - Provide initial cybersecurity training before new employees access computer
        systems

        - Provide at least annual training covering social engineering recognition,
        attack reporting, acceptable use, and basic cyber hygiene

        - Identify specialized roles requiring additional training

        - Provide role-based training to specialized roles including contractors,
        partners, suppliers

        - Provide OT personnel security awareness training


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-23
      translations:
        fr:
          name: "Mettre en \u0153uvre la formation \xE0 la cybers\xE9curit\xE9"
          description: "Les utilisateurs de l'organisation apprennent et adoptent\
            \ des comportements plus s\xFBrs."
          annotation: "R\xE9sultat attendu : Les utilisateurs de l'organisation apprennent\
            \ et adoptent des comportements plus s\xFBrs.\n\nTTP/Risque trait\xE9\
            \ : Les adversaires utilisent des courriels trompeurs, des pi\xE8ces jointes\
            \ ou liens malveillants et des tactiques d'ing\xE9nierie sociale pour\
            \ inciter les utilisateurs \xE0 divulguer des informations sensibles,\
            \ ex\xE9cuter du code malveillant ou accorder un acc\xE8s non autoris\xE9\
            .\n\nActions recommand\xE9es :\n- Fournir une formation initiale \xE0\
            \ la cybers\xE9curit\xE9 avant que les nouveaux employ\xE9s n'acc\xE8\
            dent aux syst\xE8mes informatiques\n- Fournir au moins une formation annuelle\
            \ couvrant la reconnaissance de l'ing\xE9nierie sociale, le signalement\
            \ des attaques, l'utilisation acceptable et l'hygi\xE8ne cyber de base\n\
            - Identifier les r\xF4les sp\xE9cialis\xE9s n\xE9cessitant une formation\
            \ compl\xE9mentaire\n- Fournir une formation bas\xE9e sur les r\xF4les\
            \ aux r\xF4les sp\xE9cialis\xE9s incluant les prestataires, partenaires\
            \ et fournisseurs\n- Fournir au personnel OT une formation de sensibilisation\
            \ \xE0 la s\xE9curit\xE9\n\nCo\xFBt : Faible | Impact : \xC9lev\xE9 |\
            \ Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Implementar Treinamento de Ciberseguran\xE7a"
          description: "Os usu\xE1rios organizacionais aprendem e adotam comportamentos\
            \ mais seguros."
          annotation: "Resultado: Os usu\xE1rios organizacionais aprendem e adotam\
            \ comportamentos mais seguros.\n\nTTP/Risco Tratado: Usu\xE1rios vulner\xE1\
            veis a spear phishing, engenharia social e outras t\xE9cnicas que envolvem\
            \ a intera\xE7\xE3o do usu\xE1rio.\n\nA\xE7\xF5es Recomendadas:\n- Fornecer\
            \ treinamento inicial de ciberseguran\xE7a antes que novos colaboradores\
            \ acessem os sistemas de computador\n- Fornecer treinamento ao menos anual\
            \ abordando reconhecimento de engenharia social, notifica\xE7\xE3o de\
            \ ataques, uso aceit\xE1vel e higiene cibern\xE9tica b\xE1sica\n- Identificar\
            \ fun\xE7\xF5es especializadas que exijam treinamento adicional\n- Fornecer\
            \ treinamento baseado em fun\xE7\xE3o para pap\xE9is especializados, incluindo\
            \ terceirizados, parceiros e fornecedores\n- Fornecer treinamento de conscientiza\xE7\
            \xE3o em seguran\xE7a ao pessoal de TO\n\nCusto: Baixo | Impacto: Alto\
            \ | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-k
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.K
      name: Utilize Strong Encryption
      description: Encryption is deployed to maintain confidentiality and integrity
        of sensitive data across the organization's network.
      annotation: 'Outcome: Encryption is deployed to maintain confidentiality and
        integrity of sensitive data across the organization''s network.


        TTP/Risk Addressed: Adversaries can position themselves between networked
        devices to enable network sniffing and data manipulation, or steal operational
        data for personal gain or future operations.


        Recommended Actions:

        - Use encryption, digital signatures, and cryptographic hashes protecting
        network communication confidentiality and integrity

        - Identify critical data for protection in transit and at rest (PII, proprietary
        information, PLC programs, CAD/CAM files)

        - Prevent plaintext electronic storage of sensitive data and passwords

        - Store credentials securely via credential/password managers

        - Use encryption for OT external connections where latency permits


        Cost: Moderate | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-12
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-24
      translations:
        fr:
          name: Utiliser un chiffrement robuste
          description: "Le chiffrement est d\xE9ploy\xE9 pour maintenir la confidentialit\xE9\
            \ et l'int\xE9grit\xE9 des donn\xE9es sensibles sur le r\xE9seau de l'organisation."
          annotation: "R\xE9sultat attendu : Le chiffrement est d\xE9ploy\xE9 pour\
            \ maintenir la confidentialit\xE9 et l'int\xE9grit\xE9 des donn\xE9es\
            \ sensibles sur le r\xE9seau de l'organisation.\n\nTTP/Risque trait\xE9\
            \ : Les adversaires se positionnent entre les \xE9quipements r\xE9seau\
            \ pour permettre l'\xE9coute et la manipulation de donn\xE9es, ou voler\
            \ des donn\xE9es op\xE9rationnelles \xE0 des fins personnelles ou pour\
            \ de futures op\xE9rations.\n\nActions recommand\xE9es :\n- Utiliser le\
            \ chiffrement, les signatures num\xE9riques et les condensats cryptographiques\
            \ pour prot\xE9ger la confidentialit\xE9 et l'int\xE9grit\xE9 des communications\
            \ r\xE9seau\n- Identifier les donn\xE9es critiques \xE0 prot\xE9ger en\
            \ transit et au repos (donn\xE9es personnelles, informations propri\xE9\
            taires, programmes PLC, fichiers CAO/FAO)\n- Emp\xEAcher le stockage \xE9\
            lectronique en clair des donn\xE9es sensibles et des mots de passe\n-\
            \ Stocker les identifiants de mani\xE8re s\xE9curis\xE9e via des gestionnaires\
            \ de mots de passe\n- Utiliser le chiffrement pour les connexions OT externes\
            \ lorsque la latence le permet\n\nCo\xFBt : Mod\xE9r\xE9 | Impact : \xC9\
            lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: Utilizar Criptografia Forte
          description: "A criptografia \xE9 implantada para manter a confidencialidade\
            \ e a integridade de dados sens\xEDveis em toda a rede da organiza\xE7\
            \xE3o."
          annotation: "Resultado: A criptografia \xE9 implantada para manter a confidencialidade\
            \ e a integridade de dados sens\xEDveis em toda a rede da organiza\xE7\
            \xE3o.\n\nTTP/Risco Tratado: Advers\xE1rios podem se posicionar entre\
            \ dispositivos em rede para possibilitar a intercepta\xE7\xE3o (sniffing)\
            \ e a manipula\xE7\xE3o de dados, ou roubar dados operacionais para ganho\
            \ pessoal ou opera\xE7\xF5es futuras.\n\nA\xE7\xF5es Recomendadas:\n-\
            \ Usar criptografia, assinaturas digitais e hashes criptogr\xE1ficos para\
            \ proteger a confidencialidade e a integridade das comunica\xE7\xF5es\
            \ de rede\n- Identificar dados cr\xEDticos a serem protegidos em tr\xE2\
            nsito e em repouso (PII, informa\xE7\xF5es propriet\xE1rias, programas\
            \ de CLPs, arquivos CAD/CAM)\n- Impedir o armazenamento eletr\xF4nico\
            \ em texto claro (plaintext) de dados sens\xEDveis e senhas\n- Armazenar\
            \ credenciais de forma segura por meio de gerenciadores de credenciais/senhas\n\
            - Usar criptografia para conex\xF5es externas de TO onde a lat\xEAncia\
            \ permitir\n\nCusto: Moderado | Impacto: Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-l
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.L
      name: Enable Email Security
      description: Reduce risk from common email-based threats, such as spoofing,
        phishing, and interception.
      annotation: 'Outcome: Reduce risk from common email-based threats, such as spoofing,
        phishing, and interception.


        TTP/Risk Addressed: Adversaries might send victims emails with malicious attachments
        or links, aiming to run harmful code on their systems. They can also conduct
        phishing through third-party services.


        Recommended Actions:

        - Enable STARTTLS on all corporate email infrastructure

        - Enable Sender Policy Framework (SPF)

        - Enable DomainKeys Identified Mail (DKIM)

        - Enable DMARC and set to ''reject''


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-25
      translations:
        fr:
          name: "Activer la s\xE9curit\xE9 des courriels"
          description: "R\xE9duire les risques li\xE9s aux menaces courantes par courriel,\
            \ telles que l'usurpation d'identit\xE9, l'hame\xE7onnage et l'interception."
          annotation: "R\xE9sultat attendu : R\xE9duire les risques li\xE9s aux menaces\
            \ courantes par courriel, telles que l'usurpation d'identit\xE9, l'hame\xE7\
            onnage et l'interception.\n\nTTP/Risque trait\xE9 : Les adversaires utilisent\
            \ des courriels trompeurs, des pi\xE8ces jointes ou liens malveillants\
            \ et des tactiques d'ing\xE9nierie sociale pour inciter les utilisateurs\
            \ \xE0 divulguer des informations sensibles, ex\xE9cuter du code malveillant\
            \ ou accorder un acc\xE8s non autoris\xE9.\n\nActions recommand\xE9es\
            \ :\n- Activer STARTTLS sur toute l'infrastructure de messagerie d'entreprise\n\
            - Activer le Sender Policy Framework (SPF)\n- Activer DomainKeys Identified\
            \ Mail (DKIM)\n- Activer DMARC et le configurer sur \xAB reject \xBB\n\
            \nCo\xFBt : Faible | Impact : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Habilitar Seguran\xE7a de E-mail"
          description: "Reduzir o risco de amea\xE7as comuns baseadas em e-mail, como\
            \ falsifica\xE7\xE3o (spoofing), phishing e intercepta\xE7\xE3o."
          annotation: "Resultado: Reduzir o risco de amea\xE7as comuns baseadas em\
            \ e-mail, como falsifica\xE7\xE3o (spoofing), phishing e intercepta\xE7\
            \xE3o.\n\nTTP/Risco Tratado: Advers\xE1rios podem enviar \xE0s v\xEDtimas\
            \ e-mails com anexos ou links maliciosos, com o objetivo de executar c\xF3\
            digo nocivo em seus sistemas. Eles tamb\xE9m podem realizar phishing por\
            \ meio de servi\xE7os de terceiros.\n\nA\xE7\xF5es Recomendadas:\n- Habilitar\
            \ STARTTLS em toda a infraestrutura corporativa de e-mail\n- Habilitar\
            \ o Sender Policy Framework (SPF)\n- Habilitar o DomainKeys Identified\
            \ Mail (DKIM)\n- Habilitar o DMARC e configur\xE1-lo como 'reject'\n\n\
            Custo: Baixo | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-m
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.M
      name: Disable Autorun & Macros By Default
      description: Reduce the risk from embedded macros and similar executable code.
      annotation: 'Outcome: Reduce the risk from embedded macros and similar executable
        code.


        TTP/Risk Addressed: Adversaries rely on users to open malicious files to execute
        code. Social engineering tactics could be used to convince users to open such
        files.


        Recommended Actions:

        - Enforce system-wide policy disabling macros or similar embedded code by
        default

        - Establish policy for authorized users requesting macro enablement on specific
        assets

        - Disable Autorun/AutoPlay by default


        Cost: Low | Impact: Moderate | Complexity: Simple'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-26
      translations:
        fr:
          name: "D\xE9sactiver l'ex\xE9cution automatique et les macros par d\xE9\
            faut"
          description: "R\xE9duire le risque li\xE9 aux macros int\xE9gr\xE9es et\
            \ au code ex\xE9cutable similaire."
          annotation: "R\xE9sultat attendu : R\xE9duire le risque li\xE9 aux macros\
            \ int\xE9gr\xE9es et au code ex\xE9cutable similaire.\n\nTTP/Risque trait\xE9\
            \ : Les adversaires utilisent des courriels trompeurs, des pi\xE8ces jointes\
            \ ou liens malveillants et des tactiques d'ing\xE9nierie sociale pour\
            \ inciter les utilisateurs \xE0 divulguer des informations sensibles,\
            \ ex\xE9cuter du code malveillant ou accorder un acc\xE8s non autoris\xE9\
            .\n\nActions recommand\xE9es :\n- Appliquer une politique syst\xE8me d\xE9\
            sactivant par d\xE9faut les macros ou le code embarqu\xE9 similaire\n\
            - \xC9tablir une politique pour les utilisateurs autoris\xE9s demandant\
            \ l'activation des macros sur des actifs sp\xE9cifiques\n- D\xE9sactiver\
            \ l'ex\xE9cution automatique (Autorun/AutoPlay) par d\xE9faut\n\nCo\xFB\
            t : Faible | Impact : Mod\xE9r\xE9 | Complexit\xE9 : Simple"
        pt:
          name: "Desabilitar Execu\xE7\xE3o Autom\xE1tica (Autorun) e Macros por Padr\xE3\
            o"
          description: "Reduzir o risco de macros incorporadas e c\xF3digo execut\xE1\
            vel similar."
          annotation: "Resultado: Reduzir o risco de macros incorporadas e c\xF3digo\
            \ execut\xE1vel similar.\n\nTTP/Risco Tratado: Advers\xE1rios dependem\
            \ de que os usu\xE1rios abram arquivos maliciosos para executar c\xF3\
            digo. T\xE1ticas de engenharia social podem ser usadas para convencer\
            \ os usu\xE1rios a abrir tais arquivos.\n\nA\xE7\xF5es Recomendadas:\n\
            - Aplicar pol\xEDtica em todo o sistema desabilitando macros ou c\xF3\
            digo incorporado similar por padr\xE3o\n- Estabelecer pol\xEDtica para\
            \ que usu\xE1rios autorizados solicitem a habilita\xE7\xE3o de macros\
            \ em ativos espec\xEDficos\n- Desabilitar Autorun/AutoPlay por padr\xE3\
            o\n\nCusto: Baixo | Impacto: Moderado | Complexidade: Simples"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-n
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.N
      name: Establish Change Management Processes
      description: Policies and procedures exist to manage system changes and configurations.
      annotation: 'Outcome: Policies and procedures exist to manage system changes
        and configurations.


        TTP/Risk Addressed: Delayed, insufficient, or incomplete ability to maintain
        or restore functionality of critical devices and service operations.


        Recommended Actions:

        - Implement policies and processes for secure change management

        - Enforce configuration restrictions preventing unauthorized changes

        - Test and document proposed changes in non-production environments; analyze
        security impacts

        - Implement OT limited functionality permitting only necessary functions,
        protocols, and services


        Cost: Moderate | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-15
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-27
      translations:
        fr:
          name: "\xC9tablir des processus de gestion des changements"
          description: "Des politiques et proc\xE9dures existent pour g\xE9rer les\
            \ changements et configurations des syst\xE8mes."
          annotation: "R\xE9sultat attendu : Des politiques et proc\xE9dures existent\
            \ pour g\xE9rer les changements et configurations des syst\xE8mes.\n\n\
            TTP/Risque trait\xE9 : Capacit\xE9 retard\xE9e, insuffisante ou incompl\xE8\
            te \xE0 maintenir ou restaurer le fonctionnement des dispositifs critiques\
            \ et des op\xE9rations de service en raison de changements non autoris\xE9\
            s ou non test\xE9s.\n\nActions recommand\xE9es :\n- Mettre en \u0153uvre\
            \ des politiques et processus de gestion s\xE9curis\xE9e des changements\n\
            - Appliquer des restrictions de configuration emp\xEAchant les modifications\
            \ non autoris\xE9es\n- Tester et documenter les changements propos\xE9\
            s dans des environnements hors production ; analyser les impacts sur la\
            \ s\xE9curit\xE9\n- Mettre en \u0153uvre une fonctionnalit\xE9 OT limit\xE9\
            e ne permettant que les fonctions, protocoles et services n\xE9cessaires\n\
            \nCo\xFBt : Mod\xE9r\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Estabelecer Processos de Gest\xE3o de Mudan\xE7as"
          description: "Existem pol\xEDticas e procedimentos para gerenciar mudan\xE7\
            as e configura\xE7\xF5es de sistema."
          annotation: "Resultado: Existem pol\xEDticas e procedimentos para gerenciar\
            \ mudan\xE7as e configura\xE7\xF5es de sistema.\n\nTTP/Risco Tratado:\
            \ Capacidade atrasada, insuficiente ou incompleta de manter ou restaurar\
            \ a funcionalidade de dispositivos cr\xEDticos e opera\xE7\xF5es de servi\xE7\
            o.\n\nA\xE7\xF5es Recomendadas:\n- Implementar pol\xEDticas e processos\
            \ para a gest\xE3o segura de mudan\xE7as\n- Aplicar restri\xE7\xF5es de\
            \ configura\xE7\xE3o que impe\xE7am mudan\xE7as n\xE3o autorizadas\n-\
            \ Testar e documentar as mudan\xE7as propostas em ambientes de n\xE3o\
            \ produ\xE7\xE3o; analisar os impactos de seguran\xE7a\n- Implementar\
            \ funcionalidade limitada em TO, permitindo apenas fun\xE7\xF5es, protocolos\
            \ e servi\xE7os necess\xE1rios\n\nCusto: Moderado | Impacto: Alto | Complexidade:\
            \ Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-o
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.O
      name: Maintain System Backups & Restoration Ability
      description: Organizations reduce data loss and service disruption risks while
        efficiently managing, responding to, and recovering from incidents.
      annotation: 'Outcome: Organizations reduce data loss and service disruption
        risks while efficiently managing, responding to, and recovering from incidents.


        TTP/Risk Addressed: Adversaries can disrupt critical systems, delete data,
        and disable recovery services to prevent system recovery.


        Recommended Actions:

        - Develop list of all maintained backups including installation media, license
        keys, configuration information, and retention periods

        - Back up critical operations systems in near-real-time; frequently back up
        all operational systems

        - Securely store backups offsite and offline

        - Test backups and recovery minimum annually

        - Validate backup integrity before initiating restoration

        - Check restoration assets for indicators of compromise

        - OT: Include device configurations, roles, engineering drawings, and tools


        Cost: High | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-16
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-28
      translations:
        fr:
          name: "Maintenir les sauvegardes et la capacit\xE9 de restauration des syst\xE8\
            mes"
          description: "Les organisations r\xE9duisent les risques de perte de donn\xE9\
            es et d'interruption de service tout en g\xE9rant, r\xE9pondant et se\
            \ remettant efficacement des incidents."
          annotation: "R\xE9sultat attendu : Les organisations r\xE9duisent les risques\
            \ de perte de donn\xE9es et d'interruption de service tout en g\xE9rant,\
            \ r\xE9pondant et se remettant efficacement des incidents.\n\nTTP/Risque\
            \ trait\xE9 : Les adversaires perturbent les syst\xE8mes critiques, suppriment\
            \ des donn\xE9es et d\xE9sactivent les services de r\xE9cup\xE9ration\
            \ pour emp\xEAcher la restauration des syst\xE8mes, causant une interruption\
            \ de la disponibilit\xE9 des actifs, services ou syst\xE8mes.\n\nActions\
            \ recommand\xE9es :\n- D\xE9velopper la liste de toutes les sauvegardes\
            \ maintenues incluant les supports d'installation, les cl\xE9s de licence,\
            \ les informations de configuration et les dur\xE9es de r\xE9tention\n\
            - Sauvegarder les syst\xE8mes d'op\xE9rations critiques en quasi-temps\
            \ r\xE9el ; sauvegarder fr\xE9quemment tous les syst\xE8mes op\xE9rationnels\n\
            - Stocker les sauvegardes hors site et hors ligne de mani\xE8re s\xE9\
            curis\xE9e\n- Tester les sauvegardes et la r\xE9cup\xE9ration au minimum\
            \ annuellement\n- Valider l'int\xE9grit\xE9 des sauvegardes avant d'initier\
            \ la restauration\n- V\xE9rifier l'absence d'indicateurs de compromission\
            \ dans les supports de restauration\n- OT : Inclure les configurations\
            \ des dispositifs, les r\xF4les, les sch\xE9mas techniques et les outils\n\
            \nCo\xFBt : \xC9lev\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9\
            r\xE9"
        pt:
          name: "Manter Backups de Sistema e Capacidade de Restaura\xE7\xE3o"
          description: "As organiza\xE7\xF5es reduzem os riscos de perda de dados\
            \ e interrup\xE7\xE3o de servi\xE7os, ao mesmo tempo em que gerenciam,\
            \ respondem e se recuperam de incidentes com efici\xEAncia."
          annotation: "Resultado: As organiza\xE7\xF5es reduzem os riscos de perda\
            \ de dados e interrup\xE7\xE3o de servi\xE7os, ao mesmo tempo em que gerenciam,\
            \ respondem e se recuperam de incidentes com efici\xEAncia.\n\nTTP/Risco\
            \ Tratado: Advers\xE1rios podem interromper sistemas cr\xEDticos, excluir\
            \ dados e desabilitar servi\xE7os de recupera\xE7\xE3o para impedir a\
            \ restaura\xE7\xE3o do sistema.\n\nA\xE7\xF5es Recomendadas:\n- Desenvolver\
            \ uma lista de todos os backups mantidos, incluindo m\xEDdia de instala\xE7\
            \xE3o, chaves de licen\xE7a, informa\xE7\xF5es de configura\xE7\xE3o e\
            \ per\xEDodos de reten\xE7\xE3o\n- Fazer backup de sistemas cr\xEDticos\
            \ de opera\xE7\xF5es em tempo quase real; fazer backup frequente de todos\
            \ os sistemas operacionais\n- Armazenar backups de forma segura, off-site\
            \ e offline\n- Testar backups e a recupera\xE7\xE3o no m\xEDnimo anualmente\n\
            - Validar a integridade do backup antes de iniciar a restaura\xE7\xE3\
            o\n- Verificar os ativos de restaura\xE7\xE3o em busca de indicadores\
            \ de comprometimento\n- TO: Incluir configura\xE7\xF5es de dispositivos,\
            \ fun\xE7\xF5es, desenhos de engenharia e ferramentas\n\nCusto: Alto |\
            \ Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-p
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.P
      name: Maintain Hardware & Software Approval Process
      description: Increase visibility into deployed technology assets and reduce
        the likelihood of breach by users installing unapproved hardware, firmware,
        or software.
      annotation: 'Outcome: Increase visibility into deployed technology assets and
        reduce the likelihood of breach by users installing unapproved hardware, firmware,
        or software.


        TTP/Risk Addressed: Adversaries can manipulate products or delivery mechanisms
        before they reach final users and attempt data or system compromise.


        Recommended Actions:

        - Implement administrative policy requiring review, testing, and approval
        before new hardware, firmware, or software installation

        - Maintain approved hardware, firmware, and software list including approved
        versions

        - Consider OT environment additional requirements for patches/updates ensuring
        no operational or safety impact


        Cost: Moderate | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-29
      translations:
        fr:
          name: "Maintenir un processus d'approbation du mat\xE9riel et des logiciels"
          description: "Augmenter la visibilit\xE9 sur les actifs technologiques d\xE9\
            ploy\xE9s et r\xE9duire la probabilit\xE9 de compromission par l'installation\
            \ de mat\xE9riel, micrologiciel ou logiciel non approuv\xE9."
          annotation: "R\xE9sultat attendu : Augmenter la visibilit\xE9 sur les actifs\
            \ technologiques d\xE9ploy\xE9s et r\xE9duire la probabilit\xE9 de compromission\
            \ par l'installation de mat\xE9riel, micrologiciel ou logiciel non approuv\xE9\
            .\n\nTTP/Risque trait\xE9 : Les adversaires exploitent les vuln\xE9rabilit\xE9\
            s en abusant des relations de confiance avec des tiers, en manipulant\
            \ les produits ou les m\xE9canismes de livraison avant qu'ils n'atteignent\
            \ les utilisateurs finaux, ou en compromettant les environnements des\
            \ fournisseurs.\n\nActions recommand\xE9es :\n- Mettre en \u0153uvre une\
            \ politique administrative exigeant la revue, les tests et l'approbation\
            \ avant l'installation de tout nouveau mat\xE9riel, micrologiciel ou logiciel\n\
            - Maintenir une liste approuv\xE9e du mat\xE9riel, des micrologiciels\
            \ et des logiciels incluant les versions approuv\xE9es\n- Prendre en compte\
            \ les exigences suppl\xE9mentaires de l'environnement OT pour les correctifs\
            \ et mises \xE0 jour afin de ne pas impacter les op\xE9rations ou la s\xFB\
            ret\xE9\n\nCo\xFBt : Mod\xE9r\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9\
            \ : Mod\xE9r\xE9"
        pt:
          name: "Manter Processo de Aprova\xE7\xE3o de Hardware e Software"
          description: "Aumentar a visibilidade dos ativos de tecnologia implantados\
            \ e reduzir a probabilidade de viola\xE7\xE3o por usu\xE1rios que instalam\
            \ hardware, firmware ou software n\xE3o aprovados."
          annotation: "Resultado: Aumentar a visibilidade dos ativos de tecnologia\
            \ implantados e reduzir a probabilidade de viola\xE7\xE3o por usu\xE1\
            rios que instalam hardware, firmware ou software n\xE3o aprovados.\n\n\
            TTP/Risco Tratado: Advers\xE1rios podem manipular produtos ou mecanismos\
            \ de entrega antes que cheguem aos usu\xE1rios finais e tentar comprometer\
            \ dados ou sistemas.\n\nA\xE7\xF5es Recomendadas:\n- Implementar pol\xED\
            tica administrativa que exija revis\xE3o, teste e aprova\xE7\xE3o antes\
            \ da instala\xE7\xE3o de novo hardware, firmware ou software\n- Manter\
            \ uma lista de hardware, firmware e software aprovados, incluindo as vers\xF5\
            es aprovadas\n- Considerar requisitos adicionais do ambiente de TO para\
            \ patches/atualiza\xE7\xF5es, garantindo que n\xE3o haja impacto operacional\
            \ ou de seguran\xE7a\n\nCusto: Moderado | Impacto: Alto | Complexidade:\
            \ Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-q
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.Q
      name: Maintain Log Collection & Storage
      description: Enhance visibility to detect and respond to cyber incidents while
        ensuring security logs are protected from unauthorized access and tampering.
      annotation: 'Outcome: Enhance visibility to detect and respond to cyber incidents
        while ensuring security logs are protected from unauthorized access and tampering.


        TTP/Risk Addressed: Delayed, insufficient, or incomplete ability to detect
        and respond to potential cyber incidents.


        Recommended Actions:

        - Collect and store administrative/security-focused logs (OS, applications,
        IDS/IPS, firewalls, DLP, VPNs)

        - Store logs centrally (SIEM tool or database); only authorized, authenticated
        users access/modify

        - Store logs per risk-informed duration or regulatory guidelines

        - Notify security teams when critical log functions are disabled

        - For OT assets with non-standard logs, collect network traffic between those
        assets


        Cost: Moderate | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-30
      translations:
        fr:
          name: Maintenir la collecte et le stockage des journaux
          description: "Am\xE9liorer la visibilit\xE9 pour d\xE9tecter et r\xE9pondre\
            \ aux incidents cyber tout en prot\xE9geant les journaux de s\xE9curit\xE9\
            \ contre l'acc\xE8s non autoris\xE9 et la falsification."
          annotation: "R\xE9sultat attendu : Am\xE9liorer la visibilit\xE9 pour d\xE9\
            tecter et r\xE9pondre aux incidents cyber tout en prot\xE9geant les journaux\
            \ de s\xE9curit\xE9 contre l'acc\xE8s non autoris\xE9 et la falsification.\n\
            \nTTP/Risque trait\xE9 : Compr\xE9hension incompl\xE8te ou inexacte des\
            \ actifs organisationnels, de la topologie r\xE9seau et des journaux de\
            \ s\xE9curit\xE9, entravant la d\xE9tection efficace, la r\xE9ponse aux\
            \ incidents et la reprise d'activit\xE9.\n\nActions recommand\xE9es :\n\
            - Collecter et stocker les journaux d'administration et de s\xE9curit\xE9\
            \ (syst\xE8mes d'exploitation, applications, IDS/IPS, pare-feux, DLP,\
            \ VPN)\n- Stocker les journaux de mani\xE8re centralis\xE9e (outil SIEM\
            \ ou base de donn\xE9es) ; seuls les utilisateurs autoris\xE9s et authentifi\xE9\
            s y acc\xE8dent\n- Conserver les journaux selon des dur\xE9es adapt\xE9\
            es au risque ou aux exigences r\xE9glementaires\n- Notifier les \xE9quipes\
            \ de s\xE9curit\xE9 lorsque des fonctions critiques de journalisation\
            \ sont d\xE9sactiv\xE9es\n- Pour les actifs OT avec des journaux non standards,\
            \ collecter le trafic r\xE9seau entre ces actifs\n\nCo\xFBt : Mod\xE9\
            r\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: Manter Coleta e Armazenamento de Logs
          description: "Aprimorar a visibilidade para detectar e responder a incidentes\
            \ cibern\xE9ticos, garantindo ao mesmo tempo que os logs de seguran\xE7\
            a estejam protegidos contra acesso n\xE3o autorizado e adultera\xE7\xE3\
            o."
          annotation: "Resultado: Aprimorar a visibilidade para detectar e responder\
            \ a incidentes cibern\xE9ticos, garantindo ao mesmo tempo que os logs\
            \ de seguran\xE7a estejam protegidos contra acesso n\xE3o autorizado e\
            \ adultera\xE7\xE3o.\n\nTTP/Risco Tratado: Capacidade atrasada, insuficiente\
            \ ou incompleta de detectar e responder a potenciais incidentes cibern\xE9\
            ticos.\n\nA\xE7\xF5es Recomendadas:\n- Coletar e armazenar logs administrativos/voltados\
            \ \xE0 seguran\xE7a (SO, aplica\xE7\xF5es, IDS/IPS, firewalls, DLP, VPNs)\n\
            - Armazenar logs de forma centralizada (ferramenta SIEM ou banco de dados);\
            \ apenas usu\xE1rios autorizados e autenticados podem acessar/modificar\n\
            - Armazenar logs por uma dura\xE7\xE3o informada por risco ou conforme\
            \ diretrizes regulat\xF3rias\n- Notificar as equipes de seguran\xE7a quando\
            \ fun\xE7\xF5es cr\xEDticas de log forem desabilitadas\n- Para ativos\
            \ de TO com logs n\xE3o padronizados, coletar o tr\xE1fego de rede entre\
            \ esses ativos\n\nCusto: Moderado | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-r
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.R
      name: Prohibit Connection of Unauthorized Devices
      description: Prevent malicious actors from achieving initial access or data
        exfiltration via unauthorized portable media devices.
      annotation: 'Outcome: Prevent malicious actors from achieving initial access
        or data exfiltration via unauthorized portable media devices.


        TTP/Risk Addressed: Adversaries might infiltrate systems, including disconnected
        or air-gapped networks, by copying malware to removable media.


        Recommended Actions:

        - Maintain policies ensuring unauthorized media and hardware don''t connect
        to IT/OT assets

        - Establish procedures removing, disabling, or securing physical ports preventing
        unauthorized device connection


        Cost: Moderate | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-31
      translations:
        fr:
          name: "Interdire la connexion de dispositifs non autoris\xE9s"
          description: "Emp\xEAcher les acteurs malveillants d'obtenir un acc\xE8\
            s initial ou d'exfiltrer des donn\xE9es via des supports amovibles non\
            \ autoris\xE9s."
          annotation: "R\xE9sultat attendu : Emp\xEAcher les acteurs malveillants\
            \ d'obtenir un acc\xE8s initial ou d'exfiltrer des donn\xE9es via des\
            \ supports amovibles non autoris\xE9s.\n\nTTP/Risque trait\xE9 : Les adversaires\
            \ d\xE9ploient des logiciels malveillants incluant des charges utiles,\
            \ des t\xE9l\xE9chargeurs et des portes d\xE9rob\xE9es pour contr\xF4\
            ler des machines \xE0 distance, contourner les d\xE9fenses et ex\xE9cuter\
            \ des actions post-compromission. Les logiciels malveillants peuvent se\
            \ propager via des supports amovibles vers des r\xE9seaux isol\xE9s.\n\
            \nActions recommand\xE9es :\n- Maintenir des politiques garantissant que\
            \ les supports et mat\xE9riels non autoris\xE9s ne se connectent pas aux\
            \ actifs IT/OT\n- \xC9tablir des proc\xE9dures pour retirer, d\xE9sactiver\
            \ ou s\xE9curiser les ports physiques afin d'emp\xEAcher la connexion\
            \ de dispositifs non autoris\xE9s\n\nCo\xFBt : Mod\xE9r\xE9 | Impact :\
            \ \xC9lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Proibir Conex\xE3o de Dispositivos N\xE3o Autorizados"
          description: "Impedir que agentes maliciosos obtenham acesso inicial ou\
            \ realizem exfiltra\xE7\xE3o de dados por meio de dispositivos de m\xED\
            dia port\xE1til n\xE3o autorizados."
          annotation: "Resultado: Impedir que agentes maliciosos obtenham acesso inicial\
            \ ou realizem exfiltra\xE7\xE3o de dados por meio de dispositivos de m\xED\
            dia port\xE1til n\xE3o autorizados.\n\nTTP/Risco Tratado: Advers\xE1rios\
            \ podem se infiltrar em sistemas, incluindo redes desconectadas ou isoladas\
            \ (air-gapped), copiando malware para m\xEDdias remov\xEDveis.\n\nA\xE7\
            \xF5es Recomendadas:\n- Manter pol\xEDticas que assegurem que m\xEDdias\
            \ e hardware n\xE3o autorizados n\xE3o se conectem a ativos de TI/TO\n\
            - Estabelecer procedimentos que removam, desabilitem ou protejam portas\
            \ f\xEDsicas para impedir a conex\xE3o de dispositivos n\xE3o autorizados\n\
            \nCusto: Moderado | Impacto: Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:3-s
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:pr
      ref_id: 3.S
      name: Secure Internet Facing Devices
      description: Unauthorized users cannot gain an initial system foothold by exploiting
        known weaknesses in internet-facing assets.
      annotation: 'Outcome: Unauthorized users cannot gain an initial system foothold
        by exploiting known weaknesses in internet-facing assets.


        TTP/Risk Addressed: Adversaries might exploit weaknesses in internet-facing
        hosts or systems targeting software bugs, temporary glitches, or misconfigurations.


        Recommended Actions:

        - Minimize internet-facing assets whenever possible

        - Prioritize keeping software current via timely patches/updates

        - Disable all unnecessary OS applications, software, and network protocols
        on internet-facing assets

        - Never expose network management interfaces to public internet

        - Logically segment enterprise and production networks per trust boundaries
        and platform types


        Cost: Moderate | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-32
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-09
      translations:
        fr:
          name: "S\xE9curiser les dispositifs expos\xE9s \xE0 Internet"
          description: "Les utilisateurs non autoris\xE9s ne peuvent pas obtenir un\
            \ point d'ancrage initial dans le syst\xE8me en exploitant des faiblesses\
            \ connues des actifs expos\xE9s \xE0 Internet."
          annotation: "R\xE9sultat attendu : Les utilisateurs non autoris\xE9s ne\
            \ peuvent pas obtenir un point d'ancrage initial dans le syst\xE8me en\
            \ exploitant des faiblesses connues des actifs expos\xE9s \xE0 Internet.\n\
            \nTTP/Risque trait\xE9 : Les adversaires ciblent les syst\xE8mes non corrig\xE9\
            s et mal configur\xE9s, en particulier ceux expos\xE9s \xE0 Internet,\
            \ en exploitant les vuln\xE9rabilit\xE9s logicielles, les dysfonctionnements\
            \ temporaires ou les erreurs de configuration pour obtenir un acc\xE8\
            s initial.\n\nActions recommand\xE9es :\n- Minimiser les actifs expos\xE9\
            s \xE0 Internet autant que possible\n- Prioriser la mise \xE0 jour des\
            \ logiciels via des correctifs en temps voulu\n- D\xE9sactiver toutes\
            \ les applications, logiciels et protocoles r\xE9seau inutiles du syst\xE8\
            me d'exploitation sur les actifs expos\xE9s \xE0 Internet\n- Ne jamais\
            \ exposer les interfaces de gestion r\xE9seau sur l'Internet public\n\
            - Segmenter logiquement les r\xE9seaux d'entreprise et de production selon\
            \ les p\xE9rim\xE8tres de confiance et les types de plateformes\n\nCo\xFB\
            t : Mod\xE9r\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Proteger Dispositivos Expostos \xE0 Internet"
          description: "Usu\xE1rios n\xE3o autorizados n\xE3o conseguem obter uma\
            \ posi\xE7\xE3o inicial no sistema explorando fraquezas conhecidas em\
            \ ativos expostos \xE0 internet."
          annotation: "Resultado: Usu\xE1rios n\xE3o autorizados n\xE3o conseguem\
            \ obter uma posi\xE7\xE3o inicial no sistema explorando fraquezas conhecidas\
            \ em ativos expostos \xE0 internet.\n\nTTP/Risco Tratado: Advers\xE1rios\
            \ podem explorar fraquezas em hosts ou sistemas expostos \xE0 internet,\
            \ visando bugs de software, falhas tempor\xE1rias ou configura\xE7\xF5\
            es incorretas.\n\nA\xE7\xF5es Recomendadas:\n- Minimizar ativos expostos\
            \ \xE0 internet sempre que poss\xEDvel\n- Priorizar manter o software\
            \ atualizado por meio de corre\xE7\xF5es/atualiza\xE7\xF5es tempestivas\n\
            - Desabilitar todas as aplica\xE7\xF5es de SO, softwares e protocolos\
            \ de rede desnecess\xE1rios em ativos expostos \xE0 internet\n- Nunca\
            \ expor interfaces de gerenciamento de rede \xE0 internet p\xFAblica\n\
            - Segmentar logicamente as redes corporativas e de produ\xE7\xE3o conforme\
            \ fronteiras de confian\xE7a e tipos de plataforma\n\nCusto: Moderado\
            \ | Impacto: Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:4-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:de
      ref_id: 4.A
      name: Establish Malicious Code Detection
      description: Enables early threat identification, strengthens system integrity,
        provides insights for faster remediation, and minimizes downtime.
      annotation: 'Outcome: Enables early threat identification, strengthens system
        integrity, provides insights for faster remediation, and minimizes downtime.


        TTP/Risk Addressed: Malicious software can involve payloads, droppers, backdoors,
        etc. Adversaries use malware to control remote machines, evade defenses, and
        execute post-compromise actions.


        Recommended Actions:

        - Implement signature-based and non-signature-based mechanisms detecting/eradicating
        malicious code at endpoints

        - Ensure antivirus software is updated, active, and configured for auto-scanning
        emails and removable media

        - Use OT-compatible antivirus with special practices including compatibility
        checks and performance testing


        Cost: Moderate | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-33
      translations:
        fr:
          name: "\xC9tablir la d\xE9tection du code malveillant"
          description: "Permet l'identification pr\xE9coce des menaces, renforce l'int\xE9\
            grit\xE9 des syst\xE8mes, fournit des informations pour une rem\xE9diation\
            \ plus rapide et minimise les temps d'arr\xEAt."
          annotation: "R\xE9sultat attendu : Permet l'identification pr\xE9coce des\
            \ menaces, renforce l'int\xE9grit\xE9 des syst\xE8mes, fournit des informations\
            \ pour une rem\xE9diation plus rapide et minimise les temps d'arr\xEA\
            t.\n\nTTP/Risque trait\xE9 : Les adversaires d\xE9ploient des logiciels\
            \ malveillants incluant des charges utiles, des t\xE9l\xE9chargeurs et\
            \ des portes d\xE9rob\xE9es pour contr\xF4ler des machines \xE0 distance,\
            \ contourner les d\xE9fenses et ex\xE9cuter des actions post-compromission.\
            \ Les logiciels malveillants peuvent se propager via des supports amovibles\
            \ vers des r\xE9seaux isol\xE9s.\n\nActions recommand\xE9es :\n- Mettre\
            \ en \u0153uvre des m\xE9canismes bas\xE9s sur les signatures et non bas\xE9\
            s sur les signatures pour d\xE9tecter et \xE9radiquer le code malveillant\
            \ sur les terminaux\n- S'assurer que l'antivirus est \xE0 jour, actif\
            \ et configur\xE9 pour l'analyse automatique des courriels et supports\
            \ amovibles\n- Utiliser un antivirus compatible OT avec des pratiques\
            \ sp\xE9ciales incluant les v\xE9rifications de compatibilit\xE9 et les\
            \ tests de performance\n\nCo\xFBt : Mod\xE9r\xE9 | Impact : \xC9lev\xE9\
            \ | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Estabelecer Detec\xE7\xE3o de C\xF3digo Malicioso"
          description: "Permite a identifica\xE7\xE3o precoce de amea\xE7as, fortalece\
            \ a integridade do sistema, fornece insights para uma remedia\xE7\xE3\
            o mais r\xE1pida e minimiza a indisponibilidade."
          annotation: "Resultado: Permite a identifica\xE7\xE3o precoce de amea\xE7\
            as, fortalece a integridade do sistema, fornece insights para uma remedia\xE7\
            \xE3o mais r\xE1pida e minimiza a indisponibilidade.\n\nTTP/Risco Tratado:\
            \ Software malicioso pode envolver payloads, droppers, backdoors, etc.\
            \ Advers\xE1rios usam malware para controlar m\xE1quinas remotas, evadir\
            \ defesas e executar a\xE7\xF5es p\xF3s-comprometimento.\n\nA\xE7\xF5\
            es Recomendadas:\n- Implementar mecanismos baseados e n\xE3o baseados\
            \ em assinaturas para detectar/erradicar c\xF3digo malicioso em endpoints\n\
            - Garantir que o software antiv\xEDrus esteja atualizado, ativo e configurado\
            \ para varredura autom\xE1tica de e-mails e m\xEDdias remov\xEDveis\n\
            - Usar antiv\xEDrus compat\xEDvel com TO, com pr\xE1ticas especiais, incluindo\
            \ verifica\xE7\xF5es de compatibilidade e testes de desempenho\n\nCusto:\
            \ Moderado | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:4-b
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:de
      ref_id: 4.B
      name: Identify Adverse Events
      description: Organizations can identify adverse security events.
      annotation: 'Outcome: Organizations can identify adverse security events.


        TTP/Risk Addressed: Initial access, privilege escalation, and lateral movement.


        Recommended Actions:

        - Define clear adverse event criteria and processes; escalate suspected events
        per incident response plan

        - Automate event information analysis accelerating investigative timelines

        - Conduct analyst role-specific training on proper protocols for suspected
        cyber incidents

        - Account for OT-specific events and anomalies


        Cost: Moderate | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-34
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-04
      translations:
        fr:
          name: "Identifier les \xE9v\xE9nements ind\xE9sirables"
          description: "Les organisations peuvent identifier les \xE9v\xE9nements\
            \ de s\xE9curit\xE9 ind\xE9sirables."
          annotation: "R\xE9sultat attendu : Les organisations peuvent identifier\
            \ les \xE9v\xE9nements de s\xE9curit\xE9 ind\xE9sirables.\n\nTTP/Risque\
            \ trait\xE9 : Acc\xE8s non autoris\xE9 aux ressources r\xE9seau permettant\
            \ aux adversaires de se d\xE9placer entre les syst\xE8mes sans \xEAtre\
            \ d\xE9tect\xE9s, d'\xE9lever les privil\xE8ges et de compromettre les\
            \ donn\xE9es sensibles et les syst\xE8mes critiques.\n\nActions recommand\xE9\
            es :\n- D\xE9finir des crit\xE8res et processus clairs pour les \xE9v\xE9\
            nements ind\xE9sirables ; escalader les \xE9v\xE9nements suspects selon\
            \ le plan de r\xE9ponse aux incidents\n- Automatiser l'analyse des informations\
            \ sur les \xE9v\xE9nements pour acc\xE9l\xE9rer les d\xE9lais d'investigation\n\
            - Former les analystes aux protocoles appropri\xE9s pour les incidents\
            \ cyber suspect\xE9s\n- Prendre en compte les \xE9v\xE9nements et anomalies\
            \ sp\xE9cifiques aux OT\n\nCo\xFBt : Mod\xE9r\xE9 | Impact : \xC9lev\xE9\
            \ | Complexit\xE9 : Complexe"
        pt:
          name: Identificar Eventos Adversos
          description: "As organiza\xE7\xF5es conseguem identificar eventos de seguran\xE7\
            a adversos."
          annotation: "Resultado: As organiza\xE7\xF5es conseguem identificar eventos\
            \ de seguran\xE7a adversos.\n\nTTP/Risco Tratado: Acesso inicial, escalonamento\
            \ de privil\xE9gios e movimenta\xE7\xE3o lateral.\n\nA\xE7\xF5es Recomendadas:\n\
            - Definir crit\xE9rios e processos claros para eventos adversos; escalar\
            \ eventos suspeitos conforme o plano de resposta a incidentes\n- Automatizar\
            \ a an\xE1lise de informa\xE7\xF5es de eventos, acelerando os prazos de\
            \ investiga\xE7\xE3o\n- Realizar treinamento espec\xEDfico por fun\xE7\
            \xE3o de analista sobre os protocolos adequados para incidentes cibern\xE9\
            ticos suspeitos\n- Considerar eventos e anomalias espec\xEDficos de TO\n\
            \nCusto: Moderado | Impacto: Alto | Complexidade: Complexa"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:5-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rs
      ref_id: 5.A
      name: Establish Incident Communication Procedures
      description: Coordinate crisis communication methods between internal and external
        organization partners and critical suppliers.
      annotation: 'Outcome: Coordinate crisis communication methods between internal
        and external organization partners and critical suppliers.


        TTP/Risk Addressed: Without established communication procedures, incidents
        can disrupt coordination among response teams, slowing incident resolution,
        increasing downtime, and amplifying overall damage.


        Recommended Actions:

        - Design communications plan identifying stakeholders and coordination mechanisms
        during incidents

        - Collaborate with stakeholders; securely share information per response plans

        - Regularly update senior leadership on major incident status

        - Notify human resources when malicious insider activity occurs

        - Establish and follow media communications procedures


        Cost: Low | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-35
      translations:
        fr:
          name: "\xC9tablir des proc\xE9dures de communication en cas d'incident"
          description: "Coordonner les m\xE9thodes de communication de crise entre\
            \ les partenaires internes et externes de l'organisation et les fournisseurs\
            \ critiques."
          annotation: "R\xE9sultat attendu : Coordonner les m\xE9thodes de communication\
            \ de crise entre les partenaires internes et externes de l'organisation\
            \ et les fournisseurs critiques.\n\nTTP/Risque trait\xE9 : Incapacit\xE9\
            \ \xE0 isoler, contenir, \xE9radiquer, rem\xE9dier et communiquer rapidement\
            \ et efficacement lors d'incidents de cybers\xE9curit\xE9. Les d\xE9faillances\
            \ de communication ralentissent la r\xE9solution, augmentent les temps\
            \ d'arr\xEAt et amplifient les dommages.\n\nActions recommand\xE9es :\n\
            - Concevoir un plan de communication identifiant les parties prenantes\
            \ et les m\xE9canismes de coordination lors des incidents\n- Collaborer\
            \ avec les parties prenantes ; partager l'information de mani\xE8re s\xE9\
            curis\xE9e selon les plans de r\xE9ponse\n- Informer r\xE9guli\xE8rement\
            \ la direction des incidents majeurs\n- Notifier les ressources humaines\
            \ en cas d'activit\xE9 malveillante interne\n- \xC9tablir et suivre les\
            \ proc\xE9dures de communication m\xE9diatique\n\nCo\xFBt : Faible | Impact\
            \ : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Estabelecer Procedimentos de Comunica\xE7\xE3o de Incidentes"
          description: "Coordenar m\xE9todos de comunica\xE7\xE3o de crise entre parceiros\
            \ internos e externos da organiza\xE7\xE3o e fornecedores cr\xEDticos."
          annotation: "Resultado: Coordenar m\xE9todos de comunica\xE7\xE3o de crise\
            \ entre parceiros internos e externos da organiza\xE7\xE3o e fornecedores\
            \ cr\xEDticos.\n\nTTP/Risco Tratado: Sem procedimentos de comunica\xE7\
            \xE3o estabelecidos, os incidentes podem prejudicar a coordena\xE7\xE3\
            o entre as equipes de resposta, retardando a resolu\xE7\xE3o do incidente,\
            \ aumentando a indisponibilidade e amplificando o dano geral.\n\nA\xE7\
            \xF5es Recomendadas:\n- Elaborar um plano de comunica\xE7\xF5es que identifique\
            \ partes interessadas e mecanismos de coordena\xE7\xE3o durante incidentes\n\
            - Colaborar com partes interessadas; compartilhar informa\xE7\xF5es de\
            \ forma segura conforme os planos de resposta\n- Atualizar regularmente\
            \ a alta lideran\xE7a sobre o status de incidentes relevantes\n- Notificar\
            \ o setor de recursos humanos quando ocorrer atividade maliciosa de pessoa\
            \ interna (insider)\n- Estabelecer e seguir procedimentos de comunica\xE7\
            \xE3o com a m\xEDdia\n\nCusto: Baixo | Impacto: Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:5-b
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rs
      ref_id: 5.B
      name: Establish Incident Reporting Procedures
      description: CISA and other organizations are better able to provide assistance
        or understand the broader scope of a cyber incident.
      annotation: 'Outcome: CISA and other organizations are better able to provide
        assistance or understand the broader scope of a cyber incident.


        TTP/Risk Addressed: Without timely incident reporting, CISA and other groups
        are less able to assist affected organizations and lack critical insight into
        the broader threat landscape.


        Recommended Actions:

        - Maintain policy and procedures on reporting confirmed incidents to external
        entities (regulators, SRMAs, ISACs, ISAOs, CISA)

        - Report known incidents within regulatory timeframes or as soon as safely
        feasible


        Cost: Moderate | Impact: High | Complexity: Moderate'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-36
      translations:
        fr:
          name: "\xC9tablir des proc\xE9dures de signalement des incidents"
          description: "La CISA et d'autres organisations sont mieux en mesure de\
            \ fournir une assistance ou de comprendre la port\xE9e plus large d'un\
            \ incident cyber."
          annotation: "R\xE9sultat attendu : La CISA et d'autres organisations sont\
            \ mieux en mesure de fournir une assistance ou de comprendre la port\xE9\
            e plus large d'un incident cyber.\n\nTTP/Risque trait\xE9 : Incapacit\xE9\
            \ \xE0 isoler, contenir, \xE9radiquer, rem\xE9dier et communiquer rapidement\
            \ et efficacement lors d'incidents de cybers\xE9curit\xE9. Les d\xE9faillances\
            \ de communication ralentissent la r\xE9solution, augmentent les temps\
            \ d'arr\xEAt et amplifient les dommages.\n\nActions recommand\xE9es :\n\
            - Maintenir une politique et des proc\xE9dures de signalement de tous\
            \ les incidents confirm\xE9s aux entit\xE9s externes (r\xE9gulateurs,\
            \ autorit\xE9s sectorielles, ISAC, ISAO, CISA)\n- Signaler les incidents\
            \ connus dans les d\xE9lais r\xE9glementaires applicables ou d\xE8s que\
            \ possible en toute s\xE9curit\xE9\n\nCo\xFBt : Mod\xE9r\xE9 | Impact\
            \ : \xC9lev\xE9 | Complexit\xE9 : Mod\xE9r\xE9"
        pt:
          name: "Estabelecer Procedimentos de Notifica\xE7\xE3o de Incidentes"
          description: "A CISA e outras organiza\xE7\xF5es ficam mais aptas a prestar\
            \ assist\xEAncia ou compreender o escopo mais amplo de um incidente cibern\xE9\
            tico."
          annotation: "Resultado: A CISA e outras organiza\xE7\xF5es ficam mais aptas\
            \ a prestar assist\xEAncia ou compreender o escopo mais amplo de um incidente\
            \ cibern\xE9tico.\n\nTTP/Risco Tratado: Sem a notifica\xE7\xE3o tempestiva\
            \ de incidentes, a CISA e outros grupos ficam menos capazes de auxiliar\
            \ as organiza\xE7\xF5es afetadas e carecem de vis\xE3o cr\xEDtica sobre\
            \ o panorama de amea\xE7as mais amplo.\n\nA\xE7\xF5es Recomendadas:\n\
            - Manter pol\xEDtica e procedimentos sobre a notifica\xE7\xE3o de incidentes\
            \ confirmados a entidades externas (reguladores, SRMAs, ISACs, ISAOs,\
            \ CISA)\n- Notificar incidentes conhecidos dentro dos prazos regulat\xF3\
            rios ou assim que for seguramente vi\xE1vel\n\nCusto: Moderado | Impacto:\
            \ Alto | Complexidade: Moderada"
    - urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:6-a
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:cisa-cpg-2.0:rc
      ref_id: 6.A
      name: Incident Planning and Preparedness
      description: Organizations are capable of safely and effectively recovering
        from a cybersecurity incident.
      annotation: 'Outcome: Organizations are capable of safely and effectively recovering
        from a cybersecurity incident.


        TTP/Risk Addressed: Disruption to the availability of an asset, service, or
        system.


        Recommended Actions:

        - Execute plans recovering/restoring service to critical assets impacted by
        incidents

        - Enable degraded operations (paper-based, radio communications) without critical
        assets or internet

        - Complete post-incident analysis identifying improvement areas

        - Incorporate lessons learned; enhance detection/response capabilities

        - Update policies, procedures, and training; ensure stakeholder awareness
        of changes


        Cost: Moderate | Impact: High | Complexity: Complex'
      threats:
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-16
      - urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
      reference_controls:
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-37
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-02
      - urn:intuitem:risk:function:cisa-cpg-2.0:rc-23
      translations:
        fr:
          name: "Planification et pr\xE9paration \xE0 la reprise apr\xE8s incident"
          description: "Les organisations sont capables de se remettre de mani\xE8\
            re s\xFBre et efficace d'un incident de cybers\xE9curit\xE9."
          annotation: "R\xE9sultat attendu : Les organisations sont capables de se\
            \ remettre de mani\xE8re s\xFBre et efficace d'un incident de cybers\xE9\
            curit\xE9.\n\nTTP/Risque trait\xE9 : Les adversaires perturbent les syst\xE8\
            mes critiques, suppriment des donn\xE9es et d\xE9sactivent les services\
            \ de r\xE9cup\xE9ration pour emp\xEAcher la restauration des syst\xE8\
            mes, causant une interruption de la disponibilit\xE9 des actifs, services\
            \ ou syst\xE8mes.\n\nActions recommand\xE9es :\n- Ex\xE9cuter les plans\
            \ de r\xE9cup\xE9ration et de restauration des services pour les actifs\
            \ critiques impact\xE9s par les incidents, incluant la capacit\xE9 d'ex\xE9\
            cuter les fonctions essentielles en mode d\xE9grad\xE9 (op\xE9rations\
            \ papier, communications radio)\n- R\xE9aliser une analyse post-incident\
            \ identifiant les axes d'am\xE9lioration\n- Int\xE9grer les retours d'exp\xE9\
            rience, am\xE9liorer les capacit\xE9s de d\xE9tection et de r\xE9ponse\n\
            - Mettre \xE0 jour les politiques, proc\xE9dures et formations ; s'assurer\
            \ que les parties prenantes sont inform\xE9es des changements\n\nCo\xFB\
            t : Mod\xE9r\xE9 | Impact : \xC9lev\xE9 | Complexit\xE9 : Complexe"
        pt:
          name: "Planejamento e Prepara\xE7\xE3o para Incidentes"
          description: "As organiza\xE7\xF5es s\xE3o capazes de se recuperar de forma\
            \ segura e eficaz de um incidente de ciberseguran\xE7a."
          annotation: "Resultado: As organiza\xE7\xF5es s\xE3o capazes de se recuperar\
            \ de forma segura e eficaz de um incidente de ciberseguran\xE7a.\n\nTTP/Risco\
            \ Tratado: Interrup\xE7\xE3o da disponibilidade de um ativo, servi\xE7\
            o ou sistema.\n\nA\xE7\xF5es Recomendadas:\n- Executar planos para recuperar/restaurar\
            \ o servi\xE7o de ativos cr\xEDticos impactados por incidentes\n- Habilitar\
            \ opera\xE7\xF5es degradadas (baseadas em papel, comunica\xE7\xF5es por\
            \ r\xE1dio) sem ativos cr\xEDticos ou internet\n- Concluir an\xE1lise\
            \ p\xF3s-incidente identificando \xE1reas de melhoria\n- Incorporar li\xE7\
            \xF5es aprendidas; aprimorar as capacidades de detec\xE7\xE3o/resposta\n\
            - Atualizar pol\xEDticas, procedimentos e treinamentos; garantir a conscientiza\xE7\
            \xE3o das partes interessadas sobre as mudan\xE7as\n\nCusto: Moderado\
            \ | Impacto: Alto | Complexidade: Complexa"

urn: urn:intuitem:risk:library:cisa-cpg-2.0
locale: en
ref_id: CISA-CPG-2.0
name: CISA Cybersecurity Performance Goals v2.0
description: CISA Cross-Sector Cybersecurity Performance Goals (CPG) 2.0 - Voluntary
  practices with high-impact security actions aligned to the NIST Cybersecurity Framework.
copyright: This document is provided by CISA (Cybersecurity and Infrastructure Security
  Agency) and is public domain.
version: 1
publication_date: '2025-03-04'
provider: CISA
packager: intuitem
translations:
  fr:
    name: "Objectifs de performance en cybers\xE9curit\xE9 CISA v2.0"
    description: "Objectifs de performance en cybers\xE9curit\xE9 (CPG) 2.0 de la\
      \ CISA - Pratiques volontaires avec des actions de s\xE9curit\xE9 \xE0 fort\
      \ impact align\xE9es sur le cadre de cybers\xE9curit\xE9 du NIST. Cette traduction\
      \ fran\xE7aise n'est pas une traduction officielle de la CISA."
    copyright: "Ce document est fourni par la CISA (Cybersecurity and Infrastructure\
      \ Security Agency) et est du domaine public. La traduction fran\xE7aise est\
      \ une traduction non officielle fournie \xE0 titre indicatif."
  pt:
    name: CISA CPG v2.0
    description: "Metas de Desempenho em Ciberseguran\xE7a Intersetoriais da CISA\
      \ 2.0 (CISA Cross-Sector Cybersecurity Performance Goals 2.0)"
objects:
  reference_controls:
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-01
    ref_id: RC.01
    name: Cybersecurity Roles and Responsibilities Policy
    category: policy
    csf_function: govern
    description: Document all cybersecurity roles, responsibilities, and authorities
      in organizational policy. Distribute responsibilities across the organization,
      including third parties. Ensure legal and regulatory compliance.
    translations:
      fr:
        name: "Politique de r\xF4les et responsabilit\xE9s en cybers\xE9curit\xE9"
        description: "Documenter tous les r\xF4les, responsabilit\xE9s et autorit\xE9\
          s en mati\xE8re de cybers\xE9curit\xE9 dans la politique organisationnelle.\
          \ R\xE9partir les responsabilit\xE9s au sein de l'organisation, y compris\
          \ avec les tiers. Assurer la conformit\xE9 l\xE9gale et r\xE9glementaire."
      pt:
        name: "Pol\xEDtica de Pap\xE9is e Responsabilidades de Ciberseguran\xE7a"
        description: "Documente todos os pap\xE9is, responsabilidades e autoridades\
          \ de ciberseguran\xE7a na pol\xEDtica organizacional. Distribua as responsabilidades\
          \ por toda a organiza\xE7\xE3o, incluindo terceiros. Garanta a conformidade\
          \ legal e regulat\xF3ria."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-02
    ref_id: RC.02
    name: Cybersecurity Policy Lifecycle Management
    category: policy
    csf_function: govern
    description: Review cybersecurity policies annually and update when requirements,
      risks, threats, or technology changes. Communicate and enforce policies reflecting
      organizational strategy and priorities.
    translations:
      fr:
        name: "Gestion du cycle de vie des politiques de cybers\xE9curit\xE9"
        description: "R\xE9viser les politiques de cybers\xE9curit\xE9 annuellement\
          \ et les mettre \xE0 jour en cas de changement des exigences, des risques,\
          \ des menaces ou des technologies. Communiquer et appliquer les politiques\
          \ refl\xE9tant la strat\xE9gie et les priorit\xE9s organisationnelles."
      pt:
        name: "Gest\xE3o do Ciclo de Vida das Pol\xEDticas de Ciberseguran\xE7a"
        description: "Revise as pol\xEDticas de ciberseguran\xE7a anualmente e atualize-as\
          \ quando houver mudan\xE7as em requisitos, riscos, amea\xE7as ou tecnologia.\
          \ Comunique e imponha pol\xEDticas que reflitam a estrat\xE9gia e as prioridades\
          \ organizacionais."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-03
    ref_id: RC.03
    name: OT-Specific Security Policy
    category: policy
    csf_function: govern
    description: Develop OT-specific cybersecurity policies acknowledging IT program
      limitations and critical function priorities. Establish governance encompassing
      regulatory, legal, risk, environmental, and operational obligations.
    translations:
      fr:
        name: "Politique de s\xE9curit\xE9 sp\xE9cifique aux OT"
        description: "D\xE9velopper des politiques de cybers\xE9curit\xE9 sp\xE9cifiques\
          \ aux technologies op\xE9rationnelles (OT), tenant compte des limitations\
          \ des programmes informatiques et des priorit\xE9s des fonctions critiques.\
          \ \xC9tablir une gouvernance englobant les obligations r\xE9glementaires,\
          \ juridiques, environnementales et op\xE9rationnelles."
      pt:
        name: "Pol\xEDtica de Seguran\xE7a Espec\xEDfica para OT"
        description: "Desenvolva pol\xEDticas de ciberseguran\xE7a espec\xEDficas\
          \ para OT reconhecendo as limita\xE7\xF5es do programa de TI e as prioridades\
          \ de fun\xE7\xF5es cr\xEDticas. Estabele\xE7a uma governan\xE7a que abranja\
          \ obriga\xE7\xF5es regulat\xF3rias, legais, de risco, ambientais e operacionais."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-04
    ref_id: RC.04
    name: Incident Response Plan Management
    category: process
    csf_function: govern
    description: Develop, maintain, update, and regularly exercise incident response
      plans for common and organizationally specific scenarios. Ensure realistic drills
      including all relevant stakeholders. Review and drill IR plans minimum annually.
      Account for OT-specific safety and containment considerations.
    translations:
      fr:
        name: "Gestion du plan de r\xE9ponse aux incidents"
        description: "D\xE9velopper, maintenir, mettre \xE0 jour et exercer r\xE9\
          guli\xE8rement les plans de r\xE9ponse aux incidents pour des sc\xE9narios\
          \ courants et sp\xE9cifiques \xE0 l'organisation. Garantir des exercices\
          \ r\xE9alistes incluant toutes les parties prenantes. R\xE9viser et tester\
          \ les plans au minimum annuellement. Prendre en compte les consid\xE9rations\
          \ de s\xFBret\xE9 et de confinement sp\xE9cifiques aux OT."
      pt:
        name: "Gest\xE3o do Plano de Resposta a Incidentes"
        description: "Desenvolva, mantenha, atualize e exercite regularmente planos\
          \ de resposta a incidentes para cen\xE1rios comuns e espec\xEDficos da organiza\xE7\
          \xE3o. Garanta simula\xE7\xF5es realistas incluindo todas as partes interessadas\
          \ relevantes. Revise e simule os planos de resposta a incidentes no m\xED\
          nimo anualmente. Considere aspectos de seguran\xE7a e conten\xE7\xE3o espec\xED\
          ficos de OT."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-05
    ref_id: RC.05
    name: Supply Chain Incident Notification SLAs
    category: process
    csf_function: govern
    description: Require vendors and service providers to notify customers of security
      incidents and vulnerabilities within risk-informed timeframes via SLAs and contracts.
    translations:
      fr:
        name: "SLA de notification d'incidents de la cha\xEEne d'approvisionnement"
        description: "Exiger des fournisseurs et prestataires de services qu'ils notifient\
          \ les clients des incidents de s\xE9curit\xE9 et des vuln\xE9rabilit\xE9\
          s dans des d\xE9lais adapt\xE9s au risque, via des SLA et des contrats."
      pt:
        name: "SLAs de Notifica\xE7\xE3o de Incidentes na Cadeia de Suprimentos"
        description: "Exija que fornecedores e prestadores de servi\xE7os notifiquem\
          \ os clientes sobre incidentes de seguran\xE7a e vulnerabilidades dentro\
          \ de prazos definidos com base no risco, por meio de SLAs e contratos."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-06
    ref_id: RC.06
    name: OT Supply Chain Authenticity Verification
    category: process
    csf_function: govern
    description: Document and track OT asset serial numbers, checksums, digital certificates/signatures
      to verify authenticity of hardware, software, and firmware.
    translations:
      fr:
        name: "V\xE9rification de l'authenticit\xE9 de la cha\xEEne d'approvisionnement\
          \ OT"
        description: "Documenter et suivre les num\xE9ros de s\xE9rie, les sommes\
          \ de contr\xF4le, les certificats num\xE9riques et signatures des actifs\
          \ OT pour v\xE9rifier l'authenticit\xE9 du mat\xE9riel, des logiciels et\
          \ des micrologiciels."
      pt:
        name: "Verifica\xE7\xE3o de Autenticidade da Cadeia de Suprimentos de OT"
        description: "Documente e rastreie n\xFAmeros de s\xE9rie, checksums e certificados/assinaturas\
          \ digitais dos ativos de OT para verificar a autenticidade de hardware,\
          \ software e firmware."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-07
    ref_id: RC.07
    name: Managed Service Provider Risk Management
    category: process
    csf_function: govern
    description: Develop understanding of MSP services and security products. Understand
      contractual agreements and proactively address security gaps. Ensure contracts
      detail how and when MSPs notify customers of incidents.
    translations:
      fr:
        name: "Gestion des risques li\xE9s aux prestataires de services manag\xE9s"
        description: "D\xE9velopper la compr\xE9hension des services et produits de\
          \ s\xE9curit\xE9 des MSP. Comprendre les accords contractuels et combler\
          \ proactivement les lacunes de s\xE9curit\xE9. S'assurer que les contrats\
          \ pr\xE9cisent comment et quand les MSP notifient les clients des incidents."
      pt:
        name: "Gest\xE3o de Riscos de Provedores de Servi\xE7os Gerenciados"
        description: "Desenvolva o entendimento dos servi\xE7os e produtos de seguran\xE7\
          a dos MSPs. Compreenda os acordos contratuais e trate proativamente as lacunas\
          \ de seguran\xE7a. Garanta que os contratos detalhem como e quando os MSPs\
          \ notificam os clientes sobre incidentes."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-08
    ref_id: RC.08
    name: Asset Inventory Management
    category: process
    csf_function: identify
    description: Maintain regularly updated inventory of all organizational assets
      including data, hardware, software, systems, facilities, and personnel. Update
      critical IT/OT assets more frequently.
    translations:
      fr:
        name: Gestion de l'inventaire des actifs
        description: "Maintenir un inventaire r\xE9guli\xE8rement mis \xE0 jour de\
          \ tous les actifs organisationnels, incluant les donn\xE9es, le mat\xE9\
          riel, les logiciels, les syst\xE8mes, les installations et le personnel.\
          \ Mettre \xE0 jour plus fr\xE9quemment les actifs IT/OT critiques."
      pt:
        name: "Gest\xE3o de Invent\xE1rio de Ativos"
        description: "Mantenha um invent\xE1rio regularmente atualizado de todos os\
          \ ativos organizacionais, incluindo dados, hardware, software, sistemas,\
          \ instala\xE7\xF5es e pessoas. Atualize com mais frequ\xEAncia os ativos\
          \ cr\xEDticos de TI/OT."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-09
    ref_id: RC.09
    name: Vulnerability Management Program
    category: process
    csf_function: identify
    description: Implement vulnerability management program to patch and mitigate
      misconfigured software timely. Monitor risk response progress via POA&M, risk
      registers, and risk detail reports. Assign responsibilities for processing cybersecurity
      threat, vulnerability, or incident disclosures.
    translations:
      fr:
        name: "Programme de gestion des vuln\xE9rabilit\xE9s"
        description: "Mettre en \u0153uvre un programme de gestion des vuln\xE9rabilit\xE9\
          s pour corriger et att\xE9nuer les logiciels mal configur\xE9s en temps\
          \ voulu. Suivre l'avancement de la r\xE9ponse aux risques via les POA&M,\
          \ les registres de risques et les rapports d\xE9taill\xE9s. Attribuer les\
          \ responsabilit\xE9s pour le traitement des divulgations de menaces, vuln\xE9\
          rabilit\xE9s ou incidents."
      pt:
        name: "Programa de Gest\xE3o de Vulnerabilidades"
        description: "Implemente um programa de gest\xE3o de vulnerabilidades para\
          \ corrigir e mitigar softwares mal configurados em tempo h\xE1bil. Monitore\
          \ o progresso da resposta a riscos por meio de POA&M, registros de riscos\
          \ e relat\xF3rios detalhados de riscos. Atribua responsabilidades pelo processamento\
          \ de divulga\xE7\xF5es de amea\xE7as, vulnerabilidades ou incidentes de\
          \ ciberseguran\xE7a."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-10
    ref_id: RC.10
    name: Legacy System Compensating Controls
    category: technical
    csf_function: identify
    description: Incorporate compensating security controls for legacy systems where
      patching is infeasible. For OT assets, apply compensating controls such as segmentation
      and monitoring, making assets inaccessible from public internet.
    translations:
      fr:
        name: "Contr\xF4les compensatoires pour les syst\xE8mes existants"
        description: "Incorporer des contr\xF4les de s\xE9curit\xE9 compensatoires\
          \ pour les syst\xE8mes existants lorsque la correction est impossible. Pour\
          \ les actifs OT, appliquer des contr\xF4les compensatoires tels que la segmentation\
          \ et la surveillance, rendant les actifs inaccessibles depuis l'internet\
          \ public."
      pt:
        name: "Controles Compensat\xF3rios para Sistemas Legados"
        description: "Incorpore controles de seguran\xE7a compensat\xF3rios para sistemas\
          \ legados onde a aplica\xE7\xE3o de patches \xE9 invi\xE1vel. Para ativos\
          \ de OT, aplique controles compensat\xF3rios como segmenta\xE7\xE3o e monitoramento,\
          \ tornando os ativos inacess\xEDveis a partir da internet p\xFAblica."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-11
    ref_id: RC.11
    name: Independent Security Validation
    category: process
    csf_function: identify
    description: Regularly engage third-party cybersecurity experts for penetration
      tests, bug bounties, incident simulations, and table-top exercises. Assess ability
      of adversaries to infiltrate and move laterally within networks. Ensure findings
      are addressed.
    translations:
      fr:
        name: "Validation ind\xE9pendante de la s\xE9curit\xE9"
        description: "Engager r\xE9guli\xE8rement des experts tiers en cybers\xE9\
          curit\xE9 pour des tests d'intrusion, des programmes de bug bounty, des\
          \ simulations d'incidents et des exercices sur table. \xC9valuer la capacit\xE9\
          \ des adversaires \xE0 infiltrer et se d\xE9placer lat\xE9ralement dans\
          \ les r\xE9seaux. S'assurer que les conclusions sont trait\xE9es."
      pt:
        name: "Valida\xE7\xE3o de Seguran\xE7a Independente"
        description: "Contrate regularmente especialistas terceirizados em ciberseguran\xE7\
          a para testes de penetra\xE7\xE3o, programas de bug bounty, simula\xE7\xF5\
          es de incidentes e exerc\xEDcios de mesa (table-top). Avalie a capacidade\
          \ dos advers\xE1rios de se infiltrar e se mover lateralmente nas redes.\
          \ Garanta que as constata\xE7\xF5es sejam tratadas."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-12
    ref_id: RC.12
    name: Vulnerability Disclosure Program
    category: process
    csf_function: identify
    description: Maintain public, easily discoverable method for notifying security
      teams of vulnerable, misconfigured, or exploitable assets. Acknowledge valid
      submissions and respond timely. Protect good-faith reporters under safe harbor
      provisions. Apply security.txt files conforming to RFC 9116 on all public-facing
      web domains.
    translations:
      fr:
        name: "Programme de divulgation des vuln\xE9rabilit\xE9s"
        description: "Maintenir une m\xE9thode publique et facilement accessible pour\
          \ signaler aux \xE9quipes de s\xE9curit\xE9 les actifs vuln\xE9rables, mal\
          \ configur\xE9s ou exploitables. Accuser r\xE9ception des soumissions valides\
          \ et y r\xE9pondre dans des d\xE9lais raisonnables. Prot\xE9ger les personnes\
          \ signalant les vuln\xE9rabilit\xE9s de bonne foi. Appliquer les fichiers\
          \ security.txt conformes \xE0 la RFC 9116 sur tous les domaines web publics."
      pt:
        name: "Programa de Divulga\xE7\xE3o de Vulnerabilidades"
        description: "Mantenha um m\xE9todo p\xFAblico e de f\xE1cil descoberta para\
          \ notificar as equipes de seguran\xE7a sobre ativos vulner\xE1veis, mal\
          \ configurados ou explor\xE1veis. Reconhe\xE7a submiss\xF5es v\xE1lidas\
          \ e responda em tempo h\xE1bil. Proteja os relatores de boa-f\xE9 sob disposi\xE7\
          \xF5es de porto seguro (safe harbor). Aplique arquivos security.txt em conformidade\
          \ com a RFC 9116 em todos os dom\xEDnios web de acesso p\xFAblico."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-13
    ref_id: RC.13
    name: Network Topology Documentation
    category: process
    csf_function: identify
    description: Maintain accurate documentation describing current network topology
      across all IT and OT networks. Perform network reviews and track annually; update
      when topology changes.
    translations:
      fr:
        name: "Documentation de la topologie r\xE9seau"
        description: "Maintenir une documentation pr\xE9cise d\xE9crivant la topologie\
          \ r\xE9seau actuelle pour tous les r\xE9seaux IT et OT. Effectuer des revues\
          \ r\xE9seau et les suivre annuellement ; mettre \xE0 jour en cas de changement\
          \ de topologie."
      pt:
        name: "Documenta\xE7\xE3o da Topologia de Rede"
        description: "Mantenha documenta\xE7\xE3o precisa descrevendo a topologia\
          \ de rede atual em todas as redes de TI e OT. Realize revis\xF5es de rede\
          \ e acompanhe-as anualmente; atualize quando a topologia mudar."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-14
    ref_id: RC.14
    name: Default Password Elimination
    category: technical
    csf_function: protect
    description: Require changing default manufacturer passwords for all hardware,
      software, and firmware before network connection. If infeasible (hard-coded
      passwords), document and implement compensating controls; monitor logs for network
      traffic and login attempts.
    translations:
      fr:
        name: "\xC9limination des mots de passe par d\xE9faut"
        description: "Exiger le changement des mots de passe par d\xE9faut du fabricant\
          \ pour tout mat\xE9riel, logiciel et micrologiciel avant la connexion au\
          \ r\xE9seau. Si impossible (mots de passe cod\xE9s en dur), documenter et\
          \ mettre en \u0153uvre des contr\xF4les compensatoires ; surveiller les\
          \ journaux de trafic r\xE9seau et de tentatives de connexion."
      pt:
        name: "Elimina\xE7\xE3o de Senhas Padr\xE3o"
        description: "Exija a altera\xE7\xE3o das senhas padr\xE3o de f\xE1brica para\
          \ todo hardware, software e firmware antes da conex\xE3o \xE0 rede. Se for\
          \ invi\xE1vel (senhas codificadas no c\xF3digo), documente e implemente\
          \ controles compensat\xF3rios; monitore os logs em busca de tr\xE1fego de\
          \ rede e tentativas de login."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-15
    ref_id: RC.15
    name: Password Strength Policy
    category: technical
    csf_function: protect
    description: Enforce system policy establishing minimum password strength including
      16+ character length for all password-protected IT and OT assets. Leverage passphrases
      and password managers. Prioritize upgrade/replacement of assets unable to support
      sufficient strength passwords.
    translations:
      fr:
        name: Politique de robustesse des mots de passe
        description: "Appliquer une politique syst\xE8me \xE9tablissant une robustesse\
          \ minimale des mots de passe incluant une longueur de 16 caract\xE8res ou\
          \ plus pour tous les actifs IT et OT prot\xE9g\xE9s par mot de passe. Utiliser\
          \ des phrases de passe et des gestionnaires de mots de passe. Prioriser\
          \ la mise \xE0 niveau ou le remplacement des actifs ne pouvant pas supporter\
          \ une robustesse suffisante."
      pt:
        name: "Pol\xEDtica de Robustez de Senhas"
        description: "Imponha uma pol\xEDtica de sistema que estabele\xE7a uma robustez\
          \ m\xEDnima de senha, incluindo comprimento de 16 ou mais caracteres para\
          \ todos os ativos de TI e OT protegidos por senha. Utilize frases-senha\
          \ (passphrases) e gerenciadores de senhas. Priorize a atualiza\xE7\xE3o/substitui\xE7\
          \xE3o de ativos incapazes de suportar senhas com robustez suficiente."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-16
    ref_id: RC.16
    name: Unique Credential Management
    category: process
    csf_function: protect
    description: Create distinct, separate credentials for similar services and asset
      access across IT/OT networks. Ensure no password reuse across accounts. Unique
      passwords for admin/machine accounts. No universal NPE account passwords. Utilize
      role-based accounts.
    translations:
      fr:
        name: Gestion des identifiants uniques
        description: "Cr\xE9er des identifiants distincts et s\xE9par\xE9s pour des\
          \ services similaires et l'acc\xE8s aux actifs entre les r\xE9seaux IT/OT.\
          \ Garantir l'absence de r\xE9utilisation de mots de passe entre les comptes.\
          \ Mots de passe uniques pour les comptes d'administration et de machines.\
          \ Pas de mot de passe universel pour les comptes non personnels. Utiliser\
          \ des comptes bas\xE9s sur les r\xF4les."
      pt:
        name: "Gest\xE3o de Credenciais \xDAnicas"
        description: "Crie credenciais distintas e separadas para servi\xE7os similares\
          \ e acesso a ativos nas redes de TI/OT. Garanta que n\xE3o haja reutiliza\xE7\
          \xE3o de senhas entre contas. Senhas \xFAnicas para contas de administrador/m\xE1\
          quina. Sem senhas universais para contas NPE. Utilize contas baseadas em\
          \ pap\xE9is."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-17
    ref_id: RC.17
    name: Credential Revocation and Offboarding
    category: process
    csf_function: protect
    description: Establish defined, enforced administrative offboarding process for
      staff, contractors, and vendors including return of physical tokens/badges and
      revocation of all system/facility access. Disable inactive accounts after specified
      period (e.g., 30 days) via automated process.
    translations:
      fr:
        name: "R\xE9vocation des identifiants et d\xE9part du personnel"
        description: "\xC9tablir un processus administratif d\xE9fini et appliqu\xE9\
          \ de d\xE9part pour le personnel, les prestataires et les fournisseurs,\
          \ incluant la restitution des jetons physiques et badges, et la r\xE9vocation\
          \ de tous les acc\xE8s aux syst\xE8mes et aux locaux. D\xE9sactiver les\
          \ comptes inactifs apr\xE8s une p\xE9riode d\xE9finie (par ex. 30 jours)\
          \ via un processus automatis\xE9."
      pt:
        name: "Revoga\xE7\xE3o de Credenciais e Offboarding"
        description: "Estabele\xE7a um processo administrativo de desligamento (offboarding)\
          \ definido e imposto para funcion\xE1rios, prestadores de servi\xE7os e\
          \ fornecedores, incluindo a devolu\xE7\xE3o de tokens/crach\xE1s f\xEDsicos\
          \ e a revoga\xE7\xE3o de todo acesso a sistemas/instala\xE7\xF5es. Desative\
          \ contas inativas ap\xF3s um per\xEDodo especificado (por exemplo, 30 dias)\
          \ por meio de um processo automatizado."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-18
    ref_id: RC.18
    name: Failed Login Monitoring and Alerting
    category: technical
    csf_function: protect
    description: Capture and log all unsuccessful logins per security policy. Alert
      security personnel after consecutive unsuccessful attempts and deviations from
      normal user behavior. Store alerts in security or ticketing system for retroactive
      analysis.
    translations:
      fr:
        name: "Surveillance et alerte des tentatives de connexion \xE9chou\xE9es"
        description: "Capturer et journaliser toutes les tentatives de connexion infructueuses\
          \ conform\xE9ment \xE0 la politique de s\xE9curit\xE9. Alerter le personnel\
          \ de s\xE9curit\xE9 apr\xE8s des tentatives cons\xE9cutives infructueuses\
          \ et des \xE9carts par rapport au comportement normal de l'utilisateur.\
          \ Stocker les alertes dans un syst\xE8me de s\xE9curit\xE9 ou de tickets\
          \ pour analyse r\xE9trospective."
      pt:
        name: Monitoramento e Alerta de Tentativas de Login Malsucedidas
        description: "Capture e registre todos os logins malsucedidos conforme a pol\xED\
          tica de seguran\xE7a. Alerte o pessoal de seguran\xE7a ap\xF3s tentativas\
          \ malsucedidas consecutivas e desvios do comportamento normal do usu\xE1\
          rio. Armazene os alertas em um sistema de seguran\xE7a ou de tickets para\
          \ an\xE1lise retroativa."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-19
    ref_id: RC.19
    name: Multi-Factor Authentication Deployment
    category: technical
    csf_function: protect
    description: Require MFA using strongest available method for assets with remote
      access. Prioritize phishing-resistant MFA (FIDO/WebAuthn or PKI-based), then
      mobile app-based soft tokens, then SMS/voice as last resort. Enable MFA on all
      remotely accessible OT accounts/systems.
    translations:
      fr:
        name: "D\xE9ploiement de l'authentification multifacteur"
        description: "Exiger l'AMF en utilisant la m\xE9thode la plus forte disponible\
          \ pour les actifs avec acc\xE8s \xE0 distance. Prioriser l'AMF r\xE9sistante\
          \ \xE0 l'hame\xE7onnage (FIDO/WebAuthn ou bas\xE9e sur PKI), puis les jetons\
          \ logiciels d'application mobile, puis SMS/voix en dernier recours. Activer\
          \ l'AMF sur tous les comptes et syst\xE8mes OT accessibles \xE0 distance."
      pt:
        name: "Implanta\xE7\xE3o de Autentica\xE7\xE3o Multifator (MFA)"
        description: "Exija MFA usando o m\xE9todo mais forte dispon\xEDvel para ativos\
          \ com acesso remoto. Priorize MFA resistente a phishing (FIDO/WebAuthn ou\
          \ baseada em PKI), depois tokens de software baseados em aplicativos m\xF3\
          veis e, por fim, SMS/voz como \xFAltimo recurso. Habilite MFA em todas as\
          \ contas/sistemas de OT acess\xEDveis remotamente."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-20
    ref_id: RC.20
    name: Privileged Account Separation
    category: process
    csf_function: protect
    description: Ensure user accounts lack administrator privileges. Administrators
      maintain separate user accounts for non-admin activities. Re-evaluate privileges
      on recurring basis. Maintain separation of duties across multiple individuals/roles.
    translations:
      fr:
        name: "S\xE9paration des comptes \xE0 privil\xE8ges"
        description: "S'assurer que les comptes utilisateurs ne disposent pas de privil\xE8\
          ges d'administrateur. Les administrateurs maintiennent des comptes utilisateurs\
          \ s\xE9par\xE9s pour les activit\xE9s non administratives. R\xE9\xE9valuer\
          \ les privil\xE8ges p\xE9riodiquement. Maintenir la s\xE9paration des t\xE2\
          ches entre plusieurs individus et r\xF4les."
      pt:
        name: "Separa\xE7\xE3o de Contas Privilegiadas"
        description: "Garanta que as contas de usu\xE1rio n\xE3o tenham privil\xE9\
          gios de administrador. Os administradores mant\xEAm contas de usu\xE1rio\
          \ separadas para atividades n\xE3o administrativas. Reavalie os privil\xE9\
          gios de forma recorrente. Mantenha a segrega\xE7\xE3o de fun\xE7\xF5es entre\
          \ m\xFAltiplos indiv\xEDduos/pap\xE9is."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-21
    ref_id: RC.21
    name: Least Privilege Implementation
    category: process
    csf_function: protect
    description: All user accounts, system roles, and processes operate with minimum
      privileges necessary for their tasks. Perform quarterly reviews of access permissions
      and role assignments validating policy compliance.
    translations:
      fr:
        name: "Mise en \u0153uvre du moindre privil\xE8ge"
        description: "Tous les comptes utilisateurs, r\xF4les syst\xE8me et processus\
          \ fonctionnent avec les privil\xE8ges minimaux n\xE9cessaires \xE0 leurs\
          \ t\xE2ches. Effectuer des revues trimestrielles des permissions d'acc\xE8\
          s et des attributions de r\xF4les pour valider la conformit\xE9 \xE0 la\
          \ politique."
      pt:
        name: "Implementa\xE7\xE3o do Privil\xE9gio M\xEDnimo"
        description: "Todas as contas de usu\xE1rio, pap\xE9is de sistema e processos\
          \ operam com os privil\xE9gios m\xEDnimos necess\xE1rios para suas tarefas.\
          \ Realize revis\xF5es trimestrais das permiss\xF5es de acesso e atribui\xE7\
          \xF5es de pap\xE9is, validando a conformidade com a pol\xEDtica."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-22
    ref_id: RC.22
    name: Network Segmentation
    category: technical
    csf_function: protect
    description: Place routers between networks creating boundaries, increasing broadcast
      domains, and filtering broadcast traffic. Use boundaries to contain security
      breaches by restricting traffic to separate segments. Physically segment OT
      enclaves (e.g., data diodes) when applicable.
    translations:
      fr:
        name: "Segmentation r\xE9seau"
        description: "Placer des routeurs entre les r\xE9seaux cr\xE9ant des limites,\
          \ augmentant les domaines de diffusion et filtrant le trafic. Utiliser les\
          \ limites pour contenir les violations de s\xE9curit\xE9 en restreignant\
          \ le trafic \xE0 des segments s\xE9par\xE9s. Segmenter physiquement les\
          \ enclaves OT (par ex. diodes de donn\xE9es) le cas \xE9ch\xE9ant."
      pt:
        name: "Segmenta\xE7\xE3o de Rede"
        description: "Posicione roteadores entre redes criando fronteiras, aumentando\
          \ os dom\xEDnios de broadcast e filtrando o tr\xE1fego de broadcast. Use\
          \ as fronteiras para conter viola\xE7\xF5es de seguran\xE7a restringindo\
          \ o tr\xE1fego a segmentos separados. Segmente fisicamente os enclaves de\
          \ OT (por exemplo, data diodes) quando aplic\xE1vel."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-23
    ref_id: RC.23
    name: Cybersecurity Awareness and Training Program
    category: process
    csf_function: protect
    description: Provide initial cybersecurity training before new employees access
      systems. Provide at least annual training covering social engineering, attack
      reporting, acceptable use, and basic cyber hygiene. Identify specialized roles
      requiring additional training. Provide OT personnel security awareness training.
    translations:
      fr:
        name: "Programme de sensibilisation et de formation \xE0 la cybers\xE9curit\xE9"
        description: "Fournir une formation initiale \xE0 la cybers\xE9curit\xE9 avant\
          \ que les nouveaux employ\xE9s n'acc\xE8dent aux syst\xE8mes. Fournir au\
          \ moins une formation annuelle couvrant l'ing\xE9nierie sociale, le signalement\
          \ des attaques, l'utilisation acceptable et l'hygi\xE8ne cyber de base.\
          \ Identifier les r\xF4les sp\xE9cialis\xE9s n\xE9cessitant une formation\
          \ compl\xE9mentaire. Former le personnel OT \xE0 la sensibilisation \xE0\
          \ la s\xE9curit\xE9."
      pt:
        name: "Programa de Conscientiza\xE7\xE3o e Treinamento em Ciberseguran\xE7\
          a"
        description: "Fornecer treinamento inicial de ciberseguran\xE7a antes que\
          \ novos colaboradores acessem os sistemas. Fornecer treinamento no m\xED\
          nimo anual abrangendo engenharia social, comunica\xE7\xE3o de ataques, uso\
          \ aceit\xE1vel e higiene cibern\xE9tica b\xE1sica. Identificar fun\xE7\xF5\
          es especializadas que exigem treinamento adicional. Fornecer treinamento\
          \ de conscientiza\xE7\xE3o em seguran\xE7a para o pessoal de OT."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-24
    ref_id: RC.24
    name: Encryption and Cryptographic Controls
    category: technical
    csf_function: protect
    description: Use encryption, digital signatures, and cryptographic hashes protecting
      network communication confidentiality and integrity. Identify critical data
      for protection in transit and at rest. Prevent plaintext storage of sensitive
      data and passwords. Use encryption for OT external connections where latency
      permits.
    translations:
      fr:
        name: "Chiffrement et contr\xF4les cryptographiques"
        description: "Utiliser le chiffrement, les signatures num\xE9riques et les\
          \ condensats cryptographiques pour prot\xE9ger la confidentialit\xE9 et\
          \ l'int\xE9grit\xE9 des communications r\xE9seau. Identifier les donn\xE9\
          es critiques \xE0 prot\xE9ger en transit et au repos. Emp\xEAcher le stockage\
          \ en clair des donn\xE9es sensibles et des mots de passe. Utiliser le chiffrement\
          \ pour les connexions OT externes lorsque la latence le permet."
      pt:
        name: "Criptografia e Controles Criptogr\xE1ficos"
        description: "Utilizar criptografia, assinaturas digitais e hashes criptogr\xE1\
          ficos para proteger a confidencialidade e a integridade das comunica\xE7\
          \xF5es de rede. Identificar dados cr\xEDticos para prote\xE7\xE3o em tr\xE2\
          nsito e em repouso. Impedir o armazenamento em texto puro de dados sens\xED\
          veis e senhas. Utilizar criptografia para conex\xF5es externas de OT onde\
          \ a lat\xEAncia permitir."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-25
    ref_id: RC.25
    name: Email Security Configuration
    category: technical
    csf_function: protect
    description: Enable STARTTLS, SPF, DKIM, and DMARC (set to reject) on all corporate
      email infrastructure to reduce risk from spoofing, phishing, and interception.
    translations:
      fr:
        name: "Configuration de la s\xE9curit\xE9 des courriels"
        description: "Activer STARTTLS, SPF, DKIM et DMARC (configur\xE9 sur \xAB\
          \ reject \xBB) sur toute l'infrastructure de messagerie d'entreprise pour\
          \ r\xE9duire les risques d'usurpation d'identit\xE9, d'hame\xE7onnage et\
          \ d'interception."
      pt:
        name: "Configura\xE7\xE3o de Seguran\xE7a de E-mail"
        description: "Habilitar STARTTLS, SPF, DKIM e DMARC (configurado para rejei\xE7\
          \xE3o) em toda a infraestrutura corporativa de e-mail para reduzir o risco\
          \ de falsifica\xE7\xE3o (spoofing), phishing e intercepta\xE7\xE3o."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-26
    ref_id: RC.26
    name: Macro and Autorun Restriction
    category: technical
    csf_function: protect
    description: Enforce system-wide policy disabling macros or similar embedded code
      by default. Establish policy for authorized macro enablement on specific assets.
      Disable Autorun/AutoPlay by default preventing unintentional code execution.
    translations:
      fr:
        name: "Restriction des macros et de l'ex\xE9cution automatique"
        description: "Appliquer une politique syst\xE8me d\xE9sactivant par d\xE9\
          faut les macros ou le code embarqu\xE9 similaire. \xC9tablir une politique\
          \ pour l'activation autoris\xE9e des macros sur des actifs sp\xE9cifiques.\
          \ D\xE9sactiver l'ex\xE9cution automatique (Autorun/AutoPlay) par d\xE9\
          faut pour pr\xE9venir l'ex\xE9cution involontaire de code."
      pt:
        name: "Restri\xE7\xE3o de Macros e Execu\xE7\xE3o Autom\xE1tica"
        description: "Aplicar pol\xEDtica em todo o sistema que desabilite macros\
          \ ou c\xF3digo incorporado semelhante por padr\xE3o. Estabelecer pol\xED\
          tica para habilita\xE7\xE3o autorizada de macros em ativos espec\xEDficos.\
          \ Desabilitar Autorun/AutoPlay por padr\xE3o, evitando a execu\xE7\xE3o\
          \ n\xE3o intencional de c\xF3digo."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-27
    ref_id: RC.27
    name: Secure Change Management Process
    category: process
    csf_function: protect
    description: Implement policies and processes for secure change management. Enforce
      configuration restrictions preventing unauthorized changes. Test and document
      proposed changes in non-production environments. Implement OT limited functionality
      permitting only necessary functions, protocols, and services.
    translations:
      fr:
        name: "Processus de gestion s\xE9curis\xE9e des changements"
        description: "Mettre en \u0153uvre des politiques et processus de gestion\
          \ s\xE9curis\xE9e des changements. Appliquer des restrictions de configuration\
          \ emp\xEAchant les modifications non autoris\xE9es. Tester et documenter\
          \ les changements propos\xE9s dans des environnements hors production. Mettre\
          \ en \u0153uvre une fonctionnalit\xE9 limit\xE9e pour les OT ne permettant\
          \ que les fonctions, protocoles et services n\xE9cessaires."
      pt:
        name: "Processo Seguro de Gest\xE3o de Mudan\xE7as"
        description: "Implementar pol\xEDticas e processos para a gest\xE3o segura\
          \ de mudan\xE7as. Aplicar restri\xE7\xF5es de configura\xE7\xE3o que impe\xE7\
          am altera\xE7\xF5es n\xE3o autorizadas. Testar e documentar as mudan\xE7\
          as propostas em ambientes que n\xE3o sejam de produ\xE7\xE3o. Implementar\
          \ funcionalidade limitada em OT, permitindo apenas as fun\xE7\xF5es, protocolos\
          \ e servi\xE7os necess\xE1rios."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-28
    ref_id: RC.28
    name: Backup and Recovery Program
    category: process
    csf_function: protect
    description: Develop list of all maintained backups including installation media,
      license keys, configuration information, and retention periods. Back up critical
      operations in near-real-time. Securely store backups offsite and offline. Test
      backups and recovery minimum annually. Validate integrity before restoration.
      Include OT device configurations and engineering drawings.
    translations:
      fr:
        name: "Programme de sauvegarde et de r\xE9cup\xE9ration"
        description: "D\xE9velopper la liste de toutes les sauvegardes maintenues\
          \ incluant les supports d'installation, les cl\xE9s de licence, les informations\
          \ de configuration et les dur\xE9es de r\xE9tention. Sauvegarder les op\xE9\
          rations critiques en quasi-temps r\xE9el. Stocker les sauvegardes hors site\
          \ et hors ligne de mani\xE8re s\xE9curis\xE9e. Tester les sauvegardes et\
          \ la r\xE9cup\xE9ration au minimum annuellement. Valider l'int\xE9grit\xE9\
          \ avant la restauration. Inclure les configurations des \xE9quipements OT\
          \ et les sch\xE9mas techniques."
      pt:
        name: "Programa de Backup e Recupera\xE7\xE3o"
        description: "Desenvolver uma lista de todos os backups mantidos, incluindo\
          \ m\xEDdias de instala\xE7\xE3o, chaves de licen\xE7a, informa\xE7\xF5es\
          \ de configura\xE7\xE3o e per\xEDodos de reten\xE7\xE3o. Realizar backup\
          \ das opera\xE7\xF5es cr\xEDticas em tempo quase real. Armazenar os backups\
          \ de forma segura, fora do local (offsite) e desconectados (offline). Testar\
          \ os backups e a recupera\xE7\xE3o no m\xEDnimo anualmente. Validar a integridade\
          \ antes da restaura\xE7\xE3o. Incluir configura\xE7\xF5es de dispositivos\
          \ de OT e desenhos de engenharia."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-29
    ref_id: RC.29
    name: Hardware and Software Approval Process
    category: process
    csf_function: protect
    description: Implement administrative policy requiring review, testing, and approval
      before new hardware, firmware, or software installation. Maintain approved list
      including versions. Consider OT environment additional requirements for patches/updates
      ensuring no operational or safety impact.
    translations:
      fr:
        name: "Processus d'approbation du mat\xE9riel et des logiciels"
        description: "Mettre en \u0153uvre une politique administrative exigeant la\
          \ revue, les tests et l'approbation avant l'installation de tout nouveau\
          \ mat\xE9riel, micrologiciel ou logiciel. Maintenir une liste approuv\xE9\
          e incluant les versions. Prendre en compte les exigences suppl\xE9mentaires\
          \ de l'environnement OT pour les correctifs et mises \xE0 jour afin de ne\
          \ pas impacter les op\xE9rations ou la s\xFBret\xE9."
      pt:
        name: "Processo de Aprova\xE7\xE3o de Hardware e Software"
        description: "Implementar pol\xEDtica administrativa que exija revis\xE3o,\
          \ teste e aprova\xE7\xE3o antes da instala\xE7\xE3o de novo hardware, firmware\
          \ ou software. Manter uma lista de itens aprovados, incluindo vers\xF5es.\
          \ Considerar requisitos adicionais do ambiente de OT para corre\xE7\xF5\
          es/atualiza\xE7\xF5es, garantindo a aus\xEAncia de impacto operacional ou\
          \ de seguran\xE7a f\xEDsica."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-30
    ref_id: RC.30
    name: Security Log Collection and Management
    category: technical
    csf_function: protect
    description: Collect and store administrative/security-focused logs (OS, applications,
      IDS/IPS, firewalls, DLP, VPNs). Store logs centrally in SIEM or database with
      restricted access. Store logs per risk-informed duration or regulatory guidelines.
      For OT assets with non-standard logs, collect network traffic.
    translations:
      fr:
        name: "Collecte et gestion des journaux de s\xE9curit\xE9"
        description: "Collecter et stocker les journaux d'administration et de s\xE9\
          curit\xE9 (syst\xE8mes d'exploitation, applications, IDS/IPS, pare-feux,\
          \ DLP, VPN). Stocker les journaux de mani\xE8re centralis\xE9e dans un SIEM\
          \ ou une base de donn\xE9es avec acc\xE8s restreint. Conserver les journaux\
          \ selon des dur\xE9es adapt\xE9es au risque ou aux exigences r\xE9glementaires.\
          \ Pour les actifs OT avec des journaux non standards, collecter le trafic\
          \ r\xE9seau."
      pt:
        name: "Coleta e Gest\xE3o de Logs de Seguran\xE7a"
        description: "Coletar e armazenar logs administrativos e voltados \xE0 seguran\xE7\
          a (SO, aplica\xE7\xF5es, IDS/IPS, firewalls, DLP, VPNs). Armazenar os logs\
          \ de forma centralizada em um SIEM ou banco de dados com acesso restrito.\
          \ Armazenar os logs pelo per\xEDodo definido com base no risco ou conforme\
          \ as diretrizes regulat\xF3rias. Para ativos de OT com logs n\xE3o padronizados,\
          \ coletar o tr\xE1fego de rede."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-31
    ref_id: RC.31
    name: Removable Media and Unauthorized Device Controls
    category: technical
    csf_function: protect
    description: Maintain policies ensuring unauthorized media and hardware don't
      connect to IT/OT assets. Establish procedures removing, disabling, or securing
      physical ports preventing unauthorized device connection.
    translations:
      fr:
        name: "Contr\xF4les des supports amovibles et des dispositifs non autoris\xE9\
          s"
        description: "Maintenir des politiques garantissant que les supports et mat\xE9\
          riels non autoris\xE9s ne se connectent pas aux actifs IT/OT. \xC9tablir\
          \ des proc\xE9dures pour retirer, d\xE9sactiver ou s\xE9curiser les ports\
          \ physiques afin d'emp\xEAcher la connexion de dispositifs non autoris\xE9\
          s."
      pt:
        name: "Controles de M\xEDdia Remov\xEDvel e Dispositivos N\xE3o Autorizados"
        description: "Manter pol\xEDticas que garantam que m\xEDdias e hardware n\xE3\
          o autorizados n\xE3o se conectem a ativos de TI/OT. Estabelecer procedimentos\
          \ para remover, desabilitar ou proteger portas f\xEDsicas, impedindo a conex\xE3\
          o de dispositivos n\xE3o autorizados."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-32
    ref_id: RC.32
    name: Internet-Facing Device Hardening
    category: technical
    csf_function: protect
    description: Minimize internet-facing assets. Prioritize timely patches/updates.
      Disable unnecessary OS applications and network protocols. Never expose network
      management interfaces to public internet. Logically segment networks per trust
      boundaries and platform types.
    translations:
      fr:
        name: "Durcissement des dispositifs expos\xE9s \xE0 Internet"
        description: "Minimiser les actifs expos\xE9s \xE0 Internet. Prioriser les\
          \ correctifs et mises \xE0 jour en temps voulu. D\xE9sactiver les applications\
          \ et protocoles r\xE9seau inutiles du syst\xE8me d'exploitation. Ne jamais\
          \ exposer les interfaces de gestion r\xE9seau sur l'Internet public. Segmenter\
          \ logiquement les r\xE9seaux selon les p\xE9rim\xE8tres de confiance et\
          \ les types de plateformes."
      pt:
        name: "Fortalecimento (Hardening) de Dispositivos Expostos \xE0 Internet"
        description: "Minimizar os ativos expostos \xE0 internet. Priorizar corre\xE7\
          \xF5es/atualiza\xE7\xF5es em tempo h\xE1bil. Desabilitar aplica\xE7\xF5\
          es do SO e protocolos de rede desnecess\xE1rios. Nunca expor interfaces\
          \ de gerenciamento de rede \xE0 internet p\xFAblica. Segmentar logicamente\
          \ as redes conforme as fronteiras de confian\xE7a e os tipos de plataforma."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-33
    ref_id: RC.33
    name: Malicious Code Detection and Prevention
    category: technical
    csf_function: detect
    description: Implement signature-based and non-signature-based mechanisms (behavior,
      heuristics, anomalies) detecting/eradicating malicious code at endpoints. Ensure
      antivirus software is updated, active, and configured for auto-scanning. Use
      OT-compatible antivirus with special change management practices.
    translations:
      fr:
        name: "D\xE9tection et pr\xE9vention du code malveillant"
        description: "Mettre en \u0153uvre des m\xE9canismes bas\xE9s sur les signatures\
          \ et non bas\xE9s sur les signatures (comportement, heuristique, anomalies)\
          \ pour d\xE9tecter et \xE9radiquer le code malveillant sur les terminaux.\
          \ S'assurer que l'antivirus est \xE0 jour, actif et configur\xE9 pour l'analyse\
          \ automatique. Utiliser un antivirus compatible OT avec des pratiques sp\xE9\
          ciales de gestion des changements."
      pt:
        name: "Detec\xE7\xE3o e Preven\xE7\xE3o de C\xF3digo Malicioso"
        description: "Implementar mecanismos baseados em assinatura e n\xE3o baseados\
          \ em assinatura (comportamento, heur\xEDstica, anomalias) para detectar/erradicar\
          \ c\xF3digo malicioso nos endpoints. Garantir que o software antiv\xEDrus\
          \ esteja atualizado, ativo e configurado para varredura autom\xE1tica. Utilizar\
          \ antiv\xEDrus compat\xEDvel com OT, com pr\xE1ticas especiais de gest\xE3\
          o de mudan\xE7as."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-34
    ref_id: RC.34
    name: Adverse Event Identification and Analysis
    category: process
    csf_function: detect
    description: Define clear adverse event criteria and processes. Escalate suspected
      events per incident response plan. Automate event information analysis. Conduct
      analyst role-specific training. Account for OT-specific events and anomalies.
    translations:
      fr:
        name: "Identification et analyse des \xE9v\xE9nements ind\xE9sirables"
        description: "D\xE9finir des crit\xE8res et des processus clairs pour les\
          \ \xE9v\xE9nements ind\xE9sirables. Escalader les \xE9v\xE9nements suspects\
          \ selon le plan de r\xE9ponse aux incidents. Automatiser l'analyse des informations\
          \ sur les \xE9v\xE9nements. Former les analystes aux protocoles sp\xE9cifiques.\
          \ Prendre en compte les \xE9v\xE9nements et anomalies sp\xE9cifiques aux\
          \ OT."
      pt:
        name: "Identifica\xE7\xE3o e An\xE1lise de Eventos Adversos"
        description: "Definir crit\xE9rios e processos claros para eventos adversos.\
          \ Escalar eventos suspeitos conforme o plano de resposta a incidentes. Automatizar\
          \ a an\xE1lise das informa\xE7\xF5es de eventos. Realizar treinamento espec\xED\
          fico para a fun\xE7\xE3o de analista. Considerar eventos e anomalias espec\xED\
          ficos de OT."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-35
    ref_id: RC.35
    name: Incident Communication Procedures
    category: process
    csf_function: respond
    description: Design communications plan identifying stakeholders and coordination
      mechanisms during incidents. Securely share information per response plans.
      Regularly update senior leadership. Notify HR on insider threats. Establish
      media communications procedures.
    translations:
      fr:
        name: "Proc\xE9dures de communication en cas d'incident"
        description: "Concevoir un plan de communication identifiant les parties prenantes\
          \ et les m\xE9canismes de coordination lors des incidents. Partager l'information\
          \ de mani\xE8re s\xE9curis\xE9e selon les plans de r\xE9ponse. Informer\
          \ r\xE9guli\xE8rement la direction. Notifier les RH en cas de menace interne.\
          \ \xC9tablir des proc\xE9dures de communication m\xE9diatique."
      pt:
        name: "Procedimentos de Comunica\xE7\xE3o de Incidentes"
        description: "Elaborar um plano de comunica\xE7\xE3o que identifique as partes\
          \ interessadas e os mecanismos de coordena\xE7\xE3o durante incidentes.\
          \ Compartilhar informa\xE7\xF5es de forma segura conforme os planos de resposta.\
          \ Atualizar regularmente a alta lideran\xE7a. Notificar o RH sobre amea\xE7\
          as internas. Estabelecer procedimentos de comunica\xE7\xE3o com a imprensa."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-36
    ref_id: RC.36
    name: Incident Reporting Procedures
    category: process
    csf_function: respond
    description: Maintain policy and procedures on reporting confirmed incidents to
      external entities (regulators, SRMAs, ISACs, ISAOs, CISA). Report within regulatory
      timeframes or as soon as safely feasible.
    translations:
      fr:
        name: "Proc\xE9dures de signalement des incidents"
        description: "Maintenir une politique et des proc\xE9dures de signalement\
          \ des incidents confirm\xE9s aux entit\xE9s externes (r\xE9gulateurs, autorit\xE9\
          s sectorielles, ISAC, ISAO, CISA). Signaler dans les d\xE9lais r\xE9glementaires\
          \ ou d\xE8s que possible en toute s\xE9curit\xE9."
      pt:
        name: "Procedimentos de Notifica\xE7\xE3o de Incidentes"
        description: "Manter pol\xEDtica e procedimentos para a notifica\xE7\xE3o\
          \ de incidentes confirmados a entidades externas (reguladores, SRMAs, ISACs,\
          \ ISAOs, CISA). Notificar dentro dos prazos regulat\xF3rios ou o mais breve\
          \ poss\xEDvel de forma segura."
  - urn: urn:intuitem:risk:function:cisa-cpg-2.0:rc-37
    ref_id: RC.37
    name: Incident Recovery and Lessons Learned
    category: process
    csf_function: recover
    description: Execute plans recovering/restoring service to critical assets impacted
      by incidents. Enable degraded operations (paper, radio). Complete post-incident
      analysis identifying improvement areas. Incorporate lessons learned. Update
      policies, procedures, and training.
    translations:
      fr:
        name: "R\xE9cup\xE9ration apr\xE8s incident et retour d'exp\xE9rience"
        description: "Ex\xE9cuter les plans de r\xE9cup\xE9ration et de restauration\
          \ des services pour les actifs critiques impact\xE9s par les incidents.\
          \ Permettre les op\xE9rations en mode d\xE9grad\xE9 (papier, radio). R\xE9\
          aliser une analyse post-incident identifiant les axes d'am\xE9lioration.\
          \ Int\xE9grer les retours d'exp\xE9rience. Mettre \xE0 jour les politiques,\
          \ proc\xE9dures et formations."
      pt:
        name: "Recupera\xE7\xE3o de Incidentes e Li\xE7\xF5es Aprendidas"
        description: "Executar planos para recuperar/restaurar os servi\xE7os dos\
          \ ativos cr\xEDticos impactados por incidentes. Possibilitar opera\xE7\xF5\
          es em modo degradado (papel, r\xE1dio). Concluir a an\xE1lise p\xF3s-incidente\
          \ identificando \xE1reas de melhoria. Incorporar as li\xE7\xF5es aprendidas.\
          \ Atualizar pol\xEDticas, procedimentos e treinamentos."
  threats:
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-01
    ref_id: T.01
    name: Insufficient Cybersecurity Governance
    description: Lack of sufficient cybersecurity accountability, investment, or effectiveness
      due to absent or inadequate policies, roles, and procedures for managing cybersecurity
      risk.
    translations:
      fr:
        name: "Gouvernance insuffisante de la cybers\xE9curit\xE9"
        description: "Manque de responsabilit\xE9, d'investissement ou d'efficacit\xE9\
          \ en mati\xE8re de cybers\xE9curit\xE9 en raison de l'absence ou de l'inad\xE9\
          quation des politiques, des r\xF4les et des proc\xE9dures de gestion des\
          \ risques cyber."
      pt:
        name: "Governan\xE7a de Ciberseguran\xE7a Insuficiente"
        description: "Falta de responsabiliza\xE7\xE3o, investimento ou efic\xE1cia\
          \ suficientes em ciberseguran\xE7a devido \xE0 aus\xEAncia ou inadequa\xE7\
          \xE3o de pol\xEDticas, pap\xE9is e procedimentos para gerenciar o risco\
          \ de ciberseguran\xE7a."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-02
    ref_id: T.02
    name: Ineffective Incident Response
    description: Inability to quickly and effectively isolate, contain, eradicate,
      remediate, and communicate about cybersecurity incidents. Communication failures
      slow resolution, increase downtime, and amplify damage.
    translations:
      fr:
        name: "R\xE9ponse aux incidents inefficace"
        description: "Incapacit\xE9 \xE0 isoler, contenir, \xE9radiquer, rem\xE9dier\
          \ et communiquer rapidement et efficacement lors d'incidents de cybers\xE9\
          curit\xE9. Les d\xE9faillances de communication ralentissent la r\xE9solution,\
          \ augmentent les temps d'arr\xEAt et amplifient les dommages."
      pt:
        name: Resposta a Incidentes Ineficaz
        description: "Incapacidade de isolar, conter, erradicar, remediar e comunicar\
          \ de forma r\xE1pida e eficaz sobre incidentes de ciberseguran\xE7a. Falhas\
          \ de comunica\xE7\xE3o retardam a resolu\xE7\xE3o, aumentam o tempo de inatividade\
          \ e amplificam os danos."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-03
    ref_id: T.03
    name: Supply Chain Compromise
    description: Adversaries exploit vulnerabilities by abusing trusted third-party
      relationships, manipulating products or delivery mechanisms before they reach
      final users, or compromising vendor environments.
    translations:
      fr:
        name: "Compromission de la cha\xEEne d'approvisionnement"
        description: "Les adversaires exploitent les vuln\xE9rabilit\xE9s en abusant\
          \ des relations de confiance avec des tiers, en manipulant les produits\
          \ ou les m\xE9canismes de livraison avant qu'ils n'atteignent les utilisateurs\
          \ finaux, ou en compromettant les environnements des fournisseurs."
      pt:
        name: Comprometimento da Cadeia de Suprimentos
        description: "Advers\xE1rios exploram vulnerabilidades abusando de rela\xE7\
          \xF5es de confian\xE7a com terceiros, manipulando produtos ou mecanismos\
          \ de entrega antes que cheguem aos usu\xE1rios finais, ou comprometendo\
          \ os ambientes de fornecedores."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-04
    ref_id: T.04
    name: Exploitation of Known Vulnerabilities
    description: Adversaries target unpatched and misconfigured systems, particularly
      those exposed to the internet, leveraging software vulnerabilities, temporary
      malfunctions, or configuration errors to gain initial access.
    translations:
      fr:
        name: "Exploitation de vuln\xE9rabilit\xE9s connues"
        description: "Les adversaires ciblent les syst\xE8mes non corrig\xE9s et mal\
          \ configur\xE9s, en particulier ceux expos\xE9s \xE0 Internet, en exploitant\
          \ les vuln\xE9rabilit\xE9s logicielles, les dysfonctionnements temporaires\
          \ ou les erreurs de configuration pour obtenir un acc\xE8s initial."
      pt:
        name: "Explora\xE7\xE3o de Vulnerabilidades Conhecidas"
        description: "Advers\xE1rios t\xEAm como alvo sistemas sem corre\xE7\xF5es\
          \ e mal configurados, especialmente aqueles expostos \xE0 internet, aproveitando\
          \ vulnerabilidades de software, falhas tempor\xE1rias ou erros de configura\xE7\
          \xE3o para obter acesso inicial."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-05
    ref_id: T.05
    name: Unvalidated Security Controls
    description: Gaps in cyber defenses or overconfidence in existing protections
      due to lack of independent validation that implemented controls are properly
      configured and working as intended.
    translations:
      fr:
        name: "Contr\xF4les de s\xE9curit\xE9 non valid\xE9s"
        description: "Lacunes dans les d\xE9fenses cyber ou exc\xE8s de confiance\
          \ dans les protections existantes en raison d'un manque de validation ind\xE9\
          pendante du bon fonctionnement et de la configuration des contr\xF4les mis\
          \ en place."
      pt:
        name: "Controles de Seguran\xE7a N\xE3o Validados"
        description: "Lacunas nas defesas cibern\xE9ticas ou excesso de confian\xE7\
          a nas prote\xE7\xF5es existentes devido \xE0 falta de valida\xE7\xE3o independente\
          \ de que os controles implementados est\xE3o devidamente configurados e\
          \ funcionando conforme o esperado."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-06
    ref_id: T.06
    name: Insufficient Asset and Network Visibility
    description: Incomplete or inaccurate understanding of organizational assets,
      network topology, and security logs inhibits effective detection, incident response,
      and recovery.
    translations:
      fr:
        name: "Visibilit\xE9 insuffisante des actifs et du r\xE9seau"
        description: "Compr\xE9hension incompl\xE8te ou inexacte des actifs organisationnels,\
          \ de la topologie r\xE9seau et des journaux de s\xE9curit\xE9, entravant\
          \ la d\xE9tection efficace, la r\xE9ponse aux incidents et la reprise d'activit\xE9\
          ."
      pt:
        name: Visibilidade Insuficiente de Ativos e da Rede
        description: "O entendimento incompleto ou impreciso dos ativos organizacionais,\
          \ da topologia de rede e dos logs de seguran\xE7a inibe a detec\xE7\xE3\
          o, a resposta a incidentes e a recupera\xE7\xE3o eficazes."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-07
    ref_id: T.07
    name: Default Credential Exploitation
    description: Adversaries acquire and exploit default manufacturer account credentials
      to gain initial access, maintain persistence, escalate privileges, or evade
      defenses.
    translations:
      fr:
        name: "Exploitation des identifiants par d\xE9faut"
        description: "Les adversaires acqui\xE8rent et exploitent les identifiants\
          \ de comptes par d\xE9faut du fabricant pour obtenir un acc\xE8s initial,\
          \ maintenir la persistance, \xE9lever les privil\xE8ges ou contourner les\
          \ d\xE9fenses."
      pt:
        name: "Explora\xE7\xE3o de Credenciais Padr\xE3o"
        description: "Advers\xE1rios obt\xEAm e exploram credenciais de contas padr\xE3\
          o do fabricante para obter acesso inicial, manter persist\xEAncia, escalar\
          \ privil\xE9gios ou evadir defesas."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-08
    ref_id: T.08
    name: Brute Force and Password Attacks
    description: Adversaries use brute force techniques to crack passwords, systematically
      guessing credentials using repetitive or iterative methods against unknown passwords
      or obtained hashes.
    translations:
      fr:
        name: Attaques par force brute et sur les mots de passe
        description: "Les adversaires utilisent des techniques de force brute pour\
          \ craquer les mots de passe, en devinant syst\xE9matiquement les identifiants\
          \ par des m\xE9thodes r\xE9p\xE9titives ou it\xE9ratives sur des mots de\
          \ passe inconnus ou des condensats obtenus."
      pt:
        name: "Ataques de For\xE7a Bruta e de Senha"
        description: "Advers\xE1rios utilizam t\xE9cnicas de for\xE7a bruta para quebrar\
          \ senhas, adivinhando credenciais de forma sistem\xE1tica por meio de m\xE9\
          todos repetitivos ou iterativos contra senhas desconhecidas ou hashes obtidos."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-09
    ref_id: T.09
    name: Credential Theft and Misuse
    description: Adversaries obtain and exploit account credentials through theft,
      reuse, or abuse of inactive accounts to gain access, maintain persistence, escalate
      privileges, or bypass network access controls.
    translations:
      fr:
        name: Vol et utilisation abusive d'identifiants
        description: "Les adversaires obtiennent et exploitent des identifiants de\
          \ comptes par vol, r\xE9utilisation ou abus de comptes inactifs pour obtenir\
          \ un acc\xE8s, maintenir la persistance, \xE9lever les privil\xE8ges ou\
          \ contourner les contr\xF4les d'acc\xE8s r\xE9seau."
      pt:
        name: Roubo e Uso Indevido de Credenciais
        description: "Advers\xE1rios obt\xEAm e exploram credenciais de contas por\
          \ meio de roubo, reutiliza\xE7\xE3o ou abuso de contas inativas para obter\
          \ acesso, manter persist\xEAncia, escalar privil\xE9gios ou contornar controles\
          \ de acesso \xE0 rede."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-10
    ref_id: T.10
    name: Unauthorized Access and Lateral Movement
    description: Unauthorized access to network resources enabling adversaries to
      move across systems undetected, escalate privileges, and compromise sensitive
      data and critical systems.
    translations:
      fr:
        name: "Acc\xE8s non autoris\xE9 et mouvement lat\xE9ral"
        description: "Acc\xE8s non autoris\xE9 aux ressources r\xE9seau permettant\
          \ aux adversaires de se d\xE9placer entre les syst\xE8mes sans \xEAtre d\xE9\
          tect\xE9s, d'\xE9lever les privil\xE8ges et de compromettre les donn\xE9\
          es sensibles et les syst\xE8mes critiques."
      pt:
        name: "Acesso N\xE3o Autorizado e Movimenta\xE7\xE3o Lateral"
        description: "Acesso n\xE3o autorizado a recursos de rede que permite aos\
          \ advers\xE1rios se moverem entre sistemas sem serem detectados, escalar\
          \ privil\xE9gios e comprometer dados sens\xEDveis e sistemas cr\xEDticos."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-11
    ref_id: T.11
    name: Social Engineering and Phishing
    description: Adversaries use deceptive emails, malicious attachments or links,
      and social engineering tactics to trick users into revealing sensitive information,
      executing malicious code, or granting unauthorized access.
    translations:
      fr:
        name: "Ing\xE9nierie sociale et hame\xE7onnage"
        description: "Les adversaires utilisent des courriels trompeurs, des pi\xE8\
          ces jointes ou liens malveillants et des tactiques d'ing\xE9nierie sociale\
          \ pour inciter les utilisateurs \xE0 divulguer des informations sensibles,\
          \ ex\xE9cuter du code malveillant ou accorder un acc\xE8s non autoris\xE9\
          ."
      pt:
        name: Engenharia Social e Phishing
        description: "Advers\xE1rios utilizam e-mails enganosos, anexos ou links maliciosos\
          \ e t\xE1ticas de engenharia social para induzir usu\xE1rios a revelar informa\xE7\
          \xF5es sens\xEDveis, executar c\xF3digo malicioso ou conceder acesso n\xE3\
          o autorizado."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-12
    ref_id: T.12
    name: Network Interception and Data Manipulation
    description: Adversaries position themselves between networked devices to enable
      network sniffing and data manipulation, or steal operational data for personal
      gain or future operations.
    translations:
      fr:
        name: "Interception r\xE9seau et manipulation de donn\xE9es"
        description: "Les adversaires se positionnent entre les \xE9quipements r\xE9\
          seau pour permettre l'\xE9coute et la manipulation de donn\xE9es, ou voler\
          \ des donn\xE9es op\xE9rationnelles \xE0 des fins personnelles ou pour de\
          \ futures op\xE9rations."
      pt:
        name: "Intercepta\xE7\xE3o de Rede e Manipula\xE7\xE3o de Dados"
        description: "Advers\xE1rios se posicionam entre dispositivos em rede para\
          \ possibilitar a captura de tr\xE1fego (sniffing) e a manipula\xE7\xE3o\
          \ de dados, ou roubam dados operacionais para ganho pessoal ou opera\xE7\
          \xF5es futuras."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-13
    ref_id: T.13
    name: Uncontained Network Compromise
    description: If a network is compromised by an unauthorized user, lack of segmentation
      allows malicious activity to spread uncontrolled across networks and critical
      infrastructure.
    translations:
      fr:
        name: "Compromission r\xE9seau non contenue"
        description: "Si un r\xE9seau est compromis par un utilisateur non autoris\xE9\
          , l'absence de segmentation permet \xE0 l'activit\xE9 malveillante de se\
          \ propager de mani\xE8re incontr\xF4l\xE9e \xE0 travers les r\xE9seaux et\
          \ les infrastructures critiques."
      pt:
        name: "Comprometimento de Rede N\xE3o Contido"
        description: "Se uma rede for comprometida por um usu\xE1rio n\xE3o autorizado,\
          \ a falta de segmenta\xE7\xE3o permite que a atividade maliciosa se espalhe\
          \ sem controle por redes e infraestruturas cr\xEDticas."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-14
    ref_id: T.14
    name: Malware and Malicious Code
    description: Adversaries deploy malware including payloads, droppers, and backdoors
      to control remote machines, evade defenses, and execute post-compromise actions.
      Malware can spread via removable media to air-gapped networks.
    translations:
      fr:
        name: Logiciels malveillants et code malveillant
        description: "Les adversaires d\xE9ploient des logiciels malveillants incluant\
          \ des charges utiles, des t\xE9l\xE9chargeurs et des portes d\xE9rob\xE9\
          es pour contr\xF4ler des machines \xE0 distance, contourner les d\xE9fenses\
          \ et ex\xE9cuter des actions post-compromission. Les logiciels malveillants\
          \ peuvent se propager via des supports amovibles vers des r\xE9seaux isol\xE9\
          s."
      pt:
        name: "Malware e C\xF3digo Malicioso"
        description: "Advers\xE1rios implantam malware, incluindo payloads, droppers\
          \ e backdoors, para controlar m\xE1quinas remotas, evadir defesas e executar\
          \ a\xE7\xF5es p\xF3s-comprometimento. O malware pode se propagar por m\xED\
          dias remov\xEDveis para redes isoladas (air-gapped)."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-15
    ref_id: T.15
    name: Unmanaged System Changes
    description: Delayed, insufficient, or incomplete ability to maintain or restore
      functionality of critical devices and service operations due to unauthorized
      or untested changes.
    translations:
      fr:
        name: "Changements syst\xE8me non ma\xEEtris\xE9s"
        description: "Capacit\xE9 retard\xE9e, insuffisante ou incompl\xE8te \xE0\
          \ maintenir ou restaurer le fonctionnement des dispositifs critiques et\
          \ des op\xE9rations de service en raison de changements non autoris\xE9\
          s ou non test\xE9s."
      pt:
        name: "Mudan\xE7as de Sistema N\xE3o Gerenciadas"
        description: "Capacidade atrasada, insuficiente ou incompleta de manter ou\
          \ restaurar a funcionalidade de dispositivos cr\xEDticos e opera\xE7\xF5\
          es de servi\xE7o devido a mudan\xE7as n\xE3o autorizadas ou n\xE3o testadas."
  - urn: urn:intuitem:risk:threat:cisa-cpg-2.0:t-16
    ref_id: T.16
    name: Data Destruction and Service Disruption
    description: Adversaries disrupt critical systems, delete data, and disable recovery
      services to prevent system recovery, causing disruption to asset, service, or
      system availability.
    translations:
      fr:
        name: "Destruction de donn\xE9es et interruption de service"
        description: "Les adversaires perturbent les syst\xE8mes critiques, suppriment\
          \ des donn\xE9es et d\xE9sactivent les services de r\xE9cup\xE9ration pour\
          \ emp\xEAcher la restauration des syst\xE8mes, causant une interruption\
          \ de la disponibilit\xE9 des actifs, services ou syst\xE8mes."
      pt:
        name: "Destrui\xE7\xE3o de Dados e Interrup\xE7\xE3o de Servi\xE7os"
        description: "Advers\xE1rios interrompem sistemas cr\xEDticos, excluem dados\
          \ e desabilitam servi\xE7os de recupera\xE7\xE3o para impedir a restaura\xE7\
          \xE3o do sistema, causando interrup\xE7\xE3o da disponibilidade de ativos,\
          \ servi\xE7os ou sistemas."
  framework:
    urn: urn:intuitem:risk:framework:cisa-cpg-2.0
    ref_id: CISA-CPG-2.0
    name: CISA CPG v2.0
    description: CISA Cross-Sector Cybersecurity Performance Goals 2.0
    min_score: 1
    max_score: 4
    scores_definition:
    - score: 1
      name: Not Implemented
      description: The goal is not addressed. The organization has not taken action
        on the recommended practices, or actions are entirely ad hoc with no documented
        approach.
      translations:
        fr:
          name: "Non mis en \u0153uvre"
          description: "L'objectif n'est pas trait\xE9. L'organisation n'a pris aucune\
            \ mesure concernant les pratiques recommand\xE9es, ou les actions sont\
            \ enti\xE8rement ponctuelles sans approche document\xE9e."
    - score: 2
      name: Partially Implemented
      description: Some recommended actions are in place but implementation is incomplete
        or inconsistent. Practices may be ad hoc or limited to specific areas of the
        organization.
      translations:
        fr:
          name: "Partiellement mis en \u0153uvre"
          description: "Certaines actions recommand\xE9es sont en place mais la mise\
            \ en \u0153uvre est incompl\xE8te ou incoh\xE9rente. Les pratiques peuvent\
            \ \xEAtre ponctuelles ou limit\xE9es \xE0 des domaines sp\xE9cifiques\
            \ de l'organisation."
    - score: 3
      name: Largely Implemented
      description: Most recommended actions are systematically applied across the
        organization. Practices are documented, repeatable, and cover the majority
        of relevant assets and processes.
      translations:
        fr:
          name: "Largement mis en \u0153uvre"
          description: "La plupart des actions recommand\xE9es sont syst\xE9matiquement\
            \ appliqu\xE9es dans l'ensemble de l'organisation. Les pratiques sont\
            \ document\xE9es, reproductibles et couvrent la majorit\xE9 des actifs\
            \ et processus concern\xE9s."
    - score: 4
      name: Fully Implemented
      description: All recommended actions are in place, tested, and continuously
        improved. Practices are organization-wide, regularly reviewed, and adapted
        based on lessons learned and evolving threats.
      translations:
        fr:

          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-49
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-49
      name: Hardware-enforced Separation and Policy Enforcement
      description: 'Implement hardware-enforced separation and policy enforcement
        mechanisms between [Assignment: organization-defined security domains].'
      annotation: System owners may require additional strength of mechanism and robustness
        to ensure domain separation and policy enforcement for specific types of threats
        and environments of operation. Hardware-enforced separation and policy enforcement
        provide greater strength of mechanism than software-enforced separation and
        policy enforcement.
      translations:
        pt:
          name: "Separa\xE7\xE3o e Aplica\xE7\xE3o de Pol\xEDtica Impostas por Hardware"
          description: "Implementar mecanismos de separa\xE7\xE3o e de aplica\xE7\xE3\
            o de pol\xEDtica impostos por hardware entre [Atribui\xE7\xE3o: dom\xED\
            nios de seguran\xE7a definidos pela organiza\xE7\xE3o]."
          annotation: "Os propriet\xE1rios de sistemas podem exigir robustez e for\xE7\
            a de mecanismo adicionais para assegurar a separa\xE7\xE3o de dom\xED\
            nios e a aplica\xE7\xE3o de pol\xEDtica para tipos espec\xEDficos de amea\xE7\
            as e ambientes de opera\xE7\xE3o. A separa\xE7\xE3o e a aplica\xE7\xE3\
            o de pol\xEDtica impostas por hardware oferecem maior for\xE7a de mecanismo\
            \ do que a separa\xE7\xE3o e a aplica\xE7\xE3o de pol\xEDtica impostas\
            \ por software."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-50
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-50
      name: Software-enforced Separation and Policy Enforcement
      description: 'Implement software-enforced separation and policy enforcement
        mechanisms between [Assignment: organization-defined security domains].'
      annotation: System owners may require additional strength of mechanism to ensure
        domain separation and policy enforcement for specific types of threats and
        environments of operation.
      translations:
        pt:
          name: "Separa\xE7\xE3o e Aplica\xE7\xE3o de Pol\xEDtica Impostas por Software"
          description: "Implementar mecanismos de separa\xE7\xE3o e de aplica\xE7\xE3\
            o de pol\xEDtica impostos por software entre [Atribui\xE7\xE3o: dom\xED\
            nios de seguran\xE7a definidos pela organiza\xE7\xE3o]."
          annotation: "Os propriet\xE1rios de sistemas podem exigir for\xE7a de mecanismo\
            \ adicional para assegurar a separa\xE7\xE3o de dom\xEDnios e a aplica\xE7\
            \xE3o de pol\xEDtica para tipos espec\xEDficos de amea\xE7as e ambientes\
            \ de opera\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-51
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-51
      name: Hardware-based Protection
      description: 'a. Employ hardware-based, write-protect for [Assignment: organization-defined

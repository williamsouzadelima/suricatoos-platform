          name: Voz sobre Protocolo de Internet (VoIP)
          description: "[Retirado: Espec\xEDfico de tecnologia; tratado como qualquer\
            \ outra tecnologia ou protocolo.]"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-20(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-20(1)
      name: Secure Name/address Resolution Service (authoritative Source) | Child
        Subspaces
      description: '[Withdrawn: Incorporated into SC-20.]'
      translations:
        pt:
          name: "Servi\xE7o Seguro de Resolu\xE7\xE3o de Nomes/Endere\xE7os (Fonte\
            \ Autoritativa) | Subespa\xE7os Filhos"
          description: '[Retirado: Incorporado ao SC-20.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-21(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-21(1)
      name: Secure Name/address Resolution Service (recursive or Caching Resolver)
        | Data Origin and Integrity
      description: '[Withdrawn: Incorporated into SC-21.]'
      translations:
        pt:
          name: "Servi\xE7o Seguro de Resolu\xE7\xE3o de Nomes/Endere\xE7os (Resolvedor\
            \ Recursivo ou de Cache) | Origem e Integridade dos Dados"
          description: '[Retirado: Incorporado ao SC-21.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-23(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-23(2)
      name: Session Authenticity | User-initiated Logouts and Message Displays
      description: '[Withdrawn: Incorporated into AC-12(1).]'
      translations:
        pt:
          name: "Autenticidade da Sess\xE3o | Logouts Iniciados pelo Usu\xE1rio e\
            \ Exibi\xE7\xF5es de Mensagens"
          description: '[Retirado: Incorporado ao AC-12(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-15
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-15
      name: Collaborative Computing Devices and Applications
      description: 'a. Prohibit remote activation of collaborative computing devices
        and applications with the following exceptions: [Assignment: organization-defined
        exceptions where remote activation is to be allowed]; and

        b. Provide an explicit indication of use to users physically present at the
        devices.'
      annotation: Collaborative computing devices and applications include remote
        meeting devices and applications, networked white boards, cameras, and microphones.
        The explicit indication of use includes signals to users when collaborative
        computing devices and applications are activated.
      translations:
        pt:
          name: "Dispositivos e Aplica\xE7\xF5es de Computa\xE7\xE3o Colaborativa"
          description: "a. Proibir a ativa\xE7\xE3o remota de dispositivos e aplica\xE7\
            \xF5es de computa\xE7\xE3o colaborativa, com as seguintes exce\xE7\xF5\
            es: [Atribui\xE7\xE3o: exce\xE7\xF5es definidas pela organiza\xE7\xE3\
            o nas quais a ativa\xE7\xE3o remota deve ser permitida]; e\nb. Prover\
            \ uma indica\xE7\xE3o expl\xEDcita de uso aos usu\xE1rios fisicamente\
            \ presentes nos dispositivos."
          annotation: "Dispositivos e aplica\xE7\xF5es de computa\xE7\xE3o colaborativa\
            \ incluem dispositivos e aplica\xE7\xF5es de reuni\xE3o remota, lousas\
            \ em rede, c\xE2meras e microfones. A indica\xE7\xE3o expl\xEDcita de\
            \ uso inclui sinais aos usu\xE1rios quando os dispositivos e aplica\xE7\
            \xF5es de computa\xE7\xE3o colaborativa s\xE3o ativados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-15(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-15(1)
      name: Collaborative Computing Devices and Applications | Physical or Logical
        Disconnect
      description: 'Provide [Selection (one or more): physical; logical] disconnect
        of collaborative computing devices in a manner that supports ease of use.'
      annotation: Failing to disconnect from collaborative computing devices can result
        in subsequent compromises of organizational information. Providing easy methods
        to disconnect from such devices after a collaborative computing session ensures
        that participants carry out the disconnect activity without having to go through
        complex and tedious procedures. Disconnect from collaborative computing devices
        can be manual or automatic.
      translations:
        pt:
          name: "Dispositivos e Aplica\xE7\xF5es de Computa\xE7\xE3o Colaborativa\
            \ | Desconex\xE3o F\xEDsica ou L\xF3gica"
          description: "Prover desconex\xE3o [Sele\xE7\xE3o (um ou mais): f\xEDsica;\
            \ l\xF3gica] de dispositivos de computa\xE7\xE3o colaborativa de uma maneira\
            \ que favore\xE7a a facilidade de uso."
          annotation: "A n\xE3o desconex\xE3o de dispositivos de computa\xE7\xE3o\
            \ colaborativa pode resultar em comprometimentos subsequentes das informa\xE7\
            \xF5es organizacionais. Prover m\xE9todos f\xE1ceis para se desconectar\
            \ de tais dispositivos ap\xF3s uma sess\xE3o de computa\xE7\xE3o colaborativa\
            \ assegura que os participantes realizem a atividade de desconex\xE3o\
            \ sem ter que passar por procedimentos complexos e tediosos. A desconex\xE3\
            o de dispositivos de computa\xE7\xE3o colaborativa pode ser manual ou\
            \ autom\xE1tica."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-23(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-23(4)
      name: Session Authenticity | Unique Session Identifiers with Randomization
      description: '[Withdrawn: Incorporated into SC-23(3).]'
      translations:
        pt:
          name: "Autenticidade da Sess\xE3o | Identificadores de Sess\xE3o \xDAnicos\
            \ com Aleatoriza\xE7\xE3o"
          description: '[Retirado: Incorporado ao SC-23(3).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-15(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-15(3)
      name: Collaborative Computing Devices and Applications | Disabling and Removal
        in Secure Work Areas
      description: 'Disable or remove collaborative computing devices and applications
        from [Assignment: organization-defined systems or system components] in [Assignment:
        organization-defined secure work areas].'
      annotation: Failing to disable or remove collaborative computing devices and
        applications from systems or system components can result in compromises of
        information, including eavesdropping on conversations. A Sensitive Compartmented
        Information Facility (SCIF) is an example of a secure work area.
      translations:
        pt:
          name: "Dispositivos e Aplica\xE7\xF5es de Computa\xE7\xE3o Colaborativa\
            \ | Desabilita\xE7\xE3o e Remo\xE7\xE3o em \xC1reas de Trabalho Seguras"
          description: "Desabilitar ou remover dispositivos e aplica\xE7\xF5es de\
            \ computa\xE7\xE3o colaborativa de [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o] em [Atribui\xE7\xE3o: \xE1\
            reas de trabalho seguras definidas pela organiza\xE7\xE3o]."
          annotation: "A n\xE3o desabilita\xE7\xE3o ou remo\xE7\xE3o de dispositivos\
            \ e aplica\xE7\xF5es de computa\xE7\xE3o colaborativa de sistemas ou componentes\
            \ de sistema pode resultar em comprometimentos de informa\xE7\xF5es, inclusive\
            \ na escuta de conversas. Uma Instala\xE7\xE3o de Informa\xE7\xF5es Compartimentadas\
            \ Sens\xEDveis (SCIF) \xE9 um exemplo de \xE1rea de trabalho segura."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-15(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-15(4)
      name: Collaborative Computing Devices and Applications | Explicitly Indicate
        Current Participants
      description: 'Provide an explicit indication of current participants in [Assignment:
        organization-defined online meetings and teleconferences].'
      annotation: Explicitly indicating current participants prevents unauthorized
        individuals from participating in collaborative computing sessions without
        the explicit knowledge of other participants.
      translations:
        pt:
          name: "Dispositivos e Aplica\xE7\xF5es de Computa\xE7\xE3o Colaborativa\
            \ | Indicar Explicitamente os Participantes Atuais"
          description: "Prover uma indica\xE7\xE3o expl\xEDcita dos participantes\
            \ atuais em [Atribui\xE7\xE3o: reuni\xF5es online e teleconfer\xEAncias\
            \ definidas pela organiza\xE7\xE3o]."
          annotation: "A indica\xE7\xE3o expl\xEDcita dos participantes atuais previne\
            \ que indiv\xEDduos n\xE3o autorizados participem de sess\xF5es de computa\xE7\
            \xE3o colaborativa sem o conhecimento expl\xEDcito dos demais participantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-16
      name: Transmission of Security and Privacy Attributes
      description: 'Associate [Assignment: organization-defined security and privacy
        attributes] with information exchanged between systems and between system
        components.'
      annotation: Security and privacy attributes can be explicitly or implicitly
        associated with the information contained in organizational systems or system
        components. Attributes are abstractions that represent the basic properties
        or characteristics of an entity with respect to protecting information or
        the management of personally identifiable information. Attributes are typically
        associated with internal data structures, including records, buffers, and
        files within the system. Security and privacy attributes are used to implement
        access control and information flow control policies; reflect special dissemination,
        management, or distribution instructions, including permitted uses of personally
        identifiable information; or support other aspects of the information security
        and privacy policies. Privacy attributes may be used independently or in conjunction
        with security attributes.
      translations:
        pt:
          name: "Transmiss\xE3o de Atributos de Seguran\xE7a e Privacidade"
          description: "Associar [Atribui\xE7\xE3o: atributos de seguran\xE7a e privacidade\
            \ definidos pela organiza\xE7\xE3o] \xE0s informa\xE7\xF5es trocadas entre\
            \ sistemas e entre componentes de sistema."
          annotation: "Os atributos de seguran\xE7a e privacidade podem ser associados\
            \ expl\xEDcita ou implicitamente \xE0s informa\xE7\xF5es contidas nos\
            \ sistemas organizacionais ou em componentes de sistema. Atributos s\xE3\
            o abstra\xE7\xF5es que representam as propriedades ou caracter\xEDsticas\
            \ b\xE1sicas de uma entidade no que diz respeito \xE0 prote\xE7\xE3o de\
            \ informa\xE7\xF5es ou \xE0 gest\xE3o de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal. Os atributos s\xE3o tipicamente associados a estruturas\
            \ de dados internas, incluindo registros, buffers e arquivos dentro do\
            \ sistema. Os atributos de seguran\xE7a e privacidade s\xE3o usados para\
            \ implementar pol\xEDticas de controle de acesso e de controle de fluxo\
            \ de informa\xE7\xF5es; refletir instru\xE7\xF5es especiais de dissemina\xE7\
            \xE3o, gest\xE3o ou distribui\xE7\xE3o, incluindo os usos permitidos de\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal; ou apoiar outros aspectos\
            \ das pol\xEDticas de seguran\xE7a da informa\xE7\xE3o e privacidade.\
            \ Os atributos de privacidade podem ser usados de forma independente ou\
            \ em conjunto com os atributos de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-16(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-16(1)
      name: Transmission of Security and Privacy Attributes | Integrity Verification
      description: Verify the integrity of transmitted security and privacy attributes.
      annotation: Part of verifying the integrity of transmitted information is ensuring
        that security and privacy attributes that are associated with such information
        have not been modified in an unauthorized manner. Unauthorized modification
        of security or privacy attributes can result in a loss of integrity for transmitted
        information.
      translations:
        pt:
          name: "Transmiss\xE3o de Atributos de Seguran\xE7a e Privacidade | Verifica\xE7\
            \xE3o de Integridade"
          description: "Verificar a integridade dos atributos de seguran\xE7a e privacidade\
            \ transmitidos."
          annotation: "Parte da verifica\xE7\xE3o da integridade das informa\xE7\xF5\
            es transmitidas consiste em assegurar que os atributos de seguran\xE7\
            a e privacidade associados a tais informa\xE7\xF5es n\xE3o tenham sido\
            \ modificados de maneira n\xE3o autorizada. A modifica\xE7\xE3o n\xE3\
            o autorizada de atributos de seguran\xE7a ou privacidade pode resultar\
            \ em perda de integridade das informa\xE7\xF5es transmitidas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-16(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-16(2)
      name: Transmission of Security and Privacy Attributes | Anti-spoofing Mechanisms
      description: Implement anti-spoofing mechanisms to prevent adversaries from
        falsifying the security attributes indicating the successful application of
        the security process.
      annotation: Some attack vectors operate by altering the security attributes
        of an information system to intentionally and maliciously implement an insufficient
        level of security within the system. The alteration of attributes leads organizations
        to believe that a greater number of security functions are in place and operational
        than have actually been implemented.
      translations:
        pt:
          name: "Transmiss\xE3o de Atributos de Seguran\xE7a e Privacidade | Mecanismos\
            \ Antifalsifica\xE7\xE3o"
          description: "Implementar mecanismos antifalsifica\xE7\xE3o para impedir\
            \ que advers\xE1rios falsifiquem os atributos de seguran\xE7a que indicam\
            \ a aplica\xE7\xE3o bem-sucedida do processo de seguran\xE7a."
          annotation: "Alguns vetores de ataque operam alterando os atributos de seguran\xE7\
            a de um sistema de informa\xE7\xE3o para, de forma intencional e maliciosa,\
            \ implementar um n\xEDvel insuficiente de seguran\xE7a dentro do sistema.\
            \ A altera\xE7\xE3o dos atributos leva as organiza\xE7\xF5es a acreditar\
            \ que um n\xFAmero maior de fun\xE7\xF5es de seguran\xE7a est\xE1 implementado\
            \ e operacional do que efetivamente foi implementado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-16(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-16(3)
      name: Transmission of Security and Privacy Attributes | Cryptographic Binding
      description: 'Implement [Assignment: organization-defined mechanisms or techniques]
        to bind security and privacy attributes to transmitted information.'
      annotation: Cryptographic mechanisms and techniques can provide strong security
        and privacy attribute binding to transmitted information to help ensure the
        integrity of such information.
      translations:
        pt:
          name: "Transmiss\xE3o de Atributos de Seguran\xE7a e Privacidade | Vincula\xE7\
            \xE3o Criptogr\xE1fica"
          description: "Implementar [Atribui\xE7\xE3o: mecanismos ou t\xE9cnicas definidos\
            \ pela organiza\xE7\xE3o] para vincular atributos de seguran\xE7a e privacidade\
            \ \xE0s informa\xE7\xF5es transmitidas."
          annotation: "Mecanismos e t\xE9cnicas criptogr\xE1ficas podem prover uma\
            \ forte vincula\xE7\xE3o de atributos de seguran\xE7a e privacidade \xE0\
            s informa\xE7\xF5es transmitidas para ajudar a assegurar a integridade\
            \ de tais informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-17
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-17
      name: Public Key Infrastructure Certificates
      description: 'a. Issue public key certificates under an [Assignment: organization-defined
        certificate policy] or obtain public key certificates from an approved service
        provider; and

        b. Include only approved trust anchors in trust stores or certificate stores
        managed by the organization.'
      annotation: Public key infrastructure (PKI) certificates are certificates with
        visibility external to organizational systems and certificates related to
        the internal operations of systems, such as application-specific time services.
        In cryptographic systems with a hierarchical structure, a trust anchor is
        an authoritative source (i.e., a certificate authority) for which trust is
        assumed and not derived. A root certificate for a PKI system is an example
        of a trust anchor. A trust store or certificate store maintains a list of
        trusted root certificates.
      translations:
        pt:
          name: "Certificados de Infraestrutura de Chaves P\xFAblicas"
          description: "a. Emitir certificados de chave p\xFAblica sob uma [Atribui\xE7\
            \xE3o: pol\xEDtica de certificado definida pela organiza\xE7\xE3o] ou\
            \ obter certificados de chave p\xFAblica de um provedor de servi\xE7os\
            \ aprovado; e\nb. Incluir apenas \xE2ncoras de confian\xE7a aprovadas\
            \ nos armazenamentos de confian\xE7a (trust stores) ou armazenamentos\
            \ de certificados gerenciados pela organiza\xE7\xE3o."
          annotation: "Os certificados de infraestrutura de chaves p\xFAblicas (PKI)\
            \ s\xE3o certificados com visibilidade externa aos sistemas organizacionais\
            \ e certificados relacionados \xE0s opera\xE7\xF5es internas dos sistemas,\
            \ como servi\xE7os de tempo espec\xEDficos de aplica\xE7\xE3o. Em sistemas\
            \ criptogr\xE1ficos com estrutura hier\xE1rquica, uma \xE2ncora de confian\xE7\
            a \xE9 uma fonte autoritativa (ou seja, uma autoridade certificadora)\
            \ para a qual a confian\xE7a \xE9 assumida e n\xE3o derivada. Um certificado\
            \ raiz para um sistema PKI \xE9 um exemplo de \xE2ncora de confian\xE7\
            a. Um armazenamento de confian\xE7a ou armazenamento de certificados mant\xE9\
            m uma lista de certificados raiz confi\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-18
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-18
      name: Mobile Code
      description: 'a. Define acceptable and unacceptable mobile code and mobile code
        technologies; and

        b. Authorize, monitor, and control the use of mobile code within the system.'
      annotation: Mobile code includes any program, application, or content that can
        be transmitted across a network (e.g., embedded in an email, document, or
        website) and executed on a remote system. Decisions regarding the use of mobile
        code within organizational systems are based on the potential for the code
        to cause damage to the systems if used maliciously. Mobile code technologies
        include Java applets, JavaScript, HTML5, WebGL, and VBScript. Usage restrictions
        and implementation guidelines apply to both the selection and use of mobile
        code installed on servers and mobile code downloaded and executed on individual
        workstations and devices, including notebook computers and smart phones. Mobile
        code policy and procedures address specific actions taken to prevent the development,
        acquisition, and introduction of unacceptable mobile code within organizational
        systems, including requiring mobile code to be digitally signed by a trusted
        source.
      translations:
        pt:
          name: "C\xF3digo M\xF3vel"
          description: "a. Definir c\xF3digos m\xF3veis e tecnologias de c\xF3digo\
            \ m\xF3vel aceit\xE1veis e inaceit\xE1veis; e\nb. Autorizar, monitorar\
            \ e controlar o uso de c\xF3digo m\xF3vel dentro do sistema."
          annotation: "C\xF3digo m\xF3vel inclui qualquer programa, aplica\xE7\xE3\
            o ou conte\xFAdo que possa ser transmitido atrav\xE9s de uma rede (por\
            \ exemplo, embutido em um e-mail, documento ou site) e executado em um\
            \ sistema remoto. As decis\xF5es sobre o uso de c\xF3digo m\xF3vel dentro\
            \ dos sistemas organizacionais baseiam-se no potencial de o c\xF3digo\
            \ causar danos aos sistemas se usado maliciosamente. As tecnologias de\
            \ c\xF3digo m\xF3vel incluem applets Java, JavaScript, HTML5, WebGL e\
            \ VBScript. As restri\xE7\xF5es de uso e as diretrizes de implementa\xE7\
            \xE3o aplicam-se tanto \xE0 sele\xE7\xE3o quanto ao uso de c\xF3digo m\xF3\
            vel instalado em servidores e ao c\xF3digo m\xF3vel baixado e executado\
            \ em esta\xE7\xF5es de trabalho e dispositivos individuais, incluindo\
            \ notebooks e smartphones. As pol\xEDticas e procedimentos de c\xF3digo\
            \ m\xF3vel tratam de a\xE7\xF5es espec\xEDficas tomadas para prevenir\
            \ o desenvolvimento, a aquisi\xE7\xE3o e a introdu\xE7\xE3o de c\xF3digo\
            \ m\xF3vel inaceit\xE1vel dentro dos sistemas organizacionais, inclusive\
            \ a exig\xEAncia de que o c\xF3digo m\xF3vel seja assinado digitalmente\
            \ por uma fonte confi\xE1vel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-18(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-18(1)
      name: Mobile Code | Identify Unacceptable Code and Take Corrective Actions
      description: 'Identify [Assignment: organization-defined unacceptable mobile
        code] and take [Assignment: organization-defined corrective actions].'
      annotation: Corrective actions when unacceptable mobile code is detected include
        blocking, quarantine, or alerting administrators. Blocking includes preventing
        the transmission of word processing files with embedded macros when such macros
        have been determined to be unacceptable mobile code.
      translations:
        pt:
          name: "C\xF3digo M\xF3vel | Identificar C\xF3digo Inaceit\xE1vel e Tomar\
            \ A\xE7\xF5es Corretivas"
          description: "Identificar [Atribui\xE7\xE3o: c\xF3digo m\xF3vel inaceit\xE1\
            vel definido pela organiza\xE7\xE3o] e tomar [Atribui\xE7\xE3o: a\xE7\xF5\
            es corretivas definidas pela organiza\xE7\xE3o]."
          annotation: "As a\xE7\xF5es corretivas, quando c\xF3digo m\xF3vel inaceit\xE1\
            vel \xE9 detectado, incluem bloqueio, quarentena ou alerta aos administradores.\
            \ O bloqueio inclui impedir a transmiss\xE3o de arquivos de processamento\
            \ de texto com macros embutidas quando tais macros tiverem sido determinadas\
            \ como c\xF3digo m\xF3vel inaceit\xE1vel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-18(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-18(2)
      name: Mobile Code | Acquisition, Development, and Use
      description: 'Verify that the acquisition, development, and use of mobile code
        to be deployed in the system meets [Assignment: organization-defined mobile
        code requirements].'
      annotation: None.
      translations:
        pt:
          name: "C\xF3digo M\xF3vel | Aquisi\xE7\xE3o, Desenvolvimento e Uso"
          description: "Verificar que a aquisi\xE7\xE3o, o desenvolvimento e o uso\
            \ de c\xF3digo m\xF3vel a ser implantado no sistema atendam aos [Atribui\xE7\
            \xE3o: requisitos de c\xF3digo m\xF3vel definidos pela organiza\xE7\xE3\
            o]."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-18(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-18(3)
      name: Mobile Code | Prevent Downloading and Execution
      description: 'Prevent the download and execution of [Assignment: organization-defined
        unacceptable mobile code].'
      annotation: None.
      translations:
        pt:
          name: "C\xF3digo M\xF3vel | Prevenir Download e Execu\xE7\xE3o"
          description: "Prevenir o download e a execu\xE7\xE3o de [Atribui\xE7\xE3\
            o: c\xF3digo m\xF3vel inaceit\xE1vel definido pela organiza\xE7\xE3o]."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-18(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-18(4)
      name: Mobile Code | Prevent Automatic Execution
      description: 'Prevent the automatic execution of mobile code in [Assignment:
        organization-defined software applications] and enforce [Assignment: organization-defined
        actions] prior to executing the code.'
      annotation: Actions enforced before executing mobile code include prompting
        users prior to opening email attachments or clicking on web links. Preventing
        the automatic execution of mobile code includes disabling auto-execute features
        on system components that employ portable storage devices, such as compact
        discs, digital versatile discs, and universal serial bus devices.
      translations:
        pt:
          name: "C\xF3digo M\xF3vel | Prevenir Execu\xE7\xE3o Autom\xE1tica"
          description: "Prevenir a execu\xE7\xE3o autom\xE1tica de c\xF3digo m\xF3\
            vel em [Atribui\xE7\xE3o: aplica\xE7\xF5es de software definidas pela\
            \ organiza\xE7\xE3o] e impor [Atribui\xE7\xE3o: a\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o] antes de executar o c\xF3digo."
          annotation: "As a\xE7\xF5es impostas antes da execu\xE7\xE3o de c\xF3digo\
            \ m\xF3vel incluem solicitar confirma\xE7\xE3o dos usu\xE1rios antes de\
            \ abrir anexos de e-mail ou clicar em links da web. A preven\xE7\xE3o\
            \ da execu\xE7\xE3o autom\xE1tica de c\xF3digo m\xF3vel inclui a desabilita\xE7\
            \xE3o de recursos de autoexecu\xE7\xE3o em componentes de sistema que\
            \ empregam dispositivos de armazenamento port\xE1teis, como discos compactos,\
            \ discos vers\xE1teis digitais e dispositivos de barramento serial universal\
            \ (USB)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-18(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-18(5)
      name: Mobile Code | Allow Execution Only in Confined Environments
      description: Allow execution of permitted mobile code only in confined virtual
        machine environments.
      annotation: Permitting the execution of mobile code only in confined virtual
        machine environments helps prevent the introduction of malicious code into
        other systems and system components.
      translations:
        pt:
          name: "C\xF3digo M\xF3vel | Permitir Execu\xE7\xE3o Apenas em Ambientes\
            \ Confinados"
          description: "Permitir a execu\xE7\xE3o de c\xF3digo m\xF3vel autorizado\
            \ apenas em ambientes confinados de m\xE1quina virtual."
          annotation: "Permitir a execu\xE7\xE3o de c\xF3digo m\xF3vel apenas em ambientes\
            \ confinados de m\xE1quina virtual ajuda a prevenir a introdu\xE7\xE3\
            o de c\xF3digo malicioso em outros sistemas e componentes de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-26(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-26(1)
      name: Decoys | Detection of Malicious Code
      description: '[Withdrawn: Incorporated into SC-35.]'
      translations:
        pt:
          name: "Iscas (Decoys) | Detec\xE7\xE3o de C\xF3digo Malicioso"
          description: '[Retirado: Incorporado ao SC-35.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-20
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-20
      name: Secure Name/address Resolution Service (authoritative Source)
      description: 'a. Provide additional data origin authentication and integrity
        verification artifacts along with the authoritative name resolution data the
        system returns in response to external name/address resolution queries; and

        b. Provide the means to indicate the security status of child zones and (if
        the child supports secure resolution services) to enable verification of a
        chain of trust among parent and child domains, when operating as part of a
        distributed, hierarchical namespace.'
      annotation: Providing authoritative source information enables external clients,
        including remote Internet clients, to obtain origin authentication and integrity
        verification assurances for the host/service name to network address resolution
        information obtained through the service. Systems that provide name and address
        resolution services include domain name system (DNS) servers. Additional artifacts
        include DNS Security Extensions (DNSSEC) digital signatures and cryptographic
        keys. Authoritative data includes DNS resource records. The means for indicating
        the security status of child zones include the use of delegation signer resource
        records in the DNS. Systems that use technologies other than the DNS to map
        between host and service names and network addresses provide other means to
        assure the authenticity and integrity of response data.
      translations:
        pt:
          name: "Servi\xE7o Seguro de Resolu\xE7\xE3o de Nomes/Endere\xE7os (Fonte\
            \ Autoritativa)"
          description: "a. Prover artefatos adicionais de autentica\xE7\xE3o de origem\
            \ dos dados e de verifica\xE7\xE3o de integridade juntamente com os dados\
            \ autoritativos de resolu\xE7\xE3o de nomes que o sistema retorna em resposta\
            \ a consultas externas de resolu\xE7\xE3o de nomes/endere\xE7os; e\nb.\
            \ Prover os meios para indicar o status de seguran\xE7a das zonas filhas\
            \ e (caso a filha suporte servi\xE7os de resolu\xE7\xE3o seguros) para\
            \ habilitar a verifica\xE7\xE3o de uma cadeia de confian\xE7a entre dom\xED\
            nios pai e filho, quando operando como parte de um espa\xE7o de nomes\
            \ distribu\xEDdo e hier\xE1rquico."
          annotation: "Prover informa\xE7\xF5es de fonte autoritativa permite que\
            \ clientes externos, incluindo clientes remotos da Internet, obtenham\
            \ garantias de autentica\xE7\xE3o de origem e de verifica\xE7\xE3o de\
            \ integridade para as informa\xE7\xF5es de resolu\xE7\xE3o de nome de\
            \ host/servi\xE7o para endere\xE7o de rede obtidas por meio do servi\xE7\
            o. Os sistemas que provem servi\xE7os de resolu\xE7\xE3o de nomes e endere\xE7\
            os incluem servidores de sistema de nomes de dom\xEDnio (DNS). Os artefatos\
            \ adicionais incluem assinaturas digitais e chaves criptogr\xE1ficas das\
            \ Extens\xF5es de Seguran\xE7a do DNS (DNSSEC). Os dados autoritativos\
            \ incluem os registros de recursos do DNS. Os meios para indicar o status\
            \ de seguran\xE7a das zonas filhas incluem o uso de registros de recursos\
            \ de assinante de delega\xE7\xE3o (delegation signer) no DNS. Os sistemas\
            \ que usam tecnologias diferentes do DNS para mapear entre nomes de host\
            \ e servi\xE7o e endere\xE7os de rede provem outros meios para assegurar\
            \ a autenticidade e a integridade dos dados de resposta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-30(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-30(1)
      name: Concealment and Misdirection | Virtualization Techniques
      description: '[Withdrawn: Incorporated into SC-29(1).]'
      translations:
        pt:
          name: "Oculta\xE7\xE3o e Indu\xE7\xE3o ao Erro | T\xE9cnicas de Virtualiza\xE7\
            \xE3o"
          description: '[Retirado: Incorporado em SC-29(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-20(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-20(2)
      name: Secure Name/address Resolution Service (authoritative Source) | Data Origin
        and Integrity
      description: Provide data origin and integrity protection artifacts for internal
        name/address resolution queries.
      annotation: None.
      translations:
        pt:
          name: "Servi\xE7o Seguro de Resolu\xE7\xE3o de Nomes/Endere\xE7os (Fonte\
            \ Autoritativa) | Origem e Integridade dos Dados"
          description: "Fornecer artefatos de prote\xE7\xE3o de origem e integridade\
            \ dos dados para consultas internas de resolu\xE7\xE3o de nomes/endere\xE7\
            os."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-21
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-21
      name: Secure Name/address Resolution Service (recursive or Caching Resolver)
      description: Request and perform data origin authentication and data integrity
        verification on the name/address resolution responses the system receives
        from authoritative sources.
      annotation: Each client of name resolution services either performs this validation
        on its own or has authenticated channels to trusted validation providers.
        Systems that provide name and address resolution services for local clients
        include recursive resolving or caching domain name system (DNS) servers. DNS
        client resolvers either perform validation of DNSSEC signatures, or clients
        use authenticated channels to recursive resolvers that perform such validations.
        Systems that use technologies other than the DNS to map between host and service
        names and network addresses provide some other means to enable clients to
        verify the authenticity and integrity of response data.
      translations:
        pt:
          name: "Servi\xE7o Seguro de Resolu\xE7\xE3o de Nomes/Endere\xE7os (Resolvedor\
            \ Recursivo ou de Cache)"
          description: "Solicitar e realizar a autentica\xE7\xE3o de origem dos dados\
            \ e a verifica\xE7\xE3o de integridade dos dados nas respostas de resolu\xE7\
            \xE3o de nomes/endere\xE7os que o sistema recebe de fontes autoritativas."
          annotation: "Cada cliente dos servi\xE7os de resolu\xE7\xE3o de nomes realiza\
            \ essa valida\xE7\xE3o por conta pr\xF3pria ou possui canais autenticados\
            \ com provedores de valida\xE7\xE3o confi\xE1veis. Os sistemas que fornecem\
            \ servi\xE7os de resolu\xE7\xE3o de nomes e endere\xE7os para clientes\
            \ locais incluem servidores de sistema de nomes de dom\xEDnio (DNS) recursivos\
            \ com resolu\xE7\xE3o ou cache. Os resolvedores clientes de DNS realizam\
            \ a valida\xE7\xE3o das assinaturas DNSSEC, ou os clientes usam canais\
            \ autenticados com resolvedores recursivos que realizam tais valida\xE7\
            \xF5es. Os sistemas que usam tecnologias diferentes do DNS para mapear\
            \ entre nomes de host e de servi\xE7o e endere\xE7os de rede fornecem\
            \ algum outro meio para permitir que os clientes verifiquem a autenticidade\
            \ e a integridade dos dados de resposta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-33
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-33
      name: Transmission Preparation Integrity
      description: '[Withdrawn: Incorporated into SC-8.]'
      translations:
        pt:
          name: "Integridade da Prepara\xE7\xE3o de Transmiss\xE3o"
          description: '[Retirado: Incorporado em SC-8.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-22
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-22
      name: Architecture and Provisioning for Name/address Resolution Service
      description: Ensure the systems that collectively provide name/address resolution
        service for an organization are fault-tolerant and implement internal and
        external role separation.
      annotation: "Systems that provide name and address resolution services include\
        \ domain name system (DNS) servers. To eliminate single points of failure\
        \ in systems and enhance redundancy, organizations employ at least two authoritative\
        \ domain name system servers\u2014one configured as the primary server and\
        \ the other configured as the secondary server. Additionally, organizations\
        \ typically deploy the servers in two geographically separated network subnetworks\
        \ (i.e., not located in the same physical facility). For role separation,\
        \ DNS servers with internal roles only process name and address resolution\
        \ requests from within organizations (i.e., from internal clients). DNS servers\
        \ with external roles only process name and address resolution information\
        \ requests from clients external to organizations (i.e., on external networks,\
        \ including the Internet). Organizations specify clients that can access authoritative\
        \ DNS servers in certain roles (e.g., by address ranges and explicit lists)."
      translations:
        pt:
          name: "Arquitetura e Provisionamento para Servi\xE7o de Resolu\xE7\xE3o\
            \ de Nomes/Endere\xE7os"
          description: "Garantir que os sistemas que coletivamente fornecem o servi\xE7\
            o de resolu\xE7\xE3o de nomes/endere\xE7os para uma organiza\xE7\xE3o\
            \ sejam tolerantes a falhas e implementem a separa\xE7\xE3o de pap\xE9\
            is internos e externos."
          annotation: "Os sistemas que fornecem servi\xE7os de resolu\xE7\xE3o de\
            \ nomes e endere\xE7os incluem servidores de sistema de nomes de dom\xED\
            nio (DNS). Para eliminar pontos \xFAnicos de falha nos sistemas e aprimorar\
            \ a redund\xE2ncia, as organiza\xE7\xF5es empregam pelo menos dois servidores\
            \ DNS autoritativos \u2014 um configurado como servidor prim\xE1rio e\
            \ o outro configurado como servidor secund\xE1rio. Adicionalmente, as\
            \ organiza\xE7\xF5es tipicamente implantam os servidores em duas sub-redes\
            \ geograficamente separadas (ou seja, n\xE3o localizadas na mesma instala\xE7\
            \xE3o f\xEDsica). Para a separa\xE7\xE3o de pap\xE9is, os servidores DNS\
            \ com pap\xE9is internos processam apenas as solicita\xE7\xF5es de resolu\xE7\
            \xE3o de nomes e endere\xE7os provenientes de dentro das organiza\xE7\xF5\
            es (ou seja, de clientes internos). Os servidores DNS com pap\xE9is externos\
            \ processam apenas as solicita\xE7\xF5es de informa\xE7\xF5es de resolu\xE7\
            \xE3o de nomes e endere\xE7os provenientes de clientes externos \xE0s\
            \ organiza\xE7\xF5es (ou seja, em redes externas, incluindo a Internet).\
            \ As organiza\xE7\xF5es especificam os clientes que podem acessar servidores\
            \ DNS autoritativos em determinados pap\xE9is (por exemplo, por faixas\
            \ de endere\xE7os e listas expl\xEDcitas)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-23
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-23
      name: Session Authenticity
      description: Protect the authenticity of communications sessions.
      annotation: Protecting session authenticity addresses communications protection
        at the session level, not at the packet level. Such protection establishes
        grounds for confidence at both ends of communications sessions in the ongoing
        identities of other parties and the validity of transmitted information. Authenticity
        protection includes protecting against man-in-the-middle attacks, session
        hijacking, and the insertion of false information into sessions.
      translations:
        pt:
          name: "Autenticidade de Sess\xE3o"
          description: "Proteger a autenticidade das sess\xF5es de comunica\xE7\xE3\
            o."
          annotation: "A prote\xE7\xE3o da autenticidade de sess\xE3o trata da prote\xE7\
            \xE3o de comunica\xE7\xF5es no n\xEDvel da sess\xE3o, e n\xE3o no n\xED\
            vel do pacote. Tal prote\xE7\xE3o estabelece fundamentos para a confian\xE7\
            a em ambas as extremidades das sess\xF5es de comunica\xE7\xE3o quanto\
            \ \xE0s identidades cont\xEDnuas das demais partes e \xE0 validade das\
            \ informa\xE7\xF5es transmitidas. A prote\xE7\xE3o da autenticidade inclui\
            \ a prote\xE7\xE3o contra ataques de intermedi\xE1rio (man-in-the-middle),\
            \ sequestro de sess\xE3o e inser\xE7\xE3o de informa\xE7\xF5es falsas\
            \ nas sess\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-23(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-23(1)
      name: Session Authenticity | Invalidate Session Identifiers at Logout
      description: Invalidate session identifiers upon user logout or other session
        termination.
      annotation: Invalidating session identifiers at logout curtails the ability
        of adversaries to capture and continue to employ previously valid session
        IDs.
      translations:
        pt:
          name: "Autenticidade de Sess\xE3o | Invalidar Identificadores de Sess\xE3\
            o no Logout"
          description: "Invalidar os identificadores de sess\xE3o ap\xF3s o logout\
            \ do usu\xE1rio ou outro encerramento de sess\xE3o."
          annotation: "Invalidar os identificadores de sess\xE3o no logout reduz a\
            \ capacidade de advers\xE1rios de capturar e continuar a empregar IDs\
            \ de sess\xE3o anteriormente v\xE1lidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-34(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-34(3)
      name: Non-modifiable Executable Programs | Hardware-based Protection
      description: '[Withdrawn: Moved to SC-51.]'
      translations:
        pt:
          name: "Programas Execut\xE1veis N\xE3o Modific\xE1veis | Prote\xE7\xE3o\
            \ Baseada em Hardware"
          description: '[Retirado: Movido para SC-51.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-23(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-23(3)
      name: Session Authenticity | Unique System-generated Session Identifiers
      description: 'Generate a unique session identifier for each session with [Assignment:
        organization-defined randomness requirements] and recognize only session identifiers
        that are system-generated.'
      annotation: Generating unique session identifiers curtails the ability of adversaries
        to reuse previously valid session IDs. Employing the concept of randomness
        in the generation of unique session identifiers protects against brute-force
        attacks to determine future session identifiers.
      translations:
        pt:
          name: "Autenticidade de Sess\xE3o | Identificadores de Sess\xE3o \xDAnicos\
            \ Gerados pelo Sistema"
          description: "Gerar um identificador de sess\xE3o \xFAnico para cada sess\xE3\
            o com [Atribui\xE7\xE3o: requisitos de aleatoriedade definidos pela organiza\xE7\
            \xE3o] e reconhecer apenas identificadores de sess\xE3o gerados pelo sistema."
          annotation: "A gera\xE7\xE3o de identificadores de sess\xE3o \xFAnicos reduz\
            \ a capacidade de advers\xE1rios de reutilizar IDs de sess\xE3o anteriormente\
            \ v\xE1lidos. O emprego do conceito de aleatoriedade na gera\xE7\xE3o\
            \ de identificadores de sess\xE3o \xFAnicos protege contra ataques de\
            \ for\xE7a bruta para determinar identificadores de sess\xE3o futuros."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-4(1)
      name: Information in Shared System Resources | Security Levels
      description: '[Withdrawn: Incorporated into SC-4.]'
      translations:
        pt:
          name: "Informa\xE7\xF5es em Recursos Compartilhados do Sistema | N\xEDveis\
            \ de Seguran\xE7a"
          description: '[Retirado: Incorporado em SC-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-23(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-23(5)
      name: Session Authenticity | Allowed Certificate Authorities
      description: 'Only allow the use of [Assignment: organization-defined certificate
        authorities] for verification of the establishment of protected sessions.'
      annotation: Reliance on certificate authorities for the establishment of secure
        sessions includes the use of Transport Layer Security (TLS) certificates.
        These certificates, after verification by their respective certificate authorities,
        facilitate the establishment of protected sessions between web clients and
        web servers.
      translations:
        pt:
          name: "Autenticidade de Sess\xE3o | Autoridades Certificadoras Permitidas"
          description: "Permitir apenas o uso de [Atribui\xE7\xE3o: autoridades certificadoras\
            \ definidas pela organiza\xE7\xE3o] para a verifica\xE7\xE3o do estabelecimento\
            \ de sess\xF5es protegidas."
          annotation: "A depend\xEAncia de autoridades certificadoras para o estabelecimento\
            \ de sess\xF5es seguras inclui o uso de certificados Transport Layer Security\
            \ (TLS). Esses certificados, ap\xF3s a verifica\xE7\xE3o por suas respectivas\
            \ autoridades certificadoras, facilitam o estabelecimento de sess\xF5\
            es protegidas entre clientes web e servidores web."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-24
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-24
      name: Fail in Known State
      description: 'Fail to a [Assignment: organization-defined known system state]
        for the following failures on the indicated components while preserving [Assignment:
        organization-defined system state information] in failure: [Assignment: list
        of organization-defined types of system failures on organization-defined system
        components].'
      annotation: Failure in a known state addresses security concerns in accordance
        with the mission and business needs of organizations. Failure in a known state
        prevents the loss of confidentiality, integrity, or availability of information
        in the event of failures of organizational systems or system components. Failure
        in a known safe state helps to prevent systems from failing to a state that
        may cause injury to individuals or destruction to property. Preserving system
        state information facilitates system restart and return to the operational
        mode with less disruption of mission and business processes.
      translations:
        pt:
          name: Falhar em Estado Conhecido
          description: "Falhar para um [Atribui\xE7\xE3o: estado conhecido do sistema\
            \ definido pela organiza\xE7\xE3o] para as seguintes falhas nos componentes\
            \ indicados, preservando ao mesmo tempo [Atribui\xE7\xE3o: informa\xE7\
            \xF5es de estado do sistema definidas pela organiza\xE7\xE3o] em caso\
            \ de falha: [Atribui\xE7\xE3o: lista de tipos de falhas de sistema definidos\
            \ pela organiza\xE7\xE3o em componentes de sistema definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Falhar em um estado conhecido trata das preocupa\xE7\xF5es\
            \ de seguran\xE7a de acordo com as necessidades de miss\xE3o e de neg\xF3\
            cio das organiza\xE7\xF5es. Falhar em um estado conhecido evita a perda\
            \ de confidencialidade, integridade ou disponibilidade das informa\xE7\
            \xF5es no caso de falhas dos sistemas organizacionais ou de componentes\
            \ do sistema. Falhar em um estado seguro conhecido ajuda a evitar que\
            \ os sistemas falhem para um estado que possa causar les\xF5es a indiv\xED\
            duos ou destrui\xE7\xE3o de propriedade. A preserva\xE7\xE3o das informa\xE7\
            \xF5es de estado do sistema facilita a reinicializa\xE7\xE3o do sistema\
            \ e o retorno ao modo operacional com menor interrup\xE7\xE3o dos processos\
            \ de miss\xE3o e de neg\xF3cio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-25
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-25
      name: Thin Nodes
      description: 'Employ minimal functionality and information storage on the following
        system components: [Assignment: organization-defined system components].'
      annotation: The deployment of system components with minimal functionality reduces
        the need to secure every endpoint and may reduce the exposure of information,
        systems, and services to attacks. Reduced or minimal functionality includes
        diskless nodes and thin client technologies.
      translations:
        pt:
          name: "N\xF3s Finos (Thin Nodes)"
          description: "Empregar funcionalidade e armazenamento de informa\xE7\xF5\
            es m\xEDnimos nos seguintes componentes do sistema: [Atribui\xE7\xE3o:\
            \ componentes de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "A implanta\xE7\xE3o de componentes de sistema com funcionalidade\
            \ m\xEDnima reduz a necessidade de proteger cada endpoint e pode reduzir\
            \ a exposi\xE7\xE3o de informa\xE7\xF5es, sistemas e servi\xE7os a ataques.\
            \ A funcionalidade reduzida ou m\xEDnima inclui n\xF3s sem disco (diskless)\
            \ e tecnologias de cliente fino (thin client)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-26
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-26
      name: Decoys
      description: Include components within organizational systems specifically designed
        to be the target of malicious attacks for detecting, deflecting, and analyzing
        such attacks.
      annotation: Decoys (i.e., honeypots, honeynets, or deception nets) are established
        to attract adversaries and deflect attacks away from the operational systems
        that support organizational mission and business functions. Use of decoys
        requires some supporting isolation measures to ensure that any deflected malicious
        code does not infect organizational systems. Depending on the specific usage
        of the decoy, consultation with the Office of the General Counsel before deployment
        may be needed.
      translations:
        pt:
          name: Iscas (Decoys)
          description: Incluir, nos sistemas organizacionais, componentes especificamente
            projetados para serem alvo de ataques maliciosos, com a finalidade de
            detectar, desviar e analisar tais ataques.
          annotation: "As iscas (ou seja, honeypots, honeynets ou redes de engano)\
            \ s\xE3o estabelecidas para atrair advers\xE1rios e desviar ataques dos\
            \ sistemas operacionais que suportam as fun\xE7\xF5es de miss\xE3o e de\
            \ neg\xF3cio da organiza\xE7\xE3o. O uso de iscas requer algumas medidas\
            \ de isolamento de apoio para garantir que qualquer c\xF3digo malicioso\
            \ desviado n\xE3o infecte os sistemas organizacionais. Dependendo do uso\
            \ espec\xEDfico da isca, pode ser necess\xE1ria a consulta ao Escrit\xF3\
            rio de Assessoria Jur\xEDdica (Office of the General Counsel) antes da\
            \ implanta\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-42(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-42(3)
      name: Sensor Capability and Data | Prohibit Use of Devices
      description: '[Withdrawn: Incorporated into SC-42.]'
      translations:
        pt:
          name: Capacidade e Dados de Sensores | Proibir o Uso de Dispositivos
          description: '[Retirado: Incorporado em SC-42.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-27
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-27
      name: Platform-independent Applications
      description: 'Include within organizational systems the following platform independent
        applications: [Assignment: organization-defined platform-independent applications].'
      annotation: Platforms are combinations of hardware, firmware, and software components
        used to execute software applications. Platforms include operating systems,
        the underlying computer architectures, or both. Platform-independent applications
        are applications with the capability to execute on multiple platforms. Such
        applications promote portability and reconstitution on different platforms.
        Application portability and the ability to reconstitute on different platforms
        increase the availability of mission-essential functions within organizations
        in situations where systems with specific operating systems are under attack.
      translations:
        pt:
          name: "Aplica\xE7\xF5es Independentes de Plataforma"
          description: "Incluir, nos sistemas organizacionais, as seguintes aplica\xE7\
            \xF5es independentes de plataforma: [Atribui\xE7\xE3o: aplica\xE7\xF5\
            es independentes de plataforma definidas pela organiza\xE7\xE3o]."
          annotation: "Plataformas s\xE3o combina\xE7\xF5es de componentes de hardware,\
            \ firmware e software usados para executar aplica\xE7\xF5es de software.\
            \ As plataformas incluem sistemas operacionais, as arquiteturas de computador\
            \ subjacentes, ou ambos. Aplica\xE7\xF5es independentes de plataforma\
            \ s\xE3o aplica\xE7\xF5es com a capacidade de executar em m\xFAltiplas\
            \ plataformas. Tais aplica\xE7\xF5es promovem a portabilidade e a reconstitui\xE7\
            \xE3o em diferentes plataformas. A portabilidade de aplica\xE7\xF5es e\
            \ a capacidade de reconstitui\xE7\xE3o em diferentes plataformas aumentam\
            \ a disponibilidade de fun\xE7\xF5es essenciais \xE0 miss\xE3o dentro\
            \ das organiza\xE7\xF5es em situa\xE7\xF5es nas quais sistemas com sistemas\
            \ operacionais espec\xEDficos est\xE3o sob ataque."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-28
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-28
      name: Protection of Information at Rest
      description: 'Protect the [Selection (one or more): confidentiality; integrity]
        of the following information at rest: [Assignment: organization-defined information
        at rest].'
      annotation: Information at rest refers to the state of information when it is
        not in process or in transit and is located on system components. Such components
        include internal or external hard disk drives, storage area network devices,
        or databases. However, the focus of protecting information at rest is not
        on the type of storage device or frequency of access but rather on the state
        of the information. Information at rest addresses the confidentiality and
        integrity of information and covers user information and system information.
        System-related information that requires protection includes configurations
        or rule sets for firewalls, intrusion detection and prevention systems, filtering
        routers, and authentication information. Organizations may employ different
        mechanisms to achieve confidentiality and integrity protections, including
        the use of cryptographic mechanisms and file share scanning. Integrity protection
        can be achieved, for example, by implementing write-once-read-many (WORM)
        technologies. When adequate protection of information at rest cannot otherwise
        be achieved, organizations may employ other controls, including frequent scanning
        to identify malicious code at rest and secure offline storage in lieu of online
        storage.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Informa\xE7\xF5es em Repouso"
          description: "Proteger a [Sele\xE7\xE3o (uma ou mais): confidencialidade;\
            \ integridade] das seguintes informa\xE7\xF5es em repouso: [Atribui\xE7\
            \xE3o: informa\xE7\xF5es em repouso definidas pela organiza\xE7\xE3o]."
          annotation: "Informa\xE7\xF5es em repouso referem-se ao estado das informa\xE7\
            \xF5es quando n\xE3o est\xE3o em processamento ou em tr\xE2nsito e est\xE3\
            o localizadas em componentes do sistema. Tais componentes incluem unidades\
            \ de disco r\xEDgido internas ou externas, dispositivos de rede de \xE1\
            rea de armazenamento (SAN) ou bancos de dados. No entanto, o foco da prote\xE7\
            \xE3o de informa\xE7\xF5es em repouso n\xE3o est\xE1 no tipo de dispositivo\
            \ de armazenamento ou na frequ\xEAncia de acesso, mas sim no estado das\
            \ informa\xE7\xF5es. As informa\xE7\xF5es em repouso tratam da confidencialidade\
            \ e da integridade das informa\xE7\xF5es e abrangem informa\xE7\xF5es\
            \ de usu\xE1rio e informa\xE7\xF5es de sistema. As informa\xE7\xF5es relacionadas\
            \ ao sistema que requerem prote\xE7\xE3o incluem configura\xE7\xF5es ou\
            \ conjuntos de regras de firewalls, sistemas de detec\xE7\xE3o e preven\xE7\
            \xE3o de intrus\xE3o, roteadores de filtragem e informa\xE7\xF5es de autentica\xE7\
            \xE3o. As organiza\xE7\xF5es podem empregar diferentes mecanismos para\
            \ alcan\xE7ar as prote\xE7\xF5es de confidencialidade e integridade, incluindo\
            \ o uso de mecanismos criptogr\xE1ficos e a varredura de compartilhamentos\
            \ de arquivos. A prote\xE7\xE3o de integridade pode ser alcan\xE7ada,\
            \ por exemplo, pela implementa\xE7\xE3o de tecnologias de grava\xE7\xE3\
            o \xFAnica e leitura m\xFAltipla (WORM). Quando a prote\xE7\xE3o adequada\
            \ das informa\xE7\xF5es em repouso n\xE3o puder ser alcan\xE7ada de outra\
            \ forma, as organiza\xE7\xF5es podem empregar outros controles, incluindo\
            \ a varredura frequente para identificar c\xF3digo malicioso em repouso\
            \ e o armazenamento offline seguro em vez do armazenamento online."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-28(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-28(1)
      name: Protection of Information at Rest | Cryptographic Protection
      description: 'Implement cryptographic mechanisms to prevent unauthorized disclosure
        and modification of the following information at rest on [Assignment: organization-defined
        system components or media]: [Assignment: organization-defined information].'
      annotation: The selection of cryptographic mechanisms is based on the need to
        protect the confidentiality and integrity of organizational information. The
        strength of mechanism is commensurate with the security category or classification
        of the information. Organizations have the flexibility to encrypt information
        on system components or media or encrypt data structures, including files,
        records, or fields.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Informa\xE7\xF5es em Repouso | Prote\xE7\xE3o Criptogr\xE1\
            fica"
          description: "Implementar mecanismos criptogr\xE1ficos para evitar a divulga\xE7\
            \xE3o e a modifica\xE7\xE3o n\xE3o autorizadas das seguintes informa\xE7\
            \xF5es em repouso em [Atribui\xE7\xE3o: componentes de sistema ou m\xED\
            dias definidos pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "A sele\xE7\xE3o de mecanismos criptogr\xE1ficos baseia-se na\
            \ necessidade de proteger a confidencialidade e a integridade das informa\xE7\
            \xF5es organizacionais. A robustez do mecanismo \xE9 proporcional \xE0\
            \ categoria de seguran\xE7a ou \xE0 classifica\xE7\xE3o das informa\xE7\
            \xF5es. As organiza\xE7\xF5es t\xEAm a flexibilidade de criptografar informa\xE7\
            \xF5es em componentes de sistema ou m\xEDdias, ou de criptografar estruturas\
            \ de dados, incluindo arquivos, registros ou campos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-28(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-28(2)
      name: Protection of Information at Rest | Offline Storage
      description: 'Remove the following information from online storage and store
        offline in a secure location: [Assignment: organization-defined information].'
      annotation: Removing organizational information from online storage to offline
        storage eliminates the possibility of individuals gaining unauthorized access
        to the information through a network. Therefore, organizations may choose
        to move information to offline storage in lieu of protecting such information
        in online storage.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Informa\xE7\xF5es em Repouso | Armazenamento Offline"
          description: "Remover as seguintes informa\xE7\xF5es do armazenamento online\
            \ e armazen\xE1-las offline em um local seguro: [Atribui\xE7\xE3o: informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "A remo\xE7\xE3o das informa\xE7\xF5es organizacionais do armazenamento\
            \ online para o armazenamento offline elimina a possibilidade de indiv\xED\
            duos obterem acesso n\xE3o autorizado \xE0s informa\xE7\xF5es por meio\
            \ de uma rede. Portanto, as organiza\xE7\xF5es podem optar por mover informa\xE7\
            \xF5es para o armazenamento offline em vez de proteger tais informa\xE7\
            \xF5es no armazenamento online."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-28(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-28(3)
      name: Protection of Information at Rest | Cryptographic Keys
      description: 'Provide protected storage for cryptographic keys [Selection: [Assignment:
        organization-defined safeguards]; hardware-protected key store].'
      annotation: A Trusted Platform Module (TPM) is an example of a hardware-protected
        data store that can be used to protect cryptographic keys.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Informa\xE7\xF5es em Repouso | Chaves Criptogr\xE1\
            ficas"
          description: "Fornecer armazenamento protegido para chaves criptogr\xE1\
            ficas [Sele\xE7\xE3o: [Atribui\xE7\xE3o: salvaguardas definidas pela organiza\xE7\
            \xE3o]; armazenamento de chaves protegido por hardware]."
          annotation: "Um Trusted Platform Module (TPM) \xE9 um exemplo de um armazenamento\
            \ de dados protegido por hardware que pode ser usado para proteger chaves\
            \ criptogr\xE1ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-29
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-29
      name: Heterogeneity
      description: 'Employ a diverse set of information technologies for the following
        system components in the implementation of the system: [Assignment: organization-defined
        system components].'
      annotation: Increasing the diversity of information technologies within organizational
        systems reduces the impact of potential exploitations or compromises of specific
        technologies. Such diversity protects against common mode failures, including
        those failures induced by supply chain attacks. Diversity in information technologies
        also reduces the likelihood that the means adversaries use to compromise one
        system component will be effective against other system components, thus further
        increasing the adversary work factor to successfully complete planned attacks.
        An increase in diversity may add complexity and management overhead that could
        ultimately lead to mistakes and unauthorized configurations.
      translations:
        pt:
          name: Heterogeneidade
          description: "Empregar um conjunto diversificado de tecnologias da informa\xE7\
            \xE3o para os seguintes componentes do sistema na implementa\xE7\xE3o\
            \ do sistema: [Atribui\xE7\xE3o: componentes de sistema definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Aumentar a diversidade de tecnologias da informa\xE7\xE3o dentro\
            \ dos sistemas organizacionais reduz o impacto de potenciais explora\xE7\
            \xF5es ou comprometimentos de tecnologias espec\xEDficas. Tal diversidade\
            \ protege contra falhas de modo comum, incluindo aquelas falhas induzidas\
            \ por ataques \xE0 cadeia de suprimentos. A diversidade nas tecnologias\
            \ da informa\xE7\xE3o tamb\xE9m reduz a probabilidade de que os meios\
            \ que os advers\xE1rios usam para comprometer um componente do sistema\
            \ sejam eficazes contra outros componentes do sistema, aumentando assim\
            \ ainda mais o fator de trabalho do advers\xE1rio para concluir com sucesso\
            \ os ataques planejados. Um aumento na diversidade pode acrescentar complexidade\
            \ e sobrecarga de gest\xE3o que poderiam, em \xFAltima an\xE1lise, levar\
            \ a erros e configura\xE7\xF5es n\xE3o autorizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-29(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-29(1)
      name: Heterogeneity | Virtualization Techniques
      description: 'Employ virtualization techniques to support the deployment of
        a diversity of operating systems and applications that are changed [Assignment:
        organization-defined frequency].'
      annotation: While frequent changes to operating systems and applications can
        pose significant configuration management challenges, the changes can result
        in an increased work factor for adversaries to conduct successful attacks.
        Changing virtual operating systems or applications, as opposed to changing
        actual operating systems or applications, provides virtual changes that impede
        attacker success while reducing configuration management efforts. Virtualization
        techniques can assist in isolating untrustworthy software or software of dubious
        provenance into confined execution environments.
      translations:
        pt:
          name: "Heterogeneidade | T\xE9cnicas de Virtualiza\xE7\xE3o"
          description: "Empregar t\xE9cnicas de virtualiza\xE7\xE3o para suportar\
            \ a implanta\xE7\xE3o de uma diversidade de sistemas operacionais e aplica\xE7\
            \xF5es que s\xE3o alterados com [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]."
          annotation: "Embora mudan\xE7as frequentes em sistemas operacionais e aplica\xE7\
            \xF5es possam representar desafios significativos de gest\xE3o de configura\xE7\
            \xE3o, as mudan\xE7as podem resultar em um aumento do fator de trabalho\
            \ para os advers\xE1rios conduzirem ataques bem-sucedidos. Alterar sistemas\
            \ operacionais ou aplica\xE7\xF5es virtuais, em oposi\xE7\xE3o a alterar\
            \ sistemas operacionais ou aplica\xE7\xF5es reais, proporciona mudan\xE7\
            as virtuais que impedem o sucesso do atacante ao mesmo tempo em que reduzem\
            \ os esfor\xE7os de gest\xE3o de configura\xE7\xE3o. As t\xE9cnicas de\
            \ virtualiza\xE7\xE3o podem auxiliar no isolamento de software n\xE3o\
            \ confi\xE1vel ou de software de proced\xEAncia duvidosa em ambientes\
            \ de execu\xE7\xE3o confinados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-30
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-30
      name: Concealment and Misdirection
      description: 'Employ the following concealment and misdirection techniques for
        [Assignment: organization-defined systems] at [Assignment: organization-defined
        time periods] to confuse and mislead adversaries: [Assignment: organization-defined
        concealment and misdirection techniques].'
      annotation: "Concealment and misdirection techniques can significantly reduce\
        \ the targeting capabilities of adversaries (i.e., window of opportunity and\
        \ available attack surface) to initiate and complete attacks. For example,\
        \ virtualization techniques provide organizations with the ability to disguise\
        \ systems, potentially reducing the likelihood of successful attacks without\
        \ the cost of having multiple platforms. The increased use of concealment\
        \ and misdirection techniques and methods\u2014including randomness, uncertainty,\
        \ and virtualization\u2014may sufficiently confuse and mislead adversaries\
        \ and subsequently increase the risk of discovery and/or exposing tradecraft.\
        \ Concealment and misdirection techniques may provide additional time to perform\
        \ core mission and business functions. The implementation of concealment and\
        \ misdirection techniques may add to the complexity and management overhead\
        \ required for the system."
      translations:
        pt:
          name: "Oculta\xE7\xE3o e Indu\xE7\xE3o ao Erro"
          description: "Empregar as seguintes t\xE9cnicas de oculta\xE7\xE3o e indu\xE7\
            \xE3o ao erro para [Atribui\xE7\xE3o: sistemas definidos pela organiza\xE7\
            \xE3o] em [Atribui\xE7\xE3o: per\xEDodos de tempo definidos pela organiza\xE7\
            \xE3o] para confundir e enganar advers\xE1rios: [Atribui\xE7\xE3o: t\xE9\
            cnicas de oculta\xE7\xE3o e indu\xE7\xE3o ao erro definidas pela organiza\xE7\
            \xE3o]."
          annotation: "As t\xE9cnicas de oculta\xE7\xE3o e indu\xE7\xE3o ao erro podem\
            \ reduzir significativamente as capacidades de direcionamento dos advers\xE1\
            rios (ou seja, a janela de oportunidade e a superf\xEDcie de ataque dispon\xED\
            vel) para iniciar e concluir ataques. Por exemplo, as t\xE9cnicas de virtualiza\xE7\
            \xE3o proporcionam \xE0s organiza\xE7\xF5es a capacidade de disfar\xE7\
            ar sistemas, reduzindo potencialmente a probabilidade de ataques bem-sucedidos\
            \ sem o custo de manter m\xFAltiplas plataformas. O aumento do uso de\
            \ t\xE9cnicas e m\xE9todos de oculta\xE7\xE3o e indu\xE7\xE3o ao erro\
            \ \u2014 incluindo aleatoriedade, incerteza e virtualiza\xE7\xE3o \u2014\
            \ pode confundir e enganar suficientemente os advers\xE1rios e, subsequentemente,\
            \ aumentar o risco de descoberta e/ou exposi\xE7\xE3o de suas t\xE9cnicas\
            \ (tradecraft). As t\xE9cnicas de oculta\xE7\xE3o e indu\xE7\xE3o ao erro\
            \ podem proporcionar tempo adicional para realizar as principais fun\xE7\
            \xF5es de miss\xE3o e de neg\xF3cio. A implementa\xE7\xE3o de t\xE9cnicas\
            \ de oculta\xE7\xE3o e indu\xE7\xE3o ao erro pode acrescentar \xE0 complexidade\
            \ e \xE0 sobrecarga de gest\xE3o exigidas para o sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(1)
      name: Boundary Protection | Physically Separated Subnetworks
      description: '[Withdrawn: Incorporated into SC-7.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o de Per\xEDmetro | Sub-redes Fisicamente Separadas"
          description: '[Retirado: Incorporado em SC-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-30(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-30(2)
      name: Concealment and Misdirection | Randomness
      description: 'Employ [Assignment: organization-defined techniques] to introduce
        randomness into organizational operations and assets.'
      annotation: Randomness introduces increased levels of uncertainty for adversaries
        regarding the actions that organizations take to defend their systems against
        attacks. Such actions may impede the ability of adversaries to correctly target
        information resources of organizations that support critical missions or business
        functions. Uncertainty may also cause adversaries to hesitate before initiating
        or continuing attacks. Misdirection techniques that involve randomness include
        performing certain routine actions at different times of day, employing different
        information technologies, using different suppliers, and rotating roles and
        responsibilities of organizational personnel.
      translations:
        pt:
          name: "Oculta\xE7\xE3o e Indu\xE7\xE3o ao Erro | Aleatoriedade"
          description: "Empregar [Atribui\xE7\xE3o: t\xE9cnicas definidas pela organiza\xE7\
            \xE3o] para introduzir aleatoriedade nas opera\xE7\xF5es e nos ativos\
            \ organizacionais."
          annotation: "A aleatoriedade introduz n\xEDveis maiores de incerteza para\
            \ os advers\xE1rios em rela\xE7\xE3o \xE0s a\xE7\xF5es que as organiza\xE7\
            \xF5es tomam para defender seus sistemas contra ataques. Tais a\xE7\xF5\
            es podem impedir a capacidade dos advers\xE1rios de direcionar corretamente\
            \ os recursos de informa\xE7\xE3o das organiza\xE7\xF5es que suportam\
            \ miss\xF5es cr\xEDticas ou fun\xE7\xF5es de neg\xF3cio. A incerteza tamb\xE9\
            m pode fazer com que os advers\xE1rios hesitem antes de iniciar ou continuar\
            \ ataques. As t\xE9cnicas de indu\xE7\xE3o ao erro que envolvem aleatoriedade\
            \ incluem realizar determinadas a\xE7\xF5es rotineiras em diferentes hor\xE1\
            rios do dia, empregar diferentes tecnologias da informa\xE7\xE3o, usar\
            \ diferentes fornecedores e rotacionar pap\xE9is e responsabilidades do\
            \ pessoal organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-30(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-30(3)
      name: Concealment and Misdirection | Change Processing and Storage Locations
      description: 'Change the location of [Assignment: organization-defined processing
        and/or storage] [Selection: [Assignment: organization-defined time frequency];
        at random time intervals]].'
      annotation: Adversaries target critical mission and business functions and the
        systems that support those mission and business functions while also trying
        to minimize the exposure of their existence and tradecraft. The static, homogeneous,
        and deterministic nature of organizational systems targeted by adversaries
        make such systems more susceptible to attacks with less adversary cost and
        effort to be successful. Changing processing and storage locations (also referred
        to as moving target defense) addresses the advanced persistent threat using
        techniques such as virtualization, distributed processing, and replication.
        This enables organizations to relocate the system components (i.e., processing,
        storage) that support critical mission and business functions. Changing the
        locations of processing activities and/or storage sites introduces a degree
        of uncertainty into the targeting activities of adversaries. The targeting
        uncertainty increases the work factor of adversaries and makes compromises
        or breaches of the organizational systems more difficult and time-consuming.
        It also increases the chances that adversaries may inadvertently disclose
        certain aspects of their tradecraft while attempting to locate critical organizational
        resources.
      translations:
        pt:
          name: "Oculta\xE7\xE3o e Indu\xE7\xE3o ao Erro | Alterar Locais de Processamento\
            \ e Armazenamento"
          description: "Alterar a localiza\xE7\xE3o de [Atribui\xE7\xE3o: processamento\
            \ e/ou armazenamento definidos pela organiza\xE7\xE3o] [Sele\xE7\xE3o:\
            \ [Atribui\xE7\xE3o: frequ\xEAncia de tempo definida pela organiza\xE7\
            \xE3o]; em intervalos de tempo aleat\xF3rios]]."
          annotation: "Os advers\xE1rios direcionam fun\xE7\xF5es cr\xEDticas de miss\xE3\
            o e de neg\xF3cio e os sistemas que suportam essas fun\xE7\xF5es de miss\xE3\
            o e de neg\xF3cio, ao mesmo tempo em que tentam minimizar a exposi\xE7\
            \xE3o de sua exist\xEAncia e de suas t\xE9cnicas (tradecraft). A natureza\
            \ est\xE1tica, homog\xEAnea e determin\xEDstica dos sistemas organizacionais\
            \ alvo dos advers\xE1rios torna tais sistemas mais suscet\xEDveis a ataques,\
            \ com menor custo e esfor\xE7o do advers\xE1rio para obter sucesso. A\
            \ altera\xE7\xE3o dos locais de processamento e armazenamento (tamb\xE9\
            m chamada de defesa de alvo m\xF3vel) trata da amea\xE7a persistente avan\xE7\
            ada usando t\xE9cnicas como virtualiza\xE7\xE3o, processamento distribu\xED\
            do e replica\xE7\xE3o. Isso permite que as organiza\xE7\xF5es realoquem\
            \ os componentes do sistema (ou seja, processamento, armazenamento) que\
            \ suportam fun\xE7\xF5es cr\xEDticas de miss\xE3o e de neg\xF3cio. Alterar\
            \ os locais das atividades de processamento e/ou dos s\xEDtios de armazenamento\
            \ introduz um grau de incerteza nas atividades de direcionamento dos advers\xE1\
            rios. A incerteza de direcionamento aumenta o fator de trabalho dos advers\xE1\
            rios e torna os comprometimentos ou viola\xE7\xF5es dos sistemas organizacionais\
            \ mais dif\xEDceis e demorados. Tamb\xE9m aumenta as chances de que os\
            \ advers\xE1rios possam inadvertidamente divulgar determinados aspectos\
            \ de suas t\xE9cnicas (tradecraft) enquanto tentam localizar recursos\
            \ organizacionais cr\xEDticos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-30(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-30(4)
      name: Concealment and Misdirection | Misleading Information
      description: 'Employ realistic, but misleading information in [Assignment: organization-defined
        system components] about its security state or posture.'
      annotation: Employing misleading information is intended to confuse potential
        adversaries regarding the nature and extent of controls deployed by organizations.
        Thus, adversaries may employ incorrect and ineffective attack techniques.
        One technique for misleading adversaries is for organizations to place misleading
        information regarding the specific controls deployed in external systems that
        are known to be targeted by adversaries. Another technique is the use of deception
        nets that mimic actual aspects of organizational systems but use, for example,
        out-of-date software configurations.
      translations:
        pt:
          name: "Oculta\xE7\xE3o e Indu\xE7\xE3o ao Erro | Informa\xE7\xF5es Enganosas"
          description: "Empregar informa\xE7\xF5es realistas, por\xE9m enganosas,\
            \ em [Atribui\xE7\xE3o: componentes de sistema definidos pela organiza\xE7\
            \xE3o] sobre seu estado ou postura de seguran\xE7a."
          annotation: "O emprego de informa\xE7\xF5es enganosas tem como objetivo\
            \ confundir potenciais advers\xE1rios quanto \xE0 natureza e \xE0 extens\xE3\
            o dos controles implantados pelas organiza\xE7\xF5es. Assim, os advers\xE1\
            rios podem empregar t\xE9cnicas de ataque incorretas e ineficazes. Uma\
            \ t\xE9cnica para enganar os advers\xE1rios \xE9 a organiza\xE7\xE3o colocar\
            \ informa\xE7\xF5es enganosas a respeito dos controles espec\xEDficos\
            \ implantados em sistemas externos que se sabe serem alvo de advers\xE1\
            rios. Outra t\xE9cnica \xE9 o uso de redes de engano (deception nets)\
            \ que imitam aspectos reais dos sistemas organizacionais, mas usam, por\
            \ exemplo, configura\xE7\xF5es de software desatualizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-30(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-30(5)
      name: Concealment and Misdirection | Concealment of System Components
      description: 'Employ the following techniques to hide or conceal [Assignment:
        organization-defined system components]: [Assignment: organization-defined
        techniques].'
      annotation: By hiding, disguising, or concealing critical system components,
        organizations may be able to decrease the probability that adversaries target
        and successfully compromise those assets. Potential means to hide, disguise,
        or conceal system components include the configuration of routers or the use
        of encryption or virtualization techniques.
      translations:
        pt:
          name: "Oculta\xE7\xE3o e Indu\xE7\xE3o ao Erro | Oculta\xE7\xE3o de Componentes\
            \ do Sistema"
          description: "Empregar as seguintes t\xE9cnicas para esconder ou ocultar\
            \ [Atribui\xE7\xE3o: componentes de sistema definidos pela organiza\xE7\
            \xE3o]: [Atribui\xE7\xE3o: t\xE9cnicas definidas pela organiza\xE7\xE3\
            o]."
          annotation: "Ao esconder, disfar\xE7ar ou ocultar componentes cr\xEDticos\
            \ do sistema, as organiza\xE7\xF5es podem ser capazes de diminuir a probabilidade\
            \ de que os advers\xE1rios direcionem e comprometam com sucesso esses\
            \ ativos. Os meios potenciais para esconder, disfar\xE7ar ou ocultar componentes\
            \ do sistema incluem a configura\xE7\xE3o de roteadores ou o uso de t\xE9\
            cnicas de criptografia ou de virtualiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-31
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-31
      name: Covert Channel Analysis
      description: 'a. Perform a covert channel analysis to identify those aspects
        of communications within the system that are potential avenues for covert
        [Selection (one or more): storage; timing] channels; and

        b. Estimate the maximum bandwidth of those channels.'
      annotation: Developers are in the best position to identify potential areas
        within systems that might lead to covert channels. Covert channel analysis
        is a meaningful activity when there is the potential for unauthorized information
        flows across security domains, such as in the case of systems that contain
        export-controlled information and have connections to external networks (i.e.,
        networks that are not controlled by organizations). Covert channel analysis
        is also useful for multilevel secure systems, multiple security level systems,
        and cross-domain systems.
      translations:
        pt:
          name: "An\xE1lise de Canais Encobertos"
          description: "a. Realizar uma an\xE1lise de canais encobertos para identificar\
            \ os aspectos das comunica\xE7\xF5es dentro do sistema que sejam potenciais\
            \ vias para canais encobertos de [Sele\xE7\xE3o (uma ou mais): armazenamento;\
            \ temporiza\xE7\xE3o]; e\nb. Estimar a largura de banda m\xE1xima desses\
            \ canais."
          annotation: "Os desenvolvedores est\xE3o na melhor posi\xE7\xE3o para identificar\
            \ potenciais \xE1reas dentro dos sistemas que possam levar a canais encobertos.\
            \ A an\xE1lise de canais encobertos \xE9 uma atividade significativa quando\
            \ h\xE1 potencial para fluxos de informa\xE7\xE3o n\xE3o autorizados entre\
            \ dom\xEDnios de seguran\xE7a, como no caso de sistemas que cont\xEAm\
            \ informa\xE7\xF5es sujeitas a controle de exporta\xE7\xE3o e que possuem\
            \ conex\xF5es com redes externas (ou seja, redes que n\xE3o s\xE3o controladas\
            \ pelas organiza\xE7\xF5es). A an\xE1lise de canais encobertos tamb\xE9\
            m \xE9 \xFAtil para sistemas seguros multin\xEDvel, sistemas de m\xFA\
            ltiplos n\xEDveis de seguran\xE7a e sistemas entre dom\xEDnios (cross-domain)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-31(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-31(1)
      name: Covert Channel Analysis | Test Covert Channels for Exploitability
      description: Test a subset of the identified covert channels to determine the
        channels that are exploitable.
      annotation: None.
      translations:
        pt:
          name: "An\xE1lise de Canais Encobertos | Testar a Explorabilidade de Canais\
            \ Encobertos"
          description: "Testar um subconjunto dos canais encobertos identificados\
            \ para determinar os canais que s\xE3o explor\xE1veis."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-31(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-31(2)
      name: Covert Channel Analysis | Maximum Bandwidth
      description: 'Reduce the maximum bandwidth for identified covert [Selection
        (one or more): storage; timing] channels to [Assignment: organization-defined
        values].'
      annotation: The complete elimination of covert channels, especially covert timing
        channels, is usually not possible without significant performance impacts.
      translations:
        pt:
          name: "An\xE1lise de Canais Encobertos | Largura de Banda M\xE1xima"
          description: "Reduzir a largura de banda m\xE1xima dos canais encobertos\
            \ identificados de [Sele\xE7\xE3o (uma ou mais): armazenamento; temporiza\xE7\
            \xE3o] para [Atribui\xE7\xE3o: valores definidos pela organiza\xE7\xE3\
            o]."
          annotation: "A elimina\xE7\xE3o completa de canais encobertos, especialmente\
            \ canais encobertos de temporiza\xE7\xE3o, geralmente n\xE3o \xE9 poss\xED\
            vel sem impactos significativos no desempenho."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-31(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-31(3)
      name: Covert Channel Analysis | Measure Bandwidth in Operational Environments
      description: 'Measure the bandwidth of [Assignment: organization-defined subset
        of identified covert channels] in the operational environment of the system.'
      annotation: Measuring covert channel bandwidth in specified operational environments
        helps organizations determine how much information can be covertly leaked
        before such leakage adversely affects mission or business functions. Covert
        channel bandwidth may be significantly different when measured in settings
        that are independent of the specific environments of operation, including
        laboratories or system development environments.
      translations:
        pt:
          name: "An\xE1lise de Canais Encobertos | Medir a Largura de Banda em Ambientes\
            \ Operacionais"
          description: "Medir a largura de banda de [Atribui\xE7\xE3o: subconjunto\
            \ de canais encobertos identificados definido pela organiza\xE7\xE3o]\
            \ no ambiente operacional do sistema."
          annotation: "Medir a largura de banda dos canais encobertos em ambientes\
            \ operacionais especificados ajuda as organiza\xE7\xF5es a determinar\
            \ quanta informa\xE7\xE3o pode ser vazada de forma encoberta antes que\
            \ tal vazamento afete adversamente as fun\xE7\xF5es de miss\xE3o ou de\
            \ neg\xF3cio. A largura de banda dos canais encobertos pode ser significativamente\
            \ diferente quando medida em ambientes que s\xE3o independentes dos ambientes\
            \ espec\xEDficos de opera\xE7\xE3o, incluindo laborat\xF3rios ou ambientes\
            \ de desenvolvimento de sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-32
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-32
      name: System Partitioning
      description: 'Partition the system into [Assignment: organization-defined system
        components] residing in separate [Selection: physical; logical] domains or
        environments based on [Assignment: organization-defined circumstances for
        physical or logical separation of components].'
      annotation: System partitioning is part of a defense-in-depth protection strategy.
        Organizations determine the degree of physical separation of system components.
        Physical separation options include physically distinct components in separate
        racks in the same room, critical components in separate rooms, and geographical
        separation of critical components. Security categorization can guide the selection
        of candidates for domain partitioning. Managed interfaces restrict or prohibit
        network access and information flow among partitioned system components.
      translations:
        pt:
          name: Particionamento do Sistema
          description: "Particionar o sistema em [Atribui\xE7\xE3o: componentes de\
            \ sistema definidos pela organiza\xE7\xE3o] residentes em dom\xEDnios\
            \ ou ambientes [Sele\xE7\xE3o: f\xEDsicos; l\xF3gicos] separados, com\
            \ base em [Atribui\xE7\xE3o: circunst\xE2ncias definidas pela organiza\xE7\
            \xE3o para a separa\xE7\xE3o f\xEDsica ou l\xF3gica de componentes]."
          annotation: "O particionamento do sistema faz parte de uma estrat\xE9gia\
            \ de prote\xE7\xE3o em defesa em profundidade. As organiza\xE7\xF5es determinam\
            \ o grau de separa\xE7\xE3o f\xEDsica dos componentes do sistema. As op\xE7\
            \xF5es de separa\xE7\xE3o f\xEDsica incluem componentes fisicamente distintos\
            \ em racks separados na mesma sala, componentes cr\xEDticos em salas separadas\
            \ e a separa\xE7\xE3o geogr\xE1fica de componentes cr\xEDticos. A categoriza\xE7\
            \xE3o de seguran\xE7a pode orientar a sele\xE7\xE3o de candidatos para\
            \ o particionamento de dom\xEDnios. As interfaces gerenciadas restringem\
            \ ou pro\xEDbem o acesso \xE0 rede e o fluxo de informa\xE7\xF5es entre\
            \ os componentes particionados do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-32(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-32(1)
      name: System Partitioning | Separate Physical Domains for Privileged Functions
      description: Partition privileged functions into separate physical domains.
      annotation: Privileged functions that operate in a single physical domain may
        represent a single point of failure if that domain becomes compromised or
        experiences a denial of service.
      translations:
        pt:
          name: "Particionamento do Sistema | Dom\xEDnios F\xEDsicos Separados para\
            \ Fun\xE7\xF5es Privilegiadas"
          description: "Particionar fun\xE7\xF5es privilegiadas em dom\xEDnios f\xED\
            sicos separados."
          annotation: "Fun\xE7\xF5es privilegiadas que operam em um \xFAnico dom\xED\
            nio f\xEDsico podem representar um ponto \xFAnico de falha caso esse dom\xED\
            nio seja comprometido ou sofra uma nega\xE7\xE3o de servi\xE7o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(2)
      name: Boundary Protection | Public Access
      description: '[Withdrawn: Incorporated into SC-7.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o de Per\xEDmetro | Acesso P\xFAblico"
          description: '[Retirado: Incorporado em SC-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-34
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-34
      name: Non-modifiable Executable Programs
      description: 'For [Assignment: organization-defined system components], load
        and execute:

        a. The operating environment from hardware-enforced, read-only media; and

        b. The following applications from hardware-enforced, read-only media: [Assignment:
        organization-defined applications].'
      annotation: The operating environment for a system contains the code that hosts
        applications, including operating systems, executives, or virtual machine
        monitors (i.e., hypervisors). It can also include certain applications that
        run directly on hardware platforms. Hardware-enforced, read-only media include
        Compact Disc-Recordable (CD-R) and Digital Versatile Disc-Recordable (DVD-R)
        disk drives as well as one-time, programmable, read-only memory. The use of
        non-modifiable storage ensures the integrity of software from the point of
        creation of the read-only image. The use of reprogrammable, read-only memory
        can be accepted as read-only media provided that integrity can be adequately
        protected from the point of initial writing to the insertion of the memory
        into the system, and there are reliable hardware protections against reprogramming
        the memory while installed in organizational systems.
      translations:
        pt:
          name: "Programas Execut\xE1veis N\xE3o Modific\xE1veis"
          description: "Para [Atribui\xE7\xE3o: componentes de sistema definidos pela\
            \ organiza\xE7\xE3o], carregar e executar:\na. O ambiente operacional\
            \ a partir de m\xEDdia somente leitura imposta por hardware; e\nb. As\
            \ seguintes aplica\xE7\xF5es a partir de m\xEDdia somente leitura imposta\
            \ por hardware: [Atribui\xE7\xE3o: aplica\xE7\xF5es definidas pela organiza\xE7\
            \xE3o]."
          annotation: "O ambiente operacional de um sistema cont\xE9m o c\xF3digo\
            \ que hospeda as aplica\xE7\xF5es, incluindo sistemas operacionais, executivos\
            \ (executives) ou monitores de m\xE1quina virtual (ou seja, hipervisores).\
            \ Tamb\xE9m pode incluir determinadas aplica\xE7\xF5es que s\xE3o executadas\
            \ diretamente em plataformas de hardware. As m\xEDdias somente leitura\
            \ impostas por hardware incluem unidades de disco Compact Disc-Recordable\
            \ (CD-R) e Digital Versatile Disc-Recordable (DVD-R), bem como mem\xF3\
            ria somente leitura program\xE1vel \xFAnica (one-time programmable). O\
            \ uso de armazenamento n\xE3o modific\xE1vel garante a integridade do\
            \ software a partir do ponto de cria\xE7\xE3o da imagem somente leitura.\
            \ O uso de mem\xF3ria somente leitura reprogram\xE1vel pode ser aceito\
            \ como m\xEDdia somente leitura, desde que a integridade possa ser adequadamente\
            \ protegida desde o ponto da grava\xE7\xE3o inicial at\xE9 a inser\xE7\
            \xE3o da mem\xF3ria no sistema, e que existam prote\xE7\xF5es de hardware\
            \ confi\xE1veis contra a reprograma\xE7\xE3o da mem\xF3ria enquanto instalada\
            \ nos sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-34(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-34(1)
      name: Non-modifiable Executable Programs | No Writable Storage
      description: 'Employ [Assignment: organization-defined system components] with
        no writeable storage that is persistent across component restart or power
        on/off.'
      annotation: Disallowing writeable storage eliminates the possibility of malicious
        code insertion via persistent, writeable storage within the designated system
        components. The restriction applies to fixed and removable storage, with the
        latter being addressed either directly or as specific restrictions imposed
        through access controls for mobile devices.
      translations:
        pt:
          name: "Programas Execut\xE1veis N\xE3o Modific\xE1veis | Sem Armazenamento\
            \ Grav\xE1vel"
          description: "Empregar [Atribui\xE7\xE3o: componentes de sistema definidos\
            \ pela organiza\xE7\xE3o] sem armazenamento grav\xE1vel que seja persistente\
            \ entre a reinicializa\xE7\xE3o do componente ou o ligar/desligar."
          annotation: "N\xE3o permitir armazenamento grav\xE1vel elimina a possibilidade\
            \ de inser\xE7\xE3o de c\xF3digo malicioso por meio de armazenamento grav\xE1\
            vel persistente dentro dos componentes de sistema designados. A restri\xE7\
            \xE3o aplica-se ao armazenamento fixo e remov\xEDvel, sendo este \xFA\
            ltimo tratado diretamente ou como restri\xE7\xF5es espec\xEDficas impostas\
            \ por meio de controles de acesso para dispositivos m\xF3veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-34(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-34(2)
      name: Non-modifiable Executable Programs | Integrity Protection on Read-only
        Media
      description: Protect the integrity of information prior to storage on read-only
        media and control the media after such information has been recorded onto
        the media.
      annotation: Controls prevent the substitution of media into systems or the reprogramming
        of programmable read-only media prior to installation into the systems. Integrity
        protection controls include a combination of prevention, detection, and response.
      translations:
        pt:
          name: "Programas Execut\xE1veis N\xE3o Modific\xE1veis | Prote\xE7\xE3o\
            \ de Integridade em M\xEDdia Somente Leitura"
          description: "Proteger a integridade das informa\xE7\xF5es antes do armazenamento\
            \ em m\xEDdia somente leitura e controlar a m\xEDdia ap\xF3s tais informa\xE7\
            \xF5es terem sido gravadas nela."
          annotation: "Os controles previnem a substitui\xE7\xE3o de m\xEDdia nos\
            \ sistemas ou a reprograma\xE7\xE3o de m\xEDdia program\xE1vel somente\
            \ leitura antes da instala\xE7\xE3o nos sistemas. Os controles de prote\xE7\
            \xE3o de integridade incluem uma combina\xE7\xE3o de preven\xE7\xE3o,\
            \ detec\xE7\xE3o e resposta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(6)
      name: Boundary Protection | Response to Recognized Failures
      description: '[Withdrawn: Incorporated into SC-7(18).]'
      translations:
        pt:
          name: "Prote\xE7\xE3o de Per\xEDmetro | Resposta a Falhas Reconhecidas"
          description: '[Retirado: Incorporado ao SC-7(18).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-35
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-35
      name: External Malicious Code Identification
      description: Include system components that proactively seek to identify network-based
        malicious code or malicious websites.
      annotation: External malicious code identification differs from decoys in SC-26
        in that the components actively probe networks, including the Internet, in
        search of malicious code contained on external websites. Like decoys, the
        use of external malicious code identification techniques requires some supporting
        isolation measures to ensure that any malicious code discovered during the
        search and subsequently executed does not infect organizational systems. Virtualization
        is a common technique for achieving such isolation.
      translations:
        pt:
          name: "Identifica\xE7\xE3o de C\xF3digo Malicioso Externo"
          description: "Incluir componentes do sistema que busquem proativamente identificar\
            \ c\xF3digo malicioso baseado em rede ou sites maliciosos."
          annotation: "A identifica\xE7\xE3o de c\xF3digo malicioso externo difere\
            \ dos engodos no SC-26 pelo fato de os componentes sondarem ativamente\
            \ as redes, incluindo a Internet, em busca de c\xF3digo malicioso contido\
            \ em sites externos. Assim como os engodos, o uso de t\xE9cnicas de identifica\xE7\
            \xE3o de c\xF3digo malicioso externo requer algumas medidas de isolamento\
            \ de apoio para garantir que qualquer c\xF3digo malicioso descoberto durante\
            \ a busca e posteriormente executado n\xE3o infecte os sistemas organizacionais.\
            \ A virtualiza\xE7\xE3o \xE9 uma t\xE9cnica comum para alcan\xE7ar tal\
            \ isolamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-36
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-36
      name: Distributed Processing and Storage
      description: 'Distribute the following processing and storage components across
        multiple [Selection: physical locations; logical domains]: [Assignment: organization-defined
        processing and storage components].'
      annotation: Distributing processing and storage across multiple physical locations
        or logical domains provides a degree of redundancy or overlap for organizations.
        The redundancy and overlap increase the work factor of adversaries to adversely
        impact organizational operations, assets, and individuals. The use of distributed
        processing and storage does not assume a single primary processing or storage
        location. Therefore, it allows for parallel processing and storage.
      translations:
        pt:
          name: "Processamento e Armazenamento Distribu\xEDdos"
          description: "Distribuir os seguintes componentes de processamento e armazenamento\
            \ por m\xFAltiplos [Sele\xE7\xE3o: locais f\xEDsicos; dom\xEDnios l\xF3\
            gicos]: [Atribui\xE7\xE3o: componentes de processamento e armazenamento\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A distribui\xE7\xE3o de processamento e armazenamento por m\xFA\
            ltiplos locais f\xEDsicos ou dom\xEDnios l\xF3gicos proporciona um grau\
            \ de redund\xE2ncia ou sobreposi\xE7\xE3o para as organiza\xE7\xF5es.\
            \ A redund\xE2ncia e a sobreposi\xE7\xE3o aumentam o esfor\xE7o necess\xE1\
            rio de advers\xE1rios para impactar adversamente as opera\xE7\xF5es, ativos\
            \ e indiv\xEDduos organizacionais. O uso de processamento e armazenamento\
            \ distribu\xEDdos n\xE3o pressup\xF5e um \xFAnico local prim\xE1rio de\
            \ processamento ou armazenamento. Portanto, permite o processamento e\
            \ o armazenamento paralelos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-36(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-36(1)
      name: Distributed Processing and Storage | Polling Techniques
      description: '(a) Employ polling techniques to identify potential faults, errors,
        or compromises to the following processing and storage components: [Assignment:
        organization-defined distributed processing and storage components]; and

        (b) Take the following actions in response to identified faults, errors, or
        compromises: [Assignment: organization-defined actions].'
      annotation: Distributed processing and/or storage may be used to reduce opportunities
        for adversaries to compromise the confidentiality, integrity, or availability
        of organizational information and systems. However, the distribution of processing
        and storage components does not prevent adversaries from compromising one
        or more of the components. Polling compares the processing results and/or
        storage content from the distributed components and subsequently votes on
        the outcomes. Polling identifies potential faults, compromises, or errors
        in the distributed processing and storage components.
      translations:
        pt:
          name: "Processamento e Armazenamento Distribu\xEDdos | T\xE9cnicas de Sondagem"
          description: "(a) Empregar t\xE9cnicas de sondagem (polling) para identificar\
            \ potenciais falhas, erros ou comprometimentos nos seguintes componentes\
            \ de processamento e armazenamento: [Atribui\xE7\xE3o: componentes de\
            \ processamento e armazenamento distribu\xEDdos definidos pela organiza\xE7\
            \xE3o]; e\n(b) Adotar as seguintes a\xE7\xF5es em resposta a falhas, erros\
            \ ou comprometimentos identificados: [Atribui\xE7\xE3o: a\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "O processamento e/ou armazenamento distribu\xEDdos podem ser\
            \ usados para reduzir as oportunidades de advers\xE1rios comprometerem\
            \ a confidencialidade, integridade ou disponibilidade das informa\xE7\xF5\
            es e sistemas organizacionais. No entanto, a distribui\xE7\xE3o de componentes\
            \ de processamento e armazenamento n\xE3o impede que advers\xE1rios comprometam\
            \ um ou mais dos componentes. A sondagem (polling) compara os resultados\
            \ de processamento e/ou o conte\xFAdo de armazenamento dos componentes\
            \ distribu\xEDdos e, posteriormente, vota sobre os resultados. A sondagem\
            \ identifica potenciais falhas, comprometimentos ou erros nos componentes\
            \ de processamento e armazenamento distribu\xEDdos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-36(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-36(2)
      name: Distributed Processing and Storage | Synchronization
      description: 'Synchronize the following duplicate systems or system components:
        [Assignment: organization-defined duplicate systems or system components].'
      annotation: SC-36 and CP-9(6) require the duplication of systems or system components
        in distributed locations. The synchronization of duplicated and redundant
        services and data helps to ensure that information contained in the distributed
        locations can be used in the mission or business functions of organizations,
        as needed.
      translations:
        pt:
          name: "Processamento e Armazenamento Distribu\xEDdos | Sincroniza\xE7\xE3\
            o"
          description: "Sincronizar os seguintes sistemas ou componentes de sistema\
            \ duplicados: [Atribui\xE7\xE3o: sistemas ou componentes de sistema duplicados\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O SC-36 e o CP-9(6) exigem a duplica\xE7\xE3o de sistemas ou\
            \ componentes de sistema em locais distribu\xEDdos. A sincroniza\xE7\xE3\
            o de servi\xE7os e dados duplicados e redundantes ajuda a garantir que\
            \ as informa\xE7\xF5es contidas nos locais distribu\xEDdos possam ser\
            \ usadas nas fun\xE7\xF5es de miss\xE3o ou de neg\xF3cio das organiza\xE7\
            \xF5es, conforme necess\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-37
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-37
      name: Out-of-band Channels
      description: 'Employ the following out-of-band channels for the physical delivery
        or electronic transmission of [Assignment: organization-defined information,
        system components, or devices] to [Assignment: organization-defined individuals
        or systems]: [Assignment: organization-defined out-of-band channels].'
      annotation: Out-of-band channels include local, non-network accesses to systems;
        network paths physically separate from network paths used for operational
        traffic; or non-electronic paths, such as the U.S. Postal Service. The use
        of out-of-band channels is contrasted with the use of in-band channels (i.e.,
        the same channels) that carry routine operational traffic. Out-of-band channels
        do not have the same vulnerability or exposure as in-band channels. Therefore,
        the confidentiality, integrity, or availability compromises of in-band channels
        will not compromise or adversely affect the out-of-band channels. Organizations
        may employ out-of-band channels in the delivery or transmission of organizational
        items, including authenticators and credentials; cryptographic key management
        information; system and data backups; configuration management changes for
        hardware, firmware, or software; security updates; maintenance information;
        and malicious code protection updates.
      translations:
        pt:
          name: Canais Fora de Banda
          description: "Empregar os seguintes canais fora de banda para a entrega\
            \ f\xEDsica ou transmiss\xE3o eletr\xF4nica de [Atribui\xE7\xE3o: informa\xE7\
            \xF5es, componentes de sistema ou dispositivos definidos pela organiza\xE7\
            \xE3o] para [Atribui\xE7\xE3o: indiv\xEDduos ou sistemas definidos pela\
            \ organiza\xE7\xE3o]: [Atribui\xE7\xE3o: canais fora de banda definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Canais fora de banda incluem acessos locais, n\xE3o baseados\
            \ em rede, aos sistemas; caminhos de rede fisicamente separados dos caminhos\
            \ de rede usados para tr\xE1fego operacional; ou caminhos n\xE3o eletr\xF4\
            nicos, como o servi\xE7o postal dos EUA (U.S. Postal Service). O uso de\
            \ canais fora de banda contrasta com o uso de canais em banda (ou seja,\
            \ os mesmos canais) que transportam o tr\xE1fego operacional rotineiro.\
            \ Os canais fora de banda n\xE3o t\xEAm a mesma vulnerabilidade ou exposi\xE7\
            \xE3o dos canais em banda. Portanto, os comprometimentos de confidencialidade,\
            \ integridade ou disponibilidade dos canais em banda n\xE3o comprometer\xE3\
            o nem afetar\xE3o adversamente os canais fora de banda. As organiza\xE7\
            \xF5es podem empregar canais fora de banda na entrega ou transmiss\xE3\
            o de itens organizacionais, incluindo autenticadores e credenciais; informa\xE7\
            \xF5es de gerenciamento de chaves criptogr\xE1ficas; backups de sistemas\
            \ e dados; altera\xE7\xF5es de gerenciamento de configura\xE7\xE3o para\
            \ hardware, firmware ou software; atualiza\xE7\xF5es de seguran\xE7a;\
            \ informa\xE7\xF5es de manuten\xE7\xE3o; e atualiza\xE7\xF5es de prote\xE7\
            \xE3o contra c\xF3digo malicioso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-37(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-37(1)
      name: Out-of-band Channels | Ensure Delivery and Transmission
      description: 'Employ [Assignment: organization-defined controls] to ensure that
        only [Assignment: organization-defined individuals or systems] receive the
        following information, system components, or devices: [Assignment: organization-defined
        information, system components, or devices].'
      annotation: Techniques employed by organizations to ensure that only designated
        systems or individuals receive certain information, system components, or
        devices include sending authenticators via an approved courier service but
        requiring recipients to show some form of government-issued photographic identification
        as a condition of receipt.
      translations:
        pt:
          name: "Canais Fora de Banda | Garantir Entrega e Transmiss\xE3o"
          description: "Empregar [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\
            \xE3o] para garantir que apenas [Atribui\xE7\xE3o: indiv\xEDduos ou sistemas\
            \ definidos pela organiza\xE7\xE3o] recebam as seguintes informa\xE7\xF5\
            es, componentes de sistema ou dispositivos: [Atribui\xE7\xE3o: informa\xE7\
            \xF5es, componentes de sistema ou dispositivos definidos pela organiza\xE7\
            \xE3o]."
          annotation: "As t\xE9cnicas empregadas pelas organiza\xE7\xF5es para garantir\
            \ que apenas sistemas ou indiv\xEDduos designados recebam determinadas\
            \ informa\xE7\xF5es, componentes de sistema ou dispositivos incluem o\
            \ envio de autenticadores por meio de um servi\xE7o de courier aprovado,\
            \ exigindo, por\xE9m, que os destinat\xE1rios apresentem alguma forma\
            \ de identifica\xE7\xE3o fotogr\xE1fica emitida pelo governo como condi\xE7\
            \xE3o para o recebimento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-38
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-38
      name: Operations Security
      description: 'Employ the following operations security controls to protect key
        organizational information throughout the system development life cycle: [Assignment:
        organization-defined operations security controls].'
      annotation: 'Operations security (OPSEC) is a systematic process by which potential
        adversaries can be denied information about the capabilities and intentions
        of organizations by identifying, controlling, and protecting generally unclassified
        information that specifically relates to the planning and execution of sensitive
        organizational activities. The OPSEC process involves five steps: identification
        of critical information, analysis of threats, analysis of vulnerabilities,
        assessment of risks, and the application of appropriate countermeasures. OPSEC
        controls are applied to organizational systems and the environments in which
        those systems operate. OPSEC controls protect the confidentiality of information,
        including limiting the sharing of information with suppliers, potential suppliers,
        and other non-organizational elements and individuals. Information critical
        to organizational mission and business functions includes user identities,
        element uses, suppliers, supply chain processes, functional requirements,
        security requirements, system design specifications, testing and evaluation
        protocols, and security control implementation details.'
      translations:
        pt:
          name: "Seguran\xE7a Operacional"
          description: "Empregar os seguintes controles de seguran\xE7a operacional\
            \ para proteger as informa\xE7\xF5es organizacionais-chave ao longo de\
            \ todo o ciclo de vida de desenvolvimento do sistema: [Atribui\xE7\xE3\
            o: controles de seguran\xE7a operacional definidos pela organiza\xE7\xE3\
            o]."
          annotation: "A seguran\xE7a operacional (OPSEC) \xE9 um processo sistem\xE1\
            tico pelo qual potenciais advers\xE1rios podem ser impedidos de obter\
            \ informa\xE7\xF5es sobre as capacidades e inten\xE7\xF5es das organiza\xE7\
            \xF5es, mediante a identifica\xE7\xE3o, o controle e a prote\xE7\xE3o\
            \ de informa\xE7\xF5es geralmente n\xE3o classificadas que se relacionam\
            \ especificamente com o planejamento e a execu\xE7\xE3o de atividades\
            \ organizacionais sens\xEDveis. O processo de OPSEC envolve cinco etapas:\
            \ identifica\xE7\xE3o de informa\xE7\xF5es cr\xEDticas, an\xE1lise de\
            \ amea\xE7as, an\xE1lise de vulnerabilidades, avalia\xE7\xE3o de riscos\
            \ e a aplica\xE7\xE3o de contramedidas apropriadas. Os controles de OPSEC\
            \ s\xE3o aplicados aos sistemas organizacionais e aos ambientes nos quais\
            \ esses sistemas operam. Os controles de OPSEC protegem a confidencialidade\
            \ das informa\xE7\xF5es, incluindo a limita\xE7\xE3o do compartilhamento\
            \ de informa\xE7\xF5es com fornecedores, potenciais fornecedores e outros\
            \ elementos e indiv\xEDduos n\xE3o organizacionais. As informa\xE7\xF5\
            es cr\xEDticas para a miss\xE3o organizacional e as fun\xE7\xF5es de neg\xF3\
            cio incluem identidades de usu\xE1rios, usos de elementos, fornecedores,\
            \ processos da cadeia de suprimentos, requisitos funcionais, requisitos\
            \ de seguran\xE7a, especifica\xE7\xF5es de projeto do sistema, protocolos\
            \ de teste e avalia\xE7\xE3o e detalhes de implementa\xE7\xE3o dos controles\
            \ de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-39
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-39
      name: Process Isolation
      description: Maintain a separate execution domain for each executing system
        process.
      annotation: Systems can maintain separate execution domains for each executing
        process by assigning each process a separate address space. Each system process
        has a distinct address space so that communication between processes is performed
        in a manner controlled through the security functions, and one process cannot
        modify the executing code of another process. Maintaining separate execution
        domains for executing processes can be achieved, for example, by implementing
        separate address spaces. Process isolation technologies, including sandboxing
        or virtualization, logically separate software and firmware from other software,
        firmware, and data. Process isolation helps limit the access of potentially
        untrusted software to other system resources. The capability to maintain separate
        execution domains is available in commercial operating systems that employ
        multi-state processor technologies.
      translations:
        pt:
          name: Isolamento de Processos
          description: "Manter um dom\xEDnio de execu\xE7\xE3o separado para cada\
            \ processo de sistema em execu\xE7\xE3o."
          annotation: "Os sistemas podem manter dom\xEDnios de execu\xE7\xE3o separados\
            \ para cada processo em execu\xE7\xE3o atribuindo a cada processo um espa\xE7\
            o de endere\xE7amento separado. Cada processo de sistema possui um espa\xE7\
            o de endere\xE7amento distinto, de modo que a comunica\xE7\xE3o entre\
            \ processos seja realizada de forma controlada pelas fun\xE7\xF5es de\
            \ seguran\xE7a, e um processo n\xE3o possa modificar o c\xF3digo em execu\xE7\
            \xE3o de outro processo. Manter dom\xEDnios de execu\xE7\xE3o separados\
            \ para os processos em execu\xE7\xE3o pode ser alcan\xE7ado, por exemplo,\
            \ implementando espa\xE7os de endere\xE7amento separados. As tecnologias\
            \ de isolamento de processos, incluindo sandbox ou virtualiza\xE7\xE3\
            o, separam logicamente software e firmware de outros softwares, firmwares\
            \ e dados. O isolamento de processos ajuda a limitar o acesso de software\
            \ potencialmente n\xE3o confi\xE1vel a outros recursos do sistema. A capacidade\
            \ de manter dom\xEDnios de execu\xE7\xE3o separados est\xE1 dispon\xED\
            vel em sistemas operacionais comerciais que empregam tecnologias de processador\
            \ multiestado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-39(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-39(1)
      name: Process Isolation | Hardware Separation
      description: Implement hardware separation mechanisms to facilitate process
        isolation.
      annotation: Hardware-based separation of system processes is generally less
        susceptible to compromise than software-based separation, thus providing greater
        assurance that the separation will be enforced. Hardware separation mechanisms
        include hardware memory management.
      translations:
        pt:
          name: "Isolamento de Processos | Separa\xE7\xE3o por Hardware"
          description: "Implementar mecanismos de separa\xE7\xE3o por hardware para\
            \ facilitar o isolamento de processos."
          annotation: "A separa\xE7\xE3o baseada em hardware dos processos de sistema\
            \ \xE9 geralmente menos suscet\xEDvel a comprometimento do que a separa\xE7\
            \xE3o baseada em software, proporcionando assim maior garantia de que\
            \ a separa\xE7\xE3o ser\xE1 aplicada. Os mecanismos de separa\xE7\xE3\
            o por hardware incluem o gerenciamento de mem\xF3ria por hardware."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-39(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-39(2)
      name: Process Isolation | Separate Execution Domain Per Thread
      description: 'Maintain a separate execution domain for each thread in [Assignment:
        organization-defined multi-threaded processing].'
      annotation: None.
      translations:
        pt:
          name: "Isolamento de Processos | Dom\xEDnio de Execu\xE7\xE3o Separado por\
            \ Thread"
          description: "Manter um dom\xEDnio de execu\xE7\xE3o separado para cada\
            \ thread em [Atribui\xE7\xE3o: processamento multithread definido pela\
            \ organiza\xE7\xE3o]."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-40
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-40
      name: Wireless Link Protection
      description: 'Protect external and internal [Assignment: organization-defined
        wireless links] from the following signal parameter attacks: [Assignment:
        organization-defined types of signal parameter attacks or references to sources
        for such attacks].'
      annotation: Wireless link protection applies to internal and external wireless
        communication links that may be visible to individuals who are not authorized
        system users. Adversaries can exploit the signal parameters of wireless links
        if such links are not adequately protected. There are many ways to exploit
        the signal parameters of wireless links to gain intelligence, deny service,
        or spoof system users. Protection of wireless links reduces the impact of
        attacks that are unique to wireless systems. If organizations rely on commercial
        service providers for transmission services as commodity items rather than
        as fully dedicated services, it may not be possible to implement wireless
        link protections to the extent necessary to meet organizational security requirements.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Enlaces Sem Fio"
          description: "Proteger [Atribui\xE7\xE3o: enlaces sem fio definidos pela\
            \ organiza\xE7\xE3o] externos e internos contra os seguintes ataques de\
            \ par\xE2metros de sinal: [Atribui\xE7\xE3o: tipos de ataques de par\xE2\
            metros de sinal ou refer\xEAncias a fontes de tais ataques definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "A prote\xE7\xE3o de enlaces sem fio aplica-se a enlaces de\
            \ comunica\xE7\xE3o sem fio internos e externos que podem ser vis\xED\
            veis a indiv\xEDduos que n\xE3o sejam usu\xE1rios autorizados do sistema.\
            \ Advers\xE1rios podem explorar os par\xE2metros de sinal de enlaces sem\
            \ fio se tais enlaces n\xE3o forem adequadamente protegidos. H\xE1 muitas\
            \ maneiras de explorar os par\xE2metros de sinal de enlaces sem fio para\
            \ obter intelig\xEAncia, negar servi\xE7o ou falsificar a identidade de\
            \ usu\xE1rios do sistema. A prote\xE7\xE3o de enlaces sem fio reduz o\
            \ impacto de ataques que s\xE3o exclusivos de sistemas sem fio. Se as\
            \ organiza\xE7\xF5es dependerem de provedores de servi\xE7o comerciais\
            \ para servi\xE7os de transmiss\xE3o como itens de commodity, em vez de\
            \ servi\xE7os totalmente dedicados, pode n\xE3o ser poss\xEDvel implementar\
            \ prote\xE7\xF5es de enlace sem fio na extens\xE3o necess\xE1ria para\
            \ atender aos requisitos de seguran\xE7a organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-40(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-40(1)
      name: Wireless Link Protection | Electromagnetic Interference
      description: 'Implement cryptographic mechanisms that achieve [Assignment: organization-defined
        level of protection] against the effects of intentional electromagnetic interference.'
      annotation: The implementation of cryptographic mechanisms for electromagnetic
        interference protects systems against intentional jamming that might deny
        or impair communications by ensuring that wireless spread spectrum waveforms
        used to provide anti-jam protection are not predictable by unauthorized individuals.
        The implementation of cryptographic mechanisms may also coincidentally mitigate
        the effects of unintentional jamming due to interference from legitimate transmitters
        that share the same spectrum. Mission requirements, projected threats, concept
        of operations, and laws, executive orders, directives, regulations, policies,
        and standards determine levels of wireless link availability, cryptography
        needed, and performance.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Enlaces Sem Fio | Interfer\xEAncia Eletromagn\xE9\
            tica"
          description: "Implementar mecanismos criptogr\xE1ficos que atinjam [Atribui\xE7\
            \xE3o: n\xEDvel de prote\xE7\xE3o definido pela organiza\xE7\xE3o] contra\
            \ os efeitos de interfer\xEAncia eletromagn\xE9tica intencional."
          annotation: "A implementa\xE7\xE3o de mecanismos criptogr\xE1ficos para\
            \ interfer\xEAncia eletromagn\xE9tica protege os sistemas contra interfer\xEA\
            ncia intencional (jamming) que possa negar ou prejudicar as comunica\xE7\
            \xF5es, garantindo que as formas de onda de espectro espalhado sem fio\
            \ usadas para fornecer prote\xE7\xE3o antijamming n\xE3o sejam previs\xED\
            veis por indiv\xEDduos n\xE3o autorizados. A implementa\xE7\xE3o de mecanismos\
            \ criptogr\xE1ficos tamb\xE9m pode, coincidentemente, mitigar os efeitos\
            \ de jamming n\xE3o intencional decorrente da interfer\xEAncia de transmissores\
            \ leg\xEDtimos que compartilham o mesmo espectro. Os requisitos de miss\xE3\
            o, as amea\xE7as previstas, o conceito de opera\xE7\xF5es e as leis, ordens\
            \ executivas, diretivas, regulamentos, pol\xEDticas e normas determinam\
            \ os n\xEDveis de disponibilidade do enlace sem fio, a criptografia necess\xE1\
            ria e o desempenho."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-40(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-40(2)
      name: Wireless Link Protection | Reduce Detection Potential
      description: 'Implement cryptographic mechanisms to reduce the detection potential
        of wireless links to [Assignment: organization-defined level of reduction].'
      annotation: The implementation of cryptographic mechanisms to reduce detection
        potential is used for covert communications and to protect wireless transmitters
        from geo-location. It also ensures that the spread spectrum waveforms used
        to achieve a low probability of detection are not predictable by unauthorized
        individuals. Mission requirements, projected threats, concept of operations,
        and applicable laws, executive orders, directives, regulations, policies,
        and standards determine the levels to which wireless links are undetectable.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Enlaces Sem Fio | Reduzir o Potencial de Detec\xE7\
            \xE3o"
          description: "Implementar mecanismos criptogr\xE1ficos para reduzir o potencial\
            \ de detec\xE7\xE3o de enlaces sem fio at\xE9 [Atribui\xE7\xE3o: n\xED\
            vel de redu\xE7\xE3o definido pela organiza\xE7\xE3o]."
          annotation: "A implementa\xE7\xE3o de mecanismos criptogr\xE1ficos para\
            \ reduzir o potencial de detec\xE7\xE3o \xE9 usada para comunica\xE7\xF5\
            es encobertas e para proteger transmissores sem fio de geolocaliza\xE7\
            \xE3o. Tamb\xE9m garante que as formas de onda de espectro espalhado usadas\
            \ para alcan\xE7ar uma baixa probabilidade de detec\xE7\xE3o n\xE3o sejam\
            \ previs\xEDveis por indiv\xEDduos n\xE3o autorizados. Os requisitos de\
            \ miss\xE3o, as amea\xE7as previstas, o conceito de opera\xE7\xF5es e\
            \ as leis, ordens executivas, diretivas, regulamentos, pol\xEDticas e\
            \ normas aplic\xE1veis determinam os n\xEDveis at\xE9 os quais os enlaces\
            \ sem fio s\xE3o indetect\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-40(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-40(3)
      name: Wireless Link Protection | Imitative or Manipulative Communications Deception
      description: Implement cryptographic mechanisms to identify and reject wireless
        transmissions that are deliberate attempts to achieve imitative or manipulative
        communications deception based on signal parameters.
      annotation: The implementation of cryptographic mechanisms to identify and reject
        imitative or manipulative communications ensures that the signal parameters
        of wireless transmissions are not predictable by unauthorized individuals.
        Such unpredictability reduces the probability of imitative or manipulative
        communications deception based on signal parameters alone.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Enlaces Sem Fio | Decep\xE7\xE3o de Comunica\xE7\
            \xF5es Imitativa ou Manipulativa"
          description: "Implementar mecanismos criptogr\xE1ficos para identificar\
            \ e rejeitar transmiss\xF5es sem fio que sejam tentativas deliberadas\
            \ de alcan\xE7ar decep\xE7\xE3o de comunica\xE7\xF5es imitativa ou manipulativa\
            \ com base em par\xE2metros de sinal."
          annotation: "A implementa\xE7\xE3o de mecanismos criptogr\xE1ficos para\
            \ identificar e rejeitar comunica\xE7\xF5es imitativas ou manipulativas\
            \ garante que os par\xE2metros de sinal das transmiss\xF5es sem fio n\xE3\
            o sejam previs\xEDveis por indiv\xEDduos n\xE3o autorizados. Tal imprevisibilidade\
            \ reduz a probabilidade de decep\xE7\xE3o de comunica\xE7\xF5es imitativa\
            \ ou manipulativa baseada apenas em par\xE2metros de sinal."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-40(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-40(4)
      name: Wireless Link Protection | Signal Parameter Identification
      description: 'Implement cryptographic mechanisms to prevent the identification
        of [Assignment: organization-defined wireless transmitters] by using the transmitter
        signal parameters.'
      annotation: The implementation of cryptographic mechanisms to prevent the identification
        of wireless transmitters protects against the unique identification of wireless
        transmitters for the purposes of intelligence exploitation by ensuring that
        anti-fingerprinting alterations to signal parameters are not predictable by
        unauthorized individuals. It also provides anonymity when required. Radio
        fingerprinting techniques identify the unique signal parameters of transmitters
        to fingerprint such transmitters for purposes of tracking and mission or user
        identification.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Enlaces Sem Fio | Identifica\xE7\xE3o de Par\xE2\
            metros de Sinal"
          description: "Implementar mecanismos criptogr\xE1ficos para impedir a identifica\xE7\
            \xE3o de [Atribui\xE7\xE3o: transmissores sem fio definidos pela organiza\xE7\
            \xE3o] por meio do uso dos par\xE2metros de sinal do transmissor."
          annotation: "A implementa\xE7\xE3o de mecanismos criptogr\xE1ficos para\
            \ impedir a identifica\xE7\xE3o de transmissores sem fio protege contra\
            \ a identifica\xE7\xE3o \xFAnica de transmissores sem fio para fins de\
            \ explora\xE7\xE3o de intelig\xEAncia, garantindo que as altera\xE7\xF5\
            es antifingerprinting nos par\xE2metros de sinal n\xE3o sejam previs\xED\
            veis por indiv\xEDduos n\xE3o autorizados. Tamb\xE9m proporciona anonimato\
            \ quando necess\xE1rio. As t\xE9cnicas de fingerprinting de r\xE1dio identificam\
            \ os par\xE2metros de sinal exclusivos dos transmissores para fingerprintar\
            \ tais transmissores com finalidades de rastreamento e identifica\xE7\xE3\
            o de miss\xE3o ou usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-41
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-41
      name: Port and I/O Device Access
      description: '[Selection: Physically; Logically] disable or remove [Assignment:
        organization-defined connection ports or input/output devices] on the following
        systems or system components: [Assignment: organization-defined systems or
        system components].'
      annotation: Connection ports include Universal Serial Bus (USB), Thunderbolt,
        and Firewire (IEEE 1394). Input/output (I/O) devices include compact disc
        and digital versatile disc drives. Disabling or removing such connection ports
        and I/O devices helps prevent the exfiltration of information from systems
        and the introduction of malicious code from those ports or devices. Physically
        disabling or removing ports and/or devices is the stronger action.
      translations:
        pt:
          name: Acesso a Portas e Dispositivos de E/S
          description: "[Sele\xE7\xE3o: Fisicamente; Logicamente] desabilitar ou remover\
            \ [Atribui\xE7\xE3o: portas de conex\xE3o ou dispositivos de entrada/sa\xED\
            da definidos pela organiza\xE7\xE3o] nos seguintes sistemas ou componentes\
            \ de sistema: [Atribui\xE7\xE3o: sistemas ou componentes de sistema definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "As portas de conex\xE3o incluem Universal Serial Bus (USB),\
            \ Thunderbolt e Firewire (IEEE 1394). Os dispositivos de entrada/sa\xED\
            da (E/S) incluem unidades de disco compacto e de disco vers\xE1til digital.\
            \ Desabilitar ou remover tais portas de conex\xE3o e dispositivos de E/S\
            \ ajuda a prevenir a exfiltra\xE7\xE3o de informa\xE7\xF5es dos sistemas\
            \ e a introdu\xE7\xE3o de c\xF3digo malicioso a partir dessas portas ou\
            \ dispositivos. Desabilitar ou remover fisicamente portas e/ou dispositivos\
            \ \xE9 a a\xE7\xE3o mais forte."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-42
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-42
      name: Sensor Capability and Data
      description: 'a. Prohibit [Selection (one or more): the use of devices possessing
        [Assignment: organization-defined environmental sensing capabilities] in [Assignment:
        organization-defined facilities, areas, or systems]; the remote activation
        of environmental sensing capabilities on organizational systems or system
        components with the following exceptions: [Assignment: organization-defined
        exceptions where remote activation of sensors is allowed]]; and

        b. Provide an explicit indication of sensor use to [Assignment: organization-defined
        group of users].'
      annotation: Sensor capability and data applies to types of systems or system
        components characterized as mobile devices, such as cellular telephones, smart
        phones, and tablets. Mobile devices often include sensors that can collect
        and record data regarding the environment where the system is in use. Sensors
        that are embedded within mobile devices include microphones, cameras, Global
        Positioning System (GPS) mechanisms, and accelerometers. While the sensors
        on mobiles devices provide an important function, if activated covertly, such
        devices can potentially provide a means for adversaries to learn valuable
        information about individuals and organizations. For example, remotely activating
        the GPS function on a mobile device could provide an adversary with the ability
        to track the movements of an individual. Organizations may prohibit individuals
        from bringing cellular telephones or digital cameras into certain designated
        facilities or controlled areas within facilities where classified information
        is stored or sensitive conversations are taking place.
      translations:
        pt:
          name: Capacidade e Dados de Sensores
          description: "a. Proibir [Sele\xE7\xE3o (um ou mais): o uso de dispositivos\
            \ que possuam [Atribui\xE7\xE3o: capacidades de detec\xE7\xE3o ambiental\
            \ definidas pela organiza\xE7\xE3o] em [Atribui\xE7\xE3o: instala\xE7\xF5\
            es, \xE1reas ou sistemas definidos pela organiza\xE7\xE3o]; a ativa\xE7\
            \xE3o remota de capacidades de detec\xE7\xE3o ambiental em sistemas ou\
            \ componentes de sistema organizacionais, com as seguintes exce\xE7\xF5\
            es: [Atribui\xE7\xE3o: exce\xE7\xF5es definidas pela organiza\xE7\xE3\
            o nas quais a ativa\xE7\xE3o remota de sensores \xE9 permitida]]; e\n\
            b. Fornecer uma indica\xE7\xE3o expl\xEDcita do uso de sensores para [Atribui\xE7\
            \xE3o: grupo de usu\xE1rios definido pela organiza\xE7\xE3o]."
          annotation: "A capacidade e os dados de sensores aplicam-se a tipos de sistemas\
            \ ou componentes de sistema caracterizados como dispositivos m\xF3veis,\
            \ como telefones celulares, smartphones e tablets. Os dispositivos m\xF3\
            veis frequentemente incluem sensores que podem coletar e registrar dados\
            \ sobre o ambiente em que o sistema est\xE1 em uso. Os sensores embutidos\
            \ em dispositivos m\xF3veis incluem microfones, c\xE2meras, mecanismos\
            \ de Sistema de Posicionamento Global (GPS) e aceler\xF4metros. Embora\
            \ os sensores em dispositivos m\xF3veis forne\xE7am uma fun\xE7\xE3o importante,\
            \ se ativados de forma encoberta, tais dispositivos podem potencialmente\
            \ fornecer um meio para advers\xE1rios obterem informa\xE7\xF5es valiosas\
            \ sobre indiv\xEDduos e organiza\xE7\xF5es. Por exemplo, a ativa\xE7\xE3\
            o remota da fun\xE7\xE3o GPS em um dispositivo m\xF3vel poderia fornecer\
            \ a um advers\xE1rio a capacidade de rastrear os movimentos de um indiv\xED\
            duo. As organiza\xE7\xF5es podem proibir indiv\xEDduos de levar telefones\
            \ celulares ou c\xE2meras digitais para determinadas instala\xE7\xF5es\
            \ designadas ou \xE1reas controladas dentro de instala\xE7\xF5es onde\
            \ informa\xE7\xF5es classificadas s\xE3o armazenadas ou conversas sens\xED\
            veis ocorrem."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-42(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-42(1)
      name: Sensor Capability and Data | Reporting to Authorized Individuals or Roles
      description: 'Verify that the system is configured so that data or information
        collected by the [Assignment: organization-defined sensors] is only reported
        to authorized individuals or roles.'
      annotation: In situations where sensors are activated by authorized individuals,
        it is still possible that the data or information collected by the sensors
        will be sent to unauthorized entities.
      translations:
        pt:
          name: "Capacidade e Dados de Sensores | Comunica\xE7\xE3o a Indiv\xEDduos\
            \ ou Fun\xE7\xF5es Autorizados"
          description: "Verificar se o sistema est\xE1 configurado de modo que os\
            \ dados ou informa\xE7\xF5es coletados pelos [Atribui\xE7\xE3o: sensores\
            \ definidos pela organiza\xE7\xE3o] sejam comunicados apenas a indiv\xED\
            duos ou fun\xE7\xF5es autorizados."
          annotation: "Em situa\xE7\xF5es nas quais os sensores s\xE3o ativados por\
            \ indiv\xEDduos autorizados, ainda \xE9 poss\xEDvel que os dados ou informa\xE7\
            \xF5es coletados pelos sensores sejam enviados a entidades n\xE3o autorizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-42(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-42(2)
      name: Sensor Capability and Data | Authorized Use
      description: 'Employ the following measures so that data or information collected
        by [Assignment: organization-defined sensors] is only used for authorized
        purposes: [Assignment: organization-defined measures].'
      annotation: Information collected by sensors for a specific authorized purpose
        could be misused for some unauthorized purpose. For example, GPS sensors that
        are used to support traffic navigation could be misused to track the movements
        of individuals. Measures to mitigate such activities include additional training
        to help ensure that authorized individuals do not abuse their authority and,
        in the case where sensor data is maintained by external parties, contractual
        restrictions on the use of such data.
      translations:
        pt:
          name: Capacidade e Dados de Sensores | Uso Autorizado
          description: "Empregar as seguintes medidas para que os dados ou informa\xE7\
            \xF5es coletados pelos [Atribui\xE7\xE3o: sensores definidos pela organiza\xE7\
            \xE3o] sejam usados apenas para finalidades autorizadas: [Atribui\xE7\xE3\
            o: medidas definidas pela organiza\xE7\xE3o]."
          annotation: "Informa\xE7\xF5es coletadas por sensores para uma finalidade\
            \ autorizada espec\xEDfica poderiam ser indevidamente usadas para alguma\
            \ finalidade n\xE3o autorizada. Por exemplo, sensores GPS usados para\
            \ apoiar a navega\xE7\xE3o no tr\xE2nsito poderiam ser indevidamente usados\
            \ para rastrear os movimentos de indiv\xEDduos. As medidas para mitigar\
            \ tais atividades incluem treinamento adicional para ajudar a garantir\
            \ que indiv\xEDduos autorizados n\xE3o abusem de sua autoridade e, no\
            \ caso em que os dados de sensores sejam mantidos por terceiros, restri\xE7\
            \xF5es contratuais sobre o uso de tais dados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-9
      name: Transmission Confidentiality
      description: '[Withdrawn: Incorporated into SC-8.]'
      translations:
        pt:
          name: "Confidencialidade de Transmiss\xE3o"
          description: '[Retirado: Incorporado ao SC-8.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-42(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-42(4)
      name: Sensor Capability and Data | Notice of Collection
      description: "Employ the following measures to facilitate an individual\u2019\
        s awareness that personally identifiable information is being collected by\
        \ [Assignment: organization-defined sensors]: [Assignment: organization-defined\
        \ measures]."
      annotation: Awareness that organizational sensors are collecting data enables
        individuals to more effectively engage in managing their privacy. Measures
        can include conventional written notices and sensor configurations that make
        individuals directly or indirectly aware through other devices that the sensor
        is collecting information. The usability and efficacy of the notice are important
        considerations.
      translations:
        pt:
          name: Capacidade e Dados de Sensores | Aviso de Coleta
          description: "Empregar as seguintes medidas para facilitar a conscientiza\xE7\
            \xE3o de um indiv\xEDduo de que informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal est\xE3o sendo coletadas pelos [Atribui\xE7\xE3o: sensores definidos\
            \ pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: medidas definidas pela organiza\xE7\
            \xE3o]."
          annotation: "A conscientiza\xE7\xE3o de que os sensores organizacionais\
            \ est\xE3o coletando dados permite que os indiv\xEDduos se envolvam de\
            \ forma mais eficaz na gest\xE3o de sua privacidade. As medidas podem\
            \ incluir avisos escritos convencionais e configura\xE7\xF5es de sensores\
            \ que tornem os indiv\xEDduos direta ou indiretamente cientes, por meio\
            \ de outros dispositivos, de que o sensor est\xE1 coletando informa\xE7\
            \xF5es. A usabilidade e a efic\xE1cia do aviso s\xE3o considera\xE7\xF5\
            es importantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-42(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-42(5)
      name: Sensor Capability and Data | Collection Minimization
      description: 'Employ [Assignment: organization-defined sensors] that are configured
        to minimize the collection of information about individuals that is not needed.'
      annotation: Although policies to control for authorized use can be applied to
        information once it is collected, minimizing the collection of information
        that is not needed mitigates privacy risk at the system entry point and mitigates
        the risk of policy control failures. Sensor configurations include the obscuring
        of human features, such as blurring or pixelating flesh tones.
      translations:
        pt:
          name: "Capacidade e Dados de Sensores | Minimiza\xE7\xE3o da Coleta"
          description: "Empregar [Atribui\xE7\xE3o: sensores definidos pela organiza\xE7\
            \xE3o] que estejam configurados para minimizar a coleta de informa\xE7\
            \xF5es sobre indiv\xEDduos que n\xE3o sejam necess\xE1rias."
          annotation: "Embora pol\xEDticas para controlar o uso autorizado possam\
            \ ser aplicadas \xE0s informa\xE7\xF5es depois de coletadas, minimizar\
            \ a coleta de informa\xE7\xF5es que n\xE3o s\xE3o necess\xE1rias mitiga\
            \ o risco de privacidade no ponto de entrada do sistema e mitiga o risco\
            \ de falhas no controle de pol\xEDticas. As configura\xE7\xF5es de sensores\
            \ incluem a oculta\xE7\xE3o de caracter\xEDsticas humanas, como desfocagem\
            \ ou pixeliza\xE7\xE3o de tons de pele."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-43
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-43
      name: Usage Restrictions
      description: 'a. Establish usage restrictions and implementation guidelines
        for the following system components: [Assignment: organization-defined system
        components]; and

        b. Authorize, monitor, and control the use of such components within the system.'
      annotation: Usage restrictions apply to all system components including but
        not limited to mobile code, mobile devices, wireless access, and wired and
        wireless peripheral components (e.g., copiers, printers, scanners, optical
        devices, and other similar technologies). The usage restrictions and implementation
        guidelines are based on the potential for system components to cause damage
        to the system and help to ensure that only authorized system use occurs.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Uso"
          description: "a. Estabelecer restri\xE7\xF5es de uso e diretrizes de implementa\xE7\
            \xE3o para os seguintes componentes de sistema: [Atribui\xE7\xE3o: componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]; e\nb. Autorizar, monitorar\
            \ e controlar o uso de tais componentes dentro do sistema."
          annotation: "As restri\xE7\xF5es de uso aplicam-se a todos os componentes\
            \ de sistema, incluindo, entre outros, c\xF3digo m\xF3vel, dispositivos\
            \ m\xF3veis, acesso sem fio e componentes perif\xE9ricos com e sem fio\
            \ (por exemplo, copiadoras, impressoras, scanners, dispositivos \xF3pticos\
            \ e outras tecnologias similares). As restri\xE7\xF5es de uso e as diretrizes\
            \ de implementa\xE7\xE3o baseiam-se no potencial de os componentes de\
            \ sistema causarem danos ao sistema e ajudam a garantir que apenas o uso\
            \ autorizado do sistema ocorra."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-44
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-44
      name: Detonation Chambers
      description: 'Employ a detonation chamber capability within [Assignment: organization-defined
        system, system component, or location].'
      annotation: Detonation chambers, also known as dynamic execution environments,
        allow organizations to open email attachments, execute untrusted or suspicious
        applications, and execute Universal Resource Locator requests in the safety
        of an isolated environment or a virtualized sandbox. Protected and isolated
        execution environments provide a means of determining whether the associated
        attachments or applications contain malicious code. While related to the concept
        of deception nets, the employment of detonation chambers is not intended to
        maintain a long-term environment in which adversaries can operate and their
        actions can be observed. Rather, detonation chambers are intended to quickly
        identify malicious code and either reduce the likelihood that the code is
        propagated to user environments of operation or prevent such propagation completely.
      translations:
        pt:
          name: "C\xE2maras de Detona\xE7\xE3o"
          description: "Empregar uma capacidade de c\xE2mara de detona\xE7\xE3o dentro\
            \ de [Atribui\xE7\xE3o: sistema, componente de sistema ou local definido\
            \ pela organiza\xE7\xE3o]."
          annotation: "As c\xE2maras de detona\xE7\xE3o, tamb\xE9m conhecidas como\
            \ ambientes de execu\xE7\xE3o din\xE2mica, permitem que as organiza\xE7\
            \xF5es abram anexos de e-mail, executem aplica\xE7\xF5es n\xE3o confi\xE1\
            veis ou suspeitas e executem solicita\xE7\xF5es de Localizador Universal\
            \ de Recursos (URL) na seguran\xE7a de um ambiente isolado ou de uma sandbox\
            \ virtualizada. Ambientes de execu\xE7\xE3o protegidos e isolados fornecem\
            \ um meio de determinar se os anexos ou aplica\xE7\xF5es associados cont\xEA\
            m c\xF3digo malicioso. Embora relacionado ao conceito de redes de decep\xE7\
            \xE3o (deception nets), o emprego de c\xE2maras de detona\xE7\xE3o n\xE3\
            o tem por objetivo manter um ambiente de longo prazo no qual advers\xE1\
            rios possam operar e suas a\xE7\xF5es possam ser observadas. Em vez disso,\
            \ as c\xE2maras de detona\xE7\xE3o t\xEAm por objetivo identificar rapidamente\
            \ c\xF3digo malicioso e reduzir a probabilidade de que o c\xF3digo seja\
            \ propagado para os ambientes operacionais dos usu\xE1rios ou impedir\
            \ tal propaga\xE7\xE3o completamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-45
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-45
      name: System Time Synchronization
      description: Synchronize system clocks within and between systems and system
        components.
      annotation: "Time synchronization of system clocks is essential for the correct\
        \ execution of many system services, including identification and authentication\
        \ processes that involve certificates and time-of-day restrictions as part\
        \ of access control. Denial of service or failure to deny expired credentials\
        \ may result without properly synchronized clocks within and between systems\
        \ and system components. Time is commonly expressed in Coordinated Universal\
        \ Time (UTC), a modern continuation of Greenwich Mean Time (GMT), or local\
        \ time with an offset from UTC. The granularity of time measurements refers\
        \ to the degree of synchronization between system clocks and reference clocks,\
        \ such as clocks synchronizing within hundreds of milliseconds or tens of\
        \ milliseconds. Organizations may define different time granularities for\
        \ system components. Time service can be critical to other security capabilities\u2014\
        such as access control and identification and authentication\u2014depending\
        \ on the nature of the mechanisms used to support the capabilities."
      translations:
        pt:
          name: "Sincroniza\xE7\xE3o de Tempo do Sistema"
          description: "Sincronizar os rel\xF3gios do sistema dentro dos sistemas\
            \ e entre sistemas e componentes de sistema."
          annotation: "A sincroniza\xE7\xE3o de tempo dos rel\xF3gios do sistema \xE9\
            \ essencial para a correta execu\xE7\xE3o de muitos servi\xE7os do sistema,\
            \ incluindo processos de identifica\xE7\xE3o e autentica\xE7\xE3o que\
            \ envolvem certificados e restri\xE7\xF5es de hora do dia como parte do\
            \ controle de acesso. A nega\xE7\xE3o de servi\xE7o ou a falha em negar\
            \ credenciais expiradas pode resultar sem rel\xF3gios devidamente sincronizados\
            \ dentro dos sistemas e entre sistemas e componentes de sistema. O tempo\
            \ \xE9 comumente expresso em Tempo Universal Coordenado (UTC), uma continua\xE7\
            \xE3o moderna do Tempo M\xE9dio de Greenwich (GMT), ou em hora local com\
            \ um deslocamento em rela\xE7\xE3o ao UTC. A granularidade das medi\xE7\
            \xF5es de tempo refere-se ao grau de sincroniza\xE7\xE3o entre os rel\xF3\
            gios do sistema e os rel\xF3gios de refer\xEAncia, como rel\xF3gios que\
            \ se sincronizam dentro de centenas de milissegundos ou dezenas de milissegundos.\
            \ As organiza\xE7\xF5es podem definir diferentes granularidades de tempo\
            \ para componentes de sistema. O servi\xE7o de tempo pode ser cr\xEDtico\
            \ para outras capacidades de seguran\xE7a \u2014 como controle de acesso\
            \ e identifica\xE7\xE3o e autentica\xE7\xE3o \u2014 dependendo da natureza\
            \ dos mecanismos usados para apoiar essas capacidades."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-45(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-45(1)
      name: System Time Synchronization | Synchronization with Authoritative Time
        Source
      description: '(a) Compare the internal system clocks [Assignment: organization-defined
        frequency] with [Assignment: organization-defined authoritative time source];
        and

        (b) Synchronize the internal system clocks to the authoritative time source
        when the time difference is greater than [Assignment: organization-defined
        time period].'
      annotation: Synchronization of internal system clocks with an authoritative
        source provides uniformity of time stamps for systems with multiple system
        clocks and systems connected over a network.
      translations:
        pt:
          name: "Sincroniza\xE7\xE3o de Tempo do Sistema | Sincroniza\xE7\xE3o com\
            \ Fonte de Tempo Autoritativa"
          description: "(a) Comparar os rel\xF3gios internos do sistema [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] com [Atribui\xE7\
            \xE3o: fonte de tempo autoritativa definida pela organiza\xE7\xE3o]; e\n\
            (b) Sincronizar os rel\xF3gios internos do sistema com a fonte de tempo\
            \ autoritativa quando a diferen\xE7a de tempo for maior que [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]."
          annotation: "A sincroniza\xE7\xE3o dos rel\xF3gios internos do sistema com\
            \ uma fonte autoritativa proporciona uniformidade de carimbos de data\
            \ e hora para sistemas com m\xFAltiplos rel\xF3gios de sistema e sistemas\
            \ conectados por uma rede."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-45(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-45(2)
      name: System Time Synchronization | Secondary Authoritative Time Source
      description: '(a) Identify a secondary authoritative time source that is in
        a different geographic region than the primary authoritative time source;
        and

        (b) Synchronize the internal system clocks to the secondary authoritative
        time source if the primary authoritative time source is unavailable.'
      annotation: It may be necessary to employ geolocation information to determine
        that the secondary authoritative time source is in a different geographic
        region.
      translations:
        pt:
          name: "Sincroniza\xE7\xE3o de Tempo do Sistema | Fonte de Tempo Autoritativa\
            \ Secund\xE1ria"
          description: "(a) Identificar uma fonte de tempo autoritativa secund\xE1\
            ria que esteja em uma regi\xE3o geogr\xE1fica diferente da fonte de tempo\
            \ autoritativa prim\xE1ria; e\n(b) Sincronizar os rel\xF3gios internos\
            \ do sistema com a fonte de tempo autoritativa secund\xE1ria se a fonte\
            \ de tempo autoritativa prim\xE1ria estiver indispon\xEDvel."
          annotation: "Pode ser necess\xE1rio empregar informa\xE7\xF5es de geolocaliza\xE7\
            \xE3o para determinar que a fonte de tempo autoritativa secund\xE1ria\
            \ est\xE1 em uma regi\xE3o geogr\xE1fica diferente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-46
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-46
      name: Cross Domain Policy Enforcement
      description: 'Implement a policy enforcement mechanism [Selection: physically;
        logically] between the physical and/or network interfaces for the connecting
        security domains.'
      annotation: For logical policy enforcement mechanisms, organizations avoid creating
        a logical path between interfaces to prevent the ability to bypass the policy
        enforcement mechanism. For physical policy enforcement mechanisms, the robustness
        of physical isolation afforded by the physical implementation of policy enforcement
        to preclude the presence of logical covert channels penetrating the security
        domain may be needed. Contact ncdsmo@nsa.gov for more information.
      translations:
        pt:
          name: "Aplica\xE7\xE3o de Pol\xEDtica Entre Dom\xEDnios"
          description: "Implementar um mecanismo de aplica\xE7\xE3o de pol\xEDtica\
            \ [Sele\xE7\xE3o: fisicamente; logicamente] entre as interfaces f\xED\
            sicas e/ou de rede dos dom\xEDnios de seguran\xE7a em conex\xE3o."
          annotation: "Para mecanismos l\xF3gicos de aplica\xE7\xE3o de pol\xEDtica,\
            \ as organiza\xE7\xF5es evitam criar um caminho l\xF3gico entre interfaces\
            \ para impedir a possibilidade de contornar o mecanismo de aplica\xE7\xE3\
            o de pol\xEDtica. Para mecanismos f\xEDsicos de aplica\xE7\xE3o de pol\xED\
            tica, pode ser necess\xE1ria a robustez do isolamento f\xEDsico proporcionado\
            \ pela implementa\xE7\xE3o f\xEDsica da aplica\xE7\xE3o de pol\xEDtica\
            \ para impedir a presen\xE7a de canais ocultos l\xF3gicos que penetrem\
            \ o dom\xEDnio de seguran\xE7a. Entre em contato com ncdsmo@nsa.gov para\
            \ obter mais informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-47
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-47
      name: Alternate Communications Paths
      description: 'Establish [Assignment: organization-defined alternate communications
        paths] for system operations organizational command and control.'
      annotation: "An incident, whether adversarial- or nonadversarial-based, can\
        \ disrupt established communications paths used for system operations and\
        \ organizational command and control. Alternate communications paths reduce\
        \ the risk of all communications paths being affected by the same incident.\
        \ To compound the problem, the inability of organizational officials to obtain\
        \ timely information about disruptions or to provide timely direction to operational\
        \ elements after a communications path incident, can impact the ability of\
        \ the organization to respond to such incidents in a timely manner. Establishing\
        \ alternate communications paths for command and control purposes, including\
        \ designating alternative decision makers if primary decision makers are unavailable\
        \ and establishing the extent and limitations of their actions, can greatly\
        \ facilitate the organization\u2019s ability to continue to operate and take\
        \ appropriate actions during an incident."
      translations:
        pt:
          name: "Caminhos de Comunica\xE7\xE3o Alternativos"
          description: "Estabelecer [Atribui\xE7\xE3o: caminhos de comunica\xE7\xE3\
            o alternativos definidos pela organiza\xE7\xE3o] para o comando e controle\
            \ organizacional das opera\xE7\xF5es do sistema."
          annotation: "Um incidente, seja de natureza advers\xE1ria ou n\xE3o advers\xE1\
            ria, pode interromper os caminhos de comunica\xE7\xE3o estabelecidos usados\
            \ para as opera\xE7\xF5es do sistema e para o comando e controle organizacional.\
            \ Caminhos de comunica\xE7\xE3o alternativos reduzem o risco de todos\
            \ os caminhos de comunica\xE7\xE3o serem afetados pelo mesmo incidente.\
            \ Para agravar o problema, a incapacidade de funcion\xE1rios da organiza\xE7\
            \xE3o de obter informa\xE7\xF5es tempestivas sobre interrup\xE7\xF5es\
            \ ou de fornecer orienta\xE7\xE3o tempestiva aos elementos operacionais\
            \ ap\xF3s um incidente em um caminho de comunica\xE7\xE3o pode impactar\
            \ a capacidade da organiza\xE7\xE3o de responder a tais incidentes de\
            \ maneira tempestiva. Estabelecer caminhos de comunica\xE7\xE3o alternativos\
            \ para fins de comando e controle, incluindo a designa\xE7\xE3o de tomadores\
            \ de decis\xE3o alternativos caso os tomadores de decis\xE3o prim\xE1\
            rios estejam indispon\xEDveis e o estabelecimento do alcance e das limita\xE7\
            \xF5es de suas a\xE7\xF5es, pode facilitar enormemente a capacidade da\
            \ organiza\xE7\xE3o de continuar a operar e tomar as a\xE7\xF5es apropriadas\
            \ durante um incidente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-48
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-48
      name: Sensor Relocation
      description: 'Relocate [Assignment: organization-defined sensors and monitoring
        capabilities] to [Assignment: organization-defined locations] under the following
        conditions or circumstances: [Assignment: organization-defined conditions
        or circumstances].'
      annotation: "Adversaries may take various paths and use different approaches\
        \ as they move laterally through an organization (including its systems) to\
        \ reach their target or as they attempt to exfiltrate information from the\
        \ organization. The organization often only has a limited set of monitoring\
        \ and detection capabilities, and they may be focused on the critical or likely\
        \ infiltration or exfiltration paths. By using communications paths that the\
        \ organization typically does not monitor, the adversary can increase its\
        \ chances of achieving its desired goals. By relocating its sensors or monitoring\
        \ capabilities to new locations, the organization can impede the adversary\u2019\
        s ability to achieve its goals. The relocation of the sensors or monitoring\
        \ capabilities might be done based on threat information that the organization\
        \ has acquired or randomly to confuse the adversary and make its lateral transition\
        \ through the system or organization more challenging."
      translations:
        pt:
          name: "Realoca\xE7\xE3o de Sensores"
          description: "Realocar [Atribui\xE7\xE3o: sensores e capacidades de monitoramento\
            \ definidos pela organiza\xE7\xE3o] para [Atribui\xE7\xE3o: localiza\xE7\
            \xF5es definidas pela organiza\xE7\xE3o] sob as seguintes condi\xE7\xF5\
            es ou circunst\xE2ncias: [Atribui\xE7\xE3o: condi\xE7\xF5es ou circunst\xE2\
            ncias definidas pela organiza\xE7\xE3o]."
          annotation: "Advers\xE1rios podem seguir v\xE1rios caminhos e usar diferentes\
            \ abordagens \xE0 medida que se movem lateralmente por uma organiza\xE7\
            \xE3o (incluindo seus sistemas) para alcan\xE7ar seu alvo ou ao tentarem\
            \ exfiltrar informa\xE7\xF5es da organiza\xE7\xE3o. A organiza\xE7\xE3\
            o frequentemente disp\xF5e apenas de um conjunto limitado de capacidades\
            \ de monitoramento e detec\xE7\xE3o, e elas podem estar focadas nos caminhos\
            \ cr\xEDticos ou prov\xE1veis de infiltra\xE7\xE3o ou exfiltra\xE7\xE3\
            o. Ao usar caminhos de comunica\xE7\xE3o que a organiza\xE7\xE3o normalmente\
            \ n\xE3o monitora, o advers\xE1rio pode aumentar suas chances de atingir\
            \ os objetivos desejados. Ao realocar seus sensores ou capacidades de\
            \ monitoramento para novas localiza\xE7\xF5es, a organiza\xE7\xE3o pode\
            \ dificultar a capacidade do advers\xE1rio de atingir seus objetivos.\
            \ A realoca\xE7\xE3o dos sensores ou capacidades de monitoramento pode\
            \ ser feita com base em informa\xE7\xF5es de amea\xE7a que a organiza\xE7\
            \xE3o tenha adquirido ou de forma aleat\xF3ria para confundir o advers\xE1\
            rio e tornar sua transi\xE7\xE3o lateral pelo sistema ou pela organiza\xE7\
            \xE3o mais desafiadora."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-48(1)
      assessable: true

    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-19(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-19(4)
      name: Access Control for Mobile Devices | Restrictions for Classified Information
      description: '(a) Prohibit the use of unclassified mobile devices in facilities
        containing systems processing, storing, or transmitting classified information
        unless specifically permitted by the authorizing official; and

        (b) Enforce the following restrictions on individuals permitted by the authorizing
        official to use unclassified mobile devices in facilities containing systems
        processing, storing, or transmitting classified information:

        (1) Connection of unclassified mobile devices to classified systems is prohibited;

        (2) Connection of unclassified mobile devices to unclassified systems requires
        approval from the authorizing official;

        (3) Use of internal or external modems or wireless interfaces within the unclassified
        mobile devices is prohibited; and

        (4) Unclassified mobile devices and the information stored on those devices
        are subject to random reviews and inspections by [Assignment: organization-defined
        security officials], and if classified information is found, the incident
        handling policy is followed.

        (c) Restrict the connection of classified mobile devices to classified systems
        in accordance with [Assignment: organization-defined security policies].'
      annotation: None.
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos M\xF3veis | Restri\xE7\xF5es\
            \ para Informa\xE7\xF5es Classificadas"
          description: "(a) Proibir o uso de dispositivos m\xF3veis n\xE3o classificados\
            \ em instala\xE7\xF5es que contenham sistemas que processam, armazenam\
            \ ou transmitem informa\xE7\xF5es classificadas, salvo se especificamente\
            \ permitido pelo agente autorizador; e\n(b) Impor as seguintes restri\xE7\
            \xF5es \xE0s pessoas autorizadas pelo agente autorizador a usar dispositivos\
            \ m\xF3veis n\xE3o classificados em instala\xE7\xF5es que contenham sistemas\
            \ que processam, armazenam ou transmitem informa\xE7\xF5es classificadas:\n\
            (1) A conex\xE3o de dispositivos m\xF3veis n\xE3o classificados a sistemas\
            \ classificados \xE9 proibida;\n(2) A conex\xE3o de dispositivos m\xF3\
            veis n\xE3o classificados a sistemas n\xE3o classificados requer aprova\xE7\
            \xE3o do agente autorizador;\n(3) O uso de modems internos ou externos\
            \ ou de interfaces sem fio nos dispositivos m\xF3veis n\xE3o classificados\
            \ \xE9 proibido; e\n(4) Os dispositivos m\xF3veis n\xE3o classificados\
            \ e as informa\xE7\xF5es neles armazenadas est\xE3o sujeitos a revis\xF5\
            es e inspe\xE7\xF5es aleat\xF3rias por [Atribui\xE7\xE3o: agentes de seguran\xE7\
            a definidos pela organiza\xE7\xE3o] e, caso seja encontrada informa\xE7\
            \xE3o classificada, a pol\xEDtica de tratamento de incidentes \xE9 seguida.\n\
            (c) Restringir a conex\xE3o de dispositivos m\xF3veis classificados a\
            \ sistemas classificados de acordo com [Atribui\xE7\xE3o: pol\xEDticas\
            \ de seguran\xE7a definidas pela organiza\xE7\xE3o]."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-19(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-19(5)
      name: Access Control for Mobile Devices | Full Device or Container-based Encryption
      description: 'Employ [Selection: full-device encryption; container-based encryption]
        to protect the confidentiality and integrity of information on [Assignment:
        organization-defined mobile devices].'
      annotation: Container-based encryption provides a more fine-grained approach
        to data and information encryption on mobile devices, including encrypting
        selected data structures such as files, records, or fields.
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos M\xF3veis | Criptografia de\
            \ Dispositivo Completo ou Baseada em Cont\xEAiner"
          description: "Empregar [Sele\xE7\xE3o: criptografia de dispositivo completo;\
            \ criptografia baseada em cont\xEAiner] para proteger a confidencialidade\
            \ e a integridade das informa\xE7\xF5es em [Atribui\xE7\xE3o: dispositivos\
            \ m\xF3veis definidos pela organiza\xE7\xE3o]."
          annotation: "A criptografia baseada em cont\xEAiner fornece uma abordagem\
            \ mais granular para a criptografia de dados e informa\xE7\xF5es em dispositivos\
            \ m\xF3veis, incluindo a criptografia de estruturas de dados selecionadas,\
            \ como arquivos, registros ou campos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-20
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-20
      name: Use of External Systems
      description: 'a. [Selection (one or more): Establish [Assignment: organization-defined
        terms and conditions]; Identify [Assignment: organization-defined controls
        asserted to be implemented on external systems]], consistent with the trust
        relationships established with other organizations owning, operating, and/or
        maintaining external systems, allowing authorized individuals to:

        1. Access the system from external systems; and

        2. Process, store, or transmit organization-controlled information using external
        systems; or

        b. Prohibit the use of [Assignment: organizationally-defined types of external
        systems].'
      annotation: 'External systems are systems that are used by but not part of organizational
        systems, and for which the organization has no direct control over the implementation
        of required controls or the assessment of control effectiveness. External
        systems include personally owned systems, components, or devices; privately
        owned computing and communications devices in commercial or public facilities;
        systems owned or controlled by nonfederal organizations; systems managed by
        contractors; and federal information systems that are not owned by, operated
        by, or under the direct supervision or authority of the organization. External
        systems also include systems owned or operated by other components within
        the same organization and systems within the organization with different authorization
        boundaries. Organizations have the option to prohibit the use of any type
        of external system or prohibit the use of specified types of external systems,
        (e.g., prohibit the use of any external system that is not organizationally
        owned or prohibit the use of personally-owned systems).

        For some external systems (i.e., systems operated by other organizations),
        the trust relationships that have been established between those organizations
        and the originating organization may be such that no explicit terms and conditions
        are required. Systems within these organizations may not be considered external.
        These situations occur when, for example, there are pre-existing information
        exchange agreements (either implicit or explicit) established between organizations
        or components or when such agreements are specified by applicable laws, executive
        orders, directives, regulations, policies, or standards. Authorized individuals
        include organizational personnel, contractors, or other individuals with authorized
        access to organizational systems and over which organizations have the authority
        to impose specific rules of behavior regarding system access. Restrictions
        that organizations impose on authorized individuals need not be uniform, as
        the restrictions may vary depending on trust relationships between organizations.
        Therefore, organizations may choose to impose different security restrictions
        on contractors than on state, local, or tribal governments.

        External systems used to access public interfaces to organizational systems
        are outside the scope of AC-20. Organizations establish specific terms and
        conditions for the use of external systems in accordance with organizational
        security policies and procedures. At a minimum, terms and conditions address
        the specific types of applications that can be accessed on organizational
        systems from external systems and the highest security category of information
        that can be processed, stored, or transmitted on external systems. If the
        terms and conditions with the owners of the external systems cannot be established,
        organizations may impose restrictions on organizational personnel using those
        external systems.'
      translations:
        pt:
          name: Uso de Sistemas Externos
          description: "a. [Sele\xE7\xE3o (um ou mais): Estabelecer [Atribui\xE7\xE3\
            o: termos e condi\xE7\xF5es definidos pela organiza\xE7\xE3o]; Identificar\
            \ [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\xE3o que se\
            \ afirma estarem implementados em sistemas externos]], de forma consistente\
            \ com as rela\xE7\xF5es de confian\xE7a estabelecidas com outras organiza\xE7\
            \xF5es que det\xEAm, operam e/ou mant\xEAm sistemas externos, permitindo\
            \ que pessoas autorizadas possam:\n1. Acessar o sistema a partir de sistemas\
            \ externos; e\n2. Processar, armazenar ou transmitir informa\xE7\xF5es\
            \ controladas pela organiza\xE7\xE3o usando sistemas externos; ou\nb.\
            \ Proibir o uso de [Atribui\xE7\xE3o: tipos de sistemas externos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Sistemas externos s\xE3o sistemas que s\xE3o usados pelos sistemas\
            \ organizacionais, mas n\xE3o fazem parte deles, e sobre os quais a organiza\xE7\
            \xE3o n\xE3o tem controle direto sobre a implementa\xE7\xE3o dos controles\
            \ exigidos ou sobre a avalia\xE7\xE3o da efic\xE1cia dos controles. Sistemas\
            \ externos incluem sistemas, componentes ou dispositivos de propriedade\
            \ pessoal; dispositivos de computa\xE7\xE3o e comunica\xE7\xE3o de propriedade\
            \ privada em instala\xE7\xF5es comerciais ou p\xFAblicas; sistemas detidos\
            \ ou controlados por organiza\xE7\xF5es n\xE3o federais; sistemas gerenciados\
            \ por contratados; e sistemas de informa\xE7\xE3o federais que n\xE3o\
            \ s\xE3o detidos, operados ou est\xE3o sob a supervis\xE3o direta ou autoridade\
            \ da organiza\xE7\xE3o. Sistemas externos tamb\xE9m incluem sistemas detidos\
            \ ou operados por outros componentes dentro da mesma organiza\xE7\xE3\
            o e sistemas dentro da organiza\xE7\xE3o com fronteiras de autoriza\xE7\
            \xE3o diferentes. As organiza\xE7\xF5es t\xEAm a op\xE7\xE3o de proibir\
            \ o uso de qualquer tipo de sistema externo ou de proibir o uso de tipos\
            \ espec\xEDficos de sistemas externos (por exemplo, proibir o uso de qualquer\
            \ sistema externo que n\xE3o seja de propriedade organizacional ou proibir\
            \ o uso de sistemas de propriedade pessoal).\nPara alguns sistemas externos\
            \ (ou seja, sistemas operados por outras organiza\xE7\xF5es), as rela\xE7\
            \xF5es de confian\xE7a estabelecidas entre essas organiza\xE7\xF5es e\
            \ a organiza\xE7\xE3o de origem podem ser tais que nenhum termo e condi\xE7\
            \xE3o expl\xEDcito seja exigido. Os sistemas dentro dessas organiza\xE7\
            \xF5es podem n\xE3o ser considerados externos. Essas situa\xE7\xF5es ocorrem\
            \ quando, por exemplo, h\xE1 acordos de troca de informa\xE7\xF5es preexistentes\
            \ (impl\xEDcitos ou expl\xEDcitos) estabelecidos entre organiza\xE7\xF5\
            es ou componentes, ou quando tais acordos s\xE3o especificados por leis,\
            \ ordens executivas, diretrizes, regulamentos, pol\xEDticas ou normas\
            \ aplic\xE1veis. As pessoas autorizadas incluem funcion\xE1rios da organiza\xE7\
            \xE3o, contratados ou outras pessoas com acesso autorizado aos sistemas\
            \ organizacionais e sobre as quais as organiza\xE7\xF5es t\xEAm a autoridade\
            \ de impor regras de conduta espec\xEDficas relativas ao acesso ao sistema.\
            \ As restri\xE7\xF5es que as organiza\xE7\xF5es imp\xF5em \xE0s pessoas\
            \ autorizadas n\xE3o precisam ser uniformes, pois as restri\xE7\xF5es\
            \ podem variar conforme as rela\xE7\xF5es de confian\xE7a entre as organiza\xE7\
            \xF5es. Portanto, as organiza\xE7\xF5es podem optar por impor restri\xE7\
            \xF5es de seguran\xE7a diferentes a contratados em compara\xE7\xE3o com\
            \ governos estaduais, locais ou tribais.\nSistemas externos usados para\
            \ acessar interfaces p\xFAblicas de sistemas organizacionais est\xE3o\
            \ fora do escopo do AC-20. As organiza\xE7\xF5es estabelecem termos e\
            \ condi\xE7\xF5es espec\xEDficos para o uso de sistemas externos de acordo\
            \ com as pol\xEDticas e procedimentos de seguran\xE7a organizacionais.\
            \ No m\xEDnimo, os termos e condi\xE7\xF5es abordam os tipos espec\xED\
            ficos de aplica\xE7\xF5es que podem ser acessadas nos sistemas organizacionais\
            \ a partir de sistemas externos e a categoria de seguran\xE7a mais elevada\
            \ das informa\xE7\xF5es que podem ser processadas, armazenadas ou transmitidas\
            \ em sistemas externos. Se os termos e condi\xE7\xF5es com os propriet\xE1\
            rios dos sistemas externos n\xE3o puderem ser estabelecidos, as organiza\xE7\
            \xF5es podem impor restri\xE7\xF5es aos funcion\xE1rios da organiza\xE7\
            \xE3o que utilizam esses sistemas externos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-20(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-20(1)
      name: Use of External Systems | Limits on Authorized Use
      description: "Permit authorized individuals to use an external system to access\
        \ the system or to process, store, or transmit organization-controlled information\
        \ only after:\n(a) Verification of the implementation of controls on the external\
        \ system as specified in the organization\u2019s security and privacy policies\
        \ and security and privacy plans; or\n(b) Retention of approved system connection\
        \ or processing agreements with the organizational entity hosting the external\
        \ system."
      annotation: Limiting authorized use recognizes circumstances where individuals
        using external systems may need to access organizational systems. Organizations
        need assurance that the external systems contain the necessary controls so
        as not to compromise, damage, or otherwise harm organizational systems. Verification
        that the required controls have been implemented can be achieved by external,
        independent assessments, attestations, or other means, depending on the confidence
        level required by organizations.
      translations:
        pt:
          name: Uso de Sistemas Externos | Limites ao Uso Autorizado
          description: "Permitir que pessoas autorizadas usem um sistema externo para\
            \ acessar o sistema ou para processar, armazenar ou transmitir informa\xE7\
            \xF5es controladas pela organiza\xE7\xE3o somente ap\xF3s:\n(a) Verifica\xE7\
            \xE3o da implementa\xE7\xE3o dos controles no sistema externo conforme\
            \ especificado nas pol\xEDticas de seguran\xE7a e privacidade e nos planos\
            \ de seguran\xE7a e privacidade da organiza\xE7\xE3o; ou\n(b) Reten\xE7\
            \xE3o de acordos aprovados de conex\xE3o de sistema ou de processamento\
            \ com a entidade organizacional que hospeda o sistema externo."
          annotation: "A limita\xE7\xE3o do uso autorizado reconhece circunst\xE2\
            ncias em que pessoas que usam sistemas externos podem precisar acessar\
            \ sistemas organizacionais. As organiza\xE7\xF5es precisam de garantia\
            \ de que os sistemas externos cont\xEAm os controles necess\xE1rios para\
            \ n\xE3o comprometer, danificar ou de outra forma prejudicar os sistemas\
            \ organizacionais. A verifica\xE7\xE3o de que os controles exigidos foram\
            \ implementados pode ser alcan\xE7ada por meio de avalia\xE7\xF5es independentes\
            \ externas, atesta\xE7\xF5es ou outros meios, dependendo do n\xEDvel de\
            \ confian\xE7a exigido pelas organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-20(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-20(2)
      name: "Use of External Systems | Portable Storage Devices \u2014 Restricted\
        \ Use"
      description: 'Restrict the use of organization-controlled portable storage devices
        by authorized individuals on external systems using [Assignment: organization-defined
        restrictions].'
      annotation: Limits on the use of organization-controlled portable storage devices
        in external systems include restrictions on how the devices may be used and
        under what conditions the devices may be used.
      translations:
        pt:
          name: "Uso de Sistemas Externos | Dispositivos de Armazenamento Port\xE1\
            teis \u2014 Uso Restrito"
          description: "Restringir o uso de dispositivos de armazenamento port\xE1\
            teis controlados pela organiza\xE7\xE3o por pessoas autorizadas em sistemas\
            \ externos usando [Atribui\xE7\xE3o: restri\xE7\xF5es definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Os limites ao uso de dispositivos de armazenamento port\xE1\
            teis controlados pela organiza\xE7\xE3o em sistemas externos incluem restri\xE7\
            \xF5es sobre como os dispositivos podem ser usados e sob quais condi\xE7\
            \xF5es os dispositivos podem ser usados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-20(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-20(3)
      name: "Use of External Systems | Non-organizationally Owned Systems \u2014 Restricted\
        \ Use"
      description: 'Restrict the use of non-organizationally owned systems or system
        components to process, store, or transmit organizational information using
        [Assignment: organization-defined restrictions].'
      annotation: Non-organizationally owned systems or system components include
        systems or system components owned by other organizations as well as personally
        owned devices. There are potential risks to using non-organizationally owned
        systems or components. In some cases, the risk is sufficiently high as to
        prohibit such use (see AC-20 b.). In other cases, the use of such systems
        or system components may be allowed but restricted in some way. Restrictions
        include requiring the implementation of approved controls prior to authorizing
        the connection of non-organizationally owned systems and components; limiting
        access to types of information, services, or applications; using virtualization
        techniques to limit processing and storage activities to servers or system
        components provisioned by the organization; and agreeing to the terms and
        conditions for usage. Organizations consult with the Office of the General
        Counsel regarding legal issues associated with using personally owned devices,
        including requirements for conducting forensic analyses during investigations
        after an incident.
      translations:
        pt:
          name: "Uso de Sistemas Externos | Sistemas N\xE3o Pertencentes \xE0 Organiza\xE7\
            \xE3o \u2014 Uso Restrito"
          description: "Restringir o uso de sistemas ou componentes de sistema n\xE3\
            o pertencentes \xE0 organiza\xE7\xE3o para processar, armazenar ou transmitir\
            \ informa\xE7\xF5es organizacionais usando [Atribui\xE7\xE3o: restri\xE7\
            \xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "Sistemas ou componentes de sistema n\xE3o pertencentes \xE0\
            \ organiza\xE7\xE3o incluem sistemas ou componentes de sistema detidos\
            \ por outras organiza\xE7\xF5es, bem como dispositivos de propriedade\
            \ pessoal. H\xE1 riscos potenciais no uso de sistemas ou componentes n\xE3\
            o pertencentes \xE0 organiza\xE7\xE3o. Em alguns casos, o risco \xE9 suficientemente\
            \ alto a ponto de proibir tal uso (ver AC-20 b.). Em outros casos, o uso\
            \ de tais sistemas ou componentes de sistema pode ser permitido, mas restrito\
            \ de alguma forma. As restri\xE7\xF5es incluem exigir a implementa\xE7\
            \xE3o de controles aprovados antes de autorizar a conex\xE3o de sistemas\
            \ e componentes n\xE3o pertencentes \xE0 organiza\xE7\xE3o; limitar o\
            \ acesso a tipos de informa\xE7\xF5es, servi\xE7os ou aplica\xE7\xF5es;\
            \ usar t\xE9cnicas de virtualiza\xE7\xE3o para limitar as atividades de\
            \ processamento e armazenamento a servidores ou componentes de sistema\
            \ provisionados pela organiza\xE7\xE3o; e concordar com os termos e condi\xE7\
            \xF5es de uso. As organiza\xE7\xF5es consultam o Escrit\xF3rio do Consultor\
            \ Jur\xEDdico Geral a respeito de quest\xF5es legais associadas ao uso\
            \ de dispositivos de propriedade pessoal, incluindo requisitos para a\
            \ realiza\xE7\xE3o de an\xE1lises forenses durante investiga\xE7\xF5es\
            \ ap\xF3s um incidente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-20(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-20(4)
      name: "Use of External Systems | Network Accessible Storage Devices \u2014 Prohibited\
        \ Use"
      description: 'Prohibit the use of [Assignment: organization-defined network
        accessible storage devices] in external systems.'
      annotation: Network-accessible storage devices in external systems include online
        storage devices in public, hybrid, or community cloud-based systems.
      translations:
        pt:
          name: "Uso de Sistemas Externos | Dispositivos de Armazenamento Acess\xED\
            veis pela Rede \u2014 Uso Proibido"
          description: "Proibir o uso de [Atribui\xE7\xE3o: dispositivos de armazenamento\
            \ acess\xEDveis pela rede definidos pela organiza\xE7\xE3o] em sistemas\
            \ externos."
          annotation: "Dispositivos de armazenamento acess\xEDveis pela rede em sistemas\
            \ externos incluem dispositivos de armazenamento on-line em sistemas baseados\
            \ em nuvem p\xFAblica, h\xEDbrida ou comunit\xE1ria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-20(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-20(5)
      name: "Use of External Systems | Portable Storage Devices \u2014 Prohibited\
        \ Use"
      description: Prohibit the use of organization-controlled portable storage devices
        by authorized individuals on external systems.
      annotation: Limits on the use of organization-controlled portable storage devices
        in external systems include a complete prohibition of the use of such devices.
        Prohibiting such use is enforced using technical methods and/or nontechnical
        (i.e., process-based) methods.
      translations:
        pt:
          name: "Uso de Sistemas Externos | Dispositivos de Armazenamento Port\xE1\
            teis \u2014 Uso Proibido"
          description: "Proibir o uso de dispositivos de armazenamento port\xE1teis\
            \ controlados pela organiza\xE7\xE3o por pessoas autorizadas em sistemas\
            \ externos."
          annotation: "Os limites ao uso de dispositivos de armazenamento port\xE1\
            teis controlados pela organiza\xE7\xE3o em sistemas externos incluem a\
            \ proibi\xE7\xE3o completa do uso de tais dispositivos. A proibi\xE7\xE3\
            o de tal uso \xE9 imposta por meio de m\xE9todos t\xE9cnicos e/ou m\xE9\
            todos n\xE3o t\xE9cnicos (ou seja, baseados em processos)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-21
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-21
      name: Information Sharing
      description: "a. Enable authorized users to determine whether access authorizations\
        \ assigned to a sharing partner match the information\u2019s access and use\
        \ restrictions for [Assignment: organization-defined information sharing circumstances\
        \ where user discretion is required]; and\nb. Employ [Assignment: organization-defined\
        \ automated mechanisms or manual processes] to assist users in making information\
        \ sharing and collaboration decisions."
      annotation: Information sharing applies to information that may be restricted
        in some manner based on some formal or administrative determination. Examples
        of such information include, contract-sensitive information, classified information
        related to special access programs or compartments, privileged information,
        proprietary information, and personally identifiable information. Security
        and privacy risk assessments as well as applicable laws, regulations, and
        policies can provide useful inputs to these determinations. Depending on the
        circumstances, sharing partners may be defined at the individual, group, or
        organizational level. Information may be defined by content, type, security
        category, or special access program or compartment. Access restrictions may
        include non-disclosure agreements (NDA). Information flow techniques and security
        attributes may be used to provide automated assistance to users making sharing
        and collaboration decisions.
      translations:
        pt:
          name: "Compartilhamento de Informa\xE7\xF5es"
          description: "a. Permitir que usu\xE1rios autorizados determinem se as autoriza\xE7\
            \xF5es de acesso atribu\xEDdas a um parceiro de compartilhamento correspondem\
            \ \xE0s restri\xE7\xF5es de acesso e uso da informa\xE7\xE3o para [Atribui\xE7\
            \xE3o: circunst\xE2ncias de compartilhamento de informa\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o em que \xE9 exigida a discricionariedade do usu\xE1\
            rio]; e\nb. Empregar [Atribui\xE7\xE3o: mecanismos automatizados ou processos\
            \ manuais definidos pela organiza\xE7\xE3o] para auxiliar os usu\xE1rios\
            \ na tomada de decis\xF5es de compartilhamento de informa\xE7\xF5es e\
            \ colabora\xE7\xE3o."
          annotation: "O compartilhamento de informa\xE7\xF5es aplica-se a informa\xE7\
            \xF5es que podem ser restritas de alguma forma com base em alguma determina\xE7\
            \xE3o formal ou administrativa. Exemplos de tais informa\xE7\xF5es incluem\
            \ informa\xE7\xF5es sens\xEDveis a contratos, informa\xE7\xF5es classificadas\
            \ relacionadas a programas ou compartimentos de acesso especial, informa\xE7\
            \xF5es privilegiadas, informa\xE7\xF5es propriet\xE1rias e informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal. As avalia\xE7\xF5es de risco de\
            \ seguran\xE7a e privacidade, bem como as leis, regulamentos e pol\xED\
            ticas aplic\xE1veis, podem fornecer subs\xEDdios \xFAteis para essas determina\xE7\
            \xF5es. Dependendo das circunst\xE2ncias, os parceiros de compartilhamento\
            \ podem ser definidos em n\xEDvel individual, de grupo ou organizacional.\
            \ As informa\xE7\xF5es podem ser definidas por conte\xFAdo, tipo, categoria\
            \ de seguran\xE7a ou programa ou compartimento de acesso especial. As\
            \ restri\xE7\xF5es de acesso podem incluir acordos de n\xE3o divulga\xE7\
            \xE3o (NDA). T\xE9cnicas de fluxo de informa\xE7\xF5es e atributos de\
            \ seguran\xE7a podem ser usados para fornecer assist\xEAncia automatizada\
            \ aos usu\xE1rios na tomada de decis\xF5es de compartilhamento e colabora\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-21(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-21(1)
      name: Information Sharing | Automated Decision Support
      description: 'Employ [Assignment: organization-defined automated mechanisms]
        to enforce information-sharing decisions by authorized users based on access
        authorizations of sharing partners and access restrictions on information
        to be shared.'
      annotation: Automated mechanisms are used to enforce information sharing decisions.
      translations:
        pt:
          name: "Compartilhamento de Informa\xE7\xF5es | Suporte Automatizado \xE0\
            \ Decis\xE3o"
          description: "Empregar [Atribui\xE7\xE3o: mecanismos automatizados definidos\
            \ pela organiza\xE7\xE3o] para impor as decis\xF5es de compartilhamento\
            \ de informa\xE7\xF5es tomadas por usu\xE1rios autorizados com base nas\
            \ autoriza\xE7\xF5es de acesso dos parceiros de compartilhamento e nas\
            \ restri\xE7\xF5es de acesso \xE0s informa\xE7\xF5es a serem compartilhadas."
          annotation: "Mecanismos automatizados s\xE3o usados para impor decis\xF5\
            es de compartilhamento de informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-21(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-21(2)
      name: Information Sharing | Information Search and Retrieval
      description: 'Implement information search and retrieval services that enforce
        [Assignment: organization-defined information sharing restrictions].'
      annotation: Information search and retrieval services identify information system
        resources relevant to an information need.
      translations:
        pt:
          name: "Compartilhamento de Informa\xE7\xF5es | Busca e Recupera\xE7\xE3\
            o de Informa\xE7\xF5es"
          description: "Implementar servi\xE7os de busca e recupera\xE7\xE3o de informa\xE7\
            \xF5es que imponham [Atribui\xE7\xE3o: restri\xE7\xF5es de compartilhamento\
            \ de informa\xE7\xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "Os servi\xE7os de busca e recupera\xE7\xE3o de informa\xE7\xF5\
            es identificam os recursos do sistema de informa\xE7\xE3o relevantes para\
            \ uma necessidade de informa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-22
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-22
      name: Publicly Accessible Content
      description: 'a. Designate individuals authorized to make information publicly
        accessible;

        b. Train authorized individuals to ensure that publicly accessible information
        does not contain nonpublic information;

        c. Review the proposed content of information prior to posting onto the publicly
        accessible system to ensure that nonpublic information is not included; and

        d. Review the content on the publicly accessible system for nonpublic information
        [Assignment: organization-defined frequency] and remove such information,
        if discovered.'
      annotation: In accordance with applicable laws, executive orders, directives,
        policies, regulations, standards, and guidelines, the public is not authorized
        to have access to nonpublic information, including information protected under
        the PRIVACT and proprietary information. Publicly accessible content addresses
        systems that are controlled by the organization and accessible to the public,
        typically without identification or authentication. Posting information on
        non-organizational systems (e.g., non-organizational public websites, forums,
        and social media) is covered by organizational policy. While organizations
        may have individuals who are responsible for developing and implementing policies
        about the information that can be made publicly accessible, publicly accessible
        content addresses the management of the individuals who make such information
        publicly accessible.
      translations:
        pt:
          name: "Conte\xFAdo Acess\xEDvel ao P\xFAblico"
          description: "a. Designar as pessoas autorizadas a tornar informa\xE7\xF5\
            es acess\xEDveis ao p\xFAblico;\nb. Treinar as pessoas autorizadas para\
            \ garantir que as informa\xE7\xF5es acess\xEDveis ao p\xFAblico n\xE3\
            o contenham informa\xE7\xF5es n\xE3o p\xFAblicas;\nc. Revisar o conte\xFA\
            do proposto das informa\xE7\xF5es antes da publica\xE7\xE3o no sistema\
            \ acess\xEDvel ao p\xFAblico para garantir que informa\xE7\xF5es n\xE3\
            o p\xFAblicas n\xE3o sejam inclu\xEDdas; e\nd. Revisar o conte\xFAdo do\
            \ sistema acess\xEDvel ao p\xFAblico em busca de informa\xE7\xF5es n\xE3\
            o p\xFAblicas [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e remover tais informa\xE7\xF5es, caso sejam descobertas."
          annotation: "De acordo com as leis, ordens executivas, diretrizes, pol\xED\
            ticas, regulamentos, normas e diretrizes aplic\xE1veis, o p\xFAblico n\xE3\
            o est\xE1 autorizado a ter acesso a informa\xE7\xF5es n\xE3o p\xFAblicas,\
            \ incluindo informa\xE7\xF5es protegidas pelo PRIVACT e informa\xE7\xF5\
            es propriet\xE1rias. O conte\xFAdo acess\xEDvel ao p\xFAblico trata de\
            \ sistemas que s\xE3o controlados pela organiza\xE7\xE3o e acess\xEDveis\
            \ ao p\xFAblico, normalmente sem identifica\xE7\xE3o ou autentica\xE7\xE3\
            o. A publica\xE7\xE3o de informa\xE7\xF5es em sistemas n\xE3o organizacionais\
            \ (por exemplo, sites p\xFAblicos, f\xF3runs e m\xEDdias sociais n\xE3\
            o organizacionais) \xE9 abrangida pela pol\xEDtica organizacional. Embora\
            \ as organiza\xE7\xF5es possam ter pessoas respons\xE1veis por desenvolver\
            \ e implementar pol\xEDticas sobre as informa\xE7\xF5es que podem ser\
            \ tornadas acess\xEDveis ao p\xFAblico, o conte\xFAdo acess\xEDvel ao\
            \ p\xFAblico trata da gest\xE3o das pessoas que tornam tais informa\xE7\
            \xF5es acess\xEDveis ao p\xFAblico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-23
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-23
      name: Data Mining Protection
      description: 'Employ [Assignment: organization-defined data mining prevention
        and detection techniques] for [Assignment: organization-defined data storage
        objects] to detect and protect against unauthorized data mining.'
      annotation: 'Data mining is an analytical process that attempts to find correlations
        or patterns in large data sets for the purpose of data or knowledge discovery.
        Data storage objects include database records and database fields. Sensitive
        information can be extracted from data mining operations. When information
        is personally identifiable information, it may lead to unanticipated revelations
        about individuals and give rise to privacy risks. Prior to performing data
        mining activities, organizations determine whether such activities are authorized.
        Organizations may be subject to applicable laws, executive orders, directives,
        regulations, or policies that address data mining requirements. Organizational
        personnel consult with the senior agency official for privacy and legal counsel
        regarding such requirements.

        Data mining prevention and detection techniques include limiting the number
        and frequency of database queries to increase the work factor needed to determine
        the contents of databases, limiting types of responses provided to database
        queries, applying differential privacy techniques or homomorphic encryption,
        and notifying personnel when atypical database queries or accesses occur.
        Data mining protection focuses on protecting information from data mining
        while such information resides in organizational data stores. In contrast,
        AU-13 focuses on monitoring for organizational information that may have been
        mined or otherwise obtained from data stores and is available as open-source
        information residing on external sites, such as social networking or social
        media websites.

        EO 13587 requires the establishment of an insider threat program for deterring,
        detecting, and mitigating insider threats, including the safeguarding of sensitive
        information from exploitation, compromise, or other unauthorized disclosure.
        Data mining protection requires organizations to identify appropriate techniques
        to prevent and detect unnecessary or unauthorized data mining. Data mining
        can be used by an insider to collect organizational information for the purpose
        of exfiltration.'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Minera\xE7\xE3o de Dados"
          description: "Empregar [Atribui\xE7\xE3o: t\xE9cnicas de preven\xE7\xE3\
            o e detec\xE7\xE3o de minera\xE7\xE3o de dados definidas pela organiza\xE7\
            \xE3o] para [Atribui\xE7\xE3o: objetos de armazenamento de dados definidos\
            \ pela organiza\xE7\xE3o] para detectar e proteger contra minera\xE7\xE3\
            o de dados n\xE3o autorizada."
          annotation: "A minera\xE7\xE3o de dados \xE9 um processo anal\xEDtico que\
            \ tenta encontrar correla\xE7\xF5es ou padr\xF5es em grandes conjuntos\
            \ de dados com a finalidade de descoberta de dados ou conhecimento. Os\
            \ objetos de armazenamento de dados incluem registros de banco de dados\
            \ e campos de banco de dados. Informa\xE7\xF5es sens\xEDveis podem ser\
            \ extra\xEDdas de opera\xE7\xF5es de minera\xE7\xE3o de dados. Quando\
            \ a informa\xE7\xE3o \xE9 de identifica\xE7\xE3o pessoal, isso pode levar\
            \ a revela\xE7\xF5es inesperadas sobre pessoas e dar origem a riscos de\
            \ privacidade. Antes de realizar atividades de minera\xE7\xE3o de dados,\
            \ as organiza\xE7\xF5es determinam se tais atividades s\xE3o autorizadas.\
            \ As organiza\xE7\xF5es podem estar sujeitas a leis, ordens executivas,\
            \ diretrizes, regulamentos ou pol\xEDticas aplic\xE1veis que tratem dos\
            \ requisitos de minera\xE7\xE3o de dados. Os funcion\xE1rios da organiza\xE7\
            \xE3o consultam o agente s\xEAnior da ag\xEAncia respons\xE1vel pela privacidade\
            \ e o consultor jur\xEDdico a respeito de tais requisitos.\nAs t\xE9cnicas\
            \ de preven\xE7\xE3o e detec\xE7\xE3o de minera\xE7\xE3o de dados incluem\
            \ limitar o n\xFAmero e a frequ\xEAncia de consultas ao banco de dados\
            \ para aumentar o fator de trabalho necess\xE1rio para determinar o conte\xFA\
            do dos bancos de dados, limitar os tipos de respostas fornecidas \xE0\
            s consultas ao banco de dados, aplicar t\xE9cnicas de privacidade diferencial\
            \ ou criptografia homom\xF3rfica e notificar o pessoal quando ocorrerem\
            \ consultas ou acessos at\xEDpicos ao banco de dados. A prote\xE7\xE3\
            o contra minera\xE7\xE3o de dados concentra-se em proteger as informa\xE7\
            \xF5es contra a minera\xE7\xE3o de dados enquanto tais informa\xE7\xF5\
            es residem nos reposit\xF3rios de dados organizacionais. Em contraste,\
            \ o AU-13 concentra-se no monitoramento de informa\xE7\xF5es organizacionais\
            \ que possam ter sido mineradas ou obtidas de outra forma a partir de\
            \ reposit\xF3rios de dados e que estejam dispon\xEDveis como informa\xE7\
            \xF5es de fonte aberta residentes em sites externos, como sites de redes\
            \ sociais ou m\xEDdias sociais.\nA EO 13587 exige o estabelecimento de\
            \ um programa de amea\xE7a interna para dissuadir, detectar e mitigar\
            \ amea\xE7as internas, incluindo a salvaguarda de informa\xE7\xF5es sens\xED\
            veis contra explora\xE7\xE3o, comprometimento ou outra divulga\xE7\xE3\
            o n\xE3o autorizada. A prote\xE7\xE3o contra minera\xE7\xE3o de dados\
            \ exige que as organiza\xE7\xF5es identifiquem t\xE9cnicas apropriadas\
            \ para prevenir e detectar minera\xE7\xE3o de dados desnecess\xE1ria ou\
            \ n\xE3o autorizada. A minera\xE7\xE3o de dados pode ser usada por um\
            \ agente interno para coletar informa\xE7\xF5es organizacionais com a\
            \ finalidade de exfiltra\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-24
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-24
      name: Access Control Decisions
      description: '[Selection: Establish procedures; Implement mechanisms] to ensure
        [Assignment: organization-defined access control decisions] are applied to
        each access request prior to access enforcement.'
      annotation: Access control decisions (also known as authorization decisions)
        occur when authorization information is applied to specific accesses. In contrast,
        access enforcement occurs when systems enforce access control decisions. While
        it is common to have access control decisions and access enforcement implemented
        by the same entity, it is not required, and it is not always an optimal implementation
        choice. For some architectures and distributed systems, different entities
        may make access control decisions and enforce access.
      translations:
        pt:
          name: "Decis\xF5es de Controle de Acesso"
          description: "[Sele\xE7\xE3o: Estabelecer procedimentos; Implementar mecanismos]\
            \ para garantir que [Atribui\xE7\xE3o: decis\xF5es de controle de acesso\
            \ definidas pela organiza\xE7\xE3o] sejam aplicadas a cada solicita\xE7\
            \xE3o de acesso antes da imposi\xE7\xE3o do acesso."
          annotation: "As decis\xF5es de controle de acesso (tamb\xE9m conhecidas\
            \ como decis\xF5es de autoriza\xE7\xE3o) ocorrem quando as informa\xE7\
            \xF5es de autoriza\xE7\xE3o s\xE3o aplicadas a acessos espec\xEDficos.\
            \ Em contraste, a imposi\xE7\xE3o de acesso ocorre quando os sistemas\
            \ imp\xF5em as decis\xF5es de controle de acesso. Embora seja comum ter\
            \ as decis\xF5es de controle de acesso e a imposi\xE7\xE3o de acesso implementadas\
            \ pela mesma entidade, isso n\xE3o \xE9 exigido e nem sempre \xE9 uma\
            \ escolha de implementa\xE7\xE3o ideal. Para algumas arquiteturas e sistemas\
            \ distribu\xEDdos, entidades diferentes podem tomar as decis\xF5es de\
            \ controle de acesso e impor o acesso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-24(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-24(1)
      name: Access Control Decisions | Transmit Access Authorization Information
      description: 'Transmit [Assignment: organization-defined access authorization
        information] using [Assignment: organization-defined controls] to [Assignment:
        organization-defined systems] that enforce access control decisions.'
      annotation: Authorization processes and access control decisions may occur in
        separate parts of systems or in separate systems. In such instances, authorization
        information is transmitted securely (e.g., using cryptographic mechanisms)
        so that timely access control decisions can be enforced at the appropriate
        locations. To support the access control decisions, it may be necessary to
        transmit as part of the access authorization information supporting security
        and privacy attributes. This is because in distributed systems, there are
        various access control decisions that need to be made, and different entities
        make these decisions in a serial fashion, each requiring those attributes
        to make the decisions. Protecting access authorization information ensures
        that such information cannot be altered, spoofed, or compromised during transmission.
      translations:
        pt:
          name: "Decis\xF5es de Controle de Acesso | Transmitir Informa\xE7\xF5es\
            \ de Autoriza\xE7\xE3o de Acesso"
          description: "Transmitir [Atribui\xE7\xE3o: informa\xE7\xF5es de autoriza\xE7\
            \xE3o de acesso definidas pela organiza\xE7\xE3o] usando [Atribui\xE7\xE3\
            o: controles definidos pela organiza\xE7\xE3o] para [Atribui\xE7\xE3o:\
            \ sistemas definidos pela organiza\xE7\xE3o] que imp\xF5em as decis\xF5\
            es de controle de acesso."
          annotation: "Os processos de autoriza\xE7\xE3o e as decis\xF5es de controle\
            \ de acesso podem ocorrer em partes distintas dos sistemas ou em sistemas\
            \ distintos. Nesses casos, as informa\xE7\xF5es de autoriza\xE7\xE3o s\xE3\
            o transmitidas de forma segura (por exemplo, usando mecanismos criptogr\xE1\
            ficos) para que as decis\xF5es de controle de acesso oportunas possam\
            \ ser impostas nos locais apropriados. Para apoiar as decis\xF5es de controle\
            \ de acesso, pode ser necess\xE1rio transmitir, como parte das informa\xE7\
            \xF5es de autoriza\xE7\xE3o de acesso, atributos de seguran\xE7a e privacidade\
            \ de apoio. Isso ocorre porque, em sistemas distribu\xEDdos, h\xE1 v\xE1\
            rias decis\xF5es de controle de acesso que precisam ser tomadas, e diferentes\
            \ entidades tomam essas decis\xF5es de forma sequencial, cada uma exigindo\
            \ esses atributos para tomar as decis\xF5es. A prote\xE7\xE3o das informa\xE7\
            \xF5es de autoriza\xE7\xE3o de acesso garante que tais informa\xE7\xF5\
            es n\xE3o possam ser alteradas, falsificadas ou comprometidas durante\
            \ a transmiss\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-24(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-24(2)
      name: Access Control Decisions | No User or Process Identity
      description: 'Enforce access control decisions based on [Assignment: organization-defined
        security or privacy attributes] that do not include the identity of the user
        or process acting on behalf of the user.'
      annotation: In certain situations, it is important that access control decisions
        can be made without information regarding the identity of the users issuing
        the requests. These are generally instances where preserving individual privacy
        is of paramount importance. In other situations, user identification information
        is simply not needed for access control decisions, and especially in the case
        of distributed systems, transmitting such information with the needed degree
        of assurance may be very expensive or difficult to accomplish. MAC, RBAC,
        ABAC, and label-based control policies, for example, might not include user
        identity as an attribute.
      translations:
        pt:
          name: "Decis\xF5es de Controle de Acesso | Sem Identidade de Usu\xE1rio\
            \ ou Processo"
          description: "Impor decis\xF5es de controle de acesso com base em [Atribui\xE7\
            \xE3o: atributos de seguran\xE7a ou privacidade definidos pela organiza\xE7\
            \xE3o] que n\xE3o incluem a identidade do usu\xE1rio ou do processo agindo\
            \ em nome do usu\xE1rio."
          annotation: "Em certas situa\xE7\xF5es, \xE9 importante que as decis\xF5\
            es de controle de acesso possam ser tomadas sem informa\xE7\xF5es sobre\
            \ a identidade dos usu\xE1rios que emitem as solicita\xE7\xF5es. Geralmente,\
            \ s\xE3o casos em que a preserva\xE7\xE3o da privacidade individual \xE9\
            \ de suma import\xE2ncia. Em outras situa\xE7\xF5es, as informa\xE7\xF5\
            es de identifica\xE7\xE3o do usu\xE1rio simplesmente n\xE3o s\xE3o necess\xE1\
            rias para as decis\xF5es de controle de acesso e, especialmente no caso\
            \ de sistemas distribu\xEDdos, transmitir tais informa\xE7\xF5es com o\
            \ grau de garantia necess\xE1rio pode ser muito caro ou dif\xEDcil de\
            \ realizar. Pol\xEDticas de controle MAC, RBAC, ABAC e baseadas em r\xF3\
            tulos, por exemplo, podem n\xE3o incluir a identidade do usu\xE1rio como\
            \ atributo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-25
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-25
      name: Reference Monitor
      description: 'Implement a reference monitor for [Assignment: organization-defined
        access control policies] that is tamperproof, always invoked, and small enough
        to be subject to analysis and testing, the completeness of which can be assured.'
      annotation: A reference monitor is a set of design requirements on a reference
        validation mechanism that, as a key component of an operating system, enforces
        an access control policy over all subjects and objects. A reference validation
        mechanism is always invoked, tamper-proof, and small enough to be subject
        to analysis and tests, the completeness of which can be assured (i.e., verifiable).
        Information is represented internally within systems using abstractions known
        as data structures. Internal data structures can represent different types
        of entities, both active and passive. Active entities, also known as subjects,
        are associated with individuals, devices, or processes acting on behalf of
        individuals. Passive entities, also known as objects, are associated with
        data structures, such as records, buffers, communications ports, tables, files,
        and inter-process pipes. Reference monitors enforce access control policies
        that restrict access to objects based on the identity of subjects or groups
        to which the subjects belong. The system enforces the access control policy
        based on the rule set established by the policy. The tamper-proof property
        of the reference monitor prevents determined adversaries from compromising
        the functioning of the reference validation mechanism. The always invoked
        property prevents adversaries from bypassing the mechanism and violating the
        security policy. The smallness property helps to ensure completeness in the
        analysis and testing of the mechanism to detect any weaknesses or deficiencies
        (i.e., latent flaws) that would prevent the enforcement of the security policy.
      translations:
        pt:
          name: "Monitor de Refer\xEAncia"
          description: "Implementar um monitor de refer\xEAncia para [Atribui\xE7\xE3\
            o: pol\xEDticas de controle de acesso definidas pela organiza\xE7\xE3\
            o] que seja inviol\xE1vel, sempre invocado e pequeno o suficiente para\
            \ ser submetido a an\xE1lise e testes, cuja completude possa ser assegurada."
          annotation: "Um monitor de refer\xEAncia \xE9 um conjunto de requisitos\
            \ de projeto sobre um mecanismo de valida\xE7\xE3o de refer\xEAncia que,\
            \ como componente-chave de um sistema operacional, imp\xF5e uma pol\xED\
            tica de controle de acesso sobre todos os sujeitos e objetos. Um mecanismo\
            \ de valida\xE7\xE3o de refer\xEAncia \xE9 sempre invocado, inviol\xE1\
            vel e pequeno o suficiente para ser submetido a an\xE1lise e testes, cuja\
            \ completude possa ser assegurada (ou seja, verific\xE1vel). A informa\xE7\
            \xE3o \xE9 representada internamente nos sistemas por meio de abstra\xE7\
            \xF5es conhecidas como estruturas de dados. As estruturas de dados internas\
            \ podem representar diferentes tipos de entidades, tanto ativas quanto\
            \ passivas. As entidades ativas, tamb\xE9m conhecidas como sujeitos, est\xE3\
            o associadas a indiv\xEDduos, dispositivos ou processos que atuam em nome\
            \ de indiv\xEDduos. As entidades passivas, tamb\xE9m conhecidas como objetos,\
            \ est\xE3o associadas a estruturas de dados, como registros, buffers,\
            \ portas de comunica\xE7\xE3o, tabelas, arquivos e pipes entre processos.\
            \ Os monitores de refer\xEAncia imp\xF5em pol\xEDticas de controle de\
            \ acesso que restringem o acesso a objetos com base na identidade dos\
            \ sujeitos ou dos grupos aos quais os sujeitos pertencem. O sistema imp\xF5\
            e a pol\xEDtica de controle de acesso com base no conjunto de regras estabelecido\
            \ pela pol\xEDtica. A propriedade de inviolabilidade do monitor de refer\xEA\
            ncia impede que advers\xE1rios determinados comprometam o funcionamento\
            \ do mecanismo de valida\xE7\xE3o de refer\xEAncia. A propriedade de ser\
            \ sempre invocado impede que advers\xE1rios contornem o mecanismo e violem\
            \ a pol\xEDtica de seguran\xE7a. A propriedade de pequenez ajuda a garantir\
            \ a completude na an\xE1lise e nos testes do mecanismo para detectar quaisquer\
            \ fraquezas ou defici\xEAncias (ou seja, falhas latentes) que impediriam\
            \ a imposi\xE7\xE3o da pol\xEDtica de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      assessable: false
      depth: 1
      ref_id: AT
      name: Awareness and Training
      translations:
        pt:
          name: "Conscientiza\xE7\xE3o e Treinamento"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] awareness and training policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the awareness and training
        policy and the associated awareness and training controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the awareness and training
        policy and procedures; and

        c. Review and update the current awareness and training:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Awareness and training policy and procedures address the controls
        in the AT family that are implemented within systems and organizations. The
        risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of awareness and training policy and procedures. Security
        and privacy program policies and procedures at the organization level are
        preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to awareness
        and training policy and procedures include assessment or audit findings, security
        incidents or breaches, or changes in applicable laws, executive orders, directives,
        regulations, policies, standards, and guidelines. Simply restating controls
        does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de conscientiza\xE7\xE3o e treinamento de [Sele\xE7\xE3o (uma ou\
            \ mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3o/neg\xF3\
            cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo, fun\xE7\
            \xF5es, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\xE3\
            o entre as entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com leis aplic\xE1veis, ordens executivas, diretivas, regulamentos,\
            \ pol\xEDticas, normas e diretrizes; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de conscientiza\xE7\xE3o e treinamento\
            \ e dos controles de conscientiza\xE7\xE3o e treinamento associados;\n\
            b. Designar um [Atribui\xE7\xE3o: respons\xE1vel definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de conscientiza\xE7\xE3o e treinamento;\
            \ e\nc. Revisar e atualizar a atual conscientiza\xE7\xE3o e treinamento:\n\
            1. Pol\xEDtica [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de conscientiza\xE7\xE3o e\
            \ treinamento abordam os controles da fam\xEDlia AT que s\xE3o implementados\
            \ dentro dos sistemas e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3\
            o de riscos \xE9 um fator importante no estabelecimento de tais pol\xED\
            ticas e procedimentos. Pol\xEDticas e procedimentos contribuem para a\
            \ garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante que\
            \ os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de conscientiza\xE7\xE3o e treinamento.\
            \ As pol\xEDticas e os procedimentos dos programas de seguran\xE7a e privacidade\
            \ no n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral, e podem\
            \ dispensar a necessidade de pol\xEDticas e procedimentos espec\xEDficos\
            \ de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o ou neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Os procedimentos descrevem como as pol\xEDticas ou\
            \ os controles s\xE3o implementados e podem ser direcionados ao indiv\xED\
            duo ou \xE0 fun\xE7\xE3o que \xE9 o objeto do procedimento. Os procedimentos\
            \ podem ser documentados em planos de seguran\xE7a e privacidade do sistema\
            \ ou em um ou mais documentos separados. Eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de conscientiza\xE7\
            \xE3o e treinamento incluem constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria,\
            \ incidentes ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7as em leis\
            \ aplic\xE1veis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes. A simples reafirma\xE7\xE3o de controles n\xE3\
            o constitui uma pol\xEDtica ou um procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2
      name: Literacy Training and Awareness
      description: 'a. Provide security and privacy literacy training to system users
        (including managers, senior executives, and contractors):

        1. As part of initial training for new users and [Assignment: organization-defined
        frequency] thereafter; and

        2. When required by system changes or following [Assignment: organization-defined
        events];

        b. Employ the following techniques to increase the security and privacy awareness
        of system users [Assignment: organization-defined awareness techniques];

        c. Update literacy training and awareness content [Assignment: organization-defined
        frequency] and following [Assignment: organization-defined events]; and

        d. Incorporate lessons learned from internal or external security incidents
        or breaches into literacy training and awareness techniques.'
      annotation: 'Organizations provide basic and advanced levels of literacy training
        to system users, including measures to test the knowledge level of users.
        Organizations determine the content of literacy training and awareness based
        on specific organizational requirements, the systems to which personnel have
        authorized access, and work environments (e.g., telework). The content includes
        an understanding of the need for security and privacy as well as actions by
        users to maintain security and personal privacy and to respond to suspected
        incidents. The content addresses the need for operations security and the
        handling of personally identifiable information.

        Awareness techniques include displaying posters, offering supplies inscribed
        with security and privacy reminders, displaying logon screen messages, generating
        email advisories or notices from organizational officials, and conducting
        awareness events. Literacy training after the initial training described in
        AT-2a.1 is conducted at a minimum frequency consistent with applicable laws,
        directives, regulations, and policies. Subsequent literacy training may be
        satisfied by one or more short ad hoc sessions and include topical information
        on recent attack schemes, changes to organizational security and privacy policies,
        revised security and privacy expectations, or a subset of topics from the
        initial training. Updating literacy training and awareness content on a regular
        basis helps to ensure that the content remains relevant. Events that may precipitate
        an update to literacy training and awareness content include, but are not
        limited to, assessment or audit findings, security incidents or breaches,
        or changes in applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines.'
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o"
          description: "a. Fornecer treinamento de letramento em seguran\xE7a e privacidade\
            \ aos usu\xE1rios do sistema (incluindo gestores, executivos seniores\
            \ e contratados):\n1. Como parte do treinamento inicial para novos usu\xE1\
            rios e [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o] posteriormente; e\n2. Quando exigido por mudan\xE7as no sistema ou\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o];\n\
            b. Empregar as seguintes t\xE9cnicas para aumentar a conscientiza\xE7\xE3\
            o em seguran\xE7a e privacidade dos usu\xE1rios do sistema [Atribui\xE7\
            \xE3o: t\xE9cnicas de conscientiza\xE7\xE3o definidas pela organiza\xE7\
            \xE3o];\nc. Atualizar o conte\xFAdo de treinamento de letramento e conscientiza\xE7\
            \xE3o [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3\
            o]; e\nd. Incorporar li\xE7\xF5es aprendidas de incidentes ou viola\xE7\
            \xF5es de seguran\xE7a internos ou externos nas t\xE9cnicas de treinamento\
            \ de letramento e conscientiza\xE7\xE3o."
          annotation: "As organiza\xE7\xF5es fornecem n\xEDveis b\xE1sico e avan\xE7\
            ado de treinamento de letramento aos usu\xE1rios do sistema, incluindo\
            \ medidas para testar o n\xEDvel de conhecimento dos usu\xE1rios. As organiza\xE7\
            \xF5es determinam o conte\xFAdo do treinamento de letramento e conscientiza\xE7\
            \xE3o com base em requisitos organizacionais espec\xEDficos, nos sistemas\
            \ aos quais o pessoal tem acesso autorizado e nos ambientes de trabalho\
            \ (por exemplo, teletrabalho). O conte\xFAdo inclui a compreens\xE3o da\
            \ necessidade de seguran\xE7a e privacidade, bem como a\xE7\xF5es dos\
            \ usu\xE1rios para manter a seguran\xE7a e a privacidade pessoal e para\
            \ responder a incidentes suspeitos. O conte\xFAdo aborda a necessidade\
            \ de seguran\xE7a operacional e o tratamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal.\nAs t\xE9cnicas de conscientiza\xE7\xE3o incluem a exibi\xE7\
            \xE3o de cartazes, a oferta de materiais com lembretes de seguran\xE7\
            a e privacidade inscritos, a exibi\xE7\xE3o de mensagens na tela de logon,\
            \ a gera\xE7\xE3o de avisos ou notifica\xE7\xF5es por e-mail de respons\xE1\
            veis organizacionais e a realiza\xE7\xE3o de eventos de conscientiza\xE7\
            \xE3o. O treinamento de letramento posterior ao treinamento inicial descrito\
            \ em AT-2a.1 \xE9 conduzido com uma frequ\xEAncia m\xEDnima consistente\
            \ com leis, diretivas, regulamentos e pol\xEDticas aplic\xE1veis. O treinamento\
            \ de letramento subsequente pode ser satisfeito por uma ou mais sess\xF5\
            es curtas ad hoc e incluir informa\xE7\xF5es sobre t\xF3picos atuais relativos\
            \ a esquemas de ataque recentes, mudan\xE7as nas pol\xEDticas organizacionais\
            \ de seguran\xE7a e privacidade, expectativas revisadas de seguran\xE7\
            a e privacidade ou um subconjunto de t\xF3picos do treinamento inicial.\
            \ A atualiza\xE7\xE3o regular do conte\xFAdo de treinamento de letramento\
            \ e conscientiza\xE7\xE3o ajuda a garantir que o conte\xFAdo permane\xE7\
            a relevante. Eventos que podem precipitar uma atualiza\xE7\xE3o do conte\xFA\
            do de treinamento de letramento e conscientiza\xE7\xE3o incluem, mas n\xE3\
            o se limitam a, constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes\
            \ ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7as em leis aplic\xE1\
            veis, ordens executivas, diretivas, regulamentos, pol\xEDticas, normas\
            \ e diretrizes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2(1)
      name: Literacy Training and Awareness | Practical Exercises
      description: Provide practical exercises in literacy training that simulate
        events and incidents.
      annotation: Practical exercises include no-notice social engineering attempts
        to collect information, gain unauthorized access, or simulate the adverse
        impact of opening malicious email attachments or invoking, via spear phishing
        attacks, malicious web links.
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o | Exerc\xEDcios\
            \ Pr\xE1ticos"
          description: "Fornecer exerc\xEDcios pr\xE1ticos no treinamento de letramento\
            \ que simulem eventos e incidentes."
          annotation: "Os exerc\xEDcios pr\xE1ticos incluem tentativas de engenharia\
            \ social sem aviso pr\xE9vio para coletar informa\xE7\xF5es, obter acesso\
            \ n\xE3o autorizado ou simular o impacto adverso de abrir anexos de e-mail\
            \ maliciosos ou de invocar, por meio de ataques de spear phishing, links\
            \ web maliciosos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2(2)
      name: Literacy Training and Awareness | Insider Threat
      description: Provide literacy training on recognizing and reporting potential
        indicators of insider threat.
      annotation: Potential indicators and possible precursors of insider threat can
        include behaviors such as inordinate, long-term job dissatisfaction; attempts
        to gain access to information not required for job performance; unexplained
        access to financial resources; bullying or harassment of fellow employees;
        workplace violence; and other serious violations of policies, procedures,
        directives, regulations, rules, or practices. Literacy training includes how
        to communicate the concerns of employees and management regarding potential
        indicators of insider threat through channels established by the organization
        and in accordance with established policies and procedures. Organizations
        may consider tailoring insider threat awareness topics to the role. For example,
        training for managers may be focused on changes in the behavior of team members,
        while training for employees may be focused on more general observations.
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o | Amea\xE7a Interna"
          description: "Fornecer treinamento de letramento sobre o reconhecimento\
            \ e a notifica\xE7\xE3o de potenciais indicadores de amea\xE7a interna."
          annotation: "Indicadores potenciais e poss\xEDveis precursores de amea\xE7\
            a interna podem incluir comportamentos como insatisfa\xE7\xE3o profissional\
            \ desmedida e de longo prazo; tentativas de obter acesso a informa\xE7\
            \xF5es n\xE3o necess\xE1rias para o desempenho do trabalho; acesso inexplic\xE1\
            vel a recursos financeiros; bullying ou ass\xE9dio a colegas de trabalho;\
            \ viol\xEAncia no local de trabalho; e outras viola\xE7\xF5es graves de\
            \ pol\xEDticas, procedimentos, diretivas, regulamentos, regras ou pr\xE1\
            ticas. O treinamento de letramento inclui como comunicar as preocupa\xE7\
            \xF5es de funcion\xE1rios e da gest\xE3o a respeito de potenciais indicadores\
            \ de amea\xE7a interna por meio de canais estabelecidos pela organiza\xE7\
            \xE3o e em conformidade com pol\xEDticas e procedimentos estabelecidos.\
            \ As organiza\xE7\xF5es podem considerar adaptar os t\xF3picos de conscientiza\xE7\
            \xE3o sobre amea\xE7a interna \xE0 fun\xE7\xE3o. Por exemplo, o treinamento\
            \ para gestores pode focar em mudan\xE7as no comportamento dos membros\
            \ da equipe, enquanto o treinamento para funcion\xE1rios pode focar em\
            \ observa\xE7\xF5es mais gerais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2(3)
      name: Literacy Training and Awareness | Social Engineering and Mining
      description: Provide literacy training on recognizing and reporting potential
        and actual instances of social engineering and social mining.
      annotation: Social engineering is an attempt to trick an individual into revealing
        information or taking an action that can be used to breach, compromise, or
        otherwise adversely impact a system. Social engineering includes phishing,
        pretexting, impersonation, baiting, quid pro quo, thread-jacking, social media
        exploitation, and tailgating. Social mining is an attempt to gather information
        about the organization that may be used to support future attacks. Literacy
        training includes information on how to communicate the concerns of employees
        and management regarding potential and actual instances of social engineering
        and data mining through organizational channels based on established policies
        and procedures.
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o | Engenharia Social\
            \ e Minera\xE7\xE3o Social"
          description: "Fornecer treinamento de letramento sobre o reconhecimento\
            \ e a notifica\xE7\xE3o de inst\xE2ncias potenciais e reais de engenharia\
            \ social e minera\xE7\xE3o social."
          annotation: "A engenharia social \xE9 uma tentativa de enganar um indiv\xED\
            duo para que revele informa\xE7\xF5es ou tome uma a\xE7\xE3o que possa\
            \ ser usada para violar, comprometer ou de outra forma impactar adversamente\
            \ um sistema. A engenharia social inclui phishing, pretexting, personifica\xE7\
            \xE3o, baiting, quid pro quo, thread-jacking, explora\xE7\xE3o de m\xED\
            dias sociais e tailgating. A minera\xE7\xE3o social \xE9 uma tentativa\
            \ de coletar informa\xE7\xF5es sobre a organiza\xE7\xE3o que possam ser\
            \ usadas para apoiar ataques futuros. O treinamento de letramento inclui\
            \ informa\xE7\xF5es sobre como comunicar as preocupa\xE7\xF5es de funcion\xE1\
            rios e da gest\xE3o a respeito de inst\xE2ncias potenciais e reais de\
            \ engenharia social e minera\xE7\xE3o de dados por meio de canais organizacionais,\
            \ com base em pol\xEDticas e procedimentos estabelecidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2(4)
      name: Literacy Training and Awareness | Suspicious Communications and Anomalous
        System Behavior
      description: 'Provide literacy training on recognizing suspicious communications
        and anomalous behavior in organizational systems using [Assignment: organization-defined
        indicators of malicious code].'
      annotation: A well-trained workforce provides another organizational control
        that can be employed as part of a defense-in-depth strategy to protect against
        malicious code coming into organizations via email or the web applications.
        Personnel are trained to look for indications of potentially suspicious email
        (e.g., receiving an unexpected email, receiving an email containing strange
        or poor grammar, or receiving an email from an unfamiliar sender that appears
        to be from a known sponsor or contractor). Personnel are also trained on how
        to respond to suspicious email or web communications. For this process to
        work effectively, personnel are trained and made aware of what constitutes
        suspicious communications. Training personnel on how to recognize anomalous
        behaviors in systems can provide organizations with early warning for the
        presence of malicious code. Recognition of anomalous behavior by organizational
        personnel can supplement malicious code detection and protection tools and
        systems employed by organizations.
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o | Comunica\xE7\xF5\
            es Suspeitas e Comportamento An\xF4malo do Sistema"
          description: "Fornecer treinamento de letramento sobre o reconhecimento\
            \ de comunica\xE7\xF5es suspeitas e de comportamento an\xF4malo nos sistemas\
            \ organizacionais usando [Atribui\xE7\xE3o: indicadores de c\xF3digo malicioso\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Uma for\xE7a de trabalho bem treinada constitui outro controle\
            \ organizacional que pode ser empregado como parte de uma estrat\xE9gia\
            \ de defesa em profundidade para proteger contra c\xF3digo malicioso que\
            \ chega \xE0s organiza\xE7\xF5es por meio de e-mail ou de aplica\xE7\xF5\
            es web. O pessoal \xE9 treinado para procurar ind\xEDcios de e-mails potencialmente\
            \ suspeitos (por exemplo, receber um e-mail inesperado, receber um e-mail\
            \ contendo gram\xE1tica estranha ou ruim, ou receber um e-mail de um remetente\
            \ desconhecido que parece ser de um patrocinador ou contratado conhecido).\
            \ O pessoal tamb\xE9m \xE9 treinado sobre como responder a e-mails ou\
            \ comunica\xE7\xF5es web suspeitos. Para que esse processo funcione de\
            \ forma eficaz, o pessoal \xE9 treinado e conscientizado sobre o que constitui\
            \ comunica\xE7\xF5es suspeitas. Treinar o pessoal sobre como reconhecer\
            \ comportamentos an\xF4malos nos sistemas pode fornecer \xE0s organiza\xE7\
            \xF5es um alerta precoce da presen\xE7a de c\xF3digo malicioso. O reconhecimento\
            \ de comportamento an\xF4malo pelo pessoal organizacional pode complementar\
            \ as ferramentas e os sistemas de detec\xE7\xE3o e prote\xE7\xE3o contra\
            \ c\xF3digo malicioso empregados pelas organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2(5)
      name: Literacy Training and Awareness | Advanced Persistent Threat
      description: Provide literacy training on the advanced persistent threat.
      annotation: An effective way to detect advanced persistent threats (APT) and
        to preclude successful attacks is to provide specific literacy training for
        individuals. Threat literacy training includes educating individuals on the
        various ways that APTs can infiltrate the organization (e.g., through websites,
        emails, advertisement pop-ups, articles, and social engineering). Effective
        training includes techniques for recognizing suspicious emails, use of removable
        systems in non-secure settings, and the potential targeting of individuals
        at home.
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o | Amea\xE7a Persistente\
            \ Avan\xE7ada"
          description: "Fornecer treinamento de letramento sobre a amea\xE7a persistente\
            \ avan\xE7ada."
          annotation: "Uma forma eficaz de detectar amea\xE7as persistentes avan\xE7\
            adas (APT) e de impedir ataques bem-sucedidos \xE9 fornecer treinamento\
            \ de letramento espec\xEDfico para os indiv\xEDduos. O treinamento de\
            \ letramento sobre amea\xE7as inclui educar os indiv\xEDduos sobre as\
            \ v\xE1rias maneiras pelas quais as APTs podem se infiltrar na organiza\xE7\
            \xE3o (por exemplo, por meio de sites, e-mails, pop-ups de publicidade,\
            \ artigos e engenharia social). Um treinamento eficaz inclui t\xE9cnicas\
            \ para reconhecer e-mails suspeitos, o uso de sistemas remov\xEDveis em\
            \ ambientes n\xE3o seguros e o potencial direcionamento de indiv\xEDduos\
            \ em casa."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-2(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-2(6)
      name: Literacy Training and Awareness | Cyber Threat Environment
      description: '(a) Provide literacy training on the cyber threat environment;
        and

        (b) Reflect current cyber threat information in system operations.'
      annotation: Since threats continue to change over time, threat literacy training
        by the organization is dynamic. Moreover, threat literacy training is not
        performed in isolation from the system operations that support organizational
        mission and business functions.
      translations:
        pt:
          name: "Treinamento de Letramento e Conscientiza\xE7\xE3o | Ambiente de Amea\xE7\
            as Cibern\xE9ticas"
          description: "(a) Fornecer treinamento de letramento sobre o ambiente de\
            \ amea\xE7as cibern\xE9ticas; e\n(b) Refletir informa\xE7\xF5es atuais\
            \ sobre amea\xE7as cibern\xE9ticas nas opera\xE7\xF5es do sistema."
          annotation: "Como as amea\xE7as continuam mudando ao longo do tempo, o treinamento\
            \ de letramento sobre amea\xE7as pela organiza\xE7\xE3o \xE9 din\xE2mico.\
            \ Al\xE9m disso, o treinamento de letramento sobre amea\xE7as n\xE3o \xE9\
            \ realizado de forma isolada das opera\xE7\xF5es do sistema que apoiam\
            \ as fun\xE7\xF5es de miss\xE3o e neg\xF3cio da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-3
      name: Role-based Training
      description: 'a. Provide role-based security and privacy training to personnel
        with the following roles and responsibilities: [Assignment: organization-defined
        roles and responsibilities]:

        1. Before authorizing access to the system, information, or performing assigned
        duties, and [Assignment: organization-defined frequency] thereafter; and

        2. When required by system changes;

        b. Update role-based training content [Assignment: organization-defined frequency]
        and following [Assignment: organization-defined events]; and

        c. Incorporate lessons learned from internal or external security incidents
        or breaches into role-based training.'
      annotation: 'Organizations determine the content of training based on the assigned
        roles and responsibilities of individuals as well as the security and privacy
        requirements of organizations and the systems to which personnel have authorized
        access, including technical training specifically tailored for assigned duties.
        Roles that may require role-based training include senior leaders or management
        officials (e.g., head of agency/chief executive officer, chief information
        officer, senior accountable official for risk management, senior agency information
        security officer, senior agency official for privacy), system owners; authorizing
        officials; system security officers; privacy officers; acquisition and procurement
        officials; enterprise architects; systems engineers; software developers;
        systems security engineers; privacy engineers; system, network, and database
        administrators; auditors; personnel conducting configuration management activities;
        personnel performing verification and validation activities; personnel with
        access to system-level software; control assessors; personnel with contingency
        planning and incident response duties; personnel with privacy management responsibilities;
        and personnel with access to personally identifiable information.

        Comprehensive role-based training addresses management, operational, and technical
        roles and responsibilities covering physical, personnel, and technical controls.
        Role-based training also includes policies, procedures, tools, methods, and
        artifacts for the security and privacy roles defined. Organizations provide
        the training necessary for individuals to fulfill their responsibilities related
        to operations and supply chain risk management within the context of organizational
        security and privacy programs. Role-based training also applies to contractors
        who provide services to federal agencies. Types of training include web-based
        and computer-based training, classroom-style training, and hands-on training
        (including micro-training). Updating role-based training on a regular basis
        helps to ensure that the content remains relevant and effective. Events that
        may precipitate an update to role-based training content include, but are
        not limited to, assessment or audit findings, security incidents or breaches,
        or changes in applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines.'
      translations:
        pt:
          name: "Treinamento Baseado em Fun\xE7\xF5es"
          description: "a. Fornecer treinamento em seguran\xE7a e privacidade baseado\
            \ em fun\xE7\xF5es ao pessoal com as seguintes fun\xE7\xF5es e responsabilidades:\
            \ [Atribui\xE7\xE3o: fun\xE7\xF5es e responsabilidades definidas pela\
            \ organiza\xE7\xE3o]:\n1. Antes de autorizar o acesso ao sistema, \xE0\
            s informa\xE7\xF5es ou o desempenho das atribui\xE7\xF5es designadas,\
            \ e [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]\
            \ posteriormente; e\n2. Quando exigido por mudan\xE7as no sistema;\nb.\
            \ Atualizar o conte\xFAdo do treinamento baseado em fun\xE7\xF5es [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\nc. Incorporar li\xE7\
            \xF5es aprendidas de incidentes ou viola\xE7\xF5es de seguran\xE7a internos\
            \ ou externos ao treinamento baseado em fun\xE7\xF5es."
          annotation: "As organiza\xE7\xF5es determinam o conte\xFAdo do treinamento\
            \ com base nas fun\xE7\xF5es e responsabilidades atribu\xEDdas aos indiv\xED\
            duos, bem como nos requisitos de seguran\xE7a e privacidade das organiza\xE7\
            \xF5es e dos sistemas aos quais o pessoal tem acesso autorizado, incluindo\
            \ treinamento t\xE9cnico especificamente adaptado \xE0s atribui\xE7\xF5\
            es designadas. As fun\xE7\xF5es que podem exigir treinamento baseado em\
            \ fun\xE7\xF5es incluem l\xEDderes seniores ou respons\xE1veis pela gest\xE3\
            o (por exemplo, chefe de ag\xEAncia/diretor executivo, diretor de informa\xE7\
            \xE3o, respons\xE1vel s\xEAnior pela gest\xE3o de riscos, respons\xE1\
            vel s\xEAnior pela seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, respons\xE1\
            vel s\xEAnior pela privacidade da ag\xEAncia), propriet\xE1rios de sistemas;\
            \ respons\xE1veis pela autoriza\xE7\xE3o; oficiais de seguran\xE7a de\
            \ sistemas; oficiais de privacidade; respons\xE1veis por aquisi\xE7\xF5\
            es e compras; arquitetos corporativos; engenheiros de sistemas; desenvolvedores\
            \ de software; engenheiros de seguran\xE7a de sistemas; engenheiros de\
            \ privacidade; administradores de sistemas, redes e bancos de dados; auditores;\
            \ pessoal que conduz atividades de gest\xE3o de configura\xE7\xE3o; pessoal\
            \ que realiza atividades de verifica\xE7\xE3o e valida\xE7\xE3o; pessoal\
            \ com acesso a software de n\xEDvel de sistema; avaliadores de controles;\
            \ pessoal com atribui\xE7\xF5es de planejamento de conting\xEAncia e resposta\
            \ a incidentes; pessoal com responsabilidades de gest\xE3o de privacidade;\
            \ e pessoal com acesso a informa\xE7\xF5es de identifica\xE7\xE3o pessoal.\n\
            O treinamento abrangente baseado em fun\xE7\xF5es aborda fun\xE7\xF5es\
            \ e responsabilidades gerenciais, operacionais e t\xE9cnicas, cobrindo\
            \ controles f\xEDsicos, de pessoal e t\xE9cnicos. O treinamento baseado\
            \ em fun\xE7\xF5es tamb\xE9m inclui pol\xEDticas, procedimentos, ferramentas,\
            \ m\xE9todos e artefatos para as fun\xE7\xF5es de seguran\xE7a e privacidade\
            \ definidas. As organiza\xE7\xF5es fornecem o treinamento necess\xE1rio\
            \ para que os indiv\xEDduos cumpram suas responsabilidades relacionadas\
            \ \xE0s opera\xE7\xF5es e \xE0 gest\xE3o de riscos da cadeia de suprimentos\
            \ dentro do contexto dos programas organizacionais de seguran\xE7a e privacidade.\
            \ O treinamento baseado em fun\xE7\xF5es tamb\xE9m se aplica a contratados\
            \ que prestam servi\xE7os a ag\xEAncias federais. Os tipos de treinamento\
            \ incluem treinamento baseado na web e em computador, treinamento em estilo\
            \ de sala de aula e treinamento pr\xE1tico (incluindo microtreinamento).\
            \ A atualiza\xE7\xE3o regular do treinamento baseado em fun\xE7\xF5es\
            \ ajuda a garantir que o conte\xFAdo permane\xE7a relevante e eficaz.\
            \ Eventos que podem precipitar uma atualiza\xE7\xE3o do conte\xFAdo do\
            \ treinamento baseado em fun\xE7\xF5es incluem, mas n\xE3o se limitam\
            \ a, constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes ou\
            \ viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7as em leis aplic\xE1veis,\
            \ ordens executivas, diretivas, regulamentos, pol\xEDticas, normas e diretrizes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-3(1)
      name: Role-based Training | Environmental Controls
      description: 'Provide [Assignment: organization-defined personnel or roles]
        with initial and [Assignment: organization-defined frequency] training in
        the employment and operation of environmental controls.'
      annotation: Environmental controls include fire suppression and detection devices
        or systems, sprinkler systems, handheld fire extinguishers, fixed fire hoses,
        smoke detectors, temperature or humidity, heating, ventilation, air conditioning,
        and power within the facility.
      translations:
        pt:
          name: "Treinamento Baseado em Fun\xE7\xF5es | Controles Ambientais"
          description: "Fornecer a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] treinamento inicial e [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] sobre o emprego e a opera\xE7\xE3\
            o de controles ambientais."
          annotation: "Os controles ambientais incluem dispositivos ou sistemas de\
            \ supress\xE3o e detec\xE7\xE3o de inc\xEAndio, sistemas de sprinklers,\
            \ extintores de inc\xEAndio port\xE1teis, mangueiras de inc\xEAndio fixas,\
            \ detectores de fuma\xE7a, temperatura ou umidade, aquecimento, ventila\xE7\
            \xE3o, ar-condicionado e energia dentro da instala\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-3(2)
      name: Role-based Training | Physical Security Controls
      description: 'Provide [Assignment: organization-defined personnel or roles]
        with initial and [Assignment: organization-defined frequency] training in
        the employment and operation of physical security controls.'
      annotation: Physical security controls include physical access control devices,
        physical intrusion and detection alarms, operating procedures for facility
        security guards, and monitoring or surveillance equipment.
      translations:
        pt:
          name: "Treinamento Baseado em Fun\xE7\xF5es | Controles de Seguran\xE7a\
            \ F\xEDsica"
          description: "Fornecer a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] treinamento inicial e [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] sobre o emprego e a opera\xE7\xE3\
            o de controles de seguran\xE7a f\xEDsica."
          annotation: "Os controles de seguran\xE7a f\xEDsica incluem dispositivos\
            \ de controle de acesso f\xEDsico, alarmes de intrus\xE3o e detec\xE7\xE3\
            o f\xEDsica, procedimentos operacionais para guardas de seguran\xE7a da\
            \ instala\xE7\xE3o e equipamentos de monitoramento ou vigil\xE2ncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-3(3)
      name: Role-based Training | Practical Exercises
      description: Provide practical exercises in security and privacy training that
        reinforce training objectives.
      annotation: Practical exercises for security include training for software developers
        that addresses simulated attacks that exploit common software vulnerabilities
        or spear or whale phishing attacks targeted at senior leaders or executives.
        Practical exercises for privacy include modules with quizzes on identifying
        and processing personally identifiable information in various scenarios or
        scenarios on conducting privacy impact assessments.
      translations:
        pt:
          name: "Treinamento Baseado em Fun\xE7\xF5es | Exerc\xEDcios Pr\xE1ticos"
          description: "Fornecer exerc\xEDcios pr\xE1ticos no treinamento de seguran\xE7\
            a e privacidade que reforcem os objetivos do treinamento."
          annotation: "Os exerc\xEDcios pr\xE1ticos de seguran\xE7a incluem treinamento\
            \ para desenvolvedores de software que aborda ataques simulados que exploram\
            \ vulnerabilidades comuns de software ou ataques de spear phishing ou\
            \ whale phishing direcionados a l\xEDderes seniores ou executivos. Os\
            \ exerc\xEDcios pr\xE1ticos de privacidade incluem m\xF3dulos com question\xE1\
            rios sobre a identifica\xE7\xE3o e o processamento de informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal em diversos cen\xE1rios ou cen\xE1rios\
            \ sobre a condu\xE7\xE3o de avalia\xE7\xF5es de impacto \xE0 privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-3(4)
      name: Role-based Training | Suspicious Communications and Anomalous System Behavior
      description: '[Withdrawn: Moved to AT-2(4)].'
      translations:
        pt:
          name: "Treinamento Baseado em Fun\xE7\xF5es | Comunica\xE7\xF5es Suspeitas\
            \ e Comportamento An\xF4malo do Sistema"
          description: '[Retirado: Movido para AT-2(4)].'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-3(5)
      name: Role-based Training | Processing Personally Identifiable Information
      description: 'Provide [Assignment: organization-defined personnel or roles]
        with initial and [Assignment: organization-defined frequency] training in
        the employment and operation of personally identifiable information processing
        and transparency controls.'
      annotation: "Personally identifiable information processing and transparency\
        \ controls include the organization\u2019s authority to process personally\
        \ identifiable information and personally identifiable information processing\
        \ purposes. Role-based training for federal agencies addresses the types of\
        \ information that may constitute personally identifiable information and\
        \ the risks, considerations, and obligations associated with its processing.\
        \ Such training also considers the authority to process personally identifiable\
        \ information documented in privacy policies and notices, system of records\
        \ notices, computer matching agreements and notices, privacy impact assessments,\
        \ PRIVACT statements, contracts, information sharing agreements, memoranda\
        \ of understanding, and/or other documentation."
      translations:
        pt:
          name: "Treinamento Baseado em Fun\xE7\xF5es | Processamento de Informa\xE7\
            \xF5es de Identifica\xE7\xE3o Pessoal"
          description: "Fornecer a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] treinamento inicial e [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] sobre o emprego e a opera\xE7\xE3\
            o de controles de processamento e de transpar\xEAncia de informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal."
          annotation: "Os controles de processamento e de transpar\xEAncia de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal incluem a autoridade da organiza\xE7\
            \xE3o para processar informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ e os prop\xF3sitos de processamento das informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal. O treinamento baseado em fun\xE7\xF5es para ag\xEAncias\
            \ federais aborda os tipos de informa\xE7\xF5es que podem constituir informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal e os riscos, considera\xE7\xF5es\
            \ e obriga\xE7\xF5es associados ao seu processamento. Tal treinamento\
            \ tamb\xE9m considera a autoridade para processar informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal documentada em pol\xEDticas e avisos de\
            \ privacidade, avisos de sistemas de registros, acordos e avisos de correspond\xEA\
            ncia computacional, avalia\xE7\xF5es de impacto \xE0 privacidade, declara\xE7\
            \xF5es da PRIVACT, contratos, acordos de compartilhamento de informa\xE7\
            \xF5es, memorandos de entendimento e/ou outra documenta\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-4
      name: Training Records
      description: 'a. Document and monitor information security and privacy training
        activities, including security and privacy awareness training and specific
        role-based security and privacy training; and

        b. Retain individual training records for [Assignment: organization-defined
        time period].'
      annotation: Documentation for specialized training may be maintained by individual
        supervisors at the discretion of the organization. The National Archives and
        Records Administration provides guidance on records retention for federal
        agencies.
      translations:
        pt:
          name: Registros de Treinamento
          description: "a. Documentar e monitorar as atividades de treinamento em\
            \ seguran\xE7a da informa\xE7\xE3o e privacidade, incluindo o treinamento\
            \ de conscientiza\xE7\xE3o em seguran\xE7a e privacidade e o treinamento\
            \ espec\xEDfico em seguran\xE7a e privacidade baseado em fun\xE7\xF5es;\
            \ e\nb. Reter os registros individuais de treinamento por [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]."
          annotation: "A documenta\xE7\xE3o para treinamento especializado pode ser\
            \ mantida por supervisores individuais a crit\xE9rio da organiza\xE7\xE3\
            o. A National Archives and Records Administration fornece orienta\xE7\xF5\
            es sobre a reten\xE7\xE3o de registros para ag\xEAncias federais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-5
      name: Contacts with Security Groups and Associations
      description: '[Withdrawn: Incorporated into PM-15.]'
      translations:
        pt:
          name: "Contatos com Grupos e Associa\xE7\xF5es de Seguran\xE7a"

            \ | Bloqueio do Tr\xE1fego de Comunica\xE7\xE3o de Entrada e de Sa\xED\
            da"
          description: '[Retirado: Incorporado ao SC-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-19

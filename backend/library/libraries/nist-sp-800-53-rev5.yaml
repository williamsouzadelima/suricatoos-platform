    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:at
      ref_id: AT-6
      name: Training Feedback
      description: 'Provide feedback on organizational training results to the following
        personnel [Assignment: organization-defined frequency]: [Assignment: organization-defined
        personnel].'
      annotation: Training feedback includes awareness training results and role-based
        training results. Training results, especially failures of personnel in critical
        roles, can be indicative of a potentially serious problem. Therefore, it is
        important that senior managers are made aware of such situations so that they
        can take appropriate response actions. Training feedback supports the evaluation
        and update of organizational training described in AT-2b and AT-3b.
      translations:
        pt:
          name: Feedback de Treinamento
          description: "Fornecer feedback sobre os resultados do treinamento organizacional\
            \ ao seguinte pessoal [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o]: [Atribui\xE7\xE3o: pessoal definido pela organiza\xE7\xE3o]."
          annotation: "O feedback de treinamento inclui os resultados do treinamento\
            \ de conscientiza\xE7\xE3o e os resultados do treinamento baseado em fun\xE7\
            \xF5es. Os resultados do treinamento, especialmente as falhas de pessoal\
            \ em fun\xE7\xF5es cr\xEDticas, podem ser indicativos de um problema potencialmente\
            \ grave. Portanto, \xE9 importante que os gestores seniores sejam informados\
            \ sobre tais situa\xE7\xF5es para que possam adotar a\xE7\xF5es de resposta\
            \ apropriadas. O feedback de treinamento apoia a avalia\xE7\xE3o e a atualiza\xE7\
            \xE3o do treinamento organizacional descritas em AT-2b e AT-3b."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      assessable: false
      depth: 1
      ref_id: AU
      name: Audit and Accountability
      translations:
        pt:
          name: "Auditoria e Responsabiliza\xE7\xE3o"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] audit and accountability policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the audit and accountability
        policy and the associated audit and accountability controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the audit and accountability
        policy and procedures; and

        c. Review and update the current audit and accountability:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Audit and accountability policy and procedures address the controls
        in the AU family that are implemented within systems and organizations. The
        risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of audit and accountability policy and procedures. Security
        and privacy program policies and procedures at the organization level are
        preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to audit
        and accountability policy and procedures include assessment or audit findings,
        security incidents or breaches, or changes in applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Simply restating
        controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de auditoria e responsabiliza\xE7\xE3o de [Sele\xE7\xE3o (uma ou\
            \ mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3o/neg\xF3\
            cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo, fun\xE7\
            \xF5es, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\xE3\
            o entre as entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com leis aplic\xE1veis, ordens executivas, diretivas, regulamentos,\
            \ pol\xEDticas, normas e diretrizes; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de auditoria e responsabiliza\xE7\
            \xE3o e dos controles de auditoria e responsabiliza\xE7\xE3o associados;\n\
            b. Designar um [Atribui\xE7\xE3o: respons\xE1vel definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de auditoria e responsabiliza\xE7\
            \xE3o; e\nc. Revisar e atualizar a atual auditoria e responsabiliza\xE7\
            \xE3o:\n1. Pol\xEDtica [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela\
            \ organiza\xE7\xE3o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de auditoria e responsabiliza\xE7\
            \xE3o abordam os controles da fam\xEDlia AU que s\xE3o implementados dentro\
            \ dos sistemas e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de riscos\
            \ \xE9 um fator importante no estabelecimento de tais pol\xEDticas e procedimentos.\
            \ Pol\xEDticas e procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Portanto, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem no desenvolvimento da pol\xEDtica e dos procedimentos\
            \ de auditoria e responsabiliza\xE7\xE3o. As pol\xEDticas e os procedimentos\
            \ dos programas de seguran\xE7a e privacidade no n\xEDvel organizacional\
            \ s\xE3o prefer\xEDveis, em geral, e podem dispensar a necessidade de\
            \ pol\xEDticas e procedimentos espec\xEDficos de miss\xE3o ou de sistema.\
            \ A pol\xEDtica pode ser inclu\xEDda como parte da pol\xEDtica geral de\
            \ seguran\xE7a e privacidade ou ser representada por m\xFAltiplas pol\xED\
            ticas que reflitam a natureza complexa das organiza\xE7\xF5es. Procedimentos\
            \ podem ser estabelecidos para programas de seguran\xE7a e privacidade,\
            \ para processos de miss\xE3o ou neg\xF3cio e para sistemas, se necess\xE1\
            rio. Os procedimentos descrevem como as pol\xEDticas ou os controles s\xE3\
            o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0 fun\xE7\
            \xE3o que \xE9 o objeto do procedimento. Os procedimentos podem ser documentados\
            \ em planos de seguran\xE7a e privacidade do sistema ou em um ou mais\
            \ documentos separados. Eventos que podem precipitar uma atualiza\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de auditoria e responsabiliza\xE7\
            \xE3o incluem constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes\
            \ ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7as em leis aplic\xE1\
            veis, ordens executivas, diretivas, regulamentos, pol\xEDticas, normas\
            \ e diretrizes. A simples reafirma\xE7\xE3o de controles n\xE3o constitui\
            \ uma pol\xEDtica ou um procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-2
      name: Event Logging
      description: 'a. Identify the types of events that the system is capable of
        logging in support of the audit function: [Assignment: organization-defined
        event types that the system is capable of logging];

        b. Coordinate the event logging function with other organizational entities
        requiring audit-related information to guide and inform the selection criteria
        for events to be logged;

        c. Specify the following event types for logging within the system: [Assignment:
        organization-defined event types (subset of the event types defined in AU-2a.)
        along with the frequency of (or situation requiring) logging for each identified
        event type];

        d. Provide a rationale for why the event types selected for logging are deemed
        to be adequate to support after-the-fact investigations of incidents; and

        e. Review and update the event types selected for logging [Assignment: organization-defined
        frequency].'
      annotation: 'An event is an observable occurrence in a system. The types of
        events that require logging are those events that are significant and relevant
        to the security of systems and the privacy of individuals. Event logging also
        supports specific monitoring and auditing needs. Event types include password
        changes, failed logons or failed accesses related to systems, security or
        privacy attribute changes, administrative privilege usage, PIV credential
        usage, data action changes, query parameters, or external credential usage.
        In determining the set of event types that require logging, organizations
        consider the monitoring and auditing appropriate for each of the controls
        to be implemented. For completeness, event logging includes all protocols
        that are operational and supported by the system.

        To balance monitoring and auditing requirements with other system needs, event
        logging requires identifying the subset of event types that are logged at
        a given point in time. For example, organizations may determine that systems
        need the capability to log every file access successful and unsuccessful,
        but not activate that capability except for specific circumstances due to
        the potential burden on system performance. The types of events that organizations
        desire to be logged may change. Reviewing and updating the set of logged events
        is necessary to help ensure that the events remain relevant and continue to
        support the needs of the organization. Organizations consider how the types
        of logging events can reveal information about individuals that may give rise
        to privacy risk and how best to mitigate such risks. For example, there is
        the potential to reveal personally identifiable information in the audit trail,
        especially if the logging event is based on patterns or time of usage.

        Event logging requirements, including the need to log specific event types,
        may be referenced in other controls and control enhancements. These include
        AC-2(4), AC-3(10), AC-6(9), AC-17(1), CM-3f, CM-5(1), IA-3(3)(b), MA-4(1),
        MP-4(2), PE-3, PM-21, PT-7, RA-8, SC-7(9), SC-7(15), SI-3(8), SI-4(22), SI-7(8),
        and SI-10(1). Organizations include event types that are required by applicable
        laws, executive orders, directives, policies, regulations, standards, and
        guidelines. Audit records can be generated at various levels, including at
        the packet level as information traverses the network. Selecting the appropriate
        level of event logging is an important part of a monitoring and auditing capability
        and can identify the root causes of problems. When defining event types, organizations
        consider the logging necessary to cover related event types, such as the steps
        in distributed, transaction-based processes and the actions that occur in
        service-oriented architectures.'
      translations:
        pt:
          name: Registro de Eventos
          description: "a. Identificar os tipos de eventos que o sistema \xE9 capaz\
            \ de registrar em apoio \xE0 fun\xE7\xE3o de auditoria: [Atribui\xE7\xE3\
            o: tipos de eventos definidos pela organiza\xE7\xE3o que o sistema \xE9\
            \ capaz de registrar];\nb. Coordenar a fun\xE7\xE3o de registro de eventos\
            \ com outras entidades organizacionais que necessitem de informa\xE7\xF5\
            es relacionadas \xE0 auditoria, a fim de orientar e fundamentar os crit\xE9\
            rios de sele\xE7\xE3o dos eventos a serem registrados;\nc. Especificar\
            \ os seguintes tipos de eventos para registro dentro do sistema: [Atribui\xE7\
            \xE3o: tipos de eventos definidos pela organiza\xE7\xE3o (subconjunto\
            \ dos tipos de eventos definidos em AU-2a.) juntamente com a frequ\xEA\
            ncia (ou a situa\xE7\xE3o que exige) o registro de cada tipo de evento\
            \ identificado];\nd. Fornecer uma justificativa para o motivo pelo qual\
            \ os tipos de eventos selecionados para registro s\xE3o considerados adequados\
            \ para apoiar investiga\xE7\xF5es posteriores de incidentes; e\ne. Revisar\
            \ e atualizar os tipos de eventos selecionados para registro [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Um evento \xE9 uma ocorr\xEAncia observ\xE1vel em um sistema.\
            \ Os tipos de eventos que exigem registro s\xE3o aqueles eventos significativos\
            \ e relevantes para a seguran\xE7a dos sistemas e a privacidade dos indiv\xED\
            duos. O registro de eventos tamb\xE9m apoia necessidades espec\xEDficas\
            \ de monitoramento e auditoria. Os tipos de eventos incluem altera\xE7\
            \xF5es de senha, falhas de logon ou falhas de acesso relacionadas a sistemas,\
            \ altera\xE7\xF5es de atributos de seguran\xE7a ou privacidade, uso de\
            \ privil\xE9gios administrativos, uso de credencial PIV, altera\xE7\xF5\
            es de a\xE7\xF5es de dados, par\xE2metros de consulta ou uso de credenciais\
            \ externas. Ao determinar o conjunto de tipos de eventos que exigem registro,\
            \ as organiza\xE7\xF5es consideram o monitoramento e a auditoria apropriados\
            \ para cada um dos controles a serem implementados. Para fins de completude,\
            \ o registro de eventos inclui todos os protocolos que est\xE3o operacionais\
            \ e s\xE3o suportados pelo sistema.\nPara equilibrar os requisitos de\
            \ monitoramento e auditoria com outras necessidades do sistema, o registro\
            \ de eventos exige a identifica\xE7\xE3o do subconjunto de tipos de eventos\
            \ que s\xE3o registrados em um dado momento. Por exemplo, as organiza\xE7\
            \xF5es podem determinar que os sistemas necessitam da capacidade de registrar\
            \ todo acesso a arquivos, bem-sucedido e malsucedido, mas n\xE3o ativar\
            \ essa capacidade exceto em circunst\xE2ncias espec\xEDficas, devido ao\
            \ potencial impacto no desempenho do sistema. Os tipos de eventos que\
            \ as organiza\xE7\xF5es desejam registrar podem mudar. Revisar e atualizar\
            \ o conjunto de eventos registrados \xE9 necess\xE1rio para ajudar a garantir\
            \ que os eventos permane\xE7am relevantes e continuem a apoiar as necessidades\
            \ da organiza\xE7\xE3o. As organiza\xE7\xF5es consideram como os tipos\
            \ de eventos de registro podem revelar informa\xE7\xF5es sobre indiv\xED\
            duos que possam dar origem a risco de privacidade e como melhor mitigar\
            \ tais riscos. Por exemplo, existe o potencial de revelar informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal na trilha de auditoria, especialmente\
            \ se o evento de registro for baseado em padr\xF5es ou hor\xE1rio de uso.\n\
            Os requisitos de registro de eventos, incluindo a necessidade de registrar\
            \ tipos espec\xEDficos de eventos, podem ser referenciados em outros controles\
            \ e aprimoramentos de controle. Estes incluem AC-2(4), AC-3(10), AC-6(9),\
            \ AC-17(1), CM-3f, CM-5(1), IA-3(3)(b), MA-4(1), MP-4(2), PE-3, PM-21,\
            \ PT-7, RA-8, SC-7(9), SC-7(15), SI-3(8), SI-4(22), SI-7(8) e SI-10(1).\
            \ As organiza\xE7\xF5es incluem os tipos de eventos exigidos por leis,\
            \ ordens executivas, diretrizes, pol\xEDticas, regulamentos, normas e\
            \ orienta\xE7\xF5es aplic\xE1veis. Registros de auditoria podem ser gerados\
            \ em diversos n\xEDveis, inclusive no n\xEDvel de pacote, \xE0 medida\
            \ que as informa\xE7\xF5es atravessam a rede. Selecionar o n\xEDvel apropriado\
            \ de registro de eventos \xE9 uma parte importante de uma capacidade de\
            \ monitoramento e auditoria e pode identificar as causas-raiz dos problemas.\
            \ Ao definir os tipos de eventos, as organiza\xE7\xF5es consideram o registro\
            \ necess\xE1rio para cobrir tipos de eventos relacionados, como as etapas\
            \ em processos distribu\xEDdos baseados em transa\xE7\xF5es e as a\xE7\
            \xF5es que ocorrem em arquiteturas orientadas a servi\xE7os."

            \ do sistema definidos pela organiza\xE7\xE3o]; e\nb. Implementar procedimentos\
            \ espec\xEDficos para que [Atribui\xE7\xE3o: indiv\xEDduos autorizados\
            \ definidos pela organiza\xE7\xE3o] desabilitem manualmente a prote\xE7\
            \xE3o contra grava\xE7\xE3o por hardware para modifica\xE7\xF5es de firmware\
            \ e reabilitem a prote\xE7\xE3o contra grava\xE7\xE3o antes de retornar\
            \ ao modo operacional."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      assessable: false
      depth: 1
      ref_id: SI
      name: System and Information Integrity
      translations:
        pt:
          name: "Integridade do Sistema e da Informa\xE7\xE3o"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] system and information integrity policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the system and information
        integrity policy and the associated system and information integrity controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the system and information
        integrity policy and procedures; and

        c. Review and update the current system and information integrity:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: System and information integrity policy and procedures address the
        controls in the SI family that are implemented within systems and organizations.
        The risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of system and information integrity policy and procedures.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to system
        and information integrity policy and procedures include assessment or audit
        findings, security incidents or breaches, or changes in applicable laws, executive
        orders, directives, regulations, policies, standards, and guidelines. Simply
        restating controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar a [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de integridade do sistema e da informa\xE7\xE3o de [Sele\xE7\xE3\
            o (um ou mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3\
            o/neg\xF3cio; n\xEDvel de sistema] que:\n(a) Aborde finalidade, escopo,\
            \ pap\xE9is, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\
            \xE3o entre entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com leis, ordens executivas, diretrizes, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de integridade do sistema e da\
            \ informa\xE7\xE3o e dos controles de integridade do sistema e da informa\xE7\
            \xE3o associados;\nb. Designar um [Atribui\xE7\xE3o: funcion\xE1rio definido\
            \ pela organiza\xE7\xE3o] para gerenciar o desenvolvimento, a documenta\xE7\
            \xE3o e a dissemina\xE7\xE3o da pol\xEDtica e dos procedimentos de integridade\
            \ do sistema e da informa\xE7\xE3o; e\nc. Revisar e atualizar a atual:\n\
            1. Pol\xEDtica de integridade do sistema e da informa\xE7\xE3o [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ de integridade do sistema e da informa\xE7\xE3o [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de integridade do sistema\
            \ e da informa\xE7\xE3o abordam os controles da fam\xEDlia SI que s\xE3\
            o implementados dentro dos sistemas e organiza\xE7\xF5es. A estrat\xE9\
            gia de gest\xE3o de riscos \xE9 um fator importante no estabelecimento\
            \ de tais pol\xEDticas e procedimentos. Pol\xEDticas e procedimentos contribuem\
            \ para a garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante\
            \ que os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de integridade do sistema e da informa\xE7\
            \xE3o. Pol\xEDticas e procedimentos de programas de seguran\xE7a e privacidade\
            \ no n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral, e podem\
            \ dispensar a necessidade de pol\xEDticas e procedimentos espec\xEDficos\
            \ de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o ou de neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Os procedimentos descrevem como as pol\xEDticas ou\
            \ controles s\xE3o implementados e podem ser direcionados ao indiv\xED\
            duo ou fun\xE7\xE3o que \xE9 o objeto do procedimento. Os procedimentos\
            \ podem ser documentados em planos de seguran\xE7a e privacidade do sistema\
            \ ou em um ou mais documentos separados. Eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de integridade\
            \ do sistema e da informa\xE7\xE3o incluem constata\xE7\xF5es de avalia\xE7\
            \xE3o ou auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou\
            \ mudan\xE7as em leis, ordens executivas, diretrizes, regulamentos, pol\xED\
            ticas, normas e diretrizes aplic\xE1veis. A simples repeti\xE7\xE3o dos\
            \ controles n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-2
      name: Flaw Remediation
      description: 'a. Identify, report, and correct system flaws;

        b. Test software and firmware updates related to flaw remediation for effectiveness
        and potential side effects before installation;

        c. Install security-relevant software and firmware updates within [Assignment:
        organization-defined time period] of the release of the updates; and

        d. Incorporate flaw remediation into the organizational configuration management
        process.'
      annotation: 'The need to remediate system flaws applies to all types of software
        and firmware. Organizations identify systems affected by software flaws, including
        potential vulnerabilities resulting from those flaws, and report this information
        to designated organizational personnel with information security and privacy
        responsibilities. Security-relevant updates include patches, service packs,
        and malicious code signatures. Organizations also address flaws discovered
        during assessments, continuous monitoring, incident response activities, and
        system error handling. By incorporating flaw remediation into configuration
        management processes, required remediation actions can be tracked and verified.

        Organization-defined time periods for updating security-relevant software
        and firmware may vary based on a variety of risk factors, including the security
        category of the system, the criticality of the update (i.e., severity of the
        vulnerability related to the discovered flaw), the organizational risk tolerance,
        the mission supported by the system, or the threat environment. Some types
        of flaw remediation may require more testing than other types. Organizations
        determine the type of testing needed for the specific type of flaw remediation
        activity under consideration and the types of changes that are to be configuration-managed.
        In some situations, organizations may determine that the testing of software
        or firmware updates is not necessary or practical, such as when implementing
        simple malicious code signature updates. In testing decisions, organizations
        consider whether security-relevant software or firmware updates are obtained
        from authorized sources with appropriate digital signatures.'
      translations:
        pt:
          name: "Remedia\xE7\xE3o de Falhas"
          description: "a. Identificar, reportar e corrigir falhas do sistema;\nb.\
            \ Testar atualiza\xE7\xF5es de software e firmware relacionadas \xE0 remedia\xE7\
            \xE3o de falhas quanto \xE0 efic\xE1cia e a potenciais efeitos colaterais\
            \ antes da instala\xE7\xE3o;\nc. Instalar atualiza\xE7\xF5es de software\
            \ e firmware relevantes para a seguran\xE7a dentro de [Atribui\xE7\xE3\
            o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] a partir da libera\xE7\
            \xE3o das atualiza\xE7\xF5es; e\nd. Incorporar a remedia\xE7\xE3o de falhas\
            \ ao processo organizacional de gest\xE3o de configura\xE7\xE3o."
          annotation: "A necessidade de remediar falhas do sistema aplica-se a todos\
            \ os tipos de software e firmware. As organiza\xE7\xF5es identificam sistemas\
            \ afetados por falhas de software, incluindo potenciais vulnerabilidades\
            \ resultantes dessas falhas, e reportam essa informa\xE7\xE3o ao pessoal\
            \ organizacional designado com responsabilidades de seguran\xE7a da informa\xE7\
            \xE3o e privacidade. Atualiza\xE7\xF5es relevantes para a seguran\xE7\
            a incluem patches, service packs e assinaturas de c\xF3digo malicioso.\
            \ As organiza\xE7\xF5es tamb\xE9m tratam de falhas descobertas durante\
            \ avalia\xE7\xF5es, monitoramento cont\xEDnuo, atividades de resposta\
            \ a incidentes e tratamento de erros do sistema. Ao incorporar a remedia\xE7\
            \xE3o de falhas aos processos de gest\xE3o de configura\xE7\xE3o, as a\xE7\
            \xF5es de remedia\xE7\xE3o requeridas podem ser rastreadas e verificadas.\n\
            Os per\xEDodos de tempo definidos pela organiza\xE7\xE3o para atualizar\
            \ software e firmware relevantes para a seguran\xE7a podem variar com\
            \ base em diversos fatores de risco, incluindo a categoria de seguran\xE7\
            a do sistema, a criticidade da atualiza\xE7\xE3o (ou seja, a severidade\
            \ da vulnerabilidade relacionada \xE0 falha descoberta), a toler\xE2ncia\
            \ a risco da organiza\xE7\xE3o, a miss\xE3o suportada pelo sistema ou\
            \ o ambiente de amea\xE7a. Alguns tipos de remedia\xE7\xE3o de falhas\
            \ podem exigir mais testes do que outros. As organiza\xE7\xF5es determinam\
            \ o tipo de teste necess\xE1rio para o tipo espec\xEDfico de atividade\
            \ de remedia\xE7\xE3o de falhas em considera\xE7\xE3o e os tipos de mudan\xE7\
            as que devem ser geridos por configura\xE7\xE3o. Em algumas situa\xE7\xF5\
            es, as organiza\xE7\xF5es podem determinar que o teste de atualiza\xE7\
            \xF5es de software ou firmware n\xE3o \xE9 necess\xE1rio ou pr\xE1tico,\
            \ como ao implementar atualiza\xE7\xF5es simples de assinaturas de c\xF3\
            digo malicioso. Nas decis\xF5es de teste, as organiza\xE7\xF5es consideram\
            \ se as atualiza\xE7\xF5es de software ou firmware relevantes para a seguran\xE7\
            a s\xE3o obtidas de fontes autorizadas com assinaturas digitais apropriadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-13(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-13(2)
      name: Predictable Failure Prevention | Time Limit on Process Execution Without
        Supervision
      description: '[Withdrawn: Incorporated into SI-7(16).]'
      translations:
        pt:
          name: "Preven\xE7\xE3o de Falha Previs\xEDvel | Limite de Tempo para Execu\xE7\
            \xE3o de Processo Sem Supervis\xE3o"
          description: '[Retirado: Incorporado ao SI-7(16).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-2(2)
      name: Flaw Remediation | Automated Flaw Remediation Status
      description: 'Determine if system components have applicable security-relevant
        software and firmware updates installed using [Assignment: organization-defined
        automated mechanisms] [Assignment: organization-defined frequency].'
      annotation: Automated mechanisms can track and determine the status of known
        flaws for system components.
      translations:
        pt:
          name: "Remedia\xE7\xE3o de Falhas | Status Automatizado de Remedia\xE7\xE3\
            o de Falhas"
          description: "Determinar se os componentes do sistema t\xEAm as atualiza\xE7\
            \xF5es de software e firmware relevantes para a seguran\xE7a aplic\xE1\
            veis instaladas usando [Atribui\xE7\xE3o: mecanismos automatizados definidos\
            \ pela organiza\xE7\xE3o] [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o]."
          annotation: Mecanismos automatizados podem rastrear e determinar o status
            de falhas conhecidas dos componentes do sistema.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-2(3)
      name: Flaw Remediation | Time to Remediate Flaws and Benchmarks for Corrective
        Actions
      description: '(a) Measure the time between flaw identification and flaw remediation;
        and

        (b) Establish the following benchmarks for taking corrective actions: [Assignment:
        organization-defined benchmarks].'
      annotation: Organizations determine the time it takes on average to correct
        system flaws after such flaws have been identified and subsequently establish
        organizational benchmarks (i.e., time frames) for taking corrective actions.
        Benchmarks can be established by the type of flaw or the severity of the potential
        vulnerability if the flaw can be exploited.
      translations:
        pt:
          name: "Remedia\xE7\xE3o de Falhas | Tempo para Remediar Falhas e Par\xE2\
            metros de Refer\xEAncia para A\xE7\xF5es Corretivas"
          description: "(a) Medir o tempo entre a identifica\xE7\xE3o da falha e a\
            \ remedia\xE7\xE3o da falha; e\n(b) Estabelecer os seguintes par\xE2metros\
            \ de refer\xEAncia para a ado\xE7\xE3o de a\xE7\xF5es corretivas: [Atribui\xE7\
            \xE3o: par\xE2metros de refer\xEAncia definidos pela organiza\xE7\xE3\
            o]."
          annotation: "As organiza\xE7\xF5es determinam o tempo m\xE9dio necess\xE1\
            rio para corrigir falhas do sistema ap\xF3s tais falhas terem sido identificadas\
            \ e, subsequentemente, estabelecem par\xE2metros de refer\xEAncia organizacionais\
            \ (ou seja, prazos) para a ado\xE7\xE3o de a\xE7\xF5es corretivas. Os\
            \ par\xE2metros de refer\xEAncia podem ser estabelecidos por tipo de falha\
            \ ou pela severidade da potencial vulnerabilidade, caso a falha possa\
            \ ser explorada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-2(4)
      name: Flaw Remediation | Automated Patch Management Tools
      description: 'Employ automated patch management tools to facilitate flaw remediation
        to the following system components: [Assignment: organization-defined system
        components].'
      annotation: Using automated tools to support patch management helps to ensure
        the timeliness and completeness of system patching operations.
      translations:
        pt:
          name: "Remedia\xE7\xE3o de Falhas | Ferramentas Automatizadas de Gest\xE3\
            o de Patches"
          description: "Empregar ferramentas automatizadas de gest\xE3o de patches\
            \ para facilitar a remedia\xE7\xE3o de falhas nos seguintes componentes\
            \ do sistema: [Atribui\xE7\xE3o: componentes do sistema definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "O uso de ferramentas automatizadas para apoiar a gest\xE3o\
            \ de patches ajuda a assegurar a tempestividade e a completude das opera\xE7\
            \xF5es de aplica\xE7\xE3o de patches no sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-2(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-2(5)
      name: Flaw Remediation | Automatic Software and Firmware Updates
      description: 'Install [Assignment: organization-defined security-relevant software
        and firmware updates] automatically to [Assignment: organization-defined system
        components].'
      annotation: Due to system integrity and availability concerns, organizations
        consider the methodology used to carry out automatic updates. Organizations
        balance the need to ensure that the updates are installed as soon as possible
        with the need to maintain configuration management and control with any mission
        or operational impacts that automatic updates might impose.
      translations:
        pt:
          name: "Remedia\xE7\xE3o de Falhas | Atualiza\xE7\xF5es Autom\xE1ticas de\
            \ Software e Firmware"
          description: "Instalar [Atribui\xE7\xE3o: atualiza\xE7\xF5es de software\
            \ e firmware relevantes para a seguran\xE7a definidas pela organiza\xE7\
            \xE3o] automaticamente em [Atribui\xE7\xE3o: componentes do sistema definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Devido a preocupa\xE7\xF5es com integridade e disponibilidade\
            \ do sistema, as organiza\xE7\xF5es consideram a metodologia usada para\
            \ realizar atualiza\xE7\xF5es autom\xE1ticas. As organiza\xE7\xF5es equilibram\
            \ a necessidade de assegurar que as atualiza\xE7\xF5es sejam instaladas\
            \ o mais r\xE1pido poss\xEDvel com a necessidade de manter a gest\xE3\
            o e o controle de configura\xE7\xE3o, considerando quaisquer impactos\
            \ de miss\xE3o ou operacionais que as atualiza\xE7\xF5es autom\xE1ticas\
            \ possam impor."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-2(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-2(6)
      name: Flaw Remediation | Removal of Previous Versions of Software and Firmware
      description: 'Remove previous versions of [Assignment: organization-defined
        software and firmware components] after updated versions have been installed.'
      annotation: Previous versions of software or firmware components that are not
        removed from the system after updates have been installed may be exploited
        by adversaries. Some products may automatically remove previous versions of
        software and firmware from the system.
      translations:
        pt:
          name: "Remedia\xE7\xE3o de Falhas | Remo\xE7\xE3o de Vers\xF5es Anteriores\
            \ de Software e Firmware"
          description: "Remover vers\xF5es anteriores de [Atribui\xE7\xE3o: componentes\
            \ de software e firmware definidos pela organiza\xE7\xE3o] ap\xF3s a instala\xE7\
            \xE3o das vers\xF5es atualizadas."
          annotation: "Vers\xF5es anteriores de componentes de software ou firmware\
            \ que n\xE3o s\xE3o removidas do sistema ap\xF3s a instala\xE7\xE3o das\
            \ atualiza\xE7\xF5es podem ser exploradas por advers\xE1rios. Alguns produtos\
            \ podem remover automaticamente vers\xF5es anteriores de software e firmware\
            \ do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3
      name: Malicious Code Protection
      description: 'a. Implement [Selection (one or more): signature based; non-signature
        based] malicious code protection mechanisms at system entry and exit points
        to detect and eradicate malicious code;

        b. Automatically update malicious code protection mechanisms as new releases
        are available in accordance with organizational configuration management policy
        and procedures;

        c. Configure malicious code protection mechanisms to:

        1. Perform periodic scans of the system [Assignment: organization-defined
        frequency] and real-time scans of files from external sources at [Selection
        (one or more): endpoint; network entry and exit points] as the files are downloaded,
        opened, or executed in accordance with organizational policy; and

        2. [Selection (one or more): block malicious code; quarantine malicious code;
        take [Assignment: organization-defined action]]; and send alert to [Assignment:
        organization-defined personnel or roles] in response to malicious code detection;
        and

        d. Address the receipt of false positives during malicious code detection
        and eradication and the resulting potential impact on the availability of
        the system.'
      annotation: 'System entry and exit points include firewalls, remote access servers,
        workstations, electronic mail servers, web servers, proxy servers, notebook
        computers, and mobile devices. Malicious code includes viruses, worms, Trojan
        horses, and spyware. Malicious code can also be encoded in various formats
        contained within compressed or hidden files or hidden in files using techniques
        such as steganography. Malicious code can be inserted into systems in a variety
        of ways, including by electronic mail, the world-wide web, and portable storage
        devices. Malicious code insertions occur through the exploitation of system
        vulnerabilities. A variety of technologies and methods exist to limit or eliminate
        the effects of malicious code.

        Malicious code protection mechanisms include both signature- and nonsignature-based
        technologies. Nonsignature-based detection mechanisms include artificial intelligence
        techniques that use heuristics to detect, analyze, and describe the characteristics
        or behavior of malicious code and to provide controls against such code for
        which signatures do not yet exist or for which existing signatures may not
        be effective. Malicious code for which active signatures do not yet exist
        or may be ineffective includes polymorphic malicious code (i.e., code that
        changes signatures when it replicates). Nonsignature-based mechanisms also
        include reputation-based technologies. In addition to the above technologies,
        pervasive configuration management, comprehensive software integrity controls,
        and anti-exploitation software may be effective in preventing the execution
        of unauthorized code. Malicious code may be present in commercial off-the-shelf
        software as well as custom-built software and could include logic bombs, backdoors,
        and other types of attacks that could affect organizational mission and business
        functions.

        In situations where malicious code cannot be detected by detection methods
        or technologies, organizations rely on other types of controls, including
        secure coding practices, configuration management and control, trusted procurement
        processes, and monitoring practices to ensure that software does not perform
        functions other than the functions intended. Organizations may determine that,
        in response to the detection of malicious code, different actions may be warranted.
        For example, organizations can define actions in response to malicious code
        detection during periodic scans, the detection of malicious downloads, or
        the detection of maliciousness when attempting to open or execute files.'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso"
          description: "a. Implementar mecanismos de prote\xE7\xE3o contra c\xF3digo\
            \ malicioso [Sele\xE7\xE3o (um ou mais): baseados em assinatura; n\xE3\
            o baseados em assinatura] nos pontos de entrada e sa\xEDda do sistema\
            \ para detectar e erradicar c\xF3digo malicioso;\nb. Atualizar automaticamente\
            \ os mecanismos de prote\xE7\xE3o contra c\xF3digo malicioso \xE0 medida\
            \ que novas vers\xF5es estejam dispon\xEDveis, em conformidade com a pol\xED\
            tica e os procedimentos organizacionais de gest\xE3o de configura\xE7\xE3\
            o;\nc. Configurar os mecanismos de prote\xE7\xE3o contra c\xF3digo malicioso\
            \ para:\n1. Realizar varreduras peri\xF3dicas do sistema [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o] e varreduras em tempo\
            \ real de arquivos provenientes de fontes externas em [Sele\xE7\xE3o (um\
            \ ou mais): endpoint; pontos de entrada e sa\xEDda da rede] \xE0 medida\
            \ que os arquivos s\xE3o baixados, abertos ou executados, em conformidade\
            \ com a pol\xEDtica organizacional; e\n2. [Sele\xE7\xE3o (um ou mais):\
            \ bloquear c\xF3digo malicioso; colocar c\xF3digo malicioso em quarentena;\
            \ adotar [Atribui\xE7\xE3o: a\xE7\xE3o definida pela organiza\xE7\xE3\
            o]]; e enviar alerta a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] em resposta \xE0 detec\xE7\xE3o de c\xF3digo\
            \ malicioso; e\nd. Tratar do recebimento de falsos positivos durante a\
            \ detec\xE7\xE3o e erradica\xE7\xE3o de c\xF3digo malicioso e do resultante\
            \ impacto potencial na disponibilidade do sistema."
          annotation: "Os pontos de entrada e sa\xEDda do sistema incluem firewalls,\
            \ servidores de acesso remoto, esta\xE7\xF5es de trabalho, servidores\
            \ de correio eletr\xF4nico, servidores web, servidores proxy, notebooks\
            \ e dispositivos m\xF3veis. C\xF3digo malicioso inclui v\xEDrus, worms,\
            \ cavalos de Troia e spyware. C\xF3digo malicioso tamb\xE9m pode ser codificado\
            \ em v\xE1rios formatos contidos em arquivos compactados ou ocultos, ou\
            \ oculto em arquivos usando t\xE9cnicas como esteganografia. C\xF3digo\
            \ malicioso pode ser inserido em sistemas de diversas maneiras, inclusive\
            \ por correio eletr\xF4nico, pela world-wide web e por dispositivos de\
            \ armazenamento port\xE1teis. As inser\xE7\xF5es de c\xF3digo malicioso\
            \ ocorrem por meio da explora\xE7\xE3o de vulnerabilidades do sistema.\
            \ Existe uma variedade de tecnologias e m\xE9todos para limitar ou eliminar\
            \ os efeitos do c\xF3digo malicioso.\nOs mecanismos de prote\xE7\xE3o\
            \ contra c\xF3digo malicioso incluem tecnologias tanto baseadas em assinatura\
            \ quanto n\xE3o baseadas em assinatura. Os mecanismos de detec\xE7\xE3\
            o n\xE3o baseados em assinatura incluem t\xE9cnicas de intelig\xEAncia\
            \ artificial que usam heur\xEDsticas para detectar, analisar e descrever\
            \ as caracter\xEDsticas ou o comportamento do c\xF3digo malicioso e para\
            \ fornecer controles contra c\xF3digos para os quais ainda n\xE3o existem\
            \ assinaturas ou para os quais as assinaturas existentes possam n\xE3\
            o ser eficazes. C\xF3digo malicioso para o qual ainda n\xE3o existem assinaturas\
            \ ativas ou para o qual elas possam ser ineficazes inclui c\xF3digo malicioso\
            \ polim\xF3rfico (ou seja, c\xF3digo que altera suas assinaturas quando\
            \ se replica). Os mecanismos n\xE3o baseados em assinatura tamb\xE9m incluem\
            \ tecnologias baseadas em reputa\xE7\xE3o. Al\xE9m das tecnologias acima,\
            \ a gest\xE3o de configura\xE7\xE3o abrangente, controles abrangentes\
            \ de integridade de software e software antiexplora\xE7\xE3o podem ser\
            \ eficazes na preven\xE7\xE3o da execu\xE7\xE3o de c\xF3digo n\xE3o autorizado.\
            \ C\xF3digo malicioso pode estar presente em software comercial de prateleira\
            \ (COTS) bem como em software desenvolvido sob medida e pode incluir bombas\
            \ l\xF3gicas, backdoors e outros tipos de ataques que poderiam afetar\
            \ a miss\xE3o e as fun\xE7\xF5es de neg\xF3cio da organiza\xE7\xE3o.\n\
            Em situa\xE7\xF5es em que o c\xF3digo malicioso n\xE3o pode ser detectado\
            \ por m\xE9todos ou tecnologias de detec\xE7\xE3o, as organiza\xE7\xF5\
            es recorrem a outros tipos de controles, incluindo pr\xE1ticas de codifica\xE7\
            \xE3o segura, gest\xE3o e controle de configura\xE7\xE3o, processos de\
            \ aquisi\xE7\xE3o confi\xE1veis e pr\xE1ticas de monitoramento, para assegurar\
            \ que o software n\xE3o execute fun\xE7\xF5es diferentes das fun\xE7\xF5\
            es pretendidas. As organiza\xE7\xF5es podem determinar que, em resposta\
            \ \xE0 detec\xE7\xE3o de c\xF3digo malicioso, diferentes a\xE7\xF5es possam\
            \ ser justificadas. Por exemplo, as organiza\xE7\xF5es podem definir a\xE7\
            \xF5es em resposta \xE0 detec\xE7\xE3o de c\xF3digo malicioso durante\
            \ varreduras peri\xF3dicas, \xE0 detec\xE7\xE3o de downloads maliciosos\
            \ ou \xE0 detec\xE7\xE3o de malicidade ao tentar abrir ou executar arquivos."

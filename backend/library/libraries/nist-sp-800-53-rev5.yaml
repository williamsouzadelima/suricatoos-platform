    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8
      name: Security and Privacy Engineering Principles
      description: 'Apply the following systems security and privacy engineering principles
        in the specification, design, development, implementation, and modification
        of the system and system components: [Assignment: organization-defined systems
        security and privacy engineering principles].'
      annotation: 'Systems security and privacy engineering principles are closely
        related to and implemented throughout the system development life cycle (see
        SA-3). Organizations can apply systems security and privacy engineering principles
        to new systems under development or to systems undergoing upgrades. For existing
        systems, organizations apply systems security and privacy engineering principles
        to system upgrades and modifications to the extent feasible, given the current
        state of hardware, software, and firmware components within those systems.

        The application of systems security and privacy engineering principles helps
        organizations develop trustworthy, secure, and resilient systems and reduces
        the susceptibility to disruptions, hazards, threats, and the creation of privacy
        problems for individuals. Examples of system security engineering principles
        include: developing layered protections; establishing security and privacy
        policies, architecture, and controls as the foundation for design and development;
        incorporating security and privacy requirements into the system development
        life cycle; delineating physical and logical security boundaries; ensuring
        that developers are trained on how to build secure software; tailoring controls
        to meet organizational needs; and performing threat modeling to identify use
        cases, threat agents, attack vectors and patterns, design patterns, and compensating
        controls needed to mitigate risk.

        Organizations that apply systems security and privacy engineering concepts
        and principles can facilitate the development of trustworthy, secure systems,
        system components, and system services; reduce risk to acceptable levels;
        and make informed risk management decisions. System security engineering principles
        can also be used to protect against certain supply chain risks, including
        incorporating tamper-resistant hardware into a design.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade"
          description: "Aplicar os seguintes princ\xEDpios de engenharia de seguran\xE7\
            a e privacidade de sistemas na especifica\xE7\xE3o, projeto, desenvolvimento,\
            \ implementa\xE7\xE3o e modifica\xE7\xE3o do sistema e dos componentes\
            \ de sistema: [Atribui\xE7\xE3o: princ\xEDpios de engenharia de seguran\xE7\
            a e privacidade de sistemas definidos pela organiza\xE7\xE3o]."
          annotation: "Os princ\xEDpios de engenharia de seguran\xE7a e privacidade\
            \ de sistemas est\xE3o estreitamente relacionados e s\xE3o implementados\
            \ ao longo de todo o ciclo de vida de desenvolvimento do sistema (consulte\
            \ SA-3). As organiza\xE7\xF5es podem aplicar os princ\xEDpios de engenharia\
            \ de seguran\xE7a e privacidade de sistemas a novos sistemas em desenvolvimento\
            \ ou a sistemas que estejam passando por atualiza\xE7\xF5es. Para sistemas\
            \ existentes, as organiza\xE7\xF5es aplicam os princ\xEDpios de engenharia\
            \ de seguran\xE7a e privacidade de sistemas \xE0s atualiza\xE7\xF5es e\
            \ modifica\xE7\xF5es do sistema na medida do vi\xE1vel, considerando o\
            \ estado atual dos componentes de hardware, software e firmware desses\
            \ sistemas.\nA aplica\xE7\xE3o dos princ\xEDpios de engenharia de seguran\xE7\
            a e privacidade de sistemas ajuda as organiza\xE7\xF5es a desenvolver\
            \ sistemas confi\xE1veis, seguros e resilientes e reduz a suscetibilidade\
            \ a interrup\xE7\xF5es, perigos, amea\xE7as e \xE0 cria\xE7\xE3o de problemas\
            \ de privacidade para os indiv\xEDduos. Exemplos de princ\xEDpios de engenharia\
            \ de seguran\xE7a de sistemas incluem: desenvolver prote\xE7\xF5es em\
            \ camadas; estabelecer pol\xEDticas, arquitetura e controles de seguran\xE7\
            a e privacidade como fundamento para o projeto e o desenvolvimento; incorporar\
            \ requisitos de seguran\xE7a e privacidade ao ciclo de vida de desenvolvimento\
            \ do sistema; delinear fronteiras de seguran\xE7a f\xEDsicas e l\xF3gicas;\
            \ assegurar que os desenvolvedores sejam treinados sobre como construir\
            \ software seguro; adequar os controles para atender \xE0s necessidades\
            \ organizacionais; e realizar modelagem de amea\xE7as para identificar\
            \ casos de uso, agentes de amea\xE7a, vetores e padr\xF5es de ataque,\
            \ padr\xF5es de projeto e controles compensat\xF3rios necess\xE1rios para\
            \ mitigar o risco.\nAs organiza\xE7\xF5es que aplicam conceitos e princ\xED\
            pios de engenharia de seguran\xE7a e privacidade de sistemas podem facilitar\
            \ o desenvolvimento de sistemas, componentes de sistema e servi\xE7os\
            \ de sistema confi\xE1veis e seguros; reduzir o risco a n\xEDveis aceit\xE1\
            veis; e tomar decis\xF5es informadas de gest\xE3o de riscos. Os princ\xED\
            pios de engenharia de seguran\xE7a de sistemas tamb\xE9m podem ser usados\
            \ para proteger contra certos riscos da cadeia de suprimentos, incluindo\
            \ a incorpora\xE7\xE3o de hardware resistente \xE0 adultera\xE7\xE3o em\
            \ um projeto."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(1)
      name: Security and Privacy Engineering Principles | Clear Abstractions
      description: Implement the security design principle of clear abstractions.
      annotation: "The principle of clear abstractions states that a system has simple,\
        \ well-defined interfaces and functions that provide a consistent and intuitive\
        \ view of the data and how the data is managed. The clarity, simplicity, necessity,\
        \ and sufficiency of the system interfaces\u2014 combined with a precise definition\
        \ of their functional behavior\u2014promotes ease of analysis, inspection,\
        \ and testing as well as the correct and secure use of the system. The clarity\
        \ of an abstraction is subjective. Examples that reflect the application of\
        \ this principle include avoidance of redundant, unused interfaces; information\
        \ hiding; and avoidance of semantic overloading of interfaces or their parameters.\
        \ Information hiding (i.e., representation-independent programming), is a\
        \ design discipline used to ensure that the internal representation of information\
        \ in one system component is not visible to another system component invoking\
        \ or calling the first component, such that the published abstraction is not\
        \ influenced by how the data may be managed internally."
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Abstra\xE7\
            \xF5es Claras"
          description: "Implementar o princ\xEDpio de projeto de seguran\xE7a de abstra\xE7\
            \xF5es claras."
          annotation: "O princ\xEDpio de abstra\xE7\xF5es claras estabelece que um\
            \ sistema possui interfaces e fun\xE7\xF5es simples e bem definidas que\
            \ fornecem uma vis\xE3o consistente e intuitiva dos dados e de como os\
            \ dados s\xE3o gerenciados. A clareza, simplicidade, necessidade e sufici\xEA\
            ncia das interfaces do sistema \u2014 combinadas com uma defini\xE7\xE3\
            o precisa de seu comportamento funcional \u2014 promovem a facilidade\
            \ de an\xE1lise, inspe\xE7\xE3o e teste, bem como o uso correto e seguro\
            \ do sistema. A clareza de uma abstra\xE7\xE3o \xE9 subjetiva. Exemplos\
            \ que refletem a aplica\xE7\xE3o deste princ\xEDpio incluem a evita\xE7\
            \xE3o de interfaces redundantes e n\xE3o utilizadas; a oculta\xE7\xE3\
            o de informa\xE7\xF5es; e a evita\xE7\xE3o de sobrecarga sem\xE2ntica\
            \ de interfaces ou de seus par\xE2metros. A oculta\xE7\xE3o de informa\xE7\
            \xF5es (isto \xE9, programa\xE7\xE3o independente de representa\xE7\xE3\
            o) \xE9 uma disciplina de projeto usada para garantir que a representa\xE7\
            \xE3o interna das informa\xE7\xF5es em um componente do sistema n\xE3\
            o seja vis\xEDvel a outro componente do sistema que invoque ou chame o\
            \ primeiro componente, de modo que a abstra\xE7\xE3o publicada n\xE3o\
            \ seja influenciada por como os dados podem ser gerenciados internamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(2)
      name: Security and Privacy Engineering Principles | Least Common Mechanism
      description: 'Implement the security design principle of least common mechanism
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of least common mechanism states that the amount of
        mechanism common to more than one user and depended on by all users is minimized
        POPEK74. Mechanism minimization implies that different components of a system
        refrain from using the same mechanism to access a system resource. Every shared
        mechanism (especially a mechanism involving shared variables) represents a
        potential information path between users and is designed with care to ensure
        that it does not unintentionally compromise security SALTZER75. Implementing
        the principle of least common mechanism helps to reduce the adverse consequences
        of sharing the system state among different programs. A single program that
        corrupts a shared state (including shared variables) has the potential to
        corrupt other programs that are dependent on the state. The principle of least
        common mechanism also supports the principle of simplicity of design and addresses
        the issue of covert storage channels LAMPSON73.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Mecanismo\
            \ Comum M\xEDnimo"
          description: "Implementar o princ\xEDpio de projeto de seguran\xE7a de mecanismo\
            \ comum m\xEDnimo em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio de mecanismo comum m\xEDnimo estabelece que\
            \ a quantidade de mecanismo comum a mais de um usu\xE1rio e da qual todos\
            \ os usu\xE1rios dependem seja minimizada POPEK74. A minimiza\xE7\xE3\
            o de mecanismo implica que diferentes componentes de um sistema se abstenham\
            \ de usar o mesmo mecanismo para acessar um recurso do sistema. Todo mecanismo\
            \ compartilhado (especialmente um mecanismo que envolva vari\xE1veis compartilhadas)\
            \ representa um potencial caminho de informa\xE7\xE3o entre usu\xE1rios\
            \ e \xE9 projetado com cuidado para garantir que n\xE3o comprometa, de\
            \ forma n\xE3o intencional, a seguran\xE7a SALTZER75. A implementa\xE7\
            \xE3o do princ\xEDpio de mecanismo comum m\xEDnimo ajuda a reduzir as\
            \ consequ\xEAncias adversas do compartilhamento do estado do sistema entre\
            \ diferentes programas. Um \xFAnico programa que corrompa um estado compartilhado\
            \ (incluindo vari\xE1veis compartilhadas) tem o potencial de corromper\
            \ outros programas que dependam desse estado. O princ\xEDpio de mecanismo\
            \ comum m\xEDnimo tamb\xE9m apoia o princ\xEDpio de simplicidade de projeto\
            \ e aborda a quest\xE3o dos canais ocultos de armazenamento LAMPSON73."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(3)
      name: Security and Privacy Engineering Principles | Modularity and Layering
      description: 'Implement the security design principles of modularity and layering
        in [Assignment: organization-defined systems or system components].'
      annotation: The principles of modularity and layering are fundamental across
        system engineering disciplines. Modularity and layering derived from functional
        decomposition are effective in managing system complexity by making it possible
        to comprehend the structure of the system. Modular decomposition, or refinement
        in system design, is challenging and resists general statements of principle.
        Modularity serves to isolate functions and related data structures into well-defined
        logical units. Layering allows the relationships of these units to be better
        understood so that dependencies are clear and undesired complexity can be
        avoided. The security design principle of modularity extends functional modularity
        to include considerations based on trust, trustworthiness, privilege, and
        security policy. Security-informed modular decomposition includes the allocation
        of policies to systems in a network, separation of system applications into
        processes with distinct address spaces, allocation of system policies to layers,
        and separation of processes into subjects with distinct privileges based on
        hardware-supported privilege domains.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Modularidade\
            \ e Camadas"
          description: "Implementar os princ\xEDpios de projeto de seguran\xE7a de\
            \ modularidade e camadas em [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "Os princ\xEDpios de modularidade e camadas s\xE3o fundamentais\
            \ em todas as disciplinas de engenharia de sistemas. A modularidade e\
            \ as camadas, derivadas da decomposi\xE7\xE3o funcional, s\xE3o eficazes\
            \ na gest\xE3o da complexidade do sistema ao tornar poss\xEDvel compreender\
            \ a estrutura do sistema. A decomposi\xE7\xE3o modular, ou refinamento\
            \ no projeto do sistema, \xE9 desafiadora e resiste a afirma\xE7\xF5es\
            \ gerais de princ\xEDpio. A modularidade serve para isolar fun\xE7\xF5\
            es e estruturas de dados relacionadas em unidades l\xF3gicas bem definidas.\
            \ As camadas permitem que as rela\xE7\xF5es entre essas unidades sejam\
            \ mais bem compreendidas, de modo que as depend\xEAncias sejam claras\
            \ e a complexidade indesejada possa ser evitada. O princ\xEDpio de projeto\
            \ de seguran\xE7a de modularidade estende a modularidade funcional para\
            \ incluir considera\xE7\xF5es baseadas em confian\xE7a, confiabilidade,\
            \ privil\xE9gio e pol\xEDtica de seguran\xE7a. A decomposi\xE7\xE3o modular\
            \ informada por seguran\xE7a inclui a aloca\xE7\xE3o de pol\xEDticas a\
            \ sistemas em uma rede, a separa\xE7\xE3o de aplica\xE7\xF5es do sistema\
            \ em processos com espa\xE7os de endere\xE7amento distintos, a aloca\xE7\
            \xE3o de pol\xEDticas do sistema a camadas e a separa\xE7\xE3o de processos\
            \ em sujeitos com privil\xE9gios distintos baseados em dom\xEDnios de\
            \ privil\xE9gio suportados por hardware."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(4)
      name: Security and Privacy Engineering Principles | Partially Ordered Dependencies
      description: 'Implement the security design principle of partially ordered dependencies
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of partially ordered dependencies states that the
        synchronization, calling, and other dependencies in the system are partially
        ordered. A fundamental concept in system design is layering, whereby the system
        is organized into well-defined, functionally related modules or components.
        The layers are linearly ordered with respect to inter-layer dependencies,
        such that higher layers are dependent on lower layers. While providing functionality
        to higher layers, some layers can be self-contained and not dependent on lower
        layers. While a partial ordering of all functions in a given system may not
        be possible, if circular dependencies are constrained to occur within layers,
        the inherent problems of circularity can be more easily managed. Partially
        ordered dependencies and system layering contribute significantly to the simplicity
        and coherency of the system design. Partially ordered dependencies also facilitate
        system testing and analysis.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Depend\xEA\
            ncias Parcialmente Ordenadas"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de depend\xEA\
            ncias parcialmente ordenadas em [Assignment: organization-defined systems\
            \ or system components]."
          annotation: "O princ\xEDpio das depend\xEAncias parcialmente ordenadas estabelece\
            \ que as depend\xEAncias de sincroniza\xE7\xE3o, de chamada e de outros\
            \ tipos no sistema s\xE3o parcialmente ordenadas. Um conceito fundamental\
            \ no design de sistemas \xE9 a camada (layering), por meio da qual o sistema\
            \ \xE9 organizado em m\xF3dulos ou componentes bem definidos e funcionalmente\
            \ relacionados. As camadas s\xE3o linearmente ordenadas em rela\xE7\xE3\
            o \xE0s depend\xEAncias entre camadas, de modo que as camadas superiores\
            \ dependem das camadas inferiores. Embora forne\xE7am funcionalidade \xE0\
            s camadas superiores, algumas camadas podem ser autocontidas e n\xE3o\
            \ depender das camadas inferiores. Embora possa n\xE3o ser poss\xEDvel\
            \ uma ordena\xE7\xE3o parcial de todas as fun\xE7\xF5es em um determinado\
            \ sistema, se as depend\xEAncias circulares forem restringidas a ocorrer\
            \ dentro das camadas, os problemas inerentes \xE0 circularidade podem\
            \ ser gerenciados mais facilmente. As depend\xEAncias parcialmente ordenadas\
            \ e a estrutura\xE7\xE3o em camadas do sistema contribuem significativamente\
            \ para a simplicidade e a coer\xEAncia do design do sistema. As depend\xEA\
            ncias parcialmente ordenadas tamb\xE9m facilitam os testes e a an\xE1\
            lise do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(5)
      name: Security and Privacy Engineering Principles | Efficiently Mediated Access
      description: 'Implement the security design principle of efficiently mediated
        access in [Assignment: organization-defined systems or system components].'
      annotation: The principle of efficiently mediated access states that policy
        enforcement mechanisms utilize the least common mechanism available while
        satisfying stakeholder requirements within expressed constraints. The mediation
        of access to system resources (i.e., CPU, memory, devices, communication ports,
        services, infrastructure, data, and information) is often the predominant
        security function of secure systems. It also enables the realization of protections
        for the capability provided to stakeholders by the system. Mediation of resource
        access can result in performance bottlenecks if the system is not designed
        correctly. For example, by using hardware mechanisms, efficiently mediated
        access can be achieved. Once access to a low-level resource such as memory
        has been obtained, hardware protection mechanisms can ensure that out-of-bounds
        access does not occur.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Acesso\
            \ Mediado de Forma Eficiente"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de acesso\
            \ mediado de forma eficiente em [Assignment: organization-defined systems\
            \ or system components]."
          annotation: "O princ\xEDpio do acesso mediado de forma eficiente estabelece\
            \ que os mecanismos de aplica\xE7\xE3o de pol\xEDtica utilizam o menor\
            \ mecanismo comum dispon\xEDvel, ao mesmo tempo em que atendem aos requisitos\
            \ das partes interessadas dentro das restri\xE7\xF5es expressas. A media\xE7\
            \xE3o do acesso aos recursos do sistema (ou seja, CPU, mem\xF3ria, dispositivos,\
            \ portas de comunica\xE7\xE3o, servi\xE7os, infraestrutura, dados e informa\xE7\
            \xF5es) \xE9 frequentemente a fun\xE7\xE3o de seguran\xE7a predominante\
            \ de sistemas seguros. Ela tamb\xE9m possibilita a concretiza\xE7\xE3\
            o das prote\xE7\xF5es para a capacidade fornecida \xE0s partes interessadas\
            \ pelo sistema. A media\xE7\xE3o do acesso a recursos pode resultar em\
            \ gargalos de desempenho se o sistema n\xE3o for projetado corretamente.\
            \ Por exemplo, ao utilizar mecanismos de hardware, \xE9 poss\xEDvel alcan\xE7\
            ar o acesso mediado de forma eficiente. Uma vez obtido o acesso a um recurso\
            \ de baixo n\xEDvel, como a mem\xF3ria, os mecanismos de prote\xE7\xE3\
            o de hardware podem assegurar que n\xE3o ocorra acesso fora dos limites."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(6)
      name: Security and Privacy Engineering Principles | Minimized Sharing
      description: 'Implement the security design principle of minimized sharing in
        [Assignment: organization-defined systems or system components].'
      annotation: The principle of minimized sharing states that no computer resource
        is shared between system components (e.g., subjects, processes, functions)
        unless it is absolutely necessary to do so. Minimized sharing helps to simplify
        system design and implementation. In order to protect user-domain resources
        from arbitrary active entities, no resource is shared unless that sharing
        has been explicitly requested and granted. The need for resource sharing can
        be motivated by the design principle of least common mechanism in the case
        of internal entities or driven by stakeholder requirements. However, internal
        sharing is carefully designed to avoid performance and covert storage and
        timing channel problems. Sharing via common mechanism can increase the susceptibility
        of data and information to unauthorized access, disclosure, use, or modification
        and can adversely affect the inherent capability provided by the system. To
        minimize sharing induced by common mechanisms, such mechanisms can be designed
        to be reentrant or virtualized to preserve separation. Moreover, the use of
        global data to share information is carefully scrutinized. The lack of encapsulation
        may obfuscate relationships among the sharing entities.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Compartilhamento\
            \ Minimizado"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de compartilhamento\
            \ minimizado em [Assignment: organization-defined systems or system components]."
          annotation: "O princ\xEDpio do compartilhamento minimizado estabelece que\
            \ nenhum recurso computacional \xE9 compartilhado entre componentes do\
            \ sistema (por exemplo, sujeitos, processos, fun\xE7\xF5es), a menos que\
            \ seja absolutamente necess\xE1rio faz\xEA-lo. O compartilhamento minimizado\
            \ ajuda a simplificar o design e a implementa\xE7\xE3o do sistema. A fim\
            \ de proteger os recursos do dom\xEDnio do usu\xE1rio contra entidades\
            \ ativas arbitr\xE1rias, nenhum recurso \xE9 compartilhado, a menos que\
            \ esse compartilhamento tenha sido explicitamente solicitado e concedido.\
            \ A necessidade de compartilhamento de recursos pode ser motivada pelo\
            \ princ\xEDpio de design do menor mecanismo comum, no caso de entidades\
            \ internas, ou impulsionada pelos requisitos das partes interessadas.\
            \ No entanto, o compartilhamento interno \xE9 cuidadosamente projetado\
            \ para evitar problemas de desempenho e de canais ocultos de armazenamento\
            \ e de temporiza\xE7\xE3o. O compartilhamento por meio de mecanismo comum\
            \ pode aumentar a suscetibilidade dos dados e das informa\xE7\xF5es a\
            \ acesso, divulga\xE7\xE3o, uso ou modifica\xE7\xE3o n\xE3o autorizados\
            \ e pode afetar negativamente a capacidade inerente fornecida pelo sistema.\
            \ Para minimizar o compartilhamento induzido por mecanismos comuns, tais\
            \ mecanismos podem ser projetados para serem reentrantes ou virtualizados\
            \ a fim de preservar a separa\xE7\xE3o. Al\xE9m disso, o uso de dados\
            \ globais para compartilhar informa\xE7\xF5es \xE9 cuidadosamente examinado.\
            \ A falta de encapsulamento pode obscurecer as rela\xE7\xF5es entre as\
            \ entidades que compartilham."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(7)
      name: Security and Privacy Engineering Principles | Reduced Complexity
      description: 'Implement the security design principle of reduced complexity
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of reduced complexity states that the system design
        is as simple and small as possible. A small and simple design is more understandable,
        more analyzable, and less prone to error. The reduced complexity principle
        applies to any aspect of a system, but it has particular importance for security
        due to the various analyses performed to obtain evidence about the emergent
        security property of the system. For such analyses to be successful, a small
        and simple design is essential. Application of the principle of reduced complexity
        contributes to the ability of system developers to understand the correctness
        and completeness of system security functions. It also facilitates the identification
        of potential vulnerabilities. The corollary of reduced complexity states that
        the simplicity of the system is directly related to the number of vulnerabilities
        it will contain; that is, simpler systems contain fewer vulnerabilities. An
        benefit of reduced complexity is that it is easier to understand whether the
        intended security policy has been captured in the system design and that fewer
        vulnerabilities are likely to be introduced during engineering development.
        An additional benefit is that any such conclusion about correctness, completeness,
        and the existence of vulnerabilities can be reached with a higher degree of
        assurance in contrast to conclusions reached in situations where the system
        design is inherently more complex. Transitioning from older technologies to
        newer technologies (e.g., transitioning from IPv4 to IPv6) may require implementing
        the older and newer technologies simultaneously during the transition period.
        This may result in a temporary increase in system complexity during the transition.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Complexidade\
            \ Reduzida"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de complexidade\
            \ reduzida em [Assignment: organization-defined systems or system components]."
          annotation: "O princ\xEDpio da complexidade reduzida estabelece que o design\
            \ do sistema \xE9 o mais simples e pequeno poss\xEDvel. Um design pequeno\
            \ e simples \xE9 mais compreens\xEDvel, mais analis\xE1vel e menos propenso\
            \ a erros. O princ\xEDpio da complexidade reduzida aplica-se a qualquer\
            \ aspecto de um sistema, mas tem import\xE2ncia particular para a seguran\xE7\
            a devido \xE0s diversas an\xE1lises realizadas para obter evid\xEAncias\
            \ sobre a propriedade de seguran\xE7a emergente do sistema. Para que tais\
            \ an\xE1lises sejam bem-sucedidas, um design pequeno e simples \xE9 essencial.\
            \ A aplica\xE7\xE3o do princ\xEDpio da complexidade reduzida contribui\
            \ para a capacidade dos desenvolvedores de sistemas de compreenderem a\
            \ corretude e a completude das fun\xE7\xF5es de seguran\xE7a do sistema.\
            \ Tamb\xE9m facilita a identifica\xE7\xE3o de poss\xEDveis vulnerabilidades.\
            \ O corol\xE1rio da complexidade reduzida estabelece que a simplicidade\
            \ do sistema est\xE1 diretamente relacionada ao n\xFAmero de vulnerabilidades\
            \ que ele conter\xE1; ou seja, sistemas mais simples cont\xEAm menos vulnerabilidades.\
            \ Um benef\xEDcio da complexidade reduzida \xE9 que se torna mais f\xE1\
            cil compreender se a pol\xEDtica de seguran\xE7a pretendida foi capturada\
            \ no design do sistema e que \xE9 menos prov\xE1vel que sejam introduzidas\
            \ vulnerabilidades durante o desenvolvimento de engenharia. Um benef\xED\
            cio adicional \xE9 que qualquer conclus\xE3o desse tipo sobre corretude,\
            \ completude e a exist\xEAncia de vulnerabilidades pode ser alcan\xE7\
            ada com um grau de garantia maior, em contraste com as conclus\xF5es alcan\xE7\
            adas em situa\xE7\xF5es em que o design do sistema \xE9 inerentemente\
            \ mais complexo. A transi\xE7\xE3o de tecnologias mais antigas para tecnologias\
            \ mais novas (por exemplo, a transi\xE7\xE3o de IPv4 para IPv6) pode exigir\
            \ a implementa\xE7\xE3o simult\xE2nea das tecnologias mais antigas e mais\
            \ novas durante o per\xEDodo de transi\xE7\xE3o. Isso pode resultar em\
            \ um aumento tempor\xE1rio da complexidade do sistema durante a transi\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(8)
      name: Security and Privacy Engineering Principles | Secure Evolvability
      description: 'Implement the security design principle of secure evolvability
        in [Assignment: organization-defined systems or system components].'
      annotation: "The principle of secure evolvability states that a system is developed\
        \ to facilitate the maintenance of its security properties when there are\
        \ changes to the system\u2019s structure, interfaces, interconnections (i.e.,\
        \ system architecture), functionality, or configuration (i.e., security policy\
        \ enforcement). Changes include a new, enhanced, or upgraded system capability;\
        \ maintenance and sustainment activities; and reconfiguration. Although it\
        \ is not possible to plan for every aspect of system evolution, system upgrades\
        \ and changes can be anticipated by analyses of mission or business strategic\
        \ direction, anticipated changes in the threat environment, and anticipated\
        \ maintenance and sustainment needs. It is unrealistic to expect that complex\
        \ systems remain secure in contexts not envisioned during development, whether\
        \ such contexts are related to the operational environment or to usage. A\
        \ system may be secure in some new contexts, but there is no guarantee that\
        \ its emergent behavior will always be secure. It is easier to build trustworthiness\
        \ into a system from the outset, and it follows that the sustainment of system\
        \ trustworthiness requires planning for change as opposed to adapting in an\
        \ ad hoc or non-methodical manner. The benefits of this principle include\
        \ reduced vendor life cycle costs, reduced cost of ownership, improved system\
        \ security, more effective management of security risk, and less risk uncertainty."
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Evolutibilidade\
            \ Segura"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de evolutibilidade\
            \ segura em [Assignment: organization-defined systems or system components]."
          annotation: "O princ\xEDpio da evolutibilidade segura estabelece que um\
            \ sistema \xE9 desenvolvido para facilitar a manuten\xE7\xE3o de suas\
            \ propriedades de seguran\xE7a quando h\xE1 altera\xE7\xF5es na estrutura,\
            \ nas interfaces, nas interconex\xF5es (ou seja, na arquitetura do sistema),\
            \ na funcionalidade ou na configura\xE7\xE3o do sistema (ou seja, na aplica\xE7\
            \xE3o da pol\xEDtica de seguran\xE7a). As altera\xE7\xF5es incluem uma\
            \ capacidade nova, aprimorada ou atualizada do sistema; atividades de\
            \ manuten\xE7\xE3o e sustenta\xE7\xE3o; e reconfigura\xE7\xE3o. Embora\
            \ n\xE3o seja poss\xEDvel planejar todos os aspectos da evolu\xE7\xE3\
            o do sistema, as atualiza\xE7\xF5es e altera\xE7\xF5es do sistema podem\
            \ ser antecipadas por meio de an\xE1lises da dire\xE7\xE3o estrat\xE9\
            gica da miss\xE3o ou do neg\xF3cio, de mudan\xE7as previstas no ambiente\
            \ de amea\xE7as e das necessidades previstas de manuten\xE7\xE3o e sustenta\xE7\
            \xE3o. \xC9 irrealista esperar que sistemas complexos permane\xE7am seguros\
            \ em contextos n\xE3o previstos durante o desenvolvimento, sejam tais\
            \ contextos relacionados ao ambiente operacional ou ao uso. Um sistema\
            \ pode ser seguro em alguns novos contextos, mas n\xE3o h\xE1 garantia\
            \ de que seu comportamento emergente ser\xE1 sempre seguro. \xC9 mais\
            \ f\xE1cil incorporar a confiabilidade em um sistema desde o in\xEDcio,\
            \ e disso decorre que a sustenta\xE7\xE3o da confiabilidade do sistema\
            \ requer planejamento para a mudan\xE7a, em vez de adapta\xE7\xE3o de\
            \ maneira ad hoc ou n\xE3o met\xF3dica. Os benef\xEDcios deste princ\xED\
            pio incluem custos reduzidos no ciclo de vida para o fornecedor, custo\
            \ total de propriedade reduzido, seguran\xE7a do sistema aprimorada, gest\xE3\
            o mais eficaz do risco de seguran\xE7a e menor incerteza de risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(9)
      name: Security and Privacy Engineering Principles | Trusted Components
      description: 'Implement the security design principle of trusted components
        in [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of trusted components states that a component is
        trustworthy to at least a level commensurate with the security dependencies
        it supports (i.e., how much it is trusted to perform its security functions
        by other components). This principle enables the composition of components
        such that trustworthiness is not inadvertently diminished and the trust is
        not consequently misplaced. Ultimately, this principle demands some metric
        by which the trust in a component and the trustworthiness of a component can
        be measured on the same abstract scale. The principle of trusted components
        is particularly relevant when considering systems and components in which
        there are complex chains of trust dependencies. A trust dependency is also
        referred to as a trust relationship and there may be chains of trust relationships.

        The principle of trusted components also applies to a compound component that
        consists of subcomponents (e.g., a subsystem), which may have varying levels
        of trustworthiness. The conservative assumption is that the trustworthiness
        of a compound component is that of its least trustworthy subcomponent. It
        may be possible to provide a security engineering rationale that the trustworthiness
        of a particular compound component is greater than the conservative assumption.
        However, any such rationale reflects logical reasoning based on a clear statement
        of the trustworthiness objectives as well as relevant and credible evidence.
        The trustworthiness of a compound component is not the same as increased application
        of defense-in-depth layering within the component or a replication of components.
        Defense-in-depth techniques do not increase the trustworthiness of the whole
        above that of the least trustworthy component.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Componentes\
            \ Confi\xE1veis"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de componentes\
            \ confi\xE1veis em [Assignment: organization-defined systems or system\
            \ components]."
          annotation: "O princ\xEDpio dos componentes confi\xE1veis estabelece que\
            \ um componente \xE9 confi\xE1vel em pelo menos um n\xEDvel compat\xED\
            vel com as depend\xEAncias de seguran\xE7a que ele suporta (ou seja, o\
            \ quanto se confia que ele desempenhe suas fun\xE7\xF5es de seguran\xE7\
            a a partir de outros componentes). Este princ\xEDpio possibilita a composi\xE7\
            \xE3o de componentes de modo que a confiabilidade n\xE3o seja inadvertidamente\
            \ diminu\xEDda e a confian\xE7a n\xE3o seja, consequentemente, mal depositada.\
            \ Em \xFAltima an\xE1lise, este princ\xEDpio exige alguma m\xE9trica pela\
            \ qual a confian\xE7a em um componente e a confiabilidade de um componente\
            \ possam ser medidas na mesma escala abstrata. O princ\xEDpio dos componentes\
            \ confi\xE1veis \xE9 particularmente relevante ao considerar sistemas\
            \ e componentes nos quais existem cadeias complexas de depend\xEAncias\
            \ de confian\xE7a. Uma depend\xEAncia de confian\xE7a tamb\xE9m \xE9 referida\
            \ como uma rela\xE7\xE3o de confian\xE7a, e pode haver cadeias de rela\xE7\
            \xF5es de confian\xE7a.\nO princ\xEDpio dos componentes confi\xE1veis\
            \ tamb\xE9m se aplica a um componente composto que consiste em subcomponentes\
            \ (por exemplo, um subsistema), os quais podem ter n\xEDveis variados\
            \ de confiabilidade. A suposi\xE7\xE3o conservadora \xE9 que a confiabilidade\
            \ de um componente composto \xE9 a de seu subcomponente menos confi\xE1\
            vel. Pode ser poss\xEDvel fornecer uma justificativa de engenharia de\
            \ seguran\xE7a de que a confiabilidade de um determinado componente composto\
            \ \xE9 maior do que a suposi\xE7\xE3o conservadora. No entanto, qualquer\
            \ justificativa desse tipo reflete um racioc\xEDnio l\xF3gico baseado\
            \ em uma declara\xE7\xE3o clara dos objetivos de confiabilidade, bem como\
            \ em evid\xEAncias relevantes e cr\xEDveis. A confiabilidade de um componente\
            \ composto n\xE3o \xE9 o mesmo que uma maior aplica\xE7\xE3o de camadas\
            \ de defesa em profundidade dentro do componente ou uma replica\xE7\xE3\
            o de componentes. As t\xE9cnicas de defesa em profundidade n\xE3o aumentam\
            \ a confiabilidade do todo acima da do componente menos confi\xE1vel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(10)
      name: Security and Privacy Engineering Principles | Hierarchical Trust
      description: 'Implement the security design principle of hierarchical trust
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of hierarchical trust for components builds on the
        principle of trusted components and states that the security dependencies
        in a system will form a partial ordering if they preserve the principle of
        trusted components. The partial ordering provides the basis for trustworthiness
        reasoning or an assurance case (assurance argument) when composing a secure
        system from heterogeneously trustworthy components. To analyze a system composed
        of heterogeneously trustworthy components for its trustworthiness, it is essential
        to eliminate circular dependencies with regard to the trustworthiness. If
        a more trustworthy component located in a lower layer of the system were to
        depend on a less trustworthy component in a higher layer, this would, in effect,
        put the components in the same less trustworthy equivalence class per the
        principle of trusted components. Trust relationships, or chains of trust,
        can have various manifestations. For example, the root certificate of a certificate
        hierarchy is the most trusted node in the hierarchy, whereas the leaves in
        the hierarchy may be the least trustworthy nodes. Another example occurs in
        a layered high-assurance system where the security kernel (including the hardware
        base), which is located at the lowest layer of the system, is the most trustworthy
        component. The principle of hierarchical trust, however, does not prohibit
        the use of overly trustworthy components. There may be cases in a system of
        low trustworthiness where it is reasonable to employ a highly trustworthy
        component rather than one that is less trustworthy (e.g., due to availability
        or other cost-benefit driver). For such a case, any dependency of the highly
        trustworthy component upon a less trustworthy component does not degrade the
        trustworthiness of the resulting low-trust system.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Confian\xE7\
            a Hier\xE1rquica"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de confian\xE7\
            a hier\xE1rquica em [Assignment: organization-defined systems or system\
            \ components]."
          annotation: "O princ\xEDpio da confian\xE7a hier\xE1rquica para componentes\
            \ baseia-se no princ\xEDpio dos componentes confi\xE1veis e estabelece\
            \ que as depend\xEAncias de seguran\xE7a em um sistema formar\xE3o uma\
            \ ordena\xE7\xE3o parcial se preservarem o princ\xEDpio dos componentes\
            \ confi\xE1veis. A ordena\xE7\xE3o parcial fornece a base para o racioc\xED\
            nio sobre confiabilidade ou para um caso de garantia (argumento de garantia)\
            \ ao compor um sistema seguro a partir de componentes heterogeneamente\
            \ confi\xE1veis. Para analisar a confiabilidade de um sistema composto\
            \ de componentes heterogeneamente confi\xE1veis, \xE9 essencial eliminar\
            \ as depend\xEAncias circulares no que diz respeito \xE0 confiabilidade.\
            \ Se um componente mais confi\xE1vel localizado em uma camada inferior\
            \ do sistema dependesse de um componente menos confi\xE1vel em uma camada\
            \ superior, isso, na pr\xE1tica, colocaria os componentes na mesma classe\
            \ de equival\xEAncia menos confi\xE1vel, conforme o princ\xEDpio dos componentes\
            \ confi\xE1veis. As rela\xE7\xF5es de confian\xE7a, ou cadeias de confian\xE7\
            a, podem ter diversas manifesta\xE7\xF5es. Por exemplo, o certificado\
            \ raiz de uma hierarquia de certificados \xE9 o n\xF3 mais confi\xE1vel\
            \ da hierarquia, ao passo que as folhas da hierarquia podem ser os n\xF3\
            s menos confi\xE1veis. Outro exemplo ocorre em um sistema de alta garantia\
            \ em camadas, no qual o n\xFAcleo de seguran\xE7a (security kernel) (incluindo\
            \ a base de hardware), localizado na camada mais baixa do sistema, \xE9\
            \ o componente mais confi\xE1vel. O princ\xEDpio da confian\xE7a hier\xE1\
            rquica, no entanto, n\xE3o pro\xEDbe o uso de componentes excessivamente\
            \ confi\xE1veis. Pode haver casos em um sistema de baixa confiabilidade\
            \ em que seja razo\xE1vel empregar um componente altamente confi\xE1vel\
            \ em vez de um menos confi\xE1vel (por exemplo, devido \xE0 disponibilidade\
            \ ou a outro fator de custo-benef\xEDcio). Em tal caso, qualquer depend\xEA\
            ncia do componente altamente confi\xE1vel em rela\xE7\xE3o a um componente\
            \ menos confi\xE1vel n\xE3o degrada a confiabilidade do sistema de baixa\
            \ confian\xE7a resultante."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(11)
      name: Security and Privacy Engineering Principles | Inverse Modification Threshold
      description: 'Implement the security design principle of inverse modification
        threshold in [Assignment: organization-defined systems or system components].'
      annotation: "The principle of inverse modification threshold builds on the principle\
        \ of trusted components and the principle of hierarchical trust and states\
        \ that the degree of protection provided to a component is commensurate with\
        \ its trustworthiness. As the trust placed in a component increases, the protection\
        \ against unauthorized modification of the component also increases to the\
        \ same degree. Protection from unauthorized modification can come in the form\
        \ of the component\u2019s own self-protection and innate trustworthiness,\
        \ or it can come from the protections afforded to the component from other\
        \ elements or attributes of the security architecture (to include protections\
        \ in the environment of operation)."
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Limiar\
            \ de Modifica\xE7\xE3o Inverso"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de limiar\
            \ de modifica\xE7\xE3o inverso em [Assignment: organization-defined systems\
            \ or system components]."
          annotation: "O princ\xEDpio do limiar de modifica\xE7\xE3o inverso baseia-se\
            \ no princ\xEDpio dos componentes confi\xE1veis e no princ\xEDpio da confian\xE7\
            a hier\xE1rquica e estabelece que o grau de prote\xE7\xE3o fornecido a\
            \ um componente \xE9 compat\xEDvel com sua confiabilidade. \xC0 medida\
            \ que a confian\xE7a depositada em um componente aumenta, a prote\xE7\xE3\
            o contra a modifica\xE7\xE3o n\xE3o autorizada do componente tamb\xE9\
            m aumenta na mesma medida. A prote\xE7\xE3o contra modifica\xE7\xE3o n\xE3\
            o autorizada pode vir na forma da autoprote\xE7\xE3o e da confiabilidade\
            \ inata do pr\xF3prio componente, ou pode vir das prote\xE7\xF5es concedidas\
            \ ao componente por outros elementos ou atributos da arquitetura de seguran\xE7\
            a (incluindo prote\xE7\xF5es no ambiente de opera\xE7\xE3o)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(12)
      name: Security and Privacy Engineering Principles | Hierarchical Protection
      description: 'Implement the security design principle of hierarchical protection
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of hierarchical protection states that a component
        need not be protected from more trustworthy components. In the degenerate
        case of the most trusted component, it protects itself from all other components.
        For example, if an operating system kernel is deemed the most trustworthy
        component in a system, then it protects itself from all untrusted applications
        it supports, but the applications, conversely, do not need to protect themselves
        from the kernel. The trustworthiness of users is a consideration for applying
        the principle of hierarchical protection. A trusted system need not protect
        itself from an equally trustworthy user, reflecting use of untrusted systems
        in system high environments where users are highly trustworthy and where other
        protections are put in place to bound and protect the system high execution
        environment.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Prote\xE7\
            \xE3o Hier\xE1rquica"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de prote\xE7\
            \xE3o hier\xE1rquica em [Assignment: organization-defined systems or system\
            \ components]."
          annotation: "O princ\xEDpio da prote\xE7\xE3o hier\xE1rquica estabelece\
            \ que um componente n\xE3o precisa ser protegido de componentes mais confi\xE1\
            veis. No caso degenerado do componente mais confi\xE1vel, ele protege\
            \ a si mesmo de todos os outros componentes. Por exemplo, se um n\xFA\
            cleo (kernel) de sistema operacional for considerado o componente mais\
            \ confi\xE1vel de um sistema, ent\xE3o ele protege a si mesmo de todas\
            \ as aplica\xE7\xF5es n\xE3o confi\xE1veis que suporta, mas as aplica\xE7\
            \xF5es, por outro lado, n\xE3o precisam proteger a si mesmas do n\xFA\
            cleo. A confiabilidade dos usu\xE1rios \xE9 uma considera\xE7\xE3o para\
            \ a aplica\xE7\xE3o do princ\xEDpio da prote\xE7\xE3o hier\xE1rquica.\
            \ Um sistema confi\xE1vel n\xE3o precisa proteger a si mesmo de um usu\xE1\
            rio igualmente confi\xE1vel, refletindo o uso de sistemas n\xE3o confi\xE1\
            veis em ambientes de sistema de alto n\xEDvel (system high), onde os usu\xE1\
            rios s\xE3o altamente confi\xE1veis e onde outras prote\xE7\xF5es s\xE3\
            o estabelecidas para delimitar e proteger o ambiente de execu\xE7\xE3\
            o do sistema de alto n\xEDvel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(13)
      name: Security and Privacy Engineering Principles | Minimized Security Elements
      description: 'Implement the security design principle of minimized security
        elements in [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of minimized security elements states that the system
        does not have extraneous trusted components. The principle of minimized security
        elements has two aspects: the overall cost of security analysis and the complexity
        of security analysis. Trusted components are generally costlier to construct
        and implement, owing to the increased rigor of development processes. Trusted
        components require greater security analysis to qualify their trustworthiness.
        Thus, to reduce the cost and decrease the complexity of the security analysis,
        a system contains as few trustworthy components as possible. The analysis
        of the interaction of trusted components with other components of the system
        is one of the most important aspects of system security verification. If the
        interactions between components are unnecessarily complex, the security of
        the system will also be more difficult to ascertain than one whose internal
        trust relationships are simple and elegantly constructed. In general, fewer
        trusted components result in fewer internal trust relationships and a simpler
        system.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Elementos\
            \ de Seguran\xE7a Minimizados"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de elementos\
            \ de seguran\xE7a minimizados em [Assignment: organization-defined systems\
            \ or system components]."
          annotation: "O princ\xEDpio dos elementos de seguran\xE7a minimizados estabelece\
            \ que o sistema n\xE3o possui componentes confi\xE1veis sup\xE9rfluos.\
            \ O princ\xEDpio dos elementos de seguran\xE7a minimizados tem dois aspectos:\
            \ o custo geral da an\xE1lise de seguran\xE7a e a complexidade da an\xE1\
            lise de seguran\xE7a. Os componentes confi\xE1veis s\xE3o geralmente mais\
            \ custosos de construir e implementar, devido ao maior rigor dos processos\
            \ de desenvolvimento. Os componentes confi\xE1veis exigem maior an\xE1\
            lise de seguran\xE7a para qualificar sua confiabilidade. Assim, para reduzir\
            \ o custo e diminuir a complexidade da an\xE1lise de seguran\xE7a, um\
            \ sistema cont\xE9m o menor n\xFAmero poss\xEDvel de componentes confi\xE1\
            veis. A an\xE1lise da intera\xE7\xE3o dos componentes confi\xE1veis com\
            \ outros componentes do sistema \xE9 um dos aspectos mais importantes\
            \ da verifica\xE7\xE3o de seguran\xE7a do sistema. Se as intera\xE7\xF5\
            es entre os componentes forem desnecessariamente complexas, a seguran\xE7\
            a do sistema tamb\xE9m ser\xE1 mais dif\xEDcil de averiguar do que a de\
            \ um sistema cujas rela\xE7\xF5es internas de confian\xE7a sejam simples\
            \ e elegantemente constru\xEDdas. Em geral, menos componentes confi\xE1\
            veis resultam em menos rela\xE7\xF5es internas de confian\xE7a e em um\
            \ sistema mais simples."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(14)
      name: Security and Privacy Engineering Principles | Least Privilege
      description: 'Implement the security design principle of least privilege in
        [Assignment: organization-defined systems or system components].'
      annotation: "The principle of least privilege states that each system component\
        \ is allocated sufficient privileges to accomplish its specified functions\
        \ but no more. Applying the principle of least privilege limits the scope\
        \ of the component\u2019s actions, which has two desirable effects: the security\
        \ impact of a failure, corruption, or misuse of the component will have a\
        \ minimized security impact, and the security analysis of the component will\
        \ be simplified. Least privilege is a pervasive principle that is reflected\
        \ in all aspects of the secure system design. Interfaces used to invoke component\
        \ capability are available to only certain subsets of the user population,\
        \ and component design supports a sufficiently fine granularity of privilege\
        \ decomposition. For example, in the case of an audit mechanism, there may\
        \ be an interface for the audit manager, who configures the audit settings;\
        \ an interface for the audit operator, who ensures that audit data is safely\
        \ collected and stored; and, finally, yet another interface for the audit\
        \ reviewer, who only has need to view the audit data that has been collected\
        \ but no need to perform operations on that data.\nIn addition to its manifestations\
        \ at the system interface, least privilege can be used as a guiding principle\
        \ for the internal structure of the system itself. One aspect of internal\
        \ least privilege is to construct modules so that only the elements encapsulated\
        \ by the module are directly operated on by the functions within the module.\
        \ Elements external to a module that may be affected by the module\u2019s\
        \ operation are indirectly accessed through interaction (e.g., via a function\
        \ call) with the module that contains those elements. Another aspect of internal\
        \ least privilege is that the scope of a given module or component includes\
        \ only those system elements that are necessary for its functionality and\
        \ that the access modes for the elements (e.g., read, write) are minimal."
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Menor\
            \ Privil\xE9gio"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de menor\
            \ privil\xE9gio em [Assignment: organization-defined systems or system\
            \ components]."
          annotation: "O princ\xEDpio do menor privil\xE9gio estabelece que cada componente\
            \ do sistema recebe privil\xE9gios suficientes para cumprir suas fun\xE7\
            \xF5es especificadas, mas nada al\xE9m disso. A aplica\xE7\xE3o do princ\xED\
            pio do menor privil\xE9gio limita o escopo das a\xE7\xF5es do componente,\
            \ o que produz dois efeitos desej\xE1veis: o impacto de seguran\xE7a de\
            \ uma falha, corrup\xE7\xE3o ou uso indevido do componente ter\xE1 um\
            \ impacto de seguran\xE7a minimizado, e a an\xE1lise de seguran\xE7a do\
            \ componente ser\xE1 simplificada. O menor privil\xE9gio \xE9 um princ\xED\
            pio abrangente que se reflete em todos os aspectos do design de um sistema\
            \ seguro. As interfaces usadas para invocar a capacidade de um componente\
            \ ficam dispon\xEDveis apenas para determinados subconjuntos da popula\xE7\
            \xE3o de usu\xE1rios, e o design do componente suporta uma granularidade\
            \ suficientemente fina de decomposi\xE7\xE3o de privil\xE9gios. Por exemplo,\
            \ no caso de um mecanismo de auditoria, pode haver uma interface para\
            \ o gerente de auditoria, que configura as defini\xE7\xF5es de auditoria;\
            \ uma interface para o operador de auditoria, que assegura que os dados\
            \ de auditoria sejam coletados e armazenados com seguran\xE7a; e, por\
            \ fim, ainda outra interface para o revisor de auditoria, que tem apenas\
            \ a necessidade de visualizar os dados de auditoria coletados, mas n\xE3\
            o a necessidade de realizar opera\xE7\xF5es sobre esses dados.\nAl\xE9\
            m de suas manifesta\xE7\xF5es na interface do sistema, o menor privil\xE9\
            gio pode ser usado como um princ\xEDpio orientador para a estrutura interna\
            \ do pr\xF3prio sistema. Um aspecto do menor privil\xE9gio interno \xE9\
            \ construir m\xF3dulos de modo que apenas os elementos encapsulados pelo\
            \ m\xF3dulo sejam diretamente operados pelas fun\xE7\xF5es dentro do m\xF3\
            dulo. Os elementos externos a um m\xF3dulo que possam ser afetados pela\
            \ opera\xE7\xE3o do m\xF3dulo s\xE3o acessados indiretamente por meio\
            \ de intera\xE7\xE3o (por exemplo, via uma chamada de fun\xE7\xE3o) com\
            \ o m\xF3dulo que cont\xE9m esses elementos. Outro aspecto do menor privil\xE9\
            gio interno \xE9 que o escopo de um determinado m\xF3dulo ou componente\
            \ inclui apenas os elementos do sistema que s\xE3o necess\xE1rios para\
            \ sua funcionalidade e que os modos de acesso para os elementos (por exemplo,\
            \ leitura, escrita) sejam m\xEDnimos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(15)
      name: Security and Privacy Engineering Principles | Predicate Permission
      description: 'Implement the security design principle of predicate permission
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of predicate permission states that system designers
        consider requiring multiple authorized entities to provide consent before
        a highly critical operation or access to highly sensitive data, information,
        or resources is allowed to proceed. SALTZER75 originally named predicate permission
        the separation of privilege. It is also equivalent to separation of duty.
        The division of privilege among multiple parties decreases the likelihood
        of abuse and provides the safeguard that no single accident, deception, or
        breach of trust is sufficient to enable an unrecoverable action that can lead
        to significantly damaging effects. The design options for such a mechanism
        may require simultaneous action (e.g., the firing of a nuclear weapon requires
        two different authorized individuals to give the correct command within a
        small time window) or a sequence of operations where each successive action
        is enabled by some prior action, but no single individual is able to enable
        more than one action.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Permiss\xE3\
            o por Predicado"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de permiss\xE3\
            o por predicado em [Assignment: organization-defined systems or system\
            \ components]."
          annotation: "O princ\xEDpio da permiss\xE3o por predicado estabelece que\
            \ os projetistas de sistemas considerem exigir que m\xFAltiplas entidades\
            \ autorizadas forne\xE7am consentimento antes que uma opera\xE7\xE3o altamente\
            \ cr\xEDtica ou o acesso a dados, informa\xE7\xF5es ou recursos altamente\
            \ sens\xEDveis seja permitido prosseguir. SALTZER75 originalmente denominou\
            \ a permiss\xE3o por predicado como a separa\xE7\xE3o de privil\xE9gio.\
            \ Ela tamb\xE9m \xE9 equivalente \xE0 segrega\xE7\xE3o de fun\xE7\xF5\
            es (separation of duty). A divis\xE3o do privil\xE9gio entre m\xFAltiplas\
            \ partes diminui a probabilidade de abuso e fornece a salvaguarda de que\
            \ nenhum acidente, engano ou quebra de confian\xE7a isolado seja suficiente\
            \ para possibilitar uma a\xE7\xE3o irrecuper\xE1vel que possa levar a\
            \ efeitos significativamente danosos. As op\xE7\xF5es de design para tal\
            \ mecanismo podem exigir a\xE7\xE3o simult\xE2nea (por exemplo, o disparo\
            \ de uma arma nuclear exige que dois indiv\xEDduos autorizados diferentes\
            \ deem o comando correto dentro de uma pequena janela de tempo) ou uma\
            \ sequ\xEAncia de opera\xE7\xF5es em que cada a\xE7\xE3o sucessiva \xE9\
            \ habilitada por alguma a\xE7\xE3o anterior, mas nenhum indiv\xEDduo isolado\
            \ \xE9 capaz de habilitar mais de uma a\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(16)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(16)
      name: Security and Privacy Engineering Principles | Self-reliant Trustworthiness
      description: 'Implement the security design principle of self-reliant trustworthiness
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of self-reliant trustworthiness states that systems
        minimize their reliance on other systems for their own trustworthiness. A
        system is trustworthy by default, and any connection to an external entity
        is used to supplement its function. If a system were required to maintain
        a connection with another external entity in order to maintain its trustworthiness,
        then that system would be vulnerable to malicious and non-malicious threats
        that could result in the loss or degradation of that connection. The benefit
        of the principle of self-reliant trustworthiness is that the isolation of
        a system will make it less vulnerable to attack. A corollary to this principle
        relates to the ability of the system (or system component) to operate in isolation
        and then resynchronize with other components when it is rejoined with them.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Confiabilidade\
            \ Autossuficiente"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de confiabilidade\
            \ autossuficiente em [Assignment: organization-defined systems or system\
            \ components]."
          annotation: "O princ\xEDpio da confiabilidade autossuficiente estabelece\
            \ que os sistemas minimizam sua depend\xEAncia de outros sistemas para\
            \ sua pr\xF3pria confiabilidade. Um sistema \xE9 confi\xE1vel por padr\xE3\
            o, e qualquer conex\xE3o com uma entidade externa \xE9 usada para complementar\
            \ sua fun\xE7\xE3o. Se fosse exigido que um sistema mantivesse uma conex\xE3\
            o com outra entidade externa a fim de manter sua confiabilidade, ent\xE3\
            o esse sistema ficaria vulner\xE1vel a amea\xE7as maliciosas e n\xE3o\
            \ maliciosas que poderiam resultar na perda ou na degrada\xE7\xE3o dessa\
            \ conex\xE3o. O benef\xEDcio do princ\xEDpio da confiabilidade autossuficiente\
            \ \xE9 que o isolamento de um sistema o tornar\xE1 menos vulner\xE1vel\
            \ a ataques. Um corol\xE1rio a este princ\xEDpio refere-se \xE0 capacidade\
            \ do sistema (ou componente do sistema) de operar isoladamente e, em seguida,\
            \ ressincronizar-se com outros componentes quando for reintegrado a eles."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(17)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(17)
      name: Security and Privacy Engineering Principles | Secure Distributed Composition
      description: 'Implement the security design principle of secure distributed
        composition in [Assignment: organization-defined systems or system components].'
      annotation: The principle of secure distributed composition states that the
        composition of distributed components that enforce the same system security
        policy result in a system that enforces that policy at least as well as the
        individual components do. Many of the design principles for secure systems
        deal with how components can or should interact. The need to create or enable
        a capability from the composition of distributed components can magnify the
        relevancy of these principles. In particular, the translation of security
        policy from a stand-alone to a distributed system or a system-of-systems can
        have unexpected or emergent results. Communication protocols and distributed
        data consistency mechanisms help to ensure consistent policy enforcement across
        a distributed system. To ensure a system-wide level of assurance of correct
        policy enforcement, the security architecture of a distributed composite system
        is thoroughly analyzed.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Composi\xE7\
            \xE3o Distribu\xEDda Segura"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de composi\xE7\
            \xE3o distribu\xEDda segura em [Assignment: organization-defined systems\
            \ or system components]."
          annotation: "O princ\xEDpio da composi\xE7\xE3o distribu\xEDda segura estabelece\
            \ que a composi\xE7\xE3o de componentes distribu\xEDdos que aplicam a\
            \ mesma pol\xEDtica de seguran\xE7a do sistema resulta em um sistema que\
            \ aplica essa pol\xEDtica pelo menos t\xE3o bem quanto os componentes\
            \ individuais. Muitos dos princ\xEDpios de design para sistemas seguros\
            \ tratam de como os componentes podem ou devem interagir. A necessidade\
            \ de criar ou habilitar uma capacidade a partir da composi\xE7\xE3o de\
            \ componentes distribu\xEDdos pode ampliar a relev\xE2ncia desses princ\xED\
            pios. Em particular, a tradu\xE7\xE3o da pol\xEDtica de seguran\xE7a de\
            \ um sistema aut\xF4nomo para um sistema distribu\xEDdo ou um sistema\
            \ de sistemas pode ter resultados inesperados ou emergentes. Os protocolos\
            \ de comunica\xE7\xE3o e os mecanismos de consist\xEAncia de dados distribu\xED\
            dos ajudam a assegurar a aplica\xE7\xE3o consistente da pol\xEDtica em\
            \ todo o sistema distribu\xEDdo. Para assegurar um n\xEDvel de garantia,\
            \ em todo o sistema, da aplica\xE7\xE3o correta da pol\xEDtica, a arquitetura\
            \ de seguran\xE7a de um sistema composto distribu\xEDdo \xE9 analisada\
            \ minuciosamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(18)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(18)
      name: Security and Privacy Engineering Principles | Trusted Communications Channels
      description: 'Implement the security design principle of trusted communications
        channels in [Assignment: organization-defined systems or system components].'
      annotation: The principle of trusted communication channels states that when
        composing a system where there is a potential threat to communications between
        components (i.e., the interconnections between components), each communication
        channel is trustworthy to a level commensurate with the security dependencies
        it supports (i.e., how much it is trusted by other components to perform its
        security functions). Trusted communication channels are achieved by a combination
        of restricting access to the communication channel (to ensure an acceptable
        match in the trustworthiness of the endpoints involved in the communication)
        and employing end-to-end protections for the data transmitted over the communication
        channel (to protect against interception and modification and to further increase
        the assurance of proper end-to-end communication).
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Canais\
            \ de Comunica\xE7\xE3o Confi\xE1veis"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de canais\
            \ de comunica\xE7\xE3o confi\xE1veis em [Assignment: organization-defined\
            \ systems or system components]."
          annotation: "O princ\xEDpio dos canais de comunica\xE7\xE3o confi\xE1veis\
            \ estabelece que, ao compor um sistema no qual h\xE1 uma amea\xE7a potencial\
            \ \xE0s comunica\xE7\xF5es entre componentes (ou seja, \xE0s interconex\xF5\
            es entre os componentes), cada canal de comunica\xE7\xE3o \xE9 confi\xE1\
            vel em um n\xEDvel compat\xEDvel com as depend\xEAncias de seguran\xE7\
            a que ele suporta (ou seja, o quanto se confia nele por parte de outros\
            \ componentes para desempenhar suas fun\xE7\xF5es de seguran\xE7a). Os\
            \ canais de comunica\xE7\xE3o confi\xE1veis s\xE3o alcan\xE7ados por meio\
            \ de uma combina\xE7\xE3o de restri\xE7\xE3o do acesso ao canal de comunica\xE7\
            \xE3o (para assegurar uma correspond\xEAncia aceit\xE1vel na confiabilidade\
            \ dos pontos de extremidade envolvidos na comunica\xE7\xE3o) e do emprego\
            \ de prote\xE7\xF5es de ponta a ponta para os dados transmitidos pelo\
            \ canal de comunica\xE7\xE3o (para proteger contra intercepta\xE7\xE3\
            o e modifica\xE7\xE3o e para aumentar ainda mais a garantia de uma comunica\xE7\
            \xE3o de ponta a ponta adequada)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(19)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(19)
      name: Security and Privacy Engineering Principles | Continuous Protection
      description: 'Implement the security design principle of continuous protection
        in [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of continuous protection states that components and
        data used to enforce the security policy have uninterrupted protection that
        is consistent with the security policy and the security architecture assumptions.
        No assurances that the system can provide the confidentiality, integrity,
        availability, and privacy protections for its design capability can be made
        if there are gaps in the protection. Any assurances about the ability to secure
        a delivered capability require that data and information are continuously
        protected. That is, there are no periods during which data and information
        are left unprotected while under control of the system (i.e., during the creation,
        storage, processing, or communication of the data and information, as well
        as during system initialization, execution, failure, interruption, and shutdown).
        Continuous protection requires adherence to the precepts of the reference
        monitor concept (i.e., every request is validated by the reference monitor;
        the reference monitor is able to protect itself from tampering; and sufficient
        assurance of the correctness and completeness of the mechanism can be ascertained
        from analysis and testing) and the principle of secure failure and recovery
        (i.e., preservation of a secure state during error, fault, failure, and successful
        attack; preservation of a secure state during recovery to normal, degraded,
        or alternative operational modes).

        Continuous protection also applies to systems designed to operate in varying
        configurations, including those that deliver full operational capability and
        degraded-mode configurations that deliver partial operational capability.
        The continuous protection principle requires that changes to the system security
        policies be traceable to the operational need that drives the configuration
        and be verifiable (i.e., it is possible to verify that the proposed changes
        will not put the system into an insecure state). Insufficient traceability
        and verification may lead to inconsistent states or protection discontinuities
        due to the complex or undecidable nature of the problem. The use of pre-verified
        configuration definitions that reflect the new security policy enables analysis
        to determine that a transition from old to new policies is essentially atomic
        and that any residual effects from the old policy are guaranteed to not conflict
        with the new policy. The ability to demonstrate continuous protection is rooted
        in the clear articulation of life cycle protection needs as stakeholder security
        requirements.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Prote\xE7\
            \xE3o Cont\xEDnua"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de prote\xE7\
            \xE3o cont\xEDnua em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da prote\xE7\xE3o cont\xEDnua afirma que os\
            \ componentes e os dados usados para fazer cumprir a pol\xEDtica de seguran\xE7\
            a possuem prote\xE7\xE3o ininterrupta que \xE9 consistente com a pol\xED\
            tica de seguran\xE7a e com as premissas da arquitetura de seguran\xE7\
            a. Nenhuma garantia de que o sistema possa fornecer as prote\xE7\xF5es\
            \ de confidencialidade, integridade, disponibilidade e privacidade correspondentes\
            \ \xE0 sua capacidade de design pode ser dada se houver lacunas na prote\xE7\
            \xE3o. Qualquer garantia sobre a capacidade de proteger uma capacidade\
            \ entregue exige que os dados e as informa\xE7\xF5es sejam continuamente\
            \ protegidos. Ou seja, n\xE3o h\xE1 per\xEDodos durante os quais os dados\
            \ e as informa\xE7\xF5es fiquem desprotegidos enquanto estiverem sob o\
            \ controle do sistema (isto \xE9, durante a cria\xE7\xE3o, o armazenamento,\
            \ o processamento ou a comunica\xE7\xE3o dos dados e das informa\xE7\xF5\
            es, bem como durante a inicializa\xE7\xE3o, a execu\xE7\xE3o, a falha,\
            \ a interrup\xE7\xE3o e o desligamento do sistema). A prote\xE7\xE3o cont\xED\
            nua exige a ades\xE3o aos preceitos do conceito de monitor de refer\xEA\
            ncia (isto \xE9, toda solicita\xE7\xE3o \xE9 validada pelo monitor de\
            \ refer\xEAncia; o monitor de refer\xEAncia \xE9 capaz de proteger-se\
            \ contra adultera\xE7\xE3o; e a garantia suficiente da corre\xE7\xE3o\
            \ e da completude do mecanismo pode ser determinada a partir de an\xE1\
            lise e teste) e ao princ\xEDpio da falha e recupera\xE7\xE3o seguras (isto\
            \ \xE9, a preserva\xE7\xE3o de um estado seguro durante erro, defeito,\
            \ falha e ataque bem-sucedido; a preserva\xE7\xE3o de um estado seguro\
            \ durante a recupera\xE7\xE3o para modos operacionais normais, degradados\
            \ ou alternativos).\nA prote\xE7\xE3o cont\xEDnua tamb\xE9m se aplica\
            \ a sistemas projetados para operar em configura\xE7\xF5es variadas, incluindo\
            \ aqueles que entregam capacidade operacional plena e configura\xE7\xF5\
            es em modo degradado que entregam capacidade operacional parcial. O princ\xED\
            pio da prote\xE7\xE3o cont\xEDnua exige que as mudan\xE7as nas pol\xED\
            ticas de seguran\xE7a do sistema sejam rastre\xE1veis at\xE9 a necessidade\
            \ operacional que motiva a configura\xE7\xE3o e sejam verific\xE1veis\
            \ (isto \xE9, \xE9 poss\xEDvel verificar que as mudan\xE7as propostas\
            \ n\xE3o colocar\xE3o o sistema em um estado inseguro). Rastreabilidade\
            \ e verifica\xE7\xE3o insuficientes podem levar a estados inconsistentes\
            \ ou a descontinuidades de prote\xE7\xE3o devido \xE0 natureza complexa\
            \ ou indecid\xEDvel do problema. O uso de defini\xE7\xF5es de configura\xE7\
            \xE3o pr\xE9-verificadas que refletem a nova pol\xEDtica de seguran\xE7\
            a permite a an\xE1lise para determinar que uma transi\xE7\xE3o das pol\xED\
            ticas antigas para as novas \xE9 essencialmente at\xF4mica e que quaisquer\
            \ efeitos residuais da pol\xEDtica antiga t\xEAm a garantia de n\xE3o\
            \ conflitar com a nova pol\xEDtica. A capacidade de demonstrar prote\xE7\
            \xE3o cont\xEDnua est\xE1 enraizada na articula\xE7\xE3o clara das necessidades\
            \ de prote\xE7\xE3o ao longo do ciclo de vida como requisitos de seguran\xE7\
            a das partes interessadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(20)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(20)
      name: Security and Privacy Engineering Principles | Secure Metadata Management
      description: 'Implement the security design principle of secure metadata management
        in [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of secure metadata management states that metadata
        are first class objects with respect to security policy when the policy requires
        either complete protection of information or that the security subsystem be
        self-protecting. The principle of secure metadata management is driven by
        the recognition that a system, subsystem, or component cannot achieve self-protection
        unless it protects the data it relies on for correct execution. Data is generally
        not interpreted by the system that stores it. It may have semantic value (i.e.,
        it comprises information) to users and programs that process the data. In
        contrast, metadata is information about data, such as a file name or the date
        when the file was created. Metadata is bound to the target data that it describes
        in a way that the system can interpret, but it need not be stored inside of
        or proximate to its target data. There may be metadata whose target is itself
        metadata (e.g., the classification level or impact level of a file name),
        including self-referential metadata.

        The apparent secondary nature of metadata can lead to neglect of its legitimate
        need for protection, resulting in a violation of the security policy that
        includes the exfiltration of information. A particular concern associated
        with insufficient protections for metadata is associated with multilevel secure
        (MLS) systems. MLS systems mediate access by a subject to an object based
        on relative sensitivity levels. It follows that all subjects and objects in
        the scope of control of the MLS system are either directly labeled or indirectly
        attributed with sensitivity levels. The corollary of labeled metadata for
        MLS systems states that objects containing metadata are labeled. As with protection
        needs assessments for data, attention is given to ensure that the confidentiality
        and integrity protections are individually assessed, specified, and allocated
        to metadata, as would be done for mission, business, and system data.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Gest\xE3\
            o Segura de Metadados"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de gest\xE3\
            o segura de metadados em [Atribui\xE7\xE3o: sistemas ou componentes de\
            \ sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da gest\xE3o segura de metadados afirma que\
            \ os metadados s\xE3o objetos de primeira classe no que diz respeito \xE0\
            \ pol\xEDtica de seguran\xE7a quando a pol\xEDtica exige a prote\xE7\xE3\
            o completa das informa\xE7\xF5es ou que o subsistema de seguran\xE7a seja\
            \ autoprotetor. O princ\xEDpio da gest\xE3o segura de metadados \xE9 impulsionado\
            \ pelo reconhecimento de que um sistema, subsistema ou componente n\xE3\
            o pode alcan\xE7ar a autoprote\xE7\xE3o a menos que proteja os dados dos\
            \ quais depende para a execu\xE7\xE3o correta. Os dados geralmente n\xE3\
            o s\xE3o interpretados pelo sistema que os armazena. Eles podem ter valor\
            \ sem\xE2ntico (isto \xE9, constituem informa\xE7\xE3o) para usu\xE1rios\
            \ e programas que processam os dados. Em contraste, os metadados s\xE3\
            o informa\xE7\xF5es sobre os dados, como o nome de um arquivo ou a data\
            \ em que o arquivo foi criado. Os metadados est\xE3o vinculados aos dados-alvo\
            \ que descrevem de uma forma que o sistema pode interpretar, mas n\xE3\
            o precisam ser armazenados dentro dos dados-alvo nem pr\xF3ximos a eles.\
            \ Pode haver metadados cujo alvo seja, ele pr\xF3prio, um metadado (por\
            \ exemplo, o n\xEDvel de classifica\xE7\xE3o ou o n\xEDvel de impacto\
            \ do nome de um arquivo), incluindo metadados autorreferenciais.\nA aparente\
            \ natureza secund\xE1ria dos metadados pode levar \xE0 neglig\xEAncia\
            \ de sua leg\xEDtima necessidade de prote\xE7\xE3o, resultando em uma\
            \ viola\xE7\xE3o da pol\xEDtica de seguran\xE7a que inclui a exfiltra\xE7\
            \xE3o de informa\xE7\xF5es. Uma preocupa\xE7\xE3o particular associada\
            \ \xE0 prote\xE7\xE3o insuficiente dos metadados est\xE1 relacionada aos\
            \ sistemas seguros multin\xEDvel (MLS). Os sistemas MLS mediam o acesso\
            \ de um sujeito a um objeto com base em n\xEDveis de sensibilidade relativos.\
            \ Disso decorre que todos os sujeitos e objetos no escopo de controle\
            \ do sistema MLS s\xE3o diretamente rotulados ou indiretamente atribu\xED\
            dos com n\xEDveis de sensibilidade. O corol\xE1rio dos metadados rotulados\
            \ para sistemas MLS afirma que os objetos que cont\xEAm metadados s\xE3\
            o rotulados. Assim como nas avalia\xE7\xF5es de necessidades de prote\xE7\
            \xE3o para dados, d\xE1-se aten\xE7\xE3o para garantir que as prote\xE7\
            \xF5es de confidencialidade e integridade sejam individualmente avaliadas,\
            \ especificadas e alocadas aos metadados, como seria feito para dados\
            \ de miss\xE3o, de neg\xF3cio e de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(21)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(21)
      name: Security and Privacy Engineering Principles | Self-analysis
      description: 'Implement the security design principle of self-analysis in [Assignment:
        organization-defined systems or system components].'
      annotation: The principle of self-analysis states that a system component is
        able to assess its internal state and functionality to a limited extent at
        various stages of execution, and that this self-analysis capability is commensurate
        with the level of trustworthiness invested in the system. At the system level,
        self-analysis can be achieved through hierarchical assessments of trustworthiness
        established in a bottom-up fashion. In this approach, the lower-level components
        check for data integrity and correct functionality (to a limited extent) of
        higher-level components. For example, trusted boot sequences involve a trusted
        lower-level component that attests to the trustworthiness of the next higher-level
        components so that a transitive chain of trust can be established. At the
        root, a component attests to itself, which usually involves an axiomatic or
        environmentally enforced assumption about its integrity. Results of the self-analyses
        can be used to guard against externally induced errors, internal malfunction,
        or transient errors. By following this principle, some simple malfunctions
        or errors can be detected without allowing the effects of the error or malfunction
        to propagate outside of the component. Further, the self-test can be used
        to attest to the configuration of the component, detecting any potential conflicts
        in configuration with respect to the expected configuration.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Autoan\xE1\
            lise"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de autoan\xE1\
            lise em [Atribui\xE7\xE3o: sistemas ou componentes de sistema definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da autoan\xE1lise afirma que um componente de\
            \ sistema \xE9 capaz de avaliar seu estado interno e sua funcionalidade,\
            \ em uma extens\xE3o limitada, em v\xE1rios est\xE1gios da execu\xE7\xE3\
            o, e que essa capacidade de autoan\xE1lise \xE9 proporcional ao n\xED\
            vel de confiabilidade investido no sistema. No n\xEDvel do sistema, a\
            \ autoan\xE1lise pode ser alcan\xE7ada por meio de avalia\xE7\xF5es hier\xE1\
            rquicas de confiabilidade estabelecidas de baixo para cima. Nessa abordagem,\
            \ os componentes de n\xEDvel inferior verificam a integridade dos dados\
            \ e a funcionalidade correta (em uma extens\xE3o limitada) dos componentes\
            \ de n\xEDvel superior. Por exemplo, sequ\xEAncias de boot confi\xE1vel\
            \ envolvem um componente confi\xE1vel de n\xEDvel inferior que atesta\
            \ a confiabilidade dos componentes de n\xEDvel imediatamente superior,\
            \ de modo que uma cadeia de confian\xE7a transitiva possa ser estabelecida.\
            \ Na raiz, um componente atesta a si pr\xF3prio, o que geralmente envolve\
            \ uma premissa axiom\xE1tica ou imposta pelo ambiente sobre sua integridade.\
            \ Os resultados das autoan\xE1lises podem ser usados para proteger contra\
            \ erros induzidos externamente, mau funcionamento interno ou erros transit\xF3\
            rios. Ao seguir esse princ\xEDpio, alguns maus funcionamentos ou erros\
            \ simples podem ser detectados sem permitir que os efeitos do erro ou\
            \ mau funcionamento se propaguem para fora do componente. Al\xE9m disso,\
            \ o autoteste pode ser usado para atestar a configura\xE7\xE3o do componente,\
            \ detectando quaisquer conflitos potenciais na configura\xE7\xE3o em rela\xE7\
            \xE3o \xE0 configura\xE7\xE3o esperada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(22)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(22)
      name: Security and Privacy Engineering Principles | Accountability and Traceability
      description: 'Implement the security design principle of accountability and
        traceability in [Assignment: organization-defined systems or system components].'
      annotation: The principle of accountability and traceability states that it
        is possible to trace security-relevant actions (i.e., subject-object interactions)
        to the entity on whose behalf the action is being taken. The principle of
        accountability and traceability requires a trustworthy infrastructure that
        can record details about actions that affect system security (e.g., an audit
        subsystem). To record the details about actions, the system is able to uniquely
        identify the entity on whose behalf the action is being carried out and also
        record the relevant sequence of actions that are carried out. The accountability
        policy also requires that audit trail itself be protected from unauthorized
        access and modification. The principle of least privilege assists in tracing
        the actions to particular entities, as it increases the granularity of accountability.
        Associating specific actions with system entities, and ultimately with users,
        and making the audit trail secure against unauthorized access and modifications
        provide non-repudiation because once an action is recorded, it is not possible
        to change the audit trail. Another important function that accountability
        and traceability serves is in the routine and forensic analysis of events
        associated with the violation of security policy. Analysis of audit logs may
        provide additional information that may be helpful in determining the path
        or component that allowed the violation of the security policy and the actions
        of individuals associated with the violation of the security policy.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Responsabiliza\xE7\
            \xE3o e Rastreabilidade"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de responsabiliza\xE7\
            \xE3o e rastreabilidade em [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da responsabiliza\xE7\xE3o e rastreabilidade\
            \ afirma que \xE9 poss\xEDvel rastrear a\xE7\xF5es relevantes para a seguran\xE7\
            a (isto \xE9, intera\xE7\xF5es sujeito-objeto) at\xE9 a entidade em nome\
            \ da qual a a\xE7\xE3o est\xE1 sendo tomada. O princ\xEDpio da responsabiliza\xE7\
            \xE3o e rastreabilidade exige uma infraestrutura confi\xE1vel capaz de\
            \ registrar detalhes sobre a\xE7\xF5es que afetam a seguran\xE7a do sistema\
            \ (por exemplo, um subsistema de auditoria). Para registrar os detalhes\
            \ sobre as a\xE7\xF5es, o sistema \xE9 capaz de identificar de forma \xFA\
            nica a entidade em nome da qual a a\xE7\xE3o est\xE1 sendo realizada e\
            \ tamb\xE9m de registrar a sequ\xEAncia relevante de a\xE7\xF5es que s\xE3\
            o executadas. A pol\xEDtica de responsabiliza\xE7\xE3o tamb\xE9m exige\
            \ que a pr\xF3pria trilha de auditoria seja protegida contra acesso e\
            \ modifica\xE7\xE3o n\xE3o autorizados. O princ\xEDpio do menor privil\xE9\
            gio auxilia no rastreamento das a\xE7\xF5es at\xE9 entidades espec\xED\
            ficas, pois aumenta a granularidade da responsabiliza\xE7\xE3o. Associar\
            \ a\xE7\xF5es espec\xEDficas a entidades do sistema, e, em \xFAltima inst\xE2\
            ncia, a usu\xE1rios, e tornar a trilha de auditoria segura contra acesso\
            \ e modifica\xE7\xF5es n\xE3o autorizados proporciona o n\xE3o rep\xFA\
            dio, pois, uma vez registrada uma a\xE7\xE3o, n\xE3o \xE9 poss\xEDvel\
            \ alterar a trilha de auditoria. Outra fun\xE7\xE3o importante que a responsabiliza\xE7\
            \xE3o e a rastreabilidade desempenham \xE9 na an\xE1lise rotineira e forense\
            \ de eventos associados \xE0 viola\xE7\xE3o da pol\xEDtica de seguran\xE7\
            a. A an\xE1lise dos logs de auditoria pode fornecer informa\xE7\xF5es\
            \ adicionais que podem ser \xFAteis para determinar o caminho ou o componente\
            \ que permitiu a viola\xE7\xE3o da pol\xEDtica de seguran\xE7a e as a\xE7\
            \xF5es dos indiv\xEDduos associados \xE0 viola\xE7\xE3o da pol\xEDtica\
            \ de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(23)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(23)
      name: Security and Privacy Engineering Principles | Secure Defaults
      description: 'Implement the security design principle of secure defaults in
        [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of secure defaults states that the default configuration
        of a system (including its constituent subsystems, components, and mechanisms)
        reflects a restrictive and conservative enforcement of security policy. The
        principle of secure defaults applies to the initial (i.e., default) configuration
        of a system as well as to the security engineering and design of access control
        and other security functions that follow a deny unless explicitly authorized
        strategy. The initial configuration aspect of this principle requires that
        any as shipped configuration of a system, subsystem, or system component does
        not aid in the violation of the security policy and can prevent the system
        from operating in the default configuration for those cases where the security
        policy itself requires configuration by the operational user.

        Restrictive defaults mean that the system will operate as-shipped with adequate
        self-protection and be able to prevent security breaches before the intended
        security policy and system configuration is established. In cases where the
        protection provided by the as-shipped product is inadequate, stakeholders
        assess the risk of using it prior to establishing a secure initial state.
        Adherence to the principle of secure defaults guarantees that a system is
        established in a secure state upon successfully completing initialization.
        In situations where the system fails to complete initialization, either it
        will perform a requested operation using secure defaults or it will not perform
        the operation. Refer to the principles of continuous protection and secure
        failure and recovery that parallel this principle to provide the ability to
        detect and recover from failure.

        The security engineering approach to this principle states that security mechanisms
        deny requests unless the request is found to be well-formed and consistent
        with the security policy. The insecure alternative is to allow a request unless
        it is shown to be inconsistent with the policy. In a large system, the conditions
        that are satisfied to grant a request that is denied by default are often
        far more compact and complete than those that would need to be checked in
        order to deny a request that is granted by default.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Padr\xF5\
            es Seguros"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de padr\xF5\
            es seguros em [Atribui\xE7\xE3o: sistemas ou componentes de sistema definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio dos padr\xF5es seguros afirma que a configura\xE7\
            \xE3o padr\xE3o de um sistema (incluindo seus subsistemas, componentes\
            \ e mecanismos constituintes) reflete uma imposi\xE7\xE3o restritiva e\
            \ conservadora da pol\xEDtica de seguran\xE7a. O princ\xEDpio dos padr\xF5\
            es seguros aplica-se \xE0 configura\xE7\xE3o inicial (isto \xE9, padr\xE3\
            o) de um sistema, bem como \xE0 engenharia e ao design de seguran\xE7\
            a do controle de acesso e de outras fun\xE7\xF5es de seguran\xE7a que\
            \ seguem uma estrat\xE9gia de negar a menos que explicitamente autorizado.\
            \ O aspecto de configura\xE7\xE3o inicial deste princ\xEDpio exige que\
            \ qualquer configura\xE7\xE3o de f\xE1brica de um sistema, subsistema\
            \ ou componente de sistema n\xE3o auxilie na viola\xE7\xE3o da pol\xED\
            tica de seguran\xE7a e possa impedir que o sistema opere na configura\xE7\
            \xE3o padr\xE3o nos casos em que a pr\xF3pria pol\xEDtica de seguran\xE7\
            a exija configura\xE7\xE3o pelo usu\xE1rio operacional.\nPadr\xF5es restritivos\
            \ significam que o sistema operar\xE1 como entregue de f\xE1brica com\
            \ autoprote\xE7\xE3o adequada e ser\xE1 capaz de impedir viola\xE7\xF5\
            es de seguran\xE7a antes que a pol\xEDtica de seguran\xE7a pretendida\
            \ e a configura\xE7\xE3o do sistema sejam estabelecidas. Nos casos em\
            \ que a prote\xE7\xE3o fornecida pelo produto entregue de f\xE1brica \xE9\
            \ inadequada, as partes interessadas avaliam o risco de us\xE1-lo antes\
            \ de estabelecer um estado inicial seguro. A ades\xE3o ao princ\xEDpio\
            \ dos padr\xF5es seguros garante que um sistema seja estabelecido em um\
            \ estado seguro ao concluir com sucesso a inicializa\xE7\xE3o. Em situa\xE7\
            \xF5es em que o sistema falha em concluir a inicializa\xE7\xE3o, ou ele\
            \ executar\xE1 uma opera\xE7\xE3o solicitada usando padr\xF5es seguros,\
            \ ou n\xE3o executar\xE1 a opera\xE7\xE3o. Consulte os princ\xEDpios da\
            \ prote\xE7\xE3o cont\xEDnua e da falha e recupera\xE7\xE3o seguras, que\
            \ s\xE3o paralelos a este princ\xEDpio, para fornecer a capacidade de\
            \ detectar e recuperar-se de falhas.\nA abordagem de engenharia de seguran\xE7\
            a para este princ\xEDpio afirma que os mecanismos de seguran\xE7a negam\
            \ as solicita\xE7\xF5es a menos que a solicita\xE7\xE3o seja considerada\
            \ bem formada e consistente com a pol\xEDtica de seguran\xE7a. A alternativa\
            \ insegura \xE9 permitir uma solicita\xE7\xE3o a menos que se demonstre\
            \ que ela \xE9 inconsistente com a pol\xEDtica. Em um sistema de grande\
            \ porte, as condi\xE7\xF5es que s\xE3o satisfeitas para conceder uma solicita\xE7\
            \xE3o que \xE9 negada por padr\xE3o s\xE3o frequentemente muito mais compactas\
            \ e completas do que aquelas que precisariam ser verificadas para negar\
            \ uma solicita\xE7\xE3o que \xE9 concedida por padr\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(24)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(24)
      name: Security and Privacy Engineering Principles | Secure Failure and Recovery
      description: 'Implement the security design principle of secure failure and
        recovery in [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of secure failure and recovery states that neither
        a failure in a system function or mechanism nor any recovery action in response
        to failure leads to a violation of security policy. The principle of secure
        failure and recovery parallels the principle of continuous protection to ensure
        that a system is capable of detecting (within limits) actual and impending
        failure at any stage of its operation (i.e., initialization, normal operation,
        shutdown, and maintenance) and to take appropriate steps to ensure that security
        policies are not violated. In addition, when specified, the system is capable
        of recovering from impending or actual failure to resume normal, degraded,
        or alternative secure operations while ensuring that a secure state is maintained
        such that security policies are not violated.

        Failure is a condition in which the behavior of a component deviates from
        its specified or expected behavior for an explicitly documented input. Once
        a failed security function is detected, the system may reconfigure itself
        to circumvent the failed component while maintaining security and provide
        all or part of the functionality of the original system, or it may completely
        shut itself down to prevent any further violation of security policies. For
        this to occur, the reconfiguration functions of the system are designed to
        ensure continuous enforcement of security policy during the various phases
        of reconfiguration.

        Another technique that can be used to recover from failures is to perform
        a rollback to a secure state (which may be the initial state) and then either
        shutdown or replace the service or component that failed such that secure
        operations may resume. Failure of a component may or may not be detectable
        to the components using it. The principle of secure failure indicates that
        components fail in a state that denies rather than grants access. For example,
        a nominally atomic operation interrupted before completion does not violate
        security policy and is designed to handle interruption events by employing
        higher-level atomicity and rollback mechanisms (e.g., transactions). If a
        service is being used, its atomicity properties are well-documented and characterized
        so that the component availing itself of that service can detect and handle
        interruption events appropriately. For example, a system is designed to gracefully
        respond to disconnection and support resynchronization and data consistency
        after disconnection.

        Failure protection strategies that employ replication of policy enforcement
        mechanisms, sometimes called defense in depth, can allow the system to continue
        in a secure state even when one mechanism has failed to protect the system.
        If the mechanisms are similar, however, the additional protection may be illusory,
        as the adversary can simply attack in series. Similarly, in a networked system,
        breaking the security on one system or service may enable an attacker to do
        the same on other similar replicated systems and services. By employing multiple
        protection mechanisms whose features are significantly different, the possibility
        of attack replication or repetition can be reduced. Analyses are conducted
        to weigh the costs and benefits of such redundancy techniques against increased
        resource usage and adverse effects on the overall system performance. Additional
        analyses are conducted as the complexity of these mechanisms increases, as
        could be the case for dynamic behaviors. Increased complexity generally reduces
        trustworthiness. When a resource cannot be continuously protected, it is critical
        to detect and repair any security breaches before the resource is once again
        used in a secure context.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Falha\
            \ e Recupera\xE7\xE3o Seguras"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de falha\
            \ e recupera\xE7\xE3o seguras em [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da falha e recupera\xE7\xE3o seguras afirma\
            \ que nem uma falha em uma fun\xE7\xE3o ou mecanismo do sistema nem qualquer\
            \ a\xE7\xE3o de recupera\xE7\xE3o em resposta \xE0 falha levam a uma viola\xE7\
            \xE3o da pol\xEDtica de seguran\xE7a. O princ\xEDpio da falha e recupera\xE7\
            \xE3o seguras \xE9 paralelo ao princ\xEDpio da prote\xE7\xE3o cont\xED\
            nua para garantir que um sistema seja capaz de detectar (dentro de limites)\
            \ falhas reais e iminentes em qualquer est\xE1gio de sua opera\xE7\xE3\
            o (isto \xE9, inicializa\xE7\xE3o, opera\xE7\xE3o normal, desligamento\
            \ e manuten\xE7\xE3o) e de tomar as medidas apropriadas para garantir\
            \ que as pol\xEDticas de seguran\xE7a n\xE3o sejam violadas. Al\xE9m disso,\
            \ quando especificado, o sistema \xE9 capaz de recuperar-se de falhas\
            \ iminentes ou reais para retomar opera\xE7\xF5es seguras normais, degradadas\
            \ ou alternativas, garantindo ao mesmo tempo que um estado seguro seja\
            \ mantido de modo que as pol\xEDticas de seguran\xE7a n\xE3o sejam violadas.\n\
            A falha \xE9 uma condi\xE7\xE3o em que o comportamento de um componente\
            \ desvia de seu comportamento especificado ou esperado para uma entrada\
            \ explicitamente documentada. Uma vez detectada uma fun\xE7\xE3o de seguran\xE7\
            a falha, o sistema pode reconfigurar-se para contornar o componente falho\
            \ mantendo a seguran\xE7a e fornecer toda ou parte da funcionalidade do\
            \ sistema original, ou pode desligar-se completamente para impedir qualquer\
            \ viola\xE7\xE3o adicional das pol\xEDticas de seguran\xE7a. Para que\
            \ isso ocorra, as fun\xE7\xF5es de reconfigura\xE7\xE3o do sistema s\xE3\
            o projetadas para garantir a imposi\xE7\xE3o cont\xEDnua da pol\xEDtica\
            \ de seguran\xE7a durante as v\xE1rias fases da reconfigura\xE7\xE3o.\n\
            Outra t\xE9cnica que pode ser usada para recuperar-se de falhas \xE9 realizar\
            \ um rollback para um estado seguro (que pode ser o estado inicial) e,\
            \ em seguida, desligar ou substituir o servi\xE7o ou componente que falhou,\
            \ de modo que as opera\xE7\xF5es seguras possam ser retomadas. A falha\
            \ de um componente pode ou n\xE3o ser detect\xE1vel pelos componentes\
            \ que o utilizam. O princ\xEDpio da falha segura indica que os componentes\
            \ falham em um estado que nega, em vez de conceder, acesso. Por exemplo,\
            \ uma opera\xE7\xE3o nominalmente at\xF4mica interrompida antes da conclus\xE3\
            o n\xE3o viola a pol\xEDtica de seguran\xE7a e \xE9 projetada para lidar\
            \ com eventos de interrup\xE7\xE3o empregando mecanismos de atomicidade\
            \ e rollback de n\xEDvel superior (por exemplo, transa\xE7\xF5es). Se\
            \ um servi\xE7o estiver sendo usado, suas propriedades de atomicidade\
            \ s\xE3o bem documentadas e caracterizadas, de modo que o componente que\
            \ se vale desse servi\xE7o possa detectar e tratar eventos de interrup\xE7\
            \xE3o de forma apropriada. Por exemplo, um sistema \xE9 projetado para\
            \ responder de forma controlada \xE0 desconex\xE3o e para suportar a ressincroniza\xE7\
            \xE3o e a consist\xEAncia dos dados ap\xF3s a desconex\xE3o.\nEstrat\xE9\
            gias de prote\xE7\xE3o contra falhas que empregam a replica\xE7\xE3o de\
            \ mecanismos de imposi\xE7\xE3o de pol\xEDtica, \xE0s vezes chamadas de\
            \ defesa em profundidade, podem permitir que o sistema continue em um\
            \ estado seguro mesmo quando um mecanismo falhou em proteger o sistema.\
            \ Se os mecanismos forem semelhantes, no entanto, a prote\xE7\xE3o adicional\
            \ pode ser ilus\xF3ria, pois o advers\xE1rio pode simplesmente atacar\
            \ em s\xE9rie. De forma semelhante, em um sistema em rede, quebrar a seguran\xE7\
            a em um sistema ou servi\xE7o pode permitir que um atacante fa\xE7a o\
            \ mesmo em outros sistemas e servi\xE7os replicados semelhantes. Ao empregar\
            \ m\xFAltiplos mecanismos de prote\xE7\xE3o cujas caracter\xEDsticas sejam\
            \ significativamente diferentes, a possibilidade de replica\xE7\xE3o ou\
            \ repeti\xE7\xE3o de ataque pode ser reduzida. S\xE3o conduzidas an\xE1\
            lises para ponderar os custos e benef\xEDcios de tais t\xE9cnicas de redund\xE2\
            ncia em rela\xE7\xE3o ao aumento do uso de recursos e aos efeitos adversos\
            \ sobre o desempenho geral do sistema. An\xE1lises adicionais s\xE3o conduzidas\
            \ \xE0 medida que a complexidade desses mecanismos aumenta, como pode\
            \ ser o caso de comportamentos din\xE2micos. O aumento da complexidade\
            \ geralmente reduz a confiabilidade. Quando um recurso n\xE3o pode ser\
            \ continuamente protegido, \xE9 fundamental detectar e reparar quaisquer\
            \ viola\xE7\xF5es de seguran\xE7a antes que o recurso seja novamente usado\
            \ em um contexto seguro."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(25)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(25)
      name: Security and Privacy Engineering Principles | Economic Security
      description: 'Implement the security design principle of economic security in
        [Assignment: organization-defined systems or system components].'
      annotation: The principle of economic security states that security mechanisms
        are not costlier than the potential damage that could occur from a security
        breach. This is the security-relevant form of the cost-benefit analyses used
        in risk management. The cost assumptions of cost-benefit analysis prevent
        the system designer from incorporating security mechanisms of greater strength
        than necessary, where strength of mechanism is proportional to cost. The principle
        of economic security also requires analysis of the benefits of assurance relative
        to the cost of that assurance in terms of the effort expended to obtain relevant
        and credible evidence as well as the necessary analyses to assess and draw
        trustworthiness and risk conclusions from the evidence.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Seguran\xE7\
            a Econ\xF4mica"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de seguran\xE7\
            a econ\xF4mica em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da seguran\xE7a econ\xF4mica afirma que os mecanismos\
            \ de seguran\xE7a n\xE3o s\xE3o mais custosos do que o dano potencial\
            \ que poderia ocorrer a partir de uma viola\xE7\xE3o de seguran\xE7a.\
            \ Esta \xE9 a forma relevante para a seguran\xE7a das an\xE1lises de custo-benef\xED\
            cio utilizadas na gest\xE3o de riscos. As premissas de custo da an\xE1\
            lise de custo-benef\xEDcio impedem que o projetista do sistema incorpore\
            \ mecanismos de seguran\xE7a de for\xE7a maior do que a necess\xE1ria,\
            \ em que a for\xE7a do mecanismo \xE9 proporcional ao custo. O princ\xED\
            pio da seguran\xE7a econ\xF4mica tamb\xE9m exige a an\xE1lise dos benef\xED\
            cios da garantia em rela\xE7\xE3o ao custo dessa garantia, em termos do\
            \ esfor\xE7o empregado para obter evid\xEAncias relevantes e cr\xEDveis,\
            \ bem como das an\xE1lises necess\xE1rias para avaliar e extrair conclus\xF5\
            es de confiabilidade e de risco a partir das evid\xEAncias."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(26)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(26)
      name: Security and Privacy Engineering Principles | Performance Security
      description: 'Implement the security design principle of performance security
        in [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of performance security states that security mechanisms
        are constructed so that they do not degrade system performance unnecessarily.
        Stakeholder and system design requirements for performance and security are
        precisely articulated and prioritized. For the system implementation to meet
        its design requirements and be found acceptable to stakeholders (i.e., validation
        against stakeholder requirements), the designers adhere to the specified constraints
        that capability performance needs place on protection needs. The overall impact
        of computationally intensive security services (e.g., cryptography) are assessed
        and demonstrated to pose no significant impact to higher-priority performance
        considerations or are deemed to provide an acceptable trade-off of performance
        for trustworthy protection. The trade-off considerations include less computationally
        intensive security services unless they are unavailable or insufficient. The
        insufficiency of a security service is determined by functional capability
        and strength of mechanism. The strength of mechanism is selected with respect
        to security requirements, performance-critical overhead issues (e.g., cryptographic
        key management), and an assessment of the capability of the threat.

        The principle of performance security leads to the incorporation of features
        that help in the enforcement of security policy but incur minimum overhead,
        such as low-level hardware mechanisms upon which higher-level services can
        be built. Such low-level mechanisms are usually very specific, have very limited
        functionality, and are optimized for performance. For example, once access
        rights to a portion of memory is granted, many systems use hardware mechanisms
        to ensure that all further accesses involve the correct memory address and
        access mode. Application of this principle reinforces the need to design security
        into the system from the ground up and to incorporate simple mechanisms at
        the lower layers that can be used as building blocks for higher-level mechanisms.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Seguran\xE7\
            a de Desempenho"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de seguran\xE7\
            a de desempenho em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da seguran\xE7a de desempenho afirma que os\
            \ mecanismos de seguran\xE7a s\xE3o constru\xEDdos de modo a n\xE3o degradar\
            \ desnecessariamente o desempenho do sistema. Os requisitos das partes\
            \ interessadas e de design do sistema para desempenho e seguran\xE7a s\xE3\
            o articulados e priorizados com precis\xE3o. Para que a implementa\xE7\
            \xE3o do sistema atenda aos seus requisitos de design e seja considerada\
            \ aceit\xE1vel pelas partes interessadas (isto \xE9, valida\xE7\xE3o em\
            \ rela\xE7\xE3o aos requisitos das partes interessadas), os projetistas\
            \ aderem \xE0s restri\xE7\xF5es especificadas que as necessidades de desempenho\
            \ da capacidade imp\xF5em \xE0s necessidades de prote\xE7\xE3o. O impacto\
            \ geral de servi\xE7os de seguran\xE7a computacionalmente intensivos (por\
            \ exemplo, criptografia) \xE9 avaliado e demonstrado para n\xE3o representar\
            \ impacto significativo sobre considera\xE7\xF5es de desempenho de prioridade\
            \ mais alta ou \xE9 considerado como fornecedor de uma compensa\xE7\xE3\
            o aceit\xE1vel de desempenho por prote\xE7\xE3o confi\xE1vel. As considera\xE7\
            \xF5es de compensa\xE7\xE3o incluem servi\xE7os de seguran\xE7a menos\
            \ computacionalmente intensivos, a menos que estejam indispon\xEDveis\
            \ ou sejam insuficientes. A insufici\xEAncia de um servi\xE7o de seguran\xE7\
            a \xE9 determinada pela capacidade funcional e pela for\xE7a do mecanismo.\
            \ A for\xE7a do mecanismo \xE9 selecionada em rela\xE7\xE3o aos requisitos\
            \ de seguran\xE7a, \xE0s quest\xF5es de sobrecarga cr\xEDtica para o desempenho\
            \ (por exemplo, gest\xE3o de chaves criptogr\xE1ficas) e a uma avalia\xE7\
            \xE3o da capacidade da amea\xE7a.\nO princ\xEDpio da seguran\xE7a de desempenho\
            \ leva \xE0 incorpora\xE7\xE3o de recursos que auxiliam na imposi\xE7\xE3\
            o da pol\xEDtica de seguran\xE7a, mas incorrem em sobrecarga m\xEDnima,\
            \ como mecanismos de hardware de baixo n\xEDvel sobre os quais servi\xE7\
            os de n\xEDvel superior podem ser constru\xEDdos. Tais mecanismos de baixo\
            \ n\xEDvel s\xE3o geralmente muito espec\xEDficos, t\xEAm funcionalidade\
            \ muito limitada e s\xE3o otimizados para desempenho. Por exemplo, uma\
            \ vez concedidos os direitos de acesso a uma por\xE7\xE3o da mem\xF3ria,\
            \ muitos sistemas usam mecanismos de hardware para garantir que todos\
            \ os acessos subsequentes envolvam o endere\xE7o de mem\xF3ria e o modo\
            \ de acesso corretos. A aplica\xE7\xE3o deste princ\xEDpio refor\xE7a\
            \ a necessidade de projetar a seguran\xE7a no sistema desde a base e de\
            \ incorporar mecanismos simples nas camadas inferiores que possam ser\
            \ usados como blocos de constru\xE7\xE3o para mecanismos de n\xEDvel superior."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(27)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(27)
      name: Security and Privacy Engineering Principles | Human Factored Security
      description: 'Implement the security design principle of human factored security
        in [Assignment: organization-defined systems or system components].'
      annotation: "The principle of human factored security states that the user interface\
        \ for security functions and supporting services is intuitive, user-friendly,\
        \ and provides feedback for user actions that affect such policy and its enforcement.\
        \ The mechanisms that enforce security policy are not intrusive to the user\
        \ and are designed not to degrade user efficiency. Security policy enforcement\
        \ mechanisms also provide the user with meaningful, clear, and relevant feedback\
        \ and warnings when insecure choices are being made. Particular attention\
        \ is given to interfaces through which personnel responsible for system administration\
        \ and operation configure and set up the security policies. Ideally, these\
        \ personnel are able to understand the impact of their choices. Personnel\
        \ with system administrative and operational responsibilities are able to\
        \ configure systems before start-up and administer them during runtime with\
        \ confidence that their intent is correctly mapped to the system\u2019s mechanisms.\
        \ Security services, functions, and mechanisms do not impede or unnecessarily\
        \ complicate the intended use of the system. There is a trade-off between\
        \ system usability and the strictness necessary for security policy enforcement.\
        \ If security mechanisms are frustrating or difficult to use, then users may\
        \ disable them, avoid them, or use them in ways inconsistent with the security\
        \ requirements and protection needs that the mechanisms were designed to satisfy."
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Seguran\xE7\
            a com Fatores Humanos"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de seguran\xE7\
            a com fatores humanos em [Atribui\xE7\xE3o: sistemas ou componentes de\
            \ sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da seguran\xE7a com fatores humanos afirma que\
            \ a interface de usu\xE1rio para as fun\xE7\xF5es de seguran\xE7a e os\
            \ servi\xE7os de apoio \xE9 intuitiva, amig\xE1vel ao usu\xE1rio e fornece\
            \ feedback para as a\xE7\xF5es do usu\xE1rio que afetam tal pol\xEDtica\
            \ e sua imposi\xE7\xE3o. Os mecanismos que imp\xF5em a pol\xEDtica de\
            \ seguran\xE7a n\xE3o s\xE3o intrusivos para o usu\xE1rio e s\xE3o projetados\
            \ para n\xE3o degradar a efici\xEAncia do usu\xE1rio. Os mecanismos de\
            \ imposi\xE7\xE3o da pol\xEDtica de seguran\xE7a tamb\xE9m fornecem ao\
            \ usu\xE1rio feedback e avisos significativos, claros e relevantes quando\
            \ escolhas inseguras est\xE3o sendo feitas. Aten\xE7\xE3o especial \xE9\
            \ dada \xE0s interfaces por meio das quais o pessoal respons\xE1vel pela\
            \ administra\xE7\xE3o e opera\xE7\xE3o do sistema configura e estabelece\
            \ as pol\xEDticas de seguran\xE7a. Idealmente, esse pessoal \xE9 capaz\
            \ de compreender o impacto de suas escolhas. O pessoal com responsabilidades\
            \ administrativas e operacionais do sistema \xE9 capaz de configurar os\
            \ sistemas antes da inicializa\xE7\xE3o e administr\xE1-los durante o\
            \ tempo de execu\xE7\xE3o com a confian\xE7a de que sua inten\xE7\xE3\
            o \xE9 corretamente mapeada para os mecanismos do sistema. Os servi\xE7\
            os, fun\xE7\xF5es e mecanismos de seguran\xE7a n\xE3o impedem nem complicam\
            \ desnecessariamente o uso pretendido do sistema. H\xE1 uma compensa\xE7\
            \xE3o entre a usabilidade do sistema e o rigor necess\xE1rio para a imposi\xE7\
            \xE3o da pol\xEDtica de seguran\xE7a. Se os mecanismos de seguran\xE7\
            a forem frustrantes ou dif\xEDceis de usar, ent\xE3o os usu\xE1rios podem\
            \ desativ\xE1-los, evit\xE1-los ou us\xE1-los de maneiras inconsistentes\
            \ com os requisitos de seguran\xE7a e as necessidades de prote\xE7\xE3\
            o que os mecanismos foram projetados para satisfazer."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(28)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(28)
      name: Security and Privacy Engineering Principles | Acceptable Security
      description: 'Implement the security design principle of acceptable security
        in [Assignment: organization-defined systems or system components].'
      annotation: "The principle of acceptable security requires that the level of\
        \ privacy and performance that the system provides is consistent with the\
        \ users\u2019 expectations. The perception of personal privacy may affect\
        \ user behavior, morale, and effectiveness. Based on the organizational privacy\
        \ policy and the system design, users should be able to restrict their actions\
        \ to protect their privacy. When systems fail to provide intuitive interfaces\
        \ or meet privacy and performance expectations, users may either choose to\
        \ completely avoid the system or use it in ways that may be inefficient or\
        \ even insecure."
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Seguran\xE7\
            a Aceit\xE1vel"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de seguran\xE7\
            a aceit\xE1vel em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da seguran\xE7a aceit\xE1vel exige que o n\xED\
            vel de privacidade e desempenho que o sistema fornece seja consistente\
            \ com as expectativas dos usu\xE1rios. A percep\xE7\xE3o da privacidade\
            \ pessoal pode afetar o comportamento, a moral e a efic\xE1cia do usu\xE1\
            rio. Com base na pol\xEDtica de privacidade organizacional e no design\
            \ do sistema, os usu\xE1rios deveriam ser capazes de restringir suas a\xE7\
            \xF5es para proteger sua privacidade. Quando os sistemas falham em fornecer\
            \ interfaces intuitivas ou em atender \xE0s expectativas de privacidade\
            \ e desempenho, os usu\xE1rios podem optar por evitar completamente o\
            \ sistema ou us\xE1-lo de maneiras que podem ser ineficientes ou at\xE9\
            \ inseguras."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(29)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(29)
      name: Security and Privacy Engineering Principles | Repeatable and Documented
        Procedures
      description: 'Implement the security design principle of repeatable and documented
        procedures in [Assignment: organization-defined systems or system components].'
      annotation: The principle of repeatable and documented procedures states that
        the techniques and methods employed to construct a system component permit
        the same component to be completely and correctly reconstructed at a later
        time. Repeatable and documented procedures support the development of a component
        that is identical to the component created earlier, which may be in widespread
        use. In the case of other system artifacts (e.g., documentation and testing
        results), repeatability supports consistency and the ability to inspect the
        artifacts. Repeatable and documented procedures can be introduced at various
        stages within the system development life cycle and contribute to the ability
        to evaluate assurance claims for the system. Examples include systematic procedures
        for code development and review, procedures for the configuration management
        of development tools and system artifacts, and procedures for system delivery.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Procedimentos\
            \ Repet\xEDveis e Documentados"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de procedimentos\
            \ repet\xEDveis e documentados em [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio dos procedimentos repet\xEDveis e documentados\
            \ afirma que as t\xE9cnicas e os m\xE9todos empregados para construir\
            \ um componente de sistema permitem que o mesmo componente seja completa\
            \ e corretamente reconstru\xEDdo em um momento posterior. Procedimentos\
            \ repet\xEDveis e documentados apoiam o desenvolvimento de um componente\
            \ que seja id\xEAntico ao componente criado anteriormente, o qual pode\
            \ estar em uso generalizado. No caso de outros artefatos do sistema (por\
            \ exemplo, documenta\xE7\xE3o e resultados de teste), a repetibilidade\
            \ apoia a consist\xEAncia e a capacidade de inspecionar os artefatos.\
            \ Procedimentos repet\xEDveis e documentados podem ser introduzidos em\
            \ v\xE1rios est\xE1gios dentro do ciclo de vida de desenvolvimento do\
            \ sistema e contribuem para a capacidade de avaliar as alega\xE7\xF5es\
            \ de garantia do sistema. Exemplos incluem procedimentos sistem\xE1ticos\
            \ para o desenvolvimento e a revis\xE3o de c\xF3digo, procedimentos para\
            \ a gest\xE3o de configura\xE7\xE3o das ferramentas de desenvolvimento\
            \ e dos artefatos do sistema, e procedimentos para a entrega do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(30)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(30)
      name: Security and Privacy Engineering Principles | Procedural Rigor
      description: 'Implement the security design principle of procedural rigor in
        [Assignment: organization-defined systems or system components].'
      annotation: 'The principle of procedural rigor states that the rigor of a system
        life cycle process is commensurate with its intended trustworthiness. Procedural
        rigor defines the scope, depth, and detail of the system life cycle procedures.
        Rigorous system life cycle procedures contribute to the assurance that the
        system is correct and free of unintended functionality in several ways. First,
        the procedures impose checks and balances on the life cycle process such that
        the introduction of unspecified functionality is prevented.

        Second, rigorous procedures applied to systems security engineering activities
        that produce specifications and other system design documents contribute to
        the ability to understand the system as it has been built rather than trusting
        that the component, as implemented, is the authoritative (and potentially
        misleading) specification.

        Finally, modifications to an existing system component are easier when there
        are detailed specifications that describe its current design instead of studying
        source code or schematics to try to understand how it works. Procedural rigor
        helps ensure that security functional and assurance requirements have been
        satisfied, and it contributes to a better-informed basis for the determination
        of trustworthiness and risk posture. Procedural rigor is commensurate with
        the degree of assurance desired for the system. If the required trustworthiness
        of the system is low, a high level of procedural rigor may add unnecessary
        cost, whereas when high trustworthiness is critical, the cost of high procedural
        rigor is merited.'
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Rigor\
            \ Procedimental"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de rigor\
            \ procedimental em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio do rigor procedimental afirma que o rigor de\
            \ um processo de ciclo de vida do sistema \xE9 proporcional \xE0 sua confiabilidade\
            \ pretendida. O rigor procedimental define o escopo, a profundidade e\
            \ o detalhe dos procedimentos do ciclo de vida do sistema. Procedimentos\
            \ rigorosos de ciclo de vida do sistema contribuem para a garantia de\
            \ que o sistema est\xE1 correto e livre de funcionalidades n\xE3o intencionais\
            \ de diversas maneiras. Primeiro, os procedimentos imp\xF5em freios e\
            \ contrapesos ao processo de ciclo de vida, de modo que a introdu\xE7\xE3\
            o de funcionalidades n\xE3o especificadas seja evitada.\nSegundo, procedimentos\
            \ rigorosos aplicados \xE0s atividades de engenharia de seguran\xE7a de\
            \ sistemas que produzem especifica\xE7\xF5es e outros documentos de design\
            \ do sistema contribuem para a capacidade de compreender o sistema tal\
            \ como foi constru\xEDdo, em vez de confiar que o componente, conforme\
            \ implementado, seja a especifica\xE7\xE3o autoritativa (e potencialmente\
            \ enganosa).\nPor fim, modifica\xE7\xF5es em um componente de sistema\
            \ existente s\xE3o mais f\xE1ceis quando h\xE1 especifica\xE7\xF5es detalhadas\
            \ que descrevem seu design atual, em vez de estudar o c\xF3digo-fonte\
            \ ou esquemas para tentar entender como ele funciona. O rigor procedimental\
            \ ajuda a garantir que os requisitos funcionais e de garantia de seguran\xE7\
            a foram atendidos, e contribui para uma base mais bem fundamentada para\
            \ a determina\xE7\xE3o da confiabilidade e da postura de risco. O rigor\
            \ procedimental \xE9 proporcional ao grau de garantia desejado para o\
            \ sistema. Se a confiabilidade exigida do sistema for baixa, um alto n\xED\
            vel de rigor procedimental pode acrescentar custo desnecess\xE1rio, ao\
            \ passo que, quando alta confiabilidade \xE9 cr\xEDtica, o custo de um\
            \ alto rigor procedimental \xE9 justificado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(31)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(31)
      name: Security and Privacy Engineering Principles | Secure System Modification
      description: 'Implement the security design principle of secure system modification
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of secure system modification states that system modification
        maintains system security with respect to the security requirements and risk
        tolerance of stakeholders. Upgrades or modifications to systems can transform
        secure systems into systems that are not secure. The procedures for system
        modification ensure that if the system is to maintain its trustworthiness,
        the same rigor that was applied to its initial development is applied to any
        system changes. Because modifications can affect the ability of the system
        to maintain its secure state, a careful security analysis of the modification
        is needed prior to its implementation and deployment. This principle parallels
        the principle of secure evolvability.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Modifica\xE7\
            \xE3o Segura do Sistema"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de modifica\xE7\
            \xE3o segura do sistema em [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da modifica\xE7\xE3o segura do sistema afirma\
            \ que a modifica\xE7\xE3o do sistema mant\xE9m a seguran\xE7a do sistema\
            \ em rela\xE7\xE3o aos requisitos de seguran\xE7a e \xE0 toler\xE2ncia\
            \ a risco das partes interessadas. Atualiza\xE7\xF5es ou modifica\xE7\xF5\
            es em sistemas podem transformar sistemas seguros em sistemas que n\xE3\
            o s\xE3o seguros. Os procedimentos de modifica\xE7\xE3o do sistema garantem\
            \ que, para que o sistema mantenha sua confiabilidade, o mesmo rigor aplicado\
            \ em seu desenvolvimento inicial seja aplicado a quaisquer altera\xE7\xF5\
            es do sistema. Como as modifica\xE7\xF5es podem afetar a capacidade do\
            \ sistema de manter seu estado seguro, \xE9 necess\xE1ria uma an\xE1lise\
            \ cuidadosa de seguran\xE7a da modifica\xE7\xE3o antes de sua implementa\xE7\
            \xE3o e implanta\xE7\xE3o. Este princ\xEDpio \xE9 paralelo ao princ\xED\
            pio da evolubilidade segura."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(32)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(32)
      name: Security and Privacy Engineering Principles | Sufficient Documentation
      description: 'Implement the security design principle of sufficient documentation
        in [Assignment: organization-defined systems or system components].'
      annotation: The principle of sufficient documentation states that organizational
        personnel with responsibilities to interact with the system are provided with
        adequate documentation and other information such that the personnel contribute
        to rather than detract from system security. Despite attempts to comply with
        principles such as human factored security and acceptable security, systems
        are inherently complex, and the design intent for the use of security mechanisms
        and the ramifications of the misuse or misconfiguration of security mechanisms
        are not always intuitively obvious. Uninformed and insufficiently trained
        users can introduce vulnerabilities due to errors of omission and commission.
        The availability of documentation and training can help to ensure a knowledgeable
        cadre of personnel, all of whom have a critical role in the achievement of
        principles such as continuous protection. Documentation is written clearly
        and supported by training that provides security awareness and understanding
        of security-relevant responsibilities.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Documenta\xE7\
            \xE3o Suficiente"
          description: "Implementar o princ\xEDpio de design de seguran\xE7a de documenta\xE7\
            \xE3o suficiente em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O princ\xEDpio da documenta\xE7\xE3o suficiente afirma que\
            \ o pessoal da organiza\xE7\xE3o com responsabilidades de interagir com\
            \ o sistema deve receber documenta\xE7\xE3o adequada e outras informa\xE7\
            \xF5es, de modo que o pessoal contribua para, em vez de prejudicar, a\
            \ seguran\xE7a do sistema. Apesar das tentativas de cumprir princ\xED\
            pios como seguran\xE7a orientada por fatores humanos e seguran\xE7a aceit\xE1\
            vel, os sistemas s\xE3o inerentemente complexos, e a inten\xE7\xE3o de\
            \ design para o uso de mecanismos de seguran\xE7a e as ramifica\xE7\xF5\
            es do uso indevido ou da configura\xE7\xE3o incorreta de mecanismos de\
            \ seguran\xE7a nem sempre s\xE3o intuitivamente \xF3bvias. Usu\xE1rios\
            \ desinformados e insuficientemente treinados podem introduzir vulnerabilidades\
            \ devido a erros de omiss\xE3o e de a\xE7\xE3o. A disponibilidade de documenta\xE7\
            \xE3o e treinamento pode ajudar a garantir um quadro de pessoal qualificado,\
            \ todos com um papel cr\xEDtico na realiza\xE7\xE3o de princ\xEDpios como\
            \ prote\xE7\xE3o cont\xEDnua. A documenta\xE7\xE3o \xE9 redigida de forma\
            \ clara e apoiada por treinamento que proporciona conscientiza\xE7\xE3\
            o sobre seguran\xE7a e compreens\xE3o das responsabilidades relevantes\
            \ para a seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-8(33)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-8(33)
      name: Security and Privacy Engineering Principles | Minimization
      description: 'Implement the privacy principle of minimization using [Assignment:
        organization-defined processes].'
      annotation: The principle of minimization states that organizations should only
        process personally identifiable information that is directly relevant and
        necessary to accomplish an authorized purpose and should only maintain personally
        identifiable information for as long as is necessary to accomplish the purpose.
        Organizations have processes in place, consistent with applicable laws and
        policies, to implement the principle of minimization.
      translations:
        pt:
          name: "Princ\xEDpios de Engenharia de Seguran\xE7a e Privacidade | Minimiza\xE7\
            \xE3o"
          description: "Implementar o princ\xEDpio de privacidade de minimiza\xE7\xE3\
            o utilizando [Atribui\xE7\xE3o: processos definidos pela organiza\xE7\xE3\
            o]."
          annotation: "O princ\xEDpio da minimiza\xE7\xE3o afirma que as organiza\xE7\
            \xF5es devem processar apenas informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal que sejam diretamente relevantes e necess\xE1rias para cumprir\
            \ uma finalidade autorizada e devem manter as informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal apenas pelo tempo necess\xE1rio para cumprir essa finalidade.\
            \ As organiza\xE7\xF5es disp\xF5em de processos, consistentes com as leis\
            \ e pol\xEDticas aplic\xE1veis, para implementar o princ\xEDpio da minimiza\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9
      name: External System Services
      description: 'a. Require that providers of external system services comply with
        organizational security and privacy requirements and employ the following
        controls: [Assignment: organization-defined controls];

        b. Define and document organizational oversight and user roles and responsibilities
        with regard to external system services; and

        c. Employ the following processes, methods, and techniques to monitor control
        compliance by external service providers on an ongoing basis: [Assignment:
        organization-defined processes, methods, and techniques].'
      annotation: External system services are provided by an external provider, and
        the organization has no direct control over the implementation of the required
        controls or the assessment of control effectiveness. Organizations establish
        relationships with external service providers in a variety of ways, including
        through business partnerships, contracts, interagency agreements, lines of
        business arrangements, licensing agreements, joint ventures, and supply chain
        exchanges. The responsibility for managing risks from the use of external
        system services remains with authorizing officials. For services external
        to organizations, a chain of trust requires that organizations establish and
        retain a certain level of confidence that each provider in the consumer-provider
        relationship provides adequate protection for the services rendered. The extent
        and nature of this chain of trust vary based on relationships between organizations
        and the external providers. Organizations document the basis for the trust
        relationships so that the relationships can be monitored. External system
        services documentation includes government, service providers, end user security
        roles and responsibilities, and service-level agreements. Service-level agreements
        define the expectations of performance for implemented controls, describe
        measurable outcomes, and identify remedies and response requirements for identified
        instances of noncompliance.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos"
          description: "a. Exigir que os provedores de servi\xE7os de sistema externos\
            \ cumpram os requisitos organizacionais de seguran\xE7a e privacidade\
            \ e empreguem os seguintes controles: [Atribui\xE7\xE3o: controles definidos\
            \ pela organiza\xE7\xE3o];\nb. Definir e documentar a supervis\xE3o organizacional\
            \ e os pap\xE9is e responsabilidades dos usu\xE1rios no que diz respeito\
            \ aos servi\xE7os de sistema externos; e\nc. Empregar os seguintes processos,\
            \ m\xE9todos e t\xE9cnicas para monitorar a conformidade com os controles\
            \ por parte dos provedores de servi\xE7os externos de forma cont\xEDnua:\
            \ [Atribui\xE7\xE3o: processos, m\xE9todos e t\xE9cnicas definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Os servi\xE7os de sistema externos s\xE3o fornecidos por um\
            \ provedor externo, e a organiza\xE7\xE3o n\xE3o tem controle direto sobre\
            \ a implementa\xE7\xE3o dos controles exigidos ou sobre a avalia\xE7\xE3\
            o da efic\xE1cia dos controles. As organiza\xE7\xF5es estabelecem rela\xE7\
            \xF5es com provedores de servi\xE7os externos de diversas maneiras, inclusive\
            \ por meio de parcerias de neg\xF3cios, contratos, acordos interag\xEA\
            ncias, arranjos de linhas de neg\xF3cio, acordos de licenciamento, joint\
            \ ventures e trocas na cadeia de suprimentos. A responsabilidade pela\
            \ gest\xE3o dos riscos decorrentes do uso de servi\xE7os de sistema externos\
            \ permanece com os agentes autorizadores. Para servi\xE7os externos \xE0\
            s organiza\xE7\xF5es, uma cadeia de confian\xE7a exige que as organiza\xE7\
            \xF5es estabele\xE7am e mantenham um certo n\xEDvel de confian\xE7a de\
            \ que cada provedor na rela\xE7\xE3o consumidor-provedor proporciona prote\xE7\
            \xE3o adequada para os servi\xE7os prestados. A extens\xE3o e a natureza\
            \ dessa cadeia de confian\xE7a variam conforme as rela\xE7\xF5es entre\
            \ as organiza\xE7\xF5es e os provedores externos. As organiza\xE7\xF5\
            es documentam a base das rela\xE7\xF5es de confian\xE7a para que essas\
            \ rela\xE7\xF5es possam ser monitoradas. A documenta\xE7\xE3o dos servi\xE7\
            os de sistema externos inclui os pap\xE9is e responsabilidades de seguran\xE7\
            a do governo, dos provedores de servi\xE7os e dos usu\xE1rios finais,\
            \ bem como os acordos de n\xEDvel de servi\xE7o. Os acordos de n\xEDvel\
            \ de servi\xE7o definem as expectativas de desempenho para os controles\
            \ implementados, descrevem resultados mensur\xE1veis e identificam solu\xE7\
            \xF5es e requisitos de resposta para casos identificados de n\xE3o conformidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(1)
      name: External System Services | Risk Assessments and Organizational Approvals
      description: '(a) Conduct an organizational assessment of risk prior to the
        acquisition or outsourcing of information security services; and

        (b) Verify that the acquisition or outsourcing of dedicated information security
        services is approved by [Assignment: organization-defined personnel or roles].'
      annotation: Information security services include the operation of security
        devices, such as firewalls or key management services as well as incident
        monitoring, analysis, and response. Risks assessed can include system, mission
        or business, security, privacy, or supply chain risks.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Avalia\xE7\xF5es de Risco e Aprova\xE7\
            \xF5es Organizacionais"
          description: "(a) Conduzir uma avalia\xE7\xE3o organizacional de risco antes\
            \ da aquisi\xE7\xE3o ou terceiriza\xE7\xE3o de servi\xE7os de seguran\xE7\
            a da informa\xE7\xE3o; e\n(b) Verificar se a aquisi\xE7\xE3o ou terceiriza\xE7\
            \xE3o de servi\xE7os dedicados de seguran\xE7a da informa\xE7\xE3o \xE9\
            \ aprovada por [Atribui\xE7\xE3o: pessoal ou pap\xE9is definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Os servi\xE7os de seguran\xE7a da informa\xE7\xE3o incluem\
            \ a opera\xE7\xE3o de dispositivos de seguran\xE7a, como firewalls ou\
            \ servi\xE7os de gerenciamento de chaves, bem como o monitoramento, a\
            \ an\xE1lise e a resposta a incidentes. Os riscos avaliados podem incluir\
            \ riscos de sistema, de miss\xE3o ou de neg\xF3cio, de seguran\xE7a, de\
            \ privacidade ou de cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(2)
      name: External System Services | Identification of Functions, Ports, Protocols,
        and Services
      description: 'Require providers of the following external system services to
        identify the functions, ports, protocols, and other services required for
        the use of such services: [Assignment: organization-defined external system
        services].'
      annotation: Information from external service providers regarding the specific
        functions, ports, protocols, and services used in the provision of such services
        can be useful when the need arises to understand the trade-offs involved in
        restricting certain functions and services or blocking certain ports and protocols.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Identifica\xE7\xE3o de Fun\xE7\xF5\
            es, Portas, Protocolos e Servi\xE7os"
          description: "Exigir que os provedores dos seguintes servi\xE7os de sistema\
            \ externos identifiquem as fun\xE7\xF5es, portas, protocolos e outros\
            \ servi\xE7os necess\xE1rios para o uso de tais servi\xE7os: [Atribui\xE7\
            \xE3o: servi\xE7os de sistema externos definidos pela organiza\xE7\xE3\
            o]."
          annotation: "As informa\xE7\xF5es dos provedores de servi\xE7os externos\
            \ a respeito das fun\xE7\xF5es, portas, protocolos e servi\xE7os espec\xED\
            ficos utilizados na presta\xE7\xE3o de tais servi\xE7os podem ser \xFA\
            teis quando surge a necessidade de compreender os compromissos envolvidos\
            \ na restri\xE7\xE3o de certas fun\xE7\xF5es e servi\xE7os ou no bloqueio\
            \ de certas portas e protocolos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(3)
      name: External System Services | Establish and Maintain Trust Relationship with
        Providers
      description: 'Establish, document, and maintain trust relationships with external
        service providers based on the following requirements, properties, factors,
        or conditions: [Assignment: organization-defined security and privacy requirements,
        properties, factors, or conditions defining acceptable trust relationships].'
      annotation: Trust relationships between organizations and external service providers
        reflect the degree of confidence that the risk from using external services
        is at an acceptable level. Trust relationships can help organizations gain
        increased levels of confidence that service providers are providing adequate
        protection for the services rendered and can also be useful when conducting
        incident response or when planning for upgrades or obsolescence. Trust relationships
        can be complicated due to the potentially large number of entities participating
        in the consumer-provider interactions, subordinate relationships and levels
        of trust, and types of interactions between the parties. In some cases, the
        degree of trust is based on the level of control that organizations can exert
        on external service providers regarding the controls necessary for the protection
        of the service, information, or individual privacy and the evidence brought
        forth as to the effectiveness of the implemented controls. The level of control
        is established by the terms and conditions of the contracts or service-level
        agreements.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Estabelecer e Manter Rela\xE7\xE3\
            o de Confian\xE7a com os Provedores"
          description: "Estabelecer, documentar e manter rela\xE7\xF5es de confian\xE7\
            a com provedores de servi\xE7os externos com base nos seguintes requisitos,\
            \ propriedades, fatores ou condi\xE7\xF5es: [Atribui\xE7\xE3o: requisitos,\
            \ propriedades, fatores ou condi\xE7\xF5es de seguran\xE7a e privacidade\
            \ definidos pela organiza\xE7\xE3o que definem rela\xE7\xF5es de confian\xE7\
            a aceit\xE1veis]."
          annotation: "As rela\xE7\xF5es de confian\xE7a entre as organiza\xE7\xF5\
            es e os provedores de servi\xE7os externos refletem o grau de confian\xE7\
            a de que o risco decorrente do uso de servi\xE7os externos est\xE1 em\
            \ um n\xEDvel aceit\xE1vel. As rela\xE7\xF5es de confian\xE7a podem ajudar\
            \ as organiza\xE7\xF5es a obter n\xEDveis maiores de confian\xE7a de que\
            \ os provedores de servi\xE7os est\xE3o proporcionando prote\xE7\xE3o\
            \ adequada para os servi\xE7os prestados, e tamb\xE9m podem ser \xFAteis\
            \ ao conduzir resposta a incidentes ou ao planejar atualiza\xE7\xF5es\
            \ ou obsolesc\xEAncia. As rela\xE7\xF5es de confian\xE7a podem ser complicadas\
            \ devido ao n\xFAmero potencialmente grande de entidades participando\
            \ das intera\xE7\xF5es consumidor-provedor, \xE0s rela\xE7\xF5es subordinadas\
            \ e aos n\xEDveis de confian\xE7a, e aos tipos de intera\xE7\xF5es entre\
            \ as partes. Em alguns casos, o grau de confian\xE7a baseia-se no n\xED\
            vel de controle que as organiza\xE7\xF5es podem exercer sobre os provedores\
            \ de servi\xE7os externos no que diz respeito aos controles necess\xE1\
            rios para a prote\xE7\xE3o do servi\xE7o, das informa\xE7\xF5es ou da\
            \ privacidade individual, e nas evid\xEAncias apresentadas quanto \xE0\
            \ efic\xE1cia dos controles implementados. O n\xEDvel de controle \xE9\
            \ estabelecido pelos termos e condi\xE7\xF5es dos contratos ou acordos\
            \ de n\xEDvel de servi\xE7o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(4)
      name: External System Services | Consistent Interests of Consumers and Providers
      description: 'Take the following actions to verify that the interests of [Assignment:
        organization-defined external service providers] are consistent with and reflect
        organizational interests: [Assignment: organization-defined actions].'
      annotation: As organizations increasingly use external service providers, it
        is possible that the interests of the service providers may diverge from organizational
        interests. In such situations, simply having the required technical, management,
        or operational controls in place may not be sufficient if the providers that
        implement and manage those controls are not operating in a manner consistent
        with the interests of the consuming organizations. Actions that organizations
        take to address such concerns include requiring background checks for selected
        service provider personnel; examining ownership records; employing only trustworthy
        service providers, such as providers with which organizations have had successful
        trust relationships; and conducting routine, periodic, unscheduled visits
        to service provider facilities.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Interesses Consistentes de Consumidores\
            \ e Provedores"
          description: "Tomar as seguintes a\xE7\xF5es para verificar se os interesses\
            \ de [Atribui\xE7\xE3o: provedores de servi\xE7os externos definidos pela\
            \ organiza\xE7\xE3o] s\xE3o consistentes com e refletem os interesses\
            \ organizacionais: [Atribui\xE7\xE3o: a\xE7\xF5es definidas pela organiza\xE7\
            \xE3o]."
          annotation: "\xC0 medida que as organiza\xE7\xF5es utilizam cada vez mais\
            \ provedores de servi\xE7os externos, \xE9 poss\xEDvel que os interesses\
            \ dos provedores de servi\xE7os divirjam dos interesses organizacionais.\
            \ Em tais situa\xE7\xF5es, simplesmente ter os controles t\xE9cnicos,\
            \ gerenciais ou operacionais exigidos em vigor pode n\xE3o ser suficiente\
            \ se os provedores que implementam e gerenciam esses controles n\xE3o\
            \ estiverem operando de maneira consistente com os interesses das organiza\xE7\
            \xF5es consumidoras. As a\xE7\xF5es que as organiza\xE7\xF5es tomam para\
            \ abordar tais preocupa\xE7\xF5es incluem exigir verifica\xE7\xF5es de\
            \ antecedentes para o pessoal selecionado dos provedores de servi\xE7\
            os; examinar registros de propriedade; empregar apenas provedores de servi\xE7\
            os confi\xE1veis, como provedores com os quais as organiza\xE7\xF5es tenham\
            \ tido rela\xE7\xF5es de confian\xE7a bem-sucedidas; e conduzir visitas\
            \ rotineiras, peri\xF3dicas e n\xE3o programadas \xE0s instala\xE7\xF5\
            es dos provedores de servi\xE7os."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(5)
      name: External System Services | Processing, Storage, and Service Location
      description: 'Restrict the location of [Selection (one or more): information
        processing; information or data; system services] to [Assignment: organization-defined
        locations] based on [Assignment: organization-defined requirements or conditions].'
      annotation: The location of information processing, information and data storage,
        or system services can have a direct impact on the ability of organizations
        to successfully execute their mission and business functions. The impact occurs
        when external providers control the location of processing, storage, or services.
        The criteria that external providers use for the selection of processing,
        storage, or service locations may be different from the criteria that organizations
        use. For example, organizations may desire that data or information storage
        locations be restricted to certain locations to help facilitate incident response
        activities in case of information security incidents or breaches. Incident
        response activities, including forensic analyses and after-the-fact investigations,
        may be adversely affected by the governing laws, policies, or protocols in
        the locations where processing and storage occur and/or the locations from
        which system services emanate.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Localiza\xE7\xE3o de Processamento,\
            \ Armazenamento e Servi\xE7o"
          description: "Restringir a localiza\xE7\xE3o de [Sele\xE7\xE3o (um ou mais):\
            \ processamento de informa\xE7\xF5es; informa\xE7\xF5es ou dados; servi\xE7\
            os de sistema] a [Atribui\xE7\xE3o: localiza\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o] com base em [Atribui\xE7\xE3o: requisitos ou condi\xE7\
            \xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "A localiza\xE7\xE3o do processamento de informa\xE7\xF5es,\
            \ do armazenamento de informa\xE7\xF5es e dados, ou dos servi\xE7os de\
            \ sistema pode ter um impacto direto na capacidade das organiza\xE7\xF5\
            es de executar com sucesso suas fun\xE7\xF5es de miss\xE3o e neg\xF3cio.\
            \ O impacto ocorre quando provedores externos controlam a localiza\xE7\
            \xE3o do processamento, do armazenamento ou dos servi\xE7os. Os crit\xE9\
            rios que os provedores externos utilizam para a sele\xE7\xE3o das localiza\xE7\
            \xF5es de processamento, armazenamento ou servi\xE7o podem ser diferentes\
            \ dos crit\xE9rios que as organiza\xE7\xF5es utilizam. Por exemplo, as\
            \ organiza\xE7\xF5es podem desejar que as localiza\xE7\xF5es de armazenamento\
            \ de dados ou informa\xE7\xF5es sejam restritas a determinadas localiza\xE7\
            \xF5es para ajudar a facilitar as atividades de resposta a incidentes\
            \ em caso de incidentes ou viola\xE7\xF5es de seguran\xE7a da informa\xE7\
            \xE3o. As atividades de resposta a incidentes, incluindo an\xE1lises forenses\
            \ e investiga\xE7\xF5es posteriores ao fato, podem ser afetadas negativamente\
            \ pelas leis, pol\xEDticas ou protocolos vigentes nas localiza\xE7\xF5\
            es onde ocorrem o processamento e o armazenamento e/ou nas localiza\xE7\
            \xF5es de onde emanam os servi\xE7os de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(6)
      name: External System Services | Organization-controlled Cryptographic Keys
      description: Maintain exclusive control of cryptographic keys for encrypted
        material stored or transmitted through an external system.
      annotation: Maintaining exclusive control of cryptographic keys in an external
        system prevents decryption of organizational data by external system staff.
        Organizational control of cryptographic keys can be implemented by encrypting
        and decrypting data inside the organization as data is sent to and received
        from the external system or by employing a component that permits encryption
        and decryption functions to be local to the external system but allows exclusive
        organizational access to the encryption keys.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Chaves Criptogr\xE1ficas Controladas\
            \ pela Organiza\xE7\xE3o"
          description: "Manter controle exclusivo das chaves criptogr\xE1ficas para\
            \ o material criptografado armazenado ou transmitido por meio de um sistema\
            \ externo."
          annotation: "Manter o controle exclusivo das chaves criptogr\xE1ficas em\
            \ um sistema externo impede a descriptografia dos dados organizacionais\
            \ pela equipe do sistema externo. O controle organizacional das chaves\
            \ criptogr\xE1ficas pode ser implementado criptografando e descriptografando\
            \ os dados dentro da organiza\xE7\xE3o, \xE0 medida que os dados s\xE3\
            o enviados ao e recebidos do sistema externo, ou empregando um componente\
            \ que permita que as fun\xE7\xF5es de criptografia e descriptografia sejam\
            \ locais ao sistema externo, mas que conceda acesso organizacional exclusivo\
            \ \xE0s chaves de criptografia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(7)
      name: External System Services | Organization-controlled Integrity Checking
      description: Provide the capability to check the integrity of information while
        it resides in the external system.
      annotation: Storage of organizational information in an external system could
        limit visibility into the security status of its data. The ability of the
        organization to verify and validate the integrity of its stored data without
        transferring it out of the external system provides such visibility.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Verifica\xE7\xE3o de Integridade\
            \ Controlada pela Organiza\xE7\xE3o"
          description: "Prover a capacidade de verificar a integridade das informa\xE7\
            \xF5es enquanto elas residem no sistema externo."
          annotation: "O armazenamento de informa\xE7\xF5es organizacionais em um\
            \ sistema externo pode limitar a visibilidade sobre o estado de seguran\xE7\
            a de seus dados. A capacidade da organiza\xE7\xE3o de verificar e validar\
            \ a integridade de seus dados armazenados sem transferi-los para fora\
            \ do sistema externo proporciona tal visibilidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-9(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-9(8)
      name: "External System Services | Processing and Storage Location \u2014 U.S.\
        \ Jurisdiction"
      description: Restrict the geographic location of information processing and
        data storage to facilities located within in the legal jurisdictional boundary
        of the United States.
      annotation: The geographic location of information processing and data storage
        can have a direct impact on the ability of organizations to successfully execute
        their mission and business functions. A compromise or breach of high impact
        information and systems can have severe or catastrophic adverse impacts on
        organizational assets and operations, individuals, other organizations, and
        the Nation. Restricting the processing and storage of high-impact information
        to facilities within the legal jurisdictional boundary of the United States
        provides greater control over such processing and storage.
      translations:
        pt:
          name: "Servi\xE7os de Sistema Externos | Localiza\xE7\xE3o de Processamento\
            \ e Armazenamento \u2014 Jurisdi\xE7\xE3o dos EUA"
          description: "Restringir a localiza\xE7\xE3o geogr\xE1fica do processamento\
            \ de informa\xE7\xF5es e do armazenamento de dados a instala\xE7\xF5es\
            \ situadas dentro dos limites da jurisdi\xE7\xE3o legal dos Estados Unidos."
          annotation: "A localiza\xE7\xE3o geogr\xE1fica do processamento de informa\xE7\
            \xF5es e do armazenamento de dados pode ter um impacto direto na capacidade\
            \ das organiza\xE7\xF5es de executar com sucesso suas fun\xE7\xF5es de\
            \ miss\xE3o e neg\xF3cio. Um comprometimento ou viola\xE7\xE3o de informa\xE7\
            \xF5es e sistemas de alto impacto pode ter impactos adversos graves ou\
            \ catastr\xF3ficos sobre os ativos e opera\xE7\xF5es organizacionais,\
            \ indiv\xEDduos, outras organiza\xE7\xF5es e a Na\xE7\xE3o. Restringir\
            \ o processamento e o armazenamento de informa\xE7\xF5es de alto impacto\
            \ a instala\xE7\xF5es dentro dos limites da jurisdi\xE7\xE3o legal dos\
            \ Estados Unidos proporciona maior controle sobre tal processamento e\
            \ armazenamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10
      name: Developer Configuration Management
      description: 'Require the developer of the system, system component, or system
        service to:

        a. Perform configuration management during system, component, or service [Selection
        (one or more): design; development; implementation; operation; disposal];

        b. Document, manage, and control the integrity of changes to [Assignment:
        organization-defined configuration items under configuration management];

        c. Implement only organization-approved changes to the system, component,
        or service;

        d. Document approved changes to the system, component, or service and the
        potential security and privacy impacts of such changes; and

        e. Track security flaws and flaw resolution within the system, component,
        or service and report findings to [Assignment: organization-defined personnel].'
      annotation: 'Organizations consider the quality and completeness of configuration
        management activities conducted by developers as direct evidence of applying
        effective security controls. Controls include protecting the master copies
        of material used to generate security-relevant portions of the system hardware,
        software, and firmware from unauthorized modification or destruction. Maintaining
        the integrity of changes to the system, system component, or system service
        requires strict configuration control throughout the system development life
        cycle to track authorized changes and prevent unauthorized changes.

        The configuration items that are placed under configuration management include
        the formal model; the functional, high-level, and low-level design specifications;
        other design data; implementation documentation; source code and hardware
        schematics; the current running version of the object code; tools for comparing
        new versions of security-relevant hardware descriptions and source code with
        previous versions; and test fixtures and documentation. Depending on the mission
        and business needs of organizations and the nature of the contractual relationships
        in place, developers may provide configuration management support during the
        operations and maintenance stage of the system development life cycle.'
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\na. Realize a gest\xE3o de configura\xE7\xE3\
            o durante o(a) [Sele\xE7\xE3o (um ou mais): design; desenvolvimento; implementa\xE7\
            \xE3o; opera\xE7\xE3o; descarte] do sistema, componente ou servi\xE7o;\n\
            b. Documente, gerencie e controle a integridade das altera\xE7\xF5es nos\
            \ [Atribui\xE7\xE3o: itens de configura\xE7\xE3o definidos pela organiza\xE7\
            \xE3o sob gest\xE3o de configura\xE7\xE3o];\nc. Implemente apenas altera\xE7\
            \xF5es aprovadas pela organiza\xE7\xE3o no sistema, componente ou servi\xE7\
            o;\nd. Documente as altera\xE7\xF5es aprovadas no sistema, componente\
            \ ou servi\xE7o e os potenciais impactos de seguran\xE7a e privacidade\
            \ de tais altera\xE7\xF5es; e\ne. Acompanhe as falhas de seguran\xE7a\
            \ e a resolu\xE7\xE3o de falhas dentro do sistema, componente ou servi\xE7\
            o e relate as constata\xE7\xF5es ao [Atribui\xE7\xE3o: pessoal definido\
            \ pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es consideram a qualidade e a completude\
            \ das atividades de gest\xE3o de configura\xE7\xE3o conduzidas pelos desenvolvedores\
            \ como evid\xEAncia direta da aplica\xE7\xE3o de controles de seguran\xE7\
            a eficazes. Os controles incluem proteger as c\xF3pias-mestre do material\
            \ utilizado para gerar as por\xE7\xF5es relevantes para a seguran\xE7\
            a do hardware, software e firmware do sistema contra modifica\xE7\xE3\
            o ou destrui\xE7\xE3o n\xE3o autorizada. Manter a integridade das altera\xE7\
            \xF5es no sistema, componente de sistema ou servi\xE7o de sistema exige\
            \ controle estrito de configura\xE7\xE3o ao longo de todo o ciclo de vida\
            \ de desenvolvimento do sistema para acompanhar as altera\xE7\xF5es autorizadas\
            \ e evitar altera\xE7\xF5es n\xE3o autorizadas.\nOs itens de configura\xE7\
            \xE3o que s\xE3o colocados sob gest\xE3o de configura\xE7\xE3o incluem\
            \ o modelo formal; as especifica\xE7\xF5es de design funcional, de alto\
            \ n\xEDvel e de baixo n\xEDvel; outros dados de design; a documenta\xE7\
            \xE3o de implementa\xE7\xE3o; o c\xF3digo-fonte e os esquemas de hardware;\
            \ a vers\xE3o atual em execu\xE7\xE3o do c\xF3digo-objeto; ferramentas\
            \ para comparar novas vers\xF5es de descri\xE7\xF5es de hardware e c\xF3\
            digo-fonte relevantes para a seguran\xE7a com vers\xF5es anteriores; e\
            \ instala\xE7\xF5es de teste e documenta\xE7\xE3o. Dependendo das necessidades\
            \ de miss\xE3o e neg\xF3cio das organiza\xE7\xF5es e da natureza das rela\xE7\
            \xF5es contratuais em vigor, os desenvolvedores podem prover suporte de\
            \ gest\xE3o de configura\xE7\xE3o durante a fase de opera\xE7\xF5es e\
            \ manuten\xE7\xE3o do ciclo de vida de desenvolvimento do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(1)
      name: Developer Configuration Management | Software and Firmware Integrity Verification
      description: Require the developer of the system, system component, or system
        service to enable integrity verification of software and firmware components.
      annotation: Software and firmware integrity verification allows organizations
        to detect unauthorized changes to software and firmware components using developer-provided
        tools, techniques, and mechanisms. The integrity checking mechanisms can also
        address counterfeiting of software and firmware components. Organizations
        verify the integrity of software and firmware components, for example, through
        secure one-way hashes provided by developers. Delivered software and firmware
        components also include any updates to such components.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Verifica\xE7\xE3\
            o de Integridade de Software e Firmware"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema habilite a verifica\xE7\xE3o de integridade\
            \ dos componentes de software e firmware."
          annotation: "A verifica\xE7\xE3o de integridade de software e firmware permite\
            \ que as organiza\xE7\xF5es detectem altera\xE7\xF5es n\xE3o autorizadas\
            \ nos componentes de software e firmware utilizando ferramentas, t\xE9\
            cnicas e mecanismos fornecidos pelo desenvolvedor. Os mecanismos de verifica\xE7\
            \xE3o de integridade tamb\xE9m podem abordar a falsifica\xE7\xE3o de componentes\
            \ de software e firmware. As organiza\xE7\xF5es verificam a integridade\
            \ dos componentes de software e firmware, por exemplo, por meio de hashes\
            \ unidirecionais seguros fornecidos pelos desenvolvedores. Os componentes\
            \ de software e firmware entregues tamb\xE9m incluem quaisquer atualiza\xE7\
            \xF5es para tais componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(2)
      name: Developer Configuration Management | Alternative Configuration Management
        Processes
      description: Provide an alternate configuration management process using organizational
        personnel in the absence of a dedicated developer configuration management
        team.
      annotation: Alternate configuration management processes may be required when
        organizations use commercial off-the-shelf information technology products.
        Alternate configuration management processes include organizational personnel
        who review and approve proposed changes to systems, system components, and
        system services and conduct security and privacy impact analyses prior to
        the implementation of changes to systems, components, or services.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Processos Alternativos\
            \ de Gest\xE3o de Configura\xE7\xE3o"
          description: "Prover um processo alternativo de gest\xE3o de configura\xE7\
            \xE3o utilizando o pessoal da organiza\xE7\xE3o na aus\xEAncia de uma\
            \ equipe dedicada de gest\xE3o de configura\xE7\xE3o do desenvolvedor."
          annotation: "Processos alternativos de gest\xE3o de configura\xE7\xE3o podem\
            \ ser exigidos quando as organiza\xE7\xF5es utilizam produtos comerciais\
            \ de prateleira (COTS) de tecnologia da informa\xE7\xE3o. Os processos\
            \ alternativos de gest\xE3o de configura\xE7\xE3o incluem o pessoal da\
            \ organiza\xE7\xE3o que revisa e aprova as altera\xE7\xF5es propostas\
            \ em sistemas, componentes de sistema e servi\xE7os de sistema e conduz\
            \ an\xE1lises de impacto de seguran\xE7a e privacidade antes da implementa\xE7\
            \xE3o de altera\xE7\xF5es em sistemas, componentes ou servi\xE7os."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(3)
      name: Developer Configuration Management | Hardware Integrity Verification
      description: Require the developer of the system, system component, or system
        service to enable integrity verification of hardware components.
      annotation: Hardware integrity verification allows organizations to detect unauthorized
        changes to hardware components using developer-provided tools, techniques,
        methods, and mechanisms. Organizations may verify the integrity of hardware
        components with hard-to-copy labels, verifiable serial numbers provided by
        developers, and by requiring the use of anti-tamper technologies. Delivered
        hardware components also include hardware and firmware updates to such components.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Verifica\xE7\xE3\
            o de Integridade de Hardware"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema habilite a verifica\xE7\xE3o de integridade\
            \ dos componentes de hardware."
          annotation: "A verifica\xE7\xE3o de integridade de hardware permite que\
            \ as organiza\xE7\xF5es detectem altera\xE7\xF5es n\xE3o autorizadas nos\
            \ componentes de hardware utilizando ferramentas, t\xE9cnicas, m\xE9todos\
            \ e mecanismos fornecidos pelo desenvolvedor. As organiza\xE7\xF5es podem\
            \ verificar a integridade dos componentes de hardware com etiquetas dif\xED\
            ceis de copiar, n\xFAmeros de s\xE9rie verific\xE1veis fornecidos pelos\
            \ desenvolvedores e exigindo o uso de tecnologias antiviola\xE7\xE3o.\
            \ Os componentes de hardware entregues tamb\xE9m incluem atualiza\xE7\xF5\
            es de hardware e firmware para tais componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(4)
      name: Developer Configuration Management | Trusted Generation
      description: Require the developer of the system, system component, or system
        service to employ tools for comparing newly generated versions of security-relevant
        hardware descriptions, source code, and object code with previous versions.
      annotation: The trusted generation of descriptions, source code, and object
        code addresses authorized changes to hardware, software, and firmware components
        between versions during development. The focus is on the efficacy of the configuration
        management process by the developer to ensure that newly generated versions
        of security-relevant hardware descriptions, source code, and object code continue
        to enforce the security policy for the system, system component, or system
        service. In contrast, SA-10(1) and SA-10(3) allow organizations to detect
        unauthorized changes to hardware, software, and firmware components using
        tools, techniques, or mechanisms provided by developers.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Gera\xE7\xE3o\
            \ Confi\xE1vel"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema empregue ferramentas para comparar vers\xF5\
            es rec\xE9m-geradas de descri\xE7\xF5es de hardware, c\xF3digo-fonte e\
            \ c\xF3digo-objeto relevantes para a seguran\xE7a com vers\xF5es anteriores."
          annotation: "A gera\xE7\xE3o confi\xE1vel de descri\xE7\xF5es, c\xF3digo-fonte\
            \ e c\xF3digo-objeto aborda as altera\xE7\xF5es autorizadas em componentes\
            \ de hardware, software e firmware entre vers\xF5es durante o desenvolvimento.\
            \ O foco est\xE1 na efic\xE1cia do processo de gest\xE3o de configura\xE7\
            \xE3o pelo desenvolvedor para garantir que as vers\xF5es rec\xE9m-geradas\
            \ de descri\xE7\xF5es de hardware, c\xF3digo-fonte e c\xF3digo-objeto\
            \ relevantes para a seguran\xE7a continuem a impor a pol\xEDtica de seguran\xE7\
            a para o sistema, componente de sistema ou servi\xE7o de sistema. Em contraste,\
            \ o SA-10(1) e o SA-10(3) permitem que as organiza\xE7\xF5es detectem\
            \ altera\xE7\xF5es n\xE3o autorizadas em componentes de hardware, software\
            \ e firmware utilizando ferramentas, t\xE9cnicas ou mecanismos fornecidos\
            \ pelos desenvolvedores."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(5)
      name: Developer Configuration Management | Mapping Integrity for Version Control
      description: Require the developer of the system, system component, or system
        service to maintain the integrity of the mapping between the master build
        data describing the current version of security-relevant hardware, software,
        and firmware and the on-site master copy of the data for the current version.
      annotation: Mapping integrity for version control addresses changes to hardware,
        software, and firmware components during both initial development and system
        development life cycle updates. Maintaining the integrity between the master
        copies of security-relevant hardware, software, and firmware (including designs,
        hardware drawings, source code) and the equivalent data in master copies in
        operational environments is essential to ensuring the availability of organizational
        systems that support critical mission and business functions.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Integridade do\
            \ Mapeamento para Controle de Vers\xE3o"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema mantenha a integridade do mapeamento entre\
            \ os dados-mestre de compila\xE7\xE3o que descrevem a vers\xE3o atual\
            \ do hardware, software e firmware relevantes para a seguran\xE7a e a\
            \ c\xF3pia-mestre local dos dados da vers\xE3o atual."
          annotation: "A integridade do mapeamento para controle de vers\xE3o aborda\
            \ as altera\xE7\xF5es em componentes de hardware, software e firmware\
            \ tanto durante o desenvolvimento inicial quanto nas atualiza\xE7\xF5\
            es do ciclo de vida de desenvolvimento do sistema. Manter a integridade\
            \ entre as c\xF3pias-mestre do hardware, software e firmware relevantes\
            \ para a seguran\xE7a (incluindo designs, desenhos de hardware, c\xF3\
            digo-fonte) e os dados equivalentes nas c\xF3pias-mestre em ambientes\
            \ operacionais \xE9 essencial para garantir a disponibilidade dos sistemas\
            \ organizacionais que apoiam fun\xE7\xF5es cr\xEDticas de miss\xE3o e\
            \ neg\xF3cio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(6)
      name: Developer Configuration Management | Trusted Distribution
      description: Require the developer of the system, system component, or system
        service to execute procedures for ensuring that security-relevant hardware,
        software, and firmware updates distributed to the organization are exactly
        as specified by the master copies.
      annotation: The trusted distribution of security-relevant hardware, software,
        and firmware updates help to ensure that the updates are correct representations
        of the master copies maintained by the developer and have not been tampered
        with during distribution.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Distribui\xE7\xE3\
            o Confi\xE1vel"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema execute procedimentos para garantir que as\
            \ atualiza\xE7\xF5es de hardware, software e firmware relevantes para\
            \ a seguran\xE7a distribu\xEDdas \xE0 organiza\xE7\xE3o sejam exatamente\
            \ como especificado pelas c\xF3pias-mestre."
          annotation: "A distribui\xE7\xE3o confi\xE1vel de atualiza\xE7\xF5es de\
            \ hardware, software e firmware relevantes para a seguran\xE7a ajuda a\
            \ garantir que as atualiza\xE7\xF5es sejam representa\xE7\xF5es corretas\
            \ das c\xF3pias-mestre mantidas pelo desenvolvedor e n\xE3o tenham sido\
            \ adulteradas durante a distribui\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-10(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-10(7)
      name: Developer Configuration Management | Security and Privacy Representatives
      description: 'Require [Assignment: organization-defined security and privacy
        representatives] to be included in the [Assignment: organization-defined configuration
        change management and control process].'
      annotation: Information security and privacy representatives can include system
        security officers, senior agency information security officers, senior agency
        officials for privacy, and system privacy officers. Representation by personnel
        with information security and privacy expertise is important because changes
        to system configurations can have unintended side effects, some of which may
        be security- or privacy-relevant. Detecting such changes early in the process
        can help avoid unintended, negative consequences that could ultimately affect
        the security and privacy posture of systems. The configuration change management
        and control process in this control enhancement refers to the change management
        and control process defined by organizations in SA-10b.
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o do Desenvolvedor | Representantes\
            \ de Seguran\xE7a e Privacidade"
          description: "Exigir que [Atribui\xE7\xE3o: representantes de seguran\xE7\
            a e privacidade definidos pela organiza\xE7\xE3o] sejam inclu\xEDdos no\
            \ [Atribui\xE7\xE3o: processo de gest\xE3o e controle de mudan\xE7as de\
            \ configura\xE7\xE3o definido pela organiza\xE7\xE3o]."
          annotation: "Os representantes de seguran\xE7a da informa\xE7\xE3o e privacidade\
            \ podem incluir oficiais de seguran\xE7a de sistema, oficiais seniores\
            \ de seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, oficiais seniores\
            \ da ag\xEAncia para privacidade e oficiais de privacidade de sistema.\
            \ A representa\xE7\xE3o por pessoal com expertise em seguran\xE7a da informa\xE7\
            \xE3o e privacidade \xE9 importante porque as altera\xE7\xF5es nas configura\xE7\
            \xF5es do sistema podem ter efeitos colaterais n\xE3o intencionais, alguns\
            \ dos quais podem ser relevantes para a seguran\xE7a ou a privacidade.\
            \ Detectar tais altera\xE7\xF5es no in\xEDcio do processo pode ajudar\
            \ a evitar consequ\xEAncias negativas n\xE3o intencionais que, em \xFA\
            ltima an\xE1lise, poderiam afetar a postura de seguran\xE7a e privacidade\
            \ dos sistemas. O processo de gest\xE3o e controle de mudan\xE7as de configura\xE7\
            \xE3o neste aprimoramento de controle refere-se ao processo de gest\xE3\
            o e controle de mudan\xE7as definido pelas organiza\xE7\xF5es no SA-10b."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11
      name: Developer Testing and Evaluation
      description: 'Require the developer of the system, system component, or system
        service, at all post-design stages of the system development life cycle, to:

        a. Develop and implement a plan for ongoing security and privacy control assessments;

        b. Perform [Selection (one or more): unit; integration; system; regression]
        testing/evaluation [Assignment: organization-defined frequency] at [Assignment:
        organization-defined depth and coverage];

        c. Produce evidence of the execution of the assessment plan and the results
        of the testing and evaluation;

        d. Implement a verifiable flaw remediation process; and

        e. Correct flaws identified during testing and evaluation.'
      annotation: "Developmental testing and evaluation confirms that the required\
        \ controls are implemented correctly, operating as intended, enforcing the\
        \ desired security and privacy policies, and meeting established security\
        \ and privacy requirements. Security properties of systems and the privacy\
        \ of individuals may be affected by the interconnection of system components\
        \ or changes to those components. The interconnections or changes\u2014including\
        \ upgrading or replacing applications, operating systems, and firmware\u2014\
        may adversely affect previously implemented controls. Ongoing assessment during\
        \ development allows for additional types of testing and evaluation that developers\
        \ can conduct to reduce or eliminate potential flaws. Testing custom software\
        \ applications may require approaches such as manual code review, security\
        \ architecture review, and penetration testing, as well as and static analysis,\
        \ dynamic analysis, binary analysis, or a hybrid of the three analysis approaches.\n\
        Developers can use the analysis approaches, along with security instrumentation\
        \ and fuzzing, in a variety of tools and in source code reviews. The security\
        \ and privacy assessment plans include the specific activities that developers\
        \ plan to carry out, including the types of analyses, testing, evaluation,\
        \ and reviews of software and firmware components; the degree of rigor to\
        \ be applied; the frequency of the ongoing testing and evaluation; and the\
        \ types of artifacts produced during those processes. The depth of testing\
        \ and evaluation refers to the rigor and level of detail associated with the\
        \ assessment process. The coverage of testing and evaluation refers to the\
        \ scope (i.e., number and type) of the artifacts included in the assessment\
        \ process. Contracts specify the acceptance criteria for security and privacy\
        \ assessment plans, flaw remediation processes, and the evidence that the\
        \ plans and processes have been diligently applied. Methods for reviewing\
        \ and protecting assessment plans, evidence, and documentation are commensurate\
        \ with the security category or classification level of the system. Contracts\
        \ may specify protection requirements for documentation."
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema, em todas as etapas p\xF3s-projeto do ciclo\
            \ de vida de desenvolvimento do sistema:\na. Desenvolva e implemente um\
            \ plano para avalia\xE7\xF5es cont\xEDnuas dos controles de seguran\xE7\
            a e privacidade;\nb. Realize testes/avalia\xE7\xE3o de [Sele\xE7\xE3o\
            \ (um ou mais): unidade; integra\xE7\xE3o; sistema; regress\xE3o] [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] com [Atribui\xE7\
            \xE3o: profundidade e cobertura definidas pela organiza\xE7\xE3o];\nc.\
            \ Produza evid\xEAncia da execu\xE7\xE3o do plano de avalia\xE7\xE3o e\
            \ dos resultados dos testes e da avalia\xE7\xE3o;\nd. Implemente um processo\
            \ verific\xE1vel de remedia\xE7\xE3o de falhas; e\ne. Corrija as falhas\
            \ identificadas durante os testes e a avalia\xE7\xE3o."
          annotation: "Os testes e a avalia\xE7\xE3o durante o desenvolvimento confirmam\
            \ que os controles exigidos est\xE3o implementados corretamente, operando\
            \ conforme o pretendido, aplicando as pol\xEDticas de seguran\xE7a e privacidade\
            \ desejadas e atendendo aos requisitos de seguran\xE7a e privacidade estabelecidos.\
            \ As propriedades de seguran\xE7a dos sistemas e a privacidade dos indiv\xED\
            duos podem ser afetadas pela interconex\xE3o de componentes de sistema\
            \ ou por altera\xE7\xF5es nesses componentes. As interconex\xF5es ou altera\xE7\
            \xF5es \u2014 incluindo a atualiza\xE7\xE3o ou substitui\xE7\xE3o de aplica\xE7\
            \xF5es, sistemas operacionais e firmware \u2014 podem afetar adversamente\
            \ controles previamente implementados. A avalia\xE7\xE3o cont\xEDnua durante\
            \ o desenvolvimento permite tipos adicionais de testes e avalia\xE7\xE3\
            o que os desenvolvedores podem conduzir para reduzir ou eliminar potenciais\
            \ falhas. Testar aplica\xE7\xF5es de software personalizadas pode exigir\
            \ abordagens como revis\xE3o manual de c\xF3digo, revis\xE3o da arquitetura\
            \ de seguran\xE7a e teste de invas\xE3o, bem como an\xE1lise est\xE1tica,\
            \ an\xE1lise din\xE2mica, an\xE1lise de bin\xE1rios ou uma combina\xE7\
            \xE3o h\xEDbrida das tr\xEAs abordagens de an\xE1lise.\nOs desenvolvedores\
            \ podem usar as abordagens de an\xE1lise, juntamente com instrumenta\xE7\
            \xE3o de seguran\xE7a e fuzzing, em uma variedade de ferramentas e em\
            \ revis\xF5es de c\xF3digo-fonte. Os planos de avalia\xE7\xE3o de seguran\xE7\
            a e privacidade incluem as atividades espec\xEDficas que os desenvolvedores\
            \ planejam realizar, incluindo os tipos de an\xE1lises, testes, avalia\xE7\
            \xE3o e revis\xF5es dos componentes de software e firmware; o grau de\
            \ rigor a ser aplicado; a frequ\xEAncia dos testes e da avalia\xE7\xE3\
            o cont\xEDnuos; e os tipos de artefatos produzidos durante esses processos.\
            \ A profundidade dos testes e da avalia\xE7\xE3o refere-se ao rigor e\
            \ ao n\xEDvel de detalhe associados ao processo de avalia\xE7\xE3o. A\
            \ cobertura dos testes e da avalia\xE7\xE3o refere-se ao escopo (ou seja,\
            \ n\xFAmero e tipo) dos artefatos inclu\xEDdos no processo de avalia\xE7\
            \xE3o. Os contratos especificam os crit\xE9rios de aceita\xE7\xE3o para\
            \ os planos de avalia\xE7\xE3o de seguran\xE7a e privacidade, os processos\
            \ de remedia\xE7\xE3o de falhas e a evid\xEAncia de que os planos e processos\
            \ foram aplicados diligentemente. Os m\xE9todos para revisar e proteger\
            \ planos de avalia\xE7\xE3o, evid\xEAncias e documenta\xE7\xE3o s\xE3\
            o proporcionais \xE0 categoria de seguran\xE7a ou ao n\xEDvel de classifica\xE7\
            \xE3o do sistema. Os contratos podem especificar requisitos de prote\xE7\
            \xE3o para a documenta\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(1)
      name: Developer Testing and Evaluation | Static Code Analysis
      description: Require the developer of the system, system component, or system
        service to employ static code analysis tools to identify common flaws and
        document the results of the analysis.
      annotation: Static code analysis provides a technology and methodology for security
        reviews and includes checking for weaknesses in the code as well as for the
        incorporation of libraries or other included code with known vulnerabilities
        or that are out-of-date and not supported. Static code analysis can be used
        to identify vulnerabilities and enforce secure coding practices. It is most
        effective when used early in the development process, when each code change
        can automatically be scanned for potential weaknesses. Static code analysis
        can provide clear remediation guidance and identify defects for developers
        to fix. Evidence of the correct implementation of static analysis can include
        aggregate defect density for critical defect types, evidence that defects
        were inspected by developers or security professionals, and evidence that
        defects were remediated. A high density of ignored findings, commonly referred
        to as false positives, indicates a potential problem with the analysis process
        or the analysis tool. In such cases, organizations weigh the validity of the
        evidence against evidence from other sources.
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | An\xE1lise Est\xE1\
            tica de C\xF3digo"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema empregue ferramentas de an\xE1lise est\xE1\
            tica de c\xF3digo para identificar falhas comuns e documentar os resultados\
            \ da an\xE1lise."
          annotation: "A an\xE1lise est\xE1tica de c\xF3digo fornece uma tecnologia\
            \ e metodologia para revis\xF5es de seguran\xE7a e inclui a verifica\xE7\
            \xE3o de fraquezas no c\xF3digo, bem como a incorpora\xE7\xE3o de bibliotecas\
            \ ou outro c\xF3digo inclu\xEDdo com vulnerabilidades conhecidas ou que\
            \ estejam desatualizados e sem suporte. A an\xE1lise est\xE1tica de c\xF3\
            digo pode ser usada para identificar vulnerabilidades e aplicar pr\xE1\
            ticas de codifica\xE7\xE3o segura. Ela \xE9 mais eficaz quando usada no\
            \ in\xEDcio do processo de desenvolvimento, quando cada altera\xE7\xE3\
            o de c\xF3digo pode ser automaticamente verificada em busca de potenciais\
            \ fraquezas. A an\xE1lise est\xE1tica de c\xF3digo pode fornecer orienta\xE7\
            \xF5es claras de remedia\xE7\xE3o e identificar defeitos para que os desenvolvedores\
            \ os corrijam. A evid\xEAncia da implementa\xE7\xE3o correta da an\xE1\
            lise est\xE1tica pode incluir a densidade agregada de defeitos para tipos\
            \ cr\xEDticos de defeitos, evid\xEAncia de que os defeitos foram inspecionados\
            \ por desenvolvedores ou profissionais de seguran\xE7a e evid\xEAncia\
            \ de que os defeitos foram remediados. Uma alta densidade de achados ignorados,\
            \ comumente chamados de falsos positivos, indica um poss\xEDvel problema\
            \ com o processo de an\xE1lise ou com a ferramenta de an\xE1lise. Nesses\
            \ casos, as organiza\xE7\xF5es ponderam a validade da evid\xEAncia em\
            \ rela\xE7\xE3o a evid\xEAncias de outras fontes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(2)
      name: Developer Testing and Evaluation | Threat Modeling and Vulnerability Analyses
      description: "Require the developer of the system, system component, or system\
        \ service to perform threat modeling and vulnerability analyses during development\
        \ and the subsequent testing and evaluation of the system, component, or service\
        \ that: \n(a) Uses the following contextual information: [Assignment: organization-defined\
        \ information concerning impact, environment of operations, known or assumed\
        \ threats, and acceptable risk levels];\n(b) Employs the following tools and\
        \ methods: [Assignment: organization-defined tools and methods];\n(c) Conducts\
        \ the modeling and analyses at the following level of rigor: [Assignment:\
        \ organization-defined breadth and depth of modeling and analyses]; and\n\
        (d) Produces evidence that meets the following acceptance criteria: [Assignment:\
        \ organization-defined acceptance criteria]."
      annotation: Systems, system components, and system services may deviate significantly
        from the functional and design specifications created during the requirements
        and design stages of the system development life cycle. Therefore, updates
        to threat modeling and vulnerability analyses of those systems, system components,
        and system services during development and prior to delivery are critical
        to the effective operation of those systems, components, and services. Threat
        modeling and vulnerability analyses at this stage of the system development
        life cycle ensure that design and implementation changes have been accounted
        for and that vulnerabilities created because of those changes have been reviewed
        and mitigated.
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Modelagem de Amea\xE7\
            as e An\xE1lises de Vulnerabilidade"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema realize modelagem de amea\xE7as e an\xE1lises\
            \ de vulnerabilidade durante o desenvolvimento e os subsequentes testes\
            \ e avalia\xE7\xE3o do sistema, componente ou servi\xE7o, que:\n(a) Use\
            \ as seguintes informa\xE7\xF5es contextuais: [Atribui\xE7\xE3o: informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o sobre impacto, ambiente de opera\xE7\
            \xF5es, amea\xE7as conhecidas ou presumidas e n\xEDveis aceit\xE1veis\
            \ de risco];\n(b) Empregue as seguintes ferramentas e m\xE9todos: [Atribui\xE7\
            \xE3o: ferramentas e m\xE9todos definidos pela organiza\xE7\xE3o];\n(c)\
            \ Conduza a modelagem e as an\xE1lises no seguinte n\xEDvel de rigor:\
            \ [Atribui\xE7\xE3o: abrang\xEAncia e profundidade da modelagem e das\
            \ an\xE1lises definidas pela organiza\xE7\xE3o]; e\n(d) Produza evid\xEA\
            ncia que atenda aos seguintes crit\xE9rios de aceita\xE7\xE3o: [Atribui\xE7\
            \xE3o: crit\xE9rios de aceita\xE7\xE3o definidos pela organiza\xE7\xE3\
            o]."
          annotation: "Sistemas, componentes de sistema e servi\xE7os de sistema podem\
            \ desviar-se significativamente das especifica\xE7\xF5es funcionais e\
            \ de projeto criadas durante as etapas de requisitos e projeto do ciclo\
            \ de vida de desenvolvimento do sistema. Portanto, as atualiza\xE7\xF5\
            es da modelagem de amea\xE7as e das an\xE1lises de vulnerabilidade desses\
            \ sistemas, componentes de sistema e servi\xE7os de sistema durante o\
            \ desenvolvimento e antes da entrega s\xE3o cr\xEDticas para a opera\xE7\
            \xE3o eficaz desses sistemas, componentes e servi\xE7os. A modelagem de\
            \ amea\xE7as e as an\xE1lises de vulnerabilidade nesta etapa do ciclo\
            \ de vida de desenvolvimento do sistema garantem que as altera\xE7\xF5\
            es de projeto e implementa\xE7\xE3o foram consideradas e que as vulnerabilidades\
            \ criadas em raz\xE3o dessas altera\xE7\xF5es foram revisadas e mitigadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(3)
      name: Developer Testing and Evaluation | Independent Verification of Assessment
        Plans and Evidence
      description: '(a) Require an independent agent satisfying [Assignment: organization-defined
        independence criteria] to verify the correct implementation of the developer
        security and privacy assessment plans and the evidence produced during testing
        and evaluation; and

        (b) Verify that the independent agent is provided with sufficient information
        to complete the verification process or granted the authority to obtain such
        information.'
      annotation: "Independent agents have the qualifications\u2014including the expertise,\
        \ skills, training, certifications, and experience\u2014to verify the correct\
        \ implementation of developer security and privacy assessment plans."
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Verifica\xE7\xE3o Independente\
            \ de Planos de Avalia\xE7\xE3o e Evid\xEAncias"
          description: "(a) Exigir que um agente independente que satisfa\xE7a [Atribui\xE7\
            \xE3o: crit\xE9rios de independ\xEAncia definidos pela organiza\xE7\xE3\
            o] verifique a implementa\xE7\xE3o correta dos planos de avalia\xE7\xE3\
            o de seguran\xE7a e privacidade do desenvolvedor e a evid\xEAncia produzida\
            \ durante os testes e a avalia\xE7\xE3o; e\n(b) Verificar se o agente\
            \ independente recebe informa\xE7\xF5es suficientes para concluir o processo\
            \ de verifica\xE7\xE3o ou se lhe \xE9 concedida autoridade para obter\
            \ tais informa\xE7\xF5es."
          annotation: "Os agentes independentes possuem as qualifica\xE7\xF5es \u2014\
            \ incluindo a especializa\xE7\xE3o, as compet\xEAncias, o treinamento,\
            \ as certifica\xE7\xF5es e a experi\xEAncia \u2014 para verificar a implementa\xE7\
            \xE3o correta dos planos de avalia\xE7\xE3o de seguran\xE7a e privacidade\
            \ do desenvolvedor."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(4)
      name: Developer Testing and Evaluation | Manual Code Reviews
      description: 'Require the developer of the system, system component, or system
        service to perform a manual code review of [Assignment: organization-defined
        specific code] using the following processes, procedures, and/or techniques:
        [Assignment: organization-defined processes, procedures, and/or techniques].'
      annotation: "Manual code reviews are usually reserved for the critical software\
        \ and firmware components of systems. Manual code reviews are effective at\
        \ identifying weaknesses that require knowledge of the application\u2019s\
        \ requirements or context that, in most cases, is unavailable to automated\
        \ analytic tools and techniques, such as static and dynamic analysis. The\
        \ benefits of manual code review include the ability to verify access control\
        \ matrices against application controls and review detailed aspects of cryptographic\
        \ implementations and controls."
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Revis\xF5es Manuais\
            \ de C\xF3digo"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema realize uma revis\xE3o manual de c\xF3digo\
            \ de [Atribui\xE7\xE3o: c\xF3digo espec\xEDfico definido pela organiza\xE7\
            \xE3o] usando os seguintes processos, procedimentos e/ou t\xE9cnicas:\
            \ [Atribui\xE7\xE3o: processos, procedimentos e/ou t\xE9cnicas definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "As revis\xF5es manuais de c\xF3digo geralmente s\xE3o reservadas\
            \ para os componentes cr\xEDticos de software e firmware dos sistemas.\
            \ As revis\xF5es manuais de c\xF3digo s\xE3o eficazes na identifica\xE7\
            \xE3o de fraquezas que exigem conhecimento dos requisitos ou do contexto\
            \ da aplica\xE7\xE3o que, na maioria dos casos, n\xE3o est\xE1 dispon\xED\
            vel para ferramentas e t\xE9cnicas anal\xEDticas automatizadas, como an\xE1\
            lise est\xE1tica e din\xE2mica. Os benef\xEDcios da revis\xE3o manual\
            \ de c\xF3digo incluem a capacidade de verificar matrizes de controle\
            \ de acesso em rela\xE7\xE3o aos controles da aplica\xE7\xE3o e revisar\
            \ aspectos detalhados das implementa\xE7\xF5es e controles criptogr\xE1\
            ficos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(5)
      name: Developer Testing and Evaluation | Penetration Testing
      description: 'Require the developer of the system, system component, or system
        service to perform penetration testing:

        (a) At the following level of rigor: [Assignment: organization-defined breadth
        and depth of testing]; and

        (b) Under the following constraints: [Assignment: organization-defined constraints].'
      annotation: Penetration testing is an assessment methodology in which assessors,
        using all available information technology product or system documentation
        and working under specific constraints, attempt to circumvent the implemented
        security and privacy features of information technology products and systems.
        Useful information for assessors who conduct penetration testing includes
        product and system design specifications, source code, and administrator and
        operator manuals. Penetration testing can include white-box, gray-box, or
        black-box testing with analyses performed by skilled professionals who simulate
        adversary actions. The objective of penetration testing is to discover vulnerabilities
        in systems, system components, and services that result from implementation
        errors, configuration faults, or other operational weaknesses or deficiencies.
        Penetration tests can be performed in conjunction with automated and manual
        code reviews to provide a greater level of analysis than would ordinarily
        be possible. When user session information and other personally identifiable
        information is captured or recorded during penetration testing, such information
        is handled appropriately to protect privacy.
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Teste de Invas\xE3o"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema realize teste de invas\xE3o:\n(a) No seguinte\
            \ n\xEDvel de rigor: [Atribui\xE7\xE3o: abrang\xEAncia e profundidade\
            \ do teste definidas pela organiza\xE7\xE3o]; e\n(b) Sob as seguintes\
            \ restri\xE7\xF5es: [Atribui\xE7\xE3o: restri\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o]."
          annotation: "O teste de invas\xE3o \xE9 uma metodologia de avalia\xE7\xE3\
            o na qual os avaliadores, usando toda a documenta\xE7\xE3o dispon\xED\
            vel do produto ou sistema de tecnologia da informa\xE7\xE3o e trabalhando\
            \ sob restri\xE7\xF5es espec\xEDficas, tentam contornar os recursos de\
            \ seguran\xE7a e privacidade implementados de produtos e sistemas de tecnologia\
            \ da informa\xE7\xE3o. Informa\xE7\xF5es \xFAteis para os avaliadores\
            \ que conduzem testes de invas\xE3o incluem especifica\xE7\xF5es de projeto\
            \ do produto e do sistema, c\xF3digo-fonte e manuais de administrador\
            \ e operador. O teste de invas\xE3o pode incluir testes de caixa-branca,\
            \ caixa-cinza ou caixa-preta, com an\xE1lises realizadas por profissionais\
            \ qualificados que simulam a\xE7\xF5es advers\xE1rias. O objetivo do teste\
            \ de invas\xE3o \xE9 descobrir vulnerabilidades em sistemas, componentes\
            \ de sistema e servi\xE7os que resultem de erros de implementa\xE7\xE3\
            o, falhas de configura\xE7\xE3o ou outras fraquezas ou defici\xEAncias\
            \ operacionais. Os testes de invas\xE3o podem ser realizados em conjunto\
            \ com revis\xF5es de c\xF3digo automatizadas e manuais para fornecer um\
            \ n\xEDvel de an\xE1lise maior do que normalmente seria poss\xEDvel. Quando\
            \ informa\xE7\xF5es de sess\xE3o de usu\xE1rio e outras informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal s\xE3o capturadas ou registradas durante\
            \ o teste de invas\xE3o, tais informa\xE7\xF5es s\xE3o tratadas de forma\
            \ adequada para proteger a privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(6)
      name: Developer Testing and Evaluation | Attack Surface Reviews
      description: Require the developer of the system, system component, or system
        service to perform attack surface reviews.
      annotation: Attack surfaces of systems and system components are exposed areas
        that make those systems more vulnerable to attacks. Attack surfaces include
        any accessible areas where weaknesses or deficiencies in the hardware, software,
        and firmware components provide opportunities for adversaries to exploit vulnerabilities.
        Attack surface reviews ensure that developers analyze the design and implementation
        changes to systems and mitigate attack vectors generated as a result of the
        changes. The correction of identified flaws includes deprecation of unsafe
        functions.
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Revis\xF5es da Superf\xED\
            cie de Ataque"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema realize revis\xF5es da superf\xEDcie de ataque."
          annotation: "As superf\xEDcies de ataque de sistemas e componentes de sistema\
            \ s\xE3o \xE1reas expostas que tornam esses sistemas mais vulner\xE1veis\
            \ a ataques. As superf\xEDcies de ataque incluem quaisquer \xE1reas acess\xED\
            veis onde fraquezas ou defici\xEAncias nos componentes de hardware, software\
            \ e firmware fornecem oportunidades para advers\xE1rios explorarem vulnerabilidades.\
            \ As revis\xF5es da superf\xEDcie de ataque garantem que os desenvolvedores\
            \ analisem as altera\xE7\xF5es de projeto e implementa\xE7\xE3o dos sistemas\
            \ e mitiguem os vetores de ataque gerados em decorr\xEAncia dessas altera\xE7\
            \xF5es. A corre\xE7\xE3o de falhas identificadas inclui a descontinua\xE7\
            \xE3o de fun\xE7\xF5es inseguras."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(7)
      name: Developer Testing and Evaluation | Verify Scope of Testing and Evaluation
      description: 'Require the developer of the system, system component, or system
        service to verify that the scope of testing and evaluation provides complete
        coverage of the required controls at the following level of rigor: [Assignment:
        organization-defined breadth and depth of testing and evaluation].'
      annotation: Verifying that testing and evaluation provides complete coverage
        of required controls can be accomplished by a variety of analytic techniques
        ranging from informal to formal. Each of these techniques provides an increasing
        level of assurance that corresponds to the degree of formality of the analysis.
        Rigorously demonstrating control coverage at the highest levels of assurance
        can be achieved using formal modeling and analysis techniques, including correlation
        between control implementation and corresponding test cases.
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Verificar o Escopo\
            \ dos Testes e da Avalia\xE7\xE3o"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema verifique se o escopo dos testes e da avalia\xE7\
            \xE3o fornece cobertura completa dos controles exigidos no seguinte n\xED\
            vel de rigor: [Atribui\xE7\xE3o: abrang\xEAncia e profundidade dos testes\
            \ e da avalia\xE7\xE3o definidas pela organiza\xE7\xE3o]."
          annotation: "A verifica\xE7\xE3o de que os testes e a avalia\xE7\xE3o fornecem\
            \ cobertura completa dos controles exigidos pode ser realizada por uma\
            \ variedade de t\xE9cnicas anal\xEDticas que v\xE3o de informais a formais.\
            \ Cada uma dessas t\xE9cnicas fornece um n\xEDvel crescente de garantia\
            \ que corresponde ao grau de formalidade da an\xE1lise. A demonstra\xE7\
            \xE3o rigorosa da cobertura dos controles nos mais altos n\xEDveis de\
            \ garantia pode ser alcan\xE7ada usando t\xE9cnicas formais de modelagem\
            \ e an\xE1lise, incluindo a correla\xE7\xE3o entre a implementa\xE7\xE3\
            o do controle e os casos de teste correspondentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(8)
      name: Developer Testing and Evaluation | Dynamic Code Analysis
      description: Require the developer of the system, system component, or system
        service to employ dynamic code analysis tools to identify common flaws and
        document the results of the analysis.
      annotation: Dynamic code analysis provides runtime verification of software
        programs using tools capable of monitoring programs for memory corruption,
        user privilege issues, and other potential security problems. Dynamic code
        analysis employs runtime tools to ensure that security functionality performs
        in the way it was designed. A type of dynamic analysis, known as fuzz testing,
        induces program failures by deliberately introducing malformed or random data
        into software programs. Fuzz testing strategies are derived from the intended
        use of applications and the functional and design specifications for the applications.
        To understand the scope of dynamic code analysis and the assurance provided,
        organizations may also consider conducting code coverage analysis (i.e., checking
        the degree to which the code has been tested using metrics such as percent
        of subroutines tested or percent of program statements called during execution
        of the test suite) and/or concordance analysis (i.e., checking for words that
        are out of place in software code, such as non-English language words or derogatory
        terms).
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | An\xE1lise Din\xE2\
            mica de C\xF3digo"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema empregue ferramentas de an\xE1lise din\xE2\
            mica de c\xF3digo para identificar falhas comuns e documentar os resultados\
            \ da an\xE1lise."
          annotation: "A an\xE1lise din\xE2mica de c\xF3digo fornece verifica\xE7\xE3\
            o em tempo de execu\xE7\xE3o de programas de software usando ferramentas\
            \ capazes de monitorar programas em busca de corrup\xE7\xE3o de mem\xF3\
            ria, problemas de privil\xE9gio de usu\xE1rio e outros poss\xEDveis problemas\
            \ de seguran\xE7a. A an\xE1lise din\xE2mica de c\xF3digo emprega ferramentas\
            \ de tempo de execu\xE7\xE3o para garantir que a funcionalidade de seguran\xE7\
            a opere da maneira como foi projetada. Um tipo de an\xE1lise din\xE2mica,\
            \ conhecido como teste de fuzz (fuzz testing), induz falhas de programa\
            \ introduzindo deliberadamente dados malformados ou aleat\xF3rios em programas\
            \ de software. As estrat\xE9gias de teste de fuzz derivam do uso pretendido\
            \ das aplica\xE7\xF5es e das especifica\xE7\xF5es funcionais e de projeto\
            \ das aplica\xE7\xF5es. Para entender o escopo da an\xE1lise din\xE2mica\
            \ de c\xF3digo e a garantia fornecida, as organiza\xE7\xF5es tamb\xE9\
            m podem considerar a realiza\xE7\xE3o de an\xE1lise de cobertura de c\xF3\
            digo (ou seja, verificar o grau em que o c\xF3digo foi testado usando\
            \ m\xE9tricas como porcentagem de sub-rotinas testadas ou porcentagem\
            \ de instru\xE7\xF5es de programa chamadas durante a execu\xE7\xE3o do\
            \ conjunto de testes) e/ou an\xE1lise de concord\xE2ncia (ou seja, verificar\
            \ palavras que estejam fora de lugar no c\xF3digo de software, como palavras\
            \ em idioma n\xE3o ingl\xEAs ou termos depreciativos)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-11(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-11(9)
      name: Developer Testing and Evaluation | Interactive Application Security Testing
      description: Require the developer of the system, system component, or system
        service to employ interactive application security testing tools to identify
        flaws and document the results.
      annotation: Interactive (also known as instrumentation-based) application security
        testing is a method of detecting vulnerabilities by observing applications
        as they run during testing. The use of instrumentation relies on direct measurements
        of the actual running applications and uses access to the code, user interaction,
        libraries, frameworks, backend connections, and configurations to directly
        measure control effectiveness. When combined with analysis techniques, interactive
        application security testing can identify a broad range of potential vulnerabilities
        and confirm control effectiveness. Instrumentation-based testing works in
        real time and can be used continuously throughout the system development life
        cycle.
      translations:
        pt:
          name: "Testes e Avalia\xE7\xE3o pelo Desenvolvedor | Teste Interativo de\
            \ Seguran\xE7a de Aplica\xE7\xF5es"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema empregue ferramentas de teste interativo de\
            \ seguran\xE7a de aplica\xE7\xF5es para identificar falhas e documentar\
            \ os resultados."
          annotation: "O teste interativo de seguran\xE7a de aplica\xE7\xF5es (tamb\xE9\
            m conhecido como baseado em instrumenta\xE7\xE3o) \xE9 um m\xE9todo de\
            \ detec\xE7\xE3o de vulnerabilidades que observa as aplica\xE7\xF5es enquanto\
            \ elas s\xE3o executadas durante os testes. O uso de instrumenta\xE7\xE3\
            o baseia-se em medi\xE7\xF5es diretas das aplica\xE7\xF5es em execu\xE7\
            \xE3o reais e usa o acesso ao c\xF3digo, \xE0 intera\xE7\xE3o do usu\xE1\
            rio, \xE0s bibliotecas, aos frameworks, \xE0s conex\xF5es de backend e\
            \ \xE0s configura\xE7\xF5es para medir diretamente a efic\xE1cia dos controles.\
            \ Quando combinado com t\xE9cnicas de an\xE1lise, o teste interativo de\
            \ seguran\xE7a de aplica\xE7\xF5es pode identificar uma ampla gama de\
            \ potenciais vulnerabilidades e confirmar a efic\xE1cia dos controles.\
            \ O teste baseado em instrumenta\xE7\xE3o funciona em tempo real e pode\
            \ ser usado continuamente ao longo do ciclo de vida de desenvolvimento\
            \ do sistema."

    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(5)
      name: Identification and Authentication (organizational Users) | Individual
        Authentication with Group Authentication
      description: When shared accounts or authenticators are employed, require users
        to be individually authenticated before granting access to the shared accounts
        or resources.
      annotation: Individual authentication prior to shared group authentication mitigates
        the risk of using group accounts or authenticators.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Autentica\xE7\xE3o Individual com Autentica\xE7\xE3o de Grupo"
          description: "Quando contas ou autenticadores compartilhados forem empregados,\
            \ exigir que os usu\xE1rios sejam autenticados individualmente antes de\
            \ conceder acesso \xE0s contas ou aos recursos compartilhados."
          annotation: "A autentica\xE7\xE3o individual antes da autentica\xE7\xE3\
            o de grupo compartilhada mitiga o risco do uso de contas ou autenticadores\
            \ de grupo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(6)
      name: "Identification and Authentication (organizational Users) | Access to\
        \ Accounts \u2014separate Device"
      description: 'Implement multi-factor authentication for [Selection (one or more):
        local; network; remote] access to [Selection (one or more): privileged accounts;
        non-privileged accounts] such that:

        (a) One of the factors is provided by a device separate from the system gaining
        access; and

        (b) The device meets [Assignment: organization-defined strength of mechanism
        requirements].'
      annotation: The purpose of requiring a device that is separate from the system
        to which the user is attempting to gain access for one of the factors during
        multi-factor authentication is to reduce the likelihood of compromising authenticators
        or credentials stored on the system. Adversaries may be able to compromise
        such authenticators or credentials and subsequently impersonate authorized
        users. Implementing one of the factors on a separate device (e.g., a hardware
        token), provides a greater strength of mechanism and an increased level of
        assurance in the authentication process.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Acesso a Contas \u2014 Dispositivo Separado"
          description: "Implementar autentica\xE7\xE3o multifator para acesso [Sele\xE7\
            \xE3o (um ou mais): local; de rede; remoto] a [Sele\xE7\xE3o (um ou mais):\
            \ contas privilegiadas; contas n\xE3o privilegiadas] de modo que:\n(a)\
            \ Um dos fatores seja fornecido por um dispositivo separado do sistema\
            \ que est\xE1 obtendo o acesso; e\n(b) O dispositivo atenda aos [Atribui\xE7\
            \xE3o: requisitos de for\xE7a do mecanismo definidos pela organiza\xE7\
            \xE3o]."
          annotation: "O prop\xF3sito de exigir, para um dos fatores durante a autentica\xE7\
            \xE3o multifator, um dispositivo separado do sistema ao qual o usu\xE1\
            rio est\xE1 tentando obter acesso \xE9 reduzir a probabilidade de comprometimento\
            \ de autenticadores ou credenciais armazenados no sistema. Os advers\xE1\
            rios podem ser capazes de comprometer tais autenticadores ou credenciais\
            \ e, posteriormente, se passar por usu\xE1rios autorizados. Implementar\
            \ um dos fatores em um dispositivo separado (por exemplo, um token de\
            \ hardware) proporciona uma maior for\xE7a do mecanismo e um n\xEDvel\
            \ elevado de garantia no processo de autentica\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(4)
      name: Identification and Authentication (organizational Users) | Local Access
        to Non-privileged Accounts
      description: '[Withdrawn: Incorporated into IA-2(2).]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Acesso Local a Contas N\xE3o Privilegiadas"
          description: '[Retirado: Incorporado em IA-2(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(8)
      name: "Identification and Authentication (organizational Users) | Access to\
        \ Accounts \u2014 Replay Resistant"
      description: 'Implement replay-resistant authentication mechanisms for access
        to [Selection (one or more): privileged accounts; non-privileged accounts].'
      annotation: Authentication processes resist replay attacks if it is impractical
        to achieve successful authentications by replaying previous authentication
        messages. Replay-resistant techniques include protocols that use nonces or
        challenges such as time synchronous or cryptographic authenticators.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Acesso a Contas \u2014 Resistente a Repeti\xE7\xE3o (Replay)"
          description: "Implementar mecanismos de autentica\xE7\xE3o resistentes a\
            \ repeti\xE7\xE3o (replay) para acesso a [Sele\xE7\xE3o (um ou mais):\
            \ contas privilegiadas; contas n\xE3o privilegiadas]."
          annotation: "Os processos de autentica\xE7\xE3o resistem a ataques de repeti\xE7\
            \xE3o (replay) se for impratic\xE1vel obter autentica\xE7\xF5es bem-sucedidas\
            \ reproduzindo mensagens de autentica\xE7\xE3o anteriores. As t\xE9cnicas\
            \ resistentes a repeti\xE7\xE3o incluem protocolos que usam nonces ou\
            \ desafios, como autenticadores sincronizados no tempo ou criptogr\xE1\
            ficos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(7)
      name: "Identification and Authentication (organizational Users) | Network Access\
        \ to Non-privileged Accounts \u2014 Separate Device"
      description: '[Withdrawn: Incorporated into IA-2(6).]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Acesso de Rede a Contas N\xE3o Privilegiadas \u2014 Dispositivo Separado"
          description: '[Revogado: Incorporado em IA-2(6).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(10)
      name: Identification and Authentication (organizational Users) | Single Sign-on
      description: 'Provide a single sign-on capability for [Assignment: organization-defined
        system accounts and services].'
      annotation: Single sign-on enables users to log in once and gain access to multiple
        system resources. Organizations consider the operational efficiencies provided
        by single sign-on capabilities with the risk introduced by allowing access
        to multiple systems via a single authentication event. Single sign-on can
        present opportunities to improve system security, for example by providing
        the ability to add multi-factor authentication for applications and systems
        (existing and new) that may not be able to natively support multi-factor authentication.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Logon \xDAnico (Single Sign-on)"
          description: "Fornecer uma capacidade de logon \xFAnico (single sign-on)\
            \ para [Atribui\xE7\xE3o: contas e servi\xE7os de sistema definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "O logon \xFAnico (single sign-on) permite que os usu\xE1rios\
            \ efetuem login uma \xFAnica vez e obtenham acesso a m\xFAltiplos recursos\
            \ do sistema. As organiza\xE7\xF5es ponderam as efici\xEAncias operacionais\
            \ proporcionadas pelas capacidades de logon \xFAnico frente ao risco introduzido\
            \ ao permitir o acesso a m\xFAltiplos sistemas por meio de um \xFAnico\
            \ evento de autentica\xE7\xE3o. O logon \xFAnico pode apresentar oportunidades\
            \ para aprimorar a seguran\xE7a do sistema, por exemplo, ao fornecer a\
            \ capacidade de adicionar autentica\xE7\xE3o multifator a aplica\xE7\xF5\
            es e sistemas (existentes e novos) que talvez n\xE3o sejam capazes de\
            \ suportar nativamente a autentica\xE7\xE3o multifator."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(9)
      name: "Identification and Authentication (organizational Users) | Network Access\
        \ to Non-privileged Accounts \u2014 Replay Resistant"
      description: '[Withdrawn: Incorporated into IA-2(8).]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Acesso de Rede a Contas N\xE3o Privilegiadas \u2014 Resistente a Repeti\xE7\
            \xE3o (Replay)"
          description: '[Revogado: Incorporado em IA-2(8).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(12)
      name: Identification and Authentication (organizational Users) | Acceptance
        of PIV Credentials
      description: Accept and electronically verify Personal Identity Verification-compliant
        credentials.
      annotation: Acceptance of Personal Identity Verification (PIV)-compliant credentials
        applies to organizations implementing logical access control and physical
        access control systems. PIV-compliant credentials are those credentials issued
        by federal agencies that conform to FIPS Publication 201 and supporting guidance
        documents. The adequacy and reliability of PIV card issuers are authorized
        using SP 800-79-2. Acceptance of PIV-compliant credentials includes derived
        PIV credentials, the use of which is addressed in SP 800-166. The DOD Common
        Access Card (CAC) is an example of a PIV credential.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Aceita\xE7\xE3o de Credenciais PIV"
          description: "Aceitar e verificar eletronicamente credenciais compat\xED\
            veis com a Verifica\xE7\xE3o de Identidade Pessoal (PIV)."
          annotation: "A aceita\xE7\xE3o de credenciais compat\xEDveis com a Verifica\xE7\
            \xE3o de Identidade Pessoal (PIV) aplica-se a organiza\xE7\xF5es que implementam\
            \ sistemas de controle de acesso l\xF3gico e de controle de acesso f\xED\
            sico. As credenciais compat\xEDveis com PIV s\xE3o aquelas emitidas por\
            \ ag\xEAncias federais que est\xE3o em conformidade com a Publica\xE7\xE3\
            o FIPS 201 e com os documentos de orienta\xE7\xE3o de apoio. A adequa\xE7\
            \xE3o e a confiabilidade dos emissores de cart\xF5es PIV s\xE3o autorizadas\
            \ utilizando o SP 800-79-2. A aceita\xE7\xE3o de credenciais compat\xED\
            veis com PIV inclui as credenciais PIV derivadas, cujo uso \xE9 abordado\
            \ no SP 800-166. O Cart\xE3o de Acesso Comum (CAC) do Departamento de\
            \ Defesa dos EUA (DOD) \xE9 um exemplo de credencial PIV."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(13)
      name: Identification and Authentication (organizational Users) | Out-of-band
        Authentication
      description: 'Implement the following out-of-band authentication mechanisms
        under [Assignment: organization-defined conditions]: [Assignment: organization-defined
        out-of-band authentication].'
      annotation: "Out-of-band authentication refers to the use of two separate communication\
        \ paths to identify and authenticate users or devices to an information system.\
        \ The first path (i.e., the in-band path) is used to identify and authenticate\
        \ users or devices and is generally the path through which information flows.\
        \ The second path (i.e., the out-of-band path) is used to independently verify\
        \ the authentication and/or requested action. For example, a user authenticates\
        \ via a notebook computer to a remote server to which the user desires access\
        \ and requests some action of the server via that communication path. Subsequently,\
        \ the server contacts the user via the user\u2019s cell phone to verify that\
        \ the requested action originated from the user. The user may confirm the\
        \ intended action to an individual on the telephone or provide an authentication\
        \ code via the telephone. Out-of-band authentication can be used to mitigate\
        \ actual or suspected man-in the-middle attacks. The conditions or criteria\
        \ for activation include suspicious activities, new threat indicators, elevated\
        \ threat levels, or the impact or classification level of information in requested\
        \ transactions."
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Autentica\xE7\xE3o Fora de Banda (Out-of-band)"
          description: "Implementar os seguintes mecanismos de autentica\xE7\xE3o\
            \ fora de banda (out-of-band) sob [Atribui\xE7\xE3o: condi\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: autentica\xE7\xE3o fora\
            \ de banda definida pela organiza\xE7\xE3o]."
          annotation: "A autentica\xE7\xE3o fora de banda (out-of-band) refere-se\
            \ ao uso de dois caminhos de comunica\xE7\xE3o separados para identificar\
            \ e autenticar usu\xE1rios ou dispositivos em um sistema de informa\xE7\
            \xE3o. O primeiro caminho (ou seja, o caminho em banda) \xE9 usado para\
            \ identificar e autenticar usu\xE1rios ou dispositivos e \xE9 geralmente\
            \ o caminho pelo qual as informa\xE7\xF5es fluem. O segundo caminho (ou\
            \ seja, o caminho fora de banda) \xE9 usado para verificar de forma independente\
            \ a autentica\xE7\xE3o e/ou a a\xE7\xE3o solicitada. Por exemplo, um usu\xE1\
            rio se autentica por meio de um computador notebook em um servidor remoto\
            \ ao qual deseja acesso e solicita alguma a\xE7\xE3o do servidor por esse\
            \ caminho de comunica\xE7\xE3o. Posteriormente, o servidor entra em contato\
            \ com o usu\xE1rio por meio do celular do usu\xE1rio para verificar se\
            \ a a\xE7\xE3o solicitada foi originada pelo usu\xE1rio. O usu\xE1rio\
            \ pode confirmar a a\xE7\xE3o pretendida a uma pessoa ao telefone ou fornecer\
            \ um c\xF3digo de autentica\xE7\xE3o por telefone. A autentica\xE7\xE3\
            o fora de banda pode ser usada para mitigar ataques man-in-the-middle\
            \ reais ou suspeitos. As condi\xE7\xF5es ou crit\xE9rios para ativa\xE7\
            \xE3o incluem atividades suspeitas, novos indicadores de amea\xE7a, n\xED\
            veis elevados de amea\xE7a ou o n\xEDvel de impacto ou de classifica\xE7\
            \xE3o das informa\xE7\xF5es nas transa\xE7\xF5es solicitadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-3
      name: Device Identification and Authentication
      description: 'Uniquely identify and authenticate [Assignment: organization-defined
        devices and/or types of devices] before establishing a [Selection (one or
        more): local; remote; network] connection.'
      annotation: Devices that require unique device-to-device identification and
        authentication are defined by type, device, or a combination of type and device.
        Organization-defined device types include devices that are not owned by the
        organization. Systems use shared known information (e.g., Media Access Control
        [MAC], Transmission Control Protocol/Internet Protocol [TCP/IP] addresses)
        for device identification or organizational authentication solutions (e.g.,
        Institute of Electrical and Electronics Engineers (IEEE) 802.1x and Extensible
        Authentication Protocol [EAP], RADIUS server with EAP-Transport Layer Security
        [TLS] authentication, Kerberos) to identify and authenticate devices on local
        and wide area networks. Organizations determine the required strength of authentication
        mechanisms based on the security categories of systems and mission or business
        requirements. Because of the challenges of implementing device authentication
        on a large scale, organizations can restrict the application of the control
        to a limited number/type of devices based on mission or business needs.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Dispositivos"
          description: "Identificar e autenticar de forma exclusiva [Atribui\xE7\xE3\
            o: dispositivos e/ou tipos de dispositivos definidos pela organiza\xE7\
            \xE3o] antes de estabelecer uma conex\xE3o [Sele\xE7\xE3o (uma ou mais):\
            \ local; remota; de rede]."
          annotation: "Os dispositivos que exigem identifica\xE7\xE3o e autentica\xE7\
            \xE3o exclusivas entre dispositivos s\xE3o definidos por tipo, por dispositivo\
            \ ou por uma combina\xE7\xE3o de tipo e dispositivo. Os tipos de dispositivos\
            \ definidos pela organiza\xE7\xE3o incluem dispositivos que n\xE3o s\xE3\
            o de propriedade da organiza\xE7\xE3o. Os sistemas utilizam informa\xE7\
            \xF5es conhecidas compartilhadas (por exemplo, endere\xE7os de Controle\
            \ de Acesso ao Meio [MAC] e de Protocolo de Controle de Transmiss\xE3\
            o/Protocolo de Internet [TCP/IP]) para identifica\xE7\xE3o de dispositivos\
            \ ou solu\xE7\xF5es de autentica\xE7\xE3o organizacional (por exemplo,\
            \ IEEE 802.1x e Protocolo de Autentica\xE7\xE3o Extens\xEDvel [EAP], servidor\
            \ RADIUS com autentica\xE7\xE3o EAP-Transport Layer Security [TLS], Kerberos)\
            \ para identificar e autenticar dispositivos em redes locais e de longa\
            \ dist\xE2ncia. As organiza\xE7\xF5es determinam a robustez exigida dos\
            \ mecanismos de autentica\xE7\xE3o com base nas categorias de seguran\xE7\
            a dos sistemas e nos requisitos de miss\xE3o ou de neg\xF3cio. Devido\
            \ aos desafios de implementar a autentica\xE7\xE3o de dispositivos em\
            \ larga escala, as organiza\xE7\xF5es podem restringir a aplica\xE7\xE3\
            o do controle a um n\xFAmero/tipo limitado de dispositivos com base nas\
            \ necessidades de miss\xE3o ou de neg\xF3cio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-3(1)
      name: Device Identification and Authentication | Cryptographic Bidirectional
        Authentication
      description: 'Authenticate [Assignment: organization-defined devices and/or
        types of devices] before establishing [Selection (one or more): local; remote;
        network] connection using bidirectional authentication that is cryptographically
        based.'
      annotation: A local connection is a connection with a device that communicates
        without the use of a network. A network connection is a connection with a
        device that communicates through a network. A remote connection is a connection
        with a device that communicates through an external network. Bidirectional
        authentication provides stronger protection to validate the identity of other
        devices for connections that are of greater risk.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Dispositivos | Autentica\xE7\
            \xE3o Bidirecional Criptogr\xE1fica"
          description: "Autenticar [Atribui\xE7\xE3o: dispositivos e/ou tipos de dispositivos\
            \ definidos pela organiza\xE7\xE3o] antes de estabelecer conex\xE3o [Sele\xE7\
            \xE3o (uma ou mais): local; remota; de rede] utilizando autentica\xE7\xE3\
            o bidirecional de base criptogr\xE1fica."
          annotation: "Uma conex\xE3o local \xE9 uma conex\xE3o com um dispositivo\
            \ que se comunica sem o uso de uma rede. Uma conex\xE3o de rede \xE9 uma\
            \ conex\xE3o com um dispositivo que se comunica por meio de uma rede.\
            \ Uma conex\xE3o remota \xE9 uma conex\xE3o com um dispositivo que se\
            \ comunica por meio de uma rede externa. A autentica\xE7\xE3o bidirecional\
            \ fornece prote\xE7\xE3o mais robusta para validar a identidade de outros\
            \ dispositivos em conex\xF5es de maior risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-3(2)
      name: Device Identification and Authentication | Cryptographic Bidirectional
        Network Authentication
      description: 'Withdrawn: Incorporated into IA-3(1).]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Dispositivos | Autentica\xE7\
            \xE3o Bidirecional Criptogr\xE1fica de Rede"
          description: 'Revogado: Incorporado em IA-3(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-3(3)
      name: Device Identification and Authentication | Dynamic Address Allocation
      description: '(a) Where addresses are allocated dynamically, standardize dynamic
        address allocation lease information and the lease duration assigned to devices
        in accordance with [Assignment: organization-defined lease information and
        lease duration]; and

        (b) Audit lease information when assigned to a device.'
      annotation: The Dynamic Host Configuration Protocol (DHCP) is an example of
        a means by which clients can dynamically receive network address assignments.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Dispositivos | Aloca\xE7\
            \xE3o Din\xE2mica de Endere\xE7os"
          description: "(a) Onde os endere\xE7os s\xE3o alocados dinamicamente, padronizar\
            \ as informa\xE7\xF5es de concess\xE3o (lease) de aloca\xE7\xE3o din\xE2\
            mica de endere\xE7os e a dura\xE7\xE3o da concess\xE3o atribu\xEDda aos\
            \ dispositivos de acordo com [Atribui\xE7\xE3o: informa\xE7\xF5es de concess\xE3\
            o e dura\xE7\xE3o de concess\xE3o definidas pela organiza\xE7\xE3o]; e\n\
            (b) Auditar as informa\xE7\xF5es de concess\xE3o quando atribu\xEDdas\
            \ a um dispositivo."
          annotation: "O Protocolo de Configura\xE7\xE3o Din\xE2mica de Host (DHCP)\
            \ \xE9 um exemplo de meio pelo qual os clientes podem receber dinamicamente\
            \ atribui\xE7\xF5es de endere\xE7os de rede."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-3(4)
      name: Device Identification and Authentication | Device Attestation
      description: 'Handle device identification and authentication based on attestation
        by [Assignment: organization-defined configuration management process].'
      annotation: Device attestation refers to the identification and authentication
        of a device based on its configuration and known operating state. Device attestation
        can be determined via a cryptographic hash of the device. If device attestation
        is the means of identification and authentication, then it is important that
        patches and updates to the device are handled via a configuration management
        process such that the patches and updates are done securely and do not disrupt
        identification and authentication to other devices.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Dispositivos | Atesta\xE7\
            \xE3o de Dispositivos"
          description: "Tratar a identifica\xE7\xE3o e a autentica\xE7\xE3o de dispositivos\
            \ com base em atesta\xE7\xE3o por [Atribui\xE7\xE3o: processo de gerenciamento\
            \ de configura\xE7\xE3o definido pela organiza\xE7\xE3o]."
          annotation: "A atesta\xE7\xE3o de dispositivos refere-se \xE0 identifica\xE7\
            \xE3o e autentica\xE7\xE3o de um dispositivo com base em sua configura\xE7\
            \xE3o e em seu estado operacional conhecido. A atesta\xE7\xE3o de dispositivos\
            \ pode ser determinada por meio de um hash criptogr\xE1fico do dispositivo.\
            \ Se a atesta\xE7\xE3o de dispositivos for o meio de identifica\xE7\xE3\
            o e autentica\xE7\xE3o, ent\xE3o \xE9 importante que as corre\xE7\xF5\
            es (patches) e atualiza\xE7\xF5es do dispositivo sejam tratadas por meio\
            \ de um processo de gerenciamento de configura\xE7\xE3o, de modo que as\
            \ corre\xE7\xF5es e atualiza\xE7\xF5es sejam realizadas de forma segura\
            \ e n\xE3o interrompam a identifica\xE7\xE3o e a autentica\xE7\xE3o de\
            \ outros dispositivos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4
      name: Identifier Management
      description: 'Manage system identifiers by:

        a. Receiving authorization from [Assignment: organization-defined personnel
        or roles] to assign an individual, group, role, service, or device identifier;

        b. Selecting an identifier that identifies an individual, group, role, service,
        or device;

        c. Assigning the identifier to the intended individual, group, role, service,
        or device; and

        d. Preventing reuse of identifiers for [Assignment: organization-defined time
        period].'
      annotation: Common device identifiers include Media Access Control (MAC) addresses,
        Internet Protocol (IP) addresses, or device-unique token identifiers. The
        management of individual identifiers is not applicable to shared system accounts.
        Typically, individual identifiers are the usernames of the system accounts
        assigned to those individuals. In such instances, the account management activities
        of AC-2 use account names provided by IA-4. Identifier management also addresses
        individual identifiers not necessarily associated with system accounts. Preventing
        the reuse of identifiers implies preventing the assignment of previously used
        individual, group, role, service, or device identifiers to different individuals,
        groups, roles, services, or devices.
      translations:
        pt:
          name: Gerenciamento de Identificadores
          description: "Gerenciar os identificadores do sistema:\na. Recebendo autoriza\xE7\
            \xE3o de [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] para atribuir um identificador de indiv\xEDduo, grupo, fun\xE7\xE3\
            o, servi\xE7o ou dispositivo;\nb. Selecionando um identificador que identifique\
            \ um indiv\xEDduo, grupo, fun\xE7\xE3o, servi\xE7o ou dispositivo;\nc.\
            \ Atribuindo o identificador ao indiv\xEDduo, grupo, fun\xE7\xE3o, servi\xE7\
            o ou dispositivo pretendido; e\nd. Impedindo a reutiliza\xE7\xE3o de identificadores\
            \ por [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "Os identificadores comuns de dispositivos incluem endere\xE7\
            os de Controle de Acesso ao Meio (MAC), endere\xE7os de Protocolo de Internet\
            \ (IP) ou identificadores de token exclusivos do dispositivo. O gerenciamento\
            \ de identificadores individuais n\xE3o se aplica a contas de sistema\
            \ compartilhadas. Normalmente, os identificadores individuais s\xE3o os\
            \ nomes de usu\xE1rio das contas de sistema atribu\xEDdas a esses indiv\xED\
            duos. Nesses casos, as atividades de gerenciamento de contas do AC-2 utilizam\
            \ os nomes de conta fornecidos pelo IA-4. O gerenciamento de identificadores\
            \ tamb\xE9m aborda os identificadores individuais n\xE3o necessariamente\
            \ associados a contas de sistema. Impedir a reutiliza\xE7\xE3o de identificadores\
            \ implica impedir a atribui\xE7\xE3o de identificadores de indiv\xEDduo,\
            \ grupo, fun\xE7\xE3o, servi\xE7o ou dispositivo previamente usados a\
            \ diferentes indiv\xEDduos, grupos, fun\xE7\xF5es, servi\xE7os ou dispositivos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(1)
      name: Identifier Management | Prohibit Account Identifiers as Public Identifiers
      description: Prohibit the use of system account identifiers that are the same
        as public identifiers for individual accounts.
      annotation: Prohibiting account identifiers as public identifiers applies to
        any publicly disclosed account identifier used for communication such as,
        electronic mail and instant messaging. Prohibiting the use of systems account
        identifiers that are the same as some public identifier, such as the individual
        identifier section of an electronic mail address, makes it more difficult
        for adversaries to guess user identifiers. Prohibiting account identifiers
        as public identifiers without the implementation of other supporting controls
        only complicates guessing of identifiers. Additional protections are required
        for authenticators and credentials to protect the account.
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Proibir Identificadores de Conta\
            \ como Identificadores P\xFAblicos"
          description: "Proibir o uso de identificadores de conta de sistema que sejam\
            \ iguais a identificadores p\xFAblicos para contas individuais."
          annotation: "A proibi\xE7\xE3o de identificadores de conta como identificadores\
            \ p\xFAblicos aplica-se a qualquer identificador de conta divulgado publicamente\
            \ usado para comunica\xE7\xE3o, como correio eletr\xF4nico e mensagens\
            \ instant\xE2neas. Proibir o uso de identificadores de conta de sistema\
            \ que sejam iguais a algum identificador p\xFAblico, como a se\xE7\xE3\
            o de identificador individual de um endere\xE7o de correio eletr\xF4nico,\
            \ torna mais dif\xEDcil para os advers\xE1rios adivinharem os identificadores\
            \ de usu\xE1rio. Proibir identificadores de conta como identificadores\
            \ p\xFAblicos sem a implementa\xE7\xE3o de outros controles de apoio apenas\
            \ dificulta a adivinha\xE7\xE3o dos identificadores. Prote\xE7\xF5es adicionais\
            \ s\xE3o exigidas para autenticadores e credenciais a fim de proteger\
            \ a conta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(2)
      name: Identifier Management | Supervisor Authorization
      description: '[Withdrawn: Incorporated into IA-12(1).]'
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Autoriza\xE7\xE3o de Supervisor"
          description: '[Revogado: Incorporado em IA-12(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(3)
      name: Identifier Management | Multiple Forms of Certification
      description: '[Withdrawn: Incorporated into IA-12(2).]'
      translations:
        pt:
          name: "Gerenciamento de Identificadores | M\xFAltiplas Formas de Certifica\xE7\
            \xE3o"
          description: '[Revogado: Incorporado em IA-12(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(4)
      name: Identifier Management | Identify User Status
      description: 'Manage individual identifiers by uniquely identifying each individual
        as [Assignment: organization-defined characteristic identifying individual
        status].'
      annotation: Characteristics that identify the status of individuals include
        contractors, foreign nationals, and non-organizational users. Identifying
        the status of individuals by these characteristics provides additional information
        about the people with whom organizational personnel are communicating. For
        example, it might be useful for a government employee to know that one of
        the individuals on an email message is a contractor.
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Identificar Situa\xE7\xE3o do\
            \ Usu\xE1rio"
          description: "Gerenciar os identificadores individuais identificando de\
            \ forma exclusiva cada indiv\xEDduo como [Atribui\xE7\xE3o: caracter\xED\
            stica definida pela organiza\xE7\xE3o que identifica a situa\xE7\xE3o\
            \ do indiv\xEDduo]."
          annotation: "As caracter\xEDsticas que identificam a situa\xE7\xE3o dos\
            \ indiv\xEDduos incluem prestadores de servi\xE7os (contratados), estrangeiros\
            \ e usu\xE1rios n\xE3o organizacionais. Identificar a situa\xE7\xE3o dos\
            \ indiv\xEDduos por essas caracter\xEDsticas fornece informa\xE7\xF5es\
            \ adicionais sobre as pessoas com quem o pessoal da organiza\xE7\xE3o\
            \ est\xE1 se comunicando. Por exemplo, pode ser \xFAtil para um funcion\xE1\
            rio p\xFAblico saber que um dos indiv\xEDduos em uma mensagem de e-mail\
            \ \xE9 um prestador de servi\xE7os (contratado)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(5)
      name: Identifier Management | Dynamic Management
      description: 'Manage individual identifiers dynamically in accordance with [Assignment:
        organization-defined dynamic identifier policy].'
      annotation: "\_ In contrast to conventional approaches to identification that\
        \ presume static accounts for preregistered users, many distributed systems\
        \ establish identifiers at runtime for entities that were previously unknown.\_\
        When identifiers are established at runtime for previously unknown entities,\
        \ organizations can anticipate and provision for the dynamic establishment\
        \ of identifiers. Pre-established trust relationships and mechanisms with\
        \ appropriate authorities to validate credentials and related identifiers\
        \ are essential."
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Gerenciamento Din\xE2mico"
          description: "Gerenciar os identificadores individuais dinamicamente de\
            \ acordo com [Atribui\xE7\xE3o: pol\xEDtica de identificadores din\xE2\
            micos definida pela organiza\xE7\xE3o]."
          annotation: "  Em contraste com as abordagens convencionais de identifica\xE7\
            \xE3o que pressup\xF5em contas est\xE1ticas para usu\xE1rios pr\xE9-registrados,\
            \ muitos sistemas distribu\xEDdos estabelecem identificadores em tempo\
            \ de execu\xE7\xE3o para entidades que eram previamente desconhecidas.\
            \ Quando os identificadores s\xE3o estabelecidos em tempo de execu\xE7\
            \xE3o para entidades previamente desconhecidas, as organiza\xE7\xF5es\
            \ podem antecipar e prover o estabelecimento din\xE2mico de identificadores.\
            \ Rela\xE7\xF5es de confian\xE7a e mecanismos pr\xE9-estabelecidos com\
            \ as autoridades apropriadas para validar credenciais e identificadores\
            \ relacionados s\xE3o essenciais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(6)
      name: Identifier Management | Cross-organization Management
      description: 'Coordinate with the following external organizations for cross-organization
        management of identifiers: [Assignment: organization-defined external organizations].'
      annotation: Cross-organization identifier management provides the capability
        to identify individuals, groups, roles, or devices when conducting cross-organization
        activities involving the processing, storage, or transmission of information.
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Gerenciamento Entre Organiza\xE7\
            \xF5es"
          description: "Coordenar com as seguintes organiza\xE7\xF5es externas o gerenciamento\
            \ de identificadores entre organiza\xE7\xF5es: [Atribui\xE7\xE3o: organiza\xE7\
            \xF5es externas definidas pela organiza\xE7\xE3o]."
          annotation: "O gerenciamento de identificadores entre organiza\xE7\xF5es\
            \ fornece a capacidade de identificar indiv\xEDduos, grupos, fun\xE7\xF5\
            es ou dispositivos ao conduzir atividades entre organiza\xE7\xF5es que\
            \ envolvam o processamento, o armazenamento ou a transmiss\xE3o de informa\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(7)
      name: Identifier Management | In-person Registration
      description: '[Withdrawn: Incorporated into IA-12(4).]'
      translations:
        pt:
          name: Gerenciamento de Identificadores | Registro Presencial
          description: '[Revogado: Incorporado em IA-12(4).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(8)
      name: Identifier Management | Pairwise Pseudonymous Identifiers
      description: Generate pairwise pseudonymous identifiers.
      annotation: A pairwise pseudonymous identifier is an opaque unguessable subscriber
        identifier generated by an identity provider for use at a specific individual
        relying party. Generating distinct pairwise pseudonymous identifiers with
        no identifying information about a subscriber discourages subscriber activity
        tracking and profiling beyond the operational requirements established by
        an organization. The pairwise pseudonymous identifiers are unique to each
        relying party except in situations where relying parties can show a demonstrable
        relationship justifying an operational need for correlation, or all parties
        consent to being correlated in such a manner.
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Identificadores Pseud\xF4nimos\
            \ Pareados (Pairwise)"
          description: "Gerar identificadores pseud\xF4nimos pareados (pairwise)."
          annotation: "Um identificador pseud\xF4nimo pareado (pairwise) \xE9 um identificador\
            \ de assinante opaco e imposs\xEDvel de adivinhar, gerado por um provedor\
            \ de identidade para uso junto a uma parte confiante (relying party) espec\xED\
            fica. Gerar identificadores pseud\xF4nimos pareados distintos, sem qualquer\
            \ informa\xE7\xE3o identificadora sobre um assinante, desestimula o rastreamento\
            \ e a perfilagem da atividade do assinante al\xE9m dos requisitos operacionais\
            \ estabelecidos por uma organiza\xE7\xE3o. Os identificadores pseud\xF4\
            nimos pareados s\xE3o exclusivos para cada parte confiante, exceto em\
            \ situa\xE7\xF5es em que as partes confiantes possam demonstrar uma rela\xE7\
            \xE3o comprov\xE1vel que justifique uma necessidade operacional de correla\xE7\
            \xE3o, ou em que todas as partes consintam em ser correlacionadas dessa\
            \ maneira."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-4(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-4(9)
      name: Identifier Management | Attribute Maintenance and Protection
      description: 'Maintain the attributes for each uniquely identified individual,
        device, or service in [Assignment: organization-defined protected central
        storage].'
      annotation: For each of the entities covered in IA-2, IA-3, IA-8, and IA-9,
        it is important to maintain the attributes for each authenticated entity on
        an ongoing basis in a central (protected) store.
      translations:
        pt:
          name: "Gerenciamento de Identificadores | Manuten\xE7\xE3o e Prote\xE7\xE3\
            o de Atributos"
          description: "Manter os atributos de cada indiv\xEDduo, dispositivo ou servi\xE7\
            o identificado de forma exclusiva em [Atribui\xE7\xE3o: armazenamento\
            \ central protegido definido pela organiza\xE7\xE3o]."
          annotation: "Para cada uma das entidades abrangidas em IA-2, IA-3, IA-8\
            \ e IA-9, \xE9 importante manter os atributos de cada entidade autenticada\
            \ de forma cont\xEDnua em um reposit\xF3rio central (protegido)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5
      name: Authenticator Management
      description: 'Manage system authenticators by:

        a. Verifying, as part of the initial authenticator distribution, the identity
        of the individual, group, role, service, or device receiving the authenticator;

        b. Establishing initial authenticator content for any authenticators issued
        by the organization;

        c. Ensuring that authenticators have sufficient strength of mechanism for
        their intended use;

        d. Establishing and implementing administrative procedures for initial authenticator
        distribution, for lost or compromised or damaged authenticators, and for revoking
        authenticators;

        e. Changing default authenticators prior to first use;

        f. Changing or refreshing authenticators [Assignment: organization-defined
        time period by authenticator type] or when [Assignment: organization-defined
        events] occur;

        g. Protecting authenticator content from unauthorized disclosure and modification;

        h. Requiring individuals to take, and having devices implement, specific controls
        to protect authenticators; and

        i. Changing authenticators for group or role accounts when membership to those
        accounts changes.'
      annotation: 'Authenticators include passwords, cryptographic devices, biometrics,
        certificates, one-time password devices, and ID badges. Device authenticators
        include certificates and passwords. Initial authenticator content is the actual
        content of the authenticator (e.g., the initial password). In contrast, the
        requirements for authenticator content contain specific criteria or characteristics
        (e.g., minimum password length). Developers may deliver system components
        with factory default authentication credentials (i.e., passwords) to allow
        for initial installation and configuration. Default authentication credentials
        are often well known, easily discoverable, and present a significant risk.
        The requirement to protect individual authenticators may be implemented via
        control PL-4 or PS-6 for authenticators in the possession of individuals and
        by controls AC-3, AC-6, and SC-28 for authenticators stored in organizational
        systems, including passwords stored in hashed or encrypted formats or files
        containing encrypted or hashed passwords accessible with administrator privileges.

        Systems support authenticator management by organization-defined settings
        and restrictions for various authenticator characteristics (e.g., minimum
        password length, validation time window for time synchronous one-time tokens,
        and number of allowed rejections during the verification stage of biometric
        authentication). Actions can be taken to safeguard individual authenticators,
        including maintaining possession of authenticators, not sharing authenticators
        with others, and immediately reporting lost, stolen, or compromised authenticators.
        Authenticator management includes issuing and revoking authenticators for
        temporary access when no longer needed.'
      translations:
        pt:
          name: Gerenciamento de Autenticadores
          description: "Gerenciar os autenticadores do sistema:\na. Verificando, como\
            \ parte da distribui\xE7\xE3o inicial do autenticador, a identidade do\
            \ indiv\xEDduo, grupo, fun\xE7\xE3o, servi\xE7o ou dispositivo que recebe\
            \ o autenticador;\nb. Estabelecendo o conte\xFAdo inicial do autenticador\
            \ para quaisquer autenticadores emitidos pela organiza\xE7\xE3o;\nc. Garantindo\
            \ que os autenticadores tenham robustez de mecanismo suficiente para o\
            \ uso pretendido;\nd. Estabelecendo e implementando procedimentos administrativos\
            \ para a distribui\xE7\xE3o inicial de autenticadores, para autenticadores\
            \ perdidos, comprometidos ou danificados, e para a revoga\xE7\xE3o de\
            \ autenticadores;\ne. Alterando os autenticadores padr\xE3o antes do primeiro\
            \ uso;\nf. Alterando ou renovando os autenticadores [Atribui\xE7\xE3o:\
            \ per\xEDodo de tempo definido pela organiza\xE7\xE3o por tipo de autenticador]\
            \ ou quando ocorrerem [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o];\ng. Protegendo o conte\xFAdo do autenticador contra divulga\xE7\
            \xE3o e modifica\xE7\xE3o n\xE3o autorizadas;\nh. Exigindo que os indiv\xED\
            duos adotem, e que os dispositivos implementem, controles espec\xEDficos\
            \ para proteger os autenticadores; e\ni. Alterando os autenticadores de\
            \ contas de grupo ou de fun\xE7\xE3o quando a composi\xE7\xE3o dessas\
            \ contas mudar."
          annotation: "Os autenticadores incluem senhas, dispositivos criptogr\xE1\
            ficos, biometria, certificados, dispositivos de senha de uso \xFAnico\
            \ (one-time password) e crach\xE1s de identifica\xE7\xE3o. Os autenticadores\
            \ de dispositivos incluem certificados e senhas. O conte\xFAdo inicial\
            \ do autenticador \xE9 o conte\xFAdo real do autenticador (por exemplo,\
            \ a senha inicial). Em contraste, os requisitos de conte\xFAdo do autenticador\
            \ cont\xEAm crit\xE9rios ou caracter\xEDsticas espec\xEDficas (por exemplo,\
            \ comprimento m\xEDnimo da senha). Os desenvolvedores podem entregar componentes\
            \ de sistema com credenciais de autentica\xE7\xE3o padr\xE3o de f\xE1\
            brica (ou seja, senhas) para permitir a instala\xE7\xE3o e configura\xE7\
            \xE3o iniciais. As credenciais de autentica\xE7\xE3o padr\xE3o s\xE3o\
            \ frequentemente bem conhecidas, facilmente descobertas e representam\
            \ um risco significativo. O requisito de proteger os autenticadores individuais\
            \ pode ser implementado por meio do controle PL-4 ou PS-6 para autenticadores\
            \ na posse de indiv\xEDduos e por meio dos controles AC-3, AC-6 e SC-28\
            \ para autenticadores armazenados em sistemas organizacionais, incluindo\
            \ senhas armazenadas em formatos com hash ou criptografados ou arquivos\
            \ contendo senhas criptografadas ou com hash acess\xEDveis com privil\xE9\
            gios de administrador.\nOs sistemas suportam o gerenciamento de autenticadores\
            \ por meio de configura\xE7\xF5es e restri\xE7\xF5es definidas pela organiza\xE7\
            \xE3o para diversas caracter\xEDsticas de autenticadores (por exemplo,\
            \ comprimento m\xEDnimo da senha, janela de tempo de valida\xE7\xE3o para\
            \ tokens de uso \xFAnico sincronizados por tempo e n\xFAmero de rejei\xE7\
            \xF5es permitidas durante a etapa de verifica\xE7\xE3o da autentica\xE7\
            \xE3o biom\xE9trica). Podem ser adotadas a\xE7\xF5es para salvaguardar\
            \ os autenticadores individuais, incluindo manter a posse dos autenticadores,\
            \ n\xE3o compartilhar os autenticadores com outras pessoas e relatar imediatamente\
            \ autenticadores perdidos, roubados ou comprometidos. O gerenciamento\
            \ de autenticadores inclui a emiss\xE3o e a revoga\xE7\xE3o de autenticadores\
            \ para acesso tempor\xE1rio quando n\xE3o mais necess\xE1rios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(1)
      name: Authenticator Management | Password-based Authentication
      description: 'For password-based authentication:

        (a) Maintain a list of commonly-used, expected, or compromised passwords and
        update the list [Assignment: organization-defined frequency] and when organizational
        passwords are suspected to have been compromised directly or indirectly;

        (b) Verify, when users create or update passwords, that the passwords are
        not found on the list of commonly-used, expected, or compromised passwords
        in IA-5(1)(a);

        (c) Transmit passwords only over cryptographically-protected channels;

        (d) Store passwords using an approved salted key derivation function, preferably
        using a keyed hash;

        (e) Require immediate selection of a new password upon account recovery;

        (f) Allow user selection of long passwords and passphrases, including spaces
        and all printable characters;

        (g) Employ automated tools to assist the user in selecting strong password
        authenticators; and

        (h) Enforce the following composition and complexity rules: [Assignment: organization-defined
        composition and complexity rules].'
      annotation: Password-based authentication applies to passwords regardless of
        whether they are used in single-factor or multi-factor authentication. Long
        passwords or passphrases are preferable over shorter passwords. Enforced composition
        rules provide marginal security benefits while decreasing usability. However,
        organizations may choose to establish certain rules for password generation
        (e.g., minimum character length for long passwords) under certain circumstances
        and can enforce this requirement in IA-5(1)(h). Account recovery can occur,
        for example, in situations when a password is forgotten. Cryptographically
        protected passwords include salted one-way cryptographic hashes of passwords.
        The list of commonly used, compromised, or expected passwords includes passwords
        obtained from previous breach corpuses, dictionary words, and repetitive or
        sequential characters. The list includes context-specific words, such as the
        name of the service, username, and derivatives thereof.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Autentica\xE7\xE3o Baseada em Senha"
          description: "Para autentica\xE7\xE3o baseada em senha:\n(a) Manter uma\
            \ lista de senhas comumente usadas, esperadas ou comprometidas e atualizar\
            \ a lista [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o] e quando houver suspeita de que as senhas organizacionais tenham sido\
            \ comprometidas direta ou indiretamente;\n(b) Verificar, quando os usu\xE1\
            rios criarem ou atualizarem senhas, que as senhas n\xE3o constam na lista\
            \ de senhas comumente usadas, esperadas ou comprometidas de IA-5(1)(a);\n\
            (c) Transmitir senhas somente por canais protegidos criptograficamente;\n\
            (d) Armazenar senhas utilizando uma fun\xE7\xE3o de deriva\xE7\xE3o de\
            \ chave com sal (salted) aprovada, preferencialmente usando um hash com\
            \ chave (keyed hash);\n(e) Exigir a sele\xE7\xE3o imediata de uma nova\
            \ senha na recupera\xE7\xE3o de conta;\n(f) Permitir que o usu\xE1rio\
            \ selecione senhas e frases-senha (passphrases) longas, incluindo espa\xE7\
            os e todos os caracteres imprim\xEDveis;\n(g) Empregar ferramentas automatizadas\
            \ para auxiliar o usu\xE1rio na sele\xE7\xE3o de autenticadores de senha\
            \ robustos; e\n(h) Aplicar as seguintes regras de composi\xE7\xE3o e complexidade:\
            \ [Atribui\xE7\xE3o: regras de composi\xE7\xE3o e complexidade definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "A autentica\xE7\xE3o baseada em senha aplica-se a senhas independentemente\
            \ de serem usadas em autentica\xE7\xE3o de fator \xFAnico ou multifator.\
            \ Senhas ou frases-senha longas s\xE3o prefer\xEDveis a senhas mais curtas.\
            \ As regras de composi\xE7\xE3o impostas proporcionam benef\xEDcios de\
            \ seguran\xE7a marginais ao mesmo tempo em que reduzem a usabilidade.\
            \ No entanto, as organiza\xE7\xF5es podem optar por estabelecer determinadas\
            \ regras para a gera\xE7\xE3o de senhas (por exemplo, comprimento m\xED\
            nimo de caracteres para senhas longas) sob certas circunst\xE2ncias e\
            \ podem aplicar esse requisito em IA-5(1)(h). A recupera\xE7\xE3o de conta\
            \ pode ocorrer, por exemplo, em situa\xE7\xF5es em que uma senha \xE9\
            \ esquecida. As senhas protegidas criptograficamente incluem hashes criptogr\xE1\
            ficos unidirecionais com sal (salted) das senhas. A lista de senhas comumente\
            \ usadas, comprometidas ou esperadas inclui senhas obtidas de corpora\
            \ de viola\xE7\xF5es anteriores, palavras de dicion\xE1rio e caracteres\
            \ repetitivos ou sequenciais. A lista inclui palavras espec\xEDficas de\
            \ contexto, como o nome do servi\xE7o, o nome de usu\xE1rio e suas deriva\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(2)
      name: Authenticator Management | Public Key-based Authentication
      description: '(a) For public key-based authentication:

        (1) Enforce authorized access to the corresponding private key; and

        (2) Map the authenticated identity to the account of the individual or group;
        and

        (b) When public key infrastructure (PKI) is used:

        (1) Validate certificates by constructing and verifying a certification path
        to an accepted trust anchor, including checking certificate status information;
        and

        (2) Implement a local cache of revocation data to support path discovery and
        validation.'
      annotation: Public key cryptography is a valid authentication mechanism for
        individuals, machines, and devices. For PKI solutions, status information
        for certification paths includes certificate revocation lists or certificate
        status protocol responses. For PIV cards, certificate validation involves
        the construction and verification of a certification path to the Common Policy
        Root trust anchor, which includes certificate policy processing. Implementing
        a local cache of revocation data to support path discovery and validation
        also supports system availability in situations where organizations are unable
        to access revocation information via the network.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Autentica\xE7\xE3o Baseada em Chave\
            \ P\xFAblica"
          description: "(a) Para autentica\xE7\xE3o baseada em chave p\xFAblica:\n\
            (1) Impor o acesso autorizado \xE0 chave privada correspondente; e\n(2)\
            \ Mapear a identidade autenticada para a conta do indiv\xEDduo ou grupo;\
            \ e\n(b) Quando for utilizada uma infraestrutura de chave p\xFAblica (PKI):\n\
            (1) Validar os certificados construindo e verificando um caminho de certifica\xE7\
            \xE3o at\xE9 uma \xE2ncora de confian\xE7a aceita, incluindo a verifica\xE7\
            \xE3o das informa\xE7\xF5es de status do certificado; e\n(2) Implementar\
            \ um cache local de dados de revoga\xE7\xE3o para apoiar a descoberta\
            \ e a valida\xE7\xE3o do caminho."
          annotation: "A criptografia de chave p\xFAblica \xE9 um mecanismo de autentica\xE7\
            \xE3o v\xE1lido para indiv\xEDduos, m\xE1quinas e dispositivos. Para solu\xE7\
            \xF5es de PKI, as informa\xE7\xF5es de status dos caminhos de certifica\xE7\
            \xE3o incluem listas de revoga\xE7\xE3o de certificados ou respostas de\
            \ protocolo de status de certificados. Para cart\xF5es PIV, a valida\xE7\
            \xE3o de certificados envolve a constru\xE7\xE3o e a verifica\xE7\xE3\
            o de um caminho de certifica\xE7\xE3o at\xE9 a \xE2ncora de confian\xE7\
            a Common Policy Root, que inclui o processamento da pol\xEDtica de certificado.\
            \ Implementar um cache local de dados de revoga\xE7\xE3o para apoiar a\
            \ descoberta e a valida\xE7\xE3o do caminho tamb\xE9m favorece a disponibilidade\
            \ do sistema em situa\xE7\xF5es em que as organiza\xE7\xF5es n\xE3o conseguem\
            \ acessar as informa\xE7\xF5es de revoga\xE7\xE3o pela rede."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(11)
      name: Authenticator Management | Hardware Token-based Authentication
      description: '[Withdrawn: Incorporated into IA-2(1) and IA-2(2).]'
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Autentica\xE7\xE3o Baseada em Token\
            \ de Hardware"
          description: '[Revogado: Incorporado em IA-2(1) e IA-2(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(3)
      name: Authenticator Management | In-person or Trusted External Party Registration
      description: '[Withdrawn: Incorporated into IA-12(4).]'
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Registro Presencial ou por Terceiro\
            \ Externo Confi\xE1vel"
          description: '[Revogado: Incorporado em IA-12(4).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(5)
      name: Authenticator Management | Change Authenticators Prior to Delivery
      description: Require developers and installers of system components to provide
        unique authenticators or change default authenticators prior to delivery and
        installation.
      annotation: Changing authenticators prior to the delivery and installation of
        system components extends the requirement for organizations to change default
        authenticators upon system installation by requiring developers and/or installers
        to provide unique authenticators or change default authenticators for system
        components prior to delivery and/or installation. However, it typically does
        not apply to developers of commercial off-the-shelf information technology
        products. Requirements for unique authenticators can be included in acquisition
        documents prepared by organizations when procuring systems or system components.
      translations:
        pt:
          name: Gerenciamento de Autenticadores | Alterar Autenticadores Antes da
            Entrega
          description: "Exigir que os desenvolvedores e instaladores de componentes\
            \ de sistema forne\xE7am autenticadores exclusivos ou alterem os autenticadores\
            \ padr\xE3o antes da entrega e instala\xE7\xE3o."
          annotation: "Alterar os autenticadores antes da entrega e instala\xE7\xE3\
            o dos componentes de sistema estende o requisito de as organiza\xE7\xF5\
            es alterarem os autenticadores padr\xE3o na instala\xE7\xE3o do sistema,\
            \ ao exigir que os desenvolvedores e/ou instaladores forne\xE7am autenticadores\
            \ exclusivos ou alterem os autenticadores padr\xE3o dos componentes de\
            \ sistema antes da entrega e/ou instala\xE7\xE3o. No entanto, isso normalmente\
            \ n\xE3o se aplica aos desenvolvedores de produtos comerciais de prateleira\
            \ (commercial off-the-shelf) de tecnologia da informa\xE7\xE3o. Os requisitos\
            \ de autenticadores exclusivos podem ser inclu\xEDdos nos documentos de\
            \ aquisi\xE7\xE3o preparados pelas organiza\xE7\xF5es ao adquirir sistemas\
            \ ou componentes de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(6)
      name: Authenticator Management | Protection of Authenticators
      description: Protect authenticators commensurate with the security category
        of the information to which use of the authenticator permits access.
      annotation: For systems that contain multiple security categories of information
        without reliable physical or logical separation between categories, authenticators
        used to grant access to the systems are protected commensurate with the highest
        security category of information on the systems. Security categories of information
        are determined as part of the security categorization process.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Prote\xE7\xE3o de Autenticadores"
          description: "Proteger os autenticadores de forma proporcional \xE0 categoria\
            \ de seguran\xE7a das informa\xE7\xF5es \xE0s quais o uso do autenticador\
            \ permite acesso."
          annotation: "Para sistemas que cont\xEAm m\xFAltiplas categorias de seguran\xE7\
            a de informa\xE7\xF5es sem separa\xE7\xE3o f\xEDsica ou l\xF3gica confi\xE1\
            vel entre as categorias, os autenticadores usados para conceder acesso\
            \ aos sistemas s\xE3o protegidos de forma proporcional \xE0 categoria\
            \ de seguran\xE7a mais alta das informa\xE7\xF5es nos sistemas. As categorias\
            \ de seguran\xE7a das informa\xE7\xF5es s\xE3o determinadas como parte\
            \ do processo de categoriza\xE7\xE3o de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(7)
      name: Authenticator Management | No Embedded Unencrypted Static Authenticators
      description: Ensure that unencrypted static authenticators are not embedded
        in applications or other forms of static storage.
      annotation: In addition to applications, other forms of static storage include
        access scripts and function keys. Organizations exercise caution when determining
        whether embedded or stored authenticators are in encrypted or unencrypted
        form. If authenticators are used in the manner stored, then those representations
        are considered unencrypted authenticators.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Sem Autenticadores Est\xE1ticos\
            \ N\xE3o Criptografados Embutidos"
          description: "Garantir que autenticadores est\xE1ticos n\xE3o criptografados\
            \ n\xE3o sejam embutidos em aplica\xE7\xF5es ou em outras formas de armazenamento\
            \ est\xE1tico."
          annotation: "Al\xE9m das aplica\xE7\xF5es, outras formas de armazenamento\
            \ est\xE1tico incluem scripts de acesso e teclas de fun\xE7\xE3o. As organiza\xE7\
            \xF5es exercem cautela ao determinar se os autenticadores embutidos ou\
            \ armazenados est\xE3o em formato criptografado ou n\xE3o criptografado.\
            \ Se os autenticadores forem usados da mesma maneira em que est\xE3o armazenados,\
            \ ent\xE3o essas representa\xE7\xF5es s\xE3o consideradas autenticadores\
            \ n\xE3o criptografados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(8)
      name: Authenticator Management | Multiple System Accounts
      description: 'Implement [Assignment: organization-defined security controls]
        to manage the risk of compromise due to individuals having accounts on multiple
        systems.'
      annotation: When individuals have accounts on multiple systems and use the same
        authenticators such as passwords, there is the risk that a compromise of one
        account may lead to the compromise of other accounts. Alternative approaches
        include having different authenticators (passwords) on all systems, employing
        a single sign-on or federation mechanism, or using some form of one-time passwords
        on all systems. Organizations can also use rules of behavior (see PL-4) and
        access agreements (see PS-6) to mitigate the risk of multiple system accounts.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | M\xFAltiplas Contas de Sistema"
          description: "Implementar [Atribui\xE7\xE3o: controles de seguran\xE7a definidos\
            \ pela organiza\xE7\xE3o] para gerenciar o risco de comprometimento decorrente\
            \ de indiv\xEDduos possu\xEDrem contas em m\xFAltiplos sistemas."
          annotation: "Quando os indiv\xEDduos possuem contas em m\xFAltiplos sistemas\
            \ e usam os mesmos autenticadores, como senhas, h\xE1 o risco de que o\
            \ comprometimento de uma conta possa levar ao comprometimento de outras\
            \ contas. As abordagens alternativas incluem ter autenticadores (senhas)\
            \ diferentes em todos os sistemas, empregar um mecanismo de logon \xFA\
            nico (single sign-on) ou de federa\xE7\xE3o, ou usar alguma forma de senhas\
            \ de uso \xFAnico (one-time passwords) em todos os sistemas. As organiza\xE7\
            \xF5es tamb\xE9m podem usar regras de comportamento (consulte PL-4) e\
            \ acordos de acesso (consulte PS-6) para mitigar o risco de m\xFAltiplas\
            \ contas de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(9)
      name: Authenticator Management | Federated Credential Management
      description: 'Use the following external organizations to federate credentials:
        [Assignment: organization-defined external organizations].'
      annotation: Federation provides organizations with the capability to authenticate
        individuals and devices when conducting cross-organization activities involving
        the processing, storage, or transmission of information. Using a specific
        list of approved external organizations for authentication helps to ensure
        that those organizations are vetted and trusted.
      translations:
        pt:
          name: Gerenciamento de Autenticadores | Gerenciamento Federado de Credenciais
          description: "Utilizar as seguintes organiza\xE7\xF5es externas para federar\
            \ credenciais: [Atribui\xE7\xE3o: organiza\xE7\xF5es externas definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "A federa\xE7\xE3o fornece \xE0s organiza\xE7\xF5es a capacidade\
            \ de autenticar indiv\xEDduos e dispositivos ao conduzir atividades entre\
            \ organiza\xE7\xF5es que envolvam o processamento, o armazenamento ou\
            \ a transmiss\xE3o de informa\xE7\xF5es. O uso de uma lista espec\xED\
            fica de organiza\xE7\xF5es externas aprovadas para autentica\xE7\xE3o\
            \ ajuda a garantir que essas organiza\xE7\xF5es sejam verificadas e confi\xE1\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(10)
      name: Authenticator Management | Dynamic Credential Binding
      description: 'Bind identities and authenticators dynamically using the following
        rules: [Assignment: organization-defined binding rules].'
      annotation: Authentication requires some form of binding between an identity
        and the authenticator that is used to confirm the identity. In conventional
        approaches, binding is established by pre-provisioning both the identity and
        the authenticator to the system. For example, the binding between a username
        (i.e., identity) and a password (i.e., authenticator) is accomplished by provisioning
        the identity and authenticator as a pair in the system. New authentication
        techniques allow the binding between the identity and the authenticator to
        be implemented external to a system. For example, with smartcard credentials,
        the identity and authenticator are bound together on the smartcard. Using
        these credentials, systems can authenticate identities that have not been
        pre-provisioned, dynamically provisioning the identity after authentication.
        In these situations, organizations can anticipate the dynamic provisioning
        of identities. Pre-established trust relationships and mechanisms with appropriate
        authorities to validate identities and related credentials are essential.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Vincula\xE7\xE3o Din\xE2mica de\
            \ Credenciais"
          description: "Vincule identidades e autenticadores de forma din\xE2mica\
            \ utilizando as seguintes regras: [Atribui\xE7\xE3o: regras de vincula\xE7\
            \xE3o definidas pela organiza\xE7\xE3o]."
          annotation: "A autentica\xE7\xE3o requer alguma forma de vincula\xE7\xE3\
            o entre uma identidade e o autenticador usado para confirmar essa identidade.\
            \ Nas abordagens convencionais, a vincula\xE7\xE3o \xE9 estabelecida por\
            \ meio do pr\xE9-provisionamento tanto da identidade quanto do autenticador\
            \ no sistema. Por exemplo, a vincula\xE7\xE3o entre um nome de usu\xE1\
            rio (ou seja, identidade) e uma senha (ou seja, autenticador) \xE9 realizada\
            \ provisionando a identidade e o autenticador como um par no sistema.\
            \ Novas t\xE9cnicas de autentica\xE7\xE3o permitem que a vincula\xE7\xE3\
            o entre a identidade e o autenticador seja implementada externamente a\
            \ um sistema. Por exemplo, com credenciais de smartcard, a identidade\
            \ e o autenticador s\xE3o vinculados juntos no smartcard. Usando essas\
            \ credenciais, os sistemas podem autenticar identidades que n\xE3o foram\
            \ pr\xE9-provisionadas, provisionando dinamicamente a identidade ap\xF3\
            s a autentica\xE7\xE3o. Nessas situa\xE7\xF5es, as organiza\xE7\xF5es\
            \ podem antecipar o provisionamento din\xE2mico de identidades. Rela\xE7\
            \xF5es de confian\xE7a e mecanismos pr\xE9-estabelecidos com as autoridades\
            \ apropriadas para validar identidades e credenciais relacionadas s\xE3\
            o essenciais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(4)
      name: Authenticator Management | Automated Support for Password Strength Determination
      description: '[Withdrawn: Incorporated into IA-5(1).]'
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Suporte Automatizado para Determina\xE7\
            \xE3o da Robustez de Senhas"
          description: '[Retirado: Incorporado em IA-5(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(12)
      name: Authenticator Management | Biometric Authentication Performance
      description: 'For biometric-based authentication, employ mechanisms that satisfy
        the following biometric quality requirements [Assignment: organization-defined
        biometric quality requirements].'
      annotation: Unlike password-based authentication, which provides exact matches
        of user-input passwords to stored passwords, biometric authentication does
        not provide exact matches. Depending on the type of biometric and the type
        of collection mechanism, there is likely to be some divergence from the presented
        biometric and the stored biometric that serves as the basis for comparison.
        Matching performance is the rate at which a biometric algorithm correctly
        results in a match for a genuine user and rejects other users. Biometric performance
        requirements include the match rate, which reflects the accuracy of the biometric
        matching algorithm used by a system.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Desempenho da Autentica\xE7\xE3\
            o Biom\xE9trica"
          description: "Para autentica\xE7\xE3o baseada em biometria, empregue mecanismos\
            \ que satisfa\xE7am os seguintes requisitos de qualidade biom\xE9trica\
            \ [Atribui\xE7\xE3o: requisitos de qualidade biom\xE9trica definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Diferentemente da autentica\xE7\xE3o baseada em senha, que\
            \ fornece correspond\xEAncias exatas das senhas inseridas pelo usu\xE1\
            rio com as senhas armazenadas, a autentica\xE7\xE3o biom\xE9trica n\xE3\
            o fornece correspond\xEAncias exatas. Dependendo do tipo de biometria\
            \ e do tipo de mecanismo de coleta, \xE9 prov\xE1vel que haja alguma diverg\xEA\
            ncia entre a biometria apresentada e a biometria armazenada que serve\
            \ como base para compara\xE7\xE3o. O desempenho de correspond\xEAncia\
            \ \xE9 a taxa na qual um algoritmo biom\xE9trico resulta corretamente\
            \ em uma correspond\xEAncia para um usu\xE1rio genu\xEDno e rejeita outros\
            \ usu\xE1rios. Os requisitos de desempenho biom\xE9trico incluem a taxa\
            \ de correspond\xEAncia, que reflete a precis\xE3o do algoritmo de correspond\xEA\
            ncia biom\xE9trica usado por um sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(13)
      name: Authenticator Management | Expiration of Cached Authenticators
      description: 'Prohibit the use of cached authenticators after [Assignment: organization-defined
        time period].'
      annotation: Cached authenticators are used to authenticate to the local machine
        when the network is not available. If cached authentication information is
        out of date, the validity of the authentication information may be questionable.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Expira\xE7\xE3o de Autenticadores\
            \ em Cache"
          description: "Pro\xEDba o uso de autenticadores em cache ap\xF3s [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]."
          annotation: "Autenticadores em cache s\xE3o usados para autentica\xE7\xE3\
            o na m\xE1quina local quando a rede n\xE3o est\xE1 dispon\xEDvel. Se as\
            \ informa\xE7\xF5es de autentica\xE7\xE3o em cache estiverem desatualizadas,\
            \ a validade dessas informa\xE7\xF5es de autentica\xE7\xE3o pode ser question\xE1\
            vel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(14)
      name: Authenticator Management | Managing Content of PKI Trust Stores
      description: For PKI-based authentication, employ an organization-wide methodology
        for managing the content of PKI trust stores installed across all platforms,
        including networks, operating systems, browsers, and applications.
      annotation: An organization-wide methodology for managing the content of PKI
        trust stores helps improve the accuracy and currency of PKI-based authentication
        credentials across the organization.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Gerenciamento do Conte\xFAdo de\
            \ Reposit\xF3rios de Confian\xE7a de PKI"
          description: "Para autentica\xE7\xE3o baseada em PKI, empregue uma metodologia\
            \ abrangente, v\xE1lida para toda a organiza\xE7\xE3o, para gerenciar\
            \ o conte\xFAdo dos reposit\xF3rios de confian\xE7a de PKI instalados\
            \ em todas as plataformas, incluindo redes, sistemas operacionais, navegadores\
            \ e aplica\xE7\xF5es."
          annotation: "Uma metodologia abrangente, v\xE1lida para toda a organiza\xE7\
            \xE3o, para gerenciar o conte\xFAdo dos reposit\xF3rios de confian\xE7\
            a de PKI ajuda a melhorar a precis\xE3o e a atualidade das credenciais\
            \ de autentica\xE7\xE3o baseadas em PKI em toda a organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(15)
      name: Authenticator Management | GSA-approved Products and Services
      description: Use only General Services Administration-approved products and
        services for identity, credential, and access management.
      annotation: General Services Administration (GSA)-approved products and services
        are products and services that have been approved through the GSA conformance
        program, where applicable, and posted to the GSA Approved Products List. GSA
        provides guidance for teams to design and build functional and secure systems
        that comply with Federal Identity, Credential, and Access Management (FICAM)
        policies, technologies, and implementation patterns.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Produtos e Servi\xE7os Aprovados\
            \ pela GSA"
          description: "Use apenas produtos e servi\xE7os aprovados pela General Services\
            \ Administration para gerenciamento de identidade, credenciais e acesso."
          annotation: "Os produtos e servi\xE7os aprovados pela General Services Administration\
            \ (GSA) s\xE3o produtos e servi\xE7os que foram aprovados por meio do\
            \ programa de conformidade da GSA, quando aplic\xE1vel, e publicados na\
            \ Lista de Produtos Aprovados da GSA. A GSA fornece orienta\xE7\xE3o para\
            \ que as equipes projetem e construam sistemas funcionais e seguros que\
            \ estejam em conformidade com as pol\xEDticas, tecnologias e padr\xF5\
            es de implementa\xE7\xE3o do Federal Identity, Credential, and Access\
            \ Management (FICAM)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(16)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(16)
      name: Authenticator Management | In-person or Trusted External Party Authenticator
        Issuance
      description: 'Require that the issuance of [Assignment: organization-defined
        types of and/or specific authenticators] be conducted [Selection: in person;
        by a trusted external party] before [Assignment: organization-defined registration
        authority] with authorization by [Assignment: organization-defined personnel
        or roles].'
      annotation: Issuing authenticators in person or by a trusted external party
        enhances and reinforces the trustworthiness of the identity proofing process.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Emiss\xE3o de Autenticador Presencial\
            \ ou por Terceiro Externo Confi\xE1vel"
          description: "Exija que a emiss\xE3o de [Atribui\xE7\xE3o: tipos de autenticadores\
            \ e/ou autenticadores espec\xEDficos definidos pela organiza\xE7\xE3o]\
            \ seja conduzida [Sele\xE7\xE3o: presencialmente; por um terceiro externo\
            \ confi\xE1vel] perante [Atribui\xE7\xE3o: autoridade de registro definida\
            \ pela organiza\xE7\xE3o] com autoriza\xE7\xE3o de [Atribui\xE7\xE3o:\
            \ pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "A emiss\xE3o de autenticadores presencialmente ou por um terceiro\
            \ externo confi\xE1vel refor\xE7a e fortalece a confiabilidade do processo\
            \ de comprova\xE7\xE3o de identidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(17)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(17)
      name: Authenticator Management | Presentation Attack Detection for Biometric
        Authenticators
      description: Employ presentation attack detection mechanisms for biometric-based
        authentication.
      annotation: Biometric characteristics do not constitute secrets. Such characteristics
        can be obtained by online web accesses, taking a picture of someone with a
        camera phone to obtain facial images with or without their knowledge, lifting
        from objects that someone has touched (e.g., a latent fingerprint), or capturing
        a high-resolution image (e.g., an iris pattern). Presentation attack detection
        technologies including liveness detection, can mitigate the risk of these
        types of attacks by making it difficult to produce artifacts intended to defeat
        the biometric sensor.
      translations:
        pt:
          name: "Gerenciamento de Autenticadores | Detec\xE7\xE3o de Ataques de Apresenta\xE7\
            \xE3o para Autenticadores Biom\xE9tricos"
          description: "Empregue mecanismos de detec\xE7\xE3o de ataques de apresenta\xE7\
            \xE3o para autentica\xE7\xE3o baseada em biometria."
          annotation: "As caracter\xEDsticas biom\xE9tricas n\xE3o constituem segredos.\
            \ Tais caracter\xEDsticas podem ser obtidas por meio de acessos online\
            \ \xE0 web, ao tirar uma foto de algu\xE9m com a c\xE2mera de um celular\
            \ para obter imagens faciais com ou sem o conhecimento da pessoa, ao coletar\
            \ marcas deixadas em objetos que algu\xE9m tenha tocado (por exemplo,\
            \ uma impress\xE3o digital latente) ou ao capturar uma imagem de alta\
            \ resolu\xE7\xE3o (por exemplo, um padr\xE3o de \xEDris). As tecnologias\
            \ de detec\xE7\xE3o de ataques de apresenta\xE7\xE3o, incluindo a detec\xE7\
            \xE3o de vivacidade, podem mitigar o risco desses tipos de ataques ao\
            \ dificultar a produ\xE7\xE3o de artefatos destinados a burlar o sensor\
            \ biom\xE9trico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-5(18)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-5(18)
      name: Authenticator Management | Password Managers
      description: '(a) Employ [Assignment: organization-defined password managers]
        to generate and manage passwords; and

        (b) Protect the passwords using [Assignment: organization-defined controls].'
      annotation: For systems where static passwords are employed, it is often a challenge
        to ensure that the passwords are suitably complex and that the same passwords
        are not employed on multiple systems. A password manager is a solution to
        this problem as it automatically generates and stores strong and different
        passwords for various accounts. A potential risk of using password managers
        is that adversaries can target the collection of passwords generated by the
        password manager. Therefore, the collection of passwords requires protection
        including encrypting the passwords (see IA-5(1)(d)) and storing the collection
        offline in a token.
      translations:
        pt:
          name: Gerenciamento de Autenticadores | Gerenciadores de Senhas
          description: "(a) Empregue [Atribui\xE7\xE3o: gerenciadores de senhas definidos\
            \ pela organiza\xE7\xE3o] para gerar e gerenciar senhas; e\n(b) Proteja\
            \ as senhas usando [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Para sistemas em que s\xE3o empregadas senhas est\xE1ticas,\
            \ frequentemente \xE9 um desafio garantir que as senhas sejam adequadamente\
            \ complexas e que as mesmas senhas n\xE3o sejam utilizadas em m\xFAltiplos\
            \ sistemas. Um gerenciador de senhas \xE9 uma solu\xE7\xE3o para esse\
            \ problema, pois gera e armazena automaticamente senhas fortes e distintas\
            \ para v\xE1rias contas. Um risco potencial do uso de gerenciadores de\
            \ senhas \xE9 que advers\xE1rios podem ter como alvo a cole\xE7\xE3o de\
            \ senhas geradas pelo gerenciador de senhas. Portanto, a cole\xE7\xE3\
            o de senhas requer prote\xE7\xE3o, incluindo a criptografia das senhas\
            \ (ver IA-5(1)(d)) e o armazenamento da cole\xE7\xE3o offline em um token."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-6
      name: Authentication Feedback
      description: Obscure feedback of authentication information during the authentication
        process to protect the information from possible exploitation and use by unauthorized
        individuals.
      annotation: "Authentication feedback from systems does not provide information\
        \ that would allow unauthorized individuals to compromise authentication mechanisms.\
        \ For some types of systems, such as desktops or notebooks with relatively\
        \ large monitors, the threat (referred to as shoulder surfing) may be significant.\
        \ For other types of systems, such as mobile devices with small displays,\
        \ the threat may be less significant and is balanced against the increased\
        \ likelihood of typographic input errors due to small keyboards.\_Thus, the\
        \ means for obscuring authentication feedback is selected accordingly. Obscuring\
        \ authentication feedback includes displaying asterisks when users type passwords\
        \ into input devices or displaying feedback for a very limited time before\
        \ obscuring it."
      translations:
        pt:
          name: "Retorno de Autentica\xE7\xE3o"
          description: "Oculte o retorno das informa\xE7\xF5es de autentica\xE7\xE3\
            o durante o processo de autentica\xE7\xE3o para proteger as informa\xE7\
            \xF5es contra poss\xEDvel explora\xE7\xE3o e uso por indiv\xEDduos n\xE3\
            o autorizados."
          annotation: "O retorno de autentica\xE7\xE3o dos sistemas n\xE3o fornece\
            \ informa\xE7\xF5es que permitiriam que indiv\xEDduos n\xE3o autorizados\
            \ comprometessem os mecanismos de autentica\xE7\xE3o. Para alguns tipos\
            \ de sistemas, como desktops ou notebooks com monitores relativamente\
            \ grandes, a amea\xE7a (conhecida como shoulder surfing) pode ser significativa.\
            \ Para outros tipos de sistemas, como dispositivos m\xF3veis com telas\
            \ pequenas, a amea\xE7a pode ser menos significativa e \xE9 contrabalan\xE7\
            ada pela maior probabilidade de erros tipogr\xE1ficos de entrada devido\
            \ aos teclados pequenos. Assim, o meio para ocultar o retorno de autentica\xE7\
            \xE3o \xE9 selecionado de acordo. A oculta\xE7\xE3o do retorno de autentica\xE7\
            \xE3o inclui exibir asteriscos quando os usu\xE1rios digitam senhas em\
            \ dispositivos de entrada ou exibir o retorno por um tempo muito limitado\
            \ antes de ocult\xE1-lo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-7
      name: Cryptographic Module Authentication
      description: Implement mechanisms for authentication to a cryptographic module
        that meet the requirements of applicable laws, executive orders, directives,
        policies, regulations, standards, and guidelines for such authentication.
      annotation: Authentication mechanisms may be required within a cryptographic
        module to authenticate an operator accessing the module and to verify that
        the operator is authorized to assume the requested role and perform services
        within that role.
      translations:
        pt:
          name: "Autentica\xE7\xE3o de M\xF3dulo Criptogr\xE1fico"
          description: "Implemente mecanismos de autentica\xE7\xE3o para um m\xF3\
            dulo criptogr\xE1fico que atendam aos requisitos de leis, ordens executivas,\
            \ diretrizes, pol\xEDticas, regulamentos, padr\xF5es e orienta\xE7\xF5\
            es aplic\xE1veis a tal autentica\xE7\xE3o."
          annotation: "Mecanismos de autentica\xE7\xE3o podem ser exigidos dentro\
            \ de um m\xF3dulo criptogr\xE1fico para autenticar um operador que acessa\
            \ o m\xF3dulo e para verificar se o operador est\xE1 autorizado a assumir\
            \ a fun\xE7\xE3o solicitada e a executar servi\xE7os dentro dessa fun\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8
      name: Identification and Authentication (non-organizational Users)
      description: Uniquely identify and authenticate non-organizational users or
        processes acting on behalf of non-organizational users.
      annotation: "Non-organizational users include system users other than organizational\
        \ users explicitly covered by IA-2. Non-organizational users are uniquely\
        \ identified and authenticated for accesses other than those explicitly identified\
        \ and documented in AC-14. Identification and authentication of non-organizational\
        \ users accessing federal systems may be required to protect federal, proprietary,\
        \ or privacy-related information (with exceptions noted for national security\
        \ systems). Organizations consider many factors\u2014including security, privacy,\
        \ scalability, and practicality\u2014when balancing the need to ensure ease\
        \ of use for access to federal information and systems with the need to protect\
        \ and adequately mitigate risk."
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)"
          description: "Identifique e autentique de forma \xFAnica usu\xE1rios n\xE3\
            o organizacionais ou processos atuando em nome de usu\xE1rios n\xE3o organizacionais."
          annotation: "Usu\xE1rios n\xE3o organizacionais incluem usu\xE1rios do sistema\
            \ que n\xE3o sejam os usu\xE1rios organizacionais explicitamente cobertos\
            \ pelo IA-2. Usu\xE1rios n\xE3o organizacionais s\xE3o identificados e\
            \ autenticados de forma \xFAnica para acessos diferentes daqueles explicitamente\
            \ identificados e documentados no AC-14. A identifica\xE7\xE3o e autentica\xE7\
            \xE3o de usu\xE1rios n\xE3o organizacionais que acessam sistemas federais\
            \ pode ser exigida para proteger informa\xE7\xF5es federais, propriet\xE1\
            rias ou relacionadas \xE0 privacidade (com exce\xE7\xF5es observadas para\
            \ sistemas de seguran\xE7a nacional). As organiza\xE7\xF5es consideram\
            \ muitos fatores \u2014 incluindo seguran\xE7a, privacidade, escalabilidade\
            \ e praticidade \u2014 ao equilibrar a necessidade de garantir facilidade\
            \ de uso para o acesso a informa\xE7\xF5es e sistemas federais com a necessidade\
            \ de proteger e mitigar adequadamente o risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8(1)
      name: Identification and Authentication (non-organizational Users) | Acceptance
        of PIV Credentials from Other Agencies
      description: Accept and electronically verify Personal Identity Verification-compliant
        credentials from other federal agencies.
      annotation: Acceptance of Personal Identity Verification (PIV) credentials from
        other federal agencies applies to both logical and physical access control
        systems. PIV credentials are those credentials issued by federal agencies
        that conform to FIPS Publication 201 and supporting guidelines. The adequacy
        and reliability of PIV card issuers are addressed and authorized using SP
        800-79-2.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)\
            \ | Aceita\xE7\xE3o de Credenciais PIV de Outras Ag\xEAncias"
          description: "Aceite e verifique eletronicamente credenciais compat\xED\
            veis com Personal Identity Verification de outras ag\xEAncias federais."
          annotation: "A aceita\xE7\xE3o de credenciais Personal Identity Verification\
            \ (PIV) de outras ag\xEAncias federais aplica-se tanto a sistemas de controle\
            \ de acesso l\xF3gico quanto f\xEDsico. As credenciais PIV s\xE3o aquelas\
            \ credenciais emitidas por ag\xEAncias federais que est\xE3o em conformidade\
            \ com a Publica\xE7\xE3o FIPS 201 e as orienta\xE7\xF5es de apoio. A adequa\xE7\
            \xE3o e a confiabilidade dos emissores de cart\xF5es PIV s\xE3o abordadas\
            \ e autorizadas usando o SP 800-79-2."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8(2)
      name: Identification and Authentication (non-organizational Users) | Acceptance
        of External Authenticators
      description: '(a) Accept only external authenticators that are NIST-compliant;
        and

        (b) Document and maintain a list of accepted external authenticators.'
      annotation: Acceptance of only NIST-compliant external authenticators applies
        to organizational systems that are accessible to the public (e.g., public-facing
        websites). External authenticators are issued by nonfederal government entities
        and are compliant with SP 800-63B. Approved external authenticators meet or
        exceed the minimum Federal Government-wide technical, security, privacy, and
        organizational maturity requirements. Meeting or exceeding Federal requirements
        allows Federal Government relying parties to trust external authenticators
        in connection with an authentication transaction at a specified authenticator
        assurance level.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)\
            \ | Aceita\xE7\xE3o de Autenticadores Externos"
          description: '(a) Aceite apenas autenticadores externos que estejam em conformidade
            com o NIST; e

            (b) Documente e mantenha uma lista de autenticadores externos aceitos.'
          annotation: "A aceita\xE7\xE3o apenas de autenticadores externos em conformidade\
            \ com o NIST aplica-se a sistemas organizacionais que s\xE3o acess\xED\
            veis ao p\xFAblico (por exemplo, sites de acesso p\xFAblico). Autenticadores\
            \ externos s\xE3o emitidos por entidades governamentais n\xE3o federais\
            \ e est\xE3o em conformidade com o SP 800-63B. Autenticadores externos\
            \ aprovados atendem ou superam os requisitos m\xEDnimos de maturidade\
            \ t\xE9cnica, de seguran\xE7a, de privacidade e organizacional aplic\xE1\
            veis a todo o Governo Federal. Atender ou superar os requisitos federais\
            \ permite que as partes confiantes do Governo Federal confiem em autenticadores\
            \ externos em conex\xE3o com uma transa\xE7\xE3o de autentica\xE7\xE3\
            o em um n\xEDvel de garantia de autenticador especificado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8(3)
      name: Identification and Authentication (non-organizational Users) | Use of
        FICAM-approved Products
      description: '[Withdrawn: Incorporated into IA-8(2).]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)\
            \ | Uso de Produtos Aprovados pelo FICAM"
          description: '[Retirado: Incorporado em IA-8(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8(4)
      name: Identification and Authentication (non-organizational Users) | Use of
        Defined Profiles
      description: 'Conform to the following profiles for identity management [Assignment:
        organization-defined identity management profiles].'
      annotation: Organizations define profiles for identity management based on open
        identity management standards. To ensure that open identity management standards
        are viable, robust, reliable, sustainable, and interoperable as documented,
        the Federal Government assesses and scopes the standards and technology implementations
        against applicable laws, executive orders, directives, policies, regulations,
        standards, and guidelines.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)\
            \ | Uso de Perfis Definidos"
          description: "Esteja em conformidade com os seguintes perfis de gerenciamento\
            \ de identidade [Atribui\xE7\xE3o: perfis de gerenciamento de identidade\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es definem perfis de gerenciamento de identidade\
            \ com base em padr\xF5es abertos de gerenciamento de identidade. Para\
            \ garantir que os padr\xF5es abertos de gerenciamento de identidade sejam\
            \ vi\xE1veis, robustos, confi\xE1veis, sustent\xE1veis e interoper\xE1\
            veis conforme documentado, o Governo Federal avalia e delimita o escopo\
            \ dos padr\xF5es e das implementa\xE7\xF5es de tecnologia em rela\xE7\xE3\
            o \xE0s leis, ordens executivas, diretrizes, pol\xEDticas, regulamentos,\
            \ padr\xF5es e orienta\xE7\xF5es aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8(5)
      name: Identification and Authentication (non-organizational Users) | Acceptance
        of PVI-I Credentials
      description: 'Accept and verify federated or PKI credentials that meet [Assignment:
        organization-defined policy].'
      annotation: Acceptance of PIV-I credentials can be implemented by PIV, PIV-I,
        and other commercial or external identity providers. The acceptance and verification
        of PIV-I-compliant credentials apply to both logical and physical access control
        systems. The acceptance and verification of PIV-I credentials address nonfederal
        issuers of identity cards that desire to interoperate with United States Government
        PIV systems and that can be trusted by Federal Government-relying parties.
        The X.509 certificate policy for the Federal Bridge Certification Authority
        (FBCA) addresses PIV-I requirements. The PIV-I card is commensurate with the
        PIV credentials as defined in cited references. PIV-I credentials are the
        credentials issued by a PIV-I provider whose PIV-I certificate policy maps
        to the Federal Bridge PIV-I Certificate Policy. A PIV-I provider is cross-certified
        with the FBCA (directly or through another PKI bridge) with policies that
        have been mapped and approved as meeting the requirements of the PIV-I policies
        defined in the FBCA certificate policy.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)\
            \ | Aceita\xE7\xE3o de Credenciais PIV-I"
          description: "Aceite e verifique credenciais federadas ou de PKI que atendam\
            \ \xE0 [Atribui\xE7\xE3o: pol\xEDtica definida pela organiza\xE7\xE3o]."
          annotation: "A aceita\xE7\xE3o de credenciais PIV-I pode ser implementada\
            \ por provedores de identidade PIV, PIV-I e outros provedores comerciais\
            \ ou externos. A aceita\xE7\xE3o e a verifica\xE7\xE3o de credenciais\
            \ compat\xEDveis com PIV-I aplicam-se tanto a sistemas de controle de\
            \ acesso l\xF3gico quanto f\xEDsico. A aceita\xE7\xE3o e a verifica\xE7\
            \xE3o de credenciais PIV-I abordam emissores n\xE3o federais de cart\xF5\
            es de identidade que desejam interoperar com os sistemas PIV do Governo\
            \ dos Estados Unidos e que podem ser confi\xE1veis pelas partes confiantes\
            \ do Governo Federal. A pol\xEDtica de certificado X.509 da Federal Bridge\
            \ Certification Authority (FBCA) aborda os requisitos de PIV-I. O cart\xE3\
            o PIV-I \xE9 equivalente \xE0s credenciais PIV conforme definido nas refer\xEA\
            ncias citadas. As credenciais PIV-I s\xE3o as credenciais emitidas por\
            \ um provedor PIV-I cuja pol\xEDtica de certificado PIV-I \xE9 mapeada\
            \ para a Pol\xEDtica de Certificado PIV-I da Federal Bridge. Um provedor\
            \ PIV-I possui certifica\xE7\xE3o cruzada com a FBCA (diretamente ou por\
            \ meio de outra ponte de PKI) com pol\xEDticas que foram mapeadas e aprovadas\
            \ como atendendo aos requisitos das pol\xEDticas PIV-I definidas na pol\xED\
            tica de certificado da FBCA."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-8(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-8(6)
      name: Identification and Authentication (non-organizational Users) | Disassociability
      description: 'Implement the following measures to disassociate user attributes
        or identifier assertion relationships among individuals, credential service
        providers, and relying parties: [Assignment: organization-defined measures].'
      annotation: Federated identity solutions can create increased privacy risks
        due to the tracking and profiling of individuals. Using identifier mapping
        tables or cryptographic techniques to blind credential service providers and
        relying parties from each other or to make identity attributes less visible
        to transmitting parties can reduce these privacy risks.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios N\xE3o Organizacionais)\
            \ | Dissociabilidade"
          description: "Implemente as seguintes medidas para dissociar atributos de\
            \ usu\xE1rio ou rela\xE7\xF5es de asser\xE7\xE3o de identificador entre\
            \ indiv\xEDduos, provedores de servi\xE7os de credenciais e partes confiantes:\
            \ [Atribui\xE7\xE3o: medidas definidas pela organiza\xE7\xE3o]."
          annotation: "As solu\xE7\xF5es de identidade federada podem criar riscos\
            \ de privacidade maiores devido ao rastreamento e \xE0 cria\xE7\xE3o de\
            \ perfis de indiv\xEDduos. O uso de tabelas de mapeamento de identificadores\
            \ ou de t\xE9cnicas criptogr\xE1ficas para impedir que os provedores de\
            \ servi\xE7os de credenciais e as partes confiantes identifiquem uns aos\
            \ outros, ou para tornar os atributos de identidade menos vis\xEDveis\
            \ para as partes que transmitem, pode reduzir esses riscos de privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-9
      name: Service Identification and Authentication
      description: 'Uniquely identify and authenticate [Assignment: organization-defined
        system services and applications] before establishing communications with
        devices, users, or other services or applications.'
      annotation: Services that may require identification and authentication include
        web applications using digital certificates or services or applications that
        query a database. Identification and authentication methods for system services
        and applications include information or code signing, provenance graphs, and
        electronic signatures that indicate the sources of services. Decisions regarding
        the validity of identification and authentication claims can be made by services
        separate from the services acting on those decisions. This can occur in distributed
        system architectures. In such situations, the identification and authentication
        decisions (instead of actual identifiers and authentication data) are provided
        to the services that need to act on those decisions.
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Servi\xE7os"
          description: "Identifique e autentique de forma \xFAnica [Atribui\xE7\xE3\
            o: servi\xE7os e aplica\xE7\xF5es de sistema definidos pela organiza\xE7\
            \xE3o] antes de estabelecer comunica\xE7\xF5es com dispositivos, usu\xE1\
            rios ou outros servi\xE7os ou aplica\xE7\xF5es."
          annotation: "Servi\xE7os que podem exigir identifica\xE7\xE3o e autentica\xE7\
            \xE3o incluem aplica\xE7\xF5es web que usam certificados digitais ou servi\xE7\
            os ou aplica\xE7\xF5es que consultam um banco de dados. Os m\xE9todos\
            \ de identifica\xE7\xE3o e autentica\xE7\xE3o para servi\xE7os e aplica\xE7\
            \xF5es de sistema incluem assinatura de informa\xE7\xF5es ou de c\xF3\
            digo, grafos de proveni\xEAncia e assinaturas eletr\xF4nicas que indicam\
            \ as origens dos servi\xE7os. As decis\xF5es relativas \xE0 validade das\
            \ alega\xE7\xF5es de identifica\xE7\xE3o e autentica\xE7\xE3o podem ser\
            \ tomadas por servi\xE7os separados dos servi\xE7os que atuam com base\
            \ nessas decis\xF5es. Isso pode ocorrer em arquiteturas de sistemas distribu\xED\
            dos. Nessas situa\xE7\xF5es, as decis\xF5es de identifica\xE7\xE3o e autentica\xE7\
            \xE3o (em vez dos identificadores e dados de autentica\xE7\xE3o reais)\
            \ s\xE3o fornecidas aos servi\xE7os que precisam atuar com base nessas\
            \ decis\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-9(1)
      name: Service Identification and Authentication | Information Exchange
      description: '[Withdrawn: Incorporated into IA-9.]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Servi\xE7os | Troca de\
            \ Informa\xE7\xF5es"
          description: '[Retirado: Incorporado em IA-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-9(2)
      name: Service Identification and Authentication | Transmission of Decisions
      description: '[Withdrawn: Incorporated into IA-9.]'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o de Servi\xE7os | Transmiss\xE3\
            o de Decis\xF5es"
          description: '[Retirado: Incorporado em IA-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-10
      name: Adaptive Authentication
      description: 'Require individuals accessing the system to employ [Assignment:
        organization-defined supplemental authentication techniques or mechanisms]
        under specific [Assignment: organization-defined circumstances or situations].'
      annotation: Adversaries may compromise individual authentication mechanisms
        employed by organizations and subsequently attempt to impersonate legitimate
        users. To address this threat, organizations may employ specific techniques
        or mechanisms and establish protocols to assess suspicious behavior. Suspicious
        behavior may include accessing information that individuals do not typically
        access as part of their duties, roles, or responsibilities; accessing greater
        quantities of information than individuals would routinely access; or attempting
        to access information from suspicious network addresses. When pre-established
        conditions or triggers occur, organizations can require individuals to provide
        additional authentication information. Another potential use for adaptive
        authentication is to increase the strength of mechanism based on the number
        or types of records being accessed. Adaptive authentication does not replace
        and is not used to avoid the use of multi-factor authentication mechanisms
        but can augment implementations of multi-factor authentication.
      translations:
        pt:
          name: "Autentica\xE7\xE3o Adaptativa"
          description: "Exija que os indiv\xEDduos que acessam o sistema empreguem\
            \ [Atribui\xE7\xE3o: t\xE9cnicas ou mecanismos de autentica\xE7\xE3o suplementares\
            \ definidos pela organiza\xE7\xE3o] sob [Atribui\xE7\xE3o: circunst\xE2\
            ncias ou situa\xE7\xF5es espec\xEDficas definidas pela organiza\xE7\xE3\
            o]."
          annotation: "Advers\xE1rios podem comprometer mecanismos individuais de\
            \ autentica\xE7\xE3o empregados pelas organiza\xE7\xF5es e, subsequentemente,\
            \ tentar se passar por usu\xE1rios leg\xEDtimos. Para enfrentar essa amea\xE7\
            a, as organiza\xE7\xF5es podem empregar t\xE9cnicas ou mecanismos espec\xED\
            ficos e estabelecer protocolos para avaliar comportamentos suspeitos.\
            \ Comportamentos suspeitos podem incluir o acesso a informa\xE7\xF5es\
            \ que os indiv\xEDduos normalmente n\xE3o acessam como parte de suas atribui\xE7\
            \xF5es, fun\xE7\xF5es ou responsabilidades; o acesso a quantidades maiores\
            \ de informa\xE7\xF5es do que os indiv\xEDduos rotineiramente acessariam;\
            \ ou a tentativa de acessar informa\xE7\xF5es a partir de endere\xE7os\
            \ de rede suspeitos. Quando ocorrem condi\xE7\xF5es ou gatilhos pr\xE9\
            -estabelecidos, as organiza\xE7\xF5es podem exigir que os indiv\xEDduos\
            \ forne\xE7am informa\xE7\xF5es de autentica\xE7\xE3o adicionais. Outro\
            \ uso potencial da autentica\xE7\xE3o adaptativa \xE9 aumentar a robustez\
            \ do mecanismo com base na quantidade ou nos tipos de registros que est\xE3\
            o sendo acessados. A autentica\xE7\xE3o adaptativa n\xE3o substitui e\
            \ n\xE3o \xE9 usada para evitar o uso de mecanismos de autentica\xE7\xE3\
            o multifator, mas pode complementar as implementa\xE7\xF5es de autentica\xE7\
            \xE3o multifator."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-11
      name: Re-authentication
      description: 'Require users to re-authenticate when [Assignment: organization-defined
        circumstances or situations requiring re-authentication].'
      annotation: In addition to the re-authentication requirements associated with
        device locks, organizations may require re-authentication of individuals in
        certain situations, including when roles, authenticators or credentials change,
        when security categories of systems change, when the execution of privileged
        functions occurs, after a fixed time period, or periodically.
      translations:
        pt:
          name: "Reautentica\xE7\xE3o"
          description: "Exija que os usu\xE1rios se reautentiquem quando [Atribui\xE7\
            \xE3o: circunst\xE2ncias ou situa\xE7\xF5es que exigem reautentica\xE7\
            \xE3o, definidas pela organiza\xE7\xE3o]."
          annotation: "Al\xE9m dos requisitos de reautentica\xE7\xE3o associados aos\
            \ bloqueios de dispositivo, as organiza\xE7\xF5es podem exigir a reautentica\xE7\
            \xE3o de indiv\xEDduos em determinadas situa\xE7\xF5es, incluindo quando\
            \ fun\xE7\xF5es, autenticadores ou credenciais mudam, quando as categorias\
            \ de seguran\xE7a dos sistemas mudam, quando ocorre a execu\xE7\xE3o de\
            \ fun\xE7\xF5es privilegiadas, ap\xF3s um per\xEDodo de tempo fixo ou\
            \ periodicamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12
      name: Identity Proofing
      description: "a. Identity proof users that require accounts for logical access\
        \ to systems based on appropriate identity assurance level requirements as\
        \ specified in applicable standards and guidelines; \nb. Resolve user identities\
        \ to a unique individual; and\nc. Collect, validate, and verify identity evidence."
      annotation: "Identity proofing is the process of collecting, validating, and\
        \ verifying a user\u2019s identity information for the purposes of establishing\
        \ credentials for accessing a system. Identity proofing is intended to mitigate\
        \ threats to the registration of users and the establishment of their accounts.\
        \ Standards and guidelines specifying identity assurance levels for identity\
        \ proofing include SP 800-63-3 and SP 800-63A. Organizations may be subject\
        \ to laws, executive orders, directives, regulations, or policies that address\
        \ the collection of identity evidence. Organizational personnel consult with\
        \ the senior agency official for privacy and legal counsel regarding such\
        \ requirements."
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade"
          description: "a. Comprove a identidade de usu\xE1rios que necessitam de\
            \ contas para acesso l\xF3gico aos sistemas com base nos requisitos apropriados\
            \ de n\xEDvel de garantia de identidade, conforme especificado em padr\xF5\
            es e orienta\xE7\xF5es aplic\xE1veis;\nb. Resolva as identidades dos usu\xE1\
            rios para um indiv\xEDduo \xFAnico; e\nc. Colete, valide e verifique as\
            \ evid\xEAncias de identidade."
          annotation: "A comprova\xE7\xE3o de identidade \xE9 o processo de coletar,\
            \ validar e verificar as informa\xE7\xF5es de identidade de um usu\xE1\
            rio com o prop\xF3sito de estabelecer credenciais para acesso a um sistema.\
            \ A comprova\xE7\xE3o de identidade destina-se a mitigar amea\xE7as ao\
            \ registro de usu\xE1rios e ao estabelecimento de suas contas. Os padr\xF5\
            es e orienta\xE7\xF5es que especificam n\xEDveis de garantia de identidade\
            \ para a comprova\xE7\xE3o de identidade incluem o SP 800-63-3 e o SP\
            \ 800-63A. As organiza\xE7\xF5es podem estar sujeitas a leis, ordens executivas,\
            \ diretrizes, regulamentos ou pol\xEDticas que abordem a coleta de evid\xEA\
            ncias de identidade. O pessoal organizacional consulta o alto funcion\xE1\
            rio da ag\xEAncia respons\xE1vel pela privacidade e a assessoria jur\xED\
            dica a respeito de tais requisitos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12(1)
      name: Identity Proofing | Supervisor Authorization
      description: Require that the registration process to receive an account for
        logical access includes supervisor or sponsor authorization.
      annotation: "Including supervisor or sponsor authorization as part of the registration\
        \ process provides an additional level of scrutiny to ensure that the user\u2019\
        s management chain is aware of the account, the account is essential to carry\
        \ out organizational missions and functions, and the user\u2019s privileges\
        \ are appropriate for the anticipated responsibilities and authorities within\
        \ the organization."
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade | Autoriza\xE7\xE3o do Supervisor"
          description: "Exija que o processo de registro para obter uma conta de acesso\
            \ l\xF3gico inclua a autoriza\xE7\xE3o do supervisor ou do patrocinador."
          annotation: "A inclus\xE3o da autoriza\xE7\xE3o do supervisor ou do patrocinador\
            \ como parte do processo de registro fornece um n\xEDvel adicional de\
            \ escrut\xEDnio para garantir que a cadeia de gest\xE3o do usu\xE1rio\
            \ esteja ciente da conta, que a conta seja essencial para a execu\xE7\xE3\
            o das miss\xF5es e fun\xE7\xF5es organizacionais e que os privil\xE9gios\
            \ do usu\xE1rio sejam apropriados para as responsabilidades e autoridades\
            \ previstas dentro da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12(2)
      name: Identity Proofing | Identity Evidence
      description: Require evidence of individual identification be presented to the
        registration authority.
      annotation: "Identity evidence, such as documentary evidence or a combination\
        \ of documents and biometrics, reduces the likelihood of individuals using\
        \ fraudulent identification to establish an identity or at least increases\
        \ the work factor of potential adversaries. The forms of acceptable evidence\
        \ are consistent with the risks to the systems, roles, and privileges associated\
        \ with the user\u2019s account."
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade | Evid\xEAncia de Identidade"
          description: "Exija que evid\xEAncia de identifica\xE7\xE3o individual seja\
            \ apresentada \xE0 autoridade de registro."
          annotation: "A evid\xEAncia de identidade, como evid\xEAncia documental\
            \ ou uma combina\xE7\xE3o de documentos e biometria, reduz a probabilidade\
            \ de indiv\xEDduos usarem identifica\xE7\xE3o fraudulenta para estabelecer\
            \ uma identidade ou, pelo menos, aumenta o fator de trabalho de potenciais\
            \ advers\xE1rios. As formas de evid\xEAncia aceit\xE1veis s\xE3o consistentes\
            \ com os riscos para os sistemas, fun\xE7\xF5es e privil\xE9gios associados\
            \ \xE0 conta do usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12(3)
      name: Identity Proofing | Identity Evidence Validation and Verification
      description: 'Require that the presented identity evidence be validated and
        verified through [Assignment: organizational defined methods of validation
        and verification].'
      annotation: Validation and verification of identity evidence increases the assurance
        that accounts and identifiers are being established for the correct user and
        authenticators are being bound to that user. Validation refers to the process
        of confirming that the evidence is genuine and authentic, and the data contained
        in the evidence is correct, current, and related to an individual. Verification
        confirms and establishes a linkage between the claimed identity and the actual
        existence of the user presenting the evidence. Acceptable methods for validating
        and verifying identity evidence are consistent with the risks to the systems,
        roles, and privileges associated with the users account.
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade | Valida\xE7\xE3o e Verifica\xE7\xE3\
            o de Evid\xEAncia de Identidade"
          description: "Exija que a evid\xEAncia de identidade apresentada seja validada\
            \ e verificada por meio de [Atribui\xE7\xE3o: m\xE9todos de valida\xE7\
            \xE3o e verifica\xE7\xE3o definidos pela organiza\xE7\xE3o]."
          annotation: "A valida\xE7\xE3o e a verifica\xE7\xE3o da evid\xEAncia de\
            \ identidade aumentam a garantia de que as contas e os identificadores\
            \ est\xE3o sendo estabelecidos para o usu\xE1rio correto e de que os autenticadores\
            \ est\xE3o sendo vinculados a esse usu\xE1rio. A valida\xE7\xE3o refere-se\
            \ ao processo de confirmar que a evid\xEAncia \xE9 genu\xEDna e aut\xEA\
            ntica e que os dados contidos na evid\xEAncia est\xE3o corretos, atualizados\
            \ e relacionados a um indiv\xEDduo. A verifica\xE7\xE3o confirma e estabelece\
            \ uma liga\xE7\xE3o entre a identidade alegada e a exist\xEAncia real\
            \ do usu\xE1rio que apresenta a evid\xEAncia. Os m\xE9todos aceit\xE1\
            veis para validar e verificar a evid\xEAncia de identidade s\xE3o consistentes\
            \ com os riscos para os sistemas, fun\xE7\xF5es e privil\xE9gios associados\
            \ \xE0 conta do usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12(4)
      name: Identity Proofing | In-person Validation and Verification
      description: Require that the validation and verification of identity evidence
        be conducted in person before a designated registration authority.
      annotation: In-person proofing reduces the likelihood of fraudulent credentials
        being issued because it requires the physical presence of individuals, the
        presentation of physical identity documents, and actual face-to-face interactions
        with designated registration authorities.
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade | Valida\xE7\xE3o e Verifica\xE7\xE3\
            o Presencial"
          description: "Exija que a valida\xE7\xE3o e a verifica\xE7\xE3o da evid\xEA\
            ncia de identidade sejam conduzidas presencialmente perante uma autoridade\
            \ de registro designada."
          annotation: "A comprova\xE7\xE3o presencial reduz a probabilidade de emiss\xE3\
            o de credenciais fraudulentas porque exige a presen\xE7a f\xEDsica dos\
            \ indiv\xEDduos, a apresenta\xE7\xE3o de documentos f\xEDsicos de identidade\
            \ e intera\xE7\xF5es reais cara a cara com as autoridades de registro\
            \ designadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12(5)
      name: Identity Proofing | Address Confirmation
      description: 'Require that a [Selection: registration code; notice of proofing]
        be delivered through an out-of-band channel to verify the users address (physical
        or digital) of record.'
      annotation: To make it more difficult for adversaries to pose as legitimate
        users during the identity proofing process, organizations can use out-of-band
        methods to ensure that the individual associated with an address of record
        is the same individual that participated in the registration. Confirmation
        can take the form of a temporary enrollment code or a notice of proofing.
        The delivery address for these artifacts is obtained from records and not
        self-asserted by the user. The address can include a physical or digital address.
        A home address is an example of a physical address. Email addresses and telephone
        numbers are examples of digital addresses.
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade | Confirma\xE7\xE3o de Endere\xE7\
            o"
          description: "Exija que um [Sele\xE7\xE3o: c\xF3digo de registro; aviso\
            \ de comprova\xE7\xE3o] seja entregue por meio de um canal fora de banda\
            \ para verificar o endere\xE7o (f\xEDsico ou digital) registrado do usu\xE1\
            rio."
          annotation: "Para dificultar que advers\xE1rios se passem por usu\xE1rios\
            \ leg\xEDtimos durante o processo de comprova\xE7\xE3o de identidade,\
            \ as organiza\xE7\xF5es podem usar m\xE9todos fora de banda para garantir\
            \ que o indiv\xEDduo associado a um endere\xE7o registrado seja o mesmo\
            \ indiv\xEDduo que participou do registro. A confirma\xE7\xE3o pode assumir\
            \ a forma de um c\xF3digo de inscri\xE7\xE3o tempor\xE1rio ou de um aviso\
            \ de comprova\xE7\xE3o. O endere\xE7o de entrega desses artefatos \xE9\
            \ obtido a partir de registros e n\xE3o \xE9 autodeclarado pelo usu\xE1\
            rio. O endere\xE7o pode incluir um endere\xE7o f\xEDsico ou digital. Um\
            \ endere\xE7o residencial \xE9 um exemplo de endere\xE7o f\xEDsico. Endere\xE7\
            os de e-mail e n\xFAmeros de telefone s\xE3o exemplos de endere\xE7os\
            \ digitais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-12(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-12(6)
      name: Identity Proofing | Accept Externally-proofed Identities
      description: 'Accept externally-proofed identities at [Assignment: organization-defined
        identity assurance level].'
      annotation: To limit unnecessary re-proofing of identities, particularly of
        non-PIV users, organizations accept proofing conducted at a commensurate level
        of assurance by other agencies or organizations. Proofing is consistent with
        organizational security policy and the identity assurance level appropriate
        for the system, application, or information accessed. Accepting externally-proofed
        identities is a fundamental component of managing federated identities across
        agencies and organizations.
      translations:
        pt:
          name: "Comprova\xE7\xE3o de Identidade | Aceitar Identidades Comprovadas\
            \ Externamente"
          description: "Aceite identidades comprovadas externamente no [Atribui\xE7\
            \xE3o: n\xEDvel de garantia de identidade definido pela organiza\xE7\xE3\
            o]."
          annotation: "Para limitar a recomprova\xE7\xE3o desnecess\xE1ria de identidades,\
            \ particularmente de usu\xE1rios n\xE3o PIV, as organiza\xE7\xF5es aceitam\
            \ a comprova\xE7\xE3o conduzida em um n\xEDvel de garantia equivalente\
            \ por outras ag\xEAncias ou organiza\xE7\xF5es. A comprova\xE7\xE3o \xE9\
            \ consistente com a pol\xEDtica de seguran\xE7a organizacional e com o\
            \ n\xEDvel de garantia de identidade apropriado para o sistema, aplica\xE7\
            \xE3o ou informa\xE7\xE3o acessada. Aceitar identidades comprovadas externamente\
            \ \xE9 um componente fundamental do gerenciamento de identidades federadas\
            \ entre ag\xEAncias e organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      assessable: false
      depth: 1
      ref_id: IR
      name: Incident Response
      translations:
        pt:
          name: Resposta a Incidentes
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] incident response policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the incident response policy
        and the associated incident response controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the incident response policy
        and procedures; and

        c. Review and update the current incident response:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Incident response policy and procedures address the controls in
        the IR family that are implemented within systems and organizations. The risk
        management strategy is an important factor in establishing such policies and
        procedures. Policies and procedures contribute to security and privacy assurance.
        Therefore, it is important that security and privacy programs collaborate
        on the development of incident response policy and procedures. Security and
        privacy program policies and procedures at the organization level are preferable,
        in general, and may obviate the need for mission- or system-specific policies
        and procedures. The policy can be included as part of the general security
        and privacy policy or be represented by multiple policies that reflect the
        complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to incident
        response policy and procedures include assessment or audit findings, security
        incidents or breaches, or changes in laws, executive orders, directives, regulations,
        policies, standards, and guidelines. Simply restating controls does not constitute
        an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de resposta a incidentes de n\xEDvel [Sele\xE7\xE3o (um ou mais):\
            \ organizacional; de processo de miss\xE3o/neg\xF3cio; de sistema] que:\n\
            (a) Aborde prop\xF3sito, escopo, fun\xE7\xF5es, responsabilidades, comprometimento\
            \ da gest\xE3o, coordena\xE7\xE3o entre entidades organizacionais e conformidade;\
            \ e\n(b) Seja consistente com leis, ordens executivas, diretivas, regulamentos,\
            \ pol\xEDticas, normas e diretrizes aplic\xE1veis; e\n2. Procedimentos\
            \ para facilitar a implementa\xE7\xE3o da pol\xEDtica de resposta a incidentes\
            \ e dos controles de resposta a incidentes associados;\nb. Designar um\
            \ [Atribui\xE7\xE3o: respons\xE1vel definido pela organiza\xE7\xE3o] para\
            \ gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de resposta a incidentes; e\nc. Revisar\
            \ e atualizar a atual resposta a incidentes:\n1. Pol\xEDtica [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de resposta a incidentes abordam\
            \ os controles da fam\xEDlia IR que s\xE3o implementados dentro de sistemas\
            \ e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de riscos \xE9 um\
            \ fator importante no estabelecimento de tais pol\xEDticas e procedimentos.\
            \ As pol\xEDticas e os procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Por isso, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem no desenvolvimento da pol\xEDtica e dos procedimentos\
            \ de resposta a incidentes. As pol\xEDticas e os procedimentos dos programas\
            \ de seguran\xE7a e privacidade em n\xEDvel organizacional s\xE3o, em\
            \ geral, prefer\xEDveis e podem tornar desnecess\xE1rias pol\xEDticas\
            \ e procedimentos espec\xEDficos de miss\xE3o ou de sistema. A pol\xED\
            tica pode ser inclu\xEDda como parte da pol\xEDtica geral de seguran\xE7\
            a e privacidade ou ser representada por m\xFAltiplas pol\xEDticas que\
            \ reflitam a natureza complexa das organiza\xE7\xF5es. Os procedimentos\
            \ podem ser estabelecidos para programas de seguran\xE7a e privacidade,\
            \ para processos de miss\xE3o ou neg\xF3cio e para sistemas, se necess\xE1\
            rio. Os procedimentos descrevem como as pol\xEDticas ou os controles s\xE3\
            o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0 fun\xE7\
            \xE3o que \xE9 objeto do procedimento. Os procedimentos podem ser documentados\
            \ em planos de seguran\xE7a e privacidade de sistemas ou em um ou mais\
            \ documentos separados. Eventos que podem precipitar uma atualiza\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de resposta a incidentes incluem\
            \ constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\
            \xF5es de seguran\xE7a, ou altera\xE7\xF5es em leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes. A simples\
            \ reafirma\xE7\xE3o de controles n\xE3o constitui uma pol\xEDtica ou procedimento\
            \ organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-2
      name: Incident Response Training
      description: 'a. Provide incident response training to system users consistent
        with assigned roles and responsibilities:

        1. Within [Assignment: organization-defined time period] of assuming an incident
        response role or responsibility or acquiring system access;

        2. When required by system changes; and

        3. [Assignment: organization-defined frequency] thereafter; and

        b. Review and update incident response training content [Assignment: organization-defined
        frequency] and following [Assignment: organization-defined events].'
      annotation: "Incident response training is associated with the assigned roles\
        \ and responsibilities of organizational personnel to ensure that the appropriate\
        \ content and level of detail are included in such training. For example,\
        \ users may only need to know who to call or how to recognize an incident;\
        \ system administrators\_may require\_additional training on how to handle\
        \ incidents; and incident responders may receive more specific training on\
        \ forensics, data collection techniques, reporting, system recovery, and system\
        \ restoration. Incident response training includes user training in identifying\
        \ and reporting suspicious activities from external and internal sources.\
        \ Incident response training for users may be provided as part of AT-2 or\
        \ AT-3. Events that may precipitate an update to incident response training\
        \ content include, but are not limited to, incident response plan testing\
        \ or response to an actual incident (lessons learned), assessment or audit\
        \ findings, or changes in applicable laws, executive orders, directives, regulations,\
        \ policies, standards, and guidelines."
      translations:
        pt:
          name: Treinamento de Resposta a Incidentes
          description: "a. Fornecer treinamento de resposta a incidentes aos usu\xE1\
            rios do sistema de forma consistente com as fun\xE7\xF5es e responsabilidades\
            \ atribu\xEDdas:\n1. Dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o] ap\xF3s assumir uma fun\xE7\xE3o ou\
            \ responsabilidade de resposta a incidentes ou adquirir acesso ao sistema;\n\
            2. Quando exigido por altera\xE7\xF5es no sistema; e\n3. [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o] a partir de ent\xE3\
            o; e\nb. Revisar e atualizar o conte\xFAdo do treinamento de resposta\
            \ a incidentes [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o]."
          annotation: "O treinamento de resposta a incidentes est\xE1 associado \xE0\
            s fun\xE7\xF5es e responsabilidades atribu\xEDdas ao pessoal da organiza\xE7\
            \xE3o, para assegurar que o conte\xFAdo e o n\xEDvel de detalhe apropriados\
            \ sejam inclu\xEDdos nesse treinamento. Por exemplo, os usu\xE1rios podem\
            \ precisar saber apenas a quem ligar ou como reconhecer um incidente;\
            \ os administradores de sistema podem necessitar de treinamento adicional\
            \ sobre como lidar com incidentes; e os respondedores de incidentes podem\
            \ receber treinamento mais espec\xEDfico sobre per\xEDcia (forense), t\xE9\
            cnicas de coleta de dados, relato, recupera\xE7\xE3o de sistema e restaura\xE7\
            \xE3o de sistema. O treinamento de resposta a incidentes inclui o treinamento\
            \ de usu\xE1rios para identificar e relatar atividades suspeitas de fontes\
            \ externas e internas. O treinamento de resposta a incidentes para usu\xE1\
            rios pode ser fornecido como parte de AT-2 ou AT-3. Eventos que podem\
            \ precipitar uma atualiza\xE7\xE3o do conte\xFAdo do treinamento de resposta\
            \ a incidentes incluem, mas n\xE3o se limitam a, testes do plano de resposta\
            \ a incidentes ou resposta a um incidente real (li\xE7\xF5es aprendidas),\
            \ constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, ou altera\xE7\xF5\
            es em leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-2(1)
      name: Incident Response Training | Simulated Events
      description: Incorporate simulated events into incident response training to
        facilitate the required response by personnel in crisis situations.
      annotation: Organizations establish requirements for responding to incidents
        in incident response plans. Incorporating simulated events into incident response
        training helps to ensure that personnel understand their individual responsibilities
        and what specific actions to take in crisis situations.
      translations:
        pt:
          name: Treinamento de Resposta a Incidentes | Eventos Simulados
          description: "Incorporar eventos simulados ao treinamento de resposta a\
            \ incidentes para facilitar a resposta exigida do pessoal em situa\xE7\
            \xF5es de crise."
          annotation: "As organiza\xE7\xF5es estabelecem requisitos para responder\
            \ a incidentes nos planos de resposta a incidentes. Incorporar eventos\
            \ simulados ao treinamento de resposta a incidentes ajuda a assegurar\
            \ que o pessoal compreenda suas responsabilidades individuais e quais\
            \ a\xE7\xF5es espec\xEDficas tomar em situa\xE7\xF5es de crise."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-2(2)
      name: Incident Response Training | Automated Training Environments
      description: 'Provide an incident response training environment using [Assignment:
        organization-defined automated mechanisms].'
      annotation: Automated mechanisms can provide a more thorough and realistic incident
        response training environment. This can be accomplished, for example, by providing
        more complete coverage of incident response issues, selecting more realistic
        training scenarios and environments, and stressing the response capability.
      translations:
        pt:
          name: Treinamento de Resposta a Incidentes | Ambientes de Treinamento Automatizados
          description: "Fornecer um ambiente de treinamento de resposta a incidentes\
            \ utilizando [Atribui\xE7\xE3o: mecanismos automatizados definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados podem proporcionar um ambiente\
            \ de treinamento de resposta a incidentes mais completo e realista. Isso\
            \ pode ser alcan\xE7ado, por exemplo, fornecendo uma cobertura mais completa\
            \ das quest\xF5es de resposta a incidentes, selecionando cen\xE1rios e\
            \ ambientes de treinamento mais realistas e exigindo o m\xE1ximo da capacidade\
            \ de resposta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-2(3)
      name: Incident Response Training | Breach
      description: "Provide incident response training on how to identify and respond\
        \ to a breach, including the organization\u2019s process for reporting a breach."
      annotation: For federal agencies, an incident that involves personally identifiable
        information is considered a breach. A breach results in the loss of control,
        compromise, unauthorized disclosure, unauthorized acquisition, or a similar
        occurrence where a person other than an authorized user accesses or potentially
        accesses personally identifiable information or an authorized user accesses
        or potentially accesses such information for other than authorized purposes.
        The incident response training emphasizes the obligation of individuals to
        report both confirmed and suspected breaches involving information in any
        medium or form, including paper, oral, and electronic. Incident response training
        includes tabletop exercises that simulate a breach. See IR-2(1).
      translations:
        pt:
          name: "Treinamento de Resposta a Incidentes | Viola\xE7\xE3o"
          description: "Fornecer treinamento de resposta a incidentes sobre como identificar\
            \ e responder a uma viola\xE7\xE3o, incluindo o processo da organiza\xE7\
            \xE3o para relatar uma viola\xE7\xE3o."
          annotation: "Para as ag\xEAncias federais, um incidente que envolve informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal \xE9 considerado uma viola\xE7\xE3\
            o. Uma viola\xE7\xE3o resulta na perda de controle, no comprometimento,\
            \ na divulga\xE7\xE3o n\xE3o autorizada, na aquisi\xE7\xE3o n\xE3o autorizada\
            \ ou em ocorr\xEAncia semelhante em que uma pessoa que n\xE3o seja um\
            \ usu\xE1rio autorizado acessa ou potencialmente acessa informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal, ou em que um usu\xE1rio autorizado\
            \ acessa ou potencialmente acessa tais informa\xE7\xF5es para finalidades\
            \ distintas das autorizadas. O treinamento de resposta a incidentes enfatiza\
            \ a obriga\xE7\xE3o dos indiv\xEDduos de relatar tanto as viola\xE7\xF5\
            es confirmadas quanto as suspeitas que envolvam informa\xE7\xF5es em qualquer\
            \ meio ou forma, incluindo papel, oral e eletr\xF4nico. O treinamento\
            \ de resposta a incidentes inclui exerc\xEDcios de mesa (tabletop) que\
            \ simulam uma viola\xE7\xE3o. Ver IR-2(1)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-3
      name: Incident Response Testing
      description: 'Test the effectiveness of the incident response capability for
        the system [Assignment: organization-defined frequency] using the following
        tests: [Assignment: organization-defined tests].'
      annotation: Organizations test incident response capabilities to determine their
        effectiveness and identify potential weaknesses or deficiencies. Incident
        response testing includes the use of checklists, walk-through or tabletop
        exercises, and simulations (parallel or full interrupt). Incident response
        testing can include a determination of the effects on organizational operations
        and assets and individuals due to incident response. The use of qualitative
        and quantitative data aids in determining the effectiveness of incident response
        processes.
      translations:
        pt:
          name: Teste de Resposta a Incidentes
          description: "Testar a efic\xE1cia da capacidade de resposta a incidentes\
            \ do sistema [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] utilizando os seguintes testes: [Atribui\xE7\xE3o: testes definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es testam as capacidades de resposta a incidentes\
            \ para determinar sua efic\xE1cia e identificar potenciais fragilidades\
            \ ou defici\xEAncias. O teste de resposta a incidentes inclui o uso de\
            \ listas de verifica\xE7\xE3o, exerc\xEDcios de simula\xE7\xE3o (walk-through)\
            \ ou de mesa (tabletop) e simula\xE7\xF5es (paralelas ou com interrup\xE7\
            \xE3o total). O teste de resposta a incidentes pode incluir a determina\xE7\
            \xE3o dos efeitos sobre as opera\xE7\xF5es e os ativos organizacionais\
            \ e sobre os indiv\xEDduos decorrentes da resposta a incidentes. O uso\
            \ de dados qualitativos e quantitativos auxilia na determina\xE7\xE3o\
            \ da efic\xE1cia dos processos de resposta a incidentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-3(1)
      name: Incident Response Testing | Automated Testing
      description: 'Test the incident response capability using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Organizations use automated mechanisms to more thoroughly and effectively
        test incident response capabilities. This can be accomplished by providing
        more complete coverage of incident response issues, selecting realistic test
        scenarios and environments, and stressing the response capability.
      translations:
        pt:
          name: Teste de Resposta a Incidentes | Teste Automatizado
          description: "Testar a capacidade de resposta a incidentes utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es utilizam mecanismos automatizados para\
            \ testar de forma mais completa e eficaz as capacidades de resposta a\
            \ incidentes. Isso pode ser alcan\xE7ado fornecendo uma cobertura mais\
            \ completa das quest\xF5es de resposta a incidentes, selecionando cen\xE1\
            rios e ambientes de teste realistas e exigindo o m\xE1ximo da capacidade\
            \ de resposta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-3(2)
      name: Incident Response Testing | Coordination with Related Plans
      description: Coordinate incident response testing with organizational elements
        responsible for related plans.
      annotation: Organizational plans related to incident response testing include
        business continuity plans, disaster recovery plans, continuity of operations
        plans, contingency plans, crisis communications plans, critical infrastructure
        plans, and occupant emergency plans.
      translations:
        pt:
          name: "Teste de Resposta a Incidentes | Coordena\xE7\xE3o com Planos Relacionados"
          description: "Coordenar o teste de resposta a incidentes com os elementos\
            \ organizacionais respons\xE1veis pelos planos relacionados."
          annotation: "Os planos organizacionais relacionados ao teste de resposta\
            \ a incidentes incluem planos de continuidade de neg\xF3cios, planos de\
            \ recupera\xE7\xE3o de desastres, planos de continuidade de opera\xE7\xF5\
            es, planos de conting\xEAncia, planos de comunica\xE7\xE3o de crise, planos\
            \ de infraestrutura cr\xEDtica e planos de emerg\xEAncia para ocupantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-3(3)
      name: Incident Response Testing | Continuous Improvement
      description: 'Use qualitative and quantitative data from testing to:

        (a) Determine the effectiveness of incident response processes;

        (b) Continuously improve incident response processes; and

        (c) Provide incident response measures and metrics that are accurate, consistent,
        and in a reproducible format.'
      annotation: To help incident response activities function as intended, organizations
        may use metrics and evaluation criteria to assess incident response programs
        as part of an effort to continually improve response performance. These efforts
        facilitate improvement in incident response efficacy and lessen the impact
        of incidents.
      translations:
        pt:
          name: "Teste de Resposta a Incidentes | Melhoria Cont\xEDnua"
          description: "Utilizar dados qualitativos e quantitativos provenientes dos\
            \ testes para:\n(a) Determinar a efic\xE1cia dos processos de resposta\
            \ a incidentes;\n(b) Melhorar continuamente os processos de resposta a\
            \ incidentes; e\n(c) Fornecer medidas e m\xE9tricas de resposta a incidentes\
            \ que sejam precisas, consistentes e em formato reproduz\xEDvel."
          annotation: "Para ajudar a fazer com que as atividades de resposta a incidentes\
            \ funcionem como pretendido, as organiza\xE7\xF5es podem utilizar m\xE9\
            tricas e crit\xE9rios de avalia\xE7\xE3o para avaliar os programas de\
            \ resposta a incidentes como parte de um esfor\xE7o para melhorar continuamente\
            \ o desempenho da resposta. Esses esfor\xE7os facilitam a melhoria da\
            \ efic\xE1cia da resposta a incidentes e reduzem o impacto dos incidentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4
      name: Incident Handling
      description: 'a. Implement an incident handling capability for incidents that
        is consistent with the incident response plan and includes preparation, detection
        and analysis, containment, eradication, and recovery;

        b. Coordinate incident handling activities with contingency planning activities;

        c. Incorporate lessons learned from ongoing incident handling activities into
        incident response procedures, training, and testing, and implement the resulting
        changes accordingly; and

        d. Ensure the rigor, intensity, scope, and results of incident handling activities
        are comparable and predictable across the organization.'
      annotation: Organizations recognize that incident response capabilities are
        dependent on the capabilities of organizational systems and the mission and
        business processes being supported by those systems. Organizations consider
        incident response as part of the definition, design, and development of mission
        and business processes and systems. Incident-related information can be obtained
        from a variety of sources, including audit monitoring, physical access monitoring,
        and network monitoring; user or administrator reports; and reported supply
        chain events. An effective incident handling capability includes coordination
        among many organizational entities (e.g., mission or business owners, system
        owners, authorizing officials, human resources offices, physical security
        offices, personnel security offices, legal departments, risk executive [function],
        operations personnel, procurement offices). Suspected security incidents include
        the receipt of suspicious email communications that can contain malicious
        code. Suspected supply chain incidents include the insertion of counterfeit
        hardware or malicious code into organizational systems or system components.
        For federal agencies, an incident that involves personally identifiable information
        is considered a breach. A breach results in unauthorized disclosure, the loss
        of control, unauthorized acquisition, compromise, or a similar occurrence
        where a person other than an authorized user accesses or potentially accesses
        personally identifiable information or an authorized user accesses or potentially
        accesses such information for other than authorized purposes.
      translations:
        pt:
          name: Tratamento de Incidentes
          description: "a. Implementar uma capacidade de tratamento de incidentes\
            \ que seja consistente com o plano de resposta a incidentes e que inclua\
            \ prepara\xE7\xE3o, detec\xE7\xE3o e an\xE1lise, conten\xE7\xE3o, erradica\xE7\
            \xE3o e recupera\xE7\xE3o;\nb. Coordenar as atividades de tratamento de\
            \ incidentes com as atividades de planejamento de conting\xEAncia;\nc.\
            \ Incorporar as li\xE7\xF5es aprendidas das atividades de tratamento de\
            \ incidentes em andamento aos procedimentos, ao treinamento e aos testes\
            \ de resposta a incidentes, e implementar as altera\xE7\xF5es resultantes\
            \ de forma correspondente; e\nd. Assegurar que o rigor, a intensidade,\
            \ o escopo e os resultados das atividades de tratamento de incidentes\
            \ sejam compar\xE1veis e previs\xEDveis em toda a organiza\xE7\xE3o."
          annotation: "As organiza\xE7\xF5es reconhecem que as capacidades de resposta\
            \ a incidentes dependem das capacidades dos sistemas organizacionais e\
            \ dos processos de miss\xE3o e neg\xF3cio que s\xE3o suportados por esses\
            \ sistemas. As organiza\xE7\xF5es consideram a resposta a incidentes como\
            \ parte da defini\xE7\xE3o, do projeto e do desenvolvimento dos processos\
            \ de miss\xE3o e neg\xF3cio e dos sistemas. As informa\xE7\xF5es relacionadas\
            \ a incidentes podem ser obtidas de diversas fontes, incluindo monitoramento\
            \ de auditoria, monitoramento de acesso f\xEDsico e monitoramento de rede;\
            \ relatos de usu\xE1rios ou administradores; e eventos relatados da cadeia\
            \ de suprimentos. Uma capacidade eficaz de tratamento de incidentes inclui\
            \ a coordena\xE7\xE3o entre muitas entidades organizacionais (por exemplo,\
            \ propriet\xE1rios de miss\xE3o ou neg\xF3cio, propriet\xE1rios de sistemas,\
            \ autoridades autorizadoras, departamentos de recursos humanos, escrit\xF3\
            rios de seguran\xE7a f\xEDsica, escrit\xF3rios de seguran\xE7a de pessoal,\
            \ departamentos jur\xEDdicos, executivo de risco [fun\xE7\xE3o], pessoal\
            \ de opera\xE7\xF5es, escrit\xF3rios de aquisi\xE7\xF5es). Incidentes\
            \ de seguran\xE7a suspeitos incluem o recebimento de comunica\xE7\xF5\
            es por e-mail suspeitas que podem conter c\xF3digo malicioso. Incidentes\
            \ suspeitos da cadeia de suprimentos incluem a inser\xE7\xE3o de hardware\
            \ falsificado ou c\xF3digo malicioso em sistemas ou componentes de sistemas\
            \ organizacionais. Para as ag\xEAncias federais, um incidente que envolve\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal \xE9 considerado uma\
            \ viola\xE7\xE3o. Uma viola\xE7\xE3o resulta em divulga\xE7\xE3o n\xE3\
            o autorizada, perda de controle, aquisi\xE7\xE3o n\xE3o autorizada, comprometimento\
            \ ou ocorr\xEAncia semelhante em que uma pessoa que n\xE3o seja um usu\xE1\
            rio autorizado acessa ou potencialmente acessa informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal, ou em que um usu\xE1rio autorizado acessa ou potencialmente\
            \ acessa tais informa\xE7\xF5es para finalidades distintas das autorizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(1)
      name: Incident Handling | Automated Incident Handling Processes
      description: 'Support the incident handling process using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated mechanisms that support incident handling processes include
        online incident management systems and tools that support the collection of
        live response data, full network packet capture, and forensic analysis.
      translations:
        pt:
          name: Tratamento de Incidentes | Processos Automatizados de Tratamento de
            Incidentes
          description: "Apoiar o processo de tratamento de incidentes utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados que apoiam os processos de tratamento\
            \ de incidentes incluem sistemas de gerenciamento de incidentes online\
            \ e ferramentas que apoiam a coleta de dados de resposta ao vivo, a captura\
            \ completa de pacotes de rede e a an\xE1lise forense."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(2)
      name: Incident Handling | Dynamic Reconfiguration
      description: 'Include the following types of dynamic reconfiguration for [Assignment:
        organization-defined system components] as part of the incident response capability:
        [Assignment: organization-defined types of dynamic reconfiguration].'
      annotation: Dynamic reconfiguration includes changes to router rules, access
        control lists, intrusion detection or prevention system parameters, and filter
        rules for guards or firewalls. Organizations may perform dynamic reconfiguration
        of systems to stop attacks, misdirect attackers, and isolate components of
        systems, thus limiting the extent of the damage from breaches or compromises.
        Organizations include specific time frames for achieving the reconfiguration
        of systems in the definition of the reconfiguration capability, considering
        the potential need for rapid response to effectively address cyber threats.
      translations:
        pt:
          name: "Tratamento de Incidentes | Reconfigura\xE7\xE3o Din\xE2mica"
          description: "Incluir os seguintes tipos de reconfigura\xE7\xE3o din\xE2\
            mica para [Atribui\xE7\xE3o: componentes de sistema definidos pela organiza\xE7\
            \xE3o] como parte da capacidade de resposta a incidentes: [Atribui\xE7\
            \xE3o: tipos de reconfigura\xE7\xE3o din\xE2mica definidos pela organiza\xE7\
            \xE3o]."
          annotation: "A reconfigura\xE7\xE3o din\xE2mica inclui altera\xE7\xF5es\
            \ em regras de roteadores, listas de controle de acesso, par\xE2metros\
            \ de sistemas de detec\xE7\xE3o ou preven\xE7\xE3o de intrus\xE3o e regras\
            \ de filtragem de guards ou firewalls. As organiza\xE7\xF5es podem realizar\
            \ a reconfigura\xE7\xE3o din\xE2mica de sistemas para deter ataques, desorientar\
            \ atacantes e isolar componentes de sistemas, limitando assim a extens\xE3\
            o do dano decorrente de viola\xE7\xF5es ou comprometimentos. As organiza\xE7\
            \xF5es incluem prazos espec\xEDficos para alcan\xE7ar a reconfigura\xE7\
            \xE3o de sistemas na defini\xE7\xE3o da capacidade de reconfigura\xE7\xE3\
            o, considerando a potencial necessidade de resposta r\xE1pida para enfrentar\
            \ de forma eficaz as amea\xE7as cibern\xE9ticas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(3)
      name: Incident Handling | Continuity of Operations
      description: 'Identify [Assignment: organization-defined classes of incidents]
        and take the following actions in response to those incidents to ensure continuation
        of organizational mission and business functions: [Assignment: organization-defined
        actions to take in response to classes of incidents].'
      annotation: Classes of incidents include malfunctions due to design or implementation
        errors and omissions, targeted malicious attacks, and untargeted malicious
        attacks. Incident response actions include orderly system degradation, system
        shutdown, fall back to manual mode or activation of alternative technology
        whereby the system operates differently, employing deceptive measures, alternate
        information flows, or operating in a mode that is reserved for when systems
        are under attack. Organizations consider whether continuity of operations
        requirements during an incident conflict with the capability to automatically
        disable the system as specified as part of IR-4(5).
      translations:
        pt:
          name: "Tratamento de Incidentes | Continuidade de Opera\xE7\xF5es"
          description: "Identificar [Atribui\xE7\xE3o: classes de incidentes definidas\
            \ pela organiza\xE7\xE3o] e tomar as seguintes a\xE7\xF5es em resposta\
            \ a esses incidentes para assegurar a continuidade das fun\xE7\xF5es de\
            \ miss\xE3o e neg\xF3cio da organiza\xE7\xE3o: [Atribui\xE7\xE3o: a\xE7\
            \xF5es a serem tomadas em resposta a classes de incidentes definidas pela\
            \ organiza\xE7\xE3o]."
          annotation: "As classes de incidentes incluem mau funcionamento decorrente\
            \ de erros e omiss\xF5es de projeto ou implementa\xE7\xE3o, ataques maliciosos\
            \ direcionados e ataques maliciosos n\xE3o direcionados. As a\xE7\xF5\
            es de resposta a incidentes incluem degrada\xE7\xE3o ordenada do sistema,\
            \ desligamento do sistema, retorno ao modo manual ou ativa\xE7\xE3o de\
            \ tecnologia alternativa pela qual o sistema opera de forma diferente,\
            \ emprego de medidas enganosas, fluxos de informa\xE7\xE3o alternativos\
            \ ou opera\xE7\xE3o em um modo reservado para quando os sistemas estiverem\
            \ sob ataque. As organiza\xE7\xF5es consideram se os requisitos de continuidade\
            \ de opera\xE7\xF5es durante um incidente entram em conflito com a capacidade\
            \ de desabilitar automaticamente o sistema, conforme especificado como\
            \ parte de IR-4(5)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(4)
      name: Incident Handling | Information Correlation
      description: Correlate incident information and individual incident responses
        to achieve an organization-wide perspective on incident awareness and response.
      annotation: Sometimes, a threat event, such as a hostile cyber-attack, can only
        be observed by bringing together information from different sources, including
        various reports and reporting procedures established by organizations.
      translations:
        pt:
          name: "Tratamento de Incidentes | Correla\xE7\xE3o de Informa\xE7\xF5es"
          description: "Correlacionar informa\xE7\xF5es de incidentes e respostas\
            \ individuais a incidentes para obter uma perspectiva organizacional ampla\
            \ sobre a conscientiza\xE7\xE3o e a resposta a incidentes."
          annotation: "\xC0s vezes, um evento de amea\xE7a, como um ataque cibern\xE9\
            tico hostil, s\xF3 pode ser observado ao reunir informa\xE7\xF5es de diferentes\
            \ fontes, incluindo diversos relatos e procedimentos de relato estabelecidos\
            \ pelas organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(5)
      name: Incident Handling | Automatic Disabling of System
      description: 'Implement a configurable capability to automatically disable the
        system if [Assignment: organization-defined security violations] are detected.'
      annotation: Organizations consider whether the capability to automatically disable
        the system conflicts with continuity of operations requirements specified
        as part of CP-2 or IR-4(3). Security violations include cyber-attacks that
        have compromised the integrity of the system or exfiltrated organizational
        information and serious errors in software programs that could adversely impact
        organizational missions or functions or jeopardize the safety of individuals.
      translations:
        pt:
          name: "Tratamento de Incidentes | Desabilita\xE7\xE3o Autom\xE1tica do Sistema"
          description: "Implementar uma capacidade configur\xE1vel para desabilitar\
            \ automaticamente o sistema se forem detectadas [Atribui\xE7\xE3o: viola\xE7\
            \xF5es de seguran\xE7a definidas pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es consideram se a capacidade de desabilitar\
            \ automaticamente o sistema entra em conflito com os requisitos de continuidade\
            \ de opera\xE7\xF5es especificados como parte de CP-2 ou IR-4(3). As viola\xE7\
            \xF5es de seguran\xE7a incluem ataques cibern\xE9ticos que comprometeram\
            \ a integridade do sistema ou exfiltraram informa\xE7\xF5es organizacionais\
            \ e erros graves em programas de software que poderiam impactar adversamente\
            \ as miss\xF5es ou fun\xE7\xF5es organizacionais ou comprometer a seguran\xE7\
            a dos indiv\xEDduos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(6)
      name: Incident Handling | Insider Threats
      description: Implement an incident handling capability for incidents involving
        insider threats.
      annotation: Explicit focus on handling incidents involving insider threats provides
        additional emphasis on this type of threat and the need for specific incident
        handling capabilities to provide appropriate and timely responses.
      translations:
        pt:
          name: "Tratamento de Incidentes | Amea\xE7as Internas"
          description: "Implementar uma capacidade de tratamento de incidentes para\
            \ incidentes que envolvam amea\xE7as internas."
          annotation: "O foco expl\xEDcito no tratamento de incidentes que envolvem\
            \ amea\xE7as internas proporciona \xEAnfase adicional a esse tipo de amea\xE7\
            a e \xE0 necessidade de capacidades espec\xEDficas de tratamento de incidentes\
            \ para fornecer respostas apropriadas e oportunas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(7)
      name: "Incident Handling | Insider Threats \u2014 Intra-organization Coordination"
      description: 'Coordinate an incident handling capability for insider threats
        that includes the following organizational entities [Assignment: organization-defined
        entities].'
      annotation: Incident handling for insider threat incidents (e.g., preparation,
        detection and analysis, containment, eradication, and recovery) requires coordination
        among many organizational entities, including mission or business owners,
        system owners, human resources offices, procurement offices, personnel offices,
        physical security offices, senior agency information security officer, operations
        personnel, risk executive (function), senior agency official for privacy,
        and legal counsel. In addition, organizations may require external support
        from federal, state, and local law enforcement agencies.
      translations:
        pt:
          name: "Tratamento de Incidentes | Amea\xE7as Internas \u2014 Coordena\xE7\
            \xE3o Intraorganizacional"
          description: "Coordenar uma capacidade de tratamento de incidentes para\
            \ amea\xE7as internas que inclua as seguintes entidades organizacionais\
            \ [Atribui\xE7\xE3o: entidades definidas pela organiza\xE7\xE3o]."
          annotation: "O tratamento de incidentes de amea\xE7as internas (por exemplo,\
            \ prepara\xE7\xE3o, detec\xE7\xE3o e an\xE1lise, conten\xE7\xE3o, erradica\xE7\
            \xE3o e recupera\xE7\xE3o) requer coordena\xE7\xE3o entre muitas entidades\
            \ organizacionais, incluindo propriet\xE1rios de miss\xE3o ou neg\xF3\
            cio, propriet\xE1rios de sistemas, departamentos de recursos humanos,\
            \ escrit\xF3rios de aquisi\xE7\xF5es, escrit\xF3rios de pessoal, escrit\xF3\
            rios de seguran\xE7a f\xEDsica, oficial s\xEAnior de seguran\xE7a da informa\xE7\
            \xE3o da ag\xEAncia, pessoal de opera\xE7\xF5es, executivo de risco (fun\xE7\
            \xE3o), oficial s\xEAnior de privacidade da ag\xEAncia e assessoria jur\xED\
            dica. Al\xE9m disso, as organiza\xE7\xF5es podem necessitar de apoio externo\
            \ de \xF3rg\xE3os de aplica\xE7\xE3o da lei federais, estaduais e locais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(8)
      name: Incident Handling | Correlation with External Organizations
      description: 'Coordinate with [Assignment: organization-defined external organizations]
        to correlate and share [Assignment: organization-defined incident information]
        to achieve a cross-organization perspective on incident awareness and more
        effective incident responses.'
      annotation: "The coordination of incident information with external organizations\u2014\
        including mission or business partners, military or coalition partners, customers,\
        \ and developers\u2014can provide significant benefits. Cross-organizational\
        \ coordination can serve as an important risk management capability. This\
        \ capability allows organizations to leverage information from a variety of\
        \ sources to effectively respond to incidents and breaches that could potentially\
        \ affect the organization\u2019s operations, assets, and individuals."
      translations:
        pt:
          name: "Tratamento de Incidentes | Correla\xE7\xE3o com Organiza\xE7\xF5\
            es Externas"
          description: "Coordenar-se com [Atribui\xE7\xE3o: organiza\xE7\xF5es externas\
            \ definidas pela organiza\xE7\xE3o] para correlacionar e compartilhar\
            \ [Atribui\xE7\xE3o: informa\xE7\xF5es de incidentes definidas pela organiza\xE7\
            \xE3o], a fim de obter uma perspectiva interorganizacional sobre a conscientiza\xE7\
            \xE3o de incidentes e respostas a incidentes mais eficazes."
          annotation: "A coordena\xE7\xE3o de informa\xE7\xF5es de incidentes com\
            \ organiza\xE7\xF5es externas \u2014 incluindo parceiros de miss\xE3o\
            \ ou neg\xF3cio, parceiros militares ou de coaliz\xE3o, clientes e desenvolvedores\
            \ \u2014 pode proporcionar benef\xEDcios significativos. A coordena\xE7\
            \xE3o interorganizacional pode servir como uma importante capacidade de\
            \ gest\xE3o de riscos. Essa capacidade permite que as organiza\xE7\xF5\
            es aproveitem informa\xE7\xF5es de diversas fontes para responder de forma\
            \ eficaz a incidentes e viola\xE7\xF5es que poderiam potencialmente afetar\
            \ as opera\xE7\xF5es, os ativos e os indiv\xEDduos da organiza\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(9)
      name: Incident Handling | Dynamic Response Capability
      description: 'Employ [Assignment: organization-defined dynamic response capabilities]
        to respond to incidents.'
      annotation: The dynamic response capability addresses the timely deployment
        of new or replacement organizational capabilities in response to incidents.
        This includes capabilities implemented at the mission and business process
        level and at the system level.
      translations:
        pt:
          name: "Tratamento de Incidentes | Capacidade de Resposta Din\xE2mica"
          description: "Empregar [Atribui\xE7\xE3o: capacidades de resposta din\xE2\
            mica definidas pela organiza\xE7\xE3o] para responder a incidentes."
          annotation: "A capacidade de resposta din\xE2mica trata da implanta\xE7\xE3\
            o oportuna de capacidades organizacionais novas ou substitutas em resposta\
            \ a incidentes. Isso inclui capacidades implementadas no n\xEDvel dos\
            \ processos de miss\xE3o e neg\xF3cio e no n\xEDvel do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(10)
      name: Incident Handling | Supply Chain Coordination
      description: Coordinate incident handling activities involving supply chain
        events with other organizations involved in the supply chain.
      annotation: Organizations involved in supply chain activities include product
        developers, system integrators, manufacturers, packagers, assemblers, distributors,
        vendors, and resellers. Supply chain incidents can occur anywhere through
        or to the supply chain and include compromises or breaches that involve primary
        or sub-tier providers, information technology products, system components,
        development processes or personnel, and distribution processes or warehousing
        facilities. Organizations consider including processes for protecting and
        sharing incident information in information exchange agreements and their
        obligations for reporting incidents to government oversight bodies (e.g.,
        Federal Acquisition Security Council).
      translations:
        pt:
          name: "Tratamento de Incidentes | Coordena\xE7\xE3o da Cadeia de Suprimentos"
          description: "Coordenar as atividades de tratamento de incidentes que envolvam\
            \ eventos da cadeia de suprimentos com outras organiza\xE7\xF5es envolvidas\
            \ na cadeia de suprimentos."
          annotation: "As organiza\xE7\xF5es envolvidas em atividades da cadeia de\
            \ suprimentos incluem desenvolvedores de produtos, integradores de sistemas,\
            \ fabricantes, embaladores, montadores, distribuidores, fornecedores e\
            \ revendedores. Os incidentes da cadeia de suprimentos podem ocorrer em\
            \ qualquer ponto por meio ou em rela\xE7\xE3o \xE0 cadeia de suprimentos\
            \ e incluem comprometimentos ou viola\xE7\xF5es que envolvam provedores\
            \ prim\xE1rios ou de subn\xEDvel, produtos de tecnologia da informa\xE7\
            \xE3o, componentes de sistemas, processos ou pessoal de desenvolvimento,\
            \ e processos de distribui\xE7\xE3o ou instala\xE7\xF5es de armazenamento.\
            \ As organiza\xE7\xF5es consideram incluir processos para proteger e compartilhar\
            \ informa\xE7\xF5es de incidentes em acordos de troca de informa\xE7\xF5\
            es e suas obriga\xE7\xF5es de relatar incidentes a \xF3rg\xE3os de supervis\xE3\
            o governamental (por exemplo, Federal Acquisition Security Council)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(11)
      name: Incident Handling | Integrated Incident Response Team
      description: 'Establish and maintain an integrated incident response team that
        can be deployed to any location identified by the organization in [Assignment:
        organization-defined time period].'
      annotation: 'An integrated incident response team is a team of experts that
        assesses, documents, and responds to incidents so that organizational systems
        and networks can recover quickly and implement the necessary controls to avoid
        future incidents. Incident response team personnel include forensic and malicious
        code analysts, tool developers, systems security and privacy engineers, and
        real-time operations personnel. The incident handling capability includes
        performing rapid forensic preservation of evidence and analysis of and response
        to intrusions. For some organizations, the incident response team can be a
        cross-organizational entity.

        An integrated incident response team facilitates information sharing and allows
        organizational personnel (e.g., developers, implementers, and operators) to
        leverage team knowledge of the threat and implement defensive measures that
        enable organizations to deter intrusions more effectively. Moreover, integrated
        teams promote the rapid detection of intrusions, the development of appropriate
        mitigations, and the deployment of effective defensive measures. For example,
        when an intrusion is detected, the integrated team can rapidly develop an
        appropriate response for operators to implement, correlate the new incident
        with information on past intrusions, and augment ongoing cyber intelligence
        development. Integrated incident response teams are better able to identify
        adversary tactics, techniques, and procedures that are linked to the operations
        tempo or specific mission and business functions and to define responsive
        actions in a way that does not disrupt those mission and business functions.
        Incident response teams can be distributed within organizations to make the
        capability resilient.'
      translations:
        pt:
          name: Tratamento de Incidentes | Equipe Integrada de Resposta a Incidentes
          description: "Estabelecer e manter uma equipe integrada de resposta a incidentes\
            \ que possa ser implantada em qualquer local identificado pela organiza\xE7\
            \xE3o em [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "Uma equipe integrada de resposta a incidentes \xE9 uma equipe\
            \ de especialistas que avalia, documenta e responde a incidentes, de modo\
            \ que os sistemas e as redes organizacionais possam se recuperar rapidamente\
            \ e implementar os controles necess\xE1rios para evitar incidentes futuros.\
            \ O pessoal da equipe de resposta a incidentes inclui analistas forenses\
            \ e de c\xF3digo malicioso, desenvolvedores de ferramentas, engenheiros\
            \ de seguran\xE7a e privacidade de sistemas e pessoal de opera\xE7\xF5\
            es em tempo real. A capacidade de tratamento de incidentes inclui a realiza\xE7\
            \xE3o da preserva\xE7\xE3o forense r\xE1pida de evid\xEAncias e a an\xE1\
            lise e resposta a intrus\xF5es. Para algumas organiza\xE7\xF5es, a equipe\
            \ de resposta a incidentes pode ser uma entidade interorganizacional.\n\
            Uma equipe integrada de resposta a incidentes facilita o compartilhamento\
            \ de informa\xE7\xF5es e permite que o pessoal organizacional (por exemplo,\
            \ desenvolvedores, implementadores e operadores) aproveite o conhecimento\
            \ da equipe sobre a amea\xE7a e implemente medidas defensivas que permitam\
            \ \xE0s organiza\xE7\xF5es dissuadir intrus\xF5es de forma mais eficaz.\
            \ Al\xE9m disso, as equipes integradas promovem a detec\xE7\xE3o r\xE1\
            pida de intrus\xF5es, o desenvolvimento de mitiga\xE7\xF5es apropriadas\
            \ e a implanta\xE7\xE3o de medidas defensivas eficazes. Por exemplo, quando\
            \ uma intrus\xE3o \xE9 detectada, a equipe integrada pode desenvolver\
            \ rapidamente uma resposta apropriada para os operadores implementarem,\
            \ correlacionar o novo incidente com informa\xE7\xF5es sobre intrus\xF5\
            es passadas e ampliar o desenvolvimento cont\xEDnuo de intelig\xEAncia\
            \ cibern\xE9tica. As equipes integradas de resposta a incidentes t\xEA\
            m maior capacidade de identificar t\xE1ticas, t\xE9cnicas e procedimentos\
            \ do advers\xE1rio que estejam vinculados ao ritmo das opera\xE7\xF5es\
            \ ou a fun\xE7\xF5es espec\xEDficas de miss\xE3o e neg\xF3cio, e de definir\
            \ a\xE7\xF5es responsivas de forma que n\xE3o perturbe essas fun\xE7\xF5\
            es de miss\xE3o e neg\xF3cio. As equipes de resposta a incidentes podem\
            \ ser distribu\xEDdas dentro das organiza\xE7\xF5es para tornar a capacidade\
            \ resiliente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(12)
      name: Incident Handling | Malicious Code and Forensic Analysis
      description: Analyze malicious code and/or other residual artifacts remaining
        in the system after the incident.
      annotation: When conducted carefully in an isolated environment, analysis of
        malicious code and other residual artifacts of a security incident or breach
        can give the organization insight into adversary tactics, techniques, and
        procedures. It can also indicate the identity or some defining characteristics
        of the adversary. In addition, malicious code analysis can help the organization
        develop responses to future incidents.
      translations:
        pt:
          name: "Tratamento de Incidentes | C\xF3digo Malicioso e An\xE1lise Forense"
          description: "Analisar c\xF3digo malicioso e/ou outros artefatos residuais\
            \ remanescentes no sistema ap\xF3s o incidente."
          annotation: "Quando conduzida com cuidado em um ambiente isolado, a an\xE1\
            lise de c\xF3digo malicioso e de outros artefatos residuais de um incidente\
            \ ou viola\xE7\xE3o de seguran\xE7a pode dar \xE0 organiza\xE7\xE3o uma\
            \ compreens\xE3o das t\xE1ticas, t\xE9cnicas e procedimentos do advers\xE1\
            rio. Ela tamb\xE9m pode indicar a identidade ou algumas caracter\xEDsticas\
            \ definidoras do advers\xE1rio. Al\xE9m disso, a an\xE1lise de c\xF3digo\
            \ malicioso pode ajudar a organiza\xE7\xE3o a desenvolver respostas a\
            \ incidentes futuros."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(13)
      name: Incident Handling | Behavior Analysis
      description: 'Analyze anomalous or suspected adversarial behavior in or related
        to [Assignment: organization-defined environments or resources].'
      annotation: If the organization maintains a deception environment, an analysis
        of behaviors in that environment, including resources targeted by the adversary
        and timing of the incident or event, can provide insight into adversarial
        tactics, techniques, and procedures. External to a deception environment,
        the analysis of anomalous adversarial behavior (e.g., changes in system performance
        or usage patterns) or suspected behavior (e.g., changes in searches for the
        location of specific resources) can give the organization such insight.
      translations:
        pt:
          name: "Tratamento de Incidentes | An\xE1lise de Comportamento"
          description: "Analisar comportamento an\xF4malo ou suspeito de advers\xE1\
            rio em ou relacionado a [Atribui\xE7\xE3o: ambientes ou recursos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Se a organiza\xE7\xE3o mant\xE9m um ambiente de logro (deception),\
            \ uma an\xE1lise dos comportamentos nesse ambiente, incluindo os recursos\
            \ visados pelo advers\xE1rio e o momento do incidente ou evento, pode\
            \ fornecer uma compreens\xE3o das t\xE1ticas, t\xE9cnicas e procedimentos\
            \ do advers\xE1rio. Externamente a um ambiente de logro, a an\xE1lise\
            \ de comportamento advers\xE1rio an\xF4malo (por exemplo, altera\xE7\xF5\
            es no desempenho ou nos padr\xF5es de uso do sistema) ou de comportamento\
            \ suspeito (por exemplo, altera\xE7\xF5es nas buscas pela localiza\xE7\
            \xE3o de recursos espec\xEDficos) pode dar \xE0 organiza\xE7\xE3o tal\
            \ compreens\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(14)
      name: Incident Handling | Security Operations Center
      description: Establish and maintain a security operations center.
      annotation: "A security operations center (SOC) is the focal point for security\
        \ operations and computer network defense for an organization. The purpose\
        \ of the SOC is to defend and monitor an organization\u2019s systems and networks\
        \ (i.e., cyber infrastructure) on an ongoing basis. The SOC is also responsible\
        \ for detecting, analyzing, and responding to cybersecurity incidents in a\
        \ timely manner. The organization staffs the SOC with skilled technical and\
        \ operational personnel (e.g., security analysts, incident response personnel,\
        \ systems security engineers) and implements a combination of technical, management,\
        \ and operational controls (including monitoring, scanning, and forensics\
        \ tools) to monitor, fuse, correlate, analyze, and respond to threat and security-relevant\
        \ event data from multiple sources. These sources include perimeter defenses,\
        \ network devices (e.g., routers, switches), and endpoint agent data feeds.\
        \ The SOC provides a holistic situational awareness capability to help organizations\
        \ determine the security posture of the system and organization. A SOC capability\
        \ can be obtained in a variety of ways. Larger organizations may implement\
        \ a dedicated SOC while smaller organizations may employ third-party organizations\
        \ to provide such a capability."
      translations:
        pt:
          name: "Tratamento de Incidentes | Centro de Opera\xE7\xF5es de Seguran\xE7\
            a"
          description: "Estabelecer e manter um centro de opera\xE7\xF5es de seguran\xE7\
            a."
          annotation: "Um centro de opera\xE7\xF5es de seguran\xE7a (SOC) \xE9 o ponto\
            \ focal para as opera\xE7\xF5es de seguran\xE7a e a defesa de redes de\
            \ computadores de uma organiza\xE7\xE3o. O prop\xF3sito do SOC \xE9 defender\
            \ e monitorar de forma cont\xEDnua os sistemas e as redes de uma organiza\xE7\
            \xE3o (ou seja, a infraestrutura cibern\xE9tica). O SOC tamb\xE9m \xE9\
            \ respons\xE1vel por detectar, analisar e responder a incidentes de seguran\xE7\
            a cibern\xE9tica de maneira oportuna. A organiza\xE7\xE3o prov\xEA ao\
            \ SOC pessoal t\xE9cnico e operacional qualificado (por exemplo, analistas\
            \ de seguran\xE7a, pessoal de resposta a incidentes, engenheiros de seguran\xE7\
            a de sistemas) e implementa uma combina\xE7\xE3o de controles t\xE9cnicos,\
            \ gerenciais e operacionais (incluindo ferramentas de monitoramento, varredura\
            \ e per\xEDcia forense) para monitorar, fundir, correlacionar, analisar\
            \ e responder a dados de amea\xE7as e de eventos relevantes para a seguran\xE7\
            a provenientes de m\xFAltiplas fontes. Essas fontes incluem defesas de\
            \ per\xEDmetro, dispositivos de rede (por exemplo, roteadores, switches)\
            \ e feeds de dados de agentes em endpoints. O SOC fornece uma capacidade\
            \ hol\xEDstica de consci\xEAncia situacional para ajudar as organiza\xE7\
            \xF5es a determinar a postura de seguran\xE7a do sistema e da organiza\xE7\
            \xE3o. Uma capacidade de SOC pode ser obtida de diversas maneiras. Organiza\xE7\
            \xF5es maiores podem implementar um SOC dedicado, enquanto organiza\xE7\
            \xF5es menores podem empregar organiza\xE7\xF5es terceiras para fornecer\
            \ tal capacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-4(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-4(15)
      name: Incident Handling | Public Relations and Reputation Repair
      description: '(a) Manage public relations associated with an incident; and

        (b) Employ measures to repair the reputation of the organization.'
      annotation: "It is important for an organization to have a strategy in place\
        \ for addressing incidents that have been brought to the attention of the\
        \ general public, have cast the organization in a negative light, or have\
        \ affected the organization\u2019s constituents (e.g., partners, customers).\
        \ Such publicity can be extremely harmful to the organization and affect its\
        \ ability to carry out its mission and business functions. Taking proactive\
        \ steps to repair the organization\u2019s reputation is an essential aspect\
        \ of reestablishing the trust and confidence of its constituents."
      translations:
        pt:
          name: "Tratamento de Incidentes | Rela\xE7\xF5es P\xFAblicas e Repara\xE7\
            \xE3o de Reputa\xE7\xE3o"
          description: "(a) Gerenciar as rela\xE7\xF5es p\xFAblicas associadas a um\
            \ incidente; e\n(b) Empregar medidas para reparar a reputa\xE7\xE3o da\
            \ organiza\xE7\xE3o."
          annotation: "\xC9 importante que uma organiza\xE7\xE3o tenha uma estrat\xE9\
            gia em vigor para lidar com incidentes que tenham chegado ao conhecimento\
            \ do p\xFAblico em geral, que tenham colocado a organiza\xE7\xE3o sob\
            \ uma perspectiva negativa ou que tenham afetado os constituintes da organiza\xE7\
            \xE3o (por exemplo, parceiros, clientes). Tal publicidade pode ser extremamente\
            \ prejudicial \xE0 organiza\xE7\xE3o e afetar sua capacidade de cumprir\
            \ sua miss\xE3o e suas fun\xE7\xF5es de neg\xF3cio. Adotar medidas proativas\
            \ para reparar a reputa\xE7\xE3o da organiza\xE7\xE3o \xE9 um aspecto\
            \ essencial para restabelecer a confian\xE7a e a credibilidade de seus\
            \ constituintes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-5
      name: Incident Monitoring
      description: Track and document incidents.
      annotation: Documenting incidents includes maintaining records about each incident,
        the status of the incident, and other pertinent information necessary for
        forensics as well as evaluating incident details, trends, and handling. Incident
        information can be obtained from a variety of sources, including network monitoring,
        incident reports, incident response teams, user complaints, supply chain partners,
        audit monitoring, physical access monitoring, and user and administrator reports.
        IR-4 provides information on the types of incidents that are appropriate for
        monitoring.
      translations:
        pt:
          name: Monitoramento de Incidentes
          description: Acompanhar e documentar incidentes.
          annotation: "Documentar incidentes inclui manter registros sobre cada incidente,\
            \ o status do incidente e outras informa\xE7\xF5es pertinentes necess\xE1\
            rias para a per\xEDcia forense, bem como avaliar detalhes, tend\xEAncias\
            \ e tratamento dos incidentes. As informa\xE7\xF5es sobre incidentes podem\
            \ ser obtidas a partir de diversas fontes, incluindo monitoramento de\
            \ rede, relat\xF3rios de incidentes, equipes de resposta a incidentes,\
            \ reclama\xE7\xF5es de usu\xE1rios, parceiros da cadeia de suprimentos,\
            \ monitoramento de auditoria, monitoramento de acesso f\xEDsico e relatos\
            \ de usu\xE1rios e administradores. O IR-4 fornece informa\xE7\xF5es sobre\
            \ os tipos de incidentes que s\xE3o apropriados para monitoramento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-5(1)
      name: Incident Monitoring | Automated Tracking, Data Collection, and Analysis
      description: 'Track incidents and collect and analyze incident information using
        [Assignment: organization-defined automated mechanisms].'
      annotation: Automated mechanisms for tracking incidents and collecting and analyzing
        incident information include Computer Incident Response Centers or other electronic
        databases of incidents and network monitoring devices.
      translations:
        pt:
          name: "Monitoramento de Incidentes | Acompanhamento Automatizado, Coleta\
            \ de Dados e An\xE1lise"
          description: "Acompanhar incidentes e coletar e analisar informa\xE7\xF5\
            es sobre incidentes utilizando [Atribui\xE7\xE3o: mecanismos automatizados\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados para acompanhar incidentes e coletar\
            \ e analisar informa\xE7\xF5es sobre incidentes incluem Centros de Resposta\
            \ a Incidentes Computacionais ou outras bases de dados eletr\xF4nicas\
            \ de incidentes e dispositivos de monitoramento de rede."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-6
      name: Incident Reporting
      description: 'a. Require personnel to report suspected incidents to the organizational
        incident response capability within [Assignment: organization-defined time
        period]; and

        b. Report incident information to [Assignment: organization-defined authorities].'
      annotation: The types of incidents reported, the content and timeliness of the
        reports, and the designated reporting authorities reflect applicable laws,
        executive orders, directives, regulations, policies, standards, and guidelines.
        Incident information can inform risk assessments, control effectiveness assessments,
        security requirements for acquisitions, and selection criteria for technology
        products.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Incidentes"
          description: "a. Exigir que o pessoal notifique os incidentes suspeitos\
            \ \xE0 capacidade organizacional de resposta a incidentes dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]; e\nb. Notificar\
            \ as informa\xE7\xF5es sobre o incidente a [Atribui\xE7\xE3o: autoridades\
            \ definidas pela organiza\xE7\xE3o]."
          annotation: "Os tipos de incidentes notificados, o conte\xFAdo e a tempestividade\
            \ das notifica\xE7\xF5es e as autoridades designadas para notifica\xE7\
            \xE3o refletem as leis, ordens executivas, diretrizes, regulamentos, pol\xED\
            ticas, normas e orienta\xE7\xF5es aplic\xE1veis. As informa\xE7\xF5es\
            \ sobre incidentes podem subsidiar avalia\xE7\xF5es de risco, avalia\xE7\
            \xF5es de efic\xE1cia de controles, requisitos de seguran\xE7a para aquisi\xE7\
            \xF5es e crit\xE9rios de sele\xE7\xE3o de produtos de tecnologia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-6(1)
      name: Incident Reporting | Automated Reporting
      description: 'Report incidents using [Assignment: organization-defined automated
        mechanisms].'
      annotation: The recipients of incident reports are specified in IR-6b. Automated
        reporting mechanisms include email, posting on websites (with automatic updates),
        and automated incident response tools and programs.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Incidentes | Notifica\xE7\xE3o Automatizada"
          description: "Notificar incidentes utilizando [Atribui\xE7\xE3o: mecanismos\
            \ automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os destinat\xE1rios das notifica\xE7\xF5es de incidentes s\xE3\
            o especificados no IR-6b. Os mecanismos automatizados de notifica\xE7\xE3\
            o incluem e-mail, publica\xE7\xE3o em sites (com atualiza\xE7\xF5es autom\xE1\
            ticas) e ferramentas e programas automatizados de resposta a incidentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-6(2)
      name: Incident Reporting | Vulnerabilities Related to Incidents
      description: 'Report system vulnerabilities associated with reported incidents
        to [Assignment: organization-defined personnel or roles].'
      annotation: Reported incidents that uncover system vulnerabilities are analyzed
        by organizational personnel including system owners, mission and business
        owners, senior agency information security officers, senior agency officials
        for privacy, authorizing officials, and the risk executive (function). The
        analysis can serve to prioritize and initiate mitigation actions to address
        the discovered system vulnerability.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Incidentes | Vulnerabilidades Relacionadas a\
            \ Incidentes"
          description: "Notificar as vulnerabilidades do sistema associadas a incidentes\
            \ notificados a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Os incidentes notificados que revelam vulnerabilidades do sistema\
            \ s\xE3o analisados pelo pessoal organizacional, incluindo propriet\xE1\
            rios de sistemas, propriet\xE1rios de miss\xE3o e de neg\xF3cio, oficiais\
            \ seniores de seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, oficiais\
            \ seniores de privacidade da ag\xEAncia, oficiais autorizadores e o executivo\
            \ de risco (fun\xE7\xE3o). A an\xE1lise pode servir para priorizar e iniciar\
            \ a\xE7\xF5es de mitiga\xE7\xE3o que tratem da vulnerabilidade descoberta\
            \ no sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-6(3)
      name: Incident Reporting | Supply Chain Coordination
      description: Provide incident information to the provider of the product or
        service and other organizations involved in the supply chain or supply chain
        governance for systems or system components related to the incident.
      annotation: Organizations involved in supply chain activities include product
        developers, system integrators, manufacturers, packagers, assemblers, distributors,
        vendors, and resellers. Entities that provide supply chain governance include
        the Federal Acquisition Security Council (FASC). Supply chain incidents include
        compromises or breaches that involve information technology products, system
        components, development processes or personnel, distribution processes, or
        warehousing facilities. Organizations determine the appropriate information
        to share and consider the value gained from informing external organizations
        about supply chain incidents, including the ability to improve processes or
        to identify the root cause of an incident.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Incidentes | Coordena\xE7\xE3o da Cadeia de\
            \ Suprimentos"
          description: "Fornecer informa\xE7\xF5es sobre o incidente ao fornecedor\
            \ do produto ou servi\xE7o e a outras organiza\xE7\xF5es envolvidas na\
            \ cadeia de suprimentos ou na governan\xE7a da cadeia de suprimentos dos\
            \ sistemas ou componentes de sistema relacionados ao incidente."
          annotation: "As organiza\xE7\xF5es envolvidas em atividades da cadeia de\
            \ suprimentos incluem desenvolvedores de produtos, integradores de sistemas,\
            \ fabricantes, embaladores, montadores, distribuidores, fornecedores e\
            \ revendedores. As entidades que fornecem governan\xE7a da cadeia de suprimentos\
            \ incluem o Federal Acquisition Security Council (FASC). Os incidentes\
            \ da cadeia de suprimentos incluem comprometimentos ou viola\xE7\xF5es\
            \ que envolvam produtos de tecnologia da informa\xE7\xE3o, componentes\
            \ de sistema, processos ou pessoal de desenvolvimento, processos de distribui\xE7\
            \xE3o ou instala\xE7\xF5es de armazenamento. As organiza\xE7\xF5es determinam\
            \ as informa\xE7\xF5es apropriadas a compartilhar e consideram o valor\
            \ obtido ao informar organiza\xE7\xF5es externas sobre incidentes da cadeia\
            \ de suprimentos, incluindo a capacidade de aprimorar processos ou de\
            \ identificar a causa raiz de um incidente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-7
      name: Incident Response Assistance
      description: Provide an incident response support resource, integral to the
        organizational incident response capability, that offers advice and assistance
        to users of the system for the handling and reporting of incidents.
      annotation: Incident response support resources provided by organizations include
        help desks, assistance groups, automated ticketing systems to open and track
        incident response tickets, and access to forensics services or consumer redress
        services, when required.
      translations:
        pt:
          name: "Assist\xEAncia \xE0 Resposta a Incidentes"
          description: "Fornecer um recurso de apoio \xE0 resposta a incidentes, integrante\
            \ da capacidade organizacional de resposta a incidentes, que ofere\xE7\
            a aconselhamento e assist\xEAncia aos usu\xE1rios do sistema para o tratamento\
            \ e a notifica\xE7\xE3o de incidentes."
          annotation: "Os recursos de apoio \xE0 resposta a incidentes fornecidos\
            \ pelas organiza\xE7\xF5es incluem centrais de ajuda (help desks), grupos\
            \ de assist\xEAncia, sistemas automatizados de emiss\xE3o de t\xEDquetes\
            \ (ticketing) para abrir e acompanhar t\xEDquetes de resposta a incidentes\
            \ e acesso a servi\xE7os de per\xEDcia forense ou a servi\xE7os de repara\xE7\
            \xE3o ao consumidor, quando necess\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-7(1)
      name: Incident Response Assistance | Automation Support for Availability of
        Information and Support
      description: 'Increase the availability of incident response information and
        support using [Assignment: organization-defined automated mechanisms].'
      annotation: Automated mechanisms can provide a push or pull capability for users
        to obtain incident response assistance. For example, individuals may have
        access to a website to query the assistance capability, or the assistance
        capability can proactively send incident response information to users (general
        distribution or targeted) as part of increasing understanding of current response
        capabilities and support.
      translations:
        pt:
          name: "Assist\xEAncia \xE0 Resposta a Incidentes | Suporte de Automa\xE7\
            \xE3o para Disponibilidade de Informa\xE7\xF5es e Apoio"
          description: "Aumentar a disponibilidade de informa\xE7\xF5es e apoio \xE0\
            \ resposta a incidentes utilizando [Atribui\xE7\xE3o: mecanismos automatizados\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados podem fornecer uma capacidade de\
            \ envio (push) ou de obten\xE7\xE3o (pull) para que os usu\xE1rios obtenham\
            \ assist\xEAncia \xE0 resposta a incidentes. Por exemplo, os indiv\xED\
            duos podem ter acesso a um site para consultar a capacidade de assist\xEA\
            ncia, ou a capacidade de assist\xEAncia pode enviar proativamente informa\xE7\
            \xF5es de resposta a incidentes aos usu\xE1rios (distribui\xE7\xE3o geral\
            \ ou direcionada) como parte do aprimoramento da compreens\xE3o das capacidades\
            \ e do apoio de resposta atuais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-7(2)
      name: Incident Response Assistance | Coordination with External Providers
      description: '(a) Establish a direct, cooperative relationship between its incident
        response capability and external providers of system protection capability;
        and

        (b) Identify organizational incident response team members to the external
        providers.'
      annotation: External providers of a system protection capability include the
        Computer Network Defense program within the U.S. Department of Defense. External
        providers help to protect, monitor, analyze, detect, and respond to unauthorized
        activity within organizational information systems and networks. It may be
        beneficial to have agreements in place with external providers to clarify
        the roles and responsibilities of each party before an incident occurs.
      translations:
        pt:
          name: "Assist\xEAncia \xE0 Resposta a Incidentes | Coordena\xE7\xE3o com\
            \ Provedores Externos"
          description: "(a) Estabelecer uma rela\xE7\xE3o direta e cooperativa entre\
            \ sua capacidade de resposta a incidentes e os provedores externos de\
            \ capacidade de prote\xE7\xE3o de sistemas; e\n(b) Identificar os membros\
            \ da equipe organizacional de resposta a incidentes para os provedores\
            \ externos."
          annotation: "Os provedores externos de capacidade de prote\xE7\xE3o de sistemas\
            \ incluem o programa de Defesa de Redes Computacionais (Computer Network\
            \ Defense) do Departamento de Defesa dos EUA. Os provedores externos ajudam\
            \ a proteger, monitorar, analisar, detectar e responder a atividades n\xE3\
            o autorizadas dentro dos sistemas de informa\xE7\xE3o e redes organizacionais.\
            \ Pode ser ben\xE9fico ter acordos firmados com os provedores externos\
            \ para esclarecer os pap\xE9is e as responsabilidades de cada parte antes\
            \ que um incidente ocorra."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-8
      name: Incident Response Plan
      description: 'a. Develop an incident response plan that:

        1. Provides the organization with a roadmap for implementing its incident
        response capability;

        2. Describes the structure and organization of the incident response capability;

        3. Provides a high-level approach for how the incident response capability
        fits into the overall organization;

        4. Meets the unique requirements of the organization, which relate to mission,
        size, structure, and functions;

        5. Defines reportable incidents;

        6. Provides metrics for measuring the incident response capability within
        the organization;

        7. Defines the resources and management support needed to effectively maintain
        and mature an incident response capability;

        8. Addresses the sharing of incident information;

        9. Is reviewed and approved by [Assignment: organization-defined personnel
        or roles] [Assignment: organization-defined frequency]; and

        10. Explicitly designates responsibility for incident response to [Assignment:
        organization-defined entities, personnel, or roles].

        b. Distribute copies of the incident response plan to [Assignment: organization-defined
        incident response personnel (identified by name and/or by role) and organizational
        elements];

        c. Update the incident response plan to address system and organizational
        changes or problems encountered during plan implementation, execution, or
        testing;

        d. Communicate incident response plan changes to [Assignment: organization-defined
        incident response personnel (identified by name and/or by role) and organizational
        elements]; and

        e. Protect the incident response plan from unauthorized disclosure and modification.'
      annotation: It is important that organizations develop and implement a coordinated
        approach to incident response. Organizational mission and business functions
        determine the structure of incident response capabilities. As part of the
        incident response capabilities, organizations consider the coordination and
        sharing of information with external organizations, including external service
        providers and other organizations involved in the supply chain. For incidents
        involving personally identifiable information (i.e., breaches), include a
        process to determine whether notice to oversight organizations or affected
        individuals is appropriate and provide that notice accordingly.
      translations:
        pt:
          name: Plano de Resposta a Incidentes
          description: "a. Desenvolver um plano de resposta a incidentes que:\n1.\
            \ Forne\xE7a \xE0 organiza\xE7\xE3o um roteiro para implementar sua capacidade\
            \ de resposta a incidentes;\n2. Descreva a estrutura e a organiza\xE7\xE3\
            o da capacidade de resposta a incidentes;\n3. Forne\xE7a uma abordagem\
            \ de alto n\xEDvel sobre como a capacidade de resposta a incidentes se\
            \ encaixa na organiza\xE7\xE3o como um todo;\n4. Atenda aos requisitos\
            \ exclusivos da organiza\xE7\xE3o, relacionados \xE0 miss\xE3o, ao porte,\
            \ \xE0 estrutura e \xE0s fun\xE7\xF5es;\n5. Defina os incidentes que devem\
            \ ser notificados;\n6. Forne\xE7a m\xE9tricas para medir a capacidade\
            \ de resposta a incidentes dentro da organiza\xE7\xE3o;\n7. Defina os\
            \ recursos e o apoio da gest\xE3o necess\xE1rios para manter e amadurecer\
            \ eficazmente uma capacidade de resposta a incidentes;\n8. Trate do compartilhamento\
            \ de informa\xE7\xF5es sobre incidentes;\n9. Seja revisado e aprovado\
            \ por [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o]; e\n10. Designe explicitamente a responsabilidade pela resposta a incidentes\
            \ a [Atribui\xE7\xE3o: entidades, pessoal ou fun\xE7\xF5es definidos pela\
            \ organiza\xE7\xE3o].\nb. Distribuir c\xF3pias do plano de resposta a\
            \ incidentes a [Atribui\xE7\xE3o: pessoal de resposta a incidentes (identificado\
            \ por nome e/ou por fun\xE7\xE3o) e elementos organizacionais definidos\
            \ pela organiza\xE7\xE3o];\nc. Atualizar o plano de resposta a incidentes\
            \ para tratar de mudan\xE7as no sistema e na organiza\xE7\xE3o ou de problemas\
            \ encontrados durante a implementa\xE7\xE3o, execu\xE7\xE3o ou teste do\
            \ plano;\nd. Comunicar as altera\xE7\xF5es do plano de resposta a incidentes\
            \ a [Atribui\xE7\xE3o: pessoal de resposta a incidentes (identificado\
            \ por nome e/ou por fun\xE7\xE3o) e elementos organizacionais definidos\
            \ pela organiza\xE7\xE3o]; e\ne. Proteger o plano de resposta a incidentes\
            \ contra divulga\xE7\xE3o e modifica\xE7\xE3o n\xE3o autorizadas."
          annotation: "\xC9 importante que as organiza\xE7\xF5es desenvolvam e implementem\
            \ uma abordagem coordenada para a resposta a incidentes. A miss\xE3o e\
            \ as fun\xE7\xF5es de neg\xF3cio da organiza\xE7\xE3o determinam a estrutura\
            \ das capacidades de resposta a incidentes. Como parte das capacidades\
            \ de resposta a incidentes, as organiza\xE7\xF5es consideram a coordena\xE7\
            \xE3o e o compartilhamento de informa\xE7\xF5es com organiza\xE7\xF5es\
            \ externas, incluindo provedores de servi\xE7os externos e outras organiza\xE7\
            \xF5es envolvidas na cadeia de suprimentos. Para incidentes que envolvam\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal (ou seja, viola\xE7\
            \xF5es), inclua um processo para determinar se a notifica\xE7\xE3o a organiza\xE7\
            \xF5es de supervis\xE3o ou aos indiv\xEDduos afetados \xE9 apropriada\
            \ e forne\xE7a essa notifica\xE7\xE3o de acordo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-8(1)
      name: Incident Response Plan | Breaches
      description: 'Include the following in the Incident Response Plan for breaches
        involving personally identifiable information:

        (a) A process to determine if notice to individuals or other organizations,
        including oversight organizations, is needed;

        (b) An assessment process to determine the extent of the harm, embarrassment,
        inconvenience, or unfairness to affected individuals and any mechanisms to
        mitigate such harms; and

        (c) Identification of applicable privacy requirements.'
      annotation: Organizations may be required by law, regulation, or policy to follow
        specific procedures relating to breaches, including notice to individuals,
        affected organizations, and oversight bodies; standards of harm; and mitigation
        or other specific requirements.
      translations:
        pt:
          name: "Plano de Resposta a Incidentes | Viola\xE7\xF5es"
          description: "Incluir o seguinte no Plano de Resposta a Incidentes para\
            \ viola\xE7\xF5es que envolvam informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal:\n(a) Um processo para determinar se \xE9 necess\xE1ria a notifica\xE7\
            \xE3o a indiv\xEDduos ou outras organiza\xE7\xF5es, incluindo organiza\xE7\
            \xF5es de supervis\xE3o;\n(b) Um processo de avalia\xE7\xE3o para determinar\
            \ a extens\xE3o do dano, constrangimento, transtorno ou injusti\xE7a aos\
            \ indiv\xEDduos afetados e quaisquer mecanismos para mitigar tais danos;\
            \ e\n(c) Identifica\xE7\xE3o dos requisitos de privacidade aplic\xE1veis."
          annotation: "As organiza\xE7\xF5es podem ser obrigadas por lei, regulamento\
            \ ou pol\xEDtica a seguir procedimentos espec\xEDficos relacionados a\
            \ viola\xE7\xF5es, incluindo notifica\xE7\xE3o a indiv\xEDduos, organiza\xE7\
            \xF5es afetadas e \xF3rg\xE3os de supervis\xE3o; padr\xF5es de dano; e\
            \ mitiga\xE7\xE3o ou outros requisitos espec\xEDficos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-9
      name: Information Spillage Response
      description: 'Respond to information spills by:

        a. Assigning [Assignment: organization-defined personnel or roles] with responsibility
        for responding to information spills;

        b. Identifying the specific information involved in the system contamination;

        c. Alerting [Assignment: organization-defined personnel or roles] of the information
        spill using a method of communication not associated with the spill;

        d. Isolating the contaminated system or system component;

        e. Eradicating the information from the contaminated system or component;

        f. Identifying other systems or system components that may have been subsequently
        contaminated; and

        g. Performing the following additional actions: [Assignment: organization-defined
        actions].'
      annotation: Information spillage refers to instances where information is placed
        on systems that are not authorized to process such information. Information
        spills occur when information that is thought to be a certain classification
        or impact level is transmitted to a system and subsequently is determined
        to be of a higher classification or impact level. At that point, corrective
        action is required. The nature of the response is based on the classification
        or impact level of the spilled information, the security capabilities of the
        system, the specific nature of the contaminated storage media, and the access
        authorizations of individuals with authorized access to the contaminated system.
        The methods used to communicate information about the spill after the fact
        do not involve methods directly associated with the actual spill to minimize
        the risk of further spreading the contamination before such contamination
        is isolated and eradicated.
      translations:
        pt:
          name: "Resposta a Vazamento de Informa\xE7\xF5es"
          description: "Responder a vazamentos de informa\xE7\xF5es por meio de:\n\
            a. Atribui\xE7\xE3o a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] da responsabilidade por responder a vazamentos\
            \ de informa\xE7\xF5es;\nb. Identifica\xE7\xE3o das informa\xE7\xF5es\
            \ espec\xEDficas envolvidas na contamina\xE7\xE3o do sistema;\nc. Alerta\
            \ a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] sobre o vazamento de informa\xE7\xF5es utilizando um m\xE9todo\
            \ de comunica\xE7\xE3o n\xE3o associado ao vazamento;\nd. Isolamento do\
            \ sistema ou componente de sistema contaminado;\ne. Erradica\xE7\xE3o\
            \ das informa\xE7\xF5es do sistema ou componente contaminado;\nf. Identifica\xE7\
            \xE3o de outros sistemas ou componentes de sistema que possam ter sido\
            \ posteriormente contaminados; e\ng. Execu\xE7\xE3o das seguintes a\xE7\
            \xF5es adicionais: [Atribui\xE7\xE3o: a\xE7\xF5es definidas pela organiza\xE7\
            \xE3o]."
          annotation: "O vazamento de informa\xE7\xF5es refere-se a situa\xE7\xF5\
            es em que informa\xE7\xF5es s\xE3o colocadas em sistemas que n\xE3o est\xE3\
            o autorizados a processar tais informa\xE7\xF5es. Os vazamentos de informa\xE7\
            \xF5es ocorrem quando informa\xE7\xF5es consideradas de determinada classifica\xE7\
            \xE3o ou n\xEDvel de impacto s\xE3o transmitidas a um sistema e posteriormente\
            \ s\xE3o determinadas como de classifica\xE7\xE3o ou n\xEDvel de impacto\
            \ mais alto. Nesse ponto, \xE9 necess\xE1ria uma a\xE7\xE3o corretiva.\
            \ A natureza da resposta baseia-se na classifica\xE7\xE3o ou no n\xED\
            vel de impacto das informa\xE7\xF5es vazadas, nas capacidades de seguran\xE7\
            a do sistema, na natureza espec\xEDfica da m\xEDdia de armazenamento contaminada\
            \ e nas autoriza\xE7\xF5es de acesso dos indiv\xEDduos com acesso autorizado\
            \ ao sistema contaminado. Os m\xE9todos utilizados para comunicar informa\xE7\
            \xF5es sobre o vazamento ap\xF3s o fato n\xE3o envolvem m\xE9todos diretamente\
            \ associados ao vazamento real, a fim de minimizar o risco de propagar\
            \ ainda mais a contamina\xE7\xE3o antes que essa contamina\xE7\xE3o seja\
            \ isolada e erradicada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-10
      name: Integrated Information Security Analysis Team
      description: '[Withdrawn: Moved to IR-4(11).]'
      translations:
        pt:
          name: "Equipe Integrada de An\xE1lise de Seguran\xE7a da Informa\xE7\xE3\
            o"
          description: '[Retirado: Movido para o IR-4(11).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-9(2)
      name: Information Spillage Response | Training
      description: 'Provide information spillage response training [Assignment: organization-defined
        frequency].'
      annotation: Organizations establish requirements for responding to information
        spillage incidents in incident response plans. Incident response training
        on a regular basis helps to ensure that organizational personnel understand
        their individual responsibilities and what specific actions to take when spillage
        incidents occur.
      translations:
        pt:
          name: "Resposta a Vazamento de Informa\xE7\xF5es | Treinamento"
          description: "Fornecer treinamento de resposta a vazamento de informa\xE7\
            \xF5es [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o]."
          annotation: "As organiza\xE7\xF5es estabelecem requisitos para responder\
            \ a incidentes de vazamento de informa\xE7\xF5es nos planos de resposta\
            \ a incidentes. O treinamento de resposta a incidentes de forma regular\
            \ ajuda a garantir que o pessoal organizacional compreenda suas responsabilidades\
            \ individuais e quais a\xE7\xF5es espec\xEDficas tomar quando ocorrerem\
            \ incidentes de vazamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-9(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-9(3)
      name: Information Spillage Response | Post-spill Operations
      description: 'Implement the following procedures to ensure that organizational
        personnel impacted by information spills can continue to carry out assigned
        tasks while contaminated systems are undergoing corrective actions: [Assignment:
        organization-defined procedures].'
      annotation: Corrective actions for systems contaminated due to information spillages
        may be time-consuming. Personnel may not have access to the contaminated systems
        while corrective actions are being taken, which may potentially affect their
        ability to conduct organizational business.
      translations:
        pt:
          name: "Resposta a Vazamento de Informa\xE7\xF5es | Opera\xE7\xF5es P\xF3\
            s-vazamento"
          description: "Implementar os seguintes procedimentos para garantir que o\
            \ pessoal organizacional impactado por vazamentos de informa\xE7\xF5es\
            \ possa continuar a executar as tarefas atribu\xEDdas enquanto os sistemas\
            \ contaminados est\xE3o sendo submetidos a a\xE7\xF5es corretivas: [Atribui\xE7\
            \xE3o: procedimentos definidos pela organiza\xE7\xE3o]."
          annotation: "As a\xE7\xF5es corretivas para sistemas contaminados devido\
            \ a vazamentos de informa\xE7\xF5es podem ser demoradas. O pessoal pode\
            \ n\xE3o ter acesso aos sistemas contaminados enquanto as a\xE7\xF5es\
            \ corretivas est\xE3o sendo realizadas, o que pode potencialmente afetar\
            \ sua capacidade de conduzir os neg\xF3cios da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-9(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-9(4)
      name: Information Spillage Response | Exposure to Unauthorized Personnel
      description: 'Employ the following controls for personnel exposed to information
        not within assigned access authorizations: [Assignment: organization-defined
        controls].'
      annotation: Controls include ensuring that personnel who are exposed to spilled
        information are made aware of the laws, executive orders, directives, regulations,
        policies, standards, and guidelines regarding the information and the restrictions
        imposed based on exposure to such information.
      translations:
        pt:
          name: "Resposta a Vazamento de Informa\xE7\xF5es | Exposi\xE7\xE3o a Pessoal\
            \ N\xE3o Autorizado"
          description: "Empregar os seguintes controles para o pessoal exposto a informa\xE7\
            \xF5es que n\xE3o estejam dentro das autoriza\xE7\xF5es de acesso atribu\xED\
            das: [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\xE3o]."
          annotation: "Os controles incluem garantir que o pessoal exposto \xE0s informa\xE7\
            \xF5es vazadas seja informado sobre as leis, ordens executivas, diretrizes,\
            \ regulamentos, pol\xEDticas, normas e orienta\xE7\xF5es relativas \xE0\
            s informa\xE7\xF5es e sobre as restri\xE7\xF5es impostas com base na exposi\xE7\
            \xE3o a tais informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ir
      ref_id: IR-9(1)
      name: Information Spillage Response | Responsible Personnel
      description: '[Withdrawn: Incorporated into IR-9.]'
      translations:
        pt:
          name: "Resposta a Vazamento de Informa\xE7\xF5es | Pessoal Respons\xE1vel"
          description: '[Retirado: Incorporado ao IR-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      assessable: false
      depth: 1
      ref_id: MA
      name: Maintenance
      translations:
        pt:
          name: "Manuten\xE7\xE3o"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] maintenance policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the maintenance policy and
        the associated maintenance controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the maintenance policy and
        procedures; and

        c. Review and update the current maintenance:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Maintenance policy and procedures address the controls in the MA
        family that are implemented within systems and organizations. The risk management
        strategy is an important factor in establishing such policies and procedures.
        Policies and procedures contribute to security and privacy assurance. Therefore,
        it is important that security and privacy programs collaborate on the development
        of maintenance policy and procedures. Security and privacy program policies
        and procedures at the organization level are preferable, in general, and may
        obviate the need for mission- or system-specific policies and procedures.
        The policy can be included as part of the general security and privacy policy
        or be represented by multiple policies that reflect the complex nature of
        organizations. Procedures can be established for security and privacy programs,
        for mission or business processes, and for systems, if needed. Procedures
        describe how the policies or controls are implemented and can be directed
        at the individual or role that is the object of the procedure. Procedures
        can be documented in system security and privacy plans or in one or more separate
        documents. Events that may precipitate an update to maintenance policy and
        procedures assessment or audit findings, security incidents or breaches, or
        changes in applicable laws, executive orders, directives, regulations, policies,
        standards, and guidelines. Simply restating controls does not constitute an
        organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar a [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de manuten\xE7\xE3o [Sele\xE7\xE3o (um ou mais): em n\xEDvel organizacional;\
            \ em n\xEDvel de processo de miss\xE3o/neg\xF3cio; em n\xEDvel de sistema]\
            \ que:\n(a) Trate de prop\xF3sito, escopo, pap\xE9is, responsabilidades,\
            \ comprometimento da gest\xE3o, coordena\xE7\xE3o entre as entidades organizacionais\
            \ e conformidade; e\n(b) Seja consistente com as leis, ordens executivas,\
            \ diretrizes, regulamentos, pol\xEDticas, normas e orienta\xE7\xF5es aplic\xE1\
            veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3o da pol\xED\
            tica de manuten\xE7\xE3o e dos controles de manuten\xE7\xE3o associados;\n\
            b. Designar um [Atribui\xE7\xE3o: oficial definido pela organiza\xE7\xE3\
            o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de manuten\xE7\xE3o; e\nc. Revisar\
            \ e atualizar a manuten\xE7\xE3o atual:\n1. Pol\xEDtica [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de manuten\xE7\xE3o tratam\
            \ dos controles da fam\xEDlia MA que s\xE3o implementados dentro dos sistemas\
            \ e das organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de riscos \xE9\
            \ um fator importante no estabelecimento de tais pol\xEDticas e procedimentos.\
            \ As pol\xEDticas e os procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Portanto, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem no desenvolvimento da pol\xEDtica e dos procedimentos\
            \ de manuten\xE7\xE3o. As pol\xEDticas e os procedimentos dos programas\
            \ de seguran\xE7a e privacidade em n\xEDvel organizacional s\xE3o, em\
            \ geral, prefer\xEDveis e podem dispensar a necessidade de pol\xEDticas\
            \ e procedimentos espec\xEDficos de miss\xE3o ou de sistema. A pol\xED\
            tica pode ser inclu\xEDda como parte da pol\xEDtica geral de seguran\xE7\
            a e privacidade ou ser representada por m\xFAltiplas pol\xEDticas que\
            \ reflitam a natureza complexa das organiza\xE7\xF5es. Os procedimentos\
            \ podem ser estabelecidos para os programas de seguran\xE7a e privacidade,\
            \ para os processos de miss\xE3o ou de neg\xF3cio e para os sistemas,\
            \ se necess\xE1rio. Os procedimentos descrevem como as pol\xEDticas ou\
            \ os controles s\xE3o implementados e podem ser direcionados ao indiv\xED\
            duo ou \xE0 fun\xE7\xE3o que \xE9 objeto do procedimento. Os procedimentos\
            \ podem ser documentados nos planos de seguran\xE7a e privacidade do sistema\
            \ ou em um ou mais documentos separados. Os eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de manuten\xE7\
            \xE3o incluem achados de avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\
            \xF5es de seguran\xE7a, ou mudan\xE7as nas leis, ordens executivas, diretrizes,\
            \ regulamentos, pol\xEDticas, normas e orienta\xE7\xF5es aplic\xE1veis.\
            \ A simples reafirma\xE7\xE3o dos controles n\xE3o constitui uma pol\xED\
            tica ou um procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-2
      name: Controlled Maintenance
      description: 'a. Schedule, document, and review records of maintenance, repair,
        and replacement on system components in accordance with manufacturer or vendor
        specifications and/or organizational requirements;

        b. Approve and monitor all maintenance activities, whether performed on site
        or remotely and whether the system or system components are serviced on site
        or removed to another location;

        c. Require that [Assignment: organization-defined personnel or roles] explicitly
        approve the removal of the system or system components from organizational
        facilities for off-site maintenance, repair, or replacement;

        d. Sanitize equipment to remove the following information from associated
        media prior to removal from organizational facilities for off-site maintenance,
        repair, or replacement: [Assignment: organization-defined information];

        e. Check all potentially impacted controls to verify that the controls are
        still functioning properly following maintenance, repair, or replacement actions;
        and

        f. Include the following information in organizational maintenance records:
        [Assignment: organization-defined information].'
      annotation: Controlling system maintenance addresses the information security
        aspects of the system maintenance program and applies to all types of maintenance
        to system components conducted by local or nonlocal entities. Maintenance
        includes peripherals such as scanners, copiers, and printers. Information
        necessary for creating effective maintenance records includes the date and
        time of maintenance, a description of the maintenance performed, names of
        the individuals or group performing the maintenance, name of the escort, and
        system components or equipment that are removed or replaced. Organizations
        consider supply chain-related risks associated with replacement components
        for systems.
      translations:
        pt:
          name: "Manuten\xE7\xE3o Controlada"
          description: "a. Agendar, documentar e revisar os registros de manuten\xE7\
            \xE3o, reparo e substitui\xE7\xE3o em componentes de sistema de acordo\
            \ com as especifica\xE7\xF5es do fabricante ou fornecedor e/ou os requisitos\
            \ organizacionais;\nb. Aprovar e monitorar todas as atividades de manuten\xE7\
            \xE3o, sejam realizadas no local ou remotamente e sejam o sistema ou os\
            \ componentes de sistema atendidos no local ou removidos para outro local;\n\
            c. Exigir que [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela\
            \ organiza\xE7\xE3o] aprovem explicitamente a remo\xE7\xE3o do sistema\
            \ ou dos componentes de sistema das instala\xE7\xF5es organizacionais\
            \ para manuten\xE7\xE3o, reparo ou substitui\xE7\xE3o fora do local;\n\
            d. Sanitizar os equipamentos para remover as seguintes informa\xE7\xF5\
            es das m\xEDdias associadas antes da remo\xE7\xE3o das instala\xE7\xF5\
            es organizacionais para manuten\xE7\xE3o, reparo ou substitui\xE7\xE3\
            o fora do local: [Atribui\xE7\xE3o: informa\xE7\xF5es definidas pela organiza\xE7\
            \xE3o];\ne. Verificar todos os controles potencialmente impactados para\
            \ confirmar que os controles ainda est\xE3o funcionando corretamente ap\xF3\
            s as a\xE7\xF5es de manuten\xE7\xE3o, reparo ou substitui\xE7\xE3o; e\n\
            f. Incluir as seguintes informa\xE7\xF5es nos registros de manuten\xE7\
            \xE3o organizacionais: [Atribui\xE7\xE3o: informa\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "Controlar a manuten\xE7\xE3o do sistema trata dos aspectos\
            \ de seguran\xE7a da informa\xE7\xE3o do programa de manuten\xE7\xE3o\
            \ do sistema e aplica-se a todos os tipos de manuten\xE7\xE3o de componentes\
            \ de sistema conduzidos por entidades locais ou n\xE3o locais. A manuten\xE7\
            \xE3o inclui perif\xE9ricos como scanners, copiadoras e impressoras. As\
            \ informa\xE7\xF5es necess\xE1rias para criar registros de manuten\xE7\
            \xE3o eficazes incluem a data e a hora da manuten\xE7\xE3o, uma descri\xE7\
            \xE3o da manuten\xE7\xE3o realizada, os nomes dos indiv\xEDduos ou do\
            \ grupo que realizou a manuten\xE7\xE3o, o nome do acompanhante e os componentes\
            \ de sistema ou equipamentos que s\xE3o removidos ou substitu\xEDdos.\
            \ As organiza\xE7\xF5es consideram os riscos relacionados \xE0 cadeia\
            \ de suprimentos associados aos componentes de substitui\xE7\xE3o dos\
            \ sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-2(1)
      name: Controlled Maintenance | Record Content
      description: '[Withdrawn: Incorporated into MA-2.]'
      translations:
        pt:
          name: "Manuten\xE7\xE3o Controlada | Conte\xFAdo do Registro"
          description: '[Retirado: Incorporado ao MA-2.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-2(2)
      name: Controlled Maintenance | Automated Maintenance Activities
      description: '(a) Schedule, conduct, and document maintenance, repair, and replacement
        actions for the system using [Assignment: organization-defined automated mechanisms];
        and

        (b) Produce up-to date, accurate, and complete records of all maintenance,
        repair, and replacement actions requested, scheduled, in process, and completed.'
      annotation: The use of automated mechanisms to manage and control system maintenance
        programs and activities helps to ensure the generation of timely, accurate,
        complete, and consistent maintenance records.
      translations:
        pt:
          name: "Manuten\xE7\xE3o Controlada | Atividades de Manuten\xE7\xE3o Automatizadas"
          description: "(a) Agendar, conduzir e documentar a\xE7\xF5es de manuten\xE7\
            \xE3o, reparo e substitui\xE7\xE3o do sistema utilizando [Atribui\xE7\xE3\
            o: mecanismos automatizados definidos pela organiza\xE7\xE3o]; e\n(b)\
            \ Produzir registros atualizados, precisos e completos de todas as a\xE7\
            \xF5es de manuten\xE7\xE3o, reparo e substitui\xE7\xE3o solicitadas, agendadas,\
            \ em andamento e conclu\xEDdas."
          annotation: "O uso de mecanismos automatizados para gerenciar e controlar\
            \ os programas e as atividades de manuten\xE7\xE3o do sistema ajuda a\
            \ garantir a gera\xE7\xE3o de registros de manuten\xE7\xE3o tempestivos,\
            \ precisos, completos e consistentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3
      name: Maintenance Tools
      description: 'a. Approve, control, and monitor the use of system maintenance
        tools; and

        b. Review previously approved system maintenance tools [Assignment: organization-defined
        frequency].'
      annotation: Approving, controlling, monitoring, and reviewing maintenance tools
        address security-related issues associated with maintenance tools that are
        not within system authorization boundaries and are used specifically for diagnostic
        and repair actions on organizational systems. Organizations have flexibility
        in determining roles for the approval of maintenance tools and how that approval
        is documented. A periodic review of maintenance tools facilitates the withdrawal
        of approval for outdated, unsupported, irrelevant, or no-longer-used tools.
        Maintenance tools can include hardware, software, and firmware items and may
        be pre-installed, brought in with maintenance personnel on media, cloud-based,
        or downloaded from a website. Such tools can be vehicles for transporting
        malicious code, either intentionally or unintentionally, into a facility and
        subsequently into systems. Maintenance tools can include hardware and software
        diagnostic test equipment and packet sniffers. The hardware and software components
        that support maintenance and are a part of the system (including the software
        implementing utilities such as ping, ls, ipconfig, or the hardware and software
        implementing the monitoring port of an Ethernet switch) are not addressed
        by maintenance tools.
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o"
          description: "a. Aprovar, controlar e monitorar o uso de ferramentas de\
            \ manuten\xE7\xE3o do sistema; e\nb. Revisar as ferramentas de manuten\xE7\
            \xE3o do sistema previamente aprovadas [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o]."
          annotation: "Aprovar, controlar, monitorar e revisar as ferramentas de manuten\xE7\
            \xE3o trata de quest\xF5es relacionadas \xE0 seguran\xE7a associadas a\
            \ ferramentas de manuten\xE7\xE3o que n\xE3o est\xE3o dentro dos limites\
            \ de autoriza\xE7\xE3o do sistema e que s\xE3o utilizadas especificamente\
            \ para a\xE7\xF5es de diagn\xF3stico e reparo em sistemas organizacionais.\
            \ As organiza\xE7\xF5es t\xEAm flexibilidade para determinar os pap\xE9\
            is para a aprova\xE7\xE3o de ferramentas de manuten\xE7\xE3o e como essa\
            \ aprova\xE7\xE3o \xE9 documentada. Uma revis\xE3o peri\xF3dica das ferramentas\
            \ de manuten\xE7\xE3o facilita a retirada da aprova\xE7\xE3o de ferramentas\
            \ desatualizadas, sem suporte, irrelevantes ou que n\xE3o s\xE3o mais\
            \ utilizadas. As ferramentas de manuten\xE7\xE3o podem incluir itens de\
            \ hardware, software e firmware e podem estar pr\xE9-instaladas, ser trazidas\
            \ pelo pessoal de manuten\xE7\xE3o em m\xEDdia, ser baseadas em nuvem\
            \ ou ser baixadas de um site. Tais ferramentas podem ser ve\xEDculos para\
            \ o transporte de c\xF3digo malicioso, de forma intencional ou n\xE3o,\
            \ para uma instala\xE7\xE3o e, posteriormente, para os sistemas. As ferramentas\
            \ de manuten\xE7\xE3o podem incluir equipamentos de teste de diagn\xF3\
            stico de hardware e software e analisadores de pacotes (packet sniffers).\
            \ Os componentes de hardware e software que d\xE3o suporte \xE0 manuten\xE7\
            \xE3o e fazem parte do sistema (incluindo o software que implementa utilit\xE1\
            rios como ping, ls, ipconfig, ou o hardware e software que implementam\
            \ a porta de monitoramento de um switch Ethernet) n\xE3o s\xE3o tratados\
            \ pelas ferramentas de manuten\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3(1)
      name: Maintenance Tools | Inspect Tools
      description: Inspect the maintenance tools used by maintenance personnel for
        improper or unauthorized modifications.
      annotation: "Maintenance tools can be directly brought into a facility by maintenance\
        \ personnel or downloaded from a vendor\u2019s website. If, upon inspection\
        \ of the maintenance tools, organizations determine that the tools have been\
        \ modified in an improper manner or the tools contain malicious code, the\
        \ incident is handled consistent with organizational policies and procedures\
        \ for incident handling."
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o | Inspecionar Ferramentas"
          description: "Inspecionar as ferramentas de manuten\xE7\xE3o utilizadas\
            \ pelo pessoal de manuten\xE7\xE3o quanto a modifica\xE7\xF5es impr\xF3\
            prias ou n\xE3o autorizadas."
          annotation: "As ferramentas de manuten\xE7\xE3o podem ser trazidas diretamente\
            \ para uma instala\xE7\xE3o pelo pessoal de manuten\xE7\xE3o ou baixadas\
            \ do site de um fornecedor. Se, ap\xF3s a inspe\xE7\xE3o das ferramentas\
            \ de manuten\xE7\xE3o, as organiza\xE7\xF5es determinarem que as ferramentas\
            \ foram modificadas de maneira impr\xF3pria ou que as ferramentas cont\xEA\
            m c\xF3digo malicioso, o incidente \xE9 tratado de forma consistente com\
            \ as pol\xEDticas e os procedimentos organizacionais para tratamento de\
            \ incidentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3(2)
      name: Maintenance Tools | Inspect Media
      description: Check media containing diagnostic and test programs for malicious
        code before the media are used in the system.
      annotation: If, upon inspection of media containing maintenance, diagnostic,
        and test programs, organizations determine that the media contains malicious
        code, the incident is handled consistent with organizational incident handling
        policies and procedures.
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o | Inspecionar M\xEDdia"
          description: "Verificar se as m\xEDdias que cont\xEAm programas de diagn\xF3\
            stico e teste apresentam c\xF3digo malicioso antes de as m\xEDdias serem\
            \ utilizadas no sistema."
          annotation: "Se, ap\xF3s a inspe\xE7\xE3o das m\xEDdias que cont\xEAm programas\
            \ de manuten\xE7\xE3o, diagn\xF3stico e teste, as organiza\xE7\xF5es determinarem\
            \ que a m\xEDdia cont\xE9m c\xF3digo malicioso, o incidente \xE9 tratado\
            \ de forma consistente com as pol\xEDticas e os procedimentos organizacionais\
            \ de tratamento de incidentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3(3)
      name: Maintenance Tools | Prevent Unauthorized Removal
      description: 'Prevent the removal of maintenance equipment containing organizational
        information by:

        (a) Verifying that there is no organizational information contained on the
        equipment;

        (b) Sanitizing or destroying the equipment;

        (c) Retaining the equipment within the facility; or

        (d) Obtaining an exemption from [Assignment: organization-defined personnel
        or roles] explicitly authorizing removal of the equipment from the facility.'
      annotation: Organizational information includes all information owned by organizations
        and any information provided to organizations for which the organizations
        serve as information stewards.
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o | Impedir Remo\xE7\xE3o N\xE3o Autorizada"
          description: "Impedir a remo\xE7\xE3o de equipamentos de manuten\xE7\xE3\
            o que contenham informa\xE7\xF5es organizacionais por meio de:\n(a) Verifica\xE7\
            \xE3o de que n\xE3o h\xE1 informa\xE7\xF5es organizacionais contidas no\
            \ equipamento;\n(b) Sanitiza\xE7\xE3o ou destrui\xE7\xE3o do equipamento;\n\
            (c) Reten\xE7\xE3o do equipamento dentro da instala\xE7\xE3o; ou\n(d)\
            \ Obten\xE7\xE3o de uma isen\xE7\xE3o de [Atribui\xE7\xE3o: pessoal ou\
            \ fun\xE7\xF5es definidos pela organiza\xE7\xE3o] autorizando explicitamente\
            \ a remo\xE7\xE3o do equipamento da instala\xE7\xE3o."
          annotation: "As informa\xE7\xF5es organizacionais incluem todas as informa\xE7\
            \xF5es de propriedade das organiza\xE7\xF5es e quaisquer informa\xE7\xF5\
            es fornecidas \xE0s organiza\xE7\xF5es para as quais as organiza\xE7\xF5\
            es atuem como custodiantes (stewards) da informa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3(4)
      name: Maintenance Tools | Restricted Tool Use
      description: Restrict the use of maintenance tools to authorized personnel only.
      annotation: Restricting the use of maintenance tools to only authorized personnel
        applies to systems that are used to carry out maintenance functions.
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o | Uso Restrito de Ferramentas"
          description: "Restringir o uso de ferramentas de manuten\xE7\xE3o apenas\
            \ ao pessoal autorizado."
          annotation: "Restringir o uso de ferramentas de manuten\xE7\xE3o apenas\
            \ ao pessoal autorizado aplica-se aos sistemas que s\xE3o utilizados para\
            \ executar fun\xE7\xF5es de manuten\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3(5)
      name: Maintenance Tools | Execution with Privilege
      description: Monitor the use of maintenance tools that execute with increased
        privilege.
      annotation: Maintenance tools that execute with increased system privilege can
        result in unauthorized access to organizational information and assets that
        would otherwise be inaccessible.
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o | Execu\xE7\xE3o com Privil\xE9gio"
          description: "Monitorar o uso de ferramentas de manuten\xE7\xE3o que s\xE3\
            o executadas com privil\xE9gio elevado."
          annotation: "As ferramentas de manuten\xE7\xE3o que s\xE3o executadas com\
            \ privil\xE9gio elevado no sistema podem resultar em acesso n\xE3o autorizado\
            \ a informa\xE7\xF5es e ativos organizacionais que, de outra forma, seriam\
            \ inacess\xEDveis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-3(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-3(6)
      name: Maintenance Tools | Software Updates and Patches
      description: Inspect maintenance tools to ensure the latest software updates
        and patches are installed.
      annotation: Maintenance tools using outdated and/or unpatched software can provide
        a threat vector for adversaries and result in a significant vulnerability
        for organizations.
      translations:
        pt:
          name: "Ferramentas de Manuten\xE7\xE3o | Atualiza\xE7\xF5es de Software\
            \ e Corre\xE7\xF5es"
          description: "Inspecionar as ferramentas de manuten\xE7\xE3o para garantir\
            \ que as atualiza\xE7\xF5es de software e corre\xE7\xF5es (patches) mais\
            \ recentes estejam instaladas."
          annotation: "As ferramentas de manuten\xE7\xE3o que utilizam software desatualizado\
            \ e/ou sem as corre\xE7\xF5es (patches) aplicadas podem fornecer um vetor\
            \ de amea\xE7a para advers\xE1rios e resultar em uma vulnerabilidade significativa\
            \ para as organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4
      name: Nonlocal Maintenance
      description: 'a. Approve and monitor nonlocal maintenance and diagnostic activities;

        b. Allow the use of nonlocal maintenance and diagnostic tools only as consistent
        with organizational policy and documented in the security plan for the system;

        c. Employ strong authentication in the establishment of nonlocal maintenance
        and diagnostic sessions;

        d. Maintain records for nonlocal maintenance and diagnostic activities; and

        e. Terminate session and network connections when nonlocal maintenance is
        completed.'
      annotation: Nonlocal maintenance and diagnostic activities are conducted by
        individuals who communicate through either an external or internal network.
        Local maintenance and diagnostic activities are carried out by individuals
        who are physically present at the system location and not communicating across
        a network connection. Authentication techniques used to establish nonlocal
        maintenance and diagnostic sessions reflect the network access requirements
        in IA-2. Strong authentication requires authenticators that are resistant
        to replay attacks and employ multi-factor authentication. Strong authenticators
        include PKI where certificates are stored on a token protected by a password,
        passphrase, or biometric. Enforcing requirements in MA-4 is accomplished,
        in part, by other controls. SP 800-63B provides additional guidance on strong
        authentication and authenticators.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local"
          description: "a. Aprovar e monitorar as atividades de manuten\xE7\xE3o e\
            \ diagn\xF3stico n\xE3o locais;\nb. Permitir o uso de ferramentas de manuten\xE7\
            \xE3o e diagn\xF3stico n\xE3o locais somente quando coerente com a pol\xED\
            tica organizacional e documentado no plano de seguran\xE7a do sistema;\n\
            c. Empregar autentica\xE7\xE3o forte no estabelecimento de sess\xF5es\
            \ de manuten\xE7\xE3o e diagn\xF3stico n\xE3o locais;\nd. Manter registros\
            \ das atividades de manuten\xE7\xE3o e diagn\xF3stico n\xE3o locais; e\n\
            e. Encerrar a sess\xE3o e as conex\xF5es de rede quando a manuten\xE7\xE3\
            o n\xE3o local for conclu\xEDda."
          annotation: "As atividades de manuten\xE7\xE3o e diagn\xF3stico n\xE3o locais\
            \ s\xE3o conduzidas por indiv\xEDduos que se comunicam por meio de uma\
            \ rede externa ou interna. As atividades de manuten\xE7\xE3o e diagn\xF3\
            stico locais s\xE3o realizadas por indiv\xEDduos que est\xE3o fisicamente\
            \ presentes no local do sistema e n\xE3o se comunicam por meio de uma\
            \ conex\xE3o de rede. As t\xE9cnicas de autentica\xE7\xE3o utilizadas\
            \ para estabelecer sess\xF5es de manuten\xE7\xE3o e diagn\xF3stico n\xE3\
            o locais refletem os requisitos de acesso \xE0 rede em IA-2. A autentica\xE7\
            \xE3o forte exige autenticadores que sejam resistentes a ataques de repeti\xE7\
            \xE3o (replay) e que empreguem autentica\xE7\xE3o multifator. Autenticadores\
            \ fortes incluem PKI, na qual os certificados s\xE3o armazenados em um\
            \ token protegido por senha, frase secreta ou biometria. A imposi\xE7\xE3\
            o dos requisitos em MA-4 \xE9 alcan\xE7ada, em parte, por outros controles.\
            \ A SP 800-63B fornece orienta\xE7\xF5es adicionais sobre autentica\xE7\
            \xE3o forte e autenticadores."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(1)
      name: Nonlocal Maintenance | Logging and Review
      description: '(a) Log [Assignment: organization-defined audit events] for nonlocal
        maintenance and diagnostic sessions; and

        (b) Review the audit records of the maintenance and diagnostic sessions to
        detect anomalous behavior.'
      annotation: Audit logging for nonlocal maintenance is enforced by AU-2. Audit
        events are defined in AU-2a.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Registro e Revis\xE3o"
          description: "(a) Registrar [Atribui\xE7\xE3o: eventos de auditoria definidos\
            \ pela organiza\xE7\xE3o] para sess\xF5es de manuten\xE7\xE3o e diagn\xF3\
            stico n\xE3o locais; e\n(b) Revisar os registros de auditoria das sess\xF5\
            es de manuten\xE7\xE3o e diagn\xF3stico para detectar comportamento an\xF4\
            malo."
          annotation: "O registro de auditoria da manuten\xE7\xE3o n\xE3o local \xE9\
            \ imposto por AU-2. Os eventos de auditoria s\xE3o definidos em AU-2a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(2)
      name: Nonlocal Maintenance | Document Nonlocal Maintenance
      description: '[Withdrawn: Incorporated into MA-1 and MA-4.]'
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Documentar Manuten\xE7\xE3o N\xE3\
            o Local"
          description: '[Retirado: Incorporado a MA-1 e MA-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(3)
      name: Nonlocal Maintenance | Comparable Security and Sanitization
      description: '(a) Require that nonlocal maintenance and diagnostic services
        be performed from a system that implements a security capability comparable
        to the capability implemented on the system being serviced; or

        (b) Remove the component to be serviced from the system prior to nonlocal
        maintenance or diagnostic services; sanitize the component (for organizational
        information); and after the service is performed, inspect and sanitize the
        component (for potentially malicious software) before reconnecting the component
        to the system.'
      annotation: Comparable security capability on systems, diagnostic tools, and
        equipment providing maintenance services implies that the implemented controls
        on those systems, tools, and equipment are at least as comprehensive as the
        controls on the system being serviced.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Seguran\xE7a Compar\xE1vel e Sanitiza\xE7\
            \xE3o"
          description: "(a) Exigir que os servi\xE7os de manuten\xE7\xE3o e diagn\xF3\
            stico n\xE3o locais sejam realizados a partir de um sistema que implemente\
            \ uma capacidade de seguran\xE7a compar\xE1vel \xE0 capacidade implementada\
            \ no sistema que est\xE1 sendo atendido; ou\n(b) Remover o componente\
            \ a ser atendido do sistema antes dos servi\xE7os de manuten\xE7\xE3o\
            \ ou diagn\xF3stico n\xE3o locais; sanitizar o componente (quanto a informa\xE7\
            \xF5es organizacionais); e, ap\xF3s a realiza\xE7\xE3o do servi\xE7o,\
            \ inspecionar e sanitizar o componente (quanto a software potencialmente\
            \ malicioso) antes de reconect\xE1-lo ao sistema."
          annotation: "A capacidade de seguran\xE7a compar\xE1vel em sistemas, ferramentas\
            \ de diagn\xF3stico e equipamentos que prestam servi\xE7os de manuten\xE7\
            \xE3o implica que os controles implementados nesses sistemas, ferramentas\
            \ e equipamentos sejam pelo menos t\xE3o abrangentes quanto os controles\
            \ do sistema que est\xE1 sendo atendido."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(4)
      name: Nonlocal Maintenance | Authentication and Separation of Maintenance Sessions
      description: 'Protect nonlocal maintenance sessions by:

        (a) Employing [Assignment: organization-defined authenticators that are replay
        resistant]; and

        (b) Separating the maintenance sessions from other network sessions with the
        system by either:

        (1) Physically separated communications paths; or

        (2) Logically separated communications paths.'
      annotation: Communications paths can be logically separated using encryption.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Autentica\xE7\xE3o e Separa\xE7\xE3\
            o de Sess\xF5es de Manuten\xE7\xE3o"
          description: "Proteger as sess\xF5es de manuten\xE7\xE3o n\xE3o locais por\
            \ meio de:\n(a) Emprego de [Atribui\xE7\xE3o: autenticadores resistentes\
            \ a repeti\xE7\xE3o (replay) definidos pela organiza\xE7\xE3o]; e\n(b)\
            \ Separa\xE7\xE3o das sess\xF5es de manuten\xE7\xE3o das demais sess\xF5\
            es de rede com o sistema por meio de:\n(1) Caminhos de comunica\xE7\xE3\
            o fisicamente separados; ou\n(2) Caminhos de comunica\xE7\xE3o logicamente\
            \ separados."
          annotation: "Os caminhos de comunica\xE7\xE3o podem ser separados logicamente\
            \ por meio de criptografia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(5)
      name: Nonlocal Maintenance | Approvals and Notifications
      description: '(a) Require the approval of each nonlocal maintenance session
        by [Assignment: organization-defined personnel or roles]; and

        (b) Notify the following personnel or roles of the date and time of planned
        nonlocal maintenance: [Assignment: organization-defined personnel or roles].'
      annotation: Notification may be performed by maintenance personnel. Approval
        of nonlocal maintenance is accomplished by personnel with sufficient information
        security and system knowledge to determine the appropriateness of the proposed
        maintenance.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Aprova\xE7\xF5es e Notifica\xE7\xF5\
            es"
          description: "(a) Exigir a aprova\xE7\xE3o de cada sess\xE3o de manuten\xE7\
            \xE3o n\xE3o local por [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o]; e\n(b) Notificar o seguinte pessoal ou fun\xE7\
            \xF5es sobre a data e hora da manuten\xE7\xE3o n\xE3o local planejada:\
            \ [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o]."
          annotation: "A notifica\xE7\xE3o pode ser realizada pelo pessoal de manuten\xE7\
            \xE3o. A aprova\xE7\xE3o da manuten\xE7\xE3o n\xE3o local \xE9 realizada\
            \ por pessoal com conhecimento suficiente de seguran\xE7a da informa\xE7\
            \xE3o e do sistema para determinar a adequa\xE7\xE3o da manuten\xE7\xE3\
            o proposta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(6)
      name: Nonlocal Maintenance | Cryptographic Protection
      description: 'Implement the following cryptographic mechanisms to protect the
        integrity and confidentiality of nonlocal maintenance and diagnostic communications:
        [Assignment: organization-defined cryptographic mechanisms].'
      annotation: Failure to protect nonlocal maintenance and diagnostic communications
        can result in unauthorized individuals gaining access to organizational information.
        Unauthorized access during remote maintenance sessions can result in a variety
        of hostile actions, including malicious code insertion, unauthorized changes
        to system parameters, and exfiltration of organizational information. Such
        actions can result in the loss or degradation of mission or business capabilities.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Prote\xE7\xE3o Criptogr\xE1fica"
          description: "Implementar os seguintes mecanismos criptogr\xE1ficos para\
            \ proteger a integridade e a confidencialidade das comunica\xE7\xF5es\
            \ de manuten\xE7\xE3o e diagn\xF3stico n\xE3o locais: [Atribui\xE7\xE3\
            o: mecanismos criptogr\xE1ficos definidos pela organiza\xE7\xE3o]."
          annotation: "A falha em proteger as comunica\xE7\xF5es de manuten\xE7\xE3\
            o e diagn\xF3stico n\xE3o locais pode resultar em indiv\xEDduos n\xE3\
            o autorizados obtendo acesso a informa\xE7\xF5es organizacionais. O acesso\
            \ n\xE3o autorizado durante sess\xF5es de manuten\xE7\xE3o remota pode\
            \ resultar em uma variedade de a\xE7\xF5es hostis, incluindo inser\xE7\
            \xE3o de c\xF3digo malicioso, altera\xE7\xF5es n\xE3o autorizadas de par\xE2\
            metros do sistema e exfiltra\xE7\xE3o de informa\xE7\xF5es organizacionais.\
            \ Tais a\xE7\xF5es podem resultar na perda ou degrada\xE7\xE3o das capacidades\
            \ de miss\xE3o ou de neg\xF3cio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-4(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-4(7)
      name: Nonlocal Maintenance | Disconnect Verification
      description: Verify session and network connection termination after the completion
        of nonlocal maintenance and diagnostic sessions.
      annotation: Verifying the termination of a connection once maintenance is completed
        ensures that connections established during nonlocal maintenance and diagnostic
        sessions have been terminated and are no longer available for use.
      translations:
        pt:
          name: "Manuten\xE7\xE3o N\xE3o Local | Verifica\xE7\xE3o de Desconex\xE3\
            o"
          description: "Verificar o encerramento da sess\xE3o e da conex\xE3o de rede\
            \ ap\xF3s a conclus\xE3o das sess\xF5es de manuten\xE7\xE3o e diagn\xF3\
            stico n\xE3o locais."
          annotation: "A verifica\xE7\xE3o do encerramento de uma conex\xE3o ap\xF3\
            s a conclus\xE3o da manuten\xE7\xE3o assegura que as conex\xF5es estabelecidas\
            \ durante as sess\xF5es de manuten\xE7\xE3o e diagn\xF3stico n\xE3o locais\
            \ tenham sido encerradas e n\xE3o estejam mais dispon\xEDveis para uso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-5
      name: Maintenance Personnel
      description: 'a. Establish a process for maintenance personnel authorization
        and maintain a list of authorized maintenance organizations or personnel;

        b. Verify that non-escorted personnel performing maintenance on the system
        possess the required access authorizations; and

        c. Designate organizational personnel with required access authorizations
        and technical competence to supervise the maintenance activities of personnel
        who do not possess the required access authorizations.'
      annotation: "Maintenance personnel refers to individuals who perform hardware\
        \ or software maintenance on organizational systems, while PE-2 addresses\
        \ physical access for individuals whose maintenance duties place them within\
        \ the physical protection perimeter of the systems. Technical competence of\
        \ supervising individuals relates to the maintenance performed on the systems,\
        \ while having required access authorizations refers to maintenance on and\
        \ near the systems. Individuals not previously identified as authorized maintenance\
        \ personnel\u2014such as information technology manufacturers, vendors, systems\
        \ integrators, and consultants\u2014may require privileged access to organizational\
        \ systems, such as when they are required to conduct maintenance activities\
        \ with little or no notice. Based on organizational assessments of risk, organizations\
        \ may issue temporary credentials to these individuals. Temporary credentials\
        \ may be for one-time use or for very limited time periods."
      translations:
        pt:
          name: "Pessoal de Manuten\xE7\xE3o"
          description: "a. Estabelecer um processo de autoriza\xE7\xE3o de pessoal\
            \ de manuten\xE7\xE3o e manter uma lista das organiza\xE7\xF5es ou do\
            \ pessoal de manuten\xE7\xE3o autorizados;\nb. Verificar se o pessoal\
            \ n\xE3o acompanhado que realiza manuten\xE7\xE3o no sistema possui as\
            \ autoriza\xE7\xF5es de acesso exigidas; e\nc. Designar pessoal organizacional\
            \ com as autoriza\xE7\xF5es de acesso exigidas e compet\xEAncia t\xE9\
            cnica para supervisionar as atividades de manuten\xE7\xE3o do pessoal\
            \ que n\xE3o possui as autoriza\xE7\xF5es de acesso exigidas."
          annotation: "O pessoal de manuten\xE7\xE3o refere-se a indiv\xEDduos que\
            \ realizam manuten\xE7\xE3o de hardware ou software nos sistemas organizacionais,\
            \ enquanto PE-2 trata do acesso f\xEDsico de indiv\xEDduos cujas fun\xE7\
            \xF5es de manuten\xE7\xE3o os colocam dentro do per\xEDmetro de prote\xE7\
            \xE3o f\xEDsica dos sistemas. A compet\xEAncia t\xE9cnica dos indiv\xED\
            duos supervisores relaciona-se \xE0 manuten\xE7\xE3o realizada nos sistemas,\
            \ enquanto possuir as autoriza\xE7\xF5es de acesso exigidas refere-se\
            \ \xE0 manuten\xE7\xE3o nos sistemas e em suas proximidades. Indiv\xED\
            duos n\xE3o previamente identificados como pessoal de manuten\xE7\xE3\
            o autorizado \u2014 como fabricantes de tecnologia da informa\xE7\xE3\
            o, fornecedores, integradores de sistemas e consultores \u2014 podem necessitar\
            \ de acesso privilegiado aos sistemas organizacionais, como quando precisam\
            \ realizar atividades de manuten\xE7\xE3o com pouco ou nenhum aviso pr\xE9\
            vio. Com base em avalia\xE7\xF5es organizacionais de risco, as organiza\xE7\
            \xF5es podem emitir credenciais tempor\xE1rias a esses indiv\xEDduos.\
            \ As credenciais tempor\xE1rias podem ser de uso \xFAnico ou para per\xED\
            odos de tempo muito limitados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-5(1)
      name: Maintenance Personnel | Individuals Without Appropriate Access
      description: '(a) Implement procedures for the use of maintenance personnel
        that lack appropriate security clearances or are not U.S. citizens, that include
        the following requirements:

        (1) Maintenance personnel who do not have needed access authorizations, clearances,
        or formal access approvals are escorted and supervised during the performance
        of maintenance and diagnostic activities on the system by approved organizational
        personnel who are fully cleared, have appropriate access authorizations, and
        are technically qualified; and

        (2) Prior to initiating maintenance or diagnostic activities by personnel
        who do not have needed access authorizations, clearances or formal access
        approvals, all volatile information storage components within the system are
        sanitized and all nonvolatile storage media are removed or physically disconnected
        from the system and secured; and

        (b) Develop and implement [Assignment: organization-defined alternate controls]
        in the event a system component cannot be sanitized, removed, or disconnected
        from the system.'
      annotation: Procedures for individuals who lack appropriate security clearances
        or who are not U.S. citizens are intended to deny visual and electronic access
        to classified or controlled unclassified information contained on organizational
        systems. Procedures for the use of maintenance personnel can be documented
        in security plans for the systems.
      translations:
        pt:
          name: "Pessoal de Manuten\xE7\xE3o | Indiv\xEDduos Sem Acesso Apropriado"
          description: "(a) Implementar procedimentos para o uso de pessoal de manuten\xE7\
            \xE3o que n\xE3o possua as habilita\xE7\xF5es de seguran\xE7a apropriadas\
            \ ou que n\xE3o seja cidad\xE3o dos EUA, que incluam os seguintes requisitos:\n\
            (1) O pessoal de manuten\xE7\xE3o que n\xE3o possui as autoriza\xE7\xF5\
            es de acesso, habilita\xE7\xF5es ou aprova\xE7\xF5es formais de acesso\
            \ necess\xE1rias \xE9 acompanhado e supervisionado durante a realiza\xE7\
            \xE3o das atividades de manuten\xE7\xE3o e diagn\xF3stico no sistema por\
            \ pessoal organizacional aprovado que esteja plenamente habilitado, possua\
            \ as autoriza\xE7\xF5es de acesso apropriadas e seja tecnicamente qualificado;\
            \ e\n(2) Antes de iniciar atividades de manuten\xE7\xE3o ou diagn\xF3\
            stico por pessoal que n\xE3o possui as autoriza\xE7\xF5es de acesso, habilita\xE7\
            \xF5es ou aprova\xE7\xF5es formais de acesso necess\xE1rias, todos os\
            \ componentes de armazenamento de informa\xE7\xF5es vol\xE1teis dentro\
            \ do sistema s\xE3o sanitizados e toda a m\xEDdia de armazenamento n\xE3\
            o vol\xE1til \xE9 removida ou fisicamente desconectada do sistema e protegida;\
            \ e\n(b) Desenvolver e implementar [Atribui\xE7\xE3o: controles alternativos\
            \ definidos pela organiza\xE7\xE3o] caso um componente do sistema n\xE3\
            o possa ser sanitizado, removido ou desconectado do sistema."
          annotation: "Os procedimentos para indiv\xEDduos que n\xE3o possuem as habilita\xE7\
            \xF5es de seguran\xE7a apropriadas ou que n\xE3o s\xE3o cidad\xE3os dos\
            \ EUA destinam-se a negar o acesso visual e eletr\xF4nico a informa\xE7\
            \xF5es classificadas ou controladas n\xE3o classificadas contidas nos\
            \ sistemas organizacionais. Os procedimentos para o uso de pessoal de\
            \ manuten\xE7\xE3o podem ser documentados nos planos de seguran\xE7a dos\
            \ sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-5(2)
      name: Maintenance Personnel | Security Clearances for Classified Systems
      description: Verify that personnel performing maintenance and diagnostic activities
        on a system processing, storing, or transmitting classified information possess
        security clearances and formal access approvals for at least the highest classification
        level and for compartments of information on the system.
      annotation: Personnel who conduct maintenance on organizational systems may
        be exposed to classified information during the course of their maintenance
        activities. To mitigate the inherent risk of such exposure, organizations
        use maintenance personnel that are cleared (i.e., possess security clearances)
        to the classification level of the information stored on the system.
      translations:
        pt:
          name: "Pessoal de Manuten\xE7\xE3o | Habilita\xE7\xF5es de Seguran\xE7a\
            \ para Sistemas Classificados"
          description: "Verificar se o pessoal que realiza atividades de manuten\xE7\
            \xE3o e diagn\xF3stico em um sistema que processa, armazena ou transmite\
            \ informa\xE7\xF5es classificadas possui habilita\xE7\xF5es de seguran\xE7\
            a e aprova\xE7\xF5es formais de acesso para, no m\xEDnimo, o n\xEDvel\
            \ de classifica\xE7\xE3o mais alto e para os compartimentos de informa\xE7\
            \xE3o do sistema."
          annotation: "O pessoal que realiza manuten\xE7\xE3o nos sistemas organizacionais\
            \ pode ser exposto a informa\xE7\xF5es classificadas no decorrer de suas\
            \ atividades de manuten\xE7\xE3o. Para mitigar o risco inerente a tal\
            \ exposi\xE7\xE3o, as organiza\xE7\xF5es utilizam pessoal de manuten\xE7\
            \xE3o habilitado (ou seja, que possui habilita\xE7\xF5es de seguran\xE7\
            a) ao n\xEDvel de classifica\xE7\xE3o das informa\xE7\xF5es armazenadas\
            \ no sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-5(3)
      name: Maintenance Personnel | Citizenship Requirements for Classified Systems
      description: Verify that personnel performing maintenance and diagnostic activities
        on a system processing, storing, or transmitting classified information are
        U.S. citizens.
      annotation: Personnel who conduct maintenance on organizational systems may
        be exposed to classified information during the course of their maintenance
        activities. If access to classified information on organizational systems
        is restricted to U.S. citizens, the same restriction is applied to personnel
        performing maintenance on those systems.
      translations:
        pt:
          name: "Pessoal de Manuten\xE7\xE3o | Requisitos de Cidadania para Sistemas\
            \ Classificados"
          description: "Verificar se o pessoal que realiza atividades de manuten\xE7\
            \xE3o e diagn\xF3stico em um sistema que processa, armazena ou transmite\
            \ informa\xE7\xF5es classificadas \xE9 composto por cidad\xE3os dos EUA."
          annotation: "O pessoal que realiza manuten\xE7\xE3o nos sistemas organizacionais\
            \ pode ser exposto a informa\xE7\xF5es classificadas no decorrer de suas\
            \ atividades de manuten\xE7\xE3o. Se o acesso a informa\xE7\xF5es classificadas\
            \ nos sistemas organizacionais for restrito a cidad\xE3os dos EUA, a mesma\
            \ restri\xE7\xE3o \xE9 aplicada ao pessoal que realiza manuten\xE7\xE3\
            o nesses sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-5(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-5(4)
      name: Maintenance Personnel | Foreign Nationals
      description: 'Ensure that:

        (a) Foreign nationals with appropriate security clearances are used to conduct
        maintenance and diagnostic activities on classified systems only when the
        systems are jointly owned and operated by the United States and foreign allied
        governments, or owned and operated solely by foreign allied governments; and

        (b) Approvals, consents, and detailed operational conditions regarding the
        use of foreign nationals to conduct maintenance and diagnostic activities
        on classified systems are fully documented within Memoranda of Agreements.'
      annotation: Personnel who conduct maintenance and diagnostic activities on organizational
        systems may be exposed to classified information. If non-U.S. citizens are
        permitted to perform maintenance and diagnostics activities on classified
        systems, then additional vetting is required to ensure agreements and restrictions
        are not being violated.
      translations:
        pt:
          name: "Pessoal de Manuten\xE7\xE3o | Cidad\xE3os Estrangeiros"
          description: "Assegurar que:\n(a) Cidad\xE3os estrangeiros com habilita\xE7\
            \xF5es de seguran\xE7a apropriadas sejam utilizados para realizar atividades\
            \ de manuten\xE7\xE3o e diagn\xF3stico em sistemas classificados somente\
            \ quando os sistemas forem de propriedade e opera\xE7\xE3o conjunta dos\
            \ Estados Unidos e de governos aliados estrangeiros, ou de propriedade\
            \ e opera\xE7\xE3o exclusiva de governos aliados estrangeiros; e\n(b)\
            \ As aprova\xE7\xF5es, consentimentos e condi\xE7\xF5es operacionais detalhadas\
            \ relativas ao uso de cidad\xE3os estrangeiros para realizar atividades\
            \ de manuten\xE7\xE3o e diagn\xF3stico em sistemas classificados sejam\
            \ totalmente documentados em Memorandos de Acordo."
          annotation: "O pessoal que realiza atividades de manuten\xE7\xE3o e diagn\xF3\
            stico nos sistemas organizacionais pode ser exposto a informa\xE7\xF5\
            es classificadas. Se for permitido que pessoas que n\xE3o sejam cidad\xE3\
            os dos EUA realizem atividades de manuten\xE7\xE3o e diagn\xF3stico em\
            \ sistemas classificados, \xE9 necess\xE1ria uma verifica\xE7\xE3o adicional\
            \ para assegurar que acordos e restri\xE7\xF5es n\xE3o estejam sendo violados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-5(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-5(5)
      name: Maintenance Personnel | Non-system Maintenance
      description: Ensure that non-escorted personnel performing maintenance activities
        not directly associated with the system but in the physical proximity of the
        system, have required access authorizations.
      annotation: Personnel who perform maintenance activities in other capacities
        not directly related to the system include physical plant personnel and custodial
        personnel.
      translations:
        pt:
          name: "Pessoal de Manuten\xE7\xE3o | Manuten\xE7\xE3o N\xE3o Relacionada\
            \ ao Sistema"
          description: "Assegurar que o pessoal n\xE3o acompanhado que realiza atividades\
            \ de manuten\xE7\xE3o n\xE3o diretamente associadas ao sistema, mas na\
            \ proximidade f\xEDsica do sistema, possua as autoriza\xE7\xF5es de acesso\
            \ exigidas."
          annotation: "O pessoal que realiza atividades de manuten\xE7\xE3o em outras\
            \ fun\xE7\xF5es n\xE3o diretamente relacionadas ao sistema inclui pessoal\
            \ de manuten\xE7\xE3o predial e pessoal de limpeza."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-6
      name: Timely Maintenance
      description: 'Obtain maintenance support and/or spare parts for [Assignment:
        organization-defined system components] within [Assignment: organization-defined
        time period] of failure.'
      annotation: Organizations specify the system components that result in increased
        risk to organizational operations and assets, individuals, other organizations,
        or the Nation when the functionality provided by those components is not operational.
        Organizational actions to obtain maintenance support include having appropriate
        contracts in place.
      translations:
        pt:
          name: "Manuten\xE7\xE3o Tempestiva"
          description: "Obter suporte de manuten\xE7\xE3o e/ou pe\xE7as de reposi\xE7\
            \xE3o para [Atribui\xE7\xE3o: componentes do sistema definidos pela organiza\xE7\
            \xE3o] dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela\
            \ organiza\xE7\xE3o] ap\xF3s a falha."
          annotation: "As organiza\xE7\xF5es especificam os componentes do sistema\
            \ que resultam em maior risco \xE0s opera\xE7\xF5es e ativos organizacionais,\
            \ indiv\xEDduos, outras organiza\xE7\xF5es ou a Na\xE7\xE3o quando a funcionalidade\
            \ fornecida por esses componentes n\xE3o est\xE1 operacional. As a\xE7\
            \xF5es organizacionais para obter suporte de manuten\xE7\xE3o incluem\
            \ ter contratos apropriados estabelecidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-6(1)
      name: Timely Maintenance | Preventive Maintenance
      description: 'Perform preventive maintenance on [Assignment: organization-defined
        system components] at [Assignment: organization-defined time intervals].'
      annotation: Preventive maintenance includes proactive care and the servicing
        of system components to maintain organizational equipment and facilities in
        satisfactory operating condition. Such maintenance provides for the systematic
        inspection, tests, measurements, adjustments, parts replacement, detection,
        and correction of incipient failures either before they occur or before they
        develop into major defects. The primary goal of preventive maintenance is
        to avoid or mitigate the consequences of equipment failures. Preventive maintenance
        is designed to preserve and restore equipment reliability by replacing worn
        components before they fail. Methods of determining what preventive (or other)
        failure management policies to apply include original equipment manufacturer
        recommendations; statistical failure records; expert opinion; maintenance
        that has already been conducted on similar equipment; requirements of codes,
        laws, or regulations within a jurisdiction; or measured values and performance
        indications.
      translations:
        pt:
          name: "Manuten\xE7\xE3o Tempestiva | Manuten\xE7\xE3o Preventiva"
          description: "Realizar manuten\xE7\xE3o preventiva em [Atribui\xE7\xE3o:\
            \ componentes do sistema definidos pela organiza\xE7\xE3o] em [Atribui\xE7\
            \xE3o: intervalos de tempo definidos pela organiza\xE7\xE3o]."
          annotation: "A manuten\xE7\xE3o preventiva inclui o cuidado proativo e a\
            \ manuten\xE7\xE3o dos componentes do sistema para manter os equipamentos\
            \ e instala\xE7\xF5es organizacionais em condi\xE7\xF5es de opera\xE7\xE3\
            o satisfat\xF3rias. Tal manuten\xE7\xE3o prov\xEA a inspe\xE7\xE3o, testes,\
            \ medi\xE7\xF5es, ajustes, substitui\xE7\xE3o de pe\xE7as, detec\xE7\xE3\
            o e corre\xE7\xE3o sistem\xE1ticos de falhas incipientes, seja antes de\
            \ ocorrerem ou antes que evoluam para defeitos maiores. O objetivo principal\
            \ da manuten\xE7\xE3o preventiva \xE9 evitar ou mitigar as consequ\xEA\
            ncias de falhas de equipamentos. A manuten\xE7\xE3o preventiva \xE9 projetada\
            \ para preservar e restaurar a confiabilidade dos equipamentos, substituindo\
            \ componentes desgastados antes que falhem. Os m\xE9todos para determinar\
            \ quais pol\xEDticas de gest\xE3o de falhas preventivas (ou outras) aplicar\
            \ incluem recomenda\xE7\xF5es do fabricante original do equipamento; registros\
            \ estat\xEDsticos de falhas; opini\xE3o de especialistas; manuten\xE7\xE3\
            o j\xE1 realizada em equipamentos similares; exig\xEAncias de c\xF3digos,\
            \ leis ou regulamentos de uma jurisdi\xE7\xE3o; ou valores medidos e indica\xE7\
            \xF5es de desempenho."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-6(2)
      name: Timely Maintenance | Predictive Maintenance
      description: 'Perform predictive maintenance on [Assignment: organization-defined
        system components] at [Assignment: organization-defined time intervals].'
      annotation: Predictive maintenance evaluates the condition of equipment by performing
        periodic or continuous (online) equipment condition monitoring. The goal of
        predictive maintenance is to perform maintenance at a scheduled time when
        the maintenance activity is most cost-effective and before the equipment loses
        performance within a threshold. The predictive component of predictive maintenance
        stems from the objective of predicting the future trend of the equipment's
        condition. The predictive maintenance approach employs principles of statistical
        process control to determine at what point in the future maintenance activities
        will be appropriate. Most predictive maintenance inspections are performed
        while equipment is in service, thus minimizing disruption of normal system
        operations. Predictive maintenance can result in substantial cost savings
        and higher system reliability.
      translations:
        pt:
          name: "Manuten\xE7\xE3o Tempestiva | Manuten\xE7\xE3o Preditiva"
          description: "Realizar manuten\xE7\xE3o preditiva em [Atribui\xE7\xE3o:\
            \ componentes do sistema definidos pela organiza\xE7\xE3o] em [Atribui\xE7\
            \xE3o: intervalos de tempo definidos pela organiza\xE7\xE3o]."
          annotation: "A manuten\xE7\xE3o preditiva avalia a condi\xE7\xE3o do equipamento\
            \ por meio do monitoramento peri\xF3dico ou cont\xEDnuo (online) da condi\xE7\
            \xE3o do equipamento. O objetivo da manuten\xE7\xE3o preditiva \xE9 realizar\
            \ a manuten\xE7\xE3o em um momento agendado em que a atividade de manuten\xE7\
            \xE3o seja mais econ\xF4mica e antes que o equipamento perca desempenho\
            \ al\xE9m de um limiar. O componente preditivo da manuten\xE7\xE3o preditiva\
            \ decorre do objetivo de prever a tend\xEAncia futura da condi\xE7\xE3\
            o do equipamento. A abordagem de manuten\xE7\xE3o preditiva emprega princ\xED\
            pios de controle estat\xEDstico de processo para determinar em que ponto\
            \ no futuro as atividades de manuten\xE7\xE3o ser\xE3o apropriadas. A\
            \ maioria das inspe\xE7\xF5es de manuten\xE7\xE3o preditiva \xE9 realizada\
            \ enquanto o equipamento est\xE1 em servi\xE7o, minimizando assim a interrup\xE7\
            \xE3o das opera\xE7\xF5es normais do sistema. A manuten\xE7\xE3o preditiva\
            \ pode resultar em economias substanciais de custos e maior confiabilidade\
            \ do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-6(3)
      name: Timely Maintenance | Automated Support for Predictive Maintenance
      description: 'Transfer predictive maintenance data to a maintenance management
        system using [Assignment: organization-defined automated mechanisms].'
      annotation: A computerized maintenance management system maintains a database
        of information about the maintenance operations of organizations and automates
        the processing of equipment condition data to trigger maintenance planning,
        execution, and reporting.
      translations:
        pt:
          name: "Manuten\xE7\xE3o Tempestiva | Suporte Automatizado para Manuten\xE7\
            \xE3o Preditiva"
          description: "Transferir os dados de manuten\xE7\xE3o preditiva para um\
            \ sistema de gest\xE3o de manuten\xE7\xE3o utilizando [Atribui\xE7\xE3\
            o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Um sistema computadorizado de gest\xE3o de manuten\xE7\xE3\
            o mant\xE9m uma base de dados de informa\xE7\xF5es sobre as opera\xE7\xF5\
            es de manuten\xE7\xE3o das organiza\xE7\xF5es e automatiza o processamento\
            \ dos dados de condi\xE7\xE3o dos equipamentos para acionar o planejamento,\
            \ a execu\xE7\xE3o e a gera\xE7\xE3o de relat\xF3rios de manuten\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ma
      ref_id: MA-7
      name: Field Maintenance
      description: 'Restrict or prohibit field maintenance on [Assignment: organization-defined
        systems or system components] to [Assignment: organization-defined trusted
        maintenance facilities].'
      annotation: Field maintenance is the type of maintenance conducted on a system
        or system component after the system or component has been deployed to a specific
        site (i.e., operational environment). In certain instances, field maintenance
        (i.e., local maintenance at the site) may not be executed with the same degree
        of rigor or with the same quality control checks as depot maintenance. For
        critical systems designated as such by the organization, it may be necessary
        to restrict or prohibit field maintenance at the local site and require that
        such maintenance be conducted in trusted facilities with additional controls.
      translations:
        pt:
          name: "Manuten\xE7\xE3o em Campo"
          description: "Restringir ou proibir a manuten\xE7\xE3o em campo em [Atribui\xE7\
            \xE3o: sistemas ou componentes de sistema definidos pela organiza\xE7\xE3\
            o] a [Atribui\xE7\xE3o: instala\xE7\xF5es de manuten\xE7\xE3o confi\xE1\
            veis definidas pela organiza\xE7\xE3o]."
          annotation: "A manuten\xE7\xE3o em campo \xE9 o tipo de manuten\xE7\xE3\
            o realizada em um sistema ou componente de sistema ap\xF3s o sistema ou\
            \ componente ter sido implantado em um local espec\xEDfico (ou seja, ambiente\
            \ operacional). Em certos casos, a manuten\xE7\xE3o em campo (ou seja,\
            \ manuten\xE7\xE3o local no site) pode n\xE3o ser executada com o mesmo\
            \ grau de rigor ou com as mesmas verifica\xE7\xF5es de controle de qualidade\
            \ que a manuten\xE7\xE3o em dep\xF3sito. Para sistemas cr\xEDticos assim\
            \ designados pela organiza\xE7\xE3o, pode ser necess\xE1rio restringir\
            \ ou proibir a manuten\xE7\xE3o em campo no site local e exigir que tal\
            \ manuten\xE7\xE3o seja realizada em instala\xE7\xF5es confi\xE1veis com\
            \ controles adicionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      assessable: false
      depth: 1
      ref_id: MP
      name: Media Protection
      translations:
        pt:
          name: "Prote\xE7\xE3o de M\xEDdia"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] media protection policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the media protection policy
        and the associated media protection controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the media protection policy
        and procedures; and

        c. Review and update the current media protection:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Media protection policy and procedures address the controls in the
        MP family that are implemented within systems and organizations. The risk
        management strategy is an important factor in establishing such policies and
        procedures. Policies and procedures contribute to security and privacy assurance.
        Therefore, it is important that security and privacy programs collaborate
        on the development of media protection policy and procedures. Security and
        privacy program policies and procedures at the organization level are preferable,
        in general, and may obviate the need for mission- or system-specific policies
        and procedures. The policy can be included as part of the general security
        and privacy policy or be represented by multiple policies that reflect the
        complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to media
        protection policy and procedures include assessment or audit findings, security
        incidents or breaches, or changes in applicable laws, executive orders, directives,
        regulations, policies, standards, and guidelines. Simply restating controls
        does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. [Sele\xE7\
            \xE3o (uma ou mais): N\xEDvel organizacional; N\xEDvel de processo de\
            \ miss\xE3o/neg\xF3cio; N\xEDvel de sistema] pol\xEDtica de prote\xE7\xE3\
            o de m\xEDdia que:\n(a) Aborde prop\xF3sito, escopo, pap\xE9is, responsabilidades,\
            \ comprometimento da gest\xE3o, coordena\xE7\xE3o entre entidades organizacionais\
            \ e conformidade; e\n(b) Seja coerente com as leis, ordens executivas,\
            \ diretrizes, regulamentos, pol\xEDticas, normas e orienta\xE7\xF5es aplic\xE1\
            veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3o da pol\xED\
            tica de prote\xE7\xE3o de m\xEDdia e dos controles de prote\xE7\xE3o de\
            \ m\xEDdia associados;\nb. Designar um [Atribui\xE7\xE3o: respons\xE1\
            vel definido pela organiza\xE7\xE3o] para gerenciar o desenvolvimento,\
            \ a documenta\xE7\xE3o e a dissemina\xE7\xE3o da pol\xEDtica e dos procedimentos\
            \ de prote\xE7\xE3o de m\xEDdia; e\nc. Revisar e atualizar a atual prote\xE7\
            \xE3o de m\xEDdia:\n1. Pol\xEDtica [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos\
            \ pela organiza\xE7\xE3o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de prote\xE7\xE3o de m\xED\
            dia abordam os controles na fam\xEDlia MP que s\xE3o implementados dentro\
            \ dos sistemas e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de riscos\
            \ \xE9 um fator importante no estabelecimento de tais pol\xEDticas e procedimentos.\
            \ As pol\xEDticas e procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Portanto, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem no desenvolvimento da pol\xEDtica e dos procedimentos\
            \ de prote\xE7\xE3o de m\xEDdia. As pol\xEDticas e procedimentos dos programas\
            \ de seguran\xE7a e privacidade no n\xEDvel organizacional s\xE3o prefer\xED\
            veis, em geral, e podem eliminar a necessidade de pol\xEDticas e procedimentos\
            \ espec\xEDficos de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xED\
            da como parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser\
            \ representada por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa\
            \ das organiza\xE7\xF5es. Os procedimentos podem ser estabelecidos para\
            \ os programas de seguran\xE7a e privacidade, para os processos de miss\xE3\
            o ou neg\xF3cio e para os sistemas, se necess\xE1rio. Os procedimentos\
            \ descrevem como as pol\xEDticas ou controles s\xE3o implementados e podem\
            \ ser direcionados ao indiv\xEDduo ou fun\xE7\xE3o que \xE9 objeto do\
            \ procedimento. Os procedimentos podem ser documentados nos planos de\
            \ seguran\xE7a e privacidade do sistema ou em um ou mais documentos separados.\
            \ Os eventos que podem precipitar uma atualiza\xE7\xE3o da pol\xEDtica\
            \ e dos procedimentos de prote\xE7\xE3o de m\xEDdia incluem constata\xE7\
            \xF5es de avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\xF5es\
            \ de seguran\xE7a, ou mudan\xE7as nas leis, ordens executivas, diretrizes,\
            \ regulamentos, pol\xEDticas, normas e orienta\xE7\xF5es aplic\xE1veis.\
            \ A simples reafirma\xE7\xE3o dos controles n\xE3o constitui uma pol\xED\
            tica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-2
      name: Media Access
      description: 'Restrict access to [Assignment: organization-defined types of
        digital and/or non-digital media] to [Assignment: organization-defined personnel
        or roles].'
      annotation: System media includes digital and non-digital media. Digital media
        includes flash drives, diskettes, magnetic tapes, external or removable hard
        disk drives (e.g., solid state, magnetic), compact discs, and digital versatile
        discs. Non-digital media includes paper and microfilm. Denying access to patient
        medical records in a community hospital unless the individuals seeking access
        to such records are authorized healthcare providers is an example of restricting
        access to non-digital media. Limiting access to the design specifications
        stored on compact discs in the media library to individuals on the system
        development team is an example of restricting access to digital media.
      translations:
        pt:
          name: "Acesso \xE0 M\xEDdia"
          description: "Restringir o acesso a [Atribui\xE7\xE3o: tipos de m\xEDdia\
            \ digital e/ou n\xE3o digital definidos pela organiza\xE7\xE3o] a [Atribui\xE7\
            \xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "A m\xEDdia do sistema inclui m\xEDdia digital e n\xE3o digital.\
            \ A m\xEDdia digital inclui pen drives, disquetes, fitas magn\xE9ticas,\
            \ discos r\xEDgidos externos ou remov\xEDveis (por exemplo, de estado\
            \ s\xF3lido, magn\xE9ticos), discos compactos e discos vers\xE1teis digitais.\
            \ A m\xEDdia n\xE3o digital inclui papel e microfilme. Negar o acesso\
            \ a prontu\xE1rios m\xE9dicos de pacientes em um hospital comunit\xE1\
            rio, a menos que os indiv\xEDduos que buscam acesso a tais registros sejam\
            \ profissionais de sa\xFAde autorizados, \xE9 um exemplo de restri\xE7\
            \xE3o de acesso a m\xEDdia n\xE3o digital. Limitar o acesso \xE0s especifica\xE7\
            \xF5es de projeto armazenadas em discos compactos na biblioteca de m\xED\
            dia aos indiv\xEDduos da equipe de desenvolvimento do sistema \xE9 um\
            \ exemplo de restri\xE7\xE3o de acesso a m\xEDdia digital."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-2(1)
      name: Media Access | Automated Restricted Access
      description: '[Withdrawn: Incorporated into MP-4(2).]'
      translations:
        pt:
          name: "Acesso \xE0 M\xEDdia | Acesso Restrito Automatizado"
          description: '[Retirado: Incorporado a MP-4(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-2(2)
      name: Media Access | Cryptographic Protection
      description: '[Withdrawn: Incorporated into SC-28(1).]'
      translations:
        pt:
          name: "Acesso \xE0 M\xEDdia | Prote\xE7\xE3o Criptogr\xE1fica"
          description: '[Retirado: Incorporado a SC-28(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-3
      name: Media Marking
      description: 'a. Mark system media indicating the distribution limitations,
        handling caveats, and applicable security markings (if any) of the information;
        and

        b. Exempt [Assignment: organization-defined types of system media] from marking
        if the media remain within [Assignment: organization-defined controlled areas].'
      annotation: Security marking refers to the application or use of human-readable
        security attributes. Digital media includes diskettes, magnetic tapes, external
        or removable hard disk drives (e.g., solid state, magnetic), flash drives,
        compact discs, and digital versatile discs. Non-digital media includes paper
        and microfilm. Controlled unclassified information is defined by the National
        Archives and Records Administration along with the appropriate safeguarding
        and dissemination requirements for such information and is codified in 32
        CFR 2002. Security markings are generally not required for media that contains
        information determined by organizations to be in the public domain or to be
        publicly releasable. Some organizations may require markings for public information
        indicating that the information is publicly releasable. System media marking
        reflects applicable laws, executive orders, directives, policies, regulations,
        standards, and guidelines.
      translations:
        pt:
          name: "Marca\xE7\xE3o de M\xEDdia"
          description: "a. Marcar a m\xEDdia do sistema indicando as limita\xE7\xF5\
            es de distribui\xE7\xE3o, advert\xEAncias de manuseio e marca\xE7\xF5\
            es de seguran\xE7a aplic\xE1veis (se houver) da informa\xE7\xE3o; e\n\
            b. Isentar [Atribui\xE7\xE3o: tipos de m\xEDdia do sistema definidos pela\
            \ organiza\xE7\xE3o] da marca\xE7\xE3o se a m\xEDdia permanecer dentro\
            \ de [Atribui\xE7\xE3o: \xE1reas controladas definidas pela organiza\xE7\
            \xE3o]."
          annotation: "A marca\xE7\xE3o de seguran\xE7a refere-se \xE0 aplica\xE7\xE3\
            o ou ao uso de atributos de seguran\xE7a leg\xEDveis por humanos. A m\xED\
            dia digital inclui disquetes, fitas magn\xE9ticas, discos r\xEDgidos externos\
            \ ou remov\xEDveis (por exemplo, de estado s\xF3lido, magn\xE9ticos),\
            \ pen drives, discos compactos e discos vers\xE1teis digitais. A m\xED\
            dia n\xE3o digital inclui papel e microfilme. As informa\xE7\xF5es controladas\
            \ n\xE3o classificadas s\xE3o definidas pela National Archives and Records\
            \ Administration juntamente com os requisitos apropriados de salvaguarda\
            \ e dissemina\xE7\xE3o para tais informa\xE7\xF5es e est\xE3o codificadas\
            \ em 32 CFR 2002. As marca\xE7\xF5es de seguran\xE7a geralmente n\xE3\
            o s\xE3o exigidas para m\xEDdia que cont\xE9m informa\xE7\xF5es determinadas\
            \ pelas organiza\xE7\xF5es como sendo de dom\xEDnio p\xFAblico ou pass\xED\
            veis de divulga\xE7\xE3o p\xFAblica. Algumas organiza\xE7\xF5es podem\
            \ exigir marca\xE7\xF5es para informa\xE7\xF5es p\xFAblicas indicando\
            \ que a informa\xE7\xE3o \xE9 pass\xEDvel de divulga\xE7\xE3o p\xFAblica.\
            \ A marca\xE7\xE3o da m\xEDdia do sistema reflete as leis, ordens executivas,\
            \ diretrizes, pol\xEDticas, regulamentos, normas e orienta\xE7\xF5es aplic\xE1\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-4
      name: Media Storage
      description: 'a. Physically control and securely store [Assignment: organization-defined
        types of digital and/or non-digital media] within [Assignment: organization-defined
        controlled areas]; and

        b. Protect system media types defined in MP-4a until the media are destroyed
        or sanitized using approved equipment, techniques, and procedures.'
      annotation: System media includes digital and non-digital media. Digital media
        includes flash drives, diskettes, magnetic tapes, external or removable hard
        disk drives (e.g., solid state, magnetic), compact discs, and digital versatile
        discs. Non-digital media includes paper and microfilm. Physically controlling
        stored media includes conducting inventories, ensuring procedures are in place
        to allow individuals to check out and return media to the library, and maintaining
        accountability for stored media. Secure storage includes a locked drawer,
        desk, or cabinet or a controlled media library. The type of media storage
        is commensurate with the security category or classification of the information
        on the media. Controlled areas are spaces that provide physical and procedural
        controls to meet the requirements established for protecting information and
        systems. Fewer controls may be needed for media that contains information
        determined to be in the public domain, publicly releasable, or have limited
        adverse impacts on organizations, operations, or individuals if accessed by
        other than authorized personnel. In these situations, physical access controls
        provide adequate protection.
      translations:
        pt:
          name: "Armazenamento de M\xEDdia"
          description: "a. Controlar fisicamente e armazenar com seguran\xE7a [Atribui\xE7\
            \xE3o: tipos de m\xEDdia digital e/ou n\xE3o digital definidos pela organiza\xE7\
            \xE3o] dentro de [Atribui\xE7\xE3o: \xE1reas controladas definidas pela\
            \ organiza\xE7\xE3o]; e\nb. Proteger os tipos de m\xEDdia do sistema definidos\
            \ em MP-4a at\xE9 que a m\xEDdia seja destru\xEDda ou sanitizada utilizando\
            \ equipamentos, t\xE9cnicas e procedimentos aprovados."
          annotation: "A m\xEDdia do sistema inclui m\xEDdia digital e n\xE3o digital.\
            \ A m\xEDdia digital inclui pen drives, disquetes, fitas magn\xE9ticas,\
            \ discos r\xEDgidos externos ou remov\xEDveis (por exemplo, de estado\
            \ s\xF3lido, magn\xE9ticos), discos compactos e discos vers\xE1teis digitais.\
            \ A m\xEDdia n\xE3o digital inclui papel e microfilme. O controle f\xED\
            sico da m\xEDdia armazenada inclui a realiza\xE7\xE3o de invent\xE1rios,\
            \ a garantia de que existam procedimentos para permitir que os indiv\xED\
            duos retirem e devolvam a m\xEDdia \xE0 biblioteca e a manuten\xE7\xE3\
            o da responsabiliza\xE7\xE3o pela m\xEDdia armazenada. O armazenamento\
            \ seguro inclui uma gaveta, mesa ou arm\xE1rio trancado ou uma biblioteca\
            \ de m\xEDdia controlada. O tipo de armazenamento de m\xEDdia \xE9 proporcional\
            \ \xE0 categoria de seguran\xE7a ou classifica\xE7\xE3o da informa\xE7\
            \xE3o na m\xEDdia. As \xE1reas controladas s\xE3o espa\xE7os que prov\xEA\
            m controles f\xEDsicos e procedimentais para atender aos requisitos estabelecidos\
            \ para a prote\xE7\xE3o de informa\xE7\xF5es e sistemas. Menos controles\
            \ podem ser necess\xE1rios para m\xEDdia que cont\xE9m informa\xE7\xF5\
            es determinadas como sendo de dom\xEDnio p\xFAblico, pass\xEDveis de divulga\xE7\
            \xE3o p\xFAblica ou que tenham impactos adversos limitados sobre as organiza\xE7\
            \xF5es, opera\xE7\xF5es ou indiv\xEDduos se acessadas por pessoas n\xE3\
            o autorizadas. Nessas situa\xE7\xF5es, os controles de acesso f\xEDsico\
            \ prov\xEAm prote\xE7\xE3o adequada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-4(1)
      name: Media Storage | Cryptographic Protection
      description: '[Withdrawn: Incorporated into SC-28(1).]'
      translations:
        pt:
          name: "Armazenamento de M\xEDdia | Prote\xE7\xE3o Criptogr\xE1fica"
          description: '[Retirado: Incorporado a SC-28(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-4(2)
      name: Media Storage | Automated Restricted Access
      description: 'Restrict access to media storage areas and log access attempts
        and access granted using [Assignment: organization-defined automated mechanisms].'
      annotation: Automated mechanisms include keypads, biometric readers, or card
        readers on the external entries to media storage areas.
      translations:
        pt:
          name: "Armazenamento de M\xEDdia | Acesso Restrito Automatizado"
          description: "Restringir o acesso \xE0s \xE1reas de armazenamento de m\xED\
            dia e registrar as tentativas de acesso e os acessos concedidos utilizando\
            \ [Atribui\xE7\xE3o: mecanismos automatizados definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Os mecanismos automatizados incluem teclados num\xE9ricos,\
            \ leitores biom\xE9tricos ou leitores de cart\xE3o nas entradas externas\
            \ das \xE1reas de armazenamento de m\xEDdia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-5
      name: Media Transport
      description: 'a. Protect and control [Assignment: organization-defined types
        of system media] during transport outside of controlled areas using [Assignment:
        organization-defined controls];

        b. Maintain accountability for system media during transport outside of controlled
        areas;

        c. Document activities associated with the transport of system media; and

        d. Restrict the activities associated with the transport of system media to
        authorized personnel.'
      annotation: System media includes digital and non-digital media. Digital media
        includes flash drives, diskettes, magnetic tapes, external or removable hard
        disk drives (e.g., solid state and  magnetic), compact discs, and digital
        versatile discs. Non-digital media includes microfilm and paper. Controlled
        areas are spaces for which organizations provide physical or procedural controls
        to meet requirements established for protecting information and systems. Controls
        to protect media during transport include cryptography and locked containers.
        Cryptographic mechanisms can provide confidentiality and integrity protections
        depending on the mechanisms implemented. Activities associated with media
        transport include releasing media for transport, ensuring that media enters
        the appropriate transport processes, and the actual transport. Authorized
        transport and courier personnel may include individuals external to the organization.
        Maintaining accountability of media during transport includes restricting
        transport activities to authorized personnel and tracking and/or obtaining
        records of transport activities as the media moves through the transportation
        system to prevent and detect loss, destruction, or tampering. Organizations
        establish documentation requirements for activities associated with the transport
        of system media in accordance with organizational assessments of risk. Organizations
        maintain the flexibility to define record-keeping methods for the different
        types of media transport as part of a system of transport-related records.
      translations:
        pt:
          name: "Transporte de M\xEDdia"
          description: "a. Proteger e controlar [Atribui\xE7\xE3o: tipos de m\xED\
            dia de sistema definidos pela organiza\xE7\xE3o] durante o transporte\
            \ fora de \xE1reas controladas usando [Atribui\xE7\xE3o: controles definidos\
            \ pela organiza\xE7\xE3o];\nb. Manter a responsabiliza\xE7\xE3o pela m\xED\
            dia de sistema durante o transporte fora de \xE1reas controladas;\nc.\
            \ Documentar as atividades associadas ao transporte de m\xEDdia de sistema;\
            \ e\nd. Restringir as atividades associadas ao transporte de m\xEDdia\
            \ de sistema a pessoal autorizado."
          annotation: "A m\xEDdia de sistema inclui m\xEDdia digital e n\xE3o digital.\
            \ A m\xEDdia digital inclui pen drives, disquetes, fitas magn\xE9ticas,\
            \ discos r\xEDgidos externos ou remov\xEDveis (por exemplo, de estado\
            \ s\xF3lido e magn\xE9ticos), discos compactos e discos vers\xE1teis digitais.\
            \ A m\xEDdia n\xE3o digital inclui microfilme e papel. \xC1reas controladas\
            \ s\xE3o espa\xE7os para os quais as organiza\xE7\xF5es fornecem controles\
            \ f\xEDsicos ou procedimentais para atender aos requisitos estabelecidos\
            \ para a prote\xE7\xE3o de informa\xE7\xF5es e sistemas. Os controles\
            \ para proteger a m\xEDdia durante o transporte incluem criptografia e\
            \ cont\xEAineres trancados. Os mecanismos criptogr\xE1ficos podem fornecer\
            \ prote\xE7\xF5es de confidencialidade e integridade dependendo dos mecanismos\
            \ implementados. As atividades associadas ao transporte de m\xEDdia incluem\
            \ a libera\xE7\xE3o da m\xEDdia para transporte, a garantia de que a m\xED\
            dia entra nos processos de transporte apropriados e o transporte propriamente\
            \ dito. O pessoal autorizado de transporte e mensageria pode incluir indiv\xED\
            duos externos \xE0 organiza\xE7\xE3o. Manter a responsabiliza\xE7\xE3\
            o pela m\xEDdia durante o transporte inclui restringir as atividades de\
            \ transporte a pessoal autorizado e rastrear e/ou obter registros das\
            \ atividades de transporte \xE0 medida que a m\xEDdia se move pelo sistema\
            \ de transporte, a fim de prevenir e detectar perda, destrui\xE7\xE3o\
            \ ou adultera\xE7\xE3o. As organiza\xE7\xF5es estabelecem requisitos de\
            \ documenta\xE7\xE3o para as atividades associadas ao transporte de m\xED\
            dia de sistema de acordo com as avalia\xE7\xF5es organizacionais de risco.\
            \ As organiza\xE7\xF5es mant\xEAm a flexibilidade de definir m\xE9todos\
            \ de manuten\xE7\xE3o de registros para os diferentes tipos de transporte\
            \ de m\xEDdia como parte de um sistema de registros relacionados ao transporte."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-5(1)
      name: Media Transport | Protection Outside of Controlled Areas
      description: '[Withdrawn: Incorporated into MP-5.]'
      translations:
        pt:
          name: "Transporte de M\xEDdia | Prote\xE7\xE3o Fora de \xC1reas Controladas"
          description: '[Retirado: Incorporado em MP-5.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-5(2)
      name: Media Transport | Documentation of Activities
      description: '[Withdrawn: Incorporated into MP-5.]'
      translations:
        pt:
          name: "Transporte de M\xEDdia | Documenta\xE7\xE3o de Atividades"
          description: '[Retirado: Incorporado em MP-5.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-5(3)
      name: Media Transport | Custodians
      description: Employ an identified custodian during transport of system media
        outside of controlled areas.
      annotation: Identified custodians provide organizations with specific points
        of contact during the media transport process and facilitate individual accountability.
        Custodial responsibilities can be transferred from one individual to another
        if an unambiguous custodian is identified.
      translations:
        pt:
          name: "Transporte de M\xEDdia | Custodiantes"
          description: "Empregar um custodiante identificado durante o transporte\
            \ de m\xEDdia de sistema fora de \xE1reas controladas."
          annotation: "Custodiantes identificados fornecem \xE0s organiza\xE7\xF5\
            es pontos de contato espec\xEDficos durante o processo de transporte de\
            \ m\xEDdia e facilitam a responsabiliza\xE7\xE3o individual. As responsabilidades\
            \ de cust\xF3dia podem ser transferidas de um indiv\xEDduo para outro\
            \ se um custodiante inequ\xEDvoco for identificado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-5(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-5(4)
      name: Media Transport | Cryptographic Protection
      description: '[Withdrawn: Incorporated into SC-28(1).]'
      translations:
        pt:
          name: "Transporte de M\xEDdia | Prote\xE7\xE3o Criptogr\xE1fica"
          description: '[Retirado: Incorporado em SC-28(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6
      name: Media Sanitization
      description: 'a. Sanitize [Assignment: organization-defined system media] prior
        to disposal, release out of organizational control, or release for reuse using
        [Assignment: organization-defined sanitization techniques and procedures];
        and

        b. Employ sanitization mechanisms with the strength and integrity commensurate
        with the security category or classification of the information.'
      annotation: "Media sanitization applies to all digital and non-digital system\
        \ media subject to disposal or reuse, whether or not the media is considered\
        \ removable. Examples include digital media in scanners, copiers, printers,\
        \ notebook computers, workstations, network components, mobile devices, and\
        \ non-digital media (e.g., paper and microfilm). The sanitization process\
        \ removes information from system media such that the information cannot be\
        \ retrieved or reconstructed. Sanitization techniques\u2014including clearing,\
        \ purging, cryptographic erase, de-identification of personally identifiable\
        \ information, and destruction\u2014prevent the disclosure of information\
        \ to unauthorized individuals when such media is reused or released for disposal.\
        \ Organizations determine the appropriate sanitization methods, recognizing\
        \ that destruction is sometimes necessary when other methods cannot be applied\
        \ to media requiring sanitization. Organizations use discretion on the employment\
        \ of approved sanitization techniques and procedures for media that contains\
        \ information deemed to be in the public domain or publicly releasable or\
        \ information deemed to have no adverse impact on organizations or individuals\
        \ if released for reuse or disposal. Sanitization of non-digital media includes\
        \ destruction, removing a classified appendix from an otherwise unclassified\
        \ document, or redacting selected sections or words from a document by obscuring\
        \ the redacted sections or words in a manner equivalent in effectiveness to\
        \ removing them from the document. NSA standards and policies control the\
        \ sanitization process for media that contains classified information. NARA\
        \ policies control the sanitization process for controlled unclassified information."
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia"
          description: "a. Sanitizar [Atribui\xE7\xE3o: m\xEDdia de sistema definida\
            \ pela organiza\xE7\xE3o] antes do descarte, da libera\xE7\xE3o do controle\
            \ organizacional ou da libera\xE7\xE3o para reutiliza\xE7\xE3o usando\
            \ [Atribui\xE7\xE3o: t\xE9cnicas e procedimentos de sanitiza\xE7\xE3o\
            \ definidos pela organiza\xE7\xE3o]; e\nb. Empregar mecanismos de sanitiza\xE7\
            \xE3o com for\xE7a e integridade compat\xEDveis com a categoria de seguran\xE7\
            a ou classifica\xE7\xE3o da informa\xE7\xE3o."
          annotation: "A sanitiza\xE7\xE3o de m\xEDdia se aplica a toda m\xEDdia de\
            \ sistema digital e n\xE3o digital sujeita a descarte ou reutiliza\xE7\
            \xE3o, seja a m\xEDdia considerada remov\xEDvel ou n\xE3o. Exemplos incluem\
            \ m\xEDdia digital em scanners, copiadoras, impressoras, notebooks, esta\xE7\
            \xF5es de trabalho, componentes de rede, dispositivos m\xF3veis e m\xED\
            dia n\xE3o digital (por exemplo, papel e microfilme). O processo de sanitiza\xE7\
            \xE3o remove as informa\xE7\xF5es da m\xEDdia de sistema de modo que as\
            \ informa\xE7\xF5es n\xE3o possam ser recuperadas ou reconstru\xEDdas.\
            \ As t\xE9cnicas de sanitiza\xE7\xE3o \u2014 incluindo limpeza (clearing),\
            \ expurgo (purging), apagamento criptogr\xE1fico, desidentifica\xE7\xE3\
            o de informa\xE7\xF5es de identifica\xE7\xE3o pessoal e destrui\xE7\xE3\
            o \u2014 evitam a divulga\xE7\xE3o de informa\xE7\xF5es a indiv\xEDduos\
            \ n\xE3o autorizados quando essa m\xEDdia \xE9 reutilizada ou liberada\
            \ para descarte. As organiza\xE7\xF5es determinam os m\xE9todos de sanitiza\xE7\
            \xE3o apropriados, reconhecendo que a destrui\xE7\xE3o \xE9, por vezes,\
            \ necess\xE1ria quando outros m\xE9todos n\xE3o podem ser aplicados \xE0\
            \ m\xEDdia que requer sanitiza\xE7\xE3o. As organiza\xE7\xF5es usam discernimento\
            \ no emprego de t\xE9cnicas e procedimentos de sanitiza\xE7\xE3o aprovados\
            \ para m\xEDdia que contenha informa\xE7\xF5es consideradas de dom\xED\
            nio p\xFAblico ou de divulga\xE7\xE3o p\xFAblica, ou informa\xE7\xF5es\
            \ consideradas sem impacto adverso sobre organiza\xE7\xF5es ou indiv\xED\
            duos se liberadas para reutiliza\xE7\xE3o ou descarte. A sanitiza\xE7\xE3\
            o de m\xEDdia n\xE3o digital inclui a destrui\xE7\xE3o, a remo\xE7\xE3\
            o de um ap\xEAndice classificado de um documento de outro modo n\xE3o\
            \ classificado, ou a tarja (reda\xE7\xE3o) de se\xE7\xF5es ou palavras\
            \ selecionadas de um documento, obscurecendo as se\xE7\xF5es ou palavras\
            \ tarjadas de maneira equivalente em efic\xE1cia \xE0 sua remo\xE7\xE3\
            o do documento. Normas e pol\xEDticas da NSA controlam o processo de sanitiza\xE7\
            \xE3o de m\xEDdia que contenha informa\xE7\xF5es classificadas. Pol\xED\
            ticas da NARA controlam o processo de sanitiza\xE7\xE3o de informa\xE7\
            \xF5es n\xE3o classificadas controladas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(1)
      name: Media Sanitization | Review, Approve, Track, Document, and Verify
      description: Review, approve, track, document, and verify media sanitization
        and disposal actions.
      annotation: Organizations review and approve media to be sanitized to ensure
        compliance with records retention policies. Tracking and documenting actions
        include listing personnel who reviewed and approved sanitization and disposal
        actions, types of media sanitized, files stored on the media, sanitization
        methods used, date and time of the sanitization actions, personnel who performed
        the sanitization, verification actions taken and personnel who performed the
        verification, and the disposal actions taken. Organizations verify that the
        sanitization of the media was effective prior to disposal.
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Revisar, Aprovar, Rastrear, Documentar\
            \ e Verificar"
          description: "Revisar, aprovar, rastrear, documentar e verificar as a\xE7\
            \xF5es de sanitiza\xE7\xE3o e descarte de m\xEDdia."
          annotation: "As organiza\xE7\xF5es revisam e aprovam a m\xEDdia a ser sanitizada\
            \ para garantir a conformidade com as pol\xEDticas de reten\xE7\xE3o de\
            \ registros. O rastreamento e a documenta\xE7\xE3o das a\xE7\xF5es incluem\
            \ a listagem do pessoal que revisou e aprovou as a\xE7\xF5es de sanitiza\xE7\
            \xE3o e descarte, os tipos de m\xEDdia sanitizada, os arquivos armazenados\
            \ na m\xEDdia, os m\xE9todos de sanitiza\xE7\xE3o utilizados, a data e\
            \ hora das a\xE7\xF5es de sanitiza\xE7\xE3o, o pessoal que executou a\
            \ sanitiza\xE7\xE3o, as a\xE7\xF5es de verifica\xE7\xE3o realizadas e\
            \ o pessoal que executou a verifica\xE7\xE3o, e as a\xE7\xF5es de descarte\
            \ realizadas. As organiza\xE7\xF5es verificam se a sanitiza\xE7\xE3o da\
            \ m\xEDdia foi eficaz antes do descarte."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(2)
      name: Media Sanitization | Equipment Testing
      description: 'Test sanitization equipment and procedures [Assignment: organization-defined
        frequency] to ensure that the intended sanitization is being achieved.'
      annotation: Testing of sanitization equipment and procedures may be conducted
        by qualified and authorized external entities, including federal agencies
        or external service providers.
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Testes de Equipamentos"
          description: "Testar os equipamentos e procedimentos de sanitiza\xE7\xE3\
            o [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] para\
            \ garantir que a sanitiza\xE7\xE3o pretendida est\xE1 sendo alcan\xE7\
            ada."
          annotation: "Os testes dos equipamentos e procedimentos de sanitiza\xE7\xE3\
            o podem ser conduzidos por entidades externas qualificadas e autorizadas,\
            \ incluindo ag\xEAncias federais ou provedores de servi\xE7os externos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(3)
      name: Media Sanitization | Nondestructive Techniques
      description: 'Apply nondestructive sanitization techniques to portable storage
        devices prior to connecting such devices to the system under the following
        circumstances: [Assignment: organization-defined circumstances requiring sanitization
        of portable storage devices].'
      annotation: Portable storage devices include external or removable hard disk
        drives (e.g., solid state, magnetic), optical discs, magnetic or optical tapes,
        flash memory devices, flash memory cards, and other external or removable
        disks. Portable storage devices can be obtained from untrustworthy sources
        and contain malicious code that can be inserted into or transferred to organizational
        systems through USB ports or other entry portals. While scanning storage devices
        is recommended, sanitization provides additional assurance that such devices
        are free of malicious code. Organizations consider nondestructive sanitization
        of portable storage devices when the devices are purchased from manufacturers
        or vendors prior to initial use or when organizations cannot maintain a positive
        chain of custody for the devices.
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | T\xE9cnicas N\xE3o Destrutivas"
          description: "Aplicar t\xE9cnicas de sanitiza\xE7\xE3o n\xE3o destrutivas\
            \ a dispositivos de armazenamento port\xE1teis antes de conectar esses\
            \ dispositivos ao sistema sob as seguintes circunst\xE2ncias: [Atribui\xE7\
            \xE3o: circunst\xE2ncias definidas pela organiza\xE7\xE3o que exijam a\
            \ sanitiza\xE7\xE3o de dispositivos de armazenamento port\xE1teis]."
          annotation: "Os dispositivos de armazenamento port\xE1teis incluem discos\
            \ r\xEDgidos externos ou remov\xEDveis (por exemplo, de estado s\xF3lido,\
            \ magn\xE9ticos), discos \xF3pticos, fitas magn\xE9ticas ou \xF3pticas,\
            \ dispositivos de mem\xF3ria flash, cart\xF5es de mem\xF3ria flash e outros\
            \ discos externos ou remov\xEDveis. Dispositivos de armazenamento port\xE1\
            teis podem ser obtidos de fontes n\xE3o confi\xE1veis e conter c\xF3digo\
            \ malicioso que pode ser inserido ou transferido para os sistemas organizacionais\
            \ por meio de portas USB ou outros portais de entrada. Embora a verifica\xE7\
            \xE3o (scan) dos dispositivos de armazenamento seja recomendada, a sanitiza\xE7\
            \xE3o fornece garantia adicional de que tais dispositivos est\xE3o livres\
            \ de c\xF3digo malicioso. As organiza\xE7\xF5es consideram a sanitiza\xE7\
            \xE3o n\xE3o destrutiva de dispositivos de armazenamento port\xE1teis\
            \ quando os dispositivos s\xE3o adquiridos de fabricantes ou fornecedores\
            \ antes do uso inicial ou quando as organiza\xE7\xF5es n\xE3o conseguem\
            \ manter uma cadeia de cust\xF3dia positiva dos dispositivos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(4)
      name: Media Sanitization | Controlled Unclassified Information
      description: '[Withdrawn: Incorporated into MP-6.]'
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Informa\xE7\xF5es N\xE3o Classificadas\
            \ Controladas"
          description: '[Retirado: Incorporado em MP-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(5)
      name: Media Sanitization | Classified Information
      description: '[Withdrawn: Incorporated into MP-6.]'
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Informa\xE7\xF5es Classificadas"
          description: '[Retirado: Incorporado em MP-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(6)
      name: Media Sanitization | Media Destruction
      description: '[Withdrawn: Incorporated into MP-6.]'
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Destrui\xE7\xE3o de M\xEDdia"
          description: '[Retirado: Incorporado em MP-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(7)
      name: Media Sanitization | Dual Authorization
      description: 'Enforce dual authorization for the sanitization of [Assignment:
        organization-defined system media].'
      annotation: Organizations employ dual authorization to help ensure that system
        media sanitization cannot occur unless two technically qualified individuals
        conduct the designated task. Individuals who sanitize system media possess
        sufficient skills and expertise to determine if the proposed sanitization
        reflects applicable federal and organizational standards, policies, and procedures.
        Dual authorization also helps to ensure that sanitization occurs as intended,
        protecting against errors and false claims of having performed the sanitization
        actions. Dual authorization may also be known as two-person control. To reduce
        the risk of collusion, organizations consider rotating dual authorization
        duties to other individuals.
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Autoriza\xE7\xE3o Dupla"
          description: "Aplicar autoriza\xE7\xE3o dupla para a sanitiza\xE7\xE3o de\
            \ [Atribui\xE7\xE3o: m\xEDdia de sistema definida pela organiza\xE7\xE3\
            o]."
          annotation: "As organiza\xE7\xF5es empregam autoriza\xE7\xE3o dupla para\
            \ ajudar a garantir que a sanitiza\xE7\xE3o de m\xEDdia de sistema n\xE3\
            o possa ocorrer a menos que dois indiv\xEDduos tecnicamente qualificados\
            \ conduzam a tarefa designada. Os indiv\xEDduos que sanitizam a m\xED\
            dia de sistema possuem habilidades e compet\xEAncias suficientes para\
            \ determinar se a sanitiza\xE7\xE3o proposta reflete as normas, pol\xED\
            ticas e procedimentos federais e organizacionais aplic\xE1veis. A autoriza\xE7\
            \xE3o dupla tamb\xE9m ajuda a garantir que a sanitiza\xE7\xE3o ocorra\
            \ conforme pretendido, protegendo contra erros e falsas alega\xE7\xF5\
            es de ter realizado as a\xE7\xF5es de sanitiza\xE7\xE3o. A autoriza\xE7\
            \xE3o dupla tamb\xE9m pode ser conhecida como controle por duas pessoas.\
            \ Para reduzir o risco de conluio, as organiza\xE7\xF5es consideram fazer\
            \ rod\xEDzio das atribui\xE7\xF5es de autoriza\xE7\xE3o dupla para outros\
            \ indiv\xEDduos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-6(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-6(8)
      name: Media Sanitization | Remote Purging or Wiping of Information
      description: 'Provide the capability to purge or wipe information from [Assignment:
        organization-defined systems or system components] [Selection: remotely; under
        the following conditions: [Assignment: organization-defined conditions]].'
      annotation: Remote purging or wiping of information protects information on
        organizational systems and system components if systems or components are
        obtained by unauthorized individuals. Remote purge or wipe commands require
        strong authentication to help mitigate the risk of unauthorized individuals
        purging or wiping the system, component, or device. The purge or wipe function
        can be implemented in a variety of ways, including by overwriting data or
        information multiple times or by destroying the key necessary to decrypt encrypted
        data.
      translations:
        pt:
          name: "Sanitiza\xE7\xE3o de M\xEDdia | Expurgo ou Limpeza Remota de Informa\xE7\
            \xF5es"
          description: "Fornecer a capacidade de expurgar (purge) ou limpar (wipe)\
            \ informa\xE7\xF5es de [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o] [Sele\xE7\xE3o: remotamente; sob as\
            \ seguintes condi\xE7\xF5es: [Atribui\xE7\xE3o: condi\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o]]."
          annotation: "O expurgo ou a limpeza remota de informa\xE7\xF5es protege\
            \ as informa\xE7\xF5es nos sistemas e componentes de sistema organizacionais\
            \ caso os sistemas ou componentes sejam obtidos por indiv\xEDduos n\xE3\
            o autorizados. Os comandos de expurgo ou limpeza remota exigem autentica\xE7\
            \xE3o forte para ajudar a mitigar o risco de indiv\xEDduos n\xE3o autorizados\
            \ expurgarem ou limparem o sistema, componente ou dispositivo. A fun\xE7\
            \xE3o de expurgo ou limpeza pode ser implementada de diversas maneiras,\
            \ inclusive sobrescrevendo dados ou informa\xE7\xF5es v\xE1rias vezes\
            \ ou destruindo a chave necess\xE1ria para descriptografar dados criptografados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-7
      name: Media Use
      description: 'a. [Selection: Restrict; Prohibit] the use of [Assignment: organization-defined
        types of system media] on [Assignment: organization-defined systems or system
        components] using [Assignment: organization-defined controls]; and

        b. Prohibit the use of portable storage devices in organizational systems
        when such devices have no identifiable owner.'
      annotation: System media includes both digital and non-digital media. Digital
        media includes diskettes, magnetic tapes, flash drives, compact discs, digital
        versatile discs, and removable hard disk drives. Non-digital media includes
        paper and microfilm. Media use protections also apply to mobile devices with
        information storage capabilities. In contrast to MP-2, which restricts user
        access to media, MP-7 restricts the use of certain types of media on systems,
        for example, restricting or prohibiting the use of flash drives or external
        hard disk drives. Organizations use technical and nontechnical controls to
        restrict the use of system media. Organizations may restrict the use of portable
        storage devices, for example, by using physical cages on workstations to prohibit
        access to certain external ports or disabling or removing the ability to insert,
        read, or write to such devices. Organizations may also limit the use of portable
        storage devices to only approved devices, including devices provided by the
        organization, devices provided by other approved organizations, and devices
        that are not personally owned. Finally, organizations may restrict the use
        of portable storage devices based on the type of device, such as by prohibiting
        the use of writeable, portable storage devices and implementing this restriction
        by disabling or removing the capability to write to such devices. Requiring
        identifiable owners for storage devices reduces the risk of using such devices
        by allowing organizations to assign responsibility for addressing known vulnerabilities
        in the devices.
      translations:
        pt:
          name: "Uso de M\xEDdia"
          description: "a. [Sele\xE7\xE3o: Restringir; Proibir] o uso de [Atribui\xE7\
            \xE3o: tipos de m\xEDdia de sistema definidos pela organiza\xE7\xE3o]\
            \ em [Atribui\xE7\xE3o: sistemas ou componentes de sistema definidos pela\
            \ organiza\xE7\xE3o] usando [Atribui\xE7\xE3o: controles definidos pela\
            \ organiza\xE7\xE3o]; e\nb. Proibir o uso de dispositivos de armazenamento\
            \ port\xE1teis em sistemas organizacionais quando tais dispositivos n\xE3\
            o tiverem propriet\xE1rio identific\xE1vel."
          annotation: "A m\xEDdia de sistema inclui tanto m\xEDdia digital quanto\
            \ n\xE3o digital. A m\xEDdia digital inclui disquetes, fitas magn\xE9\
            ticas, pen drives, discos compactos, discos vers\xE1teis digitais e discos\
            \ r\xEDgidos remov\xEDveis. A m\xEDdia n\xE3o digital inclui papel e microfilme.\
            \ As prote\xE7\xF5es de uso de m\xEDdia tamb\xE9m se aplicam a dispositivos\
            \ m\xF3veis com capacidade de armazenamento de informa\xE7\xF5es. Em contraste\
            \ com o MP-2, que restringe o acesso do usu\xE1rio \xE0 m\xEDdia, o MP-7\
            \ restringe o uso de certos tipos de m\xEDdia nos sistemas, por exemplo,\
            \ restringindo ou proibindo o uso de pen drives ou discos r\xEDgidos externos.\
            \ As organiza\xE7\xF5es usam controles t\xE9cnicos e n\xE3o t\xE9cnicos\
            \ para restringir o uso de m\xEDdia de sistema. As organiza\xE7\xF5es\
            \ podem restringir o uso de dispositivos de armazenamento port\xE1teis,\
            \ por exemplo, usando gaiolas f\xEDsicas nas esta\xE7\xF5es de trabalho\
            \ para impedir o acesso a determinadas portas externas ou desabilitando\
            \ ou removendo a capacidade de inserir, ler ou gravar em tais dispositivos.\
            \ As organiza\xE7\xF5es tamb\xE9m podem limitar o uso de dispositivos\
            \ de armazenamento port\xE1teis apenas a dispositivos aprovados, incluindo\
            \ dispositivos fornecidos pela organiza\xE7\xE3o, dispositivos fornecidos\
            \ por outras organiza\xE7\xF5es aprovadas e dispositivos que n\xE3o sejam\
            \ de propriedade pessoal. Por fim, as organiza\xE7\xF5es podem restringir\
            \ o uso de dispositivos de armazenamento port\xE1teis com base no tipo\
            \ de dispositivo, como proibir o uso de dispositivos de armazenamento\
            \ port\xE1teis grav\xE1veis e implementar essa restri\xE7\xE3o desabilitando\
            \ ou removendo a capacidade de gravar em tais dispositivos. Exigir propriet\xE1\
            rios identific\xE1veis para os dispositivos de armazenamento reduz o risco\
            \ de uso de tais dispositivos ao permitir que as organiza\xE7\xF5es atribuam\
            \ responsabilidade pelo tratamento de vulnerabilidades conhecidas nos\
            \ dispositivos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-7(1)
      name: Media Use | Prohibit Use Without Owner
      description: '[Withdrawn: Incorporated into MP-7.]'
      translations:
        pt:
          name: "Uso de M\xEDdia | Proibir Uso Sem Propriet\xE1rio"
          description: '[Retirado: Incorporado em MP-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-7(2)
      name: Media Use | Prohibit Use of Sanitization-resistant Media
      description: Prohibit the use of sanitization-resistant media in organizational
        systems.
      annotation: Sanitization resistance refers to how resistant media are to non-destructive
        sanitization techniques with respect to the capability to purge information
        from media. Certain types of media do not support sanitization commands, or
        if supported, the interfaces are not supported in a standardized way across
        these devices. Sanitization-resistant media includes compact flash, embedded
        flash on boards and devices, solid state drives, and USB removable media.
      translations:
        pt:
          name: "Uso de M\xEDdia | Proibir Uso de M\xEDdia Resistente \xE0 Sanitiza\xE7\
            \xE3o"
          description: "Proibir o uso de m\xEDdia resistente \xE0 sanitiza\xE7\xE3\
            o em sistemas organizacionais."
          annotation: "A resist\xEAncia \xE0 sanitiza\xE7\xE3o refere-se a qu\xE3\
            o resistentes as m\xEDdias s\xE3o \xE0s t\xE9cnicas de sanitiza\xE7\xE3\
            o n\xE3o destrutivas no que diz respeito \xE0 capacidade de expurgar informa\xE7\
            \xF5es da m\xEDdia. Certos tipos de m\xEDdia n\xE3o suportam comandos\
            \ de sanitiza\xE7\xE3o ou, se suportam, as interfaces n\xE3o s\xE3o suportadas\
            \ de maneira padronizada entre esses dispositivos. A m\xEDdia resistente\
            \ \xE0 sanitiza\xE7\xE3o inclui compact flash, flash embarcada em placas\
            \ e dispositivos, unidades de estado s\xF3lido (SSD) e m\xEDdia remov\xED\
            vel USB."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-8
      name: Media Downgrading
      description: 'a. Establish [Assignment: organization-defined system media downgrading
        process] that includes employing downgrading mechanisms with strength and
        integrity commensurate with the security category or classification of the
        information;

        b. Verify that the system media downgrading process is commensurate with the
        security category and/or classification level of the information to be removed
        and the access authorizations of the potential recipients of the downgraded
        information;

        c. Identify [Assignment: organization-defined system media requiring downgrading];
        and

        d. Downgrade the identified system media using the established process.'
      annotation: Media downgrading applies to digital and non-digital media subject
        to release outside of the organization, whether the media is considered removable
        or not. When applied to system media, the downgrading process removes information
        from the media, typically by security category or classification level, such
        that the information cannot be retrieved or reconstructed. Downgrading of
        media includes redacting information to enable wider release and distribution.
        Downgrading ensures that empty space on the media is devoid of information.
      translations:
        pt:
          name: "Rebaixamento de M\xEDdia"
          description: "a. Estabelecer [Atribui\xE7\xE3o: processo de rebaixamento\
            \ de m\xEDdia de sistema definido pela organiza\xE7\xE3o] que inclua o\
            \ emprego de mecanismos de rebaixamento com for\xE7a e integridade compat\xED\
            veis com a categoria de seguran\xE7a ou classifica\xE7\xE3o da informa\xE7\
            \xE3o;\nb. Verificar que o processo de rebaixamento de m\xEDdia de sistema\
            \ \xE9 compat\xEDvel com a categoria de seguran\xE7a e/ou n\xEDvel de\
            \ classifica\xE7\xE3o da informa\xE7\xE3o a ser removida e com as autoriza\xE7\
            \xF5es de acesso dos potenciais destinat\xE1rios da informa\xE7\xE3o rebaixada;\n\
            c. Identificar [Atribui\xE7\xE3o: m\xEDdia de sistema que requer rebaixamento\
            \ definida pela organiza\xE7\xE3o]; e\nd. Rebaixar a m\xEDdia de sistema\
            \ identificada usando o processo estabelecido."
          annotation: "O rebaixamento de m\xEDdia se aplica a m\xEDdia digital e n\xE3\
            o digital sujeita a libera\xE7\xE3o fora da organiza\xE7\xE3o, seja a\
            \ m\xEDdia considerada remov\xEDvel ou n\xE3o. Quando aplicado \xE0 m\xED\
            dia de sistema, o processo de rebaixamento remove informa\xE7\xF5es da\
            \ m\xEDdia, tipicamente por categoria de seguran\xE7a ou n\xEDvel de classifica\xE7\
            \xE3o, de modo que a informa\xE7\xE3o n\xE3o possa ser recuperada ou reconstru\xED\
            da. O rebaixamento de m\xEDdia inclui a tarja (reda\xE7\xE3o) de informa\xE7\
            \xF5es para permitir libera\xE7\xE3o e distribui\xE7\xE3o mais amplas.\
            \ O rebaixamento garante que o espa\xE7o vazio na m\xEDdia esteja desprovido\
            \ de informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-8(1)
      name: Media Downgrading | Documentation of Process
      description: Document system media downgrading actions.
      annotation: Organizations can document the media downgrading process by providing
        information, such as the downgrading technique employed, the identification
        number of the downgraded media, and the identity of the individual that authorized
        and/or performed the downgrading action.
      translations:
        pt:
          name: "Rebaixamento de M\xEDdia | Documenta\xE7\xE3o do Processo"
          description: "Documentar as a\xE7\xF5es de rebaixamento de m\xEDdia de sistema."
          annotation: "As organiza\xE7\xF5es podem documentar o processo de rebaixamento\
            \ de m\xEDdia fornecendo informa\xE7\xF5es como a t\xE9cnica de rebaixamento\
            \ empregada, o n\xFAmero de identifica\xE7\xE3o da m\xEDdia rebaixada\
            \ e a identidade do indiv\xEDduo que autorizou e/ou executou a a\xE7\xE3\
            o de rebaixamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-8(2)
      name: Media Downgrading | Equipment Testing
      description: 'Test downgrading equipment and procedures [Assignment: organization-defined
        frequency] to ensure that downgrading actions are being achieved.'
      annotation: None.
      translations:
        pt:
          name: "Rebaixamento de M\xEDdia | Testes de Equipamentos"
          description: "Testar os equipamentos e procedimentos de rebaixamento [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] para garantir que\
            \ as a\xE7\xF5es de rebaixamento est\xE3o sendo alcan\xE7adas."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-8(3)
      name: Media Downgrading | Controlled Unclassified Information
      description: Downgrade system media containing controlled unclassified information
        prior to public release.
      annotation: The downgrading of controlled unclassified information uses approved
        sanitization tools, techniques, and procedures.
      translations:
        pt:
          name: "Rebaixamento de M\xEDdia | Informa\xE7\xF5es N\xE3o Classificadas\
            \ Controladas"
          description: "Rebaixar m\xEDdia de sistema que contenha informa\xE7\xF5\
            es n\xE3o classificadas controladas antes da libera\xE7\xE3o p\xFAblica."
          annotation: "O rebaixamento de informa\xE7\xF5es n\xE3o classificadas controladas\
            \ usa ferramentas, t\xE9cnicas e procedimentos de sanitiza\xE7\xE3o aprovados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp-8(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:mp
      ref_id: MP-8(4)
      name: Media Downgrading | Classified Information
      description: Downgrade system media containing classified information prior
        to release to individuals without required access authorizations.
      annotation: Downgrading of classified information uses approved sanitization
        tools, techniques, and procedures to transfer information confirmed to be
        unclassified from classified systems to unclassified media.
      translations:
        pt:
          name: "Rebaixamento de M\xEDdia | Informa\xE7\xF5es Classificadas"
          description: "Rebaixar m\xEDdia de sistema que contenha informa\xE7\xF5\
            es classificadas antes da libera\xE7\xE3o para indiv\xEDduos sem as autoriza\xE7\
            \xF5es de acesso exigidas."
          annotation: "O rebaixamento de informa\xE7\xF5es classificadas usa ferramentas,\
            \ t\xE9cnicas e procedimentos de sanitiza\xE7\xE3o aprovados para transferir\
            \ informa\xE7\xF5es confirmadas como n\xE3o classificadas de sistemas\
            \ classificados para m\xEDdia n\xE3o classificada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      assessable: false
      depth: 1
      ref_id: PE
      name: Physical and Environmental Protection
      translations:
        pt:
          name: "Prote\xE7\xE3o F\xEDsica e Ambiental"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] physical and environmental protection policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the physical and environmental
        protection policy and the associated physical and environmental protection
        controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the physical and environmental
        protection policy and procedures; and

        c. Review and update the current physical and environmental protection:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Physical and environmental protection policy and procedures address
        the controls in the PE family that are implemented within systems and organizations.
        The risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of physical and environmental protection policy and procedures.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to physical
        and environmental protection policy and procedures include assessment or audit
        findings, security incidents or breaches, or changes in applicable laws, executive
        orders, directives, regulations, policies, standards, and guidelines. Simply
        restating controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar a [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de prote\xE7\xE3o f\xEDsica e ambiental de [Sele\xE7\xE3o (uma ou\
            \ mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3o/neg\xF3\
            cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo, fun\xE7\
            \xF5es, responsabilidades, comprometimento da dire\xE7\xE3o, coordena\xE7\
            \xE3o entre entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com leis, ordens executivas, diretrizes, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de prote\xE7\xE3o f\xEDsica e ambiental\
            \ e dos controles de prote\xE7\xE3o f\xEDsica e ambiental associados;\n\
            b. Designar um [Atribui\xE7\xE3o: funcion\xE1rio definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de prote\xE7\xE3o f\xEDsica e\
            \ ambiental; e\nc. Revisar e atualizar a pol\xEDtica e os procedimentos\
            \ atuais de prote\xE7\xE3o f\xEDsica e ambiental:\n1. Pol\xEDtica [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de prote\xE7\xE3o f\xEDsica\
            \ e ambiental abordam os controles da fam\xEDlia PE que s\xE3o implementados\
            \ dentro dos sistemas e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3\
            o de risco \xE9 um fator importante no estabelecimento de tais pol\xED\
            ticas e procedimentos. Pol\xEDticas e procedimentos contribuem para a\
            \ garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante que\
            \ os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de prote\xE7\xE3o f\xEDsica e ambiental.\
            \ As pol\xEDticas e os procedimentos dos programas de seguran\xE7a e privacidade\
            \ no n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral, e podem\
            \ tornar desnecess\xE1rias pol\xEDticas e procedimentos espec\xEDficos\
            \ de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Os procedimentos podem ser estabelecidos para os programas de\
            \ seguran\xE7a e privacidade, para processos de miss\xE3o ou de neg\xF3\
            cio e para sistemas, se necess\xE1rio. Os procedimentos descrevem como\
            \ as pol\xEDticas ou os controles s\xE3o implementados e podem ser direcionados\
            \ ao indiv\xEDduo ou \xE0 fun\xE7\xE3o que \xE9 o objeto do procedimento.\
            \ Os procedimentos podem ser documentados em planos de seguran\xE7a e\
            \ privacidade de sistemas ou em um ou mais documentos separados. Eventos\
            \ que podem precipitar uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos\
            \ de prote\xE7\xE3o f\xEDsica e ambiental incluem constata\xE7\xF5es de\
            \ avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7\
            a, ou mudan\xE7as em leis, ordens executivas, diretrizes, regulamentos,\
            \ pol\xEDticas, normas e diretrizes aplic\xE1veis. A simples reafirma\xE7\
            \xE3o dos controles n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-2
      name: Physical Access Authorizations
      description: 'a. Develop, approve, and maintain a list of individuals with authorized
        access to the facility where the system resides;

        b. Issue authorization credentials for facility access;

        c. Review the access list detailing authorized facility access by individuals
        [Assignment: organization-defined frequency]; and

        d. Remove individuals from the facility access list when access is no longer
        required.'
      annotation: Physical access authorizations apply to employees and visitors.
        Individuals with permanent physical access authorization credentials are not
        considered visitors. Authorization credentials include ID badges, identification
        cards, and smart cards. Organizations determine the strength of authorization
        credentials needed consistent with applicable laws, executive orders, directives,
        regulations, policies, standards, and guidelines. Physical access authorizations
        may not be necessary to access certain areas within facilities that are designated
        as publicly accessible.
      translations:
        pt:
          name: "Autoriza\xE7\xF5es de Acesso F\xEDsico"
          description: "a. Desenvolver, aprovar e manter uma lista de indiv\xEDduos\
            \ com acesso autorizado \xE0 instala\xE7\xE3o onde o sistema reside;\n\
            b. Emitir credenciais de autoriza\xE7\xE3o para acesso \xE0 instala\xE7\
            \xE3o;\nc. Revisar a lista de acesso que detalha o acesso autorizado \xE0\
            \ instala\xE7\xE3o por indiv\xEDduos [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o]; e\nd. Remover indiv\xEDduos da lista\
            \ de acesso \xE0 instala\xE7\xE3o quando o acesso n\xE3o for mais necess\xE1\
            rio."
          annotation: "As autoriza\xE7\xF5es de acesso f\xEDsico se aplicam a empregados\
            \ e visitantes. Indiv\xEDduos com credenciais permanentes de autoriza\xE7\
            \xE3o de acesso f\xEDsico n\xE3o s\xE3o considerados visitantes. As credenciais\
            \ de autoriza\xE7\xE3o incluem crach\xE1s de identifica\xE7\xE3o, cart\xF5\
            es de identifica\xE7\xE3o e cart\xF5es inteligentes (smart cards). As\
            \ organiza\xE7\xF5es determinam a for\xE7a das credenciais de autoriza\xE7\
            \xE3o necess\xE1rias de acordo com leis, ordens executivas, diretrizes,\
            \ regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1veis. As autoriza\xE7\
            \xF5es de acesso f\xEDsico podem n\xE3o ser necess\xE1rias para acessar\
            \ certas \xE1reas dentro das instala\xE7\xF5es designadas como de acesso\
            \ p\xFAblico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-2(1)
      name: Physical Access Authorizations | Access by Position or Role
      description: Authorize physical access to the facility where the system resides
        based on position or role.
      annotation: Role-based facility access includes access by authorized permanent
        and regular/routine maintenance personnel, duty officers, and emergency medical
        staff.
      translations:
        pt:
          name: "Autoriza\xE7\xF5es de Acesso F\xEDsico | Acesso por Cargo ou Fun\xE7\
            \xE3o"
          description: "Autorizar o acesso f\xEDsico \xE0 instala\xE7\xE3o onde o\
            \ sistema reside com base no cargo ou fun\xE7\xE3o."
          annotation: "O acesso \xE0 instala\xE7\xE3o baseado em fun\xE7\xE3o inclui\
            \ o acesso por pessoal de manuten\xE7\xE3o autorizado permanente e de\
            \ manuten\xE7\xE3o regular/rotineira, oficiais de plant\xE3o e equipe\
            \ m\xE9dica de emerg\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-2(2)
      name: Physical Access Authorizations | Two Forms of Identification
      description: 'Require two forms of identification from the following forms of
        identification for visitor access to the facility where the system resides:
        [Assignment: organization-defined list of acceptable forms of identification].'
      annotation: "Acceptable forms of identification include passports, REAL ID-compliant\
        \ drivers\u2019 licenses, and Personal Identity Verification (PIV) cards.\
        \ For gaining access to facilities using automated mechanisms, organizations\
        \ may use PIV cards, key cards, PINs, and biometrics."
      translations:
        pt:
          name: "Autoriza\xE7\xF5es de Acesso F\xEDsico | Duas Formas de Identifica\xE7\
            \xE3o"
          description: "Exigir duas formas de identifica\xE7\xE3o dentre as seguintes\
            \ formas de identifica\xE7\xE3o para o acesso de visitantes \xE0 instala\xE7\
            \xE3o onde o sistema reside: [Atribui\xE7\xE3o: lista de formas de identifica\xE7\
            \xE3o aceit\xE1veis definida pela organiza\xE7\xE3o]."
          annotation: "Formas de identifica\xE7\xE3o aceit\xE1veis incluem passaportes,\
            \ carteiras de motorista em conformidade com o REAL ID e cart\xF5es de\
            \ Verifica\xE7\xE3o de Identidade Pessoal (PIV). Para obter acesso a instala\xE7\
            \xF5es usando mecanismos automatizados, as organiza\xE7\xF5es podem usar\
            \ cart\xF5es PIV, cart\xF5es-chave, PINs e biometria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-2(3)
      name: Physical Access Authorizations | Restrict Unescorted Access
      description: 'Restrict unescorted access to the facility where the system resides
        to personnel with [Selection (one or more): security clearances for all information
        contained within the system; formal access authorizations for all information
        contained within the system; need for access to all information contained
        within the system; [Assignment: organization-defined physical access authorizations]].'
      annotation: Individuals without required security clearances, access approvals,
        or need to know are escorted by individuals with appropriate physical access
        authorizations to ensure that information is not exposed or otherwise compromised.
      translations:
        pt:
          name: "Autoriza\xE7\xF5es de Acesso F\xEDsico | Restringir Acesso N\xE3\
            o Acompanhado"
          description: "Restringir o acesso n\xE3o acompanhado \xE0 instala\xE7\xE3\
            o onde o sistema reside a pessoal com [Sele\xE7\xE3o (uma ou mais): credenciamentos\
            \ de seguran\xE7a para todas as informa\xE7\xF5es contidas no sistema;\
            \ autoriza\xE7\xF5es formais de acesso para todas as informa\xE7\xF5es\
            \ contidas no sistema; necessidade de acesso a todas as informa\xE7\xF5\
            es contidas no sistema; [Atribui\xE7\xE3o: autoriza\xE7\xF5es de acesso\
            \ f\xEDsico definidas pela organiza\xE7\xE3o]]."
          annotation: "Indiv\xEDduos sem os credenciamentos de seguran\xE7a, aprova\xE7\
            \xF5es de acesso ou necessidade de conhecer exigidos s\xE3o acompanhados\
            \ por indiv\xEDduos com as autoriza\xE7\xF5es de acesso f\xEDsico apropriadas\
            \ para garantir que as informa\xE7\xF5es n\xE3o sejam expostas ou de outra\
            \ forma comprometidas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3
      name: Physical Access Control
      description: 'a. Enforce physical access authorizations at [Assignment: organization-defined
        entry and exit points to the facility where the system resides] by:

        1. Verifying individual access authorizations before granting access to the
        facility; and

        2. Controlling ingress and egress to the facility using [Selection (one or
        more): [Assignment: organization-defined physical access control systems or
        devices]; guards];

        b. Maintain physical access audit logs for [Assignment: organization-defined
        entry or exit points];

        c. Control access to areas within the facility designated as publicly accessible
        by implementing the following controls: [Assignment: organization-defined
        physical access controls];

        d. Escort visitors and control visitor activity [Assignment: organization-defined
        circumstances requiring visitor escorts and control of visitor activity];

        e. Secure keys, combinations, and other physical access devices;

        f. Inventory [Assignment: organization-defined physical access devices] every
        [Assignment: organization-defined frequency]; and

        g. Change combinations and keys [Assignment: organization-defined frequency]
        and/or when keys are lost, combinations are compromised, or when individuals
        possessing the keys or combinations are transferred or terminated.'
      annotation: Physical access control applies to employees and visitors. Individuals
        with permanent physical access authorizations are not considered visitors.
        Physical access controls for publicly accessible areas may include physical
        access control logs/records, guards, or physical access devices and barriers
        to prevent movement from publicly accessible areas to non-public areas. Organizations
        determine the types of guards needed, including professional security staff,
        system users, or administrative staff. Physical access devices include keys,
        locks, combinations, biometric readers, and card readers. Physical access
        control systems comply with applicable laws, executive orders, directives,
        policies, regulations, standards, and guidelines. Organizations have flexibility
        in the types of audit logs employed. Audit logs can be procedural, automated,
        or some combination thereof. Physical access points can include facility access
        points, interior access points to systems that require supplemental access
        controls, or both. Components of systems may be in areas designated as publicly
        accessible with organizations controlling access to the components.
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico"
          description: "a. Aplicar as autoriza\xE7\xF5es de acesso f\xEDsico em [Atribui\xE7\
            \xE3o: pontos de entrada e sa\xEDda da instala\xE7\xE3o onde o sistema\
            \ reside definidos pela organiza\xE7\xE3o] por meio de:\n1. Verifica\xE7\
            \xE3o das autoriza\xE7\xF5es de acesso individuais antes de conceder acesso\
            \ \xE0 instala\xE7\xE3o; e\n2. Controle de entrada e sa\xEDda da instala\xE7\
            \xE3o usando [Sele\xE7\xE3o (um ou mais): [Atribui\xE7\xE3o: sistemas\
            \ ou dispositivos de controle de acesso f\xEDsico definidos pela organiza\xE7\
            \xE3o]; guardas];\nb. Manter registros (logs) de auditoria de acesso f\xED\
            sico para [Atribui\xE7\xE3o: pontos de entrada ou sa\xEDda definidos pela\
            \ organiza\xE7\xE3o];\nc. Controlar o acesso a \xE1reas dentro da instala\xE7\
            \xE3o designadas como de acesso p\xFAblico implementando os seguintes\
            \ controles: [Atribui\xE7\xE3o: controles de acesso f\xEDsico definidos\
            \ pela organiza\xE7\xE3o];\nd. Acompanhar visitantes e controlar a atividade\
            \ dos visitantes [Atribui\xE7\xE3o: circunst\xE2ncias definidas pela organiza\xE7\
            \xE3o que exijam acompanhamento de visitantes e controle da atividade\
            \ dos visitantes];\ne. Proteger chaves, combina\xE7\xF5es e outros dispositivos\
            \ de acesso f\xEDsico;\nf. Inventariar [Atribui\xE7\xE3o: dispositivos\
            \ de acesso f\xEDsico definidos pela organiza\xE7\xE3o] a cada [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]; e\ng. Alterar combina\xE7\
            \xF5es e chaves [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e/ou quando as chaves forem perdidas, as combina\xE7\xF5es forem\
            \ comprometidas ou quando os indiv\xEDduos que possuem as chaves ou combina\xE7\
            \xF5es forem transferidos ou desligados."
          annotation: "O controle de acesso f\xEDsico se aplica a empregados e visitantes.\
            \ Indiv\xEDduos com autoriza\xE7\xF5es permanentes de acesso f\xEDsico\
            \ n\xE3o s\xE3o considerados visitantes. Os controles de acesso f\xED\
            sico para \xE1reas de acesso p\xFAblico podem incluir registros/logs de\
            \ controle de acesso f\xEDsico, guardas ou dispositivos e barreiras de\
            \ acesso f\xEDsico para impedir o deslocamento de \xE1reas de acesso p\xFA\
            blico para \xE1reas n\xE3o p\xFAblicas. As organiza\xE7\xF5es determinam\
            \ os tipos de guardas necess\xE1rios, incluindo equipe de seguran\xE7\
            a profissional, usu\xE1rios do sistema ou pessoal administrativo. Os dispositivos\
            \ de acesso f\xEDsico incluem chaves, fechaduras, combina\xE7\xF5es, leitores\
            \ biom\xE9tricos e leitores de cart\xE3o. Os sistemas de controle de acesso\
            \ f\xEDsico est\xE3o em conformidade com leis, ordens executivas, diretrizes,\
            \ pol\xEDticas, regulamentos, normas e diretrizes aplic\xE1veis. As organiza\xE7\
            \xF5es t\xEAm flexibilidade nos tipos de registros (logs) de auditoria\
            \ empregados. Os registros de auditoria podem ser procedimentais, automatizados\
            \ ou alguma combina\xE7\xE3o dos dois. Os pontos de acesso f\xEDsico podem\
            \ incluir pontos de acesso \xE0 instala\xE7\xE3o, pontos de acesso interno\
            \ a sistemas que exijam controles de acesso suplementares, ou ambos. Componentes\
            \ de sistemas podem estar em \xE1reas designadas como de acesso p\xFA\
            blico, com as organiza\xE7\xF5es controlando o acesso aos componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(1)
      name: Physical Access Control | System Access
      description: 'Enforce physical access authorizations to the system in addition
        to the physical access controls for the facility at [Assignment: organization-defined
        physical spaces containing one or more components of the system].'
      annotation: Control of physical access to the system provides additional physical
        security for those areas within facilities where there is a concentration
        of system components.
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Acesso ao Sistema"
          description: "Aplicar as autoriza\xE7\xF5es de acesso f\xEDsico ao sistema\
            \ al\xE9m dos controles de acesso f\xEDsico da instala\xE7\xE3o em [Atribui\xE7\
            \xE3o: espa\xE7os f\xEDsicos definidos pela organiza\xE7\xE3o que contenham\
            \ um ou mais componentes do sistema]."
          annotation: "O controle do acesso f\xEDsico ao sistema fornece seguran\xE7\
            a f\xEDsica adicional para as \xE1reas dentro das instala\xE7\xF5es onde\
            \ h\xE1 uma concentra\xE7\xE3o de componentes do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(2)
      name: Physical Access Control | Facility and Systems
      description: 'Perform security checks [Assignment: organization-defined frequency]
        at the physical perimeter of the facility or system for exfiltration of information
        or removal of system components.'
      annotation: Organizations determine the extent, frequency, and/or randomness
        of security checks to adequately mitigate risk associated with exfiltration.
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Instala\xE7\xE3o e Sistemas"
          description: "Realizar verifica\xE7\xF5es de seguran\xE7a [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o] no per\xEDmetro f\xED\
            sico da instala\xE7\xE3o ou do sistema para detectar exfiltra\xE7\xE3\
            o de informa\xE7\xF5es ou remo\xE7\xE3o de componentes do sistema."
          annotation: "As organiza\xE7\xF5es determinam a abrang\xEAncia, a frequ\xEA\
            ncia e/ou a aleatoriedade das verifica\xE7\xF5es de seguran\xE7a para\
            \ mitigar adequadamente o risco associado \xE0 exfiltra\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(3)
      name: Physical Access Control | Continuous Guards
      description: 'Employ guards to control [Assignment: organization-defined physical
        access points] to the facility where the system resides 24 hours per day,
        7 days per week.'
      annotation: Employing guards at selected physical access points to the facility
        provides a more rapid response capability for organizations. Guards also provide
        the opportunity for human surveillance in areas of the facility not covered
        by video surveillance.
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Vigilantes Permanentes"
          description: "Empregar vigilantes para controlar [Atribui\xE7\xE3o: pontos\
            \ de acesso f\xEDsico definidos pela organiza\xE7\xE3o] \xE0 instala\xE7\
            \xE3o onde o sistema reside, 24 horas por dia, 7 dias por semana."
          annotation: "O emprego de vigilantes em pontos de acesso f\xEDsico selecionados\
            \ da instala\xE7\xE3o proporciona uma capacidade de resposta mais r\xE1\
            pida para as organiza\xE7\xF5es. Os vigilantes tamb\xE9m oferecem a oportunidade\
            \ de vigil\xE2ncia humana em \xE1reas da instala\xE7\xE3o n\xE3o cobertas\
            \ por vigil\xE2ncia por v\xEDdeo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(4)
      name: Physical Access Control | Lockable Casings
      description: 'Use lockable physical casings to protect [Assignment: organization-defined
        system components] from unauthorized physical access.'
      annotation: "The greatest risk from the use of portable devices\u2014such as\
        \ smart phones, tablets, and notebook computers\u2014is theft. Organizations\
        \ can employ lockable, physical casings to reduce or eliminate the risk of\
        \ equipment theft. Such casings come in a variety of sizes, from units that\
        \ protect a single notebook computer to full cabinets that can protect multiple\
        \ servers, computers, and peripherals. Lockable physical casings can be used\
        \ in conjunction with cable locks or lockdown plates to prevent the theft\
        \ of the locked casing containing the computer equipment."
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Inv\xF3lucros Tranc\xE1veis"
          description: "Utilizar inv\xF3lucros f\xEDsicos tranc\xE1veis para proteger\
            \ [Atribui\xE7\xE3o: componentes do sistema definidos pela organiza\xE7\
            \xE3o] contra acesso f\xEDsico n\xE3o autorizado."
          annotation: "O maior risco do uso de dispositivos port\xE1teis \u2014 como\
            \ smartphones, tablets e notebooks \u2014 \xE9 o furto. As organiza\xE7\
            \xF5es podem empregar inv\xF3lucros f\xEDsicos tranc\xE1veis para reduzir\
            \ ou eliminar o risco de furto de equipamentos. Tais inv\xF3lucros est\xE3\
            o dispon\xEDveis em diversos tamanhos, desde unidades que protegem um\
            \ \xFAnico notebook at\xE9 gabinetes completos que podem proteger m\xFA\
            ltiplos servidores, computadores e perif\xE9ricos. Inv\xF3lucros f\xED\
            sicos tranc\xE1veis podem ser usados em conjunto com cadeados de cabo\
            \ ou placas de fixa\xE7\xE3o para impedir o furto do inv\xF3lucro trancado\
            \ que cont\xE9m os equipamentos de computa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(5)
      name: Physical Access Control | Tamper Protection
      description: 'Employ [Assignment: organization-defined anti-tamper technologies]
        to [Selection (one or more): detect; prevent] physical tampering or alteration
        of [Assignment: organization-defined hardware components] within the system.'
      annotation: Organizations can implement tamper detection and prevention at selected
        hardware components or implement tamper detection at some components and tamper
        prevention at other components. Detection and prevention activities can employ
        many types of anti-tamper technologies, including tamper-detection seals and
        anti-tamper coatings. Anti-tamper programs help to detect hardware alterations
        through counterfeiting and other supply chain-related risks.
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Prote\xE7\xE3o Contra Adultera\xE7\
            \xE3o"
          description: "Empregar [Atribui\xE7\xE3o: tecnologias antiadultera\xE7\xE3\
            o definidas pela organiza\xE7\xE3o] para [Sele\xE7\xE3o (uma ou mais):\
            \ detectar; prevenir] a adultera\xE7\xE3o ou altera\xE7\xE3o f\xEDsica\
            \ de [Atribui\xE7\xE3o: componentes de hardware definidos pela organiza\xE7\
            \xE3o] dentro do sistema."
          annotation: "As organiza\xE7\xF5es podem implementar detec\xE7\xE3o e preven\xE7\
            \xE3o de adultera\xE7\xE3o em componentes de hardware selecionados, ou\
            \ implementar detec\xE7\xE3o de adultera\xE7\xE3o em alguns componentes\
            \ e preven\xE7\xE3o de adultera\xE7\xE3o em outros componentes. As atividades\
            \ de detec\xE7\xE3o e preven\xE7\xE3o podem empregar diversos tipos de\
            \ tecnologias antiadultera\xE7\xE3o, incluindo lacres de detec\xE7\xE3\
            o de adultera\xE7\xE3o e revestimentos antiadultera\xE7\xE3o. Programas\
            \ antiadultera\xE7\xE3o ajudam a detectar altera\xE7\xF5es de hardware\
            \ decorrentes de falsifica\xE7\xE3o e de outros riscos relacionados \xE0\
            \ cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-10(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-10(1)
      name: Emergency Shutoff | Accidental and Unauthorized Activation
      description: '[Withdrawn: Incorporated into PE-10.]'
      translations:
        pt:
          name: "Desligamento de Emerg\xEAncia | Ativa\xE7\xE3o Acidental e N\xE3\
            o Autorizada"
          description: '[Retirado: Incorporado ao PE-10.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(7)
      name: Physical Access Control | Physical Barriers
      description: Limit access using physical barriers.
      annotation: Physical barriers include bollards, concrete slabs, jersey walls,
        and hydraulic active vehicle barriers.
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Barreiras F\xEDsicas"
          description: "Limitar o acesso utilizando barreiras f\xEDsicas."
          annotation: "As barreiras f\xEDsicas incluem balizadores (bollards), lajes\
            \ de concreto, barreiras tipo \"jersey\" e barreiras veiculares hidr\xE1\
            ulicas ativas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(8)
      name: Physical Access Control | Access Control Vestibules
      description: 'Employ access control vestibules at [Assignment: organization-defined
        locations within the facility].'
      annotation: An access control vestibule is part of a physical access control
        system that typically provides a space between two sets of interlocking doors.
        Vestibules are designed to prevent unauthorized individuals from following
        authorized individuals into facilities with controlled access. This activity,
        also known as piggybacking or tailgating, results in unauthorized access to
        the facility. Interlocking door controllers can be used to limit the number
        of individuals who enter controlled access points and to provide containment
        areas while authorization for physical access is verified. Interlocking door
        controllers can be fully automated (i.e., controlling the opening and closing
        of the doors) or partially automated (i.e., using security guards to control
        the number of individuals entering the containment area).
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Vest\xEDbulos de Controle de Acesso"
          description: "Empregar vest\xEDbulos de controle de acesso em [Atribui\xE7\
            \xE3o: locais definidos pela organiza\xE7\xE3o dentro da instala\xE7\xE3\
            o]."
          annotation: "Um vest\xEDbulo de controle de acesso \xE9 parte de um sistema\
            \ de controle de acesso f\xEDsico que normalmente fornece um espa\xE7\
            o entre dois conjuntos de portas intertravadas. Os vest\xEDbulos s\xE3\
            o projetados para impedir que indiv\xEDduos n\xE3o autorizados sigam indiv\xED\
            duos autorizados para dentro de instala\xE7\xF5es com acesso controlado.\
            \ Essa atividade, tamb\xE9m conhecida como \"piggybacking\" ou \"tailgating\"\
            , resulta em acesso n\xE3o autorizado \xE0 instala\xE7\xE3o. Controladores\
            \ de portas intertravadas podem ser usados para limitar o n\xFAmero de\
            \ indiv\xEDduos que entram nos pontos de acesso controlado e para fornecer\
            \ \xE1reas de conten\xE7\xE3o enquanto a autoriza\xE7\xE3o de acesso f\xED\
            sico \xE9 verificada. Os controladores de portas intertravadas podem ser\
            \ totalmente automatizados (ou seja, controlando a abertura e o fechamento\
            \ das portas) ou parcialmente automatizados (ou seja, utilizando vigilantes\
            \ de seguran\xE7a para controlar o n\xFAmero de indiv\xEDduos que entram\
            \ na \xE1rea de conten\xE7\xE3o)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-4
      name: Access Control for Transmission
      description: 'Control physical access to [Assignment: organization-defined system
        distribution and transmission lines] within organizational facilities using
        [Assignment: organization-defined security controls].'
      annotation: Security controls applied to system distribution and transmission
        lines prevent accidental damage, disruption, and physical tampering. Such
        controls may also be necessary to prevent eavesdropping or modification of
        unencrypted transmissions. Security controls used to control physical access
        to system distribution and transmission lines include disconnected or locked
        spare jacks, locked wiring closets, protection of cabling by conduit or cable
        trays, and wiretapping sensors.
      translations:
        pt:
          name: "Controle de Acesso para Transmiss\xE3o"
          description: "Controlar o acesso f\xEDsico a [Atribui\xE7\xE3o: linhas de\
            \ distribui\xE7\xE3o e transmiss\xE3o do sistema definidas pela organiza\xE7\
            \xE3o] dentro das instala\xE7\xF5es organizacionais utilizando [Atribui\xE7\
            \xE3o: controles de seguran\xE7a definidos pela organiza\xE7\xE3o]."
          annotation: "Os controles de seguran\xE7a aplicados \xE0s linhas de distribui\xE7\
            \xE3o e transmiss\xE3o do sistema previnem danos acidentais, interrup\xE7\
            \xF5es e adultera\xE7\xE3o f\xEDsica. Tais controles tamb\xE9m podem ser\
            \ necess\xE1rios para impedir a escuta clandestina ou a modifica\xE7\xE3\
            o de transmiss\xF5es n\xE3o criptografadas. Os controles de seguran\xE7\
            a usados para controlar o acesso f\xEDsico \xE0s linhas de distribui\xE7\
            \xE3o e transmiss\xE3o do sistema incluem tomadas sobressalentes desconectadas\
            \ ou trancadas, arm\xE1rios de cabeamento trancados, prote\xE7\xE3o do\
            \ cabeamento por condu\xEDtes ou bandejas de cabos e sensores de grampeamento\
            \ (wiretapping)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-5
      name: Access Control for Output Devices
      description: 'Control physical access to output from [Assignment: organization-defined
        output devices] to prevent unauthorized individuals from obtaining the output.'
      annotation: Controlling physical access to output devices includes placing output
        devices in locked rooms or other secured areas with keypad or card reader
        access controls and allowing access to authorized individuals only, placing
        output devices in locations that can be monitored by personnel, installing
        monitor or screen filters, and using headphones. Examples of output devices
        include monitors, printers, scanners, audio devices, facsimile machines, and
        copiers.
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos de Sa\xEDda"
          description: "Controlar o acesso f\xEDsico \xE0 sa\xEDda de [Atribui\xE7\
            \xE3o: dispositivos de sa\xEDda definidos pela organiza\xE7\xE3o] para\
            \ impedir que indiv\xEDduos n\xE3o autorizados obtenham a sa\xEDda."
          annotation: "O controle do acesso f\xEDsico a dispositivos de sa\xEDda inclui\
            \ posicionar dispositivos de sa\xEDda em salas trancadas ou outras \xE1\
            reas protegidas com controles de acesso por teclado ou leitor de cart\xE3\
            o, permitindo o acesso apenas a indiv\xEDduos autorizados; posicionar\
            \ dispositivos de sa\xEDda em locais que possam ser monitorados por pessoal;\
            \ instalar filtros de monitor ou de tela; e usar fones de ouvido. Exemplos\
            \ de dispositivos de sa\xEDda incluem monitores, impressoras, scanners,\
            \ dispositivos de \xE1udio, aparelhos de fax e copiadoras."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-13(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-13(3)
      name: Fire Protection | Automatic Fire Suppression
      description: '[Withdrawn: Incorporated into PE-13(2).]'
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Inc\xEAndio | Supress\xE3o Autom\xE1tica de\
            \ Inc\xEAndio"
          description: '[Retirado: Incorporado ao PE-13(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-5(2)
      name: Access Control for Output Devices | Link to Individual Identity
      description: Link individual identity to receipt of output from output devices.
      annotation: Methods for linking individual identity to the receipt of output
        from output devices include installing security functionality on facsimile
        machines, copiers, and printers. Such functionality allows organizations to
        implement authentication on output devices prior to the release of output
        to individuals.
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos de Sa\xEDda | V\xEDnculo com\
            \ a Identidade Individual"
          description: "Vincular a identidade individual ao recebimento da sa\xED\
            da de dispositivos de sa\xEDda."
          annotation: "Os m\xE9todos para vincular a identidade individual ao recebimento\
            \ da sa\xEDda de dispositivos de sa\xEDda incluem a instala\xE7\xE3o de\
            \ funcionalidade de seguran\xE7a em aparelhos de fax, copiadoras e impressoras.\
            \ Tal funcionalidade permite que as organiza\xE7\xF5es implementem autentica\xE7\
            \xE3o nos dispositivos de sa\xEDda antes da libera\xE7\xE3o da sa\xED\
            da aos indiv\xEDduos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-18(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-18(1)
      name: Location of System Components | Facility Site
      description: '[Withdrawn: Moved to PE-23.]'
      translations:
        pt:
          name: "Localiza\xE7\xE3o dos Componentes do Sistema | Local da Instala\xE7\
            \xE3o"
          description: '[Retirado: Movido para o PE-23.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-6
      name: Monitoring Physical Access
      description: 'a. Monitor physical access to the facility where the system resides
        to detect and respond to physical security incidents;

        b. Review physical access logs [Assignment: organization-defined frequency]
        and upon occurrence of [Assignment: organization-defined events or potential
        indications of events]; and

        c. Coordinate results of reviews and investigations with the organizational
        incident response capability.'
      annotation: Physical access monitoring includes publicly accessible areas within
        organizational facilities. Examples of physical access monitoring include
        the employment of guards, video surveillance equipment (i.e., cameras), and
        sensor devices. Reviewing physical access logs can help identify suspicious
        activity, anomalous events, or potential threats. The reviews can be supported
        by audit logging controls, such as AU-2, if the access logs are part of an
        automated system. Organizational incident response capabilities include investigations
        of physical security incidents and responses to the incidents. Incidents include
        security violations or suspicious physical access activities. Suspicious physical
        access activities include accesses outside of normal work hours, repeated
        accesses to areas not normally accessed, accesses for unusual lengths of time,
        and out-of-sequence accesses.
      translations:
        pt:
          name: "Monitoramento do Acesso F\xEDsico"
          description: "a. Monitorar o acesso f\xEDsico \xE0 instala\xE7\xE3o onde\
            \ o sistema reside para detectar e responder a incidentes de seguran\xE7\
            a f\xEDsica;\nb. Revisar os registros de acesso f\xEDsico [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e na ocorr\xEAncia\
            \ de [Atribui\xE7\xE3o: eventos ou ind\xEDcios potenciais de eventos definidos\
            \ pela organiza\xE7\xE3o]; e\nc. Coordenar os resultados das revis\xF5\
            es e investiga\xE7\xF5es com a capacidade de resposta a incidentes da\
            \ organiza\xE7\xE3o."
          annotation: "O monitoramento do acesso f\xEDsico inclui \xE1reas de acesso\
            \ p\xFAblico dentro das instala\xE7\xF5es organizacionais. Exemplos de\
            \ monitoramento de acesso f\xEDsico incluem o emprego de vigilantes, equipamentos\
            \ de vigil\xE2ncia por v\xEDdeo (ou seja, c\xE2meras) e dispositivos sensores.\
            \ A revis\xE3o dos registros de acesso f\xEDsico pode ajudar a identificar\
            \ atividades suspeitas, eventos an\xF4malos ou amea\xE7as potenciais.\
            \ As revis\xF5es podem ser apoiadas por controles de registro de auditoria,\
            \ como o AU-2, se os registros de acesso fizerem parte de um sistema automatizado.\
            \ As capacidades de resposta a incidentes da organiza\xE7\xE3o incluem\
            \ investiga\xE7\xF5es de incidentes de seguran\xE7a f\xEDsica e respostas\
            \ a esses incidentes. Os incidentes incluem viola\xE7\xF5es de seguran\xE7\
            a ou atividades suspeitas de acesso f\xEDsico. Atividades suspeitas de\
            \ acesso f\xEDsico incluem acessos fora do hor\xE1rio normal de trabalho,\
            \ acessos repetidos a \xE1reas normalmente n\xE3o acessadas, acessos por\
            \ per\xEDodos de tempo incomuns e acessos fora de sequ\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-6(1)
      name: Monitoring Physical Access | Intrusion Alarms and Surveillance Equipment
      description: Monitor physical access to the facility where the system resides
        using physical intrusion alarms and surveillance equipment.
      annotation: Physical intrusion alarms can be employed to alert security personnel
        when unauthorized access to the facility is attempted. Alarm systems work
        in conjunction with physical barriers, physical access control systems, and
        security guards by triggering a response when these other forms of security
        have been compromised or breached. Physical intrusion alarms can include different
        types of sensor devices, such as motion sensors, contact sensors, and broken
        glass sensors. Surveillance equipment includes video cameras installed at
        strategic locations throughout the facility.
      translations:
        pt:
          name: "Monitoramento do Acesso F\xEDsico | Alarmes de Intrus\xE3o e Equipamentos\
            \ de Vigil\xE2ncia"
          description: "Monitorar o acesso f\xEDsico \xE0 instala\xE7\xE3o onde o\
            \ sistema reside utilizando alarmes de intrus\xE3o f\xEDsica e equipamentos\
            \ de vigil\xE2ncia."
          annotation: "Alarmes de intrus\xE3o f\xEDsica podem ser empregados para\
            \ alertar o pessoal de seguran\xE7a quando se tenta acesso n\xE3o autorizado\
            \ \xE0 instala\xE7\xE3o. Os sistemas de alarme funcionam em conjunto com\
            \ barreiras f\xEDsicas, sistemas de controle de acesso f\xEDsico e vigilantes\
            \ de seguran\xE7a, acionando uma resposta quando essas outras formas de\
            \ seguran\xE7a s\xE3o comprometidas ou violadas. Os alarmes de intrus\xE3\
            o f\xEDsica podem incluir diferentes tipos de dispositivos sensores, como\
            \ sensores de movimento, sensores de contato e sensores de quebra de vidro.\
            \ Os equipamentos de vigil\xE2ncia incluem c\xE2meras de v\xEDdeo instaladas\
            \ em locais estrat\xE9gicos por toda a instala\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-6(2)
      name: Monitoring Physical Access | Automated Intrusion Recognition and Responses
      description: 'Recognize [Assignment: organization-defined classes or types of
        intrusions] and initiate [Assignment: organization-defined response actions]
        using [Assignment: organization-defined automated mechanisms].'
      annotation: Response actions can include notifying selected organizational personnel
        or law enforcement personnel. Automated mechanisms implemented to initiate
        response actions include system alert notifications, email and text messages,
        and activating door locking mechanisms. Physical access monitoring can be
        coordinated with intrusion detection systems and system monitoring capabilities
        to provide integrated threat coverage for the organization.
      translations:
        pt:
          name: "Monitoramento do Acesso F\xEDsico | Reconhecimento e Respostas Automatizadas\
            \ a Intrus\xF5es"
          description: "Reconhecer [Atribui\xE7\xE3o: classes ou tipos de intrus\xF5\
            es definidos pela organiza\xE7\xE3o] e iniciar [Atribui\xE7\xE3o: a\xE7\
            \xF5es de resposta definidas pela organiza\xE7\xE3o] utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "As a\xE7\xF5es de resposta podem incluir a notifica\xE7\xE3\
            o de pessoal organizacional selecionado ou de agentes de aplica\xE7\xE3\
            o da lei. Os mecanismos automatizados implementados para iniciar a\xE7\
            \xF5es de resposta incluem notifica\xE7\xF5es de alerta do sistema, mensagens\
            \ de e-mail e de texto e a ativa\xE7\xE3o de mecanismos de travamento\
            \ de portas. O monitoramento do acesso f\xEDsico pode ser coordenado com\
            \ sistemas de detec\xE7\xE3o de intrus\xE3o e capacidades de monitoramento\
            \ do sistema para fornecer uma cobertura integrada de amea\xE7as \xE0\
            \ organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-6(3)
      name: Monitoring Physical Access | Video Surveillance
      description: '(a) Employ video surveillance of [Assignment: organization-defined
        operational areas];

        (b) Review video recordings [Assignment: organization-defined frequency];
        and

        (c) Retain video recordings for [Assignment: organization-defined time period].'
      annotation: Video surveillance focuses on recording activity in specified areas
        for the purposes of subsequent review, if circumstances so warrant. Video
        recordings are typically reviewed to detect anomalous events or incidents.
        Monitoring the surveillance video is not required, although organizations
        may choose to do so. There may be legal considerations when performing and
        retaining video surveillance, especially if such surveillance is in a public
        location.
      translations:
        pt:
          name: "Monitoramento do Acesso F\xEDsico | Vigil\xE2ncia por V\xEDdeo"
          description: "(a) Empregar vigil\xE2ncia por v\xEDdeo de [Atribui\xE7\xE3\
            o: \xE1reas operacionais definidas pela organiza\xE7\xE3o];\n(b) Revisar\
            \ as grava\xE7\xF5es de v\xEDdeo [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]; e\n(c) Reter as grava\xE7\xF5es de v\xEDdeo\
            \ por [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "A vigil\xE2ncia por v\xEDdeo concentra-se na grava\xE7\xE3\
            o de atividades em \xE1reas especificadas para fins de revis\xE3o posterior,\
            \ caso as circunst\xE2ncias o justifiquem. As grava\xE7\xF5es de v\xED\
            deo s\xE3o normalmente revisadas para detectar eventos ou incidentes an\xF4\
            malos. O monitoramento do v\xEDdeo de vigil\xE2ncia n\xE3o \xE9 obrigat\xF3\
            rio, embora as organiza\xE7\xF5es possam optar por faz\xEA-lo. Pode haver\
            \ considera\xE7\xF5es legais ao realizar e reter vigil\xE2ncia por v\xED\
            deo, especialmente se tal vigil\xE2ncia ocorrer em local p\xFAblico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-6(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-6(4)
      name: Monitoring Physical Access | Monitoring Physical Access to Systems
      description: 'Monitor physical access to the system in addition to the physical
        access monitoring of the facility at [Assignment: organization-defined physical
        spaces containing one or more components of the system].'
      annotation: Monitoring physical access to systems provides additional monitoring
        for those areas within facilities where there is a concentration of system
        components, including server rooms, media storage areas, and communications
        centers. Physical access monitoring can be coordinated with intrusion detection
        systems and system monitoring capabilities to provide comprehensive and integrated
        threat coverage for the organization.
      translations:
        pt:
          name: "Monitoramento do Acesso F\xEDsico | Monitoramento do Acesso F\xED\
            sico aos Sistemas"
          description: "Monitorar o acesso f\xEDsico ao sistema, al\xE9m do monitoramento\
            \ do acesso f\xEDsico \xE0 instala\xE7\xE3o, em [Atribui\xE7\xE3o: espa\xE7\
            os f\xEDsicos definidos pela organiza\xE7\xE3o que cont\xEAm um ou mais\
            \ componentes do sistema]."
          annotation: "O monitoramento do acesso f\xEDsico aos sistemas fornece monitoramento\
            \ adicional para as \xE1reas das instala\xE7\xF5es onde h\xE1 concentra\xE7\
            \xE3o de componentes do sistema, incluindo salas de servidores, \xE1reas\
            \ de armazenamento de m\xEDdia e centros de comunica\xE7\xE3o. O monitoramento\
            \ do acesso f\xEDsico pode ser coordenado com sistemas de detec\xE7\xE3\
            o de intrus\xE3o e capacidades de monitoramento do sistema para fornecer\
            \ uma cobertura abrangente e integrada de amea\xE7as \xE0 organiza\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-3(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-3(6)
      name: Physical Access Control | Facility Penetration Testing
      description: '[Withdrawn: Incorporated into CA-8.]'
      translations:
        pt:
          name: "Controle de Acesso F\xEDsico | Teste de Penetra\xE7\xE3o na Instala\xE7\
            \xE3o"
          description: '[Retirado: Incorporado ao CA-8.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-8
      name: Visitor Access Records
      description: 'a. Maintain visitor access records to the facility where the system
        resides for [Assignment: organization-defined time period];

        b. Review visitor access records [Assignment: organization-defined frequency];
        and

        c. Report anomalies in visitor access records to [Assignment: organization-defined
        personnel].'
      annotation: Visitor access records include the names and organizations of individuals
        visiting, visitor signatures, forms of identification, dates of access, entry
        and departure times, purpose of visits, and the names and organizations of
        individuals visited. Access record reviews determine if access authorizations
        are current and are still required to support organizational mission and business
        functions. Access records are not required for publicly accessible areas.
      translations:
        pt:
          name: Registros de Acesso de Visitantes
          description: "a. Manter registros de acesso de visitantes \xE0 instala\xE7\
            \xE3o onde o sistema reside por [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o];\nb. Revisar os registros de acesso\
            \ de visitantes [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o]; e\nc. Reportar anomalias nos registros de acesso de visitantes\
            \ a [Atribui\xE7\xE3o: pessoal definido pela organiza\xE7\xE3o]."
          annotation: "Os registros de acesso de visitantes incluem os nomes e as\
            \ organiza\xE7\xF5es dos indiv\xEDduos visitantes, as assinaturas dos\
            \ visitantes, as formas de identifica\xE7\xE3o, as datas de acesso, os\
            \ hor\xE1rios de entrada e sa\xEDda, o prop\xF3sito das visitas e os nomes\
            \ e organiza\xE7\xF5es dos indiv\xEDduos visitados. As revis\xF5es dos\
            \ registros de acesso determinam se as autoriza\xE7\xF5es de acesso est\xE3\
            o atualizadas e ainda s\xE3o necess\xE1rias para apoiar a miss\xE3o e\
            \ as fun\xE7\xF5es de neg\xF3cio da organiza\xE7\xE3o. Os registros de\
            \ acesso n\xE3o s\xE3o exigidos para \xE1reas de acesso p\xFAblico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-8(1)
      name: Visitor Access Records | Automated Records Maintenance and Review
      description: 'Maintain and review visitor access records using [Assignment:
        organization-defined automated mechanisms].'
      annotation: Visitor access records may be stored and maintained in a database
        management system that is accessible by organizational personnel. Automated
        access to such records facilitates record reviews on a regular basis to determine
        if access authorizations are current and still required to support organizational
        mission and business functions.
      translations:
        pt:
          name: "Registros de Acesso de Visitantes | Manuten\xE7\xE3o e Revis\xE3\
            o Automatizadas de Registros"
          description: "Manter e revisar os registros de acesso de visitantes utilizando\
            \ [Atribui\xE7\xE3o: mecanismos automatizados definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Os registros de acesso de visitantes podem ser armazenados\
            \ e mantidos em um sistema de gerenciamento de banco de dados acess\xED\
            vel pelo pessoal organizacional. O acesso automatizado a tais registros\
            \ facilita as revis\xF5es peri\xF3dicas para determinar se as autoriza\xE7\
            \xF5es de acesso est\xE3o atualizadas e ainda s\xE3o necess\xE1rias para\
            \ apoiar a miss\xE3o e as fun\xE7\xF5es de neg\xF3cio da organiza\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-5(1)
      name: Access Control for Output Devices | Access to Output by Authorized Individuals
      description: '[Withdrawn: Incorporated into PE-5.]'
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos de Sa\xEDda | Acesso \xE0 Sa\xED\
            da por Indiv\xEDduos Autorizados"
          description: '[Retirado: Incorporado ao PE-5.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-8(3)
      name: Visitor Access Records | Limit Personally Identifiable Information Elements
      description: 'Limit personally identifiable information contained in visitor
        access records to the following elements identified in the privacy risk assessment:
        [Assignment: organization-defined elements].'
      annotation: Organizations may have requirements that specify the contents of
        visitor access records. Limiting personally identifiable information in visitor
        access records when such information is not needed for operational purposes
        helps reduce the level of privacy risk created by a system.
      translations:
        pt:
          name: "Registros de Acesso de Visitantes | Limitar Elementos de Informa\xE7\
            \xE3o de Identifica\xE7\xE3o Pessoal"
          description: "Limitar as informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ contidas nos registros de acesso de visitantes aos seguintes elementos\
            \ identificados na avalia\xE7\xE3o de risco de privacidade: [Atribui\xE7\
            \xE3o: elementos definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem ter requisitos que especificam\
            \ o conte\xFAdo dos registros de acesso de visitantes. Limitar as informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal nos registros de acesso de visitantes,\
            \ quando tais informa\xE7\xF5es n\xE3o s\xE3o necess\xE1rias para fins\
            \ operacionais, ajuda a reduzir o n\xEDvel de risco de privacidade criado\
            \ por um sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-9
      name: Power Equipment and Cabling
      description: Protect power equipment and power cabling for the system from damage
        and destruction.
      annotation: Organizations determine the types of protection necessary for the
        power equipment and cabling employed at different locations that are both
        internal and external to organizational facilities and environments of operation.
        Types of power equipment and cabling include internal cabling and uninterruptable
        power sources in offices or data centers, generators and power cabling outside
        of buildings, and power sources for self-contained components such as satellites,
        vehicles, and other deployable systems.
      translations:
        pt:
          name: Equipamentos e Cabeamento de Energia
          description: "Proteger os equipamentos de energia e o cabeamento de energia\
            \ do sistema contra danos e destrui\xE7\xE3o."
          annotation: "As organiza\xE7\xF5es determinam os tipos de prote\xE7\xE3\
            o necess\xE1rios para os equipamentos e o cabeamento de energia empregados\
            \ em diferentes locais, tanto internos quanto externos \xE0s instala\xE7\
            \xF5es organizacionais e aos ambientes de opera\xE7\xE3o. Os tipos de\
            \ equipamentos e cabeamento de energia incluem cabeamento interno e fontes\
            \ de alimenta\xE7\xE3o ininterrupta em escrit\xF3rios ou data centers,\
            \ geradores e cabeamento de energia externos aos edif\xEDcios, e fontes\
            \ de energia para componentes autossuficientes, como sat\xE9lites, ve\xED\
            culos e outros sistemas implant\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-9(1)
      name: Power Equipment and Cabling | Redundant Cabling
      description: 'Employ redundant power cabling paths that are physically separated
        by [Assignment: organization-defined distance].'
      annotation: Physically separate and redundant power cables ensure that power
        continues to flow in the event that one of the cables is cut or otherwise
        damaged.
      translations:
        pt:
          name: Equipamentos e Cabeamento de Energia | Cabeamento Redundante
          description: "Empregar caminhos de cabeamento de energia redundantes que\
            \ estejam fisicamente separados por [Atribui\xE7\xE3o: dist\xE2ncia definida\
            \ pela organiza\xE7\xE3o]."
          annotation: Cabos de energia fisicamente separados e redundantes garantem
            que a energia continue a fluir caso um dos cabos seja cortado ou de outra
            forma danificado.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-9(2)
      name: Power Equipment and Cabling | Automatic Voltage Controls
      description: 'Employ automatic voltage controls for [Assignment: organization-defined
        critical system components].'
      annotation: Automatic voltage controls can monitor and control voltage. Such
        controls include voltage regulators, voltage conditioners, and voltage stabilizers.
      translations:
        pt:
          name: "Equipamentos e Cabeamento de Energia | Controles Autom\xE1ticos de\
            \ Tens\xE3o"
          description: "Empregar controles autom\xE1ticos de tens\xE3o para [Atribui\xE7\
            \xE3o: componentes cr\xEDticos do sistema definidos pela organiza\xE7\xE3\
            o]."
          annotation: "Os controles autom\xE1ticos de tens\xE3o podem monitorar e\
            \ controlar a tens\xE3o. Tais controles incluem reguladores de tens\xE3\
            o, condicionadores de tens\xE3o e estabilizadores de tens\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-10
      name: Emergency Shutoff
      description: 'a. Provide the capability of shutting off power to [Assignment:
        organization-defined system or individual system components] in emergency
        situations;

        b. Place emergency shutoff switches or devices in [Assignment: organization-defined
        location by system or system component] to facilitate access for authorized
        personnel; and

        c. Protect emergency power shutoff capability from unauthorized activation.'
      annotation: Emergency power shutoff primarily applies to organizational facilities
        that contain concentrations of system resources, including data centers, mainframe
        computer rooms, server rooms, and areas with computer-controlled machinery.
      translations:
        pt:
          name: "Desligamento de Emerg\xEAncia"
          description: "a. Fornecer a capacidade de desligar a energia de [Atribui\xE7\
            \xE3o: sistema ou componentes individuais do sistema definidos pela organiza\xE7\
            \xE3o] em situa\xE7\xF5es de emerg\xEAncia;\nb. Posicionar interruptores\
            \ ou dispositivos de desligamento de emerg\xEAncia em [Atribui\xE7\xE3\
            o: localiza\xE7\xE3o definida pela organiza\xE7\xE3o por sistema ou componente\
            \ do sistema] para facilitar o acesso pelo pessoal autorizado; e\nc. Proteger\
            \ a capacidade de desligamento de energia de emerg\xEAncia contra ativa\xE7\
            \xE3o n\xE3o autorizada."
          annotation: "O desligamento de energia de emerg\xEAncia aplica-se principalmente\
            \ a instala\xE7\xF5es organizacionais que cont\xEAm concentra\xE7\xF5\
            es de recursos do sistema, incluindo data centers, salas de computadores\
            \ de grande porte (mainframe), salas de servidores e \xE1reas com maquin\xE1\
            rio controlado por computador."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-5(3)
      name: Access Control for Output Devices | Marking Output Devices
      description: '[Withdrawn: Incorporated into PE-22.]'
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos de Sa\xEDda | Marca\xE7\xE3\
            o de Dispositivos de Sa\xEDda"
          description: '[Retirado: Incorporado ao PE-22.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-11
      name: Emergency Power
      description: 'Provide an uninterruptible power supply to facilitate [Selection
        (one or more): an orderly shutdown of the system; transition of the system
        to long-term alternate power] in the event of a primary power source loss.'
      annotation: An uninterruptible power supply (UPS) is an electrical system or
        mechanism that provides emergency power when there is a failure of the main
        power source. A UPS is typically used to protect computers, data centers,
        telecommunication equipment, or other electrical equipment where an unexpected
        power disruption could cause injuries, fatalities, serious mission or business
        disruption, or loss of data or information. A UPS differs from an emergency
        power system or backup generator in that the UPS provides near-instantaneous
        protection from unanticipated power interruptions from the main power source
        by providing energy stored in batteries, supercapacitors, or flywheels. The
        battery duration of a UPS is relatively short but provides sufficient time
        to start a standby power source, such as a backup generator, or properly shut
        down the system.
      translations:
        pt:
          name: "Energia de Emerg\xEAncia"
          description: "Fornecer uma fonte de alimenta\xE7\xE3o ininterrupta para\
            \ facilitar [Sele\xE7\xE3o (uma ou mais): um desligamento ordenado do\
            \ sistema; a transi\xE7\xE3o do sistema para energia alternativa de longo\
            \ prazo] no caso de perda da fonte de energia prim\xE1ria."
          annotation: "Uma fonte de alimenta\xE7\xE3o ininterrupta (UPS, do ingl\xEA\
            s uninterruptible power supply) \xE9 um sistema ou mecanismo el\xE9trico\
            \ que fornece energia de emerg\xEAncia quando h\xE1 uma falha da fonte\
            \ de energia principal. Uma UPS \xE9 normalmente usada para proteger computadores,\
            \ data centers, equipamentos de telecomunica\xE7\xF5es ou outros equipamentos\
            \ el\xE9tricos onde uma interrup\xE7\xE3o inesperada de energia poderia\
            \ causar ferimentos, fatalidades, s\xE9ria interrup\xE7\xE3o da miss\xE3\
            o ou do neg\xF3cio, ou perda de dados ou informa\xE7\xF5es. Uma UPS difere\
            \ de um sistema de energia de emerg\xEAncia ou gerador de reserva, pois\
            \ a UPS fornece prote\xE7\xE3o quase instant\xE2nea contra interrup\xE7\
            \xF5es de energia imprevistas da fonte de energia principal, fornecendo\
            \ energia armazenada em baterias, supercapacitores ou volantes de in\xE9\
            rcia (flywheels). A dura\xE7\xE3o da bateria de uma UPS \xE9 relativamente\
            \ curta, mas fornece tempo suficiente para iniciar uma fonte de energia\
            \ em espera, como um gerador de reserva, ou desligar o sistema adequadamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-11(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-11(1)
      name: "Emergency Power | Alternate Power Supply \u2014 Minimal Operational Capability"
      description: 'Provide an alternate power supply for the system that is activated
        [Selection: manually; automatically] and that can maintain minimally required
        operational capability in the event of an extended loss of the primary power
        source.'
      annotation: Provision of an alternate power supply with minimal operating capability
        can be satisfied by accessing a secondary commercial power supply or other
        external power supply.
      translations:
        pt:
          name: "Energia de Emerg\xEAncia | Fonte de Alimenta\xE7\xE3o Alternativa\
            \ \u2014 Capacidade Operacional M\xEDnima"
          description: "Fornecer uma fonte de alimenta\xE7\xE3o alternativa para o\
            \ sistema que seja ativada [Sele\xE7\xE3o: manualmente; automaticamente]\
            \ e que possa manter a capacidade operacional minimamente requerida no\
            \ caso de uma perda prolongada da fonte de energia prim\xE1ria."
          annotation: "O fornecimento de uma fonte de alimenta\xE7\xE3o alternativa\
            \ com capacidade operacional m\xEDnima pode ser satisfeito pelo acesso\
            \ a uma fonte de energia comercial secund\xE1ria ou a outra fonte de energia\
            \ externa."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-11(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-11(2)
      name: "Emergency Power | Alternate Power Supply \u2014 Self-contained"
      description: 'Provide an alternate power supply for the system that is activated
        [Selection: manually; automatically] and that is:

        (a) Self-contained;

        (b) Not reliant on external power generation; and

        (c) Capable of maintaining [Selection: minimally required operational capability;
        full operational capability] in the event of an extended loss of the primary
        power source.'
      annotation: The provision of a long-term, self-contained power supply can be
        satisfied by using one or more generators with sufficient capacity to meet
        the needs of the organization.
      translations:
        pt:
          name: "Energia de Emerg\xEAncia | Fonte de Alimenta\xE7\xE3o Alternativa\
            \ \u2014 Autossuficiente"
          description: "Fornecer uma fonte de alimenta\xE7\xE3o alternativa para o\
            \ sistema que seja ativada [Sele\xE7\xE3o: manualmente; automaticamente]\
            \ e que seja:\n(a) Autossuficiente;\n(b) N\xE3o dependente de gera\xE7\
            \xE3o de energia externa; e\n(c) Capaz de manter [Sele\xE7\xE3o: a capacidade\
            \ operacional minimamente requerida; a capacidade operacional plena] no\
            \ caso de uma perda prolongada da fonte de energia prim\xE1ria."
          annotation: "O fornecimento de uma fonte de alimenta\xE7\xE3o autossuficiente\
            \ de longo prazo pode ser satisfeito pelo uso de um ou mais geradores\
            \ com capacidade suficiente para atender \xE0s necessidades da organiza\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-12
      name: Emergency Lighting
      description: Employ and maintain automatic emergency lighting for the system
        that activates in the event of a power outage or disruption and that covers
        emergency exits and evacuation routes within the facility.
      annotation: The provision of emergency lighting applies primarily to organizational
        facilities that contain concentrations of system resources, including data
        centers, server rooms, and mainframe computer rooms. Emergency lighting provisions
        for the system are described in the contingency plan for the organization.
        If emergency lighting for the system fails or cannot be provided, organizations
        consider alternate processing sites for power-related contingencies.
      translations:
        pt:
          name: "Ilumina\xE7\xE3o de Emerg\xEAncia"
          description: "Empregar e manter ilumina\xE7\xE3o de emerg\xEAncia autom\xE1\
            tica para o sistema que seja ativada no caso de uma falha ou interrup\xE7\
            \xE3o de energia e que cubra as sa\xEDdas de emerg\xEAncia e as rotas\
            \ de evacua\xE7\xE3o dentro da instala\xE7\xE3o."
          annotation: "O fornecimento de ilumina\xE7\xE3o de emerg\xEAncia aplica-se\
            \ principalmente a instala\xE7\xF5es organizacionais que cont\xEAm concentra\xE7\
            \xF5es de recursos do sistema, incluindo data centers, salas de servidores\
            \ e salas de computadores de grande porte (mainframe). As disposi\xE7\xF5\
            es de ilumina\xE7\xE3o de emerg\xEAncia para o sistema s\xE3o descritas\
            \ no plano de conting\xEAncia da organiza\xE7\xE3o. Se a ilumina\xE7\xE3\
            o de emerg\xEAncia para o sistema falhar ou n\xE3o puder ser fornecida,\
            \ as organiza\xE7\xF5es consideram locais de processamento alternativos\
            \ para conting\xEAncias relacionadas \xE0 energia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-12(1)
      name: Emergency Lighting | Essential Mission and Business Functions
      description: Provide emergency lighting for all areas within the facility supporting
        essential mission and business functions.
      annotation: Organizations define their essential missions and functions.
      translations:
        pt:
          name: "Ilumina\xE7\xE3o de Emerg\xEAncia | Fun\xE7\xF5es Essenciais de Miss\xE3\
            o e de Neg\xF3cio"
          description: "Fornecer ilumina\xE7\xE3o de emerg\xEAncia para todas as \xE1\
            reas dentro da instala\xE7\xE3o que apoiam fun\xE7\xF5es essenciais de\
            \ miss\xE3o e de neg\xF3cio."
          annotation: "As organiza\xE7\xF5es definem suas miss\xF5es e fun\xE7\xF5\
            es essenciais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-13
      name: Fire Protection
      description: Employ and maintain fire detection and suppression systems that
        are supported by an independent energy source.
      annotation: The provision of fire detection and suppression systems applies
        primarily to organizational facilities that contain concentrations of system
        resources, including data centers, server rooms, and mainframe computer rooms.
        Fire detection and suppression systems that may require an independent energy
        source include sprinkler systems and smoke detectors. An independent energy
        source is an energy source, such as a microgrid, that is separate, or can
        be separated, from the energy sources providing power for the other parts
        of the facility.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Inc\xEAndio"
          description: "Empregar e manter sistemas de detec\xE7\xE3o e supress\xE3\
            o de inc\xEAndio que sejam apoiados por uma fonte de energia independente."
          annotation: "O fornecimento de sistemas de detec\xE7\xE3o e supress\xE3\
            o de inc\xEAndio aplica-se principalmente a instala\xE7\xF5es organizacionais\
            \ que cont\xEAm concentra\xE7\xF5es de recursos do sistema, incluindo\
            \ data centers, salas de servidores e salas de computadores de grande\
            \ porte (mainframe). Sistemas de detec\xE7\xE3o e supress\xE3o de inc\xEA\
            ndio que podem exigir uma fonte de energia independente incluem sistemas\
            \ de sprinklers (aspersores) e detectores de fuma\xE7a. Uma fonte de energia\
            \ independente \xE9 uma fonte de energia, como uma microrrede (microgrid),\
            \ que \xE9 separada, ou pode ser separada, das fontes de energia que fornecem\
            \ energia para as outras partes da instala\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-13(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-13(1)
      name: "Fire Protection | Detection Systems \u2014 Automatic Activation and Notification"
      description: 'Employ fire detection systems that activate automatically and
        notify [Assignment: organization-defined personnel or roles] and [Assignment:
        organization-defined emergency responders] in the event of a fire.'
      annotation: Organizations can identify personnel, roles, and emergency responders
        if individuals on the notification list need to have access authorizations
        or clearances (e.g., to enter to facilities where access is restricted due
        to the classification or impact level of information within the facility).
        Notification mechanisms may require independent energy sources to ensure that
        the notification capability is not adversely affected by the fire.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Inc\xEAndio | Sistemas de Detec\xE7\xE3o \u2014\
            \ Ativa\xE7\xE3o e Notifica\xE7\xE3o Autom\xE1ticas"
          description: "Empregar sistemas de detec\xE7\xE3o de inc\xEAndio que sejam\
            \ ativados automaticamente e notifiquem [Atribui\xE7\xE3o: pessoal ou\
            \ fun\xE7\xF5es definidos pela organiza\xE7\xE3o] e [Atribui\xE7\xE3o:\
            \ socorristas de emerg\xEAncia definidos pela organiza\xE7\xE3o] no caso\
            \ de um inc\xEAndio."
          annotation: "As organiza\xE7\xF5es podem identificar pessoal, fun\xE7\xF5\
            es e socorristas de emerg\xEAncia caso os indiv\xEDduos da lista de notifica\xE7\
            \xE3o precisem ter autoriza\xE7\xF5es de acesso ou credenciamentos (por\
            \ exemplo, para entrar em instala\xE7\xF5es onde o acesso \xE9 restrito\
            \ devido \xE0 classifica\xE7\xE3o ou ao n\xEDvel de impacto das informa\xE7\
            \xF5es dentro da instala\xE7\xE3o). Os mecanismos de notifica\xE7\xE3\
            o podem exigir fontes de energia independentes para garantir que a capacidade\
            \ de notifica\xE7\xE3o n\xE3o seja adversamente afetada pelo inc\xEAndio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-13(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-13(2)
      name: "Fire Protection | Suppression Systems \u2014 Automatic Activation and\
        \ Notification"
      description: '(a) Employ fire suppression systems that activate automatically
        and notify [Assignment: organization-defined personnel or roles] and [Assignment:
        organization-defined emergency responders]; and

        (b) Employ an automatic fire suppression capability when the facility is not
        staffed on a continuous basis.'
      annotation: Organizations can identify specific personnel, roles, and emergency
        responders if individuals on the notification list need to have appropriate
        access authorizations and/or clearances (e.g., to enter to facilities where
        access is restricted due to the impact level or classification of information
        within the facility). Notification mechanisms may require independent energy
        sources to ensure that the notification capability is not adversely affected
        by the fire.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Inc\xEAndio | Sistemas de Supress\xE3o \u2014\
            \ Ativa\xE7\xE3o e Notifica\xE7\xE3o Autom\xE1ticas"
          description: "(a) Empregar sistemas de supress\xE3o de inc\xEAndio que sejam\
            \ ativados automaticamente e notifiquem [Atribui\xE7\xE3o: pessoal ou\
            \ fun\xE7\xF5es definidos pela organiza\xE7\xE3o] e [Atribui\xE7\xE3o:\
            \ socorristas de emerg\xEAncia definidos pela organiza\xE7\xE3o]; e\n\
            (b) Empregar uma capacidade autom\xE1tica de supress\xE3o de inc\xEAndio\
            \ quando a instala\xE7\xE3o n\xE3o estiver com pessoal de forma cont\xED\
            nua."
          annotation: "As organiza\xE7\xF5es podem identificar pessoal, fun\xE7\xF5\
            es e socorristas de emerg\xEAncia espec\xEDficos caso os indiv\xEDduos\
            \ da lista de notifica\xE7\xE3o precisem ter autoriza\xE7\xF5es de acesso\
            \ e/ou credenciamentos apropriados (por exemplo, para entrar em instala\xE7\
            \xF5es onde o acesso \xE9 restrito devido ao n\xEDvel de impacto ou \xE0\
            \ classifica\xE7\xE3o das informa\xE7\xF5es dentro da instala\xE7\xE3\
            o). Os mecanismos de notifica\xE7\xE3o podem exigir fontes de energia\
            \ independentes para garantir que a capacidade de notifica\xE7\xE3o n\xE3\
            o seja adversamente afetada pelo inc\xEAndio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-7
      name: Visitor Control
      description: '[Withdrawn: Incorporated into PE-2 and PE-3.]'
      translations:
        pt:
          name: Controle de Visitantes
          description: '[Retirado: Incorporado ao PE-2 e ao PE-3.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-13(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-13(4)
      name: Fire Protection | Inspections
      description: 'Ensure that the facility undergoes [Assignment: organization-defined
        frequency] fire protection inspections by authorized and qualified inspectors
        and identified deficiencies are resolved within [Assignment: organization-defined
        time period].'
      annotation: Authorized and qualified personnel within the jurisdiction of the
        organization include state, county, and city fire inspectors and fire marshals.
        Organizations provide escorts during inspections in situations where the systems
        that reside within the facilities contain sensitive information.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Inc\xEAndio | Inspe\xE7\xF5es"
          description: "Assegurar que a instala\xE7\xE3o seja submetida a inspe\xE7\
            \xF5es de prote\xE7\xE3o contra inc\xEAndio com [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] por inspetores autorizados e qualificados\
            \ e que as defici\xEAncias identificadas sejam resolvidas dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]."
          annotation: "O pessoal autorizado e qualificado dentro da jurisdi\xE7\xE3\
            o da organiza\xE7\xE3o inclui inspetores de inc\xEAndio estaduais, municipais\
            \ e de cidades e chefes de bombeiros (fire marshals). As organiza\xE7\xF5\
            es fornecem acompanhantes durante as inspe\xE7\xF5es em situa\xE7\xF5\
            es nas quais os sistemas que residem dentro das instala\xE7\xF5es cont\xEA\
            m informa\xE7\xF5es sens\xEDveis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-14
      name: Environmental Controls
      description: 'a. Maintain [Selection (one or more): temperature; humidity; pressure;
        radiation; [Assignment: organization-defined environmental control]] levels
        within the facility where the system resides at [Assignment: organization-defined
        acceptable levels]; and

        b. Monitor environmental control levels [Assignment: organization-defined
        frequency].'
      annotation: The provision of environmental controls applies primarily to organizational
        facilities that contain concentrations of system resources (e.g., data centers,
        mainframe computer rooms, and server rooms). Insufficient environmental controls,
        especially in very harsh environments, can have a significant adverse impact
        on the availability of systems and system components that are needed to support
        organizational mission and business functions.
      translations:
        pt:
          name: Controles Ambientais
          description: "a. Manter os n\xEDveis de [Sele\xE7\xE3o (um ou mais): temperatura;\
            \ umidade; press\xE3o; radia\xE7\xE3o; [Atribui\xE7\xE3o: controle ambiental\
            \ definido pela organiza\xE7\xE3o]] dentro da instala\xE7\xE3o onde o\
            \ sistema reside em [Atribui\xE7\xE3o: n\xEDveis aceit\xE1veis definidos\
            \ pela organiza\xE7\xE3o]; e\nb. Monitorar os n\xEDveis de controle ambiental\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "O fornecimento de controles ambientais aplica-se principalmente\
            \ a instala\xE7\xF5es organizacionais que cont\xEAm concentra\xE7\xF5\
            es de recursos do sistema (por exemplo, data centers, salas de computadores\
            \ de grande porte (mainframe) e salas de servidores). Controles ambientais\
            \ insuficientes, especialmente em ambientes muito severos, podem ter um\
            \ impacto adverso significativo na disponibilidade dos sistemas e componentes\
            \ do sistema necess\xE1rios para apoiar a miss\xE3o e as fun\xE7\xF5es\
            \ de neg\xF3cio da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-14(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-14(1)
      name: Environmental Controls | Automatic Controls
      description: 'Employ the following automatic environmental controls in the facility
        to prevent fluctuations potentially harmful to the system: [Assignment: organization-defined
        automatic environmental controls].'
      annotation: The implementation of automatic environmental controls provides
        an immediate response to environmental conditions that can damage, degrade,
        or destroy organizational systems or systems components.
      translations:
        pt:
          name: "Controles Ambientais | Controles Autom\xE1ticos"
          description: "Empregar os seguintes controles ambientais autom\xE1ticos\
            \ na instala\xE7\xE3o para prevenir flutua\xE7\xF5es potencialmente prejudiciais\
            \ ao sistema: [Atribui\xE7\xE3o: controles ambientais autom\xE1ticos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "A implementa\xE7\xE3o de controles ambientais autom\xE1ticos\
            \ fornece uma resposta imediata a condi\xE7\xF5es ambientais que possam\
            \ danificar, degradar ou destruir sistemas organizacionais ou componentes\
            \ de sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-14(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-14(2)
      name: Environmental Controls | Monitoring with Alarms and Notifications
      description: 'Employ environmental control monitoring that provides an alarm
        or notification of changes potentially harmful to personnel or equipment to
        [Assignment: organization-defined personnel or roles].'
      annotation: The alarm or notification may be an audible alarm or a visual message
        in real time to personnel or roles defined by the organization. Such alarms
        and notifications can help minimize harm to individuals and damage to organizational
        assets by facilitating a timely incident response.
      translations:
        pt:
          name: "Controles Ambientais | Monitoramento com Alarmes e Notifica\xE7\xF5\
            es"
          description: "Empregar monitoramento de controle ambiental que forne\xE7\
            a um alarme ou notifica\xE7\xE3o de mudan\xE7as potencialmente prejudiciais\
            \ ao pessoal ou aos equipamentos a [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "O alarme ou a notifica\xE7\xE3o pode ser um alarme sonoro ou\
            \ uma mensagem visual em tempo real para o pessoal ou as fun\xE7\xF5es\
            \ definidos pela organiza\xE7\xE3o. Tais alarmes e notifica\xE7\xF5es\
            \ podem ajudar a minimizar danos aos indiv\xEDduos e aos ativos organizacionais\
            \ ao facilitar uma resposta a incidentes em tempo h\xE1bil."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-15
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-15
      name: Water Damage Protection
      description: Protect the system from damage resulting from water leakage by
        providing master shutoff or isolation valves that are accessible, working
        properly, and known to key personnel.
      annotation: The provision of water damage protection primarily applies to organizational
        facilities that contain concentrations of system resources, including data
        centers, server rooms, and mainframe computer rooms. Isolation valves can
        be employed in addition to or in lieu of master shutoff valves to shut off
        water supplies in specific areas of concern without affecting entire organizations.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Danos por \xC1gua"
          description: "Proteger o sistema contra danos resultantes de vazamento de\
            \ \xE1gua fornecendo v\xE1lvulas mestras de desligamento ou de isolamento\
            \ que sejam acess\xEDveis, funcionem corretamente e sejam conhecidas pelo\
            \ pessoal-chave."
          annotation: "O fornecimento de prote\xE7\xE3o contra danos por \xE1gua aplica-se\
            \ principalmente a instala\xE7\xF5es organizacionais que cont\xEAm concentra\xE7\
            \xF5es de recursos do sistema, incluindo data centers, salas de servidores\
            \ e salas de computadores de grande porte (mainframe). V\xE1lvulas de\
            \ isolamento podem ser empregadas em adi\xE7\xE3o ou em substitui\xE7\xE3\
            o \xE0s v\xE1lvulas mestras de desligamento para interromper o fornecimento\
            \ de \xE1gua em \xE1reas espec\xEDficas de interesse sem afetar organiza\xE7\
            \xF5es inteiras."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-15(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-15(1)
      name: Water Damage Protection | Automation Support
      description: 'Detect the presence of water near the system and alert [Assignment:
        organization-defined personnel or roles] using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated mechanisms include notification systems, water detection
        sensors, and alarms.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Danos por \xC1gua | Suporte de Automa\xE7\xE3\
            o"
          description: "Detectar a presen\xE7a de \xE1gua pr\xF3xima ao sistema e\
            \ alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] usando [Atribui\xE7\xE3o: mecanismos automatizados definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Mecanismos automatizados incluem sistemas de notifica\xE7\xE3\
            o, sensores de detec\xE7\xE3o de \xE1gua e alarmes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-16
      name: Delivery and Removal
      description: 'a. Authorize and control [Assignment: organization-defined types
        of system components] entering and exiting the facility; and

        b. Maintain records of the system components.'
      annotation: Enforcing authorizations for entry and exit of system components
        may require restricting access to delivery areas and isolating the areas from
        the system and media libraries.
      translations:
        pt:
          name: "Entrega e Remo\xE7\xE3o"
          description: "a. Autorizar e controlar [Atribui\xE7\xE3o: tipos de componentes\
            \ do sistema definidos pela organiza\xE7\xE3o] que entram e saem da instala\xE7\
            \xE3o; e\nb. Manter registros dos componentes do sistema."
          annotation: "A imposi\xE7\xE3o de autoriza\xE7\xF5es para entrada e sa\xED\
            da de componentes do sistema pode exigir a restri\xE7\xE3o de acesso \xE0\
            s \xE1reas de entrega e o isolamento dessas \xE1reas em rela\xE7\xE3o\
            \ ao sistema e \xE0s bibliotecas de m\xEDdia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-17
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-17
      name: Alternate Work Site
      description: 'a. Determine and document the [Assignment: organization-defined
        alternate work sites] allowed for use by employees;

        b. Employ the following controls at alternate work sites: [Assignment: organization-defined
        controls];

        c. Assess the effectiveness of controls at alternate work sites; and

        d. Provide a means for employees to communicate with information security
        and privacy personnel in case of incidents.'
      annotation: Alternate work sites include government facilities or the private
        residences of employees. While distinct from alternative processing sites,
        alternate work sites can provide readily available alternate locations during
        contingency operations. Organizations can define different sets of controls
        for specific alternate work sites or types of sites depending on the work-related
        activities conducted at the sites. Implementing and assessing the effectiveness
        of organization-defined controls and providing a means to communicate incidents
        at alternate work sites supports the contingency planning activities of organizations.
      translations:
        pt:
          name: Local de Trabalho Alternativo
          description: "a. Determinar e documentar os [Atribui\xE7\xE3o: locais de\
            \ trabalho alternativos definidos pela organiza\xE7\xE3o] permitidos para\
            \ uso pelos funcion\xE1rios;\nb. Empregar os seguintes controles nos locais\
            \ de trabalho alternativos: [Atribui\xE7\xE3o: controles definidos pela\
            \ organiza\xE7\xE3o];\nc. Avaliar a efic\xE1cia dos controles nos locais\
            \ de trabalho alternativos; e\nd. Fornecer um meio para que os funcion\xE1\
            rios se comuniquem com o pessoal de seguran\xE7a da informa\xE7\xE3o e\
            \ privacidade em caso de incidentes."
          annotation: "Locais de trabalho alternativos incluem instala\xE7\xF5es governamentais\
            \ ou as resid\xEAncias particulares dos funcion\xE1rios. Embora distintos\
            \ dos locais de processamento alternativos, os locais de trabalho alternativos\
            \ podem fornecer locais alternativos prontamente dispon\xEDveis durante\
            \ opera\xE7\xF5es de conting\xEAncia. As organiza\xE7\xF5es podem definir\
            \ conjuntos diferentes de controles para locais de trabalho alternativos\
            \ espec\xEDficos ou tipos de locais, dependendo das atividades relacionadas\
            \ ao trabalho conduzidas nesses locais. A implementa\xE7\xE3o e a avalia\xE7\
            \xE3o da efic\xE1cia dos controles definidos pela organiza\xE7\xE3o e\
            \ o fornecimento de um meio para comunicar incidentes nos locais de trabalho\
            \ alternativos apoiam as atividades de planejamento de conting\xEAncia\
            \ das organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-18
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-18
      name: Location of System Components
      description: 'Position system components within the facility to minimize potential
        damage from [Assignment: organization-defined physical and environmental hazards]
        and to minimize the opportunity for unauthorized access.'
      annotation: Physical and environmental hazards include floods, fires, tornadoes,
        earthquakes, hurricanes, terrorism, vandalism, an electromagnetic pulse, electrical
        interference, and other forms of incoming electromagnetic radiation. Organizations
        consider the location of entry points where unauthorized individuals, while
        not being granted access, might nonetheless be near systems. Such proximity
        can increase the risk of unauthorized access to organizational communications
        using wireless packet sniffers or microphones, or unauthorized disclosure
        of information.
      translations:
        pt:
          name: "Localiza\xE7\xE3o dos Componentes do Sistema"
          description: "Posicionar os componentes do sistema dentro da instala\xE7\
            \xE3o para minimizar poss\xEDveis danos decorrentes de [Atribui\xE7\xE3\
            o: perigos f\xEDsicos e ambientais definidos pela organiza\xE7\xE3o] e\
            \ para minimizar a oportunidade de acesso n\xE3o autorizado."
          annotation: "Perigos f\xEDsicos e ambientais incluem inunda\xE7\xF5es, inc\xEA\
            ndios, tornados, terremotos, furac\xF5es, terrorismo, vandalismo, pulso\
            \ eletromagn\xE9tico, interfer\xEAncia el\xE9trica e outras formas de\
            \ radia\xE7\xE3o eletromagn\xE9tica incidente. As organiza\xE7\xF5es consideram\
            \ a localiza\xE7\xE3o dos pontos de entrada onde indiv\xEDduos n\xE3o\
            \ autorizados, ainda que n\xE3o tenham acesso concedido, possam, mesmo\
            \ assim, estar pr\xF3ximos dos sistemas. Tal proximidade pode aumentar\
            \ o risco de acesso n\xE3o autorizado \xE0s comunica\xE7\xF5es organizacionais\
            \ usando sniffers de pacotes sem fio ou microfones, ou de divulga\xE7\xE3\
            o n\xE3o autorizada de informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-8(2)
      name: Visitor Access Records | Physical Access Records
      description: '[Withdrawn: Incorporated into PE-2.]'
      translations:
        pt:
          name: "Registros de Acesso de Visitantes | Registros de Acesso F\xEDsico"
          description: '[Retirado: Incorporado ao PE-2.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-19
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-19
      name: Information Leakage
      description: Protect the system from information leakage due to electromagnetic
        signals emanations.
      annotation: Information leakage is the intentional or unintentional release
        of data or information to an untrusted environment from electromagnetic signals
        emanations. The security categories or classifications of systems (with respect
        to confidentiality), organizational security policies, and risk tolerance
        guide the selection of controls employed to protect systems against information
        leakage due to electromagnetic signals emanations.
      translations:
        pt:
          name: "Vazamento de Informa\xE7\xF5es"
          description: "Proteger o sistema contra vazamento de informa\xE7\xF5es decorrente\
            \ de emana\xE7\xF5es de sinais eletromagn\xE9ticos."
          annotation: "Vazamento de informa\xE7\xF5es \xE9 a libera\xE7\xE3o intencional\
            \ ou n\xE3o intencional de dados ou informa\xE7\xF5es para um ambiente\
            \ n\xE3o confi\xE1vel a partir de emana\xE7\xF5es de sinais eletromagn\xE9\
            ticos. As categorias ou classifica\xE7\xF5es de seguran\xE7a dos sistemas\
            \ (com rela\xE7\xE3o \xE0 confidencialidade), as pol\xEDticas de seguran\xE7\
            a organizacionais e a toler\xE2ncia a risco orientam a sele\xE7\xE3o dos\
            \ controles empregados para proteger os sistemas contra vazamento de informa\xE7\
            \xF5es decorrente de emana\xE7\xF5es de sinais eletromagn\xE9ticos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-19(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-19(1)
      name: Information Leakage | National Emissions Policies and Procedures
      description: Protect system components, associated data communications, and
        networks in accordance with national Emissions Security policies and procedures
        based on the security category or classification of the information.
      annotation: Emissions Security (EMSEC) policies include the former TEMPEST policies.
      translations:
        pt:
          name: "Vazamento de Informa\xE7\xF5es | Pol\xEDticas e Procedimentos Nacionais\
            \ de Emiss\xF5es"
          description: "Proteger os componentes do sistema, as comunica\xE7\xF5es\
            \ de dados associadas e as redes de acordo com as pol\xEDticas e procedimentos\
            \ nacionais de Seguran\xE7a de Emiss\xF5es, com base na categoria ou classifica\xE7\
            \xE3o de seguran\xE7a da informa\xE7\xE3o."
          annotation: "As pol\xEDticas de Seguran\xE7a de Emiss\xF5es (EMSEC) incluem\
            \ as antigas pol\xEDticas TEMPEST."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-20
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-20
      name: Asset Monitoring and Tracking
      description: 'Employ [Assignment: organization-defined asset location technologies]
        to track and monitor the location and movement of [Assignment: organization-defined
        assets] within [Assignment: organization-defined controlled areas].'
      annotation: "Asset location technologies can help ensure that critical assets\u2014\
        including vehicles, equipment, and system components\u2014remain in authorized\
        \ locations. Organizations consult with the Office of the General Counsel\
        \ and senior agency official for privacy regarding the deployment and use\
        \ of asset location technologies to address potential privacy concerns."
      translations:
        pt:
          name: Monitoramento e Rastreamento de Ativos
          description: "Empregar [Atribui\xE7\xE3o: tecnologias de localiza\xE7\xE3\
            o de ativos definidas pela organiza\xE7\xE3o] para rastrear e monitorar\
            \ a localiza\xE7\xE3o e a movimenta\xE7\xE3o de [Atribui\xE7\xE3o: ativos\
            \ definidos pela organiza\xE7\xE3o] dentro de [Atribui\xE7\xE3o: \xE1\
            reas controladas definidas pela organiza\xE7\xE3o]."
          annotation: "As tecnologias de localiza\xE7\xE3o de ativos podem ajudar\
            \ a garantir que ativos cr\xEDticos \u2014 incluindo ve\xEDculos, equipamentos\
            \ e componentes do sistema \u2014 permane\xE7am em locais autorizados.\
            \ As organiza\xE7\xF5es consultam o Escrit\xF3rio de Assessoria Jur\xED\
            dica (Office of the General Counsel) e o funcion\xE1rio s\xEAnior da ag\xEA\
            ncia respons\xE1vel por privacidade quanto \xE0 implanta\xE7\xE3o e ao\
            \ uso de tecnologias de localiza\xE7\xE3o de ativos para tratar de poss\xED\
            veis preocupa\xE7\xF5es com privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-21
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-21
      name: Electromagnetic Pulse Protection
      description: 'Employ [Assignment: organization-defined protective measures]
        against electromagnetic pulse damage for [Assignment: organization-defined
        systems and system components].'
      annotation: An electromagnetic pulse (EMP) is a short burst of electromagnetic
        energy that is spread over a range of frequencies. Such energy bursts may
        be natural or man-made. EMP interference may be disruptive or damaging to
        electronic equipment. Protective measures used to mitigate EMP risk include
        shielding, surge suppressors, ferro-resonant transformers, and earth grounding.
        EMP protection may be especially significant for systems and applications
        that are part of the U.S. critical infrastructure.
      translations:
        pt:
          name: "Prote\xE7\xE3o Contra Pulso Eletromagn\xE9tico"
          description: "Empregar [Atribui\xE7\xE3o: medidas de prote\xE7\xE3o definidas\
            \ pela organiza\xE7\xE3o] contra danos por pulso eletromagn\xE9tico para\
            \ [Atribui\xE7\xE3o: sistemas e componentes do sistema definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Um pulso eletromagn\xE9tico (EMP) \xE9 uma breve rajada de\
            \ energia eletromagn\xE9tica distribu\xEDda ao longo de uma faixa de frequ\xEA\
            ncias. Tais rajadas de energia podem ser naturais ou produzidas pelo homem.\
            \ A interfer\xEAncia por EMP pode ser disruptiva ou danosa para equipamentos\
            \ eletr\xF4nicos. As medidas de prote\xE7\xE3o usadas para mitigar o risco\
            \ de EMP incluem blindagem, supressores de surto, transformadores ferrorressonantes\
            \ e aterramento. A prote\xE7\xE3o contra EMP pode ser especialmente significativa\
            \ para sistemas e aplica\xE7\xF5es que fazem parte da infraestrutura cr\xED\
            tica dos EUA."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-22
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-22
      name: Component Marking
      description: 'Mark [Assignment: organization-defined system hardware components]
        indicating the impact level or classification level of the information permitted
        to be processed, stored, or transmitted by the hardware component.'
      annotation: Hardware components that may require marking include input and output
        devices. Input devices include desktop and notebook computers, keyboards,
        tablets, and smart phones. Output devices include printers, monitors/video
        displays, facsimile machines, scanners, copiers, and audio devices. Permissions
        controlling output to the output devices are addressed in AC-3 or AC-4. Components
        are marked to indicate the impact level or classification level of the system
        to which the devices are connected, or the impact level or classification
        level of the information permitted to be output. Security marking refers to
        the use of human-readable security attributes. Security labeling refers to
        the use of security attributes for internal system data structures. Security
        marking is generally not required for hardware components that process, store,
        or transmit information determined by organizations to be in the public domain
        or to be publicly releasable. However, organizations may require markings
        for hardware components that process, store, or transmit public information
        in order to indicate that such information is publicly releasable. Marking
        of system hardware components reflects applicable laws, executive orders,
        directives, policies, regulations, and standards.
      translations:
        pt:
          name: "Marca\xE7\xE3o de Componentes"
          description: "Marcar [Atribui\xE7\xE3o: componentes de hardware do sistema\
            \ definidos pela organiza\xE7\xE3o] indicando o n\xEDvel de impacto ou\
            \ o n\xEDvel de classifica\xE7\xE3o da informa\xE7\xE3o cujo processamento,\
            \ armazenamento ou transmiss\xE3o \xE9 permitido ao componente de hardware."
          annotation: "Componentes de hardware que podem exigir marca\xE7\xE3o incluem\
            \ dispositivos de entrada e sa\xEDda. Dispositivos de entrada incluem\
            \ computadores de mesa e notebooks, teclados, tablets e smartphones. Dispositivos\
            \ de sa\xEDda incluem impressoras, monitores/telas de v\xEDdeo, aparelhos\
            \ de fax, scanners, copiadoras e dispositivos de \xE1udio. As permiss\xF5\
            es que controlam a sa\xEDda para os dispositivos de sa\xEDda s\xE3o tratadas\
            \ em AC-3 ou AC-4. Os componentes s\xE3o marcados para indicar o n\xED\
            vel de impacto ou o n\xEDvel de classifica\xE7\xE3o do sistema ao qual\
            \ os dispositivos est\xE3o conectados, ou o n\xEDvel de impacto ou o n\xED\
            vel de classifica\xE7\xE3o da informa\xE7\xE3o cuja sa\xEDda \xE9 permitida.\
            \ A marca\xE7\xE3o de seguran\xE7a refere-se ao uso de atributos de seguran\xE7\
            a leg\xEDveis por humanos. A rotulagem de seguran\xE7a refere-se ao uso\
            \ de atributos de seguran\xE7a para estruturas de dados internas do sistema.\
            \ A marca\xE7\xE3o de seguran\xE7a geralmente n\xE3o \xE9 exigida para\
            \ componentes de hardware que processam, armazenam ou transmitem informa\xE7\
            \xF5es determinadas pelas organiza\xE7\xF5es como sendo de dom\xEDnio\
            \ p\xFAblico ou pass\xEDveis de divulga\xE7\xE3o p\xFAblica. No entanto,\
            \ as organiza\xE7\xF5es podem exigir marca\xE7\xF5es para componentes\
            \ de hardware que processam, armazenam ou transmitem informa\xE7\xF5es\
            \ p\xFAblicas, a fim de indicar que tais informa\xE7\xF5es s\xE3o pass\xED\
            veis de divulga\xE7\xE3o p\xFAblica. A marca\xE7\xE3o de componentes de\
            \ hardware do sistema reflete leis, ordens executivas, diretivas, pol\xED\
            ticas, regulamentos e normas aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe-23
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pe
      ref_id: PE-23
      name: Facility Location
      description: 'a. Plan the location or site of the facility where the system
        resides considering physical and environmental hazards; and

        b. For existing facilities, consider the physical and environmental hazards
        in the organizational risk management strategy.'
      annotation: Physical and environmental hazards include floods, fires, tornadoes,
        earthquakes, hurricanes, terrorism, vandalism, an electromagnetic pulse, electrical
        interference, and other forms of incoming electromagnetic radiation. The location
        of system components within the facility is addressed in PE-18.
      translations:
        pt:
          name: "Localiza\xE7\xE3o da Instala\xE7\xE3o"
          description: "a. Planejar a localiza\xE7\xE3o ou o s\xEDtio da instala\xE7\
            \xE3o onde o sistema reside, considerando perigos f\xEDsicos e ambientais;\
            \ e\nb. Para instala\xE7\xF5es existentes, considerar os perigos f\xED\
            sicos e ambientais na estrat\xE9gia organizacional de gest\xE3o de riscos."
          annotation: "Perigos f\xEDsicos e ambientais incluem inunda\xE7\xF5es, inc\xEA\
            ndios, tornados, terremotos, furac\xF5es, terrorismo, vandalismo, pulso\
            \ eletromagn\xE9tico, interfer\xEAncia el\xE9trica e outras formas de\
            \ radia\xE7\xE3o eletromagn\xE9tica incidente. A localiza\xE7\xE3o dos\
            \ componentes do sistema dentro da instala\xE7\xE3o \xE9 tratada em PE-18."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      assessable: false
      depth: 1
      ref_id: PL
      name: Planning
      translations:
        pt:
          name: Planejamento
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] planning policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the planning policy and
        the associated planning controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the planning policy and procedures;
        and

        c. Review and update the current planning:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Planning policy and procedures for the controls in the PL family
        implemented within systems and organizations. The risk management strategy
        is an important factor in establishing such policies and procedures. Policies
        and procedures contribute to security and privacy assurance. Therefore, it
        is important that security and privacy programs collaborate on their development.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission level or
        system-specific policies and procedures. The policy can be included as part
        of the general security and privacy policy or be represented by multiple policies
        that reflect the complex nature of organizations. Procedures can be established
        for security and privacy programs, for mission/business processes, and for
        systems, if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to planning
        policy and procedures include, but are not limited to, assessment or audit
        findings, security incidents or breaches, or changes in laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Simply restating
        controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de planejamento [Sele\xE7\xE3o (um ou mais): em n\xEDvel organizacional;\
            \ em n\xEDvel de processo de miss\xE3o/neg\xF3cio; em n\xEDvel de sistema]\
            \ que:\n(a) Trate de prop\xF3sito, escopo, fun\xE7\xF5es, responsabilidades,\
            \ comprometimento da dire\xE7\xE3o, coordena\xE7\xE3o entre entidades\
            \ organizacionais e conformidade; e\n(b) Seja consistente com leis, ordens\
            \ executivas, diretivas, regulamentos, pol\xEDticas, normas e diretrizes\
            \ aplic\xE1veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3\
            o da pol\xEDtica de planejamento e dos controles de planejamento associados;\n\
            b. Designar um [Atribui\xE7\xE3o: funcion\xE1rio definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de planejamento; e\nc. Revisar\
            \ e atualizar o planejamento atual:\n1. Pol\xEDtica [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "Pol\xEDtica e procedimentos de planejamento para os controles\
            \ da fam\xEDlia PL implementados dentro de sistemas e organiza\xE7\xF5\
            es. A estrat\xE9gia de gest\xE3o de riscos \xE9 um fator importante no\
            \ estabelecimento de tais pol\xEDticas e procedimentos. Pol\xEDticas e\
            \ procedimentos contribuem para a garantia de seguran\xE7a e privacidade.\
            \ Portanto, \xE9 importante que os programas de seguran\xE7a e privacidade\
            \ colaborem em seu desenvolvimento. Pol\xEDticas e procedimentos dos programas\
            \ de seguran\xE7a e privacidade em n\xEDvel organizacional s\xE3o prefer\xED\
            veis, em geral, e podem tornar desnecess\xE1rias pol\xEDticas e procedimentos\
            \ em n\xEDvel de miss\xE3o ou espec\xEDficos de sistema. A pol\xEDtica\
            \ pode ser inclu\xEDda como parte da pol\xEDtica geral de seguran\xE7\
            a e privacidade ou ser representada por m\xFAltiplas pol\xEDticas que\
            \ reflitam a natureza complexa das organiza\xE7\xF5es. Procedimentos podem\
            \ ser estabelecidos para programas de seguran\xE7a e privacidade, para\
            \ processos de miss\xE3o/neg\xF3cio e para sistemas, se necess\xE1rio.\
            \ Os procedimentos descrevem como as pol\xEDticas ou controles s\xE3o\
            \ implementados e podem ser direcionados ao indiv\xEDduo ou \xE0 fun\xE7\
            \xE3o que \xE9 objeto do procedimento. Os procedimentos podem ser documentados\
            \ nos planos de seguran\xE7a e privacidade do sistema ou em um ou mais\
            \ documentos separados. Eventos que podem precipitar uma atualiza\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de planejamento incluem, mas n\xE3\
            o se limitam a, constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes\
            \ ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7as em leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes. A simples\
            \ repeti\xE7\xE3o dos controles n\xE3o constitui uma pol\xEDtica ou procedimento\
            \ organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-2
      name: System Security and Privacy Plans
      description: "a. Develop security and privacy plans for the system that:\n1.\
        \ Are consistent with the organization\u2019s enterprise architecture;\n2.\
        \ Explicitly define the constituent system components;\n3. Describe the operational\
        \ context of the system in terms of mission and business processes;\n4. Identify\
        \ the individuals that fulfill system roles and responsibilities;\n5. Identify\
        \ the information types processed, stored, and transmitted by the system;\n\
        6. Provide the security categorization of the system, including supporting\
        \ rationale;\n7. Describe any specific threats to the system that are of concern\
        \ to the organization; \n8. Provide the results of a privacy risk assessment\
        \ for systems processing personally identifiable information;\n9. Describe\
        \ the operational environment for the system and any dependencies on or connections\
        \ to other systems or system components;\n10. Provide an overview of the security\
        \ and privacy requirements for the system;\n11. Identify any relevant control\
        \ baselines or overlays, if applicable;\n12. Describe the controls in place\
        \ or planned for meeting the security and privacy requirements, including\
        \ a rationale for any tailoring decisions;\n13. Include risk determinations\
        \ for security and privacy architecture and design decisions;\n14. Include\
        \ security- and privacy-related activities affecting the system that require\
        \ planning and coordination with [Assignment: organization-defined individuals\
        \ or groups]; and\n15. Are reviewed and approved by the authorizing official\
        \ or designated representative prior to plan implementation.\nb. Distribute\
        \ copies of the plans and communicate subsequent changes to the plans to [Assignment:\
        \ organization-defined personnel or roles];\nc. Review the plans [Assignment:\
        \ organization-defined frequency]; \nd. Update the plans to address changes\
        \ to the system and environment of operation or problems identified during\
        \ plan implementation or control assessments; and\ne. Protect the plans from\
        \ unauthorized disclosure and modification."
      annotation: "System security and privacy plans are scoped to the system and\
        \ system components within the defined authorization boundary and contain\
        \ an overview of the security and privacy requirements for the system and\
        \ the controls selected to satisfy the requirements. The plans describe the\
        \ intended application of each selected control in the context of the system\
        \ with a sufficient level of detail to correctly implement the control and\
        \ to subsequently assess the effectiveness of the control. The control documentation\
        \ describes how system-specific and hybrid controls are implemented and the\
        \ plans and expectations regarding the functionality of the system. System\
        \ security and privacy plans can also be used in the design and development\
        \ of systems in support of life cycle-based security and privacy engineering\
        \ processes. System security and privacy plans are living documents that are\
        \ updated and adapted throughout the system development life cycle (e.g.,\
        \ during capability determination, analysis of alternatives, requests for\
        \ proposal, and design reviews). Section 2.1 describes the different types\
        \ of requirements that are relevant to organizations during the system development\
        \ life cycle and the relationship between requirements and controls.\nOrganizations\
        \ may develop a single, integrated security and privacy plan or maintain separate\
        \ plans. Security and privacy plans relate security and privacy requirements\
        \ to a set of controls and control enhancements. The plans describe how the\
        \ controls and control enhancements meet the security and privacy requirements\
        \ but do not provide detailed, technical descriptions of the design or implementation\
        \ of the controls and control enhancements. Security and privacy plans contain\
        \ sufficient information (including specifications of control parameter values\
        \ for selection and assignment operations explicitly or by reference) to enable\
        \ a design and implementation that is unambiguously compliant with the intent\
        \ of the plans and subsequent determinations of risk to organizational operations\
        \ and assets, individuals, other organizations, and the Nation if the plan\
        \ is implemented.\nSecurity and privacy plans need not be single documents.\
        \ The plans can be a collection of various documents, including documents\
        \ that already exist. Effective security and privacy plans make extensive\
        \ use of references to policies, procedures, and additional documents, including\
        \ design and implementation specifications where more detailed information\
        \ can be obtained. The use of references helps reduce the documentation associated\
        \ with security and privacy programs and maintains the security- and privacy-related\
        \ information in other established management and operational areas, including\
        \ enterprise architecture, system development life cycle, systems engineering,\
        \ and acquisition. Security and privacy plans need not contain detailed contingency\
        \ plan or incident response plan information but can instead provide\u2014\
        explicitly or by reference\u2014sufficient information to define what needs\
        \ to be accomplished by those plans.\nSecurity- and privacy-related activities\
        \ that may require coordination and planning with other individuals or groups\
        \ within the organization include assessments, audits, inspections, hardware\
        \ and software maintenance, acquisition and supply chain risk management,\
        \ patch management, and contingency plan testing. Planning and coordination\
        \ include emergency and nonemergency (i.e., planned or non-urgent unplanned)\
        \ situations. The process defined by organizations to plan and coordinate\
        \ security- and privacy-related activities can also be included in other documents,\
        \ as appropriate."
      translations:
        pt:
          name: "Planos de Seguran\xE7a e Privacidade do Sistema"
          description: "a. Desenvolver planos de seguran\xE7a e privacidade para o\
            \ sistema que:\n1. Sejam consistentes com a arquitetura corporativa da\
            \ organiza\xE7\xE3o;\n2. Definam explicitamente os componentes constituintes\
            \ do sistema;\n3. Descrevam o contexto operacional do sistema em termos\
            \ de processos de miss\xE3o e de neg\xF3cio;\n4. Identifiquem os indiv\xED\
            duos que desempenham as fun\xE7\xF5es e responsabilidades do sistema;\n\
            5. Identifiquem os tipos de informa\xE7\xE3o processados, armazenados\
            \ e transmitidos pelo sistema;\n6. Forne\xE7am a categoriza\xE7\xE3o de\
            \ seguran\xE7a do sistema, incluindo a justificativa de apoio;\n7. Descrevam\
            \ quaisquer amea\xE7as espec\xEDficas ao sistema que sejam de preocupa\xE7\
            \xE3o para a organiza\xE7\xE3o;\n8. Forne\xE7am os resultados de uma avalia\xE7\
            \xE3o de risco de privacidade para sistemas que processam informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal;\n9. Descrevam o ambiente operacional\
            \ do sistema e quaisquer depend\xEAncias de ou conex\xF5es com outros\
            \ sistemas ou componentes de sistema;\n10. Forne\xE7am uma vis\xE3o geral\
            \ dos requisitos de seguran\xE7a e privacidade do sistema;\n11. Identifiquem\
            \ quaisquer baselines de controle ou overlays relevantes, se aplic\xE1\
            vel;\n12. Descrevam os controles em vigor ou planejados para atender aos\
            \ requisitos de seguran\xE7a e privacidade, incluindo a justificativa\
            \ para quaisquer decis\xF5es de personaliza\xE7\xE3o (tailoring);\n13.\
            \ Incluam determina\xE7\xF5es de risco para decis\xF5es de arquitetura\
            \ e projeto de seguran\xE7a e privacidade;\n14. Incluam atividades relacionadas\
            \ a seguran\xE7a e privacidade que afetem o sistema e que exijam planejamento\
            \ e coordena\xE7\xE3o com [Atribui\xE7\xE3o: indiv\xEDduos ou grupos definidos\
            \ pela organiza\xE7\xE3o]; e\n15. Sejam revisados e aprovados pela autoridade\
            \ autorizadora ou representante designado antes da implementa\xE7\xE3\
            o do plano.\nb. Distribuir c\xF3pias dos planos e comunicar mudan\xE7\
            as subsequentes nos planos para [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5\
            es definidos pela organiza\xE7\xE3o];\nc. Revisar os planos [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o];\nd. Atualizar os\
            \ planos para tratar de mudan\xE7as no sistema e no ambiente de opera\xE7\
            \xE3o ou de problemas identificados durante a implementa\xE7\xE3o do plano\
            \ ou as avalia\xE7\xF5es de controle; e\ne. Proteger os planos contra\
            \ divulga\xE7\xE3o e modifica\xE7\xE3o n\xE3o autorizadas."
          annotation: "Os planos de seguran\xE7a e privacidade do sistema t\xEAm escopo\
            \ limitado ao sistema e aos componentes do sistema dentro do limite de\
            \ autoriza\xE7\xE3o definido e cont\xEAm uma vis\xE3o geral dos requisitos\
            \ de seguran\xE7a e privacidade do sistema e dos controles selecionados\
            \ para satisfazer esses requisitos. Os planos descrevem a aplica\xE7\xE3\
            o pretendida de cada controle selecionado no contexto do sistema, com\
            \ n\xEDvel de detalhe suficiente para implementar corretamente o controle\
            \ e, subsequentemente, avaliar a efic\xE1cia do controle. A documenta\xE7\
            \xE3o dos controles descreve como os controles espec\xEDficos do sistema\
            \ e h\xEDbridos s\xE3o implementados, bem como os planos e expectativas\
            \ quanto \xE0 funcionalidade do sistema. Os planos de seguran\xE7a e privacidade\
            \ do sistema tamb\xE9m podem ser usados no projeto e desenvolvimento de\
            \ sistemas em apoio a processos de engenharia de seguran\xE7a e privacidade\
            \ baseados no ciclo de vida. Os planos de seguran\xE7a e privacidade do\
            \ sistema s\xE3o documentos vivos que s\xE3o atualizados e adaptados ao\
            \ longo do ciclo de vida de desenvolvimento do sistema (por exemplo, durante\
            \ a determina\xE7\xE3o de capacidade, a an\xE1lise de alternativas, as\
            \ solicita\xE7\xF5es de proposta e as revis\xF5es de projeto). A Se\xE7\
            \xE3o 2.1 descreve os diferentes tipos de requisitos que s\xE3o relevantes\
            \ para as organiza\xE7\xF5es durante o ciclo de vida de desenvolvimento\
            \ do sistema e a rela\xE7\xE3o entre requisitos e controles.\nAs organiza\xE7\
            \xF5es podem desenvolver um \xFAnico plano integrado de seguran\xE7a e\
            \ privacidade ou manter planos separados. Os planos de seguran\xE7a e\
            \ privacidade relacionam os requisitos de seguran\xE7a e privacidade a\
            \ um conjunto de controles e aprimoramentos de controle. Os planos descrevem\
            \ como os controles e aprimoramentos de controle atendem aos requisitos\
            \ de seguran\xE7a e privacidade, mas n\xE3o fornecem descri\xE7\xF5es\
            \ t\xE9cnicas detalhadas do projeto ou da implementa\xE7\xE3o dos controles\
            \ e aprimoramentos de controle. Os planos de seguran\xE7a e privacidade\
            \ cont\xEAm informa\xE7\xF5es suficientes (incluindo especifica\xE7\xF5\
            es de valores de par\xE2metros de controle para opera\xE7\xF5es de sele\xE7\
            \xE3o e atribui\xE7\xE3o, explicitamente ou por refer\xEAncia) para permitir\
            \ um projeto e uma implementa\xE7\xE3o que estejam inequivocamente em\
            \ conformidade com a inten\xE7\xE3o dos planos e com as determina\xE7\xF5\
            es subsequentes de risco \xE0s opera\xE7\xF5es e ativos organizacionais,\
            \ aos indiv\xEDduos, a outras organiza\xE7\xF5es e \xE0 Na\xE7\xE3o, caso\
            \ o plano seja implementado.\nOs planos de seguran\xE7a e privacidade\
            \ n\xE3o precisam ser documentos \xFAnicos. Os planos podem ser uma cole\xE7\
            \xE3o de v\xE1rios documentos, incluindo documentos j\xE1 existentes.\
            \ Planos de seguran\xE7a e privacidade eficazes fazem uso extensivo de\
            \ refer\xEAncias a pol\xEDticas, procedimentos e documentos adicionais,\
            \ incluindo especifica\xE7\xF5es de projeto e implementa\xE7\xE3o onde\
            \ informa\xE7\xF5es mais detalhadas podem ser obtidas. O uso de refer\xEA\
            ncias ajuda a reduzir a documenta\xE7\xE3o associada aos programas de\
            \ seguran\xE7a e privacidade e mant\xE9m as informa\xE7\xF5es relacionadas\
            \ a seguran\xE7a e privacidade em outras \xE1reas de gest\xE3o e operacionais\
            \ j\xE1 estabelecidas, incluindo arquitetura corporativa, ciclo de vida\
            \ de desenvolvimento do sistema, engenharia de sistemas e aquisi\xE7\xE3\
            o. Os planos de seguran\xE7a e privacidade n\xE3o precisam conter informa\xE7\
            \xF5es detalhadas de plano de conting\xEAncia ou plano de resposta a incidentes,\
            \ mas podem, em vez disso, fornecer \u2014 explicitamente ou por refer\xEA\
            ncia \u2014 informa\xE7\xF5es suficientes para definir o que precisa ser\
            \ realizado por esses planos.\nAtividades relacionadas a seguran\xE7a\
            \ e privacidade que podem exigir coordena\xE7\xE3o e planejamento com\
            \ outros indiv\xEDduos ou grupos dentro da organiza\xE7\xE3o incluem avalia\xE7\
            \xF5es, auditorias, inspe\xE7\xF5es, manuten\xE7\xE3o de hardware e software,\
            \ aquisi\xE7\xE3o e gest\xE3o de risco da cadeia de suprimentos, gest\xE3\
            o de patches e testes de plano de conting\xEAncia. O planejamento e a\
            \ coordena\xE7\xE3o incluem situa\xE7\xF5es de emerg\xEAncia e de n\xE3\
            o emerg\xEAncia (ou seja, situa\xE7\xF5es planejadas ou n\xE3o urgentes\
            \ e n\xE3o planejadas). O processo definido pelas organiza\xE7\xF5es para\
            \ planejar e coordenar atividades relacionadas a seguran\xE7a e privacidade\
            \ tamb\xE9m pode ser inclu\xEDdo em outros documentos, conforme apropriado."

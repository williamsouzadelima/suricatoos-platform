    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-3(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-3(6)
      name: Information Exchange | Transfer Authorizations
      description: Verify that individuals or systems transferring data between interconnecting
        systems have the requisite authorizations (i.e., write permissions or privileges)
        prior to accepting such data.
      annotation: "To prevent unauthorized individuals and systems from making information\
        \ transfers to protected systems, the protected system verifies\u2014via independent\
        \ means\u2014 whether the individual or system attempting to transfer information\
        \ is authorized to do so. Verification of the authorization to transfer information\
        \ also applies to control plane traffic (e.g., routing and DNS) and services\
        \ (e.g., authenticated SMTP relays)."
      translations:
        pt:
          name: "Interc\xE2mbio de Informa\xE7\xF5es | Autoriza\xE7\xF5es de Transfer\xEA\
            ncia"
          description: "Verificar que os indiv\xEDduos ou sistemas que transferem\
            \ dados entre sistemas interconectados possuem as autoriza\xE7\xF5es requeridas\
            \ (ou seja, permiss\xF5es ou privil\xE9gios de escrita) antes de aceitar\
            \ tais dados."
          annotation: "Para impedir que indiv\xEDduos e sistemas n\xE3o autorizados\
            \ realizem transfer\xEAncias de informa\xE7\xF5es para sistemas protegidos,\
            \ o sistema protegido verifica \u2014 por meios independentes \u2014 se\
            \ o indiv\xEDduo ou sistema que tenta transferir informa\xE7\xF5es est\xE1\
            \ autorizado a faz\xEA-lo. A verifica\xE7\xE3o da autoriza\xE7\xE3o para\
            \ transferir informa\xE7\xF5es tamb\xE9m se aplica ao tr\xE1fego do plano\
            \ de controle (por exemplo, roteamento e DNS) e aos servi\xE7os (por exemplo,\
            \ relays SMTP autenticados)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-3(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-3(7)
      name: Information Exchange | Transitive Information Exchanges
      description: '(a) Identify transitive (downstream) information exchanges with
        other systems through the systems identified in CA-3a; and

        (b) Take measures to ensure that transitive (downstream) information exchanges
        cease when the controls on identified transitive (downstream) systems cannot
        be verified or validated.'
      annotation: Transitive or downstream information exchanges are information exchanges
        between the system or systems with which the organizational system exchanges
        information and other systems. For mission-essential systems, services, and
        applications, including high value assets, it is necessary to identify such
        information exchanges. The transparency of the controls or protection measures
        in place in such downstream systems connected directly or indirectly to organizational
        systems is essential to understanding the security and privacy risks resulting
        from those information exchanges. Organizational systems can inherit risk
        from downstream systems through transitive connections and information exchanges,
        which can make the organizational systems more susceptible to threats, hazards,
        and adverse impacts.
      translations:
        pt:
          name: "Interc\xE2mbio de Informa\xE7\xF5es | Interc\xE2mbios de Informa\xE7\
            \xF5es Transitivos"
          description: "(a) Identificar interc\xE2mbios de informa\xE7\xF5es transitivos\
            \ (a jusante) com outros sistemas por meio dos sistemas identificados\
            \ no CA-3a; e\n(b) Adotar medidas para assegurar que os interc\xE2mbios\
            \ de informa\xE7\xF5es transitivos (a jusante) cessem quando os controles\
            \ nos sistemas transitivos (a jusante) identificados n\xE3o puderem ser\
            \ verificados ou validados."
          annotation: "Os interc\xE2mbios de informa\xE7\xF5es transitivos ou a jusante\
            \ s\xE3o interc\xE2mbios de informa\xE7\xF5es entre o sistema ou sistemas\
            \ com os quais o sistema organizacional intercambia informa\xE7\xF5es\
            \ e outros sistemas. Para sistemas, servi\xE7os e aplica\xE7\xF5es essenciais\
            \ \xE0 miss\xE3o, incluindo ativos de alto valor, \xE9 necess\xE1rio identificar\
            \ tais interc\xE2mbios de informa\xE7\xF5es. A transpar\xEAncia dos controles\
            \ ou medidas de prote\xE7\xE3o em vigor em tais sistemas a jusante conectados\
            \ direta ou indiretamente aos sistemas organizacionais \xE9 essencial\
            \ para compreender os riscos de seguran\xE7a e privacidade resultantes\
            \ desses interc\xE2mbios de informa\xE7\xF5es. Os sistemas organizacionais\
            \ podem herdar risco de sistemas a jusante por meio de conex\xF5es transitivas\
            \ e interc\xE2mbios de informa\xE7\xF5es, o que pode tornar os sistemas\
            \ organizacionais mais suscet\xEDveis a amea\xE7as, perigos e impactos\
            \ adversos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-4
      name: Security Certification

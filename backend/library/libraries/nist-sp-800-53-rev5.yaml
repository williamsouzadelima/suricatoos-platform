    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15
      name: Development Process, Standards, and Tools
      description: 'a. Require the developer of the system, system component, or system
        service to follow a documented development process that:

        1. Explicitly addresses security and privacy requirements;

        2. Identifies the standards and tools used in the development process;

        3. Documents the specific tool options and tool configurations used in the
        development process; and

        4. Documents, manages, and ensures the integrity of changes to the process
        and/or tools used in development; and

        b. Review the development process, standards, tools, tool options, and tool
        configurations [Assignment: organization-defined frequency] to determine if
        the process, standards, tools, tool options and tool configurations selected
        and employed can satisfy the following security and privacy requirements:
        [Assignment: organization-defined security and privacy requirements].'
      annotation: Development tools include programming languages and computer-aided
        design systems. Reviews of development processes include the use of maturity
        models to determine the potential effectiveness of such processes. Maintaining
        the integrity of changes to tools and processes facilitates effective supply
        chain risk assessment and mitigation. Such integrity requires configuration
        control throughout the system development life cycle to track authorized changes
        and prevent unauthorized changes.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento"
          description: "a. Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema siga um processo de desenvolvimento documentado\
            \ que:\n1. Aborde explicitamente os requisitos de seguran\xE7a e privacidade;\n\
            2. Identifique os padr\xF5es e as ferramentas usados no processo de desenvolvimento;\n\
            3. Documente as op\xE7\xF5es espec\xEDficas de ferramentas e as configura\xE7\
            \xF5es de ferramentas usadas no processo de desenvolvimento; e\n4. Documente,\
            \ gerencie e assegure a integridade das altera\xE7\xF5es no processo e/ou\
            \ nas ferramentas usados no desenvolvimento; e\nb. Revisar o processo\
            \ de desenvolvimento, os padr\xF5es, as ferramentas, as op\xE7\xF5es de\
            \ ferramentas e as configura\xE7\xF5es de ferramentas [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o] para determinar se o\
            \ processo, os padr\xF5es, as ferramentas, as op\xE7\xF5es de ferramentas\
            \ e as configura\xE7\xF5es de ferramentas selecionados e empregados podem\
            \ satisfazer os seguintes requisitos de seguran\xE7a e privacidade: [Atribui\xE7\
            \xE3o: requisitos de seguran\xE7a e privacidade definidos pela organiza\xE7\
            \xE3o]."
          annotation: "As ferramentas de desenvolvimento incluem linguagens de programa\xE7\
            \xE3o e sistemas de projeto assistido por computador. As revis\xF5es dos\
            \ processos de desenvolvimento incluem o uso de modelos de maturidade\
            \ para determinar a efic\xE1cia potencial de tais processos. Manter a\
            \ integridade das altera\xE7\xF5es nas ferramentas e nos processos facilita\
            \ a avalia\xE7\xE3o e a mitiga\xE7\xE3o eficazes de riscos da cadeia de\
            \ suprimentos. Tal integridade requer controle de configura\xE7\xE3o ao\
            \ longo de todo o ciclo de vida de desenvolvimento do sistema para rastrear\
            \ altera\xE7\xF5es autorizadas e prevenir altera\xE7\xF5es n\xE3o autorizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(1)
      name: Development Process, Standards, and Tools | Quality Metrics
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Define quality metrics at the beginning of the development process; and

        (b) Provide evidence of meeting the quality metrics [Selection (one or more):
        [Assignment: organization-defined frequency]; [Assignment: organization-defined
        program review milestones]; upon delivery].'
      annotation: Organizations use quality metrics to establish acceptable levels
        of system quality. Metrics can include quality gates, which are collections
        of completion criteria or sufficiency standards that represent the satisfactory
        execution of specific phases of the system development project. For example,
        a quality gate may require the elimination of all compiler warnings or a determination
        that such warnings have no impact on the effectiveness of required security
        or privacy capabilities. During the execution phases of development projects,
        quality gates provide clear, unambiguous indications of progress. Other metrics
        apply to the entire development project. Metrics can include defining the
        severity thresholds of vulnerabilities in accordance with organizational risk
        tolerance, such as requiring no known vulnerabilities in the delivered system
        with a Common Vulnerability Scoring System (CVSS) severity of medium or high.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | M\xE9tricas\
            \ de Qualidade"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Defina m\xE9tricas de qualidade no in\xED\
            cio do processo de desenvolvimento; e\n(b) Forne\xE7a evid\xEAncia do\
            \ cumprimento das m\xE9tricas de qualidade [Sele\xE7\xE3o (um ou mais):\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]; [Atribui\xE7\
            \xE3o: marcos de revis\xE3o do programa definidos pela organiza\xE7\xE3\
            o]; na entrega]."
          annotation: "As organiza\xE7\xF5es usam m\xE9tricas de qualidade para estabelecer\
            \ n\xEDveis aceit\xE1veis de qualidade do sistema. As m\xE9tricas podem\
            \ incluir port\xF5es de qualidade (quality gates), que s\xE3o conjuntos\
            \ de crit\xE9rios de conclus\xE3o ou padr\xF5es de sufici\xEAncia que\
            \ representam a execu\xE7\xE3o satisfat\xF3ria de fases espec\xEDficas\
            \ do projeto de desenvolvimento do sistema. Por exemplo, um port\xE3o\
            \ de qualidade pode exigir a elimina\xE7\xE3o de todos os avisos do compilador\
            \ ou a determina\xE7\xE3o de que tais avisos n\xE3o t\xEAm impacto na\
            \ efic\xE1cia das capacidades de seguran\xE7a ou privacidade exigidas.\
            \ Durante as fases de execu\xE7\xE3o dos projetos de desenvolvimento,\
            \ os port\xF5es de qualidade fornecem indica\xE7\xF5es claras e inequ\xED\
            vocas de progresso. Outras m\xE9tricas aplicam-se a todo o projeto de\
            \ desenvolvimento. As m\xE9tricas podem incluir a defini\xE7\xE3o dos\
            \ limiares de severidade das vulnerabilidades de acordo com a toler\xE2\
            ncia a risco organizacional, como exigir que n\xE3o haja vulnerabilidades\
            \ conhecidas no sistema entregue com severidade m\xE9dia ou alta no Common\
            \ Vulnerability Scoring System (CVSS)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(2)
      name: Development Process, Standards, and Tools | Security and Privacy Tracking
        Tools
      description: Require the developer of the system, system component, or system
        service to select and employ security and privacy tracking tools for use during
        the development process.
      annotation: System development teams select and deploy security and privacy
        tracking tools, including vulnerability or work item tracking systems that
        facilitate assignment, sorting, filtering, and tracking of completed work
        items or tasks associated with development processes.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Ferramentas\
            \ de Rastreamento de Seguran\xE7a e Privacidade"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema selecione e empregue ferramentas de rastreamento\
            \ de seguran\xE7a e privacidade para uso durante o processo de desenvolvimento."
          annotation: "As equipes de desenvolvimento de sistemas selecionam e implantam\
            \ ferramentas de rastreamento de seguran\xE7a e privacidade, incluindo\
            \ sistemas de rastreamento de vulnerabilidades ou de itens de trabalho\
            \ que facilitam a atribui\xE7\xE3o, classifica\xE7\xE3o, filtragem e o\
            \ rastreamento de itens de trabalho ou tarefas conclu\xEDdas associadas\
            \ aos processos de desenvolvimento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(3)
      name: Development Process, Standards, and Tools | Criticality Analysis
      description: 'Require the developer of the system, system component, or system
        service to perform a criticality analysis:

        (a) At the following decision points in the system development life cycle:
        [Assignment: organization-defined decision points in the system development
        life cycle]; and

        (b) At the following level of rigor: [Assignment: organization-defined breadth
        and depth of criticality analysis].'
      annotation: Criticality analysis performed by the developer provides input to
        the criticality analysis performed by organizations. Developer input is essential
        to organizational criticality analysis because organizations may not have
        access to detailed design documentation for system components that are developed
        as commercial off-the-shelf products. Such design documentation includes functional
        specifications, high-level designs, low-level designs, source code, and hardware
        schematics. Criticality analysis is important for organizational systems that
        are designated as high value assets. High value assets can be moderate- or
        high-impact systems due to heightened adversarial interest or potential adverse
        effects on the federal enterprise. Developer input is especially important
        when organizations conduct supply chain criticality analyses.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | An\xE1lise\
            \ de Criticidade"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema realize uma an\xE1lise de criticidade:\n(a)\
            \ Nos seguintes pontos de decis\xE3o do ciclo de vida de desenvolvimento\
            \ do sistema: [Atribui\xE7\xE3o: pontos de decis\xE3o do ciclo de vida\
            \ de desenvolvimento do sistema definidos pela organiza\xE7\xE3o]; e\n\
            (b) No seguinte n\xEDvel de rigor: [Atribui\xE7\xE3o: abrang\xEAncia e\
            \ profundidade da an\xE1lise de criticidade definidas pela organiza\xE7\
            \xE3o]."
          annotation: "A an\xE1lise de criticidade realizada pelo desenvolvedor fornece\
            \ entrada para a an\xE1lise de criticidade realizada pelas organiza\xE7\
            \xF5es. A entrada do desenvolvedor \xE9 essencial para a an\xE1lise de\
            \ criticidade organizacional porque as organiza\xE7\xF5es podem n\xE3\
            o ter acesso \xE0 documenta\xE7\xE3o detalhada de projeto dos componentes\
            \ de sistema que s\xE3o desenvolvidos como produtos comerciais de prateleira\
            \ (COTS). Tal documenta\xE7\xE3o de projeto inclui especifica\xE7\xF5\
            es funcionais, projetos de alto n\xEDvel, projetos de baixo n\xEDvel,\
            \ c\xF3digo-fonte e esquemas de hardware. A an\xE1lise de criticidade\
            \ \xE9 importante para sistemas organizacionais designados como ativos\
            \ de alto valor. Os ativos de alto valor podem ser sistemas de impacto\
            \ moderado ou alto devido ao elevado interesse advers\xE1rio ou aos potenciais\
            \ efeitos adversos sobre o empreendimento federal. A entrada do desenvolvedor\
            \ \xE9 especialmente importante quando as organiza\xE7\xF5es conduzem\
            \ an\xE1lises de criticidade da cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-19(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-19(3)
      name: Component Authenticity | Component Disposal
      description: '[Withdrawn: Moved to SR-12.]'
      translations:
        pt:
          name: Autenticidade de Componentes | Descarte de Componentes
          description: '[Retirado: Movido para SR-12.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(5)
      name: Development Process, Standards, and Tools | Attack Surface Reduction
      description: 'Require the developer of the system, system component, or system
        service to reduce attack surfaces to [Assignment: organization-defined thresholds].'
      annotation: Attack surface reduction is closely aligned with threat and vulnerability
        analyses and system architecture and design. Attack surface reduction is a
        means of reducing risk to organizations by giving attackers less opportunity
        to exploit weaknesses or deficiencies (i.e., potential vulnerabilities) within
        systems, system components, and system services. Attack surface reduction
        includes implementing the concept of layered defenses, applying the principles
        of least privilege and least functionality, applying secure software development
        practices, deprecating unsafe functions, reducing entry points available to
        unauthorized users, reducing the amount of code that executes, and eliminating
        application programming interfaces (APIs) that are vulnerable to attacks.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Redu\xE7\xE3\
            o da Superf\xEDcie de Ataque"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema reduza as superf\xEDcies de ataque para [Atribui\xE7\
            \xE3o: limiares definidos pela organiza\xE7\xE3o]."
          annotation: "A redu\xE7\xE3o da superf\xEDcie de ataque est\xE1 estreitamente\
            \ alinhada com as an\xE1lises de amea\xE7as e vulnerabilidades e com a\
            \ arquitetura e o projeto do sistema. A redu\xE7\xE3o da superf\xEDcie\
            \ de ataque \xE9 um meio de reduzir o risco para as organiza\xE7\xF5es\
            \ ao dar aos atacantes menos oportunidades de explorar fraquezas ou defici\xEA\
            ncias (ou seja, potenciais vulnerabilidades) em sistemas, componentes\
            \ de sistema e servi\xE7os de sistema. A redu\xE7\xE3o da superf\xEDcie\
            \ de ataque inclui a implementa\xE7\xE3o do conceito de defesas em camadas,\
            \ a aplica\xE7\xE3o dos princ\xEDpios de menor privil\xE9gio e menor funcionalidade,\
            \ a aplica\xE7\xE3o de pr\xE1ticas de desenvolvimento seguro de software,\
            \ a descontinua\xE7\xE3o de fun\xE7\xF5es inseguras, a redu\xE7\xE3o dos\
            \ pontos de entrada dispon\xEDveis a usu\xE1rios n\xE3o autorizados, a\
            \ redu\xE7\xE3o da quantidade de c\xF3digo que \xE9 executada e a elimina\xE7\
            \xE3o de interfaces de programa\xE7\xE3o de aplica\xE7\xF5es (APIs) que\
            \ sejam vulner\xE1veis a ataques."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(6)
      name: Development Process, Standards, and Tools | Continuous Improvement
      description: Require the developer of the system, system component, or system
        service to implement an explicit process to continuously improve the development
        process.
      annotation: Developers of systems, system components, and system services consider
        the effectiveness and efficiency of their development processes for meeting
        quality objectives and addressing the security and privacy capabilities in
        current threat environments.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Melhoria\
            \ Cont\xEDnua"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema implemente um processo expl\xEDcito para melhorar\
            \ continuamente o processo de desenvolvimento."
          annotation: "Os desenvolvedores de sistemas, componentes de sistema e servi\xE7\
            os de sistema consideram a efic\xE1cia e a efici\xEAncia de seus processos\
            \ de desenvolvimento para o cumprimento dos objetivos de qualidade e o\
            \ atendimento das capacidades de seguran\xE7a e privacidade nos ambientes\
            \ de amea\xE7a atuais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(7)
      name: Development Process, Standards, and Tools | Automated Vulnerability Analysis
      description: 'Require the developer of the system, system component, or system
        service [Assignment: organization-defined frequency] to:

        (a) Perform an automated vulnerability analysis using [Assignment: organization-defined
        tools];

        (b) Determine the exploitation potential for discovered vulnerabilities;

        (c) Determine potential risk mitigations for delivered vulnerabilities; and

        (d) Deliver the outputs of the tools and results of the analysis to [Assignment:
        organization-defined personnel or roles].'
      annotation: Automated tools can be more effective at analyzing exploitable weaknesses
        or deficiencies in large and complex systems, prioritizing vulnerabilities
        by severity, and providing recommendations for risk mitigations.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | An\xE1lise\
            \ Automatizada de Vulnerabilidade"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o]:\n(a) Realize uma an\xE1lise automatizada de vulnerabilidade\
            \ usando [Atribui\xE7\xE3o: ferramentas definidas pela organiza\xE7\xE3\
            o];\n(b) Determine o potencial de explora\xE7\xE3o das vulnerabilidades\
            \ descobertas;\n(c) Determine potenciais mitiga\xE7\xF5es de risco para\
            \ as vulnerabilidades entregues; e\n(d) Entregue as sa\xEDdas das ferramentas\
            \ e os resultados da an\xE1lise a [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "Ferramentas automatizadas podem ser mais eficazes na an\xE1\
            lise de fraquezas ou defici\xEAncias explor\xE1veis em sistemas grandes\
            \ e complexos, na prioriza\xE7\xE3o de vulnerabilidades por severidade\
            \ e no fornecimento de recomenda\xE7\xF5es de mitiga\xE7\xE3o de risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(8)
      name: Development Process, Standards, and Tools | Reuse of Threat and Vulnerability
        Information
      description: Require the developer of the system, system component, or system
        service to use threat modeling and vulnerability analyses from similar systems,
        components, or services to inform the current development process.
      annotation: Analysis of vulnerabilities found in similar software applications
        can inform potential design and implementation issues for systems under development.
        Similar systems or system components may exist within developer organizations.
        Vulnerability information is available from a variety of public and private
        sector sources, including the NIST National Vulnerability Database.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Reutiliza\xE7\
            \xE3o de Informa\xE7\xF5es de Amea\xE7a e Vulnerabilidade"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema use modelagem de amea\xE7as e an\xE1lises de\
            \ vulnerabilidade de sistemas, componentes ou servi\xE7os similares para\
            \ informar o processo de desenvolvimento atual."
          annotation: "A an\xE1lise de vulnerabilidades encontradas em aplica\xE7\xF5\
            es de software similares pode informar potenciais problemas de projeto\
            \ e implementa\xE7\xE3o para sistemas em desenvolvimento. Sistemas ou\
            \ componentes de sistema similares podem existir dentro das organiza\xE7\
            \xF5es desenvolvedoras. As informa\xE7\xF5es de vulnerabilidade est\xE3\
            o dispon\xEDveis em uma variedade de fontes dos setores p\xFAblico e privado,\
            \ incluindo o National Vulnerability Database do NIST."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-19(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-19(4)
      name: Component Authenticity | Anti-counterfeit Scanning
      description: '[Withdrawn: Moved to SR-11(3).]'
      translations:
        pt:
          name: "Autenticidade de Componentes | Verifica\xE7\xE3o Antifalsifica\xE7\
            \xE3o"
          description: '[Retirado: Movido para SR-11(3).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(10)
      name: Development Process, Standards, and Tools | Incident Response Plan
      description: Require the developer of the system, system component, or system
        service to provide, implement, and test an incident response plan.
      annotation: The incident response plan provided by developers may provide information
        not readily available to organizations and be incorporated into organizational
        incident response plans. Developer information may also be extremely helpful,
        such as when organizations respond to vulnerabilities in commercial off-the-shelf
        products.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Plano de\
            \ Resposta a Incidentes"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema forne\xE7a, implemente e teste um plano de\
            \ resposta a incidentes."
          annotation: "O plano de resposta a incidentes fornecido pelos desenvolvedores\
            \ pode disponibilizar informa\xE7\xF5es que n\xE3o est\xE3o prontamente\
            \ acess\xEDveis \xE0s organiza\xE7\xF5es e ser incorporado aos planos\
            \ organizacionais de resposta a incidentes. As informa\xE7\xF5es do desenvolvedor\
            \ tamb\xE9m podem ser extremamente \xFAteis, como quando as organiza\xE7\
            \xF5es respondem a vulnerabilidades em produtos comerciais de prateleira\
            \ (COTS)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(11)
      name: Development Process, Standards, and Tools | Archive System or Component
      description: Require the developer of the system or system component to archive
        the system or component to be released or delivered together with the corresponding
        evidence supporting the final security and privacy review.
      annotation: Archiving system or system components requires the developer to
        retain key development artifacts, including hardware specifications, source
        code, object code, and relevant documentation from the development process
        that can provide a readily available configuration baseline for system and
        component upgrades or modifications.
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Arquivar\
            \ Sistema ou Componente"
          description: "Exigir que o desenvolvedor do sistema ou componente de sistema\
            \ arquive o sistema ou componente a ser liberado ou entregue, juntamente\
            \ com a evid\xEAncia correspondente que apoia a revis\xE3o final de seguran\xE7\
            a e privacidade."
          annotation: "O arquivamento do sistema ou componentes de sistema exige que\
            \ o desenvolvedor retenha artefatos-chave de desenvolvimento, incluindo\
            \ especifica\xE7\xF5es de hardware, c\xF3digo-fonte, c\xF3digo-objeto\
            \ e documenta\xE7\xE3o relevante do processo de desenvolvimento que possam\
            \ fornecer uma linha de base de configura\xE7\xE3o prontamente dispon\xED\
            vel para atualiza\xE7\xF5es ou modifica\xE7\xF5es de sistemas e componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-15(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-15(12)
      name: Development Process, Standards, and Tools | Minimize Personally Identifiable
        Information
      description: Require the developer of the system or system component to minimize
        the use of personally identifiable information in development and test environments.
      annotation: "Organizations can minimize the risk to an individual\u2019s privacy\
        \ by using techniques such as de-identification or synthetic data. Limiting\
        \ the use of personally identifiable information in development and test environments\
        \ helps reduce the level of privacy risk created by a system."
      translations:
        pt:
          name: "Processo, Padr\xF5es e Ferramentas de Desenvolvimento | Minimizar\
            \ Informa\xE7\xF5es de Identifica\xE7\xE3o Pessoal"
          description: "Exigir que o desenvolvedor do sistema ou componente de sistema\
            \ minimize o uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal em\
            \ ambientes de desenvolvimento e teste."
          annotation: "As organiza\xE7\xF5es podem minimizar o risco \xE0 privacidade\
            \ de um indiv\xEDduo usando t\xE9cnicas como desidentifica\xE7\xE3o ou\
            \ dados sint\xE9ticos. Limitar o uso de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal em ambientes de desenvolvimento e teste ajuda a reduzir\
            \ o n\xEDvel de risco \xE0 privacidade criado por um sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-16
      name: Developer-provided Training
      description: 'Require the developer of the system, system component, or system
        service to provide the following training on the correct use and operation
        of the implemented security and privacy functions, controls, and/or mechanisms:
        [Assignment: organization-defined training].'
      annotation: Developer-provided training applies to external and internal (in-house)
        developers. Training personnel is essential to ensuring the effectiveness
        of the controls implemented within organizational systems. Types of training
        include web-based and computer-based training, classroom-style training, and
        hands-on training (including micro-training). Organizations can also request
        training materials from developers to conduct in-house training or offer self-training
        to organizational personnel. Organizations determine the type of training
        necessary and may require different types of training for different security
        and privacy functions, controls, and mechanisms.
      translations:
        pt:
          name: Treinamento Fornecido pelo Desenvolvedor
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema forne\xE7a o seguinte treinamento sobre o uso\
            \ e a opera\xE7\xE3o corretos das fun\xE7\xF5es, controles e/ou mecanismos\
            \ de seguran\xE7a e privacidade implementados: [Atribui\xE7\xE3o: treinamento\
            \ definido pela organiza\xE7\xE3o]."
          annotation: "O treinamento fornecido pelo desenvolvedor aplica-se a desenvolvedores\
            \ externos e internos (pr\xF3prios). Treinar o pessoal \xE9 essencial\
            \ para garantir a efic\xE1cia dos controles implementados nos sistemas\
            \ organizacionais. Os tipos de treinamento incluem treinamento baseado\
            \ na web e em computador, treinamento em sala de aula e treinamento pr\xE1\
            tico (incluindo microtreinamento). As organiza\xE7\xF5es tamb\xE9m podem\
            \ solicitar materiais de treinamento aos desenvolvedores para conduzir\
            \ treinamento interno ou oferecer autotreinamento ao pessoal da organiza\xE7\
            \xE3o. As organiza\xE7\xF5es determinam o tipo de treinamento necess\xE1\
            rio e podem exigir diferentes tipos de treinamento para diferentes fun\xE7\
            \xF5es, controles e mecanismos de seguran\xE7a e privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17
      name: Developer Security and Privacy Architecture and Design
      description: "Require the developer of the system, system component, or system\
        \ service to produce a design specification and security and privacy architecture\
        \ that:\na. Is consistent with the organization\u2019s security and privacy\
        \ architecture that is an integral part the organization\u2019s enterprise\
        \ architecture;\nb. Accurately and completely describes the required security\
        \ and privacy functionality, and the allocation of controls among physical\
        \ and logical components; and\nc. Expresses how individual security and privacy\
        \ functions, mechanisms, and services work together to provide required security\
        \ and privacy capabilities and a unified approach to protection."
      annotation: Developer security and privacy architecture and design are directed
        at external developers, although they could also be applied to internal (in-house)
        development. In contrast, PL-8 is directed at internal developers to ensure
        that organizations develop a security and privacy architecture that is integrated
        with the enterprise architecture. The distinction between SA-17 and PL-8 is
        especially important when organizations outsource the development of systems,
        system components, or system services and when there is a requirement to demonstrate
        consistency with the enterprise architecture and security and privacy architecture
        of the organization. ISO 15408-2, ISO 15408-3, and SP 800-160-1 provide information
        on security architecture and design, including formal policy models, security-relevant
        components, formal and informal correspondence, conceptually simple design,
        and structuring for least privilege and testing.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema produza uma especifica\xE7\xE3o de projeto\
            \ e uma arquitetura de seguran\xE7a e privacidade que:\na. Seja consistente\
            \ com a arquitetura de seguran\xE7a e privacidade da organiza\xE7\xE3\
            o, que \xE9 parte integrante da arquitetura corporativa da organiza\xE7\
            \xE3o;\nb. Descreva de forma precisa e completa a funcionalidade de seguran\xE7\
            a e privacidade necess\xE1ria e a aloca\xE7\xE3o de controles entre componentes\
            \ f\xEDsicos e l\xF3gicos; e\nc. Expresse como as fun\xE7\xF5es, mecanismos\
            \ e servi\xE7os individuais de seguran\xE7a e privacidade atuam em conjunto\
            \ para fornecer as capacidades de seguran\xE7a e privacidade necess\xE1\
            rias e uma abordagem unificada de prote\xE7\xE3o."
          annotation: "A arquitetura e o projeto de seguran\xE7a e privacidade do\
            \ desenvolvedor s\xE3o direcionados a desenvolvedores externos, embora\
            \ tamb\xE9m possam ser aplicados ao desenvolvimento interno (pr\xF3prio).\
            \ Em contraste, o PL-8 \xE9 direcionado a desenvolvedores internos para\
            \ garantir que as organiza\xE7\xF5es desenvolvam uma arquitetura de seguran\xE7\
            a e privacidade integrada \xE0 arquitetura corporativa. A distin\xE7\xE3\
            o entre SA-17 e PL-8 \xE9 especialmente importante quando as organiza\xE7\
            \xF5es terceirizam o desenvolvimento de sistemas, componentes de sistema\
            \ ou servi\xE7os de sistema e quando h\xE1 a exig\xEAncia de demonstrar\
            \ consist\xEAncia com a arquitetura corporativa e a arquitetura de seguran\xE7\
            a e privacidade da organiza\xE7\xE3o. ISO 15408-2, ISO 15408-3 e SP 800-160-1\
            \ fornecem informa\xE7\xF5es sobre arquitetura e projeto de seguran\xE7\
            a, incluindo modelos formais de pol\xEDtica, componentes relevantes para\
            \ a seguran\xE7a, correspond\xEAncia formal e informal, projeto conceitualmente\
            \ simples e estrutura\xE7\xE3o para privil\xE9gio m\xEDnimo e testes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(1)
      name: Developer Security and Privacy Architecture and Design | Formal Policy
        Model
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Produce, as an integral part of the development process, a formal policy
        model describing the [Assignment: organization-defined elements of organizational
        security and privacy policy] to be enforced; and

        (b) Prove that the formal policy model is internally consistent and sufficient
        to enforce the defined elements of the organizational security and privacy
        policy when implemented.'
      annotation: Formal models describe specific behaviors or security and privacy
        policies using formal languages, thus enabling the correctness of those behaviors
        and policies to be formally proven. Not all components of systems can be modeled.
        Generally, formal specifications are scoped to the behaviors or policies of
        interest, such as nondiscretionary access control policies. Organizations
        choose the formal modeling language and approach based on the nature of the
        behaviors and policies to be described and the available tools.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Modelo Formal de Pol\xEDtica"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Produza, como parte integrante do processo\
            \ de desenvolvimento, um modelo formal de pol\xEDtica descrevendo os [Atribui\xE7\
            \xE3o: elementos da pol\xEDtica organizacional de seguran\xE7a e privacidade\
            \ definidos pela organiza\xE7\xE3o] a serem aplicados; e\n(b) Prove que\
            \ o modelo formal de pol\xEDtica \xE9 internamente consistente e suficiente\
            \ para aplicar os elementos definidos da pol\xEDtica organizacional de\
            \ seguran\xE7a e privacidade quando implementado."
          annotation: "Os modelos formais descrevem comportamentos espec\xEDficos\
            \ ou pol\xEDticas de seguran\xE7a e privacidade usando linguagens formais,\
            \ possibilitando assim que a corre\xE7\xE3o desses comportamentos e pol\xED\
            ticas seja formalmente comprovada. Nem todos os componentes dos sistemas\
            \ podem ser modelados. Geralmente, as especifica\xE7\xF5es formais limitam-se\
            \ aos comportamentos ou pol\xEDticas de interesse, como pol\xEDticas de\
            \ controle de acesso n\xE3o discricion\xE1rio. As organiza\xE7\xF5es escolhem\
            \ a linguagem e a abordagem de modelagem formal com base na natureza dos\
            \ comportamentos e pol\xEDticas a serem descritos e nas ferramentas dispon\xED\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(2)
      name: Developer Security and Privacy Architecture and Design | Security-relevant
        Components
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Define security-relevant hardware, software, and firmware; and

        (b) Provide a rationale that the definition for security-relevant hardware,
        software, and firmware is complete.'
      annotation: The security-relevant hardware, software, and firmware represent
        the portion of the system, component, or service that is trusted to perform
        correctly to maintain required security properties.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Componentes Relevantes para a Seguran\xE7a"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Defina o hardware, software e firmware\
            \ relevantes para a seguran\xE7a; e\n(b) Forne\xE7a uma justificativa\
            \ de que a defini\xE7\xE3o de hardware, software e firmware relevantes\
            \ para a seguran\xE7a \xE9 completa."
          annotation: "O hardware, software e firmware relevantes para a seguran\xE7\
            a representam a parte do sistema, componente ou servi\xE7o em que se confia\
            \ para operar corretamente a fim de manter as propriedades de seguran\xE7\
            a necess\xE1rias."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(3)
      name: Developer Security and Privacy Architecture and Design | Formal Correspondence
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Produce, as an integral part of the development process, a formal top-level
        specification that specifies the interfaces to security-relevant hardware,
        software, and firmware in terms of exceptions, error messages, and effects;

        (b) Show via proof to the extent feasible with additional informal demonstration
        as necessary, that the formal top-level specification is consistent with the
        formal policy model;

        (c) Show via informal demonstration, that the formal top-level specification
        completely covers the interfaces to security-relevant hardware, software,
        and firmware;

        (d) Show that the formal top-level specification is an accurate description
        of the implemented security-relevant hardware, software, and firmware; and

        (e) Describe the security-relevant hardware, software, and firmware mechanisms
        not addressed in the formal top-level specification but strictly internal
        to the security-relevant hardware, software, and firmware.'
      annotation: Correspondence is an important part of the assurance gained through
        modeling. It demonstrates that the implementation is an accurate transformation
        of the model, and that any additional code or implementation details that
        are present have no impact on the behaviors or policies being modeled. Formal
        methods can be used to show that the high-level security properties are satisfied
        by the formal system description, and that the formal system description is
        correctly implemented by a description of some lower level, including a hardware
        description. Consistency between the formal top-level specification and the
        formal policy models is generally not amenable to being fully proven. Therefore,
        a combination of formal and informal methods may be needed to demonstrate
        such consistency. Consistency between the formal top-level specification and
        the actual implementation may require the use of an informal demonstration
        due to limitations on the applicability of formal methods to prove that the
        specification accurately reflects the implementation. Hardware, software,
        and firmware mechanisms internal to security-relevant components include mapping
        registers and direct memory input and output.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Correspond\xEAncia Formal"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Produza, como parte integrante do processo\
            \ de desenvolvimento, uma especifica\xE7\xE3o formal de alto n\xEDvel\
            \ que especifique as interfaces com o hardware, software e firmware relevantes\
            \ para a seguran\xE7a em termos de exce\xE7\xF5es, mensagens de erro e\
            \ efeitos;\n(b) Demonstre por meio de prova, na medida do vi\xE1vel, com\
            \ demonstra\xE7\xE3o informal adicional conforme necess\xE1rio, que a\
            \ especifica\xE7\xE3o formal de alto n\xEDvel \xE9 consistente com o modelo\
            \ formal de pol\xEDtica;\n(c) Demonstre por meio de demonstra\xE7\xE3\
            o informal que a especifica\xE7\xE3o formal de alto n\xEDvel cobre completamente\
            \ as interfaces com o hardware, software e firmware relevantes para a\
            \ seguran\xE7a;\n(d) Demonstre que a especifica\xE7\xE3o formal de alto\
            \ n\xEDvel \xE9 uma descri\xE7\xE3o precisa do hardware, software e firmware\
            \ relevantes para a seguran\xE7a implementados; e\n(e) Descreva os mecanismos\
            \ de hardware, software e firmware relevantes para a seguran\xE7a que\
            \ n\xE3o s\xE3o abordados na especifica\xE7\xE3o formal de alto n\xED\
            vel, mas que s\xE3o estritamente internos ao hardware, software e firmware\
            \ relevantes para a seguran\xE7a."
          annotation: "A correspond\xEAncia \xE9 uma parte importante da garantia\
            \ obtida por meio da modelagem. Ela demonstra que a implementa\xE7\xE3\
            o \xE9 uma transforma\xE7\xE3o precisa do modelo e que qualquer c\xF3\
            digo adicional ou detalhe de implementa\xE7\xE3o presente n\xE3o tem impacto\
            \ sobre os comportamentos ou pol\xEDticas que est\xE3o sendo modelados.\
            \ M\xE9todos formais podem ser usados para demonstrar que as propriedades\
            \ de seguran\xE7a de alto n\xEDvel s\xE3o satisfeitas pela descri\xE7\xE3\
            o formal do sistema e que a descri\xE7\xE3o formal do sistema \xE9 corretamente\
            \ implementada por uma descri\xE7\xE3o de algum n\xEDvel inferior, incluindo\
            \ uma descri\xE7\xE3o de hardware. A consist\xEAncia entre a especifica\xE7\
            \xE3o formal de alto n\xEDvel e os modelos formais de pol\xEDtica geralmente\
            \ n\xE3o \xE9 pass\xEDvel de ser totalmente comprovada. Portanto, pode\
            \ ser necess\xE1ria uma combina\xE7\xE3o de m\xE9todos formais e informais\
            \ para demonstrar tal consist\xEAncia. A consist\xEAncia entre a especifica\xE7\
            \xE3o formal de alto n\xEDvel e a implementa\xE7\xE3o real pode exigir\
            \ o uso de uma demonstra\xE7\xE3o informal devido \xE0s limita\xE7\xF5\
            es na aplicabilidade de m\xE9todos formais para provar que a especifica\xE7\
            \xE3o reflete com precis\xE3o a implementa\xE7\xE3o. Os mecanismos de\
            \ hardware, software e firmware internos aos componentes relevantes para\
            \ a seguran\xE7a incluem registradores de mapeamento e entrada e sa\xED\
            da direta de mem\xF3ria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(4)
      name: Developer Security and Privacy Architecture and Design | Informal Correspondence
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Produce, as an integral part of the development process, an informal descriptive
        top-level specification that specifies the interfaces to security-relevant
        hardware, software, and firmware in terms of exceptions, error messages, and
        effects;

        (b) Show via [Selection: informal demonstration; convincing argument with
        formal methods as feasible] that the descriptive top-level specification is
        consistent with the formal policy model;

        (c) Show via informal demonstration, that the descriptive top-level specification
        completely covers the interfaces to security-relevant hardware, software,
        and firmware;

        (d) Show that the descriptive top-level specification is an accurate description
        of the interfaces to security-relevant hardware, software, and firmware; and

        (e) Describe the security-relevant hardware, software, and firmware mechanisms
        not addressed in the descriptive top-level specification but strictly internal
        to the security-relevant hardware, software, and firmware.'
      annotation: Correspondence is an important part of the assurance gained through
        modeling. It demonstrates that the implementation is an accurate transformation
        of the model, and that additional code or implementation detail has no impact
        on the behaviors or policies being modeled. Consistency between the descriptive
        top-level specification (i.e., high-level/low-level design) and the formal
        policy model is generally not amenable to being fully proven. Therefore, a
        combination of formal and informal methods may be needed to show such consistency.
        Hardware, software, and firmware mechanisms strictly internal to security-relevant
        hardware, software, and firmware include mapping registers and direct memory
        input and output.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Correspond\xEAncia Informal"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Produza, como parte integrante do processo\
            \ de desenvolvimento, uma especifica\xE7\xE3o descritiva informal de alto\
            \ n\xEDvel que especifique as interfaces com o hardware, software e firmware\
            \ relevantes para a seguran\xE7a em termos de exce\xE7\xF5es, mensagens\
            \ de erro e efeitos;\n(b) Demonstre por meio de [Sele\xE7\xE3o: demonstra\xE7\
            \xE3o informal; argumento convincente com m\xE9todos formais conforme\
            \ vi\xE1vel] que a especifica\xE7\xE3o descritiva de alto n\xEDvel \xE9\
            \ consistente com o modelo formal de pol\xEDtica;\n(c) Demonstre por meio\
            \ de demonstra\xE7\xE3o informal que a especifica\xE7\xE3o descritiva\
            \ de alto n\xEDvel cobre completamente as interfaces com o hardware, software\
            \ e firmware relevantes para a seguran\xE7a;\n(d) Demonstre que a especifica\xE7\
            \xE3o descritiva de alto n\xEDvel \xE9 uma descri\xE7\xE3o precisa das\
            \ interfaces com o hardware, software e firmware relevantes para a seguran\xE7\
            a; e\n(e) Descreva os mecanismos de hardware, software e firmware relevantes\
            \ para a seguran\xE7a que n\xE3o s\xE3o abordados na especifica\xE7\xE3\
            o descritiva de alto n\xEDvel, mas que s\xE3o estritamente internos ao\
            \ hardware, software e firmware relevantes para a seguran\xE7a."
          annotation: "A correspond\xEAncia \xE9 uma parte importante da garantia\
            \ obtida por meio da modelagem. Ela demonstra que a implementa\xE7\xE3\
            o \xE9 uma transforma\xE7\xE3o precisa do modelo e que c\xF3digo adicional\
            \ ou detalhe de implementa\xE7\xE3o n\xE3o tem impacto sobre os comportamentos\
            \ ou pol\xEDticas que est\xE3o sendo modelados. A consist\xEAncia entre\
            \ a especifica\xE7\xE3o descritiva de alto n\xEDvel (ou seja, projeto\
            \ de alto n\xEDvel/baixo n\xEDvel) e o modelo formal de pol\xEDtica geralmente\
            \ n\xE3o \xE9 pass\xEDvel de ser totalmente comprovada. Portanto, pode\
            \ ser necess\xE1ria uma combina\xE7\xE3o de m\xE9todos formais e informais\
            \ para demonstrar tal consist\xEAncia. Os mecanismos de hardware, software\
            \ e firmware estritamente internos ao hardware, software e firmware relevantes\
            \ para a seguran\xE7a incluem registradores de mapeamento e entrada e\
            \ sa\xEDda direta de mem\xF3ria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(5)
      name: Developer Security and Privacy Architecture and Design | Conceptually
        Simple Design
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Design and structure the security-relevant hardware, software, and firmware
        to use a complete, conceptually simple protection mechanism with precisely
        defined semantics; and

        (b) Internally structure the security-relevant hardware, software, and firmware
        with specific regard for this mechanism.'
      annotation: The principle of reduced complexity states that the system design
        is as simple and small as possible (see SA-8(7)). A small and simple design
        is easier to understand and analyze and is also less prone to error (see AC-25,
        SA-8(13)). The principle of reduced complexity applies to any aspect of a
        system, but it has particular importance for security due to the various analyses
        performed to obtain evidence about the emergent security property of the system.
        For such analyses to be successful, a small and simple design is essential.
        Application of the principle of reduced complexity contributes to the ability
        of system developers to understand the correctness and completeness of system
        security functions and facilitates the identification of potential vulnerabilities.
        The corollary of reduced complexity states that the simplicity of the system
        is directly related to the number of vulnerabilities it will contain. That
        is, simpler systems contain fewer vulnerabilities. An important benefit of
        reduced complexity is that it is easier to understand whether the security
        policy has been captured in the system design and that fewer vulnerabilities
        are likely to be introduced during engineering development. An additional
        benefit is that any such conclusion about correctness, completeness, and existence
        of vulnerabilities can be reached with a higher degree of assurance in contrast
        to conclusions reached in situations where the system design is inherently
        more complex.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Projeto Conceitualmente Simples"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Projete e estruture o hardware, software\
            \ e firmware relevantes para a seguran\xE7a para usar um mecanismo de\
            \ prote\xE7\xE3o completo, conceitualmente simples e com sem\xE2ntica\
            \ precisamente definida; e\n(b) Estruture internamente o hardware, software\
            \ e firmware relevantes para a seguran\xE7a com considera\xE7\xE3o espec\xED\
            fica a esse mecanismo."
          annotation: "O princ\xEDpio da complexidade reduzida estabelece que o projeto\
            \ do sistema seja o mais simples e pequeno poss\xEDvel (ver SA-8(7)).\
            \ Um projeto pequeno e simples \xE9 mais f\xE1cil de entender e analisar\
            \ e tamb\xE9m \xE9 menos propenso a erros (ver AC-25, SA-8(13)). O princ\xED\
            pio da complexidade reduzida aplica-se a qualquer aspecto de um sistema,\
            \ mas tem import\xE2ncia particular para a seguran\xE7a devido \xE0s v\xE1\
            rias an\xE1lises realizadas para obter evid\xEAncias sobre a propriedade\
            \ de seguran\xE7a emergente do sistema. Para que tais an\xE1lises sejam\
            \ bem-sucedidas, um projeto pequeno e simples \xE9 essencial. A aplica\xE7\
            \xE3o do princ\xEDpio da complexidade reduzida contribui para a capacidade\
            \ dos desenvolvedores de sistemas de entender a corre\xE7\xE3o e a completude\
            \ das fun\xE7\xF5es de seguran\xE7a do sistema e facilita a identifica\xE7\
            \xE3o de potenciais vulnerabilidades. O corol\xE1rio da complexidade reduzida\
            \ estabelece que a simplicidade do sistema est\xE1 diretamente relacionada\
            \ ao n\xFAmero de vulnerabilidades que ele conter\xE1. Ou seja, sistemas\
            \ mais simples cont\xEAm menos vulnerabilidades. Um benef\xEDcio importante\
            \ da complexidade reduzida \xE9 que \xE9 mais f\xE1cil entender se a pol\xED\
            tica de seguran\xE7a foi capturada no projeto do sistema e que \xE9 menos\
            \ prov\xE1vel que sejam introduzidas vulnerabilidades durante o desenvolvimento\
            \ de engenharia. Um benef\xEDcio adicional \xE9 que qualquer conclus\xE3\
            o sobre corre\xE7\xE3o, completude e exist\xEAncia de vulnerabilidades\
            \ pode ser alcan\xE7ada com um grau mais alto de garantia, em contraste\
            \ com conclus\xF5es alcan\xE7adas em situa\xE7\xF5es em que o projeto\
            \ do sistema \xE9 inerentemente mais complexo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(6)
      name: Developer Security and Privacy Architecture and Design | Structure for
        Testing
      description: Require the developer of the system, system component, or system
        service to structure security-relevant hardware, software, and firmware to
        facilitate testing.
      annotation: Applying the security design principles in SP 800-160-1 promotes
        complete, consistent, and comprehensive testing and evaluation of systems,
        system components, and services. The thoroughness of such testing contributes
        to the evidence produced to generate an effective assurance case or argument
        as to the trustworthiness of the system, system component, or service.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Estrutura\xE7\xE3o para Testes"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema estruture o hardware, software e firmware relevantes\
            \ para a seguran\xE7a a fim de facilitar os testes."
          annotation: "A aplica\xE7\xE3o dos princ\xEDpios de projeto de seguran\xE7\
            a do SP 800-160-1 promove testes e avalia\xE7\xF5es completos, consistentes\
            \ e abrangentes de sistemas, componentes de sistema e servi\xE7os. A minuciosidade\
            \ desses testes contribui para a evid\xEAncia produzida para gerar um\
            \ caso ou argumento de garantia eficaz quanto \xE0 confiabilidade do sistema,\
            \ componente de sistema ou servi\xE7o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(7)
      name: Developer Security and Privacy Architecture and Design | Structure for
        Least Privilege
      description: Require the developer of the system, system component, or system
        service to structure security-relevant hardware, software, and firmware to
        facilitate controlling access with least privilege.
      annotation: "The principle of least privilege states that each component is\
        \ allocated sufficient privileges to accomplish its specified functions but\
        \ no more (see SA-8(14)). Applying the principle of least privilege limits\
        \ the scope of the component\u2019s actions, which has two desirable effects.\
        \ First, the security impact of a failure, corruption, or misuse of the system\
        \ component results in a minimized security impact. Second, the security analysis\
        \ of the component is simplified. Least privilege is a pervasive principle\
        \ that is reflected in all aspects of the secure system design. Interfaces\
        \ used to invoke component capability are available to only certain subsets\
        \ of the user population, and component design supports a sufficiently fine\
        \ granularity of privilege decomposition. For example, in the case of an audit\
        \ mechanism, there may be an interface for the audit manager, who configures\
        \ the audit settings; an interface for the audit operator, who ensures that\
        \ audit data is safely collected and stored; and, finally, yet another interface\
        \ for the audit reviewer, who only has a need to view the audit data that\
        \ has been collected but no need to perform operations on that data.\nIn addition\
        \ to its manifestations at the system interface, least privilege can be used\
        \ as a guiding principle for the internal structure of the system itself.\
        \ One aspect of internal least privilege is to construct modules so that only\
        \ the elements encapsulated by the module are directly operated upon by the\
        \ functions within the module. Elements external to a module that may be affected\
        \ by the module\u2019s operation are indirectly accessed through interaction\
        \ (e.g., via a function call) with the module that contains those elements.\
        \ Another aspect of internal least privilege is that the scope of a given\
        \ module or component includes only those system elements that are necessary\
        \ for its functionality, and the access modes to the elements (e.g., read,\
        \ write) are minimal."
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Estrutura\xE7\xE3o para Privil\xE9gio M\xEDnimo"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema estruture o hardware, software e firmware relevantes\
            \ para a seguran\xE7a a fim de facilitar o controle de acesso com privil\xE9\
            gio m\xEDnimo."
          annotation: "O princ\xEDpio do privil\xE9gio m\xEDnimo estabelece que cada\
            \ componente recebe privil\xE9gios suficientes para cumprir suas fun\xE7\
            \xF5es especificadas, mas nada al\xE9m disso (ver SA-8(14)). A aplica\xE7\
            \xE3o do princ\xEDpio do privil\xE9gio m\xEDnimo limita o escopo das a\xE7\
            \xF5es do componente, o que tem dois efeitos desej\xE1veis. Primeiro,\
            \ o impacto de seguran\xE7a de uma falha, corrup\xE7\xE3o ou uso indevido\
            \ do componente de sistema resulta em um impacto de seguran\xE7a minimizado.\
            \ Segundo, a an\xE1lise de seguran\xE7a do componente \xE9 simplificada.\
            \ O privil\xE9gio m\xEDnimo \xE9 um princ\xEDpio abrangente que se reflete\
            \ em todos os aspectos do projeto de sistema seguro. As interfaces usadas\
            \ para invocar a capacidade de um componente est\xE3o dispon\xEDveis apenas\
            \ para certos subconjuntos da popula\xE7\xE3o de usu\xE1rios, e o projeto\
            \ do componente suporta uma granularidade suficientemente fina de decomposi\xE7\
            \xE3o de privil\xE9gios. Por exemplo, no caso de um mecanismo de auditoria,\
            \ pode haver uma interface para o gerente de auditoria, que configura\
            \ as defini\xE7\xF5es de auditoria; uma interface para o operador de auditoria,\
            \ que garante que os dados de auditoria sejam coletados e armazenados\
            \ com seguran\xE7a; e, finalmente, ainda outra interface para o revisor\
            \ de auditoria, que tem necessidade apenas de visualizar os dados de auditoria\
            \ que foram coletados, mas n\xE3o de realizar opera\xE7\xF5es sobre esses\
            \ dados.\nAl\xE9m de suas manifesta\xE7\xF5es na interface do sistema,\
            \ o privil\xE9gio m\xEDnimo pode ser usado como princ\xEDpio orientador\
            \ para a estrutura interna do pr\xF3prio sistema. Um aspecto do privil\xE9\
            gio m\xEDnimo interno \xE9 construir m\xF3dulos de modo que apenas os\
            \ elementos encapsulados pelo m\xF3dulo sejam operados diretamente pelas\
            \ fun\xE7\xF5es dentro do m\xF3dulo. Os elementos externos a um m\xF3\
            dulo que possam ser afetados pela opera\xE7\xE3o do m\xF3dulo s\xE3o acessados\
            \ indiretamente por meio de intera\xE7\xE3o (por exemplo, via chamada\
            \ de fun\xE7\xE3o) com o m\xF3dulo que cont\xE9m esses elementos. Outro\
            \ aspecto do privil\xE9gio m\xEDnimo interno \xE9 que o escopo de um determinado\
            \ m\xF3dulo ou componente inclui apenas os elementos de sistema necess\xE1\
            rios para sua funcionalidade, e os modos de acesso aos elementos (por\
            \ exemplo, leitura, escrita) s\xE3o m\xEDnimos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(8)
      name: Developer Security and Privacy Architecture and Design | Orchestration
      description: 'Design [Assignment: organization-defined critical systems or system
        components] with coordinated behavior to implement the following capabilities:
        [Assignment: organization-defined capabilities, by system or component].'
      annotation: Security resources that are distributed, located at different layers
        or in different system elements, or are implemented to support different aspects
        of trustworthiness can interact in unforeseen or incorrect ways. Adverse consequences
        can include cascading failures, interference, or coverage gaps. Coordination
        of the behavior of security resources (e.g., by ensuring that one patch is
        installed across all resources before making a configuration change that assumes
        that the patch is propagated) can avert such negative interactions.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Orquestra\xE7\xE3o"
          description: "Projetar [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ cr\xEDticos definidos pela organiza\xE7\xE3o] com comportamento coordenado\
            \ para implementar as seguintes capacidades: [Atribui\xE7\xE3o: capacidades\
            \ definidas pela organiza\xE7\xE3o, por sistema ou componente]."
          annotation: "Recursos de seguran\xE7a que s\xE3o distribu\xEDdos, localizados\
            \ em diferentes camadas ou em diferentes elementos de sistema, ou que\
            \ s\xE3o implementados para apoiar diferentes aspectos da confiabilidade,\
            \ podem interagir de maneiras imprevistas ou incorretas. As consequ\xEA\
            ncias adversas podem incluir falhas em cascata, interfer\xEAncia ou lacunas\
            \ de cobertura. A coordena\xE7\xE3o do comportamento dos recursos de seguran\xE7\
            a (por exemplo, garantindo que uma corre\xE7\xE3o seja instalada em todos\
            \ os recursos antes de fazer uma altera\xE7\xE3o de configura\xE7\xE3\
            o que pressup\xF5e que a corre\xE7\xE3o foi propagada) pode evitar tais\
            \ intera\xE7\xF5es negativas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-17(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-17(9)
      name: Developer Security and Privacy Architecture and Design | Design Diversity
      description: 'Use different designs for [Assignment: organization-defined critical
        systems or system components] to satisfy a common set of requirements or to
        provide equivalent functionality.'
      annotation: Design diversity is achieved by supplying the same requirements
        specification to multiple developers, each of whom is responsible for developing
        a variant of the system or system component that meets the requirements. Variants
        can be in software design, in hardware design, or in both hardware and a software
        design. Differences in the designs of the variants can result from developer
        experience (e.g., prior use of a design pattern), design style (e.g., when
        decomposing a required function into smaller tasks, determining what constitutes
        a separate task and how far to decompose tasks into sub-tasks), selection
        of libraries to incorporate into the variant, and the development environment
        (e.g., different design tools make some design patterns easier to visualize).
        Hardware design diversity includes making different decisions about what information
        to keep in analog form and what information to convert to digital form, transmitting
        the same information at different times, and introducing delays in sampling
        (temporal diversity). Design diversity is commonly used to support fault tolerance.
      translations:
        pt:
          name: "Arquitetura e Projeto de Seguran\xE7a e Privacidade do Desenvolvedor\
            \ | Diversidade de Projeto"
          description: "Usar projetos diferentes para [Atribui\xE7\xE3o: sistemas\
            \ ou componentes de sistema cr\xEDticos definidos pela organiza\xE7\xE3\
            o] a fim de satisfazer um conjunto comum de requisitos ou fornecer funcionalidade\
            \ equivalente."
          annotation: "A diversidade de projeto \xE9 alcan\xE7ada fornecendo a mesma\
            \ especifica\xE7\xE3o de requisitos a v\xE1rios desenvolvedores, cada\
            \ um dos quais \xE9 respons\xE1vel por desenvolver uma variante do sistema\
            \ ou componente de sistema que atenda aos requisitos. As variantes podem\
            \ estar no projeto de software, no projeto de hardware ou tanto no projeto\
            \ de hardware quanto de software. As diferen\xE7as nos projetos das variantes\
            \ podem resultar da experi\xEAncia do desenvolvedor (por exemplo, uso\
            \ pr\xE9vio de um padr\xE3o de projeto), do estilo de projeto (por exemplo,\
            \ ao decompor uma fun\xE7\xE3o necess\xE1ria em tarefas menores, determinar\
            \ o que constitui uma tarefa separada e at\xE9 onde decompor as tarefas\
            \ em subtarefas), da sele\xE7\xE3o de bibliotecas a serem incorporadas\
            \ \xE0 variante e do ambiente de desenvolvimento (por exemplo, ferramentas\
            \ de projeto diferentes tornam alguns padr\xF5es de projeto mais f\xE1\
            ceis de visualizar). A diversidade de projeto de hardware inclui tomar\
            \ decis\xF5es diferentes sobre quais informa\xE7\xF5es manter em forma\
            \ anal\xF3gica e quais informa\xE7\xF5es converter para forma digital,\
            \ transmitir as mesmas informa\xE7\xF5es em momentos diferentes e introduzir\
            \ atrasos na amostragem (diversidade temporal). A diversidade de projeto\
            \ \xE9 comumente usada para apoiar a toler\xE2ncia a falhas."

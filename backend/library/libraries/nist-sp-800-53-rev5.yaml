    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-7
      name: Concept of Operations
      description: 'a. Develop a Concept of Operations (CONOPS) for the system describing
        how the organization intends to operate the system from the perspective of
        information security and privacy; and

        b. Review and update the CONOPS [Assignment: organization-defined frequency].'
      annotation: The CONOPS may be included in the security or privacy plans for
        the system or in other system development life cycle documents. The CONOPS
        is a living document that requires updating throughout the system development
        life cycle. For example, during system design reviews, the concept of operations
        is checked to ensure that it remains consistent with the design for controls,
        the system architecture, and the operational procedures. Changes to the CONOPS
        are reflected in ongoing updates to the security and privacy plans, security
        and privacy architectures, and other organizational documents, such as procurement
        specifications, system development life cycle documents, and systems engineering
        documents.
      translations:
        pt:
          name: "Conceito de Opera\xE7\xF5es"
          description: "a. Desenvolver um Conceito de Opera\xE7\xF5es (CONOPS) para\
            \ o sistema descrevendo como a organiza\xE7\xE3o pretende operar o sistema\
            \ sob a perspectiva da seguran\xE7a da informa\xE7\xE3o e da privacidade;\
            \ e\nb. Revisar e atualizar o CONOPS [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o]."
          annotation: "O CONOPS pode ser inclu\xEDdo nos planos de seguran\xE7a ou\
            \ privacidade do sistema ou em outros documentos do ciclo de vida de desenvolvimento\
            \ do sistema. O CONOPS \xE9 um documento vivo que requer atualiza\xE7\xE3\
            o ao longo do ciclo de vida de desenvolvimento do sistema. Por exemplo,\
            \ durante as revis\xF5es de projeto do sistema, o conceito de opera\xE7\
            \xF5es \xE9 verificado para assegurar que permanece consistente com o\
            \ projeto dos controles, a arquitetura do sistema e os procedimentos operacionais.\
            \ As mudan\xE7as no CONOPS s\xE3o refletidas em atualiza\xE7\xF5es cont\xED\
            nuas dos planos de seguran\xE7a e privacidade, das arquiteturas de seguran\xE7\
            a e privacidade e de outros documentos organizacionais, como especifica\xE7\
            \xF5es de aquisi\xE7\xE3o, documentos do ciclo de vida de desenvolvimento\
            \ do sistema e documentos de engenharia de sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-8
      name: Security and Privacy Architectures
      description: 'a. Develop security and privacy architectures for the system that:

        1. Describe the requirements and approach to be taken for protecting the confidentiality,
        integrity, and availability of organizational information;

        2. Describe the requirements and approach to be taken for processing personally
        identifiable information to minimize privacy risk to individuals;

        3. Describe how the architectures are integrated into and support the enterprise
        architecture; and

        4. Describe any assumptions about, and dependencies on, external systems and
        services;

        b. Review and update the architectures [Assignment: organization-defined frequency]
        to reflect changes in the enterprise architecture; and

        c. Reflect planned architecture changes in security and privacy plans, Concept
        of Operations (CONOPS), criticality analysis, organizational procedures, and
        procurements and acquisitions.'
      annotation: "The security and privacy architectures at the system level are\
        \ consistent with the organization-wide security and privacy architectures\
        \ described in PM-7, which are integral to and developed as part of the enterprise\
        \ architecture. The architectures include an architectural description, the\
        \ allocation of security and privacy functionality (including controls), security-\
        \ and privacy-related information for external interfaces, information being\
        \ exchanged across the interfaces, and the protection mechanisms associated\
        \ with each interface. The architectures can also include other information,\
        \ such as user roles and the access privileges assigned to each role; security\
        \ and privacy requirements; types of information processed, stored, and transmitted\
        \ by the system; supply chain risk management requirements; restoration priorities\
        \ of information and system services; and other protection needs.\nSP 800-160-1\
        \ provides guidance on the use of security architectures as part of the system\
        \ development life cycle process. OMB M-19-03 requires the use of the systems\
        \ security engineering concepts described in SP 800-160-1 for high value assets.\
        \ Security and privacy architectures are reviewed and updated throughout the\
        \ system development life cycle, from analysis of alternatives through review\
        \ of the proposed architecture in the RFP responses to the design reviews\
        \ before and during implementation (e.g., during preliminary design reviews\
        \ and critical design reviews).\nIn today\u2019s modern computing architectures,\
        \ it is becoming less common for organizations to control all information\
        \ resources. There may be key dependencies on external information services\
        \ and service providers. Describing such dependencies in the security and\
        \ privacy architectures is necessary for developing a comprehensive mission\
        \ and business protection strategy. Establishing, developing, documenting,\
        \ and maintaining under configuration control a baseline configuration for\
        \ organizational systems is critical to implementing and maintaining effective\
        \ architectures. The development of the architectures is coordinated with\
        \ the senior agency information security officer and the senior agency official\
        \ for privacy to ensure that the controls needed to support security and privacy\
        \ requirements are identified and effectively implemented. In many circumstances,\
        \ there may be no distinction between the security and privacy architecture\
        \ for a system. In other circumstances, security objectives may be adequately\
        \ satisfied, but privacy objectives may only be partially satisfied by the\
        \ security requirements. In these cases, consideration of the privacy requirements\
        \ needed to achieve satisfaction will result in a distinct privacy architecture.\
        \ The documentation, however, may simply reflect the combined architectures.\n\
        PL-8 is primarily directed at organizations to ensure that architectures are\
        \ developed for the system and, moreover, that the architectures are integrated\
        \ with or tightly coupled to the enterprise architecture. In contrast, SA-17\
        \ is primarily directed at the external information technology product and\
        \ system developers and integrators. SA-17, which is complementary to PL-8,\
        \ is selected when organizations outsource the development of systems or components\
        \ to external entities and when there is a need to demonstrate consistency\
        \ with the organization\u2019s enterprise architecture and security and privacy\
        \ architectures."
      translations:
        pt:
          name: "Arquiteturas de Seguran\xE7a e Privacidade"
          description: "a. Desenvolver arquiteturas de seguran\xE7a e privacidade\
            \ para o sistema que:\n1. Descrevam os requisitos e a abordagem a serem\
            \ adotados para proteger a confidencialidade, a integridade e a disponibilidade\
            \ das informa\xE7\xF5es organizacionais;\n2. Descrevam os requisitos e\
            \ a abordagem a serem adotados para o processamento de informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal a fim de minimizar o risco de privacidade\
            \ para os indiv\xEDduos;\n3. Descrevam como as arquiteturas s\xE3o integradas\
            \ e d\xE3o suporte \xE0 arquitetura corporativa; e\n4. Descrevam quaisquer\
            \ premissas sobre, e depend\xEAncias de, sistemas e servi\xE7os externos;\n\
            b. Revisar e atualizar as arquiteturas [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o] para refletir mudan\xE7as na arquitetura\
            \ corporativa; e\nc. Refletir as mudan\xE7as planejadas na arquitetura\
            \ nos planos de seguran\xE7a e privacidade, no Conceito de Opera\xE7\xF5\
            es (CONOPS), na an\xE1lise de criticidade, nos procedimentos organizacionais\
            \ e nas aquisi\xE7\xF5es e contrata\xE7\xF5es."
          annotation: "As arquiteturas de seguran\xE7a e privacidade no n\xEDvel do\
            \ sistema s\xE3o consistentes com as arquiteturas de seguran\xE7a e privacidade\
            \ de \xE2mbito organizacional descritas em PM-7, que s\xE3o parte integrante\
            \ e s\xE3o desenvolvidas como parte da arquitetura corporativa. As arquiteturas\
            \ incluem uma descri\xE7\xE3o arquitetural, a aloca\xE7\xE3o da funcionalidade\
            \ de seguran\xE7a e privacidade (incluindo controles), informa\xE7\xF5\
            es relacionadas \xE0 seguran\xE7a e \xE0 privacidade das interfaces externas,\
            \ as informa\xE7\xF5es trocadas atrav\xE9s das interfaces e os mecanismos\
            \ de prote\xE7\xE3o associados a cada interface. As arquiteturas tamb\xE9\
            m podem incluir outras informa\xE7\xF5es, tais como pap\xE9is de usu\xE1\
            rio e os privil\xE9gios de acesso atribu\xEDdos a cada papel; requisitos\
            \ de seguran\xE7a e privacidade; tipos de informa\xE7\xF5es processadas,\
            \ armazenadas e transmitidas pelo sistema; requisitos de gest\xE3o de\
            \ riscos da cadeia de suprimentos; prioridades de restaura\xE7\xE3o de\
            \ informa\xE7\xF5es e servi\xE7os do sistema; e outras necessidades de\
            \ prote\xE7\xE3o.\nA SP 800-160-1 fornece orienta\xE7\xE3o sobre o uso\
            \ de arquiteturas de seguran\xE7a como parte do processo do ciclo de vida\
            \ de desenvolvimento do sistema. A OMB M-19-03 exige o uso dos conceitos\
            \ de engenharia de seguran\xE7a de sistemas descritos na SP 800-160-1\
            \ para ativos de alto valor. As arquiteturas de seguran\xE7a e privacidade\
            \ s\xE3o revisadas e atualizadas ao longo do ciclo de vida de desenvolvimento\
            \ do sistema, desde a an\xE1lise de alternativas, passando pela revis\xE3\
            o da arquitetura proposta nas respostas a RFP, at\xE9 as revis\xF5es de\
            \ projeto antes e durante a implementa\xE7\xE3o (por exemplo, durante\
            \ revis\xF5es preliminares de projeto e revis\xF5es cr\xEDticas de projeto).\n\
            Nas arquiteturas computacionais modernas de hoje, est\xE1 se tornando\
            \ menos comum que as organiza\xE7\xF5es controlem todos os recursos de\
            \ informa\xE7\xE3o. Pode haver depend\xEAncias-chave de servi\xE7os de\
            \ informa\xE7\xE3o e provedores de servi\xE7os externos. Descrever tais\
            \ depend\xEAncias nas arquiteturas de seguran\xE7a e privacidade \xE9\
            \ necess\xE1rio para o desenvolvimento de uma estrat\xE9gia abrangente\
            \ de prote\xE7\xE3o da miss\xE3o e do neg\xF3cio. Estabelecer, desenvolver,\
            \ documentar e manter sob controle de configura\xE7\xE3o uma configura\xE7\
            \xE3o de linha de base para os sistemas organizacionais \xE9 fundamental\
            \ para implementar e manter arquiteturas eficazes. O desenvolvimento das\
            \ arquiteturas \xE9 coordenado com o oficial s\xEAnior de seguran\xE7\
            a da informa\xE7\xE3o da ag\xEAncia e com o oficial s\xEAnior de privacidade\
            \ da ag\xEAncia para garantir que os controles necess\xE1rios para dar\
            \ suporte aos requisitos de seguran\xE7a e privacidade sejam identificados\
            \ e implementados de forma eficaz. Em muitas circunst\xE2ncias, pode n\xE3\
            o haver distin\xE7\xE3o entre a arquitetura de seguran\xE7a e a de privacidade\
            \ de um sistema. Em outras circunst\xE2ncias, os objetivos de seguran\xE7\
            a podem ser adequadamente satisfeitos, mas os objetivos de privacidade\
            \ podem ser apenas parcialmente satisfeitos pelos requisitos de seguran\xE7\
            a. Nesses casos, a considera\xE7\xE3o dos requisitos de privacidade necess\xE1\
            rios para alcan\xE7ar a satisfa\xE7\xE3o resultar\xE1 em uma arquitetura\
            \ de privacidade distinta. A documenta\xE7\xE3o, contudo, pode simplesmente\
            \ refletir as arquiteturas combinadas.\nO PL-8 \xE9 dirigido principalmente\
            \ \xE0s organiza\xE7\xF5es para garantir que as arquiteturas sejam desenvolvidas\
            \ para o sistema e, al\xE9m disso, que as arquiteturas sejam integradas\
            \ ou fortemente acopladas \xE0 arquitetura corporativa. Em contraste,\
            \ o SA-17 \xE9 dirigido principalmente aos desenvolvedores e integradores\
            \ externos de produtos e sistemas de tecnologia da informa\xE7\xE3o. O\
            \ SA-17, que \xE9 complementar ao PL-8, \xE9 selecionado quando as organiza\xE7\
            \xF5es terceirizam o desenvolvimento de sistemas ou componentes para entidades\
            \ externas e quando h\xE1 necessidade de demonstrar consist\xEAncia com\
            \ a arquitetura corporativa e as arquiteturas de seguran\xE7a e privacidade\
            \ da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-8(1)
      name: Security and Privacy Architectures | Defense in Depth
      description: 'Design the security and privacy architectures for the system using
        a defense-in-depth approach that:

        (a) Allocates [Assignment: organization-defined controls] to [Assignment:
        organization-defined locations and architectural layers]; and

        (b) Ensures that the allocated controls operate in a coordinated and mutually
        reinforcing manner.'
      annotation: Organizations strategically allocate security and privacy controls
        in the security and privacy architectures so that adversaries must overcome
        multiple controls to achieve their objective. Requiring adversaries to defeat
        multiple controls makes it more difficult to attack information resources
        by increasing the work factor of the adversary; it also increases the likelihood
        of detection. The coordination of allocated controls is essential to ensure
        that an attack that involves one control does not create adverse, unintended
        consequences by interfering with other controls. Unintended consequences can
        include system lockout and cascading alarms. The placement of controls in
        systems and organizations is an important activity that requires thoughtful
        analysis. The value of organizational assets is an important consideration
        in providing additional layering. Defense-in-depth architectural approaches
        include modularity and layering (see SA-8(3)), separation of system and user
        functionality (see SC-2), and security function isolation (see SC-3).
      translations:
        pt:
          name: "Arquiteturas de Seguran\xE7a e Privacidade | Defesa em Profundidade"
          description: "Projetar as arquiteturas de seguran\xE7a e privacidade para\
            \ o sistema usando uma abordagem de defesa em profundidade que:\n(a) Aloque\
            \ [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\xE3o] em [Atribui\xE7\
            \xE3o: locais e camadas arquiteturais definidos pela organiza\xE7\xE3\
            o]; e\n(b) Garanta que os controles alocados operem de maneira coordenada\
            \ e mutuamente refor\xE7adora."
          annotation: "As organiza\xE7\xF5es alocam estrategicamente controles de\
            \ seguran\xE7a e privacidade nas arquiteturas de seguran\xE7a e privacidade\
            \ de modo que os advers\xE1rios precisem superar m\xFAltiplos controles\
            \ para alcan\xE7ar seu objetivo. Exigir que os advers\xE1rios derrotem\
            \ m\xFAltiplos controles torna mais dif\xEDcil atacar os recursos de informa\xE7\
            \xE3o ao aumentar o fator de esfor\xE7o do advers\xE1rio; isso tamb\xE9\
            m aumenta a probabilidade de detec\xE7\xE3o. A coordena\xE7\xE3o dos controles\
            \ alocados \xE9 essencial para garantir que um ataque que envolva um controle\
            \ n\xE3o crie consequ\xEAncias adversas e n\xE3o intencionais ao interferir\
            \ em outros controles. Consequ\xEAncias n\xE3o intencionais podem incluir\
            \ bloqueio do sistema e alarmes em cascata. O posicionamento de controles\
            \ em sistemas e organiza\xE7\xF5es \xE9 uma atividade importante que requer\
            \ an\xE1lise criteriosa. O valor dos ativos organizacionais \xE9 uma considera\xE7\
            \xE3o importante ao fornecer camadas adicionais. As abordagens arquiteturais\
            \ de defesa em profundidade incluem modularidade e camadas (consulte SA-8(3)),\
            \ separa\xE7\xE3o da funcionalidade do sistema e do usu\xE1rio (consulte\
            \ SC-2) e isolamento da fun\xE7\xE3o de seguran\xE7a (consulte SC-3)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-8(2)
      name: Security and Privacy Architectures | Supplier Diversity
      description: 'Require that [Assignment: organization-defined controls] allocated
        to [Assignment: organization-defined locations and architectural layers] are
        obtained from different suppliers.'
      annotation: Information technology products have different strengths and weaknesses.
        Providing a broad spectrum of products complements the individual offerings.
        For example, vendors offering malicious code protection typically update their
        products at different times, often developing solutions for known viruses,
        Trojans, or worms based on their priorities and development schedules. By
        deploying different products at different locations, there is an increased
        likelihood that at least one of the products will detect the malicious code.
        With respect to privacy, vendors may offer products that track personally
        identifiable information in systems. Products may use different tracking methods.
        Using multiple products may result in more assurance that personally identifiable
        information is inventoried.
      translations:
        pt:
          name: "Arquiteturas de Seguran\xE7a e Privacidade | Diversidade de Fornecedores"
          description: "Exigir que [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\
            \xE3o] alocados em [Atribui\xE7\xE3o: locais e camadas arquiteturais definidos\
            \ pela organiza\xE7\xE3o] sejam obtidos de diferentes fornecedores."
          annotation: "Os produtos de tecnologia da informa\xE7\xE3o possuem diferentes\
            \ pontos fortes e fracos. Fornecer um amplo espectro de produtos complementa\
            \ as ofertas individuais. Por exemplo, fornecedores que oferecem prote\xE7\
            \xE3o contra c\xF3digo malicioso normalmente atualizam seus produtos em\
            \ momentos diferentes, frequentemente desenvolvendo solu\xE7\xF5es para\
            \ v\xEDrus, cavalos de Troia ou worms conhecidos com base em suas prioridades\
            \ e cronogramas de desenvolvimento. Ao implantar produtos diferentes em\
            \ locais diferentes, h\xE1 uma probabilidade maior de que pelo menos um\
            \ dos produtos detecte o c\xF3digo malicioso. Com rela\xE7\xE3o \xE0 privacidade,\
            \ os fornecedores podem oferecer produtos que rastreiam informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal nos sistemas. Os produtos podem usar\
            \ m\xE9todos de rastreamento diferentes. O uso de m\xFAltiplos produtos\
            \ pode resultar em maior garantia de que as informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal estejam inventariadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-9
      name: Central Management
      description: 'Centrally manage [Assignment: organization-defined controls and
        related processes].'
      annotation: 'Central management refers to organization-wide management and implementation
        of selected controls and processes. This includes planning, implementing,
        assessing, authorizing, and monitoring the organization-defined, centrally
        managed controls and processes. As the central management of controls is generally
        associated with the concept of common (inherited) controls, such management
        promotes and facilitates standardization of control implementations and management
        and the judicious use of organizational resources. Centrally managed controls
        and processes may also meet independence requirements for assessments in support
        of initial and ongoing authorizations to operate and as part of organizational
        continuous monitoring.

        Automated tools (e.g., security information and event management tools or
        enterprise security monitoring and management tools) can improve the accuracy,
        consistency, and availability of information associated with centrally managed
        controls and processes. Automation can also provide data aggregation and data
        correlation capabilities; alerting mechanisms; and dashboards to support risk-based
        decision-making within the organization.

        As part of the control selection processes, organizations determine the controls
        that may be suitable for central management based on resources and capabilities.
        It is not always possible to centrally manage every aspect of a control. In
        such cases, the control can be treated as a hybrid control with the control
        managed and implemented centrally or at the system level. The controls and
        control enhancements that are candidates for full or partial central management
        include but are not limited to: AC-2(1), AC-2(2), AC-2(3), AC-2(4), AC-4(all),
        AC-17(1), AC-17(2), AC-17(3), AC-17(9), AC-18(1), AC-18(3), AC-18(4), AC-18(5),
        AC-19(4), AC-22, AC-23, AT-2(1), AT-2(2), AT-3(1), AT-3(2), AT-3(3), AT-4,
        AU-3, AU-6(1), AU-6(3), AU-6(5), AU-6(6), AU-6(9), AU-7(1), AU-7(2), AU-11,
        AU-13, AU-16, CA-2(1), CA-2(2), CA-2(3), CA-3(1), CA-3(2), CA-3(3), CA-7(1),
        CA-9, CM-2(2), CM-3(1), CM-3(4), CM-4, CM-6, CM-6(1), CM-7(2), CM-7(4), CM-7(5),
        CM-8(all), CM-9(1), CM-10, CM-11, CP-7(all), CP-8(all), SC-43, SI-2, SI-3,
        SI-4(all), SI-7, SI-8.'
      translations:
        pt:
          name: "Gest\xE3o Centralizada"
          description: "Gerenciar de forma centralizada [Atribui\xE7\xE3o: controles\
            \ e processos relacionados definidos pela organiza\xE7\xE3o]."
          annotation: "A gest\xE3o centralizada refere-se \xE0 gest\xE3o e implementa\xE7\
            \xE3o, em \xE2mbito organizacional, de controles e processos selecionados.\
            \ Isso inclui planejar, implementar, avaliar, autorizar e monitorar os\
            \ controles e processos gerenciados centralmente e definidos pela organiza\xE7\
            \xE3o. Como a gest\xE3o centralizada de controles est\xE1 geralmente associada\
            \ ao conceito de controles comuns (herdados), tal gest\xE3o promove e\
            \ facilita a padroniza\xE7\xE3o das implementa\xE7\xF5es e da gest\xE3\
            o de controles e o uso criterioso dos recursos organizacionais. Os controles\
            \ e processos gerenciados centralmente tamb\xE9m podem atender aos requisitos\
            \ de independ\xEAncia para avalia\xE7\xF5es em apoio \xE0s autoriza\xE7\
            \xF5es iniciais e cont\xEDnuas para operar e como parte do monitoramento\
            \ cont\xEDnuo organizacional.\nFerramentas automatizadas (por exemplo,\
            \ ferramentas de gerenciamento de informa\xE7\xF5es e eventos de seguran\xE7\
            a ou ferramentas corporativas de monitoramento e gest\xE3o de seguran\xE7\
            a) podem melhorar a precis\xE3o, a consist\xEAncia e a disponibilidade\
            \ das informa\xE7\xF5es associadas aos controles e processos gerenciados\
            \ centralmente. A automa\xE7\xE3o tamb\xE9m pode fornecer recursos de\
            \ agrega\xE7\xE3o e correla\xE7\xE3o de dados; mecanismos de alerta; e\
            \ pain\xE9is para apoiar a tomada de decis\xE3o baseada em risco dentro\
            \ da organiza\xE7\xE3o.\nComo parte dos processos de sele\xE7\xE3o de\
            \ controles, as organiza\xE7\xF5es determinam os controles que podem ser\
            \ adequados para a gest\xE3o centralizada com base em recursos e capacidades.\
            \ Nem sempre \xE9 poss\xEDvel gerenciar centralmente todos os aspectos\
            \ de um controle. Nesses casos, o controle pode ser tratado como um controle\
            \ h\xEDbrido, com o controle gerenciado e implementado de forma centralizada\
            \ ou no n\xEDvel do sistema. Os controles e aprimoramentos de controle\
            \ que s\xE3o candidatos \xE0 gest\xE3o centralizada total ou parcial incluem,\
            \ entre outros: AC-2(1), AC-2(2), AC-2(3), AC-2(4), AC-4(todos), AC-17(1),\
            \ AC-17(2), AC-17(3), AC-17(9), AC-18(1), AC-18(3), AC-18(4), AC-18(5),\
            \ AC-19(4), AC-22, AC-23, AT-2(1), AT-2(2), AT-3(1), AT-3(2), AT-3(3),\
            \ AT-4, AU-3, AU-6(1), AU-6(3), AU-6(5), AU-6(6), AU-6(9), AU-7(1), AU-7(2),\
            \ AU-11, AU-13, AU-16, CA-2(1), CA-2(2), CA-2(3), CA-3(1), CA-3(2), CA-3(3),\
            \ CA-7(1), CA-9, CM-2(2), CM-3(1), CM-3(4), CM-4, CM-6, CM-6(1), CM-7(2),\
            \ CM-7(4), CM-7(5), CM-8(todos), CM-9(1), CM-10, CM-11, CP-7(todos), CP-8(todos),\
            \ SC-43, SI-2, SI-3, SI-4(todos), SI-7, SI-8."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-10
      name: Baseline Selection
      description: Select a control baseline for the system.
      annotation: "Control baselines are predefined sets of controls specifically\
        \ assembled to address the protection needs of a group, organization, or community\
        \ of interest. Controls are chosen for baselines to either satisfy mandates\
        \ imposed by laws, executive orders, directives, regulations, policies, standards,\
        \ and guidelines or address threats common to all users of the baseline under\
        \ the assumptions specific to the baseline. Baselines represent a starting\
        \ point for the protection of individuals\u2019 privacy, information, and\
        \ information systems with subsequent tailoring actions to manage risk in\
        \ accordance with mission, business, or other constraints (see PL-11). Federal\
        \ control baselines are provided in SP 800-53B. The selection of a control\
        \ baseline is determined by the needs of stakeholders. Stakeholder needs consider\
        \ mission and business requirements as well as mandates imposed by applicable\
        \ laws, executive orders, directives, policies, regulations, standards, and\
        \ guidelines. For example, the control baselines in SP 800-53B are based on\
        \ the requirements from FISMA and PRIVACT. The requirements, along with the\
        \ NIST standards and guidelines implementing the legislation, direct organizations\
        \ to select one of the control baselines after the reviewing the information\
        \ types and the information that is processed, stored, and transmitted on\
        \ the system; analyzing the potential adverse impact of the loss or compromise\
        \ of the information or system on the organization\u2019s operations and assets,\
        \ individuals, other organizations, or the Nation; and considering the results\
        \ from system and organizational risk assessments. CNSSI 1253 provides guidance\
        \ on control baselines for national security systems."
      translations:
        pt:
          name: "Sele\xE7\xE3o de Linha de Base"
          description: Selecionar uma linha de base de controles para o sistema.
          annotation: "As linhas de base de controles s\xE3o conjuntos predefinidos\
            \ de controles especificamente reunidos para atender \xE0s necessidades\
            \ de prote\xE7\xE3o de um grupo, organiza\xE7\xE3o ou comunidade de interesse.\
            \ Os controles s\xE3o escolhidos para as linhas de base a fim de satisfazer\
            \ mandatos impostos por leis, decretos executivos, diretivas, regulamentos,\
            \ pol\xEDticas, normas e diretrizes ou de tratar amea\xE7as comuns a todos\
            \ os usu\xE1rios da linha de base sob as premissas espec\xEDficas dessa\
            \ linha de base. As linhas de base representam um ponto de partida para\
            \ a prote\xE7\xE3o da privacidade dos indiv\xEDduos, das informa\xE7\xF5\
            es e dos sistemas de informa\xE7\xE3o, com a\xE7\xF5es subsequentes de\
            \ adapta\xE7\xE3o para gerenciar o risco de acordo com a miss\xE3o, o\
            \ neg\xF3cio ou outras restri\xE7\xF5es (consulte PL-11). As linhas de\
            \ base federais de controles s\xE3o fornecidas na SP 800-53B. A sele\xE7\
            \xE3o de uma linha de base de controles \xE9 determinada pelas necessidades\
            \ das partes interessadas. As necessidades das partes interessadas consideram\
            \ os requisitos de miss\xE3o e de neg\xF3cio, bem como os mandatos impostos\
            \ por leis, decretos executivos, diretivas, pol\xEDticas, regulamentos,\
            \ normas e diretrizes aplic\xE1veis. Por exemplo, as linhas de base de\
            \ controles na SP 800-53B baseiam-se nos requisitos da FISMA e da PRIVACT.\
            \ Os requisitos, juntamente com as normas e diretrizes do NIST que implementam\
            \ a legisla\xE7\xE3o, orientam as organiza\xE7\xF5es a selecionar uma\
            \ das linhas de base de controles ap\xF3s revisar os tipos de informa\xE7\
            \xE3o e as informa\xE7\xF5es que s\xE3o processadas, armazenadas e transmitidas\
            \ no sistema; analisar o potencial impacto adverso da perda ou comprometimento\
            \ da informa\xE7\xE3o ou do sistema sobre as opera\xE7\xF5es e ativos\
            \ da organiza\xE7\xE3o, indiv\xEDduos, outras organiza\xE7\xF5es ou a\
            \ Na\xE7\xE3o; e considerar os resultados das avalia\xE7\xF5es de risco\
            \ do sistema e organizacionais. A CNSSI 1253 fornece orienta\xE7\xE3o\
            \ sobre linhas de base de controles para sistemas de seguran\xE7a nacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-11
      name: Baseline Tailoring
      description: Tailor the selected control baseline by applying specified tailoring
        actions.
      annotation: The concept of tailoring allows organizations to specialize or customize
        a set of baseline controls by applying a defined set of tailoring actions.
        Tailoring actions facilitate such specialization and customization by allowing
        organizations to develop security and privacy plans that reflect their specific
        mission and business functions, the environments where their systems operate,
        the threats and vulnerabilities that can affect their systems, and any other
        conditions or situations that can impact their mission or business success.
        Tailoring guidance is provided in SP 800-53B. Tailoring a control baseline
        is accomplished by identifying and designating common controls, applying scoping
        considerations, selecting compensating controls, assigning values to control
        parameters, supplementing the control baseline with additional controls as
        needed, and providing information for control implementation. The general
        tailoring actions in SP 800-53B can be supplemented with additional actions
        based on the needs of organizations. Tailoring actions can be applied to the
        baselines in SP 800-53B in accordance with the security and privacy requirements
        from FISMA, PRIVACT, and OMB A-130. Alternatively, other communities of interest
        adopting different control baselines can apply the tailoring actions in SP
        800-53B to specialize or customize the controls that represent the specific
        needs and concerns of those entities.
      translations:
        pt:
          name: "Adapta\xE7\xE3o da Linha de Base"
          description: "Adaptar a linha de base de controles selecionada aplicando\
            \ a\xE7\xF5es de adapta\xE7\xE3o especificadas."
          annotation: "O conceito de adapta\xE7\xE3o (tailoring) permite que as organiza\xE7\
            \xF5es especializem ou personalizem um conjunto de controles de linha\
            \ de base aplicando um conjunto definido de a\xE7\xF5es de adapta\xE7\xE3\
            o. As a\xE7\xF5es de adapta\xE7\xE3o facilitam tal especializa\xE7\xE3\
            o e personaliza\xE7\xE3o ao permitir que as organiza\xE7\xF5es desenvolvam\
            \ planos de seguran\xE7a e privacidade que reflitam suas fun\xE7\xF5es\
            \ espec\xEDficas de miss\xE3o e neg\xF3cio, os ambientes onde seus sistemas\
            \ operam, as amea\xE7as e vulnerabilidades que podem afetar seus sistemas\
            \ e quaisquer outras condi\xE7\xF5es ou situa\xE7\xF5es que possam impactar\
            \ o sucesso de sua miss\xE3o ou neg\xF3cio. Orienta\xE7\xF5es sobre adapta\xE7\
            \xE3o s\xE3o fornecidas na SP 800-53B. A adapta\xE7\xE3o de uma linha\
            \ de base de controles \xE9 realizada identificando e designando controles\
            \ comuns, aplicando considera\xE7\xF5es de escopo, selecionando controles\
            \ compensat\xF3rios, atribuindo valores aos par\xE2metros de controle,\
            \ complementando a linha de base de controles com controles adicionais\
            \ conforme necess\xE1rio e fornecendo informa\xE7\xF5es para a implementa\xE7\
            \xE3o dos controles. As a\xE7\xF5es gerais de adapta\xE7\xE3o na SP 800-53B\
            \ podem ser complementadas com a\xE7\xF5es adicionais com base nas necessidades\
            \ das organiza\xE7\xF5es. As a\xE7\xF5es de adapta\xE7\xE3o podem ser\
            \ aplicadas \xE0s linhas de base na SP 800-53B de acordo com os requisitos\
            \ de seguran\xE7a e privacidade da FISMA, da PRIVACT e da OMB A-130. Alternativamente,\
            \ outras comunidades de interesse que adotem diferentes linhas de base\
            \ de controles podem aplicar as a\xE7\xF5es de adapta\xE7\xE3o da SP 800-53B\
            \ para especializar ou personalizar os controles que representam as necessidades\
            \ e preocupa\xE7\xF5es espec\xEDficas dessas entidades."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      assessable: false
      depth: 1
      ref_id: PM
      name: Program Management
      translations:
        pt:
          name: "Gest\xE3o de Programa"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-1
      name: Information Security Program Plan
      description: 'a. Develop and disseminate an organization-wide information security
        program plan that:

        1. Provides an overview of the requirements for the security program and a
        description of the security program management controls and common controls
        in place or planned for meeting those requirements;

        2. Includes the identification and assignment of roles, responsibilities,
        management commitment, coordination among organizational entities, and compliance;

        3. Reflects the coordination among organizational entities responsible for
        information security; and

        4. Is approved by a senior official with responsibility and accountability
        for the risk being incurred to organizational operations (including mission,
        functions, image, and reputation), organizational assets, individuals, other
        organizations, and the Nation;

        b. Review and update the organization-wide information security program plan
        [Assignment: organization-defined frequency] and following [Assignment: organization-defined
        events]; and

        c. Protect the information security program plan from unauthorized disclosure
        and modification.'
      annotation: "An information security program plan is a formal document that\
        \ provides an overview of the security requirements for an organization-wide\
        \ information security program and describes the program management controls\
        \ and common controls in place or planned for meeting those requirements.\
        \ An information security program plan can be represented in a single document\
        \ or compilations of documents. Privacy program plans and supply chain risk\
        \ management plans are addressed separately in PM-18 and SR-2, respectively.\n\
        An information security program plan documents implementation details about\
        \ program management and common controls. The plan provides sufficient information\
        \ about the controls (including specification of parameters for assignment\
        \ and selection operations, explicitly or by reference) to enable implementations\
        \ that are unambiguously compliant with the intent of the plan and a determination\
        \ of the risk to be incurred if the plan is implemented as intended. Updates\
        \ to information security program plans include organizational changes and\
        \ problems identified during plan implementation or control assessments.\n\
        Program management controls may be implemented at the organization level or\
        \ the mission or business process level, and are essential for managing the\
        \ organization\u2019s information security program. Program management controls\
        \ are distinct from common, system-specific, and hybrid controls because program\
        \ management controls are independent of any particular system. Together,\
        \ the individual system security plans and the organization-wide information\
        \ security program plan provide complete coverage for the security controls\
        \ employed within the organization.\nCommon controls available for inheritance\
        \ by organizational systems are documented in an appendix to the organization\u2019\
        s information security program plan unless the controls are included in a\
        \ separate security plan for a system. The organization-wide information security\
        \ program plan indicates which separate security plans contain descriptions\
        \ of common controls.\nEvents that may precipitate an update to the information\
        \ security program plan include, but are not limited to, organization-wide\
        \ assessment or audit findings, security incidents or breaches, or changes\
        \ in laws, executive orders, directives, regulations, policies, standards,\
        \ and guidelines."
      translations:
        pt:
          name: "Plano do Programa de Seguran\xE7a da Informa\xE7\xE3o"
          description: "a. Desenvolver e disseminar um plano de programa de seguran\xE7\
            a da informa\xE7\xE3o de \xE2mbito organizacional que:\n1. Forne\xE7a\
            \ uma vis\xE3o geral dos requisitos para o programa de seguran\xE7a e\
            \ uma descri\xE7\xE3o dos controles de gest\xE3o do programa de seguran\xE7\
            a e dos controles comuns implementados ou planejados para atender a esses\
            \ requisitos;\n2. Inclua a identifica\xE7\xE3o e a atribui\xE7\xE3o de\
            \ pap\xE9is, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\
            \xE3o entre entidades organizacionais e conformidade;\n3. Reflita a coordena\xE7\
            \xE3o entre as entidades organizacionais respons\xE1veis pela seguran\xE7\
            a da informa\xE7\xE3o; e\n4. Seja aprovado por um oficial s\xEAnior com\
            \ responsabilidade e presta\xE7\xE3o de contas pelo risco incorrido \xE0\
            s opera\xE7\xF5es organizacionais (incluindo miss\xE3o, fun\xE7\xF5es,\
            \ imagem e reputa\xE7\xE3o), aos ativos organizacionais, aos indiv\xED\
            duos, a outras organiza\xE7\xF5es e \xE0 Na\xE7\xE3o;\nb. Revisar e atualizar\
            \ o plano de programa de seguran\xE7a da informa\xE7\xE3o de \xE2mbito\
            \ organizacional [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o]; e\nc. Proteger o plano de programa de seguran\xE7a da informa\xE7\
            \xE3o contra divulga\xE7\xE3o e modifica\xE7\xE3o n\xE3o autorizadas."
          annotation: "Um plano de programa de seguran\xE7a da informa\xE7\xE3o \xE9\
            \ um documento formal que fornece uma vis\xE3o geral dos requisitos de\
            \ seguran\xE7a para um programa de seguran\xE7a da informa\xE7\xE3o de\
            \ \xE2mbito organizacional e descreve os controles de gest\xE3o de programa\
            \ e os controles comuns implementados ou planejados para atender a esses\
            \ requisitos. Um plano de programa de seguran\xE7a da informa\xE7\xE3\
            o pode ser representado em um \xFAnico documento ou em compila\xE7\xF5\
            es de documentos. Os planos de programa de privacidade e os planos de\
            \ gest\xE3o de riscos da cadeia de suprimentos s\xE3o tratados separadamente\
            \ em PM-18 e SR-2, respectivamente.\nUm plano de programa de seguran\xE7\
            a da informa\xE7\xE3o documenta detalhes de implementa\xE7\xE3o sobre\
            \ a gest\xE3o de programa e os controles comuns. O plano fornece informa\xE7\
            \xF5es suficientes sobre os controles (incluindo a especifica\xE7\xE3\
            o de par\xE2metros para opera\xE7\xF5es de atribui\xE7\xE3o e sele\xE7\
            \xE3o, explicitamente ou por refer\xEAncia) para possibilitar implementa\xE7\
            \xF5es que estejam inequivocamente em conformidade com a inten\xE7\xE3\
            o do plano e uma determina\xE7\xE3o do risco a ser incorrido se o plano\
            \ for implementado conforme pretendido. As atualiza\xE7\xF5es dos planos\
            \ de programa de seguran\xE7a da informa\xE7\xE3o incluem mudan\xE7as\
            \ organizacionais e problemas identificados durante a implementa\xE7\xE3\
            o do plano ou as avalia\xE7\xF5es de controles.\nOs controles de gest\xE3\
            o de programa podem ser implementados no n\xEDvel da organiza\xE7\xE3\
            o ou no n\xEDvel do processo de miss\xE3o ou de neg\xF3cio, e s\xE3o essenciais\
            \ para gerenciar o programa de seguran\xE7a da informa\xE7\xE3o da organiza\xE7\
            \xE3o. Os controles de gest\xE3o de programa s\xE3o distintos dos controles\
            \ comuns, espec\xEDficos do sistema e h\xEDbridos porque os controles\
            \ de gest\xE3o de programa s\xE3o independentes de qualquer sistema em\
            \ particular. Em conjunto, os planos individuais de seguran\xE7a do sistema\
            \ e o plano de programa de seguran\xE7a da informa\xE7\xE3o de \xE2mbito\
            \ organizacional fornecem cobertura completa para os controles de seguran\xE7\
            a empregados dentro da organiza\xE7\xE3o.\nOs controles comuns dispon\xED\
            veis para heran\xE7a pelos sistemas organizacionais s\xE3o documentados\
            \ em um ap\xEAndice ao plano de programa de seguran\xE7a da informa\xE7\
            \xE3o da organiza\xE7\xE3o, a menos que os controles estejam inclu\xED\
            dos em um plano de seguran\xE7a separado para um sistema. O plano de programa\
            \ de seguran\xE7a da informa\xE7\xE3o de \xE2mbito organizacional indica\
            \ quais planos de seguran\xE7a separados cont\xEAm descri\xE7\xF5es dos\
            \ controles comuns.\nEventos que podem precipitar uma atualiza\xE7\xE3\
            o do plano de programa de seguran\xE7a da informa\xE7\xE3o incluem, entre\
            \ outros, constata\xE7\xF5es de avalia\xE7\xF5es ou auditorias de \xE2\
            mbito organizacional, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou\
            \ mudan\xE7as em leis, decretos executivos, diretivas, regulamentos, pol\xED\
            ticas, normas e diretrizes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-2
      name: Information Security Program Leadership Role
      description: Appoint a senior agency information security officer with the mission
        and resources to coordinate, develop, implement, and maintain an organization-wide
        information security program.
      annotation: The senior agency information security officer is an organizational
        official. For federal agencies (as defined by applicable laws, executive orders,
        regulations, directives, policies, and standards), this official is the senior
        agency information security officer. Organizations may also refer to this
        official as the senior information security officer or chief information security
        officer.
      translations:
        pt:
          name: "Papel de Lideran\xE7a do Programa de Seguran\xE7a da Informa\xE7\xE3\
            o"
          description: "Nomear um oficial s\xEAnior de seguran\xE7a da informa\xE7\
            \xE3o da ag\xEAncia com a miss\xE3o e os recursos para coordenar, desenvolver,\
            \ implementar e manter um programa de seguran\xE7a da informa\xE7\xE3\
            o de \xE2mbito organizacional."
          annotation: "O oficial s\xEAnior de seguran\xE7a da informa\xE7\xE3o da\
            \ ag\xEAncia \xE9 um funcion\xE1rio organizacional. Para ag\xEAncias federais\
            \ (conforme definido por leis, decretos executivos, regulamentos, diretivas,\
            \ pol\xEDticas e normas aplic\xE1veis), esse funcion\xE1rio \xE9 o oficial\
            \ s\xEAnior de seguran\xE7a da informa\xE7\xE3o da ag\xEAncia. As organiza\xE7\
            \xF5es tamb\xE9m podem se referir a esse funcion\xE1rio como o oficial\
            \ s\xEAnior de seguran\xE7a da informa\xE7\xE3o ou diretor de seguran\xE7\
            a da informa\xE7\xE3o (CISO)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-3
      name: Information Security and Privacy Resources
      description: 'a. Include the resources needed to implement the information security
        and privacy programs in capital planning and investment requests and document
        all exceptions to this requirement;

        b. Prepare documentation required for addressing information security and
        privacy programs in capital planning and investment requests in accordance
        with applicable laws, executive orders, directives, policies, regulations,
        standards; and

        c. Make available for expenditure, the planned information security and privacy
        resources.'
      annotation: Organizations consider establishing champions for information security
        and privacy and, as part of including the necessary resources, assign specialized
        expertise and resources as needed. Organizations may designate and empower
        an Investment Review Board or similar group to manage and provide oversight
        for the information security and privacy aspects of the capital planning and
        investment control process.
      translations:
        pt:
          name: "Recursos de Seguran\xE7a da Informa\xE7\xE3o e Privacidade"
          description: "a. Incluir os recursos necess\xE1rios para implementar os\
            \ programas de seguran\xE7a da informa\xE7\xE3o e privacidade nas solicita\xE7\
            \xF5es de planejamento de capital e investimento e documentar todas as\
            \ exce\xE7\xF5es a esse requisito;\nb. Preparar a documenta\xE7\xE3o necess\xE1\
            ria para tratar dos programas de seguran\xE7a da informa\xE7\xE3o e privacidade\
            \ nas solicita\xE7\xF5es de planejamento de capital e investimento de\
            \ acordo com as leis, decretos executivos, diretivas, pol\xEDticas, regulamentos\
            \ e normas aplic\xE1veis; e\nc. Disponibilizar para disp\xEAndio os recursos\
            \ planejados de seguran\xE7a da informa\xE7\xE3o e privacidade."
          annotation: "As organiza\xE7\xF5es consideram estabelecer defensores (champions)\
            \ para a seguran\xE7a da informa\xE7\xE3o e a privacidade e, como parte\
            \ da inclus\xE3o dos recursos necess\xE1rios, atribuir conhecimento especializado\
            \ e recursos conforme necess\xE1rio. As organiza\xE7\xF5es podem designar\
            \ e capacitar um Conselho de Revis\xE3o de Investimentos ou grupo similar\
            \ para gerenciar e fornecer supervis\xE3o para os aspectos de seguran\xE7\
            a da informa\xE7\xE3o e privacidade do processo de controle de planejamento\
            \ de capital e investimento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-4
      name: Plan of Action and Milestones Process
      description: 'a. Implement a process to ensure that plans of action and milestones
        for the information security, privacy, and supply chain risk management programs
        and associated organizational systems:

        1. Are developed and maintained;

        2. Document the remedial information security, privacy, and supply chain risk
        management actions to adequately respond to risk to organizational operations
        and assets, individuals, other organizations, and the Nation; and

        3. Are reported in accordance with established reporting requirements.

        b. Review plans of action and milestones for consistency with the organizational
        risk management strategy and organization-wide priorities for risk response
        actions.'
      annotation: The plan of action and milestones is a key organizational document
        and is subject to reporting requirements established by the Office of Management
        and Budget. Organizations develop plans of action and milestones with an organization-wide
        perspective, prioritizing risk response actions and ensuring consistency with
        the goals and objectives of the organization. Plan of action and milestones
        updates are based on findings from control assessments and continuous monitoring
        activities. There can be multiple plans of action and milestones corresponding
        to the information system level, mission/business process level, and organizational/governance
        level. While plans of action and milestones are required for federal organizations,
        other types of organizations can help reduce risk by documenting and tracking
        planned remediations. Specific guidance on plans of action and milestones
        at the system level is provided in CA-5.
      translations:
        pt:
          name: "Processo de Plano de A\xE7\xE3o e Marcos"
          description: "a. Implementar um processo para garantir que os planos de\
            \ a\xE7\xE3o e marcos para os programas de seguran\xE7a da informa\xE7\
            \xE3o, privacidade e gest\xE3o de riscos da cadeia de suprimentos e os\
            \ sistemas organizacionais associados:\n1. Sejam desenvolvidos e mantidos;\n\
            2. Documentem as a\xE7\xF5es corretivas de seguran\xE7a da informa\xE7\
            \xE3o, privacidade e gest\xE3o de riscos da cadeia de suprimentos para\
            \ responder adequadamente ao risco \xE0s opera\xE7\xF5es e ativos organizacionais,\
            \ aos indiv\xEDduos, a outras organiza\xE7\xF5es e \xE0 Na\xE7\xE3o; e\n\
            3. Sejam reportados de acordo com os requisitos de reporte estabelecidos.\n\
            b. Revisar os planos de a\xE7\xE3o e marcos quanto \xE0 consist\xEAncia\
            \ com a estrat\xE9gia organizacional de gest\xE3o de riscos e com as prioridades\
            \ de \xE2mbito organizacional para a\xE7\xF5es de resposta a riscos."
          annotation: "O plano de a\xE7\xE3o e marcos \xE9 um documento organizacional\
            \ fundamental e est\xE1 sujeito aos requisitos de reporte estabelecidos\
            \ pelo Escrit\xF3rio de Gest\xE3o e Or\xE7amento (OMB). As organiza\xE7\
            \xF5es desenvolvem os planos de a\xE7\xE3o e marcos com uma perspectiva\
            \ de \xE2mbito organizacional, priorizando as a\xE7\xF5es de resposta\
            \ a riscos e garantindo a consist\xEAncia com as metas e objetivos da\
            \ organiza\xE7\xE3o. As atualiza\xE7\xF5es dos planos de a\xE7\xE3o e\
            \ marcos baseiam-se em constata\xE7\xF5es das avalia\xE7\xF5es de controles\
            \ e das atividades de monitoramento cont\xEDnuo. Pode haver m\xFAltiplos\
            \ planos de a\xE7\xE3o e marcos correspondentes ao n\xEDvel do sistema\
            \ de informa\xE7\xE3o, ao n\xEDvel do processo de miss\xE3o/neg\xF3cio\
            \ e ao n\xEDvel organizacional/de governan\xE7a. Embora os planos de a\xE7\
            \xE3o e marcos sejam exigidos para organiza\xE7\xF5es federais, outros\
            \ tipos de organiza\xE7\xF5es podem ajudar a reduzir o risco documentando\
            \ e acompanhando as remedia\xE7\xF5es planejadas. Orienta\xE7\xF5es espec\xED\
            ficas sobre planos de a\xE7\xE3o e marcos no n\xEDvel do sistema s\xE3\
            o fornecidas em CA-5."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-5
      name: System Inventory
      description: 'Develop and update [Assignment: organization-defined frequency]
        an inventory of organizational systems.'
      annotation: OMB A-130 provides guidance on developing systems inventories and
        associated reporting requirements. System inventory refers to an organization-wide
        inventory of systems, not system components as described in CM-8.
      translations:
        pt:
          name: "Invent\xE1rio de Sistemas"
          description: "Desenvolver e atualizar [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] um invent\xE1rio dos sistemas organizacionais."
          annotation: "A OMB A-130 fornece orienta\xE7\xE3o sobre o desenvolvimento\
            \ de invent\xE1rios de sistemas e os requisitos de reporte associados.\
            \ O invent\xE1rio de sistemas refere-se a um invent\xE1rio de \xE2mbito\
            \ organizacional de sistemas, n\xE3o a componentes de sistema conforme\
            \ descrito em CM-8."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-5(1)
      name: System Inventory | Inventory of Personally Identifiable Information
      description: 'Establish, maintain, and update [Assignment: organization-defined
        frequency] an inventory of all systems, applications, and projects that process
        personally identifiable information.'
      annotation: An inventory of systems, applications, and projects that process
        personally identifiable information supports the mapping of data actions,
        providing individuals with privacy notices, maintaining accurate personally
        identifiable information, and limiting the processing of personally identifiable
        information when such information is not needed for operational purposes.
        Organizations may use this inventory to ensure that systems only process the
        personally identifiable information for authorized purposes and that this
        processing is still relevant and necessary for the purpose specified therein.
      translations:
        pt:
          name: "Invent\xE1rio de Sistemas | Invent\xE1rio de Informa\xE7\xF5es de\
            \ Identifica\xE7\xE3o Pessoal"
          description: "Estabelecer, manter e atualizar [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] um invent\xE1rio de todos os sistemas,\
            \ aplica\xE7\xF5es e projetos que processam informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal."
          annotation: "Um invent\xE1rio de sistemas, aplica\xE7\xF5es e projetos que\
            \ processam informa\xE7\xF5es de identifica\xE7\xE3o pessoal apoia o mapeamento\
            \ das a\xE7\xF5es de dados, fornecendo avisos de privacidade aos indiv\xED\
            duos, mantendo informa\xE7\xF5es de identifica\xE7\xE3o pessoal precisas\
            \ e limitando o processamento de informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal quando tais informa\xE7\xF5es n\xE3o forem necess\xE1rias para\
            \ fins operacionais. As organiza\xE7\xF5es podem usar esse invent\xE1\
            rio para garantir que os sistemas processem apenas as informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal para finalidades autorizadas e que esse\
            \ processamento ainda seja relevante e necess\xE1rio para a finalidade\
            \ nele especificada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-6
      name: Measures of Performance
      description: Develop, monitor, and report on the results of information security
        and privacy measures of performance.
      annotation: Measures of performance are outcome-based metrics used by an organization
        to measure the effectiveness or efficiency of the information security and
        privacy programs and the controls employed in support of the program. To facilitate
        security and privacy risk management, organizations consider aligning measures
        of performance with the organizational risk tolerance as defined in the risk
        management strategy.
      translations:
        pt:
          name: Medidas de Desempenho
          description: "Desenvolver, monitorar e reportar os resultados das medidas\
            \ de desempenho de seguran\xE7a da informa\xE7\xE3o e privacidade."
          annotation: "As medidas de desempenho s\xE3o m\xE9tricas baseadas em resultados\
            \ usadas por uma organiza\xE7\xE3o para medir a efic\xE1cia ou a efici\xEA\
            ncia dos programas de seguran\xE7a da informa\xE7\xE3o e privacidade e\
            \ dos controles empregados em apoio ao programa. Para facilitar a gest\xE3\
            o de riscos de seguran\xE7a e privacidade, as organiza\xE7\xF5es consideram\
            \ alinhar as medidas de desempenho com a toler\xE2ncia organizacional\
            \ ao risco, conforme definida na estrat\xE9gia de gest\xE3o de riscos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-7
      name: Enterprise Architecture
      description: Develop and maintain an enterprise architecture with consideration
        for information security, privacy, and the resulting risk to organizational
        operations and assets, individuals, other organizations, and the Nation.
      annotation: "The integration of security and privacy requirements and controls\
        \ into the enterprise architecture helps to ensure that security and privacy\
        \ considerations are addressed throughout the system development life cycle\
        \ and are explicitly related to the organization\u2019s mission and business\
        \ processes. The process of security and privacy requirements integration\
        \ also embeds into the enterprise architecture and the organization\u2019\
        s security and privacy architectures consistent with the organizational risk\
        \ management strategy. For PM-7, security and privacy architectures are developed\
        \ at a system-of-systems level, representing all organizational systems. For\
        \ PL-8, the security and privacy architectures are developed at a level that\
        \ represents an individual system. The system-level architectures are consistent\
        \ with the security and privacy architectures defined for the organization.\
        \ Security and privacy requirements and control integration are most effectively\
        \ accomplished through the rigorous application of the Risk Management Framework\
        \ SP 800-37 and supporting security standards and guidelines."
      translations:
        pt:
          name: Arquitetura Corporativa
          description: "Desenvolver e manter uma arquitetura corporativa considerando\
            \ a seguran\xE7a da informa\xE7\xE3o, a privacidade e o risco resultante\
            \ para as opera\xE7\xF5es e ativos organizacionais, indiv\xEDduos, outras\
            \ organiza\xE7\xF5es e a Na\xE7\xE3o."
          annotation: "A integra\xE7\xE3o de requisitos e controles de seguran\xE7\
            a e privacidade na arquitetura corporativa ajuda a assegurar que as considera\xE7\
            \xF5es de seguran\xE7a e privacidade sejam tratadas ao longo de todo o\
            \ ciclo de vida de desenvolvimento do sistema e estejam explicitamente\
            \ relacionadas \xE0 miss\xE3o e aos processos de neg\xF3cio da organiza\xE7\
            \xE3o. O processo de integra\xE7\xE3o dos requisitos de seguran\xE7a e\
            \ privacidade tamb\xE9m os incorpora \xE0 arquitetura corporativa e \xE0\
            s arquiteturas de seguran\xE7a e privacidade da organiza\xE7\xE3o, de\
            \ forma coerente com a estrat\xE9gia organizacional de gest\xE3o de riscos.\
            \ Para o PM-7, as arquiteturas de seguran\xE7a e privacidade s\xE3o desenvolvidas\
            \ em n\xEDvel de sistema de sistemas, representando todos os sistemas\
            \ organizacionais. Para o PL-8, as arquiteturas de seguran\xE7a e privacidade\
            \ s\xE3o desenvolvidas em um n\xEDvel que representa um sistema individual.\
            \ As arquiteturas em n\xEDvel de sistema s\xE3o coerentes com as arquiteturas\
            \ de seguran\xE7a e privacidade definidas para a organiza\xE7\xE3o. A\
            \ integra\xE7\xE3o de requisitos e controles de seguran\xE7a e privacidade\
            \ \xE9 realizada de forma mais eficaz por meio da aplica\xE7\xE3o rigorosa\
            \ da Estrutura de Gest\xE3o de Riscos (Risk Management Framework) SP 800-37\
            \ e das normas e diretrizes de seguran\xE7a que a apoiam."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-7(1)
      name: Enterprise Architecture | Offloading
      description: 'Offload [Assignment: organization-defined non-essential functions
        or services] to other systems, system components, or an external provider.'
      annotation: "Not every function or service that a system provides is essential\
        \ to organizational mission or business functions. Printing or copying is\
        \ an example of a non-essential but supporting service for an organization.\
        \ Whenever feasible, such supportive but non-essential functions or services\
        \ are not co-located with the functions or services that support essential\
        \ mission or business functions. Maintaining such functions on the same system\
        \ or system component increases the attack surface of the organization\u2019\
        s mission-essential functions or services. Moving supportive but non-essential\
        \ functions to a non-critical system, system component, or external provider\
        \ can also increase efficiency by putting those functions or services under\
        \ the control of individuals or providers who are subject matter experts in\
        \ the functions or services."
      translations:
        pt:
          name: Arquitetura Corporativa | Descarregamento (Offloading)
          description: "Descarregar [Atribui\xE7\xE3o: fun\xE7\xF5es ou servi\xE7\
            os n\xE3o essenciais definidos pela organiza\xE7\xE3o] para outros sistemas,\
            \ componentes de sistema ou um provedor externo."
          annotation: "Nem toda fun\xE7\xE3o ou servi\xE7o que um sistema fornece\
            \ \xE9 essencial para a miss\xE3o ou as fun\xE7\xF5es de neg\xF3cio da\
            \ organiza\xE7\xE3o. Impress\xE3o ou c\xF3pia s\xE3o exemplos de servi\xE7\
            os n\xE3o essenciais, por\xE9m de apoio, para uma organiza\xE7\xE3o. Sempre\
            \ que vi\xE1vel, tais fun\xE7\xF5es ou servi\xE7os de apoio, mas n\xE3\
            o essenciais, n\xE3o s\xE3o alocados junto \xE0s fun\xE7\xF5es ou servi\xE7\
            os que apoiam fun\xE7\xF5es essenciais de miss\xE3o ou de neg\xF3cio.\
            \ Manter tais fun\xE7\xF5es no mesmo sistema ou componente de sistema\
            \ aumenta a superf\xEDcie de ataque das fun\xE7\xF5es ou servi\xE7os essenciais\
            \ \xE0 miss\xE3o da organiza\xE7\xE3o. Mover fun\xE7\xF5es de apoio, mas\
            \ n\xE3o essenciais, para um sistema, componente de sistema ou provedor\
            \ externo n\xE3o cr\xEDtico tamb\xE9m pode aumentar a efici\xEAncia, ao\
            \ colocar essas fun\xE7\xF5es ou servi\xE7os sob o controle de indiv\xED\
            duos ou provedores que s\xE3o especialistas no assunto dessas fun\xE7\xF5\
            es ou servi\xE7os."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-8
      name: Critical Infrastructure Plan
      description: Address information security and privacy issues in the development,
        documentation, and updating of a critical infrastructure and key resources
        protection plan.
      annotation: Protection strategies are based on the prioritization of critical
        assets and resources. The requirement and guidance for defining critical infrastructure
        and key resources and for preparing an associated critical infrastructure
        protection plan are found in applicable laws, executive orders, directives,
        policies, regulations, standards, and guidelines.
      translations:
        pt:
          name: "Plano de Infraestrutura Cr\xEDtica"
          description: "Tratar quest\xF5es de seguran\xE7a da informa\xE7\xE3o e de\
            \ privacidade no desenvolvimento, na documenta\xE7\xE3o e na atualiza\xE7\
            \xE3o de um plano de prote\xE7\xE3o de infraestrutura cr\xEDtica e de\
            \ recursos-chave."
          annotation: "As estrat\xE9gias de prote\xE7\xE3o baseiam-se na prioriza\xE7\
            \xE3o de ativos e recursos cr\xEDticos. O requisito e a orienta\xE7\xE3\
            o para definir infraestrutura cr\xEDtica e recursos-chave e para preparar\
            \ um plano associado de prote\xE7\xE3o de infraestrutura cr\xEDtica encontram-se\
            \ em leis, ordens executivas, diretivas, pol\xEDticas, regulamentos, normas\
            \ e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-9
      name: Risk Management Strategy
      description: 'a. Develops a comprehensive strategy to manage:

        1. Security risk to organizational operations and assets, individuals, other
        organizations, and the Nation associated with the operation and use of organizational
        systems; and

        2. Privacy risk to individuals resulting from the authorized processing of
        personally identifiable information;

        b. Implement the risk management strategy consistently across the organization;
        and

        c. Review and update the risk management strategy [Assignment: organization-defined
        frequency] or as required, to address organizational changes.'
      annotation: "An organization-wide risk management strategy includes an expression\
        \ of the security and privacy risk tolerance for the organization, security\
        \ and privacy risk mitigation strategies, acceptable risk assessment methodologies,\
        \ a process for evaluating security and privacy risk across the organization\
        \ with respect to the organization\u2019s risk tolerance, and approaches for\
        \ monitoring risk over time. The senior accountable official for risk management\
        \ (agency head or designated official) aligns information security management\
        \ processes with strategic, operational, and budgetary planning processes.\
        \ The risk executive function, led by the senior accountable official for\
        \ risk management, can facilitate consistent application of the risk management\
        \ strategy organization-wide. The risk management strategy can be informed\
        \ by security and privacy risk-related inputs from other sources, both internal\
        \ and external to the organization, to ensure that the strategy is broad-based\
        \ and comprehensive. The supply chain risk management strategy described in\
        \ PM-30 can also provide useful inputs to the organization-wide risk management\
        \ strategy."
      translations:
        pt:
          name: "Estrat\xE9gia de Gest\xE3o de Riscos"
          description: "a. Desenvolve uma estrat\xE9gia abrangente para gerir:\n1.\
            \ O risco de seguran\xE7a para as opera\xE7\xF5es e ativos organizacionais,\
            \ indiv\xEDduos, outras organiza\xE7\xF5es e a Na\xE7\xE3o, associado\
            \ \xE0 opera\xE7\xE3o e ao uso dos sistemas organizacionais; e\n2. O risco\
            \ de privacidade para indiv\xEDduos resultante do processamento autorizado\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal;\nb. Implementar\
            \ a estrat\xE9gia de gest\xE3o de riscos de forma coerente em toda a organiza\xE7\
            \xE3o; e\nc. Revisar e atualizar a estrat\xE9gia de gest\xE3o de riscos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] ou\
            \ conforme necess\xE1rio, para tratar mudan\xE7as organizacionais."
          annotation: "Uma estrat\xE9gia de gest\xE3o de riscos abrangendo toda a\
            \ organiza\xE7\xE3o inclui a express\xE3o da toler\xE2ncia a riscos de\
            \ seguran\xE7a e privacidade da organiza\xE7\xE3o, estrat\xE9gias de mitiga\xE7\
            \xE3o de riscos de seguran\xE7a e privacidade, metodologias aceit\xE1\
            veis de avalia\xE7\xE3o de riscos, um processo para avaliar os riscos\
            \ de seguran\xE7a e privacidade em toda a organiza\xE7\xE3o em rela\xE7\
            \xE3o \xE0 sua toler\xE2ncia a riscos, e abordagens para monitorar o risco\
            \ ao longo do tempo. O alto funcion\xE1rio respons\xE1vel pela gest\xE3\
            o de riscos (chefe da ag\xEAncia ou funcion\xE1rio designado) alinha os\
            \ processos de gest\xE3o da seguran\xE7a da informa\xE7\xE3o com os processos\
            \ de planejamento estrat\xE9gico, operacional e or\xE7ament\xE1rio. A\
            \ fun\xE7\xE3o de executivo de risco, liderada pelo alto funcion\xE1rio\
            \ respons\xE1vel pela gest\xE3o de riscos, pode facilitar a aplica\xE7\
            \xE3o coerente da estrat\xE9gia de gest\xE3o de riscos em toda a organiza\xE7\
            \xE3o. A estrat\xE9gia de gest\xE3o de riscos pode ser informada por insumos\
            \ relacionados a riscos de seguran\xE7a e privacidade provenientes de\
            \ outras fontes, tanto internas quanto externas \xE0 organiza\xE7\xE3\
            o, para garantir que a estrat\xE9gia seja de base ampla e abrangente.\
            \ A estrat\xE9gia de gest\xE3o de riscos da cadeia de suprimentos descrita\
            \ no PM-30 tamb\xE9m pode fornecer insumos \xFAteis para a estrat\xE9\
            gia de gest\xE3o de riscos de toda a organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-10
      name: Authorization Process
      description: 'a. Manage the security and privacy state of organizational systems
        and the environments in which those systems operate through authorization
        processes;

        b. Designate individuals to fulfill specific roles and responsibilities within
        the organizational risk management process; and

        c. Integrate the authorization processes into an organization-wide risk management
        program.'
      annotation: Authorization processes for organizational systems and environments
        of operation require the implementation of an organization-wide risk management
        process and associated security and privacy standards and guidelines. Specific
        roles for risk management processes include a risk executive (function) and
        designated authorizing officials for each organizational system and common
        control provider. The authorization processes for the organization are integrated
        with continuous monitoring processes to facilitate ongoing understanding and
        acceptance of security and privacy risks to organizational operations, organizational
        assets, individuals, other organizations, and the Nation.
      translations:
        pt:
          name: "Processo de Autoriza\xE7\xE3o"
          description: "a. Gerir o estado de seguran\xE7a e privacidade dos sistemas\
            \ organizacionais e dos ambientes em que esses sistemas operam, por meio\
            \ de processos de autoriza\xE7\xE3o;\nb. Designar indiv\xEDduos para desempenhar\
            \ fun\xE7\xF5es e responsabilidades espec\xEDficas dentro do processo\
            \ organizacional de gest\xE3o de riscos; e\nc. Integrar os processos de\
            \ autoriza\xE7\xE3o a um programa de gest\xE3o de riscos abrangendo toda\
            \ a organiza\xE7\xE3o."
          annotation: "Os processos de autoriza\xE7\xE3o para sistemas organizacionais\
            \ e ambientes de opera\xE7\xE3o exigem a implementa\xE7\xE3o de um processo\
            \ de gest\xE3o de riscos abrangendo toda a organiza\xE7\xE3o e de normas\
            \ e diretrizes de seguran\xE7a e privacidade associadas. As fun\xE7\xF5\
            es espec\xEDficas para os processos de gest\xE3o de riscos incluem um\
            \ executivo de risco (fun\xE7\xE3o) e autoridades autorizadoras designadas\
            \ para cada sistema organizacional e provedor de controles comuns. Os\
            \ processos de autoriza\xE7\xE3o da organiza\xE7\xE3o s\xE3o integrados\
            \ aos processos de monitoramento cont\xEDnuo para facilitar a compreens\xE3\
            o e a aceita\xE7\xE3o cont\xEDnuas dos riscos de seguran\xE7a e privacidade\
            \ para as opera\xE7\xF5es organizacionais, os ativos organizacionais,\
            \ os indiv\xEDduos, outras organiza\xE7\xF5es e a Na\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-11
      name: Mission and Business Process Definition
      description: 'a. Define organizational mission and business processes with consideration
        for information security and privacy and the resulting risk to organizational
        operations, organizational assets, individuals, other organizations, and the
        Nation; and

        b. Determine information protection and personally identifiable information
        processing needs arising from the defined mission and business processes;
        and

        c. Review and revise the mission and business processes [Assignment: organization-defined
        frequency].'
      annotation: Protection needs are technology-independent capabilities that are
        required to counter threats to organizations, individuals, systems, and the
        Nation through the compromise of information (i.e., loss of confidentiality,
        integrity, availability, or privacy). Information protection and personally
        identifiable information processing needs are derived from the mission and
        business needs defined by organizational stakeholders, the mission and business
        processes designed to meet those needs, and the organizational risk management
        strategy. Information protection and personally identifiable information processing
        needs determine the required controls for the organization and the systems.
        Inherent to defining protection and personally identifiable information processing
        needs is an understanding of the adverse impact that could result if a compromise
        or breach of information occurs. The categorization process is used to make
        such potential impact determinations. Privacy risks to individuals can arise
        from the compromise of personally identifiable information, but they can also
        arise as unintended consequences or a byproduct of the processing of personally
        identifiable information at any stage of the information life cycle. Privacy
        risk assessments are used to prioritize the risks that are created for individuals
        from system processing of personally identifiable information. These risk
        assessments enable the selection of the required privacy controls for the
        organization and systems. Mission and business process definitions and the
        associated protection requirements are documented in accordance with organizational
        policies and procedures.
      translations:
        pt:
          name: "Defini\xE7\xE3o de Processos de Miss\xE3o e de Neg\xF3cio"
          description: "a. Definir os processos de miss\xE3o e de neg\xF3cio organizacionais\
            \ considerando a seguran\xE7a da informa\xE7\xE3o e a privacidade e o\
            \ risco resultante para as opera\xE7\xF5es organizacionais, os ativos\
            \ organizacionais, os indiv\xEDduos, outras organiza\xE7\xF5es e a Na\xE7\
            \xE3o; e\nb. Determinar as necessidades de prote\xE7\xE3o da informa\xE7\
            \xE3o e de processamento de informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ decorrentes dos processos de miss\xE3o e de neg\xF3cio definidos; e\n\
            c. Revisar e revisar os processos de miss\xE3o e de neg\xF3cio [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "As necessidades de prote\xE7\xE3o s\xE3o capacidades independentes\
            \ de tecnologia que s\xE3o requeridas para conter amea\xE7as \xE0s organiza\xE7\
            \xF5es, aos indiv\xEDduos, aos sistemas e \xE0 Na\xE7\xE3o por meio do\
            \ comprometimento da informa\xE7\xE3o (ou seja, perda de confidencialidade,\
            \ integridade, disponibilidade ou privacidade). As necessidades de prote\xE7\
            \xE3o da informa\xE7\xE3o e de processamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal derivam das necessidades de miss\xE3o e de neg\xF3cio definidas\
            \ pelas partes interessadas organizacionais, dos processos de miss\xE3\
            o e de neg\xF3cio concebidos para atender a essas necessidades e da estrat\xE9\
            gia organizacional de gest\xE3o de riscos. As necessidades de prote\xE7\
            \xE3o da informa\xE7\xE3o e de processamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal determinam os controles requeridos para a organiza\xE7\xE3\
            o e os sistemas. Inerente \xE0 defini\xE7\xE3o das necessidades de prote\xE7\
            \xE3o e de processamento de informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ est\xE1 a compreens\xE3o do impacto adverso que poderia resultar caso\
            \ ocorra um comprometimento ou viola\xE7\xE3o da informa\xE7\xE3o. O processo\
            \ de categoriza\xE7\xE3o \xE9 usado para fazer tais determina\xE7\xF5\
            es de impacto potencial. Os riscos de privacidade para os indiv\xEDduos\
            \ podem decorrer do comprometimento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal, mas tamb\xE9m podem surgir como consequ\xEAncias n\xE3\
            o intencionais ou um subproduto do processamento de informa\xE7\xF5es\
            \ de identifica\xE7\xE3o pessoal em qualquer est\xE1gio do ciclo de vida\
            \ da informa\xE7\xE3o. As avalia\xE7\xF5es de riscos de privacidade s\xE3\
            o usadas para priorizar os riscos criados para os indiv\xEDduos pelo processamento\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal pelo sistema. Essas\
            \ avalia\xE7\xF5es de riscos permitem a sele\xE7\xE3o dos controles de\
            \ privacidade requeridos para a organiza\xE7\xE3o e os sistemas. As defini\xE7\
            \xF5es dos processos de miss\xE3o e de neg\xF3cio e os requisitos de prote\xE7\
            \xE3o associados s\xE3o documentados de acordo com as pol\xEDticas e os\
            \ procedimentos organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-12
      name: Insider Threat Program
      description: Implement an insider threat program that includes a cross-discipline
        insider threat incident handling team.
      annotation: 'Organizations that handle classified information are required,
        under Executive Order 13587 EO 13587 and the National Insider Threat Policy
        ODNI NITP, to establish insider threat programs. The same standards and guidelines
        that apply to insider threat programs in classified environments can also
        be employed effectively to improve the security of controlled unclassified
        and other information in non-national security systems. Insider threat programs
        include controls to detect and prevent malicious insider activity through
        the centralized integration and analysis of both technical and nontechnical
        information to identify potential insider threat concerns. A senior official
        is designated by the department or agency head as the responsible individual
        to implement and provide oversight for the program. In addition to the centralized
        integration and analysis capability, insider threat programs require organizations
        to prepare department or agency insider threat policies and implementation
        plans, conduct host-based user monitoring of individual employee activities
        on government-owned classified computers, provide insider threat awareness
        training to employees, receive access to information from offices in the department
        or agency for insider threat analysis, and conduct self-assessments of department
        or agency insider threat posture.

        Insider threat programs can leverage the existence of incident handling teams
        that organizations may already have in place, such as computer security incident
        response teams. Human resources records are especially important in this effort,
        as there is compelling evidence to show that some types of insider crimes
        are often preceded by nontechnical behaviors in the workplace, including ongoing
        patterns of disgruntled behavior and conflicts with coworkers and other colleagues.
        These precursors can guide organizational officials in more focused, targeted
        monitoring efforts. However, the use of human resource records could raise
        significant concerns for privacy. The participation of a legal team, including
        consultation with the senior agency official for privacy, ensures that monitoring
        activities are performed in accordance with applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines.'
      translations:
        pt:
          name: "Programa de Amea\xE7a Interna (Insider Threat)"
          description: "Implementar um programa de amea\xE7a interna que inclua uma\
            \ equipe multidisciplinar de tratamento de incidentes de amea\xE7a interna."
          annotation: "As organiza\xE7\xF5es que tratam informa\xE7\xF5es classificadas\
            \ s\xE3o obrigadas, nos termos da Ordem Executiva 13587 (EO 13587) e da\
            \ Pol\xEDtica Nacional de Amea\xE7a Interna (ODNI NITP), a estabelecer\
            \ programas de amea\xE7a interna. As mesmas normas e diretrizes que se\
            \ aplicam aos programas de amea\xE7a interna em ambientes classificados\
            \ tamb\xE9m podem ser empregadas de forma eficaz para melhorar a seguran\xE7\
            a de informa\xE7\xF5es controladas n\xE3o classificadas e de outras informa\xE7\
            \xF5es em sistemas que n\xE3o sejam de seguran\xE7a nacional. Os programas\
            \ de amea\xE7a interna incluem controles para detectar e prevenir atividades\
            \ maliciosas de pessoas internas por meio da integra\xE7\xE3o e an\xE1\
            lise centralizadas de informa\xE7\xF5es tanto t\xE9cnicas quanto n\xE3\
            o t\xE9cnicas, a fim de identificar poss\xEDveis preocupa\xE7\xF5es de\
            \ amea\xE7a interna. Um funcion\xE1rio s\xEAnior \xE9 designado pelo chefe\
            \ do departamento ou da ag\xEAncia como o indiv\xEDduo respons\xE1vel\
            \ por implementar e fornecer supervis\xE3o ao programa. Al\xE9m da capacidade\
            \ centralizada de integra\xE7\xE3o e an\xE1lise, os programas de amea\xE7\
            a interna exigem que as organiza\xE7\xF5es preparem pol\xEDticas e planos\
            \ de implementa\xE7\xE3o de amea\xE7a interna do departamento ou da ag\xEA\
            ncia, realizem o monitoramento baseado em host das atividades individuais\
            \ dos empregados em computadores classificados de propriedade do governo,\
            \ forne\xE7am treinamento de conscientiza\xE7\xE3o sobre amea\xE7a interna\
            \ aos empregados, recebam acesso a informa\xE7\xF5es de escrit\xF3rios\
            \ do departamento ou da ag\xEAncia para an\xE1lise de amea\xE7a interna\
            \ e realizem autoavalia\xE7\xF5es da postura de amea\xE7a interna do departamento\
            \ ou da ag\xEAncia.\nOs programas de amea\xE7a interna podem aproveitar\
            \ a exist\xEAncia de equipes de tratamento de incidentes que as organiza\xE7\
            \xF5es j\xE1 possam ter implementado, tais como equipes de resposta a\
            \ incidentes de seguran\xE7a computacional. Os registros de recursos humanos\
            \ s\xE3o especialmente importantes nesse esfor\xE7o, pois h\xE1 evid\xEA\
            ncias convincentes de que alguns tipos de crimes cometidos por pessoas\
            \ internas s\xE3o frequentemente precedidos por comportamentos n\xE3o\
            \ t\xE9cnicos no ambiente de trabalho, incluindo padr\xF5es cont\xEDnuos\
            \ de comportamento insatisfeito e conflitos com colegas de trabalho e\
            \ outros colegas. Esses precursores podem orientar os funcion\xE1rios\
            \ da organiza\xE7\xE3o em esfor\xE7os de monitoramento mais focados e\
            \ direcionados. No entanto, o uso de registros de recursos humanos poderia\
            \ levantar preocupa\xE7\xF5es significativas quanto \xE0 privacidade.\
            \ A participa\xE7\xE3o de uma equipe jur\xEDdica, incluindo a consulta\
            \ ao alto funcion\xE1rio da ag\xEAncia respons\xE1vel pela privacidade,\
            \ assegura que as atividades de monitoramento sejam realizadas de acordo\
            \ com as leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-13
      name: Security and Privacy Workforce
      description: Establish a security and privacy workforce development and improvement
        program.
      annotation: Security and privacy workforce development and improvement programs
        include defining the knowledge, skills, and abilities needed to perform security
        and privacy duties and tasks; developing role-based training programs for
        individuals assigned security and privacy roles and responsibilities; and
        providing standards and guidelines for measuring and building individual qualifications
        for incumbents and applicants for security- and privacy-related positions.
        Such workforce development and improvement programs can also include security
        and privacy career paths to encourage security and privacy professionals to
        advance in the field and fill positions with greater responsibility. The programs
        encourage organizations to fill security- and privacy-related positions with
        qualified personnel. Security and privacy workforce development and improvement
        programs are complementary to organizational security awareness and training
        programs and focus on developing and institutionalizing the core security
        and privacy capabilities of personnel needed to protect organizational operations,
        assets, and individuals.
      translations:
        pt:
          name: "For\xE7a de Trabalho de Seguran\xE7a e Privacidade"
          description: "Estabelecer um programa de desenvolvimento e aprimoramento\
            \ da for\xE7a de trabalho de seguran\xE7a e privacidade."
          annotation: "Os programas de desenvolvimento e aprimoramento da for\xE7\
            a de trabalho de seguran\xE7a e privacidade incluem a defini\xE7\xE3o\
            \ dos conhecimentos, habilidades e aptid\xF5es necess\xE1rios para desempenhar\
            \ deveres e tarefas de seguran\xE7a e privacidade; o desenvolvimento de\
            \ programas de treinamento baseados em fun\xE7\xE3o para indiv\xEDduos\
            \ com fun\xE7\xF5es e responsabilidades de seguran\xE7a e privacidade\
            \ atribu\xEDdas; e o fornecimento de normas e diretrizes para medir e\
            \ desenvolver as qualifica\xE7\xF5es individuais de ocupantes e candidatos\
            \ a cargos relacionados \xE0 seguran\xE7a e \xE0 privacidade. Tais programas\
            \ de desenvolvimento e aprimoramento da for\xE7a de trabalho tamb\xE9\
            m podem incluir planos de carreira em seguran\xE7a e privacidade para\
            \ incentivar os profissionais de seguran\xE7a e privacidade a avan\xE7\
            ar na \xE1rea e a ocupar cargos de maior responsabilidade. Os programas\
            \ incentivam as organiza\xE7\xF5es a preencher cargos relacionados \xE0\
            \ seguran\xE7a e \xE0 privacidade com pessoal qualificado. Os programas\
            \ de desenvolvimento e aprimoramento da for\xE7a de trabalho de seguran\xE7\
            a e privacidade s\xE3o complementares aos programas organizacionais de\
            \ conscientiza\xE7\xE3o e treinamento em seguran\xE7a e concentram-se\
            \ em desenvolver e institucionalizar as capacidades essenciais de seguran\xE7\
            a e privacidade do pessoal necess\xE1rias para proteger as opera\xE7\xF5\
            es, os ativos e os indiv\xEDduos organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-14
      name: Testing, Training, and Monitoring
      description: 'a. Implement a process for ensuring that organizational plans
        for conducting security and privacy testing, training, and monitoring activities
        associated with organizational systems:

        1. Are developed and maintained; and

        2. Continue to be executed; and

        b. Review testing, training, and monitoring plans for consistency with the
        organizational risk management strategy and organization-wide priorities for
        risk response actions.'
      annotation: A process for organization-wide security and privacy testing, training,
        and monitoring helps ensure that organizations provide oversight for testing,
        training, and monitoring activities and that those activities are coordinated.
        With the growing importance of continuous monitoring programs, the implementation
        of information security and privacy across the three levels of the risk management
        hierarchy and the widespread use of common controls, organizations coordinate
        and consolidate the testing and monitoring activities that are routinely conducted
        as part of ongoing assessments supporting a variety of controls. Security
        and privacy training activities, while focused on individual systems and specific
        roles, require coordination across all organizational elements. Testing, training,
        and monitoring plans and activities are informed by current threat and vulnerability
        assessments.
      translations:
        pt:
          name: Testes, Treinamento e Monitoramento
          description: "a. Implementar um processo para assegurar que os planos organizacionais\
            \ para conduzir atividades de testes, treinamento e monitoramento de seguran\xE7\
            a e privacidade associadas aos sistemas organizacionais:\n1. Sejam desenvolvidos\
            \ e mantidos; e\n2. Continuem a ser executados; e\nb. Revisar os planos\
            \ de testes, treinamento e monitoramento quanto \xE0 coer\xEAncia com\
            \ a estrat\xE9gia organizacional de gest\xE3o de riscos e com as prioridades\
            \ de toda a organiza\xE7\xE3o para as a\xE7\xF5es de resposta a riscos."
          annotation: "Um processo de testes, treinamento e monitoramento de seguran\xE7\
            a e privacidade abrangendo toda a organiza\xE7\xE3o ajuda a assegurar\
            \ que as organiza\xE7\xF5es forne\xE7am supervis\xE3o das atividades de\
            \ testes, treinamento e monitoramento e que essas atividades sejam coordenadas.\
            \ Com a crescente import\xE2ncia dos programas de monitoramento cont\xED\
            nuo, a implementa\xE7\xE3o da seguran\xE7a da informa\xE7\xE3o e da privacidade\
            \ nos tr\xEAs n\xEDveis da hierarquia de gest\xE3o de riscos e o uso generalizado\
            \ de controles comuns, as organiza\xE7\xF5es coordenam e consolidam as\
            \ atividades de testes e monitoramento que s\xE3o rotineiramente realizadas\
            \ como parte das avalia\xE7\xF5es cont\xEDnuas que apoiam uma variedade\
            \ de controles. As atividades de treinamento em seguran\xE7a e privacidade,\
            \ embora focadas em sistemas individuais e fun\xE7\xF5es espec\xEDficas,\
            \ exigem coordena\xE7\xE3o entre todos os elementos organizacionais. Os\
            \ planos e atividades de testes, treinamento e monitoramento s\xE3o informados\
            \ pelas avalia\xE7\xF5es atuais de amea\xE7as e vulnerabilidades."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-15
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-15
      name: Security and Privacy Groups and Associations
      description: 'Establish and institutionalize contact with selected groups and
        associations within the security and privacy communities:

        a. To facilitate ongoing security and privacy education and training for organizational
        personnel;

        b. To maintain currency with recommended security and privacy practices, techniques,
        and technologies; and

        c. To share current security and privacy information, including threats, vulnerabilities,
        and incidents.'
      annotation: "Ongoing contact with security and privacy groups and associations\
        \ is important in an environment of rapidly changing technologies and threats.\
        \ Groups and associations include special interest groups, professional associations,\
        \ forums, news groups, users\u2019 groups, and peer groups of security and\
        \ privacy professionals in similar organizations. Organizations select security\
        \ and privacy groups and associations based on mission and business functions.\
        \ Organizations share threat, vulnerability, and incident information as well\
        \ as contextual insights, compliance techniques, and privacy problems consistent\
        \ with applicable laws, executive orders, directives, policies, regulations,\
        \ standards, and guidelines."
      translations:
        pt:
          name: "Grupos e Associa\xE7\xF5es de Seguran\xE7a e Privacidade"
          description: "Estabelecer e institucionalizar contato com grupos e associa\xE7\
            \xF5es selecionados dentro das comunidades de seguran\xE7a e privacidade:\n\
            a. Para facilitar a educa\xE7\xE3o e o treinamento cont\xEDnuos em seguran\xE7\
            a e privacidade para o pessoal organizacional;\nb. Para manter-se atualizado\
            \ em rela\xE7\xE3o \xE0s pr\xE1ticas, t\xE9cnicas e tecnologias de seguran\xE7\
            a e privacidade recomendadas; e\nc. Para compartilhar informa\xE7\xF5\
            es atuais de seguran\xE7a e privacidade, incluindo amea\xE7as, vulnerabilidades\
            \ e incidentes."
          annotation: "O contato cont\xEDnuo com grupos e associa\xE7\xF5es de seguran\xE7\
            a e privacidade \xE9 importante em um ambiente de tecnologias e amea\xE7\
            as em r\xE1pida mudan\xE7a. Grupos e associa\xE7\xF5es incluem grupos\
            \ de interesse especial, associa\xE7\xF5es profissionais, f\xF3runs, grupos\
            \ de not\xEDcias, grupos de usu\xE1rios e grupos de pares de profissionais\
            \ de seguran\xE7a e privacidade em organiza\xE7\xF5es semelhantes. As\
            \ organiza\xE7\xF5es selecionam grupos e associa\xE7\xF5es de seguran\xE7\
            a e privacidade com base em suas fun\xE7\xF5es de miss\xE3o e de neg\xF3\
            cio. As organiza\xE7\xF5es compartilham informa\xE7\xF5es sobre amea\xE7\
            as, vulnerabilidades e incidentes, bem como percep\xE7\xF5es contextuais,\
            \ t\xE9cnicas de conformidade e problemas de privacidade, de forma coerente\
            \ com as leis, ordens executivas, diretivas, pol\xEDticas, regulamentos,\
            \ normas e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-16
      name: Threat Awareness Program
      description: Implement a threat awareness program that includes a cross-organization
        information-sharing capability for threat intelligence.
      annotation: Because of the constantly changing and increasing sophistication
        of adversaries, especially the advanced persistent threat (APT), it may be
        more likely that adversaries can successfully breach or compromise organizational
        systems. One of the best techniques to address this concern is for organizations
        to share threat information, including threat events (i.e., tactics, techniques,
        and procedures) that organizations have experienced, mitigations that organizations
        have found are effective against certain types of threats, and threat intelligence
        (i.e., indications and warnings about threats). Threat information sharing
        may be bilateral or multilateral. Bilateral threat sharing includes government-to-commercial
        and government-to-government cooperatives. Multilateral threat sharing includes
        organizations taking part in threat-sharing consortia. Threat information
        may require special agreements and protection, or it may be freely shared.
      translations:
        pt:
          name: "Programa de Conscientiza\xE7\xE3o sobre Amea\xE7as"
          description: "Implementar um programa de conscientiza\xE7\xE3o sobre amea\xE7\
            as que inclua uma capacidade de compartilhamento de informa\xE7\xF5es\
            \ entre organiza\xE7\xF5es para intelig\xEAncia de amea\xE7as."
          annotation: "Devido \xE0 sofistica\xE7\xE3o constantemente crescente e em\
            \ mudan\xE7a dos advers\xE1rios, especialmente a amea\xE7a persistente\
            \ avan\xE7ada (APT), pode ser mais prov\xE1vel que os advers\xE1rios consigam\
            \ violar ou comprometer com sucesso os sistemas organizacionais. Uma das\
            \ melhores t\xE9cnicas para tratar dessa preocupa\xE7\xE3o \xE9 as organiza\xE7\
            \xF5es compartilharem informa\xE7\xF5es sobre amea\xE7as, incluindo eventos\
            \ de amea\xE7a (ou seja, t\xE1ticas, t\xE9cnicas e procedimentos) que\
            \ as organiza\xE7\xF5es vivenciaram, mitiga\xE7\xF5es que as organiza\xE7\
            \xF5es constataram ser eficazes contra certos tipos de amea\xE7as e intelig\xEA\
            ncia de amea\xE7as (ou seja, indica\xE7\xF5es e avisos sobre amea\xE7\
            as). O compartilhamento de informa\xE7\xF5es sobre amea\xE7as pode ser\
            \ bilateral ou multilateral. O compartilhamento bilateral de amea\xE7\
            as inclui cooperativas governo-para-comercial e governo-para-governo.\
            \ O compartilhamento multilateral de amea\xE7as inclui organiza\xE7\xF5\
            es que participam de cons\xF3rcios de compartilhamento de amea\xE7as.\
            \ As informa\xE7\xF5es sobre amea\xE7as podem exigir acordos e prote\xE7\
            \xE3o especiais, ou podem ser compartilhadas livremente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-16(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-16(1)
      name: Threat Awareness Program | Automated Means for Sharing Threat Intelligence
      description: Employ automated mechanisms to maximize the effectiveness of sharing
        threat intelligence information.
      annotation: To maximize the effectiveness of monitoring, it is important to
        know what threat observables and indicators the sensors need to be searching
        for. By using well-established frameworks, services, and automated tools,
        organizations improve their ability to rapidly share and feed the relevant
        threat detection signatures into monitoring tools.
      translations:
        pt:
          name: "Programa de Conscientiza\xE7\xE3o sobre Amea\xE7as | Meios Automatizados\
            \ para Compartilhamento de Intelig\xEAncia de Amea\xE7as"
          description: "Empregar mecanismos automatizados para maximizar a efic\xE1\
            cia do compartilhamento de informa\xE7\xF5es de intelig\xEAncia de amea\xE7\
            as."
          annotation: "Para maximizar a efic\xE1cia do monitoramento, \xE9 importante\
            \ saber quais observ\xE1veis e indicadores de amea\xE7as os sensores precisam\
            \ buscar. Ao usar estruturas, servi\xE7os e ferramentas automatizadas\
            \ bem estabelecidas, as organiza\xE7\xF5es melhoram sua capacidade de\
            \ compartilhar e alimentar rapidamente as assinaturas de detec\xE7\xE3\
            o de amea\xE7as relevantes nas ferramentas de monitoramento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-17
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-17
      name: Protecting Controlled Unclassified Information on External Systems
      description: 'a. Establish policy and procedures to ensure that requirements
        for the protection of controlled unclassified information that is processed,
        stored or transmitted on external systems, are implemented in accordance with
        applicable laws, executive orders, directives, policies, regulations, and
        standards; and

        b. Review and update the policy and procedures [Assignment: organization-defined
        frequency].'
      annotation: Controlled unclassified information is defined by the National Archives
        and Records Administration along with the safeguarding and dissemination requirements
        for such information and is codified in 32 CFR 2002 and, specifically for
        systems external to the federal organization, 32 CFR 2002.14h. The policy
        prescribes the specific use and conditions to be implemented in accordance
        with organizational procedures, including via its contracting processes.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Informa\xE7\xF5es Controladas N\xE3o Classificadas\
            \ em Sistemas Externos"
          description: "a. Estabelecer pol\xEDtica e procedimentos para assegurar\
            \ que os requisitos para a prote\xE7\xE3o de informa\xE7\xF5es controladas\
            \ n\xE3o classificadas que s\xE3o processadas, armazenadas ou transmitidas\
            \ em sistemas externos sejam implementados de acordo com as leis, ordens\
            \ executivas, diretivas, pol\xEDticas, regulamentos e normas aplic\xE1\
            veis; e\nb. Revisar e atualizar a pol\xEDtica e os procedimentos [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "As informa\xE7\xF5es controladas n\xE3o classificadas s\xE3\
            o definidas pela National Archives and Records Administration, juntamente\
            \ com os requisitos de salvaguarda e dissemina\xE7\xE3o dessas informa\xE7\
            \xF5es, e est\xE3o codificadas no 32 CFR 2002 e, especificamente para\
            \ sistemas externos \xE0 organiza\xE7\xE3o federal, no 32 CFR 2002.14h.\
            \ A pol\xEDtica prescreve o uso e as condi\xE7\xF5es espec\xEDficas a\
            \ serem implementados de acordo com os procedimentos organizacionais,\
            \ inclusive por meio de seus processos de contrata\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-18
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-18
      name: Privacy Program Plan
      description: "a. Develop and disseminate an organization-wide privacy program\
        \ plan that provides an overview of the agency\u2019s privacy program, and:\n\
        1. Includes a description of the structure of the privacy program and the\
        \ resources dedicated to the privacy program;\n2. Provides an overview of\
        \ the requirements for the privacy program and a description of the privacy\
        \ program management controls and common controls in place or planned for\
        \ meeting those requirements;\n3. Includes the role of the senior agency official\
        \ for privacy and the identification and assignment of roles of other privacy\
        \ officials and staff and their responsibilities;\n4. Describes management\
        \ commitment, compliance, and the strategic goals and objectives of the privacy\
        \ program;\n5. Reflects coordination among organizational entities responsible\
        \ for the different aspects of privacy; and\n6. Is approved by a senior official\
        \ with responsibility and accountability for the privacy risk being incurred\
        \ to organizational operations (including mission, functions, image, and reputation),\
        \ organizational assets, individuals, other organizations, and the Nation;\
        \ and \nb. Update the plan [Assignment: organization-defined frequency] and\
        \ to address changes in federal privacy laws and policy and organizational\
        \ changes and problems identified during plan implementation or privacy control\
        \ assessments."
      annotation: "A privacy program plan is a formal document that provides an overview\
        \ of an organization\u2019s privacy program, including a description of the\
        \ structure of the privacy program, the resources dedicated to the privacy\
        \ program, the role of the senior agency official for privacy and other privacy\
        \ officials and staff, the strategic goals and objectives of the privacy program,\
        \ and the program management controls and common controls in place or planned\
        \ for meeting applicable privacy requirements and managing privacy risks.\
        \ Privacy program plans can be represented in single documents or compilations\
        \ of documents.\nThe senior agency official for privacy is responsible for\
        \ designating which privacy controls the organization will treat as program\
        \ management, common, system-specific, and hybrid controls. Privacy program\
        \ plans provide sufficient information about the privacy program management\
        \ and common controls (including the specification of parameters and assignment\
        \ and selection operations explicitly or by reference) to enable control implementations\
        \ that are unambiguously compliant with the intent of the plans and a determination\
        \ of the risk incurred if the plans are implemented as intended.\nProgram\
        \ management controls are generally implemented at the organization level\
        \ and are essential for managing the organization\u2019s privacy program.\
        \ Program management controls are distinct from common, system-specific, and\
        \ hybrid controls because program management controls are independent of any\
        \ particular information system. Together, the privacy plans for individual\
        \ systems and the organization-wide privacy program plan provide complete\
        \ coverage for the privacy controls employed within the organization.\nCommon\
        \ controls are documented in an appendix to the organization\u2019s privacy\
        \ program plan unless the controls are included in a separate privacy plan\
        \ for a system. The organization-wide privacy program plan indicates which\
        \ separate privacy plans contain descriptions of privacy controls."
      translations:
        pt:
          name: Plano do Programa de Privacidade
          description: "a. Desenvolver e disseminar um plano de programa de privacidade\
            \ abrangendo toda a organiza\xE7\xE3o que forne\xE7a uma vis\xE3o geral\
            \ do programa de privacidade da ag\xEAncia, e:\n1. Inclua uma descri\xE7\
            \xE3o da estrutura do programa de privacidade e dos recursos dedicados\
            \ ao programa de privacidade;\n2. Forne\xE7a uma vis\xE3o geral dos requisitos\
            \ do programa de privacidade e uma descri\xE7\xE3o dos controles de gest\xE3\
            o do programa de privacidade e dos controles comuns implementados ou planejados\
            \ para atender a esses requisitos;\n3. Inclua o papel do alto funcion\xE1\
            rio da ag\xEAncia respons\xE1vel pela privacidade e a identifica\xE7\xE3\
            o e atribui\xE7\xE3o de pap\xE9is de outros funcion\xE1rios e da equipe\
            \ de privacidade e suas responsabilidades;\n4. Descreva o comprometimento\
            \ da gest\xE3o, a conformidade e as metas e objetivos estrat\xE9gicos\
            \ do programa de privacidade;\n5. Reflita a coordena\xE7\xE3o entre as\
            \ entidades organizacionais respons\xE1veis pelos diferentes aspectos\
            \ da privacidade; e\n6. Seja aprovado por um funcion\xE1rio s\xEAnior\
            \ com responsabilidade e presta\xE7\xE3o de contas pelo risco de privacidade\
            \ incorrido para as opera\xE7\xF5es organizacionais (incluindo miss\xE3\
            o, fun\xE7\xF5es, imagem e reputa\xE7\xE3o), os ativos organizacionais,\
            \ os indiv\xEDduos, outras organiza\xE7\xF5es e a Na\xE7\xE3o; e\nb. Atualizar\
            \ o plano [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o] e para tratar mudan\xE7as nas leis e pol\xEDticas federais de privacidade\
            \ e mudan\xE7as organizacionais e problemas identificados durante a implementa\xE7\
            \xE3o do plano ou avalia\xE7\xF5es de controles de privacidade."
          annotation: "Um plano de programa de privacidade \xE9 um documento formal\
            \ que fornece uma vis\xE3o geral do programa de privacidade de uma organiza\xE7\
            \xE3o, incluindo uma descri\xE7\xE3o da estrutura do programa de privacidade,\
            \ os recursos dedicados ao programa de privacidade, o papel do alto funcion\xE1\
            rio da ag\xEAncia respons\xE1vel pela privacidade e de outros funcion\xE1\
            rios e da equipe de privacidade, as metas e objetivos estrat\xE9gicos\
            \ do programa de privacidade e os controles de gest\xE3o do programa e\
            \ os controles comuns implementados ou planejados para atender aos requisitos\
            \ de privacidade aplic\xE1veis e gerir os riscos de privacidade. Os planos\
            \ de programa de privacidade podem ser representados em documentos \xFA\
            nicos ou em compila\xE7\xF5es de documentos.\nO alto funcion\xE1rio da\
            \ ag\xEAncia respons\xE1vel pela privacidade \xE9 respons\xE1vel por designar\
            \ quais controles de privacidade a organiza\xE7\xE3o tratar\xE1 como controles\
            \ de gest\xE3o de programa, comuns, espec\xEDficos do sistema e h\xED\
            bridos. Os planos de programa de privacidade fornecem informa\xE7\xF5\
            es suficientes sobre os controles de gest\xE3o do programa de privacidade\
            \ e os controles comuns (incluindo a especifica\xE7\xE3o de par\xE2metros\
            \ e as opera\xE7\xF5es de atribui\xE7\xE3o e sele\xE7\xE3o, explicitamente\
            \ ou por refer\xEAncia) para permitir implementa\xE7\xF5es de controles\
            \ que estejam inequivocamente em conformidade com a inten\xE7\xE3o dos\
            \ planos e uma determina\xE7\xE3o do risco incorrido caso os planos sejam\
            \ implementados conforme pretendido.\nOs controles de gest\xE3o de programa\
            \ s\xE3o geralmente implementados em n\xEDvel organizacional e s\xE3o\
            \ essenciais para gerir o programa de privacidade da organiza\xE7\xE3\
            o. Os controles de gest\xE3o de programa s\xE3o distintos dos controles\
            \ comuns, espec\xEDficos do sistema e h\xEDbridos porque os controles\
            \ de gest\xE3o de programa s\xE3o independentes de qualquer sistema de\
            \ informa\xE7\xE3o espec\xEDfico. Em conjunto, os planos de privacidade\
            \ para sistemas individuais e o plano de programa de privacidade abrangendo\
            \ toda a organiza\xE7\xE3o fornecem cobertura completa para os controles\
            \ de privacidade empregados dentro da organiza\xE7\xE3o.\nOs controles\
            \ comuns s\xE3o documentados em um anexo ao plano de programa de privacidade\
            \ da organiza\xE7\xE3o, a menos que os controles estejam inclu\xEDdos\
            \ em um plano de privacidade separado para um sistema. O plano de programa\
            \ de privacidade abrangendo toda a organiza\xE7\xE3o indica quais planos\
            \ de privacidade separados cont\xEAm descri\xE7\xF5es dos controles de\
            \ privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-19
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-19
      name: Privacy Program Leadership Role
      description: Appoint a senior agency official for privacy with the authority,
        mission, accountability, and resources to coordinate, develop, and implement,
        applicable privacy requirements and manage privacy risks through the organization-wide
        privacy program.
      annotation: "The privacy officer is an organizational official. For federal\
        \ agencies\u2014as defined by applicable laws, executive orders, directives,\
        \ regulations, policies, standards, and guidelines\u2014this official is designated\
        \ as the senior agency official for privacy. Organizations may also refer\
        \ to this official as the chief privacy officer. The senior agency official\
        \ for privacy also has roles on the data management board (see PM-23) and\
        \ the data integrity board (see PM-24)."
      translations:
        pt:
          name: "Papel de Lideran\xE7a do Programa de Privacidade"
          description: "Nomear um alto funcion\xE1rio da ag\xEAncia respons\xE1vel\
            \ pela privacidade com a autoridade, a miss\xE3o, a presta\xE7\xE3o de\
            \ contas e os recursos para coordenar, desenvolver e implementar os requisitos\
            \ de privacidade aplic\xE1veis e gerir os riscos de privacidade por meio\
            \ do programa de privacidade abrangendo toda a organiza\xE7\xE3o."
          annotation: "O respons\xE1vel pela privacidade \xE9 um funcion\xE1rio organizacional.\
            \ Para ag\xEAncias federais \u2014 conforme definido pelas leis, ordens\
            \ executivas, diretivas, regulamentos, pol\xEDticas, normas e diretrizes\
            \ aplic\xE1veis \u2014, esse funcion\xE1rio \xE9 designado como o alto\
            \ funcion\xE1rio da ag\xEAncia respons\xE1vel pela privacidade. As organiza\xE7\
            \xF5es tamb\xE9m podem referir-se a esse funcion\xE1rio como diretor de\
            \ privacidade (chief privacy officer). O alto funcion\xE1rio da ag\xEA\
            ncia respons\xE1vel pela privacidade tamb\xE9m desempenha pap\xE9is no\
            \ conselho de gest\xE3o de dados (ver PM-23) e no conselho de integridade\
            \ de dados (ver PM-24)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-20
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-20
      name: Dissemination of Privacy Program Information
      description: "Maintain a central resource webpage on the organization\u2019\
        s principal public website that serves as a central source of information\
        \ about the organization\u2019s privacy program and that:\na. Ensures that\
        \ the public has access to information about organizational privacy activities\
        \ and can communicate with its senior agency official for privacy;\nb. Ensures\
        \ that organizational privacy practices and reports are publicly available;\
        \ and\nc. Employs publicly facing email addresses and/or phone lines to enable\
        \ the public to provide feedback and/or direct questions to privacy offices\
        \ regarding privacy practices."
      annotation: For federal agencies, the webpage is located at www.[agency].gov/privacy.
        Federal agencies include public privacy impact assessments, system of records
        notices, computer matching notices and agreements, PRIVACT exemption and implementation
        rules, privacy reports, privacy policies, instructions for individuals making
        an access or amendment request, email addresses for questions/complaints,
        blogs, and periodic publications.
      translations:
        pt:
          name: "Dissemina\xE7\xE3o de Informa\xE7\xF5es do Programa de Privacidade"
          description: "Manter uma p\xE1gina da web de recursos central no site p\xFA\
            blico principal da organiza\xE7\xE3o que sirva como fonte central de informa\xE7\
            \xF5es sobre o programa de privacidade da organiza\xE7\xE3o e que:\na.\
            \ Assegure que o p\xFAblico tenha acesso a informa\xE7\xF5es sobre as\
            \ atividades de privacidade organizacionais e possa se comunicar com seu\
            \ alto funcion\xE1rio da ag\xEAncia respons\xE1vel pela privacidade;\n\
            b. Assegure que as pr\xE1ticas e relat\xF3rios de privacidade organizacionais\
            \ estejam publicamente dispon\xEDveis; e\nc. Empregue endere\xE7os de\
            \ e-mail e/ou linhas telef\xF4nicas voltados ao p\xFAblico para permitir\
            \ que o p\xFAblico forne\xE7a feedback e/ou encaminhe perguntas aos escrit\xF3\
            rios de privacidade a respeito das pr\xE1ticas de privacidade."
          annotation: "Para ag\xEAncias federais, a p\xE1gina da web localiza-se em\
            \ www.[agency].gov/privacy. As ag\xEAncias federais incluem avalia\xE7\
            \xF5es p\xFAblicas de impacto \xE0 privacidade, avisos de sistema de registros,\
            \ avisos e acordos de cruzamento de dados computacionais, regras de isen\xE7\
            \xE3o e implementa\xE7\xE3o da PRIVACT, relat\xF3rios de privacidade,\
            \ pol\xEDticas de privacidade, instru\xE7\xF5es para indiv\xEDduos que\
            \ fazem uma solicita\xE7\xE3o de acesso ou corre\xE7\xE3o, endere\xE7\
            os de e-mail para perguntas/reclama\xE7\xF5es, blogs e publica\xE7\xF5\
            es peri\xF3dicas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-20(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-20(1)
      name: Dissemination of Privacy Program Information | Privacy Policies on Websites,
        Applications, and Digital Services
      description: 'Develop and post privacy policies on all external-facing websites,
        mobile applications, and other digital services, that:

        (a) Are written in plain language and organized in a way that is easy to understand
        and navigate;

        (b) Provide information needed by the public to make an informed decision
        about whether and how to interact with the organization; and

        (c) Are updated whenever the organization makes a substantive change to the
        practices it describes and includes a time/date stamp to inform the public
        of the date of the most recent changes.'
      annotation: Organizations post privacy policies on all external-facing websites,
        mobile applications, and other digital services. Organizations post a link
        to the relevant privacy policy on any known, major entry points to the website,
        application, or digital service. In addition, organizations provide a link
        to the privacy policy on any webpage that collects personally identifiable
        information. Organizations may be subject to applicable laws, executive orders,
        directives, regulations, or policies that require the provision of specific
        information to the public. Organizational personnel consult with the senior
        agency official for privacy and legal counsel regarding such requirements.
      translations:
        pt:
          name: "Divulga\xE7\xE3o de Informa\xE7\xF5es do Programa de Privacidade\
            \ | Pol\xEDticas de Privacidade em Sites, Aplica\xE7\xF5es e Servi\xE7\
            os Digitais"
          description: "Desenvolver e publicar pol\xEDticas de privacidade em todos\
            \ os sites de acesso externo, aplica\xE7\xF5es m\xF3veis e outros servi\xE7\
            os digitais, que:\n(a) Sejam escritas em linguagem simples e organizadas\
            \ de forma f\xE1cil de entender e navegar;\n(b) Forne\xE7am as informa\xE7\
            \xF5es necess\xE1rias para que o p\xFAblico tome uma decis\xE3o informada\
            \ sobre se e como interagir com a organiza\xE7\xE3o; e\n(c) Sejam atualizadas\
            \ sempre que a organiza\xE7\xE3o fizer uma altera\xE7\xE3o substantiva\
            \ nas pr\xE1ticas que descreve e incluam um carimbo de data/hora para\
            \ informar o p\xFAblico sobre a data das altera\xE7\xF5es mais recentes."
          annotation: "As organiza\xE7\xF5es publicam pol\xEDticas de privacidade\
            \ em todos os sites de acesso externo, aplica\xE7\xF5es m\xF3veis e outros\
            \ servi\xE7os digitais. As organiza\xE7\xF5es publicam um link para a\
            \ pol\xEDtica de privacidade pertinente em quaisquer pontos de entrada\
            \ conhecidos e principais do site, aplica\xE7\xE3o ou servi\xE7o digital.\
            \ Al\xE9m disso, as organiza\xE7\xF5es fornecem um link para a pol\xED\
            tica de privacidade em qualquer p\xE1gina web que colete informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal. As organiza\xE7\xF5es podem estar sujeitas\
            \ a leis, decretos executivos, diretivas, regulamentos ou pol\xEDticas\
            \ aplic\xE1veis que exijam o fornecimento de informa\xE7\xF5es espec\xED\
            ficas ao p\xFAblico. O pessoal da organiza\xE7\xE3o consulta o alto funcion\xE1\
            rio respons\xE1vel pela privacidade da ag\xEAncia e a assessoria jur\xED\
            dica sobre tais requisitos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-21
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-21
      name: Accounting of Disclosures
      description: 'a. Develop and maintain an accurate accounting of disclosures
        of personally identifiable information, including:

        1. Date, nature, and purpose of each disclosure; and

        2. Name and address, or other contact information of the individual or organization
        to which the disclosure was made;

        b. Retain the accounting of disclosures for the length of the time the personally
        identifiable information is maintained or five years after the disclosure
        is made, whichever is longer; and

        c. Make the accounting of disclosures available to the individual to whom
        the personally identifiable information relates upon request.'
      annotation: 'The purpose of accounting of disclosures is to allow individuals
        to learn to whom their personally identifiable information has been disclosed,
        to provide a basis for subsequently advising recipients of any corrected or
        disputed personally identifiable information, and to provide an audit trail
        for subsequent reviews of organizational compliance with conditions for disclosures.
        For federal agencies, keeping an accounting of disclosures is required by
        the PRIVACT; agencies should consult with their senior agency official for
        privacy and legal counsel on this requirement and be aware of the statutory
        exceptions and OMB guidance relating to the provision.

        Organizations can use any system for keeping notations of disclosures, if
        it can construct from such a system, a document listing of all disclosures
        along with the required information. Automated mechanisms can be used by organizations
        to determine when personally identifiable information is disclosed, including
        commercial services that provide notifications and alerts. Accounting of disclosures
        may also be used to help organizations verify compliance with applicable privacy
        statutes and policies governing the disclosure or dissemination of information
        and dissemination restrictions.'
      translations:
        pt:
          name: "Registro de Divulga\xE7\xF5es"
          description: "a. Desenvolver e manter um registro preciso das divulga\xE7\
            \xF5es de informa\xE7\xF5es de identifica\xE7\xE3o pessoal, incluindo:\n\
            1. Data, natureza e finalidade de cada divulga\xE7\xE3o; e\n2. Nome e\
            \ endere\xE7o, ou outras informa\xE7\xF5es de contato do indiv\xEDduo\
            \ ou organiza\xE7\xE3o para quem a divulga\xE7\xE3o foi feita;\nb. Reter\
            \ o registro de divulga\xE7\xF5es pelo per\xEDodo em que as informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal forem mantidas ou por cinco anos\
            \ ap\xF3s a divulga\xE7\xE3o ser feita, o que for mais longo; e\nc. Disponibilizar\
            \ o registro de divulga\xE7\xF5es ao indiv\xEDduo a quem as informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal se referem, mediante solicita\xE7\
            \xE3o."
          annotation: "A finalidade do registro de divulga\xE7\xF5es \xE9 permitir\
            \ que os indiv\xEDduos saibam a quem suas informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal foram divulgadas, fornecer uma base para posteriormente\
            \ notificar os destinat\xE1rios sobre quaisquer informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal corrigidas ou contestadas, e fornecer uma trilha de auditoria\
            \ para revis\xF5es posteriores da conformidade organizacional com as condi\xE7\
            \xF5es de divulga\xE7\xE3o. Para as ag\xEAncias federais, manter um registro\
            \ de divulga\xE7\xF5es \xE9 exigido pelo PRIVACT; as ag\xEAncias devem\
            \ consultar seu alto funcion\xE1rio respons\xE1vel pela privacidade da\
            \ ag\xEAncia e a assessoria jur\xEDdica sobre este requisito e estar cientes\
            \ das exce\xE7\xF5es legais e da orienta\xE7\xE3o do OMB relacionadas\
            \ \xE0 disposi\xE7\xE3o.\nAs organiza\xE7\xF5es podem usar qualquer sistema\
            \ para manter anota\xE7\xF5es de divulga\xE7\xF5es, desde que possam construir,\
            \ a partir de tal sistema, um documento listando todas as divulga\xE7\xF5\
            es juntamente com as informa\xE7\xF5es exigidas. Mecanismos automatizados\
            \ podem ser usados pelas organiza\xE7\xF5es para determinar quando as\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal s\xE3o divulgadas,\
            \ incluindo servi\xE7os comerciais que fornecem notifica\xE7\xF5es e alertas.\
            \ O registro de divulga\xE7\xF5es tamb\xE9m pode ser usado para ajudar\
            \ as organiza\xE7\xF5es a verificar a conformidade com os estatutos e\
            \ pol\xEDticas de privacidade aplic\xE1veis que regem a divulga\xE7\xE3\
            o ou dissemina\xE7\xE3o de informa\xE7\xF5es e as restri\xE7\xF5es de\
            \ dissemina\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-22
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-22
      name: Personally Identifiable Information Quality Management
      description: "Develop and document organization-wide policies and procedures\
        \ for:\na. Reviewing for the accuracy, relevance, timeliness, and completeness\
        \ of personally identifiable information across the information life cycle;\
        \ \nb. Correcting or deleting inaccurate or outdated personally identifiable\
        \ information;\nc. Disseminating notice of corrected or deleted personally\
        \ identifiable information to individuals or other appropriate entities; and\n\
        d. Appeals of adverse decisions on correction or deletion requests."
      annotation: "Personally identifiable information quality management includes\
        \ steps that organizations take to confirm the accuracy and relevance of personally\
        \ identifiable information throughout the information life cycle. The information\
        \ life cycle includes the creation, collection, use, processing, storage,\
        \ maintenance, dissemination, disclosure, and disposition of personally identifiable\
        \ information. Organizational policies and procedures for personally identifiable\
        \ information quality management are important because inaccurate or outdated\
        \ personally identifiable information maintained by organizations may cause\
        \ problems for individuals. Organizations consider the quality of personally\
        \ identifiable information involved in business functions where inaccurate\
        \ information may result in adverse decisions or the denial of benefits and\
        \ services, or the disclosure of the information may cause stigmatization.\
        \ Correct information, in certain circumstances, can cause problems for individuals\
        \ that outweigh the benefits of organizations maintaining the information.\
        \ Organizations consider creating policies and procedures for the removal\
        \ of such information. \nThe senior agency official for privacy ensures that\
        \ practical means and mechanisms exist and are accessible for individuals\
        \ or their authorized representatives to seek the correction or deletion of\
        \ personally identifiable information. Processes for correcting or deleting\
        \ data are clearly defined and publicly available. Organizations use discretion\
        \ in determining whether data is to be deleted or corrected based on the scope\
        \ of requests, the changes sought, and the impact of the changes. Additionally,\
        \ processes include the provision of responses to individuals of decisions\
        \ to deny requests for correction or deletion. The responses include the reasons\
        \ for the decisions, a means to record individual objections to the decisions,\
        \ and a means of requesting reviews of the initial determinations. \nOrganizations\
        \ notify individuals or their designated representatives when their personally\
        \ identifiable information is corrected or deleted to provide transparency\
        \ and confirm the completed action. Due to the complexity of data flows and\
        \ storage, other entities may need to be informed of the correction or deletion.\
        \ Notice supports the consistent correction and deletion of personally identifiable\
        \ information across the data ecosystem."
      translations:
        pt:
          name: "Gest\xE3o da Qualidade das Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal"
          description: "Desenvolver e documentar pol\xEDticas e procedimentos para\
            \ toda a organiza\xE7\xE3o para:\na. Revisar a precis\xE3o, relev\xE2\
            ncia, atualidade e integridade das informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ao longo do ciclo de vida da informa\xE7\xE3o;\nb. Corrigir\
            \ ou excluir informa\xE7\xF5es de identifica\xE7\xE3o pessoal imprecisas\
            \ ou desatualizadas;\nc. Disseminar aviso sobre informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal corrigidas ou exclu\xEDdas aos indiv\xEDduos ou outras entidades\
            \ apropriadas; e\nd. Recursos contra decis\xF5es adversas sobre solicita\xE7\
            \xF5es de corre\xE7\xE3o ou exclus\xE3o."
          annotation: "A gest\xE3o da qualidade das informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal inclui etapas que as organiza\xE7\xF5es adotam para confirmar\
            \ a precis\xE3o e a relev\xE2ncia das informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ao longo do ciclo de vida da informa\xE7\xE3o. O ciclo de\
            \ vida da informa\xE7\xE3o inclui a cria\xE7\xE3o, coleta, uso, processamento,\
            \ armazenamento, manuten\xE7\xE3o, dissemina\xE7\xE3o, divulga\xE7\xE3\
            o e disposi\xE7\xE3o das informa\xE7\xF5es de identifica\xE7\xE3o pessoal.\
            \ As pol\xEDticas e procedimentos organizacionais para a gest\xE3o da\
            \ qualidade das informa\xE7\xF5es de identifica\xE7\xE3o pessoal s\xE3\
            o importantes porque informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ imprecisas ou desatualizadas mantidas pelas organiza\xE7\xF5es podem\
            \ causar problemas para os indiv\xEDduos. As organiza\xE7\xF5es consideram\
            \ a qualidade das informa\xE7\xF5es de identifica\xE7\xE3o pessoal envolvidas\
            \ em fun\xE7\xF5es de neg\xF3cio onde informa\xE7\xF5es imprecisas podem\
            \ resultar em decis\xF5es adversas ou na nega\xE7\xE3o de benef\xEDcios\
            \ e servi\xE7os, ou onde a divulga\xE7\xE3o das informa\xE7\xF5es pode\
            \ causar estigmatiza\xE7\xE3o. Informa\xE7\xF5es corretas, em determinadas\
            \ circunst\xE2ncias, podem causar problemas para os indiv\xEDduos que\
            \ superam os benef\xEDcios de as organiza\xE7\xF5es manterem as informa\xE7\
            \xF5es. As organiza\xE7\xF5es consideram criar pol\xEDticas e procedimentos\
            \ para a remo\xE7\xE3o de tais informa\xE7\xF5es.\nO alto funcion\xE1\
            rio respons\xE1vel pela privacidade da ag\xEAncia garante que existam\
            \ meios e mecanismos pr\xE1ticos e acess\xEDveis para que os indiv\xED\
            duos ou seus representantes autorizados busquem a corre\xE7\xE3o ou exclus\xE3\
            o de informa\xE7\xF5es de identifica\xE7\xE3o pessoal. Os processos para\
            \ corrigir ou excluir dados s\xE3o claramente definidos e disponibilizados\
            \ publicamente. As organiza\xE7\xF5es usam discernimento ao determinar\
            \ se os dados devem ser exclu\xEDdos ou corrigidos com base no escopo\
            \ das solicita\xE7\xF5es, nas altera\xE7\xF5es pretendidas e no impacto\
            \ das altera\xE7\xF5es. Al\xE9m disso, os processos incluem o fornecimento\
            \ de respostas aos indiv\xEDduos sobre decis\xF5es de negar solicita\xE7\
            \xF5es de corre\xE7\xE3o ou exclus\xE3o. As respostas incluem os motivos\
            \ das decis\xF5es, um meio de registrar as obje\xE7\xF5es individuais\
            \ \xE0s decis\xF5es e um meio de solicitar revis\xF5es das determina\xE7\
            \xF5es iniciais.\nAs organiza\xE7\xF5es notificam os indiv\xEDduos ou\
            \ seus representantes designados quando suas informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal s\xE3o corrigidas ou exclu\xEDdas, para proporcionar transpar\xEA\
            ncia e confirmar a a\xE7\xE3o conclu\xEDda. Devido \xE0 complexidade dos\
            \ fluxos e do armazenamento de dados, outras entidades podem precisar\
            \ ser informadas sobre a corre\xE7\xE3o ou exclus\xE3o. O aviso apoia\
            \ a corre\xE7\xE3o e a exclus\xE3o consistentes das informa\xE7\xF5es\
            \ de identifica\xE7\xE3o pessoal em todo o ecossistema de dados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-23
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-23
      name: Data Governance Body
      description: 'Establish a Data Governance Body consisting of [Assignment: organization-defined
        roles] with [Assignment: organization-defined responsibilities].'
      annotation: A Data Governance Body can help ensure that the organization has
        coherent policies and the ability to balance the utility of data with security
        and privacy requirements. The Data Governance Body establishes policies, procedures,
        and standards that facilitate data governance so that data, including personally
        identifiable information, is effectively managed and maintained in accordance
        with applicable laws, executive orders, directives, regulations, policies,
        standards, and guidance. Responsibilities can include developing and implementing
        guidelines that support data modeling, quality, integrity, and the de-identification
        needs of personally identifiable information across the information life cycle
        as well as reviewing and approving applications to release data outside of
        the organization, archiving the applications and the released data, and performing
        post-release monitoring to ensure that the assumptions made as part of the
        data release continue to be valid. Members include the chief information officer,
        senior agency information security officer, and senior agency official for
        privacy. Federal agencies are required to establish a Data Governance Body
        with specific roles and responsibilities in accordance with the EVIDACT and
        policies set forth under OMB M-19-23.
      translations:
        pt:
          name: "\xD3rg\xE3o de Governan\xE7a de Dados"
          description: "Estabelecer um \xD3rg\xE3o de Governan\xE7a de Dados composto\
            \ por [Atribui\xE7\xE3o: pap\xE9is definidos pela organiza\xE7\xE3o] com\
            \ [Atribui\xE7\xE3o: responsabilidades definidas pela organiza\xE7\xE3\
            o]."
          annotation: "Um \xD3rg\xE3o de Governan\xE7a de Dados pode ajudar a garantir\
            \ que a organiza\xE7\xE3o tenha pol\xEDticas coerentes e a capacidade\
            \ de equilibrar a utilidade dos dados com os requisitos de seguran\xE7\
            a e privacidade. O \xD3rg\xE3o de Governan\xE7a de Dados estabelece pol\xED\
            ticas, procedimentos e padr\xF5es que facilitam a governan\xE7a de dados,\
            \ de modo que os dados, incluindo informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal, sejam efetivamente geridos e mantidos em conformidade com leis,\
            \ decretos executivos, diretivas, regulamentos, pol\xEDticas, padr\xF5\
            es e orienta\xE7\xF5es aplic\xE1veis. As responsabilidades podem incluir\
            \ o desenvolvimento e a implementa\xE7\xE3o de diretrizes que apoiem a\
            \ modelagem, qualidade, integridade e as necessidades de desidentifica\xE7\
            \xE3o das informa\xE7\xF5es de identifica\xE7\xE3o pessoal ao longo do\
            \ ciclo de vida da informa\xE7\xE3o, bem como revisar e aprovar solicita\xE7\
            \xF5es para liberar dados fora da organiza\xE7\xE3o, arquivar as solicita\xE7\
            \xF5es e os dados liberados, e realizar monitoramento p\xF3s-libera\xE7\
            \xE3o para garantir que as premissas adotadas como parte da libera\xE7\
            \xE3o de dados permane\xE7am v\xE1lidas. Os membros incluem o diretor\
            \ de informa\xE7\xE3o (CIO), o alto funcion\xE1rio de seguran\xE7a da\
            \ informa\xE7\xE3o da ag\xEAncia e o alto funcion\xE1rio respons\xE1vel\
            \ pela privacidade da ag\xEAncia. As ag\xEAncias federais s\xE3o obrigadas\
            \ a estabelecer um \xD3rg\xE3o de Governan\xE7a de Dados com pap\xE9is\
            \ e responsabilidades espec\xEDficos, em conformidade com a EVIDACT e\
            \ as pol\xEDticas estabelecidas na OMB M-19-23."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-24
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-24
      name: Data Integrity Board
      description: 'Establish a Data Integrity Board to:

        a. Review proposals to conduct or participate in a matching program; and

        b. Conduct an annual review of all matching programs in which the agency has
        participated.'
      annotation: "A Data Integrity Board is the board of senior officials designated\
        \ by the head of a federal agency and is responsible for, among other things,\
        \ reviewing the agency\u2019s proposals to conduct or participate in a matching\
        \ program and conducting an annual review of all matching programs in which\
        \ the agency has participated. As a general matter, a matching program is\
        \ a computerized comparison of records from two or more automated PRIVACT\
        \ systems of records or an automated system of records and automated records\
        \ maintained by a non-federal agency (or agent thereof). A matching program\
        \ either pertains to Federal benefit programs or Federal personnel or payroll\
        \ records. At a minimum, the Data Integrity Board includes the Inspector General\
        \ of the agency, if any, and the senior agency official for privacy."
      translations:
        pt:
          name: Conselho de Integridade de Dados
          description: "Estabelecer um Conselho de Integridade de Dados para:\na.\
            \ Revisar propostas de conduzir ou participar de um programa de cruzamento\
            \ de dados; e\nb. Conduzir uma revis\xE3o anual de todos os programas\
            \ de cruzamento de dados dos quais a ag\xEAncia tenha participado."
          annotation: "Um Conselho de Integridade de Dados \xE9 o conselho de altos\
            \ funcion\xE1rios designado pelo chefe de uma ag\xEAncia federal e \xE9\
            \ respons\xE1vel, entre outras coisas, por revisar as propostas da ag\xEA\
            ncia de conduzir ou participar de um programa de cruzamento de dados e\
            \ por conduzir uma revis\xE3o anual de todos os programas de cruzamento\
            \ de dados dos quais a ag\xEAncia tenha participado. De modo geral, um\
            \ programa de cruzamento de dados \xE9 uma compara\xE7\xE3o computadorizada\
            \ de registros de dois ou mais sistemas de registros automatizados sob\
            \ a PRIVACT, ou de um sistema de registros automatizado e registros automatizados\
            \ mantidos por uma ag\xEAncia n\xE3o federal (ou seu agente). Um programa\
            \ de cruzamento de dados refere-se a programas de benef\xEDcios federais\
            \ ou a registros de pessoal ou de folha de pagamento federais. No m\xED\
            nimo, o Conselho de Integridade de Dados inclui o Inspetor-Geral da ag\xEA\
            ncia, se houver, e o alto funcion\xE1rio respons\xE1vel pela privacidade\
            \ da ag\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-25
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-25
      name: Minimization of Personally Identifiable Information Used in Testing, Training,
        and Research
      description: 'a. Develop, document, and implement policies and procedures that
        address the use of personally identifiable information for internal testing,
        training, and research;

        b. Limit or minimize the amount of personally identifiable information used
        for internal testing, training, and research purposes;

        c. Authorize the use of personally identifiable information when such information
        is required for internal testing, training, and research; and

        d. Review and update policies and procedures [Assignment: organization-defined
        frequency].'
      annotation: The use of personally identifiable information in testing, research,
        and training increases the risk of unauthorized disclosure or misuse of such
        information. Organizations consult with the senior agency official for privacy
        and/or legal counsel to ensure that the use of personally identifiable information
        in testing, training, and research is compatible with the original purpose
        for which it was collected. When possible, organizations use placeholder data
        to avoid exposure of personally identifiable information when conducting testing,
        training, and research.
      translations:
        pt:
          name: "Minimiza\xE7\xE3o de Informa\xE7\xF5es de Identifica\xE7\xE3o Pessoal\
            \ Usadas em Testes, Treinamento e Pesquisa"
          description: "a. Desenvolver, documentar e implementar pol\xEDticas e procedimentos\
            \ que tratem do uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ para testes, treinamento e pesquisa internos;\nb. Limitar ou minimizar\
            \ a quantidade de informa\xE7\xF5es de identifica\xE7\xE3o pessoal usadas\
            \ para fins de testes, treinamento e pesquisa internos;\nc. Autorizar\
            \ o uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal quando tais\
            \ informa\xE7\xF5es forem necess\xE1rias para testes, treinamento e pesquisa\
            \ internos; e\nd. Revisar e atualizar as pol\xEDticas e procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "O uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal em\
            \ testes, pesquisa e treinamento aumenta o risco de divulga\xE7\xE3o n\xE3\
            o autorizada ou uso indevido de tais informa\xE7\xF5es. As organiza\xE7\
            \xF5es consultam o alto funcion\xE1rio respons\xE1vel pela privacidade\
            \ da ag\xEAncia e/ou a assessoria jur\xEDdica para garantir que o uso\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal em testes, treinamento\
            \ e pesquisa seja compat\xEDvel com a finalidade original para a qual\
            \ foram coletadas. Quando poss\xEDvel, as organiza\xE7\xF5es usam dados\
            \ fict\xEDcios (placeholder) para evitar a exposi\xE7\xE3o de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal ao conduzir testes, treinamento\
            \ e pesquisa."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-26
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-26
      name: Complaint Management
      description: 'Implement a process for receiving and responding to complaints,
        concerns, or questions from individuals about the organizational security
        and privacy practices that includes:

        a. Mechanisms that are easy to use and readily accessible by the public;

        b. All information necessary for successfully filing complaints;

        c. Tracking mechanisms to ensure all complaints received are reviewed and
        addressed within [Assignment: organization-defined time period];

        d. Acknowledgement of receipt of complaints, concerns, or questions from individuals
        within [Assignment: organization-defined time period]; and

        e. Response to complaints, concerns, or questions from individuals within
        [Assignment: organization-defined time period].'
      annotation: Complaints, concerns, and questions from individuals can serve as
        valuable sources of input to organizations and ultimately improve operational
        models, uses of technology, data collection practices, and controls. Mechanisms
        that can be used by the public include telephone hotline, email, or web-based
        forms. The information necessary for successfully filing complaints includes
        contact information for the senior agency official for privacy or other official
        designated to receive complaints. Privacy complaints may also include personally
        identifiable information which is handled in accordance with relevant policies
        and processes.
      translations:
        pt:
          name: "Gest\xE3o de Reclama\xE7\xF5es"
          description: "Implementar um processo para receber e responder a reclama\xE7\
            \xF5es, preocupa\xE7\xF5es ou perguntas de indiv\xEDduos sobre as pr\xE1\
            ticas organizacionais de seguran\xE7a e privacidade, que inclua:\na. Mecanismos\
            \ de f\xE1cil utiliza\xE7\xE3o e prontamente acess\xEDveis ao p\xFAblico;\n\
            b. Todas as informa\xE7\xF5es necess\xE1rias para a apresenta\xE7\xE3\
            o bem-sucedida de reclama\xE7\xF5es;\nc. Mecanismos de rastreamento para\
            \ garantir que todas as reclama\xE7\xF5es recebidas sejam revisadas e\
            \ tratadas dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela\
            \ organiza\xE7\xE3o];\nd. Confirma\xE7\xE3o do recebimento de reclama\xE7\
            \xF5es, preocupa\xE7\xF5es ou perguntas de indiv\xEDduos dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]; e\ne. Resposta\
            \ a reclama\xE7\xF5es, preocupa\xE7\xF5es ou perguntas de indiv\xEDduos\
            \ dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "Reclama\xE7\xF5es, preocupa\xE7\xF5es e perguntas de indiv\xED\
            duos podem servir como fontes valiosas de subs\xEDdios para as organiza\xE7\
            \xF5es e, em \xFAltima an\xE1lise, melhorar modelos operacionais, usos\
            \ de tecnologia, pr\xE1ticas de coleta de dados e controles. Os mecanismos\
            \ que podem ser usados pelo p\xFAblico incluem linha telef\xF4nica direta,\
            \ e-mail ou formul\xE1rios baseados na web. As informa\xE7\xF5es necess\xE1\
            rias para a apresenta\xE7\xE3o bem-sucedida de reclama\xE7\xF5es incluem\
            \ as informa\xE7\xF5es de contato do alto funcion\xE1rio respons\xE1vel\
            \ pela privacidade da ag\xEAncia ou de outro funcion\xE1rio designado\
            \ para receber reclama\xE7\xF5es. As reclama\xE7\xF5es de privacidade\
            \ tamb\xE9m podem incluir informa\xE7\xF5es de identifica\xE7\xE3o pessoal,\
            \ que s\xE3o tratadas em conformidade com as pol\xEDticas e processos\
            \ pertinentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-27
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-27
      name: Privacy Reporting
      description: 'a. Develop [Assignment: organization-defined privacy reports]
        and disseminate to:

        1. [Assignment: organization-defined oversight bodies] to demonstrate accountability
        with statutory, regulatory, and policy privacy mandates; and

        2. [Assignment: organization-defined officials] and other personnel with responsibility
        for monitoring privacy program compliance; and

        b. Review and update privacy reports [Assignment: organization-defined frequency].'
      annotation: Through internal and external reporting, organizations promote accountability
        and transparency in organizational privacy operations. Reporting can also
        help organizations to determine progress in meeting privacy compliance requirements
        and privacy controls, compare performance across the federal government, discover
        vulnerabilities, identify gaps in policy and implementation, and identify
        models for success. For federal agencies, privacy reports include annual senior
        agency official for privacy reports to OMB, reports to Congress required by
        Implementing Regulations of the 9/11 Commission Act, and other public reports
        required by law, regulation, or policy, including internal policies of organizations.
        The senior agency official for privacy consults with legal counsel, where
        appropriate, to ensure that organizations meet all applicable privacy reporting
        requirements.
      translations:
        pt:
          name: "Relat\xF3rios de Privacidade"
          description: "a. Desenvolver [Atribui\xE7\xE3o: relat\xF3rios de privacidade\
            \ definidos pela organiza\xE7\xE3o] e dissemin\xE1-los para:\n1. [Atribui\xE7\
            \xE3o: \xF3rg\xE3os de supervis\xE3o definidos pela organiza\xE7\xE3o]\
            \ para demonstrar responsabiliza\xE7\xE3o (accountability) com mandatos\
            \ de privacidade legais, regulat\xF3rios e de pol\xEDtica; e\n2. [Atribui\xE7\
            \xE3o: funcion\xE1rios definidos pela organiza\xE7\xE3o] e outro pessoal\
            \ com responsabilidade pelo monitoramento da conformidade do programa\
            \ de privacidade; e\nb. Revisar e atualizar os relat\xF3rios de privacidade\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Por meio de relat\xF3rios internos e externos, as organiza\xE7\
            \xF5es promovem a responsabiliza\xE7\xE3o (accountability) e a transpar\xEA\
            ncia nas opera\xE7\xF5es organizacionais de privacidade. Os relat\xF3\
            rios tamb\xE9m podem ajudar as organiza\xE7\xF5es a determinar o progresso\
            \ no cumprimento dos requisitos de conformidade de privacidade e dos controles\
            \ de privacidade, comparar o desempenho em todo o governo federal, descobrir\
            \ vulnerabilidades, identificar lacunas na pol\xEDtica e na implementa\xE7\
            \xE3o e identificar modelos de sucesso. Para as ag\xEAncias federais,\
            \ os relat\xF3rios de privacidade incluem os relat\xF3rios anuais do alto\
            \ funcion\xE1rio respons\xE1vel pela privacidade da ag\xEAncia ao OMB,\
            \ relat\xF3rios ao Congresso exigidos pelos Regulamentos de Implementa\xE7\
            \xE3o do 9/11 Commission Act, e outros relat\xF3rios p\xFAblicos exigidos\
            \ por lei, regulamento ou pol\xEDtica, incluindo pol\xEDticas internas\
            \ das organiza\xE7\xF5es. O alto funcion\xE1rio respons\xE1vel pela privacidade\
            \ da ag\xEAncia consulta a assessoria jur\xEDdica, quando apropriado,\
            \ para garantir que as organiza\xE7\xF5es atendam a todos os requisitos\
            \ aplic\xE1veis de relat\xF3rios de privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-28
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-28
      name: Risk Framing
      description: 'a. Identify and document:

        1. Assumptions affecting risk assessments, risk responses, and risk monitoring;

        2. Constraints affecting risk assessments, risk responses, and risk monitoring;

        3. Priorities and trade-offs considered by the organization for managing risk;
        and

        4. Organizational risk tolerance;

        b. Distribute the results of risk framing activities to [Assignment: organization-defined
        personnel]; and

        c. Review and update risk framing considerations [Assignment: organization-defined
        frequency].'
      annotation: Risk framing is most effective when conducted at the organization
        level and in consultation with stakeholders throughout the organization including
        mission, business, and system owners. The assumptions, constraints, risk tolerance,
        priorities, and trade-offs identified as part of the risk framing process
        inform the risk management strategy, which in turn informs the conduct of
        risk assessment, risk response, and risk monitoring activities. Risk framing
        results are shared with organizational personnel, including mission and business
        owners, information owners or stewards, system owners, authorizing officials,
        senior agency information security officer, senior agency official for privacy,
        and senior accountable official for risk management.
      translations:
        pt:
          name: Enquadramento de Riscos
          description: "a. Identificar e documentar:\n1. Premissas que afetam as avalia\xE7\
            \xF5es de risco, as respostas a risco e o monitoramento de risco;\n2.\
            \ Restri\xE7\xF5es que afetam as avalia\xE7\xF5es de risco, as respostas\
            \ a risco e o monitoramento de risco;\n3. Prioridades e compensa\xE7\xF5\
            es (trade-offs) consideradas pela organiza\xE7\xE3o para a gest\xE3o de\
            \ risco; e\n4. Toler\xE2ncia a risco organizacional;\nb. Distribuir os\
            \ resultados das atividades de enquadramento de riscos para [Atribui\xE7\
            \xE3o: pessoal definido pela organiza\xE7\xE3o]; e\nc. Revisar e atualizar\
            \ as considera\xE7\xF5es de enquadramento de riscos [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "O enquadramento de riscos \xE9 mais eficaz quando conduzido\
            \ no n\xEDvel da organiza\xE7\xE3o e em consulta com as partes interessadas\
            \ em toda a organiza\xE7\xE3o, incluindo propriet\xE1rios de miss\xE3\
            o, de neg\xF3cio e de sistemas. As premissas, restri\xE7\xF5es, toler\xE2\
            ncia a risco, prioridades e compensa\xE7\xF5es identificadas como parte\
            \ do processo de enquadramento de riscos orientam a estrat\xE9gia de gest\xE3\
            o de risco, que por sua vez orienta a condu\xE7\xE3o das atividades de\
            \ avalia\xE7\xE3o de risco, resposta a risco e monitoramento de risco.\
            \ Os resultados do enquadramento de riscos s\xE3o compartilhados com o\
            \ pessoal da organiza\xE7\xE3o, incluindo propriet\xE1rios de miss\xE3\
            o e de neg\xF3cio, propriet\xE1rios ou respons\xE1veis (stewards) de informa\xE7\
            \xF5es, propriet\xE1rios de sistemas, autoridades autorizadoras, o alto\
            \ funcion\xE1rio de seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, o\
            \ alto funcion\xE1rio respons\xE1vel pela privacidade da ag\xEAncia e\
            \ o alto funcion\xE1rio responsabiliz\xE1vel pela gest\xE3o de risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-29
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-29
      name: Risk Management Program Leadership Roles
      description: 'a. Appoint a Senior Accountable Official for Risk Management to
        align organizational information security and privacy management processes
        with strategic, operational, and budgetary planning processes; and

        b. Establish a Risk Executive (function) to view and analyze risk from an
        organization-wide perspective and ensure management of risk is consistent
        across the organization.'
      annotation: The senior accountable official for risk management leads the risk
        executive (function) in organization-wide risk management activities.
      translations:
        pt:
          name: "Pap\xE9is de Lideran\xE7a do Programa de Gest\xE3o de Riscos"
          description: "a. Nomear um Alto Funcion\xE1rio Responsabiliz\xE1vel pela\
            \ Gest\xE3o de Riscos para alinhar os processos organizacionais de gest\xE3\
            o de seguran\xE7a da informa\xE7\xE3o e de privacidade com os processos\
            \ de planejamento estrat\xE9gico, operacional e or\xE7ament\xE1rio; e\n\
            b. Estabelecer um Executivo de Risco (fun\xE7\xE3o) para visualizar e\
            \ analisar o risco a partir de uma perspectiva de toda a organiza\xE7\xE3\
            o e garantir que a gest\xE3o de risco seja consistente em toda a organiza\xE7\
            \xE3o."
          annotation: "O alto funcion\xE1rio responsabiliz\xE1vel pela gest\xE3o de\
            \ riscos lidera o executivo de risco (fun\xE7\xE3o) nas atividades de\
            \ gest\xE3o de risco de toda a organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-30
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-30
      name: Supply Chain Risk Management Strategy
      description: 'a. Develop an organization-wide strategy for managing supply chain
        risks associated with the development, acquisition, maintenance, and disposal
        of systems, system components, and system services;

        1. Implement the supply chain risk management strategy consistently across
        the organization; and

        (a) Review and update the supply chain risk management strategy on [Assignment:
        organization-defined frequency] or as required, to address organizational
        changes.'
      annotation: "An organization-wide supply chain risk management strategy includes\
        \ an unambiguous expression of the supply chain risk appetite and tolerance\
        \ for the organization, acceptable supply chain risk mitigation strategies\
        \ or controls, a process for consistently evaluating and monitoring supply\
        \ chain risk, approaches for implementing and communicating the supply chain\
        \ risk management strategy, and the associated roles and responsibilities.\
        \ Supply chain risk management includes considerations of the security and\
        \ privacy risks associated with the development, acquisition, maintenance,\
        \ and disposal of systems, system components, and system services. The supply\
        \ chain risk management strategy can be incorporated into the organization\u2019\
        s overarching risk management strategy and can guide and inform supply chain\
        \ policies and system-level supply chain risk management plans. In addition,\
        \ the use of a risk executive function can facilitate a consistent, organization-wide\
        \ application of the supply chain risk management strategy. The supply chain\
        \ risk management strategy is implemented at the organization and mission/business\
        \ levels, whereas the supply chain risk management plan (see SR-2) is implemented\
        \ at the system level."
      translations:
        pt:
          name: "Estrat\xE9gia de Gest\xE3o de Riscos da Cadeia de Suprimentos"
          description: "a. Desenvolver uma estrat\xE9gia para toda a organiza\xE7\xE3\
            o para gerenciar os riscos da cadeia de suprimentos associados ao desenvolvimento,\
            \ aquisi\xE7\xE3o, manuten\xE7\xE3o e descarte de sistemas, componentes\
            \ de sistemas e servi\xE7os de sistemas;\n1. Implementar a estrat\xE9\
            gia de gest\xE3o de riscos da cadeia de suprimentos de forma consistente\
            \ em toda a organiza\xE7\xE3o; e\n(a) Revisar e atualizar a estrat\xE9\
            gia de gest\xE3o de riscos da cadeia de suprimentos em [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o] ou conforme necess\xE1\
            rio, para tratar de mudan\xE7as organizacionais."
          annotation: "Uma estrat\xE9gia de gest\xE3o de riscos da cadeia de suprimentos\
            \ para toda a organiza\xE7\xE3o inclui uma express\xE3o inequ\xEDvoca\
            \ do apetite e da toler\xE2ncia a risco da cadeia de suprimentos para\
            \ a organiza\xE7\xE3o, estrat\xE9gias ou controles aceit\xE1veis de mitiga\xE7\
            \xE3o de risco da cadeia de suprimentos, um processo para avaliar e monitorar\
            \ consistentemente o risco da cadeia de suprimentos, abordagens para implementar\
            \ e comunicar a estrat\xE9gia de gest\xE3o de riscos da cadeia de suprimentos,\
            \ e os pap\xE9is e responsabilidades associados. A gest\xE3o de riscos\
            \ da cadeia de suprimentos inclui considera\xE7\xF5es sobre os riscos\
            \ de seguran\xE7a e privacidade associados ao desenvolvimento, aquisi\xE7\
            \xE3o, manuten\xE7\xE3o e descarte de sistemas, componentes de sistemas\
            \ e servi\xE7os de sistemas. A estrat\xE9gia de gest\xE3o de riscos da\
            \ cadeia de suprimentos pode ser incorporada \xE0 estrat\xE9gia abrangente\
            \ de gest\xE3o de risco da organiza\xE7\xE3o e pode orientar e subsidiar\
            \ as pol\xEDticas da cadeia de suprimentos e os planos de gest\xE3o de\
            \ riscos da cadeia de suprimentos no n\xEDvel do sistema. Al\xE9m disso,\
            \ o uso de uma fun\xE7\xE3o de executivo de risco pode facilitar uma aplica\xE7\
            \xE3o consistente, em toda a organiza\xE7\xE3o, da estrat\xE9gia de gest\xE3\
            o de riscos da cadeia de suprimentos. A estrat\xE9gia de gest\xE3o de\
            \ riscos da cadeia de suprimentos \xE9 implementada nos n\xEDveis da organiza\xE7\
            \xE3o e de miss\xE3o/neg\xF3cio, ao passo que o plano de gest\xE3o de\
            \ riscos da cadeia de suprimentos (consulte SR-2) \xE9 implementado no\
            \ n\xEDvel do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-30(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-30(1)
      name: Supply Chain Risk Management Strategy | Suppliers of Critical or Mission-essential
        Items
      description: Identify, prioritize, and assess suppliers of critical or mission-essential
        technologies, products, and services.
      annotation: The identification and prioritization of suppliers of critical or
        mission-essential technologies, products, and services is paramount to the
        mission/business success of organizations. The assessment of suppliers is
        conducted using supplier reviews (see SR-6) and supply chain risk assessment
        processes (see RA-3(1)). An analysis of supply chain risk can help an organization
        identify systems or components for which additional supply chain risk mitigations
        are required.
      translations:
        pt:
          name: "Estrat\xE9gia de Gest\xE3o de Riscos da Cadeia de Suprimentos | Fornecedores\
            \ de Itens Cr\xEDticos ou Essenciais \xE0 Miss\xE3o"
          description: "Identificar, priorizar e avaliar os fornecedores de tecnologias,\
            \ produtos e servi\xE7os cr\xEDticos ou essenciais \xE0 miss\xE3o."
          annotation: "A identifica\xE7\xE3o e prioriza\xE7\xE3o de fornecedores de\
            \ tecnologias, produtos e servi\xE7os cr\xEDticos ou essenciais \xE0 miss\xE3\
            o \xE9 fundamental para o sucesso da miss\xE3o/neg\xF3cio das organiza\xE7\
            \xF5es. A avalia\xE7\xE3o dos fornecedores \xE9 conduzida usando revis\xF5\
            es de fornecedores (consulte SR-6) e processos de avalia\xE7\xE3o de risco\
            \ da cadeia de suprimentos (consulte RA-3(1)). Uma an\xE1lise do risco\
            \ da cadeia de suprimentos pode ajudar a organiza\xE7\xE3o a identificar\
            \ sistemas ou componentes para os quais s\xE3o necess\xE1rias mitiga\xE7\
            \xF5es adicionais de risco da cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-31
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-31
      name: Continuous Monitoring Strategy
      description: 'Develop an organization-wide continuous monitoring strategy and
        implement continuous monitoring programs that include:

        a. Establishing the following organization-wide metrics to be monitored: [Assignment:
        organization-defined metrics];

        b. Establishing [Assignment: organization-defined frequencies] for monitoring
        and [Assignment: organization-defined frequencies] for assessment of control
        effectiveness;

        c. Ongoing monitoring of organizationally-defined metrics in accordance with
        the continuous monitoring strategy;

        d. Correlation and analysis of information generated by control assessments
        and monitoring;

        e. Response actions to address results of the analysis of control assessment
        and monitoring information; and

        f. Reporting the security and privacy status of organizational systems to
        [Assignment: organization-defined personnel or roles] [Assignment: organization-defined
        frequency].'
      annotation: Continuous monitoring at the organization level facilitates ongoing
        awareness of the security and privacy posture across the organization to support
        organizational risk management decisions. The terms continuous and ongoing
        imply that organizations assess and monitor their controls and risks at a
        frequency sufficient to support risk-based decisions. Different types of controls
        may require different monitoring frequencies. The results of continuous monitoring
        guide and inform risk response actions by organizations. Continuous monitoring
        programs allow organizations to maintain the authorizations of systems and
        common controls in highly dynamic environments of operation with changing
        mission and business needs, threats, vulnerabilities, and technologies. Having
        access to security- and privacy-related information on a continuing basis
        through reports and dashboards gives organizational officials the capability
        to make effective, timely, and informed risk management decisions, including
        ongoing authorization decisions. To further facilitate security and privacy
        risk management, organizations consider aligning organization-defined monitoring
        metrics with organizational risk tolerance as defined in the risk management
        strategy. Monitoring requirements, including the need for monitoring, may
        be referenced in other controls and control enhancements such as, AC-2g, AC-2(7),
        AC-2(12)(a), AC-2(7)(b), AC-2(7)(c), AC-17(1), AT-4a, AU-13, AU-13(1), AU-13(2),
        CA-7, CM-3f, CM-6d, CM-11c, IR-5, MA-2b, MA-3a, MA-4a, PE-3d, PE-6, PE-14b,
        PE-16, PE-20, PM-6, PM-23, PS-7e, SA-9c, SC-5(3)(b), SC-7a, SC-7(24)(b), SC-18b,
        SC-43b, SI-4.
      translations:
        pt:
          name: "Estrat\xE9gia de Monitoramento Cont\xEDnuo"
          description: "Desenvolver uma estrat\xE9gia de monitoramento cont\xEDnuo\
            \ para toda a organiza\xE7\xE3o e implementar programas de monitoramento\
            \ cont\xEDnuo que incluam:\na. Estabelecer as seguintes m\xE9tricas para\
            \ toda a organiza\xE7\xE3o a serem monitoradas: [Atribui\xE7\xE3o: m\xE9\
            tricas definidas pela organiza\xE7\xE3o];\nb. Estabelecer [Atribui\xE7\
            \xE3o: frequ\xEAncias definidas pela organiza\xE7\xE3o] para o monitoramento\
            \ e [Atribui\xE7\xE3o: frequ\xEAncias definidas pela organiza\xE7\xE3\
            o] para a avalia\xE7\xE3o da efic\xE1cia dos controles;\nc. Monitoramento\
            \ cont\xEDnuo das m\xE9tricas definidas pela organiza\xE7\xE3o de acordo\
            \ com a estrat\xE9gia de monitoramento cont\xEDnuo;\nd. Correla\xE7\xE3\
            o e an\xE1lise das informa\xE7\xF5es geradas pelas avalia\xE7\xF5es de\
            \ controle e pelo monitoramento;\ne. A\xE7\xF5es de resposta para tratar\
            \ dos resultados da an\xE1lise das informa\xE7\xF5es de avalia\xE7\xE3\
            o de controle e de monitoramento; e\nf. Relatar o status de seguran\xE7\
            a e privacidade dos sistemas organizacionais para [Atribui\xE7\xE3o: pessoal\
            \ ou pap\xE9is definidos pela organiza\xE7\xE3o] [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o]."
          annotation: "O monitoramento cont\xEDnuo no n\xEDvel da organiza\xE7\xE3\
            o facilita a conscientiza\xE7\xE3o cont\xEDnua sobre a postura de seguran\xE7\
            a e privacidade em toda a organiza\xE7\xE3o, para apoiar as decis\xF5\
            es organizacionais de gest\xE3o de risco. Os termos cont\xEDnuo e em andamento\
            \ implicam que as organiza\xE7\xF5es avaliam e monitoram seus controles\
            \ e riscos em uma frequ\xEAncia suficiente para apoiar decis\xF5es baseadas\
            \ em risco. Diferentes tipos de controles podem exigir diferentes frequ\xEA\
            ncias de monitoramento. Os resultados do monitoramento cont\xEDnuo orientam\
            \ e subsidiam as a\xE7\xF5es de resposta a risco pelas organiza\xE7\xF5\
            es. Os programas de monitoramento cont\xEDnuo permitem que as organiza\xE7\
            \xF5es mantenham as autoriza\xE7\xF5es de sistemas e controles comuns\
            \ em ambientes de opera\xE7\xE3o altamente din\xE2micos, com necessidades\
            \ de miss\xE3o e de neg\xF3cio, amea\xE7as, vulnerabilidades e tecnologias\
            \ em constante mudan\xE7a. Ter acesso a informa\xE7\xF5es relacionadas\
            \ \xE0 seguran\xE7a e \xE0 privacidade de forma cont\xEDnua, por meio\
            \ de relat\xF3rios e pain\xE9is (dashboards), d\xE1 aos funcion\xE1rios\
            \ da organiza\xE7\xE3o a capacidade de tomar decis\xF5es de gest\xE3o\
            \ de risco eficazes, oportunas e informadas, incluindo decis\xF5es de\
            \ autoriza\xE7\xE3o cont\xEDnua. Para facilitar ainda mais a gest\xE3\
            o de risco de seguran\xE7a e privacidade, as organiza\xE7\xF5es consideram\
            \ alinhar as m\xE9tricas de monitoramento definidas pela organiza\xE7\xE3\
            o com a toler\xE2ncia a risco organizacional definida na estrat\xE9gia\
            \ de gest\xE3o de risco. Os requisitos de monitoramento, incluindo a necessidade\
            \ de monitoramento, podem ser referenciados em outros controles e aprimoramentos\
            \ de controle, tais como AC-2g, AC-2(7), AC-2(12)(a), AC-2(7)(b), AC-2(7)(c),\
            \ AC-17(1), AT-4a, AU-13, AU-13(1), AU-13(2), CA-7, CM-3f, CM-6d, CM-11c,\
            \ IR-5, MA-2b, MA-3a, MA-4a, PE-3d, PE-6, PE-14b, PE-16, PE-20, PM-6,\
            \ PM-23, PS-7e, SA-9c, SC-5(3)(b), SC-7a, SC-7(24)(b), SC-18b, SC-43b,\
            \ SI-4."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm-32
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pm
      ref_id: PM-32
      name: Purposing
      description: 'Analyze [Assignment: organization-defined systems or systems components]
        supporting mission essential services or functions to ensure that the information
        resources are being used consistent with their intended purpose.'
      annotation: Systems are designed to support a specific mission or business function.
        However, over time, systems and system components may be used to support services
        and functions that are outside of the scope of the intended mission or business
        functions. This can result in exposing information resources to unintended
        environments and uses that can significantly increase threat exposure. In
        doing so, the systems are more vulnerable to compromise, which can ultimately
        impact the services and functions for which they were intended. This is especially
        impactful for mission-essential services and functions. By analyzing resource
        use, organizations can identify such potential exposures.
      translations:
        pt:
          name: "Adequa\xE7\xE3o de Finalidade (Purposing)"
          description: "Analisar [Atribui\xE7\xE3o: sistemas ou componentes de sistemas\
            \ definidos pela organiza\xE7\xE3o] que apoiam servi\xE7os ou fun\xE7\xF5\
            es essenciais \xE0 miss\xE3o para garantir que os recursos de informa\xE7\
            \xE3o estejam sendo usados de forma consistente com sua finalidade pretendida."
          annotation: "Os sistemas s\xE3o projetados para apoiar uma miss\xE3o ou\
            \ fun\xE7\xE3o de neg\xF3cio espec\xEDfica. No entanto, com o tempo, os\
            \ sistemas e os componentes de sistemas podem ser usados para apoiar servi\xE7\
            os e fun\xE7\xF5es que est\xE3o fora do escopo das fun\xE7\xF5es de miss\xE3\
            o ou de neg\xF3cio pretendidas. Isso pode resultar na exposi\xE7\xE3o\
            \ dos recursos de informa\xE7\xE3o a ambientes e usos n\xE3o pretendidos,\
            \ que podem aumentar significativamente a exposi\xE7\xE3o a amea\xE7as.\
            \ Ao faz\xEA-lo, os sistemas tornam-se mais vulner\xE1veis a comprometimentos,\
            \ o que pode, em \xFAltima an\xE1lise, impactar os servi\xE7os e fun\xE7\
            \xF5es para os quais foram destinados. Isso \xE9 especialmente impactante\
            \ para servi\xE7os e fun\xE7\xF5es essenciais \xE0 miss\xE3o. Ao analisar\
            \ o uso de recursos, as organiza\xE7\xF5es podem identificar tais exposi\xE7\
            \xF5es potenciais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      assessable: false
      depth: 1
      ref_id: PS
      name: Personnel Security
      translations:
        pt:
          name: "Seguran\xE7a de Pessoal"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] personnel security policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the personnel security policy
        and the associated personnel security controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the personnel security policy
        and procedures; and

        c. Review and update the current personnel security:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Personnel security policy and procedures for the controls in the
        PS family that are implemented within systems and organizations. The risk
        management strategy is an important factor in establishing such policies and
        procedures. Policies and procedures contribute to security and privacy assurance.
        Therefore, it is important that security and privacy programs collaborate
        on their development. Security and privacy program policies and procedures
        at the organization level are preferable, in general, and may obviate the
        need for mission level or system-specific policies and procedures. The policy
        can be included as part of the general security and privacy policy or be represented
        by multiple policies reflecting the complex nature of organizations. Procedures
        can be established for security and privacy programs, for mission/business
        processes, and for systems, if needed. Procedures describe how the policies
        or controls are implemented and can be directed at the individual or role
        that is the object of the procedure. Procedures can be documented in system
        security and privacy plans or in one or more separate documents. Events that
        may precipitate an update to personnel security policy and procedures include,
        but are not limited to, assessment or audit findings, security incidents or
        breaches, or changes in applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines. Simply restating controls does not constitute
        an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de seguran\xE7a de pessoal de [Sele\xE7\xE3o (um ou mais): n\xED\
            vel organizacional; n\xEDvel de processo de miss\xE3o/neg\xF3cio; n\xED\
            vel de sistema] que:\n(a) Aborde prop\xF3sito, escopo, fun\xE7\xF5es,\
            \ responsabilidades, comprometimento da dire\xE7\xE3o, coordena\xE7\xE3\
            o entre entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de seguran\xE7a de pessoal e dos\
            \ controles de seguran\xE7a de pessoal associados;\nb. Designar um(a)\
            \ [Atribui\xE7\xE3o: respons\xE1vel definido pela organiza\xE7\xE3o] para\
            \ gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de seguran\xE7a de pessoal; e\nc.\
            \ Revisar e atualizar a atual seguran\xE7a de pessoal:\n1. Pol\xEDtica\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o];\
            \ e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Pol\xEDtica e procedimentos de seguran\xE7a de pessoal para\
            \ os controles da fam\xEDlia PS que s\xE3o implementados dentro de sistemas\
            \ e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de riscos \xE9 um\
            \ fator importante no estabelecimento de tais pol\xEDticas e procedimentos.\
            \ Pol\xEDticas e procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Portanto, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem em seu desenvolvimento. Pol\xEDticas e procedimentos\
            \ de programas de seguran\xE7a e privacidade no n\xEDvel organizacional\
            \ s\xE3o prefer\xEDveis, em geral, e podem dispensar a necessidade de\
            \ pol\xEDticas e procedimentos no n\xEDvel de miss\xE3o ou espec\xEDficos\
            \ do sistema. A pol\xEDtica pode ser inclu\xEDda como parte da pol\xED\
            tica geral de seguran\xE7a e privacidade ou ser representada por m\xFA\
            ltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o/neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Procedimentos descrevem como as pol\xEDticas ou controles\
            \ s\xE3o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0\
            \ fun\xE7\xE3o que \xE9 objeto do procedimento. Procedimentos podem ser\
            \ documentados em planos de seguran\xE7a e privacidade do sistema ou em\
            \ um ou mais documentos separados. Eventos que podem precipitar uma atualiza\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de seguran\xE7a de pessoal incluem,\
            \ mas n\xE3o se limitam a, constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria,\
            \ incidentes ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7as em leis,\
            \ ordens executivas, diretivas, regulamentos, pol\xEDticas, normas e diretrizes\
            \ aplic\xE1veis. Simplesmente reafirmar controles n\xE3o constitui uma\
            \ pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-2
      name: Position Risk Designation
      description: 'a. Assign a risk designation to all organizational positions;

        b. Establish screening criteria for individuals filling those positions; and

        c. Review and update position risk designations [Assignment: organization-defined
        frequency].'
      annotation: Position risk designations reflect Office of Personnel Management
        (OPM) policy and guidance. Proper position designation is the foundation of
        an effective and consistent suitability and personnel security program. The
        Position Designation System (PDS) assesses the duties and responsibilities
        of a position to determine the degree of potential damage to the efficiency
        or integrity of the service due to misconduct of an incumbent of a position
        and establishes the risk level of that position. The PDS assessment also determines
        if the duties and responsibilities of the position present the potential for
        position incumbents to bring about a material adverse effect on national security
        and the degree of that potential effect, which establishes the sensitivity
        level of a position. The results of the assessment determine what level of
        investigation is conducted for a position. Risk designations can guide and
        inform the types of authorizations that individuals receive when accessing
        organizational information and information systems. Position screening criteria
        include explicit information security role appointment requirements. Parts
        1400 and 731 of Title 5, Code of Federal Regulations, establish the requirements
        for organizations to evaluate relevant covered positions for a position sensitivity
        and position risk designation commensurate with the duties and responsibilities
        of those positions.
      translations:
        pt:
          name: "Designa\xE7\xE3o de Risco de Cargo"
          description: "a. Atribuir uma designa\xE7\xE3o de risco a todos os cargos\
            \ organizacionais;\nb. Estabelecer crit\xE9rios de triagem para os indiv\xED\
            duos que ocupam esses cargos; e\nc. Revisar e atualizar as designa\xE7\
            \xF5es de risco dos cargos [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o]."
          annotation: "As designa\xE7\xF5es de risco de cargo refletem a pol\xEDtica\
            \ e a orienta\xE7\xE3o do Office of Personnel Management (OPM). A designa\xE7\
            \xE3o adequada de cargos \xE9 a base de um programa de adequa\xE7\xE3\
            o e seguran\xE7a de pessoal eficaz e consistente. O Position Designation\
            \ System (PDS) avalia os deveres e responsabilidades de um cargo para\
            \ determinar o grau de dano potencial \xE0 efici\xEAncia ou integridade\
            \ do servi\xE7o devido \xE0 m\xE1 conduta de um ocupante de um cargo e\
            \ estabelece o n\xEDvel de risco desse cargo. A avalia\xE7\xE3o do PDS\
            \ tamb\xE9m determina se os deveres e responsabilidades do cargo apresentam\
            \ o potencial de os ocupantes do cargo provocarem um efeito adverso material\
            \ \xE0 seguran\xE7a nacional e o grau desse efeito potencial, o que estabelece\
            \ o n\xEDvel de sensibilidade de um cargo. Os resultados da avalia\xE7\
            \xE3o determinam qual n\xEDvel de investiga\xE7\xE3o \xE9 conduzido para\
            \ um cargo. As designa\xE7\xF5es de risco podem orientar e informar os\
            \ tipos de autoriza\xE7\xF5es que os indiv\xEDduos recebem ao acessar\
            \ informa\xE7\xF5es e sistemas de informa\xE7\xE3o organizacionais. Os\
            \ crit\xE9rios de triagem de cargos incluem requisitos expl\xEDcitos de\
            \ nomea\xE7\xE3o para fun\xE7\xF5es de seguran\xE7a da informa\xE7\xE3\
            o. As Partes 1400 e 731 do T\xEDtulo 5 do Code of Federal Regulations\
            \ estabelecem os requisitos para que as organiza\xE7\xF5es avaliem cargos\
            \ cobertos relevantes quanto a uma designa\xE7\xE3o de sensibilidade e\
            \ risco de cargo compat\xEDvel com os deveres e responsabilidades desses\
            \ cargos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-3
      name: Personnel Screening
      description: 'a. Screen individuals prior to authorizing access to the system;
        and

        b. Rescreen individuals in accordance with [Assignment: organization-defined
        conditions requiring rescreening and, where rescreening is so indicated, the
        frequency of rescreening].'
      annotation: Personnel screening and rescreening activities reflect applicable
        laws, executive orders, directives, regulations, policies, standards, guidelines,
        and specific criteria established for the risk designations of assigned positions.
        Examples of personnel screening include background investigations and agency
        checks. Organizations may define different rescreening conditions and frequencies
        for personnel accessing systems based on types of information processed, stored,
        or transmitted by the systems.
      translations:
        pt:
          name: Triagem de Pessoal
          description: "a. Triar os indiv\xEDduos antes de autorizar o acesso ao sistema;\
            \ e\nb. Re-triar os indiv\xEDduos de acordo com [Atribui\xE7\xE3o: condi\xE7\
            \xF5es definidas pela organiza\xE7\xE3o que exigem nova triagem e, quando\
            \ a nova triagem for assim indicada, a frequ\xEAncia da nova triagem]."
          annotation: "As atividades de triagem e nova triagem de pessoal refletem\
            \ leis, ordens executivas, diretivas, regulamentos, pol\xEDticas, normas,\
            \ diretrizes aplic\xE1veis e crit\xE9rios espec\xEDficos estabelecidos\
            \ para as designa\xE7\xF5es de risco dos cargos atribu\xEDdos. Exemplos\
            \ de triagem de pessoal incluem investiga\xE7\xF5es de antecedentes e\
            \ verifica\xE7\xF5es junto a ag\xEAncias. As organiza\xE7\xF5es podem\
            \ definir diferentes condi\xE7\xF5es e frequ\xEAncias de nova triagem\
            \ para o pessoal que acessa os sistemas com base nos tipos de informa\xE7\
            \xE3o processada, armazenada ou transmitida pelos sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-3(1)
      name: Personnel Screening | Classified Information
      description: Verify that individuals accessing a system processing, storing,
        or transmitting classified information are cleared and indoctrinated to the
        highest classification level of the information to which they have access
        on the system.
      annotation: Classified information is the most sensitive information that the
        Federal Government processes, stores, or transmits. It is imperative that
        individuals have the requisite security clearances and system access authorizations
        prior to gaining access to such information. Access authorizations are enforced
        by system access controls (see AC-3) and flow controls (see AC-4).
      translations:
        pt:
          name: "Triagem de Pessoal | Informa\xE7\xE3o Classificada"
          description: "Verificar se os indiv\xEDduos que acessam um sistema que processa,\
            \ armazena ou transmite informa\xE7\xE3o classificada possuem credenciamento\
            \ e doutrina\xE7\xE3o at\xE9 o mais alto n\xEDvel de classifica\xE7\xE3\
            o da informa\xE7\xE3o \xE0 qual t\xEAm acesso no sistema."
          annotation: "A informa\xE7\xE3o classificada \xE9 a informa\xE7\xE3o mais\
            \ sens\xEDvel que o Governo Federal processa, armazena ou transmite. \xC9\
            \ imperativo que os indiv\xEDduos possuam os credenciamentos de seguran\xE7\
            a e as autoriza\xE7\xF5es de acesso ao sistema necess\xE1rios antes de\
            \ obter acesso a tal informa\xE7\xE3o. As autoriza\xE7\xF5es de acesso\
            \ s\xE3o impostas por controles de acesso ao sistema (consulte AC-3) e\
            \ controles de fluxo (consulte AC-4)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-3(2)
      name: Personnel Screening | Formal Indoctrination
      description: Verify that individuals accessing a system processing, storing,
        or transmitting types of classified information that require formal indoctrination,
        are formally indoctrinated for all the relevant types of information to which
        they have access on the system.
      annotation: Types of classified information that require formal indoctrination
        include Special Access Program (SAP), Restricted Data (RD), and Sensitive
        Compartmented Information (SCI).
      translations:
        pt:
          name: "Triagem de Pessoal | Doutrina\xE7\xE3o Formal"
          description: "Verificar se os indiv\xEDduos que acessam um sistema que processa,\
            \ armazena ou transmite tipos de informa\xE7\xE3o classificada que exigem\
            \ doutrina\xE7\xE3o formal est\xE3o formalmente doutrinados para todos\
            \ os tipos relevantes de informa\xE7\xE3o aos quais t\xEAm acesso no sistema."
          annotation: "Os tipos de informa\xE7\xE3o classificada que exigem doutrina\xE7\
            \xE3o formal incluem Special Access Program (SAP), Restricted Data (RD)\
            \ e Sensitive Compartmented Information (SCI)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-3(3)
      name: Personnel Screening | Information Requiring Special Protective Measures
      description: 'Verify that individuals accessing a system processing, storing,
        or transmitting information requiring special protection:

        (a) Have valid access authorizations that are demonstrated by assigned official
        government duties; and

        (b) Satisfy [Assignment: organization-defined additional personnel screening
        criteria].'
      annotation: Organizational information that requires special protection includes
        controlled unclassified information. Personnel security criteria include position
        sensitivity background screening requirements.
      translations:
        pt:
          name: "Triagem de Pessoal | Informa\xE7\xE3o que Requer Medidas Protetivas\
            \ Especiais"
          description: "Verificar se os indiv\xEDduos que acessam um sistema que processa,\
            \ armazena ou transmite informa\xE7\xE3o que requer prote\xE7\xE3o especial:\n\
            (a) Possuem autoriza\xE7\xF5es de acesso v\xE1lidas que s\xE3o demonstradas\
            \ por deveres oficiais atribu\xEDdos pelo governo; e\n(b) Satisfazem [Atribui\xE7\
            \xE3o: crit\xE9rios adicionais de triagem de pessoal definidos pela organiza\xE7\
            \xE3o]."
          annotation: "A informa\xE7\xE3o organizacional que requer prote\xE7\xE3\
            o especial inclui informa\xE7\xE3o n\xE3o classificada controlada. Os\
            \ crit\xE9rios de seguran\xE7a de pessoal incluem requisitos de triagem\
            \ de antecedentes para a sensibilidade do cargo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-3(4)
      name: Personnel Screening | Citizenship Requirements
      description: 'Verify that individuals accessing a system processing, storing,
        or transmitting [Assignment: organization-defined information types] meet
        [Assignment: organization-defined citizenship requirements].'
      annotation: None.
      translations:
        pt:
          name: Triagem de Pessoal | Requisitos de Cidadania
          description: "Verificar se os indiv\xEDduos que acessam um sistema que processa,\
            \ armazena ou transmite [Atribui\xE7\xE3o: tipos de informa\xE7\xE3o definidos\
            \ pela organiza\xE7\xE3o] atendem aos [Atribui\xE7\xE3o: requisitos de\
            \ cidadania definidos pela organiza\xE7\xE3o]."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-4
      name: Personnel Termination
      description: 'Upon termination of individual employment:

        a. Disable system access within [Assignment: organization-defined time period];

        b. Terminate or revoke any authenticators and credentials associated with
        the individual;

        c. Conduct exit interviews that include a discussion of [Assignment: organization-defined
        information security topics];

        d. Retrieve all security-related organizational system-related property; and

        e. Retain access to organizational information and systems formerly controlled
        by terminated individual.'
      annotation: System property includes hardware authentication tokens, system
        administration technical manuals, keys, identification cards, and building
        passes. Exit interviews ensure that terminated individuals understand the
        security constraints imposed by being former employees and that proper accountability
        is achieved for system-related property. Security topics at exit interviews
        include reminding individuals of nondisclosure agreements and potential limitations
        on future employment. Exit interviews may not always be possible for some
        individuals, including in cases related to the unavailability of supervisors,
        illnesses, or job abandonment. Exit interviews are important for individuals
        with security clearances. The timely execution of termination actions is essential
        for individuals who have been terminated for cause. In certain situations,
        organizations consider disabling the system accounts of individuals who are
        being terminated prior to the individuals being notified.
      translations:
        pt:
          name: Desligamento de Pessoal
          description: "Ap\xF3s o desligamento do emprego do indiv\xEDduo:\na. Desabilitar\
            \ o acesso ao sistema dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o];\nb. Encerrar ou revogar quaisquer\
            \ autenticadores e credenciais associados ao indiv\xEDduo;\nc. Conduzir\
            \ entrevistas de desligamento que incluam uma discuss\xE3o sobre [Atribui\xE7\
            \xE3o: t\xF3picos de seguran\xE7a da informa\xE7\xE3o definidos pela organiza\xE7\
            \xE3o];\nd. Recuperar toda a propriedade organizacional relacionada \xE0\
            \ seguran\xE7a e relacionada ao sistema; e\ne. Reter o acesso a informa\xE7\
            \xF5es e sistemas organizacionais anteriormente controlados pelo indiv\xED\
            duo desligado."
          annotation: "A propriedade do sistema inclui tokens de autentica\xE7\xE3\
            o de hardware, manuais t\xE9cnicos de administra\xE7\xE3o do sistema,\
            \ chaves, cart\xF5es de identifica\xE7\xE3o e crach\xE1s de acesso a edif\xED\
            cios. As entrevistas de desligamento asseguram que os indiv\xEDduos desligados\
            \ compreendam as restri\xE7\xF5es de seguran\xE7a impostas por serem ex-funcion\xE1\
            rios e que a devida responsabiliza\xE7\xE3o seja alcan\xE7ada pela propriedade\
            \ relacionada ao sistema. Os t\xF3picos de seguran\xE7a nas entrevistas\
            \ de desligamento incluem lembrar os indiv\xEDduos sobre acordos de n\xE3\
            o divulga\xE7\xE3o e potenciais limita\xE7\xF5es sobre emprego futuro.\
            \ As entrevistas de desligamento nem sempre s\xE3o poss\xEDveis para alguns\
            \ indiv\xEDduos, inclusive em casos relacionados \xE0 indisponibilidade\
            \ de supervisores, doen\xE7as ou abandono de emprego. As entrevistas de\
            \ desligamento s\xE3o importantes para indiv\xEDduos com credenciamentos\
            \ de seguran\xE7a. A execu\xE7\xE3o tempestiva das a\xE7\xF5es de desligamento\
            \ \xE9 essencial para indiv\xEDduos que foram desligados por justa causa.\
            \ Em certas situa\xE7\xF5es, as organiza\xE7\xF5es consideram desabilitar\
            \ as contas de sistema dos indiv\xEDduos que est\xE3o sendo desligados\
            \ antes de os indiv\xEDduos serem notificados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-4(1)
      name: Personnel Termination | Post-employment Requirements
      description: '(a) Notify terminated individuals of applicable, legally binding
        post-employment requirements for the protection of organizational information;
        and

        (b) Require terminated individuals to sign an acknowledgment of post-employment
        requirements as part of the organizational termination process.'
      annotation: Organizations consult with the Office of the General Counsel regarding
        matters of post-employment requirements on terminated individuals.
      translations:
        pt:
          name: "Desligamento de Pessoal | Requisitos P\xF3s-emprego"
          description: "(a) Notificar os indiv\xEDduos desligados sobre requisitos\
            \ p\xF3s-emprego aplic\xE1veis e juridicamente vinculantes para a prote\xE7\
            \xE3o de informa\xE7\xF5es organizacionais; e\n(b) Exigir que os indiv\xED\
            duos desligados assinem um reconhecimento dos requisitos p\xF3s-emprego\
            \ como parte do processo organizacional de desligamento."
          annotation: "As organiza\xE7\xF5es consultam o Office of the General Counsel\
            \ sobre quest\xF5es relativas a requisitos p\xF3s-emprego de indiv\xED\
            duos desligados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-4(2)
      name: Personnel Termination | Automated Actions
      description: 'Use [Assignment: organization-defined automated mechanisms] to
        [Selection (one or more): notify [Assignment: organization-defined personnel
        or roles] of individual termination actions; disable access to system resources].'
      annotation: In organizations with many employees, not all personnel who need
        to know about termination actions receive the appropriate notifications, or
        if such notifications are received, they may not occur in a timely manner.
        Automated mechanisms can be used to send automatic alerts or notifications
        to organizational personnel or roles when individuals are terminated. Such
        automatic alerts or notifications can be conveyed in a variety of ways, including
        via telephone, electronic mail, text message, or websites. Automated mechanisms
        can also be employed to quickly and thoroughly disable access to system resources
        after an employee is terminated.
      translations:
        pt:
          name: "Desligamento de Pessoal | A\xE7\xF5es Automatizadas"
          description: "Usar [Atribui\xE7\xE3o: mecanismos automatizados definidos\
            \ pela organiza\xE7\xE3o] para [Sele\xE7\xE3o (um ou mais): notificar\
            \ [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] sobre a\xE7\xF5es de desligamento de indiv\xEDduos; desabilitar\
            \ o acesso a recursos do sistema]."
          annotation: "Em organiza\xE7\xF5es com muitos funcion\xE1rios, nem todo\
            \ o pessoal que precisa saber sobre a\xE7\xF5es de desligamento recebe\
            \ as notifica\xE7\xF5es apropriadas ou, se tais notifica\xE7\xF5es forem\
            \ recebidas, podem n\xE3o ocorrer de maneira tempestiva. Mecanismos automatizados\
            \ podem ser usados para enviar alertas ou notifica\xE7\xF5es autom\xE1\
            ticos ao pessoal ou \xE0s fun\xE7\xF5es organizacionais quando indiv\xED\
            duos s\xE3o desligados. Tais alertas ou notifica\xE7\xF5es autom\xE1ticos\
            \ podem ser transmitidos de diversas maneiras, inclusive por telefone,\
            \ correio eletr\xF4nico, mensagem de texto ou sites. Mecanismos automatizados\
            \ tamb\xE9m podem ser empregados para desabilitar r\xE1pida e completamente\
            \ o acesso a recursos do sistema ap\xF3s um funcion\xE1rio ser desligado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-5
      name: Personnel Transfer
      description: 'a. Review and confirm ongoing operational need for current logical
        and physical access authorizations to systems and facilities when individuals
        are reassigned or transferred to other positions within the organization;

        b. Initiate [Assignment: organization-defined transfer or reassignment actions]
        within [Assignment: organization-defined time period following the formal
        transfer action];

        c. Modify access authorization as needed to correspond with any changes in
        operational need due to reassignment or transfer; and

        d. Notify [Assignment: organization-defined personnel or roles] within [Assignment:
        organization-defined time period].'
      annotation: Personnel transfer applies when reassignments or transfers of individuals
        are permanent or of such extended duration as to make the actions warranted.
        Organizations define actions appropriate for the types of reassignments or
        transfers, whether permanent or extended. Actions that may be required for
        personnel transfers or reassignments to other positions within organizations
        include returning old and issuing new keys, identification cards, and building
        passes; closing system accounts and establishing new accounts; changing system
        access authorizations (i.e., privileges); and providing for access to official
        records to which individuals had access at previous work locations and in
        previous system accounts.
      translations:
        pt:
          name: "Transfer\xEAncia de Pessoal"
          description: "a. Revisar e confirmar a necessidade operacional cont\xED\
            nua das autoriza\xE7\xF5es atuais de acesso l\xF3gico e f\xEDsico a sistemas\
            \ e instala\xE7\xF5es quando os indiv\xEDduos s\xE3o realocados ou transferidos\
            \ para outros cargos dentro da organiza\xE7\xE3o;\nb. Iniciar [Atribui\xE7\
            \xE3o: a\xE7\xF5es de transfer\xEAncia ou realoca\xE7\xE3o definidas pela\
            \ organiza\xE7\xE3o] dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o ap\xF3s a a\xE7\xE3o formal de transfer\xEA\
            ncia];\nc. Modificar a autoriza\xE7\xE3o de acesso conforme necess\xE1\
            rio para corresponder a quaisquer mudan\xE7as na necessidade operacional\
            \ devido \xE0 realoca\xE7\xE3o ou transfer\xEAncia; e\nd. Notificar [Atribui\xE7\
            \xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o] dentro\
            \ de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "A transfer\xEAncia de pessoal aplica-se quando as realoca\xE7\
            \xF5es ou transfer\xEAncias de indiv\xEDduos s\xE3o permanentes ou de\
            \ dura\xE7\xE3o t\xE3o prolongada que tornem as a\xE7\xF5es justificadas.\
            \ As organiza\xE7\xF5es definem a\xE7\xF5es apropriadas para os tipos\
            \ de realoca\xE7\xF5es ou transfer\xEAncias, sejam permanentes ou prolongadas.\
            \ A\xE7\xF5es que podem ser exigidas para transfer\xEAncias ou realoca\xE7\
            \xF5es de pessoal para outros cargos dentro das organiza\xE7\xF5es incluem\
            \ devolver chaves antigas e emitir novas chaves, cart\xF5es de identifica\xE7\
            \xE3o e crach\xE1s de acesso a edif\xEDcios; encerrar contas de sistema\
            \ e estabelecer novas contas; alterar autoriza\xE7\xF5es de acesso ao\
            \ sistema (ou seja, privil\xE9gios); e prover acesso a registros oficiais\
            \ aos quais os indiv\xEDduos tinham acesso em locais de trabalho anteriores\
            \ e em contas de sistema anteriores."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-6
      name: Access Agreements
      description: "a. Develop and document access agreements for organizational systems;\n\
        b. Review and update the access agreements [Assignment: organization-defined\
        \ frequency]; and\nc. Verify that individuals requiring access to organizational\
        \ information and systems: \n1. Sign appropriate access agreements prior to\
        \ being granted access; and\n2. Re-sign access agreements to maintain access\
        \ to organizational systems when access agreements have been updated or [Assignment:\
        \ organization-defined frequency]."
      annotation: Access agreements include nondisclosure agreements, acceptable use
        agreements, rules of behavior, and conflict-of-interest agreements. Signed
        access agreements include an acknowledgement that individuals have read, understand,
        and agree to abide by the constraints associated with organizational systems
        to which access is authorized. Organizations can use electronic signatures
        to acknowledge access agreements unless specifically prohibited by organizational
        policy.
      translations:
        pt:
          name: Acordos de Acesso
          description: "a. Desenvolver e documentar acordos de acesso para os sistemas\
            \ organizacionais;\nb. Revisar e atualizar os acordos de acesso [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]; e\nc. Verificar\
            \ se os indiv\xEDduos que exigem acesso a informa\xE7\xF5es e sistemas\
            \ organizacionais: \n1. Assinam os acordos de acesso apropriados antes\
            \ de receberem o acesso; e\n2. Reassinam os acordos de acesso para manter\
            \ o acesso aos sistemas organizacionais quando os acordos de acesso forem\
            \ atualizados ou [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o]."
          annotation: "Os acordos de acesso incluem acordos de n\xE3o divulga\xE7\xE3\
            o, acordos de uso aceit\xE1vel, regras de comportamento e acordos de conflito\
            \ de interesses. Os acordos de acesso assinados incluem um reconhecimento\
            \ de que os indiv\xEDduos leram, compreendem e concordam em cumprir as\
            \ restri\xE7\xF5es associadas aos sistemas organizacionais aos quais o\
            \ acesso \xE9 autorizado. As organiza\xE7\xF5es podem usar assinaturas\
            \ eletr\xF4nicas para reconhecer os acordos de acesso, a menos que especificamente\
            \ proibido pela pol\xEDtica organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-6(1)
      name: Access Agreements | Information Requiring Special Protection
      description: '[Withdrawn: Incorporated into PS-3.]'
      translations:
        pt:
          name: "Acordos de Acesso | Informa\xE7\xE3o que Requer Prote\xE7\xE3o Especial"
          description: '[Retirado: Incorporado ao PS-3.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-6(2)
      name: Access Agreements | Classified Information Requiring Special Protection
      description: 'Verify that access to classified information requiring special
        protection is granted only to individuals who:

        (a) Have a valid access authorization that is demonstrated by assigned official
        government duties;

        (b) Satisfy associated personnel security criteria; and

        (c) Have read, understood, and signed a nondisclosure agreement.'
      annotation: Classified information that requires special protection includes
        collateral information, Special Access Program (SAP) information, and Sensitive
        Compartmented Information (SCI). Personnel security criteria reflect applicable
        laws, executive orders, directives, regulations, policies, standards, and
        guidelines.
      translations:
        pt:
          name: "Acordos de Acesso | Informa\xE7\xE3o Classificada que Requer Prote\xE7\
            \xE3o Especial"
          description: "Verificar se o acesso a informa\xE7\xE3o classificada que\
            \ requer prote\xE7\xE3o especial \xE9 concedido somente a indiv\xEDduos\
            \ que:\n(a) Possuem uma autoriza\xE7\xE3o de acesso v\xE1lida que \xE9\
            \ demonstrada por deveres oficiais atribu\xEDdos pelo governo;\n(b) Satisfazem\
            \ os crit\xE9rios de seguran\xE7a de pessoal associados; e\n(c) Leram,\
            \ compreenderam e assinaram um acordo de n\xE3o divulga\xE7\xE3o."
          annotation: "A informa\xE7\xE3o classificada que requer prote\xE7\xE3o especial\
            \ inclui informa\xE7\xE3o colateral, informa\xE7\xE3o de Special Access\
            \ Program (SAP) e Sensitive Compartmented Information (SCI). Os crit\xE9\
            rios de seguran\xE7a de pessoal refletem leis, ordens executivas, diretivas,\
            \ regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-6(3)
      name: Access Agreements | Post-employment Requirements
      description: '(a) Notify individuals of applicable, legally binding post-employment
        requirements for protection of organizational information; and

        (b) Require individuals to sign an acknowledgment of these requirements, if
        applicable, as part of granting initial access to covered information.'
      annotation: Organizations consult with the Office of the General Counsel regarding
        matters of post-employment requirements on terminated individuals.
      translations:
        pt:
          name: "Acordos de Acesso | Requisitos P\xF3s-emprego"
          description: "(a) Notificar os indiv\xEDduos sobre requisitos p\xF3s-emprego\
            \ aplic\xE1veis e juridicamente vinculantes para prote\xE7\xE3o de informa\xE7\
            \xF5es organizacionais; e\n(b) Exigir que os indiv\xEDduos assinem um\
            \ reconhecimento desses requisitos, se aplic\xE1vel, como parte da concess\xE3\
            o do acesso inicial \xE0 informa\xE7\xE3o coberta."
          annotation: "As organiza\xE7\xF5es consultam o Office of the General Counsel\
            \ sobre quest\xF5es relativas a requisitos p\xF3s-emprego de indiv\xED\
            duos desligados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-7
      name: External Personnel Security
      description: 'a. Establish personnel security requirements, including security
        roles and responsibilities for external providers;

        b. Require external providers to comply with personnel security policies and
        procedures established by the organization;

        c. Document personnel security requirements;

        d. Require external providers to notify [Assignment: organization-defined
        personnel or roles] of any personnel transfers or terminations of external
        personnel who possess organizational credentials and/or badges, or who have
        system privileges within [Assignment: organization-defined time period]; and

        e. Monitor provider compliance with personnel security requirements.'
      annotation: External provider refers to organizations other than the organization
        operating or acquiring the system. External providers include service bureaus,
        contractors, and other organizations that provide system development, information
        technology services, testing or assessment services, outsourced applications,
        and network/security management. Organizations explicitly include personnel
        security requirements in acquisition-related documents. External providers
        may have personnel working at organizational facilities with credentials,
        badges, or system privileges issued by organizations. Notifications of external
        personnel changes ensure the appropriate termination of privileges and credentials.
        Organizations define the transfers and terminations deemed reportable by security-related
        characteristics that include functions, roles, and the nature of credentials
        or privileges associated with transferred or terminated individuals.
      translations:
        pt:
          name: "Seguran\xE7a de Pessoal Externo"
          description: "a. Estabelecer requisitos de seguran\xE7a de pessoal, incluindo\
            \ fun\xE7\xF5es e responsabilidades de seguran\xE7a para provedores externos;\n\
            b. Exigir que os provedores externos cumpram as pol\xEDticas e os procedimentos\
            \ de seguran\xE7a de pessoal estabelecidos pela organiza\xE7\xE3o;\nc.\
            \ Documentar os requisitos de seguran\xE7a de pessoal;\nd. Exigir que\
            \ os provedores externos notifiquem [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidos pela organiza\xE7\xE3o] sobre quaisquer transfer\xEA\
            ncias ou desligamentos de pessoal externo que possua credenciais e/ou\
            \ crach\xE1s organizacionais, ou que tenha privil\xE9gios de sistema,\
            \ dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]; e\ne. Monitorar a conformidade do provedor com os requisitos de\
            \ seguran\xE7a de pessoal."
          annotation: "Provedor externo refere-se a organiza\xE7\xF5es distintas da\
            \ organiza\xE7\xE3o que opera ou adquire o sistema. Provedores externos\
            \ incluem service bureaus, contratados e outras organiza\xE7\xF5es que\
            \ fornecem desenvolvimento de sistemas, servi\xE7os de tecnologia da informa\xE7\
            \xE3o, servi\xE7os de teste ou avalia\xE7\xE3o, aplica\xE7\xF5es terceirizadas\
            \ e gest\xE3o de rede/seguran\xE7a. As organiza\xE7\xF5es incluem explicitamente\
            \ os requisitos de seguran\xE7a de pessoal em documentos relacionados\
            \ \xE0 aquisi\xE7\xE3o. Os provedores externos podem ter pessoal trabalhando\
            \ em instala\xE7\xF5es organizacionais com credenciais, crach\xE1s ou\
            \ privil\xE9gios de sistema emitidos pelas organiza\xE7\xF5es. As notifica\xE7\
            \xF5es de mudan\xE7as de pessoal externo asseguram o encerramento apropriado\
            \ de privil\xE9gios e credenciais. As organiza\xE7\xF5es definem as transfer\xEA\
            ncias e desligamentos considerados report\xE1veis por caracter\xEDsticas\
            \ relacionadas \xE0 seguran\xE7a que incluem fun\xE7\xF5es, pap\xE9is\
            \ e a natureza das credenciais ou privil\xE9gios associados aos indiv\xED\
            duos transferidos ou desligados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-8
      name: Personnel Sanctions
      description: 'a. Employ a formal sanctions process for individuals failing to
        comply with established information security and privacy policies and procedures;
        and

        b. Notify [Assignment: organization-defined personnel or roles] within [Assignment:
        organization-defined time period] when a formal employee sanctions process
        is initiated, identifying the individual sanctioned and the reason for the
        sanction.'
      annotation: Organizational sanctions reflect applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Sanctions processes
        are described in access agreements and can be included as part of general
        personnel policies for organizations and/or specified in security and privacy
        policies. Organizations consult with the Office of the General Counsel regarding
        matters of employee sanctions.
      translations:
        pt:
          name: "San\xE7\xF5es de Pessoal"
          description: "a. Empregar um processo formal de san\xE7\xF5es para indiv\xED\
            duos que n\xE3o cumpram as pol\xEDticas e os procedimentos estabelecidos\
            \ de seguran\xE7a da informa\xE7\xE3o e privacidade; e\nb. Notificar [Atribui\xE7\
            \xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o] dentro\
            \ de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o] quando um processo formal de san\xE7\xF5es a funcion\xE1rio for\
            \ iniciado, identificando o indiv\xEDduo sancionado e o motivo da san\xE7\
            \xE3o."
          annotation: "As san\xE7\xF5es organizacionais refletem leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis. Os processos de san\xE7\xF5es s\xE3o descritos em acordos de acesso\
            \ e podem ser inclu\xEDdos como parte das pol\xEDticas gerais de pessoal\
            \ das organiza\xE7\xF5es e/ou especificados em pol\xEDticas de seguran\xE7\
            a e privacidade. As organiza\xE7\xF5es consultam o Office of the General\
            \ Counsel sobre quest\xF5es relativas a san\xE7\xF5es a funcion\xE1rios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ps
      ref_id: PS-9
      name: Position Descriptions
      description: Incorporate security and privacy roles and responsibilities into
        organizational position descriptions.
      annotation: Specification of security and privacy roles in individual organizational
        position descriptions facilitates clarity in understanding the security or
        privacy responsibilities associated with the roles and the role-based security
        and privacy training requirements for the roles.
      translations:
        pt:
          name: "Descri\xE7\xF5es de Cargo"
          description: "Incorporar fun\xE7\xF5es e responsabilidades de seguran\xE7\
            a e privacidade nas descri\xE7\xF5es de cargo organizacionais."
          annotation: "A especifica\xE7\xE3o de fun\xE7\xF5es de seguran\xE7a e privacidade\
            \ nas descri\xE7\xF5es de cargos organizacionais individuais facilita\
            \ a clareza na compreens\xE3o das responsabilidades de seguran\xE7a ou\
            \ privacidade associadas \xE0s fun\xE7\xF5es e dos requisitos de treinamento\
            \ de seguran\xE7a e privacidade baseados em fun\xE7\xF5es para as fun\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      assessable: false
      depth: 1
      ref_id: PT
      name: Personally Identifiable Information Processing and Transparency
      translations:
        pt:
          name: "Processamento e Transpar\xEAncia de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] personally identifiable information processing and transparency
        policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the personally identifiable
        information processing and transparency policy and the associated personally
        identifiable information processing and transparency controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the personally identifiable
        information processing and transparency policy and procedures; and

        c. Review and update the current personally identifiable information processing
        and transparency:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Personally identifiable information processing and transparency
        policy and procedures address the controls in the PT family that are implemented
        within systems and organizations. The risk management strategy is an important
        factor in establishing such policies and procedures. Policies and procedures
        contribute to security and privacy assurance. Therefore, it is important that
        security and privacy programs collaborate on the development of personally
        identifiable information processing and transparency policy and procedures.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to personally
        identifiable information processing and transparency policy and procedures
        include assessment or audit findings, breaches, or changes in applicable laws,
        executive orders, directives, regulations, policies, standards, and guidelines.
        Simply restating controls does not constitute an organizational policy or
        procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de processamento e transpar\xEAncia de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal de [Sele\xE7\xE3o (um ou mais): n\xEDvel organizacional;\
            \ n\xEDvel de processo de miss\xE3o/neg\xF3cio; n\xEDvel de sistema] que:\n\
            (a) Aborde prop\xF3sito, escopo, fun\xE7\xF5es, responsabilidades, comprometimento\
            \ da dire\xE7\xE3o, coordena\xE7\xE3o entre entidades organizacionais\
            \ e conformidade; e\n(b) Seja consistente com leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3o da pol\xED\
            tica de processamento e transpar\xEAncia de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal e dos controles de processamento e transpar\xEAncia de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal associados;\nb. Designar um(a) [Atribui\xE7\
            \xE3o: respons\xE1vel definido pela organiza\xE7\xE3o] para gerenciar\
            \ o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\xE3o da pol\xED\
            tica e dos procedimentos de processamento e transpar\xEAncia de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal; e\nc. Revisar e atualizar o atual\
            \ processamento e transpar\xEAncia de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal:\n1. Pol\xEDtica [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos\
            \ pela organiza\xE7\xE3o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de processamento e transpar\xEA\
            ncia de informa\xE7\xF5es de identifica\xE7\xE3o pessoal abordam os controles\
            \ da fam\xEDlia PT que s\xE3o implementados dentro de sistemas e organiza\xE7\
            \xF5es. A estrat\xE9gia de gest\xE3o de riscos \xE9 um fator importante\
            \ no estabelecimento de tais pol\xEDticas e procedimentos. Pol\xEDticas\
            \ e procedimentos contribuem para a garantia de seguran\xE7a e privacidade.\
            \ Portanto, \xE9 importante que os programas de seguran\xE7a e privacidade\
            \ colaborem no desenvolvimento da pol\xEDtica e dos procedimentos de processamento\
            \ e transpar\xEAncia de informa\xE7\xF5es de identifica\xE7\xE3o pessoal.\
            \ Pol\xEDticas e procedimentos de programas de seguran\xE7a e privacidade\
            \ no n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral, e podem\
            \ dispensar a necessidade de pol\xEDticas e procedimentos espec\xEDficos\
            \ de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o ou neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Procedimentos descrevem como as pol\xEDticas ou controles\
            \ s\xE3o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0\
            \ fun\xE7\xE3o que \xE9 objeto do procedimento. Procedimentos podem ser\
            \ documentados em planos de seguran\xE7a e privacidade do sistema ou em\
            \ um ou mais documentos separados. Eventos que podem precipitar uma atualiza\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de processamento e transpar\xEA\
            ncia de informa\xE7\xF5es de identifica\xE7\xE3o pessoal incluem constata\xE7\
            \xF5es de avalia\xE7\xE3o ou auditoria, viola\xE7\xF5es, ou mudan\xE7\
            as em leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis. Simplesmente reafirmar controles\
            \ n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-2
      name: Authority to Process Personally Identifiable Information
      description: 'a. Determine and document the [Assignment: organization-defined
        authority] that permits the [Assignment: organization-defined processing]
        of personally identifiable information; and

        b. Restrict the [Assignment: organization-defined processing] of personally
        identifiable information to only that which is authorized.'
      annotation: "The processing of personally identifiable information is an operation\
        \ or set of operations that the information system or organization performs\
        \ with respect to personally identifiable information across the information\
        \ life cycle. Processing includes but is not limited to creation, collection,\
        \ use, processing, storage, maintenance, dissemination, disclosure, and disposal.\
        \ Processing operations also include logging, generation, and transformation,\
        \ as well as analysis techniques, such as data mining. \nOrganizations may\
        \ be subject to laws, executive orders, directives, regulations, or policies\
        \ that establish the organization\u2019s authority and thereby limit certain\
        \ types of processing of personally identifiable information or establish\
        \ other requirements related to the processing. Organizational personnel consult\
        \ with the senior agency official for privacy and legal counsel regarding\
        \ such authority, particularly if the organization is subject to multiple\
        \ jurisdictions or sources of authority. For organizations whose processing\
        \ is not determined according to legal authorities, the organization\u2019\
        s policies and determinations govern how they process personally identifiable\
        \ information. While processing of personally identifiable information may\
        \ be legally permissible, privacy risks may still arise. Privacy risk assessments\
        \ can identify the privacy risks associated with the authorized processing\
        \ of personally identifiable information and support solutions to manage such\
        \ risks. \nOrganizations consider applicable requirements and organizational\
        \ policies to determine how to document this authority. For federal agencies,\
        \ the authority to process personally identifiable information is documented\
        \ in privacy policies and notices, system of records notices, privacy impact\
        \ assessments, PRIVACT statements, computer matching agreements and notices,\
        \ contracts, information sharing agreements, memoranda of understanding, and\
        \ other documentation.\nOrganizations take steps to ensure that personally\
        \ identifiable information is only processed for authorized purposes, including\
        \ training organizational personnel on the authorized processing of personally\
        \ identifiable information and monitoring and auditing organizational use\
        \ of personally identifiable information."
      translations:
        pt:
          name: "Autoridade para Processar Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal"
          description: "a. Determinar e documentar a [Atribui\xE7\xE3o: autoridade\
            \ definida pela organiza\xE7\xE3o] que permite o [Atribui\xE7\xE3o: processamento\
            \ definido pela organiza\xE7\xE3o] de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal; e\nb. Restringir o [Atribui\xE7\xE3o: processamento definido\
            \ pela organiza\xE7\xE3o] de informa\xE7\xF5es de identifica\xE7\xE3o\
            \ pessoal somente \xE0quilo que \xE9 autorizado."
          annotation: "O processamento de informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal \xE9 uma opera\xE7\xE3o ou um conjunto de opera\xE7\xF5es que\
            \ o sistema de informa\xE7\xE3o ou a organiza\xE7\xE3o realiza com rela\xE7\
            \xE3o \xE0s informa\xE7\xF5es de identifica\xE7\xE3o pessoal ao longo\
            \ do ciclo de vida da informa\xE7\xE3o. O processamento inclui, mas n\xE3\
            o se limita a, cria\xE7\xE3o, coleta, uso, processamento, armazenamento,\
            \ manuten\xE7\xE3o, dissemina\xE7\xE3o, divulga\xE7\xE3o e descarte. As\
            \ opera\xE7\xF5es de processamento tamb\xE9m incluem registro em log,\
            \ gera\xE7\xE3o e transforma\xE7\xE3o, bem como t\xE9cnicas de an\xE1\
            lise, como minera\xE7\xE3o de dados. \nAs organiza\xE7\xF5es podem estar\
            \ sujeitas a leis, ordens executivas, diretivas, regulamentos ou pol\xED\
            ticas que estabelecem a autoridade da organiza\xE7\xE3o e, portanto, limitam\
            \ certos tipos de processamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ou estabelecem outros requisitos relacionados ao processamento.\
            \ O pessoal organizacional consulta o respons\xE1vel s\xEAnior da ag\xEA\
            ncia pela privacidade e a assessoria jur\xEDdica a respeito de tal autoridade,\
            \ particularmente se a organiza\xE7\xE3o estiver sujeita a m\xFAltiplas\
            \ jurisdi\xE7\xF5es ou fontes de autoridade. Para organiza\xE7\xF5es cujo\
            \ processamento n\xE3o \xE9 determinado de acordo com autoridades legais,\
            \ as pol\xEDticas e determina\xE7\xF5es da organiza\xE7\xE3o governam\
            \ como elas processam informa\xE7\xF5es de identifica\xE7\xE3o pessoal.\
            \ Embora o processamento de informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ possa ser juridicamente permiss\xEDvel, riscos \xE0 privacidade ainda\
            \ podem surgir. Avalia\xE7\xF5es de risco \xE0 privacidade podem identificar\
            \ os riscos \xE0 privacidade associados ao processamento autorizado de\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal e apoiar solu\xE7\xF5\
            es para gerenciar tais riscos. \nAs organiza\xE7\xF5es consideram os requisitos\
            \ aplic\xE1veis e as pol\xEDticas organizacionais para determinar como\
            \ documentar essa autoridade. Para ag\xEAncias federais, a autoridade\
            \ para processar informa\xE7\xF5es de identifica\xE7\xE3o pessoal \xE9\
            \ documentada em pol\xEDticas e avisos de privacidade, avisos de sistema\
            \ de registros, avalia\xE7\xF5es de impacto \xE0 privacidade, declara\xE7\
            \xF5es da PRIVACT, acordos e avisos de cruzamento computadorizado de dados,\
            \ contratos, acordos de compartilhamento de informa\xE7\xF5es, memorandos\
            \ de entendimento e outra documenta\xE7\xE3o.\nAs organiza\xE7\xF5es tomam\
            \ medidas para assegurar que as informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal sejam processadas somente para fins autorizados, incluindo o\
            \ treinamento do pessoal organizacional sobre o processamento autorizado\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal e o monitoramento\
            \ e a auditoria do uso organizacional de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-2(1)
      name: Authority to Process Personally Identifiable Information | Data Tagging
      description: 'Attach data tags containing [Assignment: organization-defined
        authorized processing] to [Assignment: organization-defined elements of personally
        identifiable information].'
      annotation: Data tags support the tracking and enforcement of authorized processing
        by conveying the types of processing that are authorized along with the relevant
        elements of personally identifiable information throughout the system. Data
        tags may also support the use of automated tools.
      translations:
        pt:
          name: "Autoridade para Tratar Informa\xE7\xF5es de Identifica\xE7\xE3o Pessoal\
            \ | Marca\xE7\xE3o de Dados"
          description: "Anexar marca\xE7\xF5es de dados contendo [Atribui\xE7\xE3\
            o: tratamento autorizado definido pela organiza\xE7\xE3o] a [Atribui\xE7\
            \xE3o: elementos de informa\xE7\xF5es de identifica\xE7\xE3o pessoal definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "As marca\xE7\xF5es de dados apoiam o rastreamento e a aplica\xE7\
            \xE3o do tratamento autorizado ao transmitir os tipos de tratamento que\
            \ s\xE3o autorizados juntamente com os elementos relevantes das informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal por todo o sistema. As marca\xE7\
            \xF5es de dados tamb\xE9m podem apoiar o uso de ferramentas automatizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-2(2)
      name: Authority to Process Personally Identifiable Information | Automation
      description: 'Manage enforcement of the authorized processing of personally
        identifiable information using [Assignment: organization-defined automated
        mechanisms].'
      annotation: Automated mechanisms augment verification that only authorized processing
        is occurring.
      translations:
        pt:
          name: "Autoridade para Tratar Informa\xE7\xF5es de Identifica\xE7\xE3o Pessoal\
            \ | Automa\xE7\xE3o"
          description: "Gerenciar a aplica\xE7\xE3o do tratamento autorizado de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal usando [Atribui\xE7\xE3o: mecanismos\
            \ automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados refor\xE7am a verifica\xE7\xE3\
            o de que apenas o tratamento autorizado est\xE1 ocorrendo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-3
      name: Personally Identifiable Information Processing Purposes
      description: "a. Identify and document the [Assignment: organization-defined\
        \ purpose(s)] for processing personally identifiable information;\nb. Describe\
        \ the purpose(s) in the public privacy notices and policies of the organization;\
        \ \nc. Restrict the [Assignment: organization-defined processing] of personally\
        \ identifiable information to only that which is compatible with the identified\
        \ purpose(s); and \nd. Monitor changes in processing personally identifiable\
        \ information and implement [Assignment: organization-defined mechanisms]\
        \ to ensure that any changes are made in accordance with [Assignment: organization-defined\
        \ requirements]."
      annotation: "Identifying and documenting the purpose for processing provides\
        \ organizations with a basis for understanding why personally identifiable\
        \ information may be processed. The term process includes every step of the\
        \ information life cycle, including creation, collection, use, processing,\
        \ storage, maintenance, dissemination, disclosure, and disposal. Identifying\
        \ and documenting the purpose of processing is a prerequisite to enabling\
        \ owners and operators of the system and individuals whose information is\
        \ processed by the system to understand how the information will be processed.\
        \ This enables individuals to make informed decisions about their engagement\
        \ with information systems and organizations and to manage their privacy interests.\
        \ Once the specific processing purpose has been identified, the purpose is\
        \ described in the organization\u2019s privacy notices, policies, and any\
        \ related privacy compliance documentation, including privacy impact assessments,\
        \ system of records notices, PRIVACT statements, computer matching notices,\
        \ and other applicable Federal Register notices.\nOrganizations take steps\
        \ to help ensure that personally identifiable information is processed only\
        \ for identified purposes, including training organizational personnel and\
        \ monitoring and auditing organizational processing of personally identifiable\
        \ information.\nOrganizations monitor for changes in personally identifiable\
        \ information processing. Organizational personnel consult with the senior\
        \ agency official for privacy and legal counsel to ensure that any new purposes\
        \ that arise from changes in processing are compatible with the purpose for\
        \ which the information was collected, or if the new purpose is not compatible,\
        \ implement mechanisms in accordance with defined requirements to allow for\
        \ the new processing, if appropriate. Mechanisms may include obtaining consent\
        \ from individuals, revising privacy policies, or other measures to manage\
        \ privacy risks that arise from changes in personally identifiable information\
        \ processing purposes."
      translations:
        pt:
          name: "Finalidades do Tratamento de Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal"
          description: "a. Identificar e documentar a(s) [Atribui\xE7\xE3o: finalidade(s)\
            \ definida(s) pela organiza\xE7\xE3o] para o tratamento de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal;\nb. Descrever a(s) finalidade(s)\
            \ nos avisos e pol\xEDticas p\xFAblicos de privacidade da organiza\xE7\
            \xE3o;\nc. Restringir o [Atribui\xE7\xE3o: tratamento definido pela organiza\xE7\
            \xE3o] de informa\xE7\xF5es de identifica\xE7\xE3o pessoal apenas \xE0\
            quele que seja compat\xEDvel com a(s) finalidade(s) identificada(s); e\n\
            d. Monitorar mudan\xE7as no tratamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal e implementar [Atribui\xE7\xE3o: mecanismos definidos pela\
            \ organiza\xE7\xE3o] para garantir que quaisquer mudan\xE7as sejam feitas\
            \ em conformidade com [Atribui\xE7\xE3o: requisitos definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Identificar e documentar a finalidade do tratamento fornece\
            \ \xE0s organiza\xE7\xF5es uma base para entender por que as informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal podem ser tratadas. O termo tratar\
            \ inclui cada etapa do ciclo de vida da informa\xE7\xE3o, incluindo cria\xE7\
            \xE3o, coleta, uso, processamento, armazenamento, manuten\xE7\xE3o, dissemina\xE7\
            \xE3o, divulga\xE7\xE3o e descarte. Identificar e documentar a finalidade\
            \ do tratamento \xE9 um pr\xE9-requisito para permitir que os propriet\xE1\
            rios e operadores do sistema e os indiv\xEDduos cujas informa\xE7\xF5\
            es s\xE3o tratadas pelo sistema entendam como as informa\xE7\xF5es ser\xE3\
            o tratadas. Isso permite que os indiv\xEDduos tomem decis\xF5es informadas\
            \ sobre seu envolvimento com sistemas de informa\xE7\xE3o e organiza\xE7\
            \xF5es e gerenciem seus interesses de privacidade. Uma vez que a finalidade\
            \ espec\xEDfica do tratamento tenha sido identificada, a finalidade \xE9\
            \ descrita nos avisos de privacidade, pol\xEDticas e qualquer documenta\xE7\
            \xE3o relacionada de conformidade com a privacidade da organiza\xE7\xE3\
            o, incluindo avalia\xE7\xF5es de impacto \xE0 privacidade, avisos de sistema\
            \ de registros, declara\xE7\xF5es da PRIVACT, avisos de correspond\xEA\
            ncia computacional (computer matching) e outros avisos aplic\xE1veis do\
            \ Federal Register.\nAs organiza\xE7\xF5es tomam medidas para ajudar a\
            \ garantir que as informa\xE7\xF5es de identifica\xE7\xE3o pessoal sejam\
            \ tratadas apenas para as finalidades identificadas, incluindo o treinamento\
            \ do pessoal organizacional e o monitoramento e a auditoria do tratamento\
            \ organizacional de informa\xE7\xF5es de identifica\xE7\xE3o pessoal.\n\
            As organiza\xE7\xF5es monitoram mudan\xE7as no tratamento de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal. O pessoal organizacional consulta\
            \ o alto funcion\xE1rio da ag\xEAncia respons\xE1vel pela privacidade\
            \ e o assessor jur\xEDdico para garantir que quaisquer novas finalidades\
            \ que surjam de mudan\xE7as no tratamento sejam compat\xEDveis com a finalidade\
            \ para a qual as informa\xE7\xF5es foram coletadas, ou, se a nova finalidade\
            \ n\xE3o for compat\xEDvel, implementam mecanismos em conformidade com\
            \ os requisitos definidos para permitir o novo tratamento, se apropriado.\
            \ Os mecanismos podem incluir a obten\xE7\xE3o de consentimento dos indiv\xED\
            duos, a revis\xE3o das pol\xEDticas de privacidade ou outras medidas para\
            \ gerenciar os riscos de privacidade que surgem de mudan\xE7as nas finalidades\
            \ de tratamento de informa\xE7\xF5es de identifica\xE7\xE3o pessoal."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-3(1)
      name: Personally Identifiable Information Processing Purposes | Data Tagging
      description: 'Attach data tags containing the following purposes to [Assignment:
        organization-defined elements of personally identifiable information]: [Assignment:
        organization-defined processing purposes].'
      annotation: Data tags support the tracking of processing purposes by conveying
        the purposes along with the relevant elements of personally identifiable information
        throughout the system. By conveying the processing purposes in a data tag
        along with the personally identifiable information as the information transits
        a system, a system owner or operator can identify whether a change in processing
        would be compatible with the identified and documented purposes. Data tags
        may also support the use of automated tools.
      translations:
        pt:
          name: "Finalidades do Tratamento de Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal | Marca\xE7\xE3o de Dados"
          description: "Anexar marca\xE7\xF5es de dados contendo as seguintes finalidades\
            \ a [Atribui\xE7\xE3o: elementos de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal definidos pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: finalidades\
            \ de tratamento definidas pela organiza\xE7\xE3o]."
          annotation: "As marca\xE7\xF5es de dados apoiam o rastreamento das finalidades\
            \ de tratamento ao transmitir as finalidades juntamente com os elementos\
            \ relevantes das informa\xE7\xF5es de identifica\xE7\xE3o pessoal por\
            \ todo o sistema. Ao transmitir as finalidades de tratamento em uma marca\xE7\
            \xE3o de dados juntamente com as informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal \xE0 medida que as informa\xE7\xF5es transitam por um sistema,\
            \ um propriet\xE1rio ou operador do sistema pode identificar se uma mudan\xE7\
            a no tratamento seria compat\xEDvel com as finalidades identificadas e\
            \ documentadas. As marca\xE7\xF5es de dados tamb\xE9m podem apoiar o uso\
            \ de ferramentas automatizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-3(2)
      name: Personally Identifiable Information Processing Purposes | Automation
      description: 'Track processing purposes of personally identifiable information
        using [Assignment: organization-defined automated mechanisms].'
      annotation: Automated mechanisms augment tracking of the processing purposes.
      translations:
        pt:
          name: "Finalidades do Tratamento de Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal | Automa\xE7\xE3o"
          description: "Rastrear as finalidades de tratamento de informa\xE7\xF5es\
            \ de identifica\xE7\xE3o pessoal usando [Atribui\xE7\xE3o: mecanismos\
            \ automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados refor\xE7am o rastreamento das\
            \ finalidades de tratamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-4
      name: Consent
      description: "Implement [Assignment: organization-defined tools or mechanisms]\
        \ for individuals to consent to the processing of their personally identifiable\
        \ information prior to its collection that facilitate individuals\u2019 informed\
        \ decision-making."
      annotation: Consent allows individuals to participate in making decisions about
        the processing of their information and transfers some of the risk that arises
        from the processing of personally identifiable information from the organization
        to an individual. Consent may be required by applicable laws, executive orders,
        directives, regulations, policies, standards, or guidelines. Otherwise, when
        selecting consent as a control, organizations consider whether individuals
        can be reasonably expected to understand and accept the privacy risks that
        arise from their authorization. Organizations consider whether other controls
        may more effectively mitigate privacy risk either alone or in conjunction
        with consent. Organizations also consider any demographic or contextual factors
        that may influence the understanding or behavior of individuals with respect
        to the processing carried out by the system or organization. When soliciting
        consent from individuals, organizations consider the appropriate mechanism
        for obtaining consent, including the type of consent (e.g., opt-in, opt-out),
        how to properly authenticate and identity proof individuals and how to obtain
        consent through electronic means. In addition, organizations consider providing
        a mechanism for individuals to revoke consent once it has been provided, as
        appropriate. Finally, organizations consider usability factors to help individuals
        understand the risks being accepted when providing consent, including the
        use of plain language and avoiding technical jargon.
      translations:
        pt:
          name: Consentimento
          description: "Implementar [Atribui\xE7\xE3o: ferramentas ou mecanismos definidos\
            \ pela organiza\xE7\xE3o] para que os indiv\xEDduos consintam com o tratamento\
            \ de suas informa\xE7\xF5es de identifica\xE7\xE3o pessoal antes de sua\
            \ coleta, de modo a facilitar a tomada de decis\xE3o informada dos indiv\xED\
            duos."
          annotation: "O consentimento permite que os indiv\xEDduos participem da\
            \ tomada de decis\xF5es sobre o tratamento de suas informa\xE7\xF5es e\
            \ transfere parte do risco que surge do tratamento de informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal da organiza\xE7\xE3o para o indiv\xED\
            duo. O consentimento pode ser exigido por leis, ordens executivas, diretivas,\
            \ regulamentos, pol\xEDticas, normas ou diretrizes aplic\xE1veis. Caso\
            \ contr\xE1rio, ao selecionar o consentimento como controle, as organiza\xE7\
            \xF5es consideram se \xE9 razo\xE1vel esperar que os indiv\xEDduos entendam\
            \ e aceitem os riscos de privacidade que surgem de sua autoriza\xE7\xE3\
            o. As organiza\xE7\xF5es consideram se outros controles podem mitigar\
            \ o risco de privacidade de forma mais eficaz, isoladamente ou em conjunto\
            \ com o consentimento. As organiza\xE7\xF5es tamb\xE9m consideram quaisquer\
            \ fatores demogr\xE1ficos ou contextuais que possam influenciar a compreens\xE3\
            o ou o comportamento dos indiv\xEDduos em rela\xE7\xE3o ao tratamento\
            \ realizado pelo sistema ou pela organiza\xE7\xE3o. Ao solicitar o consentimento\
            \ dos indiv\xEDduos, as organiza\xE7\xF5es consideram o mecanismo apropriado\
            \ para obter o consentimento, incluindo o tipo de consentimento (por exemplo,\
            \ opt-in, opt-out), como autenticar e comprovar adequadamente a identidade\
            \ dos indiv\xEDduos e como obter o consentimento por meios eletr\xF4nicos.\
            \ Al\xE9m disso, as organiza\xE7\xF5es consideram fornecer um mecanismo\
            \ para que os indiv\xEDduos revoguem o consentimento depois de concedido,\
            \ conforme apropriado. Por fim, as organiza\xE7\xF5es consideram fatores\
            \ de usabilidade para ajudar os indiv\xEDduos a entender os riscos que\
            \ est\xE3o aceitando ao fornecer o consentimento, incluindo o uso de linguagem\
            \ simples e evitando jarg\xE3o t\xE9cnico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-4(1)
      name: Consent | Tailored Consent
      description: 'Provide [Assignment: organization-defined mechanisms] to allow
        individuals to tailor processing permissions to selected elements of personally
        identifiable information.'
      annotation: While some processing may be necessary for the basic functionality
        of the product or service, other processing may not. In these circumstances,
        organizations allow individuals to select how specific personally identifiable
        information elements may be processed. More tailored consent may help reduce
        privacy risk, increase individual satisfaction, and avoid adverse behaviors,
        such as abandonment of the product or service.
      translations:
        pt:
          name: Consentimento | Consentimento Personalizado
          description: "Fornecer [Atribui\xE7\xE3o: mecanismos definidos pela organiza\xE7\
            \xE3o] para permitir que os indiv\xEDduos personalizem as permiss\xF5\
            es de tratamento para elementos selecionados de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal."
          annotation: "Embora algum tratamento possa ser necess\xE1rio para a funcionalidade\
            \ b\xE1sica do produto ou servi\xE7o, outro tratamento pode n\xE3o ser.\
            \ Nessas circunst\xE2ncias, as organiza\xE7\xF5es permitem que os indiv\xED\
            duos selecionem como elementos espec\xEDficos de informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal podem ser tratados. Um consentimento mais\
            \ personalizado pode ajudar a reduzir o risco de privacidade, aumentar\
            \ a satisfa\xE7\xE3o individual e evitar comportamentos adversos, como\
            \ o abandono do produto ou servi\xE7o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-4(2)
      name: Consent | Just-in-time Consent
      description: 'Present [Assignment: organization-defined consent mechanisms]
        to individuals at [Assignment: organization-defined frequency] and in conjunction
        with [Assignment: organization-defined personally identifiable information
        processing].'
      annotation: "Just-in-time consent enables individuals to participate in how\
        \ their personally identifiable information is being processed at the time\
        \ or in conjunction with specific types of data processing when such participation\
        \ may be most useful to the individual. Individual assumptions about how personally\
        \ identifiable information is being processed might not be accurate or reliable\
        \ if time has passed since the individual last gave consent or the type of\
        \ processing creates significant privacy risk. Organizations use discretion\
        \ to determine when to use just-in-time consent and may use supporting information\
        \ on demographics, focus groups, or surveys to learn more about individuals\u2019\
        \ privacy interests and concerns."
      translations:
        pt:
          name: Consentimento | Consentimento no Momento Oportuno (Just-in-time)
          description: "Apresentar [Atribui\xE7\xE3o: mecanismos de consentimento\
            \ definidos pela organiza\xE7\xE3o] aos indiv\xEDduos com [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e em conjunto com\
            \ [Atribui\xE7\xE3o: tratamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal definido pela organiza\xE7\xE3o]."
          annotation: "O consentimento no momento oportuno (just-in-time) permite\
            \ que os indiv\xEDduos participem de como suas informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal est\xE3o sendo tratadas no momento ou em conjunto com tipos\
            \ espec\xEDficos de tratamento de dados, quando tal participa\xE7\xE3\
            o puder ser mais \xFAtil ao indiv\xEDduo. As suposi\xE7\xF5es do indiv\xED\
            duo sobre como as informa\xE7\xF5es de identifica\xE7\xE3o pessoal est\xE3\
            o sendo tratadas podem n\xE3o ser precisas ou confi\xE1veis se houver\
            \ passado tempo desde a \xFAltima vez que o indiv\xEDduo deu o consentimento\
            \ ou se o tipo de tratamento criar risco de privacidade significativo.\
            \ As organiza\xE7\xF5es usam discernimento para determinar quando usar\
            \ o consentimento no momento oportuno e podem usar informa\xE7\xF5es de\
            \ apoio sobre dados demogr\xE1ficos, grupos focais ou pesquisas para aprender\
            \ mais sobre os interesses e preocupa\xE7\xF5es de privacidade dos indiv\xED\
            duos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-4(3)
      name: Consent | Revocation
      description: 'Implement [Assignment: organization-defined tools or mechanisms]
        for individuals to revoke consent to the processing of their personally identifiable
        information.'
      annotation: Revocation of consent enables individuals to exercise control over
        their initial consent decision when circumstances change. Organizations consider
        usability factors in enabling easy-to-use revocation capabilities.
      translations:
        pt:
          name: "Consentimento | Revoga\xE7\xE3o"
          description: "Implementar [Atribui\xE7\xE3o: ferramentas ou mecanismos definidos\
            \ pela organiza\xE7\xE3o] para que os indiv\xEDduos revoguem o consentimento\
            \ com o tratamento de suas informa\xE7\xF5es de identifica\xE7\xE3o pessoal."
          annotation: "A revoga\xE7\xE3o do consentimento permite que os indiv\xED\
            duos exer\xE7am controle sobre sua decis\xE3o inicial de consentimento\
            \ quando as circunst\xE2ncias mudam. As organiza\xE7\xF5es consideram\
            \ fatores de usabilidade ao habilitar capacidades de revoga\xE7\xE3o f\xE1\
            ceis de usar."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-5
      name: Privacy Notice
      description: 'Provide notice to individuals about the processing of personally
        identifiable information that:

        a. Is available to individuals upon first interacting with an organization,
        and subsequently at [Assignment: organization-defined frequency];

        b. Is clear and easy-to-understand, expressing information about personally
        identifiable information processing in plain language;

        c. Identifies the authority that authorizes the processing of personally identifiable
        information;

        d. Identifies the purposes for which personally identifiable information is
        to be processed; and

        e. Includes [Assignment: organization-defined information].'
      annotation: 'Privacy notices help inform individuals about how their personally
        identifiable information is being processed by the system or organization.
        Organizations use privacy notices to inform individuals about how, under what
        authority, and for what purpose their personally identifiable information
        is processed, as well as other information such as choices individuals might
        have with respect to that processing and other parties with whom information
        is shared. Laws, executive orders, directives, regulations, or policies may
        require that privacy notices include specific elements or be provided in specific
        formats. Federal agency personnel consult with the senior agency official
        for privacy and legal counsel regarding when and where to provide privacy
        notices, as well as elements to include in privacy notices and required formats.
        In circumstances where laws or government-wide policies do not require privacy
        notices, organizational policies and determinations may require privacy notices
        and may serve as a source of the elements to include in privacy notices.

        Privacy risk assessments identify the privacy risks associated with the processing
        of personally identifiable information and may help organizations determine
        appropriate elements to include in a privacy notice to manage such risks.
        To help individuals understand how their information is being processed, organizations
        write materials in plain language and avoid technical jargon.'
      translations:
        pt:
          name: Aviso de Privacidade
          description: "Fornecer aviso aos indiv\xEDduos sobre o tratamento de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal que:\na. Esteja dispon\xEDvel aos\
            \ indiv\xEDduos na primeira intera\xE7\xE3o com uma organiza\xE7\xE3o\
            \ e, posteriormente, com [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o];\nb. Seja claro e f\xE1cil de entender, expressando\
            \ informa\xE7\xF5es sobre o tratamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal em linguagem simples;\nc. Identifique a autoridade que autoriza\
            \ o tratamento de informa\xE7\xF5es de identifica\xE7\xE3o pessoal;\n\
            d. Identifique as finalidades para as quais as informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ser\xE3o tratadas; e\ne. Inclua [Atribui\xE7\xE3o: informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "Os avisos de privacidade ajudam a informar os indiv\xEDduos\
            \ sobre como suas informa\xE7\xF5es de identifica\xE7\xE3o pessoal est\xE3\
            o sendo tratadas pelo sistema ou pela organiza\xE7\xE3o. As organiza\xE7\
            \xF5es usam avisos de privacidade para informar os indiv\xEDduos sobre\
            \ como, sob qual autoridade e para qual finalidade suas informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal s\xE3o tratadas, bem como outras informa\xE7\
            \xF5es, como as escolhas que os indiv\xEDduos podem ter em rela\xE7\xE3\
            o a esse tratamento e outras partes com as quais as informa\xE7\xF5es\
            \ s\xE3o compartilhadas. Leis, ordens executivas, diretivas, regulamentos\
            \ ou pol\xEDticas podem exigir que os avisos de privacidade incluam elementos\
            \ espec\xEDficos ou sejam fornecidos em formatos espec\xEDficos. O pessoal\
            \ das ag\xEAncias federais consulta o alto funcion\xE1rio da ag\xEAncia\
            \ respons\xE1vel pela privacidade e o assessor jur\xEDdico sobre quando\
            \ e onde fornecer avisos de privacidade, bem como sobre os elementos a\
            \ serem inclu\xEDdos nos avisos de privacidade e os formatos exigidos.\
            \ Em circunst\xE2ncias em que leis ou pol\xEDticas de \xE2mbito governamental\
            \ n\xE3o exijam avisos de privacidade, as pol\xEDticas e determina\xE7\
            \xF5es organizacionais podem exigir avisos de privacidade e podem servir\
            \ como fonte dos elementos a serem inclu\xEDdos nos avisos de privacidade.\n\
            As avalia\xE7\xF5es de risco de privacidade identificam os riscos de privacidade\
            \ associados ao tratamento de informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal e podem ajudar as organiza\xE7\xF5es a determinar os elementos\
            \ apropriados a serem inclu\xEDdos em um aviso de privacidade para gerenciar\
            \ tais riscos. Para ajudar os indiv\xEDduos a entender como suas informa\xE7\
            \xF5es est\xE3o sendo tratadas, as organiza\xE7\xF5es redigem os materiais\
            \ em linguagem simples e evitam jarg\xE3o t\xE9cnico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-5(1)
      name: Privacy Notice | Just-in-time Notice
      description: 'Present notice of personally identifiable information processing
        to individuals at a time and location where the individual provides personally
        identifiable information or in conjunction with a data action, or [Assignment:
        organization-defined frequency].'
      annotation: "Just-in-time notices inform individuals of how organizations process\
        \ their personally identifiable information at a time when such notices may\
        \ be most useful to the individuals. Individual assumptions about how personally\
        \ identifiable information will be processed might not be accurate or reliable\
        \ if time has passed since the organization last presented notice or the circumstances\
        \ under which the individual was last provided notice have changed. A just-in-time\
        \ notice can explain data actions that organizations have identified as potentially\
        \ giving rise to greater privacy risk for individuals. Organizations can use\
        \ a just-in-time notice to update or remind individuals about specific data\
        \ actions as they occur or highlight specific changes that occurred since\
        \ last presenting notice. A just-in-time notice can be used in conjunction\
        \ with just-in-time consent to explain what will occur if consent is declined.\
        \ Organizations use discretion to determine when to use a just-in-time notice\
        \ and may use supporting information on user demographics, focus groups, or\
        \ surveys to learn about users\u2019 privacy interests and concerns."
      translations:
        pt:
          name: Aviso de Privacidade | Aviso no Momento Oportuno (Just-in-time)
          description: "Apresentar aviso sobre o tratamento de informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal aos indiv\xEDduos em um momento e local\
            \ em que o indiv\xEDduo fornece informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal ou em conjunto com uma a\xE7\xE3o de dados, ou com [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Os avisos no momento oportuno (just-in-time) informam os indiv\xED\
            duos sobre como as organiza\xE7\xF5es tratam suas informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal em um momento em que tais avisos podem ser\
            \ mais \xFAteis para os indiv\xEDduos. As suposi\xE7\xF5es do indiv\xED\
            duo sobre como as informa\xE7\xF5es de identifica\xE7\xE3o pessoal ser\xE3\
            o tratadas podem n\xE3o ser precisas ou confi\xE1veis se houver passado\
            \ tempo desde a \xFAltima vez que a organiza\xE7\xE3o apresentou o aviso\
            \ ou se as circunst\xE2ncias sob as quais o indiv\xEDduo recebeu o aviso\
            \ pela \xFAltima vez tiverem mudado. Um aviso no momento oportuno pode\
            \ explicar a\xE7\xF5es de dados que as organiza\xE7\xF5es identificaram\
            \ como potencialmente geradoras de maior risco de privacidade para os\
            \ indiv\xEDduos. As organiza\xE7\xF5es podem usar um aviso no momento\
            \ oportuno para atualizar ou lembrar os indiv\xEDduos sobre a\xE7\xF5\
            es de dados espec\xEDficas \xE0 medida que ocorrem ou para destacar mudan\xE7\
            as espec\xEDficas ocorridas desde a \xFAltima apresenta\xE7\xE3o do aviso.\
            \ Um aviso no momento oportuno pode ser usado em conjunto com o consentimento\
            \ no momento oportuno para explicar o que ocorrer\xE1 se o consentimento\
            \ for recusado. As organiza\xE7\xF5es usam discernimento para determinar\
            \ quando usar um aviso no momento oportuno e podem usar informa\xE7\xF5\
            es de apoio sobre dados demogr\xE1ficos dos usu\xE1rios, grupos focais\
            \ ou pesquisas para aprender sobre os interesses e preocupa\xE7\xF5es\
            \ de privacidade dos usu\xE1rios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-5(2)
      name: Privacy Notice | Privacy Act Statements
      description: Include Privacy Act statements on forms that collect information
        that will be maintained in a Privacy Act system of records, or provide Privacy
        Act statements on separate forms that can be retained by individuals.
      annotation: 'If a federal agency asks individuals to supply information that
        will become part of a system of records, the agency is required to provide
        a PRIVACT statement on the form used to collect the information or on a separate
        form that can be retained by the individual. The agency provides a PRIVACT
        statement in such circumstances regardless of whether the information will
        be collected on a paper or electronic form, on a website, on a mobile application,
        over the telephone, or through some other medium. This requirement ensures
        that the individual is provided with sufficient information about the request
        for information to make an informed decision on whether or not to respond.

        PRIVACT statements provide formal notice to individuals of the authority that
        authorizes the solicitation of the information; whether providing the information
        is mandatory or voluntary; the principal purpose(s) for which the information
        is to be used; the published routine uses to which the information is subject;
        the effects on the individual, if any, of not providing all or any part of
        the information requested; and an appropriate citation and link to the relevant
        system of records notice. Federal agency personnel consult with the senior
        agency official for privacy and legal counsel regarding the notice provisions
        of the PRIVACT.'
      translations:
        pt:
          name: "Aviso de Privacidade | Declara\xE7\xF5es da Privacy Act"
          description: "Incluir declara\xE7\xF5es da Privacy Act em formul\xE1rios\
            \ que coletam informa\xE7\xF5es que ser\xE3o mantidas em um sistema de\
            \ registros da Privacy Act, ou fornecer declara\xE7\xF5es da Privacy Act\
            \ em formul\xE1rios separados que possam ser retidos pelos indiv\xEDduos."
          annotation: "Se uma ag\xEAncia federal solicitar que os indiv\xEDduos forne\xE7\
            am informa\xE7\xF5es que se tornar\xE3o parte de um sistema de registros,\
            \ a ag\xEAncia \xE9 obrigada a fornecer uma declara\xE7\xE3o da PRIVACT\
            \ no formul\xE1rio usado para coletar as informa\xE7\xF5es ou em um formul\xE1\
            rio separado que possa ser retido pelo indiv\xEDduo. A ag\xEAncia fornece\
            \ uma declara\xE7\xE3o da PRIVACT nessas circunst\xE2ncias independentemente\
            \ de as informa\xE7\xF5es serem coletadas em um formul\xE1rio em papel\
            \ ou eletr\xF4nico, em um site, em um aplicativo m\xF3vel, por telefone\
            \ ou por algum outro meio. Esse requisito garante que o indiv\xEDduo receba\
            \ informa\xE7\xF5es suficientes sobre a solicita\xE7\xE3o de informa\xE7\
            \xF5es para tomar uma decis\xE3o informada sobre responder ou n\xE3o.\n\
            As declara\xE7\xF5es da PRIVACT fornecem aviso formal aos indiv\xEDduos\
            \ sobre a autoridade que autoriza a solicita\xE7\xE3o das informa\xE7\xF5\
            es; se o fornecimento das informa\xE7\xF5es \xE9 obrigat\xF3rio ou volunt\xE1\
            rio; a(s) principal(is) finalidade(s) para a(s) qual(is) as informa\xE7\
            \xF5es ser\xE3o usadas; os usos rotineiros publicados aos quais as informa\xE7\
            \xF5es est\xE3o sujeitas; os efeitos sobre o indiv\xEDduo, se houver,\
            \ de n\xE3o fornecer todas ou qualquer parte das informa\xE7\xF5es solicitadas;\
            \ e uma cita\xE7\xE3o e link apropriados ao aviso de sistema de registros\
            \ relevante. O pessoal das ag\xEAncias federais consulta o alto funcion\xE1\
            rio da ag\xEAncia respons\xE1vel pela privacidade e o assessor jur\xED\
            dico sobre as disposi\xE7\xF5es de aviso da PRIVACT."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-6
      name: System of Records Notice
      description: 'For systems that process information that will be maintained in
        a Privacy Act system of records:

        a. Draft system of records notices in accordance with OMB guidance and submit
        new and significantly modified system of records notices to the OMB and appropriate
        congressional committees for advance review;

        b. Publish system of records notices in the Federal Register; and

        c. Keep system of records notices accurate, up-to-date, and scoped in accordance
        with policy.'
      annotation: The PRIVACT requires that federal agencies publish a system of records
        notice in the Federal Register upon the establishment and/or modification
        of a PRIVACT system of records. As a general matter, a system of records notice
        is required when an agency maintains a group of any records under the control
        of the agency from which information is retrieved by the name of an individual
        or by some identifying number, symbol, or other identifier. The notice describes
        the existence and character of the system and identifies the system of records,
        the purpose(s) of the system, the authority for maintenance of the records,
        the categories of records maintained in the system, the categories of individuals
        about whom records are maintained, the routine uses to which the records are
        subject, and additional details about the system as described in OMB A-108.
      translations:
        pt:
          name: Aviso de Sistema de Registros
          description: "Para sistemas que tratam informa\xE7\xF5es que ser\xE3o mantidas\
            \ em um sistema de registros da Privacy Act:\na. Redigir avisos de sistema\
            \ de registros em conformidade com as orienta\xE7\xF5es do OMB e submeter\
            \ avisos de sistema de registros novos e significativamente modificados\
            \ ao OMB e aos comit\xEAs congressuais apropriados para revis\xE3o pr\xE9\
            via;\nb. Publicar os avisos de sistema de registros no Federal Register;\
            \ e\nc. Manter os avisos de sistema de registros precisos, atualizados\
            \ e delimitados em conformidade com a pol\xEDtica."
          annotation: "A PRIVACT exige que as ag\xEAncias federais publiquem um aviso\
            \ de sistema de registros no Federal Register no momento do estabelecimento\
            \ e/ou modifica\xE7\xE3o de um sistema de registros da PRIVACT. De modo\
            \ geral, um aviso de sistema de registros \xE9 exigido quando uma ag\xEA\
            ncia mant\xE9m um conjunto de quaisquer registros sob o controle da ag\xEA\
            ncia a partir do qual as informa\xE7\xF5es s\xE3o recuperadas pelo nome\
            \ de um indiv\xEDduo ou por algum n\xFAmero, s\xEDmbolo ou outro identificador.\
            \ O aviso descreve a exist\xEAncia e a natureza do sistema e identifica\
            \ o sistema de registros, a(s) finalidade(s) do sistema, a autoridade\
            \ para a manuten\xE7\xE3o dos registros, as categorias de registros mantidos\
            \ no sistema, as categorias de indiv\xEDduos sobre os quais os registros\
            \ s\xE3o mantidos, os usos rotineiros aos quais os registros est\xE3o\
            \ sujeitos e detalhes adicionais sobre o sistema conforme descrito no\
            \ OMB A-108."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-6(1)
      name: System of Records Notice | Routine Uses
      description: 'Review all routine uses published in the system of records notice
        at [Assignment: organization-defined frequency] to ensure continued accuracy,
        and to ensure that routine uses continue to be compatible with the purpose
        for which the information was collected.'
      annotation: A PRIVACT routine use is a particular kind of disclosure of a record
        outside of the federal agency maintaining the system of records. A routine
        use is an exception to the PRIVACT prohibition on the disclosure of a record
        in a system of records without the prior written consent of the individual
        to whom the record pertains. To qualify as a routine use, the disclosure must
        be for a purpose that is compatible with the purpose for which the information
        was originally collected. The PRIVACT requires agencies to describe each routine
        use of the records maintained in the system of records, including the categories
        of users of the records and the purpose of the use. Agencies may only establish
        routine uses by explicitly publishing them in the relevant system of records
        notice.
      translations:
        pt:
          name: Aviso de Sistema de Registros | Usos Rotineiros
          description: "Revisar todos os usos rotineiros publicados no aviso de sistema\
            \ de registros com [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] para garantir a precis\xE3o cont\xEDnua e para garantir que os\
            \ usos rotineiros continuem sendo compat\xEDveis com a finalidade para\
            \ a qual as informa\xE7\xF5es foram coletadas."
          annotation: "Um uso rotineiro da PRIVACT \xE9 um tipo espec\xEDfico de divulga\xE7\
            \xE3o de um registro fora da ag\xEAncia federal que mant\xE9m o sistema\
            \ de registros. Um uso rotineiro \xE9 uma exce\xE7\xE3o \xE0 proibi\xE7\
            \xE3o da PRIVACT sobre a divulga\xE7\xE3o de um registro em um sistema\
            \ de registros sem o consentimento pr\xE9vio por escrito do indiv\xED\
            duo a quem o registro se refere. Para qualificar-se como uso rotineiro,\
            \ a divulga\xE7\xE3o deve ser para uma finalidade compat\xEDvel com a\
            \ finalidade para a qual as informa\xE7\xF5es foram originalmente coletadas.\
            \ A PRIVACT exige que as ag\xEAncias descrevam cada uso rotineiro dos\
            \ registros mantidos no sistema de registros, incluindo as categorias\
            \ de usu\xE1rios dos registros e a finalidade do uso. As ag\xEAncias s\xF3\
            \ podem estabelecer usos rotineiros publicando-os explicitamente no aviso\
            \ de sistema de registros relevante."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-6(2)
      name: System of Records Notice | Exemption Rules
      description: 'Review all Privacy Act exemptions claimed for the system of records
        at [Assignment: organization-defined frequency] to ensure they remain appropriate
        and necessary in accordance with law, that they have been promulgated as regulations,
        and that they are accurately described in the system of records notice.'
      annotation: "The PRIVACT includes two sets of provisions that allow federal\
        \ agencies to claim exemptions from certain requirements in the statute. In\
        \ certain circumstances, these provisions allow agencies to promulgate regulations\
        \ to exempt a system of records from select provisions of the PRIVACT. At\
        \ a minimum, organizations\u2019 PRIVACT exemption regulations include the\
        \ specific name(s) of any system(s) of records that will be exempt, the specific\
        \ provisions of the PRIVACT from which the system(s) of records is to be exempted,\
        \ the reasons for the exemption, and an explanation for why the exemption\
        \ is both necessary and appropriate."
      translations:
        pt:
          name: "Aviso de Sistema de Registros | Regras de Isen\xE7\xE3o"
          description: "Revisar todas as isen\xE7\xF5es da Privacy Act reivindicadas\
            \ para o sistema de registros com [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] para garantir que permane\xE7am apropriadas\
            \ e necess\xE1rias em conformidade com a lei, que tenham sido promulgadas\
            \ como regulamentos e que sejam descritas com precis\xE3o no aviso de\
            \ sistema de registros."
          annotation: "A PRIVACT inclui dois conjuntos de disposi\xE7\xF5es que permitem\
            \ \xE0s ag\xEAncias federais reivindicar isen\xE7\xF5es de certos requisitos\
            \ do estatuto. Em certas circunst\xE2ncias, essas disposi\xE7\xF5es permitem\
            \ que as ag\xEAncias promulguem regulamentos para isentar um sistema de\
            \ registros de determinadas disposi\xE7\xF5es da PRIVACT. No m\xEDnimo,\
            \ os regulamentos de isen\xE7\xE3o da PRIVACT das organiza\xE7\xF5es incluem\
            \ o(s) nome(s) espec\xEDfico(s) de qualquer(quaisquer) sistema(s) de registros\
            \ que estar\xE1(\xE3o) isento(s), as disposi\xE7\xF5es espec\xEDficas\
            \ da PRIVACT das quais o(s) sistema(s) de registros deve(m) ser isento(s),\
            \ as raz\xF5es para a isen\xE7\xE3o e uma explica\xE7\xE3o de por que\
            \ a isen\xE7\xE3o \xE9 tanto necess\xE1ria quanto apropriada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-7
      name: Specific Categories of Personally Identifiable Information
      description: 'Apply [Assignment: organization-defined processing conditions]
        for specific categories of personally identifiable information.'
      annotation: Organizations apply any conditions or protections that may be necessary
        for specific categories of personally identifiable information. These conditions
        may be required by laws, executive orders, directives, regulations, policies,
        standards, or guidelines. The requirements may also come from the results
        of privacy risk assessments that factor in contextual changes that may result
        in an organizational determination that a particular category of personally
        identifiable information is particularly sensitive or raises particular privacy
        risks. Organizations consult with the senior agency official for privacy and
        legal counsel regarding any protections that may be necessary.
      translations:
        pt:
          name: "Categorias Espec\xEDficas de Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal"
          description: "Aplicar [Atribui\xE7\xE3o: condi\xE7\xF5es de tratamento definidas\
            \ pela organiza\xE7\xE3o] para categorias espec\xEDficas de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal."
          annotation: "As organiza\xE7\xF5es aplicam quaisquer condi\xE7\xF5es ou\
            \ prote\xE7\xF5es que possam ser necess\xE1rias para categorias espec\xED\
            ficas de informa\xE7\xF5es de identifica\xE7\xE3o pessoal. Essas condi\xE7\
            \xF5es podem ser exigidas por leis, ordens executivas, diretivas, regulamentos,\
            \ pol\xEDticas, normas ou diretrizes. Os requisitos tamb\xE9m podem decorrer\
            \ dos resultados de avalia\xE7\xF5es de risco de privacidade que levam\
            \ em conta mudan\xE7as contextuais que possam resultar em uma determina\xE7\
            \xE3o organizacional de que uma categoria espec\xEDfica de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal \xE9 particularmente sens\xEDvel\
            \ ou suscita riscos de privacidade espec\xEDficos. As organiza\xE7\xF5\
            es consultam o alto funcion\xE1rio da ag\xEAncia respons\xE1vel pela privacidade\
            \ e o assessor jur\xEDdico sobre quaisquer prote\xE7\xF5es que possam\
            \ ser necess\xE1rias."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-7(1)
      name: Specific Categories of Personally Identifiable Information | Social Security
        Numbers
      description: "When a system processes Social Security numbers:\n(a) Eliminate\
        \ unnecessary collection, maintenance, and use of Social Security numbers,\
        \ and explore alternatives to their use as a personal identifier;\n(b) Do\
        \ not deny any individual any right, benefit, or privilege provided by law\
        \ because of such individual\u2019s refusal to disclose his or her Social\
        \ Security number; and\n(c) Inform any individual who is asked to disclose\
        \ his or her Social Security number whether that disclosure is mandatory or\
        \ voluntary, by what statutory or other authority such number is solicited,\
        \ and what uses will be made of it."
      annotation: "Federal law and policy establish specific requirements for organizations\u2019\
        \ processing of Social Security numbers. Organizations take steps to eliminate\
        \ unnecessary uses of Social Security numbers and other sensitive information\
        \ and observe any particular requirements that apply."
      translations:
        pt:
          name: "Categorias Espec\xEDficas de Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal | N\xFAmeros de Seguro Social"
          description: "Quando um sistema trata n\xFAmeros de Seguro Social:\n(a)\
            \ Eliminar a coleta, manuten\xE7\xE3o e uso desnecess\xE1rios de n\xFA\
            meros de Seguro Social e explorar alternativas ao seu uso como identificador\
            \ pessoal;\n(b) N\xE3o negar a qualquer indiv\xEDduo qualquer direito,\
            \ benef\xEDcio ou privil\xE9gio previsto em lei por causa da recusa de\
            \ tal indiv\xEDduo em divulgar seu n\xFAmero de Seguro Social; e\n(c)\
            \ Informar a qualquer indiv\xEDduo a quem se solicite a divulga\xE7\xE3\
            o de seu n\xFAmero de Seguro Social se essa divulga\xE7\xE3o \xE9 obrigat\xF3\
            ria ou volunt\xE1ria, por qual autoridade estatut\xE1ria ou outra tal\
            \ n\xFAmero \xE9 solicitado e quais usos ser\xE3o feitos dele."
          annotation: "A legisla\xE7\xE3o e a pol\xEDtica federais estabelecem requisitos\
            \ espec\xEDficos para o tratamento de n\xFAmeros de Seguro Social pelas\
            \ organiza\xE7\xF5es. As organiza\xE7\xF5es tomam medidas para eliminar\
            \ usos desnecess\xE1rios de n\xFAmeros de Seguro Social e outras informa\xE7\
            \xF5es sens\xEDveis e observam quaisquer requisitos espec\xEDficos aplic\xE1\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-7(2)
      name: Specific Categories of Personally Identifiable Information | First Amendment
        Information
      description: Prohibit the processing of information describing how any individual
        exercises rights guaranteed by the First Amendment unless expressly authorized
        by statute or by the individual or unless pertinent to and within the scope
        of an authorized law enforcement activity.
      annotation: "The PRIVACT limits agencies\u2019 ability to process information\
        \ that describes how individuals exercise rights guaranteed by the First Amendment.\
        \ Organizations consult with the senior agency official for privacy and legal\
        \ counsel regarding these requirements."
      translations:
        pt:
          name: "Categorias Espec\xEDficas de Informa\xE7\xF5es de Identifica\xE7\xE3\
            o Pessoal | Informa\xE7\xF5es da Primeira Emenda"
          description: "Proibir o tratamento de informa\xE7\xF5es que descrevam como\
            \ qualquer indiv\xEDduo exerce direitos garantidos pela Primeira Emenda,\
            \ a menos que expressamente autorizado por estatuto ou pelo indiv\xED\
            duo, ou a menos que pertinente e dentro do escopo de uma atividade autorizada\
            \ de aplica\xE7\xE3o da lei."
          annotation: "A PRIVACT limita a capacidade das ag\xEAncias de tratar informa\xE7\
            \xF5es que descrevam como os indiv\xEDduos exercem direitos garantidos\
            \ pela Primeira Emenda. As organiza\xE7\xF5es consultam o alto funcion\xE1\
            rio da ag\xEAncia respons\xE1vel pela privacidade e o assessor jur\xED\
            dico sobre esses requisitos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pt
      ref_id: PT-8
      name: Computer Matching Requirements
      description: 'When a system or organization processes information for the purpose
        of conducting a matching program:

        a. Obtain approval from the Data Integrity Board to conduct the matching program;

        b. Develop and enter into a computer matching agreement;

        c. Publish a matching notice in the Federal Register;

        d. Independently verify the information produced by the matching program before
        taking adverse action against an individual, if required; and

        e. Provide individuals with notice and an opportunity to contest the findings
        before taking adverse action against an individual.'
      annotation: The PRIVACT establishes requirements for federal and non-federal
        agencies if they engage in a matching program. In general, a matching program
        is a computerized comparison of records from two or more automated PRIVACT
        systems of records or an automated system of records and automated records
        maintained by a non-federal agency (or agent thereof). A matching program
        either pertains to federal benefit programs or federal personnel or payroll
        records. A federal benefit match is performed to determine or verify eligibility
        for payments under federal benefit programs or to recoup payments or delinquent
        debts under federal benefit programs. A matching program involves not just
        the matching activity itself but also the investigative follow-up and ultimate
        action, if any.
      translations:
        pt:
          name: "Requisitos de Correspond\xEAncia Computacional"
          description: "Quando um sistema ou organiza\xE7\xE3o trata informa\xE7\xF5\
            es com a finalidade de conduzir um programa de correspond\xEAncia (matching\
            \ program):\na. Obter aprova\xE7\xE3o do Conselho de Integridade de Dados\
            \ (Data Integrity Board) para conduzir o programa de correspond\xEAncia;\n\
            b. Elaborar e firmar um acordo de correspond\xEAncia computacional (computer\
            \ matching agreement);\nc. Publicar um aviso de correspond\xEAncia no\
            \ Federal Register;\nd. Verificar independentemente as informa\xE7\xF5\
            es produzidas pelo programa de correspond\xEAncia antes de tomar medida\
            \ adversa contra um indiv\xEDduo, se exigido; e\ne. Fornecer aos indiv\xED\
            duos aviso e oportunidade de contestar as conclus\xF5es antes de tomar\
            \ medida adversa contra um indiv\xEDduo."
          annotation: "A PRIVACT estabelece requisitos para ag\xEAncias federais e\
            \ n\xE3o federais caso se envolvam em um programa de correspond\xEAncia.\
            \ Em geral, um programa de correspond\xEAncia \xE9 uma compara\xE7\xE3\
            o computadorizada de registros de dois ou mais sistemas de registros automatizados\
            \ da PRIVACT ou de um sistema de registros automatizado e registros automatizados\
            \ mantidos por uma ag\xEAncia n\xE3o federal (ou seu agente). Um programa\
            \ de correspond\xEAncia refere-se a programas de benef\xEDcios federais\
            \ ou a registros de pessoal ou de folha de pagamento federais. Uma correspond\xEA\
            ncia de benef\xEDcio federal \xE9 realizada para determinar ou verificar\
            \ a elegibilidade a pagamentos sob programas de benef\xEDcios federais\
            \ ou para recuperar pagamentos ou d\xEDvidas em atraso sob programas de\
            \ benef\xEDcios federais. Um programa de correspond\xEAncia envolve n\xE3\
            o apenas a atividade de correspond\xEAncia em si, mas tamb\xE9m o acompanhamento\
            \ investigativo e a a\xE7\xE3o final, se houver."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      assessable: false
      depth: 1
      ref_id: RA
      name: Risk Assessment
      translations:
        pt:
          name: "Avalia\xE7\xE3o de Risco"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] risk assessment policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the risk assessment policy
        and the associated risk assessment controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the risk assessment policy
        and procedures; and

        c. Review and update the current risk assessment:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Risk assessment policy and procedures address the controls in the
        RA family that are implemented within systems and organizations. The risk
        management strategy is an important factor in establishing such policies and
        procedures. Policies and procedures contribute to security and privacy assurance.
        Therefore, it is important that security and privacy programs collaborate
        on the development of risk assessment policy and procedures. Security and
        privacy program policies and procedures at the organization level are preferable,
        in general, and may obviate the need for mission- or system-specific policies
        and procedures. The policy can be included as part of the general security
        and privacy policy or be represented by multiple policies reflecting the complex
        nature of organizations. Procedures can be established for security and privacy
        programs, for mission or business processes, and for systems, if needed. Procedures
        describe how the policies or controls are implemented and can be directed
        at the individual or role that is the object of the procedure. Procedures
        can be documented in system security and privacy plans or in one or more separate
        documents. Events that may precipitate an update to risk assessment policy
        and procedures include assessment or audit findings, security incidents or
        breaches, or changes in laws, executive orders, directives, regulations, policies,
        standards, and guidelines. Simply restating controls does not constitute an
        organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e divulgar a [Atribui\xE7\xE3o:\
            \ pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de avalia\xE7\xE3o de risco em n\xEDvel [Sele\xE7\xE3o (um ou mais):\
            \ organizacional; de processo de miss\xE3o/neg\xF3cio; de sistema] que:\n\
            (a) Aborde prop\xF3sito, escopo, pap\xE9is, responsabilidades, comprometimento\
            \ da dire\xE7\xE3o, coordena\xE7\xE3o entre entidades organizacionais\
            \ e conformidade; e\n(b) Seja consistente com leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3o da pol\xED\
            tica de avalia\xE7\xE3o de risco e dos controles de avalia\xE7\xE3o de\
            \ risco associados;\nb. Designar um [Atribui\xE7\xE3o: respons\xE1vel\
            \ definido pela organiza\xE7\xE3o] para gerenciar o desenvolvimento, a\
            \ documenta\xE7\xE3o e a divulga\xE7\xE3o da pol\xEDtica e dos procedimentos\
            \ de avalia\xE7\xE3o de risco; e\nc. Revisar e atualizar a avalia\xE7\xE3\
            o de risco atual:\n1. Pol\xEDtica [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos\
            \ pela organiza\xE7\xE3o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de avalia\xE7\xE3o de risco\
            \ tratam dos controles da fam\xEDlia RA que s\xE3o implementados dentro\
            \ dos sistemas e organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de risco\
            \ \xE9 um fator importante para estabelecer tais pol\xEDticas e procedimentos.\
            \ Pol\xEDticas e procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Portanto, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem no desenvolvimento da pol\xEDtica e dos procedimentos\
            \ de avalia\xE7\xE3o de risco. Pol\xEDticas e procedimentos dos programas\
            \ de seguran\xE7a e privacidade em n\xEDvel organizacional s\xE3o, em\
            \ geral, prefer\xEDveis e podem tornar desnecess\xE1rias pol\xEDticas\
            \ e procedimentos espec\xEDficos de miss\xE3o ou de sistema. A pol\xED\
            tica pode ser inclu\xEDda como parte da pol\xEDtica geral de seguran\xE7\
            a e privacidade ou ser representada por m\xFAltiplas pol\xEDticas que\
            \ reflitam a natureza complexa das organiza\xE7\xF5es. Procedimentos podem\
            \ ser estabelecidos para programas de seguran\xE7a e privacidade, para\
            \ processos de miss\xE3o ou de neg\xF3cio e para sistemas, se necess\xE1\
            rio. Os procedimentos descrevem como as pol\xEDticas ou os controles s\xE3\
            o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0 fun\xE7\
            \xE3o que \xE9 objeto do procedimento. Os procedimentos podem ser documentados\
            \ em planos de seguran\xE7a e privacidade do sistema ou em um ou mais\
            \ documentos separados. Eventos que podem motivar uma atualiza\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de avalia\xE7\xE3o de risco incluem\
            \ constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\
            \xF5es de seguran\xE7a, ou mudan\xE7as em leis, ordens executivas, diretivas,\
            \ regulamentos, pol\xEDticas, normas e diretrizes. A simples repeti\xE7\
            \xE3o dos controles n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-2
      name: Security Categorization
      description: 'a. Categorize the system and information it processes, stores,
        and transmits;

        b. Document the security categorization results, including supporting rationale,
        in the security plan for the system; and

        c. Verify that the authorizing official or authorizing official designated
        representative reviews and approves the security categorization decision.'
      annotation: 'Security categories describe the potential adverse impacts or negative
        consequences to organizational operations, organizational assets, and individuals
        if organizational information and systems are compromised through a loss of
        confidentiality, integrity, or availability. Security categorization is also
        a type of asset loss characterization in systems security engineering processes
        that is carried out throughout the system development life cycle. Organizations
        can use privacy risk assessments or privacy impact assessments to better understand
        the potential adverse effects on individuals. CNSSI 1253 provides additional
        guidance on categorization for national security systems.

        Organizations conduct the security categorization process as an organization-wide
        activity with the direct involvement of chief information officers, senior
        agency information security officers, senior agency officials for privacy,
        system owners, mission and business owners, and information owners or stewards.
        Organizations consider the potential adverse impacts to other organizations
        and, in accordance with USA PATRIOT and Homeland Security Presidential Directives,
        potential national-level adverse impacts.

        Security categorization processes facilitate the development of inventories
        of information assets and, along with CM-8, mappings to specific system components
        where information is processed, stored, or transmitted. The security categorization
        process is revisited throughout the system development life cycle to ensure
        that the security categories remain accurate and relevant.'
      translations:
        pt:
          name: "Categoriza\xE7\xE3o de Seguran\xE7a"
          description: "a. Categorizar o sistema e as informa\xE7\xF5es que ele processa,\
            \ armazena e transmite;\nb. Documentar os resultados da categoriza\xE7\
            \xE3o de seguran\xE7a, incluindo a justificativa de apoio, no plano de\
            \ seguran\xE7a do sistema; e\nc. Verificar que o respons\xE1vel pela autoriza\xE7\
            \xE3o ou o representante designado pelo respons\xE1vel pela autoriza\xE7\
            \xE3o revisa e aprova a decis\xE3o de categoriza\xE7\xE3o de seguran\xE7\
            a."
          annotation: "As categorias de seguran\xE7a descrevem os potenciais impactos\
            \ adversos ou consequ\xEAncias negativas para as opera\xE7\xF5es organizacionais,\
            \ os ativos organizacionais e os indiv\xEDduos caso as informa\xE7\xF5\
            es e os sistemas organizacionais sejam comprometidos por meio de uma perda\
            \ de confidencialidade, integridade ou disponibilidade. A categoriza\xE7\
            \xE3o de seguran\xE7a tamb\xE9m \xE9 um tipo de caracteriza\xE7\xE3o de\
            \ perda de ativos nos processos de engenharia de seguran\xE7a de sistemas,\
            \ que \xE9 realizada ao longo de todo o ciclo de vida de desenvolvimento\
            \ do sistema. As organiza\xE7\xF5es podem usar avalia\xE7\xF5es de risco\
            \ de privacidade ou avalia\xE7\xF5es de impacto \xE0 privacidade para\
            \ melhor compreender os potenciais efeitos adversos sobre os indiv\xED\
            duos. A CNSSI 1253 fornece orienta\xE7\xF5es adicionais sobre categoriza\xE7\
            \xE3o para sistemas de seguran\xE7a nacional.\nAs organiza\xE7\xF5es conduzem\
            \ o processo de categoriza\xE7\xE3o de seguran\xE7a como uma atividade\
            \ que abrange toda a organiza\xE7\xE3o, com o envolvimento direto de diretores\
            \ de informa\xE7\xE3o (CIOs), oficiais seniores de seguran\xE7a da informa\xE7\
            \xE3o da ag\xEAncia, oficiais seniores de privacidade da ag\xEAncia, propriet\xE1\
            rios de sistemas, propriet\xE1rios de miss\xE3o e de neg\xF3cio, e propriet\xE1\
            rios ou custodiantes da informa\xE7\xE3o. As organiza\xE7\xF5es consideram\
            \ os potenciais impactos adversos sobre outras organiza\xE7\xF5es e, de\
            \ acordo com as Diretivas Presidenciais USA PATRIOT e Homeland Security,\
            \ os potenciais impactos adversos em n\xEDvel nacional.\nOs processos\
            \ de categoriza\xE7\xE3o de seguran\xE7a facilitam o desenvolvimento de\
            \ invent\xE1rios de ativos de informa\xE7\xE3o e, juntamente com o CM-8,\
            \ mapeamentos para componentes espec\xEDficos do sistema onde a informa\xE7\
            \xE3o \xE9 processada, armazenada ou transmitida. O processo de categoriza\xE7\
            \xE3o de seguran\xE7a \xE9 revisitado ao longo de todo o ciclo de vida\
            \ de desenvolvimento do sistema para assegurar que as categorias de seguran\xE7\
            a permane\xE7am precisas e relevantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-2(1)
      name: Security Categorization | Impact-level Prioritization
      description: Conduct an impact-level prioritization of organizational systems
        to obtain additional granularity on system impact levels.
      annotation: 'Organizations apply the high-water mark concept to each system
        categorized in accordance with FIPS 199, resulting in systems designated as
        low impact, moderate impact, or high impact. Organizations that desire additional
        granularity in the system impact designations for risk-based decision-making,
        can further partition the systems into sub-categories of the initial system
        categorization. For example, an impact-level prioritization on a moderate-impact
        system can produce three new sub-categories: low-moderate systems, moderate-moderate
        systems, and high-moderate systems. Impact-level prioritization and the resulting
        sub-categories of the system give organizations an opportunity to focus their
        investments related to security control selection and the tailoring of control
        baselines in responding to identified risks. Impact-level prioritization can
        also be used to determine those systems that may be of heightened interest
        or value to adversaries or represent a critical loss to the federal enterprise,
        sometimes described as high value assets. For such high value assets, organizations
        may be more focused on complexity, aggregation, and information exchanges.
        Systems with high value assets can be prioritized by partitioning high-impact
        systems into low-high systems, moderate-high systems, and high-high systems.
        Alternatively, organizations can apply the guidance in CNSSI 1253 for security
        objective-related categorization.'
      translations:
        pt:
          name: "Categoriza\xE7\xE3o de Seguran\xE7a | Prioriza\xE7\xE3o por N\xED\
            vel de Impacto"
          description: "Conduzir uma prioriza\xE7\xE3o por n\xEDvel de impacto dos\
            \ sistemas organizacionais para obter granularidade adicional sobre os\
            \ n\xEDveis de impacto dos sistemas."
          annotation: "As organiza\xE7\xF5es aplicam o conceito de marca d'\xE1gua\
            \ m\xE1xima (high-water mark) a cada sistema categorizado de acordo com\
            \ o FIPS 199, resultando em sistemas designados como de baixo impacto,\
            \ impacto moderado ou alto impacto. As organiza\xE7\xF5es que desejam\
            \ granularidade adicional nas designa\xE7\xF5es de impacto do sistema\
            \ para a tomada de decis\xE3o baseada em risco podem particionar ainda\
            \ mais os sistemas em subcategorias da categoriza\xE7\xE3o inicial do\
            \ sistema. Por exemplo, uma prioriza\xE7\xE3o por n\xEDvel de impacto\
            \ em um sistema de impacto moderado pode produzir tr\xEAs novas subcategorias:\
            \ sistemas baixo-moderado, sistemas moderado-moderado e sistemas alto-moderado.\
            \ A prioriza\xE7\xE3o por n\xEDvel de impacto e as subcategorias resultantes\
            \ do sistema d\xE3o \xE0s organiza\xE7\xF5es a oportunidade de concentrar\
            \ seus investimentos relacionados \xE0 sele\xE7\xE3o de controles de seguran\xE7\
            a e \xE0 adequa\xE7\xE3o das linhas de base de controles em resposta aos\
            \ riscos identificados. A prioriza\xE7\xE3o por n\xEDvel de impacto tamb\xE9\
            m pode ser usada para determinar quais sistemas podem ser de maior interesse\
            \ ou valor para os advers\xE1rios ou representar uma perda cr\xEDtica\
            \ para a organiza\xE7\xE3o federal, \xE0s vezes descritos como ativos\
            \ de alto valor. Para esses ativos de alto valor, as organiza\xE7\xF5\
            es podem se concentrar mais em complexidade, agrega\xE7\xE3o e trocas\
            \ de informa\xE7\xE3o. Os sistemas com ativos de alto valor podem ser\
            \ priorizados particionando os sistemas de alto impacto em sistemas baixo-alto,\
            \ sistemas moderado-alto e sistemas alto-alto. Alternativamente, as organiza\xE7\
            \xF5es podem aplicar as orienta\xE7\xF5es da CNSSI 1253 para a categoriza\xE7\
            \xE3o relacionada a objetivos de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-3
      name: Risk Assessment
      description: 'a. Conduct a risk assessment, including:

        1. Identifying threats to and vulnerabilities in the system;

        2. Determining the likelihood and magnitude of harm from unauthorized access,
        use, disclosure, disruption, modification, or destruction of the system, the
        information it processes, stores, or transmits, and any related information;
        and

        3. Determining the likelihood and impact of adverse effects on individuals
        arising from the processing of personally identifiable information;

        b. Integrate risk assessment results and risk management decisions from the
        organization and mission or business process perspectives with system-level
        risk assessments;

        c. Document risk assessment results in [Selection: security and privacy plans;
        risk assessment report; [Assignment: organization-defined document]];

        d. Review risk assessment results [Assignment: organization-defined frequency];

        e. Disseminate risk assessment results to [Assignment: organization-defined
        personnel or roles]; and

        f. Update the risk assessment [Assignment: organization-defined frequency]
        or when there are significant changes to the system, its environment of operation,
        or other conditions that may impact the security or privacy state of the system.'
      annotation: 'Risk assessments consider threats, vulnerabilities, likelihood,
        and impact to organizational operations and assets, individuals, other organizations,
        and the Nation. Risk assessments also consider risk from external parties,
        including contractors who operate systems on behalf of the organization, individuals
        who access organizational systems, service providers, and outsourcing entities.

        Organizations can conduct risk assessments at all three levels in the risk
        management hierarchy (i.e., organization level, mission/business process level,
        or information system level) and at any stage in the system development life
        cycle. Risk assessments can also be conducted at various steps in the Risk
        Management Framework, including preparation, categorization, control selection,
        control implementation, control assessment, authorization, and control monitoring.
        Risk assessment is an ongoing activity carried out throughout the system development
        life cycle.

        Risk assessments can also address information related to the system, including
        system design, the intended use of the system, testing results, and supply
        chain-related information or artifacts. Risk assessments can play an important
        role in control selection processes, particularly during the application of
        tailoring guidance and in the earliest phases of capability determination.'
      translations:
        pt:
          name: "Avalia\xE7\xE3o de Risco"
          description: "a. Conduzir uma avalia\xE7\xE3o de risco, incluindo:\n1. Identificar\
            \ amea\xE7as ao sistema e vulnerabilidades nele;\n2. Determinar a probabilidade\
            \ e a magnitude do dano decorrente de acesso, uso, divulga\xE7\xE3o, interrup\xE7\
            \xE3o, modifica\xE7\xE3o ou destrui\xE7\xE3o n\xE3o autorizados do sistema,\
            \ das informa\xE7\xF5es que ele processa, armazena ou transmite e de quaisquer\
            \ informa\xE7\xF5es relacionadas; e\n3. Determinar a probabilidade e o\
            \ impacto de efeitos adversos sobre os indiv\xEDduos decorrentes do processamento\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal;\nb. Integrar os\
            \ resultados da avalia\xE7\xE3o de risco e as decis\xF5es de gest\xE3\
            o de risco das perspectivas da organiza\xE7\xE3o e do processo de miss\xE3\
            o ou de neg\xF3cio com as avalia\xE7\xF5es de risco em n\xEDvel de sistema;\n\
            c. Documentar os resultados da avalia\xE7\xE3o de risco em [Sele\xE7\xE3\
            o: planos de seguran\xE7a e privacidade; relat\xF3rio de avalia\xE7\xE3\
            o de risco; [Atribui\xE7\xE3o: documento definido pela organiza\xE7\xE3\
            o]];\nd. Revisar os resultados da avalia\xE7\xE3o de risco [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o];\ne. Divulgar os\
            \ resultados da avalia\xE7\xE3o de risco a [Atribui\xE7\xE3o: pessoal\
            \ ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]; e\nf. Atualizar\
            \ a avalia\xE7\xE3o de risco [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] ou quando houver mudan\xE7as significativas\
            \ no sistema, em seu ambiente de opera\xE7\xE3o ou em outras condi\xE7\
            \xF5es que possam impactar o estado de seguran\xE7a ou privacidade do\
            \ sistema."
          annotation: "As avalia\xE7\xF5es de risco consideram amea\xE7as, vulnerabilidades,\
            \ probabilidade e impacto sobre as opera\xE7\xF5es e os ativos organizacionais,\
            \ os indiv\xEDduos, outras organiza\xE7\xF5es e a Na\xE7\xE3o. As avalia\xE7\
            \xF5es de risco tamb\xE9m consideram o risco proveniente de partes externas,\
            \ incluindo prestadores de servi\xE7o que operam sistemas em nome da organiza\xE7\
            \xE3o, indiv\xEDduos que acessam sistemas organizacionais, provedores\
            \ de servi\xE7o e entidades de terceiriza\xE7\xE3o.\nAs organiza\xE7\xF5\
            es podem conduzir avalia\xE7\xF5es de risco em todos os tr\xEAs n\xED\
            veis da hierarquia de gest\xE3o de risco (ou seja, n\xEDvel organizacional,\
            \ n\xEDvel de processo de miss\xE3o/neg\xF3cio ou n\xEDvel de sistema\
            \ de informa\xE7\xE3o) e em qualquer etapa do ciclo de vida de desenvolvimento\
            \ do sistema. As avalia\xE7\xF5es de risco tamb\xE9m podem ser conduzidas\
            \ em v\xE1rias etapas do Framework de Gest\xE3o de Risco, incluindo prepara\xE7\
            \xE3o, categoriza\xE7\xE3o, sele\xE7\xE3o de controles, implementa\xE7\
            \xE3o de controles, avalia\xE7\xE3o de controles, autoriza\xE7\xE3o e\
            \ monitoramento de controles. A avalia\xE7\xE3o de risco \xE9 uma atividade\
            \ cont\xEDnua realizada ao longo de todo o ciclo de vida de desenvolvimento\
            \ do sistema.\nAs avalia\xE7\xF5es de risco tamb\xE9m podem abordar informa\xE7\
            \xF5es relacionadas ao sistema, incluindo o projeto do sistema, o uso\
            \ pretendido do sistema, os resultados de testes e informa\xE7\xF5es ou\
            \ artefatos relacionados \xE0 cadeia de suprimentos. As avalia\xE7\xF5\
            es de risco podem desempenhar um papel importante nos processos de sele\xE7\
            \xE3o de controles, particularmente durante a aplica\xE7\xE3o das orienta\xE7\
            \xF5es de adequa\xE7\xE3o e nas fases iniciais de determina\xE7\xE3o de\
            \ capacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-3(1)
      name: Risk Assessment | Supply Chain Risk Assessment
      description: '(a) Assess supply chain risks associated with [Assignment: organization-defined
        systems, system components, and system services]; and

        (b) Update the supply chain risk assessment [Assignment: organization-defined
        frequency], when there are significant changes to the relevant supply chain,
        or when changes to the system, environments of operation, or other conditions
        may necessitate a change in the supply chain.'
      annotation: Supply chain-related events include disruption, use of defective
        components, insertion of counterfeits, theft, malicious development practices,
        improper delivery practices, and insertion of malicious code. These events
        can have a significant impact on the confidentiality, integrity, or availability
        of a system and its information and, therefore, can also adversely impact
        organizational operations (including mission, functions, image, or reputation),
        organizational assets, individuals, other organizations, and the Nation. The
        supply chain-related events may be unintentional or malicious and can occur
        at any point during the system life cycle. An analysis of supply chain risk
        can help an organization identify systems or components for which additional
        supply chain risk mitigations are required.
      translations:
        pt:
          name: "Avalia\xE7\xE3o de Risco | Avalia\xE7\xE3o de Risco da Cadeia de\
            \ Suprimentos"
          description: "(a) Avaliar os riscos da cadeia de suprimentos associados\
            \ a [Atribui\xE7\xE3o: sistemas, componentes de sistema e servi\xE7os\
            \ de sistema definidos pela organiza\xE7\xE3o]; e\n(b) Atualizar a avalia\xE7\
            \xE3o de risco da cadeia de suprimentos [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o], quando houver mudan\xE7as significativas\
            \ na cadeia de suprimentos relevante ou quando mudan\xE7as no sistema,\
            \ nos ambientes de opera\xE7\xE3o ou em outras condi\xE7\xF5es possam\
            \ exigir uma mudan\xE7a na cadeia de suprimentos."
          annotation: "Eventos relacionados \xE0 cadeia de suprimentos incluem interrup\xE7\
            \xE3o, uso de componentes defeituosos, inser\xE7\xE3o de falsifica\xE7\
            \xF5es, furto, pr\xE1ticas maliciosas de desenvolvimento, pr\xE1ticas\
            \ inadequadas de entrega e inser\xE7\xE3o de c\xF3digo malicioso. Esses\
            \ eventos podem ter um impacto significativo sobre a confidencialidade,\
            \ integridade ou disponibilidade de um sistema e de suas informa\xE7\xF5\
            es e, portanto, tamb\xE9m podem impactar adversamente as opera\xE7\xF5\
            es organizacionais (incluindo miss\xE3o, fun\xE7\xF5es, imagem ou reputa\xE7\
            \xE3o), os ativos organizacionais, os indiv\xEDduos, outras organiza\xE7\
            \xF5es e a Na\xE7\xE3o. Os eventos relacionados \xE0 cadeia de suprimentos\
            \ podem ser n\xE3o intencionais ou maliciosos e podem ocorrer em qualquer\
            \ ponto durante o ciclo de vida do sistema. Uma an\xE1lise do risco da\
            \ cadeia de suprimentos pode ajudar uma organiza\xE7\xE3o a identificar\
            \ sistemas ou componentes para os quais sejam necess\xE1rias mitiga\xE7\
            \xF5es adicionais de risco da cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-3(2)
      name: Risk Assessment | Use of All-source Intelligence
      description: Use all-source intelligence to assist in the analysis of risk.
      annotation: Organizations employ all-source intelligence to inform engineering,
        acquisition, and risk management decisions. All-source intelligence consists
        of information derived from all available sources, including publicly available
        or open-source information, measurement and signature intelligence, human
        intelligence, signals intelligence, and imagery intelligence. All-source intelligence
        is used to analyze the risk of vulnerabilities (both intentional and unintentional)
        from development, manufacturing, and delivery processes, people, and the environment.
        The risk analysis may be performed on suppliers at multiple tiers in the supply
        chain sufficient to manage risks. Organizations may develop agreements to
        share all-source intelligence information or resulting decisions with other
        organizations, as appropriate.
      translations:
        pt:
          name: "Avalia\xE7\xE3o de Risco | Uso de Intelig\xEAncia de Todas as Fontes"
          description: "Usar intelig\xEAncia de todas as fontes para auxiliar na an\xE1\
            lise de risco."
          annotation: "As organiza\xE7\xF5es empregam intelig\xEAncia de todas as\
            \ fontes para fundamentar decis\xF5es de engenharia, aquisi\xE7\xE3o e\
            \ gest\xE3o de risco. A intelig\xEAncia de todas as fontes consiste em\
            \ informa\xE7\xF5es derivadas de todas as fontes dispon\xEDveis, incluindo\
            \ informa\xE7\xF5es dispon\xEDveis publicamente ou de c\xF3digo aberto,\
            \ intelig\xEAncia de medi\xE7\xE3o e assinatura, intelig\xEAncia humana,\
            \ intelig\xEAncia de sinais e intelig\xEAncia de imagens. A intelig\xEA\
            ncia de todas as fontes \xE9 usada para analisar o risco de vulnerabilidades\
            \ (tanto intencionais quanto n\xE3o intencionais) provenientes de processos\
            \ de desenvolvimento, fabrica\xE7\xE3o e entrega, das pessoas e do ambiente.\
            \ A an\xE1lise de risco pode ser realizada sobre fornecedores em m\xFA\
            ltiplos n\xEDveis da cadeia de suprimentos, de forma suficiente para gerenciar\
            \ os riscos. As organiza\xE7\xF5es podem desenvolver acordos para compartilhar\
            \ informa\xE7\xF5es de intelig\xEAncia de todas as fontes ou as decis\xF5\
            es resultantes com outras organiza\xE7\xF5es, conforme apropriado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-3(3)
      name: Risk Assessment | Dynamic Threat Awareness
      description: 'Determine the current cyber threat environment on an ongoing basis
        using [Assignment: organization-defined means].'
      annotation: "The threat awareness information that is gathered feeds into the\
        \ organization\u2019s information security operations to ensure that procedures\
        \ are updated in response to the changing threat environment. For example,\
        \ at higher threat levels, organizations may change the privilege or authentication\
        \ thresholds required to perform certain operations."
      translations:
        pt:
          name: "Avalia\xE7\xE3o de Risco | Consci\xEAncia Din\xE2mica de Amea\xE7\
            as"
          description: "Determinar o ambiente atual de amea\xE7as cibern\xE9ticas\
            \ de forma cont\xEDnua usando [Atribui\xE7\xE3o: meios definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "As informa\xE7\xF5es de consci\xEAncia de amea\xE7as que s\xE3\
            o coletadas alimentam as opera\xE7\xF5es de seguran\xE7a da informa\xE7\
            \xE3o da organiza\xE7\xE3o para assegurar que os procedimentos sejam atualizados\
            \ em resposta ao ambiente de amea\xE7as em constante mudan\xE7a. Por exemplo,\
            \ em n\xEDveis de amea\xE7a mais elevados, as organiza\xE7\xF5es podem\
            \ alterar os limiares de privil\xE9gio ou de autentica\xE7\xE3o exigidos\
            \ para realizar determinadas opera\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-3(4)
      name: Risk Assessment | Predictive Cyber Analytics
      description: 'Employ the following advanced automation and analytics capabilities
        to predict and identify risks to [Assignment: organization-defined systems
        or system components]: [Assignment: organization-defined advanced automation
        and analytics capabilities].'
      annotation: A properly resourced Security Operations Center (SOC) or Computer
        Incident Response Team (CIRT) may be overwhelmed by the volume of information
        generated by the proliferation of security tools and appliances unless it
        employs advanced automation and analytics to analyze the data. Advanced automation
        and analytics capabilities are typically supported by artificial intelligence
        concepts, including machine learning. Examples include Automated Threat Discovery
        and Response (which includes broad-based collection, context-based analysis,
        and adaptive response capabilities), automated workflow operations, and machine
        assisted decision tools. Note, however, that sophisticated adversaries may
        be able to extract information related to analytic parameters and retrain
        the machine learning to classify malicious activity as benign. Accordingly,
        machine learning is augmented by human monitoring to ensure that sophisticated
        adversaries are not able to conceal their activities.
      translations:
        pt:
          name: "Avalia\xE7\xE3o de Risco | An\xE1lise Cibern\xE9tica Preditiva"
          description: "Empregar as seguintes capacidades avan\xE7adas de automa\xE7\
            \xE3o e an\xE1lise para prever e identificar riscos a [Atribui\xE7\xE3\
            o: sistemas ou componentes de sistema definidos pela organiza\xE7\xE3\
            o]: [Atribui\xE7\xE3o: capacidades avan\xE7adas de automa\xE7\xE3o e an\xE1\
            lise definidas pela organiza\xE7\xE3o]."
          annotation: "Um Centro de Opera\xE7\xF5es de Seguran\xE7a (SOC) ou Equipe\
            \ de Resposta a Incidentes Computacionais (CIRT) devidamente dotado de\
            \ recursos pode ser sobrecarregado pelo volume de informa\xE7\xF5es geradas\
            \ pela prolifera\xE7\xE3o de ferramentas e dispositivos de seguran\xE7\
            a, a menos que empregue automa\xE7\xE3o e an\xE1lise avan\xE7adas para\
            \ analisar os dados. As capacidades avan\xE7adas de automa\xE7\xE3o e\
            \ an\xE1lise s\xE3o tipicamente apoiadas por conceitos de intelig\xEA\
            ncia artificial, incluindo aprendizado de m\xE1quina. Exemplos incluem\
            \ Descoberta e Resposta Automatizada a Amea\xE7as (que inclui capacidades\
            \ de coleta de base ampla, an\xE1lise baseada em contexto e resposta adaptativa),\
            \ opera\xE7\xF5es de fluxo de trabalho automatizadas e ferramentas de\
            \ decis\xE3o assistida por m\xE1quina. Observe, no entanto, que advers\xE1\
            rios sofisticados podem ser capazes de extrair informa\xE7\xF5es relacionadas\
            \ aos par\xE2metros anal\xEDticos e retreinar o aprendizado de m\xE1quina\
            \ para classificar atividade maliciosa como benigna. Consequentemente,\
            \ o aprendizado de m\xE1quina \xE9 complementado por monitoramento humano\
            \ para assegurar que advers\xE1rios sofisticados n\xE3o sejam capazes\
            \ de ocultar suas atividades."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-4
      name: Risk Assessment Update
      description: '[Withdrawn: Incorporated into RA-3.]'
      translations:
        pt:
          name: "Atualiza\xE7\xE3o da Avalia\xE7\xE3o de Risco"
          description: '[Retirado: Incorporado ao RA-3.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5
      name: Vulnerability Monitoring and Scanning
      description: "a. Monitor and scan for vulnerabilities in the system and hosted\
        \ applications [Assignment: organization-defined frequency and/or randomly\
        \ in accordance with organization-defined process] and when new vulnerabilities\
        \ potentially affecting the system are identified and reported;\nb. Employ\
        \ vulnerability monitoring tools and techniques that facilitate interoperability\
        \ among tools and automate parts of the vulnerability management process by\
        \ using standards for:\n1. Enumerating platforms, software flaws, and improper\
        \ configurations;\n2. Formatting checklists and test procedures; and\n3. Measuring\
        \ vulnerability impact; \nc. Analyze vulnerability scan reports and results\
        \ from vulnerability monitoring;\nd. Remediate legitimate vulnerabilities\
        \ [Assignment: organization-defined response times] in accordance with an\
        \ organizational assessment of risk;\ne. Share information obtained from the\
        \ vulnerability monitoring process and control assessments with [Assignment:\
        \ organization-defined personnel or roles] to help eliminate similar vulnerabilities\
        \ in other systems; and\nf. Employ vulnerability monitoring tools that include\
        \ the capability to readily update the vulnerabilities to be scanned."
      annotation: "Security categorization of information and systems guides the frequency\
        \ and comprehensiveness of vulnerability monitoring (including scans). Organizations\
        \ determine the required vulnerability monitoring for system components, ensuring\
        \ that the potential sources of vulnerabilities\u2014such as infrastructure\
        \ components (e.g., switches, routers, guards, sensors), networked printers,\
        \ scanners, and copiers\u2014are not overlooked. The capability to readily\
        \ update vulnerability monitoring tools as new vulnerabilities are discovered\
        \ and announced and as new scanning methods are developed helps to ensure\
        \ that new vulnerabilities are not missed by employed vulnerability monitoring\
        \ tools. The vulnerability monitoring tool update process helps to ensure\
        \ that potential vulnerabilities in the system are identified and addressed\
        \ as quickly as possible. Vulnerability monitoring and analyses for custom\
        \ software may require additional approaches, such as static analysis, dynamic\
        \ analysis, binary analysis, or a hybrid of the three approaches. Organizations\
        \ can use these analysis approaches in source code reviews and in a variety\
        \ of tools, including web-based application scanners, static analysis tools,\
        \ and binary analyzers. \nVulnerability monitoring includes scanning for patch\
        \ levels; scanning for functions, ports, protocols, and services that should\
        \ not be accessible to users or devices; and scanning for flow control mechanisms\
        \ that are improperly configured or operating incorrectly. Vulnerability monitoring\
        \ may also include continuous vulnerability monitoring tools that use instrumentation\
        \ to continuously analyze components. Instrumentation-based tools may improve\
        \ accuracy and may be run throughout an organization without scanning. Vulnerability\
        \ monitoring tools that facilitate interoperability include tools that are\
        \ Security Content Automated Protocol (SCAP)-validated. Thus, organizations\
        \ consider using scanning tools that express vulnerabilities in the Common\
        \ Vulnerabilities and Exposures (CVE) naming convention and that employ the\
        \ Open Vulnerability Assessment Language (OVAL) to determine the presence\
        \ of vulnerabilities. Sources for vulnerability information include the Common\
        \ Weakness Enumeration (CWE) listing and the National Vulnerability Database\
        \ (NVD). Control assessments, such as red team exercises, provide additional\
        \ sources of potential vulnerabilities for which to scan. Organizations also\
        \ consider using scanning tools that express vulnerability impact by the Common\
        \ Vulnerability Scoring System (CVSS).\nVulnerability monitoring includes\
        \ a channel and process for receiving reports of security vulnerabilities\
        \ from the public at-large. Vulnerability disclosure programs can be as simple\
        \ as publishing a monitored email address or web form that can receive reports,\
        \ including notification authorizing good-faith research and disclosure of\
        \ security vulnerabilities. Organizations generally expect that such research\
        \ is happening with or without their authorization and can use public vulnerability\
        \ disclosure channels to increase the likelihood that discovered vulnerabilities\
        \ are reported directly to the organization for remediation.\nOrganizations\
        \ may also employ the use of financial incentives (also known as bug bounties)\
        \ to further encourage external security researchers to report discovered\
        \ vulnerabilities. Bug bounty programs can be tailored to the organization\u2019\
        s needs. Bounties can be operated indefinitely or over a defined period of\
        \ time and can be offered to the general public or to a curated group. Organizations\
        \ may run public and private bounties simultaneously and could choose to offer\
        \ partially credentialed access to certain participants in order to evaluate\
        \ security vulnerabilities from privileged vantage points."
      translations:
        pt:
          name: Monitoramento e Varredura de Vulnerabilidades
          description: "a. Monitorar e realizar varreduras de vulnerabilidades no\
            \ sistema e nas aplica\xE7\xF5es hospedadas [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o e/ou aleatoriamente de acordo com\
            \ processo definido pela organiza\xE7\xE3o] e quando novas vulnerabilidades\
            \ que potencialmente afetam o sistema forem identificadas e relatadas;\n\
            b. Empregar ferramentas e t\xE9cnicas de monitoramento de vulnerabilidades\
            \ que facilitem a interoperabilidade entre ferramentas e automatizem partes\
            \ do processo de gest\xE3o de vulnerabilidades por meio do uso de padr\xF5\
            es para:\n1. Enumerar plataformas, falhas de software e configura\xE7\xF5\
            es inadequadas;\n2. Formatar listas de verifica\xE7\xE3o e procedimentos\
            \ de teste; e\n3. Mensurar o impacto da vulnerabilidade;\nc. Analisar\
            \ relat\xF3rios de varredura de vulnerabilidades e resultados do monitoramento\
            \ de vulnerabilidades;\nd. Remediar vulnerabilidades leg\xEDtimas [Atribui\xE7\
            \xE3o: tempos de resposta definidos pela organiza\xE7\xE3o] de acordo\
            \ com uma avalia\xE7\xE3o organizacional de risco;\ne. Compartilhar as\
            \ informa\xE7\xF5es obtidas no processo de monitoramento de vulnerabilidades\
            \ e nas avalia\xE7\xF5es de controles com [Atribui\xE7\xE3o: pessoal ou\
            \ fun\xE7\xF5es definidos pela organiza\xE7\xE3o] para ajudar a eliminar\
            \ vulnerabilidades semelhantes em outros sistemas; e\nf. Empregar ferramentas\
            \ de monitoramento de vulnerabilidades que incluam a capacidade de atualizar\
            \ prontamente as vulnerabilidades a serem varridas."
          annotation: "A categoriza\xE7\xE3o de seguran\xE7a das informa\xE7\xF5es\
            \ e dos sistemas orienta a frequ\xEAncia e a abrang\xEAncia do monitoramento\
            \ de vulnerabilidades (incluindo as varreduras). As organiza\xE7\xF5es\
            \ determinam o monitoramento de vulnerabilidades necess\xE1rio para os\
            \ componentes do sistema, assegurando que as potenciais fontes de vulnerabilidades\
            \ \u2014 como componentes de infraestrutura (por exemplo, switches, roteadores,\
            \ guards, sensores), impressoras em rede, scanners e copiadoras \u2014\
            \ n\xE3o sejam negligenciadas. A capacidade de atualizar prontamente as\
            \ ferramentas de monitoramento de vulnerabilidades \xE0 medida que novas\
            \ vulnerabilidades s\xE3o descobertas e anunciadas e \xE0 medida que novos\
            \ m\xE9todos de varredura s\xE3o desenvolvidos ajuda a assegurar que novas\
            \ vulnerabilidades n\xE3o passem despercebidas pelas ferramentas de monitoramento\
            \ de vulnerabilidades empregadas. O processo de atualiza\xE7\xE3o das\
            \ ferramentas de monitoramento de vulnerabilidades ajuda a assegurar que\
            \ potenciais vulnerabilidades no sistema sejam identificadas e tratadas\
            \ o mais rapidamente poss\xEDvel. O monitoramento e as an\xE1lises de\
            \ vulnerabilidades para software customizado podem exigir abordagens adicionais,\
            \ como an\xE1lise est\xE1tica, an\xE1lise din\xE2mica, an\xE1lise de bin\xE1\
            rios ou um h\xEDbrido das tr\xEAs abordagens. As organiza\xE7\xF5es podem\
            \ usar essas abordagens de an\xE1lise em revis\xF5es de c\xF3digo-fonte\
            \ e em uma variedade de ferramentas, incluindo scanners de aplica\xE7\xF5\
            es baseadas na web, ferramentas de an\xE1lise est\xE1tica e analisadores\
            \ de bin\xE1rios.\nO monitoramento de vulnerabilidades inclui a varredura\
            \ de n\xEDveis de patch; a varredura de fun\xE7\xF5es, portas, protocolos\
            \ e servi\xE7os que n\xE3o deveriam estar acess\xEDveis a usu\xE1rios\
            \ ou dispositivos; e a varredura de mecanismos de controle de fluxo que\
            \ estejam configurados de forma inadequada ou operando incorretamente.\
            \ O monitoramento de vulnerabilidades tamb\xE9m pode incluir ferramentas\
            \ de monitoramento cont\xEDnuo de vulnerabilidades que usam instrumenta\xE7\
            \xE3o para analisar continuamente os componentes. Ferramentas baseadas\
            \ em instrumenta\xE7\xE3o podem melhorar a precis\xE3o e podem ser executadas\
            \ em toda a organiza\xE7\xE3o sem varredura. As ferramentas de monitoramento\
            \ de vulnerabilidades que facilitam a interoperabilidade incluem ferramentas\
            \ validadas pelo Security Content Automation Protocol (SCAP). Assim, as\
            \ organiza\xE7\xF5es consideram o uso de ferramentas de varredura que\
            \ expressem vulnerabilidades na conven\xE7\xE3o de nomenclatura Common\
            \ Vulnerabilities and Exposures (CVE) e que empreguem a Open Vulnerability\
            \ Assessment Language (OVAL) para determinar a presen\xE7a de vulnerabilidades.\
            \ Fontes de informa\xE7\xF5es sobre vulnerabilidades incluem a listagem\
            \ Common Weakness Enumeration (CWE) e o National Vulnerability Database\
            \ (NVD). Avalia\xE7\xF5es de controles, como exerc\xEDcios de equipe vermelha\
            \ (red team), fornecem fontes adicionais de potenciais vulnerabilidades\
            \ a serem varridas. As organiza\xE7\xF5es tamb\xE9m consideram o uso de\
            \ ferramentas de varredura que expressem o impacto da vulnerabilidade\
            \ pelo Common Vulnerability Scoring System (CVSS).\nO monitoramento de\
            \ vulnerabilidades inclui um canal e um processo para receber relatos\
            \ de vulnerabilidades de seguran\xE7a do p\xFAblico em geral. Os programas\
            \ de divulga\xE7\xE3o de vulnerabilidades podem ser t\xE3o simples quanto\
            \ publicar um endere\xE7o de e-mail monitorado ou um formul\xE1rio web\
            \ que possa receber relatos, incluindo notifica\xE7\xE3o que autorize\
            \ pesquisa e divulga\xE7\xE3o de boa-f\xE9 de vulnerabilidades de seguran\xE7\
            a. As organiza\xE7\xF5es geralmente esperam que tal pesquisa esteja ocorrendo\
            \ com ou sem sua autoriza\xE7\xE3o e podem usar canais p\xFAblicos de\
            \ divulga\xE7\xE3o de vulnerabilidades para aumentar a probabilidade de\
            \ que as vulnerabilidades descobertas sejam relatadas diretamente \xE0\
            \ organiza\xE7\xE3o para remedia\xE7\xE3o.\nAs organiza\xE7\xF5es tamb\xE9\
            m podem empregar o uso de incentivos financeiros (tamb\xE9m conhecidos\
            \ como bug bounties) para incentivar ainda mais os pesquisadores de seguran\xE7\
            a externos a relatar vulnerabilidades descobertas. Os programas de bug\
            \ bounty podem ser adequados \xE0s necessidades da organiza\xE7\xE3o.\
            \ As recompensas (bounties) podem ser operadas indefinidamente ou por\
            \ um per\xEDodo de tempo definido e podem ser oferecidas ao p\xFAblico\
            \ em geral ou a um grupo selecionado. As organiza\xE7\xF5es podem executar\
            \ programas de recompensa p\xFAblicos e privados simultaneamente e podem\
            \ optar por oferecer acesso parcialmente credenciado a determinados participantes\
            \ a fim de avaliar vulnerabilidades de seguran\xE7a a partir de pontos\
            \ de vista privilegiados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(1)
      name: Vulnerability Monitoring and Scanning | Update Tool Capability
      description: '[Withdrawn: Incorporated into RA-5.]'
      translations:
        pt:
          name: Monitoramento e Varredura de Vulnerabilidades | Atualizar Capacidade
            da Ferramenta
          description: '[Retirado: Incorporado ao RA-5.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(2)
      name: Vulnerability Monitoring and Scanning | Update Vulnerabilities to Be Scanned
      description: 'Update the system vulnerabilities to be scanned [Selection (one
        or more): [Assignment: organization-defined frequency]; prior to a new scan;
        when new vulnerabilities are identified and reported].'
      annotation: Due to the complexity of modern software, systems, and other factors,
        new vulnerabilities are discovered on a regular basis. It is important that
        newly discovered vulnerabilities are added to the list of vulnerabilities
        to be scanned to ensure that the organization can take steps to mitigate those
        vulnerabilities in a timely manner.
      translations:
        pt:
          name: Monitoramento e Varredura de Vulnerabilidades | Atualizar Vulnerabilidades
            a Serem Varridas
          description: "Atualizar as vulnerabilidades do sistema a serem varridas\
            \ [Sele\xE7\xE3o (um ou mais): [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]; antes de uma nova varredura; quando novas vulnerabilidades\
            \ forem identificadas e relatadas]."
          annotation: "Devido \xE0 complexidade do software, dos sistemas modernos\
            \ e de outros fatores, novas vulnerabilidades s\xE3o descobertas regularmente.\
            \ \xC9 importante que as vulnerabilidades rec\xE9m-descobertas sejam adicionadas\
            \ \xE0 lista de vulnerabilidades a serem varridas para assegurar que a\
            \ organiza\xE7\xE3o possa tomar medidas para mitigar essas vulnerabilidades\
            \ em tempo h\xE1bil."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(3)
      name: Vulnerability Monitoring and Scanning | Breadth and Depth of Coverage
      description: Define the breadth and depth of vulnerability scanning coverage.
      annotation: The breadth of vulnerability scanning coverage can be expressed
        as a percentage of components within the system, by the particular types of
        systems, by the criticality of systems, or by the number of vulnerabilities
        to be checked. Conversely, the depth of vulnerability scanning coverage can
        be expressed as the level of the system design that the organization intends
        to monitor (e.g., component, module, subsystem, element). Organizations can
        determine the sufficiency of vulnerability scanning coverage with regard to
        its risk tolerance and other factors. Scanning tools and how the tools are
        configured may affect the depth and coverage. Multiple scanning tools may
        be needed to achieve the desired depth and coverage. SP 800-53A provides additional
        information on the breadth and depth of coverage.
      translations:
        pt:
          name: Monitoramento e Varredura de Vulnerabilidades | Amplitude e Profundidade
            da Cobertura
          description: Definir a amplitude e a profundidade da cobertura da varredura
            de vulnerabilidades.
          annotation: "A amplitude da cobertura da varredura de vulnerabilidades pode\
            \ ser expressa como um percentual dos componentes dentro do sistema, pelos\
            \ tipos espec\xEDficos de sistemas, pela criticidade dos sistemas ou pelo\
            \ n\xFAmero de vulnerabilidades a serem verificadas. Inversamente, a profundidade\
            \ da cobertura da varredura de vulnerabilidades pode ser expressa como\
            \ o n\xEDvel do projeto do sistema que a organiza\xE7\xE3o pretende monitorar\
            \ (por exemplo, componente, m\xF3dulo, subsistema, elemento). As organiza\xE7\
            \xF5es podem determinar a sufici\xEAncia da cobertura da varredura de\
            \ vulnerabilidades com rela\xE7\xE3o \xE0 sua toler\xE2ncia ao risco e\
            \ a outros fatores. As ferramentas de varredura e a forma como elas s\xE3\
            o configuradas podem afetar a profundidade e a cobertura. M\xFAltiplas\
            \ ferramentas de varredura podem ser necess\xE1rias para alcan\xE7ar a\
            \ profundidade e a cobertura desejadas. A SP 800-53A fornece informa\xE7\
            \xF5es adicionais sobre a amplitude e a profundidade da cobertura."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(4)
      name: Vulnerability Monitoring and Scanning | Discoverable Information
      description: 'Determine information about the system that is discoverable and
        take [Assignment: organization-defined corrective actions].'
      annotation: Discoverable information includes information that adversaries could
        obtain without compromising or breaching the system, such as by collecting
        information that the system is exposing or by conducting extensive web searches.
        Corrective actions include notifying appropriate organizational personnel,
        removing designated information, or changing the system to make the designated
        information less relevant or attractive to adversaries. This enhancement excludes
        intentionally discoverable information that may be part of a decoy capability
        (e.g., honeypots, honeynets, or deception nets) deployed by the organization.
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | Informa\xE7\xF5es\
            \ Descobr\xEDveis"
          description: "Determinar quais informa\xE7\xF5es sobre o sistema s\xE3o\
            \ descobr\xEDveis e tomar [Atribui\xE7\xE3o: a\xE7\xF5es corretivas definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "Informa\xE7\xF5es descobr\xEDveis incluem informa\xE7\xF5es\
            \ que os advers\xE1rios poderiam obter sem comprometer ou violar o sistema,\
            \ como ao coletar informa\xE7\xF5es que o sistema est\xE1 expondo ou ao\
            \ conduzir buscas extensas na web. As a\xE7\xF5es corretivas incluem notificar\
            \ o pessoal organizacional apropriado, remover informa\xE7\xF5es designadas\
            \ ou alterar o sistema para tornar as informa\xE7\xF5es designadas menos\
            \ relevantes ou atraentes para os advers\xE1rios. Este aprimoramento exclui\
            \ informa\xE7\xF5es intencionalmente descobr\xEDveis que possam fazer\
            \ parte de uma capacidade de isca (por exemplo, honeypots, honeynets ou\
            \ redes de engano) implantada pela organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(5)
      name: Vulnerability Monitoring and Scanning | Privileged Access
      description: 'Implement privileged access authorization to [Assignment: organization-defined
        system components] for [Assignment: organization-defined vulnerability scanning
        activities].'
      annotation: In certain situations, the nature of the vulnerability scanning
        may be more intrusive, or the system component that is the subject of the
        scanning may contain classified or controlled unclassified information, such
        as personally identifiable information. Privileged access authorization to
        selected system components facilitates more thorough vulnerability scanning
        and protects the sensitive nature of such scanning.
      translations:
        pt:
          name: Monitoramento e Varredura de Vulnerabilidades | Acesso Privilegiado
          description: "Implementar autoriza\xE7\xE3o de acesso privilegiado a [Atribui\xE7\
            \xE3o: componentes de sistema definidos pela organiza\xE7\xE3o] para [Atribui\xE7\
            \xE3o: atividades de varredura de vulnerabilidades definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Em determinadas situa\xE7\xF5es, a natureza da varredura de\
            \ vulnerabilidades pode ser mais intrusiva, ou o componente do sistema\
            \ que \xE9 objeto da varredura pode conter informa\xE7\xF5es classificadas\
            \ ou informa\xE7\xF5es n\xE3o classificadas controladas, como informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal. A autoriza\xE7\xE3o de acesso privilegiado\
            \ a componentes de sistema selecionados facilita uma varredura de vulnerabilidades\
            \ mais minuciosa e protege a natureza sens\xEDvel dessa varredura."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(6)
      name: Vulnerability Monitoring and Scanning | Automated Trend Analyses
      description: 'Compare the results of multiple vulnerability scans using [Assignment:
        organization-defined automated mechanisms].'
      annotation: Using automated mechanisms to analyze multiple vulnerability scans
        over time can help determine trends in system vulnerabilities and identify
        patterns of attack.
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | An\xE1lises Automatizadas\
            \ de Tend\xEAncias"
          description: "Comparar os resultados de m\xFAltiplas varreduras de vulnerabilidades\
            \ usando [Atribui\xE7\xE3o: mecanismos automatizados definidos pela organiza\xE7\
            \xE3o]."
          annotation: "O uso de mecanismos automatizados para analisar m\xFAltiplas\
            \ varreduras de vulnerabilidades ao longo do tempo pode ajudar a determinar\
            \ tend\xEAncias nas vulnerabilidades do sistema e identificar padr\xF5\
            es de ataque."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(7)
      name: Vulnerability Monitoring and Scanning | Automated Detection and Notification
        of Unauthorized Components
      description: '[Withdrawn: Incorporated into CM-8.]'
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | Detec\xE7\xE3o e\
            \ Notifica\xE7\xE3o Automatizadas de Componentes N\xE3o Autorizados"
          description: '[Retirado: Incorporado ao CM-8.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(8)
      name: Vulnerability Monitoring and Scanning | Review Historic Audit Logs
      description: 'Review historic audit logs to determine if a vulnerability identified
        in a [Assignment: organization-defined system] has been previously exploited
        within an [Assignment: organization-defined time period].'
      annotation: Reviewing historic audit logs to determine if a recently detected
        vulnerability in a system has been previously exploited by an adversary can
        provide important information for forensic analyses. Such analyses can help
        identify, for example, the extent of a previous intrusion, the trade craft
        employed during the attack, organizational information exfiltrated or modified,
        mission or business capabilities affected, and the duration of the attack.
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | Revisar Logs de Auditoria\
            \ Hist\xF3ricos"
          description: "Revisar logs de auditoria hist\xF3ricos para determinar se\
            \ uma vulnerabilidade identificada em um [Atribui\xE7\xE3o: sistema definido\
            \ pela organiza\xE7\xE3o] foi previamente explorada dentro de um [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o]."
          annotation: "Revisar logs de auditoria hist\xF3ricos para determinar se\
            \ uma vulnerabilidade recentemente detectada em um sistema foi previamente\
            \ explorada por um advers\xE1rio pode fornecer informa\xE7\xF5es importantes\
            \ para an\xE1lises forenses. Tais an\xE1lises podem ajudar a identificar,\
            \ por exemplo, a extens\xE3o de uma intrus\xE3o anterior, as t\xE9cnicas\
            \ (trade craft) empregadas durante o ataque, as informa\xE7\xF5es organizacionais\
            \ exfiltradas ou modificadas, as capacidades de miss\xE3o ou de neg\xF3\
            cio afetadas e a dura\xE7\xE3o do ataque."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(9)
      name: Vulnerability Monitoring and Scanning | Penetration Testing and Analyses
      description: '[Withdrawn: Incorporated into CA-8.]'
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | Testes de Penetra\xE7\
            \xE3o e An\xE1lises"
          description: '[Retirado: Incorporado ao CA-8.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(10)
      name: Vulnerability Monitoring and Scanning | Correlate Scanning Information
      description: Correlate the output from vulnerability scanning tools to determine
        the presence of multi-vulnerability and multi-hop attack vectors.
      annotation: An attack vector is a path or means by which an adversary can gain
        access to a system in order to deliver malicious code or exfiltrate information.
        Organizations can use attack trees to show how hostile activities by adversaries
        interact and combine to produce adverse impacts or negative consequences to
        systems and organizations. Such information, together with correlated data
        from vulnerability scanning tools, can provide greater clarity regarding multi-vulnerability
        and multi-hop attack vectors. The correlation of vulnerability scanning information
        is especially important when organizations are transitioning from older technologies
        to newer technologies (e.g., transitioning from IPv4 to IPv6 network protocols).
        During such transitions, some system components may inadvertently be unmanaged
        and create opportunities for adversary exploitation.
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | Correlacionar Informa\xE7\
            \xF5es de Varredura"
          description: "Correlacionar a sa\xEDda das ferramentas de varredura de vulnerabilidades\
            \ para determinar a presen\xE7a de vetores de ataque de m\xFAltiplas vulnerabilidades\
            \ e de m\xFAltiplos saltos (multi-hop)."
          annotation: "Um vetor de ataque \xE9 um caminho ou meio pelo qual um advers\xE1\
            rio pode obter acesso a um sistema a fim de entregar c\xF3digo malicioso\
            \ ou exfiltrar informa\xE7\xF5es. As organiza\xE7\xF5es podem usar \xE1\
            rvores de ataque para mostrar como atividades hostis dos advers\xE1rios\
            \ interagem e se combinam para produzir impactos adversos ou consequ\xEA\
            ncias negativas para os sistemas e as organiza\xE7\xF5es. Tais informa\xE7\
            \xF5es, juntamente com dados correlacionados de ferramentas de varredura\
            \ de vulnerabilidades, podem proporcionar maior clareza sobre vetores\
            \ de ataque de m\xFAltiplas vulnerabilidades e de m\xFAltiplos saltos.\
            \ A correla\xE7\xE3o de informa\xE7\xF5es de varredura de vulnerabilidades\
            \ \xE9 especialmente importante quando as organiza\xE7\xF5es est\xE3o\
            \ fazendo a transi\xE7\xE3o de tecnologias mais antigas para tecnologias\
            \ mais novas (por exemplo, na transi\xE7\xE3o de protocolos de rede IPv4\
            \ para IPv6). Durante tais transi\xE7\xF5es, alguns componentes do sistema\
            \ podem inadvertidamente ficar sem gerenciamento e criar oportunidades\
            \ de explora\xE7\xE3o por advers\xE1rios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-5(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-5(11)
      name: Vulnerability Monitoring and Scanning | Public Disclosure Program
      description: Establish a public reporting channel for receiving reports of vulnerabilities
        in organizational systems and system components.
      annotation: The reporting channel is publicly discoverable and contains clear
        language authorizing good-faith research and the disclosure of vulnerabilities
        to the organization. The organization does not condition its authorization
        on an expectation of indefinite non-disclosure to the public by the reporting
        entity but may request a specific time period to properly remediate the vulnerability.
      translations:
        pt:
          name: "Monitoramento e Varredura de Vulnerabilidades | Programa de Divulga\xE7\
            \xE3o P\xFAblica"
          description: "Estabelecer um canal p\xFAblico de comunica\xE7\xE3o para\
            \ receber relatos de vulnerabilidades em sistemas e componentes de sistema\
            \ da organiza\xE7\xE3o."
          annotation: "O canal de comunica\xE7\xE3o \xE9 publicamente localiz\xE1\
            vel e cont\xE9m linguagem clara que autoriza pesquisa de boa-f\xE9 e a\
            \ divulga\xE7\xE3o de vulnerabilidades \xE0 organiza\xE7\xE3o. A organiza\xE7\
            \xE3o n\xE3o condiciona sua autoriza\xE7\xE3o a uma expectativa de n\xE3\
            o divulga\xE7\xE3o indefinida ao p\xFAblico por parte da entidade relatora,\
            \ mas pode solicitar um per\xEDodo espec\xEDfico de tempo para remediar\
            \ adequadamente a vulnerabilidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-6
      name: Technical Surveillance Countermeasures Survey
      description: 'Employ a technical surveillance countermeasures survey at [Assignment:
        organization-defined locations] [Selection (one or more): [Assignment: organization-defined
        frequency]; when the following events or indicators occur: [Assignment: organization-defined
        events or indicators]].'
      annotation: A technical surveillance countermeasures survey is a service provided
        by qualified personnel to detect the presence of technical surveillance devices
        and hazards and to identify technical security weaknesses that could be used
        in the conduct of a technical penetration of the surveyed facility. Technical
        surveillance countermeasures surveys also provide evaluations of the technical
        security posture of organizations and facilities and include visual, electronic,
        and physical examinations of surveyed facilities, internally and externally.
        The surveys also provide useful input for risk assessments and information
        regarding organizational exposure to potential adversaries.
      translations:
        pt:
          name: "Levantamento de Contramedidas de Vigil\xE2ncia T\xE9cnica"
          description: "Empregar um levantamento de contramedidas de vigil\xE2ncia\
            \ t\xE9cnica em [Atribui\xE7\xE3o: locais definidos pela organiza\xE7\xE3\
            o] [Sele\xE7\xE3o (um ou mais): [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]; quando os seguintes eventos ou indicadores\
            \ ocorrerem: [Atribui\xE7\xE3o: eventos ou indicadores definidos pela\
            \ organiza\xE7\xE3o]]."
          annotation: "Um levantamento de contramedidas de vigil\xE2ncia t\xE9cnica\
            \ \xE9 um servi\xE7o prestado por pessoal qualificado para detectar a\
            \ presen\xE7a de dispositivos e perigos de vigil\xE2ncia t\xE9cnica e\
            \ para identificar fragilidades de seguran\xE7a t\xE9cnica que poderiam\
            \ ser utilizadas na condu\xE7\xE3o de uma penetra\xE7\xE3o t\xE9cnica\
            \ da instala\xE7\xE3o inspecionada. Os levantamentos de contramedidas\
            \ de vigil\xE2ncia t\xE9cnica tamb\xE9m fornecem avalia\xE7\xF5es da postura\
            \ de seguran\xE7a t\xE9cnica das organiza\xE7\xF5es e instala\xE7\xF5\
            es e incluem exames visuais, eletr\xF4nicos e f\xEDsicos das instala\xE7\
            \xF5es inspecionadas, interna e externamente. Os levantamentos tamb\xE9\
            m fornecem subs\xEDdios \xFAteis para avalia\xE7\xF5es de risco e informa\xE7\
            \xF5es sobre a exposi\xE7\xE3o organizacional a potenciais advers\xE1\
            rios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-7
      name: Risk Response
      description: Respond to findings from security and privacy assessments, monitoring,
        and audits in accordance with organizational risk tolerance.
      annotation: Organizations have many options for responding to risk including
        mitigating risk by implementing new controls or strengthening existing controls,
        accepting risk with appropriate justification or rationale, sharing or transferring
        risk, or avoiding risk. The risk tolerance of the organization influences
        risk response decisions and actions. Risk response addresses the need to determine
        an appropriate response to risk before generating a plan of action and milestones
        entry. For example, the response may be to accept risk or reject risk, or
        it may be possible to mitigate the risk immediately so that a plan of action
        and milestones entry is not needed. However, if the risk response is to mitigate
        the risk, and the mitigation cannot be completed immediately, a plan of action
        and milestones entry is generated.
      translations:
        pt:
          name: Resposta a Riscos
          description: "Responder \xE0s constata\xE7\xF5es de avalia\xE7\xF5es, monitoramento\
            \ e auditorias de seguran\xE7a e privacidade em conformidade com a toler\xE2\
            ncia a risco da organiza\xE7\xE3o."
          annotation: "As organiza\xE7\xF5es t\xEAm muitas op\xE7\xF5es para responder\
            \ ao risco, incluindo mitigar o risco implementando novos controles ou\
            \ fortalecendo controles existentes, aceitar o risco com justificativa\
            \ ou fundamenta\xE7\xE3o apropriada, compartilhar ou transferir o risco,\
            \ ou evitar o risco. A toler\xE2ncia a risco da organiza\xE7\xE3o influencia\
            \ as decis\xF5es e a\xE7\xF5es de resposta a risco. A resposta a risco\
            \ trata da necessidade de determinar uma resposta apropriada ao risco\
            \ antes de gerar uma entrada em um plano de a\xE7\xE3o e marcos. Por exemplo,\
            \ a resposta pode ser aceitar o risco ou rejeitar o risco, ou pode ser\
            \ poss\xEDvel mitigar o risco imediatamente, de modo que uma entrada em\
            \ um plano de a\xE7\xE3o e marcos n\xE3o seja necess\xE1ria. No entanto,\
            \ se a resposta ao risco for mitig\xE1-lo, e a mitiga\xE7\xE3o n\xE3o\
            \ puder ser conclu\xEDda imediatamente, \xE9 gerada uma entrada em um\
            \ plano de a\xE7\xE3o e marcos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-8
      name: Privacy Impact Assessments
      description: 'Conduct privacy impact assessments for systems, programs, or other
        activities before:

        a. Developing or procuring information technology that processes personally
        identifiable information; and

        b. Initiating a new collection of personally identifiable information that:

        1. Will be processed using information technology; and

        2. Includes personally identifiable information permitting the physical or
        virtual (online) contacting of a specific individual, if identical questions
        have been posed to, or identical reporting requirements imposed on, ten or
        more individuals, other than agencies, instrumentalities, or employees of
        the federal government.'
      annotation: "A privacy impact assessment is an analysis of how personally identifiable\
        \ information is handled to ensure that handling conforms to applicable privacy\
        \ requirements, determine the privacy risks associated with an information\
        \ system or activity, and evaluate ways to mitigate privacy risks. A privacy\
        \ impact assessment is both an analysis and a formal document that details\
        \ the process and the outcome of the analysis.\nOrganizations conduct and\
        \ develop a privacy impact assessment with sufficient clarity and specificity\
        \ to demonstrate that the organization fully considered privacy and incorporated\
        \ appropriate privacy protections from the earliest stages of the organization\u2019\
        s activity and throughout the information life cycle. In order to conduct\
        \ a meaningful privacy impact assessment, the organization\u2019s senior agency\
        \ official for privacy works closely with program managers, system owners,\
        \ information technology experts, security officials, counsel, and other relevant\
        \ organization personnel. Moreover, a privacy impact assessment is not a time-restricted\
        \ activity that is limited to a particular milestone or stage of the information\
        \ system or personally identifiable information life cycles. Rather, the privacy\
        \ analysis continues throughout the system and personally identifiable information\
        \ life cycles. Accordingly, a privacy impact assessment is a living document\
        \ that organizations update whenever changes to the information technology,\
        \ changes to the organization\u2019s practices, or other factors alter the\
        \ privacy risks associated with the use of such information technology.\n\
        To conduct the privacy impact assessment, organizations can use security and\
        \ privacy risk assessments. Organizations may also use other related processes\
        \ that may have different names, including privacy threshold analyses. A privacy\
        \ impact assessment can also serve as notice to the public regarding the organization\u2019\
        s practices with respect to privacy. Although conducting and publishing privacy\
        \ impact assessments may be required by law, organizations may develop such\
        \ policies in the absence of applicable laws. For federal agencies, privacy\
        \ impact assessments may be required by EGOV; agencies should consult with\
        \ their senior agency official for privacy and legal counsel on this requirement\
        \ and be aware of the statutory exceptions and OMB guidance relating to the\
        \ provision."
      translations:
        pt:
          name: "Avalia\xE7\xF5es de Impacto \xE0 Privacidade"
          description: "Realizar avalia\xE7\xF5es de impacto \xE0 privacidade para\
            \ sistemas, programas ou outras atividades antes de:\na. Desenvolver ou\
            \ adquirir tecnologia da informa\xE7\xE3o que processe informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal; e\nb. Iniciar uma nova coleta de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal que:\n1. Ser\xE1 processada usando\
            \ tecnologia da informa\xE7\xE3o; e\n2. Inclua informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal que permitam o contato f\xEDsico ou virtual (online) de\
            \ um indiv\xEDduo espec\xEDfico, se quest\xF5es id\xEAnticas tiverem sido\
            \ feitas a, ou requisitos de relato id\xEAnticos tiverem sido impostos\
            \ a, dez ou mais indiv\xEDduos, que n\xE3o sejam ag\xEAncias, instrumentalidades\
            \ ou empregados do governo federal."
          annotation: "Uma avalia\xE7\xE3o de impacto \xE0 privacidade \xE9 uma an\xE1\
            lise de como as informa\xE7\xF5es de identifica\xE7\xE3o pessoal s\xE3\
            o tratadas para assegurar que o tratamento esteja em conformidade com\
            \ os requisitos de privacidade aplic\xE1veis, determinar os riscos \xE0\
            \ privacidade associados a um sistema de informa\xE7\xE3o ou atividade,\
            \ e avaliar formas de mitigar os riscos \xE0 privacidade. Uma avalia\xE7\
            \xE3o de impacto \xE0 privacidade \xE9 tanto uma an\xE1lise quanto um\
            \ documento formal que detalha o processo e o resultado da an\xE1lise.\n\
            As organiza\xE7\xF5es conduzem e desenvolvem uma avalia\xE7\xE3o de impacto\
            \ \xE0 privacidade com clareza e especificidade suficientes para demonstrar\
            \ que a organiza\xE7\xE3o considerou plenamente a privacidade e incorporou\
            \ prote\xE7\xF5es de privacidade apropriadas desde os est\xE1gios mais\
            \ iniciais da atividade da organiza\xE7\xE3o e ao longo de todo o ciclo\
            \ de vida da informa\xE7\xE3o. A fim de conduzir uma avalia\xE7\xE3o de\
            \ impacto \xE0 privacidade significativa, o alto funcion\xE1rio da ag\xEA\
            ncia respons\xE1vel pela privacidade trabalha em estreita colabora\xE7\
            \xE3o com os gestores de programas, propriet\xE1rios de sistemas, especialistas\
            \ em tecnologia da informa\xE7\xE3o, funcion\xE1rios de seguran\xE7a,\
            \ assessoria jur\xEDdica e demais membros relevantes do pessoal da organiza\xE7\
            \xE3o. Al\xE9m disso, uma avalia\xE7\xE3o de impacto \xE0 privacidade\
            \ n\xE3o \xE9 uma atividade restrita no tempo, limitada a um determinado\
            \ marco ou est\xE1gio dos ciclos de vida do sistema de informa\xE7\xE3\
            o ou das informa\xE7\xF5es de identifica\xE7\xE3o pessoal. Em vez disso,\
            \ a an\xE1lise de privacidade continua ao longo dos ciclos de vida do\
            \ sistema e das informa\xE7\xF5es de identifica\xE7\xE3o pessoal. Por\
            \ conseguinte, uma avalia\xE7\xE3o de impacto \xE0 privacidade \xE9 um\
            \ documento vivo que as organiza\xE7\xF5es atualizam sempre que mudan\xE7\
            as na tecnologia da informa\xE7\xE3o, mudan\xE7as nas pr\xE1ticas da organiza\xE7\
            \xE3o ou outros fatores alterem os riscos \xE0 privacidade associados\
            \ ao uso de tal tecnologia da informa\xE7\xE3o.\nPara conduzir a avalia\xE7\
            \xE3o de impacto \xE0 privacidade, as organiza\xE7\xF5es podem usar avalia\xE7\
            \xF5es de risco de seguran\xE7a e privacidade. As organiza\xE7\xF5es tamb\xE9\
            m podem usar outros processos relacionados que possam ter nomes diferentes,\
            \ incluindo an\xE1lises de limiar de privacidade. Uma avalia\xE7\xE3o\
            \ de impacto \xE0 privacidade tamb\xE9m pode servir como aviso ao p\xFA\
            blico a respeito das pr\xE1ticas da organiza\xE7\xE3o no que diz respeito\
            \ \xE0 privacidade. Embora a condu\xE7\xE3o e a publica\xE7\xE3o de avalia\xE7\
            \xF5es de impacto \xE0 privacidade possam ser exigidas por lei, as organiza\xE7\
            \xF5es podem desenvolver tais pol\xEDticas na aus\xEAncia de leis aplic\xE1\
            veis. Para as ag\xEAncias federais, as avalia\xE7\xF5es de impacto \xE0\
            \ privacidade podem ser exigidas pela EGOV; as ag\xEAncias devem consultar\
            \ seu alto funcion\xE1rio respons\xE1vel pela privacidade e a assessoria\
            \ jur\xEDdica sobre esse requisito e estar cientes das exce\xE7\xF5es\
            \ estatut\xE1rias e da orienta\xE7\xE3o da OMB relativas \xE0 disposi\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-9
      name: Criticality Analysis
      description: 'Identify critical system components and functions by performing
        a criticality analysis for [Assignment: organization-defined systems, system
        components, or system services] at [Assignment: organization-defined decision
        points in the system development life cycle].'
      annotation: "Not all system components, functions, or services necessarily require\
        \ significant protections. For example, criticality analysis is a key tenet\
        \ of supply chain risk management and informs the prioritization of protection\
        \ activities. The identification of critical system components and functions\
        \ considers applicable laws, executive orders, regulations, directives, policies,\
        \ standards, system functionality requirements, system and component interfaces,\
        \ and system and component dependencies. Systems engineers conduct a functional\
        \ decomposition of a system to identify mission-critical functions and components.\
        \ The functional decomposition includes the identification of organizational\
        \ missions supported by the system, decomposition into the specific functions\
        \ to perform those missions, and traceability to the hardware, software, and\
        \ firmware components that implement those functions, including when the functions\
        \ are shared by many components within and  external to the system. \nThe\
        \ operational environment of a system or a system component may impact the\
        \ criticality, including the connections to and dependencies on cyber-physical\
        \ systems, devices, system-of-systems, and outsourced IT services. System\
        \ components that allow unmediated access to critical system components or\
        \ functions are considered critical due to the inherent vulnerabilities that\
        \ such components create. Component and function criticality are assessed\
        \ in terms of the impact of a component or function failure on the organizational\
        \ missions that are supported by the system that contains the components and\
        \ functions.\nCriticality analysis is performed when an architecture or design\
        \ is being developed, modified, or upgraded. If such analysis is performed\
        \ early in the system development life cycle, organizations may be able to\
        \ modify the system design to reduce the critical nature of these components\
        \ and functions, such as by adding redundancy or alternate paths into the\
        \ system design. Criticality analysis can also influence the protection measures\
        \ required by development contractors. In addition to criticality analysis\
        \ for systems, system components, and system services, criticality analysis\
        \ of information is an important consideration. Such analysis is conducted\
        \ as part of security categorization in RA-2."
      translations:
        pt:
          name: "An\xE1lise de Criticidade"
          description: "Identificar componentes e fun\xE7\xF5es cr\xEDticas do sistema\
            \ realizando uma an\xE1lise de criticidade para [Atribui\xE7\xE3o: sistemas,\
            \ componentes de sistema ou servi\xE7os de sistema definidos pela organiza\xE7\
            \xE3o] em [Atribui\xE7\xE3o: pontos de decis\xE3o definidos pela organiza\xE7\
            \xE3o no ciclo de vida de desenvolvimento do sistema]."
          annotation: "Nem todos os componentes, fun\xE7\xF5es ou servi\xE7os do sistema\
            \ necessariamente exigem prote\xE7\xF5es significativas. Por exemplo,\
            \ a an\xE1lise de criticidade \xE9 um princ\xEDpio fundamental da gest\xE3\
            o de risco da cadeia de suprimentos e orienta a prioriza\xE7\xE3o das\
            \ atividades de prote\xE7\xE3o. A identifica\xE7\xE3o de componentes e\
            \ fun\xE7\xF5es cr\xEDticas do sistema considera leis, decretos, regulamentos,\
            \ diretivas, pol\xEDticas, normas, requisitos de funcionalidade do sistema,\
            \ interfaces de sistema e de componentes, e depend\xEAncias de sistema\
            \ e de componentes aplic\xE1veis. Os engenheiros de sistemas conduzem\
            \ uma decomposi\xE7\xE3o funcional de um sistema para identificar fun\xE7\
            \xF5es e componentes cr\xEDticos para a miss\xE3o. A decomposi\xE7\xE3\
            o funcional inclui a identifica\xE7\xE3o das miss\xF5es organizacionais\
            \ apoiadas pelo sistema, a decomposi\xE7\xE3o nas fun\xE7\xF5es espec\xED\
            ficas para desempenhar essas miss\xF5es e a rastreabilidade at\xE9 os\
            \ componentes de hardware, software e firmware que implementam essas fun\xE7\
            \xF5es, inclusive quando as fun\xE7\xF5es s\xE3o compartilhadas por muitos\
            \ componentes internos e externos ao sistema.\nO ambiente operacional\
            \ de um sistema ou de um componente de sistema pode impactar a criticidade,\
            \ incluindo as conex\xF5es com e as depend\xEAncias de sistemas ciberf\xED\
            sicos, dispositivos, sistemas de sistemas e servi\xE7os de TI terceirizados.\
            \ Componentes de sistema que permitem acesso n\xE3o mediado a componentes\
            \ ou fun\xE7\xF5es cr\xEDticas do sistema s\xE3o considerados cr\xEDticos\
            \ devido \xE0s vulnerabilidades inerentes que tais componentes criam.\
            \ A criticidade de componentes e fun\xE7\xF5es \xE9 avaliada em termos\
            \ do impacto da falha de um componente ou fun\xE7\xE3o sobre as miss\xF5\
            es organizacionais apoiadas pelo sistema que cont\xE9m os componentes\
            \ e fun\xE7\xF5es.\nA an\xE1lise de criticidade \xE9 realizada quando\
            \ uma arquitetura ou projeto est\xE1 sendo desenvolvido, modificado ou\
            \ aprimorado. Se tal an\xE1lise for realizada cedo no ciclo de vida de\
            \ desenvolvimento do sistema, as organiza\xE7\xF5es podem conseguir modificar\
            \ o projeto do sistema para reduzir a natureza cr\xEDtica desses componentes\
            \ e fun\xE7\xF5es, como, por exemplo, adicionando redund\xE2ncia ou caminhos\
            \ alternativos ao projeto do sistema. A an\xE1lise de criticidade tamb\xE9\
            m pode influenciar as medidas de prote\xE7\xE3o exigidas dos contratados\
            \ de desenvolvimento. Al\xE9m da an\xE1lise de criticidade para sistemas,\
            \ componentes de sistema e servi\xE7os de sistema, a an\xE1lise de criticidade\
            \ da informa\xE7\xE3o \xE9 uma considera\xE7\xE3o importante. Tal an\xE1\
            lise \xE9 conduzida como parte da categoriza\xE7\xE3o de seguran\xE7a\
            \ no RA-2."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ra
      ref_id: RA-10
      name: Threat Hunting
      description: 'a. Establish and maintain a cyber threat hunting capability to:

        1. Search for indicators of compromise in organizational systems; and

        2. Detect, track, and disrupt threats that evade existing controls; and

        b. Employ the threat hunting capability [Assignment: organization-defined
        frequency].'
      annotation: Threat hunting is an active means of cyber defense in contrast to
        traditional protection measures, such as firewalls, intrusion detection and
        prevention systems, quarantining malicious code in sandboxes, and Security
        Information and Event Management technologies and systems. Cyber threat hunting
        involves proactively searching organizational systems, networks, and infrastructure
        for advanced threats. The objective is to track and disrupt cyber adversaries
        as early as possible in the attack sequence and to measurably improve the
        speed and accuracy of organizational responses. Indications of compromise
        include unusual network traffic, unusual file changes, and the presence of
        malicious code. Threat hunting teams leverage existing threat intelligence
        and may create new threat intelligence, which is shared with peer organizations,
        Information Sharing and Analysis Organizations (ISAO), Information Sharing
        and Analysis Centers (ISAC), and relevant government departments and agencies.
      translations:
        pt:
          name: "Ca\xE7a a Amea\xE7as (Threat Hunting)"
          description: "a. Estabelecer e manter uma capacidade de ca\xE7a a amea\xE7\
            as cibern\xE9ticas para:\n1. Buscar indicadores de comprometimento nos\
            \ sistemas da organiza\xE7\xE3o; e\n2. Detectar, rastrear e interromper\
            \ amea\xE7as que evadem os controles existentes; e\nb. Empregar a capacidade\
            \ de ca\xE7a a amea\xE7as [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o]."
          annotation: "A ca\xE7a a amea\xE7as \xE9 um meio ativo de defesa cibern\xE9\
            tica, em contraste com as medidas de prote\xE7\xE3o tradicionais, tais\
            \ como firewalls, sistemas de detec\xE7\xE3o e preven\xE7\xE3o de intrus\xE3\
            o, quarentena de c\xF3digo malicioso em sandboxes e tecnologias e sistemas\
            \ de Gerenciamento de Informa\xE7\xF5es e Eventos de Seguran\xE7a. A ca\xE7\
            a a amea\xE7as cibern\xE9ticas envolve a busca proativa de amea\xE7as\
            \ avan\xE7adas em sistemas, redes e infraestrutura da organiza\xE7\xE3\
            o. O objetivo \xE9 rastrear e interromper os advers\xE1rios cibern\xE9\
            ticos o mais cedo poss\xEDvel na sequ\xEAncia do ataque e melhorar de\
            \ forma mensur\xE1vel a velocidade e a precis\xE3o das respostas organizacionais.\
            \ Ind\xEDcios de comprometimento incluem tr\xE1fego de rede incomum, altera\xE7\
            \xF5es incomuns de arquivos e a presen\xE7a de c\xF3digo malicioso. As\
            \ equipes de ca\xE7a a amea\xE7as aproveitam a intelig\xEAncia de amea\xE7\
            as existente e podem criar nova intelig\xEAncia de amea\xE7as, que \xE9\
            \ compartilhada com organiza\xE7\xF5es cong\xEAneres, Organiza\xE7\xF5\
            es de Compartilhamento e An\xE1lise de Informa\xE7\xF5es (ISAO), Centros\
            \ de Compartilhamento e An\xE1lise de Informa\xE7\xF5es (ISAC) e departamentos\
            \ e ag\xEAncias governamentais relevantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      assessable: false
      depth: 1
      ref_id: SA
      name: System and Services Acquisition
      translations:
        pt:
          name: "Aquisi\xE7\xE3o de Sistemas e Servi\xE7os"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] system and services acquisition policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the system and services
        acquisition policy and the associated system and services acquisition controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the system and services acquisition
        policy and procedures; and

        c. Review and update the current system and services acquisition:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: System and services acquisition policy and procedures address the
        controls in the SA family that are implemented within systems and organizations.
        The risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of system and services acquisition policy and procedures.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to system
        and services acquisition policy and procedures include assessment or audit
        findings, security incidents or breaches, or changes in laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Simply restating
        controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de aquisi\xE7\xE3o de sistemas e servi\xE7os de [Sele\xE7\xE3o (um\
            \ ou mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3\
            o/neg\xF3cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo,\
            \ fun\xE7\xF5es, responsabilidades, comprometimento da dire\xE7\xE3o,\
            \ coordena\xE7\xE3o entre entidades organizacionais e conformidade; e\n\
            (b) Seja consistente com leis, decretos, diretivas, regulamentos, pol\xED\
            ticas, normas e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de aquisi\xE7\xE3o de sistemas\
            \ e servi\xE7os e dos controles de aquisi\xE7\xE3o de sistemas e servi\xE7\
            os associados;\nb. Designar um [Atribui\xE7\xE3o: funcion\xE1rio definido\
            \ pela organiza\xE7\xE3o] para gerenciar o desenvolvimento, a documenta\xE7\
            \xE3o e a dissemina\xE7\xE3o da pol\xEDtica e dos procedimentos de aquisi\xE7\
            \xE3o de sistemas e servi\xE7os; e\nc. Revisar e atualizar a atual:\n\
            1. Pol\xEDtica de aquisi\xE7\xE3o de sistemas e servi\xE7os [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ de aquisi\xE7\xE3o de sistemas e servi\xE7os [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de aquisi\xE7\xE3o de sistemas\
            \ e servi\xE7os tratam dos controles da fam\xEDlia SA que s\xE3o implementados\
            \ dentro dos sistemas e das organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3\
            o de risco \xE9 um fator importante no estabelecimento de tais pol\xED\
            ticas e procedimentos. Pol\xEDticas e procedimentos contribuem para a\
            \ garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante que\
            \ os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de aquisi\xE7\xE3o de sistemas e\
            \ servi\xE7os. Pol\xEDticas e procedimentos de programa de seguran\xE7\
            a e privacidade no n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral,\
            \ e podem dispensar a necessidade de pol\xEDticas e procedimentos espec\xED\
            ficos de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Os procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o ou de neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Os procedimentos descrevem como as pol\xEDticas ou\
            \ os controles s\xE3o implementados e podem ser direcionados ao indiv\xED\
            duo ou \xE0 fun\xE7\xE3o que \xE9 objeto do procedimento. Os procedimentos\
            \ podem ser documentados em planos de seguran\xE7a e privacidade do sistema\
            \ ou em um ou mais documentos separados. Eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de aquisi\xE7\
            \xE3o de sistemas e servi\xE7os incluem constata\xE7\xF5es de avalia\xE7\
            \xE3o ou auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou\
            \ mudan\xE7as em leis, decretos, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes. A simples reafirma\xE7\xE3o dos controles n\xE3\
            o constitui uma pol\xEDtica ou um procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-2
      name: Allocation of Resources
      description: 'a. Determine the high-level information security and privacy requirements
        for the system or system service in mission and business process planning;

        b. Determine, document, and allocate the resources required to protect the
        system or system service as part of the organizational capital planning and
        investment control process; and

        c. Establish a discrete line item for information security and privacy in
        organizational programming and budgeting documentation.'
      annotation: Resource allocation for information security and privacy includes
        funding for system and services acquisition, sustainment, and supply chain-related
        risks throughout the system development life cycle.
      translations:
        pt:
          name: "Aloca\xE7\xE3o de Recursos"
          description: "a. Determinar os requisitos de alto n\xEDvel de seguran\xE7\
            a da informa\xE7\xE3o e privacidade para o sistema ou servi\xE7o de sistema\
            \ no planejamento de processos de miss\xE3o e de neg\xF3cio;\nb. Determinar,\
            \ documentar e alocar os recursos necess\xE1rios para proteger o sistema\
            \ ou servi\xE7o de sistema como parte do processo organizacional de planejamento\
            \ de capital e controle de investimentos; e\nc. Estabelecer um item de\
            \ linha distinto para seguran\xE7a da informa\xE7\xE3o e privacidade na\
            \ documenta\xE7\xE3o organizacional de programa\xE7\xE3o e or\xE7amento."
          annotation: "A aloca\xE7\xE3o de recursos para seguran\xE7a da informa\xE7\
            \xE3o e privacidade inclui o financiamento para aquisi\xE7\xE3o, sustenta\xE7\
            \xE3o e riscos relacionados \xE0 cadeia de suprimentos de sistemas e servi\xE7\
            os ao longo de todo o ciclo de vida de desenvolvimento do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-3
      name: System Development Life Cycle
      description: 'a. Acquire, develop, and manage the system using [Assignment:
        organization-defined system development life cycle] that incorporates information
        security and privacy considerations;

        b. Define and document information security and privacy roles and responsibilities
        throughout the system development life cycle;

        c. Identify individuals having information security and privacy roles and
        responsibilities; and

        d. Integrate the organizational information security and privacy risk management
        process into system development life cycle activities.'
      annotation: "A system development life cycle process provides the foundation\
        \ for the successful development, implementation, and operation of organizational\
        \ systems. The integration of security and privacy considerations early in\
        \ the system development life cycle is a foundational principle of systems\
        \ security engineering and privacy engineering. To apply the required controls\
        \ within the system development life cycle requires a basic understanding\
        \ of information security and privacy, threats, vulnerabilities, adverse impacts,\
        \ and risk to critical mission and business functions. The security engineering\
        \ principles in SA-8 help individuals properly design, code, and test systems\
        \ and system components. Organizations include qualified personnel (e.g.,\
        \ senior agency information security officers, senior agency officials for\
        \ privacy, security and privacy architects, and security and privacy engineers)\
        \ in system development life cycle processes to ensure that established security\
        \ and privacy requirements are incorporated into organizational systems. Role-based\
        \ security and privacy training programs can ensure that individuals with\
        \ key security and privacy roles and responsibilities have the experience,\
        \ skills, and expertise to conduct assigned system development life cycle\
        \ activities. \nThe effective integration of security and privacy requirements\
        \ into enterprise architecture also helps to ensure that important security\
        \ and privacy considerations are addressed throughout the system life cycle\
        \ and that those considerations are directly related to organizational mission\
        \ and business processes. This process also facilitates the integration of\
        \ the information security and privacy architectures into the enterprise architecture,\
        \ consistent with the risk management strategy of the organization. Because\
        \ the system development life cycle involves multiple organizations, (e.g.,\
        \ external suppliers, developers, integrators, service providers), acquisition\
        \ and supply chain risk management functions and controls play significant\
        \ roles in the effective management of the system during the life cycle."
      translations:
        pt:
          name: Ciclo de Vida de Desenvolvimento do Sistema
          description: "a. Adquirir, desenvolver e gerenciar o sistema usando [Atribui\xE7\
            \xE3o: ciclo de vida de desenvolvimento do sistema definido pela organiza\xE7\
            \xE3o] que incorpore considera\xE7\xF5es de seguran\xE7a da informa\xE7\
            \xE3o e privacidade;\nb. Definir e documentar fun\xE7\xF5es e responsabilidades\
            \ de seguran\xE7a da informa\xE7\xE3o e privacidade ao longo de todo o\
            \ ciclo de vida de desenvolvimento do sistema;\nc. Identificar indiv\xED\
            duos que possuam fun\xE7\xF5es e responsabilidades de seguran\xE7a da\
            \ informa\xE7\xE3o e privacidade; e\nd. Integrar o processo organizacional\
            \ de gest\xE3o de risco de seguran\xE7a da informa\xE7\xE3o e privacidade\
            \ \xE0s atividades do ciclo de vida de desenvolvimento do sistema."
          annotation: "Um processo de ciclo de vida de desenvolvimento do sistema\
            \ fornece a base para o desenvolvimento, a implementa\xE7\xE3o e a opera\xE7\
            \xE3o bem-sucedidos dos sistemas organizacionais. A integra\xE7\xE3o de\
            \ considera\xE7\xF5es de seguran\xE7a e privacidade cedo no ciclo de vida\
            \ de desenvolvimento do sistema \xE9 um princ\xEDpio fundamental da engenharia\
            \ de seguran\xE7a de sistemas e da engenharia de privacidade. Para aplicar\
            \ os controles exigidos dentro do ciclo de vida de desenvolvimento do\
            \ sistema \xE9 necess\xE1rio um entendimento b\xE1sico de seguran\xE7\
            a da informa\xE7\xE3o e privacidade, amea\xE7as, vulnerabilidades, impactos\
            \ adversos e risco para fun\xE7\xF5es cr\xEDticas de miss\xE3o e de neg\xF3\
            cio. Os princ\xEDpios de engenharia de seguran\xE7a no SA-8 ajudam os\
            \ indiv\xEDduos a projetar, codificar e testar adequadamente sistemas\
            \ e componentes de sistema. As organiza\xE7\xF5es incluem pessoal qualificado\
            \ (por exemplo, altos funcion\xE1rios de seguran\xE7a da informa\xE7\xE3\
            o da ag\xEAncia, altos funcion\xE1rios da ag\xEAncia respons\xE1veis pela\
            \ privacidade, arquitetos de seguran\xE7a e privacidade e engenheiros\
            \ de seguran\xE7a e privacidade) nos processos do ciclo de vida de desenvolvimento\
            \ do sistema para assegurar que os requisitos de seguran\xE7a e privacidade\
            \ estabelecidos sejam incorporados aos sistemas organizacionais. Programas\
            \ de treinamento de seguran\xE7a e privacidade baseados em fun\xE7\xF5\
            es podem assegurar que os indiv\xEDduos com fun\xE7\xF5es e responsabilidades-chave\
            \ de seguran\xE7a e privacidade tenham a experi\xEAncia, as habilidades\
            \ e a especializa\xE7\xE3o para conduzir as atividades atribu\xEDdas do\
            \ ciclo de vida de desenvolvimento do sistema.\nA integra\xE7\xE3o eficaz\
            \ dos requisitos de seguran\xE7a e privacidade \xE0 arquitetura corporativa\
            \ tamb\xE9m ajuda a assegurar que considera\xE7\xF5es importantes de seguran\xE7\
            a e privacidade sejam tratadas ao longo de todo o ciclo de vida do sistema\
            \ e que essas considera\xE7\xF5es estejam diretamente relacionadas aos\
            \ processos organizacionais de miss\xE3o e de neg\xF3cio. Esse processo\
            \ tamb\xE9m facilita a integra\xE7\xE3o das arquiteturas de seguran\xE7\
            a da informa\xE7\xE3o e privacidade \xE0 arquitetura corporativa, de forma\
            \ consistente com a estrat\xE9gia de gest\xE3o de risco da organiza\xE7\
            \xE3o. Como o ciclo de vida de desenvolvimento do sistema envolve m\xFA\
            ltiplas organiza\xE7\xF5es (por exemplo, fornecedores externos, desenvolvedores,\
            \ integradores, prestadores de servi\xE7os), as fun\xE7\xF5es e os controles\
            \ de gest\xE3o de risco de aquisi\xE7\xE3o e da cadeia de suprimentos\
            \ desempenham pap\xE9is significativos na gest\xE3o eficaz do sistema\
            \ durante o ciclo de vida."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-3(1)
      name: System Development Life Cycle | Manage Preproduction Environment
      description: Protect system preproduction environments commensurate with risk
        throughout the system development life cycle for the system, system component,
        or system service.
      annotation: The preproduction environment includes development, test, and integration
        environments. The program protection planning processes established by the
        Department of Defense are examples of managing the preproduction environment
        for defense contractors. Criticality analysis and the application of controls
        on developers also contribute to a more secure system development environment.
      translations:
        pt:
          name: "Ciclo de Vida de Desenvolvimento do Sistema | Gerenciar Ambiente\
            \ de Pr\xE9-Produ\xE7\xE3o"
          description: "Proteger os ambientes de pr\xE9-produ\xE7\xE3o do sistema\
            \ de forma proporcional ao risco ao longo de todo o ciclo de vida de desenvolvimento\
            \ do sistema, componente de sistema ou servi\xE7o de sistema."
          annotation: "O ambiente de pr\xE9-produ\xE7\xE3o inclui os ambientes de\
            \ desenvolvimento, teste e integra\xE7\xE3o. Os processos de planejamento\
            \ de prote\xE7\xE3o de programa estabelecidos pelo Departamento de Defesa\
            \ s\xE3o exemplos de gest\xE3o do ambiente de pr\xE9-produ\xE7\xE3o para\
            \ contratados de defesa. A an\xE1lise de criticidade e a aplica\xE7\xE3\
            o de controles sobre os desenvolvedores tamb\xE9m contribuem para um ambiente\
            \ de desenvolvimento de sistema mais seguro."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-3(2)
      name: System Development Life Cycle | Use of Live or Operational Data
      description: '(a) Approve, document, and control the use of live data in preproduction
        environments for the system, system component, or system service; and

        (b) Protect preproduction environments for the system, system component, or
        system service at the same impact or classification level as any live data
        in use within the preproduction environments.'
      annotation: Live data is also referred to as operational data. The use of live
        or operational data in preproduction (i.e., development, test, and integration)
        environments can result in significant risks to organizations. In addition,
        the use of personally identifiable information in testing, research, and training
        increases the risk of unauthorized disclosure or misuse of such information.
        Therefore, it is important for the organization to manage any additional risks
        that may result from the use of live or operational data. Organizations can
        minimize such risks by using test or dummy data during the design, development,
        and testing of systems, system components, and system services. Risk assessment
        techniques may be used to determine if the risk of using live or operational
        data is acceptable.
      translations:
        pt:
          name: Ciclo de Vida de Desenvolvimento do Sistema | Uso de Dados Reais ou
            Operacionais
          description: "(a) Aprovar, documentar e controlar o uso de dados reais em\
            \ ambientes de pr\xE9-produ\xE7\xE3o para o sistema, componente de sistema\
            \ ou servi\xE7o de sistema; e\n(b) Proteger os ambientes de pr\xE9-produ\xE7\
            \xE3o do sistema, componente de sistema ou servi\xE7o de sistema no mesmo\
            \ n\xEDvel de impacto ou de classifica\xE7\xE3o que quaisquer dados reais\
            \ em uso dentro dos ambientes de pr\xE9-produ\xE7\xE3o."
          annotation: "Dados reais tamb\xE9m s\xE3o referidos como dados operacionais.\
            \ O uso de dados reais ou operacionais em ambientes de pr\xE9-produ\xE7\
            \xE3o (ou seja, de desenvolvimento, teste e integra\xE7\xE3o) pode resultar\
            \ em riscos significativos para as organiza\xE7\xF5es. Al\xE9m disso,\
            \ o uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal em testes,\
            \ pesquisas e treinamentos aumenta o risco de divulga\xE7\xE3o n\xE3o\
            \ autorizada ou uso indevido de tais informa\xE7\xF5es. Portanto, \xE9\
            \ importante que a organiza\xE7\xE3o gerencie quaisquer riscos adicionais\
            \ que possam resultar do uso de dados reais ou operacionais. As organiza\xE7\
            \xF5es podem minimizar tais riscos usando dados de teste ou fict\xEDcios\
            \ durante o projeto, o desenvolvimento e o teste de sistemas, componentes\
            \ de sistema e servi\xE7os de sistema. T\xE9cnicas de avalia\xE7\xE3o\
            \ de risco podem ser usadas para determinar se o risco de usar dados reais\
            \ ou operacionais \xE9 aceit\xE1vel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-3(3)
      name: System Development Life Cycle | Technology Refresh
      description: Plan for and implement a technology refresh schedule for the system
        throughout the system development life cycle.
      annotation: Technology refresh planning may encompass hardware, software, firmware,
        processes, personnel skill sets, suppliers, service providers, and facilities.
        The use of obsolete or nearing obsolete technology may increase the security
        and privacy risks associated with unsupported components, counterfeit or repurposed
        components, components unable to implement security or privacy requirements,
        slow or inoperable components, components from untrusted sources, inadvertent
        personnel error, or increased complexity. Technology refreshes typically occur
        during the operations and maintenance stage of the system development life
        cycle.
      translations:
        pt:
          name: "Ciclo de Vida de Desenvolvimento do Sistema | Atualiza\xE7\xE3o Tecnol\xF3\
            gica"
          description: "Planejar e implementar um cronograma de atualiza\xE7\xE3o\
            \ tecnol\xF3gica para o sistema ao longo de todo o ciclo de vida de desenvolvimento\
            \ do sistema."
          annotation: "O planejamento de atualiza\xE7\xE3o tecnol\xF3gica pode abranger\
            \ hardware, software, firmware, processos, conjuntos de compet\xEAncias\
            \ do pessoal, fornecedores, prestadores de servi\xE7os e instala\xE7\xF5\
            es. O uso de tecnologia obsoleta ou pr\xF3xima da obsolesc\xEAncia pode\
            \ aumentar os riscos de seguran\xE7a e privacidade associados a componentes\
            \ sem suporte, componentes falsificados ou reaproveitados, componentes\
            \ incapazes de implementar requisitos de seguran\xE7a ou privacidade,\
            \ componentes lentos ou inoperantes, componentes de fontes n\xE3o confi\xE1\
            veis, erro inadvertido de pessoal ou maior complexidade. As atualiza\xE7\
            \xF5es tecnol\xF3gicas normalmente ocorrem durante o est\xE1gio de opera\xE7\
            \xF5es e manuten\xE7\xE3o do ciclo de vida de desenvolvimento do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4
      name: Acquisition Process
      description: 'Include the following requirements, descriptions, and criteria,
        explicitly or by reference, using [Selection (one or more): standardized contract
        language; [Assignment: organization-defined contract language]] in the acquisition
        contract for the system, system component, or system service:

        a. Security and privacy functional requirements;

        b. Strength of mechanism requirements;

        c. Security and privacy assurance requirements;

        d. Controls needed to satisfy the security and privacy requirements.

        e. Security and privacy documentation requirements;

        f. Requirements for protecting security and privacy documentation;

        g. Description of the system development environment and environment in which
        the system is intended to operate;

        h. Allocation of responsibility or identification of parties responsible for
        information security, privacy, and supply chain risk management; and

        i. Acceptance criteria.'
      annotation: 'Security and privacy functional requirements are typically derived
        from the high-level security and privacy requirements described in SA-2. The
        derived requirements include security and privacy capabilities, functions,
        and mechanisms. Strength requirements associated with such capabilities, functions,
        and mechanisms include degree of correctness, completeness, resistance to
        tampering or bypass, and resistance to direct attack. Assurance requirements
        include development processes, procedures, and methodologies as well as the
        evidence from development and assessment activities that provide grounds for
        confidence that the required functionality is implemented and possesses the
        required strength of mechanism. SP 800-160-1 describes the process of requirements
        engineering as part of the system development life cycle.

        Controls can be viewed as descriptions of the safeguards and protection capabilities
        appropriate for achieving the particular security and privacy objectives of
        the organization and for reflecting the security and privacy requirements
        of stakeholders. Controls are selected and implemented in order to satisfy
        system requirements and include developer and organizational responsibilities.
        Controls can include technical, administrative, and physical aspects. In some
        cases, the selection and implementation of a control may necessitate additional
        specification by the organization in the form of derived requirements or instantiated
        control parameter values. The derived requirements and control parameter values
        may be necessary to provide the appropriate level of implementation detail
        for controls within the system development life cycle.

        Security and privacy documentation requirements address all stages of the
        system development life cycle. Documentation provides user and administrator
        guidance for the implementation and operation of controls. The level of detail
        required in such documentation is based on the security categorization or
        classification level of the system and the degree to which organizations depend
        on the capabilities, functions, or mechanisms to meet risk response expectations.
        Requirements can include mandated configuration settings that specify allowed
        functions, ports, protocols, and services. Acceptance criteria for systems,
        system components, and system services are defined in the same manner as the
        criteria for any organizational acquisition or procurement.'
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o"
          description: "Incluir os seguintes requisitos, descri\xE7\xF5es e crit\xE9\
            rios, de forma expl\xEDcita ou por refer\xEAncia, utilizando [Sele\xE7\
            \xE3o (um ou mais): linguagem contratual padronizada; [Atribui\xE7\xE3\
            o: linguagem contratual definida pela organiza\xE7\xE3o]] no contrato\
            \ de aquisi\xE7\xE3o do sistema, componente de sistema ou servi\xE7o de\
            \ sistema:\na. Requisitos funcionais de seguran\xE7a e privacidade;\n\
            b. Requisitos de robustez do mecanismo;\nc. Requisitos de garantia (assurance)\
            \ de seguran\xE7a e privacidade;\nd. Controles necess\xE1rios para satisfazer\
            \ os requisitos de seguran\xE7a e privacidade.\ne. Requisitos de documenta\xE7\
            \xE3o de seguran\xE7a e privacidade;\nf. Requisitos para proteger a documenta\xE7\
            \xE3o de seguran\xE7a e privacidade;\ng. Descri\xE7\xE3o do ambiente de\
            \ desenvolvimento do sistema e do ambiente no qual o sistema se destina\
            \ a operar;\nh. Atribui\xE7\xE3o de responsabilidade ou identifica\xE7\
            \xE3o das partes respons\xE1veis pela seguran\xE7a da informa\xE7\xE3\
            o, privacidade e gest\xE3o de riscos da cadeia de suprimentos; e\ni. Crit\xE9\
            rios de aceita\xE7\xE3o."
          annotation: "Os requisitos funcionais de seguran\xE7a e privacidade s\xE3\
            o tipicamente derivados dos requisitos de alto n\xEDvel de seguran\xE7\
            a e privacidade descritos em SA-2. Os requisitos derivados incluem capacidades,\
            \ fun\xE7\xF5es e mecanismos de seguran\xE7a e privacidade. Os requisitos\
            \ de robustez associados a tais capacidades, fun\xE7\xF5es e mecanismos\
            \ incluem grau de corre\xE7\xE3o, completude, resist\xEAncia \xE0 adultera\xE7\
            \xE3o ou contorno, e resist\xEAncia a ataque direto. Os requisitos de\
            \ garantia (assurance) incluem processos, procedimentos e metodologias\
            \ de desenvolvimento, bem como as evid\xEAncias das atividades de desenvolvimento\
            \ e avalia\xE7\xE3o que fornecem fundamento para a confian\xE7a de que\
            \ a funcionalidade requerida est\xE1 implementada e possui a robustez\
            \ de mecanismo exigida. A SP 800-160-1 descreve o processo de engenharia\
            \ de requisitos como parte do ciclo de vida de desenvolvimento do sistema.\n\
            Os controles podem ser vistos como descri\xE7\xF5es das salvaguardas e\
            \ capacidades de prote\xE7\xE3o apropriadas para alcan\xE7ar os objetivos\
            \ espec\xEDficos de seguran\xE7a e privacidade da organiza\xE7\xE3o e\
            \ para refletir os requisitos de seguran\xE7a e privacidade das partes\
            \ interessadas. Os controles s\xE3o selecionados e implementados a fim\
            \ de satisfazer os requisitos do sistema e incluem responsabilidades do\
            \ desenvolvedor e da organiza\xE7\xE3o. Os controles podem incluir aspectos\
            \ t\xE9cnicos, administrativos e f\xEDsicos. Em alguns casos, a sele\xE7\
            \xE3o e a implementa\xE7\xE3o de um controle podem exigir especifica\xE7\
            \xE3o adicional por parte da organiza\xE7\xE3o, na forma de requisitos\
            \ derivados ou de valores instanciados de par\xE2metros de controle. Os\
            \ requisitos derivados e os valores de par\xE2metros de controle podem\
            \ ser necess\xE1rios para fornecer o n\xEDvel apropriado de detalhe de\
            \ implementa\xE7\xE3o dos controles no ciclo de vida de desenvolvimento\
            \ do sistema.\nOs requisitos de documenta\xE7\xE3o de seguran\xE7a e privacidade\
            \ abordam todas as etapas do ciclo de vida de desenvolvimento do sistema.\
            \ A documenta\xE7\xE3o fornece orienta\xE7\xE3o para usu\xE1rios e administradores\
            \ quanto \xE0 implementa\xE7\xE3o e opera\xE7\xE3o dos controles. O n\xED\
            vel de detalhe exigido nessa documenta\xE7\xE3o baseia-se na categoriza\xE7\
            \xE3o de seguran\xE7a ou no n\xEDvel de classifica\xE7\xE3o do sistema\
            \ e no grau em que as organiza\xE7\xF5es dependem das capacidades, fun\xE7\
            \xF5es ou mecanismos para atender \xE0s expectativas de resposta a riscos.\
            \ Os requisitos podem incluir defini\xE7\xF5es de configura\xE7\xE3o obrigat\xF3\
            rias que especificam fun\xE7\xF5es, portas, protocolos e servi\xE7os permitidos.\
            \ Os crit\xE9rios de aceita\xE7\xE3o de sistemas, componentes de sistema\
            \ e servi\xE7os de sistema s\xE3o definidos da mesma forma que os crit\xE9\
            rios para qualquer aquisi\xE7\xE3o ou contrata\xE7\xE3o organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(1)
      name: Acquisition Process | Functional Properties of Controls
      description: Require the developer of the system, system component, or system
        service to provide a description of the functional properties of the controls
        to be implemented.
      annotation: Functional properties of security and privacy controls describe
        the functionality (i.e., security or privacy capability, functions, or mechanisms)
        visible at the interfaces of the controls and specifically exclude functionality
        and data structures internal to the operation of the controls.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Propriedades Funcionais dos Controles"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema forne\xE7a uma descri\xE7\xE3o das propriedades\
            \ funcionais dos controles a serem implementados."
          annotation: "As propriedades funcionais dos controles de seguran\xE7a e\
            \ privacidade descrevem a funcionalidade (isto \xE9, capacidade, fun\xE7\
            \xF5es ou mecanismos de seguran\xE7a ou privacidade) vis\xEDvel nas interfaces\
            \ dos controles e excluem especificamente a funcionalidade e as estruturas\
            \ de dados internas \xE0 opera\xE7\xE3o dos controles."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(2)
      name: Acquisition Process | Design and Implementation Information for Controls
      description: 'Require the developer of the system, system component, or system
        service to provide design and implementation information for the controls
        that includes: [Selection (one or more): security-relevant external system
        interfaces; high-level design; low-level design; source code or hardware schematics;
        [Assignment: organization-defined design and implementation information]]
        at [Assignment: organization-defined level of detail].'
      annotation: Organizations may require different levels of detail in the documentation
        for the design and implementation of controls in organizational systems, system
        components, or system services based on mission and business requirements,
        requirements for resiliency and trustworthiness, and requirements for analysis
        and testing. Systems can be partitioned into multiple subsystems. Each subsystem
        within the system can contain one or more modules. The high-level design for
        the system is expressed in terms of subsystems and the interfaces between
        subsystems providing security-relevant functionality. The low-level design
        for the system is expressed in terms of modules and the interfaces between
        modules providing security-relevant functionality. Design and implementation
        documentation can include manufacturer, version, serial number, verification
        hash signature, software libraries used, date of purchase or download, and
        the vendor or download source. Source code and hardware schematics are referred
        to as the implementation representation of the system.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Informa\xE7\xF5es de Projeto e Implementa\xE7\
            \xE3o dos Controles"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema forne\xE7a informa\xE7\xF5es de projeto e implementa\xE7\
            \xE3o dos controles que incluam: [Sele\xE7\xE3o (um ou mais): interfaces\
            \ externas do sistema relevantes para seguran\xE7a; projeto de alto n\xED\
            vel; projeto de baixo n\xEDvel; c\xF3digo-fonte ou esquemas de hardware;\
            \ [Atribui\xE7\xE3o: informa\xE7\xF5es de projeto e implementa\xE7\xE3\
            o definidas pela organiza\xE7\xE3o]] em [Atribui\xE7\xE3o: n\xEDvel de\
            \ detalhe definido pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem exigir diferentes n\xEDveis de\
            \ detalhe na documenta\xE7\xE3o do projeto e da implementa\xE7\xE3o dos\
            \ controles em sistemas organizacionais, componentes de sistema ou servi\xE7\
            os de sistema, com base em requisitos de miss\xE3o e de neg\xF3cio, requisitos\
            \ de resili\xEAncia e confiabilidade, e requisitos de an\xE1lise e teste.\
            \ Os sistemas podem ser particionados em m\xFAltiplos subsistemas. Cada\
            \ subsistema dentro do sistema pode conter um ou mais m\xF3dulos. O projeto\
            \ de alto n\xEDvel do sistema \xE9 expresso em termos de subsistemas e\
            \ das interfaces entre subsistemas que fornecem funcionalidade relevante\
            \ para a seguran\xE7a. O projeto de baixo n\xEDvel do sistema \xE9 expresso\
            \ em termos de m\xF3dulos e das interfaces entre m\xF3dulos que fornecem\
            \ funcionalidade relevante para a seguran\xE7a. A documenta\xE7\xE3o de\
            \ projeto e implementa\xE7\xE3o pode incluir fabricante, vers\xE3o, n\xFA\
            mero de s\xE9rie, assinatura de hash de verifica\xE7\xE3o, bibliotecas\
            \ de software utilizadas, data de compra ou download, e o fornecedor ou\
            \ a fonte de download. O c\xF3digo-fonte e os esquemas de hardware s\xE3\
            o referidos como a representa\xE7\xE3o de implementa\xE7\xE3o do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(3)
      name: Acquisition Process | Development Methods, Techniques, and Practices
      description: 'Require the developer of the system, system component, or system
        service to demonstrate the use of a system development life cycle process
        that includes:

        (a) [Assignment: organization-defined systems engineering methods];

        (b) <assign:#>organization-defined [Selection (one or more): systems security;
        privacy<#:assign> engineering methods]; and

        (c) [Assignment: organization-defined software development methods; testing,
        evaluation, assessment, verification, and validation methods; and quality
        control processes].'
      annotation: Following a system development life cycle that includes state-of-the-practice
        software development methods, systems engineering methods, systems security
        and privacy engineering methods, and quality control processes helps to reduce
        the number and severity of latent errors within systems, system components,
        and system services. Reducing the number and severity of such errors reduces
        the number of vulnerabilities in those systems, components, and services.
        Transparency in the methods and techniques that developers select and implement
        for systems engineering, systems security and privacy engineering, software
        development, component and system assessments, and quality control processes
        provides an increased level of assurance in the trustworthiness of the system,
        system component, or system service being acquired.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | M\xE9todos, T\xE9cnicas e Pr\xE1ticas\
            \ de Desenvolvimento"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema demonstre o uso de um processo de ciclo de\
            \ vida de desenvolvimento do sistema que inclua:\n(a) [Atribui\xE7\xE3\
            o: m\xE9todos de engenharia de sistemas definidos pela organiza\xE7\xE3\
            o];\n(b) <assign:#>m\xE9todos de engenharia de [Sele\xE7\xE3o (um ou mais):\
            \ seguran\xE7a de sistemas; privacidade<#:assign>] definidos pela organiza\xE7\
            \xE3o; e\n(c) [Atribui\xE7\xE3o: m\xE9todos de desenvolvimento de software;\
            \ m\xE9todos de teste, avalia\xE7\xE3o, aprecia\xE7\xE3o, verifica\xE7\
            \xE3o e valida\xE7\xE3o; e processos de controle de qualidade definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Seguir um ciclo de vida de desenvolvimento do sistema que inclua\
            \ m\xE9todos de desenvolvimento de software, m\xE9todos de engenharia\
            \ de sistemas, m\xE9todos de engenharia de seguran\xE7a e privacidade\
            \ de sistemas e processos de controle de qualidade no estado da pr\xE1\
            tica ajuda a reduzir o n\xFAmero e a gravidade dos erros latentes nos\
            \ sistemas, componentes de sistema e servi\xE7os de sistema. Reduzir o\
            \ n\xFAmero e a gravidade desses erros reduz o n\xFAmero de vulnerabilidades\
            \ nesses sistemas, componentes e servi\xE7os. A transpar\xEAncia nos m\xE9\
            todos e t\xE9cnicas que os desenvolvedores selecionam e implementam para\
            \ a engenharia de sistemas, engenharia de seguran\xE7a e privacidade de\
            \ sistemas, desenvolvimento de software, avalia\xE7\xF5es de componentes\
            \ e sistemas e processos de controle de qualidade proporciona um n\xED\
            vel maior de garantia (assurance) na confiabilidade do sistema, componente\
            \ de sistema ou servi\xE7o de sistema sendo adquirido."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-12
      name: Supply Chain Protection
      description: '[Withdrawn: Incorporated into SR Family.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o da Cadeia de Suprimentos"
          description: "[Retirado: Incorporado \xE0 Fam\xEDlia SR.]"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(5)
      name: Acquisition Process | System, Component, and Service Configurations
      description: 'Require the developer of the system, system component, or system
        service to:

        (a) Deliver the system, component, or service with [Assignment: organization-defined
        security configurations] implemented; and

        (b) Use the configurations as the default for any subsequent system, component,
        or service reinstallation or upgrade.'
      annotation: Examples of security configurations include the U.S. Government
        Configuration Baseline (USGCB), Security Technical Implementation Guides (STIGs),
        and any limitations on functions, ports, protocols, and services. Security
        characteristics can include requiring that default passwords have been changed.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Configura\xE7\xF5es de Sistema, Componente\
            \ e Servi\xE7o"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema:\n(a) Entregue o sistema, componente ou servi\xE7\
            o com [Atribui\xE7\xE3o: configura\xE7\xF5es de seguran\xE7a definidas\
            \ pela organiza\xE7\xE3o] implementadas; e\n(b) Utilize essas configura\xE7\
            \xF5es como padr\xE3o para qualquer reinstala\xE7\xE3o ou atualiza\xE7\
            \xE3o subsequente do sistema, componente ou servi\xE7o."
          annotation: "Exemplos de configura\xE7\xF5es de seguran\xE7a incluem o U.S.\
            \ Government Configuration Baseline (USGCB), os Security Technical Implementation\
            \ Guides (STIGs) e quaisquer limita\xE7\xF5es de fun\xE7\xF5es, portas,\
            \ protocolos e servi\xE7os. As caracter\xEDsticas de seguran\xE7a podem\
            \ incluir a exig\xEAncia de que as senhas padr\xE3o tenham sido alteradas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(6)
      name: Acquisition Process | Use of Information Assurance Products
      description: '(a) Employ only government off-the-shelf or commercial off-the-shelf
        information assurance and information assurance-enabled information technology
        products that compose an NSA-approved solution to protect classified information
        when the networks used to transmit the information are at a lower classification
        level than the information being transmitted; and

        (b) Ensure that these products have been evaluated and/or validated by NSA
        or in accordance with NSA-approved procedures.'
      annotation: Commercial off-the-shelf IA or IA-enabled information technology
        products used to protect classified information by cryptographic means may
        be required to use NSA-approved key management. See NSA CSFC.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Uso de Produtos de Garantia da Informa\xE7\
            \xE3o"
          description: "(a) Empregar somente produtos de tecnologia da informa\xE7\
            \xE3o, comerciais de prateleira (commercial off-the-shelf) ou governamentais\
            \ de prateleira (government off-the-shelf), de garantia da informa\xE7\
            \xE3o e habilitados para garantia da informa\xE7\xE3o, que componham uma\
            \ solu\xE7\xE3o aprovada pela NSA para proteger informa\xE7\xF5es classificadas\
            \ quando as redes utilizadas para transmitir as informa\xE7\xF5es estiverem\
            \ em um n\xEDvel de classifica\xE7\xE3o inferior ao das informa\xE7\xF5\
            es sendo transmitidas; e\n(b) Assegurar que esses produtos tenham sido\
            \ avaliados e/ou validados pela NSA ou de acordo com procedimentos aprovados\
            \ pela NSA."
          annotation: "Produtos de tecnologia da informa\xE7\xE3o de garantia da informa\xE7\
            \xE3o (IA) ou habilitados para garantia da informa\xE7\xE3o (IA-enabled)\
            \ comerciais de prateleira, utilizados para proteger informa\xE7\xF5es\
            \ classificadas por meios criptogr\xE1ficos, podem ser obrigados a usar\
            \ gest\xE3o de chaves aprovada pela NSA. Consulte NSA CSFC."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(7)
      name: Acquisition Process | NIAP-approved Protection Profiles
      description: '(a) Limit the use of commercially provided information assurance
        and information assurance-enabled information technology products to those
        products that have been successfully evaluated against a National Information
        Assurance partnership (NIAP)-approved Protection Profile for a specific technology
        type, if such a profile exists; and

        (b) Require, if no NIAP-approved Protection Profile exists for a specific
        technology type but a commercially provided information technology product
        relies on cryptographic functionality to enforce its security policy, that
        the cryptographic module is FIPS-validated or NSA-approved.'
      annotation: See NIAP CCEVS for additional information on NIAP. See NIST CMVP
        for additional information on FIPS-validated cryptographic modules.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Perfis de Prote\xE7\xE3o Aprovados\
            \ pelo NIAP"
          description: "(a) Limitar o uso de produtos de tecnologia da informa\xE7\
            \xE3o de garantia da informa\xE7\xE3o e habilitados para garantia da informa\xE7\
            \xE3o fornecidos comercialmente \xE0queles produtos que tenham sido avaliados\
            \ com sucesso em rela\xE7\xE3o a um Perfil de Prote\xE7\xE3o (Protection\
            \ Profile) aprovado pelo National Information Assurance Partnership (NIAP)\
            \ para um tipo espec\xEDfico de tecnologia, caso tal perfil exista; e\n\
            (b) Exigir, caso n\xE3o exista um Perfil de Prote\xE7\xE3o aprovado pelo\
            \ NIAP para um tipo espec\xEDfico de tecnologia, mas um produto de tecnologia\
            \ da informa\xE7\xE3o fornecido comercialmente dependa de funcionalidade\
            \ criptogr\xE1fica para impor sua pol\xEDtica de seguran\xE7a, que o m\xF3\
            dulo criptogr\xE1fico seja validado pelo FIPS ou aprovado pela NSA."
          annotation: "Consulte NIAP CCEVS para informa\xE7\xF5es adicionais sobre\
            \ o NIAP. Consulte NIST CMVP para informa\xE7\xF5es adicionais sobre m\xF3\
            dulos criptogr\xE1ficos validados pelo FIPS."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(8)
      name: Acquisition Process | Continuous Monitoring Plan for Controls
      description: Require the developer of the system, system component, or system
        service to produce a plan for continuous monitoring of control effectiveness
        that is consistent with the continuous monitoring program of the organization.
      annotation: The objective of continuous monitoring plans is to determine if
        the planned, required, and deployed controls within the system, system component,
        or system service continue to be effective over time based on the inevitable
        changes that occur. Developer continuous monitoring plans include a sufficient
        level of detail such that the information can be incorporated into continuous
        monitoring programs implemented by organizations. Continuous monitoring plans
        can include the types of control assessment and monitoring activities planned,
        frequency of control monitoring, and actions to be taken when controls fail
        or become ineffective.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Plano de Monitoramento Cont\xEDnuo\
            \ dos Controles"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema elabore um plano de monitoramento cont\xED\
            nuo da efic\xE1cia dos controles que seja consistente com o programa de\
            \ monitoramento cont\xEDnuo da organiza\xE7\xE3o."
          annotation: "O objetivo dos planos de monitoramento cont\xEDnuo \xE9 determinar\
            \ se os controles planejados, exigidos e implantados no sistema, componente\
            \ de sistema ou servi\xE7o de sistema continuam a ser eficazes ao longo\
            \ do tempo, com base nas mudan\xE7as inevit\xE1veis que ocorrem. Os planos\
            \ de monitoramento cont\xEDnuo do desenvolvedor incluem um n\xEDvel suficiente\
            \ de detalhe, de modo que as informa\xE7\xF5es possam ser incorporadas\
            \ aos programas de monitoramento cont\xEDnuo implementados pelas organiza\xE7\
            \xF5es. Os planos de monitoramento cont\xEDnuo podem incluir os tipos\
            \ de avalia\xE7\xE3o de controles e atividades de monitoramento planejadas,\
            \ a frequ\xEAncia do monitoramento de controles e as a\xE7\xF5es a serem\
            \ tomadas quando os controles falham ou se tornam ineficazes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(9)
      name: Acquisition Process | Functions, Ports, Protocols, and Services in Use
      description: Require the developer of the system, system component, or system
        service to identify the functions, ports, protocols, and services intended
        for organizational use.
      annotation: The identification of functions, ports, protocols, and services
        early in the system development life cycle (e.g., during the initial requirements
        definition and design stages) allows organizations to influence the design
        of the system, system component, or system service. This early involvement
        in the system development life cycle helps organizations avoid or minimize
        the use of functions, ports, protocols, or services that pose unnecessarily
        high risks and understand the trade-offs involved in blocking specific ports,
        protocols, or services or requiring system service providers to do so. Early
        identification of functions, ports, protocols, and services avoids costly
        retrofitting of controls after the system, component, or system service has
        been implemented. SA-9 describes the requirements for external system services.
        Organizations identify which functions, ports, protocols, and services are
        provided from external sources.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Fun\xE7\xF5es, Portas, Protocolos e\
            \ Servi\xE7os em Uso"
          description: "Exigir que o desenvolvedor do sistema, componente de sistema\
            \ ou servi\xE7o de sistema identifique as fun\xE7\xF5es, portas, protocolos\
            \ e servi\xE7os destinados ao uso organizacional."
          annotation: "A identifica\xE7\xE3o de fun\xE7\xF5es, portas, protocolos\
            \ e servi\xE7os no in\xEDcio do ciclo de vida de desenvolvimento do sistema\
            \ (por exemplo, durante as fases iniciais de defini\xE7\xE3o de requisitos\
            \ e de projeto) permite que as organiza\xE7\xF5es influenciem o projeto\
            \ do sistema, componente de sistema ou servi\xE7o de sistema. Esse envolvimento\
            \ precoce no ciclo de vida de desenvolvimento do sistema ajuda as organiza\xE7\
            \xF5es a evitar ou minimizar o uso de fun\xE7\xF5es, portas, protocolos\
            \ ou servi\xE7os que apresentem riscos desnecessariamente elevados e a\
            \ compreender as compensa\xE7\xF5es (trade-offs) envolvidas no bloqueio\
            \ de portas, protocolos ou servi\xE7os espec\xEDficos ou na exig\xEAncia\
            \ de que os provedores de servi\xE7os de sistema o fa\xE7am. A identifica\xE7\
            \xE3o precoce de fun\xE7\xF5es, portas, protocolos e servi\xE7os evita\
            \ a adapta\xE7\xE3o dispendiosa de controles ap\xF3s o sistema, componente\
            \ ou servi\xE7o de sistema ter sido implementado. SA-9 descreve os requisitos\
            \ para servi\xE7os de sistema externos. As organiza\xE7\xF5es identificam\
            \ quais fun\xE7\xF5es, portas, protocolos e servi\xE7os s\xE3o fornecidos\
            \ por fontes externas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(10)
      name: Acquisition Process | Use of Approved PIV Products
      description: Employ only information technology products on the FIPS 201-approved
        products list for Personal Identity Verification (PIV) capability implemented
        within organizational systems.
      annotation: Products on the FIPS 201-approved products list meet NIST requirements
        for Personal Identity Verification (PIV) of Federal Employees and Contractors.
        PIV cards are used for multi-factor authentication in systems and organizations.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Uso de Produtos PIV Aprovados"
          description: "Empregar somente produtos de tecnologia da informa\xE7\xE3\
            o constantes na lista de produtos aprovados pela FIPS 201 para a capacidade\
            \ de Verifica\xE7\xE3o de Identidade Pessoal (Personal Identity Verification,\
            \ PIV) implementada dentro dos sistemas organizacionais."
          annotation: "Os produtos constantes na lista de produtos aprovados pela\
            \ FIPS 201 atendem aos requisitos do NIST para Verifica\xE7\xE3o de Identidade\
            \ Pessoal (PIV) de Funcion\xE1rios Federais e Contratados. Os cart\xF5\
            es PIV s\xE3o usados para autentica\xE7\xE3o multifator em sistemas e\
            \ organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(11)
      name: Acquisition Process | System of Records
      description: 'Include [Assignment: organization-defined Privacy Act requirements]
        in the acquisition contract for the operation of a system of records on behalf
        of an organization to accomplish an organizational mission or function.'
      annotation: When, by contract, an organization provides for the operation of
        a system of records to accomplish an organizational mission or function, the
        organization, consistent with its authority, causes the requirements of the
        PRIVACT to be applied to the system of records.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Sistema de Registros"
          description: "Incluir [Atribui\xE7\xE3o: requisitos do Privacy Act definidos\
            \ pela organiza\xE7\xE3o] no contrato de aquisi\xE7\xE3o para a opera\xE7\
            \xE3o de um sistema de registros em nome de uma organiza\xE7\xE3o, a fim\
            \ de cumprir uma miss\xE3o ou fun\xE7\xE3o organizacional."
          annotation: "Quando, por contrato, uma organiza\xE7\xE3o prov\xEA a opera\xE7\
            \xE3o de um sistema de registros para cumprir uma miss\xE3o ou fun\xE7\
            \xE3o organizacional, a organiza\xE7\xE3o, de forma consistente com sua\
            \ autoridade, faz com que os requisitos do PRIVACT sejam aplicados ao\
            \ sistema de registros."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-4(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-4(12)
      name: Acquisition Process | Data Ownership
      description: "(a) Include organizational data ownership requirements in the\
        \ acquisition contract; and\n(b) Require all data to be removed from the contractor\u2019\
        s system and returned to the organization within [Assignment: organization-defined\
        \ time frame]."
      annotation: Contractors who operate a system that contains data owned by an
        organization initiating the contract have policies and procedures in place
        to remove the data from their systems and/or return the data in a time frame
        defined by the contract.
      translations:
        pt:
          name: "Processo de Aquisi\xE7\xE3o | Propriedade dos Dados"
          description: "(a) Incluir os requisitos organizacionais de propriedade dos\
            \ dados no contrato de aquisi\xE7\xE3o; e\n(b) Exigir que todos os dados\
            \ sejam removidos do sistema do contratado e devolvidos \xE0 organiza\xE7\
            \xE3o dentro de [Atribui\xE7\xE3o: prazo definido pela organiza\xE7\xE3\
            o]."
          annotation: "Os contratados que operam um sistema que cont\xE9m dados de\
            \ propriedade de uma organiza\xE7\xE3o que inicia o contrato mant\xEA\
            m pol\xEDticas e procedimentos para remover os dados de seus sistemas\
            \ e/ou devolver os dados dentro de um prazo definido pelo contrato."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-5
      name: System Documentation
      description: "a. Obtain or develop administrator documentation for the system,\
        \ system component, or system service that describes:\n1. Secure configuration,\
        \ installation, and operation of the system, component, or service; \n2. Effective\
        \ use and maintenance of security and privacy functions and mechanisms; and\n\
        3. Known vulnerabilities regarding configuration and use of administrative\
        \ or privileged functions;\nb. Obtain or develop user documentation for the\
        \ system, system component, or system service that describes:\n1. User-accessible\
        \ security and privacy functions and mechanisms and how to effectively use\
        \ those functions and mechanisms;\n2. Methods for user interaction, which\
        \ enables individuals to use the system, component, or service in a more secure\
        \ manner and protect individual privacy; and\n3. User responsibilities in\
        \ maintaining the security of the system, component, or service and privacy\
        \ of individuals;\nc. Document attempts to obtain system, system component,\
        \ or system service documentation when such documentation is either unavailable\
        \ or nonexistent and take [Assignment: organization-defined actions] in response;\
        \ and\nd. Distribute documentation to [Assignment: organization-defined personnel\
        \ or roles]."
      annotation: System documentation helps personnel understand the implementation
        and operation of controls. Organizations consider establishing specific measures
        to determine the quality and completeness of the content provided. System
        documentation may be used to support the management of supply chain risk,
        incident response, and other functions. Personnel or roles that require documentation
        include system owners, system security officers, and system administrators.
        Attempts to obtain documentation include contacting manufacturers or suppliers
        and conducting web-based searches. The inability to obtain documentation may
        occur due to the age of the system or component or the lack of support from
        developers and contractors. When documentation cannot be obtained, organizations
        may need to recreate the documentation if it is essential to the implementation
        or operation of the controls. The protection provided for the documentation
        is commensurate with the security category or classification of the system.
        Documentation that addresses system vulnerabilities may require an increased
        level of protection. Secure operation of the system includes initially starting
        the system and resuming secure system operation after a lapse in system operation.
      translations:
        pt:
          name: "Documenta\xE7\xE3o do Sistema"
          description: "a. Obter ou desenvolver documenta\xE7\xE3o para administradores\
            \ do sistema, componente de sistema ou servi\xE7o de sistema que descreva:\n\
            1. Configura\xE7\xE3o, instala\xE7\xE3o e opera\xE7\xE3o seguras do sistema,\
            \ componente ou servi\xE7o; \n2. Uso e manuten\xE7\xE3o eficazes das fun\xE7\
            \xF5es e mecanismos de seguran\xE7a e privacidade; e\n3. Vulnerabilidades\
            \ conhecidas relativas \xE0 configura\xE7\xE3o e ao uso de fun\xE7\xF5\
            es administrativas ou privilegiadas;\nb. Obter ou desenvolver documenta\xE7\
            \xE3o para usu\xE1rios do sistema, componente de sistema ou servi\xE7\
            o de sistema que descreva:\n1. As fun\xE7\xF5es e mecanismos de seguran\xE7\
            a e privacidade acess\xEDveis ao usu\xE1rio e como utilizar eficazmente\
            \ essas fun\xE7\xF5es e mecanismos;\n2. M\xE9todos de intera\xE7\xE3o\
            \ do usu\xE1rio que permitam aos indiv\xEDduos usar o sistema, componente\
            \ ou servi\xE7o de maneira mais segura e proteger a privacidade individual;\
            \ e\n3. As responsabilidades do usu\xE1rio na manuten\xE7\xE3o da seguran\xE7\
            a do sistema, componente ou servi\xE7o e da privacidade dos indiv\xED\
            duos;\nc. Documentar as tentativas de obter a documenta\xE7\xE3o do sistema,\
            \ componente de sistema ou servi\xE7o de sistema quando tal documenta\xE7\
            \xE3o estiver indispon\xEDvel ou inexistente e adotar [Atribui\xE7\xE3\
            o: a\xE7\xF5es definidas pela organiza\xE7\xE3o] em resposta; e\nd. Distribuir\
            \ a documenta\xE7\xE3o para [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5\
            es definidos pela organiza\xE7\xE3o]."
          annotation: "A documenta\xE7\xE3o do sistema ajuda o pessoal a compreender\
            \ a implementa\xE7\xE3o e a opera\xE7\xE3o dos controles. As organiza\xE7\
            \xF5es consideram estabelecer medidas espec\xEDficas para determinar a\
            \ qualidade e a completude do conte\xFAdo fornecido. A documenta\xE7\xE3\
            o do sistema pode ser usada para apoiar a gest\xE3o de riscos da cadeia\
            \ de suprimentos, a resposta a incidentes e outras fun\xE7\xF5es. O pessoal\
            \ ou as fun\xE7\xF5es que requerem documenta\xE7\xE3o incluem propriet\xE1\
            rios de sistemas, oficiais de seguran\xE7a de sistemas e administradores\
            \ de sistemas. As tentativas de obter documenta\xE7\xE3o incluem entrar\
            \ em contato com fabricantes ou fornecedores e realizar buscas na web.\
            \ A incapacidade de obter a documenta\xE7\xE3o pode ocorrer devido \xE0\
            \ idade do sistema ou do componente ou \xE0 falta de suporte de desenvolvedores\
            \ e contratados. Quando a documenta\xE7\xE3o n\xE3o puder ser obtida,\
            \ as organiza\xE7\xF5es podem precisar recriar a documenta\xE7\xE3o se\
            \ ela for essencial para a implementa\xE7\xE3o ou a opera\xE7\xE3o dos\
            \ controles. A prote\xE7\xE3o fornecida \xE0 documenta\xE7\xE3o \xE9 proporcional\
            \ \xE0 categoria de seguran\xE7a ou \xE0 classifica\xE7\xE3o do sistema.\
            \ A documenta\xE7\xE3o que aborda vulnerabilidades do sistema pode exigir\
            \ um n\xEDvel elevado de prote\xE7\xE3o. A opera\xE7\xE3o segura do sistema\
            \ inclui a inicializa\xE7\xE3o do sistema e a retomada da opera\xE7\xE3\
            o segura do sistema ap\xF3s uma interrup\xE7\xE3o na opera\xE7\xE3o do\
            \ sistema."

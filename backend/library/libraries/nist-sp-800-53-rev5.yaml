    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-4
      name: Rules of Behavior
      description: 'a. Establish and provide to individuals requiring access to the
        system, the rules that describe their responsibilities and expected behavior
        for information and system usage, security, and privacy;

        b. Receive a documented acknowledgment from such individuals, indicating that
        they have read, understand, and agree to abide by the rules of behavior, before
        authorizing access to information and the system;

        c. Review and update the rules of behavior [Assignment: organization-defined
        frequency]; and

        d. Require individuals who have acknowledged a previous version of the rules
        of behavior to read and re-acknowledge [Selection (one or more): [Assignment:
        organization-defined frequency]; when the rules are revised or updated].'
      annotation: Rules of behavior represent a type of access agreement for organizational
        users. Other types of access agreements include nondisclosure agreements,
        conflict-of-interest agreements, and acceptable use agreements (see PS-6).
        Organizations consider rules of behavior based on individual user roles and
        responsibilities and differentiate between rules that apply to privileged
        users and rules that apply to general users. Establishing rules of behavior
        for some types of non-organizational users, including individuals who receive
        information from federal systems, is often not feasible given the large number
        of such users and the limited nature of their interactions with the systems.
        Rules of behavior for organizational and non-organizational users can also
        be established in AC-8. The related controls section provides a list of controls
        that are relevant to organizational rules of behavior. PL-4b, the documented
        acknowledgment portion of the control, may be satisfied by the literacy training
        and awareness and role-based training programs conducted by organizations
        if such training includes rules of behavior. Documented acknowledgements for
        rules of behavior include electronic or physical signatures and electronic
        agreement check boxes or radio buttons.
      translations:
        pt:
          name: Regras de Comportamento
          description: "a. Estabelecer e fornecer aos indiv\xEDduos que necessitam\
            \ de acesso ao sistema as regras que descrevem suas responsabilidades\
            \ e o comportamento esperado quanto ao uso da informa\xE7\xE3o e do sistema,\
            \ \xE0 seguran\xE7a e \xE0 privacidade;\nb. Receber de tais indiv\xED\
            duos um reconhecimento documentado, indicando que leram, compreenderam\
            \ e concordam em cumprir as regras de comportamento, antes de autorizar\
            \ o acesso \xE0 informa\xE7\xE3o e ao sistema;\nc. Revisar e atualizar\
            \ as regras de comportamento [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]; e\nd. Exigir que os indiv\xEDduos que reconheceram\
            \ uma vers\xE3o anterior das regras de comportamento leiam e reconhe\xE7\
            am novamente [Sele\xE7\xE3o (um ou mais): [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o]; quando as regras forem revisadas\
            \ ou atualizadas]."
          annotation: "As regras de comportamento representam um tipo de acordo de\
            \ acesso para usu\xE1rios organizacionais. Outros tipos de acordos de\
            \ acesso incluem acordos de n\xE3o divulga\xE7\xE3o, acordos de conflito\
            \ de interesse e acordos de uso aceit\xE1vel (ver PS-6). As organiza\xE7\
            \xF5es consideram as regras de comportamento com base nas fun\xE7\xF5\
            es e responsabilidades individuais dos usu\xE1rios e diferenciam entre\
            \ regras que se aplicam a usu\xE1rios privilegiados e regras que se aplicam\
            \ a usu\xE1rios gerais. O estabelecimento de regras de comportamento para\
            \ alguns tipos de usu\xE1rios n\xE3o organizacionais, incluindo indiv\xED\
            duos que recebem informa\xE7\xF5es de sistemas federais, muitas vezes\
            \ n\xE3o \xE9 vi\xE1vel dado o grande n\xFAmero de tais usu\xE1rios e\
            \ a natureza limitada de suas intera\xE7\xF5es com os sistemas. As regras\
            \ de comportamento para usu\xE1rios organizacionais e n\xE3o organizacionais\
            \ tamb\xE9m podem ser estabelecidas em AC-8. A se\xE7\xE3o de controles\
            \ relacionados fornece uma lista de controles que s\xE3o relevantes para\
            \ as regras de comportamento organizacionais. O PL-4b, a parte do controle\
            \ referente ao reconhecimento documentado, pode ser satisfeito pelos programas\
            \ de treinamento de letramento e conscientiza\xE7\xE3o e de treinamento\
            \ baseado em fun\xE7\xE3o conduzidos pelas organiza\xE7\xF5es, caso tal\
            \ treinamento inclua regras de comportamento. Reconhecimentos documentados\
            \ das regras de comportamento incluem assinaturas eletr\xF4nicas ou f\xED\
            sicas e caixas de sele\xE7\xE3o de concord\xE2ncia eletr\xF4nica ou bot\xF5\
            es de op\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:pl
      ref_id: PL-4(1)
      name: Rules of Behavior | Social Media and External Site/application Usage Restrictions
      description: "Include in the rules of behavior, restrictions on:\n(a) Use of\
        \ social media, social networking sites, and external sites/applications;\n\
        (b) Posting organizational information on public websites; and\n(c) Use of\
        \ organization-provided identifiers (e.g., email\_addresses) and authentication\
        \ secrets (e.g., passwords) for creating accounts on external sites/applications."
      annotation: Social media, social networking, and external site/application usage
        restrictions address rules of behavior related to the use of social media,
        social networking, and external sites when organizational personnel are using
        such sites for official duties or in the conduct of official business, when
        organizational information is involved in social media and social networking
        transactions, and when personnel access social media and networking sites
        from organizational systems. Organizations also address specific rules that
        prevent unauthorized entities from obtaining non-public organizational information
        from social media and networking sites either directly or through inference.
        Non-public information includes personally identifiable information and system
        account information.
      translations:
        pt:
          name: "Regras de Comportamento | Restri\xE7\xF5es de Uso de M\xEDdia Social\
            \ e Sites/Aplica\xE7\xF5es Externos"
          description: "Incluir nas regras de comportamento restri\xE7\xF5es quanto\
            \ a:\n(a) Uso de m\xEDdia social, sites de redes sociais e sites/aplica\xE7\
            \xF5es externos;\n(b) Publica\xE7\xE3o de informa\xE7\xF5es organizacionais\
            \ em sites p\xFAblicos; e\n(c) Uso de identificadores fornecidos pela\
            \ organiza\xE7\xE3o (por exemplo, endere\xE7os de e-mail) e segredos de\
            \ autentica\xE7\xE3o (por exemplo, senhas) para criar contas em sites/aplica\xE7\
            \xF5es externos."
          annotation: "As restri\xE7\xF5es de uso de m\xEDdia social, redes sociais\
            \ e sites/aplica\xE7\xF5es externos tratam de regras de comportamento\
            \ relacionadas ao uso de m\xEDdia social, redes sociais e sites externos\
            \ quando o pessoal organizacional usa tais sites para deveres oficiais\
            \ ou na condu\xE7\xE3o de neg\xF3cios oficiais, quando informa\xE7\xF5\
            es organizacionais est\xE3o envolvidas em transa\xE7\xF5es de m\xEDdia\
            \ social e redes sociais, e quando o pessoal acessa sites de m\xEDdia\
            \ social e redes a partir de sistemas organizacionais. As organiza\xE7\
            \xF5es tamb\xE9m tratam de regras espec\xEDficas que impedem que entidades\
            \ n\xE3o autorizadas obtenham informa\xE7\xF5es organizacionais n\xE3\
            o p\xFAblicas de sites de m\xEDdia social e redes, seja diretamente ou\
            \ por infer\xEAncia. Informa\xE7\xF5es n\xE3o p\xFAblicas incluem informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal e informa\xE7\xF5es de contas do\
            \ sistema."

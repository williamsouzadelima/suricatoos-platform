            \xE3o: localiza\xE7\xF5es definidas pela organiza\xE7\xE3o] sob as seguintes\
            \ condi\xE7\xF5es ou circunst\xE2ncias: [Atribui\xE7\xE3o: condi\xE7\xF5\

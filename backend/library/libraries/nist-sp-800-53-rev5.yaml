    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-5
      name: Plan of Action and Milestones
      description: 'a. Develop a plan of action and milestones for the system to document
        the planned remediation actions of the organization to correct weaknesses
        or deficiencies noted during the assessment of the controls and to reduce
        or eliminate known vulnerabilities in the system; and

        b. Update existing plan of action and milestones [Assignment: organization-defined
        frequency] based on the findings from control assessments, independent audits
        or reviews, and continuous monitoring activities.'
      annotation: Plans of action and milestones are useful for any type of organization
        to track planned remedial actions. Plans of action and milestones are required
        in authorization packages and subject to federal reporting requirements established
        by OMB.
      translations:
        pt:
          name: "Plano de A\xE7\xE3o e Marcos"
          description: "a. Desenvolver um plano de a\xE7\xE3o e marcos para o sistema\
            \ a fim de documentar as a\xE7\xF5es de remedia\xE7\xE3o planejadas da\
            \ organiza\xE7\xE3o para corrigir fragilidades ou defici\xEAncias identificadas\
            \ durante a avalia\xE7\xE3o dos controles e para reduzir ou eliminar vulnerabilidades\
            \ conhecidas no sistema; e\nb. Atualizar o plano de a\xE7\xE3o e marcos\
            \ existente [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] com base nas constata\xE7\xF5es das avalia\xE7\xF5es de controles,\
            \ auditorias ou revis\xF5es independentes e atividades de monitoramento\
            \ cont\xEDnuo."
          annotation: "Planos de a\xE7\xE3o e marcos s\xE3o \xFAteis para qualquer\
            \ tipo de organiza\xE7\xE3o para acompanhar a\xE7\xF5es corretivas planejadas.\
            \ Planos de a\xE7\xE3o e marcos s\xE3o exigidos em pacotes de autoriza\xE7\
            \xE3o e est\xE3o sujeitos a requisitos federais de presta\xE7\xE3o de\
            \ contas estabelecidos pela OMB."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-5(1)
      name: Plan of Action and Milestones | Automation Support for Accuracy and Currency
      description: 'Ensure the accuracy, currency, and availability of the plan of
        action and milestones for the system using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Using automated tools helps maintain the accuracy, currency, and
        availability of the plan of action and milestones and facilitates the coordination
        and sharing of security and privacy information throughout the organization.
        Such coordination and information sharing help to identify systemic weaknesses
        or deficiencies in organizational systems and ensure that appropriate resources
        are directed at the most critical system vulnerabilities in a timely manner.
      translations:
        pt:
          name: "Plano de A\xE7\xE3o e Marcos | Suporte de Automa\xE7\xE3o para Exatid\xE3\
            o e Atualidade"
          description: "Garantir a exatid\xE3o, a atualidade e a disponibilidade do\
            \ plano de a\xE7\xE3o e marcos para o sistema utilizando [Atribui\xE7\xE3\
            o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "O uso de ferramentas automatizadas ajuda a manter a exatid\xE3\
            o, a atualidade e a disponibilidade do plano de a\xE7\xE3o e marcos e\
            \ facilita a coordena\xE7\xE3o e o compartilhamento de informa\xE7\xF5\
            es de seguran\xE7a e privacidade em toda a organiza\xE7\xE3o. Tal coordena\xE7\
            \xE3o e compartilhamento de informa\xE7\xF5es ajudam a identificar fragilidades\
            \ ou defici\xEAncias sist\xEAmicas nos sistemas organizacionais e a garantir\
            \ que recursos apropriados sejam direcionados \xE0s vulnerabilidades de\
            \ sistema mais cr\xEDticas de maneira oportuna."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-6
      name: Authorization
      description: 'a. Assign a senior official as the authorizing official for the
        system;

        b. Assign a senior official as the authorizing official for common controls
        available for inheritance by organizational systems;

        c. Ensure that the authorizing official for the system, before commencing
        operations:

        1. Accepts the use of common controls inherited by the system; and

        2. Authorizes the system to operate;

        d. Ensure that the authorizing official for common controls authorizes the
        use of those controls for inheritance by organizational systems;

        e. Update the authorizations [Assignment: organization-defined frequency].'
      annotation: 'Authorizations are official management decisions by senior officials
        to authorize operation of systems, authorize the use of common controls for
        inheritance by organizational systems, and explicitly accept the risk to organizational
        operations and assets, individuals, other organizations, and the Nation based
        on the implementation of agreed-upon controls. Authorizing officials provide
        budgetary oversight for organizational systems and common controls or assume
        responsibility for the mission and business functions supported by those systems
        or common controls. The authorization process is a federal responsibility,
        and therefore, authorizing officials must be federal employees. Authorizing
        officials are both responsible and accountable for security and privacy risks
        associated with the operation and use of organizational systems. Nonfederal
        organizations may have similar processes to authorize systems and senior officials
        that assume the authorization role and associated responsibilities.

        Authorizing officials issue ongoing authorizations of systems based on evidence
        produced from implemented continuous monitoring programs. Robust continuous
        monitoring programs reduce the need for separate reauthorization processes.
        Through the employment of comprehensive continuous monitoring processes, the
        information contained in authorization packages (i.e., security and privacy
        plans, assessment reports, and plans of action and milestones) is updated
        on an ongoing basis. This provides authorizing officials, common control providers,
        and system owners with an up-to-date status of the security and privacy posture
        of their systems, controls, and operating environments. To reduce the cost
        of reauthorization, authorizing officials can leverage the results of continuous
        monitoring processes to the maximum extent possible as the basis for rendering
        reauthorization decisions.'
      translations:
        pt:
          name: "Autoriza\xE7\xE3o"
          description: "a. Designar um funcion\xE1rio s\xEAnior como o respons\xE1\
            vel pela autoriza\xE7\xE3o do sistema;\nb. Designar um funcion\xE1rio\
            \ s\xEAnior como o respons\xE1vel pela autoriza\xE7\xE3o de controles\
            \ comuns dispon\xEDveis para heran\xE7a pelos sistemas organizacionais;\n\
            c. Garantir que o respons\xE1vel pela autoriza\xE7\xE3o do sistema, antes\
            \ de iniciar as opera\xE7\xF5es:\n1. Aceite o uso de controles comuns\
            \ herdados pelo sistema; e\n2. Autorize a opera\xE7\xE3o do sistema;\n\
            d. Garantir que o respons\xE1vel pela autoriza\xE7\xE3o de controles comuns\
            \ autorize o uso desses controles para heran\xE7a pelos sistemas organizacionais;\n\
            e. Atualizar as autoriza\xE7\xF5es [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]."
          annotation: "Autoriza\xE7\xF5es s\xE3o decis\xF5es gerenciais oficiais tomadas\
            \ por funcion\xE1rios s\xEAniores para autorizar a opera\xE7\xE3o de sistemas,\
            \ autorizar o uso de controles comuns para heran\xE7a pelos sistemas organizacionais\
            \ e aceitar explicitamente o risco \xE0s opera\xE7\xF5es e aos ativos\
            \ organizacionais, aos indiv\xEDduos, a outras organiza\xE7\xF5es e \xE0\
            \ Na\xE7\xE3o com base na implementa\xE7\xE3o dos controles acordados.\
            \ Os respons\xE1veis pela autoriza\xE7\xE3o fornecem supervis\xE3o or\xE7\
            ament\xE1ria dos sistemas organizacionais e controles comuns ou assumem\
            \ a responsabilidade pelas fun\xE7\xF5es de miss\xE3o e de neg\xF3cio\
            \ apoiadas por esses sistemas ou controles comuns. O processo de autoriza\xE7\
            \xE3o \xE9 uma responsabilidade federal e, portanto, os respons\xE1veis\
            \ pela autoriza\xE7\xE3o devem ser servidores federais. Os respons\xE1\
            veis pela autoriza\xE7\xE3o s\xE3o tanto encarregados quanto respons\xE1\
            veis pelos riscos de seguran\xE7a e privacidade associados \xE0 opera\xE7\
            \xE3o e ao uso dos sistemas organizacionais. Organiza\xE7\xF5es n\xE3\
            o federais podem ter processos similares para autorizar sistemas e funcion\xE1\
            rios s\xEAniores que assumem o papel de autoriza\xE7\xE3o e as responsabilidades\
            \ associadas.\nOs respons\xE1veis pela autoriza\xE7\xE3o emitem autoriza\xE7\
            \xF5es cont\xEDnuas de sistemas com base em evid\xEAncias produzidas por\
            \ programas de monitoramento cont\xEDnuo implementados. Programas robustos\
            \ de monitoramento cont\xEDnuo reduzem a necessidade de processos separados\
            \ de reautoriza\xE7\xE3o. Por meio do emprego de processos abrangentes\
            \ de monitoramento cont\xEDnuo, as informa\xE7\xF5es contidas nos pacotes\
            \ de autoriza\xE7\xE3o (ou seja, planos de seguran\xE7a e privacidade,\
            \ relat\xF3rios de avalia\xE7\xE3o e planos de a\xE7\xE3o e marcos) s\xE3\
            o atualizadas de forma cont\xEDnua. Isso fornece aos respons\xE1veis pela\
            \ autoriza\xE7\xE3o, aos provedores de controles comuns e aos propriet\xE1\
            rios de sistemas um status atualizado da postura de seguran\xE7a e privacidade\
            \ de seus sistemas, controles e ambientes operacionais. Para reduzir o\
            \ custo da reautoriza\xE7\xE3o, os respons\xE1veis pela autoriza\xE7\xE3\
            o podem aproveitar os resultados dos processos de monitoramento cont\xED\
            nuo na m\xE1xima extens\xE3o poss\xEDvel como base para a tomada de decis\xF5\
            es de reautoriza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-6(1)
      name: "Authorization | Joint Authorization \u2014 Intra-organization"
      description: Employ a joint authorization process for the system that includes
        multiple authorizing officials from the same organization conducting the authorization.
      annotation: Assigning multiple authorizing officials from the same organization
        to serve as co-authorizing officials for the system increases the level of
        independence in the risk-based decision-making process. It also implements
        the concepts of separation of duties and dual authorization as applied to
        the system authorization process. The intra-organization joint authorization
        process is most relevant for connected systems, shared systems, and systems
        with multiple information owners.
      translations:
        pt:
          name: "Autoriza\xE7\xE3o | Autoriza\xE7\xE3o Conjunta \u2014 Intraorganizacional"
          description: "Empregar um processo de autoriza\xE7\xE3o conjunta para o\
            \ sistema que inclua m\xFAltiplos respons\xE1veis pela autoriza\xE7\xE3\
            o da mesma organiza\xE7\xE3o conduzindo a autoriza\xE7\xE3o."
          annotation: "A designa\xE7\xE3o de m\xFAltiplos respons\xE1veis pela autoriza\xE7\
            \xE3o da mesma organiza\xE7\xE3o para atuarem como coautorizadores do\
            \ sistema aumenta o n\xEDvel de independ\xEAncia no processo de tomada\
            \ de decis\xE3o baseado em risco. Isso tamb\xE9m implementa os conceitos\
            \ de segrega\xE7\xE3o de fun\xE7\xF5es e dupla autoriza\xE7\xE3o aplicados\
            \ ao processo de autoriza\xE7\xE3o do sistema. O processo de autoriza\xE7\
            \xE3o conjunta intraorganizacional \xE9 mais relevante para sistemas conectados,\
            \ sistemas compartilhados e sistemas com m\xFAltiplos propriet\xE1rios\
            \ de informa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-6(2)
      name: "Authorization | Joint Authorization \u2014 Inter-organization"
      description: Employ a joint authorization process for the system that includes
        multiple authorizing officials with at least one authorizing official from
        an organization external to the organization conducting the authorization.
      annotation: Assigning multiple authorizing officials, at least one of whom comes
        from an external organization, to serve as co-authorizing officials for the
        system increases the level of independence in the risk-based decision-making
        process. It implements the concepts of separation of duties and dual authorization
        as applied to the system authorization process. Employing authorizing officials
        from external organizations to supplement the authorizing official from the
        organization that owns or hosts the system may be necessary when the external
        organizations have a vested interest or equities in the outcome of the authorization
        decision. The inter-organization joint authorization process is relevant and
        appropriate for connected systems, shared systems or services, and systems
        with multiple information owners. The authorizing officials from the external
        organizations are key stakeholders of the system undergoing authorization.
      translations:
        pt:
          name: "Autoriza\xE7\xE3o | Autoriza\xE7\xE3o Conjunta \u2014 Interorganizacional"
          description: "Empregar um processo de autoriza\xE7\xE3o conjunta para o\
            \ sistema que inclua m\xFAltiplos respons\xE1veis pela autoriza\xE7\xE3\
            o, com pelo menos um respons\xE1vel pela autoriza\xE7\xE3o de uma organiza\xE7\
            \xE3o externa \xE0quela que conduz a autoriza\xE7\xE3o."
          annotation: "A designa\xE7\xE3o de m\xFAltiplos respons\xE1veis pela autoriza\xE7\
            \xE3o, dos quais pelo menos um seja de uma organiza\xE7\xE3o externa,\
            \ para atuarem como coautorizadores do sistema aumenta o n\xEDvel de independ\xEA\
            ncia no processo de tomada de decis\xE3o baseado em risco. Isso implementa\
            \ os conceitos de segrega\xE7\xE3o de fun\xE7\xF5es e dupla autoriza\xE7\
            \xE3o aplicados ao processo de autoriza\xE7\xE3o do sistema. Empregar\
            \ respons\xE1veis pela autoriza\xE7\xE3o de organiza\xE7\xF5es externas\
            \ para complementar o respons\xE1vel pela autoriza\xE7\xE3o da organiza\xE7\
            \xE3o que det\xE9m ou hospeda o sistema pode ser necess\xE1rio quando\
            \ as organiza\xE7\xF5es externas t\xEAm um interesse leg\xEDtimo ou participa\xE7\
            \xE3o no resultado da decis\xE3o de autoriza\xE7\xE3o. O processo de autoriza\xE7\
            \xE3o conjunta interorganizacional \xE9 relevante e apropriado para sistemas\
            \ conectados, sistemas ou servi\xE7os compartilhados e sistemas com m\xFA\
            ltiplos propriet\xE1rios de informa\xE7\xE3o. Os respons\xE1veis pela\
            \ autoriza\xE7\xE3o das organiza\xE7\xF5es externas s\xE3o partes interessadas-chave\
            \ do sistema em processo de autoriza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7
      name: Continuous Monitoring
      description: 'Develop a system-level continuous monitoring strategy and implement
        continuous monitoring in accordance with the organization-level continuous
        monitoring strategy that includes:

        a. Establishing the following system-level metrics to be monitored: [Assignment:
        organization-defined system-level metrics];

        b. Establishing [Assignment: organization-defined frequencies] for monitoring
        and [Assignment: organization-defined frequencies] for assessment of control
        effectiveness;

        c. Ongoing control assessments in accordance with the continuous monitoring
        strategy;

        d. Ongoing monitoring of system and organization-defined metrics in accordance
        with the continuous monitoring strategy;

        e. Correlation and analysis of information generated by control assessments
        and monitoring;

        f. Response actions to address results of the analysis of control assessment
        and monitoring information; and

        g. Reporting the security and privacy status of the system to [Assignment:
        organization-defined personnel or roles] [Assignment: organization-defined
        frequency].'
      annotation: 'Continuous monitoring at the system level facilitates ongoing awareness
        of the system security and privacy posture to support organizational risk
        management decisions. The terms continuous and ongoing imply that organizations
        assess and monitor their controls and risks at a frequency sufficient to support
        risk-based decisions. Different types of controls may require different monitoring
        frequencies. The results of continuous monitoring generate risk response actions
        by organizations. When monitoring the effectiveness of multiple controls that
        have been grouped into capabilities, a root-cause analysis may be needed to
        determine the specific control that has failed. Continuous monitoring programs
        allow organizations to maintain the authorizations of systems and common controls
        in highly dynamic environments of operation with changing mission and business
        needs, threats, vulnerabilities, and technologies. Having access to security
        and privacy information on a continuing basis through reports and dashboards
        gives organizational officials the ability to make effective and timely risk
        management decisions, including ongoing authorization decisions.

        Automation supports more frequent updates to hardware, software, and firmware
        inventories, authorization packages, and other system information. Effectiveness
        is further enhanced when continuous monitoring outputs are formatted to provide
        information that is specific, measurable, actionable, relevant, and timely.
        Continuous monitoring activities are scaled in accordance with the security
        categories of systems. Monitoring requirements, including the need for specific
        monitoring, may be referenced in other controls and control enhancements,
        such as AC-2g, AC-2(7), AC-2(12)(a), AC-2(7)(b), AC-2(7)(c), AC-17(1), AT-4a,
        AU-13, AU-13(1), AU-13(2), CM-3f, CM-6d, CM-11c, IR-5, MA-2b, MA-3a, MA-4a,
        PE-3d, PE-6, PE-14b, PE-16, PE-20, PM-6, PM-23, PM-31, PS-7e, SA-9c, SR-4,
        SC-5(3)(b), SC-7a, SC-7(24)(b), SC-18b, SC-43b, and SI-4.'
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo"
          description: "Desenvolver uma estrat\xE9gia de monitoramento cont\xEDnuo\
            \ em n\xEDvel de sistema e implementar o monitoramento cont\xEDnuo em\
            \ conformidade com a estrat\xE9gia de monitoramento cont\xEDnuo em n\xED\
            vel organizacional que inclua:\na. Estabelecer as seguintes m\xE9tricas\
            \ em n\xEDvel de sistema a serem monitoradas: [Atribui\xE7\xE3o: m\xE9\
            tricas em n\xEDvel de sistema definidas pela organiza\xE7\xE3o];\nb. Estabelecer\
            \ [Atribui\xE7\xE3o: frequ\xEAncias definidas pela organiza\xE7\xE3o]\
            \ para monitoramento e [Atribui\xE7\xE3o: frequ\xEAncias definidas pela\
            \ organiza\xE7\xE3o] para avalia\xE7\xE3o da efic\xE1cia dos controles;\n\
            c. Avalia\xE7\xF5es cont\xEDnuas de controles em conformidade com a estrat\xE9\
            gia de monitoramento cont\xEDnuo;\nd. Monitoramento cont\xEDnuo do sistema\
            \ e das m\xE9tricas definidas pela organiza\xE7\xE3o em conformidade com\
            \ a estrat\xE9gia de monitoramento cont\xEDnuo;\ne. Correla\xE7\xE3o e\
            \ an\xE1lise das informa\xE7\xF5es geradas pelas avalia\xE7\xF5es de controles\
            \ e pelo monitoramento;\nf. A\xE7\xF5es de resposta para tratar os resultados\
            \ da an\xE1lise das informa\xE7\xF5es de avalia\xE7\xE3o de controles\
            \ e de monitoramento; e\ng. Reportar o status de seguran\xE7a e privacidade\
            \ do sistema a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela\
            \ organiza\xE7\xE3o] [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o]."
          annotation: "O monitoramento cont\xEDnuo em n\xEDvel de sistema facilita\
            \ a consci\xEAncia cont\xEDnua da postura de seguran\xE7a e privacidade\
            \ do sistema para apoiar as decis\xF5es organizacionais de gest\xE3o de\
            \ riscos. Os termos cont\xEDnuo e em curso implicam que as organiza\xE7\
            \xF5es avaliam e monitoram seus controles e riscos com uma frequ\xEAncia\
            \ suficiente para apoiar decis\xF5es baseadas em risco. Diferentes tipos\
            \ de controles podem exigir diferentes frequ\xEAncias de monitoramento.\
            \ Os resultados do monitoramento cont\xEDnuo geram a\xE7\xF5es de resposta\
            \ a riscos por parte das organiza\xE7\xF5es. Ao monitorar a efic\xE1cia\
            \ de m\xFAltiplos controles que foram agrupados em capacidades, pode ser\
            \ necess\xE1ria uma an\xE1lise de causa-raiz para determinar o controle\
            \ espec\xEDfico que falhou. Programas de monitoramento cont\xEDnuo permitem\
            \ que as organiza\xE7\xF5es mantenham as autoriza\xE7\xF5es de sistemas\
            \ e controles comuns em ambientes operacionais altamente din\xE2micos,\
            \ com necessidades de miss\xE3o e de neg\xF3cio, amea\xE7as, vulnerabilidades\
            \ e tecnologias em constante mudan\xE7a. Ter acesso a informa\xE7\xF5\
            es de seguran\xE7a e privacidade de forma cont\xEDnua por meio de relat\xF3\
            rios e pain\xE9is d\xE1 aos funcion\xE1rios organizacionais a capacidade\
            \ de tomar decis\xF5es de gest\xE3o de riscos eficazes e oportunas, incluindo\
            \ decis\xF5es de autoriza\xE7\xE3o cont\xEDnua.\nA automa\xE7\xE3o apoia\
            \ atualiza\xE7\xF5es mais frequentes de invent\xE1rios de hardware, software\
            \ e firmware, pacotes de autoriza\xE7\xE3o e outras informa\xE7\xF5es\
            \ do sistema. A efic\xE1cia \xE9 ainda mais aprimorada quando as sa\xED\
            das do monitoramento cont\xEDnuo s\xE3o formatadas para fornecer informa\xE7\
            \xF5es que sejam espec\xEDficas, mensur\xE1veis, acion\xE1veis, relevantes\
            \ e oportunas. As atividades de monitoramento cont\xEDnuo s\xE3o dimensionadas\
            \ de acordo com as categorias de seguran\xE7a dos sistemas. Requisitos\
            \ de monitoramento, incluindo a necessidade de monitoramento espec\xED\
            fico, podem ser referenciados em outros controles e aprimoramentos de\
            \ controles, tais como AC-2g, AC-2(7), AC-2(12)(a), AC-2(7)(b), AC-2(7)(c),\
            \ AC-17(1), AT-4a, AU-13, AU-13(1), AU-13(2), CM-3f, CM-6d, CM-11c, IR-5,\
            \ MA-2b, MA-3a, MA-4a, PE-3d, PE-6, PE-14b, PE-16, PE-20, PM-6, PM-23,\
            \ PM-31, PS-7e, SA-9c, SR-4, SC-5(3)(b), SC-7a, SC-7(24)(b), SC-18b, SC-43b\
            \ e SI-4."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7(1)
      name: Continuous Monitoring | Independent Assessment
      description: Employ independent assessors or assessment teams to monitor the
        controls in the system on an ongoing basis.
      annotation: Organizations maximize the value of control assessments by requiring
        that assessments be conducted by assessors with appropriate levels of independence.
        The level of required independence is based on organizational continuous monitoring
        strategies. Assessor independence provides a degree of impartiality to the
        monitoring process. To achieve such impartiality, assessors do not create
        a mutual or conflicting interest with the organizations where the assessments
        are being conducted, assess their own work, act as management or employees
        of the organizations they are serving, or place themselves in advocacy positions
        for the organizations acquiring their services.
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo | Avalia\xE7\xE3o Independente"
          description: "Empregar avaliadores independentes ou equipes de avalia\xE7\
            \xE3o para monitorar os controles do sistema de forma cont\xEDnua."
          annotation: "As organiza\xE7\xF5es maximizam o valor das avalia\xE7\xF5\
            es de controles ao exigir que as avalia\xE7\xF5es sejam conduzidas por\
            \ avaliadores com n\xEDveis apropriados de independ\xEAncia. O n\xEDvel\
            \ de independ\xEAncia exigido baseia-se nas estrat\xE9gias organizacionais\
            \ de monitoramento cont\xEDnuo. A independ\xEAncia do avaliador proporciona\
            \ um grau de imparcialidade ao processo de monitoramento. Para alcan\xE7\
            ar tal imparcialidade, os avaliadores n\xE3o criam um interesse m\xFA\
            tuo ou conflitante com as organiza\xE7\xF5es onde as avalia\xE7\xF5es\
            \ est\xE3o sendo conduzidas, n\xE3o avaliam seu pr\xF3prio trabalho, n\xE3\
            o atuam como gest\xE3o ou funcion\xE1rios das organiza\xE7\xF5es que est\xE3\
            o atendendo e n\xE3o se colocam em posi\xE7\xF5es de defesa de interesses\
            \ das organiza\xE7\xF5es que adquirem seus servi\xE7os."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7(2)
      name: Continuous Monitoring | Types of Assessments
      description: '[Withdrawn: Incorporated into CA-2.]'
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo | Tipos de Avalia\xE7\xF5es"
          description: '[Retirado: Incorporado ao CA-2.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7(3)
      name: Continuous Monitoring | Trend Analyses
      description: Employ trend analyses to determine if control implementations,
        the frequency of continuous monitoring activities, and the types of activities
        used in the continuous monitoring process need to be modified based on empirical
        data.
      annotation: Trend analyses include examining recent threat information that
        addresses the types of threat events that have occurred in the organization
        or the Federal Government, success rates of certain types of attacks, emerging
        vulnerabilities in technologies, evolving social engineering techniques, the
        effectiveness of configuration settings, results from multiple control assessments,
        and findings from Inspectors General or auditors.
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo | An\xE1lises de Tend\xEAncias"
          description: "Empregar an\xE1lises de tend\xEAncias para determinar se as\
            \ implementa\xE7\xF5es de controles, a frequ\xEAncia das atividades de\
            \ monitoramento cont\xEDnuo e os tipos de atividades utilizadas no processo\
            \ de monitoramento cont\xEDnuo precisam ser modificados com base em dados\
            \ emp\xEDricos."
          annotation: "As an\xE1lises de tend\xEAncias incluem o exame de informa\xE7\
            \xF5es recentes sobre amea\xE7as que abordam os tipos de eventos de amea\xE7\
            a que ocorreram na organiza\xE7\xE3o ou no Governo Federal, as taxas de\
            \ sucesso de certos tipos de ataques, as vulnerabilidades emergentes nas\
            \ tecnologias, as t\xE9cnicas de engenharia social em evolu\xE7\xE3o,\
            \ a efic\xE1cia das defini\xE7\xF5es de configura\xE7\xE3o, os resultados\
            \ de m\xFAltiplas avalia\xE7\xF5es de controles e as constata\xE7\xF5\
            es de Inspetores-Gerais ou auditores."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7(4)
      name: Continuous Monitoring | Risk Monitoring
      description: 'Ensure risk monitoring is an integral part of the continuous monitoring
        strategy that includes the following:

        (a) Effectiveness monitoring;

        (b) Compliance monitoring; and

        (c) Change monitoring.'
      annotation: Risk monitoring is informed by the established organizational risk
        tolerance. Effectiveness monitoring determines the ongoing effectiveness of
        the implemented risk response measures. Compliance monitoring verifies that
        required risk response measures are implemented. It also verifies that security
        and privacy requirements are satisfied. Change monitoring identifies changes
        to organizational systems and environments of operation that may affect security
        and privacy risk.
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo | Monitoramento de Riscos"
          description: "Garantir que o monitoramento de riscos seja parte integrante\
            \ da estrat\xE9gia de monitoramento cont\xEDnuo, incluindo o seguinte:\n\
            (a) Monitoramento de efic\xE1cia;\n(b) Monitoramento de conformidade;\
            \ e\n(c) Monitoramento de mudan\xE7as."
          annotation: "O monitoramento de riscos \xE9 orientado pela toler\xE2ncia\
            \ a riscos organizacional estabelecida. O monitoramento de efic\xE1cia\
            \ determina a efic\xE1cia cont\xEDnua das medidas de resposta a riscos\
            \ implementadas. O monitoramento de conformidade verifica que as medidas\
            \ de resposta a riscos exigidas est\xE3o implementadas. Tamb\xE9m verifica\
            \ que os requisitos de seguran\xE7a e privacidade s\xE3o atendidos. O\
            \ monitoramento de mudan\xE7as identifica altera\xE7\xF5es nos sistemas\
            \ organizacionais e nos ambientes operacionais que podem afetar o risco\
            \ de seguran\xE7a e privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7(5)
      name: Continuous Monitoring | Consistency Analysis
      description: 'Employ the following actions to validate that policies are established
        and implemented controls are operating in a consistent manner: [Assignment:
        organization-defined actions].'
      annotation: "Security and privacy controls are often added incrementally to\
        \ a system. As a result, policies for selecting and implementing controls\
        \ may be inconsistent, and the controls could fail to work together in a consistent\
        \ or coordinated manner. At a minimum, the lack of consistency and coordination\
        \ could mean that there are unacceptable security and privacy gaps in the\
        \ system. At worst, it could mean that some of the controls implemented in\
        \ one location or by one component are actually impeding the functionality\
        \ of other controls (e.g., encrypting internal network traffic can impede\
        \ monitoring). In other situations, failing to consistently monitor all implemented\
        \ network protocols (e.g., a dual stack of IPv4 and IPv6) may create unintended\
        \ vulnerabilities in the system that could be exploited by adversaries. It\
        \ is important to validate\u2014through testing, monitoring, and analysis\u2014\
        that the implemented controls are operating in a consistent, coordinated,\
        \ non-interfering manner."
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo | An\xE1lise de Consist\xEAncia"
          description: "Empregar as seguintes a\xE7\xF5es para validar que as pol\xED\
            ticas est\xE3o estabelecidas e que os controles implementados est\xE3\
            o operando de maneira consistente: [Atribui\xE7\xE3o: a\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "Os controles de seguran\xE7a e privacidade s\xE3o frequentemente\
            \ adicionados de forma incremental a um sistema. Como resultado, as pol\xED\
            ticas para selecionar e implementar controles podem ser inconsistentes,\
            \ e os controles podem deixar de funcionar em conjunto de maneira consistente\
            \ ou coordenada. No m\xEDnimo, a falta de consist\xEAncia e coordena\xE7\
            \xE3o poderia significar que existem lacunas inaceit\xE1veis de seguran\xE7\
            a e privacidade no sistema. Na pior das hip\xF3teses, poderia significar\
            \ que alguns dos controles implementados em um local ou por um componente\
            \ est\xE3o, na verdade, impedindo a funcionalidade de outros controles\
            \ (por exemplo, criptografar o tr\xE1fego de rede interno pode impedir\
            \ o monitoramento). Em outras situa\xE7\xF5es, n\xE3o monitorar de forma\
            \ consistente todos os protocolos de rede implementados (por exemplo,\
            \ uma pilha dupla de IPv4 e IPv6) pode criar vulnerabilidades n\xE3o intencionais\
            \ no sistema que poderiam ser exploradas por advers\xE1rios. \xC9 importante\
            \ validar \u2014 por meio de testes, monitoramento e an\xE1lise \u2014\
            \ que os controles implementados est\xE3o operando de maneira consistente,\
            \ coordenada e sem interfer\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-7(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-7(6)
      name: Continuous Monitoring | Automation Support for Monitoring
      description: 'Ensure the accuracy, currency, and availability of monitoring
        results for the system using [Assignment: organization-defined automated mechanisms].'
      annotation: Using automated tools for monitoring helps to maintain the accuracy,
        currency, and availability of monitoring information which in turns helps
        to increase the level of ongoing awareness of the system security and privacy
        posture in support of organizational risk management decisions.
      translations:
        pt:
          name: "Monitoramento Cont\xEDnuo | Suporte de Automa\xE7\xE3o para Monitoramento"
          description: "Garantir a exatid\xE3o, a atualidade e a disponibilidade dos\
            \ resultados de monitoramento do sistema utilizando [Atribui\xE7\xE3o:\
            \ mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "O uso de ferramentas automatizadas para monitoramento ajuda\
            \ a manter a exatid\xE3o, a atualidade e a disponibilidade das informa\xE7\
            \xF5es de monitoramento, o que, por sua vez, ajuda a aumentar o n\xED\
            vel de consci\xEAncia cont\xEDnua da postura de seguran\xE7a e privacidade\
            \ do sistema em apoio \xE0s decis\xF5es organizacionais de gest\xE3o de\
            \ riscos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-8
      name: Penetration Testing
      description: 'Conduct penetration testing [Assignment: organization-defined
        frequency] on [Assignment: organization-defined systems or system components].'
      annotation: 'Penetration testing is a specialized type of assessment conducted
        on systems or individual system components to identify vulnerabilities that
        could be exploited by adversaries. Penetration testing goes beyond automated
        vulnerability scanning and is conducted by agents and teams with demonstrable
        skills and experience that include technical expertise in network, operating
        system, and/or application level security. Penetration testing can be used
        to validate vulnerabilities or determine the degree of penetration resistance
        of systems to adversaries within specified constraints. Such constraints include
        time, resources, and skills. Penetration testing attempts to duplicate the
        actions of adversaries and provides a more in-depth analysis of security-
        and privacy-related weaknesses or deficiencies. Penetration testing is especially
        important when organizations are transitioning from older technologies to
        newer technologies (e.g., transitioning from IPv4 to IPv6 network protocols).

        Organizations can use the results of vulnerability analyses to support penetration
        testing activities. Penetration testing can be conducted internally or externally
        on the hardware, software, or firmware components of a system and can exercise
        both physical and technical controls. A standard method for penetration testing
        includes a pretest analysis based on full knowledge of the system, pretest
        identification of potential vulnerabilities based on the pretest analysis,
        and testing designed to determine the exploitability of vulnerabilities. All
        parties agree to the rules of engagement before commencing penetration testing
        scenarios. Organizations correlate the rules of engagement for the penetration
        tests with the tools, techniques, and procedures that are anticipated to be
        employed by adversaries. Penetration testing may result in the exposure of
        information that is protected by laws or regulations, to individuals conducting
        the testing. Rules of engagement, contracts, or other appropriate mechanisms
        can be used to communicate expectations for how to protect this information.
        Risk assessments guide the decisions on the level of independence required
        for the personnel conducting penetration testing.'
      translations:
        pt:
          name: "Teste de Penetra\xE7\xE3o"
          description: "Conduzir teste de penetra\xE7\xE3o [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] em [Atribui\xE7\xE3o: sistemas ou\
            \ componentes de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O teste de penetra\xE7\xE3o \xE9 um tipo especializado de avalia\xE7\
            \xE3o conduzido em sistemas ou componentes individuais de sistema para\
            \ identificar vulnerabilidades que poderiam ser exploradas por advers\xE1\
            rios. O teste de penetra\xE7\xE3o vai al\xE9m da varredura automatizada\
            \ de vulnerabilidades e \xE9 conduzido por agentes e equipes com habilidades\
            \ e experi\xEAncia demonstr\xE1veis que incluem conhecimento t\xE9cnico\
            \ em seguran\xE7a de rede, de sistema operacional e/ou de n\xEDvel de\
            \ aplica\xE7\xE3o. O teste de penetra\xE7\xE3o pode ser usado para validar\
            \ vulnerabilidades ou determinar o grau de resist\xEAncia \xE0 penetra\xE7\
            \xE3o dos sistemas em rela\xE7\xE3o a advers\xE1rios dentro de restri\xE7\
            \xF5es especificadas. Tais restri\xE7\xF5es incluem tempo, recursos e\
            \ habilidades. O teste de penetra\xE7\xE3o tenta reproduzir as a\xE7\xF5\
            es dos advers\xE1rios e fornece uma an\xE1lise mais aprofundada das fragilidades\
            \ ou defici\xEAncias relacionadas \xE0 seguran\xE7a e \xE0 privacidade.\
            \ O teste de penetra\xE7\xE3o \xE9 especialmente importante quando as\
            \ organiza\xE7\xF5es est\xE3o em transi\xE7\xE3o de tecnologias mais antigas\
            \ para tecnologias mais novas (por exemplo, na transi\xE7\xE3o dos protocolos\
            \ de rede IPv4 para IPv6).\nAs organiza\xE7\xF5es podem usar os resultados\
            \ das an\xE1lises de vulnerabilidades para apoiar as atividades de teste\
            \ de penetra\xE7\xE3o. O teste de penetra\xE7\xE3o pode ser conduzido\
            \ interna ou externamente nos componentes de hardware, software ou firmware\
            \ de um sistema e pode exercitar tanto controles f\xEDsicos quanto t\xE9\
            cnicos. Um m\xE9todo padr\xE3o para teste de penetra\xE7\xE3o inclui uma\
            \ an\xE1lise pr\xE9-teste baseada no pleno conhecimento do sistema, a\
            \ identifica\xE7\xE3o pr\xE9-teste de potenciais vulnerabilidades com\
            \ base na an\xE1lise pr\xE9-teste e testes concebidos para determinar\
            \ a explorabilidade das vulnerabilidades. Todas as partes concordam com\
            \ as regras de engajamento antes de iniciar os cen\xE1rios de teste de\
            \ penetra\xE7\xE3o. As organiza\xE7\xF5es correlacionam as regras de engajamento\
            \ dos testes de penetra\xE7\xE3o com as ferramentas, t\xE9cnicas e procedimentos\
            \ que se antecipa serem empregados pelos advers\xE1rios. O teste de penetra\xE7\
            \xE3o pode resultar na exposi\xE7\xE3o de informa\xE7\xF5es protegidas\
            \ por leis ou regulamentos aos indiv\xEDduos que conduzem o teste. Regras\
            \ de engajamento, contratos ou outros mecanismos apropriados podem ser\
            \ usados para comunicar as expectativas sobre como proteger essas informa\xE7\
            \xF5es. As avalia\xE7\xF5es de risco orientam as decis\xF5es sobre o n\xED\
            vel de independ\xEAncia exigido para o pessoal que conduz o teste de penetra\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-8(1)
      name: Penetration Testing | Independent Penetration Testing Agent or Team
      description: Employ an independent penetration testing agent or team to perform
        penetration testing on the system or system components.
      annotation: Independent penetration testing agents or teams are individuals
        or groups who conduct impartial penetration testing of organizational systems.
        Impartiality implies that penetration testing agents or teams are free from
        perceived or actual conflicts of interest with respect to the development,
        operation, or management of the systems that are the targets of the penetration
        testing. CA-2(1) provides additional information on independent assessments
        that can be applied to penetration testing.
      translations:
        pt:
          name: "Teste de Penetra\xE7\xE3o | Agente ou Equipe Independente de Teste\
            \ de Penetra\xE7\xE3o"
          description: "Empregar um agente ou equipe independente de teste de penetra\xE7\
            \xE3o para realizar testes de penetra\xE7\xE3o no sistema ou em componentes\
            \ de sistema."
          annotation: "Agentes ou equipes independentes de teste de penetra\xE7\xE3\
            o s\xE3o indiv\xEDduos ou grupos que conduzem testes de penetra\xE7\xE3\
            o imparciais dos sistemas organizacionais. A imparcialidade implica que\
            \ os agentes ou equipes de teste de penetra\xE7\xE3o est\xE3o livres de\
            \ conflitos de interesse percebidos ou reais com rela\xE7\xE3o ao desenvolvimento,\
            \ \xE0 opera\xE7\xE3o ou \xE0 gest\xE3o dos sistemas que s\xE3o alvos\
            \ do teste de penetra\xE7\xE3o. O CA-2(1) fornece informa\xE7\xF5es adicionais\
            \ sobre avalia\xE7\xF5es independentes que podem ser aplicadas ao teste\
            \ de penetra\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-8(2)
      name: Penetration Testing | Red Team Exercises
      description: 'Employ the following red-team exercises to simulate attempts by
        adversaries to compromise organizational systems in accordance with applicable
        rules of engagement: [Assignment: organization-defined red team exercises].'
      annotation: Red team exercises extend the objectives of penetration testing
        by examining the security and privacy posture of organizations and the capability
        to implement effective cyber defenses. Red team exercises simulate attempts
        by adversaries to compromise mission and business functions and provide a
        comprehensive assessment of the security and privacy posture of systems and
        organizations. Such attempts may include technology-based attacks and social
        engineering-based attacks. Technology-based attacks include interactions with
        hardware, software, or firmware components and/or mission and business processes.
        Social engineering-based attacks include interactions via email, telephone,
        shoulder surfing, or personal conversations. Red team exercises are most effective
        when conducted by penetration testing agents and teams with knowledge of and
        experience with current adversarial tactics, techniques, procedures, and tools.
        While penetration testing may be primarily laboratory-based testing, organizations
        can use red team exercises to provide more comprehensive assessments that
        reflect real-world conditions. The results from red team exercises can be
        used by organizations to improve security and privacy awareness and training
        and to assess control effectiveness.
      translations:
        pt:
          name: "Teste de Penetra\xE7\xE3o | Exerc\xEDcios de Equipe Vermelha (Red\
            \ Team)"
          description: "Empregar os seguintes exerc\xEDcios de equipe vermelha (red\
            \ team) para simular tentativas de advers\xE1rios de comprometer os sistemas\
            \ organizacionais em conformidade com as regras de engajamento aplic\xE1\
            veis: [Atribui\xE7\xE3o: exerc\xEDcios de equipe vermelha definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Os exerc\xEDcios de equipe vermelha (red team) ampliam os objetivos\
            \ do teste de penetra\xE7\xE3o ao examinar a postura de seguran\xE7a e\
            \ privacidade das organiza\xE7\xF5es e a capacidade de implementar defesas\
            \ cibern\xE9ticas eficazes. Os exerc\xEDcios de equipe vermelha simulam\
            \ tentativas de advers\xE1rios de comprometer fun\xE7\xF5es de miss\xE3\
            o e de neg\xF3cio e fornecem uma avalia\xE7\xE3o abrangente da postura\
            \ de seguran\xE7a e privacidade dos sistemas e das organiza\xE7\xF5es.\
            \ Tais tentativas podem incluir ataques baseados em tecnologia e ataques\
            \ baseados em engenharia social. Os ataques baseados em tecnologia incluem\
            \ intera\xE7\xF5es com componentes de hardware, software ou firmware e/ou\
            \ processos de miss\xE3o e de neg\xF3cio. Os ataques baseados em engenharia\
            \ social incluem intera\xE7\xF5es por e-mail, telefone, observa\xE7\xE3\
            o por sobre o ombro (shoulder surfing) ou conversas pessoais. Os exerc\xED\
            cios de equipe vermelha s\xE3o mais eficazes quando conduzidos por agentes\
            \ e equipes de teste de penetra\xE7\xE3o com conhecimento e experi\xEA\
            ncia sobre as t\xE1ticas, t\xE9cnicas, procedimentos e ferramentas adversariais\
            \ atuais. Embora o teste de penetra\xE7\xE3o possa ser primariamente um\
            \ teste baseado em laborat\xF3rio, as organiza\xE7\xF5es podem usar exerc\xED\
            cios de equipe vermelha para fornecer avalia\xE7\xF5es mais abrangentes\
            \ que reflitam condi\xE7\xF5es do mundo real. Os resultados dos exerc\xED\
            cios de equipe vermelha podem ser usados pelas organiza\xE7\xF5es para\
            \ aprimorar a conscientiza\xE7\xE3o e o treinamento em seguran\xE7a e\
            \ privacidade e para avaliar a efic\xE1cia dos controles."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-8(3)
      name: Penetration Testing | Facility Penetration Testing
      description: 'Employ a penetration testing process that includes [Assignment:
        organization-defined frequency] [Selection: announced; unannounced] attempts
        to bypass or circumvent controls associated with physical access points to
        the facility.'
      annotation: Penetration testing of physical access points can provide information
        on critical vulnerabilities in the operating environments of organizational
        systems. Such information can be used to correct weaknesses or deficiencies
        in physical controls that are necessary to protect organizational systems.
      translations:
        pt:
          name: "Teste de Penetra\xE7\xE3o | Teste de Penetra\xE7\xE3o de Instala\xE7\
            \xF5es F\xEDsicas"
          description: "Empregar um processo de teste de penetra\xE7\xE3o que inclua\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] tentativas\
            \ [Sele\xE7\xE3o: anunciadas; n\xE3o anunciadas] de burlar ou contornar\
            \ os controles associados aos pontos de acesso f\xEDsico \xE0 instala\xE7\
            \xE3o."
          annotation: "O teste de penetra\xE7\xE3o de pontos de acesso f\xEDsico pode\
            \ fornecer informa\xE7\xF5es sobre vulnerabilidades cr\xEDticas nos ambientes\
            \ operacionais dos sistemas organizacionais. Tais informa\xE7\xF5es podem\
            \ ser usadas para corrigir fragilidades ou defici\xEAncias nos controles\
            \ f\xEDsicos que s\xE3o necess\xE1rios para proteger os sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-9
      name: Internal System Connections
      description: 'a. Authorize internal connections of [Assignment: organization-defined
        system components or classes of components] to the system;

        b. Document, for each internal connection, the interface characteristics,
        security and privacy requirements, and the nature of the information communicated;

        c. Terminate internal system connections after [Assignment: organization-defined
        conditions]; and

        d. Review [Assignment: organization-defined frequency] the continued need
        for each internal connection.'
      annotation: Internal system connections are connections between organizational
        systems and separate constituent system components (i.e., connections between
        components that are part of the same system) including components used for
        system development. Intra-system connections include connections with mobile
        devices, notebook and desktop computers, tablets, printers, copiers, facsimile
        machines, scanners, sensors, and servers. Instead of authorizing each internal
        system connection individually, organizations can authorize internal connections
        for a class of system components with common characteristics and/or configurations,
        including printers, scanners, and copiers with a specified processing, transmission,
        and storage capability or smart phones and tablets with a specific baseline
        configuration. The continued need for an internal system connection is reviewed
        from the perspective of whether it provides support for organizational missions
        or business functions.
      translations:
        pt:
          name: "Conex\xF5es Internas de Sistema"
          description: "a. Autorizar conex\xF5es internas de [Atribui\xE7\xE3o: componentes\
            \ de sistema ou classes de componentes definidos pela organiza\xE7\xE3\
            o] ao sistema;\nb. Documentar, para cada conex\xE3o interna, as caracter\xED\
            sticas da interface, os requisitos de seguran\xE7a e privacidade e a natureza\
            \ das informa\xE7\xF5es comunicadas;\nc. Encerrar conex\xF5es internas\
            \ de sistema ap\xF3s [Atribui\xE7\xE3o: condi\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o]; e\nd. Revisar [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] a necessidade cont\xEDnua de cada conex\xE3\
            o interna."
          annotation: "Conex\xF5es internas de sistema s\xE3o conex\xF5es entre sistemas\
            \ organizacionais e componentes constituintes separados do sistema (ou\
            \ seja, conex\xF5es entre componentes que fazem parte do mesmo sistema),\
            \ incluindo componentes usados para o desenvolvimento do sistema. As conex\xF5\
            es intrassistema incluem conex\xF5es com dispositivos m\xF3veis, notebooks\
            \ e computadores de mesa, tablets, impressoras, copiadoras, aparelhos\
            \ de fac-s\xEDmile, scanners, sensores e servidores. Em vez de autorizar\
            \ cada conex\xE3o interna de sistema individualmente, as organiza\xE7\xF5\
            es podem autorizar conex\xF5es internas para uma classe de componentes\
            \ de sistema com caracter\xEDsticas e/ou configura\xE7\xF5es comuns, incluindo\
            \ impressoras, scanners e copiadoras com uma capacidade especificada de\
            \ processamento, transmiss\xE3o e armazenamento, ou smartphones e tablets\
            \ com uma configura\xE7\xE3o de linha de base espec\xEDfica. A necessidade\
            \ cont\xEDnua de uma conex\xE3o interna de sistema \xE9 revisada sob a\
            \ perspectiva de se ela fornece apoio \xE0s miss\xF5es organizacionais\
            \ ou fun\xE7\xF5es de neg\xF3cio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-9(1)
      name: Internal System Connections | Compliance Checks
      description: Perform security and privacy compliance checks on constituent system
        components prior to the establishment of the internal connection.
      annotation: Compliance checks include verification of the relevant baseline
        configuration.
      translations:
        pt:
          name: "Conex\xF5es Internas de Sistema | Verifica\xE7\xF5es de Conformidade"
          description: "Realizar verifica\xE7\xF5es de conformidade de seguran\xE7\
            a e privacidade nos componentes constituintes do sistema antes do estabelecimento\
            \ da conex\xE3o interna."
          annotation: "As verifica\xE7\xF5es de conformidade incluem a verifica\xE7\
            \xE3o da configura\xE7\xE3o de linha de base relevante."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      assessable: false
      depth: 1
      ref_id: CM
      name: Configuration Management
      translations:
        pt:
          name: "Gest\xE3o de Configura\xE7\xE3o"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] configuration management policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the configuration management
        policy and the associated configuration management controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the configuration management
        policy and procedures; and

        c. Review and update the current configuration management:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Configuration management policy and procedures address the controls
        in the CM family that are implemented within systems and organizations. The
        risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of configuration management policy and procedures. Security
        and privacy program policies and procedures at the organization level are
        preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission/business processes, and for systems, if
        needed. Procedures describe how the policies or controls are implemented and
        can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to configuration
        management policy and procedures include, but are not limited to, assessment
        or audit findings, security incidents or breaches, or changes in applicable
        laws, executive orders, directives, regulations, policies, standards, and
        guidelines. Simply restating controls does not constitute an organizational
        policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de gest\xE3o de configura\xE7\xE3o de [Sele\xE7\xE3o (uma ou mais):\
            \ n\xEDvel organizacional; n\xEDvel de processo de miss\xE3o/neg\xF3cio;\
            \ n\xEDvel de sistema] que:\n(a) Trate de prop\xF3sito, escopo, pap\xE9\
            is, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\xE3\
            o entre as entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com as leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de gest\xE3o de configura\xE7\xE3\
            o e dos controles de gest\xE3o de configura\xE7\xE3o associados;\nb. Designar\
            \ um(a) [Atribui\xE7\xE3o: respons\xE1vel oficial definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de gest\xE3o de configura\xE7\
            \xE3o; e\nc. Revisar e atualizar a atual gest\xE3o de configura\xE7\xE3\
            o:\n1. Pol\xEDtica [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de gest\xE3o de configura\xE7\
            \xE3o tratam dos controles da fam\xEDlia CM que s\xE3o implementados dentro\
            \ dos sistemas e das organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o\
            \ de risco \xE9 um fator importante no estabelecimento de tais pol\xED\
            ticas e procedimentos. Pol\xEDticas e procedimentos contribuem para a\
            \ garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante que\
            \ os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de gest\xE3o de configura\xE7\xE3\
            o. Em geral, pol\xEDticas e procedimentos dos programas de seguran\xE7\
            a e privacidade no n\xEDvel organizacional s\xE3o prefer\xEDveis e podem\
            \ dispensar a necessidade de pol\xEDticas e procedimentos espec\xEDficos\
            \ de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Os procedimentos podem ser estabelecidos para os programas de\
            \ seguran\xE7a e privacidade, para os processos de miss\xE3o/neg\xF3cio\
            \ e para os sistemas, se necess\xE1rio. Os procedimentos descrevem como\
            \ as pol\xEDticas ou os controles s\xE3o implementados e podem ser direcionados\
            \ ao indiv\xEDduo ou \xE0 fun\xE7\xE3o que \xE9 o objeto do procedimento.\
            \ Os procedimentos podem ser documentados nos planos de seguran\xE7a e\
            \ privacidade do sistema ou em um ou mais documentos separados. Eventos\
            \ que podem precipitar uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos\
            \ de gest\xE3o de configura\xE7\xE3o incluem, mas n\xE3o se limitam a,\
            \ constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\
            \xF5es de seguran\xE7a, ou altera\xE7\xF5es nas leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis. Apenas reproduzir os controles n\xE3o constitui uma pol\xEDtica\
            \ ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2
      name: Baseline Configuration
      description: 'a. Develop, document, and maintain under configuration control,
        a current baseline configuration of the system; and

        b. Review and update the baseline configuration of the system:

        1. [Assignment: organization-defined frequency];

        2. When required due to [Assignment: organization-defined circumstances];
        and

        3. When system components are installed or upgraded.'
      annotation: Baseline configurations for systems and system components include
        connectivity, operational, and communications aspects of systems. Baseline
        configurations are documented, formally reviewed, and agreed-upon specifications
        for systems or configuration items within those systems. Baseline configurations
        serve as a basis for future builds, releases, or changes to systems and include
        security and privacy control implementations, operational procedures, information
        about system components, network topology, and logical placement of components
        in the system architecture. Maintaining baseline configurations requires creating
        new baselines as organizational systems change over time. Baseline configurations
        of systems reflect the current enterprise architecture.
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base"
          description: "a. Desenvolver, documentar e manter sob controle de configura\xE7\
            \xE3o uma configura\xE7\xE3o de linha de base atual do sistema; e\nb.\
            \ Revisar e atualizar a configura\xE7\xE3o de linha de base do sistema:\n\
            1. [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o];\n\
            2. Quando exigido em raz\xE3o de [Atribui\xE7\xE3o: circunst\xE2ncias\
            \ definidas pela organiza\xE7\xE3o]; e\n3. Quando componentes do sistema\
            \ forem instalados ou atualizados."
          annotation: "As configura\xE7\xF5es de linha de base para sistemas e componentes\
            \ de sistema incluem aspectos de conectividade, operacionais e de comunica\xE7\
            \xF5es dos sistemas. As configura\xE7\xF5es de linha de base s\xE3o especifica\xE7\
            \xF5es documentadas, formalmente revisadas e acordadas para sistemas ou\
            \ itens de configura\xE7\xE3o dentro desses sistemas. As configura\xE7\
            \xF5es de linha de base servem como base para futuras constru\xE7\xF5\
            es, lan\xE7amentos ou altera\xE7\xF5es nos sistemas e incluem implementa\xE7\
            \xF5es de controles de seguran\xE7a e privacidade, procedimentos operacionais,\
            \ informa\xE7\xF5es sobre componentes do sistema, topologia de rede e\
            \ posicionamento l\xF3gico dos componentes na arquitetura do sistema.\
            \ A manuten\xE7\xE3o das configura\xE7\xF5es de linha de base exige a\
            \ cria\xE7\xE3o de novas linhas de base \xE0 medida que os sistemas organizacionais\
            \ mudam ao longo do tempo. As configura\xE7\xF5es de linha de base dos\
            \ sistemas refletem a arquitetura corporativa atual."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-11(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-11(1)
      name: User-installed Software | Alerts for Unauthorized Installations
      description: '[Withdrawn: Incorporated into CM-8(3).]'
      translations:
        pt:
          name: "Software Instalado pelo Usu\xE1rio | Alertas para Instala\xE7\xF5\
            es N\xE3o Autorizadas"
          description: '[Revogado: Incorporado ao CM-8(3).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(2)
      name: Baseline Configuration | Automation Support for Accuracy and Currency
      description: 'Maintain the currency, completeness, accuracy, and availability
        of the baseline configuration of the system using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated mechanisms that help organizations maintain consistent
        baseline configurations for systems include configuration management tools,
        hardware, software, firmware inventory tools, and network management tools.
        Automated tools can be used at the organization level, mission and business
        process level, or system level on workstations, servers, notebook computers,
        network components, or mobile devices. Tools can be used to track version
        numbers on operating systems, applications, types of software installed, and
        current patch levels. Automation support for accuracy and currency can be
        satisfied by the implementation of CM-8(2) for organizations that combine
        system component inventory and baseline configuration activities.
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Suporte de Automa\xE7\xE3o\
            \ para Precis\xE3o e Atualidade"
          description: "Manter a atualidade, completude, precis\xE3o e disponibilidade\
            \ da configura\xE7\xE3o de linha de base do sistema utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados que ajudam as organiza\xE7\xF5\
            es a manter configura\xE7\xF5es de linha de base consistentes para sistemas\
            \ incluem ferramentas de gest\xE3o de configura\xE7\xE3o, ferramentas\
            \ de invent\xE1rio de hardware, software e firmware e ferramentas de gest\xE3\
            o de rede. As ferramentas automatizadas podem ser utilizadas no n\xED\
            vel organizacional, no n\xEDvel de processo de miss\xE3o e neg\xF3cio\
            \ ou no n\xEDvel de sistema em esta\xE7\xF5es de trabalho, servidores,\
            \ notebooks, componentes de rede ou dispositivos m\xF3veis. As ferramentas\
            \ podem ser usadas para rastrear n\xFAmeros de vers\xE3o de sistemas operacionais,\
            \ aplicativos, tipos de software instalado e n\xEDveis atuais de corre\xE7\
            \xE3o. O suporte de automa\xE7\xE3o para precis\xE3o e atualidade pode\
            \ ser satisfeito pela implementa\xE7\xE3o do CM-8(2) para organiza\xE7\
            \xF5es que combinam as atividades de invent\xE1rio de componentes do sistema\
            \ e de configura\xE7\xE3o de linha de base."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(3)
      name: Baseline Configuration | Retention of Previous Configurations
      description: 'Retain [Assignment: organization-defined number] of previous versions
        of baseline configurations of the system to support rollback.'
      annotation: Retaining previous versions of baseline configurations to support
        rollback include hardware, software, firmware, configuration files, configuration
        records, and associated documentation.
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Reten\xE7\xE3o de Configura\xE7\
            \xF5es Anteriores"
          description: "Reter [Atribui\xE7\xE3o: n\xFAmero definido pela organiza\xE7\
            \xE3o] de vers\xF5es anteriores das configura\xE7\xF5es de linha de base\
            \ do sistema para apoiar o rollback (revers\xE3o)."
          annotation: "A reten\xE7\xE3o de vers\xF5es anteriores das configura\xE7\
            \xF5es de linha de base para apoiar o rollback (revers\xE3o) inclui hardware,\
            \ software, firmware, arquivos de configura\xE7\xE3o, registros de configura\xE7\
            \xE3o e documenta\xE7\xE3o associada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(1)
      name: Baseline Configuration | Reviews and Updates
      description: '[Withdrawn: Incorporated into CM-2.]'
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Revis\xF5es e Atualiza\xE7\xF5\
            es"
          description: '[Revogado: Incorporado ao CM-2.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(4)
      name: Baseline Configuration | Unauthorized Software
      description: '[Withdrawn: Incorporated into CM-7(4).]'
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Software N\xE3o Autorizado"
          description: '[Revogado: Incorporado ao CM-7(4).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(6)
      name: Baseline Configuration | Development and Test Environments
      description: Maintain a baseline configuration for system development and test
        environments that is managed separately from the operational baseline configuration.
      annotation: Establishing separate baseline configurations for development, testing,
        and operational environments protects systems from unplanned or unexpected
        events related to development and testing activities. Separate baseline configurations
        allow organizations to apply the configuration management that is most appropriate
        for each type of configuration. For example, the management of operational
        configurations typically emphasizes the need for stability, while the management
        of development or test configurations requires greater flexibility. Configurations
        in the test environment mirror configurations in the operational environment
        to the extent practicable so that the results of the testing are representative
        of the proposed changes to the operational systems. Separate baseline configurations
        do not necessarily require separate physical environments.
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Ambientes de Desenvolvimento\
            \ e Teste"
          description: "Manter uma configura\xE7\xE3o de linha de base para os ambientes\
            \ de desenvolvimento e teste do sistema que seja gerenciada separadamente\
            \ da configura\xE7\xE3o de linha de base operacional."
          annotation: "Estabelecer configura\xE7\xF5es de linha de base separadas\
            \ para os ambientes de desenvolvimento, teste e operacional protege os\
            \ sistemas de eventos n\xE3o planejados ou inesperados relacionados \xE0\
            s atividades de desenvolvimento e teste. Configura\xE7\xF5es de linha\
            \ de base separadas permitem que as organiza\xE7\xF5es apliquem a gest\xE3\
            o de configura\xE7\xE3o mais apropriada para cada tipo de configura\xE7\
            \xE3o. Por exemplo, a gest\xE3o das configura\xE7\xF5es operacionais normalmente\
            \ enfatiza a necessidade de estabilidade, ao passo que a gest\xE3o das\
            \ configura\xE7\xF5es de desenvolvimento ou teste exige maior flexibilidade.\
            \ As configura\xE7\xF5es no ambiente de teste espelham as configura\xE7\
            \xF5es no ambiente operacional na medida do poss\xEDvel, de modo que os\
            \ resultados dos testes sejam representativos das altera\xE7\xF5es propostas\
            \ aos sistemas operacionais. Configura\xE7\xF5es de linha de base separadas\
            \ n\xE3o exigem necessariamente ambientes f\xEDsicos separados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(7)
      name: Baseline Configuration | Configure Systems and Components for High-risk
        Areas
      description: '(a) Issue [Assignment: organization-defined systems or system
        components] with [Assignment: organization-defined configurations] to individuals
        traveling to locations that the organization deems to be of significant risk;
        and

        (b) Apply the following controls to the systems or components when the individuals
        return from travel: [Assignment: organization-defined controls].'
      annotation: When it is known that systems or system components will be in high-risk
        areas external to the organization, additional controls may be implemented
        to counter the increased threat in such areas. For example, organizations
        can take actions for notebook computers used by individuals departing on and
        returning from travel. Actions include determining the locations that are
        of concern, defining the required configurations for the components, ensuring
        that components are configured as intended before travel is initiated, and
        applying controls to the components after travel is completed. Specially configured
        notebook computers include computers with sanitized hard drives, limited applications,
        and more stringent configuration settings. Controls applied to mobile devices
        upon return from travel include examining the mobile device for signs of physical
        tampering and purging and reimaging disk drives. Protecting information that
        resides on mobile devices is addressed in the MP (Media Protection) family.
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Configurar Sistemas e Componentes\
            \ para \xC1reas de Alto Risco"
          description: "(a) Disponibilizar [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o] com [Atribui\xE7\xE3o:\
            \ configura\xE7\xF5es definidas pela organiza\xE7\xE3o] a indiv\xEDduos\
            \ que viajem para locais que a organiza\xE7\xE3o considere de risco significativo;\
            \ e\n(b) Aplicar os seguintes controles aos sistemas ou componentes quando\
            \ os indiv\xEDduos retornarem da viagem: [Atribui\xE7\xE3o: controles\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Quando se sabe que sistemas ou componentes de sistema estar\xE3\
            o em \xE1reas de alto risco externas \xE0 organiza\xE7\xE3o, controles\
            \ adicionais podem ser implementados para conter a amea\xE7a aumentada\
            \ em tais \xE1reas. Por exemplo, as organiza\xE7\xF5es podem adotar a\xE7\
            \xF5es para notebooks utilizados por indiv\xEDduos que partem para viagens\
            \ e delas retornam. As a\xE7\xF5es incluem determinar os locais que s\xE3\
            o motivo de preocupa\xE7\xE3o, definir as configura\xE7\xF5es necess\xE1\
            rias para os componentes, assegurar que os componentes estejam configurados\
            \ conforme pretendido antes do in\xEDcio da viagem e aplicar controles\
            \ aos componentes ap\xF3s a conclus\xE3o da viagem. Notebooks especialmente\
            \ configurados incluem computadores com discos r\xEDgidos sanitizados,\
            \ aplicativos limitados e configura\xE7\xF5es mais rigorosas. Os controles\
            \ aplicados a dispositivos m\xF3veis no retorno da viagem incluem examinar\
            \ o dispositivo m\xF3vel em busca de sinais de adultera\xE7\xE3o f\xED\
            sica e a limpeza (purga) e reimagem das unidades de disco. A prote\xE7\
            \xE3o das informa\xE7\xF5es que residem em dispositivos m\xF3veis \xE9\
            \ tratada na fam\xEDlia MP (Prote\xE7\xE3o de M\xEDdia)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3
      name: Configuration Change Control
      description: 'a. Determine and document the types of changes to the system that
        are configuration-controlled;

        b. Review proposed configuration-controlled changes to the system and approve
        or disapprove such changes with explicit consideration for security and privacy
        impact analyses;

        c. Document configuration change decisions associated with the system;

        d. Implement approved configuration-controlled changes to the system;

        e. Retain records of configuration-controlled changes to the system for [Assignment:
        organization-defined time period];

        f. Monitor and review activities associated with configuration-controlled
        changes to the system; and

        g. Coordinate and provide oversight for configuration change control activities
        through [Assignment: organization-defined configuration change control element]
        that convenes [Selection (one or more): [Assignment: organization-defined
        frequency]; when [Assignment: organization-defined configuration change conditions]].'
      annotation: Configuration change control for organizational systems involves
        the systematic proposal, justification, implementation, testing, review, and
        disposition of system changes, including system upgrades and modifications.
        Configuration change control includes changes to baseline configurations,
        configuration items of systems, operational procedures, configuration settings
        for system components, remediate vulnerabilities, and unscheduled or unauthorized
        changes. Processes for managing configuration changes to systems include Configuration
        Control Boards or Change Advisory Boards that review and approve proposed
        changes. For changes that impact privacy risk, the senior agency official
        for privacy updates privacy impact assessments and system of records notices.
        For new systems or major upgrades, organizations consider including representatives
        from the development organizations on the Configuration Control Boards or
        Change Advisory Boards. Auditing of changes includes activities before and
        after changes are made to systems and the auditing activities required to
        implement such changes. See also SA-10.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o"
          description: "a. Determinar e documentar os tipos de altera\xE7\xF5es ao\
            \ sistema que s\xE3o controlados por configura\xE7\xE3o;\nb. Revisar as\
            \ altera\xE7\xF5es controladas por configura\xE7\xE3o propostas ao sistema\
            \ e aprovar ou reprovar tais altera\xE7\xF5es com considera\xE7\xE3o expl\xED\
            cita das an\xE1lises de impacto de seguran\xE7a e privacidade;\nc. Documentar\
            \ as decis\xF5es de altera\xE7\xE3o de configura\xE7\xE3o associadas ao\
            \ sistema;\nd. Implementar as altera\xE7\xF5es controladas por configura\xE7\
            \xE3o aprovadas ao sistema;\ne. Reter os registros das altera\xE7\xF5\
            es controladas por configura\xE7\xE3o do sistema por [Atribui\xE7\xE3\
            o: per\xEDodo de tempo definido pela organiza\xE7\xE3o];\nf. Monitorar\
            \ e revisar as atividades associadas \xE0s altera\xE7\xF5es controladas\
            \ por configura\xE7\xE3o do sistema; e\ng. Coordenar e supervisionar as\
            \ atividades de controle de altera\xE7\xF5es de configura\xE7\xE3o por\
            \ meio de [Atribui\xE7\xE3o: elemento de controle de altera\xE7\xF5es\
            \ de configura\xE7\xE3o definido pela organiza\xE7\xE3o] que se re\xFA\
            ne [Sele\xE7\xE3o (uma ou mais): [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]; quando [Atribui\xE7\xE3o: condi\xE7\xF5es de\
            \ altera\xE7\xE3o de configura\xE7\xE3o definidas pela organiza\xE7\xE3\
            o]]."
          annotation: "O controle de altera\xE7\xF5es de configura\xE7\xE3o para sistemas\
            \ organizacionais envolve a proposi\xE7\xE3o, justificativa, implementa\xE7\
            \xE3o, teste, revis\xE3o e disposi\xE7\xE3o sistem\xE1ticas das altera\xE7\
            \xF5es ao sistema, incluindo atualiza\xE7\xF5es e modifica\xE7\xF5es do\
            \ sistema. O controle de altera\xE7\xF5es de configura\xE7\xE3o inclui\
            \ altera\xE7\xF5es nas configura\xE7\xF5es de linha de base, nos itens\
            \ de configura\xE7\xE3o dos sistemas, nos procedimentos operacionais,\
            \ nas configura\xE7\xF5es dos componentes do sistema, na remedia\xE7\xE3\
            o de vulnerabilidades e em altera\xE7\xF5es n\xE3o programadas ou n\xE3\
            o autorizadas. Os processos para gerenciar as altera\xE7\xF5es de configura\xE7\
            \xE3o nos sistemas incluem Comit\xEAs de Controle de Configura\xE7\xE3\
            o ou Comit\xEAs Consultivos de Altera\xE7\xF5es (Change Advisory Boards)\
            \ que revisam e aprovam as altera\xE7\xF5es propostas. Para altera\xE7\
            \xF5es que impactam o risco de privacidade, o respons\xE1vel s\xEAnior\
            \ da ag\xEAncia pela privacidade atualiza as avalia\xE7\xF5es de impacto\
            \ \xE0 privacidade e os avisos de sistema de registros. Para novos sistemas\
            \ ou atualiza\xE7\xF5es importantes, as organiza\xE7\xF5es consideram\
            \ incluir representantes das organiza\xE7\xF5es de desenvolvimento nos\
            \ Comit\xEAs de Controle de Configura\xE7\xE3o ou Comit\xEAs Consultivos\
            \ de Altera\xE7\xF5es. A auditoria das altera\xE7\xF5es inclui as atividades\
            \ antes e depois de as altera\xE7\xF5es serem feitas nos sistemas e as\
            \ atividades de auditoria necess\xE1rias para implementar tais altera\xE7\
            \xF5es. Ver tamb\xE9m SA-10."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(1)
      name: Configuration Change Control | Automated Documentation, Notification,
        and Prohibition of Changes
      description: 'Use [Assignment: organization-defined automated mechanisms] to:

        (a) Document proposed changes to the system;

        (b) Notify [Assignment: organization-defined approval authorities] of proposed
        changes to the system and request change approval;

        (c) Highlight proposed changes to the system that have not been approved or
        disapproved within [Assignment: organization-defined time period];

        (d) Prohibit changes to the system until designated approvals are received;

        (e) Document all changes to the system; and

        (f) Notify [Assignment: organization-defined personnel] when approved changes
        to the system are completed.'
      annotation: None.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Documenta\xE7\
            \xE3o, Notifica\xE7\xE3o e Proibi\xE7\xE3o Automatizadas de Altera\xE7\
            \xF5es"
          description: "Utilizar [Atribui\xE7\xE3o: mecanismos automatizados definidos\
            \ pela organiza\xE7\xE3o] para:\n(a) Documentar as altera\xE7\xF5es propostas\
            \ ao sistema;\n(b) Notificar [Atribui\xE7\xE3o: autoridades de aprova\xE7\
            \xE3o definidas pela organiza\xE7\xE3o] sobre as altera\xE7\xF5es propostas\
            \ ao sistema e solicitar aprova\xE7\xE3o da altera\xE7\xE3o;\n(c) Destacar\
            \ as altera\xE7\xF5es propostas ao sistema que n\xE3o tenham sido aprovadas\
            \ ou reprovadas dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo definido\
            \ pela organiza\xE7\xE3o];\n(d) Proibir altera\xE7\xF5es ao sistema at\xE9\
            \ que as aprova\xE7\xF5es designadas sejam recebidas;\n(e) Documentar\
            \ todas as altera\xE7\xF5es ao sistema; e\n(f) Notificar [Atribui\xE7\xE3\
            o: pessoal definido pela organiza\xE7\xE3o] quando as altera\xE7\xF5es\
            \ aprovadas ao sistema forem conclu\xEDdas."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(2)
      name: Configuration Change Control | Testing, Validation, and Documentation
        of Changes
      description: Test, validate, and document changes to the system before finalizing
        the implementation of the changes.
      annotation: Changes to systems include modifications to hardware, software,
        or firmware components and configuration settings defined in CM-6. Organizations
        ensure that testing does not interfere with system operations that support
        organizational mission and business functions. Individuals or groups conducting
        tests understand security and privacy policies and procedures, system security
        and privacy policies and procedures, and the health, safety, and environmental
        risks associated with specific facilities or processes. Operational systems
        may need to be taken offline, or replicated to the extent feasible, before
        testing can be conducted. If systems must be taken offline for testing, the
        tests are scheduled to occur during planned system outages whenever possible.
        If the testing cannot be conducted on operational systems, organizations employ
        compensating controls.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Teste, Valida\xE7\
            \xE3o e Documenta\xE7\xE3o das Altera\xE7\xF5es"
          description: "Testar, validar e documentar as altera\xE7\xF5es ao sistema\
            \ antes de finalizar a implementa\xE7\xE3o das altera\xE7\xF5es."
          annotation: "As altera\xE7\xF5es nos sistemas incluem modifica\xE7\xF5es\
            \ em componentes de hardware, software ou firmware e nas configura\xE7\
            \xF5es definidas no CM-6. As organiza\xE7\xF5es asseguram que o teste\
            \ n\xE3o interfira nas opera\xE7\xF5es do sistema que apoiam as fun\xE7\
            \xF5es de miss\xE3o e neg\xF3cio organizacionais. Os indiv\xEDduos ou\
            \ grupos que conduzem os testes compreendem as pol\xEDticas e os procedimentos\
            \ de seguran\xE7a e privacidade, as pol\xEDticas e os procedimentos de\
            \ seguran\xE7a e privacidade do sistema e os riscos \xE0 sa\xFAde, \xE0\
            \ seguran\xE7a e ao meio ambiente associados a instala\xE7\xF5es ou processos\
            \ espec\xEDficos. Os sistemas operacionais podem precisar ser colocados\
            \ fora de opera\xE7\xE3o, ou replicados na medida do vi\xE1vel, antes\
            \ que os testes possam ser conduzidos. Se os sistemas precisarem ser colocados\
            \ fora de opera\xE7\xE3o para testes, os testes s\xE3o agendados para\
            \ ocorrer durante interrup\xE7\xF5es planejadas do sistema sempre que\
            \ poss\xEDvel. Se os testes n\xE3o puderem ser conduzidos em sistemas\
            \ operacionais, as organiza\xE7\xF5es empregam controles compensat\xF3\
            rios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(3)
      name: Configuration Change Control | Automated Change Implementation
      description: 'Implement changes to the current system baseline and deploy the
        updated baseline across the installed base using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated tools can improve the accuracy, consistency, and availability
        of configuration baseline information. Automation can also provide data aggregation
        and data correlation capabilities, alerting mechanisms, and dashboards to
        support risk-based decision-making within the organization.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Implementa\xE7\
            \xE3o Automatizada de Altera\xE7\xF5es"
          description: "Implementar as altera\xE7\xF5es na linha de base atual do\
            \ sistema e implantar a linha de base atualizada em toda a base instalada\
            \ utilizando [Atribui\xE7\xE3o: mecanismos automatizados definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "As ferramentas automatizadas podem melhorar a precis\xE3o,\
            \ a consist\xEAncia e a disponibilidade das informa\xE7\xF5es da linha\
            \ de base de configura\xE7\xE3o. A automa\xE7\xE3o tamb\xE9m pode fornecer\
            \ capacidades de agrega\xE7\xE3o e correla\xE7\xE3o de dados, mecanismos\
            \ de alerta e pain\xE9is (dashboards) para apoiar a tomada de decis\xE3\
            o baseada em risco dentro da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(4)
      name: Configuration Change Control | Security and Privacy Representatives
      description: 'Require [Assignment: organization-defined security and privacy
        representatives] to be members of the [Assignment: organization-defined configuration
        change control element].'
      annotation: Information security and privacy representatives include system
        security officers, senior agency information security officers, senior agency
        officials for privacy, or system privacy officers. Representation by personnel
        with information security and privacy expertise is important because changes
        to system configurations can have unintended side effects, some of which may
        be security- or privacy-relevant. Detecting such changes early in the process
        can help avoid unintended, negative consequences that could ultimately affect
        the security and privacy posture of systems. The configuration change control
        element referred to in the second organization-defined parameter reflects
        the change control elements defined by organizations in CM-3g.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Representantes\
            \ de Seguran\xE7a e Privacidade"
          description: "Exigir que [Atribui\xE7\xE3o: representantes de seguran\xE7\
            a e privacidade definidos pela organiza\xE7\xE3o] sejam membros do [Atribui\xE7\
            \xE3o: elemento de controle de altera\xE7\xF5es de configura\xE7\xE3o\
            \ definido pela organiza\xE7\xE3o]."
          annotation: "Os representantes de seguran\xE7a da informa\xE7\xE3o e privacidade\
            \ incluem respons\xE1veis pela seguran\xE7a do sistema, respons\xE1veis\
            \ seniores de seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, respons\xE1\
            veis seniores da ag\xEAncia pela privacidade ou respons\xE1veis pela privacidade\
            \ do sistema. A representa\xE7\xE3o por pessoal com expertise em seguran\xE7\
            a da informa\xE7\xE3o e privacidade \xE9 importante porque as altera\xE7\
            \xF5es nas configura\xE7\xF5es do sistema podem ter efeitos colaterais\
            \ n\xE3o intencionais, alguns dos quais podem ser relevantes para a seguran\xE7\
            a ou a privacidade. Detectar tais altera\xE7\xF5es no in\xEDcio do processo\
            \ pode ajudar a evitar consequ\xEAncias negativas n\xE3o intencionais\
            \ que poderiam, em \xFAltima inst\xE2ncia, afetar a postura de seguran\xE7\
            a e privacidade dos sistemas. O elemento de controle de altera\xE7\xF5\
            es de configura\xE7\xE3o mencionado no segundo par\xE2metro definido pela\
            \ organiza\xE7\xE3o reflete os elementos de controle de altera\xE7\xF5\
            es definidos pelas organiza\xE7\xF5es no CM-3g."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(5)
      name: Configuration Change Control | Automated Security Response
      description: 'Implement the following security responses automatically if baseline
        configurations are changed in an unauthorized manner: [Assignment: organization-defined
        security responses].'
      annotation: Automated security responses include halting selected system functions,
        halting system processing, and issuing alerts or notifications to organizational
        personnel when there is an unauthorized modification of a configuration item.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Resposta Automatizada\
            \ de Seguran\xE7a"
          description: "Implementar as seguintes respostas de seguran\xE7a automaticamente\
            \ caso as configura\xE7\xF5es de linha de base sejam alteradas de forma\
            \ n\xE3o autorizada: [Atribui\xE7\xE3o: respostas de seguran\xE7a definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "As respostas de seguran\xE7a automatizadas incluem interromper\
            \ fun\xE7\xF5es selecionadas do sistema, interromper o processamento do\
            \ sistema e emitir alertas ou notifica\xE7\xF5es ao pessoal organizacional\
            \ quando houver uma modifica\xE7\xE3o n\xE3o autorizada de um item de\
            \ configura\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(6)
      name: Configuration Change Control | Cryptography Management
      description: 'Ensure that cryptographic mechanisms used to provide the following
        controls are under configuration management: [Assignment: organization-defined
        controls].'
      annotation: The controls referenced in the control enhancement refer to security
        and privacy controls from the control catalog. Regardless of the cryptographic
        mechanisms employed, processes and procedures are in place to manage those
        mechanisms. For example, if system components use certificates for identification
        and authentication, a process is implemented to address the expiration of
        those certificates.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Gest\xE3o de\
            \ Criptografia"
          description: "Assegurar que os mecanismos criptogr\xE1ficos utilizados para\
            \ fornecer os seguintes controles estejam sob gest\xE3o de configura\xE7\
            \xE3o: [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\xE3o]."
          annotation: "Os controles referenciados no aprimoramento de controle referem-se\
            \ aos controles de seguran\xE7a e privacidade do cat\xE1logo de controles.\
            \ Independentemente dos mecanismos criptogr\xE1ficos empregados, h\xE1\
            \ processos e procedimentos implementados para gerenciar esses mecanismos.\
            \ Por exemplo, se os componentes do sistema utilizarem certificados para\
            \ identifica\xE7\xE3o e autentica\xE7\xE3o, um processo \xE9 implementado\
            \ para tratar da expira\xE7\xE3o desses certificados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(7)
      name: Configuration Change Control | Review System Changes
      description: 'Review changes to the system [Assignment: organization-defined
        frequency] or when [Assignment: organization-defined circumstances] to determine
        whether unauthorized changes have occurred.'
      annotation: Indications that warrant a review of changes to the system and the
        specific circumstances justifying such reviews may be obtained from activities
        carried out by organizations during the configuration change process or continuous
        monitoring process.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Revisar Altera\xE7\
            \xF5es do Sistema"
          description: "Revisar as altera\xE7\xF5es ao sistema [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o] ou quando [Atribui\xE7\
            \xE3o: circunst\xE2ncias definidas pela organiza\xE7\xE3o] para determinar\
            \ se ocorreram altera\xE7\xF5es n\xE3o autorizadas."
          annotation: "Ind\xEDcios que justifiquem uma revis\xE3o das altera\xE7\xF5\
            es ao sistema e as circunst\xE2ncias espec\xEDficas que justifiquem tais\
            \ revis\xF5es podem ser obtidos a partir de atividades realizadas pelas\
            \ organiza\xE7\xF5es durante o processo de altera\xE7\xE3o de configura\xE7\
            \xE3o ou o processo de monitoramento cont\xEDnuo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-3(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-3(8)
      name: Configuration Change Control | Prevent or Restrict Configuration Changes
      description: 'Prevent or restrict changes to the configuration of the system
        under the following circumstances: [Assignment: organization-defined circumstances].'
      annotation: System configuration changes can adversely affect critical system
        security and privacy functionality. Change restrictions can be enforced through
        automated mechanisms.
      translations:
        pt:
          name: "Controle de Altera\xE7\xF5es de Configura\xE7\xE3o | Impedir ou Restringir\
            \ Altera\xE7\xF5es de Configura\xE7\xE3o"
          description: "Impedir ou restringir altera\xE7\xF5es na configura\xE7\xE3\
            o do sistema sob as seguintes circunst\xE2ncias: [Atribui\xE7\xE3o: circunst\xE2\
            ncias definidas pela organiza\xE7\xE3o]."
          annotation: "As altera\xE7\xF5es na configura\xE7\xE3o do sistema podem\
            \ afetar adversamente funcionalidades cr\xEDticas de seguran\xE7a e privacidade\
            \ do sistema. As restri\xE7\xF5es de altera\xE7\xE3o podem ser impostas\
            \ por meio de mecanismos automatizados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-4
      name: Impact Analyses
      description: Analyze changes to the system to determine potential security and
        privacy impacts prior to change implementation.
      annotation: Organizational personnel with security or privacy responsibilities
        conduct impact analyses. Individuals conducting impact analyses possess the
        necessary skills and technical expertise to analyze the changes to systems
        as well as the security or privacy ramifications. Impact analyses include
        reviewing security and privacy plans, policies, and procedures to understand
        control requirements; reviewing system design documentation and operational
        procedures to understand control implementation and how specific system changes
        might affect the controls; reviewing the impact of changes on organizational
        supply chain partners with stakeholders; and determining how potential changes
        to a system create new risks to the privacy of individuals and the ability
        of implemented controls to mitigate those risks. Impact analyses also include
        risk assessments to understand the impact of the changes and determine if
        additional controls are required.
      translations:
        pt:
          name: "An\xE1lises de Impacto"
          description: "Analisar as altera\xE7\xF5es ao sistema para determinar poss\xED\
            veis impactos de seguran\xE7a e privacidade antes da implementa\xE7\xE3\
            o da altera\xE7\xE3o."
          annotation: "O pessoal organizacional com responsabilidades de seguran\xE7\
            a ou privacidade conduz as an\xE1lises de impacto. Os indiv\xEDduos que\
            \ conduzem as an\xE1lises de impacto possuem as habilidades e a expertise\
            \ t\xE9cnica necess\xE1rias para analisar as altera\xE7\xF5es nos sistemas,\
            \ bem como as ramifica\xE7\xF5es de seguran\xE7a ou privacidade. As an\xE1\
            lises de impacto incluem revisar os planos, pol\xEDticas e procedimentos\
            \ de seguran\xE7a e privacidade para compreender os requisitos de controle;\
            \ revisar a documenta\xE7\xE3o de projeto do sistema e os procedimentos\
            \ operacionais para compreender a implementa\xE7\xE3o dos controles e\
            \ como altera\xE7\xF5es espec\xEDficas do sistema podem afetar os controles;\
            \ revisar o impacto das altera\xE7\xF5es sobre os parceiros da cadeia\
            \ de suprimentos organizacional junto \xE0s partes interessadas; e determinar\
            \ como poss\xEDveis altera\xE7\xF5es em um sistema criam novos riscos\
            \ \xE0 privacidade dos indiv\xEDduos e \xE0 capacidade dos controles implementados\
            \ de mitigar esses riscos. As an\xE1lises de impacto tamb\xE9m incluem\
            \ avalia\xE7\xF5es de risco para compreender o impacto das altera\xE7\xF5\
            es e determinar se s\xE3o necess\xE1rios controles adicionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-4(1)
      name: Impact Analyses | Separate Test Environments
      description: Analyze changes to the system in a separate test environment before
        implementation in an operational environment, looking for security and privacy
        impacts due to flaws, weaknesses, incompatibility, or intentional malice.
      annotation: A separate test environment requires an environment that is physically
        or logically separate and distinct from the operational environment. The separation
        is sufficient to ensure that activities in the test environment do not impact
        activities in the operational environment and that information in the operational
        environment is not inadvertently transmitted to the test environment. Separate
        environments can be achieved by physical or logical means. If physically separate
        test environments are not implemented, organizations determine the strength
        of mechanism required when implementing logical separation.
      translations:
        pt:
          name: "An\xE1lises de Impacto | Ambientes de Teste Separados"
          description: "Analisar as altera\xE7\xF5es ao sistema em um ambiente de\
            \ teste separado antes da implementa\xE7\xE3o em um ambiente operacional,\
            \ buscando impactos de seguran\xE7a e privacidade decorrentes de falhas,\
            \ fraquezas, incompatibilidade ou inten\xE7\xE3o maliciosa."
          annotation: "Um ambiente de teste separado requer um ambiente que seja f\xED\
            sica ou logicamente separado e distinto do ambiente operacional. A separa\xE7\
            \xE3o \xE9 suficiente para garantir que as atividades no ambiente de teste\
            \ n\xE3o impactem as atividades no ambiente operacional e que as informa\xE7\
            \xF5es no ambiente operacional n\xE3o sejam inadvertidamente transmitidas\
            \ para o ambiente de teste. Ambientes separados podem ser obtidos por\
            \ meios f\xEDsicos ou l\xF3gicos. Se ambientes de teste fisicamente separados\
            \ n\xE3o forem implementados, as organiza\xE7\xF5es determinam a robustez\
            \ do mecanismo necess\xE1ria ao implementar a separa\xE7\xE3o l\xF3gica."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-4(2)
      name: Impact Analyses | Verification of Controls
      description: After system changes, verify that the impacted controls are implemented
        correctly, operating as intended, and producing the desired outcome with regard
        to meeting the security and privacy requirements for the system.
      annotation: Implementation in this context refers to installing changed code
        in the operational system that may have an impact on security or privacy controls.
      translations:
        pt:
          name: "An\xE1lises de Impacto | Verifica\xE7\xE3o de Controles"
          description: "Ap\xF3s altera\xE7\xF5es do sistema, verificar que os controles\
            \ impactados est\xE3o implementados corretamente, operando conforme pretendido\
            \ e produzindo o resultado desejado no que diz respeito ao atendimento\
            \ dos requisitos de seguran\xE7a e privacidade do sistema."
          annotation: "A implementa\xE7\xE3o, neste contexto, refere-se \xE0 instala\xE7\
            \xE3o de c\xF3digo alterado no sistema operacional que possa ter impacto\
            \ sobre os controles de seguran\xE7a ou privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5
      name: Access Restrictions for Change
      description: Define, document, approve, and enforce physical and logical access
        restrictions associated with changes to the system.
      annotation: "Changes to the hardware, software, or firmware components of systems\
        \ or the operational procedures related to the system can potentially have\
        \ significant effects on the security of the systems or individuals\u2019\
        \ privacy. Therefore, organizations permit only qualified and authorized individuals\
        \ to access systems for purposes of initiating changes. Access restrictions\
        \ include physical and logical access controls (see AC-3 and PE-3), software\
        \ libraries, workflow automation, media libraries, abstract layers (i.e.,\
        \ changes implemented into external interfaces rather than directly into systems),\
        \ and change windows (i.e., changes occur only during specified times)."
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o"
          description: "Definir, documentar, aprovar e impor restri\xE7\xF5es de acesso\
            \ f\xEDsico e l\xF3gico associadas \xE0s altera\xE7\xF5es ao sistema."
          annotation: "As altera\xE7\xF5es nos componentes de hardware, software ou\
            \ firmware dos sistemas ou nos procedimentos operacionais relacionados\
            \ ao sistema podem potencialmente ter efeitos significativos sobre a seguran\xE7\
            a dos sistemas ou a privacidade dos indiv\xEDduos. Portanto, as organiza\xE7\
            \xF5es permitem que apenas indiv\xEDduos qualificados e autorizados acessem\
            \ os sistemas para fins de iniciar altera\xE7\xF5es. As restri\xE7\xF5\
            es de acesso incluem controles de acesso f\xEDsico e l\xF3gico (ver AC-3\
            \ e PE-3), bibliotecas de software, automa\xE7\xE3o de fluxo de trabalho,\
            \ bibliotecas de m\xEDdia, camadas de abstra\xE7\xE3o (ou seja, altera\xE7\
            \xF5es implementadas em interfaces externas em vez de diretamente nos\
            \ sistemas) e janelas de altera\xE7\xE3o (ou seja, altera\xE7\xF5es ocorrem\
            \ apenas durante hor\xE1rios especificados)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(1)
      name: Access Restrictions for Change | Automated Access Enforcement and Audit
        Records
      description: "(a) Enforce access restrictions using [Assignment: organization-defined\
        \ automated mechanisms]; and \n(b) Automatically generate audit records of\
        \ the enforcement actions."
      annotation: Organizations log system accesses associated with applying configuration
        changes to ensure that configuration change control is implemented and to
        support after-the-fact actions should organizations discover any unauthorized
        changes.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Imposi\xE7\xE3\
            o Automatizada de Acesso e Registros de Auditoria"
          description: "(a) Impor restri\xE7\xF5es de acesso utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]; e \n\
            (b) Gerar automaticamente registros de auditoria das a\xE7\xF5es de imposi\xE7\
            \xE3o."
          annotation: "As organiza\xE7\xF5es registram em log os acessos ao sistema\
            \ associados \xE0 aplica\xE7\xE3o de altera\xE7\xF5es de configura\xE7\
            \xE3o para assegurar que o controle de altera\xE7\xF5es de configura\xE7\
            \xE3o seja implementado e para apoiar a\xE7\xF5es posteriores caso as\
            \ organiza\xE7\xF5es descubram quaisquer altera\xE7\xF5es n\xE3o autorizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-2(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-2(5)
      name: Baseline Configuration | Authorized Software
      description: '[Withdrawn: Incorporated into CM-7(5).]'
      translations:
        pt:
          name: "Configura\xE7\xE3o de Linha de Base | Software Autorizado"
          description: '[Revogado: Incorporado ao CM-7(5).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(2)
      name: Access Restrictions for Change | Review System Changes
      description: '[Withdrawn: Incorporated into CM-3(7).]'
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Revisar Altera\xE7\
            \xF5es do Sistema"
          description: '[Revogado: Incorporado ao CM-3(7).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(4)
      name: Access Restrictions for Change | Dual Authorization
      description: 'Enforce dual authorization for implementing changes to [Assignment:
        organization-defined system components and system-level information].'
      annotation: Organizations employ dual authorization to help ensure that any
        changes to selected system components and information cannot occur unless
        two qualified individuals approve and implement such changes. The two individuals
        possess the skills and expertise to determine if the proposed changes are
        correct implementations of approved changes. The individuals are also accountable
        for the changes. Dual authorization may also be known as two-person control.
        To reduce the risk of collusion, organizations consider rotating dual authorization
        duties to other individuals. System-level information includes operational
        procedures.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Dupla Autoriza\xE7\
            \xE3o"
          description: "Impor dupla autoriza\xE7\xE3o para a implementa\xE7\xE3o de\
            \ altera\xE7\xF5es em [Atribui\xE7\xE3o: componentes de sistema e informa\xE7\
            \xF5es de n\xEDvel de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es empregam a dupla autoriza\xE7\xE3o para\
            \ ajudar a assegurar que quaisquer altera\xE7\xF5es em componentes de\
            \ sistema e informa\xE7\xF5es selecionados n\xE3o possam ocorrer a menos\
            \ que dois indiv\xEDduos qualificados aprovem e implementem tais altera\xE7\
            \xF5es. Os dois indiv\xEDduos possuem as habilidades e a expertise para\
            \ determinar se as altera\xE7\xF5es propostas s\xE3o implementa\xE7\xF5\
            es corretas das altera\xE7\xF5es aprovadas. Os indiv\xEDduos tamb\xE9\
            m s\xE3o responsabiliz\xE1veis pelas altera\xE7\xF5es. A dupla autoriza\xE7\
            \xE3o tamb\xE9m pode ser conhecida como controle de duas pessoas. Para\
            \ reduzir o risco de conluio, as organiza\xE7\xF5es consideram revezar\
            \ as atribui\xE7\xF5es de dupla autoriza\xE7\xE3o entre outros indiv\xED\
            duos. As informa\xE7\xF5es de n\xEDvel de sistema incluem procedimentos\
            \ operacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(5)
      name: Access Restrictions for Change | Privilege Limitation for Production and
        Operation
      description: '(a) Limit privileges to change system components and system-related
        information within a production or operational environment; and

        (b) Review and reevaluate privileges [Assignment: organization-defined frequency].'
      annotation: In many organizations, systems support multiple mission and business
        functions. Limiting privileges to change system components with respect to
        operational systems is necessary because changes to a system component may
        have far-reaching effects on mission and business processes supported by the
        system. The relationships between systems and mission/business processes are,
        in some cases, unknown to developers. System-related information includes
        operational procedures.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Limita\xE7\xE3\
            o de Privil\xE9gios para Produ\xE7\xE3o e Opera\xE7\xE3o"
          description: "(a) Limitar os privil\xE9gios para alterar componentes de\
            \ sistema e informa\xE7\xF5es relacionadas ao sistema dentro de um ambiente\
            \ de produ\xE7\xE3o ou operacional; e\n(b) Revisar e reavaliar os privil\xE9\
            gios [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Em muitas organiza\xE7\xF5es, os sistemas apoiam m\xFAltiplas\
            \ fun\xE7\xF5es de miss\xE3o e neg\xF3cio. Limitar os privil\xE9gios para\
            \ alterar componentes do sistema com rela\xE7\xE3o aos sistemas operacionais\
            \ \xE9 necess\xE1rio porque altera\xE7\xF5es em um componente do sistema\
            \ podem ter efeitos de longo alcance sobre os processos de miss\xE3o e\
            \ neg\xF3cio apoiados pelo sistema. As rela\xE7\xF5es entre os sistemas\
            \ e os processos de miss\xE3o/neg\xF3cio s\xE3o, em alguns casos, desconhecidas\
            \ pelos desenvolvedores. As informa\xE7\xF5es relacionadas ao sistema\
            \ incluem procedimentos operacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(6)
      name: Access Restrictions for Change | Limit Library Privileges
      description: Limit privileges to change software resident within software libraries.
      annotation: Software libraries include privileged programs.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Limitar Privil\xE9\
            gios de Biblioteca"
          description: "Limitar os privil\xE9gios para alterar software residente\
            \ em bibliotecas de software."
          annotation: As bibliotecas de software incluem programas privilegiados.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(3)
      name: Access Restrictions for Change | Signed Components
      description: '[Withdrawn: Moved to CM-14.]'
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Componentes Assinados"
          description: '[Revogado: Movido para CM-14.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-6
      name: Configuration Settings
      description: 'a. Establish and document configuration settings for components
        employed within the system that reflect the most restrictive mode consistent
        with operational requirements using [Assignment: organization-defined common
        secure configurations];

        b. Implement the configuration settings;

        c. Identify, document, and approve any deviations from established configuration
        settings for [Assignment: organization-defined system components] based on
        [Assignment: organization-defined operational requirements]; and

        d. Monitor and control changes to the configuration settings in accordance
        with organizational policies and procedures.'
      annotation: 'Configuration settings are the parameters that can be changed in
        the hardware, software, or firmware components of the system that affect the
        security and privacy posture or functionality of the system. Information technology
        products for which configuration settings can be defined include mainframe
        computers, servers, workstations, operating systems, mobile devices, input/output
        devices, protocols, and applications. Parameters that impact the security
        posture of systems include registry settings; account, file, or directory
        permission settings; and settings for functions, protocols, ports, services,
        and remote connections. Privacy parameters are parameters impacting the privacy
        posture of systems, including the parameters required to satisfy other privacy
        controls. Privacy parameters include settings for access controls, data processing
        preferences, and processing and retention permissions. Organizations establish
        organization-wide configuration settings and subsequently derive specific
        configuration settings for systems. The established settings become part of
        the configuration baseline for the system.

        Common secure configurations (also known as security configuration checklists,
        lockdown and hardening guides, and security reference guides) provide recognized,
        standardized, and established benchmarks that stipulate secure configuration
        settings for information technology products and platforms as well as instructions
        for configuring those products or platforms to meet operational requirements.
        Common secure configurations can be developed by a variety of organizations,
        including information technology product developers, manufacturers, vendors,
        federal agencies, consortia, academia, industry, and other organizations in
        the public and private sectors.

        Implementation of a common secure configuration may be mandated at the organization
        level, mission and business process level, system level, or at a higher level,
        including by a regulatory agency. Common secure configurations include the
        United States Government Configuration Baseline USGCB and security technical
        implementation guides (STIGs), which affect the implementation of CM-6 and
        other controls such as AC-19 and CM-7. The Security Content Automation Protocol
        (SCAP) and the defined standards within the protocol provide an effective
        method to uniquely identify, track, and control configuration settings.'
      translations:
        pt:
          name: "Defini\xE7\xF5es de Configura\xE7\xE3o"
          description: "a. Estabelecer e documentar defini\xE7\xF5es de configura\xE7\
            \xE3o para os componentes empregados no sistema que reflitam o modo mais\
            \ restritivo compat\xEDvel com os requisitos operacionais, utilizando\
            \ [Atribui\xE7\xE3o: configura\xE7\xF5es seguras comuns definidas pela\
            \ organiza\xE7\xE3o];\nb. Implementar as defini\xE7\xF5es de configura\xE7\
            \xE3o;\nc. Identificar, documentar e aprovar quaisquer desvios em rela\xE7\
            \xE3o \xE0s defini\xE7\xF5es de configura\xE7\xE3o estabelecidas para\
            \ [Atribui\xE7\xE3o: componentes de sistema definidos pela organiza\xE7\
            \xE3o] com base em [Atribui\xE7\xE3o: requisitos operacionais definidos\
            \ pela organiza\xE7\xE3o]; e\nd. Monitorar e controlar as altera\xE7\xF5\
            es nas defini\xE7\xF5es de configura\xE7\xE3o de acordo com as pol\xED\
            ticas e procedimentos organizacionais."
          annotation: "As defini\xE7\xF5es de configura\xE7\xE3o s\xE3o os par\xE2\
            metros que podem ser alterados nos componentes de hardware, software ou\
            \ firmware do sistema e que afetam a postura de seguran\xE7a e privacidade\
            \ ou a funcionalidade do sistema. Os produtos de tecnologia da informa\xE7\
            \xE3o para os quais \xE9 poss\xEDvel definir defini\xE7\xF5es de configura\xE7\
            \xE3o incluem computadores de grande porte (mainframes), servidores, esta\xE7\
            \xF5es de trabalho, sistemas operacionais, dispositivos m\xF3veis, dispositivos\
            \ de entrada/sa\xEDda, protocolos e aplica\xE7\xF5es. Os par\xE2metros\
            \ que afetam a postura de seguran\xE7a dos sistemas incluem configura\xE7\
            \xF5es de registro (registry); configura\xE7\xF5es de permiss\xE3o de\
            \ contas, arquivos ou diret\xF3rios; e configura\xE7\xF5es de fun\xE7\xF5\
            es, protocolos, portas, servi\xE7os e conex\xF5es remotas. Os par\xE2\
            metros de privacidade s\xE3o par\xE2metros que afetam a postura de privacidade\
            \ dos sistemas, incluindo os par\xE2metros necess\xE1rios para satisfazer\
            \ outros controles de privacidade. Os par\xE2metros de privacidade incluem\
            \ configura\xE7\xF5es de controles de acesso, prefer\xEAncias de tratamento\
            \ de dados e permiss\xF5es de processamento e reten\xE7\xE3o. As organiza\xE7\
            \xF5es estabelecem defini\xE7\xF5es de configura\xE7\xE3o para toda a\
            \ organiza\xE7\xE3o e, subsequentemente, derivam defini\xE7\xF5es de configura\xE7\
            \xE3o espec\xEDficas para os sistemas. As defini\xE7\xF5es estabelecidas\
            \ tornam-se parte da linha de base de configura\xE7\xE3o do sistema.\n\
            As configura\xE7\xF5es seguras comuns (tamb\xE9m conhecidas como listas\
            \ de verifica\xE7\xE3o de configura\xE7\xE3o de seguran\xE7a, guias de\
            \ bloqueio e fortalecimento [hardening] e guias de refer\xEAncia de seguran\xE7\
            a) fornecem par\xE2metros de refer\xEAncia (benchmarks) reconhecidos,\
            \ padronizados e estabelecidos que estipulam defini\xE7\xF5es de configura\xE7\
            \xE3o seguras para produtos e plataformas de tecnologia da informa\xE7\
            \xE3o, bem como instru\xE7\xF5es para configurar esses produtos ou plataformas\
            \ a fim de atender aos requisitos operacionais. As configura\xE7\xF5es\
            \ seguras comuns podem ser desenvolvidas por uma variedade de organiza\xE7\
            \xF5es, incluindo desenvolvedores de produtos de tecnologia da informa\xE7\
            \xE3o, fabricantes, fornecedores, ag\xEAncias federais, cons\xF3rcios,\
            \ academia, ind\xFAstria e outras organiza\xE7\xF5es dos setores p\xFA\
            blico e privado.\nA implementa\xE7\xE3o de uma configura\xE7\xE3o segura\
            \ comum pode ser obrigat\xF3ria no n\xEDvel da organiza\xE7\xE3o, no n\xED\
            vel de processos de miss\xE3o e de neg\xF3cio, no n\xEDvel do sistema,\
            \ ou em um n\xEDvel superior, inclusive por uma ag\xEAncia reguladora.\
            \ As configura\xE7\xF5es seguras comuns incluem a Linha de Base de Configura\xE7\
            \xE3o do Governo dos Estados Unidos (USGCB) e os guias de implementa\xE7\
            \xE3o t\xE9cnica de seguran\xE7a (STIGs), que afetam a implementa\xE7\xE3\
            o do CM-6 e de outros controles, como AC-19 e CM-7. O Protocolo de Automa\xE7\
            \xE3o de Conte\xFAdo de Seguran\xE7a (SCAP) e os padr\xF5es definidos\
            \ dentro do protocolo fornecem um m\xE9todo eficaz para identificar, rastrear\
            \ e controlar de forma \xFAnica as defini\xE7\xF5es de configura\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-6(1)
      name: Configuration Settings | Automated Management, Application, and Verification
      description: 'Manage, apply, and verify configuration settings for [Assignment:
        organization-defined system components] using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated tools (e.g., hardening tools, baseline configuration tools)
        can improve the accuracy, consistency, and availability of configuration settings
        information. Automation can also provide data aggregation and data correlation
        capabilities, alerting mechanisms, and dashboards to support risk-based decision-making
        within the organization.
      translations:
        pt:
          name: "Defini\xE7\xF5es de Configura\xE7\xE3o | Gerenciamento, Aplica\xE7\
            \xE3o e Verifica\xE7\xE3o Automatizados"
          description: "Gerenciar, aplicar e verificar as defini\xE7\xF5es de configura\xE7\
            \xE3o para [Atribui\xE7\xE3o: componentes de sistema definidos pela organiza\xE7\
            \xE3o] utilizando [Atribui\xE7\xE3o: mecanismos automatizados definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Ferramentas automatizadas (por exemplo, ferramentas de fortalecimento\
            \ [hardening], ferramentas de configura\xE7\xE3o de linha de base) podem\
            \ melhorar a precis\xE3o, a consist\xEAncia e a disponibilidade das informa\xE7\
            \xF5es sobre as defini\xE7\xF5es de configura\xE7\xE3o. A automa\xE7\xE3\
            o tamb\xE9m pode fornecer recursos de agrega\xE7\xE3o e correla\xE7\xE3\
            o de dados, mecanismos de alerta e pain\xE9is (dashboards) para apoiar\
            \ a tomada de decis\xE3o baseada em risco dentro da organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-6(2)
      name: Configuration Settings | Respond to Unauthorized Changes
      description: 'Take the following actions in response to unauthorized changes
        to [Assignment: organization-defined configuration settings]: [Assignment:
        organization-defined actions].'
      annotation: "Responses to unauthorized changes to configuration settings include\
        \ alerting designated organizational personnel, restoring established configuration\
        \ settings, or\u2014in extreme cases\u2014halting affected system processing."
      translations:
        pt:
          name: "Defini\xE7\xF5es de Configura\xE7\xE3o | Resposta a Altera\xE7\xF5\
            es N\xE3o Autorizadas"
          description: "Adotar as seguintes a\xE7\xF5es em resposta a altera\xE7\xF5\
            es n\xE3o autorizadas nas [Atribui\xE7\xE3o: defini\xE7\xF5es de configura\xE7\
            \xE3o definidas pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: a\xE7\xF5\
            es definidas pela organiza\xE7\xE3o]."
          annotation: "As respostas a altera\xE7\xF5es n\xE3o autorizadas nas defini\xE7\
            \xF5es de configura\xE7\xE3o incluem alertar o pessoal organizacional\
            \ designado, restaurar as defini\xE7\xF5es de configura\xE7\xE3o estabelecidas\
            \ ou \u2014 em casos extremos \u2014 interromper o processamento do sistema\
            \ afetado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-5(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-5(7)
      name: Access Restrictions for Change | Automatic Implementation of Security
        Safeguards
      description: '[Withdrawn: Incorporated into SI-7.]'
      translations:
        pt:
          name: "Restri\xE7\xF5es de Acesso para Altera\xE7\xE3o | Implementa\xE7\xE3\
            o Autom\xE1tica de Salvaguardas de Seguran\xE7a"
          description: '[Retirado: Incorporado ao SI-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-6(3)
      name: Configuration Settings | Unauthorized Change Detection
      description: '[Withdrawn: Incorporated into SI-7.]'
      translations:
        pt:
          name: "Defini\xE7\xF5es de Configura\xE7\xE3o | Detec\xE7\xE3o de Altera\xE7\
            \xF5es N\xE3o Autorizadas"
          description: '[Retirado: Incorporado ao SI-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7
      name: Least Functionality
      description: 'a. Configure the system to provide only [Assignment: organization-defined
        mission essential capabilities]; and

        b. Prohibit or restrict the use of the following functions, ports, protocols,
        software, and/or services: [Assignment: organization-defined prohibited or
        restricted functions, system ports, protocols, software, and/or services].'
      annotation: Systems provide a wide variety of functions and services. Some of
        the functions and services routinely provided by default may not be necessary
        to support essential organizational missions, functions, or operations. Additionally,
        it is sometimes convenient to provide multiple services from a single system
        component, but doing so increases risk over limiting the services provided
        by that single component. Where feasible, organizations limit component functionality
        to a single function per component. Organizations consider removing unused
        or unnecessary software and disabling unused or unnecessary physical and logical
        ports and protocols to prevent unauthorized connection of components, transfer
        of information, and tunneling. Organizations employ network scanning tools,
        intrusion detection and prevention systems, and end-point protection technologies,
        such as firewalls and host-based intrusion detection systems, to identify
        and prevent the use of prohibited functions, protocols, ports, and services.
        Least functionality can also be achieved as part of the fundamental design
        and development of the system (see SA-8, SC-2, and SC-3).
      translations:
        pt:
          name: "Funcionalidade M\xEDnima"
          description: "a. Configurar o sistema para fornecer apenas [Atribui\xE7\xE3\
            o: capacidades essenciais \xE0 miss\xE3o definidas pela organiza\xE7\xE3\
            o]; e\nb. Proibir ou restringir o uso das seguintes fun\xE7\xF5es, portas,\
            \ protocolos, softwares e/ou servi\xE7os: [Atribui\xE7\xE3o: fun\xE7\xF5\
            es, portas de sistema, protocolos, softwares e/ou servi\xE7os proibidos\
            \ ou restritos definidos pela organiza\xE7\xE3o]."
          annotation: "Os sistemas fornecem uma ampla variedade de fun\xE7\xF5es e\
            \ servi\xE7os. Algumas das fun\xE7\xF5es e servi\xE7os fornecidos rotineiramente\
            \ por padr\xE3o podem n\xE3o ser necess\xE1rios para apoiar miss\xF5es,\
            \ fun\xE7\xF5es ou opera\xE7\xF5es organizacionais essenciais. Al\xE9\
            m disso, \xE0s vezes \xE9 conveniente fornecer m\xFAltiplos servi\xE7\
            os a partir de um \xFAnico componente de sistema, mas fazer isso aumenta\
            \ o risco em compara\xE7\xE3o com limitar os servi\xE7os fornecidos por\
            \ esse \xFAnico componente. Onde for vi\xE1vel, as organiza\xE7\xF5es\
            \ limitam a funcionalidade do componente a uma \xFAnica fun\xE7\xE3o por\
            \ componente. As organiza\xE7\xF5es consideram a remo\xE7\xE3o de software\
            \ n\xE3o utilizado ou desnecess\xE1rio e a desativa\xE7\xE3o de portas\
            \ e protocolos f\xEDsicos e l\xF3gicos n\xE3o utilizados ou desnecess\xE1\
            rios para impedir a conex\xE3o n\xE3o autorizada de componentes, a transfer\xEA\
            ncia de informa\xE7\xF5es e o tunelamento. As organiza\xE7\xF5es empregam\
            \ ferramentas de varredura de rede, sistemas de detec\xE7\xE3o e preven\xE7\
            \xE3o de intrus\xE3o e tecnologias de prote\xE7\xE3o de endpoint, como\
            \ firewalls e sistemas de detec\xE7\xE3o de intrus\xE3o baseados em host,\
            \ para identificar e impedir o uso de fun\xE7\xF5es, protocolos, portas\
            \ e servi\xE7os proibidos. A funcionalidade m\xEDnima tamb\xE9m pode ser\
            \ alcan\xE7ada como parte do projeto e desenvolvimento fundamentais do\
            \ sistema (consulte SA-8, SC-2 e SC-3)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(1)
      name: Least Functionality | Periodic Review
      description: '(a) Review the system [Assignment: organization-defined frequency]
        to identify unnecessary and/or nonsecure functions, ports, protocols, software,
        and services; and

        (b) Disable or remove [Assignment: organization-defined functions, ports,
        protocols, software, and services within the system deemed to be unnecessary
        and/or nonsecure].'
      annotation: Organizations review functions, ports, protocols, and services provided
        by systems or system components to determine the functions and services that
        are candidates for elimination. Such reviews are especially important during
        transition periods from older technologies to newer technologies (e.g., transition
        from IPv4 to IPv6). These technology transitions may require implementing
        the older and newer technologies simultaneously during the transition period
        and returning to minimum essential functions, ports, protocols, and services
        at the earliest opportunity. Organizations can either decide the relative
        security of the function, port, protocol, and/or service or base the security
        decision on the assessment of other entities. Unsecure protocols include Bluetooth,
        FTP, and peer-to-peer networking.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Revis\xE3o Peri\xF3dica"
          description: "(a) Revisar o sistema [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] para identificar fun\xE7\xF5es, portas, protocolos,\
            \ softwares e servi\xE7os desnecess\xE1rios e/ou n\xE3o seguros; e\n(b)\
            \ Desativar ou remover [Atribui\xE7\xE3o: fun\xE7\xF5es, portas, protocolos,\
            \ softwares e servi\xE7os dentro do sistema considerados desnecess\xE1\
            rios e/ou n\xE3o seguros definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es revisam as fun\xE7\xF5es, portas, protocolos\
            \ e servi\xE7os fornecidos pelos sistemas ou componentes de sistema para\
            \ determinar quais fun\xE7\xF5es e servi\xE7os s\xE3o candidatos \xE0\
            \ elimina\xE7\xE3o. Tais revis\xF5es s\xE3o especialmente importantes\
            \ durante os per\xEDodos de transi\xE7\xE3o de tecnologias mais antigas\
            \ para tecnologias mais novas (por exemplo, a transi\xE7\xE3o de IPv4\
            \ para IPv6). Essas transi\xE7\xF5es tecnol\xF3gicas podem exigir a implementa\xE7\
            \xE3o simult\xE2nea das tecnologias mais antigas e mais novas durante\
            \ o per\xEDodo de transi\xE7\xE3o e o retorno \xE0s fun\xE7\xF5es, portas,\
            \ protocolos e servi\xE7os essenciais m\xEDnimos na primeira oportunidade.\
            \ As organiza\xE7\xF5es podem decidir sobre a seguran\xE7a relativa da\
            \ fun\xE7\xE3o, porta, protocolo e/ou servi\xE7o ou basear a decis\xE3\
            o de seguran\xE7a na avalia\xE7\xE3o de outras entidades. Protocolos n\xE3\
            o seguros incluem Bluetooth, FTP e rede ponto a ponto (peer-to-peer)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(2)
      name: Least Functionality | Prevent Program Execution
      description: 'Prevent program execution in accordance with [Selection (one or
        more): [Assignment: organization-defined policies, rules of behavior, and/or
        access agreements regarding software program usage and restrictions]; rules
        authorizing the terms and conditions of software program usage].'
      annotation: Prevention of program execution addresses organizational policies,
        rules of behavior, and/or access agreements that restrict software usage and
        the terms and conditions imposed by the developer or manufacturer, including
        software licensing and copyrights. Restrictions include prohibiting auto-execute
        features, restricting roles allowed to approve program execution, permitting
        or prohibiting specific software programs, or restricting the number of program
        instances executed at the same time.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Impedir Execu\xE7\xE3o de Programas"
          description: "Impedir a execu\xE7\xE3o de programas de acordo com [Sele\xE7\
            \xE3o (um ou mais): [Atribui\xE7\xE3o: pol\xEDticas, regras de comportamento\
            \ e/ou acordos de acesso definidos pela organiza\xE7\xE3o relativos ao\
            \ uso e \xE0s restri\xE7\xF5es de programas de software]; regras que autorizam\
            \ os termos e condi\xE7\xF5es de uso de programas de software]."
          annotation: "A preven\xE7\xE3o da execu\xE7\xE3o de programas aborda pol\xED\
            ticas organizacionais, regras de comportamento e/ou acordos de acesso\
            \ que restringem o uso de software e os termos e condi\xE7\xF5es impostos\
            \ pelo desenvolvedor ou fabricante, incluindo licenciamento de software\
            \ e direitos autorais. As restri\xE7\xF5es incluem proibir recursos de\
            \ execu\xE7\xE3o autom\xE1tica (auto-execute), restringir os pap\xE9is\
            \ autorizados a aprovar a execu\xE7\xE3o de programas, permitir ou proibir\
            \ programas de software espec\xEDficos ou restringir o n\xFAmero de inst\xE2\
            ncias de programas executadas ao mesmo tempo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(3)
      name: Least Functionality | Registration Compliance
      description: 'Ensure compliance with [Assignment: organization-defined registration
        requirements for functions, ports, protocols, and services].'
      annotation: Organizations use the registration process to manage, track, and
        provide oversight for systems and implemented functions, ports, protocols,
        and services.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Conformidade de Registro"
          description: "Garantir a conformidade com [Atribui\xE7\xE3o: requisitos\
            \ de registro definidos pela organiza\xE7\xE3o para fun\xE7\xF5es, portas,\
            \ protocolos e servi\xE7os]."
          annotation: "As organiza\xE7\xF5es utilizam o processo de registro para\
            \ gerenciar, rastrear e fornecer supervis\xE3o sobre os sistemas e as\
            \ fun\xE7\xF5es, portas, protocolos e servi\xE7os implementados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(4)
      name: "Least Functionality | Unauthorized Software \u2014 Deny-by-exception"
      description: '(a) Identify [Assignment: organization-defined software programs
        not authorized to execute on the system];

        (b) Employ an allow-all, deny-by-exception policy to prohibit the execution
        of unauthorized software programs on the system; and

        (c) Review and update the list of unauthorized software programs [Assignment:
        organization-defined frequency].'
      annotation: Unauthorized software programs can be limited to specific versions
        or from a specific source. The concept of prohibiting the execution of unauthorized
        software may also be applied to user actions, system ports and protocols,
        IP addresses/ranges, websites, and MAC addresses.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Software N\xE3o Autorizado \u2014 Nega\xE7\
            \xE3o por Exce\xE7\xE3o"
          description: "(a) Identificar [Atribui\xE7\xE3o: programas de software n\xE3\
            o autorizados a serem executados no sistema definidos pela organiza\xE7\
            \xE3o];\n(b) Empregar uma pol\xEDtica de permitir-tudo, negar-por-exce\xE7\
            \xE3o para proibir a execu\xE7\xE3o de programas de software n\xE3o autorizados\
            \ no sistema; e\n(c) Revisar e atualizar a lista de programas de software\
            \ n\xE3o autorizados [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o]."
          annotation: "Os programas de software n\xE3o autorizados podem ser limitados\
            \ a vers\xF5es espec\xEDficas ou a uma fonte espec\xEDfica. O conceito\
            \ de proibir a execu\xE7\xE3o de software n\xE3o autorizado tamb\xE9m\
            \ pode ser aplicado a a\xE7\xF5es de usu\xE1rio, portas e protocolos de\
            \ sistema, endere\xE7os/faixas de IP, websites e endere\xE7os MAC."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(5)
      name: "Least Functionality | Authorized Software \u2014 Allow-by-exception"
      description: '(a) Identify [Assignment: organization-defined software programs
        authorized to execute on the system];

        (b) Employ a deny-all, permit-by-exception policy to allow the execution of
        authorized software programs on the system; and

        (c) Review and update the list of authorized software programs [Assignment:
        organization-defined frequency].'
      annotation: Authorized software programs can be limited to specific versions
        or from a specific source. To facilitate a comprehensive authorized software
        process and increase the strength of protection for attacks that bypass application
        level authorized software, software programs may be decomposed into and monitored
        at different levels of detail. These levels include applications, application
        programming interfaces, application modules, scripts, system processes, system
        services, kernel functions, registries, drivers, and dynamic link libraries.
        The concept of permitting the execution of authorized software may also be
        applied to user actions, system ports and protocols, IP addresses/ranges,
        websites, and MAC addresses. Organizations consider verifying the integrity
        of authorized software programs using digital signatures, cryptographic checksums,
        or hash functions. Verification of authorized software can occur either prior
        to execution or at system startup. The identification of authorized URLs for
        websites is addressed in CA-3(5) and SC-7.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Software Autorizado \u2014 Permiss\xE3\
            o por Exce\xE7\xE3o"
          description: "(a) Identificar [Atribui\xE7\xE3o: programas de software autorizados\
            \ a serem executados no sistema definidos pela organiza\xE7\xE3o];\n(b)\
            \ Empregar uma pol\xEDtica de negar-tudo, permitir-por-exce\xE7\xE3o para\
            \ permitir a execu\xE7\xE3o de programas de software autorizados no sistema;\
            \ e\n(c) Revisar e atualizar a lista de programas de software autorizados\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Os programas de software autorizados podem ser limitados a\
            \ vers\xF5es espec\xEDficas ou a uma fonte espec\xEDfica. Para facilitar\
            \ um processo abrangente de software autorizado e aumentar a robustez\
            \ da prote\xE7\xE3o contra ataques que contornam o software autorizado\
            \ em n\xEDvel de aplica\xE7\xE3o, os programas de software podem ser decompostos\
            \ e monitorados em diferentes n\xEDveis de detalhe. Esses n\xEDveis incluem\
            \ aplica\xE7\xF5es, interfaces de programa\xE7\xE3o de aplica\xE7\xF5\
            es (APIs), m\xF3dulos de aplica\xE7\xE3o, scripts, processos de sistema,\
            \ servi\xE7os de sistema, fun\xE7\xF5es de kernel, registros (registries),\
            \ drivers e bibliotecas de v\xEDnculo din\xE2mico (DLLs). O conceito de\
            \ permitir a execu\xE7\xE3o de software autorizado tamb\xE9m pode ser\
            \ aplicado a a\xE7\xF5es de usu\xE1rio, portas e protocolos de sistema,\
            \ endere\xE7os/faixas de IP, websites e endere\xE7os MAC. As organiza\xE7\
            \xF5es consideram verificar a integridade dos programas de software autorizados\
            \ utilizando assinaturas digitais, somas de verifica\xE7\xE3o criptogr\xE1\
            ficas (checksums) ou fun\xE7\xF5es de hash. A verifica\xE7\xE3o do software\
            \ autorizado pode ocorrer antes da execu\xE7\xE3o ou na inicializa\xE7\
            \xE3o do sistema. A identifica\xE7\xE3o de URLs autorizadas para websites\
            \ \xE9 abordada em CA-3(5) e SC-7."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(6)
      name: Least Functionality | Confined Environments with Limited Privileges
      description: 'Require that the following user-installed software execute in
        a confined physical or virtual machine environment with limited privileges:
        [Assignment: organization-defined user-installed software].'
      annotation: Organizations identify software that may be of concern regarding
        its origin or potential for containing malicious code. For this type of software,
        user installations occur in confined environments of operation to limit or
        contain damage from malicious code that may be executed.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Ambientes Confinados com Privil\xE9gios\
            \ Limitados"
          description: "Exigir que o seguinte software instalado pelo usu\xE1rio seja\
            \ executado em um ambiente confinado de m\xE1quina f\xEDsica ou virtual\
            \ com privil\xE9gios limitados: [Atribui\xE7\xE3o: software instalado\
            \ pelo usu\xE1rio definido pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es identificam software que pode ser motivo\
            \ de preocupa\xE7\xE3o quanto \xE0 sua origem ou ao potencial de conter\
            \ c\xF3digo malicioso. Para esse tipo de software, as instala\xE7\xF5\
            es pelo usu\xE1rio ocorrem em ambientes confinados de opera\xE7\xE3o para\
            \ limitar ou conter os danos decorrentes de c\xF3digo malicioso que possa\
            \ ser executado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(7)
      name: Least Functionality | Code Execution in Protected Environments
      description: 'Allow execution of binary or machine-executable code only in confined
        physical or virtual machine environments and with the explicit approval of
        [Assignment: organization-defined personnel or roles] when such code is:

        (a) Obtained from sources with limited or no warranty; and/or

        (b) Without the provision of source code.'
      annotation: Code execution in protected environments applies to all sources
        of binary or machine-executable code, including commercial software and firmware
        and open-source software.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Execu\xE7\xE3o de C\xF3digo em Ambientes\
            \ Protegidos"
          description: "Permitir a execu\xE7\xE3o de c\xF3digo bin\xE1rio ou execut\xE1\
            vel por m\xE1quina apenas em ambientes confinados de m\xE1quina f\xED\
            sica ou virtual e com a aprova\xE7\xE3o expl\xEDcita de [Atribui\xE7\xE3\
            o: pessoal ou pap\xE9is definidos pela organiza\xE7\xE3o] quando tal c\xF3\
            digo for:\n(a) Obtido de fontes com garantia limitada ou inexistente;\
            \ e/ou\n(b) Sem o fornecimento do c\xF3digo-fonte."
          annotation: "A execu\xE7\xE3o de c\xF3digo em ambientes protegidos aplica-se\
            \ a todas as fontes de c\xF3digo bin\xE1rio ou execut\xE1vel por m\xE1\
            quina, incluindo software e firmware comerciais e software de c\xF3digo\
            \ aberto (open-source)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(8)
      name: Least Functionality | Binary or Machine Executable Code
      description: '(a) Prohibit the use of binary or machine-executable code from
        sources with limited or no warranty or without the provision of source code;
        and

        (b) Allow exceptions only for compelling mission or operational requirements
        and with the approval of the authorizing official.'
      annotation: Binary or machine executable code applies to all sources of binary
        or machine-executable code, including commercial software and firmware and
        open-source software. Organizations assess software products without accompanying
        source code or from sources with limited or no warranty for potential security
        impacts. The assessments address the fact that software products without the
        provision of source code may be difficult to review, repair, or extend. In
        addition, there may be no owners to make such repairs on behalf of organizations.
        If open-source software is used, the assessments address the fact that there
        is no warranty, the open-source software could contain back doors or malware,
        and there may be no support available.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | C\xF3digo Bin\xE1rio ou Execut\xE1vel\
            \ por M\xE1quina"
          description: "(a) Proibir o uso de c\xF3digo bin\xE1rio ou execut\xE1vel\
            \ por m\xE1quina proveniente de fontes com garantia limitada ou inexistente\
            \ ou sem o fornecimento do c\xF3digo-fonte; e\n(b) Permitir exce\xE7\xF5\
            es apenas para requisitos de miss\xE3o ou operacionais imperativos e com\
            \ a aprova\xE7\xE3o da autoridade autorizadora."
          annotation: "O c\xF3digo bin\xE1rio ou execut\xE1vel por m\xE1quina aplica-se\
            \ a todas as fontes de c\xF3digo bin\xE1rio ou execut\xE1vel por m\xE1\
            quina, incluindo software e firmware comerciais e software de c\xF3digo\
            \ aberto (open-source). As organiza\xE7\xF5es avaliam os produtos de software\
            \ sem o c\xF3digo-fonte acompanhante ou provenientes de fontes com garantia\
            \ limitada ou inexistente quanto a potenciais impactos de seguran\xE7\
            a. As avalia\xE7\xF5es abordam o fato de que produtos de software sem\
            \ o fornecimento do c\xF3digo-fonte podem ser dif\xEDceis de revisar,\
            \ reparar ou estender. Al\xE9m disso, pode n\xE3o haver propriet\xE1rios\
            \ para realizar tais reparos em nome das organiza\xE7\xF5es. Se for utilizado\
            \ software de c\xF3digo aberto, as avalia\xE7\xF5es abordam o fato de\
            \ que n\xE3o h\xE1 garantia, de que o software de c\xF3digo aberto pode\
            \ conter portas dos fundos (back doors) ou malware e de que pode n\xE3\
            o haver suporte dispon\xEDvel."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-7(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-7(9)
      name: Least Functionality | Prohibiting The Use of Unauthorized Hardware
      description: "(a) Identify [Assignment: organization-defined hardware components\
        \ authorized for system use];\n(b) Prohibit the use or connection of unauthorized\
        \ hardware components; \n(c) Review and update the list of authorized hardware\
        \ components [Assignment: organization-defined frequency]."
      annotation: Hardware components provide the foundation for organizational systems
        and the platform for the execution of authorized software programs. Managing
        the inventory of hardware components and controlling which hardware components
        are permitted to be installed or connected to organizational systems is essential
        in order to provide adequate security.
      translations:
        pt:
          name: "Funcionalidade M\xEDnima | Proibi\xE7\xE3o do Uso de Hardware N\xE3\
            o Autorizado"
          description: "(a) Identificar [Atribui\xE7\xE3o: componentes de hardware\
            \ autorizados para uso no sistema definidos pela organiza\xE7\xE3o];\n\
            (b) Proibir o uso ou a conex\xE3o de componentes de hardware n\xE3o autorizados;\n\
            (c) Revisar e atualizar a lista de componentes de hardware autorizados\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Os componentes de hardware fornecem a base para os sistemas\
            \ organizacionais e a plataforma para a execu\xE7\xE3o de programas de\
            \ software autorizados. Gerenciar o invent\xE1rio de componentes de hardware\
            \ e controlar quais componentes de hardware s\xE3o permitidos para instala\xE7\
            \xE3o ou conex\xE3o aos sistemas organizacionais \xE9 essencial para fornecer\
            \ seguran\xE7a adequada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8
      name: System Component Inventory
      description: 'a. Develop and document an inventory of system components that:

        1. Accurately reflects the system;

        2. Includes all components within the system;

        3. Does not include duplicate accounting of components or components assigned
        to any other system;

        4. Is at the level of granularity deemed necessary for tracking and reporting;
        and

        5. Includes the following information to achieve system component accountability:
        [Assignment: organization-defined information deemed necessary to achieve
        effective system component accountability]; and

        b. Review and update the system component inventory [Assignment: organization-defined
        frequency].'
      annotation: 'System components are discrete, identifiable information technology
        assets that include hardware, software, and firmware. Organizations may choose
        to implement centralized system component inventories that include components
        from all organizational systems. In such situations, organizations ensure
        that the inventories include system-specific information required for component
        accountability. The information necessary for effective accountability of
        system components includes the system name, software owners, software version
        numbers, hardware inventory specifications, software license information,
        and for networked components, the machine names and network addresses across
        all implemented protocols (e.g., IPv4, IPv6). Inventory specifications include
        date of receipt, cost, model, serial number, manufacturer, supplier information,
        component type,  and physical location.

        Preventing duplicate accounting of system components addresses the lack of
        accountability that occurs when component ownership and system association
        is not known, especially in large or complex connected systems. Effective
        prevention of duplicate accounting of system components necessitates use of
        a unique identifier for each component. For software inventory, centrally
        managed software that is accessed via other systems is addressed as a component
        of the system on which it is installed and managed. Software installed on
        multiple organizational systems and managed at the system level is addressed
        for each individual system and may appear more than once in a centralized
        component inventory, necessitating a system association for each software
        instance in the centralized inventory to avoid duplicate accounting of components.
        Scanning systems implementing multiple network protocols (e.g., IPv4 and IPv6)
        can result in duplicate components being identified in different address spaces.
        The implementation of CM-8(7) can help to eliminate duplicate accounting of
        components.'
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema"
          description: "a. Desenvolver e documentar um invent\xE1rio de componentes\
            \ do sistema que:\n1. Reflita o sistema com precis\xE3o;\n2. Inclua todos\
            \ os componentes dentro do sistema;\n3. N\xE3o inclua a contabiliza\xE7\
            \xE3o duplicada de componentes ou componentes atribu\xEDdos a qualquer\
            \ outro sistema;\n4. Esteja no n\xEDvel de granularidade considerado necess\xE1\
            rio para rastreamento e relato; e\n5. Inclua as seguintes informa\xE7\xF5\
            es para alcan\xE7ar a responsabiliza\xE7\xE3o dos componentes do sistema:\
            \ [Atribui\xE7\xE3o: informa\xE7\xF5es definidas pela organiza\xE7\xE3\
            o consideradas necess\xE1rias para alcan\xE7ar a responsabiliza\xE7\xE3\
            o efetiva dos componentes do sistema]; e\nb. Revisar e atualizar o invent\xE1\
            rio de componentes do sistema [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]."
          annotation: "Os componentes do sistema s\xE3o ativos de tecnologia da informa\xE7\
            \xE3o discretos e identific\xE1veis que incluem hardware, software e firmware.\
            \ As organiza\xE7\xF5es podem optar por implementar invent\xE1rios centralizados\
            \ de componentes de sistema que incluam componentes de todos os sistemas\
            \ organizacionais. Nessas situa\xE7\xF5es, as organiza\xE7\xF5es garantem\
            \ que os invent\xE1rios incluam informa\xE7\xF5es espec\xEDficas do sistema\
            \ necess\xE1rias para a responsabiliza\xE7\xE3o dos componentes. As informa\xE7\
            \xF5es necess\xE1rias para a responsabiliza\xE7\xE3o efetiva dos componentes\
            \ do sistema incluem o nome do sistema, os propriet\xE1rios do software,\
            \ os n\xFAmeros de vers\xE3o do software, as especifica\xE7\xF5es do invent\xE1\
            rio de hardware, as informa\xE7\xF5es de licen\xE7a de software e, para\
            \ os componentes em rede, os nomes das m\xE1quinas e os endere\xE7os de\
            \ rede em todos os protocolos implementados (por exemplo, IPv4, IPv6).\
            \ As especifica\xE7\xF5es do invent\xE1rio incluem data de recebimento,\
            \ custo, modelo, n\xFAmero de s\xE9rie, fabricante, informa\xE7\xF5es\
            \ do fornecedor, tipo de componente e localiza\xE7\xE3o f\xEDsica.\nA\
            \ preven\xE7\xE3o da contabiliza\xE7\xE3o duplicada de componentes do\
            \ sistema aborda a falta de responsabiliza\xE7\xE3o que ocorre quando\
            \ a propriedade do componente e a associa\xE7\xE3o ao sistema n\xE3o s\xE3\
            o conhecidas, especialmente em sistemas conectados grandes ou complexos.\
            \ A preven\xE7\xE3o efetiva da contabiliza\xE7\xE3o duplicada de componentes\
            \ do sistema exige o uso de um identificador \xFAnico para cada componente.\
            \ Para o invent\xE1rio de software, o software gerenciado centralmente\
            \ que \xE9 acessado por meio de outros sistemas \xE9 tratado como um componente\
            \ do sistema no qual est\xE1 instalado e gerenciado. O software instalado\
            \ em m\xFAltiplos sistemas organizacionais e gerenciado no n\xEDvel do\
            \ sistema \xE9 tratado para cada sistema individual e pode aparecer mais\
            \ de uma vez em um invent\xE1rio centralizado de componentes, exigindo\
            \ uma associa\xE7\xE3o ao sistema para cada inst\xE2ncia de software no\
            \ invent\xE1rio centralizado a fim de evitar a contabiliza\xE7\xE3o duplicada\
            \ de componentes. A varredura de sistemas que implementam m\xFAltiplos\
            \ protocolos de rede (por exemplo, IPv4 e IPv6) pode resultar na identifica\xE7\
            \xE3o de componentes duplicados em diferentes espa\xE7os de endere\xE7\
            o. A implementa\xE7\xE3o do CM-8(7) pode ajudar a eliminar a contabiliza\xE7\
            \xE3o duplicada de componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(1)
      name: System Component Inventory | Updates During Installation and Removal
      description: Update the inventory of system components as part of component
        installations, removals, and system updates.
      annotation: Organizations can improve the accuracy, completeness, and consistency
        of system component inventories if the inventories are updated as part of
        component installations or removals or during general system updates. If inventories
        are not updated at these key times, there is a greater likelihood that the
        information will not be appropriately captured and documented. System updates
        include hardware, software, and firmware components.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Atualiza\xE7\xF5es Durante\
            \ Instala\xE7\xE3o e Remo\xE7\xE3o"
          description: "Atualizar o invent\xE1rio de componentes do sistema como parte\
            \ das instala\xE7\xF5es e remo\xE7\xF5es de componentes e das atualiza\xE7\
            \xF5es do sistema."
          annotation: "As organiza\xE7\xF5es podem melhorar a precis\xE3o, a completude\
            \ e a consist\xEAncia dos invent\xE1rios de componentes do sistema se\
            \ os invent\xE1rios forem atualizados como parte das instala\xE7\xF5es\
            \ ou remo\xE7\xF5es de componentes ou durante as atualiza\xE7\xF5es gerais\
            \ do sistema. Se os invent\xE1rios n\xE3o forem atualizados nesses momentos-chave,\
            \ h\xE1 maior probabilidade de que as informa\xE7\xF5es n\xE3o sejam adequadamente\
            \ capturadas e documentadas. As atualiza\xE7\xF5es do sistema incluem\
            \ componentes de hardware, software e firmware."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(2)
      name: System Component Inventory | Automated Maintenance
      description: 'Maintain the currency, completeness, accuracy, and availability
        of the inventory of system components using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Organizations maintain system inventories to the extent feasible.
        For example, virtual machines can be difficult to monitor because such machines
        are not visible to the network when not in use. In such cases, organizations
        maintain as up-to-date, complete, and accurate an inventory as is deemed reasonable.
        Automated maintenance can be achieved by the implementation of CM-2(2) for
        organizations that combine system component inventory and baseline configuration
        activities.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Manuten\xE7\xE3o Automatizada"
          description: "Manter a atualidade, a completude, a precis\xE3o e a disponibilidade\
            \ do invent\xE1rio de componentes do sistema utilizando [Atribui\xE7\xE3\
            o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es mant\xEAm os invent\xE1rios de sistema\
            \ na medida do poss\xEDvel. Por exemplo, as m\xE1quinas virtuais podem\
            \ ser dif\xEDceis de monitorar porque tais m\xE1quinas n\xE3o s\xE3o vis\xED\
            veis na rede quando n\xE3o est\xE3o em uso. Nesses casos, as organiza\xE7\
            \xF5es mant\xEAm um invent\xE1rio t\xE3o atualizado, completo e preciso\
            \ quanto for considerado razo\xE1vel. A manuten\xE7\xE3o automatizada\
            \ pode ser alcan\xE7ada pela implementa\xE7\xE3o do CM-2(2) para organiza\xE7\
            \xF5es que combinam as atividades de invent\xE1rio de componentes do sistema\
            \ e de configura\xE7\xE3o de linha de base."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(3)
      name: System Component Inventory | Automated Unauthorized Component Detection
      description: '(a) Detect the presence of unauthorized hardware, software, and
        firmware components within the system using [Assignment: organization-defined
        automated mechanisms] [Assignment: organization-defined frequency]; and

        (b) Take the following actions when unauthorized components are detected:
        [Selection (one or more): disable network access by such components; isolate
        the components; notify [Assignment: organization-defined personnel or roles]].'
      annotation: Automated unauthorized component detection is applied in addition
        to the monitoring for unauthorized remote connections and mobile devices.
        Monitoring for unauthorized system components may be accomplished on an ongoing
        basis or by the periodic scanning of systems for that purpose. Automated mechanisms
        may also be used to prevent the connection of unauthorized components (see
        CM-7(9)). Automated mechanisms can be implemented in systems or in separate
        system components. When acquiring and implementing automated mechanisms, organizations
        consider whether such mechanisms depend on the ability of the system component
        to support an agent or supplicant in order to be detected since some types
        of components do not have or cannot support agents (e.g., IoT devices, sensors).
        Isolation can be achieved , for example, by placing unauthorized system components
        in separate domains or subnets or quarantining such components. This type
        of  component isolation is commonly referred to as sandboxing.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Detec\xE7\xE3o Automatizada\
            \ de Componentes N\xE3o Autorizados"
          description: "(a) Detectar a presen\xE7a de componentes de hardware, software\
            \ e firmware n\xE3o autorizados dentro do sistema utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o] [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]; e\n(b) Adotar as\
            \ seguintes a\xE7\xF5es quando componentes n\xE3o autorizados forem detectados:\
            \ [Sele\xE7\xE3o (um ou mais): desativar o acesso \xE0 rede por tais componentes;\
            \ isolar os componentes; notificar [Atribui\xE7\xE3o: pessoal ou pap\xE9\
            is definidos pela organiza\xE7\xE3o]]."
          annotation: "A detec\xE7\xE3o automatizada de componentes n\xE3o autorizados\
            \ \xE9 aplicada al\xE9m do monitoramento de conex\xF5es remotas n\xE3\
            o autorizadas e dispositivos m\xF3veis. O monitoramento de componentes\
            \ de sistema n\xE3o autorizados pode ser realizado de forma cont\xEDnua\
            \ ou pela varredura peri\xF3dica dos sistemas para esse fim. Mecanismos\
            \ automatizados tamb\xE9m podem ser usados para impedir a conex\xE3o de\
            \ componentes n\xE3o autorizados (consulte CM-7(9)). Os mecanismos automatizados\
            \ podem ser implementados nos sistemas ou em componentes de sistema separados.\
            \ Ao adquirir e implementar mecanismos automatizados, as organiza\xE7\xF5\
            es consideram se tais mecanismos dependem da capacidade do componente\
            \ de sistema de suportar um agente ou suplicante (supplicant) para serem\
            \ detectados, uma vez que alguns tipos de componentes n\xE3o possuem ou\
            \ n\xE3o conseguem suportar agentes (por exemplo, dispositivos IoT, sensores).\
            \ O isolamento pode ser alcan\xE7ado, por exemplo, colocando os componentes\
            \ de sistema n\xE3o autorizados em dom\xEDnios ou sub-redes separados\
            \ ou colocando tais componentes em quarentena. Esse tipo de isolamento\
            \ de componentes \xE9 comumente chamado de sandboxing."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(4)
      name: System Component Inventory | Accountability Information
      description: 'Include in the system component inventory information, a means
        for identifying by [Selection (one or more): name; position; role], individuals
        responsible and accountable for administering those components.'
      annotation: Identifying individuals who are responsible and accountable for
        administering system components ensures that the assigned components are properly
        administered and that organizations can contact those individuals if some
        action is required (e.g., when the component is determined to be the source
        of a breach, needs to be recalled or replaced, or needs to be relocated).
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Informa\xE7\xF5es de Responsabiliza\xE7\
            \xE3o"
          description: "Incluir nas informa\xE7\xF5es do invent\xE1rio de componentes\
            \ do sistema um meio de identificar, por [Sele\xE7\xE3o (um ou mais):\
            \ nome; cargo; papel], os indiv\xEDduos respons\xE1veis e responsabiliz\xE1\
            veis pela administra\xE7\xE3o desses componentes."
          annotation: "Identificar os indiv\xEDduos respons\xE1veis e responsabiliz\xE1\
            veis pela administra\xE7\xE3o dos componentes do sistema garante que os\
            \ componentes atribu\xEDdos sejam adequadamente administrados e que as\
            \ organiza\xE7\xF5es possam contatar esses indiv\xEDduos caso alguma a\xE7\
            \xE3o seja necess\xE1ria (por exemplo, quando se determina que o componente\
            \ \xE9 a origem de uma viola\xE7\xE3o, precisa ser recolhido ou substitu\xED\
            do, ou precisa ser realocado)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-6(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-6(4)
      name: Configuration Settings | Conformance Demonstration
      description: '[Withdrawn: Incorporated into CM-4.]'
      translations:
        pt:
          name: "Defini\xE7\xF5es de Configura\xE7\xE3o | Demonstra\xE7\xE3o de Conformidade"
          description: '[Retirado: Incorporado ao CM-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(6)
      name: System Component Inventory | Assessed Configurations and Approved Deviations
      description: Include assessed component configurations and any approved deviations
        to current deployed configurations in the system component inventory.
      annotation: Assessed configurations and approved deviations focus on configuration
        settings established by organizations for system components, the specific
        components that have been assessed to determine compliance with the required
        configuration settings, and any approved deviations from established configuration
        settings.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Configura\xE7\xF5es Avaliadas\
            \ e Desvios Aprovados"
          description: "Incluir as configura\xE7\xF5es de componentes avaliadas e\
            \ quaisquer desvios aprovados em rela\xE7\xE3o \xE0s configura\xE7\xF5\
            es atualmente implantadas no invent\xE1rio de componentes do sistema."
          annotation: "As configura\xE7\xF5es avaliadas e os desvios aprovados concentram-se\
            \ nas defini\xE7\xF5es de configura\xE7\xE3o estabelecidas pelas organiza\xE7\
            \xF5es para os componentes do sistema, nos componentes espec\xEDficos\
            \ que foram avaliados para determinar a conformidade com as defini\xE7\
            \xF5es de configura\xE7\xE3o exigidas e em quaisquer desvios aprovados\
            \ em rela\xE7\xE3o \xE0s defini\xE7\xF5es de configura\xE7\xE3o estabelecidas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(7)
      name: System Component Inventory | Centralized Repository
      description: Provide a centralized repository for the inventory of system components.
      annotation: Organizations may implement centralized system component inventories
        that include components from all organizational systems. Centralized repositories
        of component inventories provide opportunities for efficiencies in accounting
        for organizational hardware, software, and firmware assets. Such repositories
        may also help organizations rapidly identify the location and responsible
        individuals of components that have been compromised, breached, or are otherwise
        in need of mitigation actions. Organizations ensure that the resulting centralized
        inventories include system-specific information required for proper component
        accountability.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Reposit\xF3rio Centralizado"
          description: "Fornecer um reposit\xF3rio centralizado para o invent\xE1\
            rio de componentes do sistema."
          annotation: "As organiza\xE7\xF5es podem implementar invent\xE1rios centralizados\
            \ de componentes de sistema que incluam componentes de todos os sistemas\
            \ organizacionais. Os reposit\xF3rios centralizados de invent\xE1rios\
            \ de componentes proporcionam oportunidades de efici\xEAncia na contabiliza\xE7\
            \xE3o dos ativos de hardware, software e firmware organizacionais. Tais\
            \ reposit\xF3rios tamb\xE9m podem ajudar as organiza\xE7\xF5es a identificar\
            \ rapidamente a localiza\xE7\xE3o e os indiv\xEDduos respons\xE1veis por\
            \ componentes que tenham sido comprometidos, violados ou que de outra\
            \ forma necessitem de a\xE7\xF5es de mitiga\xE7\xE3o. As organiza\xE7\xF5\
            es garantem que os invent\xE1rios centralizados resultantes incluam informa\xE7\
            \xF5es espec\xEDficas do sistema necess\xE1rias para a adequada responsabiliza\xE7\
            \xE3o dos componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(8)
      name: System Component Inventory | Automated Location Tracking
      description: 'Support the tracking of system components by geographic location
        using [Assignment: organization-defined automated mechanisms].'
      annotation: The use of automated mechanisms to track the location of system
        components can increase the accuracy of component inventories. Such capability
        may help organizations rapidly identify the location and responsible individuals
        of system components that have been compromised, breached, or are otherwise
        in need of mitigation actions. The use of tracking mechanisms can be coordinated
        with senior agency officials for privacy if there are implications that affect
        individual privacy.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Rastreamento Automatizado\
            \ de Localiza\xE7\xE3o"
          description: "Apoiar o rastreamento de componentes do sistema por localiza\xE7\
            \xE3o geogr\xE1fica utilizando [Atribui\xE7\xE3o: mecanismos automatizados\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O uso de mecanismos automatizados para rastrear a localiza\xE7\
            \xE3o dos componentes do sistema pode aumentar a precis\xE3o dos invent\xE1\
            rios de componentes. Tal capacidade pode ajudar as organiza\xE7\xF5es\
            \ a identificar rapidamente a localiza\xE7\xE3o e os indiv\xEDduos respons\xE1\
            veis por componentes do sistema que tenham sido comprometidos, violados\
            \ ou que de outra forma necessitem de a\xE7\xF5es de mitiga\xE7\xE3o.\
            \ O uso de mecanismos de rastreamento pode ser coordenado com os altos\
            \ funcion\xE1rios da ag\xEAncia respons\xE1veis pela privacidade se houver\
            \ implica\xE7\xF5es que afetem a privacidade individual."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(9)
      name: System Component Inventory | Assignment of Components to Systems
      description: "(a) Assign system components to a system; and \n(b) Receive an\
        \ acknowledgement from [Assignment: organization-defined personnel or roles]\
        \ of this assignment."
      annotation: System components that are not assigned to a system may be unmanaged,
        lack the required protection, and become an organizational vulnerability.
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Atribui\xE7\xE3o de Componentes\
            \ a Sistemas"
          description: "(a) Atribuir componentes de sistema a um sistema; e\n(b) Receber\
            \ um reconhecimento de [Atribui\xE7\xE3o: pessoal ou pap\xE9is definidos\
            \ pela organiza\xE7\xE3o] sobre essa atribui\xE7\xE3o."
          annotation: "Os componentes de sistema que n\xE3o s\xE3o atribu\xEDdos a\
            \ um sistema podem ficar sem gerenciamento, carecer da prote\xE7\xE3o\
            \ necess\xE1ria e tornar-se uma vulnerabilidade organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-9
      name: Configuration Management Plan
      description: 'Develop, document, and implement a configuration management plan
        for the system that:

        a. Addresses roles, responsibilities, and configuration management processes
        and procedures;

        b. Establishes a process for identifying configuration items throughout the
        system development life cycle and for managing the configuration of the configuration
        items;

        c. Defines the configuration items for the system and places the configuration
        items under configuration management;

        d. Is reviewed and approved by [Assignment: organization-defined personnel
        or roles]; and

        e. Protects the configuration management plan from unauthorized disclosure
        and modification.'
      annotation: 'Configuration management activities occur throughout the system
        development life cycle. As such, there are developmental configuration management
        activities (e.g., the control of code and software libraries) and operational
        configuration management activities (e.g., control of installed components
        and how the components are configured). Configuration management plans satisfy
        the requirements in configuration management policies while being tailored
        to individual systems. Configuration management plans define processes and
        procedures for how configuration management is used to support system development
        life cycle activities.

        Configuration management plans are generated during the development and acquisition
        stage of the system development life cycle. The plans describe how to advance
        changes through change management processes; update configuration settings
        and baselines; maintain component inventories; control development, test,
        and operational environments; and develop, release, and update key documents.

        Organizations can employ templates to help ensure the consistent and timely
        development and implementation of configuration management plans. Templates
        can represent a configuration management plan for the organization with subsets
        of the plan implemented on a system by system basis. Configuration management
        approval processes include the designation of key stakeholders responsible
        for reviewing and approving proposed changes to systems, and personnel who
        conduct security and privacy impact analyses prior to the implementation of
        changes to the systems. Configuration items are the system components, such
        as the hardware, software, firmware, and documentation to be configuration-managed.
        As systems continue through the system development life cycle, new configuration
        items may be identified, and some existing configuration items may no longer
        need to be under configuration control.'
      translations:
        pt:
          name: "Plano de Gerenciamento de Configura\xE7\xE3o"
          description: "Desenvolver, documentar e implementar um plano de gerenciamento\
            \ de configura\xE7\xE3o para o sistema que:\na. Aborde pap\xE9is, responsabilidades\
            \ e processos e procedimentos de gerenciamento de configura\xE7\xE3o;\n\
            b. Estabele\xE7a um processo para identificar itens de configura\xE7\xE3\
            o ao longo de todo o ciclo de vida de desenvolvimento do sistema e para\
            \ gerenciar a configura\xE7\xE3o dos itens de configura\xE7\xE3o;\nc.\
            \ Defina os itens de configura\xE7\xE3o do sistema e coloque os itens\
            \ de configura\xE7\xE3o sob gerenciamento de configura\xE7\xE3o;\nd. Seja\
            \ revisado e aprovado por [Atribui\xE7\xE3o: pessoal ou pap\xE9is definidos\
            \ pela organiza\xE7\xE3o]; e\ne. Proteja o plano de gerenciamento de configura\xE7\
            \xE3o contra divulga\xE7\xE3o e modifica\xE7\xE3o n\xE3o autorizadas."
          annotation: "As atividades de gerenciamento de configura\xE7\xE3o ocorrem\
            \ ao longo de todo o ciclo de vida de desenvolvimento do sistema. Como\
            \ tal, h\xE1 atividades de gerenciamento de configura\xE7\xE3o de desenvolvimento\
            \ (por exemplo, o controle de c\xF3digo e bibliotecas de software) e atividades\
            \ de gerenciamento de configura\xE7\xE3o operacional (por exemplo, controle\
            \ dos componentes instalados e de como os componentes s\xE3o configurados).\
            \ Os planos de gerenciamento de configura\xE7\xE3o satisfazem os requisitos\
            \ das pol\xEDticas de gerenciamento de configura\xE7\xE3o, ao mesmo tempo\
            \ em que s\xE3o adaptados a sistemas individuais. Os planos de gerenciamento\
            \ de configura\xE7\xE3o definem processos e procedimentos sobre como o\
            \ gerenciamento de configura\xE7\xE3o \xE9 utilizado para apoiar as atividades\
            \ do ciclo de vida de desenvolvimento do sistema.\nOs planos de gerenciamento\
            \ de configura\xE7\xE3o s\xE3o gerados durante a etapa de desenvolvimento\
            \ e aquisi\xE7\xE3o do ciclo de vida de desenvolvimento do sistema. Os\
            \ planos descrevem como conduzir mudan\xE7as por meio dos processos de\
            \ gerenciamento de mudan\xE7as; atualizar configura\xE7\xF5es e linhas\
            \ de base; manter invent\xE1rios de componentes; controlar ambientes de\
            \ desenvolvimento, teste e operacionais; e desenvolver, liberar e atualizar\
            \ documentos-chave.\nAs organiza\xE7\xF5es podem empregar modelos para\
            \ ajudar a assegurar o desenvolvimento e a implementa\xE7\xE3o consistentes\
            \ e tempestivos dos planos de gerenciamento de configura\xE7\xE3o. Os\
            \ modelos podem representar um plano de gerenciamento de configura\xE7\
            \xE3o para a organiza\xE7\xE3o, com subconjuntos do plano implementados\
            \ sistema a sistema. Os processos de aprova\xE7\xE3o do gerenciamento\
            \ de configura\xE7\xE3o incluem a designa\xE7\xE3o de partes interessadas-chave\
            \ respons\xE1veis por revisar e aprovar as mudan\xE7as propostas aos sistemas,\
            \ e o pessoal que conduz an\xE1lises de impacto de seguran\xE7a e privacidade\
            \ antes da implementa\xE7\xE3o das mudan\xE7as nos sistemas. Os itens\
            \ de configura\xE7\xE3o s\xE3o os componentes do sistema, tais como o\
            \ hardware, software, firmware e documenta\xE7\xE3o a serem gerenciados\
            \ em termos de configura\xE7\xE3o. \xC0 medida que os sistemas avan\xE7\
            am pelo ciclo de vida de desenvolvimento do sistema, novos itens de configura\xE7\
            \xE3o podem ser identificados, e alguns itens de configura\xE7\xE3o existentes\
            \ podem deixar de precisar estar sob controle de configura\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-9(1)
      name: Configuration Management Plan | Assignment of Responsibility
      description: Assign responsibility for developing the configuration management
        process to organizational personnel that are not directly involved in system
        development.
      annotation: In the absence of dedicated configuration management teams assigned
        within organizations, system developers may be tasked with developing configuration
        management processes using personnel who are not directly involved in system
        development or system integration. This separation of duties ensures that
        organizations establish and maintain a sufficient degree of independence between
        the system development and integration processes and configuration management
        processes to facilitate quality control and more effective oversight.
      translations:
        pt:
          name: "Plano de Gerenciamento de Configura\xE7\xE3o | Atribui\xE7\xE3o de\
            \ Responsabilidade"
          description: "Atribuir a responsabilidade pelo desenvolvimento do processo\
            \ de gerenciamento de configura\xE7\xE3o a pessoal organizacional que\
            \ n\xE3o esteja diretamente envolvido no desenvolvimento do sistema."
          annotation: "Na aus\xEAncia de equipes dedicadas de gerenciamento de configura\xE7\
            \xE3o designadas dentro das organiza\xE7\xF5es, os desenvolvedores de\
            \ sistema podem ser incumbidos de desenvolver os processos de gerenciamento\
            \ de configura\xE7\xE3o utilizando pessoal que n\xE3o esteja diretamente\
            \ envolvido no desenvolvimento ou na integra\xE7\xE3o do sistema. Essa\
            \ segrega\xE7\xE3o de fun\xE7\xF5es assegura que as organiza\xE7\xF5es\
            \ estabele\xE7am e mantenham um grau suficiente de independ\xEAncia entre\
            \ os processos de desenvolvimento e integra\xE7\xE3o do sistema e os processos\
            \ de gerenciamento de configura\xE7\xE3o, a fim de facilitar o controle\
            \ de qualidade e uma supervis\xE3o mais eficaz."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-10
      name: Software Usage Restrictions
      description: 'a. Use software and associated documentation in accordance with
        contract agreements and copyright laws;

        b. Track the use of software and associated documentation protected by quantity
        licenses to control copying and distribution; and

        c. Control and document the use of peer-to-peer file sharing technology to
        ensure that this capability is not used for the unauthorized distribution,
        display, performance, or reproduction of copyrighted work.'
      annotation: Software license tracking can be accomplished by manual or automated
        methods, depending on organizational needs. Examples of contract agreements
        include software license agreements and non-disclosure agreements.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Uso de Software"
          description: "a. Utilizar software e a documenta\xE7\xE3o associada em conformidade\
            \ com os acordos contratuais e as leis de direitos autorais;\nb. Rastrear\
            \ o uso de software e da documenta\xE7\xE3o associada protegidos por licen\xE7\
            as por quantidade para controlar a c\xF3pia e a distribui\xE7\xE3o; e\n\
            c. Controlar e documentar o uso de tecnologia de compartilhamento de arquivos\
            \ ponto a ponto (peer-to-peer) para assegurar que essa capacidade n\xE3\
            o seja utilizada para a distribui\xE7\xE3o, exibi\xE7\xE3o, execu\xE7\xE3\
            o ou reprodu\xE7\xE3o n\xE3o autorizadas de obra protegida por direitos\
            \ autorais."
          annotation: "O rastreamento de licen\xE7as de software pode ser realizado\
            \ por m\xE9todos manuais ou automatizados, dependendo das necessidades\
            \ organizacionais. Exemplos de acordos contratuais incluem contratos de\
            \ licen\xE7a de software e acordos de confidencialidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-10(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-10(1)
      name: Software Usage Restrictions | Open-source Software
      description: 'Establish the following restrictions on the use of open-source
        software: [Assignment: organization-defined restrictions].'
      annotation: Open-source software refers to software that is available in source
        code form. Certain software rights normally reserved for copyright holders
        are routinely provided under software license agreements that permit individuals
        to study, change, and improve the software. From a security perspective, the
        major advantage of open-source software is that it provides organizations
        with the ability to examine the source code. In some cases, there is an online
        community associated with the software that inspects, tests,  updates, and
        reports on issues found in software on an ongoing basis. However, remediating
        vulnerabilities in open-source software may be problematic. There may also
        be licensing issues associated with open-source software, including the constraints
        on derivative use of such software. Open-source software that is available
        only in binary form may increase the level of risk in using such software.
      translations:
        pt:
          name: "Restri\xE7\xF5es de Uso de Software | Software de C\xF3digo Aberto"
          description: "Estabelecer as seguintes restri\xE7\xF5es ao uso de software\
            \ de c\xF3digo aberto: [Atribui\xE7\xE3o: restri\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o]."
          annotation: "Software de c\xF3digo aberto refere-se a software dispon\xED\
            vel em forma de c\xF3digo-fonte. Certos direitos de software normalmente\
            \ reservados aos titulares de direitos autorais s\xE3o rotineiramente\
            \ concedidos por meio de contratos de licen\xE7a de software que permitem\
            \ que indiv\xEDduos estudem, alterem e aprimorem o software. Do ponto\
            \ de vista da seguran\xE7a, a principal vantagem do software de c\xF3\
            digo aberto \xE9 que ele proporciona \xE0s organiza\xE7\xF5es a capacidade\
            \ de examinar o c\xF3digo-fonte. Em alguns casos, h\xE1 uma comunidade\
            \ online associada ao software que inspeciona, testa, atualiza e relata\
            \ os problemas encontrados no software de forma cont\xEDnua. Entretanto,\
            \ a corre\xE7\xE3o de vulnerabilidades no software de c\xF3digo aberto\
            \ pode ser problem\xE1tica. Tamb\xE9m pode haver quest\xF5es de licenciamento\
            \ associadas ao software de c\xF3digo aberto, incluindo as restri\xE7\xF5\
            es ao uso derivado desse software. O software de c\xF3digo aberto dispon\xED\
            vel apenas em forma bin\xE1ria pode aumentar o n\xEDvel de risco em sua\
            \ utiliza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-11
      name: User-installed Software
      description: 'a. Establish [Assignment: organization-defined policies] governing
        the installation of software by users;

        b. Enforce software installation policies through the following methods: [Assignment:
        organization-defined methods]; and

        c. Monitor policy compliance [Assignment: organization-defined frequency].'
      annotation: "If provided the necessary privileges, users can install software\
        \ in organizational systems.\_To maintain control over the software installed,\
        \ organizations identify permitted and prohibited actions regarding software\
        \ installation. Permitted software installations include updates and security\
        \ patches to existing software and downloading new applications from organization-approved\
        \ app stores. Prohibited software installations include software with unknown\
        \ or suspect pedigrees or software that organizations consider potentially\
        \ malicious. Policies selected for governing user-installed software are organization-developed\
        \ or provided by some external entity. Policy enforcement methods can include\
        \ procedural methods and automated methods."
      translations:
        pt:
          name: "Software Instalado pelo Usu\xE1rio"
          description: "a. Estabelecer [Atribui\xE7\xE3o: pol\xEDticas definidas pela\
            \ organiza\xE7\xE3o] que regem a instala\xE7\xE3o de software pelos usu\xE1\
            rios;\nb. Fazer cumprir as pol\xEDticas de instala\xE7\xE3o de software\
            \ por meio dos seguintes m\xE9todos: [Atribui\xE7\xE3o: m\xE9todos definidos\
            \ pela organiza\xE7\xE3o]; e\nc. Monitorar a conformidade com a pol\xED\
            tica [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Se concedidos os privil\xE9gios necess\xE1rios, os usu\xE1\
            rios podem instalar software nos sistemas organizacionais. Para manter\
            \ o controle sobre o software instalado, as organiza\xE7\xF5es identificam\
            \ as a\xE7\xF5es permitidas e proibidas relativas \xE0 instala\xE7\xE3\
            o de software. As instala\xE7\xF5es de software permitidas incluem atualiza\xE7\
            \xF5es e corre\xE7\xF5es de seguran\xE7a para software existente e o download\
            \ de novas aplica\xE7\xF5es a partir de lojas de aplicativos aprovadas\
            \ pela organiza\xE7\xE3o. As instala\xE7\xF5es de software proibidas incluem\
            \ software com proced\xEAncia desconhecida ou suspeita ou software que\
            \ as organiza\xE7\xF5es considerem potencialmente malicioso. As pol\xED\
            ticas selecionadas para reger o software instalado pelo usu\xE1rio s\xE3\
            o desenvolvidas pela organiza\xE7\xE3o ou fornecidas por alguma entidade\
            \ externa. Os m\xE9todos de aplica\xE7\xE3o da pol\xEDtica podem incluir\
            \ m\xE9todos procedimentais e m\xE9todos automatizados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-8(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-8(5)
      name: System Component Inventory | No Duplicate Accounting of Components
      description: '[Withdrawn: Incorporated into CM-8.]'
      translations:
        pt:
          name: "Invent\xE1rio de Componentes do Sistema | Sem Contabiliza\xE7\xE3\
            o Duplicada de Componentes"
          description: '[Retirado: Incorporado ao CM-8.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-11(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-11(2)
      name: User-installed Software | Software Installation with Privileged Status
      description: Allow user installation of software only with explicit privileged
        status.
      annotation: Privileged status can be obtained, for example, by serving in the
        role of system administrator.
      translations:
        pt:
          name: "Software Instalado pelo Usu\xE1rio | Instala\xE7\xE3o de Software\
            \ com Status Privilegiado"
          description: "Permitir a instala\xE7\xE3o de software pelo usu\xE1rio somente\
            \ com status privilegiado expl\xEDcito."
          annotation: O status privilegiado pode ser obtido, por exemplo, ao desempenhar
            o papel de administrador do sistema.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-11(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-11(3)
      name: User-installed Software | Automated Enforcement and Monitoring
      description: 'Enforce and monitor compliance with software installation policies
        using [Assignment: organization-defined automated mechanisms].'
      annotation: Organizations enforce and monitor compliance with software installation
        policies using automated mechanisms to more quickly detect and respond to
        unauthorized software installation which can be an indicator of an internal
        or external hostile attack.
      translations:
        pt:
          name: "Software Instalado pelo Usu\xE1rio | Aplica\xE7\xE3o e Monitoramento\
            \ Automatizados"
          description: "Fazer cumprir e monitorar a conformidade com as pol\xEDticas\
            \ de instala\xE7\xE3o de software utilizando [Atribui\xE7\xE3o: mecanismos\
            \ automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es fazem cumprir e monitoram a conformidade\
            \ com as pol\xEDticas de instala\xE7\xE3o de software utilizando mecanismos\
            \ automatizados para detectar e responder mais rapidamente \xE0 instala\xE7\
            \xE3o n\xE3o autorizada de software, que pode ser um indicador de um ataque\
            \ hostil interno ou externo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-12
      name: Information Location
      description: 'a. Identify and document the location of [Assignment: organization-defined
        information] and the specific system components on which the information is
        processed and stored;

        b. Identify and document the users who have access to the system and system
        components where the information is processed and stored; and

        c. Document changes to the location (i.e., system or system components) where
        the information is processed and stored.'
      annotation: Information location addresses the need to understand where information
        is being processed and stored. Information location includes identifying where
        specific information types and information reside in system components and
        how information is being processed so that information flow can be understood
        and adequate protection and policy management provided for such information
        and system components. The security category of the information is also a
        factor in determining the controls necessary to protect the information and
        the system component where the information resides (see FIPS 199). The location
        of the information and system components is also a factor in the architecture
        and design of the system (see SA-4, SA-8, SA-17).
      translations:
        pt:
          name: "Localiza\xE7\xE3o da Informa\xE7\xE3o"
          description: "a. Identificar e documentar a localiza\xE7\xE3o de [Atribui\xE7\
            \xE3o: informa\xE7\xF5es definidas pela organiza\xE7\xE3o] e os componentes\
            \ espec\xEDficos do sistema nos quais a informa\xE7\xE3o \xE9 processada\
            \ e armazenada;\nb. Identificar e documentar os usu\xE1rios que t\xEA\
            m acesso ao sistema e aos componentes do sistema onde a informa\xE7\xE3\
            o \xE9 processada e armazenada; e\nc. Documentar mudan\xE7as na localiza\xE7\
            \xE3o (isto \xE9, sistema ou componentes do sistema) onde a informa\xE7\
            \xE3o \xE9 processada e armazenada."
          annotation: "A localiza\xE7\xE3o da informa\xE7\xE3o aborda a necessidade\
            \ de compreender onde a informa\xE7\xE3o est\xE1 sendo processada e armazenada.\
            \ A localiza\xE7\xE3o da informa\xE7\xE3o inclui identificar onde tipos\
            \ espec\xEDficos de informa\xE7\xE3o e a informa\xE7\xE3o residem nos\
            \ componentes do sistema e como a informa\xE7\xE3o est\xE1 sendo processada,\
            \ de modo que o fluxo da informa\xE7\xE3o possa ser compreendido e a prote\xE7\
            \xE3o e o gerenciamento de pol\xEDtica adequados sejam fornecidos para\
            \ tal informa\xE7\xE3o e componentes do sistema. A categoria de seguran\xE7\
            a da informa\xE7\xE3o tamb\xE9m \xE9 um fator na determina\xE7\xE3o dos\
            \ controles necess\xE1rios para proteger a informa\xE7\xE3o e o componente\
            \ do sistema onde a informa\xE7\xE3o reside (consulte FIPS 199). A localiza\xE7\
            \xE3o da informa\xE7\xE3o e dos componentes do sistema tamb\xE9m \xE9\
            \ um fator na arquitetura e no projeto do sistema (consulte SA-4, SA-8,\
            \ SA-17)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-12(1)
      name: Information Location | Automated Tools to Support Information Location
      description: 'Use automated tools to identify [Assignment: organization-defined
        information by information type] on [Assignment: organization-defined system
        components] to ensure controls are in place to protect organizational information
        and individual privacy.'
      annotation: The use of automated tools helps to increase the effectiveness and
        efficiency of the information location capability implemented within the system.
        Automation also helps organizations manage the data produced during information
        location activities and share such information across the organization. The
        output of automated information location tools can be used to guide and inform
        system architecture and design decisions.
      translations:
        pt:
          name: "Localiza\xE7\xE3o da Informa\xE7\xE3o | Ferramentas Automatizadas\
            \ para Apoiar a Localiza\xE7\xE3o da Informa\xE7\xE3o"
          description: "Utilizar ferramentas automatizadas para identificar [Atribui\xE7\
            \xE3o: informa\xE7\xE3o definida pela organiza\xE7\xE3o por tipo de informa\xE7\
            \xE3o] em [Atribui\xE7\xE3o: componentes do sistema definidos pela organiza\xE7\
            \xE3o] a fim de assegurar que controles estejam em vigor para proteger\
            \ a informa\xE7\xE3o organizacional e a privacidade individual."
          annotation: "O uso de ferramentas automatizadas ajuda a aumentar a efic\xE1\
            cia e a efici\xEAncia da capacidade de localiza\xE7\xE3o da informa\xE7\
            \xE3o implementada no sistema. A automa\xE7\xE3o tamb\xE9m ajuda as organiza\xE7\
            \xF5es a gerenciar os dados produzidos durante as atividades de localiza\xE7\
            \xE3o da informa\xE7\xE3o e a compartilhar tais informa\xE7\xF5es por\
            \ toda a organiza\xE7\xE3o. A sa\xEDda das ferramentas automatizadas de\
            \ localiza\xE7\xE3o da informa\xE7\xE3o pode ser utilizada para orientar\
            \ e fundamentar decis\xF5es de arquitetura e projeto do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-13
      name: Data Action Mapping
      description: Develop and document a map of system data actions.
      annotation: Data actions are system operations that process personally identifiable
        information. The processing of such information encompasses the full information
        life cycle, which includes collection, generation, transformation, use, disclosure,
        retention, and disposal. A map of system data actions includes discrete data
        actions, elements of personally identifiable information being processed in
        the data actions, system components involved in the data actions, and the
        owners or operators of the system components. Understanding what personally
        identifiable information is being processed (e.g., the sensitivity of the
        personally identifiable information), how personally identifiable information
        is being processed (e.g., if the data action is visible to the individual
        or is processed in another part of the system), and by whom (e.g., individuals
        may have different privacy perceptions based on the entity that is processing
        the personally identifiable information) provides a number of contextual factors
        that are important to assessing the degree of privacy risk created by the
        system. Data maps can be illustrated in different ways, and the level of detail
        may vary based on the mission and business needs of the organization. The
        data map may be an overlay of any system design artifact that the organization
        is using. The development of this map may necessitate coordination between
        the privacy and security programs regarding the covered data actions and the
        components that are identified as part of the system.
      translations:
        pt:
          name: "Mapeamento de A\xE7\xF5es de Dados"
          description: "Desenvolver e documentar um mapa das a\xE7\xF5es de dados\
            \ do sistema."
          annotation: "A\xE7\xF5es de dados s\xE3o opera\xE7\xF5es do sistema que\
            \ processam informa\xE7\xF5es de identifica\xE7\xE3o pessoal. O processamento\
            \ de tais informa\xE7\xF5es abrange todo o ciclo de vida da informa\xE7\
            \xE3o, que inclui coleta, gera\xE7\xE3o, transforma\xE7\xE3o, uso, divulga\xE7\
            \xE3o, reten\xE7\xE3o e descarte. Um mapa das a\xE7\xF5es de dados do\
            \ sistema inclui a\xE7\xF5es de dados discretas, elementos de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal que est\xE3o sendo processados nas\
            \ a\xE7\xF5es de dados, componentes do sistema envolvidos nas a\xE7\xF5\
            es de dados e os propriet\xE1rios ou operadores dos componentes do sistema.\
            \ Compreender quais informa\xE7\xF5es de identifica\xE7\xE3o pessoal est\xE3\
            o sendo processadas (por exemplo, a sensibilidade das informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal), como as informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal est\xE3o sendo processadas (por exemplo, se a a\xE7\xE3\
            o de dados \xE9 vis\xEDvel ao indiv\xEDduo ou \xE9 processada em outra\
            \ parte do sistema) e por quem (por exemplo, os indiv\xEDduos podem ter\
            \ diferentes percep\xE7\xF5es de privacidade com base na entidade que\
            \ est\xE1 processando as informa\xE7\xF5es de identifica\xE7\xE3o pessoal)\
            \ fornece uma s\xE9rie de fatores contextuais que s\xE3o importantes para\
            \ avaliar o grau de risco de privacidade criado pelo sistema. Os mapas\
            \ de dados podem ser ilustrados de diferentes maneiras, e o n\xEDvel de\
            \ detalhe pode variar com base nas necessidades de miss\xE3o e de neg\xF3\
            cio da organiza\xE7\xE3o. O mapa de dados pode ser uma sobreposi\xE7\xE3\
            o de qualquer artefato de projeto do sistema que a organiza\xE7\xE3o esteja\
            \ utilizando. O desenvolvimento desse mapa pode exigir coordena\xE7\xE3\
            o entre os programas de privacidade e seguran\xE7a em rela\xE7\xE3o \xE0\
            s a\xE7\xF5es de dados cobertas e aos componentes identificados como parte\
            \ do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cm
      ref_id: CM-14
      name: Signed Components
      description: 'Prevent the installation of [Assignment: organization-defined
        software and firmware components] without verification that the component
        has been digitally signed using a certificate that is recognized and approved
        by the organization.'
      annotation: Software and firmware components prevented from installation unless
        signed with recognized and approved certificates include software and firmware
        version updates, patches, service packs, device drivers, and basic input/output
        system updates. Organizations can identify applicable software and firmware
        components by type, by specific items, or a combination of both. Digital signatures
        and organizational verification of such signatures is a method of code authentication.
      translations:
        pt:
          name: Componentes Assinados
          description: "Impedir a instala\xE7\xE3o de [Atribui\xE7\xE3o: componentes\
            \ de software e firmware definidos pela organiza\xE7\xE3o] sem a verifica\xE7\
            \xE3o de que o componente foi assinado digitalmente utilizando um certificado\
            \ reconhecido e aprovado pela organiza\xE7\xE3o."
          annotation: "Os componentes de software e firmware cuja instala\xE7\xE3\
            o \xE9 impedida, a menos que assinados com certificados reconhecidos e\
            \ aprovados, incluem atualiza\xE7\xF5es de vers\xE3o de software e firmware,\
            \ corre\xE7\xF5es (patches), service packs, drivers de dispositivo e atualiza\xE7\
            \xF5es do sistema b\xE1sico de entrada/sa\xEDda (BIOS). As organiza\xE7\
            \xF5es podem identificar os componentes de software e firmware aplic\xE1\
            veis por tipo, por itens espec\xEDficos ou por uma combina\xE7\xE3o de\
            \ ambos. As assinaturas digitais e a verifica\xE7\xE3o organizacional\
            \ de tais assinaturas constituem um m\xE9todo de autentica\xE7\xE3o de\
            \ c\xF3digo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      assessable: false
      depth: 1
      ref_id: CP
      name: Contingency Planning
      translations:
        pt:
          name: "Planejamento de Conting\xEAncia"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] contingency planning policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the contingency planning
        policy and the associated contingency planning controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the contingency planning
        policy and procedures; and

        c. Review and update the current contingency planning:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Contingency planning policy and procedures address the controls
        in the CP family that are implemented within systems and organizations. The
        risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of contingency planning policy and procedures. Security
        and privacy program policies and procedures at the organization level are
        preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to contingency
        planning policy and procedures include assessment or audit findings, security
        incidents or breaches, or changes in laws, executive orders, directives, regulations,
        policies, standards, and guidelines. Simply restating controls does not constitute
        an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar a [Atribui\xE7\xE3\
            o: pessoal ou pap\xE9is definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de planejamento de conting\xEAncia [Sele\xE7\xE3o (um ou mais): em\
            \ n\xEDvel organizacional; em n\xEDvel de processo de miss\xE3o/neg\xF3\
            cio; em n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo, pap\xE9\
            is, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\xE3\
            o entre entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com as leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de planejamento de conting\xEA\
            ncia e dos controles de planejamento de conting\xEAncia associados;\n\
            b. Designar um [Atribui\xE7\xE3o: funcion\xE1rio definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de planejamento de conting\xEA\
            ncia; e\nc. Revisar e atualizar a atual:\n1. Pol\xEDtica de planejamento\
            \ de conting\xEAncia [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\
            \xE3o]; e\n2. Procedimentos de planejamento de conting\xEAncia [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de planejamento de conting\xEA\
            ncia abordam os controles da fam\xEDlia CP que s\xE3o implementados nos\
            \ sistemas e nas organiza\xE7\xF5es. A estrat\xE9gia de gerenciamento\
            \ de risco \xE9 um fator importante no estabelecimento de tais pol\xED\
            ticas e procedimentos. As pol\xEDticas e os procedimentos contribuem para\
            \ a garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante\
            \ que os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de planejamento de conting\xEAncia.\
            \ Pol\xEDticas e procedimentos dos programas de seguran\xE7a e privacidade\
            \ em n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral, e podem\
            \ tornar desnecess\xE1rias pol\xEDticas e procedimentos espec\xEDficos\
            \ de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Os procedimentos podem ser estabelecidos para os programas de\
            \ seguran\xE7a e privacidade, para processos de miss\xE3o ou de neg\xF3\
            cio e para sistemas, se necess\xE1rio. Os procedimentos descrevem como\
            \ as pol\xEDticas ou controles s\xE3o implementados e podem ser direcionados\
            \ ao indiv\xEDduo ou papel que \xE9 objeto do procedimento. Os procedimentos\
            \ podem ser documentados nos planos de seguran\xE7a e privacidade do sistema\
            \ ou em um ou mais documentos separados. Eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de planejamento\
            \ de conting\xEAncia incluem constata\xE7\xF5es de avalia\xE7\xE3o ou\
            \ auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7\
            as nas leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes. A simples repeti\xE7\xE3o dos controles n\xE3o\
            \ constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2
      name: Contingency Plan
      description: "a. Develop a contingency plan for the system that:\n1. Identifies\
        \ essential mission and business functions and associated contingency requirements;\n\
        2. Provides recovery objectives, restoration priorities, and metrics;\n3.\
        \ Addresses contingency roles, responsibilities, assigned individuals with\
        \ contact information;\n4. Addresses maintaining essential mission and business\
        \ functions despite a system disruption, compromise, or failure; \n5. Addresses\
        \ eventual, full system restoration without deterioration of the controls\
        \ originally planned and implemented;\n6. Addresses the sharing of contingency\
        \ information; and\n7. Is reviewed and approved by [Assignment: organization-defined\
        \ personnel or roles];\nb. Distribute copies of the contingency plan to [Assignment:\
        \ organization-defined key contingency personnel (identified by name and/or\
        \ by role) and organizational elements];\nc. Coordinate contingency planning\
        \ activities with incident handling activities;\nd. Review the contingency\
        \ plan for the system [Assignment: organization-defined frequency];\ne. Update\
        \ the contingency plan to address changes to the organization, system, or\
        \ environment of operation and problems encountered during contingency plan\
        \ implementation, execution, or testing;\nf. Communicate contingency plan\
        \ changes to [Assignment: organization-defined key contingency personnel (identified\
        \ by name and/or by role) and organizational elements];\ng. Incorporate lessons\
        \ learned from contingency plan testing, training, or actual contingency activities\
        \ into contingency testing and training; and\nh. Protect the contingency plan\
        \ from unauthorized disclosure and modification."
      annotation: 'Contingency planning for systems is part of an overall program
        for achieving continuity of operations for organizational mission and business
        functions. Contingency planning addresses system restoration and implementation
        of alternative mission or business processes when systems are compromised
        or breached. Contingency planning is considered throughout the system development
        life cycle and is a fundamental part of the system design. Systems can be
        designed for redundancy, to provide backup capabilities, and for resilience.
        Contingency plans reflect the degree of restoration required for organizational
        systems since not all systems need to fully recover to achieve the level of
        continuity of operations desired. System recovery objectives reflect applicable
        laws, executive orders, directives, regulations, policies, standards, guidelines,
        organizational risk tolerance, and system impact level.

        Actions addressed in contingency plans include orderly system degradation,
        system shutdown, fallback to a manual mode, alternate information flows, and
        operating in modes reserved for when systems are under attack. By coordinating
        contingency planning with incident handling activities, organizations ensure
        that the necessary planning activities are in place and activated in the event
        of an incident. Organizations consider whether continuity of operations during
        an incident conflicts with the capability to automatically disable the system,
        as specified in IR-4(5). Incident response planning is part of contingency
        planning for organizations and is addressed in the IR (Incident Response)
        family.'
      translations:
        pt:
          name: "Plano de Conting\xEAncia"
          description: "a. Desenvolver um plano de conting\xEAncia para o sistema\
            \ que:\n1. Identifique as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3\
            cio e os requisitos de conting\xEAncia associados;\n2. Forne\xE7a objetivos\
            \ de recupera\xE7\xE3o, prioridades de restaura\xE7\xE3o e m\xE9tricas;\n\
            3. Aborde pap\xE9is e responsabilidades de conting\xEAncia, indiv\xED\
            duos designados com informa\xE7\xF5es de contato;\n4. Aborde a manuten\xE7\
            \xE3o das fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3cio apesar\
            \ de uma interrup\xE7\xE3o, comprometimento ou falha do sistema;\n5. Aborde\
            \ a eventual restaura\xE7\xE3o completa do sistema sem deteriora\xE7\xE3\
            o dos controles originalmente planejados e implementados;\n6. Aborde o\
            \ compartilhamento de informa\xE7\xF5es de conting\xEAncia; e\n7. Seja\
            \ revisado e aprovado por [Atribui\xE7\xE3o: pessoal ou pap\xE9is definidos\
            \ pela organiza\xE7\xE3o];\nb. Distribuir c\xF3pias do plano de conting\xEA\
            ncia ao [Atribui\xE7\xE3o: pessoal-chave de conting\xEAncia (identificado\
            \ por nome e/ou por papel) e elementos organizacionais definidos pela\
            \ organiza\xE7\xE3o];\nc. Coordenar as atividades de planejamento de conting\xEA\
            ncia com as atividades de tratamento de incidentes;\nd. Revisar o plano\
            \ de conting\xEAncia do sistema [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o];\ne. Atualizar o plano de conting\xEAncia para\
            \ abordar mudan\xE7as na organiza\xE7\xE3o, no sistema ou no ambiente\
            \ de opera\xE7\xE3o e os problemas encontrados durante a implementa\xE7\
            \xE3o, execu\xE7\xE3o ou teste do plano de conting\xEAncia;\nf. Comunicar\
            \ as mudan\xE7as no plano de conting\xEAncia ao [Atribui\xE7\xE3o: pessoal-chave\
            \ de conting\xEAncia (identificado por nome e/ou por papel) e elementos\
            \ organizacionais definidos pela organiza\xE7\xE3o];\ng. Incorporar as\
            \ li\xE7\xF5es aprendidas com os testes, o treinamento ou as atividades\
            \ reais de conting\xEAncia aos testes e ao treinamento de conting\xEA\
            ncia; e\nh. Proteger o plano de conting\xEAncia contra divulga\xE7\xE3\
            o e modifica\xE7\xE3o n\xE3o autorizadas."
          annotation: "O planejamento de conting\xEAncia para sistemas \xE9 parte\
            \ de um programa geral para alcan\xE7ar a continuidade das opera\xE7\xF5\
            es para as fun\xE7\xF5es de miss\xE3o e de neg\xF3cio organizacionais.\
            \ O planejamento de conting\xEAncia aborda a restaura\xE7\xE3o do sistema\
            \ e a implementa\xE7\xE3o de processos alternativos de miss\xE3o ou de\
            \ neg\xF3cio quando os sistemas s\xE3o comprometidos ou violados. O planejamento\
            \ de conting\xEAncia \xE9 considerado ao longo de todo o ciclo de vida\
            \ de desenvolvimento do sistema e \xE9 uma parte fundamental do projeto\
            \ do sistema. Os sistemas podem ser projetados para redund\xE2ncia, para\
            \ fornecer capacidades de backup e para resili\xEAncia. Os planos de conting\xEA\
            ncia refletem o grau de restaura\xE7\xE3o exigido para os sistemas organizacionais,\
            \ uma vez que nem todos os sistemas precisam se recuperar completamente\
            \ para alcan\xE7ar o n\xEDvel desejado de continuidade das opera\xE7\xF5\
            es. Os objetivos de recupera\xE7\xE3o do sistema refletem as leis, ordens\
            \ executivas, diretivas, regulamentos, pol\xEDticas, normas e diretrizes\
            \ aplic\xE1veis, a toler\xE2ncia a risco organizacional e o n\xEDvel de\
            \ impacto do sistema.\nAs a\xE7\xF5es abordadas nos planos de conting\xEA\
            ncia incluem a degrada\xE7\xE3o ordenada do sistema, o desligamento do\
            \ sistema, o retorno a um modo manual, fluxos de informa\xE7\xE3o alternativos\
            \ e a opera\xE7\xE3o em modos reservados para quando os sistemas est\xE3\
            o sob ataque. Ao coordenar o planejamento de conting\xEAncia com as atividades\
            \ de tratamento de incidentes, as organiza\xE7\xF5es asseguram que as\
            \ atividades de planejamento necess\xE1rias estejam em vigor e sejam ativadas\
            \ no caso de um incidente. As organiza\xE7\xF5es consideram se a continuidade\
            \ das opera\xE7\xF5es durante um incidente entra em conflito com a capacidade\
            \ de desabilitar automaticamente o sistema, conforme especificado em IR-4(5).\
            \ O planejamento de resposta a incidentes \xE9 parte do planejamento de\
            \ conting\xEAncia para as organiza\xE7\xF5es e \xE9 abordado na fam\xED\
            lia IR (Resposta a Incidentes)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(1)
      name: Contingency Plan | Coordinate with Related Plans
      description: Coordinate contingency plan development with organizational elements
        responsible for related plans.
      annotation: Plans that are related to contingency plans include Business Continuity
        Plans, Disaster Recovery Plans, Critical Infrastructure Plans, Continuity
        of Operations Plans, Crisis Communications Plans, Insider Threat Implementation
        Plans, Data Breach Response Plans, Cyber Incident Response Plans, Breach Response
        Plans, and Occupant Emergency Plans.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Coordenar com Planos Relacionados"
          description: "Coordenar o desenvolvimento do plano de conting\xEAncia com\
            \ os elementos organizacionais respons\xE1veis pelos planos relacionados."
          annotation: "Os planos relacionados aos planos de conting\xEAncia incluem\
            \ Planos de Continuidade de Neg\xF3cio, Planos de Recupera\xE7\xE3o de\
            \ Desastres, Planos de Infraestrutura Cr\xEDtica, Planos de Continuidade\
            \ das Opera\xE7\xF5es, Planos de Comunica\xE7\xE3o de Crise, Planos de\
            \ Implementa\xE7\xE3o de Amea\xE7a Interna, Planos de Resposta a Viola\xE7\
            \xE3o de Dados, Planos de Resposta a Incidentes Cibern\xE9ticos, Planos\
            \ de Resposta a Viola\xE7\xF5es e Planos de Emerg\xEAncia para Ocupantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(2)
      name: Contingency Plan | Capacity Planning
      description: Conduct capacity planning so that necessary capacity for information
        processing, telecommunications, and environmental support exists during contingency
        operations.
      annotation: Capacity planning is needed because different threats can result
        in a reduction of the available processing, telecommunications, and support
        services intended to support essential mission and business functions. Organizations
        anticipate degraded operations during contingency operations and factor the
        degradation into capacity planning. For capacity planning, environmental support
        refers to any environmental factor for which the organization determines that
        it needs to provide support in a contingency situation, even if in a degraded
        state. Such determinations are based on an organizational assessment of risk,
        system categorization (impact level), and organizational risk tolerance.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Planejamento de Capacidade"
          description: "Conduzir o planejamento de capacidade para que a capacidade\
            \ necess\xE1ria de processamento de informa\xE7\xE3o, telecomunica\xE7\
            \xF5es e suporte ambiental exista durante as opera\xE7\xF5es de conting\xEA\
            ncia."
          annotation: "O planejamento de capacidade \xE9 necess\xE1rio porque diferentes\
            \ amea\xE7as podem resultar em uma redu\xE7\xE3o do processamento, das\
            \ telecomunica\xE7\xF5es e dos servi\xE7os de suporte dispon\xEDveis destinados\
            \ a apoiar as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3cio. As\
            \ organiza\xE7\xF5es antecipam opera\xE7\xF5es degradadas durante as opera\xE7\
            \xF5es de conting\xEAncia e levam a degrada\xE7\xE3o em conta no planejamento\
            \ de capacidade. Para fins de planejamento de capacidade, o suporte ambiental\
            \ refere-se a qualquer fator ambiental para o qual a organiza\xE7\xE3\
            o determine que precisa fornecer suporte em uma situa\xE7\xE3o de conting\xEA\
            ncia, mesmo que em estado degradado. Tais determina\xE7\xF5es baseiam-se\
            \ em uma avalia\xE7\xE3o organizacional de risco, na categoriza\xE7\xE3\
            o do sistema (n\xEDvel de impacto) e na toler\xE2ncia a risco organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(3)
      name: Contingency Plan | Resume Mission and Business Functions
      description: 'Plan for the resumption of [Selection: all; essential] mission
        and business functions within [Assignment: organization-defined time period]
        of contingency plan activation.'
      annotation: Organizations may choose to conduct contingency planning activities
        to resume mission and business functions as part of business continuity planning
        or as part of business impact analyses. Organizations prioritize the resumption
        of mission and business functions. The time period for resuming mission and
        business functions may be dependent on the severity and extent of the disruptions
        to the system and its supporting infrastructure.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Retomar Fun\xE7\xF5es de Miss\xE3o e de\
            \ Neg\xF3cio"
          description: "Planejar a retomada de [Sele\xE7\xE3o: todas; essenciais]\
            \ as fun\xE7\xF5es de miss\xE3o e de neg\xF3cio dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] a partir da\
            \ ativa\xE7\xE3o do plano de conting\xEAncia."
          annotation: "As organiza\xE7\xF5es podem optar por conduzir as atividades\
            \ de planejamento de conting\xEAncia para retomar as fun\xE7\xF5es de\
            \ miss\xE3o e de neg\xF3cio como parte do planejamento de continuidade\
            \ de neg\xF3cio ou como parte das an\xE1lises de impacto no neg\xF3cio.\
            \ As organiza\xE7\xF5es priorizam a retomada das fun\xE7\xF5es de miss\xE3\
            o e de neg\xF3cio. O per\xEDodo de tempo para retomar as fun\xE7\xF5es\
            \ de miss\xE3o e de neg\xF3cio pode depender da gravidade e da extens\xE3\
            o das interrup\xE7\xF5es no sistema e em sua infraestrutura de apoio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10(1)
      name: System Recovery and Reconstitution | Contingency Plan Testing
      description: '[Withdrawn: Incorporated into CP-4.]'
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema | Teste do Plano\
            \ de Conting\xEAncia"
          description: '[Retirado: Incorporado ao CP-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(5)
      name: Contingency Plan | Continue Mission and Business Functions
      description: 'Plan for the continuance of [Selection: all; essential] mission
        and business functions with minimal or no loss of operational continuity and
        sustains that continuity until full system restoration at primary processing
        and/or storage sites.'
      annotation: Organizations may choose to conduct the contingency planning activities
        to continue mission and business functions as part of business continuity
        planning or business impact analyses. Primary processing and/or storage sites
        defined by organizations as part of contingency planning may change depending
        on the circumstances associated with the contingency.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Continuar Fun\xE7\xF5es de Miss\xE3o e\
            \ de Neg\xF3cio"
          description: "Planejar a continuidade de [Sele\xE7\xE3o: todas; essenciais]\
            \ as fun\xE7\xF5es de miss\xE3o e de neg\xF3cio com perda m\xEDnima ou\
            \ nula de continuidade operacional e sustentar essa continuidade at\xE9\
            \ a restaura\xE7\xE3o completa do sistema nos s\xEDtios prim\xE1rios de\
            \ processamento e/ou armazenamento."
          annotation: "As organiza\xE7\xF5es podem optar por conduzir as atividades\
            \ de planejamento de conting\xEAncia para continuar as fun\xE7\xF5es de\
            \ miss\xE3o e de neg\xF3cio como parte do planejamento de continuidade\
            \ de neg\xF3cio ou das an\xE1lises de impacto no neg\xF3cio. Os s\xED\
            tios prim\xE1rios de processamento e/ou armazenamento definidos pelas\
            \ organiza\xE7\xF5es como parte do planejamento de conting\xEAncia podem\
            \ mudar dependendo das circunst\xE2ncias associadas \xE0 conting\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(6)
      name: Contingency Plan | Alternate Processing and Storage Sites
      description: 'Plan for the transfer of [Selection: all; essential] mission and
        business functions to alternate processing and/or storage sites with minimal
        or no loss of operational continuity and sustain that continuity through system
        restoration to primary processing and/or storage sites.'
      annotation: Organizations may choose to conduct contingency planning activities
        for alternate processing and storage sites as part of business continuity
        planning or business impact analyses. Primary processing and/or storage sites
        defined by organizations as part of contingency planning may change depending
        on the circumstances associated with the contingency.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | S\xEDtios Alternativos de Processamento\
            \ e Armazenamento"
          description: "Planejar a transfer\xEAncia de [Sele\xE7\xE3o: todas; essenciais]\
            \ as fun\xE7\xF5es de miss\xE3o e de neg\xF3cio para s\xEDtios alternativos\
            \ de processamento e/ou armazenamento com perda m\xEDnima ou nula de continuidade\
            \ operacional e sustentar essa continuidade at\xE9 a restaura\xE7\xE3\
            o do sistema nos s\xEDtios prim\xE1rios de processamento e/ou armazenamento."
          annotation: "As organiza\xE7\xF5es podem optar por conduzir as atividades\
            \ de planejamento de conting\xEAncia para s\xEDtios alternativos de processamento\
            \ e armazenamento como parte do planejamento de continuidade de neg\xF3\
            cio ou das an\xE1lises de impacto no neg\xF3cio. Os s\xEDtios prim\xE1\
            rios de processamento e/ou armazenamento definidos pelas organiza\xE7\xF5\
            es como parte do planejamento de conting\xEAncia podem mudar dependendo\
            \ das circunst\xE2ncias associadas \xE0 conting\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(7)
      name: Contingency Plan | Coordinate with External Service Providers
      description: Coordinate the contingency plan with the contingency plans of external
        service providers to ensure that contingency requirements can be satisfied.
      annotation: When the capability of an organization to carry out its mission
        and business functions is dependent on external service providers, developing
        a comprehensive and timely contingency plan may become more challenging. When
        mission and business functions are dependent on external service providers,
        organizations coordinate contingency planning activities with the external
        entities to ensure that the individual plans reflect the overall contingency
        needs of the organization.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Coordenar com Provedores de Servi\xE7\
            os Externos"
          description: "Coordenar o plano de conting\xEAncia com os planos de conting\xEA\
            ncia dos provedores de servi\xE7os externos para assegurar que os requisitos\
            \ de conting\xEAncia possam ser satisfeitos."
          annotation: "Quando a capacidade de uma organiza\xE7\xE3o de executar suas\
            \ fun\xE7\xF5es de miss\xE3o e de neg\xF3cio depende de provedores de\
            \ servi\xE7os externos, desenvolver um plano de conting\xEAncia abrangente\
            \ e tempestivo pode se tornar mais desafiador. Quando as fun\xE7\xF5es\
            \ de miss\xE3o e de neg\xF3cio dependem de provedores de servi\xE7os externos,\
            \ as organiza\xE7\xF5es coordenam as atividades de planejamento de conting\xEA\
            ncia com as entidades externas para assegurar que os planos individuais\
            \ reflitam as necessidades gerais de conting\xEAncia da organiza\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(8)
      name: Contingency Plan | Identify Critical Assets
      description: 'Identify critical system assets supporting [Selection: all; essential]
        mission and business functions.'
      annotation: Organizations may choose to identify critical assets as part of
        criticality analysis, business continuity planning, or business impact analyses.
        Organizations identify critical system assets so that additional controls
        can be employed (beyond the controls routinely implemented) to help ensure
        that organizational mission and business functions can continue to be conducted
        during contingency operations. The identification of critical information
        assets also facilitates the prioritization of organizational resources. Critical
        system assets include technical and operational aspects. Technical aspects
        include system components, information technology services, information technology
        products, and mechanisms. Operational aspects include procedures (i.e., manually
        executed operations) and personnel (i.e., individuals operating technical
        controls and/or executing manual procedures). Organizational program protection
        plans can assist in identifying critical assets. If critical assets are resident
        within or supported by external service providers, organizations consider
        implementing CP-2(7) as a control enhancement.
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Identificar Ativos Cr\xEDticos"
          description: "Identificar os ativos cr\xEDticos do sistema que suportam\
            \ [Sele\xE7\xE3o: todas; essenciais] as fun\xE7\xF5es de miss\xE3o e de\
            \ neg\xF3cio."
          annotation: "As organiza\xE7\xF5es podem optar por identificar os ativos\
            \ cr\xEDticos como parte da an\xE1lise de criticidade, do planejamento\
            \ de continuidade de neg\xF3cio ou das an\xE1lises de impacto ao neg\xF3\
            cio. As organiza\xE7\xF5es identificam os ativos cr\xEDticos do sistema\
            \ para que controles adicionais possam ser empregados (al\xE9m dos controles\
            \ rotineiramente implementados) a fim de ajudar a garantir que as fun\xE7\
            \xF5es de miss\xE3o e de neg\xF3cio organizacionais possam continuar a\
            \ ser conduzidas durante as opera\xE7\xF5es de conting\xEAncia. A identifica\xE7\
            \xE3o dos ativos cr\xEDticos de informa\xE7\xE3o tamb\xE9m facilita a\
            \ prioriza\xE7\xE3o dos recursos organizacionais. Os ativos cr\xEDticos\
            \ do sistema incluem aspectos t\xE9cnicos e operacionais. Os aspectos\
            \ t\xE9cnicos incluem componentes do sistema, servi\xE7os de tecnologia\
            \ da informa\xE7\xE3o, produtos de tecnologia da informa\xE7\xE3o e mecanismos.\
            \ Os aspectos operacionais incluem procedimentos (ou seja, opera\xE7\xF5\
            es executadas manualmente) e pessoal (ou seja, indiv\xEDduos que operam\
            \ controles t\xE9cnicos e/ou executam procedimentos manuais). Os planos\
            \ organizacionais de prote\xE7\xE3o de programas podem auxiliar na identifica\xE7\
            \xE3o dos ativos cr\xEDticos. Se os ativos cr\xEDticos residirem em ou\
            \ forem suportados por provedores de servi\xE7os externos, as organiza\xE7\
            \xF5es consideram implementar o CP-2(7) como um aprimoramento de controle."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-3
      name: Contingency Training
      description: "a. Provide contingency training to system users consistent with\
        \ assigned roles and responsibilities: \n1. Within [Assignment: organization-defined\
        \ time period] of assuming a contingency role or responsibility;\n2. When\
        \ required by system changes; and\n3. [Assignment: organization-defined frequency]\
        \ thereafter; and\nb. Review and update contingency training content [Assignment:\
        \ organization-defined frequency] and following [Assignment: organization-defined\
        \ events]."
      annotation: "Contingency training provided by organizations is linked to the\
        \ assigned roles and responsibilities of organizational personnel to ensure\
        \ that the appropriate content and level of detail is included in such training.\
        \ For example, some individuals may only need to know when and where to report\
        \ for duty during contingency operations and if normal duties are affected;\
        \ system administrators\_may require\_additional training on how to establish\
        \ systems at alternate processing and storage sites; and organizational officials\
        \ may receive more specific training on how to conduct mission-essential functions\
        \ in designated off-site locations and how to establish communications with\
        \ other governmental entities for purposes of coordination on contingency-related\
        \ activities. Training for contingency roles or responsibilities reflects\
        \ the specific continuity requirements in the contingency plan. Events that\
        \ may precipitate an update to contingency training content include, but are\
        \ not limited to, contingency plan testing or an actual contingency (lessons\
        \ learned), assessment or audit findings, security incidents or breaches,\
        \ or changes in laws, executive orders, directives, regulations, policies,\
        \ standards, and guidelines. At the discretion of the organization, participation\
        \ in a contingency plan test or exercise, including lessons learned sessions\
        \ subsequent to the test or exercise, may satisfy contingency plan training\
        \ requirements."
      translations:
        pt:
          name: "Treinamento de Conting\xEAncia"
          description: "a. Fornecer treinamento de conting\xEAncia aos usu\xE1rios\
            \ do sistema de forma consistente com os pap\xE9is e responsabilidades\
            \ atribu\xEDdos:\n1. Dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o] ap\xF3s assumir um papel ou responsabilidade\
            \ de conting\xEAncia;\n2. Quando exigido por mudan\xE7as no sistema; e\n\
            3. [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] posteriormente;\
            \ e\nb. Revisar e atualizar o conte\xFAdo do treinamento de conting\xEA\
            ncia [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]\
            \ e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3\
            o]."
          annotation: "O treinamento de conting\xEAncia fornecido pelas organiza\xE7\
            \xF5es est\xE1 vinculado aos pap\xE9is e responsabilidades atribu\xED\
            dos ao pessoal organizacional para garantir que o conte\xFAdo e o n\xED\
            vel de detalhe apropriados sejam inclu\xEDdos nesse treinamento. Por exemplo,\
            \ alguns indiv\xEDduos podem precisar saber apenas quando e onde se apresentar\
            \ para o servi\xE7o durante as opera\xE7\xF5es de conting\xEAncia e se\
            \ as fun\xE7\xF5es normais s\xE3o afetadas; os administradores de sistema\
            \ podem requerer treinamento adicional sobre como estabelecer sistemas\
            \ em s\xEDtios alternativos de processamento e armazenamento; e os funcion\xE1\
            rios organizacionais podem receber treinamento mais espec\xEDfico sobre\
            \ como conduzir fun\xE7\xF5es essenciais \xE0 miss\xE3o em locais externos\
            \ designados e como estabelecer comunica\xE7\xF5es com outras entidades\
            \ governamentais para fins de coordena\xE7\xE3o em atividades relacionadas\
            \ \xE0 conting\xEAncia. O treinamento para pap\xE9is ou responsabilidades\
            \ de conting\xEAncia reflete os requisitos espec\xEDficos de continuidade\
            \ do plano de conting\xEAncia. Os eventos que podem precipitar uma atualiza\xE7\
            \xE3o do conte\xFAdo do treinamento de conting\xEAncia incluem, entre\
            \ outros, o teste do plano de conting\xEAncia ou uma conting\xEAncia real\
            \ (li\xE7\xF5es aprendidas), constata\xE7\xF5es de avalia\xE7\xE3o ou\
            \ auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7\
            as em leis, ordens executivas, diretivas, regulamentos, pol\xEDticas,\
            \ normas e diretrizes. A crit\xE9rio da organiza\xE7\xE3o, a participa\xE7\
            \xE3o em um teste ou exerc\xEDcio do plano de conting\xEAncia, incluindo\
            \ as sess\xF5es de li\xE7\xF5es aprendidas subsequentes ao teste ou exerc\xED\
            cio, pode satisfazer os requisitos de treinamento do plano de conting\xEA\
            ncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-3(1)
      name: Contingency Training | Simulated Events
      description: Incorporate simulated events into contingency training to facilitate
        effective response by personnel in crisis situations.
      annotation: The use of simulated events creates an environment for personnel
        to experience actual threat events, including cyber-attacks that disable websites,
        ransomware attacks that encrypt organizational data on servers, hurricanes
        that damage or destroy organizational facilities, or hardware or software
        failures.
      translations:
        pt:
          name: "Treinamento de Conting\xEAncia | Eventos Simulados"
          description: "Incorporar eventos simulados ao treinamento de conting\xEA\
            ncia para facilitar uma resposta eficaz do pessoal em situa\xE7\xF5es\
            \ de crise."
          annotation: "O uso de eventos simulados cria um ambiente para que o pessoal\
            \ vivencie eventos de amea\xE7a reais, incluindo ciberataques que derrubam\
            \ sites, ataques de ransomware que criptografam dados organizacionais\
            \ em servidores, furac\xF5es que danificam ou destroem instala\xE7\xF5\
            es organizacionais, ou falhas de hardware ou software."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-3(2)
      name: Contingency Training | Mechanisms Used in Training Environments
      description: Employ mechanisms used in operations to provide a more thorough
        and realistic contingency training environment.
      annotation: Operational mechanisms refer to processes that have been established
        to accomplish an organizational goal or a system that supports a particular
        organizational mission or business objective. Actual mission and business
        processes, systems, and/or facilities may be used to generate simulated events
        and enhance the realism of simulated events during contingency training.
      translations:
        pt:
          name: "Treinamento de Conting\xEAncia | Mecanismos Utilizados em Ambientes\
            \ de Treinamento"
          description: "Empregar mecanismos utilizados nas opera\xE7\xF5es para fornecer\
            \ um ambiente de treinamento de conting\xEAncia mais completo e realista."
          annotation: "Os mecanismos operacionais referem-se a processos que foram\
            \ estabelecidos para cumprir um objetivo organizacional ou a um sistema\
            \ que suporta uma miss\xE3o organizacional espec\xEDfica ou objetivo de\
            \ neg\xF3cio. Processos, sistemas e/ou instala\xE7\xF5es de miss\xE3o\
            \ e de neg\xF3cio reais podem ser utilizados para gerar eventos simulados\
            \ e aumentar o realismo dos eventos simulados durante o treinamento de\
            \ conting\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-4
      name: Contingency Plan Testing
      description: 'a. Test the contingency plan for the system [Assignment: organization-defined
        frequency] using  the following tests to determine the effectiveness of the
        plan and the readiness to execute the plan: [Assignment: organization-defined
        tests].

        b. Review the contingency plan test results; and

        c. Initiate corrective actions, if needed.'
      annotation: Methods for testing contingency plans to determine the effectiveness
        of the plans and identify potential weaknesses include checklists, walk-through
        and tabletop exercises, simulations (parallel or full interrupt), and comprehensive
        exercises. Organizations conduct testing based on the requirements in contingency
        plans and include a determination of the effects on organizational operations,
        assets, and individuals due to contingency operations. Organizations have
        flexibility and discretion in the breadth, depth, and timelines of corrective
        actions.
      translations:
        pt:
          name: "Teste do Plano de Conting\xEAncia"
          description: "a. Testar o plano de conting\xEAncia do sistema [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] utilizando os seguintes\
            \ testes para determinar a efic\xE1cia do plano e a prontid\xE3o para\
            \ execut\xE1-lo: [Atribui\xE7\xE3o: testes definidos pela organiza\xE7\
            \xE3o].\nb. Revisar os resultados do teste do plano de conting\xEAncia;\
            \ e\nc. Iniciar a\xE7\xF5es corretivas, se necess\xE1rio."
          annotation: "Os m\xE9todos para testar planos de conting\xEAncia a fim de\
            \ determinar a efic\xE1cia dos planos e identificar poss\xEDveis fragilidades\
            \ incluem listas de verifica\xE7\xE3o, exerc\xEDcios do tipo walk-through\
            \ e de mesa (tabletop), simula\xE7\xF5es (paralelas ou de interrup\xE7\
            \xE3o total) e exerc\xEDcios abrangentes. As organiza\xE7\xF5es conduzem\
            \ os testes com base nos requisitos dos planos de conting\xEAncia e incluem\
            \ uma determina\xE7\xE3o dos efeitos sobre as opera\xE7\xF5es, os ativos\
            \ e os indiv\xEDduos organizacionais decorrentes das opera\xE7\xF5es de\
            \ conting\xEAncia. As organiza\xE7\xF5es t\xEAm flexibilidade e discricionariedade\
            \ quanto \xE0 abrang\xEAncia, \xE0 profundidade e aos prazos das a\xE7\
            \xF5es corretivas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-4(1)
      name: Contingency Plan Testing | Coordinate with Related Plans
      description: Coordinate contingency plan testing with organizational elements
        responsible for related plans.
      annotation: Plans related to contingency planning for organizational systems
        include Business Continuity Plans, Disaster Recovery Plans, Continuity of
        Operations Plans, Crisis Communications Plans, Critical Infrastructure Plans,
        Cyber Incident Response Plans, and Occupant Emergency Plans. Coordination
        of contingency plan testing does not require organizations to create organizational
        elements to handle related plans or to align such elements with specific plans.
        However, it does require that if such organizational elements are responsible
        for related plans, organizations coordinate with those elements.
      translations:
        pt:
          name: "Teste do Plano de Conting\xEAncia | Coordenar com Planos Relacionados"
          description: "Coordenar o teste do plano de conting\xEAncia com os elementos\
            \ organizacionais respons\xE1veis por planos relacionados."
          annotation: "Os planos relacionados ao planejamento de conting\xEAncia para\
            \ os sistemas organizacionais incluem Planos de Continuidade de Neg\xF3\
            cio, Planos de Recupera\xE7\xE3o de Desastres, Planos de Continuidade\
            \ de Opera\xE7\xF5es, Planos de Comunica\xE7\xE3o de Crise, Planos de\
            \ Infraestrutura Cr\xEDtica, Planos de Resposta a Incidentes Cibern\xE9\
            ticos e Planos de Emerg\xEAncia de Ocupantes. A coordena\xE7\xE3o do teste\
            \ do plano de conting\xEAncia n\xE3o exige que as organiza\xE7\xF5es criem\
            \ elementos organizacionais para tratar de planos relacionados ou que\
            \ alinhem esses elementos a planos espec\xEDficos. No entanto, ela exige\
            \ que, se esses elementos organizacionais forem respons\xE1veis por planos\
            \ relacionados, as organiza\xE7\xF5es coordenem com esses elementos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-4(2)
      name: Contingency Plan Testing | Alternate Processing Site
      description: 'Test the contingency plan at the alternate processing site:

        (a) To familiarize contingency personnel with the facility and available resources;
        and

        (b) To evaluate the capabilities of the alternate processing site to support
        contingency operations.'
      annotation: Conditions at the alternate processing site may be significantly
        different than the conditions at the primary site. Having the opportunity
        to visit the alternate site and experience the actual capabilities available
        at the site can provide valuable information on potential vulnerabilities
        that could affect essential organizational mission and business functions.
        The on-site visit can also provide an opportunity to refine the contingency
        plan to address the vulnerabilities discovered during testing.
      translations:
        pt:
          name: "Teste do Plano de Conting\xEAncia | S\xEDtio Alternativo de Processamento"
          description: "Testar o plano de conting\xEAncia no s\xEDtio alternativo\
            \ de processamento:\n(a) Para familiarizar o pessoal de conting\xEAncia\
            \ com a instala\xE7\xE3o e os recursos dispon\xEDveis; e\n(b) Para avaliar\
            \ as capacidades do s\xEDtio alternativo de processamento de suportar\
            \ as opera\xE7\xF5es de conting\xEAncia."
          annotation: "As condi\xE7\xF5es no s\xEDtio alternativo de processamento\
            \ podem ser significativamente diferentes das condi\xE7\xF5es no s\xED\
            tio prim\xE1rio. Ter a oportunidade de visitar o s\xEDtio alternativo\
            \ e vivenciar as capacidades reais dispon\xEDveis no local pode fornecer\
            \ informa\xE7\xF5es valiosas sobre poss\xEDveis vulnerabilidades que poderiam\
            \ afetar as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3cio organizacionais.\
            \ A visita ao local tamb\xE9m pode proporcionar uma oportunidade para\
            \ refinar o plano de conting\xEAncia a fim de tratar das vulnerabilidades\
            \ descobertas durante os testes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-4(3)
      name: Contingency Plan Testing | Automated Testing
      description: 'Test the contingency plan using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated mechanisms facilitate thorough and effective testing of
        contingency plans by providing more complete coverage of contingency issues,
        selecting more realistic test scenarios and environments, and effectively
        stressing the system and supported mission and business functions.
      translations:
        pt:
          name: "Teste do Plano de Conting\xEAncia | Teste Automatizado"
          description: "Testar o plano de conting\xEAncia utilizando [Atribui\xE7\xE3\
            o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados facilitam o teste completo e eficaz\
            \ dos planos de conting\xEAncia ao fornecer uma cobertura mais completa\
            \ das quest\xF5es de conting\xEAncia, selecionar cen\xE1rios e ambientes\
            \ de teste mais realistas e submeter de forma eficaz o sistema e as fun\xE7\
            \xF5es de miss\xE3o e de neg\xF3cio suportadas a condi\xE7\xF5es de estresse."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-4(4)
      name: Contingency Plan Testing | Full Recovery and Reconstitution
      description: Include a full recovery and reconstitution of the system to a known
        state as part of contingency plan testing.
      annotation: Recovery is executing contingency plan activities to restore organizational
        mission and business functions. Reconstitution takes place following recovery
        and includes activities for returning systems to fully operational states.
        Organizations establish a known state for systems that includes system state
        information for hardware, software programs, and data. Preserving system state
        information facilitates system restart and return to the operational mode
        of organizations with less disruption of mission and business processes.
      translations:
        pt:
          name: "Teste do Plano de Conting\xEAncia | Recupera\xE7\xE3o e Reconstitui\xE7\
            \xE3o Completas"
          description: "Incluir uma recupera\xE7\xE3o e reconstitui\xE7\xE3o completas\
            \ do sistema para um estado conhecido como parte do teste do plano de\
            \ conting\xEAncia."
          annotation: "A recupera\xE7\xE3o consiste na execu\xE7\xE3o das atividades\
            \ do plano de conting\xEAncia para restaurar as fun\xE7\xF5es de miss\xE3\
            o e de neg\xF3cio organizacionais. A reconstitui\xE7\xE3o ocorre ap\xF3\
            s a recupera\xE7\xE3o e inclui as atividades para retornar os sistemas\
            \ a estados totalmente operacionais. As organiza\xE7\xF5es estabelecem\
            \ um estado conhecido para os sistemas que inclui informa\xE7\xF5es de\
            \ estado do sistema para hardware, programas de software e dados. A preserva\xE7\
            \xE3o das informa\xE7\xF5es de estado do sistema facilita a reinicializa\xE7\
            \xE3o do sistema e o retorno ao modo operacional das organiza\xE7\xF5\
            es com menos interrup\xE7\xE3o dos processos de miss\xE3o e de neg\xF3\
            cio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-4(5)
      name: Contingency Plan Testing | Self-challenge
      description: 'Employ [Assignment: organization-defined mechanisms] to [Assignment:
        organization-defined system or system component] to disrupt and adversely
        affect the system or system component.'
      annotation: Often, the best method of assessing system resilience is to disrupt
        the system in some manner. The mechanisms used by the organization could disrupt
        system functions or system services in many ways, including terminating or
        disabling critical system components, changing the configuration of system
        components, degrading critical functionality (e.g., restricting network bandwidth),
        or altering privileges. Automated, on-going, and simulated cyber-attacks and
        service disruptions can reveal unexpected functional dependencies and help
        the organization determine its ability to ensure resilience in the face of
        an actual cyber-attack.
      translations:
        pt:
          name: "Teste do Plano de Conting\xEAncia | Autodesafio"
          description: "Empregar [Atribui\xE7\xE3o: mecanismos definidos pela organiza\xE7\
            \xE3o] em [Atribui\xE7\xE3o: sistema ou componente de sistema definido\
            \ pela organiza\xE7\xE3o] para interromper e afetar adversamente o sistema\
            \ ou componente de sistema."
          annotation: "Frequentemente, o melhor m\xE9todo de avaliar a resili\xEA\
            ncia do sistema \xE9 interromper o sistema de alguma maneira. Os mecanismos\
            \ utilizados pela organiza\xE7\xE3o poderiam interromper fun\xE7\xF5es\
            \ do sistema ou servi\xE7os do sistema de muitas formas, incluindo encerrar\
            \ ou desativar componentes cr\xEDticos do sistema, alterar a configura\xE7\
            \xE3o de componentes do sistema, degradar funcionalidades cr\xEDticas\
            \ (por exemplo, restringir a largura de banda da rede) ou alterar privil\xE9\
            gios. Ciberataques e interrup\xE7\xF5es de servi\xE7o automatizados, cont\xED\
            nuos e simulados podem revelar depend\xEAncias funcionais inesperadas\
            \ e ajudar a organiza\xE7\xE3o a determinar sua capacidade de garantir\
            \ resili\xEAncia diante de um ciberataque real."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10(3)
      name: System Recovery and Reconstitution | Compensating Security Controls
      description: '[Withdrawn: Addressed through tailoring.]'
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema | Controles de\
            \ Seguran\xE7a Compensat\xF3rios"
          description: "[Retirado: Tratado por meio de adequa\xE7\xE3o (tailoring).]"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-6
      name: Alternate Storage Site
      description: 'a. Establish an alternate storage site, including necessary agreements
        to permit the storage and retrieval of system backup information; and

        b. Ensure that the alternate storage site provides controls equivalent to
        that of the primary site.'
      annotation: Alternate storage sites are geographically distinct from primary
        storage sites and maintain duplicate copies of information and data if the
        primary storage site is not available. Similarly, alternate processing sites
        provide processing capability if the primary processing site is not available.
        Geographically distributed architectures that support contingency requirements
        may be considered alternate storage sites. Items covered by alternate storage
        site agreements include environmental conditions at the alternate sites, access
        rules for systems and facilities, physical and environmental protection requirements,
        and coordination of delivery and retrieval of backup media. Alternate storage
        sites reflect the requirements in contingency plans so that organizations
        can maintain essential mission and business functions despite compromise,
        failure, or disruption in organizational systems.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Armazenamento"
          description: "a. Estabelecer um s\xEDtio alternativo de armazenamento, incluindo\
            \ os acordos necess\xE1rios para permitir o armazenamento e a recupera\xE7\
            \xE3o das informa\xE7\xF5es de backup do sistema; e\nb. Garantir que o\
            \ s\xEDtio alternativo de armazenamento forne\xE7a controles equivalentes\
            \ aos do s\xEDtio prim\xE1rio."
          annotation: "Os s\xEDtios alternativos de armazenamento s\xE3o geograficamente\
            \ distintos dos s\xEDtios prim\xE1rios de armazenamento e mant\xEAm c\xF3\
            pias duplicadas de informa\xE7\xF5es e dados caso o s\xEDtio prim\xE1\
            rio de armazenamento n\xE3o esteja dispon\xEDvel. De forma semelhante,\
            \ os s\xEDtios alternativos de processamento fornecem capacidade de processamento\
            \ caso o s\xEDtio prim\xE1rio de processamento n\xE3o esteja dispon\xED\
            vel. Arquiteturas geograficamente distribu\xEDdas que suportam requisitos\
            \ de conting\xEAncia podem ser consideradas s\xEDtios alternativos de\
            \ armazenamento. Os itens cobertos pelos acordos de s\xEDtio alternativo\
            \ de armazenamento incluem as condi\xE7\xF5es ambientais nos s\xEDtios\
            \ alternativos, as regras de acesso a sistemas e instala\xE7\xF5es, os\
            \ requisitos de prote\xE7\xE3o f\xEDsica e ambiental e a coordena\xE7\xE3\
            o da entrega e recupera\xE7\xE3o das m\xEDdias de backup. Os s\xEDtios\
            \ alternativos de armazenamento refletem os requisitos dos planos de conting\xEA\
            ncia para que as organiza\xE7\xF5es possam manter as fun\xE7\xF5es essenciais\
            \ de miss\xE3o e de neg\xF3cio apesar de comprometimento, falha ou interrup\xE7\
            \xE3o nos sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-6(1)
      name: Alternate Storage Site | Separation from Primary Site
      description: Identify an alternate storage site that is sufficiently separated
        from the primary storage site to reduce susceptibility to the same threats.
      annotation: Threats that affect alternate storage sites are defined in organizational
        risk assessments and include natural disasters, structural failures, hostile
        attacks, and errors of omission or commission. Organizations determine what
        is considered a sufficient degree of separation between primary and alternate
        storage sites based on the types of threats that are of concern. For threats
        such as hostile attacks, the degree of separation between sites is less relevant.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Armazenamento | Separa\xE7\xE3o do S\xED\
            tio Prim\xE1rio"
          description: "Identificar um s\xEDtio alternativo de armazenamento que esteja\
            \ suficientemente separado do s\xEDtio prim\xE1rio de armazenamento para\
            \ reduzir a suscetibilidade \xE0s mesmas amea\xE7as."
          annotation: "As amea\xE7as que afetam os s\xEDtios alternativos de armazenamento\
            \ s\xE3o definidas nas avalia\xE7\xF5es de risco organizacionais e incluem\
            \ desastres naturais, falhas estruturais, ataques hostis e erros de omiss\xE3\
            o ou de a\xE7\xE3o. As organiza\xE7\xF5es determinam o que \xE9 considerado\
            \ um grau suficiente de separa\xE7\xE3o entre os s\xEDtios prim\xE1rio\
            \ e alternativo de armazenamento com base nos tipos de amea\xE7as que\
            \ s\xE3o de preocupa\xE7\xE3o. Para amea\xE7as como ataques hostis, o\
            \ grau de separa\xE7\xE3o entre os s\xEDtios \xE9 menos relevante."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-6(2)
      name: Alternate Storage Site | Recovery Time and Recovery Point Objectives
      description: Configure the alternate storage site to facilitate recovery operations
        in accordance with recovery time and recovery point objectives.
      annotation: Organizations establish recovery time and recovery point objectives
        as part of contingency planning. Configuration of the alternate storage site
        includes physical facilities and the systems supporting recovery operations
        that ensure accessibility and correct execution.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Armazenamento | Objetivos de Tempo de Recupera\xE7\
            \xE3o e de Ponto de Recupera\xE7\xE3o"
          description: "Configurar o s\xEDtio alternativo de armazenamento para facilitar\
            \ as opera\xE7\xF5es de recupera\xE7\xE3o em conformidade com os objetivos\
            \ de tempo de recupera\xE7\xE3o e de ponto de recupera\xE7\xE3o."
          annotation: "As organiza\xE7\xF5es estabelecem os objetivos de tempo de\
            \ recupera\xE7\xE3o e de ponto de recupera\xE7\xE3o como parte do planejamento\
            \ de conting\xEAncia. A configura\xE7\xE3o do s\xEDtio alternativo de\
            \ armazenamento inclui as instala\xE7\xF5es f\xEDsicas e os sistemas que\
            \ suportam as opera\xE7\xF5es de recupera\xE7\xE3o que garantem a acessibilidade\
            \ e a execu\xE7\xE3o correta."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-6(3)
      name: Alternate Storage Site | Accessibility
      description: Identify potential accessibility problems to the alternate storage
        site in the event of an area-wide disruption or disaster and outline explicit
        mitigation actions.
      annotation: Area-wide disruptions refer to those types of disruptions that are
        broad in geographic scope with such determinations made by organizations based
        on organizational assessments of risk. Explicit mitigation actions include
        duplicating backup information at other alternate storage sites if access
        problems occur at originally designated alternate sites or planning for physical
        access to retrieve backup information if electronic accessibility to the alternate
        site is disrupted.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Armazenamento | Acessibilidade"
          description: "Identificar poss\xEDveis problemas de acessibilidade ao s\xED\
            tio alternativo de armazenamento na eventualidade de uma interrup\xE7\xE3\
            o ou desastre de \xE2mbito regional e delinear a\xE7\xF5es expl\xEDcitas\
            \ de mitiga\xE7\xE3o."
          annotation: "As interrup\xE7\xF5es de \xE2mbito regional referem-se aos\
            \ tipos de interrup\xE7\xF5es que s\xE3o amplas em escopo geogr\xE1fico,\
            \ com tais determina\xE7\xF5es feitas pelas organiza\xE7\xF5es com base\
            \ em avalia\xE7\xF5es organizacionais de risco. As a\xE7\xF5es expl\xED\
            citas de mitiga\xE7\xE3o incluem duplicar as informa\xE7\xF5es de backup\
            \ em outros s\xEDtios alternativos de armazenamento caso ocorram problemas\
            \ de acesso nos s\xEDtios alternativos originalmente designados, ou planejar\
            \ o acesso f\xEDsico para recuperar as informa\xE7\xF5es de backup caso\
            \ a acessibilidade eletr\xF4nica ao s\xEDtio alternativo seja interrompida."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7
      name: Alternate Processing Site
      description: 'a. Establish an alternate processing site, including necessary
        agreements to permit the transfer and resumption of [Assignment: organization-defined
        system operations] for essential mission and business functions within [Assignment:
        organization-defined time period consistent with recovery time and recovery
        point objectives] when the primary processing capabilities are unavailable;

        b. Make available at the alternate processing site, the equipment and supplies
        required to transfer and resume operations or put contracts in place to support
        delivery to the site within the organization-defined time period for transfer
        and resumption; and

        c. Provide controls at the alternate processing site that are equivalent to
        those at the primary site.'
      annotation: Alternate processing sites are geographically distinct from primary
        processing sites and provide processing capability if the primary processing
        site is not available. The alternate processing capability may be addressed
        using a physical processing site or other alternatives, such as failover to
        a cloud-based service provider or other internally or externally provided
        processing service. Geographically distributed architectures that support
        contingency requirements may also be considered alternate processing sites.
        Controls that are covered by alternate processing site agreements include
        the environmental conditions at alternate sites, access rules, physical and
        environmental protection requirements, and the coordination for the transfer
        and assignment of personnel. Requirements are allocated to alternate processing
        sites that reflect the requirements in contingency plans to maintain essential
        mission and business functions despite disruption, compromise, or failure
        in organizational systems.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Processamento"
          description: "a. Estabelecer um s\xEDtio alternativo de processamento, incluindo\
            \ os acordos necess\xE1rios para permitir a transfer\xEAncia e a retomada\
            \ de [Atribui\xE7\xE3o: opera\xE7\xF5es de sistema definidas pela organiza\xE7\
            \xE3o] para as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3cio dentro\
            \ de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o, consistente com os objetivos de tempo de recupera\xE7\xE3o e de\
            \ ponto de recupera\xE7\xE3o] quando as capacidades prim\xE1rias de processamento\
            \ estiverem indispon\xEDveis;\nb. Disponibilizar no s\xEDtio alternativo\
            \ de processamento os equipamentos e suprimentos necess\xE1rios para transferir\
            \ e retomar as opera\xE7\xF5es, ou estabelecer contratos para suportar\
            \ a entrega no local dentro do per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o para a transfer\xEAncia e retomada; e\nc. Fornecer controles no\
            \ s\xEDtio alternativo de processamento que sejam equivalentes aos do\
            \ s\xEDtio prim\xE1rio."
          annotation: "Os s\xEDtios alternativos de processamento s\xE3o geograficamente\
            \ distintos dos s\xEDtios prim\xE1rios de processamento e fornecem capacidade\
            \ de processamento caso o s\xEDtio prim\xE1rio de processamento n\xE3\
            o esteja dispon\xEDvel. A capacidade alternativa de processamento pode\
            \ ser atendida utilizando um s\xEDtio f\xEDsico de processamento ou outras\
            \ alternativas, como failover para um provedor de servi\xE7os baseado\
            \ em nuvem ou outro servi\xE7o de processamento fornecido interna ou externamente.\
            \ Arquiteturas geograficamente distribu\xEDdas que suportam requisitos\
            \ de conting\xEAncia tamb\xE9m podem ser consideradas s\xEDtios alternativos\
            \ de processamento. Os controles cobertos pelos acordos de s\xEDtio alternativo\
            \ de processamento incluem as condi\xE7\xF5es ambientais nos s\xEDtios\
            \ alternativos, as regras de acesso, os requisitos de prote\xE7\xE3o f\xED\
            sica e ambiental e a coordena\xE7\xE3o da transfer\xEAncia e aloca\xE7\
            \xE3o de pessoal. Os requisitos s\xE3o alocados aos s\xEDtios alternativos\
            \ de processamento de forma que reflitam os requisitos dos planos de conting\xEA\
            ncia para manter as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3\
            cio apesar de interrup\xE7\xE3o, comprometimento ou falha nos sistemas\
            \ organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7(1)
      name: Alternate Processing Site | Separation from Primary Site
      description: Identify an alternate processing site that is sufficiently separated
        from the primary processing site to reduce susceptibility to the same threats.
      annotation: Threats that affect alternate processing sites are defined in organizational
        assessments of risk and include natural disasters, structural failures, hostile
        attacks, and errors of omission or commission. Organizations determine what
        is considered a sufficient degree of separation between primary and alternate
        processing sites based on the types of threats that are of concern. For threats
        such as hostile attacks, the degree of separation between sites is less relevant.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Processamento | Separa\xE7\xE3o do S\xED\
            tio Prim\xE1rio"
          description: "Identificar um s\xEDtio alternativo de processamento que esteja\
            \ suficientemente separado do s\xEDtio prim\xE1rio de processamento para\
            \ reduzir a suscetibilidade \xE0s mesmas amea\xE7as."
          annotation: "As amea\xE7as que afetam os s\xEDtios alternativos de processamento\
            \ s\xE3o definidas nas avalia\xE7\xF5es organizacionais de risco e incluem\
            \ desastres naturais, falhas estruturais, ataques hostis e erros de omiss\xE3\
            o ou de a\xE7\xE3o. As organiza\xE7\xF5es determinam o que \xE9 considerado\
            \ um grau suficiente de separa\xE7\xE3o entre os s\xEDtios prim\xE1rio\
            \ e alternativo de processamento com base nos tipos de amea\xE7as que\
            \ s\xE3o de preocupa\xE7\xE3o. Para amea\xE7as como ataques hostis, o\
            \ grau de separa\xE7\xE3o entre os s\xEDtios \xE9 menos relevante."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7(2)
      name: Alternate Processing Site | Accessibility
      description: Identify potential accessibility problems to alternate processing
        sites in the event of an area-wide disruption or disaster and outlines explicit
        mitigation actions.
      annotation: Area-wide disruptions refer to those types of disruptions that are
        broad in geographic scope with such determinations made by organizations based
        on organizational assessments of risk.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Processamento | Acessibilidade"
          description: "Identificar poss\xEDveis problemas de acessibilidade aos s\xED\
            tios alternativos de processamento na eventualidade de uma interrup\xE7\
            \xE3o ou desastre de \xE2mbito regional e delinear a\xE7\xF5es expl\xED\
            citas de mitiga\xE7\xE3o."
          annotation: "As interrup\xE7\xF5es de \xE2mbito regional referem-se aos\
            \ tipos de interrup\xE7\xF5es que s\xE3o amplas em escopo geogr\xE1fico,\
            \ com tais determina\xE7\xF5es feitas pelas organiza\xE7\xF5es com base\
            \ em avalia\xE7\xF5es organizacionais de risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7(3)
      name: Alternate Processing Site | Priority of Service
      description: Develop alternate processing site agreements that contain priority-of-service
        provisions in accordance with availability requirements (including recovery
        time objectives).
      annotation: Priority of service agreements refer to negotiated agreements with
        service providers that ensure that organizations receive priority treatment
        consistent with their availability requirements and the availability of information
        resources for logical alternate processing and/or at the physical alternate
        processing site. Organizations establish recovery time objectives as part
        of contingency planning.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Processamento | Prioridade de Servi\xE7o"
          description: "Desenvolver acordos de s\xEDtio alternativo de processamento\
            \ que contenham cl\xE1usulas de prioridade de servi\xE7o em conformidade\
            \ com os requisitos de disponibilidade (incluindo os objetivos de tempo\
            \ de recupera\xE7\xE3o)."
          annotation: "Os acordos de prioridade de servi\xE7o referem-se a acordos\
            \ negociados com provedores de servi\xE7os que garantem que as organiza\xE7\
            \xF5es recebam tratamento priorit\xE1rio consistente com seus requisitos\
            \ de disponibilidade e com a disponibilidade de recursos de informa\xE7\
            \xE3o para processamento alternativo l\xF3gico e/ou no s\xEDtio alternativo\
            \ f\xEDsico de processamento. As organiza\xE7\xF5es estabelecem os objetivos\
            \ de tempo de recupera\xE7\xE3o como parte do planejamento de conting\xEA\
            ncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7(4)
      name: Alternate Processing Site | Preparation for Use
      description: Prepare the alternate processing site so that the site can serve
        as the operational site supporting essential mission and business functions.
      annotation: Site preparation includes establishing configuration settings for
        systems at the alternate processing site consistent with the requirements
        for such settings at the primary site and ensuring that essential supplies
        and logistical considerations are in place.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Processamento | Prepara\xE7\xE3o para Uso"
          description: "Preparar o s\xEDtio alternativo de processamento de modo que\
            \ o s\xEDtio possa servir como o s\xEDtio operacional que suporta as fun\xE7\
            \xF5es essenciais de miss\xE3o e de neg\xF3cio."
          annotation: "A prepara\xE7\xE3o do s\xEDtio inclui estabelecer par\xE2metros\
            \ de configura\xE7\xE3o para os sistemas no s\xEDtio alternativo de processamento\
            \ consistentes com os requisitos para tais par\xE2metros no s\xEDtio prim\xE1\
            rio e garantir que os suprimentos essenciais e as considera\xE7\xF5es\
            \ log\xEDsticas estejam em vigor."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10(5)
      name: System Recovery and Reconstitution | Failover Capability
      description: '[Withdrawn: Incorporated into SI-13.]'
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema | Capacidade\
            \ de Failover"
          description: '[Retirado: Incorporado ao SI-13.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7(6)
      name: Alternate Processing Site | Inability to Return to Primary Site
      description: Plan and prepare for circumstances that preclude returning to the
        primary processing site.
      annotation: There may be situations that preclude an organization from returning
        to the primary processing site such as if a natural disaster (e.g., flood
        or a hurricane) damaged or destroyed a facility and it was determined that
        rebuilding in the same location was not prudent.
      translations:
        pt:
          name: "S\xEDtio Alternativo de Processamento | Impossibilidade de Retornar\
            \ ao S\xEDtio Prim\xE1rio"
          description: "Planejar e preparar-se para circunst\xE2ncias que impe\xE7\
            am o retorno ao s\xEDtio prim\xE1rio de processamento."
          annotation: "Pode haver situa\xE7\xF5es que impe\xE7am uma organiza\xE7\xE3\
            o de retornar ao s\xEDtio prim\xE1rio de processamento, como, por exemplo,\
            \ se um desastre natural (por exemplo, uma enchente ou um furac\xE3o)\
            \ danificou ou destruiu uma instala\xE7\xE3o e for determinado que reconstruir\
            \ no mesmo local n\xE3o seria prudente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-8
      name: Telecommunications Services
      description: 'Establish alternate telecommunications services, including necessary
        agreements to permit the resumption of [Assignment: organization-defined system
        operations] for essential mission and business functions within [Assignment:
        organization-defined time period] when the primary telecommunications capabilities
        are unavailable at either the primary or alternate processing or storage sites.'
      annotation: Telecommunications services (for data and voice) for primary and
        alternate processing and storage sites are in scope for CP-8. Alternate telecommunications
        services reflect the continuity requirements in contingency plans to maintain
        essential mission and business functions despite the loss of primary telecommunications
        services. Organizations may specify different time periods for primary or
        alternate sites. Alternate telecommunications services include additional
        organizational or commercial ground-based circuits or lines, network-based
        approaches to telecommunications, or the use of satellites. Organizations
        consider factors such as availability, quality of service, and access when
        entering into alternate telecommunications agreements.
      translations:
        pt:
          name: "Servi\xE7os de Telecomunica\xE7\xF5es"
          description: "Estabelecer servi\xE7os alternativos de telecomunica\xE7\xF5\
            es, incluindo os acordos necess\xE1rios para permitir a retomada de [Atribui\xE7\
            \xE3o: opera\xE7\xF5es de sistema definidas pela organiza\xE7\xE3o] para\
            \ as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3cio dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] quando as\
            \ capacidades prim\xE1rias de telecomunica\xE7\xF5es estiverem indispon\xED\
            veis no s\xEDtio prim\xE1rio ou no s\xEDtio alternativo de processamento\
            \ ou armazenamento."
          annotation: "Os servi\xE7os de telecomunica\xE7\xF5es (para dados e voz)\
            \ para os s\xEDtios prim\xE1rio e alternativo de processamento e armazenamento\
            \ est\xE3o no escopo do CP-8. Os servi\xE7os alternativos de telecomunica\xE7\
            \xF5es refletem os requisitos de continuidade dos planos de conting\xEA\
            ncia para manter as fun\xE7\xF5es essenciais de miss\xE3o e de neg\xF3\
            cio apesar da perda dos servi\xE7os prim\xE1rios de telecomunica\xE7\xF5\
            es. As organiza\xE7\xF5es podem especificar per\xEDodos de tempo diferentes\
            \ para os s\xEDtios prim\xE1rios ou alternativos. Os servi\xE7os alternativos\
            \ de telecomunica\xE7\xF5es incluem circuitos ou linhas terrestres organizacionais\
            \ ou comerciais adicionais, abordagens de telecomunica\xE7\xF5es baseadas\
            \ em rede ou o uso de sat\xE9lites. As organiza\xE7\xF5es consideram fatores\
            \ como disponibilidade, qualidade de servi\xE7o e acesso ao firmar acordos\
            \ de servi\xE7os alternativos de telecomunica\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-8(1)
      name: Telecommunications Services | Priority of Service Provisions
      description: '(a) Develop primary and alternate telecommunications service agreements
        that contain priority-of-service provisions in accordance with availability
        requirements (including recovery time objectives); and

        (b) Request Telecommunications Service Priority for all telecommunications
        services used for national security emergency preparedness if the primary
        and/or alternate telecommunications services are provided by a common carrier.'
      annotation: Organizations consider the potential mission or business impact
        in situations where telecommunications service providers are servicing other
        organizations with similar priority of service provisions. Telecommunications
        Service Priority (TSP) is a Federal Communications Commission (FCC) program
        that directs telecommunications service providers (e.g., wireline and wireless
        phone companies) to give preferential treatment to users enrolled in the program
        when they need to add new lines or have their lines restored following a disruption
        of service, regardless of the cause. The FCC sets the rules and policies for
        the TSP program, and the Department of Homeland Security manages the TSP program.
        The TSP program is always in effect and not contingent on a major disaster
        or attack taking place. Federal sponsorship is required to enroll in the TSP
        program.
      translations:
        pt:
          name: "Servi\xE7os de Telecomunica\xE7\xF5es | Cl\xE1usulas de Prioridade\
            \ de Servi\xE7o"
          description: "(a) Desenvolver acordos de servi\xE7os prim\xE1rios e alternativos\
            \ de telecomunica\xE7\xF5es que contenham cl\xE1usulas de prioridade de\
            \ servi\xE7o em conformidade com os requisitos de disponibilidade (incluindo\
            \ os objetivos de tempo de recupera\xE7\xE3o); e\n(b) Solicitar Prioridade\
            \ de Servi\xE7o de Telecomunica\xE7\xF5es para todos os servi\xE7os de\
            \ telecomunica\xE7\xF5es utilizados para a prepara\xE7\xE3o para emerg\xEA\
            ncias de seguran\xE7a nacional, caso os servi\xE7os prim\xE1rios e/ou\
            \ alternativos de telecomunica\xE7\xF5es sejam fornecidos por uma operadora\
            \ comum (common carrier)."
          annotation: "As organiza\xE7\xF5es consideram o potencial impacto \xE0 miss\xE3\
            o ou ao neg\xF3cio em situa\xE7\xF5es em que os provedores de servi\xE7\
            os de telecomunica\xE7\xF5es atendem outras organiza\xE7\xF5es com cl\xE1\
            usulas de prioridade de servi\xE7o semelhantes. A Prioridade de Servi\xE7\
            o de Telecomunica\xE7\xF5es (TSP) \xE9 um programa da Federal Communications\
            \ Commission (FCC) que orienta os provedores de servi\xE7os de telecomunica\xE7\
            \xF5es (por exemplo, empresas de telefonia fixa e m\xF3vel) a darem tratamento\
            \ preferencial aos usu\xE1rios inscritos no programa quando estes precisarem\
            \ adicionar novas linhas ou ter suas linhas restauradas ap\xF3s uma interrup\xE7\
            \xE3o de servi\xE7o, independentemente da causa. A FCC define as regras\
            \ e pol\xEDticas do programa TSP, e o Department of Homeland Security\
            \ gerencia o programa TSP. O programa TSP est\xE1 sempre em vigor e n\xE3\
            o \xE9 contingente \xE0 ocorr\xEAncia de um grande desastre ou ataque.\
            \ \xC9 exigido patroc\xEDnio federal para a inscri\xE7\xE3o no programa\
            \ TSP."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-8(2)
      name: Telecommunications Services | Single Points of Failure
      description: Obtain alternate telecommunications services to reduce the likelihood
        of sharing a single point of failure with primary telecommunications services.
      annotation: In certain circumstances, telecommunications service providers or
        services may share the same physical lines, which increases the vulnerability
        of a single failure point. It is important to have provider transparency for
        the actual physical transmission capability for telecommunication services.
      translations:
        pt:
          name: "Servi\xE7os de Telecomunica\xE7\xF5es | Pontos \xDAnicos de Falha"
          description: "Obter servi\xE7os alternativos de telecomunica\xE7\xF5es para\
            \ reduzir a probabilidade de compartilhar um ponto \xFAnico de falha com\
            \ os servi\xE7os prim\xE1rios de telecomunica\xE7\xF5es."
          annotation: "Em certas circunst\xE2ncias, os provedores ou servi\xE7os de\
            \ telecomunica\xE7\xF5es podem compartilhar as mesmas linhas f\xEDsicas,\
            \ o que aumenta a vulnerabilidade de um ponto \xFAnico de falha. \xC9\
            \ importante haver transpar\xEAncia do provedor quanto \xE0 capacidade\
            \ real de transmiss\xE3o f\xEDsica dos servi\xE7os de telecomunica\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-8(3)
      name: Telecommunications Services | Separation of Primary and Alternate Providers
      description: Obtain alternate telecommunications services from providers that
        are separated from primary service providers to reduce susceptibility to the
        same threats.
      annotation: Threats that affect telecommunications services are defined in organizational
        assessments of risk and include natural disasters, structural failures, cyber
        or physical attacks, and errors of omission or commission. Organizations can
        reduce common susceptibilities by minimizing shared infrastructure among telecommunications
        service providers and achieving sufficient geographic separation between services.
        Organizations may consider using a single service provider in situations where
        the service provider can provide alternate telecommunications services that
        meet the separation needs addressed in the risk assessment.
      translations:
        pt:
          name: "Servi\xE7os de Telecomunica\xE7\xF5es | Separa\xE7\xE3o entre Provedores\
            \ Prim\xE1rio e Alternativo"
          description: "Obter servi\xE7os alternativos de telecomunica\xE7\xF5es de\
            \ provedores que estejam separados dos provedores de servi\xE7o prim\xE1\
            rios para reduzir a suscetibilidade \xE0s mesmas amea\xE7as."
          annotation: "As amea\xE7as que afetam os servi\xE7os de telecomunica\xE7\
            \xF5es s\xE3o definidas nas avalia\xE7\xF5es organizacionais de risco\
            \ e incluem desastres naturais, falhas estruturais, ataques cibern\xE9\
            ticos ou f\xEDsicos e erros de omiss\xE3o ou de a\xE7\xE3o. As organiza\xE7\
            \xF5es podem reduzir suscetibilidades comuns minimizando a infraestrutura\
            \ compartilhada entre os provedores de servi\xE7os de telecomunica\xE7\
            \xF5es e alcan\xE7ando separa\xE7\xE3o geogr\xE1fica suficiente entre\
            \ os servi\xE7os. As organiza\xE7\xF5es podem considerar o uso de um \xFA\
            nico provedor de servi\xE7os em situa\xE7\xF5es em que o provedor de servi\xE7\
            os possa fornecer servi\xE7os alternativos de telecomunica\xE7\xF5es que\
            \ atendam \xE0s necessidades de separa\xE7\xE3o tratadas na avalia\xE7\
            \xE3o de risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-8(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-8(4)
      name: Telecommunications Services | Provider Contingency Plan
      description: '(a) Require primary and alternate telecommunications service providers
        to have contingency plans;

        (b) Review provider contingency plans to ensure that the plans meet organizational
        contingency requirements; and

        (c) Obtain evidence of contingency testing and training by providers [Assignment:
        organization-defined frequency].'
      annotation: Reviews of provider contingency plans consider the proprietary nature
        of such plans. In some situations, a summary of provider contingency plans
        may be sufficient evidence for organizations to satisfy the review requirement.
        Telecommunications service providers may also participate in ongoing disaster
        recovery exercises in coordination with the Department of Homeland Security
        and state and local governments. Organizations may use these types of activities
        to satisfy evidentiary requirements related to service provider contingency
        plan reviews, testing, and training.
      translations:
        pt:
          name: "Servi\xE7os de Telecomunica\xE7\xF5es | Plano de Conting\xEAncia\
            \ do Provedor"
          description: "(a) Exigir que os provedores de servi\xE7os prim\xE1rios e\
            \ alternativos de telecomunica\xE7\xF5es possuam planos de conting\xEA\
            ncia;\n(b) Revisar os planos de conting\xEAncia dos provedores para garantir\
            \ que os planos atendam aos requisitos de conting\xEAncia organizacionais;\
            \ e\n(c) Obter evid\xEAncia de testes e treinamento de conting\xEAncia\
            \ por parte dos provedores [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o]."
          annotation: "As revis\xF5es dos planos de conting\xEAncia dos provedores\
            \ consideram a natureza propriet\xE1ria desses planos. Em algumas situa\xE7\
            \xF5es, um resumo dos planos de conting\xEAncia dos provedores pode ser\
            \ evid\xEAncia suficiente para que as organiza\xE7\xF5es satisfa\xE7am\
            \ o requisito de revis\xE3o. Os provedores de servi\xE7os de telecomunica\xE7\
            \xF5es tamb\xE9m podem participar de exerc\xEDcios cont\xEDnuos de recupera\xE7\
            \xE3o de desastres em coordena\xE7\xE3o com o Department of Homeland Security\
            \ e os governos estaduais e locais. As organiza\xE7\xF5es podem utilizar\
            \ esses tipos de atividades para satisfazer os requisitos de evid\xEA\
            ncia relacionados \xE0s revis\xF5es, testes e treinamento dos planos de\
            \ conting\xEAncia dos provedores de servi\xE7os."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-8(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-8(5)
      name: Telecommunications Services | Alternate Telecommunication Service Testing
      description: 'Test alternate telecommunication services [Assignment: organization-defined
        frequency].'
      annotation: Alternate telecommunications services testing is arranged through
        contractual agreements with service providers. The testing may occur in parallel
        with normal operations to ensure that there is no degradation in organizational
        missions or functions.
      translations:
        pt:
          name: "Servi\xE7os de Telecomunica\xE7\xF5es | Teste dos Servi\xE7os Alternativos\
            \ de Telecomunica\xE7\xF5es"
          description: "Testar os servi\xE7os alternativos de telecomunica\xE7\xF5\
            es [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "O teste dos servi\xE7os alternativos de telecomunica\xE7\xF5\
            es \xE9 organizado por meio de acordos contratuais com os provedores de\
            \ servi\xE7os. O teste pode ocorrer em paralelo \xE0s opera\xE7\xF5es\
            \ normais para garantir que n\xE3o haja degrada\xE7\xE3o nas miss\xF5\
            es ou fun\xE7\xF5es organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9
      name: System Backup
      description: "a. Conduct backups of user-level information contained in [Assignment:\
        \ organization-defined system components] [Assignment: organization-defined\
        \ frequency consistent with recovery time and recovery point objectives];\n\
        b. Conduct backups of system-level information contained in the system [Assignment:\
        \ organization-defined frequency consistent with recovery time and recovery\
        \ point objectives];\nc. Conduct backups of system documentation, including\
        \ security- and privacy-related documentation [Assignment: organization-defined\
        \ frequency consistent with recovery time and recovery point objectives];\
        \ and  \nd. Protect the confidentiality, integrity, and availability of backup\
        \ information."
      annotation: System-level information includes system state information, operating
        system software, middleware, application software, and licenses. User-level
        information includes information other than system-level information. Mechanisms
        employed to protect the integrity of system backups include digital signatures
        and cryptographic hashes. Protection of system backup information while in
        transit is addressed by MP-5 and SC-8. System backups reflect the requirements
        in contingency plans as well as other organizational requirements for backing
        up information. Organizations may be subject to laws, executive orders, directives,
        regulations, or policies with requirements regarding specific categories of
        information (e.g., personal health information). Organizational personnel
        consult with the senior agency official for privacy and legal counsel regarding
        such requirements.
      translations:
        pt:
          name: Backup do Sistema
          description: "a. Realizar backups das informa\xE7\xF5es de n\xEDvel de usu\xE1\
            rio contidas em [Atribui\xE7\xE3o: componentes de sistema definidos pela\
            \ organiza\xE7\xE3o] [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o, consistente com os objetivos de tempo de recupera\xE7\xE3o e de\
            \ ponto de recupera\xE7\xE3o];\nb. Realizar backups das informa\xE7\xF5\
            es de n\xEDvel de sistema contidas no sistema [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o, consistente com os objetivos de\
            \ tempo de recupera\xE7\xE3o e de ponto de recupera\xE7\xE3o];\nc. Realizar\
            \ backups da documenta\xE7\xE3o do sistema, incluindo a documenta\xE7\xE3\
            o relacionada \xE0 seguran\xE7a e \xE0 privacidade [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o, consistente com os objetivos\
            \ de tempo de recupera\xE7\xE3o e de ponto de recupera\xE7\xE3o]; e  \n\
            d. Proteger a confidencialidade, a integridade e a disponibilidade das\
            \ informa\xE7\xF5es de backup."
          annotation: "As informa\xE7\xF5es de n\xEDvel de sistema incluem informa\xE7\
            \xF5es de estado do sistema, software de sistema operacional, middleware,\
            \ software de aplica\xE7\xE3o e licen\xE7as. As informa\xE7\xF5es de n\xED\
            vel de usu\xE1rio incluem informa\xE7\xF5es que n\xE3o sejam informa\xE7\
            \xF5es de n\xEDvel de sistema. Os mecanismos empregados para proteger\
            \ a integridade dos backups do sistema incluem assinaturas digitais e\
            \ hashes criptogr\xE1ficos. A prote\xE7\xE3o das informa\xE7\xF5es de\
            \ backup do sistema durante o tr\xE2nsito \xE9 tratada em MP-5 e SC-8.\
            \ Os backups do sistema refletem os requisitos dos planos de conting\xEA\
            ncia, bem como outros requisitos organizacionais de backup de informa\xE7\
            \xF5es. As organiza\xE7\xF5es podem estar sujeitas a leis, decretos, diretivas,\
            \ regulamentos ou pol\xEDticas com requisitos relativos a categorias espec\xED\
            ficas de informa\xE7\xE3o (por exemplo, informa\xE7\xF5es pessoais de\
            \ sa\xFAde). O pessoal da organiza\xE7\xE3o consulta o respons\xE1vel\
            \ s\xEAnior da ag\xEAncia pela privacidade e a assessoria jur\xEDdica\
            \ a respeito de tais requisitos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(1)
      name: System Backup | Testing for Reliability and Integrity
      description: 'Test backup information [Assignment: organization-defined frequency]
        to verify media reliability and information integrity.'
      annotation: Organizations need assurance that backup information can be reliably
        retrieved. Reliability pertains to the systems and system components where
        the backup information is stored, the operations used to retrieve the information,
        and the integrity of the information being retrieved. Independent and specialized
        tests can be used for each of the aspects of reliability. For example, decrypting
        and transporting (or transmitting) a random sample of backup files from the
        alternate storage or backup site and comparing the information to the same
        information at the primary processing site can provide such assurance.
      translations:
        pt:
          name: Backup do Sistema | Teste de Confiabilidade e Integridade
          description: "Testar as informa\xE7\xF5es de backup [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] para verificar a confiabilidade\
            \ da m\xEDdia e a integridade das informa\xE7\xF5es."
          annotation: "As organiza\xE7\xF5es precisam de garantia de que as informa\xE7\
            \xF5es de backup possam ser recuperadas de forma confi\xE1vel. A confiabilidade\
            \ diz respeito aos sistemas e componentes de sistema onde as informa\xE7\
            \xF5es de backup est\xE3o armazenadas, \xE0s opera\xE7\xF5es usadas para\
            \ recuperar as informa\xE7\xF5es e \xE0 integridade das informa\xE7\xF5\
            es que est\xE3o sendo recuperadas. Testes independentes e especializados\
            \ podem ser usados para cada um dos aspectos da confiabilidade. Por exemplo,\
            \ descriptografar e transportar (ou transmitir) uma amostra aleat\xF3\
            ria de arquivos de backup do local de armazenamento alternativo ou do\
            \ site de backup e comparar as informa\xE7\xF5es com as mesmas informa\xE7\
            \xF5es no site de processamento prim\xE1rio pode fornecer tal garantia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(2)
      name: System Backup | Test Restoration Using Sampling
      description: Use a sample of backup information in the restoration of selected
        system functions as part of contingency plan testing.
      annotation: Organizations need assurance that system functions can be restored
        correctly and can support established organizational missions. To ensure that
        the selected system functions are thoroughly exercised during contingency
        plan testing, a sample of backup information is retrieved to determine whether
        the functions are operating as intended. Organizations can determine the sample
        size for the functions and backup information based on the level of assurance
        needed.
      translations:
        pt:
          name: "Backup do Sistema | Teste de Restaura\xE7\xE3o por Amostragem"
          description: "Usar uma amostra das informa\xE7\xF5es de backup na restaura\xE7\
            \xE3o de fun\xE7\xF5es selecionadas do sistema como parte do teste do\
            \ plano de conting\xEAncia."
          annotation: "As organiza\xE7\xF5es precisam de garantia de que as fun\xE7\
            \xF5es do sistema possam ser restauradas corretamente e possam dar suporte\
            \ \xE0s miss\xF5es organizacionais estabelecidas. Para assegurar que as\
            \ fun\xE7\xF5es selecionadas do sistema sejam exercitadas exaustivamente\
            \ durante o teste do plano de conting\xEAncia, uma amostra das informa\xE7\
            \xF5es de backup \xE9 recuperada para determinar se as fun\xE7\xF5es est\xE3\
            o operando conforme o esperado. As organiza\xE7\xF5es podem determinar\
            \ o tamanho da amostra para as fun\xE7\xF5es e para as informa\xE7\xF5\
            es de backup com base no n\xEDvel de garantia necess\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(3)
      name: System Backup | Separate Storage for Critical Information
      description: 'Store backup copies of [Assignment: organization-defined critical
        system software and other security-related information] in a separate facility
        or in a fire rated container that is not collocated with the operational system.'
      annotation: Separate storage for critical information applies to all critical
        information regardless of the type of backup storage media. Critical system
        software includes operating systems, middleware, cryptographic key management
        systems, and intrusion detection systems. Security-related information includes
        inventories of system hardware, software, and firmware components. Alternate
        storage sites, including geographically distributed architectures, serve as
        separate storage facilities for organizations. Organizations may provide separate
        storage by implementing automated backup processes at alternative storage
        sites (e.g., data centers). The General Services Administration (GSA) establishes
        standards and specifications for security and fire rated containers.
      translations:
        pt:
          name: "Backup do Sistema | Armazenamento Separado para Informa\xE7\xF5es\
            \ Cr\xEDticas"
          description: "Armazenar c\xF3pias de backup de [Atribui\xE7\xE3o: software\
            \ cr\xEDtico de sistema e outras informa\xE7\xF5es relacionadas \xE0 seguran\xE7\
            a definidos pela organiza\xE7\xE3o] em uma instala\xE7\xE3o separada ou\
            \ em um cont\xEAiner com classifica\xE7\xE3o de resist\xEAncia ao fogo\
            \ que n\xE3o esteja colocalizado com o sistema operacional."
          annotation: "O armazenamento separado para informa\xE7\xF5es cr\xEDticas\
            \ aplica-se a todas as informa\xE7\xF5es cr\xEDticas, independentemente\
            \ do tipo de m\xEDdia de armazenamento de backup. O software cr\xEDtico\
            \ de sistema inclui sistemas operacionais, middleware, sistemas de gerenciamento\
            \ de chaves criptogr\xE1ficas e sistemas de detec\xE7\xE3o de intrus\xE3\
            o. As informa\xE7\xF5es relacionadas \xE0 seguran\xE7a incluem invent\xE1\
            rios de componentes de hardware, software e firmware do sistema. Os sites\
            \ de armazenamento alternativo, incluindo arquiteturas distribu\xEDdas\
            \ geograficamente, servem como instala\xE7\xF5es de armazenamento separadas\
            \ para as organiza\xE7\xF5es. As organiza\xE7\xF5es podem prover armazenamento\
            \ separado implementando processos automatizados de backup em sites de\
            \ armazenamento alternativos (por exemplo, data centers). A General Services\
            \ Administration (GSA) estabelece padr\xF5es e especifica\xE7\xF5es para\
            \ cont\xEAineres com classifica\xE7\xE3o de seguran\xE7a e de resist\xEA\
            ncia ao fogo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-2(4)
      name: Contingency Plan | Resume All Mission and Business Functions
      description: '[Withdrawn: Incorporated into CP-2(3).]'
      translations:
        pt:
          name: "Plano de Conting\xEAncia | Retomar Todas as Fun\xE7\xF5es de Miss\xE3\
            o e de Neg\xF3cio"
          description: '[Retirado: Incorporado em CP-2(3).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(5)
      name: System Backup | Transfer to Alternate Storage Site
      description: 'Transfer system backup information to the alternate storage site
        [Assignment: organization-defined time period and transfer rate consistent
        with the recovery time and recovery point objectives].'
      annotation: System backup information can be transferred to alternate storage
        sites either electronically or by the physical shipment of storage media.
      translations:
        pt:
          name: "Backup do Sistema | Transfer\xEAncia para o Site de Armazenamento\
            \ Alternativo"
          description: "Transferir as informa\xE7\xF5es de backup do sistema para\
            \ o site de armazenamento alternativo [Atribui\xE7\xE3o: per\xEDodo de\
            \ tempo e taxa de transfer\xEAncia definidos pela organiza\xE7\xE3o, consistentes\
            \ com os objetivos de tempo de recupera\xE7\xE3o e de ponto de recupera\xE7\
            \xE3o]."
          annotation: "As informa\xE7\xF5es de backup do sistema podem ser transferidas\
            \ para sites de armazenamento alternativos eletronicamente ou pelo envio\
            \ f\xEDsico de m\xEDdia de armazenamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(6)
      name: System Backup | Redundant Secondary System
      description: Conduct system backup by maintaining a redundant secondary system
        that is not collocated with the primary system and that can be activated without
        loss of information or disruption to operations.
      annotation: The effect of system backup can be achieved by maintaining a redundant
        secondary system that mirrors the primary system, including the replication
        of information. If this type of redundancy is in place and there is sufficient
        geographic separation between the two systems, the secondary system can also
        serve as the alternate processing site.
      translations:
        pt:
          name: "Backup do Sistema | Sistema Secund\xE1rio Redundante"
          description: "Realizar o backup do sistema mantendo um sistema secund\xE1\
            rio redundante que n\xE3o esteja colocalizado com o sistema prim\xE1rio\
            \ e que possa ser ativado sem perda de informa\xE7\xF5es ou interrup\xE7\
            \xE3o das opera\xE7\xF5es."
          annotation: "O efeito do backup do sistema pode ser alcan\xE7ado mantendo-se\
            \ um sistema secund\xE1rio redundante que espelha o sistema prim\xE1rio,\
            \ incluindo a replica\xE7\xE3o das informa\xE7\xF5es. Se esse tipo de\
            \ redund\xE2ncia estiver implementado e houver separa\xE7\xE3o geogr\xE1\
            fica suficiente entre os dois sistemas, o sistema secund\xE1rio tamb\xE9\
            m pode servir como site de processamento alternativo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(7)
      name: System Backup | Dual Authorization for Deletion or Destruction
      description: 'Enforce dual authorization for the deletion or destruction of
        [Assignment: organization-defined backup information].'
      annotation: Dual authorization ensures that deletion or destruction of backup
        information cannot occur unless two qualified individuals carry out the task.
        Individuals deleting or destroying backup information possess the skills or
        expertise to determine if the proposed deletion or destruction of information
        reflects organizational policies and procedures. Dual authorization may also
        be known as two-person control. To reduce the risk of collusion, organizations
        consider rotating dual authorization duties to other individuals.
      translations:
        pt:
          name: "Backup do Sistema | Autoriza\xE7\xE3o Dupla para Exclus\xE3o ou Destrui\xE7\
            \xE3o"
          description: "Impor autoriza\xE7\xE3o dupla para a exclus\xE3o ou destrui\xE7\
            \xE3o de [Atribui\xE7\xE3o: informa\xE7\xF5es de backup definidas pela\
            \ organiza\xE7\xE3o]."
          annotation: "A autoriza\xE7\xE3o dupla garante que a exclus\xE3o ou destrui\xE7\
            \xE3o de informa\xE7\xF5es de backup n\xE3o possa ocorrer a menos que\
            \ dois indiv\xEDduos qualificados executem a tarefa. Os indiv\xEDduos\
            \ que excluem ou destroem informa\xE7\xF5es de backup possuem as habilidades\
            \ ou a expertise para determinar se a exclus\xE3o ou destrui\xE7\xE3o\
            \ proposta das informa\xE7\xF5es reflete as pol\xEDticas e os procedimentos\
            \ organizacionais. A autoriza\xE7\xE3o dupla tamb\xE9m pode ser conhecida\
            \ como controle por duas pessoas. Para reduzir o risco de conluio, as\
            \ organiza\xE7\xF5es consideram fazer rod\xEDzio das tarefas de autoriza\xE7\
            \xE3o dupla entre outros indiv\xEDduos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(8)
      name: System Backup | Cryptographic Protection
      description: 'Implement cryptographic mechanisms to prevent unauthorized disclosure
        and modification of [Assignment: organization-defined backup information].'
      annotation: The selection of cryptographic mechanisms is based on the need to
        protect the confidentiality and integrity of backup information. The strength
        of mechanisms selected is commensurate with the security category or classification
        of the information. Cryptographic protection applies to system backup information
        in storage at both primary and alternate locations. Organizations that implement
        cryptographic mechanisms to protect information at rest also consider cryptographic
        key management solutions.
      translations:
        pt:
          name: "Backup do Sistema | Prote\xE7\xE3o Criptogr\xE1fica"
          description: "Implementar mecanismos criptogr\xE1ficos para impedir a divulga\xE7\
            \xE3o e a modifica\xE7\xE3o n\xE3o autorizadas de [Atribui\xE7\xE3o: informa\xE7\
            \xF5es de backup definidas pela organiza\xE7\xE3o]."
          annotation: "A sele\xE7\xE3o dos mecanismos criptogr\xE1ficos baseia-se\
            \ na necessidade de proteger a confidencialidade e a integridade das informa\xE7\
            \xF5es de backup. A for\xE7a dos mecanismos selecionados \xE9 proporcional\
            \ \xE0 categoria de seguran\xE7a ou \xE0 classifica\xE7\xE3o das informa\xE7\
            \xF5es. A prote\xE7\xE3o criptogr\xE1fica aplica-se \xE0s informa\xE7\xF5\
            es de backup do sistema armazenadas tanto nos locais prim\xE1rios quanto\
            \ nos alternativos. As organiza\xE7\xF5es que implementam mecanismos criptogr\xE1\
            ficos para proteger informa\xE7\xF5es em repouso tamb\xE9m consideram\
            \ solu\xE7\xF5es de gerenciamento de chaves criptogr\xE1ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10
      name: System Recovery and Reconstitution
      description: 'Provide for the recovery and reconstitution of the system to a
        known state within [Assignment: organization-defined time period consistent
        with recovery time and recovery point objectives] after a disruption, compromise,
        or failure.'
      annotation: Recovery is executing contingency plan activities to restore organizational
        mission and business functions. Reconstitution takes place following recovery
        and includes activities for returning systems to fully operational states.
        Recovery and reconstitution operations reflect mission and business priorities;
        recovery point, recovery time, and reconstitution objectives; and organizational
        metrics consistent with contingency plan requirements. Reconstitution includes
        the deactivation of interim system capabilities that may have been needed
        during recovery operations. Reconstitution also includes assessments of fully
        restored system capabilities, reestablishment of continuous monitoring activities,
        system reauthorization (if required), and activities to prepare the system
        and organization for future disruptions, breaches, compromises, or failures.
        Recovery and reconstitution capabilities can include automated mechanisms
        and manual procedures. Organizations establish recovery time and recovery
        point objectives as part of contingency planning.
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema"
          description: "Prover a recupera\xE7\xE3o e a reconstitui\xE7\xE3o do sistema\
            \ para um estado conhecido dentro de [Atribui\xE7\xE3o: per\xEDodo de\
            \ tempo definido pela organiza\xE7\xE3o, consistente com os objetivos\
            \ de tempo de recupera\xE7\xE3o e de ponto de recupera\xE7\xE3o] ap\xF3\
            s uma interrup\xE7\xE3o, comprometimento ou falha."
          annotation: "A recupera\xE7\xE3o \xE9 a execu\xE7\xE3o das atividades do\
            \ plano de conting\xEAncia para restaurar as fun\xE7\xF5es de miss\xE3\
            o e de neg\xF3cio da organiza\xE7\xE3o. A reconstitui\xE7\xE3o ocorre\
            \ ap\xF3s a recupera\xE7\xE3o e inclui atividades para retornar os sistemas\
            \ a estados totalmente operacionais. As opera\xE7\xF5es de recupera\xE7\
            \xE3o e reconstitui\xE7\xE3o refletem as prioridades de miss\xE3o e de\
            \ neg\xF3cio; os objetivos de ponto de recupera\xE7\xE3o, de tempo de\
            \ recupera\xE7\xE3o e de reconstitui\xE7\xE3o; e as m\xE9tricas organizacionais\
            \ consistentes com os requisitos do plano de conting\xEAncia. A reconstitui\xE7\
            \xE3o inclui a desativa\xE7\xE3o de capacidades provis\xF3rias do sistema\
            \ que possam ter sido necess\xE1rias durante as opera\xE7\xF5es de recupera\xE7\
            \xE3o. A reconstitui\xE7\xE3o tamb\xE9m inclui avalia\xE7\xF5es das capacidades\
            \ do sistema totalmente restauradas, o restabelecimento das atividades\
            \ de monitoramento cont\xEDnuo, a reautoriza\xE7\xE3o do sistema (se necess\xE1\
            rio) e atividades para preparar o sistema e a organiza\xE7\xE3o para futuras\
            \ interrup\xE7\xF5es, viola\xE7\xF5es, comprometimentos ou falhas. As\
            \ capacidades de recupera\xE7\xE3o e reconstitui\xE7\xE3o podem incluir\
            \ mecanismos automatizados e procedimentos manuais. As organiza\xE7\xF5\
            es estabelecem os objetivos de tempo de recupera\xE7\xE3o e de ponto de\
            \ recupera\xE7\xE3o como parte do planejamento de conting\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-5
      name: Contingency Plan Update
      description: '[Withdrawn: Incorporated into CP-2.]'
      translations:
        pt:
          name: "Atualiza\xE7\xE3o do Plano de Conting\xEAncia"
          description: '[Retirado: Incorporado em CP-2.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10(2)
      name: System Recovery and Reconstitution | Transaction Recovery
      description: Implement transaction recovery for systems that are transaction-based.
      annotation: Transaction-based systems include database management systems and
        transaction processing systems. Mechanisms supporting transaction recovery
        include transaction rollback and transaction journaling.
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema | Recupera\xE7\
            \xE3o de Transa\xE7\xF5es"
          description: "Implementar a recupera\xE7\xE3o de transa\xE7\xF5es para sistemas\
            \ baseados em transa\xE7\xF5es."
          annotation: "Os sistemas baseados em transa\xE7\xF5es incluem sistemas de\
            \ gerenciamento de banco de dados e sistemas de processamento de transa\xE7\
            \xF5es. Os mecanismos que d\xE3o suporte \xE0 recupera\xE7\xE3o de transa\xE7\
            \xF5es incluem rollback de transa\xE7\xF5es e journaling de transa\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-7(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-7(5)
      name: Alternate Processing Site | Equivalent Information Security Safeguards
      description: 'Withdrawn: Incorporated into CP-7.]'
      translations:
        pt:
          name: "Site de Processamento Alternativo | Salvaguardas de Seguran\xE7a\
            \ da Informa\xE7\xE3o Equivalentes"
          description: 'Retirado: Incorporado em CP-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10(4)
      name: System Recovery and Reconstitution | Restore Within Time Period
      description: 'Provide the capability to restore system components within [Assignment:
        organization-defined restoration time periods] from configuration-controlled
        and integrity-protected information representing a known, operational state
        for the components.'
      annotation: Restoration of system components includes reimaging, which restores
        the components to known, operational states.
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema | Restaura\xE7\
            \xE3o Dentro de um Per\xEDodo de Tempo"
          description: "Prover a capacidade de restaurar componentes do sistema dentro\
            \ de [Atribui\xE7\xE3o: per\xEDodos de tempo de restaura\xE7\xE3o definidos\
            \ pela organiza\xE7\xE3o] a partir de informa\xE7\xF5es controladas por\
            \ configura\xE7\xE3o e protegidas quanto \xE0 integridade que representem\
            \ um estado conhecido e operacional dos componentes."
          annotation: "A restaura\xE7\xE3o de componentes do sistema inclui a reimagem\
            \ (reimaging), que restaura os componentes a estados conhecidos e operacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-9(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-9(4)
      name: System Backup | Protection from Unauthorized Modification
      description: '[Withdrawn: Incorporated into CP-9.]'
      translations:
        pt:
          name: "Backup do Sistema | Prote\xE7\xE3o contra Modifica\xE7\xE3o N\xE3\
            o Autorizada"
          description: '[Retirado: Incorporado em CP-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-10(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-10(6)
      name: System Recovery and Reconstitution | Component Protection
      description: Protect system components used for recovery and reconstitution.
      annotation: Protection of system recovery and reconstitution components (i.e.,
        hardware, firmware, and software) includes physical and technical controls.
        Backup and restoration components used for recovery and reconstitution include
        router tables, compilers, and other system software.
      translations:
        pt:
          name: "Recupera\xE7\xE3o e Reconstitui\xE7\xE3o do Sistema | Prote\xE7\xE3\
            o de Componentes"
          description: "Proteger os componentes do sistema usados para recupera\xE7\
            \xE3o e reconstitui\xE7\xE3o."
          annotation: "A prote\xE7\xE3o dos componentes de recupera\xE7\xE3o e reconstitui\xE7\
            \xE3o do sistema (ou seja, hardware, firmware e software) inclui controles\
            \ f\xEDsicos e t\xE9cnicos. Os componentes de backup e restaura\xE7\xE3\
            o usados para recupera\xE7\xE3o e reconstitui\xE7\xE3o incluem tabelas\
            \ de roteamento, compiladores e outros softwares de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-11
      name: Alternate Communications Protocols
      description: 'Provide the capability to employ [Assignment: organization-defined
        alternative communications protocols] in support of maintaining continuity
        of operations.'
      annotation: Contingency plans and the contingency training or testing associated
        with those plans incorporate an alternate communications protocol capability
        as part of establishing resilience in organizational systems. Switching communications
        protocols may affect software applications and operational aspects of systems.
        Organizations assess the potential side effects of introducing alternate communications
        protocols prior to implementation.
      translations:
        pt:
          name: "Protocolos de Comunica\xE7\xE3o Alternativos"
          description: "Prover a capacidade de empregar [Atribui\xE7\xE3o: protocolos\
            \ de comunica\xE7\xE3o alternativos definidos pela organiza\xE7\xE3o]\
            \ como apoio \xE0 manuten\xE7\xE3o da continuidade das opera\xE7\xF5es."
          annotation: "Os planos de conting\xEAncia e o treinamento ou os testes de\
            \ conting\xEAncia associados a esses planos incorporam uma capacidade\
            \ de protocolo de comunica\xE7\xE3o alternativo como parte do estabelecimento\
            \ de resili\xEAncia nos sistemas organizacionais. A troca de protocolos\
            \ de comunica\xE7\xE3o pode afetar aplica\xE7\xF5es de software e aspectos\
            \ operacionais dos sistemas. As organiza\xE7\xF5es avaliam os potenciais\
            \ efeitos colaterais da introdu\xE7\xE3o de protocolos de comunica\xE7\
            \xE3o alternativos antes da implementa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-12
      name: Safe Mode
      description: 'When [Assignment: organization-defined conditions] are detected,
        enter a safe mode of operation with [Assignment: organization-defined restrictions
        of safe mode of operation].'
      annotation: "For systems that support critical mission and business functions\u2014\
        including military operations, civilian space operations, nuclear power plant\
        \ operations, and air traffic control operations (especially real-time operational\
        \ environments)\u2014organizations can identify certain conditions under which\
        \ those systems revert to a predefined safe mode of operation. The safe mode\
        \ of operation, which can be activated either automatically or manually, restricts\
        \ the operations that systems can execute when those conditions are encountered.\
        \ Restriction includes allowing only selected functions to execute that can\
        \ be carried out under limited power or with reduced communications bandwidth."
      translations:
        pt:
          name: Modo Seguro
          description: "Quando [Atribui\xE7\xE3o: condi\xE7\xF5es definidas pela organiza\xE7\
            \xE3o] forem detectadas, entrar em um modo de opera\xE7\xE3o seguro com\
            \ [Atribui\xE7\xE3o: restri\xE7\xF5es do modo de opera\xE7\xE3o seguro\
            \ definidas pela organiza\xE7\xE3o]."
          annotation: "Para sistemas que d\xE3o suporte a fun\xE7\xF5es cr\xEDticas\
            \ de miss\xE3o e de neg\xF3cio \u2014 incluindo opera\xE7\xF5es militares,\
            \ opera\xE7\xF5es espaciais civis, opera\xE7\xF5es de usinas nucleares\
            \ e opera\xE7\xF5es de controle de tr\xE1fego a\xE9reo (especialmente\
            \ ambientes operacionais em tempo real) \u2014 as organiza\xE7\xF5es podem\
            \ identificar certas condi\xE7\xF5es sob as quais esses sistemas revertem\
            \ para um modo de opera\xE7\xE3o seguro predefinido. O modo de opera\xE7\
            \xE3o seguro, que pode ser ativado automaticamente ou manualmente, restringe\
            \ as opera\xE7\xF5es que os sistemas podem executar quando essas condi\xE7\
            \xF5es s\xE3o encontradas. A restri\xE7\xE3o inclui permitir a execu\xE7\
            \xE3o apenas de fun\xE7\xF5es selecionadas que possam ser realizadas sob\
            \ energia limitada ou com largura de banda de comunica\xE7\xE3o reduzida."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:cp
      ref_id: CP-13
      name: Alternative Security Mechanisms
      description: 'Employ [Assignment: organization-defined alternative or supplemental
        security mechanisms] for satisfying [Assignment: organization-defined security
        functions] when the primary means of implementing the security function is
        unavailable or compromised.'
      annotation: "Use of alternative security mechanisms supports system resiliency,\
        \ contingency planning, and continuity of operations. To ensure mission and\
        \ business continuity, organizations can implement alternative or supplemental\
        \ security mechanisms. The mechanisms may be less effective than the primary\
        \ mechanisms. However, having the capability to readily employ alternative\
        \ or supplemental mechanisms enhances mission and business continuity that\
        \ might otherwise be adversely impacted if operations had to be curtailed\
        \ until the primary means of implementing the functions was restored. Given\
        \ the cost and level of effort required to provide such alternative capabilities,\
        \ the alternative or supplemental mechanisms are only applied to critical\
        \ security capabilities provided by systems, system components, or system\
        \ services. For example, an organization may issue one-time pads to senior\
        \ executives, officials, and system administrators if multi-factor tokens\u2014\
        the standard means for achieving secure authentication\u2014 are compromised."
      translations:
        pt:
          name: "Mecanismos de Seguran\xE7a Alternativos"
          description: "Empregar [Atribui\xE7\xE3o: mecanismos de seguran\xE7a alternativos\
            \ ou suplementares definidos pela organiza\xE7\xE3o] para satisfazer [Atribui\xE7\
            \xE3o: fun\xE7\xF5es de seguran\xE7a definidas pela organiza\xE7\xE3o]\
            \ quando o meio prim\xE1rio de implementa\xE7\xE3o da fun\xE7\xE3o de\
            \ seguran\xE7a estiver indispon\xEDvel ou comprometido."
          annotation: "O uso de mecanismos de seguran\xE7a alternativos d\xE1 suporte\
            \ \xE0 resili\xEAncia do sistema, ao planejamento de conting\xEAncia e\
            \ \xE0 continuidade das opera\xE7\xF5es. Para assegurar a continuidade\
            \ de miss\xE3o e de neg\xF3cio, as organiza\xE7\xF5es podem implementar\
            \ mecanismos de seguran\xE7a alternativos ou suplementares. Os mecanismos\
            \ podem ser menos eficazes do que os mecanismos prim\xE1rios. No entanto,\
            \ ter a capacidade de empregar prontamente mecanismos alternativos ou\
            \ suplementares aprimora a continuidade de miss\xE3o e de neg\xF3cio que,\
            \ de outra forma, poderia ser impactada adversamente caso as opera\xE7\
            \xF5es tivessem de ser interrompidas at\xE9 que o meio prim\xE1rio de\
            \ implementa\xE7\xE3o das fun\xE7\xF5es fosse restaurado. Dado o custo\
            \ e o n\xEDvel de esfor\xE7o necess\xE1rios para prover tais capacidades\
            \ alternativas, os mecanismos alternativos ou suplementares s\xE3o aplicados\
            \ apenas \xE0s capacidades de seguran\xE7a cr\xEDticas providas por sistemas,\
            \ componentes de sistema ou servi\xE7os de sistema. Por exemplo, uma organiza\xE7\
            \xE3o pode emitir blocos de uso \xFAnico (one-time pads) para executivos\
            \ seniores, autoridades e administradores de sistema se os tokens multifator\
            \ \u2014 o meio padr\xE3o para alcan\xE7ar autentica\xE7\xE3o segura \u2014\
            \ estiverem comprometidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      assessable: false
      depth: 1
      ref_id: IA
      name: Identification and Authentication
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] identification and authentication policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the identification and authentication
        policy and the associated identification and authentication controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the identification and authentication
        policy and procedures; and

        c. Review and update the current identification and authentication:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Identification and authentication policy and procedures address
        the controls in the IA family that are implemented within systems and organizations.
        The risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of identification and authentication policy and procedures.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to identification
        and authentication policy and procedures include assessment or audit findings,
        security incidents or breaches, or changes in applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Simply restating
        controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar a [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de identifica\xE7\xE3o e autentica\xE7\xE3o de [Sele\xE7\xE3o (um\
            \ ou mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3\
            o/neg\xF3cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo,\
            \ fun\xE7\xF5es, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\
            \xE3o entre entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com as leis, decretos, diretivas, regulamentos, pol\xEDticas, padr\xF5\
            es e diretrizes aplic\xE1veis; e\n2. Procedimentos para facilitar a implementa\xE7\
            \xE3o da pol\xEDtica de identifica\xE7\xE3o e autentica\xE7\xE3o e dos\
            \ controles de identifica\xE7\xE3o e autentica\xE7\xE3o associados;\n\
            b. Designar um [Atribui\xE7\xE3o: respons\xE1vel definido pela organiza\xE7\
            \xE3o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de identifica\xE7\xE3o e autentica\xE7\
            \xE3o; e\nc. Revisar e atualizar a atual:\n1. Pol\xEDtica de identifica\xE7\
            \xE3o e autentica\xE7\xE3o [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela\
            \ organiza\xE7\xE3o]; e\n2. Procedimentos de identifica\xE7\xE3o e autentica\xE7\
            \xE3o [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3\
            o]."
          annotation: "A pol\xEDtica e os procedimentos de identifica\xE7\xE3o e autentica\xE7\
            \xE3o tratam dos controles da fam\xEDlia IA que s\xE3o implementados dentro\
            \ dos sistemas e das organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o\
            \ de riscos \xE9 um fator importante no estabelecimento de tais pol\xED\
            ticas e procedimentos. Pol\xEDticas e procedimentos contribuem para a\
            \ garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante que\
            \ os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de identifica\xE7\xE3o e autentica\xE7\
            \xE3o. As pol\xEDticas e os procedimentos dos programas de seguran\xE7\
            a e privacidade em n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral,\
            \ e podem dispensar a necessidade de pol\xEDticas e procedimentos espec\xED\
            ficos de miss\xE3o ou de sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Os procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o ou de neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Os procedimentos descrevem como as pol\xEDticas ou\
            \ os controles s\xE3o implementados e podem ser direcionados ao indiv\xED\
            duo ou \xE0 fun\xE7\xE3o que \xE9 o objeto do procedimento. Os procedimentos\
            \ podem ser documentados nos planos de seguran\xE7a e privacidade do sistema\
            \ ou em um ou mais documentos separados. Os eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de identifica\xE7\
            \xE3o e autentica\xE7\xE3o incluem constata\xE7\xF5es de avalia\xE7\xE3\
            o ou de auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7\
            as nas leis, decretos, diretivas, regulamentos, pol\xEDticas, padr\xF5\
            es e diretrizes aplic\xE1veis. A simples reformula\xE7\xE3o dos controles\
            \ n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2
      name: Identification and Authentication (organizational Users)
      description: Uniquely identify and authenticate organizational users and associate
        that unique identification with processes acting on behalf of those users.
      annotation: 'Organizations can satisfy the identification and authentication
        requirements by complying with the requirements in HSPD 12. Organizational
        users include employees or individuals who organizations consider to have
        an equivalent status to employees (e.g., contractors and guest researchers).
        Unique identification and authentication of users applies to all accesses
        other than those that are explicitly identified in AC-14 and that occur through
        the authorized use of group authenticators without individual authentication.
        Since processes execute on behalf of groups and roles, organizations may require
        unique identification of individuals in group accounts or for detailed accountability
        of individual activity.

        Organizations employ passwords, physical authenticators, or biometrics to
        authenticate user identities or, in the case of multi-factor authentication,
        some combination thereof. Access to organizational systems is defined as either
        local access or network access. Local access is any access to organizational
        systems by users or processes acting on behalf of users, where access is obtained
        through direct connections without the use of networks. Network access is
        access to organizational systems by users (or processes acting on behalf of
        users) where access is obtained through network connections (i.e., nonlocal
        accesses). Remote access is a type of network access that involves communication
        through external networks. Internal networks include local area networks and
        wide area networks.

        The use of encrypted virtual private networks for network connections between
        organization-controlled endpoints and non-organization-controlled endpoints
        may be treated as internal networks with respect to protecting the confidentiality
        and integrity of information traversing the network. Identification and authentication
        requirements for non-organizational users are described in IA-8.'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)"
          description: "Identificar e autenticar de forma \xFAnica os usu\xE1rios\
            \ organizacionais e associar essa identifica\xE7\xE3o \xFAnica aos processos\
            \ que atuam em nome desses usu\xE1rios."
          annotation: "As organiza\xE7\xF5es podem satisfazer os requisitos de identifica\xE7\
            \xE3o e autentica\xE7\xE3o cumprindo os requisitos da HSPD 12. Os usu\xE1\
            rios organizacionais incluem empregados ou indiv\xEDduos que as organiza\xE7\
            \xF5es consideram ter status equivalente ao de empregados (por exemplo,\
            \ contratados e pesquisadores convidados). A identifica\xE7\xE3o e autentica\xE7\
            \xE3o \xFAnica de usu\xE1rios aplica-se a todos os acessos, exceto \xE0\
            queles que s\xE3o explicitamente identificados em AC-14 e que ocorrem\
            \ por meio do uso autorizado de autenticadores de grupo sem autentica\xE7\
            \xE3o individual. Como os processos s\xE3o executados em nome de grupos\
            \ e fun\xE7\xF5es, as organiza\xE7\xF5es podem exigir a identifica\xE7\
            \xE3o \xFAnica de indiv\xEDduos em contas de grupo ou para a responsabiliza\xE7\
            \xE3o detalhada da atividade individual.\nAs organiza\xE7\xF5es empregam\
            \ senhas, autenticadores f\xEDsicos ou biometria para autenticar as identidades\
            \ dos usu\xE1rios ou, no caso da autentica\xE7\xE3o multifator, alguma\
            \ combina\xE7\xE3o desses elementos. O acesso aos sistemas organizacionais\
            \ \xE9 definido como acesso local ou acesso de rede. O acesso local \xE9\
            \ qualquer acesso aos sistemas organizacionais por usu\xE1rios ou processos\
            \ que atuam em nome de usu\xE1rios, em que o acesso \xE9 obtido por meio\
            \ de conex\xF5es diretas sem o uso de redes. O acesso de rede \xE9 o acesso\
            \ aos sistemas organizacionais por usu\xE1rios (ou processos que atuam\
            \ em nome de usu\xE1rios) em que o acesso \xE9 obtido por meio de conex\xF5\
            es de rede (ou seja, acessos n\xE3o locais). O acesso remoto \xE9 um tipo\
            \ de acesso de rede que envolve comunica\xE7\xE3o por meio de redes externas.\
            \ As redes internas incluem redes locais (LAN) e redes de longa dist\xE2\
            ncia (WAN).\nO uso de redes privadas virtuais criptografadas para conex\xF5\
            es de rede entre endpoints controlados pela organiza\xE7\xE3o e endpoints\
            \ n\xE3o controlados pela organiza\xE7\xE3o pode ser tratado como rede\
            \ interna no que se refere \xE0 prote\xE7\xE3o da confidencialidade e\
            \ da integridade das informa\xE7\xF5es que trafegam pela rede. Os requisitos\
            \ de identifica\xE7\xE3o e autentica\xE7\xE3o para usu\xE1rios n\xE3o\
            \ organizacionais s\xE3o descritos em IA-8."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia
      ref_id: IA-2(1)
      name: Identification and Authentication (organizational Users) | Multi-factor
        Authentication to Privileged Accounts
      description: Implement multi-factor authentication for access to privileged
        accounts.
      annotation: 'Multi-factor authentication requires the use of two or more different
        factors to achieve authentication. The authentication factors are defined
        as follows: something you know (e.g., a personal identification number [PIN]),
        something you have (e.g., a physical authenticator such as a cryptographic
        private key), or something you are (e.g., a biometric). Multi-factor authentication
        solutions that feature physical authenticators include hardware authenticators
        that provide time-based or challenge-response outputs and smart cards such
        as the U.S. Government Personal Identity Verification (PIV) card or the Department
        of Defense (DoD) Common Access Card (CAC). In addition to authenticating users
        at the system level (i.e., at logon), organizations may employ authentication
        mechanisms at the application level, at their discretion, to provide increased
        security. Regardless of the type of access (i.e., local, network, remote),
        privileged accounts are authenticated using multi-factor options appropriate
        for the level of risk. Organizations can add additional security measures,
        such as additional or more rigorous authentication mechanisms, for specific
        types of access.'
      translations:
        pt:
          name: "Identifica\xE7\xE3o e Autentica\xE7\xE3o (Usu\xE1rios Organizacionais)\
            \ | Autentica\xE7\xE3o Multifator para Contas Privilegiadas"
          description: "Implementar autentica\xE7\xE3o multifator para acesso a contas\
            \ privilegiadas."
          annotation: "A autentica\xE7\xE3o multifator requer o uso de dois ou mais\
            \ fatores diferentes para alcan\xE7ar a autentica\xE7\xE3o. Os fatores\
            \ de autentica\xE7\xE3o s\xE3o definidos da seguinte forma: algo que voc\xEA\
            \ sabe (por exemplo, um n\xFAmero de identifica\xE7\xE3o pessoal [PIN]),\
            \ algo que voc\xEA tem (por exemplo, um autenticador f\xEDsico, como uma\
            \ chave criptogr\xE1fica privada) ou algo que voc\xEA \xE9 (por exemplo,\
            \ uma biometria). As solu\xE7\xF5es de autentica\xE7\xE3o multifator que\
            \ apresentam autenticadores f\xEDsicos incluem autenticadores de hardware\
            \ que fornecem sa\xEDdas baseadas em tempo ou de desafio-resposta e cart\xF5\
            es inteligentes, como o cart\xE3o de Verifica\xE7\xE3o de Identidade Pessoal\
            \ (PIV) do Governo dos EUA ou o Cart\xE3o de Acesso Comum (CAC) do Departamento\
            \ de Defesa (DoD). Al\xE9m de autenticar os usu\xE1rios no n\xEDvel do\
            \ sistema (ou seja, no logon), as organiza\xE7\xF5es podem empregar mecanismos\
            \ de autentica\xE7\xE3o no n\xEDvel da aplica\xE7\xE3o, a seu crit\xE9\
            rio, para fornecer maior seguran\xE7a. Independentemente do tipo de acesso\
            \ (ou seja, local, de rede, remoto), as contas privilegiadas s\xE3o autenticadas\
            \ usando op\xE7\xF5es multifator apropriadas para o n\xEDvel de risco.\
            \ As organiza\xE7\xF5es podem adicionar medidas de seguran\xE7a adicionais,\
            \ como mecanismos de autentica\xE7\xE3o adicionais ou mais rigorosos,\
            \ para tipos espec\xEDficos de acesso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ia-2(2)

      annotation: The type of component determines the type of scanning to be conducted
        (e.g., web application scanning if the component is a web application).
      translations:
        pt:
          name: "Autenticidade de Componentes | Varredura Antifalsifica\xE7\xE3o"
          description: "Realizar varredura em busca de componentes de sistema falsificados\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "O tipo de componente determina o tipo de varredura a ser conduzida\
            \ (por exemplo, varredura de aplica\xE7\xE3o web se o componente for uma\
            \ aplica\xE7\xE3o web)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-12
      name: Component Disposal
      description: 'Dispose of [Assignment: organization-defined data, documentation,
        tools, or system components] using the following techniques and methods: [Assignment:
        organization-defined techniques and methods].'
      annotation: Data, documentation, tools, or system components can be disposed
        of at any time during the system development life cycle (not only in the disposal
        or retirement phase of the life cycle). For example, disposal can occur during
        research and development, design, prototyping, or operations/maintenance and
        include methods such as disk cleaning, removal of cryptographic keys, partial
        reuse of components. Opportunities for compromise during disposal affect physical
        and logical data, including system documentation in paper-based or digital
        files; shipping and delivery documentation; memory sticks with software code;
        or complete routers or servers that include permanent media, which contain
        sensitive or proprietary information. Additionally, proper disposal of system
        components helps to prevent such components from entering the gray market.
      translations:
        pt:
          name: Descarte de Componentes
          description: "Descartar [Atribui\xE7\xE3o: dados, documenta\xE7\xE3o, ferramentas\
            \ ou componentes de sistema definidos pela organiza\xE7\xE3o] usando as\
            \ seguintes t\xE9cnicas e m\xE9todos: [Atribui\xE7\xE3o: t\xE9cnicas e\
            \ m\xE9todos definidos pela organiza\xE7\xE3o]."
          annotation: "Dados, documenta\xE7\xE3o, ferramentas ou componentes de sistema\
            \ podem ser descartados a qualquer momento durante o ciclo de vida de\
            \ desenvolvimento do sistema (n\xE3o apenas na fase de descarte ou aposentadoria\
            \ do ciclo de vida). Por exemplo, o descarte pode ocorrer durante a pesquisa\
            \ e desenvolvimento, projeto, prototipagem ou opera\xE7\xF5es/manuten\xE7\
            \xE3o e incluir m\xE9todos como limpeza de disco, remo\xE7\xE3o de chaves\
            \ criptogr\xE1ficas e reutiliza\xE7\xE3o parcial de componentes. As oportunidades\
            \ de comprometimento durante o descarte afetam dados f\xEDsicos e l\xF3\
            gicos, incluindo documenta\xE7\xE3o de sistema em arquivos em papel ou\
            \ digitais; documenta\xE7\xE3o de envio e entrega; pen drives com c\xF3\
            digo de software; ou roteadores ou servidores completos que incluam m\xED\
            dia permanente, os quais cont\xEAm informa\xE7\xF5es sens\xEDveis ou propriet\xE1\
            rias. Al\xE9m disso, o descarte adequado de componentes de sistema ajuda\
            \ a impedir que tais componentes entrem no mercado paralelo (gray market)."

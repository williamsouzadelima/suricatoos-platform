    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(4)
      name: Malicious Code Protection | Updates Only by Privileged Users
      description: Update malicious code protection mechanisms only when directed
        by a privileged user.
      annotation: Protection mechanisms for malicious code are typically categorized
        as security-related software and, as such, are only updated by organizational
        personnel with appropriate access privileges.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Atualiza\xE7\xF5es Apenas\
            \ por Usu\xE1rios Privilegiados"
          description: "Atualizar os mecanismos de prote\xE7\xE3o contra c\xF3digo\
            \ malicioso somente quando determinado por um usu\xE1rio privilegiado."
          annotation: "Os mecanismos de prote\xE7\xE3o contra c\xF3digo malicioso\
            \ s\xE3o tipicamente categorizados como software relacionado \xE0 seguran\xE7\
            a e, como tal, s\xE3o atualizados apenas por pessoal organizacional com\
            \ privil\xE9gios de acesso apropriados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(3)
      name: Malicious Code Protection | Non-privileged Users
      description: '[Withdrawn: Incorporated into AC-6(10).]'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Usu\xE1rios N\xE3o Privilegiados"
          description: '[Retirado: Incorporado ao AC-6(10).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(6)
      name: Malicious Code Protection | Testing and Verification
      description: '(a) Test malicious code protection mechanisms [Assignment: organization-defined
        frequency] by introducing known benign code into the system; and

        (b) Verify that the detection of the code and the associated incident reporting
        occur.'
      annotation: None.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Teste e Verifica\xE7\xE3\
            o"
          description: "(a) Testar os mecanismos de prote\xE7\xE3o contra c\xF3digo\
            \ malicioso [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] introduzindo c\xF3digo benigno conhecido no sistema; e\n(b) Verificar\
            \ se a detec\xE7\xE3o do c\xF3digo e o respectivo reporte de incidente\
            \ ocorrem."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(5)
      name: Malicious Code Protection | Portable Storage Devices
      description: '[Withdrawn: Incorporated into MP-7.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Dispositivos de Armazenamento\
            \ Port\xE1teis"
          description: '[Retirado: Incorporado ao MP-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(8)
      name: Malicious Code Protection | Detect Unauthorized Commands
      description: '(a) Detect the following unauthorized operating system commands
        through the kernel application programming interface on [Assignment: organization-defined
        system hardware components]: [Assignment: organization-defined unauthorized
        operating system commands]; and

        (b) [Selection (one or more): issue a warning; audit the command execution;
        prevent the execution of the command].'
      annotation: Detecting unauthorized commands can be applied to critical interfaces
        other than kernel-based interfaces, including interfaces with virtual machines
        and privileged applications. Unauthorized operating system commands include
        commands for kernel functions from system processes that are not trusted to
        initiate such commands as well as commands for kernel functions that are suspicious
        even though commands of that type are reasonable for processes to initiate.
        Organizations can define the malicious commands to be detected by a combination
        of command types, command classes, or specific instances of commands. Organizations
        can also define hardware components by component type, component, component
        location in the network, or a combination thereof. Organizations may select
        different actions for different types, classes, or instances of malicious
        commands.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Detectar Comandos N\xE3\
            o Autorizados"
          description: "(a) Detectar os seguintes comandos n\xE3o autorizados do sistema\
            \ operacional por meio da interface de programa\xE7\xE3o de aplica\xE7\
            \xF5es (API) do kernel em [Atribui\xE7\xE3o: componentes de hardware do\
            \ sistema definidos pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: comandos\
            \ n\xE3o autorizados do sistema operacional definidos pela organiza\xE7\
            \xE3o]; e\n(b) [Sele\xE7\xE3o (um ou mais): emitir um aviso; auditar a\
            \ execu\xE7\xE3o do comando; impedir a execu\xE7\xE3o do comando]."
          annotation: "A detec\xE7\xE3o de comandos n\xE3o autorizados pode ser aplicada\
            \ a interfaces cr\xEDticas al\xE9m das interfaces baseadas em kernel,\
            \ incluindo interfaces com m\xE1quinas virtuais e aplica\xE7\xF5es privilegiadas.\
            \ Comandos n\xE3o autorizados do sistema operacional incluem comandos\
            \ para fun\xE7\xF5es do kernel originados de processos do sistema que\
            \ n\xE3o s\xE3o confi\xE1veis para iniciar tais comandos, bem como comandos\
            \ para fun\xE7\xF5es do kernel que s\xE3o suspeitos mesmo que comandos\
            \ desse tipo sejam razo\xE1veis para os processos iniciarem. As organiza\xE7\
            \xF5es podem definir os comandos maliciosos a serem detectados por uma\
            \ combina\xE7\xE3o de tipos de comando, classes de comando ou inst\xE2\
            ncias espec\xEDficas de comandos. As organiza\xE7\xF5es tamb\xE9m podem\
            \ definir componentes de hardware por tipo de componente, componente,\
            \ localiza\xE7\xE3o do componente na rede ou uma combina\xE7\xE3o destes.\
            \ As organiza\xE7\xF5es podem selecionar diferentes a\xE7\xF5es para diferentes\
            \ tipos, classes ou inst\xE2ncias de comandos maliciosos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(7)
      name: Malicious Code Protection | Nonsignature-based Detection
      description: '[Withdrawn: Incorporated into SI-3.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Detec\xE7\xE3o N\xE3\
            o Baseada em Assinatura"
          description: '[Retirado: Incorporado ao SI-3.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(10)
      name: Malicious Code Protection | Malicious Code Analysis
      description: '(a) Employ the following tools and techniques to analyze the characteristics
        and behavior of malicious code: [Assignment: organization-defined tools and
        techniques]; and

        (b) Incorporate the results from malicious code analysis into organizational
        incident response and flaw remediation processes.'
      annotation: The use of malicious code analysis tools provides organizations
        with a more in-depth understanding of adversary tradecraft (i.e., tactics,
        techniques, and procedures) and the functionality and purpose of specific
        instances of malicious code. Understanding the characteristics of malicious
        code facilitates effective organizational responses to current and future
        threats. Organizations can conduct malicious code analyses by employing reverse
        engineering techniques or by monitoring the behavior of executing code.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | An\xE1lise de C\xF3digo\
            \ Malicioso"
          description: "(a) Empregar as seguintes ferramentas e t\xE9cnicas para analisar\
            \ as caracter\xEDsticas e o comportamento do c\xF3digo malicioso: [Atribui\xE7\
            \xE3o: ferramentas e t\xE9cnicas definidas pela organiza\xE7\xE3o]; e\n\
            (b) Incorporar os resultados da an\xE1lise de c\xF3digo malicioso aos\
            \ processos organizacionais de resposta a incidentes e de remedia\xE7\xE3\
            o de falhas."
          annotation: "O uso de ferramentas de an\xE1lise de c\xF3digo malicioso proporciona\
            \ \xE0s organiza\xE7\xF5es uma compreens\xE3o mais aprofundada do modus\
            \ operandi do advers\xE1rio (ou seja, t\xE1ticas, t\xE9cnicas e procedimentos)\
            \ e da funcionalidade e finalidade de inst\xE2ncias espec\xEDficas de\
            \ c\xF3digo malicioso. Compreender as caracter\xEDsticas do c\xF3digo\
            \ malicioso facilita respostas organizacionais eficazes a amea\xE7as atuais\
            \ e futuras. As organiza\xE7\xF5es podem conduzir an\xE1lises de c\xF3\
            digo malicioso empregando t\xE9cnicas de engenharia reversa ou monitorando\
            \ o comportamento do c\xF3digo em execu\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4
      name: System Monitoring
      description: 'a. Monitor the system to detect:

        1. Attacks and indicators of potential attacks in accordance with the following
        monitoring objectives: [Assignment: organization-defined monitoring objectives];
        and

        2. Unauthorized local, network, and remote connections;

        b. Identify unauthorized use of the system through the following techniques
        and methods: [Assignment: organization-defined techniques and methods];

        c. Invoke internal monitoring capabilities or deploy monitoring devices:

        1. Strategically within the system to collect organization-determined essential
        information; and

        2. At ad hoc locations within the system to track specific types of transactions
        of interest to the organization;

        d. Analyze detected events and anomalies;

        e. Adjust the level of system monitoring activity when there is a change in
        risk to organizational operations and assets, individuals, other organizations,
        or the Nation;

        f. Obtain legal opinion regarding system monitoring activities; and

        g. Provide [Assignment: organization-defined system monitoring information]
        to [Assignment: organization-defined personnel or roles] [Selection (one or
        more): as needed; [Assignment: organization-defined frequency]].'
      annotation: 'System monitoring includes external and internal monitoring. External
        monitoring includes the observation of events occurring at external interfaces
        to the system. Internal monitoring includes the observation of events occurring
        within the system. Organizations monitor systems by observing audit activities
        in real time or by observing other system aspects such as access patterns,
        characteristics of access, and other actions. The monitoring objectives guide
        and inform the determination of the events. System monitoring capabilities
        are achieved through a variety of tools and techniques, including intrusion
        detection and prevention systems, malicious code protection software, scanning
        tools, audit record monitoring software, and network monitoring software.

        Depending on the security architecture, the distribution and configuration
        of monitoring devices may impact throughput at key internal and external boundaries
        as well as at other locations across a network due to the introduction of
        network throughput latency. If throughput management is needed, such devices
        are strategically located and deployed as part of an established organization-wide
        security architecture. Strategic locations for monitoring devices include
        selected perimeter locations and near key servers and server farms that support
        critical applications. Monitoring devices are typically employed at the managed
        interfaces associated with controls SC-7 and AC-17. The information collected
        is a function of the organizational monitoring objectives and the capability
        of systems to support such objectives. Specific types of transactions of interest
        include Hypertext Transfer Protocol (HTTP) traffic that bypasses HTTP proxies.
        System monitoring is an integral part of organizational continuous monitoring
        and incident response programs, and output from system monitoring serves as
        input to those programs. System monitoring requirements, including the need
        for specific types of system monitoring, may be referenced in other controls
        (e.g., AC-2g, AC-2(7), AC-2(12)(a), AC-17(1), AU-13, AU-13(1), AU-13(2), CM-3f,
        CM-6d, MA-3a, MA-4a, SC-5(3)(b), SC-7a, SC-7(24)(b), SC-18b, SC-43b). Adjustments
        to levels of system monitoring are based on law enforcement information, intelligence
        information, or other sources of information. The legality of system monitoring
        activities is based on applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines.'
      translations:
        pt:
          name: Monitoramento do Sistema
          description: "a. Monitorar o sistema para detectar:\n1. Ataques e indicadores\
            \ de potenciais ataques em conformidade com os seguintes objetivos de\
            \ monitoramento: [Atribui\xE7\xE3o: objetivos de monitoramento definidos\
            \ pela organiza\xE7\xE3o]; e\n2. Conex\xF5es locais, de rede e remotas\
            \ n\xE3o autorizadas;\nb. Identificar o uso n\xE3o autorizado do sistema\
            \ por meio das seguintes t\xE9cnicas e m\xE9todos: [Atribui\xE7\xE3o:\
            \ t\xE9cnicas e m\xE9todos definidos pela organiza\xE7\xE3o];\nc. Invocar\
            \ capacidades internas de monitoramento ou implantar dispositivos de monitoramento:\n\
            1. Estrategicamente dentro do sistema para coletar informa\xE7\xF5es essenciais\
            \ determinadas pela organiza\xE7\xE3o; e\n2. Em localiza\xE7\xF5es ad\
            \ hoc dentro do sistema para rastrear tipos espec\xEDficos de transa\xE7\
            \xF5es de interesse da organiza\xE7\xE3o;\nd. Analisar eventos e anomalias\
            \ detectados;\ne. Ajustar o n\xEDvel de atividade de monitoramento do\
            \ sistema quando houver mudan\xE7a no risco para as opera\xE7\xF5es e\
            \ os ativos organizacionais, indiv\xEDduos, outras organiza\xE7\xF5es\
            \ ou a Na\xE7\xE3o;\nf. Obter parecer jur\xEDdico sobre as atividades\
            \ de monitoramento do sistema; e\ng. Fornecer [Atribui\xE7\xE3o: informa\xE7\
            \xF5es de monitoramento do sistema definidas pela organiza\xE7\xE3o] a\
            \ [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] [Sele\xE7\xE3o (um ou mais): conforme necess\xE1rio; [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]]."
          annotation: "O monitoramento do sistema inclui monitoramento externo e interno.\
            \ O monitoramento externo inclui a observa\xE7\xE3o de eventos que ocorrem\
            \ nas interfaces externas do sistema. O monitoramento interno inclui a\
            \ observa\xE7\xE3o de eventos que ocorrem dentro do sistema. As organiza\xE7\
            \xF5es monitoram sistemas observando atividades de auditoria em tempo\
            \ real ou observando outros aspectos do sistema, como padr\xF5es de acesso,\
            \ caracter\xEDsticas de acesso e outras a\xE7\xF5es. Os objetivos de monitoramento\
            \ orientam e informam a determina\xE7\xE3o dos eventos. As capacidades\
            \ de monitoramento do sistema s\xE3o alcan\xE7adas por meio de uma variedade\
            \ de ferramentas e t\xE9cnicas, incluindo sistemas de detec\xE7\xE3o e\
            \ preven\xE7\xE3o de intrus\xE3o, software de prote\xE7\xE3o contra c\xF3\
            digo malicioso, ferramentas de varredura, software de monitoramento de\
            \ registros de auditoria e software de monitoramento de rede.\nDependendo\
            \ da arquitetura de seguran\xE7a, a distribui\xE7\xE3o e a configura\xE7\
            \xE3o dos dispositivos de monitoramento podem impactar a vaz\xE3o (throughput)\
            \ em fronteiras internas e externas chave, bem como em outras localiza\xE7\
            \xF5es ao longo de uma rede, devido \xE0 introdu\xE7\xE3o de lat\xEAncia\
            \ na vaz\xE3o da rede. Se a gest\xE3o da vaz\xE3o for necess\xE1ria, tais\
            \ dispositivos s\xE3o localizados e implantados estrategicamente como\
            \ parte de uma arquitetura de seguran\xE7a estabelecida em toda a organiza\xE7\
            \xE3o. Localiza\xE7\xF5es estrat\xE9gicas para dispositivos de monitoramento\
            \ incluem localiza\xE7\xF5es selecionadas no per\xEDmetro e pr\xF3ximas\
            \ a servidores chave e fazendas de servidores que suportam aplica\xE7\xF5\
            es cr\xEDticas. Os dispositivos de monitoramento s\xE3o tipicamente empregados\
            \ nas interfaces gerenciadas associadas aos controles SC-7 e AC-17. As\
            \ informa\xE7\xF5es coletadas s\xE3o uma fun\xE7\xE3o dos objetivos de\
            \ monitoramento da organiza\xE7\xE3o e da capacidade dos sistemas de suportar\
            \ tais objetivos. Tipos espec\xEDficos de transa\xE7\xF5es de interesse\
            \ incluem tr\xE1fego de Hypertext Transfer Protocol (HTTP) que contorna\
            \ proxies HTTP. O monitoramento do sistema \xE9 parte integrante dos programas\
            \ organizacionais de monitoramento cont\xEDnuo e de resposta a incidentes,\
            \ e a sa\xEDda do monitoramento do sistema serve como entrada para esses\
            \ programas. Requisitos de monitoramento do sistema, incluindo a necessidade\
            \ de tipos espec\xEDficos de monitoramento do sistema, podem ser referenciados\
            \ em outros controles (por exemplo, AC-2g, AC-2(7), AC-2(12)(a), AC-17(1),\
            \ AU-13, AU-13(1), AU-13(2), CM-3f, CM-6d, MA-3a, MA-4a, SC-5(3)(b), SC-7a,\
            \ SC-7(24)(b), SC-18b, SC-43b). Os ajustes nos n\xEDveis de monitoramento\
            \ do sistema baseiam-se em informa\xE7\xF5es de aplica\xE7\xE3o da lei,\
            \ informa\xE7\xF5es de intelig\xEAncia ou outras fontes de informa\xE7\
            \xE3o. A legalidade das atividades de monitoramento do sistema baseia-se\
            \ em leis, ordens executivas, diretrizes, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(1)
      name: System Monitoring | System-wide Intrusion Detection System
      description: Connect and configure individual intrusion detection tools into
        a system-wide intrusion detection system.
      annotation: Linking individual intrusion detection tools into a system-wide
        intrusion detection system provides additional coverage and effective detection
        capabilities. The information contained in one intrusion detection tool can
        be shared widely across the organization, making the system-wide detection
        capability more robust and powerful.
      translations:
        pt:
          name: "Monitoramento do Sistema | Sistema de Detec\xE7\xE3o de Intrus\xE3\
            o Abrangente"
          description: "Conectar e configurar ferramentas individuais de detec\xE7\
            \xE3o de intrus\xE3o em um sistema de detec\xE7\xE3o de intrus\xE3o abrangente\
            \ para toda a organiza\xE7\xE3o."
          annotation: "A interliga\xE7\xE3o de ferramentas individuais de detec\xE7\
            \xE3o de intrus\xE3o em um sistema de detec\xE7\xE3o de intrus\xE3o abrangente\
            \ proporciona cobertura adicional e capacidades eficazes de detec\xE7\xE3\
            o. As informa\xE7\xF5es contidas em uma ferramenta de detec\xE7\xE3o de\
            \ intrus\xE3o podem ser amplamente compartilhadas por toda a organiza\xE7\
            \xE3o, tornando a capacidade de detec\xE7\xE3o abrangente mais robusta\
            \ e poderosa."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(2)
      name: System Monitoring | Automated Tools and Mechanisms for Real-time Analysis
      description: Employ automated tools and mechanisms to support near real-time
        analysis of events.
      annotation: Automated tools and mechanisms include host-based, network-based,
        transport-based, or storage-based event monitoring tools and mechanisms or
        security information and event management (SIEM) technologies that provide
        real-time analysis of alerts and notifications generated by organizational
        systems. Automated monitoring techniques can create unintended privacy risks
        because automated controls may connect to external or otherwise unrelated
        systems. The matching of records between these systems may create linkages
        with unintended consequences. Organizations assess and document these risks
        in their privacy impact assessment and make determinations that are in alignment
        with their privacy program plan.
      translations:
        pt:
          name: "Monitoramento do Sistema | Ferramentas e Mecanismos Automatizados\
            \ para An\xE1lise em Tempo Real"
          description: "Empregar ferramentas e mecanismos automatizados para apoiar\
            \ a an\xE1lise quase em tempo real de eventos."
          annotation: "Ferramentas e mecanismos automatizados incluem ferramentas\
            \ e mecanismos de monitoramento de eventos baseados em host, em rede,\
            \ em transporte ou em armazenamento, ou tecnologias de gerenciamento de\
            \ informa\xE7\xF5es e eventos de seguran\xE7a (SIEM) que fornecem an\xE1\
            lise em tempo real de alertas e notifica\xE7\xF5es geradas pelos sistemas\
            \ organizacionais. As t\xE9cnicas de monitoramento automatizado podem\
            \ criar riscos n\xE3o intencionais \xE0 privacidade porque os controles\
            \ automatizados podem se conectar a sistemas externos ou de outra forma\
            \ n\xE3o relacionados. A correspond\xEAncia de registros entre esses sistemas\
            \ pode criar v\xEDnculos com consequ\xEAncias n\xE3o intencionais. As\
            \ organiza\xE7\xF5es avaliam e documentam esses riscos em sua avalia\xE7\
            \xE3o de impacto \xE0 privacidade e tomam decis\xF5es alinhadas com seu\
            \ plano de programa de privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(3)
      name: System Monitoring | Automated Tool and Mechanism Integration
      description: Employ automated tools and mechanisms to integrate intrusion detection
        tools and mechanisms into access control and flow control mechanisms.
      annotation: Using automated tools and mechanisms to integrate intrusion detection
        tools and mechanisms into access and flow control mechanisms facilitates a
        rapid response to attacks by enabling the reconfiguration of mechanisms in
        support of attack isolation and elimination.
      translations:
        pt:
          name: "Monitoramento do Sistema | Integra\xE7\xE3o de Ferramentas e Mecanismos\
            \ Automatizados"
          description: "Empregar ferramentas e mecanismos automatizados para integrar\
            \ ferramentas e mecanismos de detec\xE7\xE3o de intrus\xE3o aos mecanismos\
            \ de controle de acesso e controle de fluxo."
          annotation: "O uso de ferramentas e mecanismos automatizados para integrar\
            \ ferramentas e mecanismos de detec\xE7\xE3o de intrus\xE3o aos mecanismos\
            \ de controle de acesso e de fluxo facilita uma resposta r\xE1pida a ataques,\
            \ permitindo a reconfigura\xE7\xE3o dos mecanismos em apoio ao isolamento\
            \ e \xE0 elimina\xE7\xE3o de ataques."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(4)
      name: System Monitoring | Inbound and Outbound Communications Traffic
      description: '(a) Determine criteria for unusual or unauthorized activities
        or conditions for inbound and outbound communications traffic;

        (b) Monitor inbound and outbound communications traffic [Assignment: organization-defined
        frequency] for [Assignment: organization-defined unusual or unauthorized activities
        or conditions].'
      annotation: Unusual or unauthorized activities or conditions related to system
        inbound and outbound communications traffic includes internal traffic that
        indicates the presence of malicious code or unauthorized use of legitimate
        code or credentials within organizational systems or propagating among system
        components, signaling to external systems, and the unauthorized exporting
        of information. Evidence of malicious code or unauthorized use of legitimate
        code or credentials is used to identify potentially compromised systems or
        system components.
      translations:
        pt:
          name: "Monitoramento do Sistema | Tr\xE1fego de Comunica\xE7\xF5es de Entrada\
            \ e de Sa\xEDda"
          description: "(a) Determinar crit\xE9rios para atividades ou condi\xE7\xF5\
            es incomuns ou n\xE3o autorizadas no tr\xE1fego de comunica\xE7\xF5es\
            \ de entrada e de sa\xEDda;\n(b) Monitorar o tr\xE1fego de comunica\xE7\
            \xF5es de entrada e de sa\xEDda [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o] em busca de [Atribui\xE7\xE3o: atividades ou\
            \ condi\xE7\xF5es incomuns ou n\xE3o autorizadas definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Atividades ou condi\xE7\xF5es incomuns ou n\xE3o autorizadas\
            \ relacionadas ao tr\xE1fego de comunica\xE7\xF5es de entrada e de sa\xED\
            da do sistema incluem tr\xE1fego interno que indica a presen\xE7a de c\xF3\
            digo malicioso ou o uso n\xE3o autorizado de c\xF3digo ou credenciais\
            \ leg\xEDtimas dentro dos sistemas organizacionais ou se propagando entre\
            \ componentes do sistema, sinaliza\xE7\xE3o para sistemas externos e a\
            \ exporta\xE7\xE3o n\xE3o autorizada de informa\xE7\xF5es. A evid\xEA\
            ncia de c\xF3digo malicioso ou uso n\xE3o autorizado de c\xF3digo ou credenciais\
            \ leg\xEDtimas \xE9 utilizada para identificar sistemas ou componentes\
            \ de sistema potencialmente comprometidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(5)
      name: System Monitoring | System-generated Alerts
      description: 'Alert [Assignment: organization-defined personnel or roles] when
        the following system-generated indications of compromise or potential compromise
        occur: [Assignment: organization-defined compromise indicators].'
      annotation: Alerts may be generated from a variety of sources, including audit
        records or inputs from malicious code protection mechanisms, intrusion detection
        or prevention mechanisms, or boundary protection devices such as firewalls,
        gateways, and routers. Alerts can be automated and may be transmitted telephonically,
        by electronic mail messages, or by text messaging. Organizational personnel
        on the alert notification list can include system administrators, mission
        or business owners, system owners, information owners/stewards, senior agency
        information security officers, senior agency officials for privacy, system
        security officers, or privacy officers. In contrast to alerts generated by
        the system, alerts generated by organizations in SI-4(12) focus on information
        sources external to the system, such as suspicious activity reports and reports
        on potential insider threats.
      translations:
        pt:
          name: Monitoramento do Sistema | Alertas Gerados pelo Sistema
          description: "Alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] quando ocorrerem as seguintes indica\xE7\xF5\
            es de comprometimento ou potencial comprometimento geradas pelo sistema:\
            \ [Atribui\xE7\xE3o: indicadores de comprometimento definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Os alertas podem ser gerados a partir de uma variedade de fontes,\
            \ incluindo registros de auditoria ou entradas de mecanismos de prote\xE7\
            \xE3o contra c\xF3digo malicioso, mecanismos de detec\xE7\xE3o ou preven\xE7\
            \xE3o de intrus\xE3o, ou dispositivos de prote\xE7\xE3o de per\xEDmetro,\
            \ como firewalls, gateways e roteadores. Os alertas podem ser automatizados\
            \ e podem ser transmitidos por telefone, por mensagens de correio eletr\xF4\
            nico ou por mensagem de texto. O pessoal organizacional na lista de notifica\xE7\
            \xE3o de alertas pode incluir administradores de sistema, propriet\xE1\
            rios de miss\xE3o ou de neg\xF3cio, propriet\xE1rios de sistema, propriet\xE1\
            rios/custodiantes de informa\xE7\xF5es, oficiais seniores de seguran\xE7\
            a da informa\xE7\xE3o da ag\xEAncia, oficiais seniores de privacidade\
            \ da ag\xEAncia, oficiais de seguran\xE7a de sistema ou oficiais de privacidade.\
            \ Em contraste com os alertas gerados pelo sistema, os alertas gerados\
            \ pelas organiza\xE7\xF5es em SI-4(12) concentram-se em fontes de informa\xE7\
            \xE3o externas ao sistema, como relat\xF3rios de atividades suspeitas\
            \ e relat\xF3rios sobre potenciais amea\xE7as internas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-3(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-3(9)
      name: Malicious Code Protection | Authenticate Remote Commands
      description: '[Withdrawn: Moved to AC-17(10).]'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra C\xF3digo Malicioso | Autenticar Comandos Remotos"
          description: '[Retirado: Movido para AC-17(10).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(7)
      name: System Monitoring | Automated Response to Suspicious Events
      description: '(a) Notify [Assignment: organization-defined incident response
        personnel (identified by name and/or by role)] of detected suspicious events;
        and

        (b) Take the following actions upon detection: [Assignment: organization-defined
        least-disruptive actions to terminate suspicious events].'
      annotation: Least-disruptive actions include initiating requests for human responses.
      translations:
        pt:
          name: Monitoramento do Sistema | Resposta Automatizada a Eventos Suspeitos
          description: "(a) Notificar [Atribui\xE7\xE3o: pessoal de resposta a incidentes\
            \ definido pela organiza\xE7\xE3o (identificado por nome e/ou por fun\xE7\
            \xE3o)] sobre eventos suspeitos detectados; e\n(b) Adotar as seguintes\
            \ a\xE7\xF5es ao detectar: [Atribui\xE7\xE3o: a\xE7\xF5es menos disruptivas\
            \ definidas pela organiza\xE7\xE3o para encerrar eventos suspeitos]."
          annotation: "A\xE7\xF5es menos disruptivas incluem iniciar solicita\xE7\xF5\
            es de respostas humanas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(6)
      name: System Monitoring | Restrict Non-privileged Users
      description: '[Withdrawn: Incorporated into AC-6(10).]'
      translations:
        pt:
          name: "Monitoramento do Sistema | Restringir Usu\xE1rios N\xE3o Privilegiados"
          description: '[Retirado: Incorporado a AC-6(10).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(9)
      name: System Monitoring | Testing of Monitoring Tools and Mechanisms
      description: 'Test intrusion-monitoring tools and mechanisms [Assignment: organization-defined
        frequency].'
      annotation: Testing intrusion-monitoring tools and mechanisms is necessary to
        ensure that the tools and mechanisms are operating correctly and continue
        to satisfy the monitoring objectives of organizations. The frequency and depth
        of testing depends on the types of tools and mechanisms used by organizations
        and the methods of deployment.
      translations:
        pt:
          name: Monitoramento do Sistema | Teste de Ferramentas e Mecanismos de Monitoramento
          description: "Testar ferramentas e mecanismos de monitoramento de intrus\xE3\
            o [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "O teste de ferramentas e mecanismos de monitoramento de intrus\xE3\
            o \xE9 necess\xE1rio para garantir que as ferramentas e os mecanismos\
            \ estejam operando corretamente e continuem a satisfazer os objetivos\
            \ de monitoramento das organiza\xE7\xF5es. A frequ\xEAncia e a profundidade\
            \ do teste dependem dos tipos de ferramentas e mecanismos utilizados pelas\
            \ organiza\xE7\xF5es e dos m\xE9todos de implanta\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(10)
      name: System Monitoring | Visibility of Encrypted Communications
      description: 'Make provisions so that [Assignment: organization-defined encrypted
        communications traffic] is visible to [Assignment: organization-defined system
        monitoring tools and mechanisms].'
      annotation: Organizations balance the need to encrypt communications traffic
        to protect data confidentiality with the need to maintain visibility into
        such traffic from a monitoring perspective. Organizations determine whether
        the visibility requirement applies to internal encrypted traffic, encrypted
        traffic intended for external destinations, or a subset of the traffic types.
      translations:
        pt:
          name: "Monitoramento do Sistema | Visibilidade de Comunica\xE7\xF5es Criptografadas"
          description: "Adotar provid\xEAncias para que [Atribui\xE7\xE3o: tr\xE1\
            fego de comunica\xE7\xF5es criptografadas definido pela organiza\xE7\xE3\
            o] seja vis\xEDvel para [Atribui\xE7\xE3o: ferramentas e mecanismos de\
            \ monitoramento do sistema definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es equilibram a necessidade de criptografar\
            \ o tr\xE1fego de comunica\xE7\xF5es para proteger a confidencialidade\
            \ dos dados com a necessidade de manter a visibilidade desse tr\xE1fego\
            \ sob a perspectiva de monitoramento. As organiza\xE7\xF5es determinam\
            \ se o requisito de visibilidade se aplica ao tr\xE1fego criptografado\
            \ interno, ao tr\xE1fego criptografado destinado a destinos externos ou\
            \ a um subconjunto dos tipos de tr\xE1fego."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(11)
      name: System Monitoring | Analyze Communications Traffic Anomalies
      description: 'Analyze outbound communications traffic at the external interfaces
        to the system and selected [Assignment: organization-defined interior points
        within the system] to discover anomalies.'
      annotation: Organization-defined interior points include subnetworks and subsystems.
        Anomalies within organizational systems include large file transfers, long-time
        persistent connections, attempts to access information from unexpected locations,
        the use of unusual protocols and ports, the use of unmonitored network protocols
        (e.g., IPv6 usage during IPv4 transition), and attempted communications with
        suspected malicious external addresses.
      translations:
        pt:
          name: "Monitoramento do Sistema | Analisar Anomalias no Tr\xE1fego de Comunica\xE7\
            \xF5es"
          description: "Analisar o tr\xE1fego de comunica\xE7\xF5es de sa\xEDda nas\
            \ interfaces externas do sistema e em pontos selecionados [Atribui\xE7\
            \xE3o: pontos internos definidos pela organiza\xE7\xE3o dentro do sistema]\
            \ para descobrir anomalias."
          annotation: "Pontos internos definidos pela organiza\xE7\xE3o incluem sub-redes\
            \ e subsistemas. Anomalias dentro dos sistemas organizacionais incluem\
            \ grandes transfer\xEAncias de arquivos, conex\xF5es persistentes de longa\
            \ dura\xE7\xE3o, tentativas de acessar informa\xE7\xF5es a partir de locais\
            \ inesperados, o uso de protocolos e portas incomuns, o uso de protocolos\
            \ de rede n\xE3o monitorados (por exemplo, uso de IPv6 durante a transi\xE7\
            \xE3o do IPv4) e tentativas de comunica\xE7\xE3o com endere\xE7os externos\
            \ suspeitos de serem maliciosos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(12)
      name: System Monitoring | Automated Organization-generated Alerts
      description: 'Alert [Assignment: organization-defined personnel or roles] using
        [Assignment: organization-defined automated mechanisms] when the following
        indications of inappropriate or unusual activities with security or privacy
        implications occur: [Assignment: organization-defined activities that trigger
        alerts].'
      annotation: Organizational personnel on the system alert notification list include
        system administrators, mission or business owners, system owners, senior agency
        information security officer, senior agency official for privacy, system security
        officers, or privacy officers. Automated organization-generated alerts are
        the security alerts generated by organizations and transmitted using automated
        means. The sources for organization-generated alerts are focused on other
        entities such as suspicious activity reports and reports on potential insider
        threats. In contrast to alerts generated by the organization, alerts generated
        by the system in SI-4(5) focus on information sources that are internal to
        the systems, such as audit records.
      translations:
        pt:
          name: "Monitoramento do Sistema | Alertas Automatizados Gerados pela Organiza\xE7\
            \xE3o"
          description: "Alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] utilizando [Atribui\xE7\xE3o: mecanismos automatizados\
            \ definidos pela organiza\xE7\xE3o] quando ocorrerem as seguintes indica\xE7\
            \xF5es de atividades inadequadas ou incomuns com implica\xE7\xF5es de\
            \ seguran\xE7a ou privacidade: [Atribui\xE7\xE3o: atividades definidas\
            \ pela organiza\xE7\xE3o que acionam alertas]."
          annotation: "O pessoal organizacional na lista de notifica\xE7\xE3o de alertas\
            \ do sistema inclui administradores de sistema, propriet\xE1rios de miss\xE3\
            o ou de neg\xF3cio, propriet\xE1rios de sistema, oficial s\xEAnior de\
            \ seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, oficial s\xEAnior de\
            \ privacidade da ag\xEAncia, oficiais de seguran\xE7a de sistema ou oficiais\
            \ de privacidade. Os alertas automatizados gerados pela organiza\xE7\xE3\
            o s\xE3o os alertas de seguran\xE7a gerados pelas organiza\xE7\xF5es e\
            \ transmitidos por meios automatizados. As fontes para alertas gerados\
            \ pela organiza\xE7\xE3o concentram-se em outras entidades, como relat\xF3\
            rios de atividades suspeitas e relat\xF3rios sobre potenciais amea\xE7\
            as internas. Em contraste com os alertas gerados pela organiza\xE7\xE3\
            o, os alertas gerados pelo sistema em SI-4(5) concentram-se em fontes\
            \ de informa\xE7\xE3o que s\xE3o internas aos sistemas, como registros\
            \ de auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(13)
      name: System Monitoring | Analyze Traffic and Event Patterns
      description: '(a) Analyze communications traffic and event patterns for the
        system;

        (b) Develop profiles representing common traffic and event patterns; and

        (c) Use the traffic and event profiles in tuning system-monitoring devices.'
      annotation: Identifying and understanding common communications traffic and
        event patterns help organizations provide useful information to system monitoring
        devices to more effectively identify suspicious or anomalous traffic and events
        when they occur. Such information can help reduce the number of false positives
        and false negatives during system monitoring.
      translations:
        pt:
          name: "Monitoramento do Sistema | Analisar Padr\xF5es de Tr\xE1fego e de\
            \ Eventos"
          description: "(a) Analisar o tr\xE1fego de comunica\xE7\xF5es e os padr\xF5\
            es de eventos do sistema;\n(b) Desenvolver perfis que representem padr\xF5\
            es comuns de tr\xE1fego e de eventos; e\n(c) Utilizar os perfis de tr\xE1\
            fego e de eventos no ajuste fino dos dispositivos de monitoramento do\
            \ sistema."
          annotation: "Identificar e compreender padr\xF5es comuns de tr\xE1fego de\
            \ comunica\xE7\xF5es e de eventos ajuda as organiza\xE7\xF5es a fornecer\
            \ informa\xE7\xF5es \xFAteis aos dispositivos de monitoramento do sistema\
            \ para identificar de forma mais eficaz tr\xE1fego e eventos suspeitos\
            \ ou an\xF4malos quando ocorrem. Tais informa\xE7\xF5es podem ajudar a\
            \ reduzir o n\xFAmero de falsos positivos e falsos negativos durante o\
            \ monitoramento do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(14)
      name: System Monitoring | Wireless Intrusion Detection
      description: Employ a wireless intrusion detection system to identify rogue
        wireless devices and to detect attack attempts and potential compromises or
        breaches to the system.
      annotation: Wireless signals may radiate beyond organizational facilities. Organizations
        proactively search for unauthorized wireless connections, including the conduct
        of thorough scans for unauthorized wireless access points. Wireless scans
        are not limited to those areas within facilities containing systems but also
        include areas outside of facilities to verify that unauthorized wireless access
        points are not connected to organizational systems.
      translations:
        pt:
          name: "Monitoramento do Sistema | Detec\xE7\xE3o de Intrus\xE3o Sem Fio"
          description: "Empregar um sistema de detec\xE7\xE3o de intrus\xE3o sem fio\
            \ para identificar dispositivos sem fio n\xE3o autorizados e para detectar\
            \ tentativas de ataque e potenciais comprometimentos ou viola\xE7\xF5\
            es ao sistema."
          annotation: "Os sinais sem fio podem irradiar al\xE9m das instala\xE7\xF5\
            es organizacionais. As organiza\xE7\xF5es buscam proativamente conex\xF5\
            es sem fio n\xE3o autorizadas, incluindo a realiza\xE7\xE3o de varreduras\
            \ minuciosas em busca de pontos de acesso sem fio n\xE3o autorizados.\
            \ As varreduras sem fio n\xE3o se limitam \xE0s \xE1reas dentro das instala\xE7\
            \xF5es que cont\xEAm sistemas, mas tamb\xE9m incluem \xE1reas fora das\
            \ instala\xE7\xF5es para verificar que pontos de acesso sem fio n\xE3\
            o autorizados n\xE3o estejam conectados aos sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(15)
      name: System Monitoring | Wireless to Wireline Communications
      description: Employ an intrusion detection system to monitor wireless communications
        traffic as the traffic passes from wireless to wireline networks.
      annotation: Wireless networks are inherently less secure than wired networks.
        For example, wireless networks are more susceptible to eavesdroppers or traffic
        analysis than wireline networks. When wireless to wireline communications
        exist, the wireless network could become a port of entry into the wired network.
        Given the greater facility of unauthorized network access via wireless access
        points compared to unauthorized wired network access from within the physical
        boundaries of the system, additional monitoring of transitioning traffic between
        wireless and wired networks may be necessary to detect malicious activities.
        Employing intrusion detection systems to monitor wireless communications traffic
        helps to ensure that the traffic does not contain malicious code prior to
        transitioning to the wireline network.
      translations:
        pt:
          name: "Monitoramento do Sistema | Comunica\xE7\xF5es Sem Fio para Cabeadas"
          description: "Empregar um sistema de detec\xE7\xE3o de intrus\xE3o para\
            \ monitorar o tr\xE1fego de comunica\xE7\xF5es sem fio \xE0 medida que\
            \ o tr\xE1fego passa de redes sem fio para redes cabeadas."
          annotation: "As redes sem fio s\xE3o inerentemente menos seguras do que\
            \ as redes cabeadas. Por exemplo, as redes sem fio s\xE3o mais suscet\xED\
            veis a interceptadores ou \xE0 an\xE1lise de tr\xE1fego do que as redes\
            \ cabeadas. Quando existem comunica\xE7\xF5es sem fio para cabeadas, a\
            \ rede sem fio pode se tornar uma porta de entrada para a rede cabeada.\
            \ Dada a maior facilidade de acesso n\xE3o autorizado \xE0 rede por meio\
            \ de pontos de acesso sem fio em compara\xE7\xE3o ao acesso n\xE3o autorizado\
            \ \xE0 rede cabeada a partir de dentro dos limites f\xEDsicos do sistema,\
            \ pode ser necess\xE1rio monitoramento adicional do tr\xE1fego em transi\xE7\
            \xE3o entre redes sem fio e cabeadas para detectar atividades maliciosas.\
            \ Empregar sistemas de detec\xE7\xE3o de intrus\xE3o para monitorar o\
            \ tr\xE1fego de comunica\xE7\xF5es sem fio ajuda a garantir que o tr\xE1\
            fego n\xE3o contenha c\xF3digo malicioso antes de fazer a transi\xE7\xE3\
            o para a rede cabeada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(16)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(16)
      name: System Monitoring | Correlate Monitoring Information
      description: Correlate information from monitoring tools and mechanisms employed
        throughout the system.
      annotation: "Correlating information from different system monitoring tools\
        \ and mechanisms can provide a more comprehensive view of system activity.\
        \ Correlating system monitoring tools and mechanisms that typically work in\
        \ isolation\u2014including malicious code protection software, host monitoring,\
        \ and network monitoring\u2014can provide an organization-wide monitoring\
        \ view and may reveal otherwise unseen attack patterns. Understanding the\
        \ capabilities and limitations of diverse monitoring tools and mechanisms\
        \ and how to maximize the use of information generated by those tools and\
        \ mechanisms can help organizations develop, operate, and maintain effective\
        \ monitoring programs. The correlation of monitoring information is especially\
        \ important during the transition from older to newer technologies (e.g.,\
        \ transitioning from IPv4 to IPv6 network protocols)."
      translations:
        pt:
          name: "Monitoramento do Sistema | Correlacionar Informa\xE7\xF5es de Monitoramento"
          description: "Correlacionar informa\xE7\xF5es de ferramentas e mecanismos\
            \ de monitoramento empregados em todo o sistema."
          annotation: "Correlacionar informa\xE7\xF5es de diferentes ferramentas e\
            \ mecanismos de monitoramento do sistema pode fornecer uma vis\xE3o mais\
            \ abrangente da atividade do sistema. Correlacionar ferramentas e mecanismos\
            \ de monitoramento do sistema que normalmente operam de forma isolada\
            \ \u2014 incluindo software de prote\xE7\xE3o contra c\xF3digo malicioso,\
            \ monitoramento de host e monitoramento de rede \u2014 pode fornecer uma\
            \ vis\xE3o de monitoramento para toda a organiza\xE7\xE3o e pode revelar\
            \ padr\xF5es de ataque que de outra forma passariam despercebidos. Compreender\
            \ as capacidades e limita\xE7\xF5es de diversas ferramentas e mecanismos\
            \ de monitoramento e como maximizar o uso das informa\xE7\xF5es geradas\
            \ por essas ferramentas e mecanismos pode ajudar as organiza\xE7\xF5es\
            \ a desenvolver, operar e manter programas de monitoramento eficazes.\
            \ A correla\xE7\xE3o de informa\xE7\xF5es de monitoramento \xE9 especialmente\
            \ importante durante a transi\xE7\xE3o de tecnologias mais antigas para\
            \ mais novas (por exemplo, na transi\xE7\xE3o de protocolos de rede IPv4\
            \ para IPv6)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(17)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(17)
      name: System Monitoring | Integrated Situational Awareness
      description: Correlate information from monitoring physical, cyber, and supply
        chain activities to achieve integrated, organization-wide situational awareness.
      annotation: Correlating monitoring information from a more diverse set of information
        sources helps to achieve integrated situational awareness. Integrated situational
        awareness from a combination of physical, cyber, and supply chain monitoring
        activities enhances the capability of organizations to more quickly detect
        sophisticated attacks and investigate the methods and techniques employed
        to carry out such attacks. In contrast to SI-4(16), which correlates the various
        cyber monitoring information, integrated situational awareness is intended
        to correlate monitoring beyond the cyber domain. Correlation of monitoring
        information from multiple activities may help reveal attacks on organizations
        that are operating across multiple attack vectors.
      translations:
        pt:
          name: "Monitoramento do Sistema | Consci\xEAncia Situacional Integrada"
          description: "Correlacionar informa\xE7\xF5es do monitoramento de atividades\
            \ f\xEDsicas, cibern\xE9ticas e da cadeia de suprimentos para alcan\xE7\
            ar uma consci\xEAncia situacional integrada em toda a organiza\xE7\xE3\
            o."
          annotation: "Correlacionar informa\xE7\xF5es de monitoramento de um conjunto\
            \ mais diversificado de fontes de informa\xE7\xE3o ajuda a alcan\xE7ar\
            \ a consci\xEAncia situacional integrada. A consci\xEAncia situacional\
            \ integrada a partir de uma combina\xE7\xE3o de atividades de monitoramento\
            \ f\xEDsico, cibern\xE9tico e da cadeia de suprimentos aprimora a capacidade\
            \ das organiza\xE7\xF5es de detectar mais rapidamente ataques sofisticados\
            \ e investigar os m\xE9todos e t\xE9cnicas empregados para executar tais\
            \ ataques. Em contraste com SI-4(16), que correlaciona as diversas informa\xE7\
            \xF5es de monitoramento cibern\xE9tico, a consci\xEAncia situacional integrada\
            \ destina-se a correlacionar o monitoramento para al\xE9m do dom\xEDnio\
            \ cibern\xE9tico. A correla\xE7\xE3o de informa\xE7\xF5es de monitoramento\
            \ de m\xFAltiplas atividades pode ajudar a revelar ataques \xE0s organiza\xE7\
            \xF5es que est\xE3o operando em m\xFAltiplos vetores de ataque."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(18)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(18)
      name: System Monitoring | Analyze Traffic and Covert Exfiltration
      description: 'Analyze outbound communications traffic at external interfaces
        to the system and at the following interior points to detect covert exfiltration
        of information: [Assignment: organization-defined interior points within the
        system].'
      annotation: Organization-defined interior points include subnetworks and subsystems.
        Covert means that can be used to exfiltrate information include steganography.
      translations:
        pt:
          name: "Monitoramento do Sistema | Analisar Tr\xE1fego e Exfiltra\xE7\xE3\
            o Encoberta"
          description: "Analisar o tr\xE1fego de comunica\xE7\xF5es de sa\xEDda nas\
            \ interfaces externas do sistema e nos seguintes pontos internos para\
            \ detectar a exfiltra\xE7\xE3o encoberta de informa\xE7\xF5es: [Atribui\xE7\
            \xE3o: pontos internos definidos pela organiza\xE7\xE3o dentro do sistema]."
          annotation: "Pontos internos definidos pela organiza\xE7\xE3o incluem sub-redes\
            \ e subsistemas. Meios encobertos que podem ser utilizados para exfiltrar\
            \ informa\xE7\xF5es incluem a esteganografia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(19)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(19)
      name: System Monitoring | Risk for Individuals
      description: 'Implement [Assignment: organization-defined additional monitoring]
        of individuals who have been identified by [Assignment: organization-defined
        sources] as posing an increased level of risk.'
      annotation: Indications of increased risk from individuals can be obtained from
        different sources, including personnel records, intelligence agencies, law
        enforcement organizations, and other sources. The monitoring of individuals
        is coordinated with the management, legal, security, privacy, and human resource
        officials who conduct such monitoring. Monitoring is conducted in accordance
        with applicable laws, executive orders, directives, regulations, policies,
        standards, and guidelines.
      translations:
        pt:
          name: "Monitoramento do Sistema | Risco para Indiv\xEDduos"
          description: "Implementar [Atribui\xE7\xE3o: monitoramento adicional definido\
            \ pela organiza\xE7\xE3o] de indiv\xEDduos que tenham sido identificados\
            \ por [Atribui\xE7\xE3o: fontes definidas pela organiza\xE7\xE3o] como\
            \ representando um n\xEDvel elevado de risco."
          annotation: "Indica\xE7\xF5es de risco elevado proveniente de indiv\xED\
            duos podem ser obtidas de diferentes fontes, incluindo registros de pessoal,\
            \ ag\xEAncias de intelig\xEAncia, organiza\xE7\xF5es de aplica\xE7\xE3\
            o da lei e outras fontes. O monitoramento de indiv\xEDduos \xE9 coordenado\
            \ com os respons\xE1veis pela gest\xE3o, jur\xEDdico, seguran\xE7a, privacidade\
            \ e recursos humanos que conduzem tal monitoramento. O monitoramento \xE9\
            \ conduzido em conformidade com as leis, ordens executivas, diretivas,\
            \ regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(20)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(20)
      name: System Monitoring | Privileged Users
      description: 'Implement the following additional monitoring of privileged users:
        [Assignment: organization-defined additional monitoring].'
      annotation: Privileged users have access to more sensitive information, including
        security-related information, than the general user population. Access to
        such information means that privileged users can potentially do greater damage
        to systems and organizations than non-privileged users. Therefore, implementing
        additional monitoring on privileged users helps to ensure that organizations
        can identify malicious activity at the earliest possible time and take appropriate
        actions.
      translations:
        pt:
          name: "Monitoramento do Sistema | Usu\xE1rios Privilegiados"
          description: "Implementar o seguinte monitoramento adicional de usu\xE1\
            rios privilegiados: [Atribui\xE7\xE3o: monitoramento adicional definido\
            \ pela organiza\xE7\xE3o]."
          annotation: "Os usu\xE1rios privilegiados t\xEAm acesso a informa\xE7\xF5\
            es mais sens\xEDveis, incluindo informa\xE7\xF5es relacionadas \xE0 seguran\xE7\
            a, do que a popula\xE7\xE3o geral de usu\xE1rios. O acesso a tais informa\xE7\
            \xF5es significa que os usu\xE1rios privilegiados podem potencialmente\
            \ causar danos maiores aos sistemas e \xE0s organiza\xE7\xF5es do que\
            \ os usu\xE1rios n\xE3o privilegiados. Portanto, implementar monitoramento\
            \ adicional dos usu\xE1rios privilegiados ajuda a garantir que as organiza\xE7\
            \xF5es possam identificar atividades maliciosas o mais cedo poss\xEDvel\
            \ e adotar as a\xE7\xF5es apropriadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(21)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(21)
      name: System Monitoring | Probationary Periods
      description: 'Implement the following additional monitoring of individuals during
        [Assignment: organization-defined probationary period]: [Assignment: organization-defined
        additional monitoring].'
      annotation: During probationary periods, employees do not have permanent employment
        status within organizations. Without such status or access to information
        that is resident on the system, additional monitoring can help identify any
        potentially malicious activity or inappropriate behavior.
      translations:
        pt:
          name: "Monitoramento do Sistema | Per\xEDodos Probat\xF3rios"
          description: "Implementar o seguinte monitoramento adicional de indiv\xED\
            duos durante [Atribui\xE7\xE3o: per\xEDodo probat\xF3rio definido pela\
            \ organiza\xE7\xE3o]: [Atribui\xE7\xE3o: monitoramento adicional definido\
            \ pela organiza\xE7\xE3o]."
          annotation: "Durante os per\xEDodos probat\xF3rios, os funcion\xE1rios n\xE3\
            o t\xEAm situa\xE7\xE3o de emprego permanente dentro das organiza\xE7\xF5\
            es. Sem tal situa\xE7\xE3o ou acesso a informa\xE7\xF5es residentes no\
            \ sistema, o monitoramento adicional pode ajudar a identificar qualquer\
            \ atividade potencialmente maliciosa ou comportamento inadequado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(22)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(22)
      name: System Monitoring | Unauthorized Network Services
      description: '(a) Detect network services that have not been authorized or approved
        by [Assignment: organization-defined authorization or approval processes];
        and

        (b) [Selection (one or more): Audit; Alert [Assignment: organization-defined
        personnel or roles]] when detected.'
      annotation: Unauthorized or unapproved network services include services in
        service-oriented architectures that lack organizational verification or validation
        and may therefore be unreliable or serve as malicious rogues for valid services.
      translations:
        pt:
          name: "Monitoramento do Sistema | Servi\xE7os de Rede N\xE3o Autorizados"
          description: "(a) Detectar servi\xE7os de rede que n\xE3o tenham sido autorizados\
            \ ou aprovados por [Atribui\xE7\xE3o: processos de autoriza\xE7\xE3o ou\
            \ aprova\xE7\xE3o definidos pela organiza\xE7\xE3o]; e\n(b) [Sele\xE7\xE3\
            o (um ou mais): Auditar; Alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidos pela organiza\xE7\xE3o]] quando detectados."
          annotation: "Servi\xE7os de rede n\xE3o autorizados ou n\xE3o aprovados\
            \ incluem servi\xE7os em arquiteturas orientadas a servi\xE7os que carecem\
            \ de verifica\xE7\xE3o ou valida\xE7\xE3o organizacional e podem, portanto,\
            \ ser n\xE3o confi\xE1veis ou servir como impostores maliciosos de servi\xE7\
            os v\xE1lidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(23)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(23)
      name: System Monitoring | Host-based Devices
      description: 'Implement the following host-based monitoring mechanisms at [Assignment:
        organization-defined system components]: [Assignment: organization-defined
        host-based monitoring mechanisms].'
      annotation: Host-based monitoring collects information about the host (or system
        in which it resides). System components in which host-based monitoring can
        be implemented include servers, notebook computers, and mobile devices. Organizations
        may consider employing host-based monitoring mechanisms from multiple product
        developers or vendors.
      translations:
        pt:
          name: Monitoramento do Sistema | Dispositivos Baseados em Host
          description: "Implementar os seguintes mecanismos de monitoramento baseados\
            \ em host em [Atribui\xE7\xE3o: componentes do sistema definidos pela\
            \ organiza\xE7\xE3o]: [Atribui\xE7\xE3o: mecanismos de monitoramento baseados\
            \ em host definidos pela organiza\xE7\xE3o]."
          annotation: "O monitoramento baseado em host coleta informa\xE7\xF5es sobre\
            \ o host (ou o sistema no qual reside). Os componentes do sistema nos\
            \ quais o monitoramento baseado em host pode ser implementado incluem\
            \ servidores, notebooks e dispositivos m\xF3veis. As organiza\xE7\xF5\
            es podem considerar o emprego de mecanismos de monitoramento baseados\
            \ em host de m\xFAltiplos desenvolvedores ou fornecedores de produtos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(24)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(24)
      name: System Monitoring | Indicators of Compromise
      description: 'Discover, collect, and distribute to [Assignment: organization-defined
        personnel or roles], indicators of compromise provided by [Assignment: organization-defined
        sources].'
      annotation: Indicators of compromise (IOC) are forensic artifacts from intrusions
        that are identified on organizational systems at the host or network level.
        IOCs provide valuable information on systems that have been compromised. IOCs
        can include the creation of registry key values. IOCs for network traffic
        include Universal Resource Locator or protocol elements that indicate malicious
        code command and control servers. The rapid distribution and adoption of IOCs
        can improve information security by reducing the time that systems and organizations
        are vulnerable to the same exploit or attack. Threat indicators, signatures,
        tactics, techniques, procedures, and other indicators of compromise may be
        available via government and non-government cooperatives, including the Forum
        of Incident Response and Security Teams, the United States Computer Emergency
        Readiness Team, the Defense Industrial Base Cybersecurity Information Sharing
        Program, and the CERT Coordination Center.
      translations:
        pt:
          name: Monitoramento do Sistema | Indicadores de Comprometimento
          description: "Descobrir, coletar e distribuir a [Atribui\xE7\xE3o: pessoal\
            \ ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o] indicadores de comprometimento\
            \ fornecidos por [Atribui\xE7\xE3o: fontes definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Indicadores de comprometimento (IOC) s\xE3o artefatos forenses\
            \ de intrus\xF5es que s\xE3o identificados nos sistemas organizacionais\
            \ no n\xEDvel de host ou de rede. Os IOCs fornecem informa\xE7\xF5es valiosas\
            \ sobre sistemas que foram comprometidos. Os IOCs podem incluir a cria\xE7\
            \xE3o de valores de chaves de registro. Os IOCs para tr\xE1fego de rede\
            \ incluem elementos de Localizador Uniforme de Recursos (URL) ou de protocolo\
            \ que indicam servidores de comando e controle de c\xF3digo malicioso.\
            \ A distribui\xE7\xE3o e ado\xE7\xE3o r\xE1pidas de IOCs podem melhorar\
            \ a seguran\xE7a da informa\xE7\xE3o ao reduzir o tempo durante o qual\
            \ os sistemas e as organiza\xE7\xF5es ficam vulner\xE1veis ao mesmo exploit\
            \ ou ataque. Indicadores de amea\xE7a, assinaturas, t\xE1ticas, t\xE9\
            cnicas, procedimentos e outros indicadores de comprometimento podem estar\
            \ dispon\xEDveis por meio de cooperativas governamentais e n\xE3o governamentais,\
            \ incluindo o Forum of Incident Response and Security Teams, a United\
            \ States Computer Emergency Readiness Team, o Defense Industrial Base\
            \ Cybersecurity Information Sharing Program e o CERT Coordination Center."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(25)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(25)
      name: System Monitoring | Optimize Network Traffic Analysis
      description: Provide visibility into network traffic at external and key internal
        system interfaces to optimize the effectiveness of monitoring devices.
      annotation: Encrypted traffic, asymmetric routing architectures, capacity and
        latency limitations, and transitioning from older to newer technologies (e.g.,
        IPv4 to IPv6 network protocol transition) may result in blind spots for organizations
        when analyzing network traffic. Collecting, decrypting, pre-processing, and
        distributing only relevant traffic to monitoring devices can streamline the
        efficiency and use of devices and optimize traffic analysis.
      translations:
        pt:
          name: "Monitoramento do Sistema | Otimizar a An\xE1lise do Tr\xE1fego de\
            \ Rede"
          description: "Fornecer visibilidade do tr\xE1fego de rede nas interfaces\
            \ externas e nas principais interfaces internas do sistema para otimizar\
            \ a efic\xE1cia dos dispositivos de monitoramento."
          annotation: "O tr\xE1fego criptografado, as arquiteturas de roteamento assim\xE9\
            trico, as limita\xE7\xF5es de capacidade e lat\xEAncia e a transi\xE7\xE3\
            o de tecnologias mais antigas para mais novas (por exemplo, a transi\xE7\
            \xE3o do protocolo de rede IPv4 para IPv6) podem resultar em pontos cegos\
            \ para as organiza\xE7\xF5es ao analisar o tr\xE1fego de rede. Coletar,\
            \ descriptografar, pr\xE9-processar e distribuir apenas o tr\xE1fego relevante\
            \ aos dispositivos de monitoramento pode simplificar a efici\xEAncia e\
            \ o uso dos dispositivos e otimizar a an\xE1lise de tr\xE1fego."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-5
      name: Security Alerts, Advisories, and Directives
      description: 'a. Receive system security alerts, advisories, and directives
        from [Assignment: organization-defined external organizations] on an ongoing
        basis;

        b. Generate internal security alerts, advisories, and directives as deemed
        necessary;

        c. Disseminate security alerts, advisories, and directives to: [Selection
        (one or more): [Assignment: organization-defined personnel or roles]; [Assignment:
        organization-defined elements within the organization]; [Assignment: organization-defined
        external organizations]]; and

        d. Implement security directives in accordance with established time frames,
        or notify the issuing organization of the degree of noncompliance.'
      annotation: The Cybersecurity and Infrastructure Security Agency (CISA) generates
        security alerts and advisories to maintain situational awareness throughout
        the Federal Government. Security directives are issued by OMB or other designated
        organizations with the responsibility and authority to issue such directives.
        Compliance with security directives is essential due to the critical nature
        of many of these directives and the potential (immediate) adverse effects
        on organizational operations and assets, individuals, other organizations,
        and the Nation should the directives not be implemented in a timely manner.
        External organizations include supply chain partners, external mission or
        business partners, external service providers, and other peer or supporting
        organizations.
      translations:
        pt:
          name: "Alertas, Avisos e Diretivas de Seguran\xE7a"
          description: "a. Receber alertas, avisos e diretivas de seguran\xE7a do\
            \ sistema de [Atribui\xE7\xE3o: organiza\xE7\xF5es externas definidas\
            \ pela organiza\xE7\xE3o] de forma cont\xEDnua;\nb. Gerar alertas, avisos\
            \ e diretivas de seguran\xE7a internos conforme considerado necess\xE1\
            rio;\nc. Disseminar alertas, avisos e diretivas de seguran\xE7a para:\
            \ [Sele\xE7\xE3o (um ou mais): [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5\
            es definidos pela organiza\xE7\xE3o]; [Atribui\xE7\xE3o: elementos dentro\
            \ da organiza\xE7\xE3o definidos pela organiza\xE7\xE3o]; [Atribui\xE7\
            \xE3o: organiza\xE7\xF5es externas definidas pela organiza\xE7\xE3o]];\
            \ e\nd. Implementar as diretivas de seguran\xE7a de acordo com os prazos\
            \ estabelecidos ou notificar a organiza\xE7\xE3o emissora sobre o grau\
            \ de n\xE3o conformidade."
          annotation: "A Cybersecurity and Infrastructure Security Agency (CISA) gera\
            \ alertas e avisos de seguran\xE7a para manter a consci\xEAncia situacional\
            \ em todo o Governo Federal. As diretivas de seguran\xE7a s\xE3o emitidas\
            \ pelo OMB ou por outras organiza\xE7\xF5es designadas com a responsabilidade\
            \ e a autoridade para emitir tais diretivas. A conformidade com as diretivas\
            \ de seguran\xE7a \xE9 essencial devido \xE0 natureza cr\xEDtica de muitas\
            \ dessas diretivas e aos potenciais efeitos adversos (imediatos) sobre\
            \ as opera\xE7\xF5es e os ativos organizacionais, indiv\xEDduos, outras\
            \ organiza\xE7\xF5es e a Na\xE7\xE3o, caso as diretivas n\xE3o sejam implementadas\
            \ em tempo h\xE1bil. As organiza\xE7\xF5es externas incluem parceiros\
            \ da cadeia de suprimentos, parceiros externos de miss\xE3o ou de neg\xF3\
            cio, prestadores de servi\xE7os externos e outras organiza\xE7\xF5es pares\
            \ ou de apoio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-5(1)
      name: Security Alerts, Advisories, and Directives | Automated Alerts and Advisories
      description: 'Broadcast security alert and advisory information throughout the
        organization using [Assignment: organization-defined automated mechanisms].'
      annotation: The significant number of changes to organizational systems and
        environments of operation requires the dissemination of security-related information
        to a variety of organizational entities that have a direct interest in the
        success of organizational mission and business functions. Based on information
        provided by security alerts and advisories, changes may be required at one
        or more of the three levels related to the management of risk, including the
        governance level, mission and business process level, and the information
        system level.
      translations:
        pt:
          name: "Alertas, Avisos e Diretivas de Seguran\xE7a | Alertas e Avisos Automatizados"
          description: "Difundir informa\xE7\xF5es de alertas e avisos de seguran\xE7\
            a por toda a organiza\xE7\xE3o utilizando [Atribui\xE7\xE3o: mecanismos\
            \ automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "O n\xFAmero significativo de mudan\xE7as nos sistemas organizacionais\
            \ e nos ambientes de opera\xE7\xE3o exige a dissemina\xE7\xE3o de informa\xE7\
            \xF5es relacionadas \xE0 seguran\xE7a para uma variedade de entidades\
            \ organizacionais que t\xEAm interesse direto no sucesso das fun\xE7\xF5\
            es de miss\xE3o e de neg\xF3cio da organiza\xE7\xE3o. Com base nas informa\xE7\
            \xF5es fornecidas pelos alertas e avisos de seguran\xE7a, podem ser necess\xE1\
            rias mudan\xE7as em um ou mais dos tr\xEAs n\xEDveis relacionados \xE0\
            \ gest\xE3o de risco, incluindo o n\xEDvel de governan\xE7a, o n\xEDvel\
            \ de processo de miss\xE3o e de neg\xF3cio e o n\xEDvel de sistema de\
            \ informa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-6
      name: Security and Privacy Function Verification
      description: 'a. Verify the correct operation of [Assignment: organization-defined
        security and privacy functions];

        b. Perform the verification of the functions specified in SI-6a [Selection
        (one or more): [Assignment: organization-defined system transitional states];
        upon command by user with appropriate privilege; [Assignment: organization-defined
        frequency]];

        c. Alert [Assignment: organization-defined personnel or roles] to failed security
        and privacy verification tests; and

        d. [Selection (one or more): Shut the system down; Restart the system; [Assignment:
        organization-defined alternative action(s)]] when anomalies are discovered.'
      annotation: Transitional states for systems include system startup, restart,
        shutdown, and abort. System notifications include hardware indicator lights,
        electronic alerts to system administrators, and messages to local computer
        consoles. In contrast to security function verification, privacy function
        verification ensures that privacy functions operate as expected and are approved
        by the senior agency official for privacy or that privacy attributes are applied
        or used as expected.
      translations:
        pt:
          name: "Verifica\xE7\xE3o de Fun\xE7\xF5es de Seguran\xE7a e Privacidade"
          description: "a. Verificar a opera\xE7\xE3o correta de [Atribui\xE7\xE3\
            o: fun\xE7\xF5es de seguran\xE7a e privacidade definidas pela organiza\xE7\
            \xE3o];\nb. Realizar a verifica\xE7\xE3o das fun\xE7\xF5es especificadas\
            \ em SI-6a [Sele\xE7\xE3o (um ou mais): [Atribui\xE7\xE3o: estados transicionais\
            \ do sistema definidos pela organiza\xE7\xE3o]; mediante comando do usu\xE1\
            rio com o privil\xE9gio apropriado; [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]];\nc. Alertar [Atribui\xE7\xE3o: pessoal ou\
            \ fun\xE7\xF5es definidos pela organiza\xE7\xE3o] sobre testes de verifica\xE7\
            \xE3o de seguran\xE7a e privacidade que falharem; e\nd. [Sele\xE7\xE3\
            o (um ou mais): Desligar o sistema; Reiniciar o sistema; [Atribui\xE7\xE3\
            o: a\xE7\xE3o(\xF5es) alternativa(s) definida(s) pela organiza\xE7\xE3\
            o]] quando forem descobertas anomalias."
          annotation: "Os estados transicionais dos sistemas incluem inicializa\xE7\
            \xE3o, reinicializa\xE7\xE3o, desligamento e aborto do sistema. As notifica\xE7\
            \xF5es do sistema incluem luzes indicadoras de hardware, alertas eletr\xF4\
            nicos para os administradores do sistema e mensagens nos consoles de computador\
            \ locais. Em contraste com a verifica\xE7\xE3o de fun\xE7\xF5es de seguran\xE7\
            a, a verifica\xE7\xE3o de fun\xE7\xF5es de privacidade garante que as\
            \ fun\xE7\xF5es de privacidade operem conforme esperado e sejam aprovadas\
            \ pelo oficial s\xEAnior de privacidade da ag\xEAncia ou que os atributos\
            \ de privacidade sejam aplicados ou utilizados conforme esperado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-4(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-4(8)
      name: System Monitoring | Protection of Monitoring Information
      description: '[Withdrawn: Incorporated into SI-4.]'
      translations:
        pt:
          name: "Monitoramento do Sistema | Prote\xE7\xE3o das Informa\xE7\xF5es de\
            \ Monitoramento"
          description: '[Retirado: Incorporado a SI-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-6(2)
      name: Security and Privacy Function Verification | Automation Support for Distributed
        Testing
      description: Implement automated mechanisms to support the management of distributed
        security and privacy function testing.
      annotation: The use of automated mechanisms to support the management of distributed
        function testing helps to ensure the integrity, timeliness, completeness,
        and efficacy of such testing.
      translations:
        pt:
          name: "Verifica\xE7\xE3o de Fun\xE7\xF5es de Seguran\xE7a e Privacidade\
            \ | Suporte de Automa\xE7\xE3o para Testes Distribu\xEDdos"
          description: "Implementar mecanismos automatizados para apoiar a gest\xE3\
            o de testes distribu\xEDdos de fun\xE7\xF5es de seguran\xE7a e privacidade."
          annotation: "O uso de mecanismos automatizados para apoiar a gest\xE3o de\
            \ testes distribu\xEDdos de fun\xE7\xF5es ajuda a garantir a integridade,\
            \ a tempestividade, a completude e a efic\xE1cia de tais testes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-6(3)
      name: Security and Privacy Function Verification | Report Verification Results
      description: 'Report the results of security and privacy function verification
        to [Assignment: organization-defined personnel or roles].'
      annotation: Organizational personnel with potential interest in the results
        of the verification of security and privacy functions include systems security
        officers, senior agency information security officers, and senior agency officials
        for privacy.
      translations:
        pt:
          name: "Verifica\xE7\xE3o de Fun\xE7\xF5es de Seguran\xE7a e Privacidade\
            \ | Reportar Resultados da Verifica\xE7\xE3o"
          description: "Reportar os resultados da verifica\xE7\xE3o de fun\xE7\xF5\
            es de seguran\xE7a e privacidade a [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "O pessoal organizacional com potencial interesse nos resultados\
            \ da verifica\xE7\xE3o de fun\xE7\xF5es de seguran\xE7a e privacidade\
            \ inclui oficiais de seguran\xE7a de sistema, oficiais seniores de seguran\xE7\
            a da informa\xE7\xE3o da ag\xEAncia e oficiais seniores de privacidade\
            \ da ag\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7
      name: Software, Firmware, and Information Integrity
      description: 'a. Employ integrity verification tools to detect unauthorized
        changes to the following software, firmware, and information: [Assignment:
        organization-defined software, firmware, and information]; and

        b. Take the following actions when unauthorized changes to the software, firmware,
        and information are detected: [Assignment: organization-defined actions].'
      annotation: "Unauthorized changes to software, firmware, and information can\
        \ occur due to errors or malicious activity. Software includes operating systems\
        \ (with key internal components, such as kernels or drivers), middleware,\
        \ and applications. Firmware interfaces include Unified Extensible Firmware\
        \ Interface (UEFI) and Basic Input/Output System (BIOS). Information includes\
        \ personally identifiable information and metadata that contains security\
        \ and privacy attributes associated with information. Integrity-checking mechanisms\u2014\
        including parity checks, cyclical redundancy checks, cryptographic hashes,\
        \ and associated tools\u2014can automatically monitor the integrity of systems\
        \ and hosted applications."
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es"
          description: "a. Empregar ferramentas de verifica\xE7\xE3o de integridade\
            \ para detectar altera\xE7\xF5es n\xE3o autorizadas nos seguintes software,\
            \ firmware e informa\xE7\xF5es: [Atribui\xE7\xE3o: software, firmware\
            \ e informa\xE7\xF5es definidos pela organiza\xE7\xE3o]; e\nb. Adotar\
            \ as seguintes a\xE7\xF5es quando forem detectadas altera\xE7\xF5es n\xE3\
            o autorizadas no software, firmware e informa\xE7\xF5es: [Atribui\xE7\xE3\
            o: a\xE7\xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "Altera\xE7\xF5es n\xE3o autorizadas em software, firmware e\
            \ informa\xE7\xF5es podem ocorrer devido a erros ou atividade maliciosa.\
            \ O software inclui sistemas operacionais (com componentes internos essenciais,\
            \ como kernels ou drivers), middleware e aplica\xE7\xF5es. As interfaces\
            \ de firmware incluem a Unified Extensible Firmware Interface (UEFI) e\
            \ o Basic Input/Output System (BIOS). As informa\xE7\xF5es incluem informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal e metadados que cont\xEAm atributos\
            \ de seguran\xE7a e privacidade associados \xE0s informa\xE7\xF5es. Mecanismos\
            \ de verifica\xE7\xE3o de integridade \u2014 incluindo verifica\xE7\xF5\
            es de paridade, verifica\xE7\xF5es de redund\xE2ncia c\xEDclica, hashes\
            \ criptogr\xE1ficos e ferramentas associadas \u2014 podem monitorar automaticamente\
            \ a integridade de sistemas e das aplica\xE7\xF5es hospedadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(1)
      name: Software, Firmware, and Information Integrity | Integrity Checks
      description: 'Perform an integrity check of [Assignment: organization-defined
        software, firmware, and information] [Selection (one or more): at startup;
        at [Assignment: organization-defined transitional states or security-relevant
        events]; [Assignment: organization-defined frequency]].'
      annotation: Security-relevant events include the identification of new threats
        to which organizational systems are susceptible and the installation of new
        hardware, software, or firmware. Transitional states include system startup,
        restart, shutdown, and abort.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Verifica\xE7\
            \xF5es de Integridade"
          description: "Realizar uma verifica\xE7\xE3o de integridade de [Atribui\xE7\
            \xE3o: software, firmware e informa\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] [Sele\xE7\xE3o (um ou mais): na inicializa\xE7\xE3o; em [Atribui\xE7\
            \xE3o: estados transicionais ou eventos relevantes para a seguran\xE7\
            a definidos pela organiza\xE7\xE3o]; [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o]]."
          annotation: "Eventos relevantes para a seguran\xE7a incluem a identifica\xE7\
            \xE3o de novas amea\xE7as \xE0s quais os sistemas organizacionais est\xE3\
            o suscet\xEDveis e a instala\xE7\xE3o de novo hardware, software ou firmware.\
            \ Estados transicionais incluem inicializa\xE7\xE3o, reinicializa\xE7\xE3\
            o, desligamento e interrup\xE7\xE3o (abort) do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(2)
      name: Software, Firmware, and Information Integrity | Automated Notifications
        of Integrity Violations
      description: 'Employ automated tools that provide notification to [Assignment:
        organization-defined personnel or roles] upon discovering discrepancies during
        integrity verification.'
      annotation: The employment of automated tools to report system and information
        integrity violations and to notify organizational personnel in a timely matter
        is essential to effective risk response. Personnel with an interest in system
        and information integrity violations include mission and business owners,
        system owners, senior agency information security official, senior agency
        official for privacy, system administrators, software developers, systems
        integrators, information security officers, and privacy officers.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Notifica\xE7\
            \xF5es Automatizadas de Viola\xE7\xF5es de Integridade"
          description: "Empregar ferramentas automatizadas que forne\xE7am notifica\xE7\
            \xE3o a [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o] ao descobrir discrep\xE2ncias durante a verifica\xE7\xE3o de integridade."
          annotation: "O emprego de ferramentas automatizadas para relatar viola\xE7\
            \xF5es de integridade de sistemas e informa\xE7\xF5es e para notificar\
            \ o pessoal organizacional em tempo h\xE1bil \xE9 essencial para uma resposta\
            \ eficaz a riscos. O pessoal com interesse em viola\xE7\xF5es de integridade\
            \ de sistemas e informa\xE7\xF5es inclui propriet\xE1rios de miss\xE3\
            o e de neg\xF3cio, propriet\xE1rios de sistema, o respons\xE1vel s\xEA\
            nior pela seguran\xE7a da informa\xE7\xE3o da ag\xEAncia, o respons\xE1\
            vel s\xEAnior pela privacidade da ag\xEAncia, administradores de sistema,\
            \ desenvolvedores de software, integradores de sistemas, respons\xE1veis\
            \ pela seguran\xE7a da informa\xE7\xE3o e respons\xE1veis pela privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(3)
      name: Software, Firmware, and Information Integrity | Centrally Managed Integrity
        Tools
      description: Employ centrally managed integrity verification tools.
      annotation: Centrally managed integrity verification tools provides greater
        consistency in the application of such tools and can facilitate more comprehensive
        coverage of integrity verification actions.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Ferramentas\
            \ de Integridade Gerenciadas Centralmente"
          description: "Empregar ferramentas de verifica\xE7\xE3o de integridade gerenciadas\
            \ centralmente."
          annotation: "Ferramentas de verifica\xE7\xE3o de integridade gerenciadas\
            \ centralmente proporcionam maior consist\xEAncia na aplica\xE7\xE3o dessas\
            \ ferramentas e podem facilitar uma cobertura mais abrangente das a\xE7\
            \xF5es de verifica\xE7\xE3o de integridade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-6(1)
      name: Security and Privacy Function Verification | Notification of Failed Security
        Tests
      description: '[Withdrawn: Incorporated into SI-6.]'
      translations:
        pt:
          name: "Verifica\xE7\xE3o de Fun\xE7\xF5es de Seguran\xE7a e Privacidade\
            \ | Notifica\xE7\xE3o de Testes de Seguran\xE7a com Falha"
          description: '[Revogado: Incorporado ao SI-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(5)
      name: Software, Firmware, and Information Integrity | Automated Response to
        Integrity Violations
      description: 'Automatically [Selection (one or more): shut the system down;
        restart the system; implement [Assignment: organization-defined controls]]
        when integrity violations are discovered.'
      annotation: Organizations may define different integrity-checking responses
        by type of information, specific information, or a combination of both. Types
        of information include firmware, software, and user data. Specific information
        includes boot firmware for certain types of machines. The automatic implementation
        of controls within organizational systems includes reversing the changes,
        halting the system, or triggering audit alerts when unauthorized modifications
        to critical security files occur.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Resposta\
            \ Automatizada a Viola\xE7\xF5es de Integridade"
          description: "Automaticamente [Sele\xE7\xE3o (um ou mais): desligar o sistema;\
            \ reiniciar o sistema; implementar [Atribui\xE7\xE3o: controles definidos\
            \ pela organiza\xE7\xE3o]] quando viola\xE7\xF5es de integridade forem\
            \ descobertas."
          annotation: "As organiza\xE7\xF5es podem definir diferentes respostas de\
            \ verifica\xE7\xE3o de integridade por tipo de informa\xE7\xE3o, informa\xE7\
            \xE3o espec\xEDfica ou uma combina\xE7\xE3o de ambos. Os tipos de informa\xE7\
            \xE3o incluem firmware, software e dados de usu\xE1rio. Informa\xE7\xF5\
            es espec\xEDficas incluem o firmware de inicializa\xE7\xE3o (boot) para\
            \ determinados tipos de m\xE1quinas. A implementa\xE7\xE3o autom\xE1tica\
            \ de controles dentro dos sistemas organizacionais inclui reverter as\
            \ altera\xE7\xF5es, interromper o sistema ou acionar alertas de auditoria\
            \ quando ocorrem modifica\xE7\xF5es n\xE3o autorizadas em arquivos cr\xED\
            ticos de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(6)
      name: Software, Firmware, and Information Integrity | Cryptographic Protection
      description: Implement cryptographic mechanisms to detect unauthorized changes
        to software, firmware, and information.
      annotation: Cryptographic mechanisms used to protect integrity include digital
        signatures and the computation and application of signed hashes using asymmetric
        cryptography, protecting the confidentiality of the key used to generate the
        hash, and using the public key to verify the hash information. Organizations
        that employ cryptographic mechanisms also consider cryptographic key management
        solutions.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Prote\xE7\
            \xE3o Criptogr\xE1fica"
          description: "Implementar mecanismos criptogr\xE1ficos para detectar altera\xE7\
            \xF5es n\xE3o autorizadas em software, firmware e informa\xE7\xF5es."
          annotation: "Os mecanismos criptogr\xE1ficos utilizados para proteger a\
            \ integridade incluem assinaturas digitais e o c\xE1lculo e a aplica\xE7\
            \xE3o de hashes assinados usando criptografia assim\xE9trica, protegendo\
            \ a confidencialidade da chave usada para gerar o hash e usando a chave\
            \ p\xFAblica para verificar a informa\xE7\xE3o de hash. As organiza\xE7\
            \xF5es que empregam mecanismos criptogr\xE1ficos tamb\xE9m consideram\
            \ solu\xE7\xF5es de gerenciamento de chaves criptogr\xE1ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(7)
      name: Software, Firmware, and Information Integrity | Integration of Detection
        and Response
      description: 'Incorporate the detection of the following unauthorized changes
        into the organizational incident response capability: [Assignment: organization-defined
        security-relevant changes to the system].'
      annotation: Integrating detection and response helps to ensure that detected
        events are tracked, monitored, corrected, and available for historical purposes.
        Maintaining historical records is important for being able to identify and
        discern adversary actions over an extended time period and for possible legal
        actions. Security-relevant changes include unauthorized changes to established
        configuration settings or the unauthorized elevation of system privileges.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Integra\xE7\
            \xE3o de Detec\xE7\xE3o e Resposta"
          description: "Incorporar a detec\xE7\xE3o das seguintes altera\xE7\xF5es\
            \ n\xE3o autorizadas \xE0 capacidade de resposta a incidentes da organiza\xE7\
            \xE3o: [Atribui\xE7\xE3o: altera\xE7\xF5es relevantes para a seguran\xE7\
            a no sistema definidas pela organiza\xE7\xE3o]."
          annotation: "Integrar detec\xE7\xE3o e resposta ajuda a garantir que os\
            \ eventos detectados sejam rastreados, monitorados, corrigidos e disponibilizados\
            \ para fins hist\xF3ricos. Manter registros hist\xF3ricos \xE9 importante\
            \ para poder identificar e discernir a\xE7\xF5es de advers\xE1rios ao\
            \ longo de um per\xEDodo prolongado e para poss\xEDveis a\xE7\xF5es legais.\
            \ Altera\xE7\xF5es relevantes para a seguran\xE7a incluem altera\xE7\xF5\
            es n\xE3o autorizadas em configura\xE7\xF5es estabelecidas ou a eleva\xE7\
            \xE3o n\xE3o autorizada de privil\xE9gios do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(8)
      name: Software, Firmware, and Information Integrity | Auditing Capability for
        Significant Events
      description: 'Upon detection of a potential integrity violation, provide the
        capability to audit the event and initiate the following actions: [Selection
        (one or more): generate an audit record; alert current user; alert [Assignment:
        organization-defined personnel or roles]; [Assignment: organization-defined
        other actions]].'
      annotation: Organizations select response actions based on types of software,
        specific software, or information for which there are potential integrity
        violations.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Capacidade\
            \ de Auditoria para Eventos Significativos"
          description: "Ao detectar uma poss\xEDvel viola\xE7\xE3o de integridade,\
            \ fornecer a capacidade de auditar o evento e iniciar as seguintes a\xE7\
            \xF5es: [Sele\xE7\xE3o (um ou mais): gerar um registro de auditoria; alertar\
            \ o usu\xE1rio atual; alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5\
            es definidos pela organiza\xE7\xE3o]; [Atribui\xE7\xE3o: outras a\xE7\xF5\
            es definidas pela organiza\xE7\xE3o]]."
          annotation: "As organiza\xE7\xF5es selecionam a\xE7\xF5es de resposta com\
            \ base nos tipos de software, no software espec\xEDfico ou nas informa\xE7\
            \xF5es para os quais h\xE1 poss\xEDveis viola\xE7\xF5es de integridade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(9)
      name: Software, Firmware, and Information Integrity | Verify Boot Process
      description: 'Verify the integrity of the boot process of the following system
        components: [Assignment: organization-defined system components].'
      annotation: "Ensuring the integrity of boot processes is critical to starting\
        \ system components in known, trustworthy states.\_Integrity verification\
        \ mechanisms provide a level of assurance that only trusted code is executed\
        \ during boot processes."
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Verificar\
            \ o Processo de Inicializa\xE7\xE3o"
          description: "Verificar a integridade do processo de inicializa\xE7\xE3\
            o (boot) dos seguintes componentes do sistema: [Atribui\xE7\xE3o: componentes\
            \ do sistema definidos pela organiza\xE7\xE3o]."
          annotation: "Garantir a integridade dos processos de inicializa\xE7\xE3\
            o \xE9 fundamental para iniciar os componentes do sistema em estados conhecidos\
            \ e confi\xE1veis. Mecanismos de verifica\xE7\xE3o de integridade fornecem\
            \ um n\xEDvel de garantia de que apenas c\xF3digo confi\xE1vel \xE9 executado\
            \ durante os processos de inicializa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(10)
      name: Software, Firmware, and Information Integrity | Protection of Boot Firmware
      description: 'Implement the following mechanisms to protect the integrity of
        boot firmware in [Assignment: organization-defined system components]: [Assignment:
        organization-defined mechanisms].'
      annotation: Unauthorized modifications to boot firmware may indicate a sophisticated,
        targeted attack. These types of targeted attacks can result in a permanent
        denial of service or a persistent malicious code presence. These situations
        can occur if the firmware is corrupted or if the malicious code is embedded
        within the firmware. System components can protect the integrity of boot firmware
        in organizational systems by verifying the integrity and authenticity of all
        updates to the firmware prior to applying changes to the system component
        and preventing unauthorized processes from modifying the boot firmware.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Prote\xE7\
            \xE3o do Firmware de Inicializa\xE7\xE3o"
          description: "Implementar os seguintes mecanismos para proteger a integridade\
            \ do firmware de inicializa\xE7\xE3o (boot) em [Atribui\xE7\xE3o: componentes\
            \ do sistema definidos pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: mecanismos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Modifica\xE7\xF5es n\xE3o autorizadas no firmware de inicializa\xE7\
            \xE3o podem indicar um ataque sofisticado e direcionado. Esses tipos de\
            \ ataques direcionados podem resultar em uma nega\xE7\xE3o de servi\xE7\
            o permanente ou na presen\xE7a persistente de c\xF3digo malicioso. Essas\
            \ situa\xE7\xF5es podem ocorrer se o firmware estiver corrompido ou se\
            \ o c\xF3digo malicioso estiver embutido no firmware. Os componentes do\
            \ sistema podem proteger a integridade do firmware de inicializa\xE7\xE3\
            o nos sistemas organizacionais verificando a integridade e a autenticidade\
            \ de todas as atualiza\xE7\xF5es do firmware antes de aplicar as altera\xE7\
            \xF5es ao componente do sistema e impedindo que processos n\xE3o autorizados\
            \ modifiquem o firmware de inicializa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(11)
      name: Software, Firmware, and Information Integrity | Confined Environments
        with Limited Privileges
      description: '[Withdrawn: Moved to CM-7(6).]'
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Ambientes\
            \ Confinados com Privil\xE9gios Limitados"
          description: '[Revogado: Movido para o CM-7(6).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(12)
      name: Software, Firmware, and Information Integrity | Integrity Verification
      description: 'Require that the integrity of the following user-installed software
        be verified prior to execution: [Assignment: organization-defined user-installed
        software].'
      annotation: Organizations verify the integrity of user-installed software prior
        to execution to reduce the likelihood of executing malicious code or programs
        that contains errors from unauthorized modifications. Organizations consider
        the practicality of approaches to verifying software integrity, including
        the availability of trustworthy checksums from software developers and vendors.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Verifica\xE7\
            \xE3o de Integridade"
          description: "Exigir que a integridade do seguinte software instalado pelo\
            \ usu\xE1rio seja verificada antes da execu\xE7\xE3o: [Atribui\xE7\xE3\
            o: software instalado pelo usu\xE1rio definido pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es verificam a integridade do software instalado\
            \ pelo usu\xE1rio antes da execu\xE7\xE3o para reduzir a probabilidade\
            \ de executar c\xF3digo malicioso ou programas que contenham erros decorrentes\
            \ de modifica\xE7\xF5es n\xE3o autorizadas. As organiza\xE7\xF5es consideram\
            \ a praticidade das abordagens de verifica\xE7\xE3o da integridade do\
            \ software, incluindo a disponibilidade de checksums confi\xE1veis fornecidos\
            \ pelos desenvolvedores e fornecedores do software."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(13)
      name: Software, Firmware, and Information Integrity | Code Execution in Protected
        Environments
      description: '[Withdrawn: Moved to CM-7(7).]'
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Execu\xE7\
            \xE3o de C\xF3digo em Ambientes Protegidos"
          description: '[Revogado: Movido para o CM-7(7).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(14)
      name: Software, Firmware, and Information Integrity | Binary or Machine Executable
        Code
      description: '[Withdrawn: Moved to CM-7(8).]'
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | C\xF3digo\
            \ Bin\xE1rio ou Execut\xE1vel de M\xE1quina"
          description: '[Revogado: Movido para o CM-7(8).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(15)
      name: Software, Firmware, and Information Integrity | Code Authentication
      description: 'Implement cryptographic mechanisms to authenticate the following
        software or firmware components prior to installation: [Assignment: organization-defined
        software or firmware components].'
      annotation: Cryptographic authentication includes verifying that software or
        firmware components have been digitally signed using certificates recognized
        and approved by organizations. Code signing is an effective method to protect
        against malicious code. Organizations that employ cryptographic mechanisms
        also consider cryptographic key management solutions.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Autentica\xE7\
            \xE3o de C\xF3digo"
          description: "Implementar mecanismos criptogr\xE1ficos para autenticar os\
            \ seguintes componentes de software ou firmware antes da instala\xE7\xE3\
            o: [Atribui\xE7\xE3o: componentes de software ou firmware definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "A autentica\xE7\xE3o criptogr\xE1fica inclui verificar se os\
            \ componentes de software ou firmware foram assinados digitalmente usando\
            \ certificados reconhecidos e aprovados pelas organiza\xE7\xF5es. A assinatura\
            \ de c\xF3digo \xE9 um m\xE9todo eficaz de prote\xE7\xE3o contra c\xF3\
            digo malicioso. As organiza\xE7\xF5es que empregam mecanismos criptogr\xE1\
            ficos tamb\xE9m consideram solu\xE7\xF5es de gerenciamento de chaves criptogr\xE1\
            ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(16)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(16)
      name: Software, Firmware, and Information Integrity | Time Limit on Process
        Execution Without Supervision
      description: 'Prohibit processes from executing without supervision for more
        than [Assignment: organization-defined time period].'
      annotation: Placing a time limit on process execution without supervision is
        intended to apply to processes for which typical or normal execution periods
        can be determined and situations in which organizations exceed such periods.
        Supervision includes timers on operating systems, automated responses, and
        manual oversight and response when system process anomalies occur.
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Limite de\
            \ Tempo para Execu\xE7\xE3o de Processos sem Supervis\xE3o"
          description: "Proibir que processos sejam executados sem supervis\xE3o por\
            \ mais de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "Estabelecer um limite de tempo para a execu\xE7\xE3o de processos\
            \ sem supervis\xE3o destina-se a aplicar-se a processos para os quais\
            \ per\xEDodos de execu\xE7\xE3o t\xEDpicos ou normais podem ser determinados\
            \ e a situa\xE7\xF5es em que as organiza\xE7\xF5es excedem tais per\xED\
            odos. A supervis\xE3o inclui temporizadores em sistemas operacionais,\
            \ respostas automatizadas e supervis\xE3o e resposta manual quando ocorrem\
            \ anomalias nos processos do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(17)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(17)
      name: Software, Firmware, and Information Integrity | Runtime Application Self-protection
      description: 'Implement [Assignment: organization-defined controls] for application
        self-protection at runtime.'
      annotation: "Runtime application self-protection employs runtime\_instrumentation\_\
        to detect and block\_the exploitation of software vulnerabilities\_by taking\
        \ advantage of information from the software in execution. Runtime exploit\
        \ prevention differs from traditional perimeter-based protections such as\_\
        guards and firewalls which can only detect and block attacks by using network\
        \ information without contextual awareness. Runtime application self-protection\
        \ technology can reduce the susceptibility of software to attacks by monitoring\
        \ its inputs and blocking those inputs that could allow attacks. It can also\
        \ help protect the runtime environment from unwanted changes and tampering.\
        \ When a threat is detected, runtime application self-protection technology\
        \ can prevent exploitation and take other actions (e.g., sending a warning\
        \ message to the user, terminating the user's session, terminating the application,\
        \ or sending an alert to organizational personnel). Runtime application self-protection\
        \ solutions can be deployed in either a monitor or protection mode."
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Autoprote\xE7\
            \xE3o de Aplica\xE7\xE3o em Tempo de Execu\xE7\xE3o"
          description: "Implementar [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\
            \xE3o] para autoprote\xE7\xE3o de aplica\xE7\xF5es em tempo de execu\xE7\
            \xE3o."
          annotation: "A autoprote\xE7\xE3o de aplica\xE7\xF5es em tempo de execu\xE7\
            \xE3o (runtime application self-protection) emprega instrumenta\xE7\xE3\
            o em tempo de execu\xE7\xE3o para detectar e bloquear a explora\xE7\xE3\
            o de vulnerabilidades de software, aproveitando informa\xE7\xF5es do software\
            \ em execu\xE7\xE3o. A preven\xE7\xE3o de explora\xE7\xE3o em tempo de\
            \ execu\xE7\xE3o difere das prote\xE7\xF5es tradicionais baseadas em per\xED\
            metro, como guardas (guards) e firewalls, que s\xF3 conseguem detectar\
            \ e bloquear ataques usando informa\xE7\xF5es de rede sem consci\xEAncia\
            \ contextual. A tecnologia de autoprote\xE7\xE3o de aplica\xE7\xF5es em\
            \ tempo de execu\xE7\xE3o pode reduzir a suscetibilidade do software a\
            \ ataques monitorando suas entradas e bloqueando aquelas que poderiam\
            \ permitir ataques. Ela tamb\xE9m pode ajudar a proteger o ambiente de\
            \ execu\xE7\xE3o contra altera\xE7\xF5es indesejadas e adultera\xE7\xE3\
            o. Quando uma amea\xE7a \xE9 detectada, a tecnologia de autoprote\xE7\xE3\
            o de aplica\xE7\xF5es em tempo de execu\xE7\xE3o pode impedir a explora\xE7\
            \xE3o e adotar outras a\xE7\xF5es (por exemplo, enviar uma mensagem de\
            \ aviso ao usu\xE1rio, encerrar a sess\xE3o do usu\xE1rio, encerrar a\
            \ aplica\xE7\xE3o ou enviar um alerta ao pessoal organizacional). As solu\xE7\
            \xF5es de autoprote\xE7\xE3o de aplica\xE7\xF5es em tempo de execu\xE7\
            \xE3o podem ser implantadas em modo de monitoramento ou de prote\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-8
      name: Spam Protection
      description: 'a. Employ spam protection mechanisms at system entry and exit
        points to detect and act on unsolicited messages; and

        b. Update spam protection mechanisms when new releases are available in accordance
        with organizational configuration management policy and procedures.'
      annotation: System entry and exit points include firewalls, remote-access servers,
        electronic mail servers, web servers, proxy servers, workstations, notebook
        computers, and mobile devices. Spam can be transported by different means,
        including email, email attachments, and web accesses. Spam protection mechanisms
        include signature definitions.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Spam"
          description: "a. Empregar mecanismos de prote\xE7\xE3o contra spam nos pontos\
            \ de entrada e sa\xEDda do sistema para detectar e agir sobre mensagens\
            \ n\xE3o solicitadas; e\nb. Atualizar os mecanismos de prote\xE7\xE3o\
            \ contra spam quando novas vers\xF5es estiverem dispon\xEDveis, em conformidade\
            \ com a pol\xEDtica e os procedimentos de gerenciamento de configura\xE7\
            \xE3o da organiza\xE7\xE3o."
          annotation: "Os pontos de entrada e sa\xEDda do sistema incluem firewalls,\
            \ servidores de acesso remoto, servidores de correio eletr\xF4nico, servidores\
            \ web, servidores proxy, esta\xE7\xF5es de trabalho, notebooks e dispositivos\
            \ m\xF3veis. O spam pode ser transportado por diferentes meios, incluindo\
            \ e-mail, anexos de e-mail e acessos \xE0 web. Os mecanismos de prote\xE7\
            \xE3o contra spam incluem defini\xE7\xF5es de assinatura."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-7(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-7(4)
      name: Software, Firmware, and Information Integrity | Tamper-evident Packaging
      description: '[Withdrawn: Incorporated into SR-9.]'
      translations:
        pt:
          name: "Integridade de Software, Firmware e Informa\xE7\xF5es | Embalagem\
            \ com Evid\xEAncia de Adultera\xE7\xE3o"
          description: '[Revogado: Incorporado ao SR-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-8(2)
      name: Spam Protection | Automatic Updates
      description: 'Automatically update spam protection mechanisms [Assignment: organization-defined
        frequency].'
      annotation: Using automated mechanisms to update spam protection mechanisms
        helps to ensure that updates occur on a regular basis and provide the latest
        content and protection capabilities.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Spam | Atualiza\xE7\xF5es Autom\xE1ticas"
          description: "Atualizar automaticamente os mecanismos de prote\xE7\xE3o\
            \ contra spam [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o]."
          annotation: "O uso de mecanismos automatizados para atualizar os mecanismos\
            \ de prote\xE7\xE3o contra spam ajuda a garantir que as atualiza\xE7\xF5\
            es ocorram regularmente e forne\xE7am o conte\xFAdo e as capacidades de\
            \ prote\xE7\xE3o mais recentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-8(3)
      name: Spam Protection | Continuous Learning Capability
      description: Implement spam protection mechanisms with a learning capability
        to more effectively identify legitimate communications traffic.
      annotation: Learning mechanisms include Bayesian filters that respond to user
        inputs that identify specific traffic as spam or legitimate by updating algorithm
        parameters and thereby more accurately separating types of traffic.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Spam | Capacidade de Aprendizado Cont\xEDnuo"
          description: "Implementar mecanismos de prote\xE7\xE3o contra spam com capacidade\
            \ de aprendizado para identificar de forma mais eficaz o tr\xE1fego de\
            \ comunica\xE7\xF5es leg\xEDtimo."
          annotation: "Os mecanismos de aprendizado incluem filtros bayesianos que\
            \ respondem a entradas do usu\xE1rio que identificam um tr\xE1fego espec\xED\
            fico como spam ou leg\xEDtimo, atualizando os par\xE2metros do algoritmo\
            \ e, assim, separando com mais precis\xE3o os tipos de tr\xE1fego."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-8(1)
      name: Spam Protection | Central Management
      description: '[Withdrawn: Incorporated into PL-9.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Spam | Gerenciamento Centralizado"
          description: '[Revogado: Incorporado ao PL-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10
      name: Information Input Validation
      description: 'Check the validity of the following information inputs: [Assignment:
        organization-defined information inputs to the system].'
      annotation: "Checking the valid syntax and semantics of system inputs\u2014\
        including character set, length, numerical range, and acceptable values\u2014\
        verifies that inputs match specified definitions for format and content. For\
        \ example, if the organization specifies that numerical values between 1-100\
        \ are the only acceptable inputs for a field in a given application, inputs\
        \ of 387, abc, or %K% are invalid inputs and are not accepted as input to\
        \ the system. Valid inputs are likely to vary from field to field within a\
        \ software application. Applications typically follow well-defined protocols\
        \ that use structured messages (i.e., commands or queries) to communicate\
        \ between software modules or system components. Structured messages can contain\
        \ raw or unstructured data interspersed with metadata or control information.\
        \ If software applications use attacker-supplied inputs to construct structured\
        \ messages without properly encoding such messages, then the attacker could\
        \ insert malicious commands or special characters that can cause the data\
        \ to be interpreted as control information or metadata. Consequently, the\
        \ module or component that receives the corrupted output will perform the\
        \ wrong operations or otherwise interpret the data incorrectly. Prescreening\
        \ inputs prior to passing them to interpreters prevents the content from being\
        \ unintentionally interpreted as commands. Input validation ensures accurate\
        \ and correct inputs and prevents attacks such as cross-site scripting and\
        \ a variety of injection attacks."
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o"
          description: "Verificar a validade das seguintes entradas de informa\xE7\
            \xE3o: [Atribui\xE7\xE3o: entradas de informa\xE7\xE3o no sistema definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "Verificar a sintaxe e a sem\xE2ntica v\xE1lidas das entradas\
            \ do sistema \u2014 incluindo conjunto de caracteres, comprimento, faixa\
            \ num\xE9rica e valores aceit\xE1veis \u2014 verifica se as entradas correspondem\
            \ \xE0s defini\xE7\xF5es especificadas de formato e conte\xFAdo. Por exemplo,\
            \ se a organiza\xE7\xE3o especifica que valores num\xE9ricos entre 1 e\
            \ 100 s\xE3o as \xFAnicas entradas aceit\xE1veis para um campo em uma\
            \ determinada aplica\xE7\xE3o, entradas como 387, abc ou %K% s\xE3o entradas\
            \ inv\xE1lidas e n\xE3o s\xE3o aceitas como entrada no sistema. As entradas\
            \ v\xE1lidas provavelmente variam de campo para campo dentro de uma aplica\xE7\
            \xE3o de software. As aplica\xE7\xF5es normalmente seguem protocolos bem\
            \ definidos que usam mensagens estruturadas (ou seja, comandos ou consultas)\
            \ para se comunicar entre m\xF3dulos de software ou componentes do sistema.\
            \ Mensagens estruturadas podem conter dados brutos ou n\xE3o estruturados\
            \ intercalados com metadados ou informa\xE7\xF5es de controle. Se as aplica\xE7\
            \xF5es de software usarem entradas fornecidas por um atacante para construir\
            \ mensagens estruturadas sem codificar adequadamente tais mensagens, o\
            \ atacante poder\xE1 inserir comandos maliciosos ou caracteres especiais\
            \ que podem fazer com que os dados sejam interpretados como informa\xE7\
            \xF5es de controle ou metadados. Consequentemente, o m\xF3dulo ou componente\
            \ que recebe a sa\xEDda corrompida realizar\xE1 opera\xE7\xF5es erradas\
            \ ou interpretar\xE1 os dados incorretamente. O pr\xE9-filtro das entradas\
            \ antes de pass\xE1-las aos interpretadores impede que o conte\xFAdo seja\
            \ interpretado involuntariamente como comandos. A valida\xE7\xE3o de entradas\
            \ garante entradas precisas e corretas e previne ataques como cross-site\
            \ scripting e uma variedade de ataques de inje\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10(1)
      name: Information Input Validation | Manual Override Capability
      description: '(a) Provide a manual override capability for input validation
        of the following information inputs: [Assignment: organization-defined inputs
        defined in the base control (SI-10)];

        (b) Restrict the use of the manual override capability to only [Assignment:
        organization-defined authorized individuals]; and

        (c) Audit the use of the manual override capability.'
      annotation: In certain situations, such as during events that are defined in
        contingency plans, a manual override capability for input validation may be
        needed. Manual overrides are used only in limited circumstances and with the
        inputs defined by the organization.
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o | Capacidade de Substitui\xE7\
            \xE3o Manual"
          description: "(a) Fornecer uma capacidade de substitui\xE7\xE3o manual para\
            \ a valida\xE7\xE3o de entradas das seguintes entradas de informa\xE7\xE3\
            o: [Atribui\xE7\xE3o: entradas definidas no controle base (SI-10) definidas\
            \ pela organiza\xE7\xE3o];\n(b) Restringir o uso da capacidade de substitui\xE7\
            \xE3o manual apenas a [Atribui\xE7\xE3o: indiv\xEDduos autorizados definidos\
            \ pela organiza\xE7\xE3o]; e\n(c) Auditar o uso da capacidade de substitui\xE7\
            \xE3o manual."
          annotation: "Em determinadas situa\xE7\xF5es, como durante eventos definidos\
            \ em planos de conting\xEAncia, pode ser necess\xE1ria uma capacidade\
            \ de substitui\xE7\xE3o manual para a valida\xE7\xE3o de entradas. As\
            \ substitui\xE7\xF5es manuais s\xE3o usadas apenas em circunst\xE2ncias\
            \ limitadas e com as entradas definidas pela organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10(2)
      name: Information Input Validation | Review and Resolve Errors
      description: 'Review and resolve input validation errors within [Assignment:
        organization-defined time period].'
      annotation: Resolution of input validation errors includes correcting systemic
        causes of errors and resubmitting transactions with corrected input. Input
        validation errors are those related to the information inputs defined by the
        organization in the base control (SI-10).
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o | Revisar e Resolver\
            \ Erros"
          description: "Revisar e resolver erros de valida\xE7\xE3o de entradas dentro\
            \ de [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "A resolu\xE7\xE3o de erros de valida\xE7\xE3o de entradas inclui\
            \ corrigir causas sist\xEAmicas dos erros e reenviar transa\xE7\xF5es\
            \ com a entrada corrigida. Os erros de valida\xE7\xE3o de entradas s\xE3\
            o aqueles relacionados \xE0s entradas de informa\xE7\xE3o definidas pela\
            \ organiza\xE7\xE3o no controle base (SI-10)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10(3)
      name: Information Input Validation | Predictable Behavior
      description: Verify that the system behaves in a predictable and documented
        manner when invalid inputs are received.
      annotation: A common vulnerability in organizational systems is unpredictable
        behavior when invalid inputs are received. Verification of system predictability
        helps ensure that the system behaves as expected when invalid inputs are received.
        This occurs by specifying system responses that allow the system to transition
        to known states without adverse, unintended side effects. The invalid inputs
        are those related to the information inputs defined by the organization in
        the base control (SI-10).
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o | Comportamento Previs\xED\
            vel"
          description: "Verificar se o sistema se comporta de maneira previs\xEDvel\
            \ e documentada quando entradas inv\xE1lidas s\xE3o recebidas."
          annotation: "Uma vulnerabilidade comum nos sistemas organizacionais \xE9\
            \ o comportamento imprevis\xEDvel quando entradas inv\xE1lidas s\xE3o\
            \ recebidas. A verifica\xE7\xE3o da previsibilidade do sistema ajuda a\
            \ garantir que o sistema se comporte conforme esperado quando entradas\
            \ inv\xE1lidas s\xE3o recebidas. Isso ocorre especificando respostas do\
            \ sistema que permitam que ele transite para estados conhecidos sem efeitos\
            \ colaterais adversos e n\xE3o intencionais. As entradas inv\xE1lidas\
            \ s\xE3o aquelas relacionadas \xE0s entradas de informa\xE7\xE3o definidas\
            \ pela organiza\xE7\xE3o no controle base (SI-10)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10(4)
      name: Information Input Validation | Timing Interactions
      description: Account for timing interactions among system components in determining
        appropriate responses for invalid inputs.
      annotation: In addressing invalid system inputs received across protocol interfaces,
        timing interactions become relevant, where one protocol needs to consider
        the impact of the error response on other protocols in the protocol stack.
        For example, 802.11 standard wireless network protocols do not interact well
        with Transmission Control Protocols (TCP) when packets are dropped (which
        could be due to invalid packet input). TCP assumes packet losses are due to
        congestion, while packets lost over 802.11 links are typically dropped due
        to noise or collisions on the link. If TCP makes a congestion response, it
        takes the wrong action in response to a collision event. Adversaries may be
        able to use what appear to be acceptable individual behaviors of the protocols
        in concert to achieve adverse effects through suitable construction of invalid
        input. The invalid inputs are those related to the information inputs defined
        by the organization in the base control (SI-10).
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o | Intera\xE7\xF5\
            es de Temporiza\xE7\xE3o"
          description: "Considerar as intera\xE7\xF5es de temporiza\xE7\xE3o entre\
            \ componentes do sistema ao determinar respostas apropriadas para entradas\
            \ inv\xE1lidas."
          annotation: "Ao tratar entradas inv\xE1lidas do sistema recebidas atrav\xE9\
            s de interfaces de protocolo, as intera\xE7\xF5es de temporiza\xE7\xE3\
            o tornam-se relevantes, pois um protocolo precisa considerar o impacto\
            \ da resposta de erro sobre outros protocolos na pilha de protocolos.\
            \ Por exemplo, os protocolos de rede sem fio do padr\xE3o 802.11 n\xE3\
            o interagem bem com os protocolos de controle de transmiss\xE3o (TCP)\
            \ quando pacotes s\xE3o descartados (o que pode ser devido a uma entrada\
            \ de pacote inv\xE1lida). O TCP assume que as perdas de pacotes se devem\
            \ ao congestionamento, enquanto os pacotes perdidos em enlaces 802.11\
            \ s\xE3o normalmente descartados devido a ru\xEDdo ou colis\xF5es no enlace.\
            \ Se o TCP der uma resposta de congestionamento, ele toma a a\xE7\xE3\
            o errada em resposta a um evento de colis\xE3o. Os advers\xE1rios podem\
            \ ser capazes de usar o que parecem ser comportamentos individuais aceit\xE1\
            veis dos protocolos em conjunto para alcan\xE7ar efeitos adversos por\
            \ meio da constru\xE7\xE3o adequada de entradas inv\xE1lidas. As entradas\
            \ inv\xE1lidas s\xE3o aquelas relacionadas \xE0s entradas de informa\xE7\
            \xE3o definidas pela organiza\xE7\xE3o no controle base (SI-10)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10(5)
      name: Information Input Validation | Restrict Inputs to Trusted Sources and
        Approved Formats
      description: 'Restrict the use of information inputs to [Assignment: organization-defined
        trusted sources] and/or [Assignment: organization-defined formats].'
      annotation: Restricting the use of inputs to trusted sources and in trusted
        formats applies the concept of authorized or permitted software to information
        inputs. Specifying known trusted sources for information inputs and acceptable
        formats for such inputs can reduce the probability of malicious activity.
        The information inputs are those defined by the organization in the base control
        (SI-10).
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o | Restringir Entradas\
            \ a Fontes Confi\xE1veis e Formatos Aprovados"
          description: "Restringir o uso de entradas de informa\xE7\xE3o a [Atribui\xE7\
            \xE3o: fontes confi\xE1veis definidas pela organiza\xE7\xE3o] e/ou [Atribui\xE7\
            \xE3o: formatos definidos pela organiza\xE7\xE3o]."
          annotation: "Restringir o uso de entradas a fontes confi\xE1veis e em formatos\
            \ confi\xE1veis aplica o conceito de software autorizado ou permitido\
            \ \xE0s entradas de informa\xE7\xE3o. Especificar fontes confi\xE1veis\
            \ conhecidas para as entradas de informa\xE7\xE3o e formatos aceit\xE1\
            veis para tais entradas pode reduzir a probabilidade de atividade maliciosa.\
            \ As entradas de informa\xE7\xE3o s\xE3o aquelas definidas pela organiza\xE7\
            \xE3o no controle base (SI-10)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-10(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-10(6)
      name: Information Input Validation | Injection Prevention
      description: Prevent untrusted data injections.
      annotation: "Untrusted data injections may be prevented using a parameterized\
        \ interface or output escaping (output encoding). Parameterized interfaces\
        \ separate data from code so that injections of malicious or unintended data\
        \ cannot change the semantics of commands being sent. Output escaping uses\
        \ specified characters to inform the interpreter\u2019s parser whether data\
        \ is trusted. Prevention of untrusted data injections are with respect to\
        \ the information inputs defined by the organization in the base control (SI-10)."
      translations:
        pt:
          name: "Valida\xE7\xE3o de Entradas de Informa\xE7\xE3o | Preven\xE7\xE3\
            o de Inje\xE7\xE3o"
          description: "Impedir inje\xE7\xF5es de dados n\xE3o confi\xE1veis."
          annotation: "As inje\xE7\xF5es de dados n\xE3o confi\xE1veis podem ser impedidas\
            \ usando uma interface parametrizada ou escape de sa\xEDda (codifica\xE7\
            \xE3o de sa\xEDda). As interfaces parametrizadas separam dados de c\xF3\
            digo, de modo que inje\xE7\xF5es de dados maliciosos ou n\xE3o intencionais\
            \ n\xE3o possam alterar a sem\xE2ntica dos comandos enviados. O escape\
            \ de sa\xEDda usa caracteres especificados para informar ao parser do\
            \ interpretador se os dados s\xE3o confi\xE1veis. A preven\xE7\xE3o de\
            \ inje\xE7\xF5es de dados n\xE3o confi\xE1veis refere-se \xE0s entradas\
            \ de informa\xE7\xE3o definidas pela organiza\xE7\xE3o no controle base\
            \ (SI-10)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-11
      name: Error Handling
      description: 'a. Generate error messages that provide information necessary
        for corrective actions without revealing information that could be exploited;
        and

        b. Reveal error messages only to [Assignment: organization-defined personnel
        or roles].'
      annotation: Organizations consider the structure and content of error messages.
        The extent to which systems can handle error conditions is guided and informed
        by organizational policy and operational requirements. Exploitable information
        includes stack traces and implementation details; erroneous logon attempts
        with passwords mistakenly entered as the username; mission or business information
        that can be derived from, if not stated explicitly by, the information recorded;
        and personally identifiable information, such as account numbers, social security
        numbers, and credit card numbers. Error messages may also provide a covert
        channel for transmitting information.
      translations:
        pt:
          name: Tratamento de Erros
          description: "a. Gerar mensagens de erro que forne\xE7am as informa\xE7\xF5\
            es necess\xE1rias para a\xE7\xF5es corretivas sem revelar informa\xE7\xF5\
            es que possam ser exploradas; e\nb. Revelar mensagens de erro apenas a\
            \ [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o]."
          annotation: "As organiza\xE7\xF5es consideram a estrutura e o conte\xFA\
            do das mensagens de erro. A extens\xE3o em que os sistemas podem lidar\
            \ com condi\xE7\xF5es de erro \xE9 orientada e informada pela pol\xED\
            tica organizacional e pelos requisitos operacionais. Informa\xE7\xF5es\
            \ explor\xE1veis incluem rastreamentos de pilha (stack traces) e detalhes\
            \ de implementa\xE7\xE3o; tentativas de logon err\xF4neas com senhas digitadas\
            \ por engano como nome de usu\xE1rio; informa\xE7\xF5es de miss\xE3o ou\
            \ de neg\xF3cio que podem ser derivadas, se n\xE3o explicitamente declaradas,\
            \ das informa\xE7\xF5es registradas; e informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal, como n\xFAmeros de conta, n\xFAmeros de seguro social e\
            \ n\xFAmeros de cart\xE3o de cr\xE9dito. As mensagens de erro tamb\xE9\
            m podem fornecer um canal encoberto para a transmiss\xE3o de informa\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-12
      name: Information Management and Retention
      description: Manage and retain information within the system and information
        output from the system in accordance with applicable laws, executive orders,
        directives, regulations, policies, standards, guidelines and operational requirements.
      annotation: 'Information management and retention requirements cover the full
        life cycle of information, in some cases extending beyond system disposal.
        Information to be retained may also include policies, procedures, plans, reports,
        data output from control implementation, and other types of administrative
        information. The National Archives and Records Administration (NARA) provides
        federal policy and guidance on records retention and schedules. If organizations
        have a records management office, consider coordinating with records management
        personnel. Records produced from the output of implemented controls that may
        require management and retention include, but are not limited to: All XX-1,
        AC-6(9), AT-4, AU-12, CA-2, CA-3, CA-5, CA-6, CA-7, CA-8, CA-9, CM-2, CM-3,
        CM-4, CM-6, CM-8, CM-9, CM-12, CM-13, CP-2, IR-6, IR-8, MA-2, MA-4, PE-2,
        PE-8, PE-16, PE-17, PL-2, PL-4, PL-7, PL-8, PM-5, PM-8, PM-9, PM-18, PM-21,
        PM-27, PM-28, PM-30, PM-31, PS-2, PS-6, PS-7, PT-2, PT-3, PT-7, RA-2, RA-3,
        RA-5, RA-8, SA-4, SA-5, SA-8, SA-10, SI-4, SR-2, SR-4, SR-8.'
      translations:
        pt:
          name: "Gerenciamento e Reten\xE7\xE3o de Informa\xE7\xF5es"
          description: "Gerenciar e reter as informa\xE7\xF5es dentro do sistema e\
            \ as informa\xE7\xF5es geradas pelo sistema em conformidade com as leis,\
            \ ordens executivas, diretivas, regulamentos, pol\xEDticas, normas, diretrizes\
            \ e requisitos operacionais aplic\xE1veis."
          annotation: "Os requisitos de gerenciamento e reten\xE7\xE3o de informa\xE7\
            \xF5es abrangem todo o ciclo de vida da informa\xE7\xE3o, em alguns casos\
            \ estendendo-se al\xE9m do descarte do sistema. As informa\xE7\xF5es a\
            \ serem retidas tamb\xE9m podem incluir pol\xEDticas, procedimentos, planos,\
            \ relat\xF3rios, dados gerados a partir da implementa\xE7\xE3o de controles\
            \ e outros tipos de informa\xE7\xF5es administrativas. A National Archives\
            \ and Records Administration (NARA) fornece a pol\xEDtica e a orienta\xE7\
            \xE3o federal sobre reten\xE7\xE3o e cronogramas de registros. Se as organiza\xE7\
            \xF5es possu\xEDrem um escrit\xF3rio de gest\xE3o de registros, considere\
            \ a coordena\xE7\xE3o com o pessoal de gest\xE3o de registros. Os registros\
            \ produzidos a partir da sa\xEDda de controles implementados que podem\
            \ exigir gerenciamento e reten\xE7\xE3o incluem, mas n\xE3o se limitam\
            \ a: todos os XX-1, AC-6(9), AT-4, AU-12, CA-2, CA-3, CA-5, CA-6, CA-7,\
            \ CA-8, CA-9, CM-2, CM-3, CM-4, CM-6, CM-8, CM-9, CM-12, CM-13, CP-2,\
            \ IR-6, IR-8, MA-2, MA-4, PE-2, PE-8, PE-16, PE-17, PL-2, PL-4, PL-7,\
            \ PL-8, PM-5, PM-8, PM-9, PM-18, PM-21, PM-27, PM-28, PM-30, PM-31, PS-2,\
            \ PS-6, PS-7, PT-2, PT-3, PT-7, RA-2, RA-3, RA-5, RA-8, SA-4, SA-5, SA-8,\
            \ SA-10, SI-4, SR-2, SR-4, SR-8."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-12(1)
      name: Information Management and Retention | Limit Personally Identifiable Information
        Elements
      description: 'Limit personally identifiable information being processed in the
        information life cycle to the following elements of personally identifiable
        information: [Assignment: organization-defined elements of personally identifiable
        information].'
      annotation: Limiting the use of personally identifiable information throughout
        the information life cycle when the information is not needed for operational
        purposes helps to reduce the level of privacy risk created by a system. The
        information life cycle includes information creation, collection, use, processing,
        storage, maintenance, dissemination, disclosure, and disposition. Risk assessments
        as well as applicable laws, regulations, and policies can provide useful inputs
        to determining which elements of personally identifiable information may create
        risk.
      translations:
        pt:
          name: "Gerenciamento e Reten\xE7\xE3o de Informa\xE7\xF5es | Limitar Elementos\
            \ de Informa\xE7\xF5es de Identifica\xE7\xE3o Pessoal"
          description: "Limitar as informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ processadas no ciclo de vida da informa\xE7\xE3o aos seguintes elementos\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal: [Atribui\xE7\xE3\
            o: elementos de informa\xE7\xF5es de identifica\xE7\xE3o pessoal definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Limitar o uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ ao longo do ciclo de vida da informa\xE7\xE3o quando elas n\xE3o s\xE3\
            o necess\xE1rias para fins operacionais ajuda a reduzir o n\xEDvel de\
            \ risco de privacidade criado por um sistema. O ciclo de vida da informa\xE7\
            \xE3o inclui cria\xE7\xE3o, coleta, uso, processamento, armazenamento,\
            \ manuten\xE7\xE3o, dissemina\xE7\xE3o, divulga\xE7\xE3o e disposi\xE7\
            \xE3o da informa\xE7\xE3o. Avalia\xE7\xF5es de risco, bem como as leis,\
            \ regulamentos e pol\xEDticas aplic\xE1veis, podem fornecer subs\xEDdios\
            \ \xFAteis para determinar quais elementos de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal podem criar risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-12(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-12(2)
      name: Information Management and Retention | Minimize Personally Identifiable
        Information in Testing, Training, and Research
      description: 'Use the following techniques to minimize the use of personally
        identifiable information for research, testing, or training: [Assignment:
        organization-defined techniques].'
      annotation: "Organizations can minimize the risk to an individual\u2019s privacy\
        \ by employing techniques such as de-identification or synthetic data. Limiting\
        \ the use of personally identifiable information throughout the information\
        \ life cycle when the information is not needed for research, testing, or\
        \ training helps reduce the level of privacy risk created by a system. Risk\
        \ assessments as well as applicable laws, regulations, and policies can provide\
        \ useful inputs to determining the techniques to use and when to use them."
      translations:
        pt:
          name: "Gerenciamento e Reten\xE7\xE3o de Informa\xE7\xF5es | Minimizar Informa\xE7\
            \xF5es de Identifica\xE7\xE3o Pessoal em Testes, Treinamento e Pesquisa"
          description: "Usar as seguintes t\xE9cnicas para minimizar o uso de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal para pesquisa, testes ou treinamento:\
            \ [Atribui\xE7\xE3o: t\xE9cnicas definidas pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem minimizar o risco \xE0 privacidade\
            \ de um indiv\xEDduo empregando t\xE9cnicas como desidentifica\xE7\xE3\
            o ou dados sint\xE9ticos. Limitar o uso de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ao longo do ciclo de vida da informa\xE7\xE3o quando elas\
            \ n\xE3o s\xE3o necess\xE1rias para pesquisa, testes ou treinamento ajuda\
            \ a reduzir o n\xEDvel de risco de privacidade criado por um sistema.\
            \ Avalia\xE7\xF5es de risco, bem como as leis, regulamentos e pol\xED\
            ticas aplic\xE1veis, podem fornecer subs\xEDdios \xFAteis para determinar\
            \ as t\xE9cnicas a serem usadas e quando us\xE1-las."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-12(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-12(3)
      name: Information Management and Retention | Information Disposal
      description: 'Use the following techniques to dispose of, destroy, or erase
        information following the retention period: [Assignment: organization-defined
        techniques].'
      annotation: Organizations can minimize both security and privacy risks by disposing
        of information when it is no longer needed. The disposal or destruction of
        information applies to originals as well as copies and archived records, including
        system logs that may contain personally identifiable information.
      translations:
        pt:
          name: "Gerenciamento e Reten\xE7\xE3o de Informa\xE7\xF5es | Descarte de\
            \ Informa\xE7\xF5es"
          description: "Usar as seguintes t\xE9cnicas para descartar, destruir ou\
            \ apagar informa\xE7\xF5es ap\xF3s o per\xEDodo de reten\xE7\xE3o: [Atribui\xE7\
            \xE3o: t\xE9cnicas definidas pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem minimizar tanto os riscos de seguran\xE7\
            a quanto os de privacidade descartando as informa\xE7\xF5es quando elas\
            \ n\xE3o s\xE3o mais necess\xE1rias. O descarte ou a destrui\xE7\xE3o\
            \ de informa\xE7\xF5es aplica-se tanto aos originais quanto \xE0s c\xF3\
            pias e aos registros arquivados, incluindo logs do sistema que possam\
            \ conter informa\xE7\xF5es de identifica\xE7\xE3o pessoal."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-13
      name: Predictable Failure Prevention
      description: 'a. Determine mean time to failure (MTTF) for the following system
        components in specific environments of operation: [Assignment: organization-defined
        system components]; and

        b. Provide substitute system components and a means to exchange active and
        standby components in accordance with the following criteria: [Assignment:
        organization-defined MTTF substitution criteria].'
      annotation: While MTTF is primarily a reliability issue, predictable failure
        prevention is intended to address potential failures of system components
        that provide security capabilities. Failure rates reflect installation-specific
        consideration rather than the industry-average. Organizations define the criteria
        for the substitution of system components based on the MTTF value with consideration
        for the potential harm from component failures. The transfer of responsibilities
        between active and standby components does not compromise safety, operational
        readiness, or security capabilities. The preservation of system state variables
        is also critical to help ensure a successful transfer process. Standby components
        remain available at all times except for maintenance issues or recovery failures
        in progress.
      translations:
        pt:
          name: "Preven\xE7\xE3o de Falhas Previs\xEDveis"
          description: "a. Determinar o tempo m\xE9dio at\xE9 a falha (MTTF) para\
            \ os seguintes componentes do sistema em ambientes operacionais espec\xED\
            ficos: [Atribui\xE7\xE3o: componentes do sistema definidos pela organiza\xE7\
            \xE3o]; e\nb. Fornecer componentes substitutos do sistema e um meio de\
            \ troca entre componentes ativos e em espera (standby) de acordo com os\
            \ seguintes crit\xE9rios: [Atribui\xE7\xE3o: crit\xE9rios de substitui\xE7\
            \xE3o por MTTF definidos pela organiza\xE7\xE3o]."
          annotation: "Embora o MTTF seja primariamente uma quest\xE3o de confiabilidade,\
            \ a preven\xE7\xE3o de falhas previs\xEDveis destina-se a tratar potenciais\
            \ falhas de componentes do sistema que fornecem capacidades de seguran\xE7\
            a. As taxas de falha refletem considera\xE7\xF5es espec\xEDficas da instala\xE7\
            \xE3o, em vez da m\xE9dia do setor. As organiza\xE7\xF5es definem os crit\xE9\
            rios para a substitui\xE7\xE3o de componentes do sistema com base no valor\
            \ de MTTF, considerando o dano potencial decorrente de falhas de componentes.\
            \ A transfer\xEAncia de responsabilidades entre componentes ativos e em\
            \ espera n\xE3o compromete a seguran\xE7a operacional (safety), a prontid\xE3\
            o operacional ou as capacidades de seguran\xE7a. A preserva\xE7\xE3o das\
            \ vari\xE1veis de estado do sistema tamb\xE9m \xE9 cr\xEDtica para ajudar\
            \ a garantir um processo de transfer\xEAncia bem-sucedido. Os componentes\
            \ em espera permanecem dispon\xEDveis o tempo todo, exceto em casos de\
            \ quest\xF5es de manuten\xE7\xE3o ou falhas de recupera\xE7\xE3o em andamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-13(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-13(1)
      name: Predictable Failure Prevention | Transferring Component Responsibilities
      description: 'Take system components out of service by transferring component
        responsibilities to substitute components no later than [Assignment: organization-defined
        fraction or percentage] of mean time to failure.'
      annotation: Transferring primary system component responsibilities to other
        substitute components prior to primary component failure is important to reduce
        the risk of degraded or debilitated mission or business functions. Making
        such transfers based on a percentage of mean time to failure allows organizations
        to be proactive based on their risk tolerance. However, the premature replacement
        of system components can result in the increased cost of system operations.
      translations:
        pt:
          name: "Preven\xE7\xE3o de Falhas Previs\xEDveis | Transfer\xEAncia de Responsabilidades\
            \ de Componentes"
          description: "Retirar de servi\xE7o componentes do sistema transferindo\
            \ as responsabilidades do componente para componentes substitutos no m\xE1\
            ximo at\xE9 [Atribui\xE7\xE3o: fra\xE7\xE3o ou percentual definido pela\
            \ organiza\xE7\xE3o] do tempo m\xE9dio at\xE9 a falha."
          annotation: "Transferir as responsabilidades prim\xE1rias de um componente\
            \ do sistema para outros componentes substitutos antes da falha do componente\
            \ prim\xE1rio \xE9 importante para reduzir o risco de degrada\xE7\xE3\
            o ou debilita\xE7\xE3o de fun\xE7\xF5es de miss\xE3o ou de neg\xF3cio.\
            \ Realizar tais transfer\xEAncias com base em um percentual do tempo m\xE9\
            dio at\xE9 a falha permite que as organiza\xE7\xF5es sejam proativas conforme\
            \ sua toler\xE2ncia a riscos. No entanto, a substitui\xE7\xE3o prematura\
            \ de componentes do sistema pode resultar no aumento do custo de opera\xE7\
            \xE3o do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-9
      name: Information Input Restrictions
      description: '[Withdrawn: Incorporated into AC-2, AC-3, AC-5, and AC-6.]'
      translations:
        pt:
          name: "Restri\xE7\xF5es de Entrada de Informa\xE7\xF5es"
          description: '[Revogado: Incorporado em AC-2, AC-3, AC-5 e AC-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-13(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-13(3)
      name: Predictable Failure Prevention | Manual Transfer Between Components
      description: 'Manually initiate transfers between active and standby system
        components when the use of the active component reaches [Assignment: organization-defined
        percentage] of the mean time to failure.'
      annotation: For example, if the MTTF for a system component is 100 days and
        the MTTF percentage defined by the organization is 90 percent, the manual
        transfer would occur after 90 days.
      translations:
        pt:
          name: "Preven\xE7\xE3o de Falhas Previs\xEDveis | Transfer\xEAncia Manual\
            \ Entre Componentes"
          description: "Iniciar manualmente as transfer\xEAncias entre componentes\
            \ ativos e em espera do sistema quando o uso do componente ativo atingir\
            \ [Atribui\xE7\xE3o: percentual definido pela organiza\xE7\xE3o] do tempo\
            \ m\xE9dio at\xE9 a falha."
          annotation: "Por exemplo, se o MTTF de um componente do sistema for de 100\
            \ dias e o percentual de MTTF definido pela organiza\xE7\xE3o for de 90\
            \ por cento, a transfer\xEAncia manual ocorreria ap\xF3s 90 dias."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-13(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-13(4)
      name: Predictable Failure Prevention | Standby Component Installation and Notification
      description: 'If system component failures are detected:

        (a) Ensure that the standby components are successfully and transparently
        installed within [Assignment: organization-defined time period]; and

        (b) [Selection (one or more): Activate [Assignment: organization-defined alarm];
        Automatically shut down the system; [Assignment: organization-defined action]].'
      annotation: Automatic or manual transfer of components from standby to active
        mode can occur upon the detection of component failures.
      translations:
        pt:
          name: "Preven\xE7\xE3o de Falhas Previs\xEDveis | Instala\xE7\xE3o e Notifica\xE7\
            \xE3o de Componente em Espera"
          description: "Se forem detectadas falhas de componentes do sistema:\n(a)\
            \ Garantir que os componentes em espera sejam instalados com sucesso e\
            \ de forma transparente dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o]; e\n(b) [Sele\xE7\xE3o (um ou mais):\
            \ Ativar [Atribui\xE7\xE3o: alarme definido pela organiza\xE7\xE3o]; Desligar\
            \ automaticamente o sistema; [Atribui\xE7\xE3o: a\xE7\xE3o definida pela\
            \ organiza\xE7\xE3o]]."
          annotation: "A transfer\xEAncia autom\xE1tica ou manual de componentes do\
            \ modo em espera para o modo ativo pode ocorrer mediante a detec\xE7\xE3\
            o de falhas de componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-13(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-13(5)
      name: Predictable Failure Prevention | Failover Capability
      description: 'Provide [Selection: real-time; near real-time] [Assignment: organization-defined
        failover capability] for the system.'
      annotation: Failover refers to the automatic switchover to an alternate system
        upon the failure of the primary system. Failover capability includes incorporating
        mirrored system operations at alternate processing sites or periodic data
        mirroring at regular intervals defined by the recovery time periods of organizations.
      translations:
        pt:
          name: "Preven\xE7\xE3o de Falhas Previs\xEDveis | Capacidade de Failover"
          description: "Fornecer capacidade de failover [Sele\xE7\xE3o: em tempo real;\
            \ em tempo quase real] [Atribui\xE7\xE3o: capacidade de failover definida\
            \ pela organiza\xE7\xE3o] para o sistema."
          annotation: "Failover refere-se \xE0 comuta\xE7\xE3o autom\xE1tica para\
            \ um sistema alternativo mediante a falha do sistema prim\xE1rio. A capacidade\
            \ de failover inclui a incorpora\xE7\xE3o de opera\xE7\xF5es de sistema\
            \ espelhadas em locais de processamento alternativos ou o espelhamento\
            \ peri\xF3dico de dados em intervalos regulares definidos pelos per\xED\
            odos de tempo de recupera\xE7\xE3o das organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-14
      name: Non-persistence
      description: 'Implement non-persistent [Assignment: organization-defined system
        components and services] that are initiated in a known state and terminated
        [Selection (one or more): upon end of session of use; periodically at [Assignment:
        organization-defined frequency]].'
      annotation: 'Implementation of non-persistent components and services mitigates
        risk from advanced persistent threats (APTs) by reducing the targeting capability
        of adversaries (i.e., window of opportunity and available attack surface)
        to initiate and complete attacks. By implementing the concept of non-persistence
        for selected system components, organizations can provide a trusted, known
        state computing resource for a specific time period that does not give adversaries
        sufficient time to exploit vulnerabilities in organizational systems or operating
        environments. Since the APT is a high-end, sophisticated threat with regard
        to capability, intent, and targeting, organizations assume that over an extended
        period, a percentage of attacks will be successful. Non-persistent system
        components and services are activated as required using protected information
        and terminated periodically or at the end of sessions. Non-persistence increases
        the work factor of adversaries attempting to compromise or breach organizational
        systems.

        Non-persistence can be achieved by refreshing system components, periodically
        reimaging components, or using a variety of common virtualization techniques.
        Non-persistent services can be implemented by using virtualization techniques
        as part of virtual machines or as new instances of processes on physical machines
        (either persistent or non-persistent). The benefit of periodic refreshes of
        system components and services is that it does not require organizations to
        first determine whether compromises of components or services have occurred
        (something that may often be difficult to determine). The refresh of selected
        system components and services occurs with sufficient frequency to prevent
        the spread or intended impact of attacks, but not with such frequency that
        it makes the system unstable. Refreshes of critical components and services
        may be done periodically to hinder the ability of adversaries to exploit optimum
        windows of vulnerabilities.'
      translations:
        pt:
          name: "N\xE3o Persist\xEAncia"
          description: "Implementar [Atribui\xE7\xE3o: componentes e servi\xE7os do\
            \ sistema definidos pela organiza\xE7\xE3o] n\xE3o persistentes que sejam\
            \ iniciados em um estado conhecido e encerrados [Sele\xE7\xE3o (um ou\
            \ mais): ao fim da sess\xE3o de uso; periodicamente com [Atribui\xE7\xE3\
            o: frequ\xEAncia definida pela organiza\xE7\xE3o]]."
          annotation: "A implementa\xE7\xE3o de componentes e servi\xE7os n\xE3o persistentes\
            \ mitiga o risco de amea\xE7as persistentes avan\xE7adas (APTs) ao reduzir\
            \ a capacidade de direcionamento dos advers\xE1rios (ou seja, a janela\
            \ de oportunidade e a superf\xEDcie de ataque dispon\xEDvel) para iniciar\
            \ e concluir ataques. Ao implementar o conceito de n\xE3o persist\xEA\
            ncia para componentes selecionados do sistema, as organiza\xE7\xF5es podem\
            \ fornecer um recurso de computa\xE7\xE3o confi\xE1vel e em estado conhecido\
            \ por um per\xEDodo de tempo espec\xEDfico que n\xE3o d\xE1 aos advers\xE1\
            rios tempo suficiente para explorar vulnerabilidades nos sistemas organizacionais\
            \ ou nos ambientes operacionais. Como a APT \xE9 uma amea\xE7a sofisticada\
            \ e de alto n\xEDvel em termos de capacidade, inten\xE7\xE3o e direcionamento,\
            \ as organiza\xE7\xF5es assumem que, ao longo de um per\xEDodo prolongado,\
            \ um percentual dos ataques ser\xE1 bem-sucedido. Componentes e servi\xE7\
            os n\xE3o persistentes do sistema s\xE3o ativados conforme necess\xE1\
            rio usando informa\xE7\xF5es protegidas e encerrados periodicamente ou\
            \ ao fim das sess\xF5es. A n\xE3o persist\xEAncia aumenta o fator de trabalho\
            \ dos advers\xE1rios que tentam comprometer ou violar os sistemas organizacionais.\n\
            A n\xE3o persist\xEAncia pode ser alcan\xE7ada atualizando componentes\
            \ do sistema, reimaginando (reimaging) componentes periodicamente ou usando\
            \ uma variedade de t\xE9cnicas comuns de virtualiza\xE7\xE3o. Servi\xE7\
            os n\xE3o persistentes podem ser implementados usando t\xE9cnicas de virtualiza\xE7\
            \xE3o como parte de m\xE1quinas virtuais ou como novas inst\xE2ncias de\
            \ processos em m\xE1quinas f\xEDsicas (persistentes ou n\xE3o persistentes).\
            \ O benef\xEDcio das atualiza\xE7\xF5es peri\xF3dicas de componentes e\
            \ servi\xE7os do sistema \xE9 que n\xE3o exige que as organiza\xE7\xF5\
            es determinem primeiro se ocorreram comprometimentos de componentes ou\
            \ servi\xE7os (algo que muitas vezes pode ser dif\xEDcil de determinar).\
            \ A atualiza\xE7\xE3o de componentes e servi\xE7os selecionados do sistema\
            \ ocorre com frequ\xEAncia suficiente para impedir a propaga\xE7\xE3o\
            \ ou o impacto pretendido dos ataques, mas n\xE3o com frequ\xEAncia tal\
            \ que torne o sistema inst\xE1vel. As atualiza\xE7\xF5es de componentes\
            \ e servi\xE7os cr\xEDticos podem ser realizadas periodicamente para dificultar\
            \ a capacidade dos advers\xE1rios de explorar janelas \xF3timas de vulnerabilidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-14(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-14(1)
      name: Non-persistence | Refresh from Trusted Sources
      description: 'Obtain software and data employed during system component and
        service refreshes from the following trusted sources: [Assignment: organization-defined
        trusted sources].'
      annotation: Trusted sources include software and data from write-once, read-only
        media or from selected offline secure storage facilities.
      translations:
        pt:
          name: "N\xE3o Persist\xEAncia | Atualiza\xE7\xE3o a Partir de Fontes Confi\xE1\
            veis"
          description: "Obter software e dados empregados durante as atualiza\xE7\xF5\
            es de componentes e servi\xE7os do sistema das seguintes fontes confi\xE1\
            veis: [Atribui\xE7\xE3o: fontes confi\xE1veis definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Fontes confi\xE1veis incluem software e dados provenientes\
            \ de m\xEDdia de grava\xE7\xE3o \xFAnica e somente leitura (write-once,\
            \ read-only) ou de instala\xE7\xF5es de armazenamento seguro offline selecionadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-14(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-14(2)
      name: Non-persistence | Non-persistent Information
      description: '(a) [Selection: Refresh [Assignment: organization-defined information][Assignment:
        organization-defined frequency]; Generate [Assignment: organization-defined
        information] on demand]; and

        (b) Delete information when no longer needed.'
      annotation: Retaining information longer than is needed makes the information
        a potential target for advanced adversaries searching for high value assets
        to compromise through unauthorized disclosure, unauthorized modification,
        or exfiltration. For system-related information, unnecessary retention provides
        advanced adversaries information that can assist in their reconnaissance and
        lateral movement through the system.
      translations:
        pt:
          name: "N\xE3o Persist\xEAncia | Informa\xE7\xF5es N\xE3o Persistentes"
          description: "(a) [Sele\xE7\xE3o: Atualizar [Atribui\xE7\xE3o: informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o] [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o]; Gerar [Atribui\xE7\xE3o: informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o] sob demanda]; e\n(b) Excluir\
            \ as informa\xE7\xF5es quando n\xE3o forem mais necess\xE1rias."
          annotation: "Reter informa\xE7\xF5es por mais tempo do que o necess\xE1\
            rio torna as informa\xE7\xF5es um alvo potencial para advers\xE1rios avan\xE7\
            ados que buscam ativos de alto valor para comprometer por meio de divulga\xE7\
            \xE3o n\xE3o autorizada, modifica\xE7\xE3o n\xE3o autorizada ou exfiltra\xE7\
            \xE3o. No caso de informa\xE7\xF5es relacionadas ao sistema, a reten\xE7\
            \xE3o desnecess\xE1ria fornece aos advers\xE1rios avan\xE7ados informa\xE7\
            \xF5es que podem auxiliar em seu reconhecimento e movimenta\xE7\xE3o lateral\
            \ pelo sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-14(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-14(3)
      name: Non-persistence | Non-persistent Connectivity
      description: 'Establish connections to the system on demand and terminate connections
        after [Selection: completion of a request; a period of non-use].'
      annotation: "Persistent connections to systems can provide advanced adversaries\
        \ with paths to move laterally through systems and potentially position themselves\
        \ closer to high value assets. Limiting the availability of such connections\
        \ impedes the adversary\u2019s ability to move freely through organizational\
        \ systems."
      translations:
        pt:
          name: "N\xE3o Persist\xEAncia | Conectividade N\xE3o Persistente"
          description: "Estabelecer conex\xF5es ao sistema sob demanda e encerrar\
            \ conex\xF5es ap\xF3s [Sele\xE7\xE3o: a conclus\xE3o de uma solicita\xE7\
            \xE3o; um per\xEDodo de n\xE3o uso]."
          annotation: "Conex\xF5es persistentes a sistemas podem fornecer aos advers\xE1\
            rios avan\xE7ados caminhos para se moverem lateralmente pelos sistemas\
            \ e potencialmente se posicionarem mais perto de ativos de alto valor.\
            \ Limitar a disponibilidade de tais conex\xF5es dificulta a capacidade\
            \ do advers\xE1rio de se mover livremente pelos sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-15
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-15
      name: Information Output Filtering
      description: 'Validate information output from the following software programs
        and/or applications to ensure that the information is consistent with the
        expected content: [Assignment: organization-defined software programs and/or
        applications].'
      annotation: Certain types of attacks, including SQL injections, produce output
        results that are unexpected or inconsistent with the output results that would
        be expected from software programs or applications. Information output filtering
        focuses on detecting extraneous content, preventing such extraneous content
        from being displayed, and then alerting monitoring tools that anomalous behavior
        has been discovered.
      translations:
        pt:
          name: "Filtragem de Sa\xEDda de Informa\xE7\xF5es"
          description: "Validar a sa\xEDda de informa\xE7\xF5es dos seguintes programas\
            \ de software e/ou aplica\xE7\xF5es para garantir que as informa\xE7\xF5\
            es sejam consistentes com o conte\xFAdo esperado: [Atribui\xE7\xE3o: programas\
            \ de software e/ou aplica\xE7\xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "Certos tipos de ataques, incluindo inje\xE7\xF5es de SQL, produzem\
            \ resultados de sa\xEDda inesperados ou inconsistentes com os resultados\
            \ de sa\xEDda que seriam esperados de programas de software ou aplica\xE7\
            \xF5es. A filtragem de sa\xEDda de informa\xE7\xF5es concentra-se em detectar\
            \ conte\xFAdo estranho, impedir que tal conte\xFAdo estranho seja exibido\
            \ e, em seguida, alertar as ferramentas de monitoramento de que foi descoberto\
            \ comportamento an\xF4malo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-16
      name: Memory Protection
      description: 'Implement the following controls to protect the system memory
        from unauthorized code execution: [Assignment: organization-defined controls].'
      annotation: Some adversaries launch attacks with the intent of executing code
        in non-executable regions of memory or in memory locations that are prohibited.
        Controls employed to protect memory include data execution prevention and
        address space layout randomization. Data execution prevention controls can
        either be hardware-enforced or software-enforced with hardware enforcement
        providing the greater strength of mechanism.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Mem\xF3ria"
          description: "Implementar os seguintes controles para proteger a mem\xF3\
            ria do sistema contra execu\xE7\xE3o de c\xF3digo n\xE3o autorizada: [Atribui\xE7\
            \xE3o: controles definidos pela organiza\xE7\xE3o]."
          annotation: "Alguns advers\xE1rios lan\xE7am ataques com a inten\xE7\xE3\
            o de executar c\xF3digo em regi\xF5es n\xE3o execut\xE1veis da mem\xF3\
            ria ou em locais de mem\xF3ria que s\xE3o proibidos. Os controles empregados\
            \ para proteger a mem\xF3ria incluem a preven\xE7\xE3o de execu\xE7\xE3\
            o de dados (data execution prevention) e a aleatoriza\xE7\xE3o do layout\
            \ do espa\xE7o de endere\xE7os (address space layout randomization). Os\
            \ controles de preven\xE7\xE3o de execu\xE7\xE3o de dados podem ser impostos\
            \ por hardware ou por software, sendo que a imposi\xE7\xE3o por hardware\
            \ proporciona maior robustez do mecanismo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-17
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-17
      name: Fail-safe Procedures
      description: 'Implement the indicated fail-safe procedures when the indicated
        failures occur: [Assignment: organization-defined list of failure conditions
        and associated fail-safe procedures].'
      annotation: Failure conditions include the loss of communications among critical
        system components or between system components and operational facilities.
        Fail-safe procedures include alerting operator personnel and providing specific
        instructions on subsequent steps to take. Subsequent steps may include doing
        nothing, reestablishing system settings, shutting down processes, restarting
        the system, or contacting designated organizational personnel.
      translations:
        pt:
          name: "Procedimentos \xE0 Prova de Falhas (Fail-safe)"
          description: "Implementar os procedimentos \xE0 prova de falhas indicados\
            \ quando ocorrerem as falhas indicadas: [Atribui\xE7\xE3o: lista de condi\xE7\
            \xF5es de falha e procedimentos \xE0 prova de falhas associados definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "As condi\xE7\xF5es de falha incluem a perda de comunica\xE7\
            \xF5es entre componentes cr\xEDticos do sistema ou entre componentes do\
            \ sistema e instala\xE7\xF5es operacionais. Os procedimentos \xE0 prova\
            \ de falhas incluem alertar o pessoal operador e fornecer instru\xE7\xF5\
            es espec\xEDficas sobre as etapas subsequentes a serem tomadas. As etapas\
            \ subsequentes podem incluir n\xE3o fazer nada, restabelecer as configura\xE7\
            \xF5es do sistema, encerrar processos, reiniciar o sistema ou contatar\
            \ o pessoal organizacional designado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-18
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-18
      name: Personally Identifiable Information Quality Operations
      description: 'a. Check the accuracy, relevance, timeliness, and completeness
        of personally identifiable information across the information life cycle [Assignment:
        organization-defined frequency]; and

        b. Correct or delete inaccurate or outdated personally identifiable information.'
      annotation: Personally identifiable information quality operations include the
        steps that organizations take to confirm the accuracy and relevance of personally
        identifiable information throughout the information life cycle. The information
        life cycle includes the creation, collection, use, processing, storage, maintenance,
        dissemination, disclosure, and disposal of personally identifiable information.
        Personally identifiable information quality operations include editing and
        validating addresses as they are collected or entered into systems using automated
        address verification look-up application programming interfaces. Checking
        personally identifiable information quality includes the tracking of updates
        or changes to data over time, which enables organizations to know how and
        what personally identifiable information was changed should erroneous information
        be identified. The measures taken to protect personally identifiable information
        quality are based on the nature and context of the personally identifiable
        information, how it is to be used, how it was obtained, and the potential
        de-identification methods employed. The measures taken to validate the accuracy
        of personally identifiable information used to make determinations about the
        rights, benefits, or privileges of individuals covered under federal programs
        may be more comprehensive than the measures used to validate personally identifiable
        information used for less sensitive purposes.
      translations:
        pt:
          name: "Opera\xE7\xF5es de Qualidade de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal"
          description: "a. Verificar a exatid\xE3o, relev\xE2ncia, atualidade e integridade\
            \ das informa\xE7\xF5es de identifica\xE7\xE3o pessoal ao longo do ciclo\
            \ de vida da informa\xE7\xE3o [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]; e\nb. Corrigir ou excluir informa\xE7\xF5es\
            \ de identifica\xE7\xE3o pessoal imprecisas ou desatualizadas."
          annotation: "As opera\xE7\xF5es de qualidade de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal incluem as etapas que as organiza\xE7\xF5es tomam para confirmar\
            \ a exatid\xE3o e a relev\xE2ncia das informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ao longo do ciclo de vida da informa\xE7\xE3o. O ciclo de\
            \ vida da informa\xE7\xE3o inclui a cria\xE7\xE3o, coleta, uso, processamento,\
            \ armazenamento, manuten\xE7\xE3o, dissemina\xE7\xE3o, divulga\xE7\xE3\
            o e descarte das informa\xE7\xF5es de identifica\xE7\xE3o pessoal. As\
            \ opera\xE7\xF5es de qualidade de informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal incluem a edi\xE7\xE3o e valida\xE7\xE3o de endere\xE7os \xE0\
            \ medida que s\xE3o coletados ou inseridos nos sistemas usando interfaces\
            \ de programa\xE7\xE3o de aplica\xE7\xF5es (APIs) automatizadas de consulta\
            \ de verifica\xE7\xE3o de endere\xE7os. A verifica\xE7\xE3o da qualidade\
            \ das informa\xE7\xF5es de identifica\xE7\xE3o pessoal inclui o rastreamento\
            \ de atualiza\xE7\xF5es ou altera\xE7\xF5es nos dados ao longo do tempo,\
            \ o que permite que as organiza\xE7\xF5es saibam como e quais informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal foram alteradas caso informa\xE7\
            \xF5es err\xF4neas sejam identificadas. As medidas tomadas para proteger\
            \ a qualidade das informa\xE7\xF5es de identifica\xE7\xE3o pessoal baseiam-se\
            \ na natureza e no contexto das informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal, em como elas ser\xE3o usadas, em como foram obtidas e nos potenciais\
            \ m\xE9todos de desidentifica\xE7\xE3o empregados. As medidas tomadas\
            \ para validar a exatid\xE3o das informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal usadas para tomar decis\xF5es sobre direitos, benef\xEDcios\
            \ ou privil\xE9gios de indiv\xEDduos abrangidos por programas federais\
            \ podem ser mais abrangentes do que as medidas usadas para validar informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal usadas para fins menos sens\xED\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-18(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-18(1)
      name: Personally Identifiable Information Quality Operations | Automation Support
      description: 'Correct or delete personally identifiable information that is
        inaccurate or outdated, incorrectly determined regarding impact, or incorrectly
        de-identified using [Assignment: organization-defined automated mechanisms].'
      annotation: 'The use of automated mechanisms to improve data quality may inadvertently
        create privacy risks. Automated tools may connect to external or otherwise
        unrelated systems, and the matching of records between these systems may create
        linkages with unintended consequences. Organizations assess and document these
        risks in their privacy impact assessments and make determinations that are
        in alignment with their privacy program plans.

        As data is obtained and used across the information life cycle, it is important
        to confirm the accuracy and relevance of personally identifiable information.
        Automated mechanisms can augment existing data quality processes and procedures
        and enable an organization to better identify and manage personally identifiable
        information in large-scale systems. For example, automated tools can greatly
        improve efforts to consistently normalize data or identify malformed data.
        Automated tools can also be used to improve the auditing of data and detect
        errors that may incorrectly alter personally identifiable information or incorrectly
        associate such information with the wrong individual. Automated capabilities
        backstop processes and procedures at-scale and enable more fine-grained detection
        and correction of data quality errors.'
      translations:
        pt:
          name: "Opera\xE7\xF5es de Qualidade de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal | Suporte de Automa\xE7\xE3o"
          description: "Corrigir ou excluir informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal que sejam imprecisas ou desatualizadas, determinadas incorretamente\
            \ quanto ao impacto ou desidentificadas incorretamente usando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "O uso de mecanismos automatizados para melhorar a qualidade\
            \ dos dados pode criar inadvertidamente riscos de privacidade. Ferramentas\
            \ automatizadas podem se conectar a sistemas externos ou de outra forma\
            \ n\xE3o relacionados, e a correspond\xEAncia de registros entre esses\
            \ sistemas pode criar v\xEDnculos com consequ\xEAncias n\xE3o intencionais.\
            \ As organiza\xE7\xF5es avaliam e documentam esses riscos em suas avalia\xE7\
            \xF5es de impacto \xE0 privacidade e tomam decis\xF5es alinhadas aos seus\
            \ planos de programa de privacidade.\n\xC0 medida que os dados s\xE3o\
            \ obtidos e usados ao longo do ciclo de vida da informa\xE7\xE3o, \xE9\
            \ importante confirmar a exatid\xE3o e a relev\xE2ncia das informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal. Mecanismos automatizados podem\
            \ complementar os processos e procedimentos de qualidade de dados existentes\
            \ e permitir que uma organiza\xE7\xE3o identifique e gerencie melhor as\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal em sistemas de grande\
            \ escala. Por exemplo, ferramentas automatizadas podem melhorar significativamente\
            \ os esfor\xE7os para normalizar dados de forma consistente ou identificar\
            \ dados malformados. Ferramentas automatizadas tamb\xE9m podem ser usadas\
            \ para melhorar a auditoria de dados e detectar erros que possam alterar\
            \ incorretamente informa\xE7\xF5es de identifica\xE7\xE3o pessoal ou associar\
            \ incorretamente tais informa\xE7\xF5es ao indiv\xEDduo errado. As capacidades\
            \ automatizadas d\xE3o suporte aos processos e procedimentos em escala\
            \ e permitem uma detec\xE7\xE3o e corre\xE7\xE3o mais granular de erros\
            \ de qualidade de dados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-18(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-18(2)
      name: Personally Identifiable Information Quality Operations | Data Tags
      description: Employ data tags to automate the correction or deletion of personally
        identifiable information across the information life cycle within organizational
        systems.
      annotation: Data tagging personally identifiable information includes tags that
        note processing permissions, authority to process, de-identification, impact
        level, information life cycle stage, and retention or last updated dates.
        Employing data tags for personally identifiable information can support the
        use of automation tools to correct or delete relevant personally identifiable
        information.
      translations:
        pt:
          name: "Opera\xE7\xF5es de Qualidade de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal | R\xF3tulos de Dados"
          description: "Empregar r\xF3tulos de dados (data tags) para automatizar\
            \ a corre\xE7\xE3o ou exclus\xE3o de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal ao longo do ciclo de vida da informa\xE7\xE3o dentro dos\
            \ sistemas organizacionais."
          annotation: "A rotulagem de dados de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal inclui r\xF3tulos que indicam permiss\xF5es de processamento,\
            \ autoridade para processar, desidentifica\xE7\xE3o, n\xEDvel de impacto,\
            \ est\xE1gio do ciclo de vida da informa\xE7\xE3o e datas de reten\xE7\
            \xE3o ou de \xFAltima atualiza\xE7\xE3o. O emprego de r\xF3tulos de dados\
            \ para informa\xE7\xF5es de identifica\xE7\xE3o pessoal pode apoiar o\
            \ uso de ferramentas de automa\xE7\xE3o para corrigir ou excluir informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal relevantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-18(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-18(3)
      name: Personally Identifiable Information Quality Operations | Collection
      description: Collect personally identifiable information directly from the individual.
      annotation: Individuals or their designated representatives can be sources of
        correct personally identifiable information. Organizations consider contextual
        factors that may incentivize individuals to provide correct data versus false
        data. Additional steps may be necessary to validate collected information
        based on the nature and context of the personally identifiable information,
        how it is to be used, and how it was obtained. The measures taken to validate
        the accuracy of personally identifiable information used to make determinations
        about the rights, benefits, or privileges of individuals under federal programs
        may be more comprehensive than the measures taken to validate less sensitive
        personally identifiable information.
      translations:
        pt:
          name: "Opera\xE7\xF5es de Qualidade de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal | Coleta"
          description: "Coletar informa\xE7\xF5es de identifica\xE7\xE3o pessoal diretamente\
            \ do indiv\xEDduo."
          annotation: "Os indiv\xEDduos ou seus representantes designados podem ser\
            \ fontes de informa\xE7\xF5es de identifica\xE7\xE3o pessoal corretas.\
            \ As organiza\xE7\xF5es consideram fatores contextuais que possam incentivar\
            \ os indiv\xEDduos a fornecer dados corretos em vez de dados falsos. Etapas\
            \ adicionais podem ser necess\xE1rias para validar as informa\xE7\xF5\
            es coletadas com base na natureza e no contexto das informa\xE7\xF5es\
            \ de identifica\xE7\xE3o pessoal, em como elas ser\xE3o usadas e em como\
            \ foram obtidas. As medidas tomadas para validar a exatid\xE3o das informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal usadas para tomar decis\xF5es sobre\
            \ direitos, benef\xEDcios ou privil\xE9gios de indiv\xEDduos no \xE2mbito\
            \ de programas federais podem ser mais abrangentes do que as medidas tomadas\
            \ para validar informa\xE7\xF5es de identifica\xE7\xE3o pessoal menos\
            \ sens\xEDveis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-18(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-18(4)
      name: Personally Identifiable Information Quality Operations | Individual Requests
      description: Correct or delete personally identifiable information upon request
        by individuals or their designated representatives.
      annotation: Inaccurate personally identifiable information maintained by organizations
        may cause problems for individuals, especially in those business functions
        where inaccurate information may result in inappropriate decisions or the
        denial of benefits and services to individuals. Even correct information,
        in certain circumstances, can cause problems for individuals that outweigh
        the benefits of an organization maintaining the information. Organizations
        use discretion when determining if personally identifiable information is
        to be corrected or deleted based on the scope of requests, the changes sought,
        the impact of the changes, and laws, regulations, and policies. Organizational
        personnel consult with the senior agency official for privacy and legal counsel
        regarding appropriate instances of correction or deletion.
      translations:
        pt:
          name: "Opera\xE7\xF5es de Qualidade de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal | Solicita\xE7\xF5es de Indiv\xEDduos"
          description: "Corrigir ou excluir informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal mediante solicita\xE7\xE3o de indiv\xEDduos ou de seus representantes\
            \ designados."
          annotation: "Informa\xE7\xF5es de identifica\xE7\xE3o pessoal imprecisas\
            \ mantidas pelas organiza\xE7\xF5es podem causar problemas para os indiv\xED\
            duos, especialmente nas fun\xE7\xF5es de neg\xF3cio em que informa\xE7\
            \xF5es imprecisas podem resultar em decis\xF5es inadequadas ou na nega\xE7\
            \xE3o de benef\xEDcios e servi\xE7os aos indiv\xEDduos. Mesmo informa\xE7\
            \xF5es corretas, em determinadas circunst\xE2ncias, podem causar problemas\
            \ para os indiv\xEDduos que superam os benef\xEDcios de uma organiza\xE7\
            \xE3o manter as informa\xE7\xF5es. As organiza\xE7\xF5es usam discri\xE7\
            \xE3o ao determinar se as informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ devem ser corrigidas ou exclu\xEDdas com base no escopo das solicita\xE7\
            \xF5es, nas altera\xE7\xF5es pretendidas, no impacto das altera\xE7\xF5\
            es e em leis, regulamentos e pol\xEDticas. O pessoal organizacional consulta\
            \ o funcion\xE1rio s\xEAnior da ag\xEAncia respons\xE1vel pela privacidade\
            \ e a assessoria jur\xEDdica quanto aos casos apropriados de corre\xE7\
            \xE3o ou exclus\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-18(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-18(5)
      name: Personally Identifiable Information Quality Operations | Notice of Correction
        or Deletion
      description: 'Notify [Assignment: organization-defined recipients of personally
        identifiable information] and individuals that the personally identifiable
        information has been corrected or deleted.'
      annotation: When personally identifiable information is corrected or deleted,
        organizations take steps to ensure that all authorized recipients of such
        information, and the individual with whom the information is associated or
        their designated representatives, are informed of the corrected or deleted
        information.
      translations:
        pt:
          name: "Opera\xE7\xF5es de Qualidade de Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal | Notifica\xE7\xE3o de Corre\xE7\xE3o ou Exclus\xE3o"
          description: "Notificar [Atribui\xE7\xE3o: destinat\xE1rios de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal definidos pela organiza\xE7\xE3\
            o] e os indiv\xEDduos de que as informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal foram corrigidas ou exclu\xEDdas."
          annotation: "Quando as informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ s\xE3o corrigidas ou exclu\xEDdas, as organiza\xE7\xF5es tomam medidas\
            \ para garantir que todos os destinat\xE1rios autorizados de tais informa\xE7\
            \xF5es, e o indiv\xEDduo a quem as informa\xE7\xF5es est\xE3o associadas\
            \ ou seus representantes designados, sejam informados sobre as informa\xE7\
            \xF5es corrigidas ou exclu\xEDdas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19
      name: De-identification
      description: 'a. Remove the following elements of personally identifiable information
        from datasets: [Assignment: organization-defined elements of personally identifiable
        information]; and

        b. Evaluate [Assignment: organization-defined frequency] for effectiveness
        of de-identification.'
      annotation: "De-identification is the general term for the process of removing\
        \ the association between a set of identifying data and the data subject.\
        \ Many datasets contain information about individuals that can be used to\
        \ distinguish or trace an individual\u2019s identity, such as name, social\
        \ security number, date and place of birth, mother\u2019s maiden name, or\
        \ biometric records. Datasets may also contain other information that is linked\
        \ or linkable to an individual, such as medical, educational, financial, and\
        \ employment information. Personally identifiable information is removed from\
        \ datasets by trained individuals when such information is not (or no longer)\
        \ necessary to satisfy the requirements envisioned for the data. For example,\
        \ if the dataset is only used to produce aggregate statistics, the identifiers\
        \ that are not needed for producing those statistics are removed. Removing\
        \ identifiers improves privacy protection since information that is removed\
        \ cannot be inadvertently disclosed or improperly used. Organizations may\
        \ be subject to specific de-identification definitions or methods under applicable\
        \ laws, regulations, or policies. Re-identification is a residual risk with\
        \ de-identified data. Re-identification attacks can vary, including combining\
        \ new datasets or other improvements in data analytics. Maintaining awareness\
        \ of potential attacks and evaluating for the effectiveness of the de-identification\
        \ over time support the management of this residual risk."
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o"
          description: "a. Remover os seguintes elementos de informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal dos conjuntos de dados: [Atribui\xE7\xE3\
            o: elementos de informa\xE7\xF5es de identifica\xE7\xE3o pessoal definidos\
            \ pela organiza\xE7\xE3o]; e\nb. Avaliar [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] a efic\xE1cia da desidentifica\xE7\
            \xE3o."
          annotation: "Desidentifica\xE7\xE3o \xE9 o termo geral para o processo de\
            \ remo\xE7\xE3o da associa\xE7\xE3o entre um conjunto de dados de identifica\xE7\
            \xE3o e o titular dos dados. Muitos conjuntos de dados cont\xEAm informa\xE7\
            \xF5es sobre indiv\xEDduos que podem ser usadas para distinguir ou rastrear\
            \ a identidade de um indiv\xEDduo, como nome, n\xFAmero de seguro social,\
            \ data e local de nascimento, nome de solteira da m\xE3e ou registros\
            \ biom\xE9tricos. Os conjuntos de dados tamb\xE9m podem conter outras\
            \ informa\xE7\xF5es vinculadas ou vincul\xE1veis a um indiv\xEDduo, como\
            \ informa\xE7\xF5es m\xE9dicas, educacionais, financeiras e de emprego.\
            \ As informa\xE7\xF5es de identifica\xE7\xE3o pessoal s\xE3o removidas\
            \ dos conjuntos de dados por indiv\xEDduos treinados quando tais informa\xE7\
            \xF5es n\xE3o s\xE3o (ou deixaram de ser) necess\xE1rias para atender\
            \ aos requisitos previstos para os dados. Por exemplo, se o conjunto de\
            \ dados \xE9 usado apenas para produzir estat\xEDsticas agregadas, os\
            \ identificadores que n\xE3o s\xE3o necess\xE1rios para produzir essas\
            \ estat\xEDsticas s\xE3o removidos. A remo\xE7\xE3o de identificadores\
            \ melhora a prote\xE7\xE3o da privacidade, uma vez que as informa\xE7\xF5\
            es removidas n\xE3o podem ser divulgadas inadvertidamente ou usadas indevidamente.\
            \ As organiza\xE7\xF5es podem estar sujeitas a defini\xE7\xF5es ou m\xE9\
            todos espec\xEDficos de desidentifica\xE7\xE3o sob leis, regulamentos\
            \ ou pol\xEDticas aplic\xE1veis. A reidentifica\xE7\xE3o \xE9 um risco\
            \ residual com dados desidentificados. Os ataques de reidentifica\xE7\xE3\
            o podem variar, incluindo a combina\xE7\xE3o de novos conjuntos de dados\
            \ ou outros avan\xE7os na an\xE1lise de dados. Manter a consci\xEAncia\
            \ sobre potenciais ataques e avaliar a efic\xE1cia da desidentifica\xE7\
            \xE3o ao longo do tempo apoiam a gest\xE3o desse risco residual."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(1)
      name: De-identification | Collection
      description: De-identify the dataset upon collection by not collecting personally
        identifiable information.
      annotation: If a data source contains personally identifiable information but
        the information will not be used, the dataset can be de-identified when it
        is created by not collecting the data elements that contain the personally
        identifiable information. For example, if an organization does not intend
        to use the social security number of an applicant, then application forms
        do not ask for a social security number.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Coleta"
          description: "Desidentificar o conjunto de dados no momento da coleta deixando\
            \ de coletar informa\xE7\xF5es de identifica\xE7\xE3o pessoal."
          annotation: "Se uma fonte de dados cont\xE9m informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal, mas as informa\xE7\xF5es n\xE3o ser\xE3o usadas, o conjunto\
            \ de dados pode ser desidentificado quando \xE9 criado deixando de coletar\
            \ os elementos de dados que cont\xEAm as informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal. Por exemplo, se uma organiza\xE7\xE3o n\xE3o pretende usar\
            \ o n\xFAmero de seguro social de um candidato, os formul\xE1rios de inscri\xE7\
            \xE3o n\xE3o solicitam um n\xFAmero de seguro social."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(2)
      name: De-identification | Archiving
      description: Prohibit archiving of personally identifiable information elements
        if those elements in a dataset will not be needed after the dataset is archived.
      annotation: Datasets can be archived for many reasons. The envisioned purposes
        for the archived dataset are specified, and if personally identifiable information
        elements are not required, the elements are not archived. For example, social
        security numbers may have been collected for record linkage, but the archived
        dataset may include the required elements from the linked records. In this
        case, it is not necessary to archive the social security numbers.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Arquivamento"
          description: "Proibir o arquivamento de elementos de informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal se esses elementos em um conjunto de dados\
            \ n\xE3o forem necess\xE1rios ap\xF3s o conjunto de dados ser arquivado."
          annotation: "Os conjuntos de dados podem ser arquivados por muitas raz\xF5\
            es. As finalidades previstas para o conjunto de dados arquivado s\xE3\
            o especificadas e, se os elementos de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal n\xE3o forem necess\xE1rios, os elementos n\xE3o s\xE3o\
            \ arquivados. Por exemplo, n\xFAmeros de seguro social podem ter sido\
            \ coletados para vincula\xE7\xE3o de registros, mas o conjunto de dados\
            \ arquivado pode incluir os elementos necess\xE1rios dos registros vinculados.\
            \ Nesse caso, n\xE3o \xE9 necess\xE1rio arquivar os n\xFAmeros de seguro\
            \ social."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(3)
      name: De-identification | Release
      description: Remove personally identifiable information elements from a dataset
        prior to its release if those elements in the dataset do not need to be part
        of the data release.
      annotation: Prior to releasing a dataset, a data custodian considers the intended
        uses of the dataset and determines if it is necessary to release personally
        identifiable information. If the personally identifiable information is not
        necessary, the information can be removed using de-identification techniques.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Divulga\xE7\xE3o"
          description: "Remover elementos de informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal de um conjunto de dados antes de sua divulga\xE7\xE3o se esses\
            \ elementos no conjunto de dados n\xE3o precisarem fazer parte da divulga\xE7\
            \xE3o dos dados."
          annotation: "Antes de divulgar um conjunto de dados, um custodiante de dados\
            \ considera os usos pretendidos do conjunto de dados e determina se \xE9\
            \ necess\xE1rio divulgar as informa\xE7\xF5es de identifica\xE7\xE3o pessoal.\
            \ Se as informa\xE7\xF5es de identifica\xE7\xE3o pessoal n\xE3o forem\
            \ necess\xE1rias, as informa\xE7\xF5es podem ser removidas usando t\xE9\
            cnicas de desidentifica\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(4)
      name: De-identification | Removal, Masking, Encryption, Hashing, or Replacement
        of Direct Identifiers
      description: Remove, mask, encrypt, hash, or replace direct identifiers in a
        dataset.
      annotation: There are many possible processes for removing direct identifiers
        from a dataset. Columns in a dataset that contain a direct identifier can
        be removed. In masking, the direct identifier is transformed into a repeating
        character, such as XXXXXX or 999999.  Identifiers can be encrypted or hashed
        so that the linked records remain linked. In the case of encryption or hashing,
        algorithms are employed that require the use of a key, including the Advanced
        Encryption Standard or a Hash-based Message Authentication Code. Implementations
        may use the same key for all identifiers or use a different key for each identifier.
        Using a different key for each identifier provides a higher degree of security
        and privacy. Identifiers can alternatively be replaced with a keyword, including
        transforming George Washington to PATIENT or replacing it with a surrogate
        value, such as transforming George Washington to Abraham Polk.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Remo\xE7\xE3o, Mascaramento, Criptografia,\
            \ Hashing ou Substitui\xE7\xE3o de Identificadores Diretos"
          description: Remover, mascarar, criptografar, aplicar hash ou substituir
            identificadores diretos em um conjunto de dados.
          annotation: "Existem muitos processos poss\xEDveis para remover identificadores\
            \ diretos de um conjunto de dados. Colunas em um conjunto de dados que\
            \ cont\xEAm um identificador direto podem ser removidas. No mascaramento,\
            \ o identificador direto \xE9 transformado em um caractere repetido, como\
            \ XXXXXX ou 999999. Os identificadores podem ser criptografados ou transformados\
            \ em hash de modo que os registros vinculados permane\xE7am vinculados.\
            \ No caso de criptografia ou hashing, s\xE3o empregados algoritmos que\
            \ exigem o uso de uma chave, incluindo o Advanced Encryption Standard\
            \ ou um Hash-based Message Authentication Code. As implementa\xE7\xF5\
            es podem usar a mesma chave para todos os identificadores ou usar uma\
            \ chave diferente para cada identificador. Usar uma chave diferente para\
            \ cada identificador proporciona um grau mais alto de seguran\xE7a e privacidade.\
            \ Os identificadores podem, alternativamente, ser substitu\xEDdos por\
            \ uma palavra-chave, incluindo transformar George Washington em PACIENTE\
            \ ou substitu\xED-lo por um valor substituto (surrogate), como transformar\
            \ George Washington em Abraham Polk."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(5)
      name: De-identification | Statistical Disclosure Control
      description: Manipulate numerical data, contingency tables, and statistical
        findings so that no individual or organization is identifiable in the results
        of the analysis.
      annotation: Many types of statistical analyses can result in the disclosure
        of information about individuals even if only summary information is provided.
        For example, if a school that publishes a monthly table with the number of
        minority students enrolled, reports that it has 10-19 such students in January,
        and subsequently reports that it has 20-29 such students in March, then it
        can be inferred that the student who enrolled in February was a minority.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Controle de Divulga\xE7\xE3o Estat\xEDstica"
          description: "Manipular dados num\xE9ricos, tabelas de conting\xEAncia e\
            \ resultados estat\xEDsticos de modo que nenhum indiv\xEDduo ou organiza\xE7\
            \xE3o seja identific\xE1vel nos resultados da an\xE1lise."
          annotation: "Muitos tipos de an\xE1lises estat\xEDsticas podem resultar\
            \ na divulga\xE7\xE3o de informa\xE7\xF5es sobre indiv\xEDduos, mesmo\
            \ que apenas informa\xE7\xF5es resumidas sejam fornecidas. Por exemplo,\
            \ se uma escola que publica uma tabela mensal com o n\xFAmero de alunos\
            \ pertencentes a minorias matriculados relata que tem de 10 a 19 desses\
            \ alunos em janeiro e, subsequentemente, relata que tem de 20 a 29 desses\
            \ alunos em mar\xE7o, ent\xE3o pode-se inferir que o aluno que se matriculou\
            \ em fevereiro pertencia a uma minoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(6)
      name: De-identification | Differential Privacy
      description: Prevent disclosure of personally identifiable information by adding
        non-deterministic noise to the results of mathematical operations before the
        results are reported.
      annotation: The mathematical definition for differential privacy holds that
        the result of a dataset analysis should be approximately the same before and
        after the addition or removal of a single data record (which is assumed to
        be the data from a single individual). In its most basic form, differential
        privacy applies only to online query systems. However, it can also be used
        to produce machine-learning statistical classifiers and synthetic data. Differential
        privacy comes at the cost of decreased accuracy of results, forcing organizations
        to quantify the trade-off between privacy protection and the overall accuracy,
        usefulness, and utility of the de-identified dataset. Non-deterministic noise
        can include adding small, random values to the results of mathematical operations
        in dataset analysis.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Privacidade Diferencial"
          description: "Impedir a divulga\xE7\xE3o de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal adicionando ru\xEDdo n\xE3o determin\xEDstico aos resultados\
            \ de opera\xE7\xF5es matem\xE1ticas antes que os resultados sejam relatados."
          annotation: "A defini\xE7\xE3o matem\xE1tica de privacidade diferencial\
            \ sustenta que o resultado de uma an\xE1lise de conjunto de dados deve\
            \ ser aproximadamente o mesmo antes e depois da adi\xE7\xE3o ou remo\xE7\
            \xE3o de um \xFAnico registro de dados (que se presume ser o dado de um\
            \ \xFAnico indiv\xEDduo). Em sua forma mais b\xE1sica, a privacidade diferencial\
            \ aplica-se apenas a sistemas de consulta online. No entanto, ela tamb\xE9\
            m pode ser usada para produzir classificadores estat\xEDsticos de aprendizado\
            \ de m\xE1quina e dados sint\xE9ticos. A privacidade diferencial vem ao\
            \ custo de menor exatid\xE3o dos resultados, for\xE7ando as organiza\xE7\
            \xF5es a quantificar o compromisso (trade-off) entre a prote\xE7\xE3o\
            \ da privacidade e a exatid\xE3o, utilidade e aproveitamento geral do\
            \ conjunto de dados desidentificado. O ru\xEDdo n\xE3o determin\xEDstico\
            \ pode incluir a adi\xE7\xE3o de valores pequenos e aleat\xF3rios aos\
            \ resultados de opera\xE7\xF5es matem\xE1ticas na an\xE1lise do conjunto\
            \ de dados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(7)
      name: De-identification | Validated Algorithms and Software
      description: Perform de-identification using validated algorithms and software
        that is validated to implement the algorithms.
      annotation: Algorithms that appear to remove personally identifiable information
        from a dataset may in fact leave information that is personally identifiable
        or data that is re-identifiable. Software that is claimed to implement a validated
        algorithm may contain bugs or implement a different algorithm. Software may
        de-identify one type of data, such as integers, but not de-identify another
        type of data, such as floating point numbers. For these reasons, de-identification
        is performed using algorithms and software that are validated.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Algoritmos e Software Validados"
          description: "Realizar a desidentifica\xE7\xE3o utilizando algoritmos validados\
            \ e software validado para implementar os algoritmos."
          annotation: "Algoritmos que parecem remover informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal de um conjunto de dados podem, na verdade, deixar informa\xE7\
            \xF5es que s\xE3o identific\xE1veis pessoalmente ou dados que s\xE3o reidentific\xE1\
            veis. Um software que afirma implementar um algoritmo validado pode conter\
            \ defeitos ou implementar um algoritmo diferente. O software pode desidentificar\
            \ um tipo de dado, como n\xFAmeros inteiros, mas n\xE3o desidentificar\
            \ outro tipo de dado, como n\xFAmeros de ponto flutuante. Por essas raz\xF5\
            es, a desidentifica\xE7\xE3o \xE9 realizada utilizando algoritmos e software\
            \ validados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-19(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-19(8)
      name: De-identification | Motivated Intruder
      description: Perform a motivated intruder test on the de-identified dataset
        to determine if the identified data remains or if the de-identified data can
        be re-identified.
      annotation: A motivated intruder test is a test in which an individual or group
        takes a data release and specified resources and attempts to re-identify one
        or more individuals in the de-identified dataset. Such tests specify the amount
        of inside knowledge, computational resources, financial resources, data, and
        skills that intruders possess to conduct the tests. A motivated intruder test
        can determine if the de-identification is insufficient. It can also be a useful
        diagnostic tool to assess if de-identification is likely to be sufficient.
        However, the test alone cannot prove that de-identification is sufficient.
      translations:
        pt:
          name: "Desidentifica\xE7\xE3o | Intruso Motivado"
          description: Realizar um teste de intruso motivado no conjunto de dados
            desidentificado para determinar se os dados identificados permanecem ou
            se os dados desidentificados podem ser reidentificados.
          annotation: "Um teste de intruso motivado \xE9 um teste no qual um indiv\xED\
            duo ou grupo recebe uma divulga\xE7\xE3o de dados e recursos especificados\
            \ e tenta reidentificar um ou mais indiv\xEDduos no conjunto de dados\
            \ desidentificado. Tais testes especificam a quantidade de conhecimento\
            \ interno, recursos computacionais, recursos financeiros, dados e habilidades\
            \ que os intrusos possuem para conduzir os testes. Um teste de intruso\
            \ motivado pode determinar se a desidentifica\xE7\xE3o \xE9 insuficiente.\
            \ Tamb\xE9m pode ser uma ferramenta de diagn\xF3stico \xFAtil para avaliar\
            \ se a desidentifica\xE7\xE3o provavelmente \xE9 suficiente. No entanto,\
            \ o teste por si s\xF3 n\xE3o pode provar que a desidentifica\xE7\xE3\
            o \xE9 suficiente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-20
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-20
      name: Tainting
      description: 'Embed data or capabilities in the following systems or system
        components to determine if organizational data has been exfiltrated or improperly
        removed from the organization: [Assignment: organization-defined systems or
        system components].'
      annotation: Many cyber-attacks target organizational information, or information
        that the organization holds on behalf of other entities (e.g., personally
        identifiable information), and exfiltrate that data. In addition, insider
        attacks and erroneous user procedures can remove information from the system
        that is in violation of the organizational policies. Tainting approaches can
        range from passive to active. A passive tainting approach can be as simple
        as adding false email names and addresses to an internal database. If the
        organization receives email at one of the false email addresses, it knows
        that the database has been compromised. Moreover, the organization knows that
        the email was sent by an unauthorized entity, so any packets it includes potentially
        contain malicious code, and that the unauthorized entity may have potentially
        obtained a copy of the database. Another tainting approach can include embedding
        false data or steganographic data in files to enable the data to be found
        via open-source analysis. Finally, an active tainting approach can include
        embedding software in the data that is able to call home, thereby alerting
        the organization to its capture, and possibly its location, and the path by
        which it was exfiltrated or removed.
      translations:
        pt:
          name: "Marca\xE7\xE3o (Tainting)"
          description: "Incorporar dados ou capacidades nos seguintes sistemas ou\
            \ componentes de sistema para determinar se os dados organizacionais foram\
            \ exfiltrados ou removidos de forma impr\xF3pria da organiza\xE7\xE3o:\
            \ [Atribui\xE7\xE3o: sistemas ou componentes de sistema definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Muitos ciberataques visam informa\xE7\xF5es organizacionais,\
            \ ou informa\xE7\xF5es que a organiza\xE7\xE3o mant\xE9m em nome de outras\
            \ entidades (por exemplo, informa\xE7\xF5es de identifica\xE7\xE3o pessoal),\
            \ e exfiltram esses dados. Al\xE9m disso, ataques internos e procedimentos\
            \ err\xF4neos de usu\xE1rios podem remover informa\xE7\xF5es do sistema\
            \ em viola\xE7\xE3o \xE0s pol\xEDticas organizacionais. As abordagens\
            \ de marca\xE7\xE3o podem variar de passivas a ativas. Uma abordagem de\
            \ marca\xE7\xE3o passiva pode ser t\xE3o simples quanto adicionar nomes\
            \ e endere\xE7os de e-mail falsos a um banco de dados interno. Se a organiza\xE7\
            \xE3o receber e-mail em um dos endere\xE7os de e-mail falsos, ela sabe\
            \ que o banco de dados foi comprometido. Al\xE9m disso, a organiza\xE7\
            \xE3o sabe que o e-mail foi enviado por uma entidade n\xE3o autorizada,\
            \ de modo que quaisquer pacotes que ele inclua potencialmente cont\xEA\
            m c\xF3digo malicioso, e que a entidade n\xE3o autorizada pode ter potencialmente\
            \ obtido uma c\xF3pia do banco de dados. Outra abordagem de marca\xE7\xE3\
            o pode incluir a incorpora\xE7\xE3o de dados falsos ou dados esteganogr\xE1\
            ficos em arquivos para permitir que os dados sejam encontrados por meio\
            \ de an\xE1lise de fontes abertas. Por fim, uma abordagem de marca\xE7\
            \xE3o ativa pode incluir a incorpora\xE7\xE3o de software nos dados que\
            \ seja capaz de \"ligar para casa\", alertando assim a organiza\xE7\xE3\
            o sobre sua captura e, possivelmente, sua localiza\xE7\xE3o e o caminho\
            \ pelo qual foi exfiltrado ou removido."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-21
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-21
      name: Information Refresh
      description: 'Refresh [Assignment: organization-defined information] at [Assignment:
        organization-defined frequencies] or generate the information on demand and
        delete the information when no longer needed.'
      annotation: Retaining information for longer than it is needed makes it an increasingly
        valuable and enticing target for adversaries. Keeping information available
        for the minimum period of time needed to support organizational missions or
        business functions reduces the opportunity for adversaries to compromise,
        capture, and exfiltrate that information.
      translations:
        pt:
          name: "Atualiza\xE7\xE3o de Informa\xE7\xF5es"
          description: "Atualizar [Atribui\xE7\xE3o: informa\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o] em [Atribui\xE7\xE3o: frequ\xEAncias definidas pela\
            \ organiza\xE7\xE3o] ou gerar as informa\xE7\xF5es sob demanda e excluir\
            \ as informa\xE7\xF5es quando n\xE3o forem mais necess\xE1rias."
          annotation: "Reter informa\xE7\xF5es por mais tempo do que o necess\xE1\
            rio as torna um alvo cada vez mais valioso e atraente para advers\xE1\
            rios. Manter as informa\xE7\xF5es dispon\xEDveis pelo per\xEDodo m\xED\
            nimo de tempo necess\xE1rio para apoiar as miss\xF5es organizacionais\
            \ ou fun\xE7\xF5es de neg\xF3cio reduz a oportunidade de os advers\xE1\
            rios comprometerem, capturarem e exfiltrarem essas informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-22
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-22
      name: Information Diversity
      description: 'a. Identify the following alternative sources of information for
        [Assignment: organization-defined essential functions and services]: [Assignment:
        organization-defined alternative information sources]; and

        b. Use an alternative information source for the execution of essential functions
        or services on [Assignment: organization-defined systems or system components]
        when the primary source of information is corrupted or unavailable.'
      annotation: Actions taken by a system service or a function are often driven
        by the information it receives. Corruption, fabrication, modification, or
        deletion of that information could impact the ability of the service function
        to properly carry out its intended actions. By having multiple sources of
        input, the service or function can continue operation if one source is corrupted
        or no longer available. It is possible that the alternative sources of information
        may be less precise or less accurate than the primary source of information.
        But having such sub-optimal information sources may still provide a sufficient
        level of quality that the essential service or function can be carried out,
        even in a degraded or debilitated manner.
      translations:
        pt:
          name: "Diversidade de Informa\xE7\xF5es"
          description: "a. Identificar as seguintes fontes alternativas de informa\xE7\
            \xE3o para [Atribui\xE7\xE3o: fun\xE7\xF5es e servi\xE7os essenciais definidos\
            \ pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: fontes alternativas de informa\xE7\
            \xE3o definidas pela organiza\xE7\xE3o]; e\nb. Utilizar uma fonte alternativa\
            \ de informa\xE7\xE3o para a execu\xE7\xE3o de fun\xE7\xF5es ou servi\xE7\
            os essenciais em [Atribui\xE7\xE3o: sistemas ou componentes de sistema\
            \ definidos pela organiza\xE7\xE3o] quando a fonte prim\xE1ria de informa\xE7\
            \xE3o estiver corrompida ou indispon\xEDvel."
          annotation: "As a\xE7\xF5es tomadas por um servi\xE7o ou fun\xE7\xE3o de\
            \ sistema s\xE3o frequentemente impulsionadas pelas informa\xE7\xF5es\
            \ que ele recebe. A corrup\xE7\xE3o, fabrica\xE7\xE3o, modifica\xE7\xE3\
            o ou exclus\xE3o dessas informa\xE7\xF5es pode afetar a capacidade da\
            \ fun\xE7\xE3o de servi\xE7o de executar adequadamente as a\xE7\xF5es\
            \ pretendidas. Ao ter m\xFAltiplas fontes de entrada, o servi\xE7o ou\
            \ fun\xE7\xE3o pode continuar a opera\xE7\xE3o se uma fonte for corrompida\
            \ ou deixar de estar dispon\xEDvel. \xC9 poss\xEDvel que as fontes alternativas\
            \ de informa\xE7\xE3o sejam menos precisas ou menos exatas do que a fonte\
            \ prim\xE1ria de informa\xE7\xE3o. Por\xE9m, ter essas fontes de informa\xE7\
            \xE3o sub\xF3timas pode ainda assim fornecer um n\xEDvel suficiente de\
            \ qualidade para que o servi\xE7o ou fun\xE7\xE3o essencial possa ser\
            \ executado, mesmo que de maneira degradada ou debilitada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si-23
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:si
      ref_id: SI-23
      name: Information Fragmentation
      description: 'Based on [Assignment: organization-defined circumstances]:

        a. Fragment the following information: [Assignment: organization-defined information];
        and

        b. Distribute the fragmented information across the following systems or system
        components: [Assignment: organization-defined systems or system components].'
      annotation: "One objective of the advanced persistent threat is to exfiltrate\
        \ valuable information. Once exfiltrated, there is generally no way for the\
        \ organization to recover the lost information. Therefore, organizations may\
        \ consider dividing the information into disparate elements and distributing\
        \ those elements across multiple systems or system components and locations.\
        \ Such actions will increase the adversary\u2019s work factor to capture and\
        \ exfiltrate the desired information and, in so doing, increase the probability\
        \ of detection. The fragmentation of information impacts the organization\u2019\
        s ability to access the information in a timely manner. The extent of the\
        \ fragmentation is dictated by the impact or classification level (and value)\
        \ of the information, threat intelligence information received, and whether\
        \ data tainting is used (i.e., data tainting-derived information about the\
        \ exfiltration of some information could result in the fragmentation of the\
        \ remaining information)."
      translations:
        pt:
          name: "Fragmenta\xE7\xE3o de Informa\xE7\xF5es"
          description: "Com base em [Atribui\xE7\xE3o: circunst\xE2ncias definidas\
            \ pela organiza\xE7\xE3o]:\na. Fragmentar as seguintes informa\xE7\xF5\
            es: [Atribui\xE7\xE3o: informa\xE7\xF5es definidas pela organiza\xE7\xE3\
            o]; e\nb. Distribuir as informa\xE7\xF5es fragmentadas pelos seguintes\
            \ sistemas ou componentes de sistema: [Atribui\xE7\xE3o: sistemas ou componentes\
            \ de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "Um objetivo da amea\xE7a persistente avan\xE7ada \xE9 exfiltrar\
            \ informa\xE7\xF5es valiosas. Uma vez exfiltradas, geralmente n\xE3o h\xE1\
            \ como a organiza\xE7\xE3o recuperar as informa\xE7\xF5es perdidas. Portanto,\
            \ as organiza\xE7\xF5es podem considerar dividir as informa\xE7\xF5es\
            \ em elementos distintos e distribuir esses elementos por m\xFAltiplos\
            \ sistemas ou componentes de sistema e localiza\xE7\xF5es. Tais a\xE7\xF5\
            es aumentar\xE3o o fator de trabalho do advers\xE1rio para capturar e\
            \ exfiltrar as informa\xE7\xF5es desejadas e, ao faz\xEA-lo, aumentar\xE3\
            o a probabilidade de detec\xE7\xE3o. A fragmenta\xE7\xE3o das informa\xE7\
            \xF5es afeta a capacidade da organiza\xE7\xE3o de acessar as informa\xE7\
            \xF5es em tempo h\xE1bil. A extens\xE3o da fragmenta\xE7\xE3o \xE9 determinada\
            \ pelo n\xEDvel de impacto ou classifica\xE7\xE3o (e valor) das informa\xE7\
            \xF5es, pelas informa\xE7\xF5es de intelig\xEAncia de amea\xE7as recebidas\
            \ e se a marca\xE7\xE3o de dados (data tainting) \xE9 utilizada (ou seja,\
            \ informa\xE7\xF5es derivadas de marca\xE7\xE3o de dados sobre a exfiltra\xE7\
            \xE3o de algumas informa\xE7\xF5es poderiam resultar na fragmenta\xE7\xE3\
            o das informa\xE7\xF5es restantes)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      assessable: false
      depth: 1
      ref_id: SR
      name: Supply Chain Risk Management
      translations:
        pt:
          name: "Gest\xE3o de Riscos da Cadeia de Suprimentos"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] supply chain risk management policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the supply chain risk management
        policy and the associated supply chain risk management controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the supply chain risk management
        policy and procedures; and

        c. Review and update the current supply chain risk management:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Supply chain risk management policy and procedures address the controls
        in the SR family as well as supply chain-related controls in other families
        that are implemented within systems and organizations. The risk management
        strategy is an important factor in establishing such policies and procedures.
        Policies and procedures contribute to security and privacy assurance. Therefore,
        it is important that security and privacy programs collaborate on the development
        of supply chain risk management policy and procedures. Security and privacy
        program policies and procedures at the organization level are preferable,
        in general, and may obviate the need for mission- or system-specific policies
        and procedures. The policy can be included as part of the general security
        and privacy policy or be represented by multiple policies that reflect the
        complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to supply
        chain risk management policy and procedures include assessment or audit findings,
        security incidents or breaches, or changes in applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Simply restating
        controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de gest\xE3o de riscos da cadeia de suprimentos de [Sele\xE7\xE3\
            o (uma ou mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3\
            o/neg\xF3cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo,\
            \ pap\xE9is, responsabilidades, comprometimento da gest\xE3o, coordena\xE7\
            \xE3o entre entidades organizacionais e conformidade; e\n(b) Seja consistente\
            \ com leis, ordens executivas, diretrizes, regulamentos, pol\xEDticas,\
            \ normas e orienta\xE7\xF5es aplic\xE1veis; e\n2. Procedimentos para facilitar\
            \ a implementa\xE7\xE3o da pol\xEDtica de gest\xE3o de riscos da cadeia\
            \ de suprimentos e dos controles de gest\xE3o de riscos da cadeia de suprimentos\
            \ associados;\nb. Designar um [Atribui\xE7\xE3o: respons\xE1vel definido\
            \ pela organiza\xE7\xE3o] para gerenciar o desenvolvimento, a documenta\xE7\
            \xE3o e a dissemina\xE7\xE3o da pol\xEDtica e dos procedimentos de gest\xE3\
            o de riscos da cadeia de suprimentos; e\nc. Revisar e atualizar a atual\
            \ gest\xE3o de riscos da cadeia de suprimentos:\n1. Pol\xEDtica [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de gest\xE3o de riscos da\
            \ cadeia de suprimentos abordam os controles da fam\xEDlia SR, bem como\
            \ os controles relacionados \xE0 cadeia de suprimentos em outras fam\xED\
            lias que s\xE3o implementados dentro de sistemas e organiza\xE7\xF5es.\
            \ A estrat\xE9gia de gest\xE3o de riscos \xE9 um fator importante no estabelecimento\
            \ de tais pol\xEDticas e procedimentos. Pol\xEDticas e procedimentos contribuem\
            \ para a garantia de seguran\xE7a e privacidade. Portanto, \xE9 importante\
            \ que os programas de seguran\xE7a e privacidade colaborem no desenvolvimento\
            \ da pol\xEDtica e dos procedimentos de gest\xE3o de riscos da cadeia\
            \ de suprimentos. Pol\xEDticas e procedimentos dos programas de seguran\xE7\
            a e privacidade em n\xEDvel organizacional s\xE3o prefer\xEDveis, em geral,\
            \ e podem dispensar a necessidade de pol\xEDticas e procedimentos espec\xED\
            ficos de miss\xE3o ou sistema. A pol\xEDtica pode ser inclu\xEDda como\
            \ parte da pol\xEDtica geral de seguran\xE7a e privacidade ou ser representada\
            \ por m\xFAltiplas pol\xEDticas que reflitam a natureza complexa das organiza\xE7\
            \xF5es. Procedimentos podem ser estabelecidos para programas de seguran\xE7\
            a e privacidade, para processos de miss\xE3o ou neg\xF3cio e para sistemas,\
            \ se necess\xE1rio. Os procedimentos descrevem como as pol\xEDticas ou\
            \ controles s\xE3o implementados e podem ser direcionados ao indiv\xED\
            duo ou fun\xE7\xE3o que \xE9 o objeto do procedimento. Os procedimentos\
            \ podem ser documentados em planos de seguran\xE7a e privacidade de sistemas\
            \ ou em um ou mais documentos separados. Eventos que podem precipitar\
            \ uma atualiza\xE7\xE3o da pol\xEDtica e dos procedimentos de gest\xE3\
            o de riscos da cadeia de suprimentos incluem constata\xE7\xF5es de avalia\xE7\
            \xE3o ou auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou\
            \ altera\xE7\xF5es em leis, ordens executivas, diretrizes, regulamentos,\
            \ pol\xEDticas, normas e orienta\xE7\xF5es aplic\xE1veis. A mera reformula\xE7\
            \xE3o de controles n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-2
      name: Supply Chain Risk Management Plan
      description: 'a. Develop a plan for managing supply chain risks associated with
        the research and development, design, manufacturing, acquisition, delivery,
        integration, operations and maintenance, and disposal of the following systems,
        system components or system services: [Assignment: organization-defined systems,
        system components, or system services];

        b. Review and update the supply chain risk management plan [Assignment: organization-defined
        frequency] or as required, to address threat, organizational or environmental
        changes; and

        c. Protect the supply chain risk management plan from unauthorized disclosure
        and modification.'
      annotation: "The dependence on products, systems, and services from external\
        \ providers, as well as the nature of the relationships with those providers,\
        \ present an increasing level of risk to an organization. Threat actions that\
        \ may increase security or privacy risks include unauthorized production,\
        \ the insertion or use of counterfeits, tampering, theft, insertion of malicious\
        \ software and hardware, and poor manufacturing and development practices\
        \ in the supply chain. Supply chain risks can be endemic or systemic within\
        \ a system element or component, a system, an organization, a sector, or the\
        \ Nation. Managing supply chain risk is a complex, multifaceted undertaking\
        \ that requires a coordinated effort across an organization to build trust\
        \ relationships and communicate with internal and external stakeholders. Supply\
        \ chain risk management (SCRM) activities include\_identifying and assessing\
        \ risks, determining appropriate risk response actions, developing SCRM plans\
        \ to document response actions, and monitoring performance against plans.\
        \ The SCRM plan (at the system-level) is implementation specific, providing\
        \ policy implementation, requirements, constraints and implications. It can\
        \ either be stand-alone, or incorporated into system security and privacy\
        \ plans. The SCRM plan addresses managing, implementation, and monitoring\
        \ of SCRM controls and the development/sustainment of systems across the SDLC\
        \ to support mission and business functions.\nBecause supply chains can differ\
        \ significantly across and within organizations, SCRM plans are tailored to\
        \ the individual program, organizational, and operational contexts. Tailored\
        \ SCRM plans provide the basis for determining whether a technology, service,\
        \ system component, or system is fit for purpose, and as such, the controls\
        \ need to be tailored accordingly. Tailored SCRM plans help organizations\
        \ focus their resources on the most critical mission and business functions\
        \ based on mission and business requirements and their risk environment. Supply\
        \ chain risk management plans include an expression of the supply chain risk\
        \ tolerance for the organization, acceptable supply chain risk mitigation\
        \ strategies or controls, a process for consistently evaluating and monitoring\
        \ supply chain risk, approaches for implementing and communicating the plan,\
        \ a description of and justification for supply chain risk mitigation measures\
        \ taken, and associated roles and responsibilities. Finally, supply chain\
        \ risk management plans address requirements for developing trustworthy, secure,\
        \ privacy-protective, and resilient system components and systems, including\
        \ the application of the security design principles implemented as part of\
        \ life cycle-based systems security engineering processes (see SA-8)."
      translations:
        pt:
          name: "Plano de Gest\xE3o de Riscos da Cadeia de Suprimentos"
          description: "a. Desenvolver um plano para gerenciar os riscos da cadeia\
            \ de suprimentos associados \xE0 pesquisa e desenvolvimento, projeto,\
            \ fabrica\xE7\xE3o, aquisi\xE7\xE3o, entrega, integra\xE7\xE3o, opera\xE7\
            \xE3o e manuten\xE7\xE3o, e descarte dos seguintes sistemas, componentes\
            \ de sistema ou servi\xE7os de sistema: [Atribui\xE7\xE3o: sistemas, componentes\
            \ de sistema ou servi\xE7os de sistema definidos pela organiza\xE7\xE3\
            o];\nb. Revisar e atualizar o plano de gest\xE3o de riscos da cadeia de\
            \ suprimentos [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] ou conforme necess\xE1rio, para abordar altera\xE7\xF5es de amea\xE7\
            a, organizacionais ou ambientais; e\nc. Proteger o plano de gest\xE3o\
            \ de riscos da cadeia de suprimentos contra divulga\xE7\xE3o e modifica\xE7\
            \xE3o n\xE3o autorizadas."
          annotation: "A depend\xEAncia de produtos, sistemas e servi\xE7os de provedores\
            \ externos, bem como a natureza dos relacionamentos com esses provedores,\
            \ apresenta um n\xEDvel crescente de risco para uma organiza\xE7\xE3o.\
            \ A\xE7\xF5es de amea\xE7a que podem aumentar os riscos de seguran\xE7\
            a ou privacidade incluem produ\xE7\xE3o n\xE3o autorizada, a inser\xE7\
            \xE3o ou uso de falsifica\xE7\xF5es, adultera\xE7\xE3o, roubo, inser\xE7\
            \xE3o de software e hardware maliciosos e pr\xE1ticas deficientes de fabrica\xE7\
            \xE3o e desenvolvimento na cadeia de suprimentos. Os riscos da cadeia\
            \ de suprimentos podem ser end\xEAmicos ou sist\xEAmicos dentro de um\
            \ elemento ou componente de sistema, um sistema, uma organiza\xE7\xE3\
            o, um setor ou a Na\xE7\xE3o. Gerenciar o risco da cadeia de suprimentos\
            \ \xE9 um empreendimento complexo e multifacetado que requer um esfor\xE7\
            o coordenado em toda a organiza\xE7\xE3o para construir rela\xE7\xF5es\
            \ de confian\xE7a e comunicar-se com partes interessadas internas e externas.\
            \ As atividades de gest\xE3o de riscos da cadeia de suprimentos (SCRM)\
            \ incluem identificar e avaliar riscos, determinar a\xE7\xF5es apropriadas\
            \ de resposta a riscos, desenvolver planos de SCRM para documentar a\xE7\
            \xF5es de resposta e monitorar o desempenho em rela\xE7\xE3o aos planos.\
            \ O plano de SCRM (em n\xEDvel de sistema) \xE9 espec\xEDfico da implementa\xE7\
            \xE3o, fornecendo implementa\xE7\xE3o de pol\xEDtica, requisitos, restri\xE7\
            \xF5es e implica\xE7\xF5es. Ele pode ser aut\xF4nomo ou incorporado aos\
            \ planos de seguran\xE7a e privacidade de sistemas. O plano de SCRM aborda\
            \ a gest\xE3o, implementa\xE7\xE3o e monitoramento dos controles de SCRM\
            \ e o desenvolvimento/sustenta\xE7\xE3o de sistemas ao longo do SDLC para\
            \ apoiar as fun\xE7\xF5es de miss\xE3o e neg\xF3cio.\nComo as cadeias\
            \ de suprimentos podem diferir significativamente entre e dentro das organiza\xE7\
            \xF5es, os planos de SCRM s\xE3o adaptados aos contextos individuais de\
            \ programa, organizacional e operacional. Planos de SCRM adaptados fornecem\
            \ a base para determinar se uma tecnologia, servi\xE7o, componente de\
            \ sistema ou sistema \xE9 adequado ao prop\xF3sito e, como tal, os controles\
            \ precisam ser adaptados de acordo. Planos de SCRM adaptados ajudam as\
            \ organiza\xE7\xF5es a concentrar seus recursos nas fun\xE7\xF5es de miss\xE3\
            o e neg\xF3cio mais cr\xEDticas com base nos requisitos de miss\xE3o e\
            \ neg\xF3cio e em seu ambiente de risco. Os planos de gest\xE3o de riscos\
            \ da cadeia de suprimentos incluem uma express\xE3o da toler\xE2ncia ao\
            \ risco da cadeia de suprimentos para a organiza\xE7\xE3o, estrat\xE9\
            gias ou controles aceit\xE1veis de mitiga\xE7\xE3o de risco da cadeia\
            \ de suprimentos, um processo para avaliar e monitorar consistentemente\
            \ o risco da cadeia de suprimentos, abordagens para implementar e comunicar\
            \ o plano, uma descri\xE7\xE3o e justificativa para as medidas de mitiga\xE7\
            \xE3o de risco da cadeia de suprimentos adotadas, e os pap\xE9is e responsabilidades\
            \ associados. Por fim, os planos de gest\xE3o de riscos da cadeia de suprimentos\
            \ abordam os requisitos para o desenvolvimento de componentes de sistema\
            \ e sistemas confi\xE1veis, seguros, protetores da privacidade e resilientes,\
            \ incluindo a aplica\xE7\xE3o dos princ\xEDpios de projeto de seguran\xE7\
            a implementados como parte dos processos de engenharia de seguran\xE7\
            a de sistemas baseados no ciclo de vida (ver SA-8)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-2(1)
      name: Supply Chain Risk Management Plan | Establish SCRM Team
      description: 'Establish a supply chain risk management team consisting of [Assignment:
        organization-defined personnel, roles, and responsibilities] to lead and support
        the following SCRM activities: [Assignment: organization-defined supply chain
        risk management activities].'
      annotation: To implement supply chain risk management plans, organizations establish
        a coordinated, team-based approach to identify and assess supply chain risks
        and manage these risks by using programmatic and technical mitigation techniques.
        The team approach enables organizations to conduct an analysis of their supply
        chain, communicate with internal and external partners or stakeholders, and
        gain broad consensus regarding the appropriate resources for SCRM. The SCRM
        team consists of organizational personnel with diverse roles and responsibilities
        for leading and supporting SCRM activities, including risk executive, information
        technology, contracting, information security, privacy, mission or business,
        legal, supply chain and logistics, acquisition, business continuity, and other
        relevant functions. Members of the SCRM team are involved in various aspects
        of the SDLC and, collectively, have an awareness of and provide expertise
        in acquisition processes, legal practices, vulnerabilities, threats, and attack
        vectors, as well as an understanding of the technical aspects and dependencies
        of systems. The SCRM team can be an extension of the security and privacy
        risk management processes or be included as part of an organizational risk
        management team.
      translations:
        pt:
          name: "Plano de Gest\xE3o de Riscos da Cadeia de Suprimentos | Estabelecer\
            \ Equipe de SCRM"
          description: "Estabelecer uma equipe de gest\xE3o de riscos da cadeia de\
            \ suprimentos composta por [Atribui\xE7\xE3o: pessoal, pap\xE9is e responsabilidades\
            \ definidos pela organiza\xE7\xE3o] para liderar e apoiar as seguintes\
            \ atividades de SCRM: [Atribui\xE7\xE3o: atividades de gest\xE3o de riscos\
            \ da cadeia de suprimentos definidas pela organiza\xE7\xE3o]."
          annotation: "Para implementar os planos de gest\xE3o de riscos da cadeia\
            \ de suprimentos, as organiza\xE7\xF5es estabelecem uma abordagem coordenada\
            \ baseada em equipe para identificar e avaliar os riscos da cadeia de\
            \ suprimentos e gerenciar esses riscos utilizando t\xE9cnicas de mitiga\xE7\
            \xE3o program\xE1ticas e t\xE9cnicas. A abordagem em equipe permite que\
            \ as organiza\xE7\xF5es conduzam uma an\xE1lise de sua cadeia de suprimentos,\
            \ comuniquem-se com parceiros ou partes interessadas internas e externas\
            \ e obtenham amplo consenso sobre os recursos apropriados para o SCRM.\
            \ A equipe de SCRM \xE9 composta por pessoal organizacional com diversos\
            \ pap\xE9is e responsabilidades para liderar e apoiar as atividades de\
            \ SCRM, incluindo executivo de riscos, tecnologia da informa\xE7\xE3o,\
            \ contrata\xE7\xE3o, seguran\xE7a da informa\xE7\xE3o, privacidade, miss\xE3\
            o ou neg\xF3cio, jur\xEDdico, cadeia de suprimentos e log\xEDstica, aquisi\xE7\
            \xE3o, continuidade de neg\xF3cio e outras fun\xE7\xF5es relevantes. Os\
            \ membros da equipe de SCRM est\xE3o envolvidos em v\xE1rios aspectos\
            \ do SDLC e, coletivamente, t\xEAm conhecimento e fornecem expertise sobre\
            \ processos de aquisi\xE7\xE3o, pr\xE1ticas jur\xEDdicas, vulnerabilidades,\
            \ amea\xE7as e vetores de ataque, bem como uma compreens\xE3o dos aspectos\
            \ t\xE9cnicos e das depend\xEAncias dos sistemas. A equipe de SCRM pode\
            \ ser uma extens\xE3o dos processos de gest\xE3o de riscos de seguran\xE7\
            a e privacidade ou ser inclu\xEDda como parte de uma equipe organizacional\
            \ de gest\xE3o de riscos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-3
      name: Supply Chain Controls and Processes
      description: 'a. Establish a process or processes to identify and address weaknesses
        or deficiencies in the supply chain elements and processes of [Assignment:
        organization-defined system or system component] in coordination with [Assignment:
        organization-defined supply chain personnel];

        b. Employ the following controls to protect against supply chain risks to
        the system, system component, or system service and to limit the harm or consequences
        from supply chain-related events: [Assignment: organization-defined supply
        chain controls]; and

        c. Document the selected and implemented supply chain processes and controls
        in [Selection: security and privacy plans; supply chain risk management plan;
        [Assignment: organization-defined document]].'
      annotation: Supply chain elements include organizations, entities, or tools
        employed for the research and development, design, manufacturing, acquisition,
        delivery, integration, operations and maintenance, and disposal of systems
        and system components. Supply chain processes include hardware, software,
        and firmware development processes; shipping and handling procedures; personnel
        security and physical security programs; configuration management tools, techniques,
        and measures to maintain provenance; or other programs, processes, or procedures
        associated with the development, acquisition, maintenance and disposal of
        systems and system components. Supply chain elements and processes may be
        provided by organizations, system integrators, or external providers. Weaknesses
        or deficiencies in supply chain elements or processes represent potential
        vulnerabilities that can be exploited by adversaries to cause harm to the
        organization and affect its ability to carry out its core missions or business
        functions. Supply chain personnel are individuals with roles and responsibilities
        in the supply chain.
      translations:
        pt:
          name: Controles e Processos da Cadeia de Suprimentos
          description: "a. Estabelecer um processo ou processos para identificar e\
            \ tratar fraquezas ou defici\xEAncias nos elementos e processos da cadeia\
            \ de suprimentos de [Atribui\xE7\xE3o: sistema ou componente de sistema\
            \ definido pela organiza\xE7\xE3o] em coordena\xE7\xE3o com [Atribui\xE7\
            \xE3o: pessoal da cadeia de suprimentos definido pela organiza\xE7\xE3\
            o];\nb. Empregar os seguintes controles para proteger contra os riscos\
            \ da cadeia de suprimentos ao sistema, componente de sistema ou servi\xE7\
            o de sistema e para limitar o dano ou as consequ\xEAncias decorrentes\
            \ de eventos relacionados \xE0 cadeia de suprimentos: [Atribui\xE7\xE3\
            o: controles da cadeia de suprimentos definidos pela organiza\xE7\xE3\
            o]; e\nc. Documentar os processos e controles da cadeia de suprimentos\
            \ selecionados e implementados em [Sele\xE7\xE3o: planos de seguran\xE7\
            a e privacidade; plano de gest\xE3o de riscos da cadeia de suprimentos;\
            \ [Atribui\xE7\xE3o: documento definido pela organiza\xE7\xE3o]]."
          annotation: "Os elementos da cadeia de suprimentos incluem organiza\xE7\xF5\
            es, entidades ou ferramentas empregadas para a pesquisa e desenvolvimento,\
            \ projeto, fabrica\xE7\xE3o, aquisi\xE7\xE3o, entrega, integra\xE7\xE3\
            o, opera\xE7\xE3o e manuten\xE7\xE3o, e descarte de sistemas e componentes\
            \ de sistema. Os processos da cadeia de suprimentos incluem processos\
            \ de desenvolvimento de hardware, software e firmware; procedimentos de\
            \ envio e manuseio; programas de seguran\xE7a de pessoal e seguran\xE7\
            a f\xEDsica; ferramentas, t\xE9cnicas e medidas de gest\xE3o de configura\xE7\
            \xE3o para manter a proced\xEAncia; ou outros programas, processos ou\
            \ procedimentos associados ao desenvolvimento, aquisi\xE7\xE3o, manuten\xE7\
            \xE3o e descarte de sistemas e componentes de sistema. Os elementos e\
            \ processos da cadeia de suprimentos podem ser fornecidos por organiza\xE7\
            \xF5es, integradores de sistemas ou provedores externos. Fraquezas ou\
            \ defici\xEAncias nos elementos ou processos da cadeia de suprimentos\
            \ representam vulnerabilidades potenciais que podem ser exploradas por\
            \ advers\xE1rios para causar dano \xE0 organiza\xE7\xE3o e afetar sua\
            \ capacidade de executar suas principais miss\xF5es ou fun\xE7\xF5es de\
            \ neg\xF3cio. O pessoal da cadeia de suprimentos s\xE3o indiv\xEDduos\
            \ com pap\xE9is e responsabilidades na cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-3(1)
      name: Supply Chain Controls and Processes | Diverse Supply Base
      description: 'Employ a diverse set of sources for the following system components
        and services:  [Assignment: organization-defined system components and services].'
      annotation: Diversifying the supply of systems, system components, and services
        can reduce the probability that adversaries will successfully identify and
        target the supply chain and can reduce the impact of a supply chain event
        or compromise. Identifying multiple suppliers for replacement components can
        reduce the probability that the replacement component will become unavailable.
        Employing a diverse set of developers or logistics service providers can reduce
        the impact of a natural disaster or other supply chain event. Organizations
        consider designing the system to include diverse materials and components.
      translations:
        pt:
          name: Controles e Processos da Cadeia de Suprimentos | Base de Fornecimento
            Diversificada
          description: "Empregar um conjunto diversificado de fontes para os seguintes\
            \ componentes e servi\xE7os de sistema: [Atribui\xE7\xE3o: componentes\
            \ e servi\xE7os de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "Diversificar o fornecimento de sistemas, componentes de sistema\
            \ e servi\xE7os pode reduzir a probabilidade de que advers\xE1rios identifiquem\
            \ e visem com sucesso a cadeia de suprimentos e pode reduzir o impacto\
            \ de um evento ou comprometimento da cadeia de suprimentos. Identificar\
            \ m\xFAltiplos fornecedores para componentes de reposi\xE7\xE3o pode reduzir\
            \ a probabilidade de que o componente de reposi\xE7\xE3o se torne indispon\xED\
            vel. Empregar um conjunto diversificado de desenvolvedores ou provedores\
            \ de servi\xE7os de log\xEDstica pode reduzir o impacto de um desastre\
            \ natural ou outro evento da cadeia de suprimentos. As organiza\xE7\xF5\
            es consideram projetar o sistema para incluir materiais e componentes\
            \ diversos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-3(2)
      name: Supply Chain Controls and Processes | Limitation of Harm
      description: 'Employ the following controls to limit harm from potential adversaries
        identifying and targeting the organizational supply chain: [Assignment: organization-defined
        controls].'
      annotation: Controls that can be implemented to reduce the probability of adversaries
        successfully identifying and targeting the supply chain include avoiding the
        purchase of custom or non-standardized configurations, employing approved
        vendor lists with standing reputations in industry, following pre-agreed maintenance
        schedules and update and patch delivery mechanisms, maintaining a contingency
        plan in case of a supply chain event, using procurement carve-outs that provide
        exclusions to commitments or obligations, using diverse delivery routes, and
        minimizing the time between purchase decisions and delivery.
      translations:
        pt:
          name: "Controles e Processos da Cadeia de Suprimentos | Limita\xE7\xE3o\
            \ de Dano"
          description: "Empregar os seguintes controles para limitar o dano decorrente\
            \ de potenciais advers\xE1rios identificando e visando a cadeia de suprimentos\
            \ organizacional: [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Os controles que podem ser implementados para reduzir a probabilidade\
            \ de advers\xE1rios identificarem e visarem com sucesso a cadeia de suprimentos\
            \ incluem evitar a compra de configura\xE7\xF5es personalizadas ou n\xE3\
            o padronizadas, empregar listas de fornecedores aprovados com reputa\xE7\
            \xE3o consolidada no setor, seguir cronogramas de manuten\xE7\xE3o pr\xE9\
            -acordados e mecanismos de entrega de atualiza\xE7\xF5es e corre\xE7\xF5\
            es, manter um plano de conting\xEAncia em caso de um evento da cadeia\
            \ de suprimentos, usar exclus\xF5es de aquisi\xE7\xE3o que prevejam isen\xE7\
            \xF5es a compromissos ou obriga\xE7\xF5es, usar rotas de entrega diversificadas\
            \ e minimizar o tempo entre as decis\xF5es de compra e a entrega."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-3(3)
      name: Supply Chain Controls and Processes | Sub-tier Flow Down
      description: Ensure that the controls included in the contracts of prime contractors
        are also included in the contracts of subcontractors.
      annotation: To manage supply chain risk effectively and holistically, it is
        important that organizations ensure that supply chain risk management controls
        are included at all tiers in the supply chain. This includes ensuring that
        Tier 1 (prime) contractors have implemented processes to facilitate the flow
        down of supply chain risk management controls to sub-tier contractors. The
        controls subject to flow down are identified in SR-3b.
      translations:
        pt:
          name: "Controles e Processos da Cadeia de Suprimentos | Repasse aos Subn\xED\
            veis"
          description: "Assegurar que os controles inclu\xEDdos nos contratos dos\
            \ contratantes principais tamb\xE9m sejam inclu\xEDdos nos contratos dos\
            \ subcontratados."
          annotation: "Para gerenciar o risco da cadeia de suprimentos de forma eficaz\
            \ e hol\xEDstica, \xE9 importante que as organiza\xE7\xF5es assegurem\
            \ que os controles de gest\xE3o de riscos da cadeia de suprimentos sejam\
            \ inclu\xEDdos em todos os n\xEDveis da cadeia de suprimentos. Isso inclui\
            \ assegurar que os contratantes de N\xEDvel 1 (principais) tenham implementado\
            \ processos para facilitar o repasse dos controles de gest\xE3o de riscos\
            \ da cadeia de suprimentos aos contratantes de subn\xEDvel. Os controles\
            \ sujeitos a repasse s\xE3o identificados em SR-3b."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-4
      name: Provenance
      description: 'Document, monitor, and maintain valid provenance of the following
        systems, system components, and associated data: [Assignment: organization-defined
        systems, system components, and associated data].'
      annotation: Every system and system component has a point of origin and may
        be changed throughout its existence. Provenance is the chronology of the origin,
        development, ownership, location, and changes to a system or system component
        and associated data. It may also include personnel and processes used to interact
        with or make modifications to the system, component, or associated data. Organizations
        consider developing procedures (see SR-1) for allocating responsibilities
        for the creation, maintenance, and monitoring of provenance for systems and
        system components; transferring provenance documentation and responsibility
        between organizations; and preventing and monitoring for unauthorized changes
        to the provenance records. Organizations have methods to document, monitor,
        and maintain valid provenance baselines for systems, system components, and
        related data. These actions help track, assess, and document any changes to
        the provenance, including changes in supply chain elements or configuration,
        and help ensure non-repudiation of provenance information and the provenance
        change records. Provenance considerations are addressed throughout the system
        development life cycle and incorporated into contracts and other arrangements,
        as appropriate.
      translations:
        pt:
          name: "Proced\xEAncia"
          description: "Documentar, monitorar e manter proced\xEAncia v\xE1lida dos\
            \ seguintes sistemas, componentes de sistema e dados associados: [Atribui\xE7\
            \xE3o: sistemas, componentes de sistema e dados associados definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Todo sistema e componente de sistema tem um ponto de origem\
            \ e pode ser alterado ao longo de sua exist\xEAncia. Proced\xEAncia \xE9\
            \ a cronologia da origem, desenvolvimento, propriedade, localiza\xE7\xE3\
            o e altera\xE7\xF5es de um sistema ou componente de sistema e dados associados.\
            \ Pode tamb\xE9m incluir o pessoal e os processos utilizados para interagir\
            \ com ou realizar modifica\xE7\xF5es no sistema, componente ou dados associados.\
            \ As organiza\xE7\xF5es consideram desenvolver procedimentos (ver SR-1)\
            \ para alocar responsabilidades pela cria\xE7\xE3o, manuten\xE7\xE3o e\
            \ monitoramento da proced\xEAncia de sistemas e componentes de sistema;\
            \ transferir a documenta\xE7\xE3o e a responsabilidade pela proced\xEA\
            ncia entre organiza\xE7\xF5es; e prevenir e monitorar altera\xE7\xF5es\
            \ n\xE3o autorizadas nos registros de proced\xEAncia. As organiza\xE7\xF5\
            es disp\xF5em de m\xE9todos para documentar, monitorar e manter linhas\
            \ de base de proced\xEAncia v\xE1lidas para sistemas, componentes de sistema\
            \ e dados relacionados. Essas a\xE7\xF5es ajudam a rastrear, avaliar e\
            \ documentar quaisquer altera\xE7\xF5es na proced\xEAncia, incluindo altera\xE7\
            \xF5es nos elementos da cadeia de suprimentos ou na configura\xE7\xE3\
            o, e ajudam a assegurar o n\xE3o rep\xFAdio das informa\xE7\xF5es de proced\xEA\
            ncia e dos registros de altera\xE7\xE3o de proced\xEAncia. As considera\xE7\
            \xF5es sobre proced\xEAncia s\xE3o abordadas ao longo de todo o ciclo\
            \ de vida de desenvolvimento do sistema e incorporadas em contratos e\
            \ outros acordos, conforme apropriado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-4(1)
      name: Provenance | Identity
      description: 'Establish and maintain unique identification of the following
        supply chain elements, processes, and personnel associated with the identified
        system and critical system components: [Assignment: organization-defined supply
        chain elements, processes, and personnel associated with organization-defined
        systems and critical system components].'
      annotation: Knowing who and what is in the supply chains of organizations is
        critical to gaining visibility into supply chain activities. Visibility into
        supply chain activities is also important for monitoring and identifying high-risk
        events and activities. Without reasonable visibility into supply chains elements,
        processes, and personnel, it is very difficult for organizations to understand
        and manage risk and reduce their susceptibility to adverse events. Supply
        chain elements include organizations, entities, or tools used for the research
        and development, design, manufacturing, acquisition, delivery, integration,
        operations, maintenance, and disposal of systems and system components. Supply
        chain processes include development processes for hardware, software, and
        firmware; shipping and handling procedures; configuration management tools,
        techniques, and measures to maintain provenance; personnel and physical security
        programs; or other programs, processes, or procedures associated with the
        production and distribution of supply chain elements. Supply chain personnel
        are individuals with specific roles and responsibilities related to the secure
        the research and development, design, manufacturing, acquisition, delivery,
        integration, operations and maintenance, and disposal of a system or system
        component. Identification methods are sufficient to support an investigation
        in case of a supply chain change (e.g. if a supply company is purchased),
        compromise, or event.
      translations:
        pt:
          name: "Proced\xEAncia | Identidade"
          description: "Estabelecer e manter a identifica\xE7\xE3o \xFAnica dos seguintes\
            \ elementos, processos e pessoal da cadeia de suprimentos associados ao\
            \ sistema identificado e aos componentes cr\xEDticos do sistema: [Atribui\xE7\
            \xE3o: elementos, processos e pessoal da cadeia de suprimentos associados\
            \ a sistemas definidos pela organiza\xE7\xE3o e componentes cr\xEDticos\
            \ do sistema]."
          annotation: "Saber quem e o que est\xE1 nas cadeias de suprimentos das organiza\xE7\
            \xF5es \xE9 fundamental para obter visibilidade das atividades da cadeia\
            \ de suprimentos. A visibilidade das atividades da cadeia de suprimentos\
            \ tamb\xE9m \xE9 importante para monitorar e identificar eventos e atividades\
            \ de alto risco. Sem uma visibilidade razo\xE1vel dos elementos, processos\
            \ e pessoal da cadeia de suprimentos, \xE9 muito dif\xEDcil para as organiza\xE7\
            \xF5es compreenderem e gerenciarem o risco e reduzirem sua suscetibilidade\
            \ a eventos adversos. Os elementos da cadeia de suprimentos incluem organiza\xE7\
            \xF5es, entidades ou ferramentas utilizadas para a pesquisa e desenvolvimento,\
            \ projeto, fabrica\xE7\xE3o, aquisi\xE7\xE3o, entrega, integra\xE7\xE3\
            o, opera\xE7\xE3o, manuten\xE7\xE3o e descarte de sistemas e componentes\
            \ de sistema. Os processos da cadeia de suprimentos incluem processos\
            \ de desenvolvimento de hardware, software e firmware; procedimentos de\
            \ envio e manuseio; ferramentas, t\xE9cnicas e medidas de gest\xE3o de\
            \ configura\xE7\xE3o para manter a proced\xEAncia; programas de seguran\xE7\
            a de pessoal e seguran\xE7a f\xEDsica; ou outros programas, processos\
            \ ou procedimentos associados \xE0 produ\xE7\xE3o e distribui\xE7\xE3\
            o de elementos da cadeia de suprimentos. O pessoal da cadeia de suprimentos\
            \ s\xE3o indiv\xEDduos com pap\xE9is e responsabilidades espec\xEDficos\
            \ relacionados \xE0 pesquisa e desenvolvimento, projeto, fabrica\xE7\xE3\
            o, aquisi\xE7\xE3o, entrega, integra\xE7\xE3o, opera\xE7\xE3o e manuten\xE7\
            \xE3o, e descarte seguros de um sistema ou componente de sistema. Os m\xE9\
            todos de identifica\xE7\xE3o s\xE3o suficientes para apoiar uma investiga\xE7\
            \xE3o em caso de altera\xE7\xE3o na cadeia de suprimentos (por exemplo,\
            \ se uma empresa fornecedora for adquirida), comprometimento ou evento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-4(2)
      name: Provenance | Track and Trace
      description: 'Establish and maintain unique identification of the following
        systems and critical system components for tracking through the supply chain:
        [Assignment: organization-defined systems and critical system components].'
      annotation: Tracking the unique identification of systems and system components
        during development and transport activities provides a foundational identity
        structure for the establishment and maintenance of provenance. For example,
        system components may be labeled using serial numbers or tagged using radio-frequency
        identification tags. Labels and tags can help provide better visibility into
        the provenance of a system or system component. A system or system component
        may have more than one unique identifier. Identification methods are sufficient
        to support a forensic investigation after a supply chain compromise or event.
      translations:
        pt:
          name: "Proced\xEAncia | Rastrear e Localizar"
          description: "Estabelecer e manter a identifica\xE7\xE3o \xFAnica dos seguintes\
            \ sistemas e componentes cr\xEDticos de sistema para rastreamento ao longo\
            \ da cadeia de suprimentos: [Atribui\xE7\xE3o: sistemas e componentes\
            \ cr\xEDticos de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "O rastreamento da identifica\xE7\xE3o \xFAnica de sistemas\
            \ e componentes de sistema durante as atividades de desenvolvimento e\
            \ transporte fornece uma estrutura de identidade fundamental para o estabelecimento\
            \ e a manuten\xE7\xE3o da proced\xEAncia. Por exemplo, componentes de\
            \ sistema podem ser rotulados usando n\xFAmeros de s\xE9rie ou etiquetados\
            \ usando etiquetas de identifica\xE7\xE3o por radiofrequ\xEAncia. R\xF3\
            tulos e etiquetas podem ajudar a proporcionar melhor visibilidade da proced\xEA\
            ncia de um sistema ou componente de sistema. Um sistema ou componente\
            \ de sistema pode ter mais de um identificador \xFAnico. Os m\xE9todos\
            \ de identifica\xE7\xE3o s\xE3o suficientes para apoiar uma investiga\xE7\
            \xE3o forense ap\xF3s um comprometimento ou evento na cadeia de suprimentos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-4(3)
      name: Provenance | Validate as Genuine and Not Altered
      description: 'Employ the following controls to validate that the system or system
        component received is genuine and has not been altered: [Assignment: organization-defined
        controls].'
      annotation: For many systems and system components, especially hardware, there
        are technical means to determine if the items are genuine or have been altered,
        including optical and nanotechnology tagging, physically unclonable functions,
        side-channel analysis, cryptographic hash verifications or digital signatures,
        and visible anti-tamper labels or stickers. Controls can also include monitoring
        for out of specification performance, which can be an indicator of tampering
        or counterfeits. Organizations may leverage supplier and contractor processes
        for validating that a system or component is genuine and has not been altered
        and for replacing a suspect system or component. Some indications of tampering
        may be visible and addressable before accepting delivery, such as inconsistent
        packaging, broken seals, and incorrect labels. When a system or system component
        is suspected of being altered or counterfeit, the supplier, contractor, or
        original equipment manufacturer may be able to replace the item or provide
        a forensic capability to determine the origin of the counterfeit or altered
        item. Organizations can provide training to personnel on how to identify suspicious
        system or component deliveries.
      translations:
        pt:
          name: "Proced\xEAncia | Validar como Genu\xEDno e N\xE3o Alterado"
          description: "Empregar os seguintes controles para validar que o sistema\
            \ ou componente de sistema recebido \xE9 genu\xEDno e n\xE3o foi alterado:\
            \ [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\xE3o]."
          annotation: "Para muitos sistemas e componentes de sistema, especialmente\
            \ hardware, existem meios t\xE9cnicos para determinar se os itens s\xE3\
            o genu\xEDnos ou foram alterados, incluindo etiquetagem \xF3ptica e de\
            \ nanotecnologia, fun\xE7\xF5es fisicamente n\xE3o clon\xE1veis, an\xE1\
            lise de canal lateral, verifica\xE7\xF5es de hash criptogr\xE1fico ou\
            \ assinaturas digitais, e r\xF3tulos ou adesivos vis\xEDveis de evid\xEA\
            ncia de viola\xE7\xE3o. Os controles tamb\xE9m podem incluir o monitoramento\
            \ de desempenho fora da especifica\xE7\xE3o, o que pode ser um indicador\
            \ de viola\xE7\xE3o ou falsifica\xE7\xE3o. As organiza\xE7\xF5es podem\
            \ aproveitar os processos de fornecedores e contratados para validar que\
            \ um sistema ou componente \xE9 genu\xEDno e n\xE3o foi alterado e para\
            \ substituir um sistema ou componente suspeito. Algumas indica\xE7\xF5\
            es de viola\xE7\xE3o podem ser vis\xEDveis e trat\xE1veis antes de aceitar\
            \ a entrega, como embalagem inconsistente, lacres rompidos e r\xF3tulos\
            \ incorretos. Quando h\xE1 suspeita de que um sistema ou componente de\
            \ sistema foi alterado ou falsificado, o fornecedor, o contratado ou o\
            \ fabricante original do equipamento pode ser capaz de substituir o item\
            \ ou fornecer uma capacidade forense para determinar a origem do item\
            \ falsificado ou alterado. As organiza\xE7\xF5es podem fornecer treinamento\
            \ ao pessoal sobre como identificar entregas suspeitas de sistemas ou\
            \ componentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-4(4)
      name: "Provenance | Supply Chain Integrity \u2014 Pedigree"
      description: 'Employ [Assignment: organization-defined controls] and conduct
        [Assignment: organization-defined analysis] to ensure the integrity of the
        system and system components by validating the internal composition and provenance
        of critical or mission-essential technologies, products, and services.'
      annotation: "Authoritative information regarding the internal composition of\
        \ system components and the provenance of technology, products, and services\
        \ provides a strong basis for trust. The validation of the internal composition\
        \ and provenance of technologies, products, and services is referred to as\
        \ the pedigree. For microelectronics, this includes material composition of\
        \ components. For software this includes the composition of open-source and\
        \ proprietary code, including the version of the component at a given point\
        \ in time. Pedigrees increase the assurance that the claims suppliers assert\
        \ about the internal composition and provenance of the products, services,\
        \ and technologies they provide are valid. The validation of the internal\
        \ composition and provenance can be achieved by various evidentiary artifacts\
        \ or records that manufacturers and suppliers produce during the research\
        \ and development, design, manufacturing, acquisition, delivery, integration,\
        \ operations and maintenance, and disposal of technology, products, and services.\
        \ Evidentiary artifacts include, but are not limited to, software identification\
        \ (SWID) tags, software component inventory, the manufacturers\u2019 declarations\
        \ of platform attributes (e.g., serial numbers, hardware component inventory),\
        \ and measurements (e.g., firmware hashes) that are tightly bound to the hardware\
        \ itself."
      translations:
        pt:
          name: "Proced\xEAncia | Integridade da Cadeia de Suprimentos \u2014 Linhagem"
          description: "Empregar [Atribui\xE7\xE3o: controles definidos pela organiza\xE7\
            \xE3o] e conduzir [Atribui\xE7\xE3o: an\xE1lise definida pela organiza\xE7\
            \xE3o] para assegurar a integridade do sistema e dos componentes de sistema,\
            \ validando a composi\xE7\xE3o interna e a proced\xEAncia de tecnologias,\
            \ produtos e servi\xE7os cr\xEDticos ou essenciais \xE0 miss\xE3o."
          annotation: "Informa\xE7\xF5es autoritativas sobre a composi\xE7\xE3o interna\
            \ de componentes de sistema e a proced\xEAncia de tecnologias, produtos\
            \ e servi\xE7os fornecem uma base s\xF3lida para a confian\xE7a. A valida\xE7\
            \xE3o da composi\xE7\xE3o interna e da proced\xEAncia de tecnologias,\
            \ produtos e servi\xE7os \xE9 denominada linhagem (pedigree). Para microeletr\xF4\
            nica, isso inclui a composi\xE7\xE3o material dos componentes. Para software,\
            \ isso inclui a composi\xE7\xE3o de c\xF3digo aberto e propriet\xE1rio,\
            \ incluindo a vers\xE3o do componente em um determinado momento. As linhagens\
            \ aumentam a garantia de que as alega\xE7\xF5es que os fornecedores afirmam\
            \ sobre a composi\xE7\xE3o interna e a proced\xEAncia dos produtos, servi\xE7\
            os e tecnologias que fornecem s\xE3o v\xE1lidas. A valida\xE7\xE3o da\
            \ composi\xE7\xE3o interna e da proced\xEAncia pode ser alcan\xE7ada por\
            \ meio de diversos artefatos ou registros probat\xF3rios que os fabricantes\
            \ e fornecedores produzem durante a pesquisa e desenvolvimento, projeto,\
            \ fabrica\xE7\xE3o, aquisi\xE7\xE3o, entrega, integra\xE7\xE3o, opera\xE7\
            \xF5es e manuten\xE7\xE3o, e descarte de tecnologias, produtos e servi\xE7\
            os. Os artefatos probat\xF3rios incluem, entre outros, etiquetas de identifica\xE7\
            \xE3o de software (SWID), invent\xE1rio de componentes de software, as\
            \ declara\xE7\xF5es dos fabricantes sobre atributos da plataforma (por\
            \ exemplo, n\xFAmeros de s\xE9rie, invent\xE1rio de componentes de hardware)\
            \ e medi\xE7\xF5es (por exemplo, hashes de firmware) que est\xE3o estreitamente\
            \ vinculadas ao pr\xF3prio hardware."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-5
      name: Acquisition Strategies, Tools, and Methods
      description: 'Employ the following acquisition strategies, contract tools, and
        procurement methods to protect against, identify, and mitigate supply chain
        risks: [Assignment: organization-defined acquisition strategies, contract
        tools, and procurement methods].'
      annotation: The use of the acquisition process provides an important vehicle
        to protect the supply chain. There are many useful tools and techniques available,
        including obscuring the end use of a system or system component, using blind
        or filtered buys, requiring tamper-evident packaging, or using trusted or
        controlled distribution. The results from a supply chain risk assessment can
        guide and inform the strategies, tools, and methods that are most applicable
        to the situation. Tools and techniques may provide protections against unauthorized
        production, theft, tampering, insertion of counterfeits, insertion of malicious
        software or backdoors, and poor development practices throughout the system
        development life cycle. Organizations also consider providing incentives for
        suppliers who implement controls, promote transparency into their processes
        and security and privacy practices, provide contract language that addresses
        the prohibition of tainted or counterfeit components, and restrict purchases
        from untrustworthy suppliers. Organizations consider providing training, education,
        and awareness programs for personnel regarding supply chain risk, available
        mitigation strategies, and when the programs should be employed. Methods for
        reviewing and protecting development plans, documentation, and evidence are
        commensurate with the security and privacy requirements of the organization.
        Contracts may specify documentation protection requirements.
      translations:
        pt:
          name: "Estrat\xE9gias, Ferramentas e M\xE9todos de Aquisi\xE7\xE3o"
          description: "Empregar as seguintes estrat\xE9gias de aquisi\xE7\xE3o, ferramentas\
            \ contratuais e m\xE9todos de compra para proteger contra, identificar\
            \ e mitigar riscos da cadeia de suprimentos: [Atribui\xE7\xE3o: estrat\xE9\
            gias de aquisi\xE7\xE3o, ferramentas contratuais e m\xE9todos de compra\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "O uso do processo de aquisi\xE7\xE3o fornece um ve\xEDculo\
            \ importante para proteger a cadeia de suprimentos. Existem muitas ferramentas\
            \ e t\xE9cnicas \xFAteis dispon\xEDveis, incluindo ocultar o uso final\
            \ de um sistema ou componente de sistema, usar compras cegas ou filtradas,\
            \ exigir embalagem com evid\xEAncia de viola\xE7\xE3o, ou usar distribui\xE7\
            \xE3o confi\xE1vel ou controlada. Os resultados de uma avalia\xE7\xE3\
            o de risco da cadeia de suprimentos podem orientar e informar as estrat\xE9\
            gias, ferramentas e m\xE9todos mais aplic\xE1veis \xE0 situa\xE7\xE3o.\
            \ Ferramentas e t\xE9cnicas podem fornecer prote\xE7\xF5es contra produ\xE7\
            \xE3o n\xE3o autorizada, roubo, viola\xE7\xE3o, inser\xE7\xE3o de falsifica\xE7\
            \xF5es, inser\xE7\xE3o de software malicioso ou backdoors, e pr\xE1ticas\
            \ de desenvolvimento deficientes ao longo de todo o ciclo de vida de desenvolvimento\
            \ do sistema. As organiza\xE7\xF5es tamb\xE9m consideram oferecer incentivos\
            \ a fornecedores que implementam controles, promovem transpar\xEAncia\
            \ em seus processos e pr\xE1ticas de seguran\xE7a e privacidade, fornecem\
            \ linguagem contratual que aborda a proibi\xE7\xE3o de componentes adulterados\
            \ ou falsificados, e restringem compras de fornecedores n\xE3o confi\xE1\
            veis. As organiza\xE7\xF5es consideram fornecer programas de treinamento,\
            \ educa\xE7\xE3o e conscientiza\xE7\xE3o ao pessoal sobre riscos da cadeia\
            \ de suprimentos, estrat\xE9gias de mitiga\xE7\xE3o dispon\xEDveis e quando\
            \ os programas devem ser empregados. Os m\xE9todos de revis\xE3o e prote\xE7\
            \xE3o de planos de desenvolvimento, documenta\xE7\xE3o e evid\xEAncias\
            \ s\xE3o proporcionais aos requisitos de seguran\xE7a e privacidade da\
            \ organiza\xE7\xE3o. Os contratos podem especificar requisitos de prote\xE7\
            \xE3o da documenta\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-5(1)
      name: Acquisition Strategies, Tools, and Methods | Adequate Supply
      description: 'Employ the following controls to ensure an adequate supply of
        [Assignment: organization-defined critical system components]: [Assignment:
        organization-defined controls].'
      annotation: Adversaries can attempt to impede organizational operations by disrupting
        the supply of critical system components or corrupting supplier operations.
        Organizations may track systems and component mean time to failure to mitigate
        the loss of temporary or permanent system function. Controls to ensure that
        adequate supplies of critical system components include the use of multiple
        suppliers throughout the supply chain for the identified critical components,
        stockpiling spare components to ensure operation during mission-critical times,
        and the identification of functionally identical or similar components that
        may be used, if necessary.
      translations:
        pt:
          name: "Estrat\xE9gias, Ferramentas e M\xE9todos de Aquisi\xE7\xE3o | Suprimento\
            \ Adequado"
          description: "Empregar os seguintes controles para assegurar um suprimento\
            \ adequado de [Atribui\xE7\xE3o: componentes cr\xEDticos de sistema definidos\
            \ pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: controles definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Os advers\xE1rios podem tentar impedir as opera\xE7\xF5es organizacionais\
            \ ao interromper o suprimento de componentes cr\xEDticos de sistema ou\
            \ ao corromper as opera\xE7\xF5es dos fornecedores. As organiza\xE7\xF5\
            es podem acompanhar o tempo m\xE9dio at\xE9 a falha de sistemas e componentes\
            \ para mitigar a perda de fun\xE7\xE3o tempor\xE1ria ou permanente do\
            \ sistema. Os controles para assegurar suprimentos adequados de componentes\
            \ cr\xEDticos de sistema incluem o uso de m\xFAltiplos fornecedores ao\
            \ longo da cadeia de suprimentos para os componentes cr\xEDticos identificados,\
            \ o estoque de componentes sobressalentes para assegurar a opera\xE7\xE3\
            o durante momentos cr\xEDticos para a miss\xE3o, e a identifica\xE7\xE3\
            o de componentes funcionalmente id\xEAnticos ou similares que possam ser\
            \ utilizados, se necess\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-5(2)
      name: Acquisition Strategies, Tools, and Methods | Assessments Prior to Selection,
        Acceptance, Modification, or Update
      description: Assess the system, system component, or system service prior to
        selection, acceptance, modification, or update.
      annotation: Organizational personnel or independent, external entities conduct
        assessments of systems, components, products, tools, and services to uncover
        evidence of tampering, unintentional and intentional vulnerabilities, or evidence
        of non-compliance with supply chain controls. These include malicious code,
        malicious processes, defective software, backdoors, and counterfeits. Assessments
        can include evaluations; design proposal reviews; visual or physical inspection;
        static and dynamic analyses; visual, x-ray, or magnetic particle inspections;
        simulations; white, gray, or black box testing; fuzz testing; stress testing;
        and penetration testing (see SR-6(1)). Evidence generated during assessments
        is documented for follow-on actions by organizations. The evidence generated
        during the organizational or independent assessments of supply chain elements
        may be used to improve supply chain processes and inform the supply chain
        risk management process. The evidence can be leveraged in follow-on assessments.
        Evidence and other documentation may be shared in accordance with organizational
        agreements.
      translations:
        pt:
          name: "Estrat\xE9gias, Ferramentas e M\xE9todos de Aquisi\xE7\xE3o | Avalia\xE7\
            \xF5es Antes da Sele\xE7\xE3o, Aceita\xE7\xE3o, Modifica\xE7\xE3o ou Atualiza\xE7\
            \xE3o"
          description: "Avaliar o sistema, componente de sistema ou servi\xE7o de\
            \ sistema antes da sele\xE7\xE3o, aceita\xE7\xE3o, modifica\xE7\xE3o ou\
            \ atualiza\xE7\xE3o."
          annotation: "Pessoal organizacional ou entidades externas independentes\
            \ conduzem avalia\xE7\xF5es de sistemas, componentes, produtos, ferramentas\
            \ e servi\xE7os para descobrir evid\xEAncias de viola\xE7\xE3o, vulnerabilidades\
            \ n\xE3o intencionais e intencionais, ou evid\xEAncias de n\xE3o conformidade\
            \ com os controles da cadeia de suprimentos. Estas incluem c\xF3digo malicioso,\
            \ processos maliciosos, software defeituoso, backdoors e falsifica\xE7\
            \xF5es. As avalia\xE7\xF5es podem incluir an\xE1lises de avalia\xE7\xE3\
            o; revis\xF5es de propostas de projeto; inspe\xE7\xE3o visual ou f\xED\
            sica; an\xE1lises est\xE1ticas e din\xE2micas; inspe\xE7\xF5es visuais,\
            \ por raios-X ou por part\xEDculas magn\xE9ticas; simula\xE7\xF5es; testes\
            \ de caixa branca, cinza ou preta; testes de fuzzing; testes de estresse;\
            \ e testes de penetra\xE7\xE3o (consulte SR-6(1)). As evid\xEAncias geradas\
            \ durante as avalia\xE7\xF5es s\xE3o documentadas para a\xE7\xF5es subsequentes\
            \ pelas organiza\xE7\xF5es. As evid\xEAncias geradas durante as avalia\xE7\
            \xF5es organizacionais ou independentes de elementos da cadeia de suprimentos\
            \ podem ser usadas para melhorar os processos da cadeia de suprimentos\
            \ e informar o processo de gest\xE3o de riscos da cadeia de suprimentos.\
            \ As evid\xEAncias podem ser aproveitadas em avalia\xE7\xF5es subsequentes.\
            \ Evid\xEAncias e outra documenta\xE7\xE3o podem ser compartilhadas de\
            \ acordo com os acordos organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-6
      name: Supplier Assessments and Reviews
      description: 'Assess and review the supply chain-related risks associated with
        suppliers or contractors and the system, system component, or system service
        they provide [Assignment: organization-defined frequency].'
      annotation: An assessment and review of supplier risk includes security and
        supply chain risk management processes, foreign ownership, control or influence
        (FOCI), and the ability of the supplier to effectively assess subordinate
        second-tier and third-tier suppliers and contractors. The reviews may be conducted
        by the organization or by an independent third party. The reviews consider
        documented processes, documented controls, all-source intelligence, and publicly
        available information related to the supplier or contractor. Organizations
        can use open-source information to monitor for indications of stolen information,
        poor development and quality control practices, information spillage, or counterfeits.
        In some cases, it may be appropriate or required to share assessment and review
        results with other organizations in accordance with any applicable rules,
        policies, or inter-organizational agreements or contracts.
      translations:
        pt:
          name: "Avalia\xE7\xF5es e Revis\xF5es de Fornecedores"
          description: "Avaliar e revisar os riscos relacionados \xE0 cadeia de suprimentos\
            \ associados aos fornecedores ou contratados e ao sistema, componente\
            \ de sistema ou servi\xE7o de sistema que fornecem [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o]."
          annotation: "Uma avalia\xE7\xE3o e revis\xE3o do risco do fornecedor inclui\
            \ processos de gest\xE3o de riscos de seguran\xE7a e da cadeia de suprimentos,\
            \ propriedade, controle ou influ\xEAncia estrangeira (FOCI) e a capacidade\
            \ do fornecedor de avaliar efetivamente fornecedores e contratados subordinados\
            \ de segundo e terceiro escal\xF5es. As revis\xF5es podem ser conduzidas\
            \ pela organiza\xE7\xE3o ou por um terceiro independente. As revis\xF5\
            es consideram processos documentados, controles documentados, intelig\xEA\
            ncia de todas as fontes e informa\xE7\xF5es publicamente dispon\xEDveis\
            \ relacionadas ao fornecedor ou contratado. As organiza\xE7\xF5es podem\
            \ usar informa\xE7\xF5es de c\xF3digo aberto para monitorar ind\xEDcios\
            \ de informa\xE7\xF5es roubadas, pr\xE1ticas deficientes de desenvolvimento\
            \ e controle de qualidade, vazamento de informa\xE7\xF5es ou falsifica\xE7\
            \xF5es. Em alguns casos, pode ser apropriado ou obrigat\xF3rio compartilhar\
            \ os resultados da avalia\xE7\xE3o e revis\xE3o com outras organiza\xE7\
            \xF5es, de acordo com quaisquer regras, pol\xEDticas ou acordos ou contratos\
            \ interorganizacionais aplic\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-6(1)
      name: Supplier Assessments and Reviews | Testing and Analysis
      description: 'Employ [Selection (one or more): organizational analysis; independent
        third-party analysis; organizational testing; independent third-party testing]
        of the following supply chain elements, processes, and actors associated with
        the system, system component, or system service: [Assignment: organization-defined
        supply chain elements, processes, and actors].'
      annotation: Relationships between entities and procedures within the supply
        chain, including development and delivery, are considered. Supply chain elements
        include organizations, entities, or tools that are used for the research and
        development, design, manufacturing, acquisition, delivery, integration, operations,
        maintenance, and disposal of systems, system components, or system services.
        Supply chain processes include supply chain risk management programs; SCRM
        strategies and implementation plans; personnel and physical security programs;
        hardware, software, and firmware development processes; configuration management
        tools, techniques, and measures to maintain provenance; shipping and handling
        procedures; and programs, processes, or procedures associated with the production
        and distribution of supply chain elements. Supply chain actors are individuals
        with specific roles and responsibilities in the supply chain. The evidence
        generated and collected during analyses and testing of supply chain elements,
        processes, and actors is documented and used to inform organizational risk
        management activities and decisions.
      translations:
        pt:
          name: "Avalia\xE7\xF5es e Revis\xF5es de Fornecedores | Testes e An\xE1\
            lise"
          description: "Empregar [Sele\xE7\xE3o (um ou mais): an\xE1lise organizacional;\
            \ an\xE1lise por terceiro independente; testes organizacionais; testes\
            \ por terceiro independente] dos seguintes elementos, processos e atores\
            \ da cadeia de suprimentos associados ao sistema, componente de sistema\
            \ ou servi\xE7o de sistema: [Atribui\xE7\xE3o: elementos, processos e\
            \ atores da cadeia de suprimentos definidos pela organiza\xE7\xE3o]."
          annotation: "S\xE3o considerados os relacionamentos entre entidades e procedimentos\
            \ dentro da cadeia de suprimentos, incluindo desenvolvimento e entrega.\
            \ Os elementos da cadeia de suprimentos incluem organiza\xE7\xF5es, entidades\
            \ ou ferramentas usadas para a pesquisa e desenvolvimento, projeto, fabrica\xE7\
            \xE3o, aquisi\xE7\xE3o, entrega, integra\xE7\xE3o, manuten\xE7\xE3o e\
            \ descarte de sistemas, componentes de sistema ou servi\xE7os de sistema.\
            \ Os processos da cadeia de suprimentos incluem programas de gest\xE3\
            o de riscos da cadeia de suprimentos; estrat\xE9gias e planos de implementa\xE7\
            \xE3o de SCRM; programas de seguran\xE7a de pessoal e f\xEDsica; processos\
            \ de desenvolvimento de hardware, software e firmware; ferramentas, t\xE9\
            cnicas e medidas de gest\xE3o de configura\xE7\xE3o para manter a proced\xEA\
            ncia; procedimentos de envio e manuseio; e programas, processos ou procedimentos\
            \ associados \xE0 produ\xE7\xE3o e distribui\xE7\xE3o de elementos da\
            \ cadeia de suprimentos. Os atores da cadeia de suprimentos s\xE3o indiv\xED\
            duos com pap\xE9is e responsabilidades espec\xEDficos na cadeia de suprimentos.\
            \ As evid\xEAncias geradas e coletadas durante as an\xE1lises e testes\
            \ de elementos, processos e atores da cadeia de suprimentos s\xE3o documentadas\
            \ e usadas para informar as atividades e decis\xF5es de gest\xE3o de riscos\
            \ organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-7
      name: Supply Chain Operations Security
      description: 'Employ the following Operations Security (OPSEC) controls to protect
        supply chain-related information for the system, system component, or system
        service: [Assignment: organization-defined Operations Security (OPSEC) controls].'
      annotation: Supply chain OPSEC expands the scope of OPSEC to include suppliers
        and potential suppliers. OPSEC is a process that includes identifying critical
        information, analyzing friendly actions related to operations and other activities
        to identify actions that can be observed by potential adversaries, determining
        indicators that potential adversaries might obtain that could be interpreted
        or pieced together to derive information in sufficient time to cause harm
        to organizations, implementing safeguards or countermeasures to eliminate
        or reduce exploitable vulnerabilities and risk to an acceptable level, and
        considering how aggregated information may expose users or specific uses of
        the supply chain. Supply chain information includes user identities; uses
        for systems, system components, and system services; supplier identities;
        security and privacy requirements; system and component configurations; supplier
        processes; design specifications; and testing and evaluation results. Supply
        chain OPSEC may require organizations to withhold mission or business information
        from suppliers and may include the use of intermediaries to hide the end use
        or users of systems, system components, or system services.
      translations:
        pt:
          name: "Seguran\xE7a das Opera\xE7\xF5es da Cadeia de Suprimentos"
          description: "Empregar os seguintes controles de Seguran\xE7a das Opera\xE7\
            \xF5es (OPSEC) para proteger as informa\xE7\xF5es relacionadas \xE0 cadeia\
            \ de suprimentos do sistema, componente de sistema ou servi\xE7o de sistema:\
            \ [Atribui\xE7\xE3o: controles de Seguran\xE7a das Opera\xE7\xF5es (OPSEC)\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A OPSEC da cadeia de suprimentos expande o escopo da OPSEC\
            \ para incluir fornecedores e potenciais fornecedores. A OPSEC \xE9 um\
            \ processo que inclui identificar informa\xE7\xF5es cr\xEDticas, analisar\
            \ a\xE7\xF5es amig\xE1veis relacionadas a opera\xE7\xF5es e outras atividades\
            \ para identificar a\xE7\xF5es que possam ser observadas por potenciais\
            \ advers\xE1rios, determinar indicadores que potenciais advers\xE1rios\
            \ possam obter e que poderiam ser interpretados ou reunidos para derivar\
            \ informa\xE7\xF5es em tempo suficiente para causar danos \xE0s organiza\xE7\
            \xF5es, implementar salvaguardas ou contramedidas para eliminar ou reduzir\
            \ vulnerabilidades explor\xE1veis e o risco a um n\xEDvel aceit\xE1vel,\
            \ e considerar como informa\xE7\xF5es agregadas podem expor usu\xE1rios\
            \ ou usos espec\xEDficos da cadeia de suprimentos. As informa\xE7\xF5\
            es da cadeia de suprimentos incluem identidades de usu\xE1rios; usos de\
            \ sistemas, componentes de sistema e servi\xE7os de sistema; identidades\
            \ de fornecedores; requisitos de seguran\xE7a e privacidade; configura\xE7\
            \xF5es de sistema e componentes; processos dos fornecedores; especifica\xE7\
            \xF5es de projeto; e resultados de testes e avalia\xE7\xF5es. A OPSEC\
            \ da cadeia de suprimentos pode exigir que as organiza\xE7\xF5es retenham\
            \ informa\xE7\xF5es de miss\xE3o ou de neg\xF3cios dos fornecedores e\
            \ pode incluir o uso de intermedi\xE1rios para ocultar o uso final ou\
            \ os usu\xE1rios de sistemas, componentes de sistema ou servi\xE7os de\
            \ sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-8
      name: Notification Agreements
      description: 'Establish agreements and procedures with entities involved in
        the supply chain for the system, system component, or system service for the
        [Selection (one or more): notification of supply chain compromises; results
        of assessments or audits; [Assignment: organization-defined information]].'
      annotation: The establishment of agreements and procedures facilitates communications
        among supply chain entities. Early notification of compromises and potential
        compromises in the supply chain that can potentially adversely affect or have
        adversely affected organizational systems or system components is essential
        for organizations to effectively respond to such incidents. The results of
        assessments or audits may include open-source information that contributed
        to a decision or result and could be used to help the supply chain entity
        resolve a concern or improve its processes.
      translations:
        pt:
          name: "Acordos de Notifica\xE7\xE3o"
          description: "Estabelecer acordos e procedimentos com as entidades envolvidas\
            \ na cadeia de suprimentos do sistema, componente de sistema ou servi\xE7\
            o de sistema para a [Sele\xE7\xE3o (um ou mais): notifica\xE7\xE3o de\
            \ comprometimentos da cadeia de suprimentos; resultados de avalia\xE7\xF5\
            es ou auditorias; [Atribui\xE7\xE3o: informa\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o]]."
          annotation: "O estabelecimento de acordos e procedimentos facilita as comunica\xE7\
            \xF5es entre as entidades da cadeia de suprimentos. A notifica\xE7\xE3\
            o antecipada de comprometimentos e potenciais comprometimentos na cadeia\
            \ de suprimentos que possam afetar adversamente ou tenham afetado adversamente\
            \ sistemas ou componentes de sistema organizacionais \xE9 essencial para\
            \ que as organiza\xE7\xF5es respondam efetivamente a tais incidentes.\
            \ Os resultados de avalia\xE7\xF5es ou auditorias podem incluir informa\xE7\
            \xF5es de c\xF3digo aberto que contribu\xEDram para uma decis\xE3o ou\
            \ resultado e que poderiam ser usadas para ajudar a entidade da cadeia\
            \ de suprimentos a resolver uma preocupa\xE7\xE3o ou melhorar seus processos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-9
      name: Tamper Resistance and Detection
      description: Implement a tamper protection program for the system, system component,
        or system service.
      annotation: Anti-tamper technologies, tools, and techniques provide a level
        of protection for systems, system components, and services against many threats,
        including reverse engineering, modification, and substitution. Strong identification
        combined with tamper resistance and/or tamper detection is essential to protecting
        systems and components during distribution and when in use.
      translations:
        pt:
          name: "Resist\xEAncia e Detec\xE7\xE3o de Viola\xE7\xE3o"
          description: "Implementar um programa de prote\xE7\xE3o contra viola\xE7\
            \xE3o para o sistema, componente de sistema ou servi\xE7o de sistema."
          annotation: "Tecnologias, ferramentas e t\xE9cnicas antiviola\xE7\xE3o fornecem\
            \ um n\xEDvel de prote\xE7\xE3o para sistemas, componentes de sistema\
            \ e servi\xE7os contra muitas amea\xE7as, incluindo engenharia reversa,\
            \ modifica\xE7\xE3o e substitui\xE7\xE3o. A identifica\xE7\xE3o robusta\
            \ combinada com resist\xEAncia \xE0 viola\xE7\xE3o e/ou detec\xE7\xE3\
            o de viola\xE7\xE3o \xE9 essencial para proteger sistemas e componentes\
            \ durante a distribui\xE7\xE3o e quando em uso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-9(1)
      name: Tamper Resistance and Detection | Multiple Stages of System Development
        Life Cycle
      description: Employ anti-tamper technologies, tools, and techniques throughout
        the system development life cycle.
      annotation: The system development life cycle includes research and development,
        design, manufacturing, acquisition, delivery, integration, operations and
        maintenance, and disposal. Organizations use a combination of hardware and
        software techniques for tamper resistance and detection. Organizations use
        obfuscation and self-checking to make reverse engineering and modifications
        more difficult, time-consuming, and expensive for adversaries. The customization
        of systems and system components can make substitutions easier to detect and
        therefore limit damage.
      translations:
        pt:
          name: "Resist\xEAncia e Detec\xE7\xE3o de Viola\xE7\xE3o | M\xFAltiplas\
            \ Etapas do Ciclo de Vida de Desenvolvimento do Sistema"
          description: "Empregar tecnologias, ferramentas e t\xE9cnicas antiviola\xE7\
            \xE3o ao longo de todo o ciclo de vida de desenvolvimento do sistema."
          annotation: "O ciclo de vida de desenvolvimento do sistema inclui pesquisa\
            \ e desenvolvimento, projeto, fabrica\xE7\xE3o, aquisi\xE7\xE3o, entrega,\
            \ integra\xE7\xE3o, opera\xE7\xF5es e manuten\xE7\xE3o, e descarte. As\
            \ organiza\xE7\xF5es usam uma combina\xE7\xE3o de t\xE9cnicas de hardware\
            \ e software para resist\xEAncia e detec\xE7\xE3o de viola\xE7\xE3o. As\
            \ organiza\xE7\xF5es usam ofusca\xE7\xE3o e autoverifica\xE7\xE3o para\
            \ tornar a engenharia reversa e as modifica\xE7\xF5es mais dif\xEDceis,\
            \ demoradas e custosas para os advers\xE1rios. A personaliza\xE7\xE3o\
            \ de sistemas e componentes de sistema pode tornar as substitui\xE7\xF5\
            es mais f\xE1ceis de detectar e, portanto, limitar os danos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-10
      name: Inspection of Systems or Components
      description: 'Inspect the following systems or system components [Selection
        (one or more): at random; at [Assignment: organization-defined frequency],
        upon [Assignment: organization-defined indications of need for inspection]]
        to detect tampering: [Assignment: organization-defined systems or system components].'
      annotation: The inspection of systems or systems components for tamper resistance
        and detection addresses physical and logical tampering and is applied to systems
        and system components removed from organization-controlled areas. Indications
        of a need for inspection include changes in packaging, specifications, factory
        location, or entity in which the part is purchased, and when individuals return
        from travel to high-risk locations.
      translations:
        pt:
          name: "Inspe\xE7\xE3o de Sistemas ou Componentes"
          description: "Inspecionar os seguintes sistemas ou componentes de sistema\
            \ [Sele\xE7\xE3o (um ou mais): aleatoriamente; com [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o], mediante [Atribui\xE7\
            \xE3o: indica\xE7\xF5es de necessidade de inspe\xE7\xE3o definidas pela\
            \ organiza\xE7\xE3o]] para detectar viola\xE7\xE3o: [Atribui\xE7\xE3o:\
            \ sistemas ou componentes de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "A inspe\xE7\xE3o de sistemas ou componentes de sistema para\
            \ resist\xEAncia e detec\xE7\xE3o de viola\xE7\xE3o aborda a viola\xE7\
            \xE3o f\xEDsica e l\xF3gica e \xE9 aplicada a sistemas e componentes de\
            \ sistema removidos de \xE1reas controladas pela organiza\xE7\xE3o. As\
            \ indica\xE7\xF5es de necessidade de inspe\xE7\xE3o incluem mudan\xE7\
            as na embalagem, especifica\xE7\xF5es, localiza\xE7\xE3o da f\xE1brica\
            \ ou entidade da qual a pe\xE7a \xE9 adquirida, e quando indiv\xEDduos\
            \ retornam de viagens a locais de alto risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr
      ref_id: SR-11
      name: Component Authenticity
      description: 'a. Develop and implement anti-counterfeit policy and procedures
        that include the means to detect and prevent counterfeit components from entering
        the system; and

        b. Report counterfeit system components to [Selection (one or more): source
        of counterfeit component; [Assignment: organization-defined external reporting
        organizations]; [Assignment: organization-defined personnel or roles]].'
      annotation: Sources of counterfeit components include manufacturers, developers,
        vendors, and contractors. Anti-counterfeiting policies and procedures support
        tamper resistance and provide a level of protection against the introduction
        of malicious code. External reporting organizations include CISA.
      translations:
        pt:
          name: Autenticidade de Componentes
          description: "a. Desenvolver e implementar pol\xEDtica e procedimentos antifalsifica\xE7\
            \xE3o que incluam os meios para detectar e impedir que componentes falsificados\
            \ entrem no sistema; e\nb. Reportar componentes de sistema falsificados\
            \ para [Sele\xE7\xE3o (um ou mais): fonte do componente falsificado; [Atribui\xE7\
            \xE3o: organiza\xE7\xF5es externas de reporte definidas pela organiza\xE7\
            \xE3o]; [Atribui\xE7\xE3o: pessoal ou pap\xE9is definidos pela organiza\xE7\
            \xE3o]]."
          annotation: "As fontes de componentes falsificados incluem fabricantes,\
            \ desenvolvedores, fornecedores e contratados. As pol\xEDticas e procedimentos\
            \ antifalsifica\xE7\xE3o apoiam a resist\xEAncia \xE0 viola\xE7\xE3o e\
            \ fornecem um n\xEDvel de prote\xE7\xE3o contra a introdu\xE7\xE3o de\
            \ c\xF3digo malicioso. As organiza\xE7\xF5es externas de reporte incluem\
            \ a CISA."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sr-11(1)

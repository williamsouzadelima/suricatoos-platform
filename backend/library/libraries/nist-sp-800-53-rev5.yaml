    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] access control policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the access control policy
        and the associated access controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the access control policy
        and procedures; and

        c. Review and update the current access control:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Access control policy and procedures address the controls in the
        AC family that are implemented within systems and organizations. The risk
        management strategy is an important factor in establishing such policies and
        procedures. Policies and procedures contribute to security and privacy assurance.
        Therefore, it is important that security and privacy programs collaborate
        on the development of access control policy and procedures. Security and privacy
        program policies and procedures at the organization level are preferable,
        in general, and may obviate the need for mission- or system-specific policies
        and procedures. The policy can be included as part of the general security
        and privacy policy or be represented by multiple policies reflecting the complex
        nature of organizations. Procedures can be established for security and privacy
        programs, for mission or business processes, and for systems, if needed. Procedures
        describe how the policies or controls are implemented and can be directed
        at the individual or role that is the object of the procedure. Procedures
        can be documented in system security and privacy plans or in one or more separate
        documents. Events that may precipitate an update to access control policy
        and procedures include assessment or audit findings, security incidents or
        breaches, or changes in laws, executive orders, directives, regulations, policies,
        standards, and guidelines. Simply restating controls does not constitute an
        organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidas pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de controle de acesso [Sele\xE7\xE3o (uma ou mais): de n\xEDvel organizacional;\
            \ de n\xEDvel de processo de miss\xE3o/neg\xF3cio; de n\xEDvel de sistema]\
            \ que:\n(a) Aborde prop\xF3sito, escopo, fun\xE7\xF5es, responsabilidades,\
            \ comprometimento da gest\xE3o, coordena\xE7\xE3o entre entidades organizacionais\
            \ e conformidade; e\n(b) Seja consistente com leis, ordens executivas,\
            \ diretrizes, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3o da pol\xED\
            tica de controle de acesso e dos controles de acesso associados;\nb. Designar\
            \ um [Atribui\xE7\xE3o: respons\xE1vel definido pela organiza\xE7\xE3\
            o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de controle de acesso; e\nc.\
            \ Revisar e atualizar o(s) atual(is) controle(s) de acesso:\n1. Pol\xED\
            tica [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o]\
            \ e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3\
            o]; e\n2. Procedimentos [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de controle de acesso abordam\
            \ os controles da fam\xEDlia AC que s\xE3o implementados em sistemas e\
            \ organiza\xE7\xF5es. A estrat\xE9gia de gest\xE3o de riscos \xE9 um fator\
            \ importante no estabelecimento de tais pol\xEDticas e procedimentos.\
            \ Pol\xEDticas e procedimentos contribuem para a garantia de seguran\xE7\
            a e privacidade. Portanto, \xE9 importante que os programas de seguran\xE7\
            a e privacidade colaborem no desenvolvimento da pol\xEDtica e dos procedimentos\
            \ de controle de acesso. As pol\xEDticas e os procedimentos dos programas\
            \ de seguran\xE7a e privacidade no n\xEDvel organizacional s\xE3o, em\
            \ geral, prefer\xEDveis e podem dispensar a necessidade de pol\xEDticas\
            \ e procedimentos espec\xEDficos de miss\xE3o ou de sistema. A pol\xED\
            tica pode ser inclu\xEDda como parte da pol\xEDtica geral de seguran\xE7\
            a e privacidade ou ser representada por m\xFAltiplas pol\xEDticas que\
            \ reflitam a natureza complexa das organiza\xE7\xF5es. Procedimentos podem\
            \ ser estabelecidos para programas de seguran\xE7a e privacidade, para\
            \ processos de miss\xE3o ou de neg\xF3cio e para sistemas, se necess\xE1\
            rio. Os procedimentos descrevem como as pol\xEDticas ou os controles s\xE3\
            o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0 fun\xE7\
            \xE3o que \xE9 o objeto do procedimento. Os procedimentos podem ser documentados\
            \ nos planos de seguran\xE7a e privacidade do sistema ou em um ou mais\
            \ documentos separados. Eventos que podem motivar uma atualiza\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de controle de acesso incluem constata\xE7\
            \xF5es de avalia\xE7\xE3o ou auditoria, incidentes ou viola\xE7\xF5es\
            \ de seguran\xE7a, ou mudan\xE7as em leis, ordens executivas, diretrizes,\
            \ regulamentos, pol\xEDticas, normas e diretrizes. A simples repeti\xE7\
            \xE3o dos controles n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2
      name: Account Management
      description: 'a. Define and document the types of accounts allowed and specifically
        prohibited for use within the system;

        b. Assign account managers;

        c. Require [Assignment: organization-defined prerequisites and criteria] for
        group and role membership;

        d. Specify:

        1. Authorized users of the system;

        2. Group and role membership; and

        3. Access authorizations (i.e., privileges) and [Assignment: organization-defined
        attributes (as required)] for each account;

        e. Require approvals by [Assignment: organization-defined personnel or roles]
        for requests to create accounts;

        f. Create, enable, modify, disable, and remove accounts in accordance with
        [Assignment: organization-defined policy, procedures, prerequisites, and criteria];

        g. Monitor the use of accounts;

        h. Notify account managers and [Assignment: organization-defined personnel
        or roles] within:

        1. [Assignment: organization-defined time period] when accounts are no longer
        required;

        2. [Assignment: organization-defined time period] when users are terminated
        or transferred; and

        3. [Assignment: organization-defined time period] when system usage or need-to-know
        changes for an individual;

        i. Authorize access to the system based on:

        1. A valid access authorization;

        2. Intended system usage; and

        3. [Assignment: organization-defined attributes (as required)];

        j. Review accounts for compliance with account management requirements [Assignment:
        organization-defined frequency];

        k. Establish and implement a process for changing shared or group account
        authenticators (if deployed) when individuals are removed from the group;
        and

        l. Align account management processes with personnel termination and transfer
        processes.'
      annotation: 'Examples of system account types include individual, shared, group,
        system, guest, anonymous, emergency, developer, temporary, and service. Identification
        of authorized system users and the specification of access privileges reflect
        the requirements in other controls in the security plan. Users requiring administrative
        privileges on system accounts receive additional scrutiny by organizational
        personnel responsible for approving such accounts and privileged access, including
        system owner, mission or business owner, senior agency information security
        officer, or senior agency official for privacy. Types of accounts that organizations
        may wish to prohibit due to increased risk include shared, group, emergency,
        anonymous, temporary, and guest accounts.

        Where access involves personally identifiable information, security programs
        collaborate with the senior agency official for privacy to establish the specific
        conditions for group and role membership; specify authorized users, group
        and role membership, and access authorizations for each account; and create,
        adjust, or remove system accounts in accordance with organizational policies.
        Policies can include such information as account expiration dates or other
        factors that trigger the disabling of accounts. Organizations may choose to
        define access privileges or other attributes by account, type of account,
        or a combination of the two. Examples of other attributes required for authorizing
        access include restrictions on time of day, day of week, and point of origin.
        In defining other system account attributes, organizations consider system-related
        requirements and mission/business requirements. Failure to consider these
        factors could affect system availability.

        Temporary and emergency accounts are intended for short-term use. Organizations
        establish temporary accounts as part of normal account activation procedures
        when there is a need for short-term accounts without the demand for immediacy
        in account activation. Organizations establish emergency accounts in response
        to crisis situations and with the need for rapid account activation. Therefore,
        emergency account activation may bypass normal account authorization processes.
        Emergency and temporary accounts are not to be confused with infrequently
        used accounts, including local logon accounts used for special tasks or when
        network resources are unavailable (may also be known as accounts of last resort).
        Such accounts remain available and are not subject to automatic disabling
        or removal dates. Conditions for disabling or deactivating accounts include
        when shared/group, emergency, or temporary accounts are no longer required
        and when individuals are transferred or terminated. Changing shared/group
        authenticators when members leave the group is intended to ensure that former
        group members do not retain access to the shared or group account. Some types
        of system accounts may require specialized training.'
      translations:
        pt:
          name: "Gest\xE3o de Contas"
          description: "a. Definir e documentar os tipos de contas permitidas e especificamente\
            \ proibidas de uso no sistema;\nb. Designar gestores de contas;\nc. Exigir\
            \ [Atribui\xE7\xE3o: pr\xE9-requisitos e crit\xE9rios definidos pela organiza\xE7\
            \xE3o] para associa\xE7\xE3o a grupos e fun\xE7\xF5es;\nd. Especificar:\n\
            1. Usu\xE1rios autorizados do sistema;\n2. Associa\xE7\xE3o a grupos e\
            \ fun\xE7\xF5es; e\n3. Autoriza\xE7\xF5es de acesso (ou seja, privil\xE9\
            gios) e [Atribui\xE7\xE3o: atributos definidos pela organiza\xE7\xE3o\
            \ (conforme necess\xE1rio)] para cada conta;\ne. Exigir aprova\xE7\xF5\
            es por [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidas pela organiza\xE7\
            \xE3o] para solicita\xE7\xF5es de cria\xE7\xE3o de contas;\nf. Criar,\
            \ habilitar, modificar, desabilitar e remover contas em conformidade com\
            \ [Atribui\xE7\xE3o: pol\xEDtica, procedimentos, pr\xE9-requisitos e crit\xE9\
            rios definidos pela organiza\xE7\xE3o];\ng. Monitorar o uso das contas;\n\
            h. Notificar os gestores de contas e [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidas pela organiza\xE7\xE3o] dentro de:\n1. [Atribui\xE7\xE3\
            o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] quando as contas\
            \ n\xE3o forem mais necess\xE1rias;\n2. [Atribui\xE7\xE3o: per\xEDodo\
            \ de tempo definido pela organiza\xE7\xE3o] quando os usu\xE1rios forem\
            \ desligados ou transferidos; e\n3. [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o] quando o uso do sistema ou a necessidade\
            \ de conhecer (need-to-know) de um indiv\xEDduo mudar;\ni. Autorizar o\
            \ acesso ao sistema com base em:\n1. Uma autoriza\xE7\xE3o de acesso v\xE1\
            lida;\n2. Uso pretendido do sistema; e\n3. [Atribui\xE7\xE3o: atributos\
            \ definidos pela organiza\xE7\xE3o (conforme necess\xE1rio)];\nj. Revisar\
            \ as contas quanto \xE0 conformidade com os requisitos de gest\xE3o de\
            \ contas [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o];\nk. Estabelecer e implementar um processo para alterar os autenticadores\
            \ de contas compartilhadas ou de grupo (se implantados) quando indiv\xED\
            duos forem removidos do grupo; e\nl. Alinhar os processos de gest\xE3\
            o de contas com os processos de desligamento e transfer\xEAncia de pessoal."
          annotation: "Exemplos de tipos de contas de sistema incluem individual,\
            \ compartilhada, de grupo, de sistema, de convidado, an\xF4nima, de emerg\xEA\
            ncia, de desenvolvedor, tempor\xE1ria e de servi\xE7o. A identifica\xE7\
            \xE3o de usu\xE1rios autorizados do sistema e a especifica\xE7\xE3o dos\
            \ privil\xE9gios de acesso refletem os requisitos de outros controles\
            \ do plano de seguran\xE7a. Usu\xE1rios que requerem privil\xE9gios administrativos\
            \ em contas do sistema recebem escrut\xEDnio adicional por parte do pessoal\
            \ organizacional respons\xE1vel por aprovar tais contas e o acesso privilegiado,\
            \ incluindo o propriet\xE1rio do sistema, o propriet\xE1rio da miss\xE3\
            o ou do neg\xF3cio, o oficial s\xEAnior de seguran\xE7a da informa\xE7\
            \xE3o da ag\xEAncia ou o oficial s\xEAnior de privacidade da ag\xEAncia.\
            \ Tipos de contas que as organiza\xE7\xF5es podem desejar proibir devido\
            \ ao maior risco incluem contas compartilhadas, de grupo, de emerg\xEA\
            ncia, an\xF4nimas, tempor\xE1rias e de convidado.\nQuando o acesso envolve\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal, os programas de seguran\xE7\
            a colaboram com o oficial s\xEAnior de privacidade da ag\xEAncia para\
            \ estabelecer as condi\xE7\xF5es espec\xEDficas para associa\xE7\xE3o\
            \ a grupos e fun\xE7\xF5es; especificar usu\xE1rios autorizados, associa\xE7\
            \xE3o a grupos e fun\xE7\xF5es e autoriza\xE7\xF5es de acesso para cada\
            \ conta; e criar, ajustar ou remover contas do sistema em conformidade\
            \ com as pol\xEDticas organizacionais. As pol\xEDticas podem incluir informa\xE7\
            \xF5es como datas de expira\xE7\xE3o de contas ou outros fatores que acionam\
            \ a desabilita\xE7\xE3o de contas. As organiza\xE7\xF5es podem optar por\
            \ definir privil\xE9gios de acesso ou outros atributos por conta, por\
            \ tipo de conta ou por uma combina\xE7\xE3o dos dois. Exemplos de outros\
            \ atributos exigidos para autorizar o acesso incluem restri\xE7\xF5es\
            \ de hor\xE1rio do dia, dia da semana e ponto de origem. Ao definir outros\
            \ atributos de conta de sistema, as organiza\xE7\xF5es consideram requisitos\
            \ relacionados ao sistema e requisitos de miss\xE3o/neg\xF3cio. A falha\
            \ em considerar esses fatores pode afetar a disponibilidade do sistema.\n\
            Contas tempor\xE1rias e de emerg\xEAncia destinam-se a uso de curto prazo.\
            \ As organiza\xE7\xF5es estabelecem contas tempor\xE1rias como parte dos\
            \ procedimentos normais de ativa\xE7\xE3o de contas quando h\xE1 necessidade\
            \ de contas de curto prazo sem a exig\xEAncia de imediatismo na ativa\xE7\
            \xE3o. As organiza\xE7\xF5es estabelecem contas de emerg\xEAncia em resposta\
            \ a situa\xE7\xF5es de crise e com a necessidade de r\xE1pida ativa\xE7\
            \xE3o. Portanto, a ativa\xE7\xE3o de contas de emerg\xEAncia pode contornar\
            \ os processos normais de autoriza\xE7\xE3o de contas. Contas de emerg\xEA\
            ncia e tempor\xE1rias n\xE3o devem ser confundidas com contas de uso infrequente,\
            \ incluindo contas de logon local usadas para tarefas especiais ou quando\
            \ recursos de rede est\xE3o indispon\xEDveis (tamb\xE9m conhecidas como\
            \ contas de \xFAltimo recurso). Tais contas permanecem dispon\xEDveis\
            \ e n\xE3o est\xE3o sujeitas a datas de desabilita\xE7\xE3o ou remo\xE7\
            \xE3o autom\xE1ticas. As condi\xE7\xF5es para desabilitar ou desativar\
            \ contas incluem quando contas compartilhadas/de grupo, de emerg\xEAncia\
            \ ou tempor\xE1rias n\xE3o forem mais necess\xE1rias e quando indiv\xED\
            duos forem transferidos ou desligados. A altera\xE7\xE3o de autenticadores\
            \ compartilhados/de grupo quando membros deixam o grupo visa garantir\
            \ que ex-membros do grupo n\xE3o retenham acesso \xE0 conta compartilhada\
            \ ou de grupo. Alguns tipos de contas de sistema podem exigir treinamento\
            \ especializado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(1)
      name: Account Management | Automated System Account Management
      description: 'Support the management of system accounts using [Assignment: organization-defined
        automated mechanisms].'
      annotation: Automated system account management includes using automated mechanisms
        to create, enable, modify, disable, and remove accounts; notify account managers
        when an account is created, enabled, modified, disabled, or removed, or when
        users are terminated or transferred; monitor system account usage; and report
        atypical system account usage. Automated mechanisms can include internal system
        functions and email, telephonic, and text messaging notifications.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Gest\xE3o Automatizada de Contas de Sistema"
          description: "Apoiar a gest\xE3o de contas de sistema usando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "A gest\xE3o automatizada de contas de sistema inclui o uso\
            \ de mecanismos automatizados para criar, habilitar, modificar, desabilitar\
            \ e remover contas; notificar os gestores de contas quando uma conta \xE9\
            \ criada, habilitada, modificada, desabilitada ou removida, ou quando\
            \ usu\xE1rios s\xE3o desligados ou transferidos; monitorar o uso de contas\
            \ do sistema; e relatar uso at\xEDpico de contas do sistema. Os mecanismos\
            \ automatizados podem incluir fun\xE7\xF5es internas do sistema e notifica\xE7\
            \xF5es por e-mail, telefone e mensagem de texto."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(2)
      name: Account Management | Automated Temporary and Emergency Account Management
      description: 'Automatically [Selection: remove; disable] temporary and emergency
        accounts after [Assignment: organization-defined time period for each type
        of account].'
      annotation: Management of temporary and emergency accounts includes the removal
        or disabling of such accounts automatically after a predefined time period
        rather than at the convenience of the system administrator. Automatic removal
        or disabling of accounts provides a more consistent implementation.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Gest\xE3o Automatizada de Contas Tempor\xE1\
            rias e de Emerg\xEAncia"
          description: "Automaticamente [Sele\xE7\xE3o: remover; desabilitar] contas\
            \ tempor\xE1rias e de emerg\xEAncia ap\xF3s [Atribui\xE7\xE3o: per\xED\
            odo de tempo definido pela organiza\xE7\xE3o para cada tipo de conta]."
          annotation: "A gest\xE3o de contas tempor\xE1rias e de emerg\xEAncia inclui\
            \ a remo\xE7\xE3o ou desabilita\xE7\xE3o de tais contas automaticamente\
            \ ap\xF3s um per\xEDodo de tempo predefinido, em vez de a crit\xE9rio\
            \ do administrador do sistema. A remo\xE7\xE3o ou desabilita\xE7\xE3o\
            \ autom\xE1tica de contas proporciona uma implementa\xE7\xE3o mais consistente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(3)
      name: Account Management | Disable Accounts
      description: "Disable accounts within [Assignment: organization-defined time\
        \ period] when the accounts: \n(a) Have expired;\n(b) Are no longer associated\
        \ with a user or individual;\n(c) Are in violation of organizational policy;\
        \ or\n(d) Have been inactive for [Assignment: organization-defined time period]."
      annotation: Disabling expired, inactive, or otherwise anomalous accounts supports
        the concepts of least privilege and least functionality which reduce the attack
        surface of the system.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Desabilitar Contas"
          description: "Desabilitar contas dentro de [Atribui\xE7\xE3o: per\xEDodo\
            \ de tempo definido pela organiza\xE7\xE3o] quando as contas:\n(a) Tiverem\
            \ expirado;\n(b) N\xE3o estiverem mais associadas a um usu\xE1rio ou indiv\xED\
            duo;\n(c) Estiverem em viola\xE7\xE3o da pol\xEDtica organizacional; ou\n\
            (d) Estiverem inativas por [Atribui\xE7\xE3o: per\xEDodo de tempo definido\
            \ pela organiza\xE7\xE3o]."
          annotation: "Desabilitar contas expiradas, inativas ou de outra forma an\xF4\
            malas apoia os conceitos de menor privil\xE9gio e menor funcionalidade,\
            \ que reduzem a superf\xEDcie de ataque do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(4)
      name: Account Management | Automated Audit Actions
      description: Automatically audit account creation, modification, enabling, disabling,
        and removal actions.
      annotation: Account management audit records are defined in accordance with
        AU-2 and reviewed, analyzed, and reported in accordance with AU-6.
      translations:
        pt:
          name: "Gest\xE3o de Contas | A\xE7\xF5es de Auditoria Automatizadas"
          description: "Auditar automaticamente as a\xE7\xF5es de cria\xE7\xE3o, modifica\xE7\
            \xE3o, habilita\xE7\xE3o, desabilita\xE7\xE3o e remo\xE7\xE3o de contas."
          annotation: "Os registros de auditoria de gest\xE3o de contas s\xE3o definidos\
            \ em conformidade com o AU-2 e revisados, analisados e relatados em conformidade\
            \ com o AU-6."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(5)
      name: Account Management | Inactivity Logout
      description: 'Require that users log out when [Assignment: organization-defined
        time period of expected inactivity or description of when to log out].'
      annotation: Inactivity logout is behavior- or policy-based and requires users
        to take physical action to log out when they are expecting inactivity longer
        than the defined period. Automatic enforcement of inactivity logout is addressed
        by AC-11.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Logout por Inatividade"
          description: "Exigir que os usu\xE1rios encerrem a sess\xE3o (logout) quando\
            \ [Atribui\xE7\xE3o: per\xEDodo de tempo de inatividade esperada definido\
            \ pela organiza\xE7\xE3o ou descri\xE7\xE3o de quando encerrar a sess\xE3\
            o]."
          annotation: "O logout por inatividade \xE9 baseado em comportamento ou pol\xED\
            tica e exige que os usu\xE1rios tomem uma a\xE7\xE3o f\xEDsica para encerrar\
            \ a sess\xE3o quando esperam inatividade por um per\xEDodo mais longo\
            \ do que o definido. A aplica\xE7\xE3o autom\xE1tica do logout por inatividade\
            \ \xE9 tratada pelo AC-11."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(6)
      name: Account Management | Dynamic Privilege Management
      description: 'Implement [Assignment: organization-defined dynamic privilege
        management capabilities].'
      annotation: In contrast to access control approaches that employ static accounts
        and predefined user privileges, dynamic access control approaches rely on
        runtime access control decisions facilitated by dynamic privilege management,
        such as attribute-based access control. While user identities remain relatively
        constant over time, user privileges typically change more frequently based
        on ongoing mission or business requirements and the operational needs of organizations.
        An example of dynamic privilege management is the immediate revocation of
        privileges from users as opposed to requiring that users terminate and restart
        their sessions to reflect changes in privileges. Dynamic privilege management
        can also include mechanisms that change user privileges based on dynamic rules
        as opposed to editing specific user profiles. Examples include automatic adjustments
        of user privileges if they are operating out of their normal work times, if
        their job function or assignment changes, or if systems are under duress or
        in emergency situations. Dynamic privilege management includes the effects
        of privilege changes, for example, when there are changes to encryption keys
        used for communications.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Gest\xE3o Din\xE2mica de Privil\xE9gios"
          description: "Implementar [Atribui\xE7\xE3o: capacidades de gest\xE3o din\xE2\
            mica de privil\xE9gios definidas pela organiza\xE7\xE3o]."
          annotation: "Em contraste com as abordagens de controle de acesso que empregam\
            \ contas est\xE1ticas e privil\xE9gios de usu\xE1rio predefinidos, as\
            \ abordagens din\xE2micas de controle de acesso baseiam-se em decis\xF5\
            es de controle de acesso em tempo de execu\xE7\xE3o, facilitadas pela\
            \ gest\xE3o din\xE2mica de privil\xE9gios, como o controle de acesso baseado\
            \ em atributos. Embora as identidades dos usu\xE1rios permane\xE7am relativamente\
            \ constantes ao longo do tempo, os privil\xE9gios dos usu\xE1rios normalmente\
            \ mudam com mais frequ\xEAncia com base em requisitos cont\xEDnuos de\
            \ miss\xE3o ou neg\xF3cio e nas necessidades operacionais das organiza\xE7\
            \xF5es. Um exemplo de gest\xE3o din\xE2mica de privil\xE9gios \xE9 a revoga\xE7\
            \xE3o imediata de privil\xE9gios dos usu\xE1rios, em vez de exigir que\
            \ os usu\xE1rios encerrem e reiniciem suas sess\xF5es para refletir as\
            \ mudan\xE7as nos privil\xE9gios. A gest\xE3o din\xE2mica de privil\xE9\
            gios tamb\xE9m pode incluir mecanismos que alteram os privil\xE9gios dos\
            \ usu\xE1rios com base em regras din\xE2micas, em vez de editar perfis\
            \ de usu\xE1rio espec\xEDficos. Exemplos incluem ajustes autom\xE1ticos\
            \ dos privil\xE9gios dos usu\xE1rios se eles estiverem operando fora de\
            \ seus hor\xE1rios normais de trabalho, se sua fun\xE7\xE3o ou atribui\xE7\
            \xE3o mudar, ou se os sistemas estiverem sob coa\xE7\xE3o ou em situa\xE7\
            \xF5es de emerg\xEAncia. A gest\xE3o din\xE2mica de privil\xE9gios inclui\
            \ os efeitos das mudan\xE7as de privil\xE9gios, por exemplo, quando h\xE1\
            \ altera\xE7\xF5es nas chaves de criptografia usadas para comunica\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(7)
      name: Account Management | Privileged User Accounts
      description: '(a) Establish and administer privileged user accounts in accordance
        with [Selection: a role-based access scheme; an attribute-based access scheme];

        (b) Monitor privileged role or attribute assignments;

        (c) Monitor changes to roles or attributes; and

        (d) Revoke access when privileged role or attribute assignments are no longer
        appropriate.'
      annotation: Privileged roles are organization-defined roles assigned to individuals
        that allow those individuals to perform certain security-relevant functions
        that ordinary users are not authorized to perform. Privileged roles include
        key management, account management, database administration, system and network
        administration, and web administration. A role-based access scheme organizes
        permitted system access and privileges into roles. In contrast, an attribute-based
        access scheme specifies allowed system access and privileges based on attributes.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Contas de Usu\xE1rio Privilegiado"
          description: "(a) Estabelecer e administrar contas de usu\xE1rio privilegiado\
            \ em conformidade com [Sele\xE7\xE3o: um esquema de acesso baseado em\
            \ fun\xE7\xE3o; um esquema de acesso baseado em atributos];\n(b) Monitorar\
            \ atribui\xE7\xF5es de fun\xE7\xE3o ou atributo privilegiado;\n(c) Monitorar\
            \ mudan\xE7as em fun\xE7\xF5es ou atributos; e\n(d) Revogar o acesso quando\
            \ as atribui\xE7\xF5es de fun\xE7\xE3o ou atributo privilegiado n\xE3\
            o forem mais apropriadas."
          annotation: "Fun\xE7\xF5es privilegiadas s\xE3o fun\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o atribu\xEDdas a indiv\xEDduos que permitem que\
            \ esses indiv\xEDduos realizem determinadas fun\xE7\xF5es relevantes para\
            \ a seguran\xE7a que usu\xE1rios comuns n\xE3o est\xE3o autorizados a\
            \ realizar. As fun\xE7\xF5es privilegiadas incluem gest\xE3o de chaves,\
            \ gest\xE3o de contas, administra\xE7\xE3o de banco de dados, administra\xE7\
            \xE3o de sistemas e redes e administra\xE7\xE3o web. Um esquema de acesso\
            \ baseado em fun\xE7\xE3o organiza o acesso permitido ao sistema e os\
            \ privil\xE9gios em fun\xE7\xF5es. Em contraste, um esquema de acesso\
            \ baseado em atributos especifica o acesso permitido ao sistema e os privil\xE9\
            gios com base em atributos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(8)
      name: Account Management | Dynamic Account Management
      description: 'Create, activate, manage, and deactivate [Assignment: organization-defined
        system accounts] dynamically.'
      annotation: Approaches for dynamically creating, activating, managing, and deactivating
        system accounts rely on automatically provisioning the accounts at runtime
        for entities that were previously unknown. Organizations plan for the dynamic
        management, creation, activation, and deactivation of system accounts by establishing
        trust relationships, business rules, and mechanisms with appropriate authorities
        to validate related authorizations and privileges.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Gest\xE3o Din\xE2mica de Contas"
          description: "Criar, ativar, gerenciar e desativar [Atribui\xE7\xE3o: contas\
            \ de sistema definidas pela organiza\xE7\xE3o] dinamicamente."
          annotation: "As abordagens para criar, ativar, gerenciar e desativar dinamicamente\
            \ contas de sistema baseiam-se no provisionamento autom\xE1tico das contas\
            \ em tempo de execu\xE7\xE3o para entidades anteriormente desconhecidas.\
            \ As organiza\xE7\xF5es planejam a gest\xE3o, cria\xE7\xE3o, ativa\xE7\
            \xE3o e desativa\xE7\xE3o din\xE2micas de contas de sistema estabelecendo\
            \ rela\xE7\xF5es de confian\xE7a, regras de neg\xF3cio e mecanismos com\
            \ as autoridades apropriadas para validar autoriza\xE7\xF5es e privil\xE9\
            gios relacionados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(9)
      name: Account Management | Restrictions on Use of Shared and Group Accounts
      description: 'Only permit the use of shared and group accounts that meet [Assignment:
        organization-defined conditions for establishing shared and group accounts].'
      annotation: Before permitting the use of shared or group accounts, organizations
        consider the increased risk due to the lack of accountability with such accounts.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Restri\xE7\xF5es ao Uso de Contas Compartilhadas\
            \ e de Grupo"
          description: "Permitir apenas o uso de contas compartilhadas e de grupo\
            \ que atendam \xE0s [Atribui\xE7\xE3o: condi\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o para o estabelecimento de contas compartilhadas e\
            \ de grupo]."
          annotation: "Antes de permitir o uso de contas compartilhadas ou de grupo,\
            \ as organiza\xE7\xF5es consideram o risco aumentado devido \xE0 falta\
            \ de responsabiliza\xE7\xE3o (accountability) com tais contas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-13
      name: "Supervision and Review \u2014 Access Control"
      description: '[Withdrawn: Incorporated into AC-2 and AU-6.]'
      translations:
        pt:
          name: "Supervis\xE3o e Revis\xE3o \u2014 Controle de Acesso"
          description: '[Retirado: Incorporado ao AC-2 e AU-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(11)
      name: Account Management | Usage Conditions
      description: 'Enforce [Assignment: organization-defined circumstances and/or
        usage conditions] for  [Assignment: organization-defined system accounts].'
      annotation: Specifying and enforcing usage conditions helps to enforce the principle
        of least privilege, increase user accountability, and enable effective account
        monitoring. Account monitoring includes alerts generated if the account is
        used in violation of organizational parameters. Organizations can describe
        specific conditions or circumstances under which system accounts can be used,
        such as by restricting usage to certain days of the week, time of day, or
        specific durations of time.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Condi\xE7\xF5es de Uso"
          description: "Aplicar [Atribui\xE7\xE3o: circunst\xE2ncias e/ou condi\xE7\
            \xF5es de uso definidas pela organiza\xE7\xE3o] para [Atribui\xE7\xE3\
            o: contas de sistema definidas pela organiza\xE7\xE3o]."
          annotation: "A especifica\xE7\xE3o e aplica\xE7\xE3o de condi\xE7\xF5es\
            \ de uso ajudam a impor o princ\xEDpio do menor privil\xE9gio, aumentar\
            \ a responsabiliza\xE7\xE3o do usu\xE1rio e permitir o monitoramento eficaz\
            \ de contas. O monitoramento de contas inclui alertas gerados se a conta\
            \ for usada em viola\xE7\xE3o dos par\xE2metros organizacionais. As organiza\xE7\
            \xF5es podem descrever condi\xE7\xF5es ou circunst\xE2ncias espec\xED\
            ficas sob as quais as contas de sistema podem ser usadas, como restringir\
            \ o uso a determinados dias da semana, hor\xE1rio do dia ou dura\xE7\xF5\
            es espec\xEDficas de tempo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(12)
      name: Account Management | Account Monitoring for Atypical Usage
      description: '(a) Monitor system accounts for [Assignment: organization-defined
        atypical usage]; and

        (b) Report atypical usage of system accounts to [Assignment: organization-defined
        personnel or roles].'
      annotation: Atypical usage includes accessing systems at certain times of the
        day or from locations that are not consistent with the normal usage patterns
        of individuals. Monitoring for atypical usage may reveal rogue behavior by
        individuals or an attack in progress. Account monitoring may inadvertently
        create privacy risks since data collected to identify atypical usage may reveal
        previously unknown information about the behavior of individuals. Organizations
        assess and document privacy risks from monitoring accounts for atypical usage
        in their privacy impact assessment and make determinations that are in alignment
        with their privacy program plan.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Monitoramento de Contas para Uso At\xEDpico"
          description: "(a) Monitorar contas de sistema quanto a [Atribui\xE7\xE3\
            o: uso at\xEDpico definido pela organiza\xE7\xE3o]; e\n(b) Relatar uso\
            \ at\xEDpico de contas de sistema a [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "O uso at\xEDpico inclui o acesso a sistemas em determinados\
            \ hor\xE1rios do dia ou a partir de locais que n\xE3o sejam consistentes\
            \ com os padr\xF5es normais de uso dos indiv\xEDduos. O monitoramento\
            \ de uso at\xEDpico pode revelar comportamento malicioso por parte de\
            \ indiv\xEDduos ou um ataque em andamento. O monitoramento de contas pode\
            \ inadvertidamente criar riscos de privacidade, uma vez que os dados coletados\
            \ para identificar uso at\xEDpico podem revelar informa\xE7\xF5es anteriormente\
            \ desconhecidas sobre o comportamento dos indiv\xEDduos. As organiza\xE7\
            \xF5es avaliam e documentam os riscos de privacidade decorrentes do monitoramento\
            \ de contas para uso at\xEDpico em sua avalia\xE7\xE3o de impacto \xE0\
            \ privacidade e tomam decis\xF5es alinhadas com o plano de seu programa\
            \ de privacidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(13)
      name: Account Management | Disable Accounts for High-risk Individuals
      description: 'Disable accounts of individuals within [Assignment: organization-defined
        time period] of discovery of [Assignment: organization-defined significant
        risks].'
      annotation: Users who pose a significant security and/or privacy risk include
        individuals for whom reliable evidence indicates either the intention to use
        authorized access to systems to cause harm or through whom adversaries will
        cause harm. Such harm includes adverse impacts to organizational operations,
        organizational assets, individuals, other organizations, or the Nation. Close
        coordination among system administrators, legal staff, human resource managers,
        and authorizing officials is essential when disabling system accounts for
        high-risk individuals.
      translations:
        pt:
          name: "Gest\xE3o de Contas | Desabilitar Contas de Indiv\xEDduos de Alto\
            \ Risco"
          description: "Desabilitar contas de indiv\xEDduos dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] da descoberta\
            \ de [Atribui\xE7\xE3o: riscos significativos definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Usu\xE1rios que representam um risco significativo de seguran\xE7\
            a e/ou privacidade incluem indiv\xEDduos para os quais evid\xEAncias confi\xE1\
            veis indicam a inten\xE7\xE3o de usar o acesso autorizado a sistemas para\
            \ causar dano, ou por meio dos quais advers\xE1rios causar\xE3o dano.\
            \ Tal dano inclui impactos adversos \xE0s opera\xE7\xF5es organizacionais,\
            \ aos ativos organizacionais, aos indiv\xEDduos, a outras organiza\xE7\
            \xF5es ou \xE0 Na\xE7\xE3o. A estreita coordena\xE7\xE3o entre administradores\
            \ de sistemas, equipe jur\xEDdica, gestores de recursos humanos e autoridades\
            \ autorizadoras \xE9 essencial ao desabilitar contas de sistema de indiv\xED\
            duos de alto risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3
      name: Access Enforcement
      description: Enforce approved authorizations for logical access to information
        and system resources in accordance with applicable access control policies.
      annotation: Access control policies control access between active entities or
        subjects (i.e., users or processes acting on behalf of users) and passive
        entities or objects (i.e., devices, files, records, domains) in organizational
        systems. In addition to enforcing authorized access at the system level and
        recognizing that systems can host many applications and services in support
        of mission and business functions, access enforcement mechanisms can also
        be employed at the application and service level to provide increased information
        security and privacy. In contrast to logical access controls that are implemented
        within the system, physical access controls are addressed by the controls
        in the Physical and Environmental Protection (PE) family.
      translations:
        pt:
          name: "Aplica\xE7\xE3o de Acesso"
          description: "Aplicar autoriza\xE7\xF5es aprovadas para acesso l\xF3gico\
            \ \xE0s informa\xE7\xF5es e aos recursos do sistema em conformidade com\
            \ as pol\xEDticas de controle de acesso aplic\xE1veis."
          annotation: "As pol\xEDticas de controle de acesso controlam o acesso entre\
            \ entidades ou sujeitos ativos (ou seja, usu\xE1rios ou processos atuando\
            \ em nome de usu\xE1rios) e entidades ou objetos passivos (ou seja, dispositivos,\
            \ arquivos, registros, dom\xEDnios) nos sistemas organizacionais. Al\xE9\
            m de aplicar o acesso autorizado no n\xEDvel do sistema e reconhecendo\
            \ que os sistemas podem hospedar muitas aplica\xE7\xF5es e servi\xE7os\
            \ em apoio \xE0s fun\xE7\xF5es de miss\xE3o e neg\xF3cio, os mecanismos\
            \ de aplica\xE7\xE3o de acesso tamb\xE9m podem ser empregados no n\xED\
            vel de aplica\xE7\xE3o e servi\xE7o para fornecer maior seguran\xE7a da\
            \ informa\xE7\xE3o e privacidade. Em contraste com os controles de acesso\
            \ l\xF3gico que s\xE3o implementados dentro do sistema, os controles de\
            \ acesso f\xEDsico s\xE3o tratados pelos controles da fam\xEDlia de Prote\xE7\
            \xE3o F\xEDsica e Ambiental (PE)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-14(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-14(1)
      name: Permitted Actions Without Identification or Authentication | Necessary
        Uses
      description: '[Withdrawn: Incorporated into AC-14.]'
      translations:
        pt:
          name: "A\xE7\xF5es Permitidas sem Identifica\xE7\xE3o ou Autentica\xE7\xE3\
            o | Usos Necess\xE1rios"
          description: '[Retirado: Incorporado ao AC-14.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(2)
      name: Access Enforcement | Dual Authorization
      description: 'Enforce dual authorization for [Assignment: organization-defined
        privileged commands and/or other organization-defined actions].'
      annotation: Dual authorization, also known as two-person control, reduces risk
        related to insider threats. Dual authorization mechanisms require the approval
        of two authorized individuals to execute. To reduce the risk of collusion,
        organizations consider rotating dual authorization duties. Organizations consider
        the risk associated with implementing dual authorization mechanisms when immediate
        responses are necessary to ensure public and environmental safety.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Dupla Autoriza\xE7\xE3o"
          description: "Impor dupla autoriza\xE7\xE3o para [Atribui\xE7\xE3o: comandos\
            \ privilegiados definidos pela organiza\xE7\xE3o e/ou outras a\xE7\xF5\
            es definidas pela organiza\xE7\xE3o]."
          annotation: "A dupla autoriza\xE7\xE3o, tamb\xE9m conhecida como controle\
            \ por duas pessoas, reduz o risco relacionado a amea\xE7as internas. Os\
            \ mecanismos de dupla autoriza\xE7\xE3o exigem a aprova\xE7\xE3o de dois\
            \ indiv\xEDduos autorizados para serem executados. Para reduzir o risco\
            \ de conluio, as organiza\xE7\xF5es consideram fazer rod\xEDzio das atribui\xE7\
            \xF5es de dupla autoriza\xE7\xE3o. As organiza\xE7\xF5es consideram o\
            \ risco associado \xE0 implementa\xE7\xE3o de mecanismos de dupla autoriza\xE7\
            \xE3o quando respostas imediatas s\xE3o necess\xE1rias para garantir a\
            \ seguran\xE7a p\xFAblica e ambiental."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(3)
      name: Access Enforcement | Mandatory Access Control
      description: "Enforce [Assignment: organization-defined mandatory access control\
        \ policy] over the set of covered subjects and objects specified in the policy,\
        \ and where the policy:\n(a) Is uniformly enforced across the covered subjects\
        \ and objects within the system; \n(b) Specifies that a subject that has been\
        \ granted access to information is constrained from doing any of the following;\n\
        (1) Passing the information to unauthorized subjects or objects;\n(2) Granting\
        \ its privileges to other subjects; \n(3) Changing one or more security attributes\
        \ (specified by the policy) on subjects, objects, the system, or system components;\n\
        (4) Choosing the security attributes and attribute values (specified by the\
        \ policy) to be associated with newly created or modified objects; and\n(5)\
        \ Changing the rules governing access control; and\n(c) Specifies that [Assignment:\
        \ organization-defined subjects] may explicitly be granted [Assignment: organization-defined\
        \ privileges] such that they are not limited by any defined subset (or all)\
        \ of the above constraints."
      annotation: 'Mandatory access control is a type of nondiscretionary access control.
        Mandatory access control policies constrain what actions subjects can take
        with information obtained from objects for which they have already been granted
        access. This prevents the subjects from passing the information to unauthorized
        subjects and objects. Mandatory access control policies constrain actions
        that subjects can take with respect to the propagation of access control privileges;
        that is, a subject with a privilege cannot pass that privilege to other subjects.
        The policy is uniformly enforced over all subjects and objects to which the
        system has control. Otherwise, the access control policy can be circumvented.
        This enforcement is provided by an implementation that meets the reference
        monitor concept as described in AC-25. The policy is bounded by the system
        (i.e., once the information is passed outside of the control of the system,
        additional means may be required to ensure that the constraints on the information
        remain in effect).

        The trusted subjects described above are granted privileges consistent with
        the concept of least privilege (see AC-6). Trusted subjects are only given
        the minimum privileges necessary for satisfying organizational mission/business
        needs relative to the above policy. The control is most applicable when there
        is a mandate that establishes a policy regarding access to controlled unclassified
        information or classified information and some users of the system are not
        authorized access to all such information resident in the system. Mandatory
        access control can operate in conjunction with discretionary access control
        as described in AC-3(4). A subject constrained in its operation by mandatory
        access control policies can still operate under the less rigorous constraints
        of AC-3(4), but mandatory access control policies take precedence over the
        less rigorous constraints of AC-3(4). For example, while a mandatory access
        control policy imposes a constraint that prevents a subject from passing information
        to another subject operating at a different impact or classification level,
        AC-3(4) permits the subject to pass the information to any other subject with
        the same impact or classification level as the subject. Examples of mandatory
        access control policies include the Bell-LaPadula policy to protect confidentiality
        of information and the Biba policy to protect the integrity of information.'
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Controle de Acesso Obrigat\xF3rio"
          description: "Impor [Atribui\xE7\xE3o: pol\xEDtica de controle de acesso\
            \ obrigat\xF3rio definida pela organiza\xE7\xE3o] sobre o conjunto de\
            \ sujeitos e objetos abrangidos especificados na pol\xEDtica, e onde a\
            \ pol\xEDtica:\n(a) \xC9 imposta de maneira uniforme entre os sujeitos\
            \ e objetos abrangidos no sistema;\n(b) Especifica que um sujeito ao qual\
            \ tenha sido concedido acesso a informa\xE7\xF5es fica impedido de fazer\
            \ qualquer um dos seguintes;\n(1) Repassar a informa\xE7\xE3o a sujeitos\
            \ ou objetos n\xE3o autorizados;\n(2) Conceder seus privil\xE9gios a outros\
            \ sujeitos;\n(3) Alterar um ou mais atributos de seguran\xE7a (especificados\
            \ pela pol\xEDtica) em sujeitos, objetos, no sistema ou em componentes\
            \ do sistema;\n(4) Escolher os atributos de seguran\xE7a e os valores\
            \ de atributos (especificados pela pol\xEDtica) a serem associados a objetos\
            \ rec\xE9m-criados ou modificados; e\n(5) Alterar as regras que regem\
            \ o controle de acesso; e\n(c) Especifica que [Atribui\xE7\xE3o: sujeitos\
            \ definidos pela organiza\xE7\xE3o] podem explicitamente receber [Atribui\xE7\
            \xE3o: privil\xE9gios definidos pela organiza\xE7\xE3o] de modo que n\xE3\
            o fiquem limitados por qualquer subconjunto definido (ou pela totalidade)\
            \ das restri\xE7\xF5es acima."
          annotation: "O controle de acesso obrigat\xF3rio \xE9 um tipo de controle\
            \ de acesso n\xE3o discricion\xE1rio. As pol\xEDticas de controle de acesso\
            \ obrigat\xF3rio restringem quais a\xE7\xF5es os sujeitos podem realizar\
            \ com informa\xE7\xF5es obtidas de objetos aos quais j\xE1 lhes foi concedido\
            \ acesso. Isso impede que os sujeitos repassem a informa\xE7\xE3o a sujeitos\
            \ e objetos n\xE3o autorizados. As pol\xEDticas de controle de acesso\
            \ obrigat\xF3rio restringem as a\xE7\xF5es que os sujeitos podem realizar\
            \ com rela\xE7\xE3o \xE0 propaga\xE7\xE3o de privil\xE9gios de controle\
            \ de acesso; ou seja, um sujeito com um privil\xE9gio n\xE3o pode repassar\
            \ esse privil\xE9gio a outros sujeitos. A pol\xEDtica \xE9 imposta de\
            \ maneira uniforme sobre todos os sujeitos e objetos sobre os quais o\
            \ sistema tem controle. Caso contr\xE1rio, a pol\xEDtica de controle de\
            \ acesso pode ser contornada. Essa imposi\xE7\xE3o \xE9 fornecida por\
            \ uma implementa\xE7\xE3o que atende ao conceito de monitor de refer\xEA\
            ncia conforme descrito em AC-25. A pol\xEDtica \xE9 delimitada pelo sistema\
            \ (ou seja, uma vez que a informa\xE7\xE3o \xE9 repassada para fora do\
            \ controle do sistema, podem ser necess\xE1rios meios adicionais para\
            \ garantir que as restri\xE7\xF5es sobre a informa\xE7\xE3o permane\xE7\
            am em vigor).\nOs sujeitos confi\xE1veis descritos acima recebem privil\xE9\
            gios coerentes com o conceito de menor privil\xE9gio (ver AC-6). Os sujeitos\
            \ confi\xE1veis recebem apenas os privil\xE9gios m\xEDnimos necess\xE1\
            rios para satisfazer as necessidades de miss\xE3o/neg\xF3cio organizacionais\
            \ relativas \xE0 pol\xEDtica acima. O controle \xE9 mais aplic\xE1vel\
            \ quando h\xE1 um mandato que estabelece uma pol\xEDtica referente ao\
            \ acesso a informa\xE7\xF5es n\xE3o classificadas controladas ou informa\xE7\
            \xF5es classificadas e alguns usu\xE1rios do sistema n\xE3o est\xE3o autorizados\
            \ a acessar todas essas informa\xE7\xF5es residentes no sistema. O controle\
            \ de acesso obrigat\xF3rio pode operar em conjunto com o controle de acesso\
            \ discricion\xE1rio conforme descrito em AC-3(4). Um sujeito restrito\
            \ em sua opera\xE7\xE3o por pol\xEDticas de controle de acesso obrigat\xF3\
            rio ainda pode operar sob as restri\xE7\xF5es menos rigorosas de AC-3(4),\
            \ mas as pol\xEDticas de controle de acesso obrigat\xF3rio t\xEAm preced\xEA\
            ncia sobre as restri\xE7\xF5es menos rigorosas de AC-3(4). Por exemplo,\
            \ embora uma pol\xEDtica de controle de acesso obrigat\xF3rio imponha\
            \ uma restri\xE7\xE3o que impede um sujeito de repassar informa\xE7\xF5\
            es a outro sujeito operando em um n\xEDvel de impacto ou classifica\xE7\
            \xE3o diferente, AC-3(4) permite que o sujeito repasse a informa\xE7\xE3\
            o a qualquer outro sujeito com o mesmo n\xEDvel de impacto ou classifica\xE7\
            \xE3o que o sujeito. Exemplos de pol\xEDticas de controle de acesso obrigat\xF3\
            rio incluem a pol\xEDtica de Bell-LaPadula para proteger a confidencialidade\
            \ das informa\xE7\xF5es e a pol\xEDtica de Biba para proteger a integridade\
            \ das informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(4)
      name: Access Enforcement | Discretionary Access Control
      description: "Enforce [Assignment: organization-defined discretionary access\
        \ control policy] over the set of covered subjects and objects specified in\
        \ the policy, and where the policy specifies that a subject that has been\
        \ granted access to information can do one or more of the following:\n(a)\
        \ Pass the information to any other subjects or objects;\n(b) Grant its privileges\
        \ to other subjects; \n(c) Change security attributes on subjects, objects,\
        \ the system, or the system\u2019s components;\n(d) Choose the security attributes\
        \ to be associated with newly created or revised objects; or\n(e) Change the\
        \ rules governing access control."
      annotation: When discretionary access control policies are implemented, subjects
        are not constrained with regard to what actions they can take with information
        for which they have already been granted access. Thus, subjects that have
        been granted access to information are not prevented from passing the information
        to other subjects or objects (i.e., subjects have the discretion to pass).
        Discretionary access control can operate in conjunction with mandatory access
        control as described in AC-3(3) and AC-3(15). A subject that is constrained
        in its operation by mandatory access control policies can still operate under
        the less rigorous constraints of discretionary access control. Therefore,
        while AC-3(3) imposes constraints that prevent a subject from passing information
        to another subject operating at a different impact or classification level,
        AC-3(4) permits the subject to pass the information to any subject at the
        same impact or classification level. The policy is bounded by the system.
        Once the information is passed outside of system control, additional means
        may be required to ensure that the constraints remain in effect. While traditional
        definitions of discretionary access control require identity-based access
        control, that limitation is not required for this particular use of discretionary
        access control.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Controle de Acesso Discricion\xE1rio"
          description: "Impor [Atribui\xE7\xE3o: pol\xEDtica de controle de acesso\
            \ discricion\xE1rio definida pela organiza\xE7\xE3o] sobre o conjunto\
            \ de sujeitos e objetos abrangidos especificados na pol\xEDtica, e onde\
            \ a pol\xEDtica especifica que um sujeito ao qual tenha sido concedido\
            \ acesso a informa\xE7\xF5es pode fazer um ou mais dos seguintes:\n(a)\
            \ Repassar a informa\xE7\xE3o a quaisquer outros sujeitos ou objetos;\n\
            (b) Conceder seus privil\xE9gios a outros sujeitos;\n(c) Alterar atributos\
            \ de seguran\xE7a em sujeitos, objetos, no sistema ou nos componentes\
            \ do sistema;\n(d) Escolher os atributos de seguran\xE7a a serem associados\
            \ a objetos rec\xE9m-criados ou revisados; ou\n(e) Alterar as regras que\
            \ regem o controle de acesso."
          annotation: "Quando pol\xEDticas de controle de acesso discricion\xE1rio\
            \ s\xE3o implementadas, os sujeitos n\xE3o ficam restritos quanto a quais\
            \ a\xE7\xF5es podem realizar com informa\xE7\xF5es \xE0s quais j\xE1 lhes\
            \ foi concedido acesso. Assim, os sujeitos aos quais foi concedido acesso\
            \ a informa\xE7\xF5es n\xE3o ficam impedidos de repassar a informa\xE7\
            \xE3o a outros sujeitos ou objetos (ou seja, os sujeitos t\xEAm a discricionariedade\
            \ de repassar). O controle de acesso discricion\xE1rio pode operar em\
            \ conjunto com o controle de acesso obrigat\xF3rio conforme descrito em\
            \ AC-3(3) e AC-3(15). Um sujeito que \xE9 restrito em sua opera\xE7\xE3\
            o por pol\xEDticas de controle de acesso obrigat\xF3rio ainda pode operar\
            \ sob as restri\xE7\xF5es menos rigorosas do controle de acesso discricion\xE1\
            rio. Portanto, embora AC-3(3) imponha restri\xE7\xF5es que impedem um\
            \ sujeito de repassar informa\xE7\xF5es a outro sujeito operando em um\
            \ n\xEDvel de impacto ou classifica\xE7\xE3o diferente, AC-3(4) permite\
            \ que o sujeito repasse a informa\xE7\xE3o a qualquer sujeito no mesmo\
            \ n\xEDvel de impacto ou classifica\xE7\xE3o. A pol\xEDtica \xE9 delimitada\
            \ pelo sistema. Uma vez que a informa\xE7\xE3o \xE9 repassada para fora\
            \ do controle do sistema, podem ser necess\xE1rios meios adicionais para\
            \ garantir que as restri\xE7\xF5es permane\xE7am em vigor. Embora as defini\xE7\
            \xF5es tradicionais de controle de acesso discricion\xE1rio exijam controle\
            \ de acesso baseado em identidade, essa limita\xE7\xE3o n\xE3o \xE9 exigida\
            \ para este uso espec\xEDfico do controle de acesso discricion\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(5)
      name: Access Enforcement | Security-relevant Information
      description: 'Prevent access to [Assignment: organization-defined security-relevant
        information] except during secure, non-operable system states.'
      annotation: Security-relevant information is information within systems that
        can potentially impact the operation of security functions or the provision
        of security services in a manner that could result in failure to enforce system
        security and privacy policies or maintain the separation of code and data.
        Security-relevant information includes access control lists, filtering rules
        for routers or firewalls, configuration parameters for security services,
        and cryptographic key management information. Secure, non-operable system
        states include the times in which systems are not performing mission or business-related
        processing, such as when the system is offline for maintenance, boot-up, troubleshooting,
        or shut down.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Informa\xE7\xF5es Relevantes para a Seguran\xE7\
            a"
          description: "Impedir o acesso a [Atribui\xE7\xE3o: informa\xE7\xF5es relevantes\
            \ para a seguran\xE7a definidas pela organiza\xE7\xE3o] exceto durante\
            \ estados seguros e n\xE3o oper\xE1veis do sistema."
          annotation: "Informa\xE7\xF5es relevantes para a seguran\xE7a s\xE3o informa\xE7\
            \xF5es dentro dos sistemas que podem potencialmente impactar a opera\xE7\
            \xE3o de fun\xE7\xF5es de seguran\xE7a ou a provis\xE3o de servi\xE7os\
            \ de seguran\xE7a de uma maneira que poderia resultar na falha em impor\
            \ as pol\xEDticas de seguran\xE7a e privacidade do sistema ou em manter\
            \ a separa\xE7\xE3o entre c\xF3digo e dados. As informa\xE7\xF5es relevantes\
            \ para a seguran\xE7a incluem listas de controle de acesso, regras de\
            \ filtragem para roteadores ou firewalls, par\xE2metros de configura\xE7\
            \xE3o para servi\xE7os de seguran\xE7a e informa\xE7\xF5es de gerenciamento\
            \ de chaves criptogr\xE1ficas. Estados seguros e n\xE3o oper\xE1veis do\
            \ sistema incluem os momentos em que os sistemas n\xE3o est\xE3o realizando\
            \ processamento relacionado \xE0 miss\xE3o ou ao neg\xF3cio, como quando\
            \ o sistema est\xE1 offline para manuten\xE7\xE3o, inicializa\xE7\xE3\
            o, resolu\xE7\xE3o de problemas ou desligamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-15
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-15
      name: Automated Marking
      description: '[Withdrawn: Incorporated into MP-3.]'
      translations:
        pt:
          name: "Marca\xE7\xE3o Automatizada"
          description: '[Retirado: Incorporado em MP-3.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(7)
      name: Access Enforcement | Role-based Access Control
      description: 'Enforce a role-based access control policy over defined subjects
        and objects and control access based upon [Assignment: organization-defined
        roles and users authorized to assume such roles].'
      annotation: Role-based access control (RBAC) is an access control policy that
        enforces access to objects and system functions based on the defined role
        (i.e., job function) of the subject. Organizations can create specific roles
        based on job functions and the authorizations (i.e., privileges) to perform
        needed operations on the systems associated with the organization-defined
        roles. When users are assigned to specific roles, they inherit the authorizations
        or privileges defined for those roles. RBAC simplifies privilege administration
        for organizations because privileges are not assigned directly to every user
        (which can be a large number of individuals) but are instead acquired through
        role assignments. RBAC can also increase privacy and security risk if individuals
        assigned to a role are given access to information beyond what they need to
        support organizational missions or business functions. RBAC can be implemented
        as a mandatory or discretionary form of access control. For organizations
        implementing RBAC with mandatory access controls, the requirements in AC-3(3)
        define the scope of the subjects and objects covered by the policy.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Controle de Acesso Baseado em Pap\xE9\
            is"
          description: "Impor uma pol\xEDtica de controle de acesso baseado em pap\xE9\
            is sobre sujeitos e objetos definidos e controlar o acesso com base em\
            \ [Atribui\xE7\xE3o: pap\xE9is e usu\xE1rios definidos pela organiza\xE7\
            \xE3o autorizados a assumir tais pap\xE9is]."
          annotation: "O controle de acesso baseado em pap\xE9is (RBAC) \xE9 uma pol\xED\
            tica de controle de acesso que imp\xF5e o acesso a objetos e fun\xE7\xF5\
            es do sistema com base no papel definido (ou seja, fun\xE7\xE3o de trabalho)\
            \ do sujeito. As organiza\xE7\xF5es podem criar pap\xE9is espec\xEDficos\
            \ com base nas fun\xE7\xF5es de trabalho e nas autoriza\xE7\xF5es (ou\
            \ seja, privil\xE9gios) para realizar as opera\xE7\xF5es necess\xE1rias\
            \ nos sistemas associados aos pap\xE9is definidos pela organiza\xE7\xE3\
            o. Quando os usu\xE1rios s\xE3o atribu\xEDdos a pap\xE9is espec\xEDficos,\
            \ eles herdam as autoriza\xE7\xF5es ou privil\xE9gios definidos para esses\
            \ pap\xE9is. O RBAC simplifica a administra\xE7\xE3o de privil\xE9gios\
            \ para as organiza\xE7\xF5es porque os privil\xE9gios n\xE3o s\xE3o atribu\xED\
            dos diretamente a cada usu\xE1rio (que pode ser um grande n\xFAmero de\
            \ indiv\xEDduos), mas s\xE3o adquiridos por meio de atribui\xE7\xF5es\
            \ de pap\xE9is. O RBAC tamb\xE9m pode aumentar o risco de privacidade\
            \ e seguran\xE7a se os indiv\xEDduos atribu\xEDdos a um papel receberem\
            \ acesso a informa\xE7\xF5es al\xE9m do que necessitam para apoiar as\
            \ miss\xF5es organizacionais ou fun\xE7\xF5es de neg\xF3cio. O RBAC pode\
            \ ser implementado como uma forma obrigat\xF3ria ou discricion\xE1ria\
            \ de controle de acesso. Para organiza\xE7\xF5es que implementam o RBAC\
            \ com controles de acesso obrigat\xF3rio, os requisitos em AC-3(3) definem\
            \ o escopo dos sujeitos e objetos abrangidos pela pol\xEDtica."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(8)
      name: Access Enforcement | Revocation of Access Authorizations
      description: 'Enforce the revocation of access authorizations resulting from
        changes to the security attributes of subjects and objects based on [Assignment:
        organization-defined rules governing the timing of revocations of access authorizations].'
      annotation: Revocation of access rules may differ based on the types of access
        revoked. For example, if a subject (i.e., user or process acting on behalf
        of a user) is removed from a group, access may not be revoked until the next
        time the object is opened or the next time the subject attempts to access
        the object. Revocation based on changes to security labels may take effect
        immediately. Organizations provide alternative approaches on how to make revocations
        immediate if systems cannot provide such capability and immediate revocation
        is necessary.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Revoga\xE7\xE3o de Autoriza\xE7\xF5es\
            \ de Acesso"
          description: "Impor a revoga\xE7\xE3o de autoriza\xE7\xF5es de acesso resultantes\
            \ de altera\xE7\xF5es nos atributos de seguran\xE7a de sujeitos e objetos\
            \ com base em [Atribui\xE7\xE3o: regras definidas pela organiza\xE7\xE3\
            o que regem a temporiza\xE7\xE3o das revoga\xE7\xF5es de autoriza\xE7\xF5\
            es de acesso]."
          annotation: "As regras de revoga\xE7\xE3o de acesso podem diferir com base\
            \ nos tipos de acesso revogados. Por exemplo, se um sujeito (ou seja,\
            \ usu\xE1rio ou processo agindo em nome de um usu\xE1rio) for removido\
            \ de um grupo, o acesso pode n\xE3o ser revogado at\xE9 a pr\xF3xima vez\
            \ que o objeto for aberto ou a pr\xF3xima vez que o sujeito tentar acessar\
            \ o objeto. A revoga\xE7\xE3o baseada em altera\xE7\xF5es de r\xF3tulos\
            \ de seguran\xE7a pode entrar em vigor imediatamente. As organiza\xE7\xF5\
            es fornecem abordagens alternativas sobre como tornar as revoga\xE7\xF5\
            es imediatas se os sistemas n\xE3o puderem fornecer tal capacidade e a\
            \ revoga\xE7\xE3o imediata for necess\xE1ria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(9)
      name: Access Enforcement | Controlled Release
      description: 'Release information outside of the system only if:

        (a) The receiving [Assignment: organization-defined system or system component]
        provides [Assignment: organization-defined controls]; and

        (b) [Assignment: organization-defined controls] are used to validate the appropriateness
        of the information designated for release.'
      annotation: "Organizations can only directly protect information when it resides\
        \ within the system. Additional controls may be needed to ensure that organizational\
        \ information is adequately protected once it is transmitted outside of the\
        \ system. In situations where the system is unable to determine the adequacy\
        \ of the protections provided by external entities, as a mitigation measure,\
        \ organizations procedurally determine whether the external systems are providing\
        \ adequate controls. The means used to determine the adequacy of controls\
        \ provided by external systems include conducting periodic assessments (inspections/tests),\
        \ establishing agreements between the organization and its counterpart organizations,\
        \ or some other process. The means used by external entities to protect the\
        \ information received need not be the same as those used by the organization,\
        \ but the means employed are sufficient to provide consistent adjudication\
        \ of the security and privacy policy to protect the information and individuals\u2019\
        \ privacy.\nControlled release of information requires systems to implement\
        \ technical or procedural means to validate the information prior to releasing\
        \ it to external systems. For example, if the system passes information to\
        \ a system controlled by another organization, technical means are employed\
        \ to validate that the security and privacy attributes associated with the\
        \ exported information are appropriate for the receiving system. Alternatively,\
        \ if the system passes information to a printer in organization-controlled\
        \ space, procedural means can be employed to ensure that only authorized individuals\
        \ gain access to the printer."
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Libera\xE7\xE3o Controlada"
          description: "Liberar informa\xE7\xF5es para fora do sistema somente se:\n\
            (a) O [Atribui\xE7\xE3o: sistema ou componente de sistema definido pela\
            \ organiza\xE7\xE3o] receptor fornecer [Atribui\xE7\xE3o: controles definidos\
            \ pela organiza\xE7\xE3o]; e\n(b) [Atribui\xE7\xE3o: controles definidos\
            \ pela organiza\xE7\xE3o] forem usados para validar a adequa\xE7\xE3o\
            \ das informa\xE7\xF5es designadas para libera\xE7\xE3o."
          annotation: "As organiza\xE7\xF5es s\xF3 podem proteger diretamente as informa\xE7\
            \xF5es quando elas residem dentro do sistema. Podem ser necess\xE1rios\
            \ controles adicionais para garantir que as informa\xE7\xF5es organizacionais\
            \ sejam adequadamente protegidas uma vez transmitidas para fora do sistema.\
            \ Em situa\xE7\xF5es em que o sistema n\xE3o consegue determinar a adequa\xE7\
            \xE3o das prote\xE7\xF5es fornecidas por entidades externas, como medida\
            \ de mitiga\xE7\xE3o, as organiza\xE7\xF5es determinam de forma procedimental\
            \ se os sistemas externos est\xE3o fornecendo controles adequados. Os\
            \ meios usados para determinar a adequa\xE7\xE3o dos controles fornecidos\
            \ por sistemas externos incluem a realiza\xE7\xE3o de avalia\xE7\xF5es\
            \ peri\xF3dicas (inspe\xE7\xF5es/testes), o estabelecimento de acordos\
            \ entre a organiza\xE7\xE3o e suas organiza\xE7\xF5es hom\xF3logas, ou\
            \ algum outro processo. Os meios usados pelas entidades externas para\
            \ proteger as informa\xE7\xF5es recebidas n\xE3o precisam ser os mesmos\
            \ usados pela organiza\xE7\xE3o, mas os meios empregados s\xE3o suficientes\
            \ para fornecer uma adjudica\xE7\xE3o consistente da pol\xEDtica de seguran\xE7\
            a e privacidade para proteger as informa\xE7\xF5es e a privacidade dos\
            \ indiv\xEDduos.\nA libera\xE7\xE3o controlada de informa\xE7\xF5es exige\
            \ que os sistemas implementem meios t\xE9cnicos ou procedimentais para\
            \ validar as informa\xE7\xF5es antes de liber\xE1-las para sistemas externos.\
            \ Por exemplo, se o sistema repassa informa\xE7\xF5es a um sistema controlado\
            \ por outra organiza\xE7\xE3o, s\xE3o empregados meios t\xE9cnicos para\
            \ validar que os atributos de seguran\xE7a e privacidade associados \xE0\
            s informa\xE7\xF5es exportadas s\xE3o apropriados para o sistema receptor.\
            \ Alternativamente, se o sistema repassa informa\xE7\xF5es a uma impressora\
            \ em espa\xE7o controlado pela organiza\xE7\xE3o, podem ser empregados\
            \ meios procedimentais para garantir que apenas indiv\xEDduos autorizados\
            \ obtenham acesso \xE0 impressora."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(10)
      name: Access Enforcement | Audited Override of Access Control Mechanisms
      description: 'Employ an audited override of automated access control mechanisms
        under [Assignment: organization-defined conditions] by [Assignment: organization-defined
        roles].'
      annotation: "In certain situations, such as when there is a threat to human\
        \ life or an event that threatens the organization\u2019s ability to carry\
        \ out critical missions or business functions, an override capability for\
        \ access control mechanisms may be needed. Override conditions are defined\
        \ by organizations and used only in those limited circumstances. Audit events\
        \ are defined in AU-2. Audit records are generated in AU-12."
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Substitui\xE7\xE3o Auditada dos Mecanismos\
            \ de Controle de Acesso"
          description: "Empregar uma substitui\xE7\xE3o auditada dos mecanismos automatizados\
            \ de controle de acesso sob [Atribui\xE7\xE3o: condi\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o] por [Atribui\xE7\xE3o: pap\xE9is definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "Em certas situa\xE7\xF5es, como quando h\xE1 uma amea\xE7a\
            \ \xE0 vida humana ou um evento que amea\xE7a a capacidade da organiza\xE7\
            \xE3o de cumprir miss\xF5es cr\xEDticas ou fun\xE7\xF5es de neg\xF3cio,\
            \ pode ser necess\xE1ria uma capacidade de substitui\xE7\xE3o para os\
            \ mecanismos de controle de acesso. As condi\xE7\xF5es de substitui\xE7\
            \xE3o s\xE3o definidas pelas organiza\xE7\xF5es e usadas somente nessas\
            \ circunst\xE2ncias limitadas. Os eventos de auditoria s\xE3o definidos\
            \ em AU-2. Os registros de auditoria s\xE3o gerados em AU-12."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(11)
      name: Access Enforcement | Restrict Access to Specific Information Types
      description: 'Restrict access to data repositories containing [Assignment: organization-defined
        information types].'
      annotation: Restricting access to specific information is intended to provide
        flexibility regarding access control of specific information types within
        a system. For example, role-based access could be employed to allow access
        to only a specific type of personally identifiable information within a database
        rather than allowing access to the database in its entirety. Other examples
        include restricting access to cryptographic keys, authentication information,
        and selected system information.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Restringir Acesso a Tipos Espec\xEDficos\
            \ de Informa\xE7\xE3o"
          description: "Restringir o acesso a reposit\xF3rios de dados que cont\xEA\
            m [Atribui\xE7\xE3o: tipos de informa\xE7\xE3o definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Restringir o acesso a informa\xE7\xF5es espec\xEDficas tem\
            \ por objetivo proporcionar flexibilidade quanto ao controle de acesso\
            \ a tipos espec\xEDficos de informa\xE7\xE3o dentro de um sistema. Por\
            \ exemplo, o acesso baseado em pap\xE9is poderia ser empregado para permitir\
            \ o acesso apenas a um tipo espec\xEDfico de informa\xE7\xE3o de identifica\xE7\
            \xE3o pessoal dentro de um banco de dados, em vez de permitir o acesso\
            \ ao banco de dados em sua totalidade. Outros exemplos incluem restringir\
            \ o acesso a chaves criptogr\xE1ficas, informa\xE7\xF5es de autentica\xE7\
            \xE3o e informa\xE7\xF5es selecionadas do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(12)
      name: Access Enforcement | Assert and Enforce Application Access
      description: '(a) Require applications to assert, as part of the installation
        process, the access needed to the following system applications and functions:
        [Assignment: organization-defined system applications and functions];

        (b) Provide an enforcement mechanism to prevent unauthorized access; and

        (c) Approve access changes after initial installation of the application.'
      annotation: Asserting and enforcing application access is intended to address
        applications that need to access existing system applications and functions,
        including user contacts, global positioning systems, cameras, keyboards, microphones,
        networks, phones, or other files.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Declarar e Impor Acesso de Aplica\xE7\
            \xF5es"
          description: "(a) Exigir que as aplica\xE7\xF5es declarem, como parte do\
            \ processo de instala\xE7\xE3o, o acesso necess\xE1rio \xE0s seguintes\
            \ aplica\xE7\xF5es e fun\xE7\xF5es do sistema: [Atribui\xE7\xE3o: aplica\xE7\
            \xF5es e fun\xE7\xF5es do sistema definidas pela organiza\xE7\xE3o];\n\
            (b) Fornecer um mecanismo de imposi\xE7\xE3o para impedir o acesso n\xE3\
            o autorizado; e\n(c) Aprovar altera\xE7\xF5es de acesso ap\xF3s a instala\xE7\
            \xE3o inicial da aplica\xE7\xE3o."
          annotation: "Declarar e impor o acesso de aplica\xE7\xF5es tem por objetivo\
            \ tratar de aplica\xE7\xF5es que precisam acessar aplica\xE7\xF5es e fun\xE7\
            \xF5es existentes do sistema, incluindo contatos do usu\xE1rio, sistemas\
            \ de posicionamento global, c\xE2meras, teclados, microfones, redes, telefones\
            \ ou outros arquivos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(13)
      name: Access Enforcement | Attribute-based Access Control
      description: 'Enforce attribute-based access control policy over defined subjects
        and objects and control access based upon [Assignment: organization-defined
        attributes to assume access permissions].'
      annotation: Attribute-based access control is an access control policy that
        restricts system access to authorized users based on specified organizational
        attributes (e.g., job function, identity), action attributes (e.g., read,
        write, delete), environmental attributes (e.g., time of day, location), and
        resource attributes (e.g., classification of a document). Organizations can
        create rules based on attributes and the authorizations (i.e., privileges)
        to perform needed operations on the systems associated with organization-defined
        attributes and rules. When users are assigned to attributes defined in attribute-based
        access control policies or rules, they can be provisioned to a system with
        the appropriate privileges or dynamically granted access to a protected resource.
        Attribute-based access control can be implemented as either a mandatory or
        discretionary form of access control. When implemented with mandatory access
        controls, the requirements in AC-3(3) define the scope of the subjects and
        objects covered by the policy.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Controle de Acesso Baseado em Atributos"
          description: "Impor a pol\xEDtica de controle de acesso baseado em atributos\
            \ sobre sujeitos e objetos definidos e controlar o acesso com base em\
            \ [Atribui\xE7\xE3o: atributos definidos pela organiza\xE7\xE3o para assumir\
            \ permiss\xF5es de acesso]."
          annotation: "O controle de acesso baseado em atributos \xE9 uma pol\xED\
            tica de controle de acesso que restringe o acesso ao sistema a usu\xE1\
            rios autorizados com base em atributos organizacionais especificados (por\
            \ exemplo, fun\xE7\xE3o de trabalho, identidade), atributos de a\xE7\xE3\
            o (por exemplo, ler, escrever, excluir), atributos ambientais (por exemplo,\
            \ hora do dia, localiza\xE7\xE3o) e atributos de recurso (por exemplo,\
            \ classifica\xE7\xE3o de um documento). As organiza\xE7\xF5es podem criar\
            \ regras com base em atributos e nas autoriza\xE7\xF5es (ou seja, privil\xE9\
            gios) para realizar as opera\xE7\xF5es necess\xE1rias nos sistemas associados\
            \ aos atributos e regras definidos pela organiza\xE7\xE3o. Quando os usu\xE1\
            rios s\xE3o atribu\xEDdos a atributos definidos nas pol\xEDticas ou regras\
            \ de controle de acesso baseado em atributos, eles podem ser provisionados\
            \ em um sistema com os privil\xE9gios apropriados ou receber dinamicamente\
            \ acesso a um recurso protegido. O controle de acesso baseado em atributos\
            \ pode ser implementado como uma forma obrigat\xF3ria ou discricion\xE1\
            ria de controle de acesso. Quando implementado com controles de acesso\
            \ obrigat\xF3rio, os requisitos em AC-3(3) definem o escopo dos sujeitos\
            \ e objetos abrangidos pela pol\xEDtica."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(14)
      name: Access Enforcement | Individual Access
      description: 'Provide [Assignment: organization-defined mechanisms] to enable
        individuals to have access to the following elements of their personally identifiable
        information: [Assignment: organization-defined elements].'
      annotation: Individual access affords individuals the ability to review personally
        identifiable information about them held within organizational records, regardless
        of format. Access helps individuals to develop an understanding about how
        their personally identifiable information is being processed. It can also
        help individuals ensure that their data is accurate. Access mechanisms can
        include request forms and application interfaces. For federal agencies, PRIVACT
        processes can be located in systems of record notices and on agency websites.
        Access to certain types of records may not be appropriate (e.g., for federal
        agencies, law enforcement records within a system of records may be exempt
        from disclosure under the PRIVACT) or may require certain levels of authentication
        assurance. Organizational personnel consult with the senior agency official
        for privacy and legal counsel to determine appropriate mechanisms and access
        rights or limitations.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Acesso Individual"
          description: "Fornecer [Atribui\xE7\xE3o: mecanismos definidos pela organiza\xE7\
            \xE3o] para permitir que os indiv\xEDduos tenham acesso aos seguintes\
            \ elementos de suas informa\xE7\xF5es de identifica\xE7\xE3o pessoal:\
            \ [Atribui\xE7\xE3o: elementos definidos pela organiza\xE7\xE3o]."
          annotation: "O acesso individual proporciona aos indiv\xEDduos a capacidade\
            \ de revisar as informa\xE7\xF5es de identifica\xE7\xE3o pessoal sobre\
            \ eles mantidas dentro dos registros organizacionais, independentemente\
            \ do formato. O acesso ajuda os indiv\xEDduos a desenvolver uma compreens\xE3\
            o sobre como suas informa\xE7\xF5es de identifica\xE7\xE3o pessoal est\xE3\
            o sendo processadas. Tamb\xE9m pode ajudar os indiv\xEDduos a garantir\
            \ que seus dados estejam corretos. Os mecanismos de acesso podem incluir\
            \ formul\xE1rios de solicita\xE7\xE3o e interfaces de aplica\xE7\xE3o.\
            \ Para ag\xEAncias federais, os processos da PRIVACT podem estar localizados\
            \ em notifica\xE7\xF5es de sistemas de registro e nos sites das ag\xEA\
            ncias. O acesso a certos tipos de registros pode n\xE3o ser apropriado\
            \ (por exemplo, para ag\xEAncias federais, registros de aplica\xE7\xE3\
            o da lei dentro de um sistema de registros podem estar isentos de divulga\xE7\
            \xE3o sob a PRIVACT) ou pode exigir certos n\xEDveis de garantia de autentica\xE7\
            \xE3o. O pessoal organizacional consulta o oficial s\xEAnior da ag\xEA\
            ncia respons\xE1vel pela privacidade e a assessoria jur\xEDdica para determinar\
            \ os mecanismos apropriados e os direitos ou limita\xE7\xF5es de acesso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(15)
      name: Access Enforcement | Discretionary and Mandatory Access Control
      description: '(a) Enforce [Assignment: organization-defined mandatory access
        control policy] over the set of covered subjects and objects specified in
        the policy; and

        (b) Enforce [Assignment: organization-defined discretionary access control
        policy] over the set of covered subjects and objects specified in the policy.'
      annotation: Simultaneously implementing a mandatory access control policy and
        a discretionary access control policy can provide additional protection against
        the unauthorized execution of code by users or processes acting on behalf
        of users. This helps prevent a single compromised user or process from compromising
        the entire system.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Acesso | Controle de Acesso Discricion\xE1rio\
            \ e Obrigat\xF3rio"
          description: "(a) Impor [Atribui\xE7\xE3o: pol\xEDtica de controle de acesso\
            \ obrigat\xF3rio definida pela organiza\xE7\xE3o] sobre o conjunto de\
            \ sujeitos e objetos abrangidos especificados na pol\xEDtica; e\n(b) Impor\
            \ [Atribui\xE7\xE3o: pol\xEDtica de controle de acesso discricion\xE1\
            rio definida pela organiza\xE7\xE3o] sobre o conjunto de sujeitos e objetos\
            \ abrangidos especificados na pol\xEDtica."
          annotation: "Implementar simultaneamente uma pol\xEDtica de controle de\
            \ acesso obrigat\xF3rio e uma pol\xEDtica de controle de acesso discricion\xE1\
            rio pode fornecer prote\xE7\xE3o adicional contra a execu\xE7\xE3o n\xE3\
            o autorizada de c\xF3digo por usu\xE1rios ou processos agindo em nome\
            \ de usu\xE1rios. Isso ajuda a impedir que um \xFAnico usu\xE1rio ou processo\
            \ comprometido comprometa todo o sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4
      name: Information Flow Enforcement
      description: 'Enforce approved authorizations for controlling the flow of information
        within the system and between connected systems based on [Assignment: organization-defined
        information flow control policies].'
      annotation: 'Information flow control regulates where information can travel
        within a system and between systems (in contrast to who is allowed to access
        the information) and without regard to subsequent accesses to that information.
        Flow control restrictions include blocking external traffic that claims to
        be from within the organization, keeping export-controlled information from
        being transmitted in the clear to the Internet, restricting web requests that
        are not from the internal web proxy server, and limiting information transfers
        between organizations based on data structures and content. Transferring information
        between organizations may require an agreement specifying how the information
        flow is enforced (see CA-3). Transferring information between systems in different
        security or privacy domains with different security or privacy policies introduces
        the risk that such transfers violate one or more domain security or privacy
        policies. In such situations, information owners/stewards provide guidance
        at designated policy enforcement points between connected systems. Organizations
        consider mandating specific architectural solutions to enforce specific security
        and privacy policies. Enforcement includes prohibiting information transfers
        between connected systems (i.e., allowing access only), verifying write permissions
        before accepting information from another security or privacy domain or connected
        system, employing hardware mechanisms to enforce one-way information flows,
        and implementing trustworthy regrading mechanisms to reassign security or
        privacy attributes and labels.

        Organizations commonly employ information flow control policies and enforcement
        mechanisms to control the flow of information between designated sources and
        destinations within systems and between connected systems. Flow control is
        based on the characteristics of the information and/or the information path.
        Enforcement occurs, for example, in boundary protection devices that employ
        rule sets or establish configuration settings that restrict system services,
        provide a packet-filtering capability based on header information, or provide
        a message-filtering capability based on message content. Organizations also
        consider the trustworthiness of filtering and/or inspection mechanisms (i.e.,
        hardware, firmware, and software components) that are critical to information
        flow enforcement. Control enhancements 3 through 32 primarily address cross-domain
        solution needs that focus on more advanced filtering techniques, in-depth
        analysis, and stronger flow enforcement mechanisms implemented in cross-domain
        products, such as high-assurance guards. Such capabilities are generally not
        available in commercial off-the-shelf products. Information flow enforcement
        also applies to control plane traffic (e.g., routing and DNS).'
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es"
          description: "Impor autoriza\xE7\xF5es aprovadas para controlar o fluxo\
            \ de informa\xE7\xF5es dentro do sistema e entre sistemas conectados com\
            \ base em [Atribui\xE7\xE3o: pol\xEDticas de controle de fluxo de informa\xE7\
            \xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "O controle de fluxo de informa\xE7\xF5es regula para onde as\
            \ informa\xE7\xF5es podem trafegar dentro de um sistema e entre sistemas\
            \ (em contraste com quem \xE9 autorizado a acessar as informa\xE7\xF5\
            es) e independentemente de acessos subsequentes a essas informa\xE7\xF5\
            es. As restri\xE7\xF5es de controle de fluxo incluem bloquear tr\xE1fego\
            \ externo que alega ser proveniente de dentro da organiza\xE7\xE3o, impedir\
            \ que informa\xE7\xF5es de exporta\xE7\xE3o controlada sejam transmitidas\
            \ em texto claro para a Internet, restringir requisi\xE7\xF5es web que\
            \ n\xE3o provenham do servidor proxy web interno e limitar transfer\xEA\
            ncias de informa\xE7\xF5es entre organiza\xE7\xF5es com base em estruturas\
            \ de dados e conte\xFAdo. A transfer\xEAncia de informa\xE7\xF5es entre\
            \ organiza\xE7\xF5es pode exigir um acordo especificando como o fluxo\
            \ de informa\xE7\xF5es \xE9 imposto (ver CA-3). A transfer\xEAncia de\
            \ informa\xE7\xF5es entre sistemas em diferentes dom\xEDnios de seguran\xE7\
            a ou privacidade com diferentes pol\xEDticas de seguran\xE7a ou privacidade\
            \ introduz o risco de que tais transfer\xEAncias violem uma ou mais pol\xED\
            ticas de seguran\xE7a ou privacidade de dom\xEDnio. Em tais situa\xE7\xF5\
            es, os propriet\xE1rios/curadores das informa\xE7\xF5es fornecem orienta\xE7\
            \xE3o em pontos de imposi\xE7\xE3o de pol\xEDtica designados entre sistemas\
            \ conectados. As organiza\xE7\xF5es consideram exigir solu\xE7\xF5es arquiteturais\
            \ espec\xEDficas para impor pol\xEDticas espec\xEDficas de seguran\xE7\
            a e privacidade. A imposi\xE7\xE3o inclui proibir transfer\xEAncias de\
            \ informa\xE7\xF5es entre sistemas conectados (ou seja, permitir apenas\
            \ o acesso), verificar permiss\xF5es de escrita antes de aceitar informa\xE7\
            \xF5es de outro dom\xEDnio de seguran\xE7a ou privacidade ou sistema conectado,\
            \ empregar mecanismos de hardware para impor fluxos de informa\xE7\xE3\
            o unidirecionais e implementar mecanismos confi\xE1veis de reclassifica\xE7\
            \xE3o para reatribuir atributos e r\xF3tulos de seguran\xE7a ou privacidade.\n\
            As organiza\xE7\xF5es comumente empregam pol\xEDticas de controle de fluxo\
            \ de informa\xE7\xF5es e mecanismos de imposi\xE7\xE3o para controlar\
            \ o fluxo de informa\xE7\xF5es entre origens e destinos designados dentro\
            \ dos sistemas e entre sistemas conectados. O controle de fluxo \xE9 baseado\
            \ nas caracter\xEDsticas da informa\xE7\xE3o e/ou do caminho da informa\xE7\
            \xE3o. A imposi\xE7\xE3o ocorre, por exemplo, em dispositivos de prote\xE7\
            \xE3o de per\xEDmetro que empregam conjuntos de regras ou estabelecem\
            \ defini\xE7\xF5es de configura\xE7\xE3o que restringem servi\xE7os do\
            \ sistema, fornecem uma capacidade de filtragem de pacotes com base em\
            \ informa\xE7\xF5es de cabe\xE7alho ou fornecem uma capacidade de filtragem\
            \ de mensagens com base no conte\xFAdo da mensagem. As organiza\xE7\xF5\
            es tamb\xE9m consideram a confiabilidade dos mecanismos de filtragem e/ou\
            \ inspe\xE7\xE3o (ou seja, componentes de hardware, firmware e software)\
            \ que s\xE3o cr\xEDticos para a imposi\xE7\xE3o do fluxo de informa\xE7\
            \xF5es. As melhorias de controle de 3 a 32 tratam principalmente das necessidades\
            \ de solu\xE7\xF5es entre dom\xEDnios que se concentram em t\xE9cnicas\
            \ de filtragem mais avan\xE7adas, an\xE1lise aprofundada e mecanismos\
            \ mais robustos de imposi\xE7\xE3o de fluxo implementados em produtos\
            \ entre dom\xEDnios, como guardas de alta garantia. Tais capacidades geralmente\
            \ n\xE3o est\xE3o dispon\xEDveis em produtos comerciais de prateleira.\
            \ A imposi\xE7\xE3o de fluxo de informa\xE7\xF5es tamb\xE9m se aplica\
            \ ao tr\xE1fego do plano de controle (por exemplo, roteamento e DNS)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(1)
      name: Information Flow Enforcement | Object Security and Privacy Attributes
      description: 'Use [Assignment: organization-defined security and privacy attributes]
        associated with [Assignment: organization-defined information, source, and
        destination objects] to enforce [Assignment: organization-defined information
        flow control policies] as a basis for flow control decisions.'
      annotation: Information flow enforcement mechanisms compare security and privacy
        attributes associated with information (i.e., data content and structure)
        and source and destination objects and respond appropriately when the enforcement
        mechanisms encounter information flows not explicitly allowed by information
        flow policies. For example, an information object labeled Secret would be
        allowed to flow to a destination object labeled Secret, but an information
        object labeled Top Secret would not be allowed to flow to a destination object
        labeled Secret. A dataset of personally identifiable information may be tagged
        with restrictions against combining with other types of datasets and, thus,
        would not be allowed to flow to the restricted dataset. Security and privacy
        attributes can also include source and destination addresses employed in traffic
        filter firewalls. Flow enforcement using explicit security or privacy attributes
        can be used, for example, to control the release of certain types of information.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Atributos de Seguran\xE7\
            a e Privacidade de Objetos"
          description: "Usar [Atribui\xE7\xE3o: atributos de seguran\xE7a e privacidade\
            \ definidos pela organiza\xE7\xE3o] associados a [Atribui\xE7\xE3o: objetos\
            \ de informa\xE7\xE3o, origem e destino definidos pela organiza\xE7\xE3\
            o] para impor [Atribui\xE7\xE3o: pol\xEDticas de controle de fluxo de\
            \ informa\xE7\xF5es definidas pela organiza\xE7\xE3o] como base para decis\xF5\
            es de controle de fluxo."
          annotation: "Os mecanismos de imposi\xE7\xE3o de fluxo de informa\xE7\xF5\
            es comparam os atributos de seguran\xE7a e privacidade associados \xE0\
            s informa\xE7\xF5es (ou seja, conte\xFAdo e estrutura dos dados) e aos\
            \ objetos de origem e destino e respondem de forma apropriada quando os\
            \ mecanismos de imposi\xE7\xE3o encontram fluxos de informa\xE7\xE3o n\xE3\
            o explicitamente permitidos pelas pol\xEDticas de fluxo de informa\xE7\
            \xF5es. Por exemplo, um objeto de informa\xE7\xE3o rotulado como Secreto\
            \ teria permiss\xE3o de fluir para um objeto de destino rotulado como\
            \ Secreto, mas um objeto de informa\xE7\xE3o rotulado como Ultrassecreto\
            \ n\xE3o teria permiss\xE3o de fluir para um objeto de destino rotulado\
            \ como Secreto. Um conjunto de dados de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal pode ser marcado com restri\xE7\xF5es contra a combina\xE7\
            \xE3o com outros tipos de conjuntos de dados e, portanto, n\xE3o teria\
            \ permiss\xE3o de fluir para o conjunto de dados restrito. Os atributos\
            \ de seguran\xE7a e privacidade tamb\xE9m podem incluir endere\xE7os de\
            \ origem e destino empregados em firewalls de filtragem de tr\xE1fego.\
            \ A imposi\xE7\xE3o de fluxo usando atributos expl\xEDcitos de seguran\xE7\
            a ou privacidade pode ser usada, por exemplo, para controlar a libera\xE7\
            \xE3o de certos tipos de informa\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(2)
      name: Information Flow Enforcement | Processing Domains
      description: 'Use protected processing domains to enforce [Assignment: organization-defined
        information flow control policies] as a basis for flow control decisions.'
      annotation: Protected processing domains within systems are processing spaces
        that have controlled interactions with other processing spaces, enabling control
        of information flows between these spaces and to/from information objects.
        A protected processing domain can be provided, for example, by implementing
        domain and type enforcement. In domain and type enforcement, system processes
        are assigned to domains, information is identified by types, and information
        flows are controlled based on allowed information accesses (i.e., determined
        by domain and type), allowed signaling among domains, and allowed process
        transitions to other domains.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Dom\xEDnios de Processamento"
          description: "Usar dom\xEDnios de processamento protegidos para impor [Atribui\xE7\
            \xE3o: pol\xEDticas de controle de fluxo de informa\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o] como base para decis\xF5es de controle de fluxo."
          annotation: "Os dom\xEDnios de processamento protegidos dentro dos sistemas\
            \ s\xE3o espa\xE7os de processamento que t\xEAm intera\xE7\xF5es controladas\
            \ com outros espa\xE7os de processamento, permitindo o controle dos fluxos\
            \ de informa\xE7\xE3o entre esses espa\xE7os e de/para objetos de informa\xE7\
            \xE3o. Um dom\xEDnio de processamento protegido pode ser fornecido, por\
            \ exemplo, implementando a imposi\xE7\xE3o de dom\xEDnio e tipo. Na imposi\xE7\
            \xE3o de dom\xEDnio e tipo, os processos do sistema s\xE3o atribu\xED\
            dos a dom\xEDnios, as informa\xE7\xF5es s\xE3o identificadas por tipos,\
            \ e os fluxos de informa\xE7\xE3o s\xE3o controlados com base nos acessos\
            \ de informa\xE7\xE3o permitidos (ou seja, determinados por dom\xEDnio\
            \ e tipo), na sinaliza\xE7\xE3o permitida entre dom\xEDnios e nas transi\xE7\
            \xF5es de processo permitidas para outros dom\xEDnios."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(3)
      name: Information Flow Enforcement | Dynamic Information Flow Control
      description: 'Enforce [Assignment: organization-defined information flow control
        policies].'
      annotation: Organizational policies regarding dynamic information flow control
        include allowing or disallowing information flows based on changing conditions
        or mission or operational considerations. Changing conditions include changes
        in risk tolerance due to changes in the immediacy of mission or business needs,
        changes in the threat environment, and detection of potentially harmful or
        adverse events.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Controle Din\xE2\
            mico de Fluxo de Informa\xE7\xF5es"
          description: "Impor [Atribui\xE7\xE3o: pol\xEDticas de controle de fluxo\
            \ de informa\xE7\xF5es definidas pela organiza\xE7\xE3o]."
          annotation: "As pol\xEDticas organizacionais relativas ao controle din\xE2\
            mico de fluxo de informa\xE7\xF5es incluem permitir ou n\xE3o permitir\
            \ fluxos de informa\xE7\xF5es com base em condi\xE7\xF5es mut\xE1veis\
            \ ou em considera\xE7\xF5es de miss\xE3o ou operacionais. As condi\xE7\
            \xF5es mut\xE1veis incluem mudan\xE7as na toler\xE2ncia a risco devido\
            \ a altera\xE7\xF5es na urg\xEAncia de necessidades de miss\xE3o ou de\
            \ neg\xF3cio, mudan\xE7as no ambiente de amea\xE7as e a detec\xE7\xE3\
            o de eventos potencialmente prejudiciais ou adversos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(4)
      name: Information Flow Enforcement | Flow Control of Encrypted Information
      description: 'Prevent encrypted information from bypassing [Assignment: organization-defined
        information flow control mechanisms] by [Selection (one or more): decrypting
        the information; blocking the flow of the encrypted information; terminating
        communications sessions attempting to pass encrypted information; [Assignment:
        organization-defined procedure or method]].'
      annotation: Flow control mechanisms include content checking, security policy
        filters, and data type identifiers. The term encryption is extended to cover
        encoded data not recognized by filtering mechanisms.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Controle de Fluxo\
            \ de Informa\xE7\xF5es Criptografadas"
          description: "Impedir que informa\xE7\xF5es criptografadas contornem [Atribui\xE7\
            \xE3o: mecanismos de controle de fluxo de informa\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] por meio de [Sele\xE7\xE3o (um ou mais): descriptografar\
            \ a informa\xE7\xE3o; bloquear o fluxo da informa\xE7\xE3o criptografada;\
            \ encerrar sess\xF5es de comunica\xE7\xE3o que tentem transmitir informa\xE7\
            \xF5es criptografadas; [Atribui\xE7\xE3o: procedimento ou m\xE9todo definido\
            \ pela organiza\xE7\xE3o]]."
          annotation: "Os mecanismos de controle de fluxo incluem verifica\xE7\xE3\
            o de conte\xFAdo, filtros de pol\xEDtica de seguran\xE7a e identificadores\
            \ de tipo de dado. O termo criptografia \xE9 estendido para abranger dados\
            \ codificados n\xE3o reconhecidos pelos mecanismos de filtragem."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(5)
      name: Information Flow Enforcement | Embedded Data Types
      description: 'Enforce [Assignment: organization-defined limitations] on embedding
        data types within other data types.'
      annotation: Embedding data types within other data types may result in reduced
        flow control effectiveness. Data type embedding includes inserting files as
        objects within other files and using compressed or archived data types that
        may include multiple embedded data types. Limitations on data type embedding
        consider the levels of embedding and prohibit levels of data type embedding
        that are beyond the capability of the inspection tools.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Tipos de Dados Embutidos"
          description: "Impor [Atribui\xE7\xE3o: limita\xE7\xF5es definidas pela organiza\xE7\
            \xE3o] quanto ao aninhamento de tipos de dados dentro de outros tipos\
            \ de dados."
          annotation: "O aninhamento de tipos de dados dentro de outros tipos de dados\
            \ pode reduzir a efic\xE1cia do controle de fluxo. O aninhamento de tipos\
            \ de dados inclui inserir arquivos como objetos dentro de outros arquivos\
            \ e usar tipos de dados comprimidos ou arquivados que podem conter m\xFA\
            ltiplos tipos de dados aninhados. As limita\xE7\xF5es ao aninhamento de\
            \ tipos de dados consideram os n\xEDveis de aninhamento e pro\xEDbem n\xED\
            veis de aninhamento de tipos de dados que excedam a capacidade das ferramentas\
            \ de inspe\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(6)
      name: Information Flow Enforcement | Metadata
      description: 'Enforce information flow control based on [Assignment: organization-defined
        metadata].'
      annotation: Metadata is information that describes the characteristics of data.
        Metadata can include structural metadata describing data structures or descriptive
        metadata describing data content. Enforcement of allowed information flows
        based on metadata enables simpler and more effective flow control. Organizations
        consider the trustworthiness of metadata regarding data accuracy (i.e., knowledge
        that the metadata values are correct with respect to the data), data integrity
        (i.e., protecting against unauthorized changes to metadata tags), and the
        binding of metadata to the data payload (i.e., employing sufficiently strong
        binding techniques with appropriate assurance).
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Metadados"
          description: "Impor o controle de fluxo de informa\xE7\xF5es com base em\
            \ [Atribui\xE7\xE3o: metadados definidos pela organiza\xE7\xE3o]."
          annotation: "Metadados s\xE3o informa\xE7\xF5es que descrevem as caracter\xED\
            sticas dos dados. Os metadados podem incluir metadados estruturais que\
            \ descrevem estruturas de dados ou metadados descritivos que descrevem\
            \ o conte\xFAdo dos dados. A imposi\xE7\xE3o de fluxos de informa\xE7\xF5\
            es permitidos com base em metadados possibilita um controle de fluxo mais\
            \ simples e mais eficaz. As organiza\xE7\xF5es consideram a confiabilidade\
            \ dos metadados quanto \xE0 exatid\xE3o dos dados (ou seja, a certeza\
            \ de que os valores dos metadados est\xE3o corretos em rela\xE7\xE3o aos\
            \ dados), \xE0 integridade dos dados (ou seja, a prote\xE7\xE3o contra\
            \ altera\xE7\xF5es n\xE3o autorizadas das marca\xE7\xF5es de metadados)\
            \ e \xE0 vincula\xE7\xE3o dos metadados \xE0 carga \xFAtil de dados (ou\
            \ seja, o emprego de t\xE9cnicas de vincula\xE7\xE3o suficientemente robustas\
            \ com garantia apropriada)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(7)
      name: Information Flow Enforcement | One-way Flow Mechanisms
      description: Enforce one-way information flows through hardware-based flow control
        mechanisms.
      annotation: One-way flow mechanisms may also be referred to as a unidirectional
        network, unidirectional security gateway, or data diode. One-way flow mechanisms
        can be used to prevent data from being exported from a higher impact or classified
        domain or system while permitting data from a lower impact or unclassified
        domain or system to be imported.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Mecanismos de Fluxo\
            \ Unidirecional"
          description: "Impor fluxos de informa\xE7\xF5es unidirecionais por meio\
            \ de mecanismos de controle de fluxo baseados em hardware."
          annotation: "Os mecanismos de fluxo unidirecional tamb\xE9m podem ser referidos\
            \ como rede unidirecional, gateway de seguran\xE7a unidirecional ou diodo\
            \ de dados. Os mecanismos de fluxo unidirecional podem ser usados para\
            \ impedir que dados sejam exportados de um dom\xEDnio ou sistema de maior\
            \ impacto ou classificado, ao mesmo tempo em que permitem que dados de\
            \ um dom\xEDnio ou sistema de menor impacto ou n\xE3o classificado sejam\
            \ importados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(8)
      name: Information Flow Enforcement | Security and Privacy Policy Filters
      description: '(a) Enforce information flow control using [Assignment: organization-defined
        security or privacy policy filters] as a basis for flow control decisions
        for [Assignment: organization-defined information flows]; and

        (b) [Selection (one or more): Block; Strip; Modify; Quarantine] data after
        a filter processing failure in accordance with [Assignment: organization-defined
        security or privacy policy].'
      annotation: Organization-defined security or privacy policy filters can address
        data structures and content. For example, security or privacy policy filters
        for data structures can check for maximum file lengths, maximum field sizes,
        and data/file types (for structured and unstructured data). Security or privacy
        policy filters for data content can check for specific words, enumerated values
        or data value ranges, and hidden content. Structured data permits the interpretation
        of data content by applications. Unstructured data refers to digital information
        without a data structure or with a data structure that does not facilitate
        the development of rule sets to address the impact or classification level
        of the information conveyed by the data or the flow enforcement decisions.
        Unstructured data consists of bitmap objects that are inherently non-language-based
        (i.e., image, video, or audio files) and textual objects that are based on
        written or printed languages. Organizations can implement more than one security
        or privacy policy filter to meet information flow control objectives.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Filtros de Pol\xED\
            tica de Seguran\xE7a e Privacidade"
          description: "(a) Impor o controle de fluxo de informa\xE7\xF5es usando\
            \ [Atribui\xE7\xE3o: filtros de pol\xEDtica de seguran\xE7a ou de privacidade\
            \ definidos pela organiza\xE7\xE3o] como base para decis\xF5es de controle\
            \ de fluxo para [Atribui\xE7\xE3o: fluxos de informa\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o]; e\n(b) [Sele\xE7\xE3o (um ou mais): Bloquear;\
            \ Remover; Modificar; Colocar em quarentena] dados ap\xF3s uma falha de\
            \ processamento de filtro em conformidade com [Atribui\xE7\xE3o: pol\xED\
            tica de seguran\xE7a ou de privacidade definida pela organiza\xE7\xE3\
            o]."
          annotation: "Os filtros de pol\xEDtica de seguran\xE7a ou de privacidade\
            \ definidos pela organiza\xE7\xE3o podem abordar estruturas de dados e\
            \ conte\xFAdo. Por exemplo, os filtros de pol\xEDtica de seguran\xE7a\
            \ ou de privacidade para estruturas de dados podem verificar comprimentos\
            \ m\xE1ximos de arquivo, tamanhos m\xE1ximos de campo e tipos de dados/arquivos\
            \ (para dados estruturados e n\xE3o estruturados). Os filtros de pol\xED\
            tica de seguran\xE7a ou de privacidade para conte\xFAdo de dados podem\
            \ verificar palavras espec\xEDficas, valores enumerados ou faixas de valores\
            \ de dados e conte\xFAdo oculto. Os dados estruturados permitem a interpreta\xE7\
            \xE3o do conte\xFAdo de dados por aplica\xE7\xF5es. Os dados n\xE3o estruturados\
            \ referem-se a informa\xE7\xF5es digitais sem estrutura de dados ou com\
            \ uma estrutura de dados que n\xE3o facilita o desenvolvimento de conjuntos\
            \ de regras para abordar o n\xEDvel de impacto ou de classifica\xE7\xE3\
            o das informa\xE7\xF5es transmitidas pelos dados ou as decis\xF5es de\
            \ imposi\xE7\xE3o de fluxo. Os dados n\xE3o estruturados consistem em\
            \ objetos bitmap que s\xE3o inerentemente n\xE3o baseados em linguagem\
            \ (ou seja, arquivos de imagem, v\xEDdeo ou \xE1udio) e objetos textuais\
            \ baseados em linguagens escritas ou impressas. As organiza\xE7\xF5es\
            \ podem implementar mais de um filtro de pol\xEDtica de seguran\xE7a ou\
            \ de privacidade para atender aos objetivos de controle de fluxo de informa\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(9)
      name: Information Flow Enforcement | Human Reviews
      description: 'Enforce the use of human reviews for [Assignment: organization-defined
        information flows] under the following conditions: [Assignment: organization-defined
        conditions].'
      annotation: Organizations define security or privacy policy filters for all
        situations where automated flow control decisions are possible. When a fully
        automated flow control decision is not possible, then a human review may be
        employed in lieu of or as a complement to automated security or privacy policy
        filtering. Human reviews may also be employed as deemed necessary by organizations.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Revis\xF5es Humanas"
          description: "Impor o uso de revis\xF5es humanas para [Atribui\xE7\xE3o:\
            \ fluxos de informa\xE7\xF5es definidos pela organiza\xE7\xE3o] sob as\
            \ seguintes condi\xE7\xF5es: [Atribui\xE7\xE3o: condi\xE7\xF5es definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es definem filtros de pol\xEDtica de seguran\xE7\
            a ou de privacidade para todas as situa\xE7\xF5es em que decis\xF5es automatizadas\
            \ de controle de fluxo s\xE3o poss\xEDveis. Quando uma decis\xE3o de controle\
            \ de fluxo totalmente automatizada n\xE3o for poss\xEDvel, uma revis\xE3\
            o humana pode ser empregada em vez da, ou como complemento \xE0, filtragem\
            \ automatizada de pol\xEDtica de seguran\xE7a ou de privacidade. As revis\xF5\
            es humanas tamb\xE9m podem ser empregadas conforme julgado necess\xE1\
            rio pelas organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(10)
      name: Information Flow Enforcement | Enable and Disable Security or Privacy
        Policy Filters
      description: 'Provide the capability for privileged administrators to enable
        and disable [Assignment: organization-defined security or privacy policy filters]
        under the following conditions: [Assignment: organization-defined conditions].'
      annotation: For example, as allowed by the system authorization, administrators
        can enable security or privacy policy filters to accommodate approved data
        types. Administrators also have the capability to select the filters that
        are executed on a specific data flow based on the type of data that is being
        transferred, the source and destination security domains, and other security
        or privacy relevant features, as needed.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Habilitar e Desabilitar\
            \ Filtros de Pol\xEDtica de Seguran\xE7a ou de Privacidade"
          description: "Prover a capacidade de administradores privilegiados habilitarem\
            \ e desabilitarem [Atribui\xE7\xE3o: filtros de pol\xEDtica de seguran\xE7\
            a ou de privacidade definidos pela organiza\xE7\xE3o] sob as seguintes\
            \ condi\xE7\xF5es: [Atribui\xE7\xE3o: condi\xE7\xF5es definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Por exemplo, conforme permitido pela autoriza\xE7\xE3o do sistema,\
            \ os administradores podem habilitar filtros de pol\xEDtica de seguran\xE7\
            a ou de privacidade para acomodar tipos de dados aprovados. Os administradores\
            \ tamb\xE9m t\xEAm a capacidade de selecionar os filtros que s\xE3o executados\
            \ em um fluxo de dados espec\xEDfico com base no tipo de dado que est\xE1\
            \ sendo transferido, nos dom\xEDnios de seguran\xE7a de origem e destino\
            \ e em outras caracter\xEDsticas relevantes para seguran\xE7a ou privacidade,\
            \ conforme necess\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(11)
      name: Information Flow Enforcement | Configuration of Security or Privacy Policy
        Filters
      description: 'Provide the capability for privileged administrators to configure
        [Assignment: organization-defined security or privacy policy filters] to support
        different security or privacy policies.'
      annotation: Documentation contains detailed information for configuring security
        or privacy policy filters. For example, administrators can configure security
        or privacy policy filters to include the list of inappropriate words that
        security or privacy policy mechanisms check in accordance with the definitions
        provided by organizations.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Configura\xE7\xE3\
            o de Filtros de Pol\xEDtica de Seguran\xE7a ou de Privacidade"
          description: "Prover a capacidade de administradores privilegiados configurarem\
            \ [Atribui\xE7\xE3o: filtros de pol\xEDtica de seguran\xE7a ou de privacidade\
            \ definidos pela organiza\xE7\xE3o] para dar suporte a diferentes pol\xED\
            ticas de seguran\xE7a ou de privacidade."
          annotation: "A documenta\xE7\xE3o cont\xE9m informa\xE7\xF5es detalhadas\
            \ para configurar filtros de pol\xEDtica de seguran\xE7a ou de privacidade.\
            \ Por exemplo, os administradores podem configurar filtros de pol\xED\
            tica de seguran\xE7a ou de privacidade para incluir a lista de palavras\
            \ inadequadas que os mecanismos de pol\xEDtica de seguran\xE7a ou de privacidade\
            \ verificam em conformidade com as defini\xE7\xF5es fornecidas pelas organiza\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(12)
      name: Information Flow Enforcement | Data Type Identifiers
      description: 'When transferring information between different security domains,
        use [Assignment: organization-defined data type identifiers] to validate data
        essential for information flow decisions.'
      annotation: Data type identifiers include filenames, file types, file signatures
        or tokens, and multiple internal file signatures or tokens. Systems only allow
        transfer of data that is compliant with data type format specifications. Identification
        and validation of data types is based on defined specifications associated
        with each allowed data format. The filename and number alone are not used
        for data type identification. Content is validated syntactically and semantically
        against its specification to ensure that it is the proper data type.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Identificadores de\
            \ Tipo de Dado"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, usar [Atribui\xE7\xE3o: identificadores de tipo de\
            \ dado definidos pela organiza\xE7\xE3o] para validar dados essenciais\
            \ \xE0s decis\xF5es de fluxo de informa\xE7\xF5es."
          annotation: "Os identificadores de tipo de dado incluem nomes de arquivo,\
            \ tipos de arquivo, assinaturas ou tokens de arquivo e m\xFAltiplas assinaturas\
            \ ou tokens internos de arquivo. Os sistemas permitem apenas a transfer\xEA\
            ncia de dados que estejam em conformidade com as especifica\xE7\xF5es\
            \ de formato do tipo de dado. A identifica\xE7\xE3o e a valida\xE7\xE3\
            o dos tipos de dados baseiam-se em especifica\xE7\xF5es definidas associadas\
            \ a cada formato de dado permitido. O nome e o n\xFAmero do arquivo por\
            \ si s\xF3 n\xE3o s\xE3o usados para a identifica\xE7\xE3o do tipo de\
            \ dado. O conte\xFAdo \xE9 validado sint\xE1tica e semanticamente em rela\xE7\
            \xE3o \xE0 sua especifica\xE7\xE3o para garantir que seja o tipo de dado\
            \ adequado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(13)
      name: Information Flow Enforcement | Decomposition into Policy-relevant Subcomponents
      description: 'When transferring information between different security domains,
        decompose information into [Assignment: organization-defined policy-relevant
        subcomponents] for submission to policy enforcement mechanisms.'
      annotation: Decomposing information into policy-relevant subcomponents prior
        to information transfer facilitates policy decisions on source, destination,
        certificates, classification, attachments, and other security- or privacy-related
        component differentiators. Policy enforcement mechanisms apply filtering,
        inspection, and/or sanitization rules to the policy-relevant subcomponents
        of information to facilitate flow enforcement prior to transferring such information
        to different security domains.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Decomposi\xE7\xE3\
            o em Subcomponentes Relevantes para a Pol\xEDtica"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, decompor as informa\xE7\xF5es em [Atribui\xE7\xE3o:\
            \ subcomponentes relevantes para a pol\xEDtica definidos pela organiza\xE7\
            \xE3o] para submiss\xE3o a mecanismos de imposi\xE7\xE3o de pol\xEDtica."
          annotation: "Decompor as informa\xE7\xF5es em subcomponentes relevantes\
            \ para a pol\xEDtica antes da transfer\xEAncia de informa\xE7\xF5es facilita\
            \ decis\xF5es de pol\xEDtica sobre origem, destino, certificados, classifica\xE7\
            \xE3o, anexos e outros diferenciadores de componentes relacionados a seguran\xE7\
            a ou privacidade. Os mecanismos de imposi\xE7\xE3o de pol\xEDtica aplicam\
            \ regras de filtragem, inspe\xE7\xE3o e/ou sanitiza\xE7\xE3o aos subcomponentes\
            \ relevantes para a pol\xEDtica das informa\xE7\xF5es para facilitar a\
            \ imposi\xE7\xE3o de fluxo antes de transferir tais informa\xE7\xF5es\
            \ para diferentes dom\xEDnios de seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(14)
      name: Information Flow Enforcement | Security or Privacy Policy Filter Constraints
      description: 'When transferring information between different security domains,
        implement [Assignment: organization-defined security or privacy policy filters]
        requiring fully enumerated formats that restrict data structure and content.'
      annotation: Data structure and content restrictions reduce the range of potential
        malicious or unsanctioned content in cross-domain transactions. Security or
        privacy policy filters that restrict data structures include restricting file
        sizes and field lengths. Data content policy filters include encoding formats
        for character sets, restricting character data fields to only contain alpha-numeric
        characters, prohibiting special characters, and validating schema structures.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Restri\xE7\xF5es\
            \ de Filtros de Pol\xEDtica de Seguran\xE7a ou de Privacidade"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, implementar [Atribui\xE7\xE3o: filtros de pol\xEDtica\
            \ de seguran\xE7a ou de privacidade definidos pela organiza\xE7\xE3o]\
            \ que exijam formatos totalmente enumerados que restrinjam a estrutura\
            \ e o conte\xFAdo dos dados."
          annotation: "As restri\xE7\xF5es de estrutura e conte\xFAdo dos dados reduzem\
            \ a gama de conte\xFAdo potencialmente malicioso ou n\xE3o autorizado\
            \ em transa\xE7\xF5es entre dom\xEDnios. Os filtros de pol\xEDtica de\
            \ seguran\xE7a ou de privacidade que restringem estruturas de dados incluem\
            \ restri\xE7\xF5es a tamanhos de arquivo e comprimentos de campo. Os filtros\
            \ de pol\xEDtica de conte\xFAdo de dados incluem formatos de codifica\xE7\
            \xE3o para conjuntos de caracteres, restringir campos de dados de caracteres\
            \ a conterem apenas caracteres alfanum\xE9ricos, proibir caracteres especiais\
            \ e validar estruturas de esquema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(15)
      name: Information Flow Enforcement | Detection of Unsanctioned Information
      description: 'When transferring information between different security domains,
        examine the information for the presence of [Assignment: organization-defined
        unsanctioned information] and prohibit the transfer of such information in
        accordance with the [Assignment: organization-defined security or privacy
        policy].'
      annotation: Unsanctioned information includes malicious code, information that
        is inappropriate for release from the source network, or executable code that
        could disrupt or harm the services or systems on the destination network.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Detec\xE7\xE3o de\
            \ Informa\xE7\xF5es N\xE3o Autorizadas"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, examinar as informa\xE7\xF5es quanto \xE0 presen\xE7\
            a de [Atribui\xE7\xE3o: informa\xE7\xF5es n\xE3o autorizadas definidas\
            \ pela organiza\xE7\xE3o] e proibir a transfer\xEAncia de tais informa\xE7\
            \xF5es em conformidade com a [Atribui\xE7\xE3o: pol\xEDtica de seguran\xE7\
            a ou de privacidade definida pela organiza\xE7\xE3o]."
          annotation: "As informa\xE7\xF5es n\xE3o autorizadas incluem c\xF3digo malicioso,\
            \ informa\xE7\xF5es inadequadas para divulga\xE7\xE3o a partir da rede\
            \ de origem ou c\xF3digo execut\xE1vel que poderia interromper ou prejudicar\
            \ os servi\xE7os ou sistemas na rede de destino."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(5)
      name: Remote Access | Monitoring for Unauthorized Connections
      description: '[Withdrawn: Incorporated into SI-4.]'
      translations:
        pt:
          name: "Acesso Remoto | Monitoramento de Conex\xF5es N\xE3o Autorizadas"
          description: '[Retirado: Incorporado ao SI-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(17)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(17)
      name: Information Flow Enforcement | Domain Authentication
      description: 'Uniquely identify and authenticate source and destination points
        by [Selection (one or more): organization; system; application; service; individual]
        for information transfer.'
      annotation: Attribution is a critical component of a security and privacy concept
        of operations. The ability to identify source and destination points for information
        flowing within systems allows the forensic reconstruction of events and encourages
        policy compliance by attributing policy violations to specific organizations
        or individuals. Successful domain authentication requires that system labels
        distinguish among systems, organizations, and individuals involved in preparing,
        sending, receiving, or disseminating information. Attribution also allows
        organizations to better maintain the lineage of personally identifiable information
        processing as it flows through systems and can facilitate consent tracking,
        as well as correction, deletion, or access requests from individuals.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Autentica\xE7\xE3\
            o de Dom\xEDnio"
          description: "Identificar e autenticar de forma \xFAnica os pontos de origem\
            \ e destino por [Sele\xE7\xE3o (um ou mais): organiza\xE7\xE3o; sistema;\
            \ aplica\xE7\xE3o; servi\xE7o; indiv\xEDduo] para a transfer\xEAncia de\
            \ informa\xE7\xF5es."
          annotation: "A atribui\xE7\xE3o (attribution) \xE9 um componente cr\xED\
            tico de um conceito de opera\xE7\xF5es de seguran\xE7a e privacidade.\
            \ A capacidade de identificar pontos de origem e destino das informa\xE7\
            \xF5es que fluem dentro dos sistemas permite a reconstru\xE7\xE3o forense\
            \ de eventos e incentiva a conformidade com a pol\xEDtica ao atribuir\
            \ viola\xE7\xF5es de pol\xEDtica a organiza\xE7\xF5es ou indiv\xEDduos\
            \ espec\xEDficos. Uma autentica\xE7\xE3o de dom\xEDnio bem-sucedida exige\
            \ que os r\xF3tulos do sistema distingam entre sistemas, organiza\xE7\xF5\
            es e indiv\xEDduos envolvidos na prepara\xE7\xE3o, no envio, no recebimento\
            \ ou na dissemina\xE7\xE3o de informa\xE7\xF5es. A atribui\xE7\xE3o tamb\xE9\
            m permite que as organiza\xE7\xF5es mantenham melhor a linhagem do processamento\
            \ de informa\xE7\xF5es de identifica\xE7\xE3o pessoal \xE0 medida que\
            \ fluem pelos sistemas e pode facilitar o rastreamento de consentimento,\
            \ bem como solicita\xE7\xF5es de corre\xE7\xE3o, exclus\xE3o ou acesso\
            \ por parte dos indiv\xEDduos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(7)
      name: Remote Access | Additional Protection for Security Function Access
      description: '[Withdrawn: Incorporated into AC-3(10).]'
      translations:
        pt:
          name: "Acesso Remoto | Prote\xE7\xE3o Adicional para Acesso a Fun\xE7\xF5\
            es de Seguran\xE7a"
          description: '[Retirado: Incorporado ao AC-3(10).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(19)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(19)
      name: Information Flow Enforcement | Validation of Metadata
      description: 'When transferring information between different security domains,
        implement [Assignment: organization-defined security or privacy policy filters]
        on metadata.'
      annotation: All information (including metadata and the data to which the metadata
        applies) is subject to filtering and inspection. Some organizations distinguish
        between metadata and data payloads (i.e., only the data to which the metadata
        is bound). Other organizations do not make such distinctions and consider
        metadata and the data to which the metadata applies to be part of the payload.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Valida\xE7\xE3o de\
            \ Metadados"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, implementar [Atribui\xE7\xE3o: filtros de pol\xEDtica\
            \ de seguran\xE7a ou de privacidade definidos pela organiza\xE7\xE3o]\
            \ sobre os metadados."
          annotation: "Todas as informa\xE7\xF5es (incluindo os metadados e os dados\
            \ aos quais os metadados se aplicam) est\xE3o sujeitas a filtragem e inspe\xE7\
            \xE3o. Algumas organiza\xE7\xF5es distinguem entre metadados e cargas\
            \ \xFAteis de dados (ou seja, apenas os dados aos quais os metadados est\xE3\
            o vinculados). Outras organiza\xE7\xF5es n\xE3o fazem tal distin\xE7\xE3\
            o e consideram os metadados e os dados aos quais os metadados se aplicam\
            \ como parte da carga \xFAtil."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(20)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(20)
      name: Information Flow Enforcement | Approved Solutions
      description: 'Employ [Assignment: organization-defined solutions in approved
        configurations] to control the flow of [Assignment: organization-defined information]
        across security domains.'
      annotation: Organizations define approved solutions and configurations in cross-domain
        policies and guidance in accordance with the types of information flows across
        classification boundaries. The National Security Agency (NSA) National Cross
        Domain Strategy and Management Office provides a listing of approved cross-domain
        solutions. Contact ncdsmo@nsa.gov for more information.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Solu\xE7\xF5es Aprovadas"
          description: "Empregar [Atribui\xE7\xE3o: solu\xE7\xF5es em configura\xE7\
            \xF5es aprovadas definidas pela organiza\xE7\xE3o] para controlar o fluxo\
            \ de [Atribui\xE7\xE3o: informa\xE7\xF5es definidas pela organiza\xE7\xE3\
            o] entre dom\xEDnios de seguran\xE7a."
          annotation: "As organiza\xE7\xF5es definem solu\xE7\xF5es e configura\xE7\
            \xF5es aprovadas em pol\xEDticas e orienta\xE7\xF5es de dom\xEDnio cruzado\
            \ de acordo com os tipos de fluxos de informa\xE7\xF5es entre fronteiras\
            \ de classifica\xE7\xE3o. O National Cross Domain Strategy and Management\
            \ Office da National Security Agency (NSA) fornece uma listagem de solu\xE7\
            \xF5es de dom\xEDnio cruzado aprovadas. Entre em contato com ncdsmo@nsa.gov\
            \ para obter mais informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(21)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(21)
      name: Information Flow Enforcement | Physical or Logical Separation of Information
        Flows
      description: 'Separate information flows logically or physically using [Assignment:
        organization-defined mechanisms and/or techniques] to accomplish [Assignment:
        organization-defined required separations by types of information].'
      annotation: Enforcing the separation of information flows associated with defined
        types of data can enhance protection by ensuring that information is not commingled
        while in transit and by enabling flow control by transmission paths that are
        not otherwise achievable. Types of separable information include inbound and
        outbound communications traffic, service requests and responses, and information
        of differing security impact or classification levels.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Separa\xE7\xE3o F\xED\
            sica ou L\xF3gica de Fluxos de Informa\xE7\xF5es"
          description: "Separar fluxos de informa\xE7\xF5es de forma l\xF3gica ou\
            \ f\xEDsica usando [Atribui\xE7\xE3o: mecanismos e/ou t\xE9cnicas definidos\
            \ pela organiza\xE7\xE3o] para realizar [Atribui\xE7\xE3o: separa\xE7\xF5\
            es requeridas por tipos de informa\xE7\xE3o definidas pela organiza\xE7\
            \xE3o]."
          annotation: "A imposi\xE7\xE3o da separa\xE7\xE3o de fluxos de informa\xE7\
            \xF5es associados a tipos de dados definidos pode aprimorar a prote\xE7\
            \xE3o ao garantir que as informa\xE7\xF5es n\xE3o sejam misturadas durante\
            \ o tr\xE2nsito e ao habilitar o controle de fluxo por caminhos de transmiss\xE3\
            o que, de outra forma, n\xE3o seriam alcan\xE7\xE1veis. Os tipos de informa\xE7\
            \xF5es separ\xE1veis incluem tr\xE1fego de comunica\xE7\xE3o de entrada\
            \ e de sa\xEDda, solicita\xE7\xF5es e respostas de servi\xE7o e informa\xE7\
            \xF5es de diferentes n\xEDveis de impacto ou de classifica\xE7\xE3o de\
            \ seguran\xE7a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(22)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(22)
      name: Information Flow Enforcement | Access Only
      description: Provide access from a single device to computing platforms, applications,
        or data residing in multiple different security domains, while preventing
        information flow between the different security domains.
      annotation: The system provides a capability for users to access each connected
        security domain without providing any mechanisms to allow users to transfer
        data or information between the different security domains. An example of
        an access-only solution is a terminal that provides a user access to information
        with different security classifications while assuredly keeping the information
        separate.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Apenas Acesso"
          description: "Prover acesso a partir de um \xFAnico dispositivo a plataformas\
            \ de computa\xE7\xE3o, aplica\xE7\xF5es ou dados residentes em m\xFAltiplos\
            \ dom\xEDnios de seguran\xE7a diferentes, ao mesmo tempo em que se impede\
            \ o fluxo de informa\xE7\xF5es entre os diferentes dom\xEDnios de seguran\xE7\
            a."
          annotation: "O sistema prov\xEA a capacidade de os usu\xE1rios acessarem\
            \ cada dom\xEDnio de seguran\xE7a conectado sem prover quaisquer mecanismos\
            \ que permitam aos usu\xE1rios transferir dados ou informa\xE7\xF5es entre\
            \ os diferentes dom\xEDnios de seguran\xE7a. Um exemplo de solu\xE7\xE3\
            o apenas de acesso \xE9 um terminal que prov\xEA ao usu\xE1rio acesso\
            \ a informa\xE7\xF5es com diferentes classifica\xE7\xF5es de seguran\xE7\
            a, mantendo, de forma garantida, as informa\xE7\xF5es separadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(23)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(23)
      name: Information Flow Enforcement | Modify Non-releasable Information
      description: 'When transferring information between different security domains,
        modify non-releasable information by implementing [Assignment: organization-defined
        modification action].'
      annotation: Modifying non-releasable information can help prevent a data spill
        or attack when information is transferred across security domains. Modification
        actions include masking, permutation, alteration, removal, or redaction.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Modificar Informa\xE7\
            \xF5es N\xE3o Liber\xE1veis"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, modificar informa\xE7\xF5es n\xE3o liber\xE1veis implementando\
            \ [Atribui\xE7\xE3o: a\xE7\xE3o de modifica\xE7\xE3o definida pela organiza\xE7\
            \xE3o]."
          annotation: "Modificar informa\xE7\xF5es n\xE3o liber\xE1veis pode ajudar\
            \ a prevenir um vazamento de dados ou um ataque quando as informa\xE7\xF5\
            es s\xE3o transferidas entre dom\xEDnios de seguran\xE7a. As a\xE7\xF5\
            es de modifica\xE7\xE3o incluem mascaramento, permuta\xE7\xE3o, altera\xE7\
            \xE3o, remo\xE7\xE3o ou reda\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(24)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(24)
      name: Information Flow Enforcement | Internal Normalized Format
      description: When transferring information between different security domains,
        parse incoming data into an internal normalized format and regenerate the
        data to be consistent with its intended specification.
      annotation: Converting data into normalized forms is one of most of effective
        mechanisms to stop malicious attacks and large classes of data exfiltration.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Formato Normalizado\
            \ Interno"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, analisar os dados recebidos em um formato normalizado\
            \ interno e regenerar os dados de modo a serem consistentes com sua especifica\xE7\
            \xE3o pretendida."
          annotation: "Converter dados em formas normalizadas \xE9 um dos mecanismos\
            \ mais eficazes para deter ataques maliciosos e grandes classes de exfiltra\xE7\
            \xE3o de dados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(25)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(25)
      name: Information Flow Enforcement | Data Sanitization
      description: 'When transferring information between different security domains,
        sanitize data to minimize [Selection (one or more): delivery of malicious
        content, command and control of malicious code, malicious code augmentation,
        and steganography encoded data; spillage of sensitive information] in accordance
        with [Assignment: organization-defined policy]].'
      annotation: Data sanitization is the process of irreversibly removing or destroying
        data stored on a memory device (e.g., hard drives, flash memory/solid state
        drives, mobile devices, CDs, and DVDs) or in hard copy form.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Sanitiza\xE7\xE3\
            o de Dados"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, sanitizar os dados para minimizar [Sele\xE7\xE3o (um\
            \ ou mais): entrega de conte\xFAdo malicioso, comando e controle de c\xF3\
            digo malicioso, amplia\xE7\xE3o de c\xF3digo malicioso e dados codificados\
            \ por esteganografia; vazamento de informa\xE7\xF5es sens\xEDveis] em\
            \ conformidade com [Atribui\xE7\xE3o: pol\xEDtica definida pela organiza\xE7\
            \xE3o]."
          annotation: "A sanitiza\xE7\xE3o de dados \xE9 o processo de remover ou\
            \ destruir de forma irrevers\xEDvel dados armazenados em um dispositivo\
            \ de mem\xF3ria (por exemplo, discos r\xEDgidos, mem\xF3ria flash/unidades\
            \ de estado s\xF3lido, dispositivos m\xF3veis, CDs e DVDs) ou em forma\
            \ impressa."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(26)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(26)
      name: Information Flow Enforcement | Audit Filtering Actions
      description: When transferring information between different security domains,
        record and audit content filtering actions and results for the information
        being filtered.
      annotation: Content filtering is the process of inspecting information as it
        traverses a cross-domain solution and determines if the information meets
        a predefined policy. Content filtering actions and the results of filtering
        actions are recorded for individual messages to ensure that the correct filter
        actions were applied. Content filter reports are used to assist in troubleshooting
        actions by, for example, determining why message content was modified and/or
        why it failed the filtering process. Audit events are defined in AU-2. Audit
        records are generated in AU-12.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Auditoria de A\xE7\
            \xF5es de Filtragem"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, registrar e auditar as a\xE7\xF5es e os resultados\
            \ da filtragem de conte\xFAdo para as informa\xE7\xF5es que est\xE3o sendo\
            \ filtradas."
          annotation: "A filtragem de conte\xFAdo \xE9 o processo de inspecionar informa\xE7\
            \xF5es \xE0 medida que atravessam uma solu\xE7\xE3o de dom\xEDnio cruzado\
            \ e determinar se as informa\xE7\xF5es atendem a uma pol\xEDtica predefinida.\
            \ As a\xE7\xF5es de filtragem de conte\xFAdo e os resultados das a\xE7\
            \xF5es de filtragem s\xE3o registrados para mensagens individuais a fim\
            \ de garantir que as a\xE7\xF5es de filtro corretas foram aplicadas. Os\
            \ relat\xF3rios de filtro de conte\xFAdo s\xE3o usados para auxiliar na\
            \ resolu\xE7\xE3o de problemas, por exemplo, determinando por que o conte\xFA\
            do de uma mensagem foi modificado e/ou por que falhou no processo de filtragem.\
            \ Os eventos de auditoria s\xE3o definidos no AU-2. Os registros de auditoria\
            \ s\xE3o gerados no AU-12."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(27)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(27)
      name: Information Flow Enforcement | Redundant/independent Filtering Mechanisms
      description: When transferring information between different security domains,
        implement content filtering solutions that provide redundant and independent
        filtering mechanisms for each data type.
      annotation: "Content filtering is the process of inspecting information as it\
        \ traverses a cross-domain solution and determines if the information meets\
        \ a predefined policy. Redundant and independent content filtering eliminates\
        \ a single point of failure filtering system. Independence is defined as the\
        \ implementation of a content filter that uses a different code base and supporting\
        \ libraries (e.g., two JPEG filters using different vendors\u2019 JPEG libraries)\
        \ and multiple, independent system processes."
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Mecanismos de Filtragem\
            \ Redundantes/Independentes"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, implementar solu\xE7\xF5es de filtragem de conte\xFA\
            do que proporcionem mecanismos de filtragem redundantes e independentes\
            \ para cada tipo de dado."
          annotation: "A filtragem de conte\xFAdo \xE9 o processo de inspecionar informa\xE7\
            \xF5es \xE0 medida que atravessam uma solu\xE7\xE3o de dom\xEDnio cruzado\
            \ e determinar se as informa\xE7\xF5es atendem a uma pol\xEDtica predefinida.\
            \ A filtragem de conte\xFAdo redundante e independente elimina um sistema\
            \ de filtragem com ponto \xFAnico de falha. A independ\xEAncia \xE9 definida\
            \ como a implementa\xE7\xE3o de um filtro de conte\xFAdo que usa uma base\
            \ de c\xF3digo e bibliotecas de suporte diferentes (por exemplo, dois\
            \ filtros JPEG usando bibliotecas JPEG de fornecedores diferentes) e m\xFA\
            ltiplos processos de sistema independentes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(28)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(28)
      name: Information Flow Enforcement | Linear Filter Pipelines
      description: When transferring information between different security domains,
        implement a linear content filter pipeline that is enforced with discretionary
        and mandatory access controls.
      annotation: Content filtering is the process of inspecting information as it
        traverses a cross-domain solution and determines if the information meets
        a predefined policy. The use of linear content filter pipelines ensures that
        filter processes are non-bypassable and always invoked. In general, the use
        of parallel filtering architectures for content filtering of a single data
        type introduces bypass and non-invocation issues.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Pipelines de Filtro\
            \ Lineares"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, implementar um pipeline de filtro de conte\xFAdo linear\
            \ que seja imposto com controles de acesso discricion\xE1rios e obrigat\xF3\
            rios."
          annotation: "A filtragem de conte\xFAdo \xE9 o processo de inspecionar informa\xE7\
            \xF5es \xE0 medida que atravessam uma solu\xE7\xE3o de dom\xEDnio cruzado\
            \ e determinar se as informa\xE7\xF5es atendem a uma pol\xEDtica predefinida.\
            \ O uso de pipelines de filtro de conte\xFAdo lineares garante que os\
            \ processos de filtro sejam n\xE3o contorn\xE1veis e sempre invocados.\
            \ Em geral, o uso de arquiteturas de filtragem paralelas para a filtragem\
            \ de conte\xFAdo de um \xFAnico tipo de dado introduz problemas de contorno\
            \ e de n\xE3o invoca\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(29)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(29)
      name: Information Flow Enforcement | Filter Orchestration Engines
      description: 'When transferring information between different security domains,
        employ content filter orchestration engines to ensure that:

        (a) Content filtering mechanisms successfully complete execution without errors;
        and

        (b) Content filtering actions occur in the correct order and comply with [Assignment:
        organization-defined policy].'
      annotation: Content filtering is the process of inspecting information as it
        traverses a cross-domain solution and determines if the information meets
        a predefined security policy. An orchestration engine coordinates the sequencing
        of activities (manual and automated) in a content filtering process. Errors
        are defined as either anomalous actions or unexpected termination of the content
        filter process. This is not the same as a filter failing content due to non-compliance
        with policy. Content filter reports are a commonly used mechanism to ensure
        that expected filtering actions are completed successfully.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Motores de Orquestra\xE7\
            \xE3o de Filtros"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, empregar motores de orquestra\xE7\xE3o de filtros de\
            \ conte\xFAdo para garantir que:\n(a) Os mecanismos de filtragem de conte\xFA\
            do concluam a execu\xE7\xE3o com \xEAxito, sem erros; e\n(b) As a\xE7\xF5\
            es de filtragem de conte\xFAdo ocorram na ordem correta e estejam em conformidade\
            \ com [Atribui\xE7\xE3o: pol\xEDtica definida pela organiza\xE7\xE3o]."
          annotation: "A filtragem de conte\xFAdo \xE9 o processo de inspecionar informa\xE7\
            \xF5es \xE0 medida que atravessam uma solu\xE7\xE3o de dom\xEDnio cruzado\
            \ e determinar se as informa\xE7\xF5es atendem a uma pol\xEDtica de seguran\xE7\
            a predefinida. Um motor de orquestra\xE7\xE3o coordena o sequenciamento\
            \ de atividades (manuais e automatizadas) em um processo de filtragem\
            \ de conte\xFAdo. Os erros s\xE3o definidos como a\xE7\xF5es an\xF4malas\
            \ ou o encerramento inesperado do processo de filtro de conte\xFAdo. Isso\
            \ n\xE3o \xE9 o mesmo que um filtro reprovar conte\xFAdo por n\xE3o conformidade\
            \ com a pol\xEDtica. Os relat\xF3rios de filtro de conte\xFAdo s\xE3o\
            \ um mecanismo comumente usado para garantir que as a\xE7\xF5es de filtragem\
            \ esperadas sejam conclu\xEDdas com \xEAxito."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(30)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(30)
      name: Information Flow Enforcement | Filter Mechanisms Using Multiple Processes
      description: When transferring information between different security domains,
        implement content filtering mechanisms using multiple processes.
      annotation: The use of multiple processes to implement content filtering mechanisms
        reduces the likelihood of a single point of failure.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Mecanismos de Filtro\
            \ Usando M\xFAltiplos Processos"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, implementar mecanismos de filtragem de conte\xFAdo\
            \ usando m\xFAltiplos processos."
          annotation: "O uso de m\xFAltiplos processos para implementar mecanismos\
            \ de filtragem de conte\xFAdo reduz a probabilidade de um ponto \xFAnico\
            \ de falha."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(31)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(31)
      name: Information Flow Enforcement | Failed Content Transfer Prevention
      description: When transferring information between different security domains,
        prevent the transfer of failed content to the receiving domain.
      annotation: Content that failed filtering checks can corrupt the system if transferred
        to the receiving domain.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Preven\xE7\xE3o de\
            \ Transfer\xEAncia de Conte\xFAdo Reprovado"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, impedir a transfer\xEAncia de conte\xFAdo reprovado\
            \ para o dom\xEDnio receptor."
          annotation: "O conte\xFAdo que foi reprovado nas verifica\xE7\xF5es de filtragem\
            \ pode corromper o sistema se for transferido para o dom\xEDnio receptor."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(32)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-4(32)
      name: Information Flow Enforcement | Process Requirements for Information Transfer
      description: 'When transferring information between different security domains,
        the process that transfers information between filter pipelines:

        (a) Does not filter message content;

        (b) Validates filtering metadata;

        (c) Ensures the content associated with the filtering metadata has successfully
        completed filtering; and

        (d) Transfers the content to the destination filter pipeline.'
      annotation: The processes transferring information between filter pipelines
        have minimum complexity and functionality to provide assurance that the processes
        operate correctly.
      translations:
        pt:
          name: "Imposi\xE7\xE3o de Fluxo de Informa\xE7\xF5es | Requisitos de Processo\
            \ para Transfer\xEAncia de Informa\xE7\xF5es"
          description: "Ao transferir informa\xE7\xF5es entre diferentes dom\xEDnios\
            \ de seguran\xE7a, o processo que transfere informa\xE7\xF5es entre pipelines\
            \ de filtro:\n(a) N\xE3o filtra o conte\xFAdo da mensagem;\n(b) Valida\
            \ os metadados de filtragem;\n(c) Garante que o conte\xFAdo associado\
            \ aos metadados de filtragem concluiu com \xEAxito a filtragem; e\n(d)\
            \ Transfere o conte\xFAdo para o pipeline de filtro de destino."
          annotation: "Os processos que transferem informa\xE7\xF5es entre pipelines\
            \ de filtro t\xEAm complexidade e funcionalidade m\xEDnimas para prover\
            \ garantia de que os processos operam corretamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-5
      name: Separation of Duties
      description: 'a. Identify and document [Assignment: organization-defined duties
        of individuals requiring separation]; and

        b. Define system access authorizations to support separation of duties.'
      annotation: Separation of duties addresses the potential for abuse of authorized
        privileges and helps to reduce the risk of malevolent activity without collusion.
        Separation of duties includes dividing mission or business functions and support
        functions among different individuals or roles, conducting system support
        functions with different individuals, and ensuring that security personnel
        who administer access control functions do not also administer audit functions.
        Because separation of duty violations can span systems and application domains,
        organizations consider the entirety of systems and system components when
        developing policy on separation of duties. Separation of duties is enforced
        through the account management activities in AC-2, access control mechanisms
        in AC-3, and identity management activities in IA-2, IA-4, and IA-12.
      translations:
        pt:
          name: "Segrega\xE7\xE3o de Fun\xE7\xF5es"
          description: "a. Identificar e documentar [Atribui\xE7\xE3o: fun\xE7\xF5\
            es de indiv\xEDduos que requerem segrega\xE7\xE3o definidas pela organiza\xE7\
            \xE3o]; e\nb. Definir autoriza\xE7\xF5es de acesso ao sistema para dar\
            \ suporte \xE0 segrega\xE7\xE3o de fun\xE7\xF5es."
          annotation: "A segrega\xE7\xE3o de fun\xE7\xF5es aborda o potencial de abuso\
            \ de privil\xE9gios autorizados e ajuda a reduzir o risco de atividade\
            \ mal\xE9vola sem conluio. A segrega\xE7\xE3o de fun\xE7\xF5es inclui\
            \ dividir fun\xE7\xF5es de miss\xE3o ou de neg\xF3cio e fun\xE7\xF5es\
            \ de apoio entre diferentes indiv\xEDduos ou pap\xE9is, conduzir fun\xE7\
            \xF5es de apoio ao sistema com indiv\xEDduos diferentes e garantir que\
            \ o pessoal de seguran\xE7a que administra fun\xE7\xF5es de controle de\
            \ acesso n\xE3o administre tamb\xE9m fun\xE7\xF5es de auditoria. Como\
            \ as viola\xE7\xF5es de segrega\xE7\xE3o de fun\xE7\xF5es podem abranger\
            \ sistemas e dom\xEDnios de aplica\xE7\xE3o, as organiza\xE7\xF5es consideram\
            \ a totalidade dos sistemas e componentes de sistema ao desenvolver pol\xED\
            ticas sobre segrega\xE7\xE3o de fun\xE7\xF5es. A segrega\xE7\xE3o de fun\xE7\
            \xF5es \xE9 imposta por meio das atividades de gerenciamento de contas\
            \ no AC-2, dos mecanismos de controle de acesso no AC-3 e das atividades\
            \ de gerenciamento de identidade no IA-2, IA-4 e IA-12."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6
      name: Least Privilege
      description: Employ the principle of least privilege, allowing only authorized
        accesses for users (or processes acting on behalf of users) that are necessary
        to accomplish assigned organizational tasks.
      annotation: Organizations employ least privilege for specific duties and systems.
        The principle of least privilege is also applied to system processes, ensuring
        that the processes have access to systems and operate at privilege levels
        no higher than necessary to accomplish organizational missions or business
        functions. Organizations consider the creation of additional processes, roles,
        and accounts as necessary to achieve least privilege. Organizations apply
        least privilege to the development, implementation, and operation of organizational
        systems.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo"
          description: "Empregar o princ\xEDpio do privil\xE9gio m\xEDnimo, permitindo\
            \ apenas os acessos autorizados a usu\xE1rios (ou a processos atuando\
            \ em nome de usu\xE1rios) que sejam necess\xE1rios para realizar as tarefas\
            \ organizacionais designadas."
          annotation: "As organiza\xE7\xF5es empregam o privil\xE9gio m\xEDnimo para\
            \ fun\xE7\xF5es e sistemas espec\xEDficos. O princ\xEDpio do privil\xE9\
            gio m\xEDnimo tamb\xE9m \xE9 aplicado a processos do sistema, garantindo\
            \ que os processos tenham acesso aos sistemas e operem em n\xEDveis de\
            \ privil\xE9gio n\xE3o superiores aos necess\xE1rios para realizar as\
            \ miss\xF5es organizacionais ou fun\xE7\xF5es de neg\xF3cio. As organiza\xE7\
            \xF5es consideram a cria\xE7\xE3o de processos, pap\xE9is e contas adicionais\
            \ conforme necess\xE1rio para alcan\xE7ar o privil\xE9gio m\xEDnimo. As\
            \ organiza\xE7\xF5es aplicam o privil\xE9gio m\xEDnimo ao desenvolvimento,\
            \ \xE0 implementa\xE7\xE3o e \xE0 opera\xE7\xE3o dos sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(1)
      name: Least Privilege | Authorize Access to Security Functions
      description: 'Authorize access for [Assignment: organization-defined individuals
        or roles] to:

        (a) [Assignment: organization-defined security functions (deployed in hardware,
        software, and firmware)]; and

        (b) [Assignment: organization-defined security-relevant information].'
      annotation: Security functions include establishing system accounts, configuring
        access authorizations (i.e., permissions, privileges), configuring settings
        for events to be audited, and establishing intrusion detection parameters.
        Security-relevant information includes filtering rules for routers or firewalls,
        configuration parameters for security services, cryptographic key management
        information, and access control lists. Authorized personnel include security
        administrators, system administrators, system security officers, system programmers,
        and other privileged users.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Autorizar Acesso a Fun\xE7\xF5es de Seguran\xE7\
            a"
          description: "Autorizar o acesso de [Atribui\xE7\xE3o: indiv\xEDduos ou\
            \ pap\xE9is definidos pela organiza\xE7\xE3o] a:\n(a) [Atribui\xE7\xE3\
            o: fun\xE7\xF5es de seguran\xE7a (implantadas em hardware, software e\
            \ firmware) definidas pela organiza\xE7\xE3o]; e\n(b) [Atribui\xE7\xE3\
            o: informa\xE7\xF5es relevantes para seguran\xE7a definidas pela organiza\xE7\
            \xE3o]."
          annotation: "As fun\xE7\xF5es de seguran\xE7a incluem estabelecer contas\
            \ de sistema, configurar autoriza\xE7\xF5es de acesso (ou seja, permiss\xF5\
            es, privil\xE9gios), configurar defini\xE7\xF5es de eventos a serem auditados\
            \ e estabelecer par\xE2metros de detec\xE7\xE3o de intrus\xE3o. As informa\xE7\
            \xF5es relevantes para seguran\xE7a incluem regras de filtragem para roteadores\
            \ ou firewalls, par\xE2metros de configura\xE7\xE3o para servi\xE7os de\
            \ seguran\xE7a, informa\xE7\xF5es de gerenciamento de chaves criptogr\xE1\
            ficas e listas de controle de acesso. O pessoal autorizado inclui administradores\
            \ de seguran\xE7a, administradores de sistema, oficiais de seguran\xE7\
            a de sistema, programadores de sistema e outros usu\xE1rios privilegiados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(2)
      name: Least Privilege | Non-privileged Access for Nonsecurity Functions
      description: 'Require that users of system accounts (or roles) with access to
        [Assignment: organization-defined security functions or security-relevant
        information] use non-privileged accounts or roles, when accessing nonsecurity
        functions.'
      annotation: Requiring the use of non-privileged accounts when accessing nonsecurity
        functions limits exposure when operating from within privileged accounts or
        roles. The inclusion of roles addresses situations where organizations implement
        access control policies, such as role-based access control, and where a change
        of role provides the same degree of assurance in the change of access authorizations
        for the user and the processes acting on behalf of the user as would be provided
        by a change between a privileged and non-privileged account.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Acesso N\xE3o Privilegiado para Fun\xE7\
            \xF5es N\xE3o Relacionadas \xE0 Seguran\xE7a"
          description: "Exigir que os usu\xE1rios de contas de sistema (ou fun\xE7\
            \xF5es) com acesso a [Atribui\xE7\xE3o: fun\xE7\xF5es de seguran\xE7a\
            \ ou informa\xE7\xF5es relevantes para a seguran\xE7a definidas pela organiza\xE7\
            \xE3o] utilizem contas ou fun\xE7\xF5es n\xE3o privilegiadas ao acessar\
            \ fun\xE7\xF5es n\xE3o relacionadas \xE0 seguran\xE7a."
          annotation: "Exigir o uso de contas n\xE3o privilegiadas ao acessar fun\xE7\
            \xF5es n\xE3o relacionadas \xE0 seguran\xE7a limita a exposi\xE7\xE3o\
            \ ao operar a partir de contas ou fun\xE7\xF5es privilegiadas. A inclus\xE3\
            o de fun\xE7\xF5es (roles) trata de situa\xE7\xF5es em que as organiza\xE7\
            \xF5es implementam pol\xEDticas de controle de acesso, como o controle\
            \ de acesso baseado em fun\xE7\xF5es (RBAC), e em que uma mudan\xE7a de\
            \ fun\xE7\xE3o fornece o mesmo grau de garantia na altera\xE7\xE3o das\
            \ autoriza\xE7\xF5es de acesso para o usu\xE1rio e para os processos que\
            \ atuam em nome do usu\xE1rio que seria fornecido por uma mudan\xE7a entre\
            \ uma conta privilegiada e uma n\xE3o privilegiada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(3)
      name: Least Privilege | Network Access to Privileged Commands
      description: 'Authorize network access to [Assignment: organization-defined
        privileged commands] only for [Assignment: organization-defined compelling
        operational needs] and document the rationale for such access in the security
        plan for the system.'
      annotation: Network access is any access across a network connection in lieu
        of local access (i.e., user being physically present at the device).
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Acesso de Rede a Comandos Privilegiados"
          description: "Autorizar o acesso de rede a [Atribui\xE7\xE3o: comandos privilegiados\
            \ definidos pela organiza\xE7\xE3o] apenas para [Atribui\xE7\xE3o: necessidades\
            \ operacionais imperativas definidas pela organiza\xE7\xE3o] e documentar\
            \ a justificativa para tal acesso no plano de seguran\xE7a do sistema."
          annotation: "Acesso de rede \xE9 qualquer acesso por meio de uma conex\xE3\
            o de rede em vez de acesso local (ou seja, com o usu\xE1rio estando fisicamente\
            \ presente no dispositivo)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(4)
      name: Least Privilege | Separate Processing Domains
      description: Provide separate processing domains to enable finer-grained allocation
        of user privileges.
      annotation: Providing separate processing domains for finer-grained allocation
        of user privileges includes using virtualization techniques to permit additional
        user privileges within a virtual machine while restricting privileges to other
        virtual machines or to the underlying physical machine, implementing separate
        physical domains, and employing hardware or software domain separation mechanisms.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Dom\xEDnios de Processamento Separados"
          description: "Fornecer dom\xEDnios de processamento separados para permitir\
            \ uma aloca\xE7\xE3o mais granular dos privil\xE9gios de usu\xE1rio."
          annotation: "Fornecer dom\xEDnios de processamento separados para uma aloca\xE7\
            \xE3o mais granular dos privil\xE9gios de usu\xE1rio inclui o uso de t\xE9\
            cnicas de virtualiza\xE7\xE3o para permitir privil\xE9gios de usu\xE1\
            rio adicionais dentro de uma m\xE1quina virtual enquanto se restringem\
            \ privil\xE9gios a outras m\xE1quinas virtuais ou \xE0 m\xE1quina f\xED\
            sica subjacente, a implementa\xE7\xE3o de dom\xEDnios f\xEDsicos separados\
            \ e o emprego de mecanismos de separa\xE7\xE3o de dom\xEDnios em hardware\
            \ ou software."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(5)
      name: Least Privilege | Privileged Accounts
      description: 'Restrict privileged accounts on the system to [Assignment: organization-defined
        personnel or roles].'
      annotation: Privileged accounts, including super user accounts, are typically
        described as system administrator for various types of commercial off-the-shelf
        operating systems. Restricting privileged accounts to specific personnel or
        roles prevents day-to-day users from accessing privileged information or privileged
        functions. Organizations may differentiate in the application of restricting
        privileged accounts between allowed privileges for local accounts and for
        domain accounts provided that they retain the ability to control system configurations
        for key parameters and as otherwise necessary to sufficiently mitigate risk.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Contas Privilegiadas"
          description: "Restringir as contas privilegiadas do sistema a [Atribui\xE7\
            \xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]."
          annotation: "Contas privilegiadas, incluindo contas de superusu\xE1rio,\
            \ s\xE3o tipicamente descritas como administrador de sistema em v\xE1\
            rios tipos de sistemas operacionais comerciais de prateleira (COTS). Restringir\
            \ as contas privilegiadas a pessoal ou fun\xE7\xF5es espec\xEDficas impede\
            \ que usu\xE1rios do dia a dia acessem informa\xE7\xF5es privilegiadas\
            \ ou fun\xE7\xF5es privilegiadas. As organiza\xE7\xF5es podem diferenciar,\
            \ na aplica\xE7\xE3o da restri\xE7\xE3o de contas privilegiadas, entre\
            \ os privil\xE9gios permitidos para contas locais e para contas de dom\xED\
            nio, desde que mantenham a capacidade de controlar as configura\xE7\xF5\
            es do sistema para par\xE2metros-chave e conforme necess\xE1rio para mitigar\
            \ suficientemente o risco."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(6)
      name: Least Privilege | Privileged Access by Non-organizational Users
      description: Prohibit privileged access to the system by non-organizational
        users.
      annotation: An organizational user is an employee or an individual considered
        by the organization to have the equivalent status of an employee. Organizational
        users include contractors, guest researchers, or individuals detailed from
        other organizations. A non-organizational user is a user who is not an organizational
        user. Policies and procedures for granting equivalent status of employees
        to individuals include a need-to-know, citizenship, and the relationship to
        the organization.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Acesso Privilegiado por Usu\xE1rios N\xE3\
            o Organizacionais"
          description: "Proibir o acesso privilegiado ao sistema por usu\xE1rios n\xE3\
            o organizacionais."
          annotation: "Um usu\xE1rio organizacional \xE9 um empregado ou um indiv\xED\
            duo considerado pela organiza\xE7\xE3o como tendo status equivalente ao\
            \ de um empregado. Usu\xE1rios organizacionais incluem contratados, pesquisadores\
            \ convidados ou indiv\xEDduos destacados de outras organiza\xE7\xF5es.\
            \ Um usu\xE1rio n\xE3o organizacional \xE9 um usu\xE1rio que n\xE3o \xE9\
            \ um usu\xE1rio organizacional. As pol\xEDticas e procedimentos para conceder\
            \ status equivalente ao de empregado a indiv\xEDduos incluem a necessidade\
            \ de conhecer (need-to-know), a cidadania e o relacionamento com a organiza\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(7)
      name: Least Privilege | Review of User Privileges
      description: '(a) Review [Assignment: organization-defined frequency] the privileges
        assigned to [Assignment: organization-defined roles or classes of users] to
        validate the need for such privileges; and

        (b) Reassign or remove privileges, if necessary, to correctly reflect organizational
        mission and business needs.'
      annotation: The need for certain assigned user privileges may change over time
        to reflect changes in organizational mission and business functions, environments
        of operation, technologies, or threats. A periodic review of assigned user
        privileges is necessary to determine if the rationale for assigning such privileges
        remains valid. If the need cannot be revalidated, organizations take appropriate
        corrective actions.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Revis\xE3o dos Privil\xE9gios de Usu\xE1\
            rio"
          description: "(a) Revisar [Atribui\xE7\xE3o: frequ\xEAncia definida pela\
            \ organiza\xE7\xE3o] os privil\xE9gios atribu\xEDdos a [Atribui\xE7\xE3\
            o: fun\xE7\xF5es ou classes de usu\xE1rios definidas pela organiza\xE7\
            \xE3o] para validar a necessidade de tais privil\xE9gios; e\n(b) Reatribuir\
            \ ou remover privil\xE9gios, se necess\xE1rio, para refletir corretamente\
            \ a miss\xE3o organizacional e as necessidades do neg\xF3cio."
          annotation: "A necessidade de certos privil\xE9gios de usu\xE1rio atribu\xED\
            dos pode mudar ao longo do tempo para refletir mudan\xE7as na miss\xE3\
            o organizacional e nas fun\xE7\xF5es de neg\xF3cio, nos ambientes de opera\xE7\
            \xE3o, nas tecnologias ou nas amea\xE7as. Uma revis\xE3o peri\xF3dica\
            \ dos privil\xE9gios de usu\xE1rio atribu\xEDdos \xE9 necess\xE1ria para\
            \ determinar se a justificativa para a atribui\xE7\xE3o de tais privil\xE9\
            gios permanece v\xE1lida. Se a necessidade n\xE3o puder ser revalidada,\
            \ as organiza\xE7\xF5es tomam as a\xE7\xF5es corretivas apropriadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(8)
      name: Least Privilege | Privilege Levels for Code Execution
      description: 'Prevent the following software from executing at higher privilege
        levels than users executing the software: [Assignment: organization-defined
        software].'
      annotation: In certain situations, software applications or programs need to
        execute with elevated privileges to perform required functions. However, depending
        on the software functionality and configuration, if the privileges required
        for execution are at a higher level than the privileges assigned to organizational
        users invoking such applications or programs, those users may indirectly be
        provided with greater privileges than assigned.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | N\xEDveis de Privil\xE9gio para Execu\xE7\
            \xE3o de C\xF3digo"
          description: "Impedir que o seguinte software seja executado em n\xEDveis\
            \ de privil\xE9gio superiores aos dos usu\xE1rios que executam o software:\
            \ [Atribui\xE7\xE3o: software definido pela organiza\xE7\xE3o]."
          annotation: "Em certas situa\xE7\xF5es, aplica\xE7\xF5es de software ou\
            \ programas precisam ser executados com privil\xE9gios elevados para desempenhar\
            \ fun\xE7\xF5es necess\xE1rias. No entanto, dependendo da funcionalidade\
            \ e da configura\xE7\xE3o do software, se os privil\xE9gios exigidos para\
            \ a execu\xE7\xE3o estiverem em um n\xEDvel superior aos privil\xE9gios\
            \ atribu\xEDdos aos usu\xE1rios organizacionais que invocam tais aplica\xE7\
            \xF5es ou programas, esses usu\xE1rios podem indiretamente receber privil\xE9\
            gios maiores do que os atribu\xEDdos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(9)
      name: Least Privilege | Log Use of Privileged Functions
      description: Log the execution of privileged functions.
      annotation: The misuse of privileged functions, either intentionally or unintentionally
        by authorized users or by unauthorized external entities that have compromised
        system accounts, is a serious and ongoing concern and can have significant
        adverse impacts on organizations. Logging and analyzing the use of privileged
        functions is one way to detect such misuse and, in doing so, help mitigate
        the risk from insider threats and the advanced persistent threat.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Registrar o Uso de Fun\xE7\xF5es Privilegiadas"
          description: "Registrar a execu\xE7\xE3o de fun\xE7\xF5es privilegiadas."
          annotation: "O uso indevido de fun\xE7\xF5es privilegiadas, seja intencional\
            \ ou n\xE3o, por usu\xE1rios autorizados ou por entidades externas n\xE3\
            o autorizadas que comprometeram contas do sistema, \xE9 uma preocupa\xE7\
            \xE3o s\xE9ria e cont\xEDnua e pode ter impactos adversos significativos\
            \ sobre as organiza\xE7\xF5es. Registrar e analisar o uso de fun\xE7\xF5\
            es privilegiadas \xE9 uma forma de detectar tal uso indevido e, ao faz\xEA\
            -lo, ajudar a mitigar o risco de amea\xE7as internas e da amea\xE7a persistente\
            \ avan\xE7ada (APT)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-6(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-6(10)
      name: Least Privilege | Prohibit Non-privileged Users from Executing Privileged
        Functions
      description: Prevent non-privileged users from executing privileged functions.
      annotation: Privileged functions include disabling, circumventing, or altering
        implemented security or privacy controls, establishing system accounts, performing
        system integrity checks, and administering cryptographic key management activities.
        Non-privileged users are individuals who do not possess appropriate authorizations.
        Privileged functions that require protection from non-privileged users include
        circumventing intrusion detection and prevention mechanisms or malicious code
        protection mechanisms. Preventing non-privileged users from executing privileged
        functions is enforced by AC-3.
      translations:
        pt:
          name: "Privil\xE9gio M\xEDnimo | Proibir Usu\xE1rios N\xE3o Privilegiados\
            \ de Executar Fun\xE7\xF5es Privilegiadas"
          description: "Impedir que usu\xE1rios n\xE3o privilegiados executem fun\xE7\
            \xF5es privilegiadas."
          annotation: "Fun\xE7\xF5es privilegiadas incluem desabilitar, contornar\
            \ ou alterar controles de seguran\xE7a ou de privacidade implementados,\
            \ criar contas de sistema, executar verifica\xE7\xF5es de integridade\
            \ do sistema e administrar atividades de gerenciamento de chaves criptogr\xE1\
            ficas. Usu\xE1rios n\xE3o privilegiados s\xE3o indiv\xEDduos que n\xE3\
            o possuem as autoriza\xE7\xF5es apropriadas. As fun\xE7\xF5es privilegiadas\
            \ que requerem prote\xE7\xE3o contra usu\xE1rios n\xE3o privilegiados\
            \ incluem contornar mecanismos de detec\xE7\xE3o e preven\xE7\xE3o de\
            \ intrus\xE3o ou mecanismos de prote\xE7\xE3o contra c\xF3digo malicioso.\
            \ Impedir que usu\xE1rios n\xE3o privilegiados executem fun\xE7\xF5es\
            \ privilegiadas \xE9 imposto pelo controle AC-3."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-7
      name: Unsuccessful Logon Attempts
      description: 'a. Enforce a limit of [Assignment: organization-defined number]
        consecutive invalid logon attempts by a user during a [Assignment: organization-defined
        time period]; and

        b. Automatically [Selection (one or more): lock the account or node for an
        [Assignment: organization-defined time period]; lock the account or node until
        released by an administrator; delay next logon prompt per [Assignment: organization-defined
        delay algorithm]; notify system administrator; take other [Assignment: organization-defined
        action]] when the maximum number of unsuccessful attempts is exceeded.'
      annotation: The need to limit unsuccessful logon attempts and take subsequent
        action when the maximum number of attempts is exceeded applies regardless
        of whether the logon occurs via a local or network connection. Due to the
        potential for denial of service, automatic lockouts initiated by systems are
        usually temporary and automatically release after a predetermined, organization-defined
        time period. If a delay algorithm is selected, organizations may employ different
        algorithms for different components of the system based on the capabilities
        of those components. Responses to unsuccessful logon attempts may be implemented
        at the operating system and the application levels. Organization-defined actions
        that may be taken when the number of allowed consecutive invalid logon attempts
        is exceeded include prompting the user to answer a secret question in addition
        to the username and password, invoking a lockdown mode with limited user capabilities
        (instead of full lockout), allowing users to only logon from specified Internet
        Protocol (IP) addresses, requiring a CAPTCHA to prevent automated attacks,
        or applying user profiles such as location, time of day, IP address, device,
        or Media Access Control (MAC) address. If automatic system lockout or execution
        of a delay algorithm is not implemented in support of the availability objective,
        organizations consider a combination of other actions to help prevent brute
        force attacks. In addition to the above, organizations can prompt users to
        respond to a secret question before the number of allowed unsuccessful logon
        attempts is exceeded. Automatically unlocking an account after a specified
        period of time is generally not permitted. However, exceptions may be required
        based on operational mission or need.
      translations:
        pt:
          name: Tentativas de Logon Malsucedidas
          description: "a. Impor um limite de [Atribui\xE7\xE3o: n\xFAmero definido\
            \ pela organiza\xE7\xE3o] de tentativas de logon inv\xE1lidas consecutivas\
            \ por um usu\xE1rio durante um [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o]; e\nb. Automaticamente [Sele\xE7\xE3\
            o (uma ou mais): bloquear a conta ou o n\xF3 por um [Atribui\xE7\xE3o:\
            \ per\xEDodo de tempo definido pela organiza\xE7\xE3o]; bloquear a conta\
            \ ou o n\xF3 at\xE9 ser liberado por um administrador; atrasar o pr\xF3\
            ximo prompt de logon conforme [Atribui\xE7\xE3o: algoritmo de atraso definido\
            \ pela organiza\xE7\xE3o]; notificar o administrador do sistema; tomar\
            \ outra [Atribui\xE7\xE3o: a\xE7\xE3o definida pela organiza\xE7\xE3o]]\
            \ quando o n\xFAmero m\xE1ximo de tentativas malsucedidas for excedido."
          annotation: "A necessidade de limitar tentativas de logon malsucedidas e\
            \ tomar a a\xE7\xE3o subsequente quando o n\xFAmero m\xE1ximo de tentativas\
            \ for excedido aplica-se independentemente de o logon ocorrer por meio\
            \ de uma conex\xE3o local ou de rede. Devido ao potencial de nega\xE7\xE3\
            o de servi\xE7o, os bloqueios autom\xE1ticos iniciados pelos sistemas\
            \ s\xE3o geralmente tempor\xE1rios e liberados automaticamente ap\xF3\
            s um per\xEDodo de tempo predeterminado e definido pela organiza\xE7\xE3\
            o. Se um algoritmo de atraso for selecionado, as organiza\xE7\xF5es podem\
            \ empregar algoritmos diferentes para diferentes componentes do sistema,\
            \ com base nas capacidades desses componentes. As respostas a tentativas\
            \ de logon malsucedidas podem ser implementadas nos n\xEDveis de sistema\
            \ operacional e de aplica\xE7\xE3o. As a\xE7\xF5es definidas pela organiza\xE7\
            \xE3o que podem ser tomadas quando o n\xFAmero de tentativas de logon\
            \ inv\xE1lidas consecutivas permitidas for excedido incluem solicitar\
            \ que o usu\xE1rio responda a uma pergunta secreta al\xE9m do nome de\
            \ usu\xE1rio e da senha, invocar um modo de bloqueio com capacidades de\
            \ usu\xE1rio limitadas (em vez de bloqueio total), permitir que os usu\xE1\
            rios fa\xE7am logon apenas a partir de endere\xE7os de Protocolo de Internet\
            \ (IP) especificados, exigir um CAPTCHA para impedir ataques automatizados\
            \ ou aplicar perfis de usu\xE1rio como localiza\xE7\xE3o, hora do dia,\
            \ endere\xE7o IP, dispositivo ou endere\xE7o de Controle de Acesso ao\
            \ Meio (MAC). Se o bloqueio autom\xE1tico do sistema ou a execu\xE7\xE3\
            o de um algoritmo de atraso n\xE3o for implementado em apoio ao objetivo\
            \ de disponibilidade, as organiza\xE7\xF5es consideram uma combina\xE7\
            \xE3o de outras a\xE7\xF5es para ajudar a prevenir ataques de for\xE7\
            a bruta. Al\xE9m do acima exposto, as organiza\xE7\xF5es podem solicitar\
            \ aos usu\xE1rios que respondam a uma pergunta secreta antes que o n\xFA\
            mero de tentativas de logon malsucedidas permitidas seja excedido. O desbloqueio\
            \ autom\xE1tico de uma conta ap\xF3s um per\xEDodo de tempo especificado\
            \ geralmente n\xE3o \xE9 permitido. No entanto, exce\xE7\xF5es podem ser\
            \ necess\xE1rias com base na miss\xE3o ou na necessidade operacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(8)
      name: Remote Access | Disable Nonsecure Network Protocols
      description: '[Withdrawn: Incorporated into CM-7.]'
      translations:
        pt:
          name: "Acesso Remoto | Desabilitar Protocolos de Rede N\xE3o Seguros"
          description: '[Retirado: Incorporado ao CM-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-7(2)
      name: Unsuccessful Logon Attempts | Purge or Wipe Mobile Device
      description: 'Purge or wipe information from [Assignment: organization-defined
        mobile devices] based on [Assignment: organization-defined purging or wiping
        requirements and techniques] after [Assignment: organization-defined number]
        consecutive, unsuccessful device logon attempts.'
      annotation: A mobile device is a computing device that has a small form factor
        such that it can be carried by a single individual; is designed to operate
        without a physical connection; possesses local, non-removable or removable
        data storage; and includes a self-contained power source. Purging or wiping
        the device applies only to mobile devices for which the organization-defined
        number of unsuccessful logons occurs. The logon is to the mobile device, not
        to any one account on the device. Successful logons to accounts on mobile
        devices reset the unsuccessful logon count to zero. Purging or wiping may
        be unnecessary if the information on the device is protected with sufficiently
        strong encryption mechanisms.
      translations:
        pt:
          name: "Tentativas de Logon Malsucedidas | Expurgar ou Apagar Dispositivo\
            \ M\xF3vel"
          description: "Expurgar ou apagar informa\xE7\xF5es de [Atribui\xE7\xE3o:\
            \ dispositivos m\xF3veis definidos pela organiza\xE7\xE3o] com base em\
            \ [Atribui\xE7\xE3o: requisitos e t\xE9cnicas de expurgo ou apagamento\
            \ definidos pela organiza\xE7\xE3o] ap\xF3s [Atribui\xE7\xE3o: n\xFAmero\
            \ definido pela organiza\xE7\xE3o] de tentativas de logon no dispositivo\
            \ malsucedidas e consecutivas."
          annotation: "Um dispositivo m\xF3vel \xE9 um dispositivo de computa\xE7\xE3\
            o que possui um formato pequeno de modo que pode ser carregado por um\
            \ \xFAnico indiv\xEDduo; \xE9 projetado para operar sem uma conex\xE3\
            o f\xEDsica; possui armazenamento de dados local, n\xE3o remov\xEDvel\
            \ ou remov\xEDvel; e inclui uma fonte de energia aut\xF4noma. O expurgo\
            \ ou apagamento do dispositivo aplica-se apenas a dispositivos m\xF3veis\
            \ para os quais ocorre o n\xFAmero de logons malsucedidos definido pela\
            \ organiza\xE7\xE3o. O logon \xE9 no dispositivo m\xF3vel, n\xE3o em qualquer\
            \ conta espec\xEDfica no dispositivo. Logons bem-sucedidos em contas em\
            \ dispositivos m\xF3veis reiniciam a contagem de logons malsucedidos para\
            \ zero. O expurgo ou apagamento pode ser desnecess\xE1rio se as informa\xE7\
            \xF5es no dispositivo estiverem protegidas com mecanismos de criptografia\
            \ suficientemente fortes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-7(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-7(3)
      name: Unsuccessful Logon Attempts | Biometric Attempt Limiting
      description: 'Limit the number of unsuccessful biometric logon attempts to [Assignment:
        organization-defined number].'
      annotation: "\_\_Biometrics are probabilistic in nature. The ability to successfully\
        \ authenticate can be impacted by many factors, including matching performance\
        \ and presentation attack detection mechanisms. Organizations select the appropriate\
        \ number of attempts for users based on organizationally-defined factors."
      translations:
        pt:
          name: "Tentativas de Logon Malsucedidas | Limita\xE7\xE3o de Tentativas\
            \ Biom\xE9tricas"
          description: "Limitar o n\xFAmero de tentativas de logon biom\xE9trico malsucedidas\
            \ a [Atribui\xE7\xE3o: n\xFAmero definido pela organiza\xE7\xE3o]."
          annotation: "  A biometria \xE9 de natureza probabil\xEDstica. A capacidade\
            \ de autenticar com sucesso pode ser afetada por muitos fatores, incluindo\
            \ o desempenho de correspond\xEAncia e os mecanismos de detec\xE7\xE3\
            o de ataques de apresenta\xE7\xE3o. As organiza\xE7\xF5es selecionam o\
            \ n\xFAmero apropriado de tentativas para os usu\xE1rios com base em fatores\
            \ definidos pela organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-7(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-7(4)
      name: Unsuccessful Logon Attempts | Use of Alternate Authentication Factor
      description: '(a) Allow the use of [Assignment: organization-defined authentication
        factors] that are different from the primary authentication factors after
        the number of organization-defined consecutive invalid logon attempts have
        been exceeded; and

        (b) Enforce a limit of [Assignment: organization-defined number] consecutive
        invalid logon attempts through use of the alternative factors by a user during
        a [Assignment: organization-defined time period].'
      annotation: The use of alternate authentication factors supports the objective
        of availability and allows a user who has inadvertently been locked out to
        use additional authentication factors to bypass the lockout.
      translations:
        pt:
          name: "Tentativas de Logon Malsucedidas | Uso de Fator de Autentica\xE7\xE3\
            o Alternativo"
          description: "(a) Permitir o uso de [Atribui\xE7\xE3o: fatores de autentica\xE7\
            \xE3o definidos pela organiza\xE7\xE3o] que sejam diferentes dos fatores\
            \ de autentica\xE7\xE3o prim\xE1rios ap\xF3s o n\xFAmero de tentativas\
            \ de logon inv\xE1lidas consecutivas definido pela organiza\xE7\xE3o ter\
            \ sido excedido; e\n(b) Impor um limite de [Atribui\xE7\xE3o: n\xFAmero\
            \ definido pela organiza\xE7\xE3o] de tentativas de logon inv\xE1lidas\
            \ consecutivas por meio do uso dos fatores alternativos por um usu\xE1\
            rio durante um [Atribui\xE7\xE3o: per\xEDodo de tempo definido pela organiza\xE7\
            \xE3o]."
          annotation: "O uso de fatores de autentica\xE7\xE3o alternativos apoia o\
            \ objetivo de disponibilidade e permite que um usu\xE1rio que tenha sido\
            \ inadvertidamente bloqueado utilize fatores de autentica\xE7\xE3o adicionais\
            \ para contornar o bloqueio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-8
      name: System Use Notification
      description: 'a. Display [Assignment: organization-defined system use notification
        message or banner] to users before granting access to the system that provides
        privacy and security notices consistent with applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines and state that:

        1. Users are accessing a U.S. Government system;

        2. System usage may be monitored, recorded, and subject to audit;

        3. Unauthorized use of the system is prohibited and subject to criminal and
        civil penalties; and

        4. Use of the system indicates consent to monitoring and recording;

        b. Retain the notification message or banner on the screen until users acknowledge
        the usage conditions and take explicit actions to log on to or further access
        the system; and

        c. For publicly accessible systems:

        1. Display system use information [Assignment: organization-defined conditions],
        before granting further access to the publicly accessible system;

        2. Display references, if any, to monitoring, recording, or auditing that
        are consistent with privacy accommodations for such systems that generally
        prohibit those activities; and

        3. Include a description of the authorized uses of the system.'
      annotation: System use notifications can be implemented using messages or warning
        banners displayed before individuals log in to systems. System use notifications
        are used only for access via logon interfaces with human users. Notifications
        are not required when human interfaces do not exist. Based on an assessment
        of risk, organizations consider whether or not a secondary system use notification
        is needed to access applications or other system resources after the initial
        network logon. Organizations consider system use notification messages or
        banners displayed in multiple languages based on organizational needs and
        the demographics of system users. Organizations consult with the privacy office
        for input regarding privacy messaging and the Office of the General Counsel
        or organizational equivalent for legal review and approval of warning banner
        content.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Uso do Sistema"
          description: "a. Exibir [Atribui\xE7\xE3o: mensagem ou banner de notifica\xE7\
            \xE3o de uso do sistema definido pela organiza\xE7\xE3o] aos usu\xE1rios\
            \ antes de conceder acesso ao sistema, fornecendo avisos de privacidade\
            \ e seguran\xE7a consistentes com leis, ordens executivas, diretivas,\
            \ regulamentos, pol\xEDticas, padr\xF5es e diretrizes aplic\xE1veis, e\
            \ declarando que:\n1. Os usu\xE1rios est\xE3o acessando um sistema do\
            \ Governo dos EUA;\n2. O uso do sistema pode ser monitorado, registrado\
            \ e sujeito a auditoria;\n3. O uso n\xE3o autorizado do sistema \xE9 proibido\
            \ e sujeito a san\xE7\xF5es penais e civis; e\n4. O uso do sistema indica\
            \ consentimento com o monitoramento e o registro;\nb. Manter a mensagem\
            \ ou o banner de notifica\xE7\xE3o na tela at\xE9 que os usu\xE1rios reconhe\xE7\
            am as condi\xE7\xF5es de uso e tomem a\xE7\xF5es expl\xEDcitas para fazer\
            \ logon ou continuar a acessar o sistema; e\nc. Para sistemas de acesso\
            \ p\xFAblico:\n1. Exibir informa\xE7\xF5es de uso do sistema [Atribui\xE7\
            \xE3o: condi\xE7\xF5es definidas pela organiza\xE7\xE3o], antes de conceder\
            \ acesso adicional ao sistema de acesso p\xFAblico;\n2. Exibir refer\xEA\
            ncias, se houver, a monitoramento, registro ou auditoria que sejam consistentes\
            \ com as acomoda\xE7\xF5es de privacidade para tais sistemas, que geralmente\
            \ pro\xEDbem essas atividades; e\n3. Incluir uma descri\xE7\xE3o dos usos\
            \ autorizados do sistema."
          annotation: "As notifica\xE7\xF5es de uso do sistema podem ser implementadas\
            \ usando mensagens ou banners de aviso exibidos antes que os indiv\xED\
            duos fa\xE7am logon nos sistemas. As notifica\xE7\xF5es de uso do sistema\
            \ s\xE3o usadas apenas para acesso por meio de interfaces de logon com\
            \ usu\xE1rios humanos. As notifica\xE7\xF5es n\xE3o s\xE3o exigidas quando\
            \ n\xE3o existem interfaces humanas. Com base em uma avalia\xE7\xE3o de\
            \ risco, as organiza\xE7\xF5es consideram se \xE9 necess\xE1ria ou n\xE3\
            o uma notifica\xE7\xE3o secund\xE1ria de uso do sistema para acessar aplica\xE7\
            \xF5es ou outros recursos do sistema ap\xF3s o logon inicial na rede.\
            \ As organiza\xE7\xF5es consideram mensagens ou banners de notifica\xE7\
            \xE3o de uso do sistema exibidos em v\xE1rios idiomas, com base nas necessidades\
            \ organizacionais e na demografia dos usu\xE1rios do sistema. As organiza\xE7\
            \xF5es consultam o escrit\xF3rio de privacidade para obter contribui\xE7\
            \xF5es sobre mensagens de privacidade e o Escrit\xF3rio de Assessoria\
            \ Jur\xEDdica ou equivalente organizacional para revis\xE3o jur\xEDdica\
            \ e aprova\xE7\xE3o do conte\xFAdo do banner de aviso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-9
      name: Previous Logon Notification
      description: Notify the user, upon successful logon to the system, of the date
        and time of the last logon.
      annotation: "Previous logon notification is applicable to system access via\
        \ human user interfaces and access to systems that occurs in other types of\
        \ architectures. Information about the last successful logon allows the user\
        \ to recognize if the date and time provided is not consistent with the user\u2019\
        s last access."
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Logon Anterior"
          description: "Notificar o usu\xE1rio, ao realizar logon com sucesso no sistema,\
            \ da data e hora do \xFAltimo logon."
          annotation: "A notifica\xE7\xE3o de logon anterior \xE9 aplic\xE1vel ao\
            \ acesso ao sistema por meio de interfaces de usu\xE1rio humano e ao acesso\
            \ a sistemas que ocorre em outros tipos de arquiteturas. As informa\xE7\
            \xF5es sobre o \xFAltimo logon bem-sucedido permitem que o usu\xE1rio\
            \ reconhe\xE7a se a data e a hora fornecidas n\xE3o s\xE3o consistentes\
            \ com o \xFAltimo acesso do usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-9(1)
      name: Previous Logon Notification | Unsuccessful Logons
      description: Notify the user, upon successful logon, of the number of unsuccessful
        logon attempts since the last successful logon.
      annotation: "Information about the number of unsuccessful logon attempts since\
        \ the last successful logon allows the user to recognize if the number of\
        \ unsuccessful logon attempts is consistent with the user\u2019s actual logon\
        \ attempts."
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Logon Anterior | Logons Malsucedidos"
          description: "Notificar o usu\xE1rio, ao realizar logon com sucesso, do\
            \ n\xFAmero de tentativas de logon malsucedidas desde o \xFAltimo logon\
            \ bem-sucedido."
          annotation: "As informa\xE7\xF5es sobre o n\xFAmero de tentativas de logon\
            \ malsucedidas desde o \xFAltimo logon bem-sucedido permitem que o usu\xE1\
            rio reconhe\xE7a se o n\xFAmero de tentativas de logon malsucedidas \xE9\
            \ consistente com as tentativas de logon reais do usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-9(2)
      name: Previous Logon Notification | Successful and Unsuccessful Logons
      description: 'Notify the user, upon successful logon, of the number of [Selection:
        successful logons; unsuccessful logon attempts; both] during [Assignment:
        organization-defined time period].'
      annotation: "Information about the number of successful and unsuccessful logon\
        \ attempts within a specified time period allows the user to recognize if\
        \ the number and type of logon attempts are consistent with the user\u2019\
        s actual logon attempts."
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Logon Anterior | Logons Bem-sucedidos e Malsucedidos"
          description: "Notificar o usu\xE1rio, ao realizar logon com sucesso, do\
            \ n\xFAmero de [Sele\xE7\xE3o: logons bem-sucedidos; tentativas de logon\
            \ malsucedidas; ambos] durante [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o]."
          annotation: "As informa\xE7\xF5es sobre o n\xFAmero de tentativas de logon\
            \ bem-sucedidas e malsucedidas dentro de um per\xEDodo de tempo especificado\
            \ permitem que o usu\xE1rio reconhe\xE7a se o n\xFAmero e o tipo de tentativas\
            \ de logon s\xE3o consistentes com as tentativas de logon reais do usu\xE1\
            rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-9(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-9(3)
      name: Previous Logon Notification | Notification of Account Changes
      description: "Notify the user, upon successful logon, of changes to [Assignment:\
        \ organization-defined security-related characteristics or parameters of the\
        \ user\u2019s account] during [Assignment: organization-defined time period]."
      annotation: Information about changes to security-related account characteristics
        within a specified time period allows users to recognize if changes were made
        without their knowledge.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Logon Anterior | Notifica\xE7\xE3o de Altera\xE7\
            \xF5es de Conta"
          description: "Notificar o usu\xE1rio, ao realizar logon com sucesso, de\
            \ altera\xE7\xF5es em [Atribui\xE7\xE3o: caracter\xEDsticas ou par\xE2\
            metros relacionados \xE0 seguran\xE7a da conta do usu\xE1rio definidos\
            \ pela organiza\xE7\xE3o] durante [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o]."
          annotation: "As informa\xE7\xF5es sobre altera\xE7\xF5es nas caracter\xED\
            sticas relacionadas \xE0 seguran\xE7a da conta dentro de um per\xEDodo\
            \ de tempo especificado permitem que os usu\xE1rios reconhe\xE7am se as\
            \ altera\xE7\xF5es foram feitas sem o seu conhecimento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-9(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-9(4)
      name: Previous Logon Notification | Additional Logon Information
      description: 'Notify the user, upon successful logon, of the following additional
        information: [Assignment: organization-defined additional information].'
      annotation: Organizations can specify additional information to be provided
        to users upon logon, including the location of the last logon. User location
        is defined as information that can be determined by systems, such as Internet
        Protocol (IP) addresses from which network logons occurred, notifications
        of local logons, or device identifiers.
      translations:
        pt:
          name: "Notifica\xE7\xE3o de Logon Anterior | Informa\xE7\xF5es Adicionais\
            \ de Logon"
          description: "Notificar o usu\xE1rio, ao realizar logon com sucesso, das\
            \ seguintes informa\xE7\xF5es adicionais: [Atribui\xE7\xE3o: informa\xE7\
            \xF5es adicionais definidas pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem especificar informa\xE7\xF5es adicionais\
            \ a serem fornecidas aos usu\xE1rios no logon, incluindo a localiza\xE7\
            \xE3o do \xFAltimo logon. A localiza\xE7\xE3o do usu\xE1rio \xE9 definida\
            \ como informa\xE7\xF5es que podem ser determinadas pelos sistemas, tais\
            \ como endere\xE7os de Protocolo de Internet (IP) a partir dos quais ocorreram\
            \ os logons de rede, notifica\xE7\xF5es de logons locais ou identificadores\
            \ de dispositivos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-10
      name: Concurrent Session Control
      description: 'Limit the number of concurrent sessions for each [Assignment:
        organization-defined account and/or account type] to [Assignment: organization-defined
        number].'
      annotation: Organizations may define the maximum number of concurrent sessions
        for system accounts globally, by account type, by account, or any combination
        thereof. For example, organizations may limit the number of concurrent sessions
        for system administrators or other individuals working in particularly sensitive
        domains or mission-critical applications. Concurrent session control addresses
        concurrent sessions for system accounts. It does not, however, address concurrent
        sessions by single users via multiple system accounts.
      translations:
        pt:
          name: "Controle de Sess\xF5es Simult\xE2neas"
          description: "Limitar o n\xFAmero de sess\xF5es simult\xE2neas para cada\
            \ [Atribui\xE7\xE3o: conta e/ou tipo de conta definido pela organiza\xE7\
            \xE3o] a [Atribui\xE7\xE3o: n\xFAmero definido pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem definir o n\xFAmero m\xE1ximo de\
            \ sess\xF5es simult\xE2neas para contas de sistema globalmente, por tipo\
            \ de conta, por conta ou qualquer combina\xE7\xE3o dessas op\xE7\xF5es.\
            \ Por exemplo, as organiza\xE7\xF5es podem limitar o n\xFAmero de sess\xF5\
            es simult\xE2neas para administradores de sistema ou outros indiv\xED\
            duos que trabalham em dom\xEDnios particularmente sens\xEDveis ou em aplica\xE7\
            \xF5es de miss\xE3o cr\xEDtica. O controle de sess\xF5es simult\xE2neas\
            \ trata de sess\xF5es simult\xE2neas para contas de sistema. No entanto,\
            \ ele n\xE3o trata de sess\xF5es simult\xE2neas por usu\xE1rios \xFAnicos\
            \ por meio de m\xFAltiplas contas de sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-11
      name: Device Lock
      description: 'a. Prevent further access to the system by [Selection (one or
        more): initiating a device lock after [Assignment: organization-defined time
        period] of inactivity; requiring the user to initiate a device lock before
        leaving the system unattended]; and

        b. Retain the device lock until the user reestablishes access using established
        identification and authentication procedures.'
      annotation: Device locks are temporary actions taken to prevent logical access
        to organizational systems when users stop work and move away from the immediate
        vicinity of those systems but do not want to log out because of the temporary
        nature of their absences. Device locks can be implemented at the operating
        system level or at the application level. A proximity lock may be used to
        initiate the device lock (e.g., via a Bluetooth-enabled device or dongle).
        User-initiated device locking is behavior or policy-based and, as such, requires
        users to take physical action to initiate the device lock. Device locks are
        not an acceptable substitute for logging out of systems, such as when organizations
        require users to log out at the end of workdays.
      translations:
        pt:
          name: Bloqueio de Dispositivo
          description: "a. Impedir o acesso adicional ao sistema por meio de [Sele\xE7\
            \xE3o (uma ou mais): iniciar um bloqueio de dispositivo ap\xF3s [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] de inatividade;\
            \ exigir que o usu\xE1rio inicie um bloqueio de dispositivo antes de deixar\
            \ o sistema sem supervis\xE3o]; e\nb. Manter o bloqueio do dispositivo\
            \ at\xE9 que o usu\xE1rio restabele\xE7a o acesso usando procedimentos\
            \ estabelecidos de identifica\xE7\xE3o e autentica\xE7\xE3o."
          annotation: "Os bloqueios de dispositivo s\xE3o a\xE7\xF5es tempor\xE1rias\
            \ tomadas para impedir o acesso l\xF3gico aos sistemas organizacionais\
            \ quando os usu\xE1rios param de trabalhar e se afastam das proximidades\
            \ imediatas desses sistemas, mas n\xE3o desejam encerrar a sess\xE3o devido\
            \ \xE0 natureza tempor\xE1ria de suas aus\xEAncias. Os bloqueios de dispositivo\
            \ podem ser implementados no n\xEDvel do sistema operacional ou no n\xED\
            vel da aplica\xE7\xE3o. Um bloqueio por proximidade pode ser usado para\
            \ iniciar o bloqueio do dispositivo (por exemplo, por meio de um dispositivo\
            \ ou dongle habilitado para Bluetooth). O bloqueio de dispositivo iniciado\
            \ pelo usu\xE1rio \xE9 baseado em comportamento ou pol\xEDtica e, como\
            \ tal, exige que os usu\xE1rios tomem uma a\xE7\xE3o f\xEDsica para iniciar\
            \ o bloqueio do dispositivo. Os bloqueios de dispositivo n\xE3o s\xE3\
            o um substituto aceit\xE1vel para o encerramento de sess\xE3o nos sistemas,\
            \ como quando as organiza\xE7\xF5es exigem que os usu\xE1rios encerrem\
            \ a sess\xE3o ao final dos dias de trabalho."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-11(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-11(1)
      name: Device Lock | Pattern-hiding Displays
      description: Conceal, via the device lock, information previously visible on
        the display with a publicly viewable image.
      annotation: "The pattern-hiding display can include static or dynamic images,\
        \ such as patterns used with screen savers, photographic\_images, solid colors,\
        \ clock, battery life indicator, or a blank screen with the caveat that controlled\
        \ unclassified information is not displayed."
      translations:
        pt:
          name: "Bloqueio de Dispositivo | Telas de Oculta\xE7\xE3o de Padr\xE3o"
          description: "Ocultar, por meio do bloqueio de dispositivo, informa\xE7\xF5\
            es previamente vis\xEDveis na tela com uma imagem vis\xEDvel publicamente."
          annotation: "A tela de oculta\xE7\xE3o de padr\xE3o pode incluir imagens\
            \ est\xE1ticas ou din\xE2micas, tais como padr\xF5es usados em protetores\
            \ de tela, imagens fotogr\xE1ficas, cores s\xF3lidas, rel\xF3gio, indicador\
            \ de vida \xFAtil da bateria ou uma tela em branco, com a ressalva de\
            \ que informa\xE7\xF5es controladas n\xE3o classificadas n\xE3o sejam\
            \ exibidas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-12
      name: Session Termination
      description: 'Automatically terminate a user session after [Assignment: organization-defined
        conditions or trigger events requiring session disconnect].'
      annotation: "Session termination addresses the termination of user-initiated\
        \ logical sessions (in contrast to SC-10, which addresses the termination\
        \ of network connections associated with communications sessions (i.e., network\
        \ disconnect)). A logical session (for local, network, and remote access)\
        \ is initiated whenever a user (or process acting on behalf of a user) accesses\
        \ an organizational system. Such user sessions can be terminated without terminating\
        \ network sessions. Session termination ends all processes associated with\
        \ a user\u2019s logical session except for those processes that are specifically\
        \ created by the user (i.e., session owner) to continue after the session\
        \ is terminated. Conditions or trigger events that require automatic termination\
        \ of the session include organization-defined periods of user inactivity,\
        \ targeted responses to certain types of incidents, or time-of-day restrictions\
        \ on system use."
      translations:
        pt:
          name: "Encerramento de Sess\xE3o"
          description: "Encerrar automaticamente uma sess\xE3o de usu\xE1rio ap\xF3\
            s [Atribui\xE7\xE3o: condi\xE7\xF5es ou eventos desencadeadores que exijam\
            \ a desconex\xE3o da sess\xE3o definidos pela organiza\xE7\xE3o]."
          annotation: "O encerramento de sess\xE3o trata do encerramento de sess\xF5\
            es l\xF3gicas iniciadas pelo usu\xE1rio (em contraste com o SC-10, que\
            \ trata do encerramento de conex\xF5es de rede associadas a sess\xF5es\
            \ de comunica\xE7\xE3o (ou seja, desconex\xE3o de rede)). Uma sess\xE3\
            o l\xF3gica (para acesso local, de rede e remoto) \xE9 iniciada sempre\
            \ que um usu\xE1rio (ou processo atuando em nome de um usu\xE1rio) acessa\
            \ um sistema organizacional. Tais sess\xF5es de usu\xE1rio podem ser encerradas\
            \ sem encerrar as sess\xF5es de rede. O encerramento de sess\xE3o encerra\
            \ todos os processos associados \xE0 sess\xE3o l\xF3gica de um usu\xE1\
            rio, exceto aqueles processos que s\xE3o especificamente criados pelo\
            \ usu\xE1rio (ou seja, o propriet\xE1rio da sess\xE3o) para continuar\
            \ ap\xF3s o encerramento da sess\xE3o. As condi\xE7\xF5es ou eventos desencadeadores\
            \ que exigem o encerramento autom\xE1tico da sess\xE3o incluem per\xED\
            odos de inatividade do usu\xE1rio definidos pela organiza\xE7\xE3o, respostas\
            \ direcionadas a certos tipos de incidentes ou restri\xE7\xF5es de uso\
            \ do sistema por hora do dia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-12(1)
      name: Session Termination | User-initiated Logouts
      description: 'Provide a logout capability for user-initiated communications
        sessions whenever authentication is used to gain access to [Assignment: organization-defined
        information resources].'
      annotation: Information resources to which users gain access via authentication
        include local workstations, databases, and password-protected websites or
        web-based services.
      translations:
        pt:
          name: "Encerramento de Sess\xE3o | Encerramentos de Sess\xE3o Iniciados\
            \ pelo Usu\xE1rio"
          description: "Fornecer uma capacidade de encerramento de sess\xE3o (logout)\
            \ para sess\xF5es de comunica\xE7\xE3o iniciadas pelo usu\xE1rio sempre\
            \ que a autentica\xE7\xE3o for usada para obter acesso a [Atribui\xE7\xE3\
            o: recursos de informa\xE7\xE3o definidos pela organiza\xE7\xE3o]."
          annotation: "Os recursos de informa\xE7\xE3o aos quais os usu\xE1rios obt\xEA\
            m acesso por meio de autentica\xE7\xE3o incluem esta\xE7\xF5es de trabalho\
            \ locais, bancos de dados e sites ou servi\xE7os baseados na web protegidos\
            \ por senha."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-12(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-12(2)
      name: Session Termination | Termination Message
      description: Display an explicit logout message to users indicating the termination
        of authenticated communications sessions.
      annotation: Logout messages for web access can be displayed after authenticated
        sessions have been terminated. However, for certain types of sessions, including
        file transfer protocol (FTP) sessions, systems typically send logout messages
        as final messages prior to terminating sessions.
      translations:
        pt:
          name: "Encerramento de Sess\xE3o | Mensagem de Encerramento"
          description: "Exibir uma mensagem expl\xEDcita de encerramento de sess\xE3\
            o (logout) aos usu\xE1rios indicando o encerramento das sess\xF5es de\
            \ comunica\xE7\xE3o autenticadas."
          annotation: "As mensagens de encerramento de sess\xE3o (logout) para acesso\
            \ web podem ser exibidas ap\xF3s o encerramento das sess\xF5es autenticadas.\
            \ No entanto, para certos tipos de sess\xF5es, incluindo sess\xF5es de\
            \ protocolo de transfer\xEAncia de arquivos (FTP), os sistemas normalmente\
            \ enviam mensagens de logout como mensagens finais antes de encerrar as\
            \ sess\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-12(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-12(3)
      name: Session Termination | Timeout Warning Message
      description: 'Display an explicit message to users indicating that the session
        will end in [Assignment: organization-defined time until end of session].'
      annotation: To increase usability, notify users of pending session termination
        and prompt users to continue the session. The pending session termination
        time period is based on the parameters defined in the AC-12 base control.
      translations:
        pt:
          name: "Encerramento de Sess\xE3o | Mensagem de Aviso de Tempo Limite"
          description: "Exibir uma mensagem expl\xEDcita aos usu\xE1rios indicando\
            \ que a sess\xE3o terminar\xE1 em [Atribui\xE7\xE3o: tempo at\xE9 o fim\
            \ da sess\xE3o definido pela organiza\xE7\xE3o]."
          annotation: "Para aumentar a usabilidade, notifique os usu\xE1rios sobre\
            \ o encerramento iminente da sess\xE3o e solicite que eles continuem a\
            \ sess\xE3o. O per\xEDodo de tempo at\xE9 o encerramento iminente da sess\xE3\
            o \xE9 baseado nos par\xE2metros definidos no controle base AC-12."

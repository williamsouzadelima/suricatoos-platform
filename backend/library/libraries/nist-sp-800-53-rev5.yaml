    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-3
      name: Content of Audit Records
      description: "Ensure that audit records contain information that establishes\
        \ the following:\na. What type of event occurred;\nb. When the event occurred;\n\
        c. Where the event occurred;\nd. Source of the event;\ne. Outcome of the event;\
        \ and \nf. Identity of any individuals, subjects, or objects/entities associated\
        \ with the event."
      annotation: Audit record content that may be necessary to support the auditing
        function includes event descriptions (item a), time stamps (item b), source
        and destination addresses (item c), user or process identifiers (items d and
        f), success or fail indications (item e), and filenames involved (items a,
        c, e, and f) . Event outcomes include indicators of event success or failure
        and event-specific results, such as the system security and privacy posture
        after the event occurred. Organizations consider how audit records can reveal
        information about individuals that may give rise to privacy risks and how
        best to mitigate such risks. For example, there is the potential to reveal
        personally identifiable information in the audit trail, especially if the
        trail records inputs or is based on patterns or time of usage.
      translations:
        pt:
          name: "Conte\xFAdo dos Registros de Auditoria"
          description: "Garantir que os registros de auditoria contenham informa\xE7\
            \xF5es que estabele\xE7am o seguinte:\na. Qual tipo de evento ocorreu;\n\
            b. Quando o evento ocorreu;\nc. Onde o evento ocorreu;\nd. Origem do evento;\n\
            e. Resultado do evento; e\nf. Identidade de quaisquer indiv\xEDduos, sujeitos\
            \ ou objetos/entidades associados ao evento."
          annotation: "O conte\xFAdo do registro de auditoria que pode ser necess\xE1\
            rio para apoiar a fun\xE7\xE3o de auditoria inclui descri\xE7\xF5es de\
            \ eventos (item a), carimbos de data/hora (item b), endere\xE7os de origem\
            \ e destino (item c), identificadores de usu\xE1rio ou de processo (itens\
            \ d e f), indica\xE7\xF5es de sucesso ou falha (item e) e nomes de arquivos\
            \ envolvidos (itens a, c, e e f). Os resultados dos eventos incluem indicadores\
            \ de sucesso ou falha do evento e resultados espec\xEDficos do evento,\
            \ como a postura de seguran\xE7a e privacidade do sistema ap\xF3s a ocorr\xEA\
            ncia do evento. As organiza\xE7\xF5es consideram como os registros de\
            \ auditoria podem revelar informa\xE7\xF5es sobre indiv\xEDduos que possam\
            \ dar origem a riscos de privacidade e como melhor mitigar tais riscos.\
            \ Por exemplo, existe o potencial de revelar informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal na trilha de auditoria, especialmente se a trilha registra\
            \ entradas ou \xE9 baseada em padr\xF5es ou hor\xE1rio de uso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-3(1)
      name: Content of Audit Records | Additional Audit Information
      description: 'Generate audit records containing the following additional information:
        [Assignment: organization-defined additional information].'
      annotation: The ability to add information generated in audit records is dependent
        on system functionality to configure the audit record content. Organizations
        may consider additional information in audit records including, but not limited
        to, access control or flow control rules invoked and individual identities
        of group account users. Organizations may also consider limiting additional
        audit record information to only information that is explicitly needed for
        audit requirements. This facilitates the use of audit trails and audit logs
        by not including information in audit records that could potentially be misleading,
        make it more difficult to locate information of interest, or increase the
        risk to individuals' privacy.
      translations:
        pt:
          name: "Conte\xFAdo dos Registros de Auditoria | Informa\xE7\xF5es Adicionais\
            \ de Auditoria"
          description: "Gerar registros de auditoria contendo as seguintes informa\xE7\
            \xF5es adicionais: [Atribui\xE7\xE3o: informa\xE7\xF5es adicionais definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "A capacidade de adicionar informa\xE7\xF5es geradas nos registros\
            \ de auditoria depende da funcionalidade do sistema para configurar o\
            \ conte\xFAdo do registro de auditoria. As organiza\xE7\xF5es podem considerar\
            \ informa\xE7\xF5es adicionais nos registros de auditoria, incluindo,\
            \ mas n\xE3o se limitando a, regras de controle de acesso ou de controle\
            \ de fluxo invocadas e identidades individuais de usu\xE1rios de contas\
            \ de grupo. As organiza\xE7\xF5es tamb\xE9m podem considerar limitar as\
            \ informa\xE7\xF5es adicionais do registro de auditoria apenas \xE0s informa\xE7\
            \xF5es que sejam explicitamente necess\xE1rias para os requisitos de auditoria.\
            \ Isso facilita o uso de trilhas de auditoria e logs de auditoria ao n\xE3\
            o incluir nos registros de auditoria informa\xE7\xF5es que poderiam ser\
            \ potencialmente enganosas, dificultar a localiza\xE7\xE3o de informa\xE7\
            \xF5es de interesse ou aumentar o risco \xE0 privacidade dos indiv\xED\
            duos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-2(2)
      name: Event Logging | Selection of Audit Events by Component
      description: '[Withdrawn: Incorporated into AU-12.]'
      translations:
        pt:
          name: "Registro de Eventos | Sele\xE7\xE3o de Eventos de Auditoria por Componente"
          description: '[Retirado: Incorporado em AU-12.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-3(3)
      name: Content of Audit Records | Limit Personally Identifiable Information Elements
      description: 'Limit personally identifiable information contained in audit records
        to the following elements identified in the privacy risk assessment: [Assignment:
        organization-defined elements].'
      annotation: Limiting personally identifiable information in audit records when
        such information is not needed for operational purposes helps reduce the level
        of privacy risk created by a system.
      translations:
        pt:
          name: "Conte\xFAdo dos Registros de Auditoria | Limitar Elementos de Informa\xE7\
            \xF5es de Identifica\xE7\xE3o Pessoal"
          description: "Limitar as informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ contidas nos registros de auditoria aos seguintes elementos identificados\
            \ na avalia\xE7\xE3o de risco de privacidade: [Atribui\xE7\xE3o: elementos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Limitar as informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ nos registros de auditoria quando tais informa\xE7\xF5es n\xE3o s\xE3\
            o necess\xE1rias para fins operacionais ajuda a reduzir o n\xEDvel de\
            \ risco de privacidade gerado por um sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-4
      name: Audit Log Storage Capacity
      description: 'Allocate audit log storage capacity to accommodate [Assignment:
        organization-defined audit log retention requirements].'
      annotation: Organizations consider the types of audit logging to be performed
        and the audit log processing requirements when allocating audit log storage
        capacity. Allocating sufficient audit log storage capacity reduces the likelihood
        of such capacity being exceeded and resulting in the potential loss or reduction
        of audit logging capability.
      translations:
        pt:
          name: Capacidade de Armazenamento de Logs de Auditoria
          description: "Alocar capacidade de armazenamento de logs de auditoria para\
            \ atender a [Atribui\xE7\xE3o: requisitos de reten\xE7\xE3o de logs de\
            \ auditoria definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es consideram os tipos de registro de auditoria\
            \ a serem realizados e os requisitos de processamento dos logs de auditoria\
            \ ao alocar a capacidade de armazenamento dos logs de auditoria. Alocar\
            \ capacidade de armazenamento de logs de auditoria suficiente reduz a\
            \ probabilidade de que essa capacidade seja excedida, resultando na potencial\
            \ perda ou redu\xE7\xE3o da capacidade de registro de auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-4(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-4(1)
      name: Audit Log Storage Capacity | Transfer to Alternate Storage
      description: 'Transfer audit logs [Assignment: organization-defined frequency]
        to a different system, system component, or media other than the system or
        system component conducting the logging.'
      annotation: Audit log transfer, also known as off-loading, is a common process
        in systems with limited audit log storage capacity and thus supports availability
        of the audit logs. The initial audit log storage is only used in a transitory
        fashion until the system can communicate with the secondary or alternate system
        allocated to audit log storage, at which point the audit logs are transferred.
        Transferring audit logs to alternate storage is similar to AU-9(2) in that
        audit logs are transferred to a different entity. However, the purpose of
        selecting AU-9(2) is to protect the confidentiality and integrity of audit
        records. Organizations can select either control enhancement to obtain the
        benefit of increased audit log storage capacity and preserving the confidentiality,
        integrity, and availability of audit records and logs.
      translations:
        pt:
          name: "Capacidade de Armazenamento de Logs de Auditoria | Transfer\xEAncia\
            \ para Armazenamento Alternativo"
          description: "Transferir os logs de auditoria [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] para um sistema, componente de sistema\
            \ ou m\xEDdia diferente do sistema ou componente de sistema que realiza\
            \ o registro."
          annotation: "A transfer\xEAncia de logs de auditoria, tamb\xE9m conhecida\
            \ como off-loading, \xE9 um processo comum em sistemas com capacidade\
            \ limitada de armazenamento de logs de auditoria e, portanto, apoia a\
            \ disponibilidade dos logs de auditoria. O armazenamento inicial de logs\
            \ de auditoria \xE9 utilizado apenas de forma transit\xF3ria at\xE9 que\
            \ o sistema possa se comunicar com o sistema secund\xE1rio ou alternativo\
            \ alocado para o armazenamento de logs de auditoria, momento no qual os\
            \ logs de auditoria s\xE3o transferidos. Transferir logs de auditoria\
            \ para armazenamento alternativo \xE9 semelhante a AU-9(2), no sentido\
            \ de que os logs de auditoria s\xE3o transferidos para uma entidade diferente.\
            \ No entanto, o prop\xF3sito de selecionar AU-9(2) \xE9 proteger a confidencialidade\
            \ e a integridade dos registros de auditoria. As organiza\xE7\xF5es podem\
            \ selecionar qualquer um dos aprimoramentos de controle para obter o benef\xED\
            cio de maior capacidade de armazenamento de logs de auditoria e preservar\
            \ a confidencialidade, integridade e disponibilidade dos registros e logs\
            \ de auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-5
      name: Response to Audit Logging Process Failures
      description: 'a. Alert [Assignment: organization-defined personnel or roles]
        within [Assignment: organization-defined time period] in the event of an audit
        logging process failure; and

        b. Take the following additional actions: [Assignment: organization-defined
        additional actions].'
      annotation: Audit logging process failures include software and hardware errors,
        failures in audit log capturing mechanisms, and reaching or exceeding audit
        log storage capacity. Organization-defined actions include overwriting oldest
        audit records, shutting down the system, and stopping the generation of audit
        records. Organizations may choose to define additional actions for audit logging
        process failures based on the type of failure, the location of the failure,
        the severity of the failure, or a combination of such factors. When the audit
        logging process failure is related to storage, the response is carried out
        for the audit log storage repository (i.e., the distinct system component
        where the audit logs are stored), the system on which the audit logs reside,
        the total audit log storage capacity of the organization (i.e., all audit
        log storage repositories combined), or all three. Organizations may decide
        to take no additional actions after alerting designated roles or personnel.
      translations:
        pt:
          name: Resposta a Falhas no Processo de Registro de Auditoria
          description: "a. Alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\xF5es definidos\
            \ pela organiza\xE7\xE3o] dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo\
            \ definido pela organiza\xE7\xE3o] em caso de falha no processo de registro\
            \ de auditoria; e\nb. Tomar as seguintes a\xE7\xF5es adicionais: [Atribui\xE7\
            \xE3o: a\xE7\xF5es adicionais definidas pela organiza\xE7\xE3o]."
          annotation: "As falhas no processo de registro de auditoria incluem erros\
            \ de software e hardware, falhas nos mecanismos de captura de logs de\
            \ auditoria e o alcance ou a supera\xE7\xE3o da capacidade de armazenamento\
            \ dos logs de auditoria. As a\xE7\xF5es definidas pela organiza\xE7\xE3\
            o incluem sobrescrever os registros de auditoria mais antigos, desligar\
            \ o sistema e interromper a gera\xE7\xE3o de registros de auditoria. As\
            \ organiza\xE7\xF5es podem optar por definir a\xE7\xF5es adicionais para\
            \ falhas no processo de registro de auditoria com base no tipo de falha,\
            \ na localiza\xE7\xE3o da falha, na gravidade da falha ou em uma combina\xE7\
            \xE3o desses fatores. Quando a falha no processo de registro de auditoria\
            \ est\xE1 relacionada ao armazenamento, a resposta \xE9 executada para\
            \ o reposit\xF3rio de armazenamento de logs de auditoria (ou seja, o componente\
            \ de sistema distinto onde os logs de auditoria s\xE3o armazenados), o\
            \ sistema no qual os logs de auditoria residem, a capacidade total de\
            \ armazenamento de logs de auditoria da organiza\xE7\xE3o (ou seja, todos\
            \ os reposit\xF3rios de armazenamento de logs de auditoria combinados),\
            \ ou os tr\xEAs. As organiza\xE7\xF5es podem decidir n\xE3o tomar nenhuma\
            \ a\xE7\xE3o adicional ap\xF3s alertar as fun\xE7\xF5es ou o pessoal designados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-5(1)
      name: Response to Audit Logging Process Failures | Storage Capacity Warning
      description: 'Provide a warning to [Assignment: organization-defined personnel,
        roles, and/or locations] within [Assignment: organization-defined time period]
        when allocated audit log storage volume reaches [Assignment: organization-defined
        percentage] of repository maximum audit log storage capacity.'
      annotation: Organizations may have multiple audit log storage repositories distributed
        across multiple system components with each repository having different storage
        volume capacities.
      translations:
        pt:
          name: Resposta a Falhas no Processo de Registro de Auditoria | Aviso de
            Capacidade de Armazenamento
          description: "Fornecer um aviso a [Atribui\xE7\xE3o: pessoal, fun\xE7\xF5\
            es e/ou locais definidos pela organiza\xE7\xE3o] dentro de [Atribui\xE7\
            \xE3o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] quando o volume\
            \ alocado de armazenamento de logs de auditoria atingir [Atribui\xE7\xE3\
            o: percentual definido pela organiza\xE7\xE3o] da capacidade m\xE1xima\
            \ de armazenamento de logs de auditoria do reposit\xF3rio."
          annotation: "As organiza\xE7\xF5es podem ter m\xFAltiplos reposit\xF3rios\
            \ de armazenamento de logs de auditoria distribu\xEDdos por m\xFAltiplos\
            \ componentes de sistema, cada reposit\xF3rio com diferentes capacidades\
            \ de volume de armazenamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-5(2)
      name: Response to Audit Logging Process Failures | Real-time Alerts
      description: 'Provide an alert within [Assignment: organization-defined real-time
        period] to [Assignment: organization-defined personnel, roles, and/or locations]
        when the following audit failure events occur: [Assignment: organization-defined
        audit logging failure events requiring real-time alerts].'
      annotation: Alerts provide organizations with urgent messages. Real-time alerts
        provide these messages at information technology speed (i.e., the time from
        event detection to alert occurs in seconds or less).
      translations:
        pt:
          name: Resposta a Falhas no Processo de Registro de Auditoria | Alertas em
            Tempo Real
          description: "Fornecer um alerta dentro de [Atribui\xE7\xE3o: per\xEDodo\
            \ de tempo real definido pela organiza\xE7\xE3o] a [Atribui\xE7\xE3o:\
            \ pessoal, fun\xE7\xF5es e/ou locais definidos pela organiza\xE7\xE3o]\
            \ quando ocorrerem os seguintes eventos de falha de auditoria: [Atribui\xE7\
            \xE3o: eventos de falha de registro de auditoria definidos pela organiza\xE7\
            \xE3o que exigem alertas em tempo real]."
          annotation: "Os alertas fornecem \xE0s organiza\xE7\xF5es mensagens urgentes.\
            \ Os alertas em tempo real fornecem essas mensagens na velocidade da tecnologia\
            \ da informa\xE7\xE3o (ou seja, o tempo desde a detec\xE7\xE3o do evento\
            \ at\xE9 o alerta ocorre em segundos ou menos)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-5(3)
      name: Response to Audit Logging Process Failures | Configurable Traffic Volume
        Thresholds
      description: 'Enforce configurable network communications traffic volume thresholds
        reflecting limits on audit log storage capacity and [Selection: reject; delay]
        network traffic above those thresholds.'
      annotation: Organizations have the capability to reject or delay the processing
        of network communications traffic if audit logging information about such
        traffic is determined to exceed the storage capacity of the system audit logging
        function. The rejection or delay response is triggered by the established
        organizational traffic volume thresholds that can be adjusted based on changes
        to audit log storage capacity.
      translations:
        pt:
          name: "Resposta a Falhas no Processo de Registro de Auditoria | Limiares\
            \ Configur\xE1veis de Volume de Tr\xE1fego"
          description: "Aplicar limiares configur\xE1veis de volume de tr\xE1fego\
            \ de comunica\xE7\xF5es de rede que reflitam os limites da capacidade\
            \ de armazenamento de logs de auditoria e [Sele\xE7\xE3o: rejeitar; retardar]\
            \ o tr\xE1fego de rede acima desses limiares."
          annotation: "As organiza\xE7\xF5es t\xEAm a capacidade de rejeitar ou retardar\
            \ o processamento do tr\xE1fego de comunica\xE7\xF5es de rede caso se\
            \ determine que as informa\xE7\xF5es de registro de auditoria sobre tal\
            \ tr\xE1fego excedem a capacidade de armazenamento da fun\xE7\xE3o de\
            \ registro de auditoria do sistema. A resposta de rejei\xE7\xE3o ou retardo\
            \ \xE9 acionada pelos limiares de volume de tr\xE1fego estabelecidos pela\
            \ organiza\xE7\xE3o, que podem ser ajustados com base em mudan\xE7as na\
            \ capacidade de armazenamento de logs de auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-5(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-5(4)
      name: Response to Audit Logging Process Failures | Shutdown on Failure
      description: 'Invoke a [Selection: full system shutdown; partial system shutdown;
        degraded operational mode with limited mission or business functionality available]
        in the event of [Assignment: organization-defined audit logging failures],
        unless an alternate audit logging capability exists.'
      annotation: Organizations determine the types of audit logging failures that
        can trigger automatic system shutdowns or degraded operations. Because of
        the importance of ensuring mission and business continuity, organizations
        may determine that the nature of the audit logging failure is not so severe
        that it warrants a complete shutdown of the system supporting the core organizational
        mission and business functions. In those instances, partial system shutdowns
        or operating in a degraded mode with reduced capability may be viable alternatives.
      translations:
        pt:
          name: Resposta a Falhas no Processo de Registro de Auditoria | Desligamento
            em Caso de Falha
          description: "Invocar um [Sele\xE7\xE3o: desligamento total do sistema;\
            \ desligamento parcial do sistema; modo operacional degradado com funcionalidade\
            \ limitada de miss\xE3o ou de neg\xF3cio dispon\xEDvel] em caso de [Atribui\xE7\
            \xE3o: falhas de registro de auditoria definidas pela organiza\xE7\xE3\
            o], a menos que exista uma capacidade alternativa de registro de auditoria."
          annotation: "As organiza\xE7\xF5es determinam os tipos de falhas de registro\
            \ de auditoria que podem acionar desligamentos autom\xE1ticos do sistema\
            \ ou opera\xE7\xF5es degradadas. Devido \xE0 import\xE2ncia de garantir\
            \ a continuidade da miss\xE3o e do neg\xF3cio, as organiza\xE7\xF5es podem\
            \ determinar que a natureza da falha de registro de auditoria n\xE3o \xE9\
            \ t\xE3o grave a ponto de justificar um desligamento completo do sistema\
            \ que apoia as fun\xE7\xF5es centrais de miss\xE3o e de neg\xF3cio da\
            \ organiza\xE7\xE3o. Nesses casos, desligamentos parciais do sistema ou\
            \ opera\xE7\xE3o em modo degradado com capacidade reduzida podem ser alternativas\
            \ vi\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-5(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-5(5)
      name: Response to Audit Logging Process Failures | Alternate Audit Logging Capability
      description: 'Provide an alternate audit logging capability in the event of
        a failure in primary audit logging capability that implements [Assignment:
        organization-defined alternate audit logging functionality].'
      annotation: Since an alternate audit logging capability may be a short-term
        protection solution employed until the failure in the primary audit logging
        capability is corrected, organizations may determine that the alternate audit
        logging capability need only provide a subset of the primary audit logging
        functionality that is impacted by the failure.
      translations:
        pt:
          name: Resposta a Falhas no Processo de Registro de Auditoria | Capacidade
            Alternativa de Registro de Auditoria
          description: "Fornecer uma capacidade alternativa de registro de auditoria\
            \ em caso de falha na capacidade prim\xE1ria de registro de auditoria,\
            \ que implemente [Atribui\xE7\xE3o: funcionalidade alternativa de registro\
            \ de auditoria definida pela organiza\xE7\xE3o]."
          annotation: "Como uma capacidade alternativa de registro de auditoria pode\
            \ ser uma solu\xE7\xE3o de prote\xE7\xE3o de curto prazo empregada at\xE9\
            \ que a falha na capacidade prim\xE1ria de registro de auditoria seja\
            \ corrigida, as organiza\xE7\xF5es podem determinar que a capacidade alternativa\
            \ de registro de auditoria precise fornecer apenas um subconjunto da funcionalidade\
            \ prim\xE1ria de registro de auditoria que foi impactada pela falha."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6
      name: Audit Record Review, Analysis, and Reporting
      description: 'a. Review and analyze system audit records [Assignment: organization-defined
        frequency] for indications of [Assignment: organization-defined inappropriate
        or unusual activity] and the potential impact of the inappropriate or unusual
        activity;

        b. Report findings to [Assignment: organization-defined personnel or roles];
        and

        c. Adjust the level of audit record review, analysis, and reporting within
        the system when there is a change in risk based on law enforcement information,
        intelligence information, or other credible sources of information.'
      annotation: Audit record review, analysis, and reporting covers information
        security- and privacy-related logging performed by organizations, including
        logging that results from the monitoring of account usage, remote access,
        wireless connectivity, mobile device connection, configuration settings, system
        component inventory, use of maintenance tools and non-local maintenance, physical
        access, temperature and humidity, equipment delivery and removal, communications
        at system interfaces, and use of mobile code or Voice over Internet Protocol
        (VoIP). Findings can be reported to organizational entities that include the
        incident response team, help desk, and security or privacy offices. If organizations
        are prohibited from reviewing and analyzing audit records or unable to conduct
        such activities, the review or analysis may be carried out by other organizations
        granted such authority. The frequency, scope, and/or depth of the audit record
        review, analysis, and reporting may be adjusted to meet organizational needs
        based on new information received.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria"
          description: "a. Revisar e analisar os registros de auditoria do sistema\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] em\
            \ busca de ind\xEDcios de [Atribui\xE7\xE3o: atividade inadequada ou incomum\
            \ definida pela organiza\xE7\xE3o] e o impacto potencial da atividade\
            \ inadequada ou incomum;\nb. Reportar as constata\xE7\xF5es a [Atribui\xE7\
            \xE3o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]; e\n\
            c. Ajustar o n\xEDvel de revis\xE3o, an\xE1lise e gera\xE7\xE3o de relat\xF3\
            rios de registros de auditoria dentro do sistema quando houver uma mudan\xE7\
            a no risco com base em informa\xE7\xF5es de aplica\xE7\xE3o da lei, informa\xE7\
            \xF5es de intelig\xEAncia ou outras fontes de informa\xE7\xE3o confi\xE1\
            veis."
          annotation: "A revis\xE3o, an\xE1lise e gera\xE7\xE3o de relat\xF3rios de\
            \ registros de auditoria abrange o registro relacionado \xE0 seguran\xE7\
            a da informa\xE7\xE3o e \xE0 privacidade realizado pelas organiza\xE7\xF5\
            es, incluindo o registro resultante do monitoramento de uso de contas,\
            \ acesso remoto, conectividade sem fio, conex\xE3o de dispositivos m\xF3\
            veis, configura\xE7\xF5es de defini\xE7\xE3o, invent\xE1rio de componentes\
            \ de sistema, uso de ferramentas de manuten\xE7\xE3o e manuten\xE7\xE3\
            o n\xE3o local, acesso f\xEDsico, temperatura e umidade, entrega e remo\xE7\
            \xE3o de equipamentos, comunica\xE7\xF5es nas interfaces do sistema e\
            \ uso de c\xF3digo m\xF3vel ou de Voz sobre Protocolo de Internet (VoIP).\
            \ As constata\xE7\xF5es podem ser reportadas a entidades organizacionais\
            \ que incluem a equipe de resposta a incidentes, o help desk e os escrit\xF3\
            rios de seguran\xE7a ou de privacidade. Se as organiza\xE7\xF5es estiverem\
            \ proibidas de revisar e analisar os registros de auditoria ou forem incapazes\
            \ de conduzir tais atividades, a revis\xE3o ou a an\xE1lise pode ser realizada\
            \ por outras organiza\xE7\xF5es \xE0s quais foi concedida tal autoridade.\
            \ A frequ\xEAncia, o escopo e/ou a profundidade da revis\xE3o, an\xE1\
            lise e gera\xE7\xE3o de relat\xF3rios de registros de auditoria podem\
            \ ser ajustados para atender \xE0s necessidades organizacionais com base\
            \ em novas informa\xE7\xF5es recebidas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(1)
      name: Audit Record Review, Analysis, and Reporting | Automated Process Integration
      description: 'Integrate audit record review, analysis, and reporting processes
        using [Assignment: organization-defined automated mechanisms].'
      annotation: Organizational processes that benefit from integrated audit record
        review, analysis, and reporting include incident response, continuous monitoring,
        contingency planning, investigation and response to suspicious activities,
        and Inspector General audits.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Integra\xE7\xE3o de Processos Automatizados"
          description: "Integrar os processos de revis\xE3o, an\xE1lise e gera\xE7\
            \xE3o de relat\xF3rios de registros de auditoria utilizando [Atribui\xE7\
            \xE3o: mecanismos automatizados definidos pela organiza\xE7\xE3o]."
          annotation: "Os processos organizacionais que se beneficiam da revis\xE3\
            o, an\xE1lise e gera\xE7\xE3o de relat\xF3rios integrados de registros\
            \ de auditoria incluem resposta a incidentes, monitoramento cont\xEDnuo,\
            \ planejamento de conting\xEAncia, investiga\xE7\xE3o e resposta a atividades\
            \ suspeitas e auditorias do Inspetor-Geral."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-2(3)
      name: Event Logging | Reviews and Updates
      description: '[Withdrawn: Incorporated into AU-2.]'
      translations:
        pt:
          name: "Registro de Eventos | Revis\xF5es e Atualiza\xE7\xF5es"
          description: '[Retirado: Incorporado em AU-2.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(3)
      name: Audit Record Review, Analysis, and Reporting | Correlate Audit Record
        Repositories
      description: Analyze and correlate audit records across different repositories
        to gain organization-wide situational awareness.
      annotation: Organization-wide situational awareness includes awareness across
        all three levels of risk management (i.e., organizational level, mission/business
        process level, and information system level) and supports cross-organization
        awareness.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Correlacionar Reposit\xF3rios de Registros de Auditoria"
          description: "Analisar e correlacionar registros de auditoria entre diferentes\
            \ reposit\xF3rios para obter consci\xEAncia situacional em toda a organiza\xE7\
            \xE3o."
          annotation: "A consci\xEAncia situacional em toda a organiza\xE7\xE3o inclui\
            \ a consci\xEAncia nos tr\xEAs n\xEDveis de gest\xE3o de risco (ou seja,\
            \ n\xEDvel organizacional, n\xEDvel de processo de miss\xE3o/neg\xF3cio\
            \ e n\xEDvel de sistema de informa\xE7\xE3o) e apoia a consci\xEAncia\
            \ entre organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(4)
      name: Audit Record Review, Analysis, and Reporting | Central Review and Analysis
      description: Provide and implement the capability to centrally review and analyze
        audit records from multiple components within the system.
      annotation: Automated mechanisms for centralized reviews and analyses include
        Security Information and Event Management products.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Revis\xE3o e An\xE1lise Centralizadas"
          description: "Fornecer e implementar a capacidade de revisar e analisar\
            \ centralmente os registros de auditoria de m\xFAltiplos componentes dentro\
            \ do sistema."
          annotation: "Os mecanismos automatizados para revis\xF5es e an\xE1lises\
            \ centralizadas incluem produtos de Gest\xE3o de Informa\xE7\xF5es e Eventos\
            \ de Seguran\xE7a (SIEM)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(5)
      name: Audit Record Review, Analysis, and Reporting | Integrated Analysis of
        Audit Records
      description: 'Integrate analysis of audit records with analysis of [Selection
        (one or more): vulnerability scanning information; performance data; system
        monitoring information; [Assignment: organization-defined data/information
        collected from other sources]] to further enhance the ability to identify
        inappropriate or unusual activity.'
      annotation: Integrated analysis of audit records does not require vulnerability
        scanning, the generation of performance data, or system monitoring. Rather,
        integrated analysis requires that the analysis of information generated by
        scanning, monitoring, or other data collection activities is integrated with
        the analysis of audit record information. Security Information and Event Management
        tools can facilitate audit record aggregation or consolidation from multiple
        system components as well as audit record correlation and analysis. The use
        of standardized audit record analysis scripts developed by organizations (with
        localized script adjustments, as necessary) provides more cost-effective approaches
        for analyzing audit record information collected. The correlation of audit
        record information with vulnerability scanning information is important in
        determining the veracity of vulnerability scans of the system and in correlating
        attack detection events with scanning results. Correlation with performance
        data can uncover denial-of-service attacks or other types of attacks that
        result in the unauthorized use of resources. Correlation with system monitoring
        information can assist in uncovering attacks and in better relating audit
        information to operational situations.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | An\xE1lise Integrada de Registros de Auditoria"
          description: "Integrar a an\xE1lise dos registros de auditoria com a an\xE1\
            lise de [Sele\xE7\xE3o (uma ou mais): informa\xE7\xF5es de varredura de\
            \ vulnerabilidades; dados de desempenho; informa\xE7\xF5es de monitoramento\
            \ de sistema; [Atribui\xE7\xE3o: dados/informa\xE7\xF5es definidos pela\
            \ organiza\xE7\xE3o, coletados de outras fontes]] para aprimorar ainda\
            \ mais a capacidade de identificar atividades inadequadas ou incomuns."
          annotation: "A an\xE1lise integrada de registros de auditoria n\xE3o exige\
            \ varredura de vulnerabilidades, a gera\xE7\xE3o de dados de desempenho\
            \ ou o monitoramento de sistema. Em vez disso, a an\xE1lise integrada\
            \ exige que a an\xE1lise das informa\xE7\xF5es geradas por varredura,\
            \ monitoramento ou outras atividades de coleta de dados seja integrada\
            \ \xE0 an\xE1lise das informa\xE7\xF5es dos registros de auditoria. As\
            \ ferramentas de Gest\xE3o de Informa\xE7\xF5es e Eventos de Seguran\xE7\
            a (SIEM) podem facilitar a agrega\xE7\xE3o ou consolida\xE7\xE3o de registros\
            \ de auditoria de m\xFAltiplos componentes de sistema, bem como a correla\xE7\
            \xE3o e an\xE1lise de registros de auditoria. O uso de scripts padronizados\
            \ de an\xE1lise de registros de auditoria desenvolvidos pelas organiza\xE7\
            \xF5es (com ajustes localizados de script, conforme necess\xE1rio) fornece\
            \ abordagens mais econ\xF4micas para analisar as informa\xE7\xF5es dos\
            \ registros de auditoria coletadas. A correla\xE7\xE3o das informa\xE7\
            \xF5es dos registros de auditoria com as informa\xE7\xF5es de varredura\
            \ de vulnerabilidades \xE9 importante para determinar a veracidade das\
            \ varreduras de vulnerabilidades do sistema e para correlacionar eventos\
            \ de detec\xE7\xE3o de ataques com os resultados das varreduras. A correla\xE7\
            \xE3o com dados de desempenho pode revelar ataques de nega\xE7\xE3o de\
            \ servi\xE7o ou outros tipos de ataques que resultam no uso n\xE3o autorizado\
            \ de recursos. A correla\xE7\xE3o com informa\xE7\xF5es de monitoramento\
            \ de sistema pode auxiliar na descoberta de ataques e em relacionar melhor\
            \ as informa\xE7\xF5es de auditoria \xE0s situa\xE7\xF5es operacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(6)
      name: Audit Record Review, Analysis, and Reporting | Correlation with Physical
        Monitoring
      description: Correlate information from audit records with information obtained
        from monitoring physical access to further enhance the ability to identify
        suspicious, inappropriate, unusual, or malevolent activity.
      annotation: "The correlation of physical audit record information and the audit\
        \ records from systems may assist organizations in identifying suspicious\
        \ behavior or supporting evidence of such behavior. For example, the correlation\
        \ of an individual\u2019s identity for logical access to certain systems with\
        \ the additional physical security information that the individual was present\
        \ at the facility when the logical access occurred may be useful in investigations."
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Correla\xE7\xE3o com Monitoramento F\xEDsico"
          description: "Correlacionar informa\xE7\xF5es dos registros de auditoria\
            \ com informa\xE7\xF5es obtidas do monitoramento de acesso f\xEDsico para\
            \ aprimorar ainda mais a capacidade de identificar atividade suspeita,\
            \ inadequada, incomum ou maliciosa."
          annotation: "A correla\xE7\xE3o das informa\xE7\xF5es de registros de auditoria\
            \ f\xEDsicos com os registros de auditoria de sistemas pode auxiliar as\
            \ organiza\xE7\xF5es na identifica\xE7\xE3o de comportamento suspeito\
            \ ou no fornecimento de evid\xEAncias de tal comportamento. Por exemplo,\
            \ a correla\xE7\xE3o da identidade de um indiv\xEDduo para acesso l\xF3\
            gico a determinados sistemas com a informa\xE7\xE3o adicional de seguran\xE7\
            a f\xEDsica de que o indiv\xEDduo estava presente nas instala\xE7\xF5\
            es quando o acesso l\xF3gico ocorreu pode ser \xFAtil em investiga\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(7)
      name: Audit Record Review, Analysis, and Reporting | Permitted Actions
      description: 'Specify the permitted actions for each [Selection (one or more):
        system process; role; user] associated with the review, analysis, and reporting
        of audit record information.'
      annotation: Organizations specify permitted actions for system processes, roles,
        and users associated with the review, analysis, and reporting of audit records
        through system account management activities. Specifying permitted actions
        on audit record information is a way to enforce the principle of least privilege.
        Permitted actions are enforced by the system and include read, write, execute,
        append, and delete.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | A\xE7\xF5es Permitidas"
          description: "Especificar as a\xE7\xF5es permitidas para cada [Sele\xE7\xE3\
            o (uma ou mais): processo de sistema; fun\xE7\xE3o; usu\xE1rio] associado\
            \ \xE0 revis\xE3o, an\xE1lise e gera\xE7\xE3o de relat\xF3rios de informa\xE7\
            \xF5es dos registros de auditoria."
          annotation: "As organiza\xE7\xF5es especificam as a\xE7\xF5es permitidas\
            \ para processos de sistema, fun\xE7\xF5es e usu\xE1rios associados \xE0\
            \ revis\xE3o, an\xE1lise e gera\xE7\xE3o de relat\xF3rios de registros\
            \ de auditoria por meio de atividades de gest\xE3o de contas do sistema.\
            \ Especificar as a\xE7\xF5es permitidas sobre as informa\xE7\xF5es dos\
            \ registros de auditoria \xE9 uma forma de aplicar o princ\xEDpio do menor\
            \ privil\xE9gio. As a\xE7\xF5es permitidas s\xE3o aplicadas pelo sistema\
            \ e incluem leitura, escrita, execu\xE7\xE3o, anexa\xE7\xE3o e exclus\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(8)
      name: Audit Record Review, Analysis, and Reporting | Full Text Analysis of Privileged
        Commands
      description: Perform a full text analysis of logged privileged commands in a
        physically distinct component or subsystem of the system, or other system
        that is dedicated to that analysis.
      annotation: Full text analysis of privileged commands requires a distinct environment
        for the analysis of audit record information related to privileged users without
        compromising such information on the system where the users have elevated
        privileges, including the capability to execute privileged commands. Full
        text analysis refers to analysis that considers the full text of privileged
        commands (i.e., commands and parameters) as opposed to analysis that considers
        only the name of the command. Full text analysis includes the use of pattern
        matching and heuristics.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | An\xE1lise de Texto Completo de Comandos Privilegiados"
          description: "Realizar uma an\xE1lise de texto completo dos comandos privilegiados\
            \ registrados em um componente ou subsistema fisicamente distinto do sistema,\
            \ ou em outro sistema dedicado a essa an\xE1lise."
          annotation: "A an\xE1lise de texto completo de comandos privilegiados exige\
            \ um ambiente distinto para a an\xE1lise das informa\xE7\xF5es dos registros\
            \ de auditoria relacionadas a usu\xE1rios privilegiados sem comprometer\
            \ tais informa\xE7\xF5es no sistema em que os usu\xE1rios t\xEAm privil\xE9\
            gios elevados, incluindo a capacidade de executar comandos privilegiados.\
            \ A an\xE1lise de texto completo refere-se \xE0 an\xE1lise que considera\
            \ o texto completo dos comandos privilegiados (ou seja, comandos e par\xE2\
            metros), em oposi\xE7\xE3o \xE0 an\xE1lise que considera apenas o nome\
            \ do comando. A an\xE1lise de texto completo inclui o uso de correspond\xEA\
            ncia de padr\xF5es e heur\xEDsticas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(9)
      name: Audit Record Review, Analysis, and Reporting | Correlation with Information
        from Nontechnical Sources
      description: Correlate information from nontechnical sources with audit record
        information to enhance organization-wide situational awareness.
      annotation: Nontechnical sources include records that document organizational
        policy violations related to harassment incidents and the improper use of
        information assets. Such information can lead to a directed analytical effort
        to detect potential malicious insider activity. Organizations limit access
        to information that is available from nontechnical sources due to its sensitive
        nature. Limited access minimizes the potential for inadvertent release of
        privacy-related information to individuals who do not have a need to know.
        The correlation of information from nontechnical sources with audit record
        information generally occurs only when individuals are suspected of being
        involved in an incident. Organizations obtain legal advice prior to initiating
        such actions.
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Correla\xE7\xE3o com Informa\xE7\xF5es de Fontes N\xE3\
            o T\xE9cnicas"
          description: "Correlacionar informa\xE7\xF5es de fontes n\xE3o t\xE9cnicas\
            \ com informa\xE7\xF5es dos registros de auditoria para aprimorar a consci\xEA\
            ncia situacional em toda a organiza\xE7\xE3o."
          annotation: "As fontes n\xE3o t\xE9cnicas incluem registros que documentam\
            \ viola\xE7\xF5es de pol\xEDticas organizacionais relacionadas a incidentes\
            \ de ass\xE9dio e ao uso indevido de ativos de informa\xE7\xE3o. Tais\
            \ informa\xE7\xF5es podem levar a um esfor\xE7o anal\xEDtico direcionado\
            \ para detectar potencial atividade maliciosa de pessoa interna. As organiza\xE7\
            \xF5es limitam o acesso \xE0s informa\xE7\xF5es dispon\xEDveis a partir\
            \ de fontes n\xE3o t\xE9cnicas devido \xE0 sua natureza sens\xEDvel. O\
            \ acesso limitado minimiza o potencial de divulga\xE7\xE3o inadvertida\
            \ de informa\xE7\xF5es relacionadas \xE0 privacidade a indiv\xEDduos que\
            \ n\xE3o t\xEAm necessidade de conhec\xEA-las. A correla\xE7\xE3o de informa\xE7\
            \xF5es de fontes n\xE3o t\xE9cnicas com informa\xE7\xF5es dos registros\
            \ de auditoria geralmente ocorre apenas quando h\xE1 suspeita de que indiv\xED\
            duos estejam envolvidos em um incidente. As organiza\xE7\xF5es obt\xEA\
            m aconselhamento jur\xEDdico antes de iniciar tais a\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-2(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-2(4)
      name: Event Logging | Privileged Functions
      description: '[Withdrawn: Incorporated into AC-6(9).]'
      translations:
        pt:
          name: "Registro de Eventos | Fun\xE7\xF5es Privilegiadas"
          description: '[Retirado: Incorporado em AC-6(9).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-7
      name: Audit Record Reduction and Report Generation
      description: 'Provide and implement an audit record reduction and report generation
        capability that:

        a. Supports on-demand audit record review, analysis, and reporting requirements
        and after-the-fact investigations of incidents; and

        b. Does not alter the original content or time ordering of audit records.'
      annotation: Audit record reduction is a process that manipulates collected audit
        log information and organizes it into a summary format that is more meaningful
        to analysts. Audit record reduction and report generation capabilities do
        not always emanate from the same system or from the same organizational entities
        that conduct audit logging activities. The audit record reduction capability
        includes modern data mining techniques with advanced data filters to identify
        anomalous behavior in audit records. The report generation capability provided
        by the system can generate customizable reports. Time ordering of audit records
        can be an issue if the granularity of the timestamp in the record is insufficient.
      translations:
        pt:
          name: "Redu\xE7\xE3o de Registros de Auditoria e Gera\xE7\xE3o de Relat\xF3\
            rios"
          description: "Fornecer e implementar uma capacidade de redu\xE7\xE3o de\
            \ registros de auditoria e de gera\xE7\xE3o de relat\xF3rios que:\na.\
            \ Apoie os requisitos de revis\xE3o, an\xE1lise e gera\xE7\xE3o de relat\xF3\
            rios de registros de auditoria sob demanda e investiga\xE7\xF5es posteriores\
            \ de incidentes; e\nb. N\xE3o altere o conte\xFAdo original nem a ordena\xE7\
            \xE3o temporal dos registros de auditoria."
          annotation: "A redu\xE7\xE3o de registros de auditoria \xE9 um processo\
            \ que manipula as informa\xE7\xF5es de logs de auditoria coletadas e as\
            \ organiza em um formato resumido que seja mais significativo para os\
            \ analistas. As capacidades de redu\xE7\xE3o de registros de auditoria\
            \ e de gera\xE7\xE3o de relat\xF3rios nem sempre emanam do mesmo sistema\
            \ ou das mesmas entidades organizacionais que conduzem as atividades de\
            \ registro de auditoria. A capacidade de redu\xE7\xE3o de registros de\
            \ auditoria inclui t\xE9cnicas modernas de minera\xE7\xE3o de dados com\
            \ filtros de dados avan\xE7ados para identificar comportamento an\xF4\
            malo nos registros de auditoria. A capacidade de gera\xE7\xE3o de relat\xF3\
            rios fornecida pelo sistema pode gerar relat\xF3rios personaliz\xE1veis.\
            \ A ordena\xE7\xE3o temporal dos registros de auditoria pode ser um problema\
            \ se a granularidade do carimbo de data/hora no registro for insuficiente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-7(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-7(1)
      name: Audit Record Reduction and Report Generation | Automatic Processing
      description: 'Provide and implement the capability to process, sort, and search
        audit records for events of interest based on the following content: [Assignment:
        organization-defined fields within audit records].'
      annotation: Events of interest can be identified by the content of audit records,
        including system resources involved, information objects accessed, identities
        of individuals, event types, event locations, event dates and times, Internet
        Protocol addresses involved, or event success or failure. Organizations may
        define event criteria to any degree of granularity required, such as locations
        selectable by a general networking location or by specific system component.
      translations:
        pt:
          name: "Redu\xE7\xE3o de Registros de Auditoria e Gera\xE7\xE3o de Relat\xF3\
            rios | Processamento Autom\xE1tico"
          description: "Fornecer e implementar a capacidade de processar, ordenar\
            \ e pesquisar registros de auditoria em busca de eventos de interesse\
            \ com base no seguinte conte\xFAdo: [Atribui\xE7\xE3o: campos definidos\
            \ pela organiza\xE7\xE3o dentro dos registros de auditoria]."
          annotation: "Eventos de interesse podem ser identificados pelo conte\xFA\
            do dos registros de auditoria, incluindo recursos do sistema envolvidos,\
            \ objetos de informa\xE7\xE3o acessados, identidades de indiv\xEDduos,\
            \ tipos de evento, locais de evento, datas e horas de evento, endere\xE7\
            os de Protocolo de Internet envolvidos ou sucesso ou falha do evento.\
            \ As organiza\xE7\xF5es podem definir crit\xE9rios de evento em qualquer\
            \ grau de granularidade exigido, como locais selecion\xE1veis por uma\
            \ localiza\xE7\xE3o geral de rede ou por um componente espec\xEDfico do\
            \ sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-3(2)
      name: Content of Audit Records | Centralized Management of Planned Audit Record
        Content
      description: '[Withdrawn: Incorporated into PL-9.]'
      translations:
        pt:
          name: "Conte\xFAdo dos Registros de Auditoria | Gest\xE3o Centralizada do\
            \ Conte\xFAdo Planejado dos Registros de Auditoria"
          description: '[Revogado: Incorporado ao PL-9.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-8
      name: Time Stamps
      description: 'a. Use internal system clocks to generate time stamps for audit
        records; and

        b. Record time stamps for audit records that meet [Assignment: organization-defined
        granularity of time measurement] and that use Coordinated Universal Time,
        have a fixed local time offset from Coordinated Universal Time, or that include
        the local time offset as part of the time stamp.'
      annotation: Time stamps generated by the system include date and time. Time
        is commonly expressed in Coordinated Universal Time (UTC), a modern continuation
        of Greenwich Mean Time (GMT), or local time with an offset from UTC. Granularity
        of time measurements refers to the degree of synchronization between system
        clocks and reference clocks (e.g., clocks synchronizing within hundreds of
        milliseconds or tens of milliseconds). Organizations may define different
        time granularities for different system components. Time service can be critical
        to other security capabilities such as access control and identification and
        authentication, depending on the nature of the mechanisms used to support
        those capabilities.
      translations:
        pt:
          name: Carimbos de Data e Hora
          description: "a. Usar rel\xF3gios internos do sistema para gerar carimbos\
            \ de data e hora para os registros de auditoria; e\nb. Registrar carimbos\
            \ de data e hora para os registros de auditoria que atendam a [Atribui\xE7\
            \xE3o: granularidade de medi\xE7\xE3o de tempo definida pela organiza\xE7\
            \xE3o] e que usem o Tempo Universal Coordenado, tenham um deslocamento\
            \ fixo de tempo local em rela\xE7\xE3o ao Tempo Universal Coordenado ou\
            \ que incluam o deslocamento de tempo local como parte do carimbo de data\
            \ e hora."
          annotation: "Os carimbos de data e hora gerados pelo sistema incluem data\
            \ e hora. O tempo \xE9 comumente expresso em Tempo Universal Coordenado\
            \ (UTC), uma continua\xE7\xE3o moderna do Hor\xE1rio do Meridiano de Greenwich\
            \ (GMT), ou em hor\xE1rio local com um deslocamento em rela\xE7\xE3o ao\
            \ UTC. A granularidade das medi\xE7\xF5es de tempo refere-se ao grau de\
            \ sincroniza\xE7\xE3o entre os rel\xF3gios do sistema e os rel\xF3gios\
            \ de refer\xEAncia (por exemplo, rel\xF3gios que se sincronizam dentro\
            \ de centenas de milissegundos ou dezenas de milissegundos). As organiza\xE7\
            \xF5es podem definir diferentes granularidades de tempo para diferentes\
            \ componentes do sistema. O servi\xE7o de tempo pode ser cr\xEDtico para\
            \ outras capacidades de seguran\xE7a, como controle de acesso e identifica\xE7\
            \xE3o e autentica\xE7\xE3o, dependendo da natureza dos mecanismos usados\
            \ para suportar essas capacidades."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(10)
      name: Audit Record Review, Analysis, and Reporting | Audit Level Adjustment
      description: '[Withdrawn: Incorporated into AU-6.]'
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Ajuste do N\xEDvel de Auditoria"
          description: '[Revogado: Incorporado ao AU-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-6(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-6(2)
      name: Audit Record Review, Analysis, and Reporting | Automated Security Alerts
      description: '[Withdrawn: Incorporated into SI-4.]'
      translations:
        pt:
          name: "Revis\xE3o, An\xE1lise e Gera\xE7\xE3o de Relat\xF3rios de Registros\
            \ de Auditoria | Alertas de Seguran\xE7a Automatizados"
          description: '[Revogado: Incorporado ao SI-4.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9
      name: Protection of Audit Information
      description: 'a. Protect audit information and audit logging tools from unauthorized
        access, modification, and deletion; and

        b. Alert [Assignment: organization-defined personnel or roles] upon detection
        of unauthorized access, modification, or deletion of audit information.'
      annotation: Audit information includes all information needed to successfully
        audit system activity, such as audit records, audit log settings, audit reports,
        and personally identifiable information. Audit logging tools are those programs
        and devices used to conduct system audit and logging activities. Protection
        of audit information focuses on technical protection and limits the ability
        to access and execute audit logging tools to authorized individuals. Physical
        protection of audit information is addressed by both media protection controls
        and physical and environmental protection controls.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria"
          description: "a. Proteger as informa\xE7\xF5es de auditoria e as ferramentas\
            \ de registro de auditoria contra acesso, modifica\xE7\xE3o e exclus\xE3\
            o n\xE3o autorizados; e\nb. Alertar [Atribui\xE7\xE3o: pessoal ou fun\xE7\
            \xF5es definidos pela organiza\xE7\xE3o] ap\xF3s a detec\xE7\xE3o de acesso,\
            \ modifica\xE7\xE3o ou exclus\xE3o n\xE3o autorizados de informa\xE7\xF5\
            es de auditoria."
          annotation: "As informa\xE7\xF5es de auditoria incluem todas as informa\xE7\
            \xF5es necess\xE1rias para auditar com sucesso a atividade do sistema,\
            \ como registros de auditoria, configura\xE7\xF5es de log de auditoria,\
            \ relat\xF3rios de auditoria e informa\xE7\xF5es de identifica\xE7\xE3\
            o pessoal. As ferramentas de registro de auditoria s\xE3o aqueles programas\
            \ e dispositivos usados para conduzir atividades de auditoria e registro\
            \ do sistema. A prote\xE7\xE3o das informa\xE7\xF5es de auditoria concentra-se\
            \ na prote\xE7\xE3o t\xE9cnica e limita a capacidade de acessar e executar\
            \ ferramentas de registro de auditoria a indiv\xEDduos autorizados. A\
            \ prote\xE7\xE3o f\xEDsica das informa\xE7\xF5es de auditoria \xE9 tratada\
            \ tanto pelos controles de prote\xE7\xE3o de m\xEDdia quanto pelos controles\
            \ de prote\xE7\xE3o f\xEDsica e ambiental."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(1)
      name: Protection of Audit Information | Hardware Write-once Media
      description: Write audit trails to hardware-enforced, write-once media.
      annotation: Writing audit trails to hardware-enforced, write-once media applies
        to the initial generation of audit trails (i.e., the collection of audit records
        that represents the information to be used for detection, analysis, and reporting
        purposes) and to the backup of those audit trails. Writing audit trails to
        hardware-enforced, write-once media does not apply to the initial generation
        of audit records prior to being written to an audit trail. Write-once, read-many
        (WORM) media includes Compact Disc-Recordable (CD-R), Blu-Ray Disc Recordable
        (BD-R), and Digital Versatile Disc-Recordable (DVD-R). In contrast, the use
        of switchable write-protection media, such as tape cartridges, Universal Serial
        Bus (USB) drives, Compact Disc Re-Writeable (CD-RW), and Digital Versatile
        Disc-Read Write (DVD-RW) results in write-protected but not write-once media.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | M\xEDdia de Grava\xE7\
            \xE3o \xDAnica por Hardware"
          description: "Gravar as trilhas de auditoria em m\xEDdia de grava\xE7\xE3\
            o \xFAnica (write-once) imposta por hardware."
          annotation: "A grava\xE7\xE3o de trilhas de auditoria em m\xEDdia de grava\xE7\
            \xE3o \xFAnica imposta por hardware aplica-se \xE0 gera\xE7\xE3o inicial\
            \ das trilhas de auditoria (ou seja, \xE0 coleta de registros de auditoria\
            \ que representa as informa\xE7\xF5es a serem usadas para fins de detec\xE7\
            \xE3o, an\xE1lise e gera\xE7\xE3o de relat\xF3rios) e ao backup dessas\
            \ trilhas de auditoria. A grava\xE7\xE3o de trilhas de auditoria em m\xED\
            dia de grava\xE7\xE3o \xFAnica imposta por hardware n\xE3o se aplica \xE0\
            \ gera\xE7\xE3o inicial de registros de auditoria antes de serem gravados\
            \ em uma trilha de auditoria. A m\xEDdia de grava\xE7\xE3o \xFAnica e\
            \ leitura m\xFAltipla (WORM) inclui o Disco Compacto Grav\xE1vel (CD-R),\
            \ o Disco Blu-Ray Grav\xE1vel (BD-R) e o Disco Vers\xE1til Digital Grav\xE1\
            vel (DVD-R). Em contraste, o uso de m\xEDdia com prote\xE7\xE3o de grava\xE7\
            \xE3o comut\xE1vel, como cartuchos de fita, unidades de Barramento Serial\
            \ Universal (USB), Disco Compacto Regrav\xE1vel (CD-RW) e Disco Vers\xE1\
            til Digital de Leitura e Grava\xE7\xE3o (DVD-RW), resulta em m\xEDdia\
            \ protegida contra grava\xE7\xE3o, mas n\xE3o de grava\xE7\xE3o \xFAnica."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(2)
      name: Protection of Audit Information | Store on Separate Physical Systems or
        Components
      description: 'Store audit records [Assignment: organization-defined frequency]
        in a repository that is part of a physically different system or system component
        than the system or component being audited.'
      annotation: Storing audit records in a repository separate from the audited
        system or system component helps to ensure that a compromise of the system
        being audited does not also result in a compromise of the audit records. Storing
        audit records on separate physical systems or components also preserves the
        confidentiality and integrity of audit records and facilitates the management
        of audit records as an organization-wide activity. Storing audit records on
        separate systems or components applies to initial generation as well as backup
        or long-term storage of audit records.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | Armazenamento\
            \ em Sistemas ou Componentes F\xEDsicos Separados"
          description: "Armazenar os registros de auditoria [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] em um reposit\xF3rio que fa\xE7\
            a parte de um sistema ou componente de sistema fisicamente diferente do\
            \ sistema ou componente que est\xE1 sendo auditado."
          annotation: "Armazenar os registros de auditoria em um reposit\xF3rio separado\
            \ do sistema ou componente de sistema auditado ajuda a garantir que um\
            \ comprometimento do sistema sendo auditado n\xE3o resulte tamb\xE9m em\
            \ um comprometimento dos registros de auditoria. Armazenar os registros\
            \ de auditoria em sistemas ou componentes f\xEDsicos separados tamb\xE9\
            m preserva a confidencialidade e a integridade dos registros de auditoria\
            \ e facilita a gest\xE3o dos registros de auditoria como uma atividade\
            \ de toda a organiza\xE7\xE3o. O armazenamento de registros de auditoria\
            \ em sistemas ou componentes separados aplica-se \xE0 gera\xE7\xE3o inicial,\
            \ bem como ao backup ou armazenamento de longo prazo dos registros de\
            \ auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(3)
      name: Protection of Audit Information | Cryptographic Protection
      description: Implement cryptographic mechanisms to protect the integrity of
        audit information and audit tools.
      annotation: Cryptographic mechanisms used for protecting the integrity of audit
        information include signed hash functions using asymmetric cryptography. This
        enables the distribution of the public key to verify the hash information
        while maintaining the confidentiality of the secret key used to generate the
        hash.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | Prote\xE7\xE3\
            o Criptogr\xE1fica"
          description: "Implementar mecanismos criptogr\xE1ficos para proteger a integridade\
            \ das informa\xE7\xF5es de auditoria e das ferramentas de auditoria."
          annotation: "Os mecanismos criptogr\xE1ficos usados para proteger a integridade\
            \ das informa\xE7\xF5es de auditoria incluem fun\xE7\xF5es de hash assinadas\
            \ que usam criptografia assim\xE9trica. Isso permite a distribui\xE7\xE3\
            o da chave p\xFAblica para verificar as informa\xE7\xF5es de hash, mantendo\
            \ ao mesmo tempo a confidencialidade da chave secreta usada para gerar\
            \ o hash."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(4)
      name: Protection of Audit Information | Access by Subset of Privileged Users
      description: 'Authorize access to management of audit logging functionality
        to only [Assignment: organization-defined subset of privileged users or roles].'
      annotation: Individuals or roles with privileged access to a system and who
        are also the subject of an audit by that system may affect the reliability
        of the audit information by inhibiting audit activities or modifying audit
        records. Requiring privileged access to be further defined between audit-related
        privileges and other privileges limits the number of users or roles with audit-related
        privileges.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | Acesso por Subconjunto\
            \ de Usu\xE1rios Privilegiados"
          description: "Autorizar o acesso \xE0 gest\xE3o da funcionalidade de registro\
            \ de auditoria apenas a [Atribui\xE7\xE3o: subconjunto de usu\xE1rios\
            \ ou fun\xE7\xF5es privilegiados definido pela organiza\xE7\xE3o]."
          annotation: "Indiv\xEDduos ou fun\xE7\xF5es com acesso privilegiado a um\
            \ sistema e que tamb\xE9m sejam objeto de uma auditoria por esse sistema\
            \ podem afetar a confiabilidade das informa\xE7\xF5es de auditoria ao\
            \ inibir atividades de auditoria ou modificar registros de auditoria.\
            \ Exigir que o acesso privilegiado seja ainda mais definido entre privil\xE9\
            gios relacionados \xE0 auditoria e outros privil\xE9gios limita o n\xFA\
            mero de usu\xE1rios ou fun\xE7\xF5es com privil\xE9gios relacionados \xE0\
            \ auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(5)
      name: Protection of Audit Information | Dual Authorization
      description: 'Enforce dual authorization for [Selection (one or more): movement;
        deletion] of [Assignment: organization-defined audit information].'
      annotation: Organizations may choose different selection options for different
        types of audit information. Dual authorization mechanisms (also known as two-person
        control) require the approval of two authorized individuals to execute audit
        functions. To reduce the risk of collusion, organizations consider rotating
        dual authorization duties to other individuals. Organizations do not require
        dual authorization mechanisms when immediate responses are necessary to ensure
        public and environmental safety.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | Autoriza\xE7\xE3\
            o Dupla"
          description: "Impor autoriza\xE7\xE3o dupla para [Sele\xE7\xE3o (um ou mais):\
            \ movimenta\xE7\xE3o; exclus\xE3o] de [Atribui\xE7\xE3o: informa\xE7\xF5\
            es de auditoria definidas pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem escolher diferentes op\xE7\xF5\
            es de sele\xE7\xE3o para diferentes tipos de informa\xE7\xF5es de auditoria.\
            \ Os mecanismos de autoriza\xE7\xE3o dupla (tamb\xE9m conhecidos como\
            \ controle de duas pessoas) exigem a aprova\xE7\xE3o de dois indiv\xED\
            duos autorizados para executar fun\xE7\xF5es de auditoria. Para reduzir\
            \ o risco de conluio, as organiza\xE7\xF5es consideram a rota\xE7\xE3\
            o das atribui\xE7\xF5es de autoriza\xE7\xE3o dupla para outros indiv\xED\
            duos. As organiza\xE7\xF5es n\xE3o exigem mecanismos de autoriza\xE7\xE3\
            o dupla quando respostas imediatas s\xE3o necess\xE1rias para garantir\
            \ a seguran\xE7a p\xFAblica e ambiental."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(6)
      name: Protection of Audit Information | Read-only Access
      description: 'Authorize read-only access to audit information to [Assignment:
        organization-defined subset of privileged users or roles].'
      annotation: Restricting privileged user or role authorizations to read-only
        helps to limit the potential damage to organizations that could be initiated
        by such users or roles, such as deleting audit records to cover up malicious
        activity.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | Acesso Somente\
            \ Leitura"
          description: "Autorizar o acesso somente leitura \xE0s informa\xE7\xF5es\
            \ de auditoria a [Atribui\xE7\xE3o: subconjunto de usu\xE1rios ou fun\xE7\
            \xF5es privilegiados definido pela organiza\xE7\xE3o]."
          annotation: "Restringir as autoriza\xE7\xF5es de usu\xE1rios ou fun\xE7\xF5\
            es privilegiados a somente leitura ajuda a limitar os poss\xEDveis danos\
            \ \xE0s organiza\xE7\xF5es que poderiam ser iniciados por tais usu\xE1\
            rios ou fun\xE7\xF5es, como a exclus\xE3o de registros de auditoria para\
            \ encobrir atividade maliciosa."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-9(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-9(7)
      name: Protection of Audit Information | Store on Component with Different Operating
        System
      description: Store audit information on a component running a different operating
        system than the system or component being audited.
      annotation: Storing auditing information on a system component running a different
        operating system reduces the risk of a vulnerability specific to the system,
        resulting in a compromise of the audit records.
      translations:
        pt:
          name: "Prote\xE7\xE3o das Informa\xE7\xF5es de Auditoria | Armazenamento\
            \ em Componente com Sistema Operacional Diferente"
          description: "Armazenar as informa\xE7\xF5es de auditoria em um componente\
            \ que execute um sistema operacional diferente do sistema ou componente\
            \ que est\xE1 sendo auditado."
          annotation: "Armazenar as informa\xE7\xF5es de auditoria em um componente\
            \ de sistema que execute um sistema operacional diferente reduz o risco\
            \ de uma vulnerabilidade espec\xEDfica do sistema resultar em um comprometimento\
            \ dos registros de auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-10
      name: Non-repudiation
      description: 'Provide irrefutable evidence that an individual (or process acting
        on behalf of an individual) has performed [Assignment: organization-defined
        actions to be covered by non-repudiation].'
      annotation: Types of individual actions covered by non-repudiation include creating
        information, sending and receiving messages, and approving information. Non-repudiation
        protects against claims by authors of not having authored certain documents,
        senders of not having transmitted messages, receivers of not having received
        messages, and signatories of not having signed documents. Non-repudiation
        services can be used to determine if information originated from an individual
        or if an individual took specific actions (e.g., sending an email, signing
        a contract, approving a procurement request, or receiving specific information).
        Organizations obtain non-repudiation services by employing various techniques
        or mechanisms, including digital signatures and digital message receipts.
      translations:
        pt:
          name: "N\xE3o Rep\xFAdio"
          description: "Fornecer evid\xEAncia irrefut\xE1vel de que um indiv\xEDduo\
            \ (ou processo agindo em nome de um indiv\xEDduo) realizou [Atribui\xE7\
            \xE3o: a\xE7\xF5es definidas pela organiza\xE7\xE3o a serem cobertas pelo\
            \ n\xE3o rep\xFAdio]."
          annotation: "Os tipos de a\xE7\xF5es individuais cobertas pelo n\xE3o rep\xFA\
            dio incluem criar informa\xE7\xF5es, enviar e receber mensagens e aprovar\
            \ informa\xE7\xF5es. O n\xE3o rep\xFAdio protege contra alega\xE7\xF5\
            es de autores de n\xE3o terem sido autores de determinados documentos,\
            \ de remetentes de n\xE3o terem transmitido mensagens, de destinat\xE1\
            rios de n\xE3o terem recebido mensagens e de signat\xE1rios de n\xE3o\
            \ terem assinado documentos. Os servi\xE7os de n\xE3o rep\xFAdio podem\
            \ ser usados para determinar se a informa\xE7\xE3o originou-se de um indiv\xED\
            duo ou se um indiv\xEDduo realizou a\xE7\xF5es espec\xEDficas (por exemplo,\
            \ enviar um e-mail, assinar um contrato, aprovar uma solicita\xE7\xE3\
            o de aquisi\xE7\xE3o ou receber informa\xE7\xF5es espec\xEDficas). As\
            \ organiza\xE7\xF5es obt\xEAm servi\xE7os de n\xE3o rep\xFAdio empregando\
            \ diversas t\xE9cnicas ou mecanismos, incluindo assinaturas digitais e\
            \ recibos digitais de mensagens."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-10(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-10(1)
      name: Non-repudiation | Association of Identities
      description: '(a) Bind the identity of the information producer with the information
        to [Assignment: organization-defined strength of binding]; and

        (b) Provide the means for authorized individuals to determine the identity
        of the producer of the information.'
      annotation: Binding identities to the information supports audit requirements
        that provide organizational personnel with the means to identify who produced
        specific information in the event of an information transfer. Organizations
        determine and approve the strength of attribute binding between the information
        producer and the information based on the security category of the information
        and other relevant risk factors.
      translations:
        pt:
          name: "N\xE3o Rep\xFAdio | Associa\xE7\xE3o de Identidades"
          description: "(a) Vincular a identidade do produtor da informa\xE7\xE3o\
            \ \xE0 informa\xE7\xE3o com [Atribui\xE7\xE3o: for\xE7a de vincula\xE7\
            \xE3o definida pela organiza\xE7\xE3o]; e\n(b) Fornecer os meios para\
            \ que indiv\xEDduos autorizados determinem a identidade do produtor da\
            \ informa\xE7\xE3o."
          annotation: "Vincular identidades \xE0 informa\xE7\xE3o apoia os requisitos\
            \ de auditoria que fornecem ao pessoal organizacional os meios para identificar\
            \ quem produziu informa\xE7\xF5es espec\xEDficas no caso de uma transfer\xEA\
            ncia de informa\xE7\xF5es. As organiza\xE7\xF5es determinam e aprovam\
            \ a for\xE7a da vincula\xE7\xE3o de atributos entre o produtor da informa\xE7\
            \xE3o e a informa\xE7\xE3o com base na categoria de seguran\xE7a da informa\xE7\
            \xE3o e em outros fatores de risco relevantes."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-10(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-10(2)
      name: Non-repudiation | Validate Binding of Information Producer Identity
      description: '(a) Validate the binding of the information producer identity
        to the information at [Assignment: organization-defined frequency]; and

        (b) Perform [Assignment: organization-defined actions] in the event of a validation
        error.'
      annotation: Validating the binding of the information producer identity to the
        information prevents the modification of information between production and
        review. The validation of bindings can be achieved by, for example, using
        cryptographic checksums. Organizations determine if validations are in response
        to user requests or generated automatically.
      translations:
        pt:
          name: "N\xE3o Rep\xFAdio | Validar a Vincula\xE7\xE3o da Identidade do Produtor\
            \ da Informa\xE7\xE3o"
          description: "(a) Validar a vincula\xE7\xE3o da identidade do produtor da\
            \ informa\xE7\xE3o \xE0 informa\xE7\xE3o a [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o]; e\n(b) Executar [Atribui\xE7\xE3\
            o: a\xE7\xF5es definidas pela organiza\xE7\xE3o] no caso de um erro de\
            \ valida\xE7\xE3o."
          annotation: "Validar a vincula\xE7\xE3o da identidade do produtor da informa\xE7\
            \xE3o \xE0 informa\xE7\xE3o previne a modifica\xE7\xE3o da informa\xE7\
            \xE3o entre a produ\xE7\xE3o e a revis\xE3o. A valida\xE7\xE3o das vincula\xE7\
            \xF5es pode ser alcan\xE7ada, por exemplo, usando somas de verifica\xE7\
            \xE3o criptogr\xE1ficas. As organiza\xE7\xF5es determinam se as valida\xE7\
            \xF5es ocorrem em resposta a solicita\xE7\xF5es de usu\xE1rios ou s\xE3\
            o geradas automaticamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-10(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-10(3)
      name: Non-repudiation | Chain of Custody
      description: Maintain reviewer or releaser credentials within the established
        chain of custody for information reviewed or released.
      annotation: Chain of custody is a process that tracks the movement of evidence
        through its collection, safeguarding, and analysis life cycle by documenting
        each individual who handled the evidence, the date and time the evidence was
        collected or transferred, and the purpose for the transfer. If the reviewer
        is a human or if the review function is automated but separate from the release
        or transfer function, the system associates the identity of the reviewer of
        the information to be released with the information and the information label.
        In the case of human reviews, maintaining the credentials of reviewers or
        releasers provides the organization with the means to identify who reviewed
        and released the information. In the case of automated reviews, it ensures
        that only approved review functions are used.
      translations:
        pt:
          name: "N\xE3o Rep\xFAdio | Cadeia de Cust\xF3dia"
          description: "Manter as credenciais do revisor ou liberador dentro da cadeia\
            \ de cust\xF3dia estabelecida para as informa\xE7\xF5es revisadas ou liberadas."
          annotation: "A cadeia de cust\xF3dia \xE9 um processo que rastreia a movimenta\xE7\
            \xE3o de evid\xEAncias ao longo de seu ciclo de vida de coleta, salvaguarda\
            \ e an\xE1lise, documentando cada indiv\xEDduo que manuseou a evid\xEA\
            ncia, a data e a hora em que a evid\xEAncia foi coletada ou transferida\
            \ e a finalidade da transfer\xEAncia. Se o revisor for um humano ou se\
            \ a fun\xE7\xE3o de revis\xE3o for automatizada, mas separada da fun\xE7\
            \xE3o de libera\xE7\xE3o ou transfer\xEAncia, o sistema associa a identidade\
            \ do revisor da informa\xE7\xE3o a ser liberada com a informa\xE7\xE3\
            o e o r\xF3tulo da informa\xE7\xE3o. No caso de revis\xF5es humanas, manter\
            \ as credenciais dos revisores ou liberadores fornece \xE0 organiza\xE7\
            \xE3o os meios para identificar quem revisou e liberou a informa\xE7\xE3\
            o. No caso de revis\xF5es automatizadas, garante que apenas fun\xE7\xF5\
            es de revis\xE3o aprovadas sejam usadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-10(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-10(4)
      name: Non-repudiation | Validate Binding of Information Reviewer Identity
      description: '(a) Validate the binding of the information reviewer identity
        to the information at the transfer or release points prior to release or transfer
        between [Assignment: organization-defined security domains]; and

        (b) Perform [Assignment: organization-defined actions] in the event of a validation
        error.'
      annotation: Validating the binding of the information reviewer identity to the
        information at transfer or release points prevents the unauthorized modification
        of information between review and the transfer or release. The validation
        of bindings can be achieved by using cryptographic checksums. Organizations
        determine if validations are in response to user requests or generated automatically.
      translations:
        pt:
          name: "N\xE3o Rep\xFAdio | Validar a Vincula\xE7\xE3o da Identidade do Revisor\
            \ da Informa\xE7\xE3o"
          description: "(a) Validar a vincula\xE7\xE3o da identidade do revisor da\
            \ informa\xE7\xE3o \xE0 informa\xE7\xE3o nos pontos de transfer\xEAncia\
            \ ou libera\xE7\xE3o, antes da libera\xE7\xE3o ou transfer\xEAncia entre\
            \ [Atribui\xE7\xE3o: dom\xEDnios de seguran\xE7a definidos pela organiza\xE7\
            \xE3o]; e\n(b) Executar [Atribui\xE7\xE3o: a\xE7\xF5es definidas pela\
            \ organiza\xE7\xE3o] no caso de um erro de valida\xE7\xE3o."
          annotation: "Validar a vincula\xE7\xE3o da identidade do revisor da informa\xE7\
            \xE3o \xE0 informa\xE7\xE3o nos pontos de transfer\xEAncia ou libera\xE7\
            \xE3o previne a modifica\xE7\xE3o n\xE3o autorizada da informa\xE7\xE3\
            o entre a revis\xE3o e a transfer\xEAncia ou libera\xE7\xE3o. A valida\xE7\
            \xE3o das vincula\xE7\xF5es pode ser alcan\xE7ada usando somas de verifica\xE7\
            \xE3o criptogr\xE1ficas. As organiza\xE7\xF5es determinam se as valida\xE7\
            \xF5es ocorrem em resposta a solicita\xE7\xF5es de usu\xE1rios ou s\xE3\
            o geradas automaticamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-7(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-7(2)
      name: Audit Record Reduction and Report Generation | Automatic Sort and Search
      description: '[Withdrawn: Incorporated into AU-7(1).]'
      translations:
        pt:
          name: "Redu\xE7\xE3o de Registros de Auditoria e Gera\xE7\xE3o de Relat\xF3\
            rios | Ordena\xE7\xE3o e Pesquisa Autom\xE1ticas"
          description: '[Revogado: Incorporado ao AU-7(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-11
      name: Audit Record Retention
      description: 'Retain audit records for [Assignment: organization-defined time
        period consistent with records retention policy] to provide support for after-the-fact
        investigations of incidents and to meet regulatory and organizational information
        retention requirements.'
      annotation: Organizations retain audit records until it is determined that the
        records are no longer needed for administrative, legal, audit, or other operational
        purposes. This includes the retention and availability of audit records relative
        to Freedom of Information Act (FOIA) requests, subpoenas, and law enforcement
        actions. Organizations develop standard categories of audit records relative
        to such types of actions and standard response processes for each type of
        action. The National Archives and Records Administration (NARA) General Records
        Schedules provide federal policy on records retention.
      translations:
        pt:
          name: "Reten\xE7\xE3o de Registros de Auditoria"
          description: "Reter os registros de auditoria por [Atribui\xE7\xE3o: per\xED\
            odo de tempo definido pela organiza\xE7\xE3o, consistente com a pol\xED\
            tica de reten\xE7\xE3o de registros] para fornecer suporte a investiga\xE7\
            \xF5es posteriores de incidentes e atender aos requisitos regulat\xF3\
            rios e organizacionais de reten\xE7\xE3o de informa\xE7\xF5es."
          annotation: "As organiza\xE7\xF5es ret\xEAm os registros de auditoria at\xE9\
            \ que se determine que os registros n\xE3o s\xE3o mais necess\xE1rios\
            \ para fins administrativos, legais, de auditoria ou outros fins operacionais.\
            \ Isso inclui a reten\xE7\xE3o e a disponibilidade dos registros de auditoria\
            \ relativos a solicita\xE7\xF5es da Lei de Liberdade de Informa\xE7\xE3\
            o (FOIA), intima\xE7\xF5es e a\xE7\xF5es de aplica\xE7\xE3o da lei. As\
            \ organiza\xE7\xF5es desenvolvem categorias padronizadas de registros\
            \ de auditoria relativas a tais tipos de a\xE7\xF5es e processos padronizados\
            \ de resposta para cada tipo de a\xE7\xE3o. Os Cronogramas Gerais de Registros\
            \ da Administra\xE7\xE3o Nacional de Arquivos e Registros (NARA) fornecem\
            \ a pol\xEDtica federal sobre reten\xE7\xE3o de registros."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-11(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-11(1)
      name: Audit Record Retention | Long-term Retrieval Capability
      description: 'Employ [Assignment: organization-defined measures] to ensure that
        long-term audit records generated by the system can be retrieved.'
      annotation: Organizations need to access and read audit records requiring long-term
        storage (on the order of years). Measures employed to help facilitate the
        retrieval of audit records include converting records to newer formats, retaining
        equipment capable of reading the records, and retaining the necessary documentation
        to help personnel understand how to interpret the records.
      translations:
        pt:
          name: "Reten\xE7\xE3o de Registros de Auditoria | Capacidade de Recupera\xE7\
            \xE3o de Longo Prazo"
          description: "Empregar [Atribui\xE7\xE3o: medidas definidas pela organiza\xE7\
            \xE3o] para garantir que os registros de auditoria de longo prazo gerados\
            \ pelo sistema possam ser recuperados."
          annotation: "As organiza\xE7\xF5es precisam acessar e ler registros de auditoria\
            \ que exigem armazenamento de longo prazo (na ordem de anos). As medidas\
            \ empregadas para ajudar a facilitar a recupera\xE7\xE3o dos registros\
            \ de auditoria incluem converter os registros para formatos mais recentes,\
            \ reter equipamentos capazes de ler os registros e reter a documenta\xE7\
            \xE3o necess\xE1ria para ajudar o pessoal a entender como interpretar\
            \ os registros."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-12
      name: Audit Record Generation
      description: 'a. Provide audit record generation capability for the event types
        the system is capable of auditing as defined in AU-2a on [Assignment: organization-defined
        system components];

        b. Allow [Assignment: organization-defined personnel or roles] to select the
        event types that are to be logged by specific components of the system; and

        c. Generate audit records for the event types defined in AU-2c that include
        the audit record content defined in AU-3.'
      annotation: Audit records can be generated from many different system components.
        The event types specified in AU-2d are the event types for which audit logs
        are to be generated and are a subset of all event types for which the system
        can generate audit records.
      translations:
        pt:
          name: "Gera\xE7\xE3o de Registros de Auditoria"
          description: "a. Fornecer capacidade de gera\xE7\xE3o de registros de auditoria\
            \ para os tipos de evento que o sistema \xE9 capaz de auditar, conforme\
            \ definido em AU-2a, em [Atribui\xE7\xE3o: componentes do sistema definidos\
            \ pela organiza\xE7\xE3o];\nb. Permitir que [Atribui\xE7\xE3o: pessoal\
            \ ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o] selecione os tipos\
            \ de evento que devem ser registrados por componentes espec\xEDficos do\
            \ sistema; e\nc. Gerar registros de auditoria para os tipos de evento\
            \ definidos em AU-2c que incluam o conte\xFAdo do registro de auditoria\
            \ definido em AU-3."
          annotation: "Os registros de auditoria podem ser gerados a partir de muitos\
            \ componentes diferentes do sistema. Os tipos de evento especificados\
            \ em AU-2d s\xE3o os tipos de evento para os quais os logs de auditoria\
            \ devem ser gerados e constituem um subconjunto de todos os tipos de evento\
            \ para os quais o sistema pode gerar registros de auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-12(1)
      name: Audit Record Generation | System-wide and Time-correlated Audit Trail
      description: 'Compile audit records from [Assignment: organization-defined system
        components] into a system-wide (logical or physical) audit trail that is time-correlated
        to within [Assignment: organization-defined level of tolerance for the relationship
        between time stamps of individual records in the audit trail].'
      annotation: Audit trails are time-correlated if the time stamps in the individual
        audit records can be reliably related to the time stamps in other audit records
        to achieve a time ordering of the records within organizational tolerances.
      translations:
        pt:
          name: "Gera\xE7\xE3o de Registros de Auditoria | Trilha de Auditoria de\
            \ Todo o Sistema e Correlacionada no Tempo"
          description: "Compilar os registros de auditoria de [Atribui\xE7\xE3o: componentes\
            \ do sistema definidos pela organiza\xE7\xE3o] em uma trilha de auditoria\
            \ de todo o sistema (l\xF3gica ou f\xEDsica) que seja correlacionada no\
            \ tempo dentro de [Atribui\xE7\xE3o: n\xEDvel de toler\xE2ncia definido\
            \ pela organiza\xE7\xE3o para a rela\xE7\xE3o entre os carimbos de data\
            \ e hora dos registros individuais na trilha de auditoria]."
          annotation: "As trilhas de auditoria s\xE3o correlacionadas no tempo se\
            \ os carimbos de data e hora dos registros de auditoria individuais puderem\
            \ ser relacionados de forma confi\xE1vel aos carimbos de data e hora de\
            \ outros registros de auditoria, a fim de alcan\xE7ar uma ordena\xE7\xE3\
            o temporal dos registros dentro das toler\xE2ncias organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-12(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-12(2)
      name: Audit Record Generation | Standardized Formats
      description: Produce a system-wide (logical or physical) audit trail composed
        of audit records in a standardized format.
      annotation: Audit records that follow common standards promote interoperability
        and information exchange between devices and systems. Promoting interoperability
        and information exchange facilitates the production of event information that
        can be readily analyzed and correlated. If logging mechanisms do not conform
        to standardized formats, systems may convert individual audit records into
        standardized formats when compiling system-wide audit trails.
      translations:
        pt:
          name: "Gera\xE7\xE3o de Registros de Auditoria | Formatos Padronizados"
          description: "Produzir uma trilha de auditoria de todo o sistema (l\xF3\
            gica ou f\xEDsica) composta por registros de auditoria em um formato padronizado."
          annotation: "Os registros de auditoria que seguem padr\xF5es comuns promovem\
            \ a interoperabilidade e o interc\xE2mbio de informa\xE7\xF5es entre dispositivos\
            \ e sistemas. Promover a interoperabilidade e o interc\xE2mbio de informa\xE7\
            \xF5es facilita a produ\xE7\xE3o de informa\xE7\xF5es de evento que podem\
            \ ser prontamente analisadas e correlacionadas. Se os mecanismos de registro\
            \ n\xE3o estiverem em conformidade com formatos padronizados, os sistemas\
            \ podem converter registros de auditoria individuais em formatos padronizados\
            \ ao compilar as trilhas de auditoria de todo o sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-12(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-12(3)
      name: Audit Record Generation | Changes by Authorized Individuals
      description: 'Provide and implement the capability for [Assignment: organization-defined
        individuals or roles] to change the logging to be performed on [Assignment:
        organization-defined system components] based on [Assignment: organization-defined
        selectable event criteria] within [Assignment: organization-defined time thresholds].'
      annotation: Permitting authorized individuals to make changes to system logging
        enables organizations to extend or limit logging as necessary to meet organizational
        requirements. Logging that is limited to conserve system resources may be
        extended (either temporarily or permanently) to address certain threat situations.
        In addition, logging may be limited to a specific set of event types to facilitate
        audit reduction, analysis, and reporting. Organizations can establish time
        thresholds in which logging actions are changed (e.g., near real-time, within
        minutes, or within hours).
      translations:
        pt:
          name: "Gera\xE7\xE3o de Registros de Auditoria | Altera\xE7\xF5es por Indiv\xED\
            duos Autorizados"
          description: "Fornecer e implementar a capacidade para que [Atribui\xE7\xE3\
            o: indiv\xEDduos ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o] alterem\
            \ o registro a ser realizado em [Atribui\xE7\xE3o: componentes do sistema\
            \ definidos pela organiza\xE7\xE3o] com base em [Atribui\xE7\xE3o: crit\xE9\
            rios de evento selecion\xE1veis definidos pela organiza\xE7\xE3o] dentro\
            \ de [Atribui\xE7\xE3o: limiares de tempo definidos pela organiza\xE7\xE3\
            o]."
          annotation: "Permitir que indiv\xEDduos autorizados fa\xE7am altera\xE7\xF5\
            es no registro do sistema possibilita que as organiza\xE7\xF5es ampliem\
            \ ou limitem o registro conforme necess\xE1rio para atender aos requisitos\
            \ organizacionais. O registro que \xE9 limitado para conservar recursos\
            \ do sistema pode ser ampliado (tempor\xE1ria ou permanentemente) para\
            \ tratar de determinadas situa\xE7\xF5es de amea\xE7a. Al\xE9m disso,\
            \ o registro pode ser limitado a um conjunto espec\xEDfico de tipos de\
            \ evento para facilitar a redu\xE7\xE3o, a an\xE1lise e a gera\xE7\xE3\
            o de relat\xF3rios de auditoria. As organiza\xE7\xF5es podem estabelecer\
            \ limiares de tempo dentro dos quais as a\xE7\xF5es de registro s\xE3\
            o alteradas (por exemplo, em tempo quase real, em minutos ou em horas)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-12(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-12(4)
      name: Audit Record Generation | Query Parameter Audits of Personally Identifiable
        Information
      description: Provide and implement the capability for auditing the parameters
        of user query events for data sets containing personally identifiable information.
      annotation: Query parameters are explicit criteria that an individual or automated
        system submits to a system to retrieve data. Auditing of query parameters
        for datasets that contain personally identifiable information augments the
        capability of an organization to track and understand the access, usage, or
        sharing of personally identifiable information by authorized personnel.
      translations:
        pt:
          name: "Gera\xE7\xE3o de Registros de Auditoria | Auditorias de Par\xE2metros\
            \ de Consulta de Informa\xE7\xF5es de Identifica\xE7\xE3o Pessoal"
          description: "Fornecer e implementar a capacidade de auditar os par\xE2\
            metros de eventos de consulta de usu\xE1rios para conjuntos de dados que\
            \ contenham informa\xE7\xF5es de identifica\xE7\xE3o pessoal."
          annotation: "Os par\xE2metros de consulta s\xE3o crit\xE9rios expl\xEDcitos\
            \ que um indiv\xEDduo ou sistema automatizado submete a um sistema para\
            \ recuperar dados. A auditoria dos par\xE2metros de consulta para conjuntos\
            \ de dados que cont\xEAm informa\xE7\xF5es de identifica\xE7\xE3o pessoal\
            \ amplia a capacidade de uma organiza\xE7\xE3o de rastrear e compreender\
            \ o acesso, o uso ou o compartilhamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal por pessoal autorizado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-13
      name: Monitoring for Information Disclosure
      description: "a. Monitor [Assignment: organization-defined open-source information\
        \ and/or information sites] [Assignment: organization-defined frequency] for\
        \ evidence of unauthorized disclosure of organizational information; and\n\
        b. If an information disclosure is discovered:\n1. Notify [Assignment: organization-defined\
        \ personnel or roles]; and \n2. Take the following additional actions: [Assignment:\
        \ organization-defined additional actions]."
      annotation: Unauthorized disclosure of information is a form of data leakage.
        Open-source information includes social networking sites and code-sharing
        platforms and repositories. Examples of organizational information include
        personally identifiable information retained by the organization or proprietary
        information generated by the organization.
      translations:
        pt:
          name: "Monitoramento de Divulga\xE7\xE3o de Informa\xE7\xF5es"
          description: "a. Monitorar [Atribui\xE7\xE3o: informa\xE7\xF5es de c\xF3\
            digo aberto e/ou sites de informa\xE7\xE3o definidos pela organiza\xE7\
            \xE3o] [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3\
            o] em busca de evid\xEAncias de divulga\xE7\xE3o n\xE3o autorizada de\
            \ informa\xE7\xF5es organizacionais; e\nb. Se uma divulga\xE7\xE3o de\
            \ informa\xE7\xF5es for descoberta:\n1. Notificar [Atribui\xE7\xE3o: pessoal\
            \ ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]; e\n2. Tomar as seguintes\
            \ a\xE7\xF5es adicionais: [Atribui\xE7\xE3o: a\xE7\xF5es adicionais definidas\
            \ pela organiza\xE7\xE3o]."
          annotation: "A divulga\xE7\xE3o n\xE3o autorizada de informa\xE7\xF5es \xE9\
            \ uma forma de vazamento de dados. As informa\xE7\xF5es de c\xF3digo aberto\
            \ incluem sites de redes sociais e plataformas e reposit\xF3rios de compartilhamento\
            \ de c\xF3digo. Exemplos de informa\xE7\xF5es organizacionais incluem\
            \ informa\xE7\xF5es de identifica\xE7\xE3o pessoal retidas pela organiza\xE7\
            \xE3o ou informa\xE7\xF5es propriet\xE1rias geradas pela organiza\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-13(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-13(1)
      name: Monitoring for Information Disclosure | Use of Automated Tools
      description: 'Monitor open-source information and information sites using [Assignment:
        organization-defined automated mechanisms].'
      annotation: Automated mechanisms include commercial services that provide notifications
        and alerts to organizations and automated scripts to monitor new posts on
        websites.
      translations:
        pt:
          name: "Monitoramento de Divulga\xE7\xE3o de Informa\xE7\xF5es | Uso de Ferramentas\
            \ Automatizadas"
          description: "Monitorar informa\xE7\xF5es de c\xF3digo aberto e sites de\
            \ informa\xE7\xE3o usando [Atribui\xE7\xE3o: mecanismos automatizados\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos automatizados incluem servi\xE7os comerciais\
            \ que fornecem notifica\xE7\xF5es e alertas \xE0s organiza\xE7\xF5es e\
            \ scripts automatizados para monitorar novas publica\xE7\xF5es em sites."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-13(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-13(2)
      name: Monitoring for Information Disclosure | Review of Monitored Sites
      description: 'Review the list of open-source information sites being monitored
        [Assignment: organization-defined frequency].'
      annotation: Reviewing the current list of open-source information sites being
        monitored on a regular basis helps to ensure that the selected sites remain
        relevant. The review also provides the opportunity to add new open-source
        information sites with the potential to provide evidence of unauthorized disclosure
        of organizational information. The list of sites monitored can be guided and
        informed by threat intelligence of other credible sources of information.
      translations:
        pt:
          name: "Monitoramento de Divulga\xE7\xE3o de Informa\xE7\xF5es | Revis\xE3\
            o dos Sites Monitorados"
          description: "Revisar a lista de sites de informa\xE7\xE3o de c\xF3digo\
            \ aberto que est\xE3o sendo monitorados [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o]."
          annotation: "Revisar regularmente a lista atual de sites de informa\xE7\xE3\
            o de c\xF3digo aberto que est\xE3o sendo monitorados ajuda a garantir\
            \ que os sites selecionados permane\xE7am relevantes. A revis\xE3o tamb\xE9\
            m oferece a oportunidade de adicionar novos sites de informa\xE7\xE3o\
            \ de c\xF3digo aberto com potencial para fornecer evid\xEAncias de divulga\xE7\
            \xE3o n\xE3o autorizada de informa\xE7\xF5es organizacionais. A lista\
            \ de sites monitorados pode ser orientada e informada por intelig\xEA\
            ncia de amea\xE7as de outras fontes de informa\xE7\xE3o confi\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-13(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-13(3)
      name: Monitoring for Information Disclosure | Unauthorized Replication of Information
      description: "Employ discovery techniques, processes, and tools to\_determine\
        \ if external entities are replicating organizational information in an unauthorized\
        \ manner."
      annotation: "The unauthorized use or replication of organizational information\
        \ by external entities can cause adverse impacts on organizational operations\
        \ and assets, including damage to reputation. Such activity can include the\
        \ replication of an organizational website by an adversary or hostile threat\
        \ actor who attempts to impersonate the web-hosting organization. Discovery\
        \ tools, techniques, and processes used to determine if external\_entities\
        \ are replicating organizational\_information in an unauthorized manner include\
        \ scanning external websites, monitoring social media, and training staff\
        \ to recognize the unauthorized use of\_organizational information."
      translations:
        pt:
          name: "Monitoramento de Divulga\xE7\xE3o de Informa\xE7\xF5es | Replica\xE7\
            \xE3o N\xE3o Autorizada de Informa\xE7\xF5es"
          description: "Empregar t\xE9cnicas, processos e ferramentas de descoberta\
            \ para determinar se entidades externas est\xE3o replicando informa\xE7\
            \xF5es organizacionais de maneira n\xE3o autorizada."
          annotation: "O uso ou a replica\xE7\xE3o n\xE3o autorizados de informa\xE7\
            \xF5es organizacionais por entidades externas pode causar impactos adversos\
            \ nas opera\xE7\xF5es e nos ativos organizacionais, incluindo danos \xE0\
            \ reputa\xE7\xE3o. Tal atividade pode incluir a replica\xE7\xE3o de um\
            \ site organizacional por um advers\xE1rio ou ator de amea\xE7a hostil\
            \ que tente se passar pela organiza\xE7\xE3o que hospeda o site. As ferramentas,\
            \ t\xE9cnicas e processos de descoberta usados para determinar se entidades\
            \ externas est\xE3o replicando informa\xE7\xF5es organizacionais de maneira\
            \ n\xE3o autorizada incluem a varredura de sites externos, o monitoramento\
            \ de redes sociais e o treinamento de funcion\xE1rios para reconhecer\
            \ o uso n\xE3o autorizado de informa\xE7\xF5es organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-14
      name: Session Audit
      description: 'a. Provide and implement the capability for [Assignment: organization-defined
        users or roles] to [Selection (one or more): record; view; hear; log] the
        content of a user session under [Assignment: organization-defined circumstances];
        and

        b. Develop, integrate, and use session auditing activities in consultation
        with legal counsel and in accordance with applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines.'
      annotation: Session audits can include monitoring keystrokes, tracking websites
        visited, and recording information and/or file transfers. Session audit capability
        is implemented in addition to event logging and may involve implementation
        of specialized session capture technology. Organizations consider how session
        auditing can reveal information about individuals that may give rise to privacy
        risk as well as how to mitigate those risks. Because session auditing can
        impact system and network performance, organizations activate the capability
        under well-defined situations (e.g., the organization is suspicious of a specific
        individual). Organizations consult with legal counsel, civil liberties officials,
        and privacy officials to ensure that any legal, privacy, civil rights, or
        civil liberties issues, including the use of personally identifiable information,
        are appropriately addressed.
      translations:
        pt:
          name: "Auditoria de Sess\xE3o"
          description: "a. Fornecer e implementar a capacidade para que [Atribui\xE7\
            \xE3o: usu\xE1rios ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]\
            \ [Sele\xE7\xE3o (um ou mais): gravem; visualizem; ou\xE7am; registrem\
            \ em log] o conte\xFAdo de uma sess\xE3o de usu\xE1rio sob [Atribui\xE7\
            \xE3o: circunst\xE2ncias definidas pela organiza\xE7\xE3o]; e\nb. Desenvolver,\
            \ integrar e usar atividades de auditoria de sess\xE3o em consulta com\
            \ a assessoria jur\xEDdica e em conformidade com leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis."
          annotation: "As auditorias de sess\xE3o podem incluir o monitoramento de\
            \ teclas digitadas, o rastreamento dos sites visitados e a grava\xE7\xE3\
            o de informa\xE7\xF5es e/ou transfer\xEAncias de arquivos. A capacidade\
            \ de auditoria de sess\xE3o \xE9 implementada al\xE9m do registro de eventos\
            \ e pode envolver a implementa\xE7\xE3o de tecnologia especializada de\
            \ captura de sess\xE3o. As organiza\xE7\xF5es consideram como a auditoria\
            \ de sess\xE3o pode revelar informa\xE7\xF5es sobre indiv\xEDduos que\
            \ podem dar origem a risco de privacidade, bem como como mitigar esses\
            \ riscos. Como a auditoria de sess\xE3o pode impactar o desempenho do\
            \ sistema e da rede, as organiza\xE7\xF5es ativam a capacidade em situa\xE7\
            \xF5es bem definidas (por exemplo, quando a organiza\xE7\xE3o suspeita\
            \ de um indiv\xEDduo espec\xEDfico). As organiza\xE7\xF5es consultam a\
            \ assessoria jur\xEDdica, os respons\xE1veis pelas liberdades civis e\
            \ os respons\xE1veis pela privacidade para garantir que quaisquer quest\xF5\
            es legais, de privacidade, de direitos civis ou de liberdades civis, incluindo\
            \ o uso de informa\xE7\xF5es de identifica\xE7\xE3o pessoal, sejam tratadas\
            \ de forma adequada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-14(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-14(1)
      name: Session Audit | System Start-up
      description: Initiate session audits automatically at system start-up.
      annotation: The automatic initiation of session audits at startup helps to ensure
        that the information being captured on selected individuals is complete and
        not subject to compromise through tampering by malicious threat actors.
      translations:
        pt:
          name: "Auditoria de Sess\xE3o | Inicializa\xE7\xE3o do Sistema"
          description: "Iniciar as auditorias de sess\xE3o automaticamente na inicializa\xE7\
            \xE3o do sistema."
          annotation: "A inicializa\xE7\xE3o autom\xE1tica das auditorias de sess\xE3\
            o na inicializa\xE7\xE3o ajuda a garantir que as informa\xE7\xF5es capturadas\
            \ sobre indiv\xEDduos selecionados estejam completas e n\xE3o sujeitas\
            \ a comprometimento por meio de adultera\xE7\xE3o por atores de amea\xE7\
            a maliciosos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-8(1)
      name: Time Stamps | Synchronization with Authoritative Time Source
      description: '[Withdrawn: Moved to SC-45(1).]'
      translations:
        pt:
          name: "Carimbos de Data e Hora | Sincroniza\xE7\xE3o com Fonte de Tempo\
            \ Autoritativa"
          description: '[Revogado: Movido para SC-45(1).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-14(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-14(3)
      name: Session Audit | Remote Viewing and Listening
      description: Provide and implement the capability for authorized users to remotely
        view and hear content related to an established user session in real time.
      annotation: None.
      translations:
        pt:
          name: "Auditoria de Sess\xE3o | Visualiza\xE7\xE3o e Escuta Remotas"
          description: "Fornecer e implementar a capacidade para que usu\xE1rios autorizados\
            \ visualizem e ou\xE7am remotamente, em tempo real, o conte\xFAdo relacionado\
            \ a uma sess\xE3o de usu\xE1rio estabelecida."
          annotation: Nenhuma.
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-8(2)
      name: Time Stamps | Secondary Authoritative Time Source
      description: '[Withdrawn: Moved to SC-45(2).]'
      translations:
        pt:
          name: "Carimbos de Data e Hora | Fonte de Tempo Autoritativa Secund\xE1\
            ria"
          description: '[Revogado: Movido para SC-45(2).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-16
      name: Cross-organizational Audit Logging
      description: 'Employ [Assignment: organization-defined methods] for coordinating
        [Assignment: organization-defined audit information] among external organizations
        when audit information is transmitted across organizational boundaries.'
      annotation: When organizations use systems or services of external organizations,
        the audit logging capability necessitates a coordinated, cross-organization
        approach. For example, maintaining the identity of individuals who request
        specific services across organizational boundaries may often be difficult,
        and doing so may prove to have significant performance and privacy ramifications.
        Therefore, it is often the case that cross-organizational audit logging simply
        captures the identity of individuals who issue requests at the initial system,
        and subsequent systems record that the requests originated from authorized
        individuals. Organizations consider including processes for coordinating audit
        information requirements and protection of audit information in information
        exchange agreements.
      translations:
        pt:
          name: Registro de Auditoria Interorganizacional
          description: "Empregar [Atribui\xE7\xE3o: m\xE9todos definidos pela organiza\xE7\
            \xE3o] para coordenar [Atribui\xE7\xE3o: informa\xE7\xF5es de auditoria\
            \ definidas pela organiza\xE7\xE3o] entre organiza\xE7\xF5es externas\
            \ quando as informa\xE7\xF5es de auditoria s\xE3o transmitidas atrav\xE9\
            s de fronteiras organizacionais."
          annotation: "Quando as organiza\xE7\xF5es utilizam sistemas ou servi\xE7\
            os de organiza\xE7\xF5es externas, a capacidade de registro de auditoria\
            \ exige uma abordagem coordenada e interorganizacional. Por exemplo, manter\
            \ a identidade dos indiv\xEDduos que solicitam servi\xE7os espec\xEDficos\
            \ atrav\xE9s de fronteiras organizacionais pode muitas vezes ser dif\xED\
            cil, e faz\xEA-lo pode revelar-se com ramifica\xE7\xF5es significativas\
            \ de desempenho e privacidade. Portanto, \xE9 frequentemente o caso de\
            \ que o registro de auditoria interorganizacional simplesmente capture\
            \ a identidade dos indiv\xEDduos que emitem solicita\xE7\xF5es no sistema\
            \ inicial, e os sistemas subsequentes registrem que as solicita\xE7\xF5\
            es se originaram de indiv\xEDduos autorizados. As organiza\xE7\xF5es consideram\
            \ incluir processos para coordenar os requisitos de informa\xE7\xF5es\
            \ de auditoria e a prote\xE7\xE3o das informa\xE7\xF5es de auditoria nos\
            \ acordos de interc\xE2mbio de informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-16(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-16(1)
      name: Cross-organizational Audit Logging | Identity Preservation
      description: Preserve the identity of individuals in cross-organizational audit
        trails.
      annotation: Identity preservation is applied when there is a need to be able
        to trace actions that are performed across organizational boundaries to a
        specific individual.
      translations:
        pt:
          name: "Registro de Auditoria Interorganizacional | Preserva\xE7\xE3o da\
            \ Identidade"
          description: "Preservar a identidade dos indiv\xEDduos em trilhas de auditoria\
            \ interorganizacionais."
          annotation: "A preserva\xE7\xE3o da identidade \xE9 aplicada quando h\xE1\
            \ necessidade de rastrear a\xE7\xF5es executadas atrav\xE9s de fronteiras\
            \ organizacionais at\xE9 um indiv\xEDduo espec\xEDfico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-16(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-16(2)
      name: Cross-organizational Audit Logging | Sharing of Audit Information
      description: 'Provide cross-organizational audit information to [Assignment:
        organization-defined organizations] based on [Assignment: organization-defined
        cross-organizational sharing agreements].'
      annotation: "Due to the distributed nature of the audit information, cross-organization\
        \ sharing of audit information may be essential for effective analysis of\
        \ the auditing being performed. For example, the audit records of one organization\
        \ may not provide sufficient information to determine the appropriate or inappropriate\
        \ use of organizational information resources by individuals in other organizations.\
        \ In some instances, only individuals\u2019 home organizations have the appropriate\
        \ knowledge to make such determinations, thus requiring the sharing of audit\
        \ information among organizations."
      translations:
        pt:
          name: "Registro de Auditoria Interorganizacional | Compartilhamento de Informa\xE7\
            \xF5es de Auditoria"
          description: "Fornecer informa\xE7\xF5es de auditoria interorganizacionais\
            \ a [Atribui\xE7\xE3o: organiza\xE7\xF5es definidas pela organiza\xE7\xE3\
            o] com base em [Atribui\xE7\xE3o: acordos de compartilhamento interorganizacional\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "Devido \xE0 natureza distribu\xEDda das informa\xE7\xF5es de\
            \ auditoria, o compartilhamento interorganizacional de informa\xE7\xF5\
            es de auditoria pode ser essencial para a an\xE1lise eficaz da auditoria\
            \ que est\xE1 sendo realizada. Por exemplo, os registros de auditoria\
            \ de uma organiza\xE7\xE3o podem n\xE3o fornecer informa\xE7\xF5es suficientes\
            \ para determinar o uso apropriado ou inapropriado dos recursos de informa\xE7\
            \xE3o organizacionais por indiv\xEDduos de outras organiza\xE7\xF5es.\
            \ Em alguns casos, apenas as organiza\xE7\xF5es de origem dos indiv\xED\
            duos possuem o conhecimento apropriado para fazer tais determina\xE7\xF5\
            es, exigindo assim o compartilhamento de informa\xE7\xF5es de auditoria\
            \ entre organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au-16(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:au
      ref_id: AU-16(3)
      name: Cross-organizational Audit Logging | Disassociability
      description: 'Implement [Assignment: organization-defined measures] to disassociate
        individuals from audit information transmitted across organizational boundaries.'
      annotation: Preserving identities in audit trails could have privacy ramifications,
        such as enabling the tracking and profiling of individuals, but may not be
        operationally necessary. These risks could be further amplified when transmitting
        information across organizational boundaries. Implementing privacy-enhancing
        cryptographic techniques can disassociate individuals from audit information
        and reduce privacy risk while maintaining accountability.
      translations:
        pt:
          name: "Registro de Auditoria Interorganizacional | N\xE3o Associabilidade"
          description: "Implementar [Atribui\xE7\xE3o: medidas definidas pela organiza\xE7\
            \xE3o] para desassociar os indiv\xEDduos das informa\xE7\xF5es de auditoria\
            \ transmitidas atrav\xE9s de fronteiras organizacionais."
          annotation: "Preservar identidades em trilhas de auditoria pode ter ramifica\xE7\
            \xF5es de privacidade, tais como possibilitar o rastreamento e a defini\xE7\
            \xE3o de perfil de indiv\xEDduos, mas pode n\xE3o ser operacionalmente\
            \ necess\xE1rio. Esses riscos podem ser ainda mais amplificados ao transmitir\
            \ informa\xE7\xF5es atrav\xE9s de fronteiras organizacionais. A implementa\xE7\
            \xE3o de t\xE9cnicas criptogr\xE1ficas que aprimoram a privacidade pode\
            \ desassociar os indiv\xEDduos das informa\xE7\xF5es de auditoria e reduzir\
            \ o risco de privacidade, ao mesmo tempo em que mant\xE9m a responsabiliza\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      assessable: false
      depth: 1
      ref_id: CA
      name: Assessment, Authorization, and Monitoring
      translations:
        pt:
          name: "Avalia\xE7\xE3o, Autoriza\xE7\xE3o e Monitoramento"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] assessment, authorization, and monitoring policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the assessment, authorization,
        and monitoring policy and the associated assessment, authorization, and monitoring
        controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the assessment, authorization,
        and monitoring policy and procedures; and

        c. Review and update the current assessment, authorization, and monitoring:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: Assessment, authorization, and monitoring policy and procedures
        address the controls in the CA family that are implemented within systems
        and organizations. The risk management strategy is an important factor in
        establishing such policies and procedures. Policies and procedures contribute
        to security and privacy assurance. Therefore, it is important that security
        and privacy programs collaborate on the development of assessment, authorization,
        and monitoring policy and procedures. Security and privacy program policies
        and procedures at the organization level are preferable, in general, and may
        obviate the need for mission- or system-specific policies and procedures.
        The policy can be included as part of the general security and privacy policy
        or be represented by multiple policies that reflect the complex nature of
        organizations. Procedures can be established for security and privacy programs,
        for mission or business processes, and for systems, if needed. Procedures
        describe how the policies or controls are implemented and can be directed
        at the individual or role that is the object of the procedure. Procedures
        can be documented in system security and privacy plans or in one or more separate
        documents. Events that may precipitate an update to assessment, authorization,
        and monitoring policy and procedures include assessment or audit findings,
        security incidents or breaches, or changes in applicable laws, executive orders,
        directives, regulations, policies, standards, and guidelines. Simply restating
        controls does not constitute an organizational policy or procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e divulgar a [Atribui\xE7\xE3o:\
            \ pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de avalia\xE7\xE3o, autoriza\xE7\xE3o e monitoramento em [Sele\xE7\
            \xE3o (um ou mais): n\xEDvel organizacional; n\xEDvel de processo de miss\xE3\
            o/neg\xF3cio; n\xEDvel de sistema] que:\n(a) Aborde prop\xF3sito, escopo,\
            \ fun\xE7\xF5es, responsabilidades, comprometimento da dire\xE7\xE3o,\
            \ coordena\xE7\xE3o entre entidades organizacionais e conformidade; e\n\
            (b) Seja consistente com leis, ordens executivas, diretrizes, regulamentos,\
            \ pol\xEDticas, normas e diretrizes aplic\xE1veis; e\n2. Procedimentos\
            \ para facilitar a implementa\xE7\xE3o da pol\xEDtica de avalia\xE7\xE3\
            o, autoriza\xE7\xE3o e monitoramento e dos controles associados de avalia\xE7\
            \xE3o, autoriza\xE7\xE3o e monitoramento;\nb. Designar um [Atribui\xE7\
            \xE3o: respons\xE1vel definido pela organiza\xE7\xE3o] para gerenciar\
            \ o desenvolvimento, a documenta\xE7\xE3o e a divulga\xE7\xE3o da pol\xED\
            tica e dos procedimentos de avalia\xE7\xE3o, autoriza\xE7\xE3o e monitoramento;\
            \ e\nc. Revisar e atualizar a atual:\n1. Pol\xEDtica de avalia\xE7\xE3\
            o, autoriza\xE7\xE3o e monitoramento [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos de avalia\xE7\
            \xE3o, autoriza\xE7\xE3o e monitoramento [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\xE3o: eventos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de avalia\xE7\xE3o, autoriza\xE7\
            \xE3o e monitoramento abordam os controles da fam\xEDlia CA que s\xE3\
            o implementados dentro dos sistemas e organiza\xE7\xF5es. A estrat\xE9\
            gia de gest\xE3o de riscos \xE9 um fator importante no estabelecimento\
            \ de tais pol\xEDticas e procedimentos. As pol\xEDticas e os procedimentos\
            \ contribuem para a garantia de seguran\xE7a e privacidade. Portanto,\
            \ \xE9 importante que os programas de seguran\xE7a e privacidade colaborem\
            \ no desenvolvimento da pol\xEDtica e dos procedimentos de avalia\xE7\xE3\
            o, autoriza\xE7\xE3o e monitoramento. As pol\xEDticas e os procedimentos\
            \ dos programas de seguran\xE7a e privacidade no n\xEDvel organizacional\
            \ s\xE3o prefer\xEDveis, em geral, e podem eliminar a necessidade de pol\xED\
            ticas e procedimentos espec\xEDficos de miss\xE3o ou de sistema. A pol\xED\
            tica pode ser inclu\xEDda como parte da pol\xEDtica geral de seguran\xE7\
            a e privacidade ou ser representada por m\xFAltiplas pol\xEDticas que\
            \ refletem a natureza complexa das organiza\xE7\xF5es. Os procedimentos\
            \ podem ser estabelecidos para programas de seguran\xE7a e privacidade,\
            \ para processos de miss\xE3o ou de neg\xF3cio e para sistemas, se necess\xE1\
            rio. Os procedimentos descrevem como as pol\xEDticas ou os controles s\xE3\
            o implementados e podem ser direcionados ao indiv\xEDduo ou \xE0 fun\xE7\
            \xE3o que \xE9 o objeto do procedimento. Os procedimentos podem ser documentados\
            \ nos planos de seguran\xE7a e privacidade do sistema ou em um ou mais\
            \ documentos separados. Os eventos que podem desencadear uma atualiza\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de avalia\xE7\xE3o, autoriza\xE7\
            \xE3o e monitoramento incluem constata\xE7\xF5es de avalia\xE7\xE3o ou\
            \ auditoria, incidentes ou viola\xE7\xF5es de seguran\xE7a, ou mudan\xE7\
            as em leis, ordens executivas, diretrizes, regulamentos, pol\xEDticas,\
            \ normas e diretrizes aplic\xE1veis. A simples reformula\xE7\xE3o de controles\
            \ n\xE3o constitui uma pol\xEDtica ou procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-2
      name: Control Assessments
      description: 'a. Select the appropriate assessor or assessment team for the
        type of assessment to be conducted;

        b. Develop a control assessment plan that describes the scope of the assessment
        including:

        1. Controls and control enhancements under assessment;

        2. Assessment procedures to be used to determine control effectiveness; and

        3. Assessment environment, assessment team, and assessment roles and responsibilities;

        c. Ensure the control assessment plan is reviewed and approved by the authorizing
        official or designated representative prior to conducting the assessment;

        d. Assess the controls in the system and its environment of operation [Assignment:
        organization-defined frequency] to determine the extent to which the controls
        are implemented correctly, operating as intended, and producing the desired
        outcome with respect to meeting established security and privacy requirements;

        e. Produce a control assessment report that document the results of the assessment;
        and

        f. Provide the results of the control assessment to [Assignment: organization-defined
        individuals or roles].'
      annotation: 'Organizations ensure that control assessors possess the required
        skills and technical expertise to develop effective assessment plans and to
        conduct assessments of system-specific, hybrid, common, and program management
        controls, as appropriate. The required skills include general knowledge of
        risk management concepts and approaches as well as comprehensive knowledge
        of and experience with the hardware, software, and firmware system components
        implemented.

        Organizations assess controls in systems and the environments in which those
        systems operate as part of initial and ongoing authorizations, continuous
        monitoring, FISMA annual assessments, system design and development, systems
        security engineering, privacy engineering, and the system development life
        cycle. Assessments help to ensure that organizations meet information security
        and privacy requirements, identify weaknesses and deficiencies in the system
        design and development process, provide essential information needed to make
        risk-based decisions as part of authorization processes, and comply with vulnerability
        mitigation procedures. Organizations conduct assessments on the implemented
        controls as documented in security and privacy plans. Assessments can also
        be conducted throughout the system development life cycle as part of systems
        engineering and systems security engineering processes. The design for controls
        can be assessed as RFPs are developed, responses assessed, and design reviews
        conducted. If a design to implement controls and subsequent implementation
        in accordance with the design are assessed during development, the final control
        testing can be a simple confirmation utilizing previously completed control
        assessment and aggregating the outcomes.

        Organizations may develop a single, consolidated security and privacy assessment
        plan for the system or maintain separate plans. A consolidated assessment
        plan clearly delineates the roles and responsibilities for control assessment.
        If multiple organizations participate in assessing a system, a coordinated
        approach can reduce redundancies and associated costs.

        Organizations can use other types of assessment activities, such as vulnerability
        scanning and system monitoring, to maintain the security and privacy posture
        of systems during the system life cycle. Assessment reports document assessment
        results in sufficient detail, as deemed necessary by organizations, to determine
        the accuracy and completeness of the reports and whether the controls are
        implemented correctly, operating as intended, and producing the desired outcome
        with respect to meeting requirements. Assessment results are provided to the
        individuals or roles appropriate for the types of assessments being conducted.
        For example, assessments conducted in support of authorization decisions are
        provided to authorizing officials, senior agency officials for privacy, senior
        agency information security officers, and authorizing official designated
        representatives.

        To satisfy annual assessment requirements, organizations can use assessment
        results from the following sources: initial or ongoing system authorizations,
        continuous monitoring, systems engineering processes, or system development
        life cycle activities. Organizations ensure that assessment results are current,
        relevant to the determination of control effectiveness, and obtained with
        the appropriate level of assessor independence. Existing control assessment
        results can be reused to the extent that the results are still valid and can
        also be supplemented with additional assessments as needed. After the initial
        authorizations, organizations assess controls during continuous monitoring.
        Organizations also establish the frequency for ongoing assessments in accordance
        with organizational continuous monitoring strategies. External audits, including
        audits by external entities such as regulatory agencies, are outside of the
        scope of CA-2.'
      translations:
        pt:
          name: "Avalia\xE7\xF5es de Controles"
          description: "a. Selecionar o avaliador ou a equipe de avalia\xE7\xE3o apropriados\
            \ para o tipo de avalia\xE7\xE3o a ser conduzida;\nb. Desenvolver um plano\
            \ de avalia\xE7\xE3o de controles que descreva o escopo da avalia\xE7\xE3\
            o, incluindo:\n1. Controles e aprimoramentos de controle sob avalia\xE7\
            \xE3o;\n2. Procedimentos de avalia\xE7\xE3o a serem utilizados para determinar\
            \ a efic\xE1cia dos controles; e\n3. Ambiente de avalia\xE7\xE3o, equipe\
            \ de avalia\xE7\xE3o e fun\xE7\xF5es e responsabilidades da avalia\xE7\
            \xE3o;\nc. Assegurar que o plano de avalia\xE7\xE3o de controles seja\
            \ revisado e aprovado pelo respons\xE1vel pela autoriza\xE7\xE3o ou representante\
            \ designado antes de conduzir a avalia\xE7\xE3o;\nd. Avaliar os controles\
            \ no sistema e em seu ambiente de opera\xE7\xE3o [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o] para determinar at\xE9 que ponto\
            \ os controles s\xE3o implementados corretamente, operam conforme pretendido\
            \ e produzem o resultado desejado quanto ao atendimento dos requisitos\
            \ estabelecidos de seguran\xE7a e privacidade;\ne. Produzir um relat\xF3\
            rio de avalia\xE7\xE3o de controles que documente os resultados da avalia\xE7\
            \xE3o; e\nf. Fornecer os resultados da avalia\xE7\xE3o de controles a\
            \ [Atribui\xE7\xE3o: indiv\xEDduos ou fun\xE7\xF5es definidos pela organiza\xE7\
            \xE3o]."
          annotation: "As organiza\xE7\xF5es asseguram que os avaliadores de controles\
            \ possuam as compet\xEAncias e a expertise t\xE9cnica necess\xE1rias para\
            \ desenvolver planos de avalia\xE7\xE3o eficazes e para conduzir avalia\xE7\
            \xF5es de controles espec\xEDficos de sistema, h\xEDbridos, comuns e de\
            \ gest\xE3o de programas, conforme apropriado. As compet\xEAncias necess\xE1\
            rias incluem conhecimento geral de conceitos e abordagens de gest\xE3\
            o de riscos, bem como conhecimento abrangente e experi\xEAncia com os\
            \ componentes de hardware, software e firmware do sistema implementados.\n\
            As organiza\xE7\xF5es avaliam os controles nos sistemas e nos ambientes\
            \ em que esses sistemas operam como parte das autoriza\xE7\xF5es iniciais\
            \ e cont\xEDnuas, do monitoramento cont\xEDnuo, das avalia\xE7\xF5es anuais\
            \ da FISMA, do projeto e desenvolvimento do sistema, da engenharia de\
            \ seguran\xE7a de sistemas, da engenharia de privacidade e do ciclo de\
            \ vida de desenvolvimento do sistema. As avalia\xE7\xF5es ajudam a assegurar\
            \ que as organiza\xE7\xF5es atendam aos requisitos de seguran\xE7a da\
            \ informa\xE7\xE3o e privacidade, identificam fraquezas e defici\xEAncias\
            \ no processo de projeto e desenvolvimento do sistema, fornecem as informa\xE7\
            \xF5es essenciais necess\xE1rias para tomar decis\xF5es baseadas em risco\
            \ como parte dos processos de autoriza\xE7\xE3o, e cumprem os procedimentos\
            \ de mitiga\xE7\xE3o de vulnerabilidades. As organiza\xE7\xF5es conduzem\
            \ avalia\xE7\xF5es sobre os controles implementados conforme documentado\
            \ nos planos de seguran\xE7a e privacidade. As avalia\xE7\xF5es tamb\xE9\
            m podem ser conduzidas ao longo do ciclo de vida de desenvolvimento do\
            \ sistema como parte dos processos de engenharia de sistemas e de engenharia\
            \ de seguran\xE7a de sistemas. O projeto dos controles pode ser avaliado\
            \ \xE0 medida que as RFPs s\xE3o desenvolvidas, as respostas s\xE3o avaliadas\
            \ e as revis\xF5es de projeto s\xE3o conduzidas. Se um projeto para implementar\
            \ controles e a subsequente implementa\xE7\xE3o de acordo com o projeto\
            \ forem avaliados durante o desenvolvimento, o teste final dos controles\
            \ pode ser uma simples confirma\xE7\xE3o que utiliza a avalia\xE7\xE3\
            o de controles previamente conclu\xEDda e agrega os resultados.\nAs organiza\xE7\
            \xF5es podem desenvolver um \xFAnico plano consolidado de avalia\xE7\xE3\
            o de seguran\xE7a e privacidade para o sistema ou manter planos separados.\
            \ Um plano de avalia\xE7\xE3o consolidado delineia claramente as fun\xE7\
            \xF5es e responsabilidades para a avalia\xE7\xE3o de controles. Se m\xFA\
            ltiplas organiza\xE7\xF5es participarem na avalia\xE7\xE3o de um sistema,\
            \ uma abordagem coordenada pode reduzir redund\xE2ncias e custos associados.\n\
            As organiza\xE7\xF5es podem utilizar outros tipos de atividades de avalia\xE7\
            \xE3o, tais como varredura de vulnerabilidades e monitoramento de sistemas,\
            \ para manter a postura de seguran\xE7a e privacidade dos sistemas durante\
            \ o ciclo de vida do sistema. Os relat\xF3rios de avalia\xE7\xE3o documentam\
            \ os resultados da avalia\xE7\xE3o em detalhe suficiente, conforme considerado\
            \ necess\xE1rio pelas organiza\xE7\xF5es, para determinar a precis\xE3\
            o e a completude dos relat\xF3rios e se os controles s\xE3o implementados\
            \ corretamente, operam conforme pretendido e produzem o resultado desejado\
            \ quanto ao atendimento dos requisitos. Os resultados da avalia\xE7\xE3\
            o s\xE3o fornecidos aos indiv\xEDduos ou fun\xE7\xF5es apropriados para\
            \ os tipos de avalia\xE7\xF5es que est\xE3o sendo conduzidas. Por exemplo,\
            \ as avalia\xE7\xF5es conduzidas em apoio a decis\xF5es de autoriza\xE7\
            \xE3o s\xE3o fornecidas aos respons\xE1veis pela autoriza\xE7\xE3o, aos\
            \ altos funcion\xE1rios da ag\xEAncia respons\xE1veis pela privacidade,\
            \ aos altos funcion\xE1rios de seguran\xE7a da informa\xE7\xE3o da ag\xEA\
            ncia e aos representantes designados pelos respons\xE1veis pela autoriza\xE7\
            \xE3o.\nPara satisfazer os requisitos de avalia\xE7\xE3o anual, as organiza\xE7\
            \xF5es podem utilizar resultados de avalia\xE7\xE3o das seguintes fontes:\
            \ autoriza\xE7\xF5es iniciais ou cont\xEDnuas do sistema, monitoramento\
            \ cont\xEDnuo, processos de engenharia de sistemas ou atividades do ciclo\
            \ de vida de desenvolvimento do sistema. As organiza\xE7\xF5es asseguram\
            \ que os resultados da avalia\xE7\xE3o sejam atuais, relevantes para a\
            \ determina\xE7\xE3o da efic\xE1cia dos controles e obtidos com o n\xED\
            vel apropriado de independ\xEAncia do avaliador. Os resultados existentes\
            \ de avalia\xE7\xE3o de controles podem ser reutilizados na medida em\
            \ que os resultados ainda sejam v\xE1lidos e tamb\xE9m podem ser complementados\
            \ com avalia\xE7\xF5es adicionais conforme necess\xE1rio. Ap\xF3s as autoriza\xE7\
            \xF5es iniciais, as organiza\xE7\xF5es avaliam os controles durante o\
            \ monitoramento cont\xEDnuo. As organiza\xE7\xF5es tamb\xE9m estabelecem\
            \ a frequ\xEAncia das avalia\xE7\xF5es cont\xEDnuas de acordo com as estrat\xE9\
            gias organizacionais de monitoramento cont\xEDnuo. As auditorias externas,\
            \ incluindo auditorias por entidades externas, tais como ag\xEAncias reguladoras,\
            \ est\xE3o fora do escopo do CA-2."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-2(1)
      name: Control Assessments | Independent Assessors
      description: Employ independent assessors or assessment teams to conduct control
        assessments.
      annotation: 'Independent assessors or assessment teams are individuals or groups
        who conduct impartial assessments of systems. Impartiality means that assessors
        are free from any perceived or actual conflicts of interest regarding the
        development, operation, sustainment, or management of the systems under assessment
        or the determination of control effectiveness. To achieve impartiality, assessors
        do not create a mutual or conflicting interest with the organizations where
        the assessments are being conducted, assess their own work, act as management
        or employees of the organizations they are serving, or place themselves in
        positions of advocacy for the organizations acquiring their services.

        Independent assessments can be obtained from elements within organizations
        or be contracted to public or private sector entities outside of organizations.
        Authorizing officials determine the required level of independence based on
        the security categories of systems and/or the risk to organizational operations,
        organizational assets, or individuals. Authorizing officials also determine
        if the level of assessor independence provides sufficient assurance that the
        results are sound and can be used to make credible, risk-based decisions.
        Assessor independence determination includes whether contracted assessment
        services have sufficient independence, such as when system owners are not
        directly involved in contracting processes or cannot influence the impartiality
        of the assessors conducting the assessments. During the system design and
        development phase, having independent assessors is analogous to having independent
        SMEs involved in design reviews.

        When organizations that own the systems are small or the structures of the
        organizations require that assessments be conducted by individuals that are
        in the developmental, operational, or management chain of the system owners,
        independence in assessment processes can be achieved by ensuring that assessment
        results are carefully reviewed and analyzed by independent teams of experts
        to validate the completeness, accuracy, integrity, and reliability of the
        results. Assessments performed for purposes other than to support authorization
        decisions are more likely to be useable for such decisions when performed
        by assessors with sufficient independence, thereby reducing the need to repeat
        assessments.'
      translations:
        pt:
          name: "Avalia\xE7\xF5es de Controles | Avaliadores Independentes"
          description: "Empregar avaliadores independentes ou equipes de avalia\xE7\
            \xE3o independentes para conduzir as avalia\xE7\xF5es de controles."
          annotation: "Avaliadores independentes ou equipes de avalia\xE7\xE3o independentes\
            \ s\xE3o indiv\xEDduos ou grupos que conduzem avalia\xE7\xF5es imparciais\
            \ de sistemas. Imparcialidade significa que os avaliadores est\xE3o livres\
            \ de quaisquer conflitos de interesse percebidos ou reais relativos ao\
            \ desenvolvimento, opera\xE7\xE3o, sustenta\xE7\xE3o ou gest\xE3o dos\
            \ sistemas sob avalia\xE7\xE3o ou \xE0 determina\xE7\xE3o da efic\xE1\
            cia dos controles. Para alcan\xE7ar a imparcialidade, os avaliadores n\xE3\
            o criam um interesse m\xFAtuo ou conflitante com as organiza\xE7\xF5es\
            \ onde as avalia\xE7\xF5es est\xE3o sendo conduzidas, n\xE3o avaliam seu\
            \ pr\xF3prio trabalho, n\xE3o atuam como dire\xE7\xE3o ou empregados das\
            \ organiza\xE7\xF5es que est\xE3o atendendo, nem se colocam em posi\xE7\
            \xF5es de defesa das organiza\xE7\xF5es que adquirem seus servi\xE7os.\n\
            Avalia\xE7\xF5es independentes podem ser obtidas a partir de elementos\
            \ dentro das organiza\xE7\xF5es ou contratadas a entidades do setor p\xFA\
            blico ou privado externas \xE0s organiza\xE7\xF5es. Os respons\xE1veis\
            \ pela autoriza\xE7\xE3o determinam o n\xEDvel necess\xE1rio de independ\xEA\
            ncia com base nas categorias de seguran\xE7a dos sistemas e/ou no risco\
            \ para as opera\xE7\xF5es organizacionais, ativos organizacionais ou indiv\xED\
            duos. Os respons\xE1veis pela autoriza\xE7\xE3o tamb\xE9m determinam se\
            \ o n\xEDvel de independ\xEAncia do avaliador fornece garantia suficiente\
            \ de que os resultados s\xE3o s\xF3lidos e podem ser utilizados para tomar\
            \ decis\xF5es cr\xEDveis e baseadas em risco. A determina\xE7\xE3o da\
            \ independ\xEAncia do avaliador inclui verificar se os servi\xE7os de\
            \ avalia\xE7\xE3o contratados possuem independ\xEAncia suficiente, como\
            \ quando os propriet\xE1rios do sistema n\xE3o est\xE3o diretamente envolvidos\
            \ nos processos de contrata\xE7\xE3o ou n\xE3o podem influenciar a imparcialidade\
            \ dos avaliadores que conduzem as avalia\xE7\xF5es. Durante a fase de\
            \ projeto e desenvolvimento do sistema, contar com avaliadores independentes\
            \ \xE9 an\xE1logo a contar com especialistas no assunto (SMEs) independentes\
            \ envolvidos nas revis\xF5es de projeto.\nQuando as organiza\xE7\xF5es\
            \ que possuem os sistemas s\xE3o pequenas ou as estruturas das organiza\xE7\
            \xF5es exigem que as avalia\xE7\xF5es sejam conduzidas por indiv\xEDduos\
            \ que est\xE3o na cadeia de desenvolvimento, opera\xE7\xE3o ou gest\xE3\
            o dos propriet\xE1rios do sistema, a independ\xEAncia nos processos de\
            \ avalia\xE7\xE3o pode ser alcan\xE7ada ao assegurar que os resultados\
            \ da avalia\xE7\xE3o sejam cuidadosamente revisados e analisados por equipes\
            \ independentes de especialistas para validar a completude, precis\xE3\
            o, integridade e confiabilidade dos resultados. As avalia\xE7\xF5es realizadas\
            \ para fins distintos do apoio a decis\xF5es de autoriza\xE7\xE3o t\xEA\
            m maior probabilidade de serem utiliz\xE1veis para tais decis\xF5es quando\
            \ realizadas por avaliadores com independ\xEAncia suficiente, reduzindo\
            \ assim a necessidade de repetir as avalia\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-2(2)
      name: Control Assessments | Specialized Assessments
      description: 'Include as part of control assessments, [Assignment: organization-defined
        frequency], [Selection: announced; unannounced], [Selection (one or more):
        in-depth monitoring; security instrumentation; automated security test cases;
        vulnerability scanning; malicious user testing; insider threat assessment;
        performance and load testing; data leakage or data loss assessment; [Assignment:
        organization-defined other forms of assessment]].'
      annotation: Organizations can conduct specialized assessments, including verification
        and validation, system monitoring, insider threat assessments, malicious user
        testing, and other forms of testing. These assessments can improve readiness
        by exercising organizational capabilities and indicating current levels of
        performance as a means of focusing actions to improve security and privacy.
        Organizations conduct specialized assessments in accordance with applicable
        laws, executive orders, directives, regulations, policies, standards, and
        guidelines. Authorizing officials approve the assessment methods in coordination
        with the organizational risk executive function. Organizations can include
        vulnerabilities uncovered during assessments into vulnerability remediation
        processes. Specialized assessments can also be conducted early in the system
        development life cycle (e.g., during initial design, development, and unit
        testing).
      translations:
        pt:
          name: "Avalia\xE7\xF5es de Controles | Avalia\xE7\xF5es Especializadas"
          description: "Incluir como parte das avalia\xE7\xF5es de controles, [Atribui\xE7\
            \xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o], [Sele\xE7\xE3o:\
            \ anunciada; n\xE3o anunciada], [Sele\xE7\xE3o (um ou mais): monitoramento\
            \ aprofundado; instrumenta\xE7\xE3o de seguran\xE7a; casos de teste de\
            \ seguran\xE7a automatizados; varredura de vulnerabilidades; teste de\
            \ usu\xE1rio malicioso; avalia\xE7\xE3o de amea\xE7a interna; teste de\
            \ desempenho e carga; avalia\xE7\xE3o de vazamento de dados ou perda de\
            \ dados; [Atribui\xE7\xE3o: outras formas de avalia\xE7\xE3o definidas\
            \ pela organiza\xE7\xE3o]]."
          annotation: "As organiza\xE7\xF5es podem conduzir avalia\xE7\xF5es especializadas,\
            \ incluindo verifica\xE7\xE3o e valida\xE7\xE3o, monitoramento de sistemas,\
            \ avalia\xE7\xF5es de amea\xE7a interna, teste de usu\xE1rio malicioso\
            \ e outras formas de teste. Essas avalia\xE7\xF5es podem melhorar a prontid\xE3\
            o ao exercitar as capacidades organizacionais e indicar os n\xEDveis atuais\
            \ de desempenho como meio de focar a\xE7\xF5es para melhorar a seguran\xE7\
            a e a privacidade. As organiza\xE7\xF5es conduzem avalia\xE7\xF5es especializadas\
            \ de acordo com leis, ordens executivas, diretrizes, regulamentos, pol\xED\
            ticas, normas e diretrizes aplic\xE1veis. Os respons\xE1veis pela autoriza\xE7\
            \xE3o aprovam os m\xE9todos de avalia\xE7\xE3o em coordena\xE7\xE3o com\
            \ a fun\xE7\xE3o de executivo de risco organizacional. As organiza\xE7\
            \xF5es podem incluir as vulnerabilidades descobertas durante as avalia\xE7\
            \xF5es nos processos de remedia\xE7\xE3o de vulnerabilidades. As avalia\xE7\
            \xF5es especializadas tamb\xE9m podem ser conduzidas no in\xEDcio do ciclo\
            \ de vida de desenvolvimento do sistema (por exemplo, durante o projeto\
            \ inicial, o desenvolvimento e o teste unit\xE1rio)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-2(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-2(3)
      name: Control Assessments | Leveraging Results from External Organizations
      description: 'Leverage the results of control assessments performed by [Assignment:
        organization-defined external organization] on [Assignment: organization-defined
        system] when the assessment meets [Assignment: organization-defined requirements].'
      annotation: "Organizations may rely on control assessments of organizational\
        \ systems by other (external) organizations. Using such assessments and reusing\
        \ existing assessment evidence can decrease the time and resources required\
        \ for assessments by limiting the independent assessment activities that organizations\
        \ need to perform. The factors that organizations consider in determining\
        \ whether to accept assessment results from external organizations can vary.\
        \ Such factors include the organization\u2019s past experience with the organization\
        \ that conducted the assessment, the reputation of the assessment organization,\
        \ the level of detail of supporting assessment evidence provided, and mandates\
        \ imposed by applicable laws, executive orders, directives, regulations, policies,\
        \ standards, and guidelines. Accredited testing laboratories that support\
        \ the Common Criteria Program ISO 15408-1, the NIST Cryptographic Module Validation\
        \ Program (CMVP), or the NIST Cryptographic Algorithm Validation Program (CAVP)\
        \ can provide independent assessment results that organizations can leverage."
      translations:
        pt:
          name: "Avalia\xE7\xF5es de Controles | Aproveitamento de Resultados de Organiza\xE7\
            \xF5es Externas"
          description: "Aproveitar os resultados das avalia\xE7\xF5es de controles\
            \ realizadas por [Atribui\xE7\xE3o: organiza\xE7\xE3o externa definida\
            \ pela organiza\xE7\xE3o] em [Atribui\xE7\xE3o: sistema definido pela\
            \ organiza\xE7\xE3o] quando a avalia\xE7\xE3o atender a [Atribui\xE7\xE3\
            o: requisitos definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem confiar em avalia\xE7\xF5es de\
            \ controles dos sistemas organizacionais realizadas por outras organiza\xE7\
            \xF5es (externas). A utiliza\xE7\xE3o de tais avalia\xE7\xF5es e a reutiliza\xE7\
            \xE3o de evid\xEAncias de avalia\xE7\xE3o existentes podem diminuir o\
            \ tempo e os recursos necess\xE1rios para as avalia\xE7\xF5es ao limitar\
            \ as atividades de avalia\xE7\xE3o independentes que as organiza\xE7\xF5\
            es precisam realizar. Os fatores que as organiza\xE7\xF5es consideram\
            \ ao determinar se devem aceitar resultados de avalia\xE7\xE3o de organiza\xE7\
            \xF5es externas podem variar. Tais fatores incluem a experi\xEAncia anterior\
            \ da organiza\xE7\xE3o com a organiza\xE7\xE3o que conduziu a avalia\xE7\
            \xE3o, a reputa\xE7\xE3o da organiza\xE7\xE3o avaliadora, o n\xEDvel de\
            \ detalhe das evid\xEAncias de avalia\xE7\xE3o de apoio fornecidas e os\
            \ mandatos impostos por leis, ordens executivas, diretrizes, regulamentos,\
            \ pol\xEDticas, normas e diretrizes aplic\xE1veis. Laborat\xF3rios de\
            \ teste credenciados que apoiam o Common Criteria Program ISO 15408-1,\
            \ o NIST Cryptographic Module Validation Program (CMVP) ou o NIST Cryptographic\
            \ Algorithm Validation Program (CAVP) podem fornecer resultados de avalia\xE7\
            \xE3o independentes que as organiza\xE7\xF5es podem aproveitar."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ca
      ref_id: CA-3
      name: Information Exchange
      description: 'a. Approve and manage the exchange of information between the
        system and other systems using [Selection (one or more): interconnection security
        agreements; information exchange security agreements; memoranda of understanding
        or agreement; service level agreements; user agreements; nondisclosure agreements;
        [Assignment: organization-defined type of agreement]];

        b. Document, as part of each exchange agreement, the interface characteristics,
        security and privacy requirements, controls, and responsibilities for each
        system, and the impact level of the information communicated; and

        c. Review and update the agreements [Assignment: organization-defined frequency].'
      annotation: 'System information exchange requirements apply to information exchanges
        between two or more systems. System information exchanges include connections
        via leased lines or virtual private networks, connections to internet service
        providers, database sharing or exchanges of database transaction information,
        connections and exchanges with cloud services, exchanges via web-based services,
        or exchanges of files via file transfer protocols, network protocols (e.g.,
        IPv4, IPv6), email, or other organization-to-organization communications.
        Organizations consider the risk related to new or increased threats that may
        be introduced when systems exchange information with other systems that may
        have different security and privacy requirements and controls. This includes
        systems within the same organization and systems that are external to the
        organization. A joint authorization of the systems exchanging information,
        as described in CA-6(1) or CA-6(2), may help to communicate and reduce risk.

        Authorizing officials determine the risk associated with system information
        exchange and the controls needed for appropriate risk mitigation. The types
        of agreements selected are based on factors such as the impact level of the
        information being exchanged, the relationship between the organizations exchanging
        information (e.g., government to government, government to business, business
        to business, government or business to service provider, government or business
        to individual), or the level of access to the organizational system by users
        of the other system. If systems that exchange information have the same authorizing
        official, organizations need not develop agreements. Instead, the interface
        characteristics between the systems (e.g., how the information is being exchanged.
        how the information is protected) are described in the respective security
        and privacy plans. If the systems that exchange information have different
        authorizing officials within the same organization, the organizations can
        develop agreements or provide the same information that would be provided
        in the appropriate agreement type from CA-3a in the respective security and
        privacy plans for the systems. Organizations may incorporate agreement information
        into formal contracts, especially for information exchanges established between
        federal agencies and nonfederal organizations (including service providers,
        contractors, system developers, and system integrators). Risk considerations
        include systems that share the same networks.'
      translations:
        pt:
          name: "Interc\xE2mbio de Informa\xE7\xF5es"
          description: "a. Aprovar e gerenciar o interc\xE2mbio de informa\xE7\xF5\
            es entre o sistema e outros sistemas utilizando [Sele\xE7\xE3o (um ou\
            \ mais): acordos de seguran\xE7a de interconex\xE3o; acordos de seguran\xE7\
            a de interc\xE2mbio de informa\xE7\xF5es; memorandos de entendimento ou\
            \ acordo; acordos de n\xEDvel de servi\xE7o; acordos de usu\xE1rio; acordos\
            \ de n\xE3o divulga\xE7\xE3o; [Atribui\xE7\xE3o: tipo de acordo definido\
            \ pela organiza\xE7\xE3o]];\nb. Documentar, como parte de cada acordo\
            \ de interc\xE2mbio, as caracter\xEDsticas de interface, os requisitos\
            \ de seguran\xE7a e privacidade, os controles e as responsabilidades de\
            \ cada sistema, e o n\xEDvel de impacto das informa\xE7\xF5es comunicadas;\
            \ e\nc. Revisar e atualizar os acordos [Atribui\xE7\xE3o: frequ\xEAncia\
            \ definida pela organiza\xE7\xE3o]."
          annotation: "Os requisitos de interc\xE2mbio de informa\xE7\xF5es de sistema\
            \ aplicam-se aos interc\xE2mbios de informa\xE7\xF5es entre dois ou mais\
            \ sistemas. Os interc\xE2mbios de informa\xE7\xF5es de sistema incluem\
            \ conex\xF5es via linhas dedicadas ou redes privadas virtuais, conex\xF5\
            es a provedores de servi\xE7os de internet, compartilhamento de bancos\
            \ de dados ou interc\xE2mbios de informa\xE7\xF5es de transa\xE7\xF5es\
            \ de bancos de dados, conex\xF5es e interc\xE2mbios com servi\xE7os em\
            \ nuvem, interc\xE2mbios via servi\xE7os baseados na web, ou interc\xE2\
            mbios de arquivos via protocolos de transfer\xEAncia de arquivos, protocolos\
            \ de rede (por exemplo, IPv4, IPv6), e-mail, ou outras comunica\xE7\xF5\
            es organiza\xE7\xE3o para organiza\xE7\xE3o. As organiza\xE7\xF5es consideram\
            \ o risco relacionado a amea\xE7as novas ou aumentadas que podem ser introduzidas\
            \ quando os sistemas intercambiam informa\xE7\xF5es com outros sistemas\
            \ que podem ter requisitos e controles de seguran\xE7a e privacidade diferentes.\
            \ Isso inclui sistemas dentro da mesma organiza\xE7\xE3o e sistemas que\
            \ s\xE3o externos \xE0 organiza\xE7\xE3o. Uma autoriza\xE7\xE3o conjunta\
            \ dos sistemas que intercambiam informa\xE7\xF5es, conforme descrito no\
            \ CA-6(1) ou CA-6(2), pode ajudar a comunicar e reduzir o risco.\nOs respons\xE1\
            veis pela autoriza\xE7\xE3o determinam o risco associado ao interc\xE2\
            mbio de informa\xE7\xF5es de sistema e os controles necess\xE1rios para\
            \ a mitiga\xE7\xE3o apropriada do risco. Os tipos de acordos selecionados\
            \ baseiam-se em fatores tais como o n\xEDvel de impacto das informa\xE7\
            \xF5es sendo intercambiadas, a rela\xE7\xE3o entre as organiza\xE7\xF5\
            es que intercambiam informa\xE7\xF5es (por exemplo, governo para governo,\
            \ governo para empresa, empresa para empresa, governo ou empresa para\
            \ provedor de servi\xE7os, governo ou empresa para indiv\xEDduo), ou o\
            \ n\xEDvel de acesso ao sistema organizacional por usu\xE1rios do outro\
            \ sistema. Se os sistemas que intercambiam informa\xE7\xF5es possuem o\
            \ mesmo respons\xE1vel pela autoriza\xE7\xE3o, as organiza\xE7\xF5es n\xE3\
            o precisam desenvolver acordos. Em vez disso, as caracter\xEDsticas de\
            \ interface entre os sistemas (por exemplo, como as informa\xE7\xF5es\
            \ est\xE3o sendo intercambiadas, como as informa\xE7\xF5es est\xE3o protegidas)\
            \ s\xE3o descritas nos respectivos planos de seguran\xE7a e privacidade.\
            \ Se os sistemas que intercambiam informa\xE7\xF5es possuem respons\xE1\
            veis pela autoriza\xE7\xE3o diferentes dentro da mesma organiza\xE7\xE3\
            o, as organiza\xE7\xF5es podem desenvolver acordos ou fornecer as mesmas\
            \ informa\xE7\xF5es que seriam fornecidas no tipo de acordo apropriado\
            \ do CA-3a nos respectivos planos de seguran\xE7a e privacidade dos sistemas.\
            \ As organiza\xE7\xF5es podem incorporar informa\xE7\xF5es de acordo em\
            \ contratos formais, especialmente para interc\xE2mbios de informa\xE7\
            \xF5es estabelecidos entre ag\xEAncias federais e organiza\xE7\xF5es n\xE3\
            o federais (incluindo provedores de servi\xE7os, contratados, desenvolvedores\
            \ de sistemas e integradores de sistemas). As considera\xE7\xF5es de risco\
            \ incluem sistemas que compartilham as mesmas redes."

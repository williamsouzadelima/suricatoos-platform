      name: Customized Development of Critical Components
      description: 'Reimplement or custom develop the following critical system components:
        [Assignment: organization-defined critical system components].'
      annotation: "Organizations determine that certain system components likely cannot\
        \ be trusted due to specific threats to and vulnerabilities in those components\
        \ for which there are no viable security controls to adequately mitigate risk.\_\
        Reimplementation or custom development of such components may satisfy requirements\
        \ for higher assurance and is carried out by initiating changes to system\
        \ components (including hardware, software, and firmware) such that the standard\
        \ attacks by adversaries are less likely to succeed. In situations where no\
        \ alternative sourcing is available and organizations choose not to reimplement\
        \ or custom develop critical system components, additional controls can be\
        \ employed. Controls include enhanced auditing, restrictions on source code\
        \ and system utility access, and protection from deletion of system and application\
        \ files."
      translations:
        pt:
          name: "Desenvolvimento Customizado de Componentes Cr\xEDticos"
          description: "Reimplementar ou desenvolver de forma customizada os seguintes\
            \ componentes de sistema cr\xEDticos: [Atribui\xE7\xE3o: componentes de\
            \ sistema cr\xEDticos definidos pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es determinam que certos componentes de\
            \ sistema provavelmente n\xE3o podem ser confi\xE1veis devido a amea\xE7\
            as e vulnerabilidades espec\xEDficas nesses componentes para as quais\
            \ n\xE3o h\xE1 controles de seguran\xE7a vi\xE1veis para mitigar adequadamente\
            \ o risco. A reimplementa\xE7\xE3o ou o desenvolvimento customizado de\
            \ tais componentes pode satisfazer requisitos de maior garantia e \xE9\
            \ realizado iniciando altera\xE7\xF5es nos componentes de sistema (incluindo\
            \ hardware, software e firmware) de modo que os ataques padr\xE3o dos\
            \ advers\xE1rios tenham menor probabilidade de sucesso. Em situa\xE7\xF5\
            es em que nenhuma fonte alternativa esteja dispon\xEDvel e as organiza\xE7\
            \xF5es optem por n\xE3o reimplementar ou desenvolver de forma customizada\
            \ os componentes de sistema cr\xEDticos, controles adicionais podem ser\
            \ empregados. Os controles incluem auditoria aprimorada, restri\xE7\xF5\
            es ao acesso ao c\xF3digo-fonte e aos utilit\xE1rios do sistema, e prote\xE7\
            \xE3o contra a exclus\xE3o de arquivos de sistema e de aplica\xE7\xE3\
            o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-21
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-21
      name: Developer Screening
      description: 'Require that the developer of [Assignment: organization-defined
        system, system component, or system service]:

        a. Has appropriate access authorizations as determined by assigned [Assignment:
        organization-defined official government duties]; and

        b. Satisfies the following additional personnel screening criteria: [Assignment:
        organization-defined additional personnel screening criteria].'
      annotation: Developer screening is directed at external developers. Internal
        developer screening is addressed by PS-3. Because the system, system component,
        or system service may be used in critical activities essential to the national
        or economic security interests of the United States, organizations have a
        strong interest in ensuring that developers are trustworthy. The degree of
        trust required of developers may need to be consistent with that of the individuals
        who access the systems, system components, or system services once deployed.
        Authorization and personnel screening criteria include clearances, background
        checks, citizenship, and nationality. Developer trustworthiness may also include
        a review and analysis of company ownership and relationships that the company
        has with entities that may potentially affect the quality and reliability
        of the systems, components, or services being developed. Satisfying the required
        access authorizations and personnel screening criteria includes providing
        a list of all individuals who are authorized to perform development activities
        on the selected system, system component, or system service so that organizations
        can validate that the developer has satisfied the authorization and screening
        requirements.
      translations:
        pt:
          name: Triagem do Desenvolvedor
          description: "Exigir que o desenvolvedor de [Atribui\xE7\xE3o: sistema,\
            \ componente de sistema ou servi\xE7o de sistema definido pela organiza\xE7\
            \xE3o]:\na. Possua autoriza\xE7\xF5es de acesso apropriadas conforme determinado\
            \ pelas [Atribui\xE7\xE3o: atribui\xE7\xF5es oficiais de governo definidas\
            \ pela organiza\xE7\xE3o]; e\nb. Satisfa\xE7a os seguintes crit\xE9rios\
            \ adicionais de triagem de pessoal: [Atribui\xE7\xE3o: crit\xE9rios adicionais\
            \ de triagem de pessoal definidos pela organiza\xE7\xE3o]."
          annotation: "A triagem do desenvolvedor \xE9 direcionada a desenvolvedores\
            \ externos. A triagem de desenvolvedores internos \xE9 tratada pelo PS-3.\
            \ Como o sistema, componente de sistema ou servi\xE7o de sistema pode\
            \ ser usado em atividades cr\xEDticas essenciais aos interesses de seguran\xE7\
            a nacional ou econ\xF4mica dos Estados Unidos, as organiza\xE7\xF5es t\xEA\
            m forte interesse em garantir que os desenvolvedores sejam confi\xE1veis.\
            \ O grau de confian\xE7a exigido dos desenvolvedores pode precisar ser\
            \ consistente com o dos indiv\xEDduos que acessam os sistemas, componentes\
            \ de sistema ou servi\xE7os de sistema ap\xF3s a implanta\xE7\xE3o. Os\
            \ crit\xE9rios de autoriza\xE7\xE3o e triagem de pessoal incluem credenciamentos\
            \ de seguran\xE7a, verifica\xE7\xF5es de antecedentes, cidadania e nacionalidade.\
            \ A confiabilidade do desenvolvedor tamb\xE9m pode incluir uma revis\xE3\
            o e an\xE1lise da propriedade da empresa e das rela\xE7\xF5es que a empresa\
            \ mant\xE9m com entidades que possam potencialmente afetar a qualidade\
            \ e a confiabilidade dos sistemas, componentes ou servi\xE7os que est\xE3\
            o sendo desenvolvidos. Satisfazer as autoriza\xE7\xF5es de acesso e os\
            \ crit\xE9rios de triagem de pessoal exigidos inclui fornecer uma lista\
            \ de todos os indiv\xEDduos autorizados a realizar atividades de desenvolvimento\
            \ no sistema, componente de sistema ou servi\xE7o de sistema selecionado,\
            \ de modo que as organiza\xE7\xF5es possam validar que o desenvolvedor\
            \ satisfez os requisitos de autoriza\xE7\xE3o e triagem."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-6
      name: Software Usage Restrictions
      description: '[Withdrawn: Incorporated into CM-10 and SI-7.]'
      translations:
        pt:
          name: "Restri\xE7\xF5es de Uso de Software"
          description: '[Retirado: Incorporado ao CM-10 e SI-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-22
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-22
      name: Unsupported System Components
      description: 'a. Replace system components when support for the components is
        no longer available from the developer, vendor, or manufacturer; or

        b. Provide the following options for alternative sources for continued support
        for unsupported components [Selection (one or more): in-house support; [Assignment:
        organization-defined support from external providers]].'
      annotation: 'Support for system components includes software patches, firmware
        updates, replacement parts, and maintenance contracts. An example of unsupported
        components includes when vendors no longer provide critical software patches
        or product updates, which can result in an opportunity for adversaries to
        exploit weaknesses in the installed components. Exceptions to replacing unsupported
        system components include systems that provide critical mission or business
        capabilities where newer technologies are not available or where the systems
        are so isolated that installing replacement components is not an option.

        Alternative sources for support address the need to provide continued support
        for system components that are no longer supported by the original manufacturers,
        developers, or vendors when such components remain essential to organizational
        mission and business functions. If necessary, organizations can establish
        in-house support by developing customized patches for critical software components
        or, alternatively, obtain the services of external providers who provide ongoing
        support for the designated unsupported components through contractual relationships.
        Such contractual relationships can include open-source software value-added
        vendors. The increased risk of using unsupported system components can be
        mitigated, for example, by prohibiting the connection of such components to
        public or uncontrolled networks, or implementing other forms of isolation.'
      translations:
        pt:
          name: Componentes de Sistema Sem Suporte
          description: "a. Substituir componentes do sistema quando o suporte para\
            \ os componentes n\xE3o estiver mais dispon\xEDvel por parte do desenvolvedor,\
            \ fornecedor ou fabricante; ou\nb. Fornecer as seguintes op\xE7\xF5es\
            \ de fontes alternativas para suporte cont\xEDnuo de componentes sem suporte\
            \ [Sele\xE7\xE3o (uma ou mais): suporte interno; [Atribui\xE7\xE3o: suporte\
            \ definido pela organiza\xE7\xE3o proveniente de provedores externos]]."
          annotation: "O suporte aos componentes do sistema inclui corre\xE7\xF5es\
            \ (patches) de software, atualiza\xE7\xF5es de firmware, pe\xE7as de reposi\xE7\
            \xE3o e contratos de manuten\xE7\xE3o. Um exemplo de componentes sem suporte\
            \ ocorre quando os fornecedores deixam de fornecer corre\xE7\xF5es cr\xED\
            ticas de software ou atualiza\xE7\xF5es de produtos, o que pode resultar\
            \ em uma oportunidade para que advers\xE1rios explorem fraquezas nos componentes\
            \ instalados. As exce\xE7\xF5es \xE0 substitui\xE7\xE3o de componentes\
            \ de sistema sem suporte incluem sistemas que fornecem capacidades cr\xED\
            ticas de miss\xE3o ou de neg\xF3cio, nos quais tecnologias mais novas\
            \ n\xE3o est\xE3o dispon\xEDveis ou nos quais os sistemas est\xE3o t\xE3\
            o isolados que a instala\xE7\xE3o de componentes substitutos n\xE3o \xE9\
            \ uma op\xE7\xE3o.\nAs fontes alternativas de suporte atendem \xE0 necessidade\
            \ de fornecer suporte cont\xEDnuo a componentes do sistema que n\xE3o\
            \ s\xE3o mais suportados pelos fabricantes, desenvolvedores ou fornecedores\
            \ originais, quando tais componentes permanecem essenciais para as fun\xE7\
            \xF5es de miss\xE3o e de neg\xF3cio da organiza\xE7\xE3o. Se necess\xE1\
            rio, as organiza\xE7\xF5es podem estabelecer suporte interno desenvolvendo\
            \ corre\xE7\xF5es (patches) personalizadas para componentes cr\xEDticos\
            \ de software ou, alternativamente, obter os servi\xE7os de provedores\
            \ externos que oferecem suporte cont\xEDnuo para os componentes designados\
            \ sem suporte por meio de rela\xE7\xF5es contratuais. Tais rela\xE7\xF5\
            es contratuais podem incluir fornecedores de valor agregado de software\
            \ de c\xF3digo aberto. O risco aumentado do uso de componentes de sistema\
            \ sem suporte pode ser mitigado, por exemplo, proibindo-se a conex\xE3\
            o de tais componentes a redes p\xFAblicas ou n\xE3o controladas, ou implementando-se\
            \ outras formas de isolamento."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-7
      name: User-installed Software
      description: '[Withdrawn: Incorporated into CM-11 and SI-7.]'
      translations:
        pt:
          name: "Software Instalado pelo Usu\xE1rio"
          description: '[Retirado: Incorporado em CM-11 e SI-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa-23
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sa
      ref_id: SA-23
      name: Specialization
      description: 'Employ [Selection (one or more): design; modification; augmentation;
        reconfiguration] on [Assignment: organization-defined systems or system components]
        supporting mission essential services or functions to increase the trustworthiness
        in those systems or components.'
      annotation: It is often necessary for a system or system component that supports
        mission-essential services or functions to be enhanced to maximize the trustworthiness
        of the resource. Sometimes this enhancement is done at the design level. In
        other instances, it is done post-design, either through modifications of the
        system in question or by augmenting the system with additional components.
        For example, supplemental authentication or non-repudiation functions may
        be added to the system to enhance the identity of critical resources to other
        resources that depend on the organization-defined resources.
      translations:
        pt:
          name: "Especializa\xE7\xE3o"
          description: "Empregar [Sele\xE7\xE3o (uma ou mais): design; modifica\xE7\
            \xE3o; amplia\xE7\xE3o; reconfigura\xE7\xE3o] em [Atribui\xE7\xE3o: sistemas\
            \ ou componentes de sistema definidos pela organiza\xE7\xE3o] que apoiem\
            \ servi\xE7os ou fun\xE7\xF5es essenciais \xE0 miss\xE3o para aumentar\
            \ a confiabilidade desses sistemas ou componentes."
          annotation: "Frequentemente \xE9 necess\xE1rio aprimorar um sistema ou componente\
            \ de sistema que apoia servi\xE7os ou fun\xE7\xF5es essenciais \xE0 miss\xE3\
            o para maximizar a confiabilidade do recurso. \xC0s vezes, esse aprimoramento\
            \ \xE9 feito no n\xEDvel do design. Em outros casos, \xE9 feito ap\xF3\
            s o design, seja por meio de modifica\xE7\xF5es do sistema em quest\xE3\
            o ou ampliando-se o sistema com componentes adicionais. Por exemplo, fun\xE7\
            \xF5es suplementares de autentica\xE7\xE3o ou de n\xE3o rep\xFAdio podem\
            \ ser adicionadas ao sistema para refor\xE7ar a identidade de recursos\
            \ cr\xEDticos perante outros recursos que dependem dos recursos definidos\
            \ pela organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      assessable: false
      depth: 1
      ref_id: SC
      name: System and Communication Protection
      translations:
        pt:
          name: "Prote\xE7\xE3o de Sistema e Comunica\xE7\xF5es"
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-1
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-1
      name: Policy and Procedures
      description: 'a. Develop, document, and disseminate to [Assignment: organization-defined
        personnel or roles]:

        1. [Selection (one or more): Organization-level; Mission/business process-level;
        System-level] system and communications protection policy that:

        (a) Addresses purpose, scope, roles, responsibilities, management commitment,
        coordination among organizational entities, and compliance; and

        (b) Is consistent with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines; and

        2. Procedures to facilitate the implementation of the system and communications
        protection policy and the associated system and communications protection
        controls;

        b. Designate an [Assignment: organization-defined official] to manage the
        development, documentation, and dissemination of the system and communications
        protection policy and procedures; and

        c. Review and update the current system and communications protection:

        1. Policy [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events]; and

        2. Procedures [Assignment: organization-defined frequency] and following [Assignment:
        organization-defined events].'
      annotation: System and communications protection policy and procedures address
        the controls in the SC family that are implemented within systems and organizations.
        The risk management strategy is an important factor in establishing such policies
        and procedures. Policies and procedures contribute to security and privacy
        assurance. Therefore, it is important that security and privacy programs collaborate
        on the development of system and communications protection policy and procedures.
        Security and privacy program policies and procedures at the organization level
        are preferable, in general, and may obviate the need for mission- or system-specific
        policies and procedures. The policy can be included as part of the general
        security and privacy policy or be represented by multiple policies that reflect
        the complex nature of organizations. Procedures can be established for security
        and privacy programs, for mission or business processes, and for systems,
        if needed. Procedures describe how the policies or controls are implemented
        and can be directed at the individual or role that is the object of the procedure.
        Procedures can be documented in system security and privacy plans or in one
        or more separate documents. Events that may precipitate an update to system
        and communications protection policy and procedures include assessment or
        audit findings, security incidents or breaches, or changes in applicable laws,
        executive orders, directives, regulations, policies, standards, and guidelines.
        Simply restating controls does not constitute an organizational policy or
        procedure.
      translations:
        pt:
          name: "Pol\xEDtica e Procedimentos"
          description: "a. Desenvolver, documentar e disseminar para [Atribui\xE7\xE3\
            o: pessoal ou fun\xE7\xF5es definidos pela organiza\xE7\xE3o]:\n1. Pol\xED\
            tica de prote\xE7\xE3o de sistema e comunica\xE7\xF5es de n\xEDvel [Sele\xE7\
            \xE3o (uma ou mais): organizacional; de processo de miss\xE3o/neg\xF3\
            cio; de sistema] que:\n(a) Aborde prop\xF3sito, escopo, pap\xE9is, responsabilidades,\
            \ comprometimento da gest\xE3o, coordena\xE7\xE3o entre entidades organizacionais\
            \ e conformidade; e\n(b) Seja consistente com as leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis; e\n2. Procedimentos para facilitar a implementa\xE7\xE3o da pol\xED\
            tica de prote\xE7\xE3o de sistema e comunica\xE7\xF5es e dos controles\
            \ de prote\xE7\xE3o de sistema e comunica\xE7\xF5es associados;\nb. Designar\
            \ um [Atribui\xE7\xE3o: funcion\xE1rio definido pela organiza\xE7\xE3\
            o] para gerenciar o desenvolvimento, a documenta\xE7\xE3o e a dissemina\xE7\
            \xE3o da pol\xEDtica e dos procedimentos de prote\xE7\xE3o de sistema\
            \ e comunica\xE7\xF5es; e\nc. Revisar e atualizar a atual prote\xE7\xE3\
            o de sistema e comunica\xE7\xF5es:\n1. Pol\xEDtica [Atribui\xE7\xE3o:\
            \ frequ\xEAncia definida pela organiza\xE7\xE3o] e ap\xF3s [Atribui\xE7\
            \xE3o: eventos definidos pela organiza\xE7\xE3o]; e\n2. Procedimentos\
            \ [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\xE3o] e\
            \ ap\xF3s [Atribui\xE7\xE3o: eventos definidos pela organiza\xE7\xE3o]."
          annotation: "A pol\xEDtica e os procedimentos de prote\xE7\xE3o de sistema\
            \ e comunica\xE7\xF5es abordam os controles da fam\xEDlia SC que s\xE3\
            o implementados dentro de sistemas e organiza\xE7\xF5es. A estrat\xE9\
            gia de gest\xE3o de riscos \xE9 um fator importante no estabelecimento\
            \ de tais pol\xEDticas e procedimentos. As pol\xEDticas e os procedimentos\
            \ contribuem para a garantia de seguran\xE7a e privacidade. Portanto,\
            \ \xE9 importante que os programas de seguran\xE7a e de privacidade colaborem\
            \ no desenvolvimento da pol\xEDtica e dos procedimentos de prote\xE7\xE3\
            o de sistema e comunica\xE7\xF5es. As pol\xEDticas e os procedimentos\
            \ dos programas de seguran\xE7a e privacidade no n\xEDvel organizacional\
            \ s\xE3o prefer\xEDveis, de modo geral, e podem eliminar a necessidade\
            \ de pol\xEDticas e procedimentos espec\xEDficos de miss\xE3o ou de sistema.\
            \ A pol\xEDtica pode ser inclu\xEDda como parte da pol\xEDtica geral de\
            \ seguran\xE7a e privacidade ou ser representada por m\xFAltiplas pol\xED\
            ticas que reflitam a natureza complexa das organiza\xE7\xF5es. Os procedimentos\
            \ podem ser estabelecidos para programas de seguran\xE7a e privacidade,\
            \ para processos de miss\xE3o ou de neg\xF3cio e para sistemas, se necess\xE1\
            rio. Os procedimentos descrevem como as pol\xEDticas ou os controles s\xE3\
            o implementados e podem ser direcionados ao indiv\xEDduo ou ao papel que\
            \ \xE9 objeto do procedimento. Os procedimentos podem ser documentados\
            \ em planos de seguran\xE7a e privacidade do sistema ou em um ou mais\
            \ documentos separados. Eventos que podem precipitar uma atualiza\xE7\xE3\
            o da pol\xEDtica e dos procedimentos de prote\xE7\xE3o de sistema e comunica\xE7\
            \xF5es incluem constata\xE7\xF5es de avalia\xE7\xE3o ou auditoria, incidentes\
            \ ou viola\xE7\xF5es de seguran\xE7a, ou altera\xE7\xF5es nas leis, ordens\
            \ executivas, diretivas, regulamentos, pol\xEDticas, normas e diretrizes\
            \ aplic\xE1veis. A simples repeti\xE7\xE3o dos controles n\xE3o constitui\
            \ uma pol\xEDtica ou um procedimento organizacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-2
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-2
      name: Separation of System and User Functionality
      description: Separate user functionality, including user interface services,
        from system management functionality.
      annotation: System management functionality includes functions that are necessary
        to administer databases, network components, workstations, or servers. These
        functions typically require privileged user access. The separation of user
        functions from system management functions is physical or logical. Organizations
        may separate system management functions from user functions by using different
        computers, instances of operating systems, central processing units, or network
        addresses; by employing virtualization techniques; or some combination of
        these or other methods. Separation of system management functions from user
        functions includes web administrative interfaces that employ separate authentication
        methods for users of any other system resources. Separation of system and
        user functions may include isolating administrative interfaces on different
        domains and with additional access controls. The separation of system and
        user functionality can be achieved by applying the systems security engineering
        design principles in SA-8, including SA-8(1), SA-8(3), SA-8(4), SA-8(10),
        SA-8(12), SA-8(13), SA-8(14), and SA-8(18).
      translations:
        pt:
          name: "Separa\xE7\xE3o de Funcionalidade de Sistema e de Usu\xE1rio"
          description: "Separar a funcionalidade de usu\xE1rio, incluindo servi\xE7\
            os de interface de usu\xE1rio, da funcionalidade de gerenciamento do sistema."
          annotation: "A funcionalidade de gerenciamento do sistema inclui fun\xE7\
            \xF5es necess\xE1rias para administrar bancos de dados, componentes de\
            \ rede, esta\xE7\xF5es de trabalho ou servidores. Essas fun\xE7\xF5es\
            \ normalmente exigem acesso de usu\xE1rio privilegiado. A separa\xE7\xE3\
            o das fun\xE7\xF5es de usu\xE1rio das fun\xE7\xF5es de gerenciamento do\
            \ sistema \xE9 f\xEDsica ou l\xF3gica. As organiza\xE7\xF5es podem separar\
            \ as fun\xE7\xF5es de gerenciamento do sistema das fun\xE7\xF5es de usu\xE1\
            rio usando computadores, inst\xE2ncias de sistemas operacionais, unidades\
            \ centrais de processamento ou endere\xE7os de rede diferentes; empregando\
            \ t\xE9cnicas de virtualiza\xE7\xE3o; ou alguma combina\xE7\xE3o desses\
            \ ou de outros m\xE9todos. A separa\xE7\xE3o das fun\xE7\xF5es de gerenciamento\
            \ do sistema das fun\xE7\xF5es de usu\xE1rio inclui interfaces administrativas\
            \ web que empregam m\xE9todos de autentica\xE7\xE3o separados para usu\xE1\
            rios de quaisquer outros recursos do sistema. A separa\xE7\xE3o das fun\xE7\
            \xF5es de sistema e de usu\xE1rio pode incluir o isolamento de interfaces\
            \ administrativas em dom\xEDnios diferentes e com controles de acesso\
            \ adicionais. A separa\xE7\xE3o da funcionalidade de sistema e de usu\xE1\
            rio pode ser alcan\xE7ada aplicando-se os princ\xEDpios de design de engenharia\
            \ de seguran\xE7a de sistemas em SA-8, incluindo SA-8(1), SA-8(3), SA-8(4),\
            \ SA-8(10), SA-8(12), SA-8(13), SA-8(14) e SA-8(18)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-2(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-2(1)
      name: Separation of System and User Functionality | Interfaces for Non-privileged
        Users
      description: Prevent the presentation of system management functionality at
        interfaces to non-privileged users.
      annotation: Preventing the presentation of system management functionality at
        interfaces to non-privileged users ensures that system administration options,
        including administrator privileges, are not available to the general user
        population. Restricting user access also prohibits the use of the grey-out
        option commonly used to eliminate accessibility to such information. One potential
        solution is to withhold system administration options until users establish
        sessions with administrator privileges.
      translations:
        pt:
          name: "Separa\xE7\xE3o de Funcionalidade de Sistema e de Usu\xE1rio | Interfaces\
            \ para Usu\xE1rios N\xE3o Privilegiados"
          description: "Impedir a apresenta\xE7\xE3o de funcionalidade de gerenciamento\
            \ do sistema em interfaces para usu\xE1rios n\xE3o privilegiados."
          annotation: "Impedir a apresenta\xE7\xE3o de funcionalidade de gerenciamento\
            \ do sistema em interfaces para usu\xE1rios n\xE3o privilegiados garante\
            \ que as op\xE7\xF5es de administra\xE7\xE3o do sistema, incluindo privil\xE9\
            gios de administrador, n\xE3o estejam dispon\xEDveis para a popula\xE7\
            \xE3o geral de usu\xE1rios. A restri\xE7\xE3o do acesso de usu\xE1rios\
            \ tamb\xE9m pro\xEDbe o uso da op\xE7\xE3o de esmaecimento (grey-out)\
            \ comumente usada para eliminar a acessibilidade a tais informa\xE7\xF5\
            es. Uma solu\xE7\xE3o potencial \xE9 reter as op\xE7\xF5es de administra\xE7\
            \xE3o do sistema at\xE9 que os usu\xE1rios estabele\xE7am sess\xF5es com\
            \ privil\xE9gios de administrador."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-2(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-2(2)
      name: Separation of System and User Functionality | Disassociability
      description: Store state information from applications and software separately.
      annotation: "If a system is compromised, storing applications and software separately\
        \ from state information about users\u2019 interactions with an application\
        \ may better protect individuals\u2019 privacy."
      translations:
        pt:
          name: "Separa\xE7\xE3o de Funcionalidade de Sistema e de Usu\xE1rio | Dissociabilidade"
          description: "Armazenar separadamente as informa\xE7\xF5es de estado de\
            \ aplica\xE7\xF5es e softwares."
          annotation: "Se um sistema for comprometido, armazenar as aplica\xE7\xF5\
            es e o software separadamente das informa\xE7\xF5es de estado sobre as\
            \ intera\xE7\xF5es dos usu\xE1rios com uma aplica\xE7\xE3o pode proteger\
            \ melhor a privacidade dos indiv\xEDduos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-3
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-3
      name: Security Function Isolation
      description: Isolate security functions from nonsecurity functions.
      annotation: Security functions are isolated from nonsecurity functions by means
        of an isolation boundary implemented within a system via partitions and domains.
        The isolation boundary controls access to and protects the integrity of the
        hardware, software, and firmware that perform system security functions. Systems
        implement code separation in many ways, such as through the provision of security
        kernels via processor rings or processor modes. For non-kernel code, security
        function isolation is often achieved through file system protections that
        protect the code on disk and address space protections that protect executing
        code. Systems can restrict access to security functions using access control
        mechanisms and by implementing least privilege capabilities. While the ideal
        is for all code within the defined security function isolation boundary to
        only contain security-relevant code, it is sometimes necessary to include
        nonsecurity functions as an exception. The isolation of security functions
        from nonsecurity functions can be achieved by applying the systems security
        engineering design principles in SA-8, including SA-8(1), SA-8(3), SA-8(4),
        SA-8(10), SA-8(12), SA-8(13), SA-8(14), and SA-8(18).
      translations:
        pt:
          name: "Isolamento de Fun\xE7\xE3o de Seguran\xE7a"
          description: "Isolar as fun\xE7\xF5es de seguran\xE7a das fun\xE7\xF5es\
            \ de n\xE3o seguran\xE7a."
          annotation: "As fun\xE7\xF5es de seguran\xE7a s\xE3o isoladas das fun\xE7\
            \xF5es de n\xE3o seguran\xE7a por meio de um limite de isolamento implementado\
            \ dentro de um sistema por meio de parti\xE7\xF5es e dom\xEDnios. O limite\
            \ de isolamento controla o acesso e protege a integridade do hardware,\
            \ software e firmware que executam as fun\xE7\xF5es de seguran\xE7a do\
            \ sistema. Os sistemas implementam a separa\xE7\xE3o de c\xF3digo de muitas\
            \ maneiras, como por meio do fornecimento de kernels de seguran\xE7a via\
            \ an\xE9is de processador ou modos de processador. Para c\xF3digo fora\
            \ do kernel, o isolamento da fun\xE7\xE3o de seguran\xE7a \xE9 frequentemente\
            \ alcan\xE7ado por meio de prote\xE7\xF5es do sistema de arquivos que\
            \ protegem o c\xF3digo em disco e prote\xE7\xF5es de espa\xE7o de endere\xE7\
            amento que protegem o c\xF3digo em execu\xE7\xE3o. Os sistemas podem restringir\
            \ o acesso \xE0s fun\xE7\xF5es de seguran\xE7a usando mecanismos de controle\
            \ de acesso e implementando capacidades de privil\xE9gio m\xEDnimo. Embora\
            \ o ideal seja que todo o c\xF3digo dentro do limite definido de isolamento\
            \ de fun\xE7\xE3o de seguran\xE7a contenha apenas c\xF3digo relevante\
            \ para a seguran\xE7a, \xE0s vezes \xE9 necess\xE1rio incluir fun\xE7\xF5\
            es de n\xE3o seguran\xE7a como exce\xE7\xE3o. O isolamento das fun\xE7\
            \xF5es de seguran\xE7a das fun\xE7\xF5es de n\xE3o seguran\xE7a pode ser\
            \ alcan\xE7ado aplicando-se os princ\xEDpios de design de engenharia de\
            \ seguran\xE7a de sistemas em SA-8, incluindo SA-8(1), SA-8(3), SA-8(4),\
            \ SA-8(10), SA-8(12), SA-8(13), SA-8(14) e SA-8(18)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-3(1)
      name: Security Function Isolation | Hardware Separation
      description: Employ hardware separation mechanisms to implement security function
        isolation.
      annotation: Hardware separation mechanisms include hardware ring architectures
        that are implemented within microprocessors and hardware-enforced address
        segmentation used to support logically distinct storage objects with separate
        attributes (i.e., readable, writeable).
      translations:
        pt:
          name: "Isolamento de Fun\xE7\xE3o de Seguran\xE7a | Separa\xE7\xE3o de Hardware"
          description: "Empregar mecanismos de separa\xE7\xE3o de hardware para implementar\
            \ o isolamento de fun\xE7\xE3o de seguran\xE7a."
          annotation: "Os mecanismos de separa\xE7\xE3o de hardware incluem arquiteturas\
            \ de anel de hardware que s\xE3o implementadas dentro de microprocessadores\
            \ e a segmenta\xE7\xE3o de endere\xE7os imposta por hardware usada para\
            \ suportar objetos de armazenamento logicamente distintos com atributos\
            \ separados (ou seja, leg\xEDvel, grav\xE1vel)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-3(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-3(2)
      name: Security Function Isolation | Access and Flow Control Functions
      description: Isolate security functions enforcing access and information flow
        control from nonsecurity functions and from other security functions.
      annotation: Security function isolation occurs because of implementation. The
        functions can still be scanned and monitored. Security functions that are
        potentially isolated from access and flow control enforcement functions include
        auditing, intrusion detection, and malicious code protection functions.
      translations:
        pt:
          name: "Isolamento de Fun\xE7\xE3o de Seguran\xE7a | Fun\xE7\xF5es de Controle\
            \ de Acesso e de Fluxo"
          description: "Isolar as fun\xE7\xF5es de seguran\xE7a que imp\xF5em o controle\
            \ de acesso e de fluxo de informa\xE7\xF5es das fun\xE7\xF5es de n\xE3\
            o seguran\xE7a e de outras fun\xE7\xF5es de seguran\xE7a."
          annotation: "O isolamento de fun\xE7\xE3o de seguran\xE7a ocorre em decorr\xEA\
            ncia da implementa\xE7\xE3o. As fun\xE7\xF5es ainda podem ser examinadas\
            \ e monitoradas. As fun\xE7\xF5es de seguran\xE7a que s\xE3o potencialmente\
            \ isoladas das fun\xE7\xF5es de imposi\xE7\xE3o de controle de acesso\
            \ e de fluxo incluem fun\xE7\xF5es de auditoria, detec\xE7\xE3o de intrus\xE3\
            o e prote\xE7\xE3o contra c\xF3digo malicioso."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-3(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-3(3)
      name: Security Function Isolation | Minimize Nonsecurity Functionality
      description: Minimize the number of nonsecurity functions included within the
        isolation boundary containing security functions.
      annotation: Where it is not feasible to achieve strict isolation of nonsecurity
        functions from security functions, it is necessary to take actions to minimize
        nonsecurity-relevant functions within the security function boundary. Nonsecurity
        functions contained within the isolation boundary are considered security-relevant
        because errors or malicious code in the software can directly impact the security
        functions of systems. The fundamental design objective is that the specific
        portions of systems that provide information security are of minimal size
        and complexity. Minimizing the number of nonsecurity functions in the security-relevant
        system components allows designers and implementers to focus only on those
        functions which are necessary to provide the desired security capability (typically
        access enforcement). By minimizing the nonsecurity functions within the isolation
        boundaries, the amount of code that is trusted to enforce security policies
        is significantly reduced, thus contributing to understandability.
      translations:
        pt:
          name: "Isolamento de Fun\xE7\xE3o de Seguran\xE7a | Minimizar Funcionalidade\
            \ de N\xE3o Seguran\xE7a"
          description: "Minimizar o n\xFAmero de fun\xE7\xF5es de n\xE3o seguran\xE7\
            a inclu\xEDdas dentro do limite de isolamento que cont\xE9m as fun\xE7\
            \xF5es de seguran\xE7a."
          annotation: "Onde n\xE3o for vi\xE1vel alcan\xE7ar o isolamento estrito\
            \ das fun\xE7\xF5es de n\xE3o seguran\xE7a das fun\xE7\xF5es de seguran\xE7\
            a, \xE9 necess\xE1rio tomar a\xE7\xF5es para minimizar as fun\xE7\xF5\
            es de n\xE3o seguran\xE7a dentro do limite da fun\xE7\xE3o de seguran\xE7\
            a. As fun\xE7\xF5es de n\xE3o seguran\xE7a contidas dentro do limite de\
            \ isolamento s\xE3o consideradas relevantes para a seguran\xE7a porque\
            \ erros ou c\xF3digo malicioso no software podem impactar diretamente\
            \ as fun\xE7\xF5es de seguran\xE7a dos sistemas. O objetivo fundamental\
            \ do design \xE9 que as por\xE7\xF5es espec\xEDficas dos sistemas que\
            \ fornecem seguran\xE7a da informa\xE7\xE3o sejam de tamanho e complexidade\
            \ m\xEDnimos. Minimizar o n\xFAmero de fun\xE7\xF5es de n\xE3o seguran\xE7\
            a nos componentes de sistema relevantes para a seguran\xE7a permite que\
            \ projetistas e implementadores se concentrem apenas nas fun\xE7\xF5es\
            \ que s\xE3o necess\xE1rias para fornecer a capacidade de seguran\xE7\
            a desejada (normalmente a imposi\xE7\xE3o de acesso). Ao minimizar as\
            \ fun\xE7\xF5es de n\xE3o seguran\xE7a dentro dos limites de isolamento,\
            \ a quantidade de c\xF3digo que \xE9 confi\xE1vel para impor as pol\xED\
            ticas de seguran\xE7a \xE9 significativamente reduzida, contribuindo assim\
            \ para a compreensibilidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-3(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-3(4)
      name: Security Function Isolation | Module Coupling and Cohesiveness
      description: Implement security functions as largely independent modules that
        maximize internal cohesiveness within modules and minimize coupling between
        modules.
      annotation: The reduction of inter-module interactions helps to constrain security
        functions and manage complexity. The concepts of coupling and cohesion are
        important with respect to modularity in software design. Coupling refers to
        the dependencies that one module has on other modules. Cohesion refers to
        the relationship between functions within a module. Best practices in software
        engineering and systems security engineering rely on layering, minimization,
        and modular decomposition to reduce and manage complexity. This produces software
        modules that are highly cohesive and loosely coupled.
      translations:
        pt:
          name: "Isolamento de Fun\xE7\xE3o de Seguran\xE7a | Acoplamento e Coes\xE3\
            o de M\xF3dulos"
          description: "Implementar as fun\xE7\xF5es de seguran\xE7a como m\xF3dulos\
            \ amplamente independentes que maximizam a coes\xE3o interna dentro dos\
            \ m\xF3dulos e minimizam o acoplamento entre os m\xF3dulos."
          annotation: "A redu\xE7\xE3o das intera\xE7\xF5es entre m\xF3dulos ajuda\
            \ a restringir as fun\xE7\xF5es de seguran\xE7a e a gerenciar a complexidade.\
            \ Os conceitos de acoplamento e coes\xE3o s\xE3o importantes no que diz\
            \ respeito \xE0 modularidade no design de software. O acoplamento refere-se\
            \ \xE0s depend\xEAncias que um m\xF3dulo tem em rela\xE7\xE3o a outros\
            \ m\xF3dulos. A coes\xE3o refere-se \xE0 rela\xE7\xE3o entre as fun\xE7\
            \xF5es dentro de um m\xF3dulo. As melhores pr\xE1ticas em engenharia de\
            \ software e engenharia de seguran\xE7a de sistemas baseiam-se em camadas,\
            \ minimiza\xE7\xE3o e decomposi\xE7\xE3o modular para reduzir e gerenciar\
            \ a complexidade. Isso produz m\xF3dulos de software que s\xE3o altamente\
            \ coesos e fracamente acoplados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-3(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-3(5)
      name: Security Function Isolation | Layered Structures
      description: Implement security functions as a layered structure minimizing
        interactions between layers of the design and avoiding any dependence by lower
        layers on the functionality or correctness of higher layers.
      annotation: The implementation of layered structures with minimized interactions
        among security functions and non-looping layers (i.e., lower-layer functions
        do not depend on higher-layer functions) enables the isolation of security
        functions and the management of complexity.
      translations:
        pt:
          name: "Isolamento de Fun\xE7\xE3o de Seguran\xE7a | Estruturas em Camadas"
          description: "Implementar as fun\xE7\xF5es de seguran\xE7a como uma estrutura\
            \ em camadas que minimize as intera\xE7\xF5es entre as camadas do design\
            \ e evite qualquer depend\xEAncia das camadas inferiores em rela\xE7\xE3\
            o \xE0 funcionalidade ou corre\xE7\xE3o das camadas superiores."
          annotation: "A implementa\xE7\xE3o de estruturas em camadas com intera\xE7\
            \xF5es minimizadas entre as fun\xE7\xF5es de seguran\xE7a e camadas sem\
            \ la\xE7os (ou seja, fun\xE7\xF5es de camada inferior n\xE3o dependem\
            \ de fun\xE7\xF5es de camada superior) permite o isolamento das fun\xE7\
            \xF5es de seguran\xE7a e o gerenciamento da complexidade."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-4
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-4
      name: Information in Shared System Resources
      description: Prevent unauthorized and unintended information transfer via shared
        system resources.
      annotation: Preventing unauthorized and unintended information transfer via
        shared system resources stops information produced by the actions of prior
        users or roles (or the actions of processes acting on behalf of prior users
        or roles) from being available to current users or roles (or current processes
        acting on behalf of current users or roles) that obtain access to shared system
        resources after those resources have been released back to the system. Information
        in shared system resources also applies to encrypted representations of information.
        In other contexts, control of information in shared system resources is referred
        to as object reuse and residual information protection. Information in shared
        system resources does not address information remanence, which refers to the
        residual representation of data that has been nominally deleted; covert channels
        (including storage and timing channels), where shared system resources are
        manipulated to violate information flow restrictions; or components within
        systems for which there are only single users or roles.
      translations:
        pt:
          name: "Informa\xE7\xF5es em Recursos Compartilhados do Sistema"
          description: "Impedir a transfer\xEAncia n\xE3o autorizada e n\xE3o intencional\
            \ de informa\xE7\xF5es por meio de recursos compartilhados do sistema."
          annotation: "Impedir a transfer\xEAncia n\xE3o autorizada e n\xE3o intencional\
            \ de informa\xE7\xF5es por meio de recursos compartilhados do sistema\
            \ impede que informa\xE7\xF5es produzidas pelas a\xE7\xF5es de usu\xE1\
            rios ou pap\xE9is anteriores (ou pelas a\xE7\xF5es de processos atuando\
            \ em nome de usu\xE1rios ou pap\xE9is anteriores) fiquem dispon\xEDveis\
            \ para usu\xE1rios ou pap\xE9is atuais (ou processos atuais atuando em\
            \ nome de usu\xE1rios ou pap\xE9is atuais) que obt\xEAm acesso aos recursos\
            \ compartilhados do sistema depois que esses recursos foram liberados\
            \ de volta ao sistema. As informa\xE7\xF5es em recursos compartilhados\
            \ do sistema tamb\xE9m se aplicam a representa\xE7\xF5es criptografadas\
            \ de informa\xE7\xF5es. Em outros contextos, o controle de informa\xE7\
            \xF5es em recursos compartilhados do sistema \xE9 referido como reutiliza\xE7\
            \xE3o de objeto e prote\xE7\xE3o de informa\xE7\xE3o residual. As informa\xE7\
            \xF5es em recursos compartilhados do sistema n\xE3o abordam a reman\xEA\
            ncia de informa\xE7\xF5es, que se refere \xE0 representa\xE7\xE3o residual\
            \ de dados que foram nominalmente exclu\xEDdos; canais ocultos (incluindo\
            \ canais de armazenamento e de temporiza\xE7\xE3o), nos quais os recursos\
            \ compartilhados do sistema s\xE3o manipulados para violar restri\xE7\xF5\
            es de fluxo de informa\xE7\xF5es; ou componentes dentro de sistemas para\
            \ os quais h\xE1 apenas usu\xE1rios ou pap\xE9is \xFAnicos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12(4)
      name: Cryptographic Key Establishment and Management | PKI Certificates
      description: '[Withdrawn: Incorporated into SC-12(3).]'
      translations:
        pt:
          name: "Estabelecimento e Gerenciamento de Chaves Criptogr\xE1ficas | Certificados\
            \ PKI"
          description: '[Retirado: Incorporado em SC-12(3).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-4(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-4(2)
      name: Information in Shared System Resources | Multilevel or Periods Processing
      description: 'Prevent unauthorized information transfer via shared resources
        in accordance with [Assignment: organization-defined procedures] when system
        processing explicitly switches between different information classification
        levels or security categories.'
      annotation: Changes in processing levels can occur during multilevel or periods
        processing with information at different classification levels or security
        categories. It can also occur during serial reuse of hardware components at
        different classification levels. Organization-defined procedures can include
        approved sanitization processes for electronically stored information.
      translations:
        pt:
          name: "Informa\xE7\xF5es em Recursos Compartilhados do Sistema | Processamento\
            \ Multin\xEDvel ou por Per\xEDodos"
          description: "Impedir a transfer\xEAncia n\xE3o autorizada de informa\xE7\
            \xF5es por meio de recursos compartilhados de acordo com [Atribui\xE7\xE3\
            o: procedimentos definidos pela organiza\xE7\xE3o] quando o processamento\
            \ do sistema alterna explicitamente entre diferentes n\xEDveis de classifica\xE7\
            \xE3o de informa\xE7\xF5es ou categorias de seguran\xE7a."
          annotation: "Mudan\xE7as nos n\xEDveis de processamento podem ocorrer durante\
            \ o processamento multin\xEDvel ou por per\xEDodos com informa\xE7\xF5\
            es em diferentes n\xEDveis de classifica\xE7\xE3o ou categorias de seguran\xE7\
            a. Tamb\xE9m podem ocorrer durante a reutiliza\xE7\xE3o serial de componentes\
            \ de hardware em diferentes n\xEDveis de classifica\xE7\xE3o. Os procedimentos\
            \ definidos pela organiza\xE7\xE3o podem incluir processos de sanitiza\xE7\
            \xE3o aprovados para informa\xE7\xF5es armazenadas eletronicamente."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-5
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-5
      name: Denial-of-service Protection
      description: 'a. [Selection: Protect against; Limit] the effects of the following
        types of denial-of-service events: [Assignment: organization-defined types
        of denial-of-service events]; and

        b. Employ the following controls to achieve the denial-of-service objective:
        [Assignment: organization-defined controls by type of denial-of-service event].'
      annotation: Denial-of-service events may occur due to a variety of internal
        and external causes, such as an attack by an adversary or a lack of planning
        to support organizational needs with respect to capacity and bandwidth. Such
        attacks can occur across a wide range of network protocols (e.g., IPv4, IPv6).
        A variety of technologies are available to limit or eliminate the origination
        and effects of denial-of-service events. For example, boundary protection
        devices can filter certain types of packets to protect system components on
        internal networks from being directly affected by or the source of denial-of-service
        attacks. Employing increased network capacity and bandwidth combined with
        service redundancy also reduces the susceptibility to denial-of-service events.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Nega\xE7\xE3o de Servi\xE7o"
          description: "a. [Sele\xE7\xE3o: Proteger contra; Limitar] os efeitos dos\
            \ seguintes tipos de eventos de nega\xE7\xE3o de servi\xE7o: [Atribui\xE7\
            \xE3o: tipos de eventos de nega\xE7\xE3o de servi\xE7o definidos pela\
            \ organiza\xE7\xE3o]; e\nb. Empregar os seguintes controles para alcan\xE7\
            ar o objetivo de nega\xE7\xE3o de servi\xE7o: [Atribui\xE7\xE3o: controles\
            \ definidos pela organiza\xE7\xE3o por tipo de evento de nega\xE7\xE3\
            o de servi\xE7o]."
          annotation: "Eventos de nega\xE7\xE3o de servi\xE7o podem ocorrer devido\
            \ a uma variedade de causas internas e externas, como um ataque por um\
            \ advers\xE1rio ou a falta de planejamento para atender \xE0s necessidades\
            \ organizacionais em rela\xE7\xE3o \xE0 capacidade e \xE0 largura de banda.\
            \ Tais ataques podem ocorrer em uma ampla gama de protocolos de rede (por\
            \ exemplo, IPv4, IPv6). Uma variedade de tecnologias est\xE1 dispon\xED\
            vel para limitar ou eliminar a origem e os efeitos de eventos de nega\xE7\
            \xE3o de servi\xE7o. Por exemplo, dispositivos de prote\xE7\xE3o de limite\
            \ podem filtrar certos tipos de pacotes para proteger os componentes do\
            \ sistema em redes internas de serem diretamente afetados por ataques\
            \ de nega\xE7\xE3o de servi\xE7o ou de serem a fonte deles. Empregar maior\
            \ capacidade e largura de banda de rede combinadas com a redund\xE2ncia\
            \ de servi\xE7o tamb\xE9m reduz a suscetibilidade a eventos de nega\xE7\
            \xE3o de servi\xE7o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-5(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-5(1)
      name: Denial-of-service Protection | Restrict Ability to Attack Other Systems
      description: 'Restrict the ability of individuals to launch the following denial-of-service
        attacks against other systems: [Assignment: organization-defined denial-of-service
        attacks].'
      annotation: Restricting the ability of individuals to launch denial-of-service
        attacks requires the mechanisms commonly used for such attacks to be unavailable.
        Individuals of concern include hostile insiders or external adversaries who
        have breached or compromised the system and are using it to launch a denial-of-service
        attack. Organizations can restrict the ability of individuals to connect and
        transmit arbitrary information on the transport medium (i.e., wired networks,
        wireless networks, spoofed Internet protocol packets). Organizations can also
        limit the ability of individuals to use excessive system resources. Protection
        against individuals having the ability to launch denial-of-service attacks
        may be implemented on specific systems or boundary devices that prohibit egress
        to potential target systems.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Nega\xE7\xE3o de Servi\xE7o | Restringir Capacidade\
            \ de Atacar Outros Sistemas"
          description: "Restringir a capacidade dos indiv\xEDduos de lan\xE7ar os\
            \ seguintes ataques de nega\xE7\xE3o de servi\xE7o contra outros sistemas:\
            \ [Atribui\xE7\xE3o: ataques de nega\xE7\xE3o de servi\xE7o definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "Restringir a capacidade dos indiv\xEDduos de lan\xE7ar ataques\
            \ de nega\xE7\xE3o de servi\xE7o requer que os mecanismos comumente usados\
            \ para tais ataques estejam indispon\xEDveis. Os indiv\xEDduos de interesse\
            \ incluem agentes internos hostis ou advers\xE1rios externos que violaram\
            \ ou comprometeram o sistema e o est\xE3o usando para lan\xE7ar um ataque\
            \ de nega\xE7\xE3o de servi\xE7o. As organiza\xE7\xF5es podem restringir\
            \ a capacidade dos indiv\xEDduos de se conectar e transmitir informa\xE7\
            \xF5es arbitr\xE1rias no meio de transporte (ou seja, redes cabeadas,\
            \ redes sem fio, pacotes de protocolo de Internet falsificados). As organiza\xE7\
            \xF5es tamb\xE9m podem limitar a capacidade dos indiv\xEDduos de usar\
            \ recursos excessivos do sistema. A prote\xE7\xE3o contra indiv\xEDduos\
            \ com a capacidade de lan\xE7ar ataques de nega\xE7\xE3o de servi\xE7\
            o pode ser implementada em sistemas espec\xEDficos ou em dispositivos\
            \ de limite que pro\xEDbem a sa\xEDda (egress) para sistemas-alvo potenciais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-5(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-5(2)
      name: Denial-of-service Protection | Capacity, Bandwidth, and Redundancy
      description: Manage capacity, bandwidth, or other redundancy to limit the effects
        of information flooding denial-of-service attacks.
      annotation: Managing capacity ensures that sufficient capacity is available
        to counter flooding attacks. Managing capacity includes establishing selected
        usage priorities, quotas, partitioning, or load balancing.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Nega\xE7\xE3o de Servi\xE7o | Capacidade, Largura\
            \ de Banda e Redund\xE2ncia"
          description: "Gerenciar capacidade, largura de banda ou outra redund\xE2\
            ncia para limitar os efeitos de ataques de nega\xE7\xE3o de servi\xE7\
            o por inunda\xE7\xE3o de informa\xE7\xF5es."
          annotation: "O gerenciamento da capacidade garante que haja capacidade suficiente\
            \ dispon\xEDvel para conter ataques de inunda\xE7\xE3o. O gerenciamento\
            \ da capacidade inclui o estabelecimento de prioridades de uso selecionadas,\
            \ cotas, particionamento ou balanceamento de carga."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-5(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-5(3)
      name: Denial-of-service Protection | Detection and Monitoring
      description: '(a) Employ the following monitoring tools to detect indicators
        of denial-of-service attacks against, or launched from, the system: [Assignment:
        organization-defined monitoring tools]; and

        (b) Monitor the following system resources to determine if sufficient resources
        exist to prevent effective denial-of-service attacks: [Assignment: organization-defined
        system resources].'
      annotation: Organizations consider the utilization and capacity of system resources
        when managing risk associated with a denial of service due to malicious attacks.
        Denial-of-service attacks can originate from external or internal sources.
        System resources that are sensitive to denial of service include physical
        disk storage, memory, and CPU cycles. Techniques used to prevent denial-of-service
        attacks related to storage utilization and capacity include instituting disk
        quotas, configuring systems to automatically alert administrators when specific
        storage capacity thresholds are reached, using file compression technologies
        to maximize available storage space, and imposing separate partitions for
        system and user data.
      translations:
        pt:
          name: "Prote\xE7\xE3o contra Nega\xE7\xE3o de Servi\xE7o | Detec\xE7\xE3\
            o e Monitoramento"
          description: "(a) Empregar as seguintes ferramentas de monitoramento para\
            \ detectar indicadores de ataques de nega\xE7\xE3o de servi\xE7o contra\
            \ o sistema, ou lan\xE7ados a partir dele: [Atribui\xE7\xE3o: ferramentas\
            \ de monitoramento definidas pela organiza\xE7\xE3o]; e\n(b) Monitorar\
            \ os seguintes recursos do sistema para determinar se existem recursos\
            \ suficientes para prevenir ataques de nega\xE7\xE3o de servi\xE7o eficazes:\
            \ [Atribui\xE7\xE3o: recursos do sistema definidos pela organiza\xE7\xE3\
            o]."
          annotation: "As organiza\xE7\xF5es consideram a utiliza\xE7\xE3o e a capacidade\
            \ dos recursos do sistema ao gerenciar o risco associado a uma nega\xE7\
            \xE3o de servi\xE7o decorrente de ataques maliciosos. Os ataques de nega\xE7\
            \xE3o de servi\xE7o podem ter origem em fontes externas ou internas. Os\
            \ recursos do sistema sens\xEDveis \xE0 nega\xE7\xE3o de servi\xE7o incluem\
            \ armazenamento em disco f\xEDsico, mem\xF3ria e ciclos de CPU. As t\xE9\
            cnicas usadas para prevenir ataques de nega\xE7\xE3o de servi\xE7o relacionados\
            \ \xE0 utiliza\xE7\xE3o e \xE0 capacidade de armazenamento incluem instituir\
            \ cotas de disco, configurar sistemas para alertar automaticamente os\
            \ administradores quando determinados limiares de capacidade de armazenamento\
            \ forem atingidos, usar tecnologias de compress\xE3o de arquivos para\
            \ maximizar o espa\xE7o de armazenamento dispon\xEDvel e impor parti\xE7\
            \xF5es separadas para dados de sistema e de usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-6
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-6
      name: Resource Availability
      description: 'Protect the availability of resources by allocating [Assignment:
        organization-defined resources] by [Selection (one or more): priority; quota;
        [Assignment: organization-defined controls]].'
      annotation: Priority protection prevents lower-priority processes from delaying
        or interfering with the system that services higher-priority processes. Quotas
        prevent users or processes from obtaining more than predetermined amounts
        of resources.
      translations:
        pt:
          name: Disponibilidade de Recursos
          description: "Proteger a disponibilidade de recursos alocando [Atribui\xE7\
            \xE3o: recursos definidos pela organiza\xE7\xE3o] por [Sele\xE7\xE3o (uma\
            \ ou mais): prioridade; cota; [Atribui\xE7\xE3o: controles definidos pela\
            \ organiza\xE7\xE3o]]."
          annotation: "A prote\xE7\xE3o por prioridade impede que processos de menor\
            \ prioridade atrasem ou interfiram no sistema que atende processos de\
            \ maior prioridade. As cotas impedem que usu\xE1rios ou processos obtenham\
            \ mais do que quantidades predeterminadas de recursos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7
      name: Boundary Protection
      description: 'a. Monitor and control communications at the external managed
        interfaces to the system and at key internal managed interfaces within the
        system;

        b. Implement subnetworks for publicly accessible system components that are
        [Selection: physically; logically] separated from internal organizational
        networks; and

        c. Connect to external networks or systems only through managed interfaces
        consisting of boundary protection devices arranged in accordance with an organizational
        security and privacy architecture.'
      annotation: Managed interfaces include gateways, routers, firewalls, guards,
        network-based malicious code analysis, virtualization systems, or encrypted
        tunnels implemented within a security architecture. Subnetworks that are physically
        or logically separated from internal networks are referred to as demilitarized
        zones or DMZs. Restricting or prohibiting interfaces within organizational
        systems includes restricting external web traffic to designated web servers
        within managed interfaces, prohibiting external traffic that appears to be
        spoofing internal addresses, and prohibiting internal traffic that appears
        to be spoofing external addresses. SP 800-189 provides additional information
        on source address validation techniques to prevent ingress and egress of traffic
        with spoofed addresses. Commercial telecommunications services are provided
        by network components and consolidated management systems shared by customers.
        These services may also include third party-provided access lines and other
        service elements. Such services may represent sources of increased risk despite
        contract security provisions. Boundary protection may be implemented as a
        common control for all or part of an organizational network such that the
        boundary to be protected is greater than a system-specific boundary (i.e.,
        an authorization boundary).
      translations:
        pt:
          name: "Prote\xE7\xE3o de Limite"
          description: "a. Monitorar e controlar as comunica\xE7\xF5es nas interfaces\
            \ gerenciadas externas ao sistema e nas principais interfaces gerenciadas\
            \ internas dentro do sistema;\nb. Implementar sub-redes para componentes\
            \ do sistema acess\xEDveis publicamente que sejam [Sele\xE7\xE3o: fisicamente;\
            \ logicamente] separados das redes organizacionais internas; e\nc. Conectar-se\
            \ a redes ou sistemas externos somente por meio de interfaces gerenciadas\
            \ que consistam em dispositivos de prote\xE7\xE3o de limite dispostos\
            \ de acordo com uma arquitetura organizacional de seguran\xE7a e privacidade."
          annotation: "As interfaces gerenciadas incluem gateways, roteadores, firewalls,\
            \ guardi\xF5es (guards), an\xE1lise de c\xF3digo malicioso baseada em\
            \ rede, sistemas de virtualiza\xE7\xE3o ou t\xFAneis criptografados implementados\
            \ dentro de uma arquitetura de seguran\xE7a. As sub-redes que s\xE3o f\xED\
            sica ou logicamente separadas das redes internas s\xE3o referidas como\
            \ zonas desmilitarizadas ou DMZs. Restringir ou proibir interfaces dentro\
            \ dos sistemas organizacionais inclui restringir o tr\xE1fego web externo\
            \ a servidores web designados dentro de interfaces gerenciadas, proibir\
            \ tr\xE1fego externo que pare\xE7a estar falsificando endere\xE7os internos\
            \ e proibir tr\xE1fego interno que pare\xE7a estar falsificando endere\xE7\
            os externos. O SP 800-189 fornece informa\xE7\xF5es adicionais sobre t\xE9\
            cnicas de valida\xE7\xE3o de endere\xE7o de origem para prevenir a entrada\
            \ (ingress) e a sa\xEDda (egress) de tr\xE1fego com endere\xE7os falsificados.\
            \ Os servi\xE7os de telecomunica\xE7\xF5es comerciais s\xE3o fornecidos\
            \ por componentes de rede e sistemas de gerenciamento consolidados compartilhados\
            \ pelos clientes. Esses servi\xE7os tamb\xE9m podem incluir linhas de\
            \ acesso fornecidas por terceiros e outros elementos de servi\xE7o. Tais\
            \ servi\xE7os podem representar fontes de risco aumentado, apesar das\
            \ cl\xE1usulas contratuais de seguran\xE7a. A prote\xE7\xE3o de limite\
            \ pode ser implementada como um controle comum para toda ou parte de uma\
            \ rede organizacional, de modo que o limite a ser protegido seja maior\
            \ do que um limite espec\xEDfico do sistema (ou seja, um limite de autoriza\xE7\
            \xE3o)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12(5)
      name: Cryptographic Key Establishment and Management | PKI Certificates / Hardware
        Tokens
      description: '[Withdrawn: Incorporated into SC-12(3).]'
      translations:
        pt:
          name: "Estabelecimento e Gerenciamento de Chaves Criptogr\xE1ficas | Certificados\
            \ PKI / Tokens de Hardware"
          description: '[Retirado: Incorporado em SC-12(3).]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-13(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-13(1)
      name: Cryptographic Protection | FIPS-validated Cryptography
      description: '[Withdrawn: Incorporated into SC-13.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o Criptogr\xE1fica | Criptografia Validada por FIPS"
          description: '[Retirado: Incorporado em SC-13.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(3)
      name: Boundary Protection | Access Points
      description: Limit the number of external network connections to the system.
      annotation: Limiting the number of external network connections facilitates
        monitoring of inbound and outbound communications traffic. The Trusted Internet
        Connection DHS TIC initiative is an example of a federal guideline that requires
        limits on the number of external network connections. Limiting the number
        of external network connections to the system is  important during transition
        periods from older to newer technologies (e.g., transitioning from IPv4 to
        IPv6 network protocols). Such transitions may require implementing the older
        and newer technologies simultaneously during the transition period and thus
        increase the number of access points to the system.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Limite | Pontos de Acesso"
          description: "Limitar o n\xFAmero de conex\xF5es de rede externas ao sistema."
          annotation: "Limitar o n\xFAmero de conex\xF5es de rede externas facilita\
            \ o monitoramento do tr\xE1fego de comunica\xE7\xF5es de entrada e de\
            \ sa\xEDda. A iniciativa Trusted Internet Connection (TIC) do DHS \xE9\
            \ um exemplo de diretriz federal que exige limites no n\xFAmero de conex\xF5\
            es de rede externas. Limitar o n\xFAmero de conex\xF5es de rede externas\
            \ ao sistema \xE9 importante durante per\xEDodos de transi\xE7\xE3o de\
            \ tecnologias mais antigas para mais novas (por exemplo, na transi\xE7\
            \xE3o dos protocolos de rede IPv4 para IPv6). Tais transi\xE7\xF5es podem\
            \ exigir a implementa\xE7\xE3o simult\xE2nea das tecnologias mais antigas\
            \ e mais novas durante o per\xEDodo de transi\xE7\xE3o e, assim, aumentar\
            \ o n\xFAmero de pontos de acesso ao sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(4)
      name: Boundary Protection | External Telecommunications Services
      description: '(a) Implement a managed interface for each external telecommunication
        service;

        (b) Establish a traffic flow policy for each managed interface;

        (c) Protect the confidentiality and integrity of the information being transmitted
        across each interface;

        (d) Document each exception to the traffic flow policy with a supporting mission
        or business need and duration of that need;

        (e) Review exceptions to the traffic flow policy [Assignment: organization-defined
        frequency] and remove exceptions that are no longer supported by an explicit
        mission or business need;

        (f) Prevent unauthorized exchange of control plane traffic with external networks;

        (g) Publish information to enable remote networks to detect unauthorized control
        plane traffic from internal networks; and

        (h) Filter unauthorized control plane traffic from external networks.'
      annotation: External telecommunications services can provide data and/or voice
        communications services. Examples of control plane traffic include Border
        Gateway Protocol (BGP) routing, Domain Name System (DNS), and management protocols.
        See SP 800-189 for additional information on the use of the resource public
        key infrastructure (RPKI) to protect BGP routes and detect unauthorized BGP
        announcements.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Servi\xE7os de Telecomunica\xE7\xF5\
            es Externos"
          description: "(a) Implementar uma interface gerenciada para cada servi\xE7\
            o de telecomunica\xE7\xF5es externo;\n(b) Estabelecer uma pol\xEDtica\
            \ de fluxo de tr\xE1fego para cada interface gerenciada;\n(c) Proteger\
            \ a confidencialidade e a integridade das informa\xE7\xF5es que est\xE3\
            o sendo transmitidas atrav\xE9s de cada interface;\n(d) Documentar cada\
            \ exce\xE7\xE3o \xE0 pol\xEDtica de fluxo de tr\xE1fego com uma necessidade\
            \ de miss\xE3o ou de neg\xF3cio que a justifique e a dura\xE7\xE3o dessa\
            \ necessidade;\n(e) Revisar as exce\xE7\xF5es \xE0 pol\xEDtica de fluxo\
            \ de tr\xE1fego [Atribui\xE7\xE3o: frequ\xEAncia definida pela organiza\xE7\
            \xE3o] e remover as exce\xE7\xF5es que n\xE3o sejam mais sustentadas por\
            \ uma necessidade expl\xEDcita de miss\xE3o ou de neg\xF3cio;\n(f) Impedir\
            \ a troca n\xE3o autorizada de tr\xE1fego do plano de controle com redes\
            \ externas;\n(g) Publicar informa\xE7\xF5es para permitir que redes remotas\
            \ detectem tr\xE1fego n\xE3o autorizado do plano de controle proveniente\
            \ de redes internas; e\n(h) Filtrar o tr\xE1fego n\xE3o autorizado do\
            \ plano de controle proveniente de redes externas."
          annotation: "Os servi\xE7os de telecomunica\xE7\xF5es externos podem fornecer\
            \ servi\xE7os de comunica\xE7\xE3o de dados e/ou de voz. Exemplos de tr\xE1\
            fego do plano de controle incluem roteamento Border Gateway Protocol (BGP),\
            \ Domain Name System (DNS) e protocolos de gerenciamento. Consulte a SP\
            \ 800-189 para informa\xE7\xF5es adicionais sobre o uso da infraestrutura\
            \ de chaves p\xFAblicas de recursos (RPKI) para proteger rotas BGP e detectar\
            \ an\xFAncios BGP n\xE3o autorizados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(5)
      name: "Boundary Protection | Deny by Default \u2014 Allow by Exception"
      description: 'Deny network communications traffic by default and allow network
        communications traffic by exception [Selection (one or more): at managed interfaces;
        for [Assignment: organization-defined systems]].'
      annotation: Denying by default and allowing by exception applies to inbound
        and outbound network communications traffic. A deny-all, permit-by-exception
        network communications traffic policy ensures that only those system connections
        that are essential and approved are allowed. Deny by default, allow by exception
        also applies to a system that is connected to an external system.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Negar por Padr\xE3o \u2014 Permitir\
            \ por Exce\xE7\xE3o"
          description: "Negar o tr\xE1fego de comunica\xE7\xF5es de rede por padr\xE3\
            o e permitir o tr\xE1fego de comunica\xE7\xF5es de rede por exce\xE7\xE3\
            o [Sele\xE7\xE3o (um ou mais): em interfaces gerenciadas; para [Atribui\xE7\
            \xE3o: sistemas definidos pela organiza\xE7\xE3o]]."
          annotation: "Negar por padr\xE3o e permitir por exce\xE7\xE3o aplica-se\
            \ ao tr\xE1fego de comunica\xE7\xF5es de rede de entrada e de sa\xEDda.\
            \ Uma pol\xEDtica de tr\xE1fego de comunica\xE7\xF5es de rede do tipo\
            \ negar tudo, permitir por exce\xE7\xE3o garante que apenas as conex\xF5\
            es de sistema que sejam essenciais e aprovadas sejam permitidas. Negar\
            \ por padr\xE3o, permitir por exce\xE7\xE3o tamb\xE9m se aplica a um sistema\
            \ que esteja conectado a um sistema externo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-13(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-13(2)
      name: Cryptographic Protection | NSA-approved Cryptography
      description: '[Withdrawn: Incorporated into SC-13.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o Criptogr\xE1fica | Criptografia Aprovada pela NSA"
          description: '[Retirado: Incorporado ao SC-13.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(7)
      name: Boundary Protection | Split Tunneling for Remote Devices
      description: 'Prevent split tunneling for remote devices connecting to organizational
        systems unless the split tunnel is securely provisioned using [Assignment:
        organization-defined safeguards].'
      annotation: Split tunneling is the process of allowing a remote user or device
        to establish a non-remote connection with a system and simultaneously communicate
        via some other connection to a resource in an external network. This method
        of network access enables a user to access remote devices and simultaneously,
        access uncontrolled networks. Split tunneling might be desirable by remote
        users to communicate with local system resources, such as printers or file
        servers. However, split tunneling can facilitate unauthorized external connections,
        making the system vulnerable to attack and to exfiltration of organizational
        information. Split tunneling can be prevented by disabling configuration settings
        that allow such capability in remote devices and by preventing those configuration
        settings from being configurable by users. Prevention can also be achieved
        by the detection of split tunneling (or of configuration settings that allow
        split tunneling) in the remote device, and by prohibiting the connection if
        the remote device is using split tunneling. A virtual private network (VPN)
        can be used to securely provision a split tunnel. A securely provisioned VPN
        includes locking connectivity to exclusive, managed, and named environments,
        or to a specific set of pre-approved addresses, without user control.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Tunelamento Dividido para Dispositivos\
            \ Remotos"
          description: "Impedir o tunelamento dividido (split tunneling) para dispositivos\
            \ remotos que se conectam a sistemas organizacionais, a menos que o t\xFA\
            nel dividido seja provisionado de forma segura usando [Atribui\xE7\xE3\
            o: salvaguardas definidas pela organiza\xE7\xE3o]."
          annotation: "O tunelamento dividido \xE9 o processo de permitir que um usu\xE1\
            rio ou dispositivo remoto estabele\xE7a uma conex\xE3o n\xE3o remota com\
            \ um sistema e, simultaneamente, comunique-se por meio de alguma outra\
            \ conex\xE3o com um recurso em uma rede externa. Esse m\xE9todo de acesso\
            \ \xE0 rede permite que um usu\xE1rio acesse dispositivos remotos e, simultaneamente,\
            \ acesse redes n\xE3o controladas. O tunelamento dividido pode ser desej\xE1\
            vel para usu\xE1rios remotos se comunicarem com recursos locais do sistema,\
            \ como impressoras ou servidores de arquivos. No entanto, o tunelamento\
            \ dividido pode facilitar conex\xF5es externas n\xE3o autorizadas, tornando\
            \ o sistema vulner\xE1vel a ataques e \xE0 exfiltra\xE7\xE3o de informa\xE7\
            \xF5es organizacionais. O tunelamento dividido pode ser impedido desabilitando-se\
            \ as configura\xE7\xF5es que permitem tal capacidade nos dispositivos\
            \ remotos e impedindo que essas configura\xE7\xF5es possam ser alteradas\
            \ pelos usu\xE1rios. A preven\xE7\xE3o tamb\xE9m pode ser alcan\xE7ada\
            \ pela detec\xE7\xE3o do tunelamento dividido (ou de configura\xE7\xF5\
            es que permitam o tunelamento dividido) no dispositivo remoto e pela proibi\xE7\
            \xE3o da conex\xE3o caso o dispositivo remoto esteja usando tunelamento\
            \ dividido. Uma rede privada virtual (VPN) pode ser usada para provisionar\
            \ de forma segura um t\xFAnel dividido. Uma VPN provisionada de forma\
            \ segura inclui o bloqueio da conectividade a ambientes exclusivos, gerenciados\
            \ e nomeados, ou a um conjunto espec\xEDfico de endere\xE7os previamente\
            \ aprovados, sem controle do usu\xE1rio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(8)
      name: Boundary Protection | Route Traffic to Authenticated Proxy Servers
      description: 'Route [Assignment: organization-defined internal communications
        traffic] to [Assignment: organization-defined external networks] through authenticated
        proxy servers at managed interfaces.'
      annotation: External networks are networks outside of organizational control.
        A proxy server is a server (i.e., system or application) that acts as an intermediary
        for clients requesting system resources from non-organizational or other organizational
        servers. System resources that may be requested include files, connections,
        web pages, or services. Client requests established through a connection to
        a proxy server are assessed to manage complexity and provide additional protection
        by limiting direct connectivity. Web content filtering devices are one of
        the most common proxy servers that provide access to the Internet. Proxy servers
        can support the logging of Transmission Control Protocol sessions and the
        blocking of specific Uniform Resource Locators, Internet Protocol addresses,
        and domain names. Web proxies can be configured with organization-defined
        lists of authorized and unauthorized websites. Note that proxy servers may
        inhibit the use of virtual private networks (VPNs) and create the potential
        for man-in-the-middle attacks (depending on the implementation).
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Encaminhar Tr\xE1fego para Servidores\
            \ Proxy Autenticados"
          description: "Encaminhar [Atribui\xE7\xE3o: tr\xE1fego de comunica\xE7\xF5\
            es internas definido pela organiza\xE7\xE3o] para [Atribui\xE7\xE3o: redes\
            \ externas definidas pela organiza\xE7\xE3o] atrav\xE9s de servidores\
            \ proxy autenticados em interfaces gerenciadas."
          annotation: "Redes externas s\xE3o redes fora do controle organizacional.\
            \ Um servidor proxy \xE9 um servidor (isto \xE9, sistema ou aplica\xE7\
            \xE3o) que atua como intermedi\xE1rio para clientes que solicitam recursos\
            \ do sistema a servidores n\xE3o organizacionais ou a outros servidores\
            \ organizacionais. Os recursos do sistema que podem ser solicitados incluem\
            \ arquivos, conex\xF5es, p\xE1ginas web ou servi\xE7os. As solicita\xE7\
            \xF5es de clientes estabelecidas por meio de uma conex\xE3o com um servidor\
            \ proxy s\xE3o avaliadas para gerenciar a complexidade e fornecer prote\xE7\
            \xE3o adicional ao limitar a conectividade direta. Os dispositivos de\
            \ filtragem de conte\xFAdo web s\xE3o um dos servidores proxy mais comuns\
            \ que fornecem acesso \xE0 Internet. Os servidores proxy podem suportar\
            \ o registro de sess\xF5es do Transmission Control Protocol e o bloqueio\
            \ de Uniform Resource Locators espec\xEDficos, endere\xE7os de Internet\
            \ Protocol e nomes de dom\xEDnio. Os proxies web podem ser configurados\
            \ com listas, definidas pela organiza\xE7\xE3o, de sites autorizados e\
            \ n\xE3o autorizados. Observe que os servidores proxy podem inibir o uso\
            \ de redes privadas virtuais (VPNs) e criar o potencial para ataques man-in-the-middle\
            \ (dependendo da implementa\xE7\xE3o)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(9)
      name: Boundary Protection | Restrict Threatening Outgoing Communications Traffic
      description: '(a) Detect and deny outgoing communications traffic posing a threat
        to external systems; and

        (b) Audit the identity of internal users associated with denied communications.'
      annotation: Detecting outgoing communications traffic from internal actions
        that may pose threats to external systems is known as extrusion detection.
        Extrusion detection is carried out within the system at managed interfaces.
        Extrusion detection includes the analysis of incoming and outgoing communications
        traffic while searching for indications of internal threats to the security
        of external systems. Internal threats to external systems include traffic
        indicative of denial-of-service attacks, traffic with spoofed source addresses,
        and traffic that contains malicious code. Organizations have criteria to determine,
        update, and manage identified threats related to extrusion detection.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Restringir Tr\xE1fego de Comunica\xE7\
            \xF5es de Sa\xEDda Amea\xE7ador"
          description: "(a) Detectar e negar o tr\xE1fego de comunica\xE7\xF5es de\
            \ sa\xEDda que represente uma amea\xE7a a sistemas externos; e\n(b) Auditar\
            \ a identidade dos usu\xE1rios internos associados \xE0s comunica\xE7\xF5\
            es negadas."
          annotation: "A detec\xE7\xE3o de tr\xE1fego de comunica\xE7\xF5es de sa\xED\
            da proveniente de a\xE7\xF5es internas que possam representar amea\xE7\
            as a sistemas externos \xE9 conhecida como detec\xE7\xE3o de extrus\xE3\
            o. A detec\xE7\xE3o de extrus\xE3o \xE9 realizada dentro do sistema em\
            \ interfaces gerenciadas. A detec\xE7\xE3o de extrus\xE3o inclui a an\xE1\
            lise do tr\xE1fego de comunica\xE7\xF5es de entrada e de sa\xEDda em busca\
            \ de ind\xEDcios de amea\xE7as internas \xE0 seguran\xE7a de sistemas\
            \ externos. As amea\xE7as internas a sistemas externos incluem tr\xE1\
            fego indicativo de ataques de nega\xE7\xE3o de servi\xE7o, tr\xE1fego\
            \ com endere\xE7os de origem falsificados (spoofed) e tr\xE1fego que contenha\
            \ c\xF3digo malicioso. As organiza\xE7\xF5es possuem crit\xE9rios para\
            \ determinar, atualizar e gerenciar as amea\xE7as identificadas relacionadas\
            \ \xE0 detec\xE7\xE3o de extrus\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(10)
      name: Boundary Protection | Prevent Exfiltration
      description: '(a) Prevent the exfiltration of information; and

        (b) Conduct exfiltration tests [Assignment: organization-defined frequency].'
      annotation: Prevention of exfiltration applies to both the intentional and unintentional
        exfiltration of information. Techniques used to prevent the exfiltration of
        information from systems may be implemented at internal endpoints, external
        boundaries, and across managed interfaces and include adherence to protocol
        formats, monitoring for beaconing activity from systems, disconnecting external
        network interfaces except when explicitly needed, employing traffic profile
        analysis to detect deviations from the volume and types of traffic expected,
        call backs to command and control centers, conducting penetration testing,
        monitoring for steganography, disassembling and reassembling packet headers,
        and using data loss and data leakage prevention tools. Devices that enforce
        strict adherence to protocol formats include deep packet inspection firewalls
        and Extensible Markup Language (XML) gateways. The devices verify adherence
        to protocol formats and specifications at the application layer and identify
        vulnerabilities that cannot be detected by devices that operate at the network
        or transport layers. The prevention of exfiltration is similar to data loss
        prevention or data leakage prevention and is closely associated with cross-domain
        solutions and system guards that enforce information flow requirements.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Impedir Exfiltra\xE7\xE3o"
          description: "(a) Impedir a exfiltra\xE7\xE3o de informa\xE7\xF5es; e\n\
            (b) Conduzir testes de exfiltra\xE7\xE3o [Atribui\xE7\xE3o: frequ\xEA\
            ncia definida pela organiza\xE7\xE3o]."
          annotation: "A preven\xE7\xE3o da exfiltra\xE7\xE3o aplica-se tanto \xE0\
            \ exfiltra\xE7\xE3o intencional quanto \xE0 n\xE3o intencional de informa\xE7\
            \xF5es. As t\xE9cnicas utilizadas para impedir a exfiltra\xE7\xE3o de\
            \ informa\xE7\xF5es dos sistemas podem ser implementadas em endpoints\
            \ internos, fronteiras externas e atrav\xE9s de interfaces gerenciadas,\
            \ e incluem a ader\xEAncia a formatos de protocolo, o monitoramento de\
            \ atividade de beaconing proveniente dos sistemas, a desconex\xE3o de\
            \ interfaces de rede externas exceto quando explicitamente necess\xE1\
            rias, o emprego de an\xE1lise de perfil de tr\xE1fego para detectar desvios\
            \ em rela\xE7\xE3o ao volume e aos tipos de tr\xE1fego esperados, retornos\
            \ de chamada (call backs) a centros de comando e controle, a realiza\xE7\
            \xE3o de testes de penetra\xE7\xE3o, o monitoramento de esteganografia,\
            \ a desmontagem e remontagem de cabe\xE7alhos de pacotes e o uso de ferramentas\
            \ de preven\xE7\xE3o de perda e vazamento de dados. Os dispositivos que\
            \ imp\xF5em a ader\xEAncia estrita a formatos de protocolo incluem firewalls\
            \ de inspe\xE7\xE3o profunda de pacotes (deep packet inspection) e gateways\
            \ Extensible Markup Language (XML). Os dispositivos verificam a ader\xEA\
            ncia a formatos e especifica\xE7\xF5es de protocolo na camada de aplica\xE7\
            \xE3o e identificam vulnerabilidades que n\xE3o podem ser detectadas por\
            \ dispositivos que operam nas camadas de rede ou de transporte. A preven\xE7\
            \xE3o da exfiltra\xE7\xE3o \xE9 semelhante \xE0 preven\xE7\xE3o de perda\
            \ de dados ou preven\xE7\xE3o de vazamento de dados e est\xE1 intimamente\
            \ associada a solu\xE7\xF5es de dom\xEDnio cruzado (cross-domain) e a\
            \ guardas de sistema que imp\xF5em os requisitos de fluxo de informa\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(11)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(11)
      name: Boundary Protection | Restrict Incoming Communications Traffic
      description: 'Only allow incoming communications from [Assignment: organization-defined
        authorized sources] to be routed to [Assignment: organization-defined authorized
        destinations].'
      annotation: General source address validation techniques are applied to restrict
        the use of illegal and unallocated source addresses as well as source addresses
        that should only be used within the system. The restriction of incoming communications
        traffic provides determinations that source and destination address pairs
        represent authorized or allowed communications. Determinations can be based
        on several factors, including the presence of such address pairs in the lists
        of authorized or allowed communications, the absence of such address pairs
        in lists of unauthorized or disallowed pairs, or meeting more general rules
        for authorized or allowed source and destination pairs. Strong authentication
        of network addresses is not possible without the use of explicit security
        protocols, and thus, addresses can often be spoofed. Further, identity-based
        incoming traffic restriction methods can be employed, including router access
        control lists and firewall rules.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Restringir Tr\xE1fego de Comunica\xE7\
            \xF5es de Entrada"
          description: "Permitir apenas que comunica\xE7\xF5es de entrada provenientes\
            \ de [Atribui\xE7\xE3o: fontes autorizadas definidas pela organiza\xE7\
            \xE3o] sejam encaminhadas para [Atribui\xE7\xE3o: destinos autorizados\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "T\xE9cnicas gerais de valida\xE7\xE3o de endere\xE7o de origem\
            \ s\xE3o aplicadas para restringir o uso de endere\xE7os de origem ilegais\
            \ e n\xE3o alocados, bem como de endere\xE7os de origem que devem ser\
            \ usados apenas dentro do sistema. A restri\xE7\xE3o do tr\xE1fego de\
            \ comunica\xE7\xF5es de entrada fornece determina\xE7\xF5es de que os\
            \ pares de endere\xE7os de origem e destino representam comunica\xE7\xF5\
            es autorizadas ou permitidas. As determina\xE7\xF5es podem se basear em\
            \ diversos fatores, incluindo a presen\xE7a de tais pares de endere\xE7\
            os nas listas de comunica\xE7\xF5es autorizadas ou permitidas, a aus\xEA\
            ncia de tais pares de endere\xE7os nas listas de pares n\xE3o autorizados\
            \ ou n\xE3o permitidos, ou o atendimento a regras mais gerais para pares\
            \ de origem e destino autorizados ou permitidos. A autentica\xE7\xE3o\
            \ forte de endere\xE7os de rede n\xE3o \xE9 poss\xEDvel sem o uso de protocolos\
            \ de seguran\xE7a expl\xEDcitos e, portanto, os endere\xE7os podem frequentemente\
            \ ser falsificados (spoofed). Al\xE9m disso, podem ser empregados m\xE9\
            todos de restri\xE7\xE3o de tr\xE1fego de entrada baseados em identidade,\
            \ incluindo listas de controle de acesso de roteadores e regras de firewall."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(12)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(12)
      name: Boundary Protection | Host-based Protection
      description: 'Implement [Assignment: organization-defined host-based boundary
        protection mechanisms] at [Assignment: organization-defined system components].'
      annotation: Host-based boundary protection mechanisms include host-based firewalls.
        System components that employ host-based boundary protection mechanisms include
        servers, workstations, notebook computers, and mobile devices.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Prote\xE7\xE3o Baseada em Host"
          description: "Implementar [Atribui\xE7\xE3o: mecanismos de prote\xE7\xE3\
            o de fronteira baseados em host definidos pela organiza\xE7\xE3o] em [Atribui\xE7\
            \xE3o: componentes de sistema definidos pela organiza\xE7\xE3o]."
          annotation: "Os mecanismos de prote\xE7\xE3o de fronteira baseados em host\
            \ incluem firewalls baseados em host. Os componentes de sistema que empregam\
            \ mecanismos de prote\xE7\xE3o de fronteira baseados em host incluem servidores,\
            \ esta\xE7\xF5es de trabalho, computadores port\xE1teis (notebooks) e\
            \ dispositivos m\xF3veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(13)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(13)
      name: Boundary Protection | Isolation of Security Tools, Mechanisms, and Support
        Components
      description: 'Isolate [Assignment: organization-defined information security
        tools, mechanisms, and support components] from other internal system components
        by implementing physically separate subnetworks with managed interfaces to
        other components of the system.'
      annotation: Physically separate subnetworks with managed interfaces are useful
        in isolating computer network defenses from critical operational processing
        networks to prevent adversaries from discovering the analysis and forensics
        techniques employed by organizations.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Isolamento de Ferramentas, Mecanismos\
            \ e Componentes de Suporte de Seguran\xE7a"
          description: "Isolar [Atribui\xE7\xE3o: ferramentas, mecanismos e componentes\
            \ de suporte de seguran\xE7a da informa\xE7\xE3o definidos pela organiza\xE7\
            \xE3o] dos demais componentes internos do sistema, implementando sub-redes\
            \ fisicamente separadas com interfaces gerenciadas para os outros componentes\
            \ do sistema."
          annotation: "Sub-redes fisicamente separadas com interfaces gerenciadas\
            \ s\xE3o \xFAteis para isolar as defesas de rede de computadores das redes\
            \ cr\xEDticas de processamento operacional, a fim de impedir que advers\xE1\
            rios descubram as t\xE9cnicas de an\xE1lise e forense empregadas pelas\
            \ organiza\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(14)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(14)
      name: Boundary Protection | Protect Against Unauthorized Physical Connections
      description: 'Protect against unauthorized physical connections at [Assignment:
        organization-defined managed interfaces].'
      annotation: Systems that operate at different security categories or classification
        levels may share common physical and environmental controls, since the systems
        may share space within the same facilities. In practice, it is possible that
        these separate systems may share common equipment rooms, wiring closets, and
        cable distribution paths. Protection against unauthorized physical connections
        can be achieved by using clearly identified and physically separated cable
        trays, connection frames, and patch panels for each side of managed interfaces
        with physical access controls that enforce limited authorized access to these
        items.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Prote\xE7\xE3o Contra Conex\xF5es F\xED\
            sicas N\xE3o Autorizadas"
          description: "Proteger contra conex\xF5es f\xEDsicas n\xE3o autorizadas\
            \ em [Atribui\xE7\xE3o: interfaces gerenciadas definidas pela organiza\xE7\
            \xE3o]."
          annotation: "Sistemas que operam em diferentes categorias de seguran\xE7\
            a ou n\xEDveis de classifica\xE7\xE3o podem compartilhar controles f\xED\
            sicos e ambientais comuns, uma vez que os sistemas podem compartilhar\
            \ espa\xE7o dentro das mesmas instala\xE7\xF5es. Na pr\xE1tica, \xE9 poss\xED\
            vel que esses sistemas separados compartilhem salas de equipamentos, arm\xE1\
            rios de cabeamento e caminhos de distribui\xE7\xE3o de cabos comuns. A\
            \ prote\xE7\xE3o contra conex\xF5es f\xEDsicas n\xE3o autorizadas pode\
            \ ser alcan\xE7ada pelo uso de bandejas de cabos, quadros de conex\xE3\
            o e pain\xE9is de patch claramente identificados e fisicamente separados\
            \ para cada lado das interfaces gerenciadas, com controles de acesso f\xED\
            sico que imponham acesso autorizado limitado a esses itens."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(15)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(15)
      name: Boundary Protection | Networked Privileged Accesses
      description: Route networked, privileged accesses through a dedicated, managed
        interface for purposes of access control and auditing.
      annotation: Privileged access provides greater accessibility to system functions,
        including security functions. Adversaries attempt to gain privileged access
        to systems through remote access to cause adverse mission or business impacts,
        such as by exfiltrating information or bringing down a critical system capability.
        Routing networked, privileged access requests through a dedicated, managed
        interface further restricts privileged access for increased access control
        and auditing.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Acessos Privilegiados em Rede"
          description: "Encaminhar acessos privilegiados em rede atrav\xE9s de uma\
            \ interface dedicada e gerenciada para fins de controle de acesso e auditoria."
          annotation: "O acesso privilegiado fornece maior acessibilidade \xE0s fun\xE7\
            \xF5es do sistema, incluindo as fun\xE7\xF5es de seguran\xE7a. Os advers\xE1\
            rios tentam obter acesso privilegiado aos sistemas por meio de acesso\
            \ remoto para causar impactos adversos \xE0 miss\xE3o ou ao neg\xF3cio,\
            \ como exfiltrar informa\xE7\xF5es ou derrubar uma capacidade cr\xEDtica\
            \ do sistema. Encaminhar as solicita\xE7\xF5es de acesso privilegiado\
            \ em rede atrav\xE9s de uma interface dedicada e gerenciada restringe\
            \ ainda mais o acesso privilegiado, aumentando o controle de acesso e\
            \ a auditoria."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(16)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(16)
      name: Boundary Protection | Prevent Discovery of System Components
      description: Prevent the discovery of specific system components that represent
        a managed interface.
      annotation: Preventing the discovery of system components representing a managed
        interface helps protect network addresses of those components from discovery
        through common tools and techniques used to identify devices on networks.
        Network addresses are not available for discovery and require prior knowledge
        for access. Preventing the discovery of components and devices can be accomplished
        by not publishing network addresses, using network address translation, or
        not entering the addresses in domain name systems. Another prevention technique
        is to periodically change network addresses.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Impedir a Descoberta de Componentes\
            \ do Sistema"
          description: "Impedir a descoberta de componentes espec\xEDficos do sistema\
            \ que representem uma interface gerenciada."
          annotation: "Impedir a descoberta de componentes do sistema que representem\
            \ uma interface gerenciada ajuda a proteger os endere\xE7os de rede desses\
            \ componentes contra a descoberta por meio de ferramentas e t\xE9cnicas\
            \ comuns usadas para identificar dispositivos em redes. Os endere\xE7\
            os de rede n\xE3o ficam dispon\xEDveis para descoberta e exigem conhecimento\
            \ pr\xE9vio para acesso. A preven\xE7\xE3o da descoberta de componentes\
            \ e dispositivos pode ser realizada n\xE3o publicando os endere\xE7os\
            \ de rede, usando tradu\xE7\xE3o de endere\xE7os de rede (NAT) ou n\xE3\
            o inserindo os endere\xE7os em sistemas de nomes de dom\xEDnio (DNS).\
            \ Outra t\xE9cnica de preven\xE7\xE3o \xE9 alterar periodicamente os endere\xE7\
            os de rede."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(17)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(17)
      name: Boundary Protection | Automated Enforcement of Protocol Formats
      description: Enforce adherence to protocol formats.
      annotation: System components that enforce protocol formats include deep packet
        inspection firewalls and XML gateways. The components verify adherence to
        protocol formats and specifications at the application layer and identify
        vulnerabilities that cannot be detected by devices operating at the network
        or transport layers.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Imposi\xE7\xE3o Automatizada de Formatos\
            \ de Protocolo"
          description: "Impor a ader\xEAncia a formatos de protocolo."
          annotation: "Os componentes de sistema que imp\xF5em formatos de protocolo\
            \ incluem firewalls de inspe\xE7\xE3o profunda de pacotes (deep packet\
            \ inspection) e gateways XML. Os componentes verificam a ader\xEAncia\
            \ a formatos e especifica\xE7\xF5es de protocolo na camada de aplica\xE7\
            \xE3o e identificam vulnerabilidades que n\xE3o podem ser detectadas por\
            \ dispositivos que operam nas camadas de rede ou de transporte."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(18)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(18)
      name: Boundary Protection | Fail Secure
      description: Prevent systems from entering unsecure states in the event of an
        operational failure of a boundary protection device.
      annotation: Fail secure is a condition achieved by employing mechanisms to ensure
        that in the event of operational failures of boundary protection devices at
        managed interfaces, systems do not enter into unsecure states where intended
        security properties no longer hold. Managed interfaces include routers, firewalls,
        and application gateways that reside on protected subnetworks (commonly referred
        to as demilitarized zones). Failures of boundary protection devices cannot
        lead to or cause information external to the devices to enter the devices
        nor can failures permit unauthorized information releases.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Falha Segura"
          description: "Impedir que os sistemas entrem em estados inseguros no caso\
            \ de uma falha operacional de um dispositivo de prote\xE7\xE3o de fronteira."
          annotation: "A falha segura \xE9 uma condi\xE7\xE3o alcan\xE7ada pelo emprego\
            \ de mecanismos para garantir que, no caso de falhas operacionais de dispositivos\
            \ de prote\xE7\xE3o de fronteira em interfaces gerenciadas, os sistemas\
            \ n\xE3o entrem em estados inseguros nos quais as propriedades de seguran\xE7\
            a pretendidas deixem de valer. As interfaces gerenciadas incluem roteadores,\
            \ firewalls e gateways de aplica\xE7\xE3o que residem em sub-redes protegidas\
            \ (comumente chamadas de zonas desmilitarizadas). As falhas dos dispositivos\
            \ de prote\xE7\xE3o de fronteira n\xE3o podem levar a ou fazer com que\
            \ informa\xE7\xF5es externas aos dispositivos entrem nos dispositivos,\
            \ nem as falhas podem permitir libera\xE7\xF5es n\xE3o autorizadas de\
            \ informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(19)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(19)
      name: Boundary Protection | Block Communication from Non-organizationally Configured
        Hosts
      description: 'Block inbound and outbound communications traffic between [Assignment:
        organization-defined communication clients] that are independently configured
        by end users and external service providers.'
      annotation: Communication clients independently configured by end users and
        external service providers include instant messaging clients and video conferencing
        software and applications. Traffic blocking does not apply to communication
        clients that are configured by organizations to perform authorized functions.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Bloquear Comunica\xE7\xE3o de Hosts\
            \ N\xE3o Configurados pela Organiza\xE7\xE3o"
          description: "Bloquear o tr\xE1fego de comunica\xE7\xF5es de entrada e de\
            \ sa\xEDda entre [Atribui\xE7\xE3o: clientes de comunica\xE7\xE3o definidos\
            \ pela organiza\xE7\xE3o] que sejam configurados de forma independente\
            \ por usu\xE1rios finais e provedores de servi\xE7os externos."
          annotation: "Os clientes de comunica\xE7\xE3o configurados de forma independente\
            \ por usu\xE1rios finais e provedores de servi\xE7os externos incluem\
            \ clientes de mensagens instant\xE2neas e softwares e aplica\xE7\xF5es\
            \ de videoconfer\xEAncia. O bloqueio de tr\xE1fego n\xE3o se aplica a\
            \ clientes de comunica\xE7\xE3o que sejam configurados pelas organiza\xE7\
            \xF5es para desempenhar fun\xE7\xF5es autorizadas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(20)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(20)
      name: Boundary Protection | Dynamic Isolation and Segregation
      description: 'Provide the capability to dynamically isolate [Assignment: organization-defined
        system components] from other system components.'
      annotation: The capability to dynamically isolate certain internal system components
        is useful when it is necessary to partition or separate system components
        of questionable origin from components that possess greater trustworthiness.
        Component isolation reduces the attack surface of organizational systems.
        Isolating selected system components can also limit the damage from successful
        attacks when such attacks occur.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Isolamento e Segrega\xE7\xE3o Din\xE2\
            micos"
          description: "Fornecer a capacidade de isolar dinamicamente [Atribui\xE7\
            \xE3o: componentes de sistema definidos pela organiza\xE7\xE3o] dos demais\
            \ componentes do sistema."
          annotation: "A capacidade de isolar dinamicamente certos componentes internos\
            \ do sistema \xE9 \xFAtil quando \xE9 necess\xE1rio particionar ou separar\
            \ componentes de sistema de origem question\xE1vel de componentes que\
            \ possuam maior confiabilidade. O isolamento de componentes reduz a superf\xED\
            cie de ataque dos sistemas organizacionais. Isolar componentes de sistema\
            \ selecionados tamb\xE9m pode limitar os danos decorrentes de ataques\
            \ bem-sucedidos quando tais ataques ocorrem."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(21)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(21)
      name: Boundary Protection | Isolation of System Components
      description: 'Employ boundary protection mechanisms to isolate [Assignment:
        organization-defined system components] supporting [Assignment: organization-defined
        missions and/or business functions].'
      annotation: Organizations can isolate system components that perform different
        mission or business functions. Such isolation limits unauthorized information
        flows among system components and provides the opportunity to deploy greater
        levels of protection for selected system components. Isolating system components
        with boundary protection mechanisms provides the capability for increased
        protection of individual system components and to more effectively control
        information flows between those components. Isolating system components provides
        enhanced protection that limits the potential harm from hostile cyber-attacks
        and errors. The degree of isolation varies depending upon the mechanisms chosen.
        Boundary protection mechanisms include routers, gateways, and firewalls that
        separate system components into physically separate networks or subnetworks;
        cross-domain devices that separate subnetworks; virtualization techniques;
        and the encryption of information flows among system components using distinct
        encryption keys.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Isolamento de Componentes do Sistema"
          description: "Empregar mecanismos de prote\xE7\xE3o de fronteira para isolar\
            \ [Atribui\xE7\xE3o: componentes de sistema definidos pela organiza\xE7\
            \xE3o] que d\xE3o suporte a [Atribui\xE7\xE3o: miss\xF5es e/ou fun\xE7\
            \xF5es de neg\xF3cio definidas pela organiza\xE7\xE3o]."
          annotation: "As organiza\xE7\xF5es podem isolar os componentes de sistema\
            \ que desempenham diferentes fun\xE7\xF5es de miss\xE3o ou de neg\xF3\
            cio. Tal isolamento limita os fluxos de informa\xE7\xE3o n\xE3o autorizados\
            \ entre os componentes do sistema e oferece a oportunidade de implantar\
            \ n\xEDveis maiores de prote\xE7\xE3o para componentes de sistema selecionados.\
            \ Isolar os componentes do sistema com mecanismos de prote\xE7\xE3o de\
            \ fronteira proporciona a capacidade de aumentar a prote\xE7\xE3o de componentes\
            \ individuais do sistema e de controlar de forma mais eficaz os fluxos\
            \ de informa\xE7\xE3o entre esses componentes. Isolar os componentes do\
            \ sistema fornece prote\xE7\xE3o aprimorada que limita o dano potencial\
            \ decorrente de ciberataques hostis e erros. O grau de isolamento varia\
            \ conforme os mecanismos escolhidos. Os mecanismos de prote\xE7\xE3o de\
            \ fronteira incluem roteadores, gateways e firewalls que separam os componentes\
            \ do sistema em redes ou sub-redes fisicamente separadas; dispositivos\
            \ de dom\xEDnio cruzado (cross-domain) que separam sub-redes; t\xE9cnicas\
            \ de virtualiza\xE7\xE3o; e a criptografia dos fluxos de informa\xE7\xE3\
            o entre os componentes do sistema usando chaves de criptografia distintas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(22)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(22)
      name: Boundary Protection | Separate Subnets for Connecting to Different Security
        Domains
      description: Implement separate network addresses to connect to systems in different
        security domains.
      annotation: The decomposition of systems into subnetworks (i.e., subnets) helps
        to provide the appropriate level of protection for network connections to
        different security domains that contain information with different security
        categories or classification levels.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Sub-redes Separadas para Conex\xE3\
            o a Diferentes Dom\xEDnios de Seguran\xE7a"
          description: "Implementar endere\xE7os de rede separados para conex\xE3\
            o a sistemas em diferentes dom\xEDnios de seguran\xE7a."
          annotation: "A decomposi\xE7\xE3o de sistemas em sub-redes (isto \xE9, subnets)\
            \ ajuda a fornecer o n\xEDvel apropriado de prote\xE7\xE3o para as conex\xF5\
            es de rede a diferentes dom\xEDnios de seguran\xE7a que contenham informa\xE7\
            \xF5es com diferentes categorias de seguran\xE7a ou n\xEDveis de classifica\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(23)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(23)
      name: Boundary Protection | Disable Sender Feedback on Protocol Validation Failure
      description: Disable feedback to senders on protocol format validation failure.
      annotation: Disabling feedback to senders when there is a failure in protocol
        validation format prevents adversaries from obtaining information that would
        otherwise be unavailable.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Desabilitar Retorno ao Remetente em\
            \ Falha de Valida\xE7\xE3o de Protocolo"
          description: "Desabilitar o retorno (feedback) aos remetentes em caso de\
            \ falha na valida\xE7\xE3o do formato de protocolo."
          annotation: "Desabilitar o retorno aos remetentes quando h\xE1 uma falha\
            \ na valida\xE7\xE3o do formato de protocolo impede que os advers\xE1\
            rios obtenham informa\xE7\xF5es que de outra forma estariam indispon\xED\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(24)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(24)
      name: Boundary Protection | Personally Identifiable Information
      description: 'For systems that process personally identifiable information:

        (a) Apply the following processing rules to data elements of personally identifiable
        information: [Assignment: organization-defined processing rules];

        (b) Monitor for permitted processing at the external interfaces to the system
        and at key internal boundaries within the system;

        (c) Document each processing exception; and

        (d) Review and remove exceptions that are no longer supported.'
      annotation: "Managing the processing of personally identifiable information\
        \ is an important aspect of protecting an individual\u2019s privacy. Applying,\
        \ monitoring for, and documenting exceptions to processing rules ensure that\
        \ personally identifiable information is processed only in accordance with\
        \ established privacy requirements."
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Informa\xE7\xF5es de Identifica\xE7\
            \xE3o Pessoal"
          description: "Para sistemas que processam informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal:\n(a) Aplicar as seguintes regras de processamento aos elementos\
            \ de dados das informa\xE7\xF5es de identifica\xE7\xE3o pessoal: [Atribui\xE7\
            \xE3o: regras de processamento definidas pela organiza\xE7\xE3o];\n(b)\
            \ Monitorar o processamento permitido nas interfaces externas do sistema\
            \ e nas principais fronteiras internas dentro do sistema;\n(c) Documentar\
            \ cada exce\xE7\xE3o de processamento; e\n(d) Revisar e remover as exce\xE7\
            \xF5es que n\xE3o sejam mais sustentadas."
          annotation: "Gerenciar o processamento de informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal \xE9 um aspecto importante da prote\xE7\xE3o da privacidade\
            \ de um indiv\xEDduo. Aplicar, monitorar e documentar as exce\xE7\xF5\
            es \xE0s regras de processamento garante que as informa\xE7\xF5es de identifica\xE7\
            \xE3o pessoal sejam processadas apenas de acordo com os requisitos de\
            \ privacidade estabelecidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(25)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(25)
      name: Boundary Protection | Unclassified National Security System Connections
      description: 'Prohibit the direct connection of [Assignment: organization-defined
        unclassified national security system] to an external network without the
        use of [Assignment: organization-defined boundary protection device].'
      annotation: A direct connection is a dedicated physical or virtual connection
        between two or more systems. Organizations typically do not have complete
        control over external networks, including the Internet. Boundary protection
        devices (e.g., firewalls, gateways, and routers) mediate communications and
        information flows between unclassified national security systems and external
        networks.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Conex\xF5es de Sistema de Seguran\xE7\
            a Nacional N\xE3o Classificado"
          description: "Proibir a conex\xE3o direta de [Atribui\xE7\xE3o: sistema\
            \ de seguran\xE7a nacional n\xE3o classificado definido pela organiza\xE7\
            \xE3o] a uma rede externa sem o uso de [Atribui\xE7\xE3o: dispositivo\
            \ de prote\xE7\xE3o de fronteira definido pela organiza\xE7\xE3o]."
          annotation: "Uma conex\xE3o direta \xE9 uma conex\xE3o f\xEDsica ou virtual\
            \ dedicada entre dois ou mais sistemas. As organiza\xE7\xF5es normalmente\
            \ n\xE3o t\xEAm controle completo sobre redes externas, incluindo a Internet.\
            \ Os dispositivos de prote\xE7\xE3o de fronteira (por exemplo, firewalls,\
            \ gateways e roteadores) mediam as comunica\xE7\xF5es e os fluxos de informa\xE7\
            \xE3o entre sistemas de seguran\xE7a nacional n\xE3o classificados e redes\
            \ externas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(26)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(26)
      name: Boundary Protection | Classified National Security System Connections
      description: 'Prohibit the direct connection of a classified national security
        system to an external network without the use of [Assignment: organization-defined
        boundary protection device].'
      annotation: A direct connection is a dedicated physical or virtual connection
        between two or more systems. Organizations typically do not have complete
        control over external networks, including the Internet. Boundary protection
        devices (e.g., firewalls, gateways, and routers) mediate communications and
        information flows between classified national security systems and external
        networks. In addition, approved boundary protection devices (typically managed
        interface or cross-domain systems) provide information flow enforcement from
        systems to external networks.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Conex\xF5es de Sistema de Seguran\xE7\
            a Nacional Classificado"
          description: "Proibir a conex\xE3o direta de um sistema de seguran\xE7a\
            \ nacional classificado a uma rede externa sem o uso de [Atribui\xE7\xE3\
            o: dispositivo de prote\xE7\xE3o de fronteira definido pela organiza\xE7\
            \xE3o]."
          annotation: "Uma conex\xE3o direta \xE9 uma conex\xE3o f\xEDsica ou virtual\
            \ dedicada entre dois ou mais sistemas. As organiza\xE7\xF5es normalmente\
            \ n\xE3o t\xEAm controle completo sobre redes externas, incluindo a Internet.\
            \ Os dispositivos de prote\xE7\xE3o de fronteira (por exemplo, firewalls,\
            \ gateways e roteadores) mediam as comunica\xE7\xF5es e os fluxos de informa\xE7\
            \xE3o entre sistemas de seguran\xE7a nacional classificados e redes externas.\
            \ Al\xE9m disso, os dispositivos de prote\xE7\xE3o de fronteira aprovados\
            \ (normalmente interfaces gerenciadas ou sistemas de dom\xEDnio cruzado)\
            \ fornecem a imposi\xE7\xE3o do fluxo de informa\xE7\xF5es dos sistemas\
            \ para redes externas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(27)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(27)
      name: Boundary Protection | Unclassified Non-national Security System Connections
      description: 'Prohibit the direct connection of [Assignment: organization-defined
        unclassified non-national security system] to an external network without
        the use of [Assignment: organization-defined boundary protection device].'
      annotation: A direct connection is a dedicated physical or virtual connection
        between two or more systems. Organizations typically do not have complete
        control over external networks, including the Internet. Boundary protection
        devices (e.g., firewalls, gateways, and routers) mediate communications and
        information flows between unclassified non-national security systems and external
        networks.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Conex\xF5es de Sistema N\xE3o Classificado\
            \ de N\xE3o Seguran\xE7a Nacional"
          description: "Proibir a conex\xE3o direta de [Atribui\xE7\xE3o: sistema\
            \ n\xE3o classificado de n\xE3o seguran\xE7a nacional definido pela organiza\xE7\
            \xE3o] a uma rede externa sem o uso de [Atribui\xE7\xE3o: dispositivo\
            \ de prote\xE7\xE3o de fronteira definido pela organiza\xE7\xE3o]."
          annotation: "Uma conex\xE3o direta \xE9 uma conex\xE3o f\xEDsica ou virtual\
            \ dedicada entre dois ou mais sistemas. As organiza\xE7\xF5es normalmente\
            \ n\xE3o t\xEAm controle completo sobre redes externas, incluindo a Internet.\
            \ Os dispositivos de prote\xE7\xE3o de fronteira (por exemplo, firewalls,\
            \ gateways e roteadores) mediam as comunica\xE7\xF5es e os fluxos de informa\xE7\
            \xE3o entre sistemas n\xE3o classificados de n\xE3o seguran\xE7a nacional\
            \ e redes externas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(28)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(28)
      name: Boundary Protection | Connections to Public Networks
      description: 'Prohibit the direct connection of [Assignment: organization-defined
        system] to a public network.'
      annotation: A direct connection is a dedicated physical or virtual connection
        between two or more systems. A public network is a network accessible to the
        public, including the Internet and organizational extranets with public access.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Conex\xF5es a Redes P\xFAblicas"
          description: "Proibir a conex\xE3o direta de [Atribui\xE7\xE3o: sistema\
            \ definido pela organiza\xE7\xE3o] a uma rede p\xFAblica."
          annotation: "Uma conex\xE3o direta \xE9 uma conex\xE3o f\xEDsica ou virtual\
            \ dedicada entre dois ou mais sistemas. Uma rede p\xFAblica \xE9 uma rede\
            \ acess\xEDvel ao p\xFAblico, incluindo a Internet e extranets organizacionais\
            \ com acesso p\xFAblico."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-7(29)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-7(29)
      name: Boundary Protection | Separate Subnets to Isolate Functions
      description: 'Implement [Selection: physically; logically] separate subnetworks
        to isolate the following critical system components and functions: [Assignment:
        organization-defined critical system components and functions].'
      annotation: Separating critical system components and functions from other noncritical
        system components and functions through separate subnetworks may be necessary
        to reduce susceptibility to a catastrophic or debilitating breach or compromise
        that results in system failure. For example, physically separating the command
        and control function from the in-flight entertainment function through separate
        subnetworks in a commercial aircraft provides an increased level of assurance
        in the trustworthiness of critical system functions.
      translations:
        pt:
          name: "Prote\xE7\xE3o de Fronteira | Sub-redes Separadas para Isolar Fun\xE7\
            \xF5es"
          description: "Implementar sub-redes [Sele\xE7\xE3o: fisicamente; logicamente]\
            \ separadas para isolar os seguintes componentes e fun\xE7\xF5es cr\xED\
            ticos do sistema: [Atribui\xE7\xE3o: componentes e fun\xE7\xF5es cr\xED\
            ticos do sistema definidos pela organiza\xE7\xE3o]."
          annotation: "Separar os componentes e fun\xE7\xF5es cr\xEDticos do sistema\
            \ dos demais componentes e fun\xE7\xF5es n\xE3o cr\xEDticos por meio de\
            \ sub-redes separadas pode ser necess\xE1rio para reduzir a suscetibilidade\
            \ a uma viola\xE7\xE3o ou comprometimento catastr\xF3fico ou debilitante\
            \ que resulte em falha do sistema. Por exemplo, separar fisicamente a\
            \ fun\xE7\xE3o de comando e controle da fun\xE7\xE3o de entretenimento\
            \ de bordo (in-flight entertainment) por meio de sub-redes separadas em\
            \ uma aeronave comercial proporciona um n\xEDvel maior de garantia na\
            \ confiabilidade das fun\xE7\xF5es cr\xEDticas do sistema."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-8
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-8
      name: Transmission Confidentiality and Integrity
      description: 'Protect the [Selection (one or more): confidentiality; integrity]
        of transmitted information.'
      annotation: 'Protecting the confidentiality and integrity of transmitted information
        applies to internal and external networks as well as any system components
        that can transmit information, including servers, notebook computers, desktop
        computers, mobile devices, printers, copiers, scanners, facsimile machines,
        and radios. Unprotected communication paths are exposed to the possibility
        of interception and modification. Protecting the confidentiality and integrity
        of information can be accomplished by physical or logical means. Physical
        protection can be achieved by using protected distribution systems. A protected
        distribution system is a wireline or fiber-optics telecommunications system
        that includes terminals and adequate electromagnetic, acoustical, electrical,
        and physical controls to permit its use for the unencrypted transmission of
        classified information. Logical protection can be achieved by employing encryption
        techniques.

        Organizations that rely on commercial providers who offer transmission services
        as commodity services rather than as fully dedicated services may find it
        difficult to obtain the necessary assurances regarding the implementation
        of needed controls for transmission confidentiality and integrity. In such
        situations, organizations determine what types of confidentiality or integrity
        services are available in standard, commercial telecommunications service
        packages. If it is not feasible to obtain the necessary controls and assurances
        of control effectiveness through appropriate contracting vehicles, organizations
        can implement appropriate compensating controls.'
      translations:
        pt:
          name: "Confidencialidade e Integridade da Transmiss\xE3o"
          description: "Proteger a [Sele\xE7\xE3o (um ou mais): confidencialidade;\
            \ integridade] das informa\xE7\xF5es transmitidas."
          annotation: "Proteger a confidencialidade e a integridade das informa\xE7\
            \xF5es transmitidas aplica-se a redes internas e externas, bem como a\
            \ quaisquer componentes de sistema que possam transmitir informa\xE7\xF5\
            es, incluindo servidores, computadores port\xE1teis (notebooks), computadores\
            \ de mesa, dispositivos m\xF3veis, impressoras, copiadoras, scanners,\
            \ aparelhos de fac-s\xEDmile e r\xE1dios. Os caminhos de comunica\xE7\xE3\
            o desprotegidos ficam expostos \xE0 possibilidade de intercepta\xE7\xE3\
            o e modifica\xE7\xE3o. A prote\xE7\xE3o da confidencialidade e da integridade\
            \ das informa\xE7\xF5es pode ser realizada por meios f\xEDsicos ou l\xF3\
            gicos. A prote\xE7\xE3o f\xEDsica pode ser alcan\xE7ada pelo uso de sistemas\
            \ de distribui\xE7\xE3o protegidos. Um sistema de distribui\xE7\xE3o protegido\
            \ \xE9 um sistema de telecomunica\xE7\xF5es por linha f\xEDsica (wireline)\
            \ ou fibra \xF3ptica que inclui terminais e controles eletromagn\xE9ticos,\
            \ ac\xFAsticos, el\xE9tricos e f\xEDsicos adequados para permitir seu\
            \ uso na transmiss\xE3o n\xE3o criptografada de informa\xE7\xF5es classificadas.\
            \ A prote\xE7\xE3o l\xF3gica pode ser alcan\xE7ada pelo emprego de t\xE9\
            cnicas de criptografia.\nAs organiza\xE7\xF5es que dependem de provedores\
            \ comerciais que oferecem servi\xE7os de transmiss\xE3o como servi\xE7\
            os de commodity, em vez de servi\xE7os totalmente dedicados, podem ter\
            \ dificuldade em obter as garantias necess\xE1rias quanto \xE0 implementa\xE7\
            \xE3o dos controles requeridos para a confidencialidade e a integridade\
            \ da transmiss\xE3o. Em tais situa\xE7\xF5es, as organiza\xE7\xF5es determinam\
            \ quais tipos de servi\xE7os de confidencialidade ou integridade est\xE3\
            o dispon\xEDveis em pacotes padr\xE3o e comerciais de servi\xE7os de telecomunica\xE7\
            \xF5es. Se n\xE3o for vi\xE1vel obter os controles necess\xE1rios e as\
            \ garantias da efic\xE1cia dos controles por meio de instrumentos contratuais\
            \ apropriados, as organiza\xE7\xF5es podem implementar controles compensat\xF3\
            rios apropriados."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-8(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-8(1)
      name: Transmission Confidentiality and Integrity | Cryptographic Protection
      description: 'Implement cryptographic mechanisms to [Selection (one or more):
        prevent unauthorized disclosure of information; detect changes to information]
        during transmission.'
      annotation: Encryption protects information from unauthorized disclosure and
        modification during transmission. Cryptographic mechanisms that protect the
        confidentiality and integrity of information during transmission include TLS
        and IPSec. Cryptographic mechanisms used to protect information integrity
        include cryptographic hash functions that have applications in digital signatures,
        checksums, and message authentication codes.
      translations:
        pt:
          name: "Confidencialidade e Integridade da Transmiss\xE3o | Prote\xE7\xE3\
            o Criptogr\xE1fica"
          description: "Implementar mecanismos criptogr\xE1ficos para [Sele\xE7\xE3\
            o (um ou mais): prevenir a divulga\xE7\xE3o n\xE3o autorizada de informa\xE7\
            \xF5es; detectar altera\xE7\xF5es nas informa\xE7\xF5es] durante a transmiss\xE3\
            o."
          annotation: "A criptografia protege as informa\xE7\xF5es contra divulga\xE7\
            \xE3o e modifica\xE7\xE3o n\xE3o autorizadas durante a transmiss\xE3o.\
            \ Mecanismos criptogr\xE1ficos que protegem a confidencialidade e a integridade\
            \ das informa\xE7\xF5es durante a transmiss\xE3o incluem TLS e IPSec.\
            \ Mecanismos criptogr\xE1ficos usados para proteger a integridade das\
            \ informa\xE7\xF5es incluem fun\xE7\xF5es de hash criptogr\xE1fico que\
            \ t\xEAm aplica\xE7\xF5es em assinaturas digitais, somas de verifica\xE7\
            \xE3o (checksums) e c\xF3digos de autentica\xE7\xE3o de mensagem."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-8(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-8(2)
      name: Transmission Confidentiality and Integrity | Pre- and Post-transmission
        Handling
      description: 'Maintain the [Selection (one or more): confidentiality; integrity]
        of information during preparation for transmission and during reception.'
      annotation: Information can be unintentionally or maliciously disclosed or modified
        during preparation for transmission or during reception, including during
        aggregation, at protocol transformation points, and during packing and unpacking.
        Such unauthorized disclosures or modifications compromise the confidentiality
        or integrity of the information.
      translations:
        pt:
          name: "Confidencialidade e Integridade da Transmiss\xE3o | Tratamento Pr\xE9\
            \ e P\xF3s-transmiss\xE3o"
          description: "Manter a [Sele\xE7\xE3o (um ou mais): confidencialidade; integridade]\
            \ das informa\xE7\xF5es durante a prepara\xE7\xE3o para a transmiss\xE3\
            o e durante a recep\xE7\xE3o."
          annotation: "As informa\xE7\xF5es podem ser divulgadas ou modificadas, de\
            \ forma n\xE3o intencional ou maliciosa, durante a prepara\xE7\xE3o para\
            \ a transmiss\xE3o ou durante a recep\xE7\xE3o, inclusive durante a agrega\xE7\
            \xE3o, em pontos de transforma\xE7\xE3o de protocolo e durante o empacotamento\
            \ e desempacotamento. Tais divulga\xE7\xF5es ou modifica\xE7\xF5es n\xE3\
            o autorizadas comprometem a confidencialidade ou a integridade das informa\xE7\
            \xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-8(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-8(3)
      name: Transmission Confidentiality and Integrity | Cryptographic Protection
        for Message Externals
      description: 'Implement cryptographic mechanisms to protect message externals
        unless otherwise protected by [Assignment: organization-defined alternative
        physical controls].'
      annotation: Cryptographic protection for message externals addresses protection
        from the unauthorized disclosure of information. Message externals include
        message headers and routing information. Cryptographic protection prevents
        the exploitation of message externals and applies to internal and external
        networks or links that may be visible to individuals who are not authorized
        users. Header and routing information is sometimes transmitted in clear text
        (i.e., unencrypted) because the information is not identified by organizations
        as having significant value or because encrypting the information can result
        in lower network performance or higher costs. Alternative physical controls
        include protected distribution systems.
      translations:
        pt:
          name: "Confidencialidade e Integridade da Transmiss\xE3o | Prote\xE7\xE3\
            o Criptogr\xE1fica para Elementos Externos da Mensagem"
          description: "Implementar mecanismos criptogr\xE1ficos para proteger os\
            \ elementos externos da mensagem, a menos que estejam protegidos de outra\
            \ forma por [Atribui\xE7\xE3o: controles f\xEDsicos alternativos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "A prote\xE7\xE3o criptogr\xE1fica para elementos externos da\
            \ mensagem trata da prote\xE7\xE3o contra a divulga\xE7\xE3o n\xE3o autorizada\
            \ de informa\xE7\xF5es. Os elementos externos da mensagem incluem cabe\xE7\
            alhos de mensagem e informa\xE7\xF5es de roteamento. A prote\xE7\xE3o\
            \ criptogr\xE1fica previne a explora\xE7\xE3o dos elementos externos da\
            \ mensagem e aplica-se a redes ou enlaces internos e externos que possam\
            \ estar vis\xEDveis a indiv\xEDduos que n\xE3o s\xE3o usu\xE1rios autorizados.\
            \ As informa\xE7\xF5es de cabe\xE7alho e roteamento \xE0s vezes s\xE3\
            o transmitidas em texto claro (ou seja, sem criptografia) porque as informa\xE7\
            \xF5es n\xE3o s\xE3o identificadas pelas organiza\xE7\xF5es como tendo\
            \ valor significativo ou porque a criptografia das informa\xE7\xF5es pode\
            \ resultar em menor desempenho da rede ou maiores custos. Os controles\
            \ f\xEDsicos alternativos incluem sistemas de distribui\xE7\xE3o protegidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-8(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-8(4)
      name: Transmission Confidentiality and Integrity | Conceal or Randomize Communications
      description: 'Implement cryptographic mechanisms to conceal or randomize communication
        patterns unless otherwise protected by [Assignment: organization-defined alternative
        physical controls].'
      annotation: Concealing or randomizing communication patterns addresses protection
        from unauthorized disclosure of information. Communication patterns include
        frequency, periods, predictability, and amount. Changes to communications
        patterns can reveal information with intelligence value, especially when combined
        with other available information related to the mission and business functions
        of the organization. Concealing or randomizing communications prevents the
        derivation of intelligence based on communications patterns and applies to
        both internal and external networks or links that may be visible to individuals
        who are not authorized users. Encrypting the links and transmitting in continuous,
        fixed, or random patterns prevents the derivation of intelligence from the
        system communications patterns. Alternative physical controls include protected
        distribution systems.
      translations:
        pt:
          name: "Confidencialidade e Integridade da Transmiss\xE3o | Ocultar ou Aleatorizar\
            \ Comunica\xE7\xF5es"
          description: "Implementar mecanismos criptogr\xE1ficos para ocultar ou aleatorizar\
            \ padr\xF5es de comunica\xE7\xE3o, a menos que estejam protegidos de outra\
            \ forma por [Atribui\xE7\xE3o: controles f\xEDsicos alternativos definidos\
            \ pela organiza\xE7\xE3o]."
          annotation: "A oculta\xE7\xE3o ou aleatoriza\xE7\xE3o de padr\xF5es de comunica\xE7\
            \xE3o trata da prote\xE7\xE3o contra a divulga\xE7\xE3o n\xE3o autorizada\
            \ de informa\xE7\xF5es. Os padr\xF5es de comunica\xE7\xE3o incluem frequ\xEA\
            ncia, per\xEDodos, previsibilidade e volume. Altera\xE7\xF5es nos padr\xF5\
            es de comunica\xE7\xE3o podem revelar informa\xE7\xF5es de valor de intelig\xEA\
            ncia, especialmente quando combinadas com outras informa\xE7\xF5es dispon\xED\
            veis relacionadas \xE0 miss\xE3o e \xE0s fun\xE7\xF5es de neg\xF3cio da\
            \ organiza\xE7\xE3o. A oculta\xE7\xE3o ou aleatoriza\xE7\xE3o das comunica\xE7\
            \xF5es previne a deriva\xE7\xE3o de intelig\xEAncia baseada em padr\xF5\
            es de comunica\xE7\xE3o e aplica-se tanto a redes ou enlaces internos\
            \ quanto externos que possam estar vis\xEDveis a indiv\xEDduos que n\xE3\
            o s\xE3o usu\xE1rios autorizados. A criptografia dos enlaces e a transmiss\xE3\
            o em padr\xF5es cont\xEDnuos, fixos ou aleat\xF3rios previnem a deriva\xE7\
            \xE3o de intelig\xEAncia a partir dos padr\xF5es de comunica\xE7\xE3o\
            \ do sistema. Os controles f\xEDsicos alternativos incluem sistemas de\
            \ distribui\xE7\xE3o protegidos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-8(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-8(5)
      name: Transmission Confidentiality and Integrity | Protected Distribution System
      description: 'Implement [Assignment: organization-defined protected distribution
        system] to [Selection (one or more): prevent unauthorized disclosure of information;
        detect changes to information] during transmission.'
      annotation: The purpose of a protected distribution system is to deter, detect,
        and/or make difficult physical access to the communication lines that carry
        national security information.
      translations:
        pt:
          name: "Confidencialidade e Integridade da Transmiss\xE3o | Sistema de Distribui\xE7\
            \xE3o Protegido"
          description: "Implementar [Atribui\xE7\xE3o: sistema de distribui\xE7\xE3\
            o protegido definido pela organiza\xE7\xE3o] para [Sele\xE7\xE3o (um ou\
            \ mais): prevenir a divulga\xE7\xE3o n\xE3o autorizada de informa\xE7\xF5\
            es; detectar altera\xE7\xF5es nas informa\xE7\xF5es] durante a transmiss\xE3\
            o."
          annotation: "O prop\xF3sito de um sistema de distribui\xE7\xE3o protegido\
            \ \xE9 dissuadir, detectar e/ou dificultar o acesso f\xEDsico \xE0s linhas\
            \ de comunica\xE7\xE3o que transportam informa\xE7\xF5es de seguran\xE7\
            a nacional."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-13(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-13(3)
      name: Cryptographic Protection | Individuals Without Formal Access Approvals
      description: '[Withdrawn: Incorporated into SC-13.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o Criptogr\xE1fica | Indiv\xEDduos Sem Aprova\xE7\xF5\
            es Formais de Acesso"
          description: '[Retirado: Incorporado ao SC-13.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-10
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-10
      name: Network Disconnect
      description: 'Terminate the network connection associated with a communications
        session at the end of the session or after [Assignment: organization-defined
        time period] of inactivity.'
      annotation: Network disconnect applies to internal and external networks. Terminating
        network connections associated with specific communications sessions includes
        de-allocating TCP/IP address or port pairs at the operating system level and
        de-allocating the networking assignments at the application level if multiple
        application sessions are using a single operating system-level network connection.
        Periods of inactivity may be established by organizations and include time
        periods by type of network access or for specific network accesses.
      translations:
        pt:
          name: "Desconex\xE3o de Rede"
          description: "Encerrar a conex\xE3o de rede associada a uma sess\xE3o de\
            \ comunica\xE7\xE3o ao final da sess\xE3o ou ap\xF3s [Atribui\xE7\xE3\
            o: per\xEDodo de tempo definido pela organiza\xE7\xE3o] de inatividade."
          annotation: "A desconex\xE3o de rede aplica-se a redes internas e externas.\
            \ O encerramento de conex\xF5es de rede associadas a sess\xF5es de comunica\xE7\
            \xE3o espec\xEDficas inclui a desaloca\xE7\xE3o de pares de endere\xE7\
            o/porta TCP/IP no n\xEDvel do sistema operacional e a desaloca\xE7\xE3\
            o das atribui\xE7\xF5es de rede no n\xEDvel da aplica\xE7\xE3o caso v\xE1\
            rias sess\xF5es de aplica\xE7\xE3o estejam usando uma \xFAnica conex\xE3\
            o de rede no n\xEDvel do sistema operacional. Os per\xEDodos de inatividade\
            \ podem ser estabelecidos pelas organiza\xE7\xF5es e incluem per\xEDodos\
            \ de tempo por tipo de acesso \xE0 rede ou para acessos de rede espec\xED\
            ficos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-11
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-11
      name: Trusted Path
      description: 'a. Provide a [Selection: physically; logically] isolated trusted
        communications path for communications between the user and the trusted components
        of the system; and

        b. Permit users to invoke the trusted communications path for communications
        between the user and the following security functions of the system, including
        at a minimum, authentication and re-authentication: [Assignment: organization-defined
        security functions].'
      annotation: Trusted paths are mechanisms by which users can communicate (using
        input devices such as keyboards) directly with the security functions of systems
        with the requisite assurance to support security policies. Trusted path mechanisms
        can only be activated by users or the security functions of organizational
        systems. User responses that occur via trusted paths are protected from modification
        by and disclosure to untrusted applications. Organizations employ trusted
        paths for trustworthy, high-assurance connections between security functions
        of systems and users, including during system logons. The original implementations
        of trusted paths employed an out-of-band signal to initiate the path, such
        as using the <BREAK> key, which does not transmit characters that can be spoofed.
        In later implementations, a key combination that could not be hijacked was
        used (e.g., the <CTRL> + <ALT> + <DEL> keys). Such key combinations, however,
        are platform-specific and may not provide a trusted path implementation in
        every case. The enforcement of trusted communications paths is provided by
        a specific implementation that meets the reference monitor concept.
      translations:
        pt:
          name: "Caminho Confi\xE1vel"
          description: "a. Prover um caminho de comunica\xE7\xE3o confi\xE1vel [Sele\xE7\
            \xE3o: fisicamente; logicamente] isolado para comunica\xE7\xF5es entre\
            \ o usu\xE1rio e os componentes confi\xE1veis do sistema; e\nb. Permitir\
            \ que os usu\xE1rios invoquem o caminho de comunica\xE7\xE3o confi\xE1\
            vel para comunica\xE7\xF5es entre o usu\xE1rio e as seguintes fun\xE7\xF5\
            es de seguran\xE7a do sistema, incluindo, no m\xEDnimo, autentica\xE7\xE3\
            o e reautentica\xE7\xE3o: [Atribui\xE7\xE3o: fun\xE7\xF5es de seguran\xE7\
            a definidas pela organiza\xE7\xE3o]."
          annotation: "Caminhos confi\xE1veis s\xE3o mecanismos pelos quais os usu\xE1\
            rios podem se comunicar (usando dispositivos de entrada como teclados)\
            \ diretamente com as fun\xE7\xF5es de seguran\xE7a dos sistemas, com a\
            \ garantia necess\xE1ria para apoiar as pol\xEDticas de seguran\xE7a.\
            \ Os mecanismos de caminho confi\xE1vel s\xF3 podem ser ativados por usu\xE1\
            rios ou pelas fun\xE7\xF5es de seguran\xE7a dos sistemas organizacionais.\
            \ As respostas dos usu\xE1rios que ocorrem por meio de caminhos confi\xE1\
            veis s\xE3o protegidas contra modifica\xE7\xE3o por e divulga\xE7\xE3\
            o a aplica\xE7\xF5es n\xE3o confi\xE1veis. As organiza\xE7\xF5es empregam\
            \ caminhos confi\xE1veis para conex\xF5es confi\xE1veis e de alta garantia\
            \ entre as fun\xE7\xF5es de seguran\xE7a dos sistemas e os usu\xE1rios,\
            \ inclusive durante os logons no sistema. As implementa\xE7\xF5es originais\
            \ de caminhos confi\xE1veis empregavam um sinal fora de banda para iniciar\
            \ o caminho, como o uso da tecla <BREAK>, que n\xE3o transmite caracteres\
            \ que possam ser falsificados. Em implementa\xE7\xF5es posteriores, utilizou-se\
            \ uma combina\xE7\xE3o de teclas que n\xE3o poderia ser sequestrada (por\
            \ exemplo, as teclas <CTRL> + <ALT> + <DEL>). Tais combina\xE7\xF5es de\
            \ teclas, no entanto, s\xE3o espec\xEDficas de plataforma e podem n\xE3\
            o fornecer uma implementa\xE7\xE3o de caminho confi\xE1vel em todos os\
            \ casos. A imposi\xE7\xE3o de caminhos de comunica\xE7\xE3o confi\xE1\
            veis \xE9 provida por uma implementa\xE7\xE3o espec\xEDfica que atende\
            \ ao conceito de monitor de refer\xEAncia."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-11(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-11(1)
      name: Trusted Path | Irrefutable Communications Path
      description: '(a) Provide a trusted communications path that is irrefutably
        distinguishable from other communications paths; and

        (b) Initiate the trusted communications path for communications between the
        [Assignment: organization-defined security functions] of the system and the
        user.'
      annotation: An irrefutable communications path permits the system to initiate
        a trusted path, which necessitates that the user can unmistakably recognize
        the source of the communication as a trusted system component. For example,
        the trusted path may appear in an area of the display that other applications
        cannot access or be based on the presence of an identifier that cannot be
        spoofed.
      translations:
        pt:
          name: "Caminho Confi\xE1vel | Caminho de Comunica\xE7\xE3o Irrefut\xE1vel"
          description: "(a) Prover um caminho de comunica\xE7\xE3o confi\xE1vel que\
            \ seja irrefutavelmente distingu\xEDvel de outros caminhos de comunica\xE7\
            \xE3o; e\n(b) Iniciar o caminho de comunica\xE7\xE3o confi\xE1vel para\
            \ comunica\xE7\xF5es entre as [Atribui\xE7\xE3o: fun\xE7\xF5es de seguran\xE7\
            a definidas pela organiza\xE7\xE3o] do sistema e o usu\xE1rio."
          annotation: "Um caminho de comunica\xE7\xE3o irrefut\xE1vel permite que\
            \ o sistema inicie um caminho confi\xE1vel, o que exige que o usu\xE1\
            rio possa reconhecer inequivocamente a origem da comunica\xE7\xE3o como\
            \ um componente confi\xE1vel do sistema. Por exemplo, o caminho confi\xE1\
            vel pode aparecer em uma \xE1rea da tela que outras aplica\xE7\xF5es n\xE3\
            o conseguem acessar ou basear-se na presen\xE7a de um identificador que\
            \ n\xE3o possa ser falsificado."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12
      name: Cryptographic Key Establishment and Management
      description: 'Establish and manage cryptographic keys when cryptography is employed
        within the system in accordance with the following key management requirements:
        [Assignment: organization-defined requirements for key generation, distribution,
        storage, access, and destruction].'
      annotation: Cryptographic key management and establishment can be performed
        using manual procedures or automated mechanisms with supporting manual procedures.
        Organizations define key management requirements in accordance with applicable
        laws, executive orders, directives, regulations, policies, standards, and
        guidelines and specify appropriate options, parameters, and levels. Organizations
        manage trust stores to ensure that only approved trust anchors are part of
        such trust stores. This includes certificates with visibility external to
        organizational systems and certificates related to the internal operations
        of systems. NIST CMVP and NIST CAVP provide additional information on validated
        cryptographic modules and algorithms that can be used in cryptographic key
        management and establishment.
      translations:
        pt:
          name: "Estabelecimento e Gest\xE3o de Chaves Criptogr\xE1ficas"
          description: "Estabelecer e gerenciar chaves criptogr\xE1ficas quando a\
            \ criptografia for empregada dentro do sistema, em conformidade com os\
            \ seguintes requisitos de gest\xE3o de chaves: [Atribui\xE7\xE3o: requisitos\
            \ definidos pela organiza\xE7\xE3o para gera\xE7\xE3o, distribui\xE7\xE3\
            o, armazenamento, acesso e destrui\xE7\xE3o de chaves]."
          annotation: "A gest\xE3o e o estabelecimento de chaves criptogr\xE1ficas\
            \ podem ser realizados usando procedimentos manuais ou mecanismos automatizados\
            \ com procedimentos manuais de apoio. As organiza\xE7\xF5es definem os\
            \ requisitos de gest\xE3o de chaves em conformidade com leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis e especificam op\xE7\xF5es, par\xE2metros e n\xEDveis apropriados.\
            \ As organiza\xE7\xF5es gerenciam armazenamentos de confian\xE7a (trust\
            \ stores) para garantir que apenas \xE2ncoras de confian\xE7a aprovadas\
            \ fa\xE7am parte de tais armazenamentos. Isso inclui certificados com\
            \ visibilidade externa aos sistemas organizacionais e certificados relacionados\
            \ \xE0s opera\xE7\xF5es internas dos sistemas. O NIST CMVP e o NIST CAVP\
            \ fornecem informa\xE7\xF5es adicionais sobre m\xF3dulos e algoritmos\
            \ criptogr\xE1ficos validados que podem ser usados na gest\xE3o e no estabelecimento\
            \ de chaves criptogr\xE1ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12(1)
      name: Cryptographic Key Establishment and Management | Availability
      description: Maintain availability of information in the event of the loss of
        cryptographic keys by users.
      annotation: Escrowing of encryption keys is a common practice for ensuring availability
        in the event of key loss. A forgotten passphrase is an example of losing a
        cryptographic key.
      translations:
        pt:
          name: "Estabelecimento e Gest\xE3o de Chaves Criptogr\xE1ficas | Disponibilidade"
          description: "Manter a disponibilidade das informa\xE7\xF5es na eventualidade\
            \ da perda de chaves criptogr\xE1ficas pelos usu\xE1rios."
          annotation: "O cust\xF3dia (escrow) de chaves de criptografia \xE9 uma pr\xE1\
            tica comum para garantir a disponibilidade na eventualidade da perda de\
            \ chaves. Uma frase secreta (passphrase) esquecida \xE9 um exemplo de\
            \ perda de uma chave criptogr\xE1fica."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12(2)
      name: Cryptographic Key Establishment and Management | Symmetric Keys
      description: 'Produce, control, and distribute symmetric cryptographic keys
        using [Selection: NIST FIPS-validated; NSA-approved] key management technology
        and processes.'
      annotation: SP 800-56A, SP 800-56B, and SP 800-56C provide guidance on cryptographic
        key establishment schemes and key derivation methods. SP 800-57-1, SP 800-57-2,
        and SP 800-57-3 provide guidance on cryptographic key management.
      translations:
        pt:
          name: "Estabelecimento e Gest\xE3o de Chaves Criptogr\xE1ficas | Chaves\
            \ Sim\xE9tricas"
          description: "Produzir, controlar e distribuir chaves criptogr\xE1ficas\
            \ sim\xE9tricas usando tecnologia e processos de gest\xE3o de chaves [Sele\xE7\
            \xE3o: validados pelo NIST FIPS; aprovados pela NSA]."
          annotation: "As publica\xE7\xF5es SP 800-56A, SP 800-56B e SP 800-56C fornecem\
            \ orienta\xE7\xE3o sobre esquemas de estabelecimento de chaves criptogr\xE1\
            ficas e m\xE9todos de deriva\xE7\xE3o de chaves. As publica\xE7\xF5es\
            \ SP 800-57-1, SP 800-57-2 e SP 800-57-3 fornecem orienta\xE7\xE3o sobre\
            \ a gest\xE3o de chaves criptogr\xE1ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12(3)
      name: Cryptographic Key Establishment and Management | Asymmetric Keys
      description: "Produce, control, and distribute asymmetric cryptographic keys\
        \ using [Selection: NSA-approved key management technology and processes;\
        \ prepositioned keying material; DoD-approved or DoD-issued Medium Assurance\
        \ PKI certificates; DoD-approved or DoD-issued Medium Hardware Assurance PKI\
        \ certificates and hardware security tokens that protect the user\u2019s private\
        \ key; certificates issued in accordance with organization-defined requirements]."
      annotation: SP 800-56A, SP 800-56B, and SP 800-56C provide guidance on cryptographic
        key establishment schemes and key derivation methods. SP 800-57-1, SP 800-57-2,
        and SP 800-57-3 provide guidance on cryptographic key management.
      translations:
        pt:
          name: "Estabelecimento e Gest\xE3o de Chaves Criptogr\xE1ficas | Chaves\
            \ Assim\xE9tricas"
          description: "Produzir, controlar e distribuir chaves criptogr\xE1ficas\
            \ assim\xE9tricas usando [Sele\xE7\xE3o: tecnologia e processos de gest\xE3\
            o de chaves aprovados pela NSA; material de chaveamento pr\xE9-posicionado;\
            \ certificados PKI de Garantia M\xE9dia aprovados ou emitidos pelo DoD;\
            \ certificados PKI de Garantia M\xE9dia de Hardware aprovados ou emitidos\
            \ pelo DoD e tokens de seguran\xE7a de hardware que protejam a chave privada\
            \ do usu\xE1rio; certificados emitidos em conformidade com requisitos\
            \ definidos pela organiza\xE7\xE3o]."
          annotation: "As publica\xE7\xF5es SP 800-56A, SP 800-56B e SP 800-56C fornecem\
            \ orienta\xE7\xE3o sobre esquemas de estabelecimento de chaves criptogr\xE1\
            ficas e m\xE9todos de deriva\xE7\xE3o de chaves. As publica\xE7\xF5es\
            \ SP 800-57-1, SP 800-57-2 e SP 800-57-3 fornecem orienta\xE7\xE3o sobre\
            \ a gest\xE3o de chaves criptogr\xE1ficas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-13(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-13(4)
      name: Cryptographic Protection | Digital Signatures
      description: '[Withdrawn: Incorporated into SC-13.]'
      translations:
        pt:
          name: "Prote\xE7\xE3o Criptogr\xE1fica | Assinaturas Digitais"
          description: '[Retirado: Incorporado ao SC-13.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-14
      name: Public Access Protections
      description: '[Withdrawn: Incorporated into AC-2, AC-3, AC-5, AC-6, SI-3, SI-4,
        SI-5, SI-7, and SI-10.]'
      translations:
        pt:
          name: "Prote\xE7\xF5es de Acesso P\xFAblico"
          description: '[Retirado: Incorporado aos AC-2, AC-3, AC-5, AC-6, SI-3, SI-4,
            SI-5, SI-7 e SI-10.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-12(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-12(6)
      name: Cryptographic Key Establishment and Management | Physical Control of Keys
      description: Maintain physical control of cryptographic keys when stored information
        is encrypted by external service providers.
      annotation: For organizations that use external service providers (e.g., cloud
        service or data center providers), physical control of cryptographic keys
        provides additional assurance that information stored by such external providers
        is not subject to unauthorized disclosure or modification.
      translations:
        pt:
          name: "Estabelecimento e Gest\xE3o de Chaves Criptogr\xE1ficas | Controle\
            \ F\xEDsico das Chaves"
          description: "Manter o controle f\xEDsico das chaves criptogr\xE1ficas quando\
            \ as informa\xE7\xF5es armazenadas forem criptografadas por provedores\
            \ de servi\xE7os externos."
          annotation: "Para organiza\xE7\xF5es que usam provedores de servi\xE7os\
            \ externos (por exemplo, provedores de servi\xE7os em nuvem ou de data\
            \ center), o controle f\xEDsico das chaves criptogr\xE1ficas fornece garantia\
            \ adicional de que as informa\xE7\xF5es armazenadas por tais provedores\
            \ externos n\xE3o estejam sujeitas a divulga\xE7\xE3o ou modifica\xE7\xE3\
            o n\xE3o autorizada."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-13
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc
      ref_id: SC-13
      name: Cryptographic Protection
      description: 'a. Determine the [Assignment: organization-defined cryptographic
        uses]; and

        b. Implement the following types of cryptography required for each specified
        cryptographic use: [Assignment: organization-defined types of cryptography
        for each specified cryptographic use].'
      annotation: Cryptography can be employed to support a variety of security solutions,
        including the protection of classified information and controlled unclassified
        information, the provision and implementation of digital signatures, and the
        enforcement of information separation when authorized individuals have the
        necessary clearances but lack the necessary formal access approvals. Cryptography
        can also be used to support random number and hash generation. Generally applicable
        cryptographic standards include FIPS-validated cryptography and NSA-approved
        cryptography. For example, organizations that need to protect classified information
        may specify the use of NSA-approved cryptography. Organizations that need
        to provision and implement digital signatures may specify the use of FIPS-validated
        cryptography. Cryptography is implemented in accordance with applicable laws,
        executive orders, directives, regulations, policies, standards, and guidelines.
      translations:
        pt:
          name: "Prote\xE7\xE3o Criptogr\xE1fica"
          description: "a. Determinar os [Atribui\xE7\xE3o: usos criptogr\xE1ficos\
            \ definidos pela organiza\xE7\xE3o]; e\nb. Implementar os seguintes tipos\
            \ de criptografia exigidos para cada uso criptogr\xE1fico especificado:\
            \ [Atribui\xE7\xE3o: tipos de criptografia definidos pela organiza\xE7\
            \xE3o para cada uso criptogr\xE1fico especificado]."
          annotation: "A criptografia pode ser empregada para apoiar uma variedade\
            \ de solu\xE7\xF5es de seguran\xE7a, incluindo a prote\xE7\xE3o de informa\xE7\
            \xF5es classificadas e de informa\xE7\xF5es n\xE3o classificadas controladas,\
            \ a provis\xE3o e implementa\xE7\xE3o de assinaturas digitais e a imposi\xE7\
            \xE3o da separa\xE7\xE3o de informa\xE7\xF5es quando indiv\xEDduos autorizados\
            \ possuem as habilita\xE7\xF5es necess\xE1rias, mas carecem das aprova\xE7\
            \xF5es formais de acesso necess\xE1rias. A criptografia tamb\xE9m pode\
            \ ser usada para apoiar a gera\xE7\xE3o de n\xFAmeros aleat\xF3rios e\
            \ de hashes. As normas criptogr\xE1ficas geralmente aplic\xE1veis incluem\
            \ a criptografia validada pelo FIPS e a criptografia aprovada pela NSA.\
            \ Por exemplo, organiza\xE7\xF5es que precisam proteger informa\xE7\xF5\
            es classificadas podem especificar o uso de criptografia aprovada pela\
            \ NSA. Organiza\xE7\xF5es que precisam prover e implementar assinaturas\
            \ digitais podem especificar o uso de criptografia validada pelo FIPS.\
            \ A criptografia \xE9 implementada em conformidade com leis, ordens executivas,\
            \ diretivas, regulamentos, pol\xEDticas, normas e diretrizes aplic\xE1\
            veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc-15(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:sc

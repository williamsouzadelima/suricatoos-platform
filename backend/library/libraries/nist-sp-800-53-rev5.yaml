    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16
      name: Security and Privacy Attributes
      description: 'a. Provide the means to associate [Assignment: organization-defined
        types of security and privacy attributes] with [Assignment: organization-defined
        security and privacy attribute values] for information in storage, in process,
        and/or in transmission;

        b. Ensure that the attribute associations are made and retained with the information;

        c. Establish the following permitted security and privacy attributes from
        the attributes defined in AC-16a for [Assignment: organization-defined systems]:
        [Assignment: organization-defined security and privacy attributes];

        d. Determine the following permitted attribute values or ranges for each of
        the established attributes: [Assignment: organization-defined attribute values
        or ranges for established attributes];

        e. Audit changes to attributes; and

        f. Review [Assignment: organization-defined security and privacy attributes]
        for applicability [Assignment: organization-defined frequency].'
      annotation: 'Information is represented internally within systems using abstractions
        known as data structures. Internal data structures can represent different
        types of entities, both active and passive. Active entities, also known as
        subjects, are typically associated with individuals, devices, or processes
        acting on behalf of individuals. Passive entities, also known as objects,
        are typically associated with data structures, such as records, buffers, tables,
        files, inter-process pipes, and communications ports. Security attributes,
        a form of metadata, are abstractions that represent the basic properties or
        characteristics of active and passive entities with respect to safeguarding
        information. Privacy attributes, which may be used independently or in conjunction
        with security attributes, represent the basic properties or characteristics
        of active or passive entities with respect to the management of personally
        identifiable information. Attributes can be either explicitly or implicitly
        associated with the information contained in organizational systems or system
        components.

        Attributes may be associated with active entities (i.e., subjects) that have
        the potential to send or receive information, cause information to flow among
        objects, or change the system state. These attributes may also be associated
        with passive entities (i.e., objects) that contain or receive information.
        The association of attributes to subjects and objects by a system is referred
        to as binding and is inclusive of setting the attribute value and the attribute
        type. Attributes, when bound to data or information, permit the enforcement
        of security and privacy policies for access control and information flow control,
        including data retention limits, permitted uses of personally identifiable
        information, and identification of personal information within data objects.
        Such enforcement occurs through organizational processes or system functions
        or mechanisms. The binding techniques implemented by systems affect the strength
        of attribute binding to information. Binding strength and the assurance associated
        with binding techniques play important parts in the trust that organizations
        have in the information flow enforcement process. The binding techniques affect
        the number and degree of additional reviews required by organizations. The
        content or assigned values of attributes can directly affect the ability of
        individuals to access organizational information.

        Organizations can define the types of attributes needed for systems to support
        missions or business functions. There are many values that can be assigned
        to a security attribute. By specifying the permitted attribute ranges and
        values, organizations ensure that attribute values are meaningful and relevant.
        Labeling refers to the association of attributes with the subjects and objects
        represented by the internal data structures within systems. This facilitates
        system-based enforcement of information security and privacy policies. Labels
        include classification of information in accordance with legal and compliance
        requirements (e.g., top secret, secret, confidential, controlled unclassified),
        information impact level; high value asset information, access authorizations,
        nationality; data life cycle protection (i.e., encryption and data expiration),
        personally identifiable information processing permissions, including individual
        consent to personally identifiable information processing, and contractor
        affiliation. A related term to labeling is marking. Marking refers to the
        association of attributes with objects in a human-readable form and displayed
        on system media. Marking enables manual, procedural, or process-based enforcement
        of information security and privacy policies. Security and privacy labels
        may have the same value as media markings (e.g., top secret, secret, confidential).
        See MP-3 (Media Marking).'
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade"
          description: "a. Fornecer os meios para associar [Atribui\xE7\xE3o: tipos\
            \ de atributos de seguran\xE7a e privacidade definidos pela organiza\xE7\
            \xE3o] a [Atribui\xE7\xE3o: valores de atributos de seguran\xE7a e privacidade\
            \ definidos pela organiza\xE7\xE3o] para informa\xE7\xF5es em armazenamento,\
            \ em processamento e/ou em transmiss\xE3o;\nb. Garantir que as associa\xE7\
            \xF5es de atributos sejam feitas e mantidas com a informa\xE7\xE3o;\n\
            c. Estabelecer os seguintes atributos permitidos de seguran\xE7a e privacidade\
            \ a partir dos atributos definidos em AC-16a para [Atribui\xE7\xE3o: sistemas\
            \ definidos pela organiza\xE7\xE3o]: [Atribui\xE7\xE3o: atributos de seguran\xE7\
            a e privacidade definidos pela organiza\xE7\xE3o];\nd. Determinar os seguintes\
            \ valores ou intervalos de atributos permitidos para cada um dos atributos\
            \ estabelecidos: [Atribui\xE7\xE3o: valores ou intervalos de atributos\
            \ definidos pela organiza\xE7\xE3o para os atributos estabelecidos];\n\
            e. Auditar as altera\xE7\xF5es nos atributos; e\nf. Revisar [Atribui\xE7\
            \xE3o: atributos de seguran\xE7a e privacidade definidos pela organiza\xE7\
            \xE3o] quanto \xE0 aplicabilidade [Atribui\xE7\xE3o: frequ\xEAncia definida\
            \ pela organiza\xE7\xE3o]."
          annotation: "As informa\xE7\xF5es s\xE3o representadas internamente nos\
            \ sistemas por meio de abstra\xE7\xF5es conhecidas como estruturas de\
            \ dados. As estruturas de dados internas podem representar diferentes\
            \ tipos de entidades, tanto ativas quanto passivas. As entidades ativas,\
            \ tamb\xE9m conhecidas como sujeitos, s\xE3o tipicamente associadas a\
            \ indiv\xEDduos, dispositivos ou processos que atuam em nome de indiv\xED\
            duos. As entidades passivas, tamb\xE9m conhecidas como objetos, s\xE3\
            o tipicamente associadas a estruturas de dados, tais como registros, buffers,\
            \ tabelas, arquivos, pipes entre processos e portas de comunica\xE7\xE3\
            o. Os atributos de seguran\xE7a, uma forma de metadado, s\xE3o abstra\xE7\
            \xF5es que representam as propriedades ou caracter\xEDsticas b\xE1sicas\
            \ das entidades ativas e passivas no que diz respeito \xE0 salvaguarda\
            \ da informa\xE7\xE3o. Os atributos de privacidade, que podem ser usados\
            \ de forma independente ou em conjunto com os atributos de seguran\xE7\
            a, representam as propriedades ou caracter\xEDsticas b\xE1sicas das entidades\
            \ ativas ou passivas no que diz respeito \xE0 gest\xE3o de informa\xE7\
            \xF5es de identifica\xE7\xE3o pessoal. Os atributos podem ser associados\
            \ expl\xEDcita ou implicitamente \xE0s informa\xE7\xF5es contidas nos\
            \ sistemas organizacionais ou nos componentes do sistema.\nOs atributos\
            \ podem ser associados a entidades ativas (ou seja, sujeitos) que t\xEA\
            m o potencial de enviar ou receber informa\xE7\xF5es, fazer com que informa\xE7\
            \xF5es fluam entre objetos ou alterar o estado do sistema. Esses atributos\
            \ tamb\xE9m podem ser associados a entidades passivas (ou seja, objetos)\
            \ que cont\xEAm ou recebem informa\xE7\xF5es. A associa\xE7\xE3o de atributos\
            \ a sujeitos e objetos por um sistema \xE9 referida como vincula\xE7\xE3\
            o (binding) e inclui a defini\xE7\xE3o do valor do atributo e do tipo\
            \ do atributo. Os atributos, quando vinculados a dados ou informa\xE7\xF5\
            es, permitem a aplica\xE7\xE3o de pol\xEDticas de seguran\xE7a e privacidade\
            \ para controle de acesso e controle de fluxo de informa\xE7\xF5es, incluindo\
            \ limites de reten\xE7\xE3o de dados, usos permitidos de informa\xE7\xF5\
            es de identifica\xE7\xE3o pessoal e identifica\xE7\xE3o de informa\xE7\
            \xF5es pessoais dentro de objetos de dados. Essa aplica\xE7\xE3o ocorre\
            \ por meio de processos organizacionais ou fun\xE7\xF5es ou mecanismos\
            \ do sistema. As t\xE9cnicas de vincula\xE7\xE3o implementadas pelos sistemas\
            \ afetam a robustez da vincula\xE7\xE3o dos atributos \xE0 informa\xE7\
            \xE3o. A robustez da vincula\xE7\xE3o e a garantia associada \xE0s t\xE9\
            cnicas de vincula\xE7\xE3o desempenham pap\xE9is importantes na confian\xE7\
            a que as organiza\xE7\xF5es t\xEAm no processo de aplica\xE7\xE3o do fluxo\
            \ de informa\xE7\xF5es. As t\xE9cnicas de vincula\xE7\xE3o afetam o n\xFA\
            mero e o grau de revis\xF5es adicionais exigidas pelas organiza\xE7\xF5\
            es. O conte\xFAdo ou os valores atribu\xEDdos aos atributos podem afetar\
            \ diretamente a capacidade dos indiv\xEDduos de acessar informa\xE7\xF5\
            es organizacionais.\nAs organiza\xE7\xF5es podem definir os tipos de atributos\
            \ necess\xE1rios para que os sistemas apoiem miss\xF5es ou fun\xE7\xF5\
            es de neg\xF3cio. H\xE1 muitos valores que podem ser atribu\xEDdos a um\
            \ atributo de seguran\xE7a. Ao especificar os intervalos e valores permitidos\
            \ de atributos, as organiza\xE7\xF5es garantem que os valores dos atributos\
            \ sejam significativos e relevantes. A rotulagem (labeling) refere-se\
            \ \xE0 associa\xE7\xE3o de atributos aos sujeitos e objetos representados\
            \ pelas estruturas de dados internas dentro dos sistemas. Isso facilita\
            \ a aplica\xE7\xE3o, baseada no sistema, das pol\xEDticas de seguran\xE7\
            a da informa\xE7\xE3o e privacidade. Os r\xF3tulos incluem a classifica\xE7\
            \xE3o da informa\xE7\xE3o de acordo com requisitos legais e de conformidade\
            \ (por exemplo, ultrassecreto, secreto, confidencial, n\xE3o classificado\
            \ controlado), n\xEDvel de impacto da informa\xE7\xE3o; informa\xE7\xF5\
            es de ativos de alto valor, autoriza\xE7\xF5es de acesso, nacionalidade;\
            \ prote\xE7\xE3o do ciclo de vida dos dados (ou seja, criptografia e expira\xE7\
            \xE3o de dados), permiss\xF5es de processamento de informa\xE7\xF5es de\
            \ identifica\xE7\xE3o pessoal, incluindo o consentimento individual para\
            \ o processamento de informa\xE7\xF5es de identifica\xE7\xE3o pessoal,\
            \ e afilia\xE7\xE3o de contratado. Um termo relacionado \xE0 rotulagem\
            \ \xE9 a marca\xE7\xE3o (marking). A marca\xE7\xE3o refere-se \xE0 associa\xE7\
            \xE3o de atributos a objetos em uma forma leg\xEDvel por humanos e exibida\
            \ em m\xEDdias do sistema. A marca\xE7\xE3o possibilita a aplica\xE7\xE3\
            o manual, procedimental ou baseada em processos das pol\xEDticas de seguran\xE7\
            a da informa\xE7\xE3o e privacidade. Os r\xF3tulos de seguran\xE7a e privacidade\
            \ podem ter o mesmo valor que as marca\xE7\xF5es de m\xEDdia (por exemplo,\
            \ ultrassecreto, secreto, confidencial). Consulte MP-3 (Marca\xE7\xE3\
            o de M\xEDdia)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(1)
      name: Security and Privacy Attributes | Dynamic Attribute Association
      description: 'Dynamically associate security and privacy attributes with [Assignment:
        organization-defined subjects and objects] in accordance with the following
        security and privacy policies as information is created and combined: [Assignment:
        organization-defined security and privacy policies].'
      annotation: Dynamic association of attributes is appropriate whenever the security
        or privacy characteristics of information change over time. Attributes may
        change due to information aggregation issues (i.e., characteristics of individual
        data elements are different from the combined elements), changes in individual
        access authorizations (i.e., privileges), changes in the security category
        of information, or changes in security or privacy policies. Attributes may
        also change situationally.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Associa\xE7\xE3o Din\xE2\
            mica de Atributos"
          description: "Associar dinamicamente atributos de seguran\xE7a e privacidade\
            \ a [Atribui\xE7\xE3o: sujeitos e objetos definidos pela organiza\xE7\xE3\
            o] de acordo com as seguintes pol\xEDticas de seguran\xE7a e privacidade\
            \ \xE0 medida que as informa\xE7\xF5es s\xE3o criadas e combinadas: [Atribui\xE7\
            \xE3o: pol\xEDticas de seguran\xE7a e privacidade definidas pela organiza\xE7\
            \xE3o]."
          annotation: "A associa\xE7\xE3o din\xE2mica de atributos \xE9 apropriada\
            \ sempre que as caracter\xEDsticas de seguran\xE7a ou privacidade da informa\xE7\
            \xE3o mudam ao longo do tempo. Os atributos podem mudar devido a quest\xF5\
            es de agrega\xE7\xE3o de informa\xE7\xF5es (ou seja, as caracter\xEDsticas\
            \ de elementos de dados individuais s\xE3o diferentes das dos elementos\
            \ combinados), mudan\xE7as nas autoriza\xE7\xF5es de acesso individuais\
            \ (ou seja, privil\xE9gios), mudan\xE7as na categoria de seguran\xE7a\
            \ da informa\xE7\xE3o ou mudan\xE7as nas pol\xEDticas de seguran\xE7a\
            \ ou privacidade. Os atributos tamb\xE9m podem mudar de acordo com a situa\xE7\
            \xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(2)
      name: Security and Privacy Attributes | Attribute Value Changes by Authorized
        Individuals
      description: Provide authorized individuals (or processes acting on behalf of
        individuals) the capability to define or change the value of associated security
        and privacy attributes.
      annotation: The content or assigned values of attributes can directly affect
        the ability of individuals to access organizational information. Therefore,
        it is important for systems to be able to limit the ability to create or modify
        attributes to authorized individuals.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Altera\xE7\xF5es de Valor\
            \ de Atributo por Indiv\xEDduos Autorizados"
          description: "Fornecer a indiv\xEDduos autorizados (ou processos que atuam\
            \ em nome de indiv\xEDduos) a capacidade de definir ou alterar o valor\
            \ dos atributos de seguran\xE7a e privacidade associados."
          annotation: "O conte\xFAdo ou os valores atribu\xEDdos aos atributos podem\
            \ afetar diretamente a capacidade dos indiv\xEDduos de acessar informa\xE7\
            \xF5es organizacionais. Portanto, \xE9 importante que os sistemas sejam\
            \ capazes de limitar a apenas indiv\xEDduos autorizados a capacidade de\
            \ criar ou modificar atributos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(3)
      name: Security and Privacy Attributes | Maintenance of Attribute Associations
        by System
      description: 'Maintain the association and integrity of [Assignment: organization-defined
        security and privacy attributes] to [Assignment: organization-defined subjects
        and objects].'
      annotation: Maintaining the association and integrity of security and privacy
        attributes to subjects and objects with sufficient assurance helps to ensure
        that the attribute associations can be used as the basis of automated policy
        actions. The integrity of specific items, such as security configuration files,
        may be maintained through the use of an integrity monitoring mechanism that
        detects anomalies and changes that deviate from known good baselines. Automated
        policy actions include retention date expirations, access control decisions,
        information flow control decisions, and information disclosure decisions.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Manuten\xE7\xE3o das Associa\xE7\
            \xF5es de Atributos pelo Sistema"
          description: "Manter a associa\xE7\xE3o e a integridade de [Atribui\xE7\xE3\
            o: atributos de seguran\xE7a e privacidade definidos pela organiza\xE7\
            \xE3o] a [Atribui\xE7\xE3o: sujeitos e objetos definidos pela organiza\xE7\
            \xE3o]."
          annotation: "Manter a associa\xE7\xE3o e a integridade dos atributos de\
            \ seguran\xE7a e privacidade a sujeitos e objetos com garantia suficiente\
            \ ajuda a assegurar que as associa\xE7\xF5es de atributos possam ser usadas\
            \ como base para a\xE7\xF5es automatizadas de pol\xEDtica. A integridade\
            \ de itens espec\xEDficos, tais como arquivos de configura\xE7\xE3o de\
            \ seguran\xE7a, pode ser mantida por meio do uso de um mecanismo de monitoramento\
            \ de integridade que detecta anomalias e altera\xE7\xF5es que se desviam\
            \ de baselines reconhecidamente \xEDntegras. As a\xE7\xF5es automatizadas\
            \ de pol\xEDtica incluem expira\xE7\xF5es de data de reten\xE7\xE3o, decis\xF5\
            es de controle de acesso, decis\xF5es de controle de fluxo de informa\xE7\
            \xF5es e decis\xF5es de divulga\xE7\xE3o de informa\xE7\xF5es."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(4)
      name: Security and Privacy Attributes | Association of Attributes by Authorized
        Individuals
      description: 'Provide the capability to associate [Assignment: organization-defined
        security and privacy attributes] with [Assignment: organization-defined subjects
        and objects] by authorized individuals (or processes acting on behalf of individuals).'
      annotation: Systems, in general, provide the capability for privileged users
        to assign security and privacy attributes to system-defined subjects (e.g.,
        users) and objects (e.g., directories, files, and ports). Some systems provide
        additional capability for general users to assign security and privacy attributes
        to additional objects (e.g., files, emails). The association of attributes
        by authorized individuals is described in the design documentation. The support
        provided by systems can include prompting users to select security and privacy
        attributes to be associated with information objects, employing automated
        mechanisms to categorize information with attributes based on defined policies,
        or ensuring that the combination of the security or privacy attributes selected
        is valid. Organizations consider the creation, deletion, or modification of
        attributes when defining auditable events.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Associa\xE7\xE3o de Atributos\
            \ por Indiv\xEDduos Autorizados"
          description: "Fornecer a capacidade de associar [Atribui\xE7\xE3o: atributos\
            \ de seguran\xE7a e privacidade definidos pela organiza\xE7\xE3o] a [Atribui\xE7\
            \xE3o: sujeitos e objetos definidos pela organiza\xE7\xE3o] por indiv\xED\
            duos autorizados (ou processos que atuam em nome de indiv\xEDduos)."
          annotation: "Os sistemas, em geral, fornecem a capacidade de usu\xE1rios\
            \ privilegiados atribu\xEDrem atributos de seguran\xE7a e privacidade\
            \ a sujeitos definidos pelo sistema (por exemplo, usu\xE1rios) e objetos\
            \ (por exemplo, diret\xF3rios, arquivos e portas). Alguns sistemas fornecem\
            \ capacidade adicional para que usu\xE1rios gerais atribuam atributos\
            \ de seguran\xE7a e privacidade a objetos adicionais (por exemplo, arquivos,\
            \ e-mails). A associa\xE7\xE3o de atributos por indiv\xEDduos autorizados\
            \ \xE9 descrita na documenta\xE7\xE3o de design. O suporte fornecido pelos\
            \ sistemas pode incluir solicitar aos usu\xE1rios que selecionem atributos\
            \ de seguran\xE7a e privacidade a serem associados a objetos de informa\xE7\
            \xE3o, empregar mecanismos automatizados para categorizar informa\xE7\xF5\
            es com atributos com base em pol\xEDticas definidas, ou garantir que a\
            \ combina\xE7\xE3o dos atributos de seguran\xE7a ou privacidade selecionados\
            \ seja v\xE1lida. As organiza\xE7\xF5es consideram a cria\xE7\xE3o, exclus\xE3\
            o ou modifica\xE7\xE3o de atributos ao definir eventos audit\xE1veis."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(5)
      name: Security and Privacy Attributes | Attribute Displays on Objects to Be
        Output
      description: 'Display security and privacy attributes in human-readable form
        on each object that the system transmits to output devices to identify [Assignment:
        organization-defined special dissemination, handling, or distribution instructions]
        using [Assignment: organization-defined human-readable, standard naming conventions].'
      annotation: System outputs include printed pages, screens, or equivalent items.
        System output devices include printers, notebook computers, video displays,
        smart phones, and tablets. To mitigate the risk of unauthorized exposure of
        information (e.g., shoulder surfing), the outputs display full attribute values
        when unmasked by the subscriber.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Exibi\xE7\xE3o de Atributos\
            \ em Objetos a Serem Emitidos"
          description: "Exibir os atributos de seguran\xE7a e privacidade em forma\
            \ leg\xEDvel por humanos em cada objeto que o sistema transmite para dispositivos\
            \ de sa\xEDda a fim de identificar [Atribui\xE7\xE3o: instru\xE7\xF5es\
            \ especiais de dissemina\xE7\xE3o, manuseio ou distribui\xE7\xE3o definidas\
            \ pela organiza\xE7\xE3o] utilizando [Atribui\xE7\xE3o: conven\xE7\xF5\
            es de nomenclatura padronizadas e leg\xEDveis por humanos definidas pela\
            \ organiza\xE7\xE3o]."
          annotation: "As sa\xEDdas do sistema incluem p\xE1ginas impressas, telas\
            \ ou itens equivalentes. Os dispositivos de sa\xEDda do sistema incluem\
            \ impressoras, notebooks, monitores de v\xEDdeo, smartphones e tablets.\
            \ Para mitigar o risco de exposi\xE7\xE3o n\xE3o autorizada de informa\xE7\
            \xF5es (por exemplo, espiar por cima do ombro - shoulder surfing), as\
            \ sa\xEDdas exibem os valores completos dos atributos quando desmascarados\
            \ pelo assinante."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(6)
      name: Security and Privacy Attributes | Maintenance of Attribute Association
      description: 'Require personnel to associate and maintain the association of
        [Assignment: organization-defined security and privacy attributes] with [Assignment:
        organization-defined subjects and objects] in accordance with [Assignment:
        organization-defined security and privacy policies].'
      annotation: Maintaining attribute association requires individual users (as
        opposed to the system) to maintain associations of defined security and privacy
        attributes with subjects and objects.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Manuten\xE7\xE3o da Associa\xE7\
            \xE3o de Atributos"
          description: "Exigir que o pessoal associe e mantenha a associa\xE7\xE3\
            o de [Atribui\xE7\xE3o: atributos de seguran\xE7a e privacidade definidos\
            \ pela organiza\xE7\xE3o] a [Atribui\xE7\xE3o: sujeitos e objetos definidos\
            \ pela organiza\xE7\xE3o] de acordo com [Atribui\xE7\xE3o: pol\xEDticas\
            \ de seguran\xE7a e privacidade definidas pela organiza\xE7\xE3o]."
          annotation: "Manter a associa\xE7\xE3o de atributos exige que os usu\xE1\
            rios individuais (em oposi\xE7\xE3o ao sistema) mantenham as associa\xE7\
            \xF5es dos atributos de seguran\xE7a e privacidade definidos com sujeitos\
            \ e objetos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(7)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(7)
      name: Security and Privacy Attributes | Consistent Attribute Interpretation
      description: Provide a consistent interpretation of security and privacy attributes
        transmitted between distributed system components.
      annotation: To enforce security and privacy policies across multiple system
        components in distributed systems, organizations provide a consistent interpretation
        of security and privacy attributes employed in access enforcement and flow
        enforcement decisions. Organizations can establish agreements and processes
        to help ensure that distributed system components implement attributes with
        consistent interpretations in automated access enforcement and flow enforcement
        actions.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Interpreta\xE7\xE3o Consistente\
            \ de Atributos"
          description: "Fornecer uma interpreta\xE7\xE3o consistente dos atributos\
            \ de seguran\xE7a e privacidade transmitidos entre componentes de sistema\
            \ distribu\xEDdos."
          annotation: "Para aplicar pol\xEDticas de seguran\xE7a e privacidade em\
            \ m\xFAltiplos componentes de sistema em sistemas distribu\xEDdos, as\
            \ organiza\xE7\xF5es fornecem uma interpreta\xE7\xE3o consistente dos\
            \ atributos de seguran\xE7a e privacidade empregados nas decis\xF5es de\
            \ aplica\xE7\xE3o de acesso e de aplica\xE7\xE3o de fluxo. As organiza\xE7\
            \xF5es podem estabelecer acordos e processos para ajudar a assegurar que\
            \ os componentes de sistema distribu\xEDdos implementem atributos com\
            \ interpreta\xE7\xF5es consistentes em a\xE7\xF5es automatizadas de aplica\xE7\
            \xE3o de acesso e de aplica\xE7\xE3o de fluxo."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(8)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(8)
      name: Security and Privacy Attributes | Association Techniques and Technologies
      description: 'Implement [Assignment: organization-defined techniques and technologies]
        in associating security and privacy attributes to information.'
      annotation: "\_ The association of security and privacy attributes to information\
        \ within systems is important for conducting automated access enforcement\
        \ and flow enforcement actions. The association of such attributes to information\
        \ (i.e., binding) can be accomplished with technologies and techniques that\
        \ provide different levels of assurance. For example, systems can cryptographically\
        \ bind attributes to information using digital signatures that support cryptographic\
        \ keys protected by hardware devices (sometimes known as hardware roots of\
        \ trust)."
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | T\xE9cnicas e Tecnologias\
            \ de Associa\xE7\xE3o"
          description: "Implementar [Atribui\xE7\xE3o: t\xE9cnicas e tecnologias definidas\
            \ pela organiza\xE7\xE3o] na associa\xE7\xE3o de atributos de seguran\xE7\
            a e privacidade \xE0 informa\xE7\xE3o."
          annotation: "  A associa\xE7\xE3o de atributos de seguran\xE7a e privacidade\
            \ \xE0 informa\xE7\xE3o dentro dos sistemas \xE9 importante para a realiza\xE7\
            \xE3o de a\xE7\xF5es automatizadas de aplica\xE7\xE3o de acesso e de aplica\xE7\
            \xE3o de fluxo. A associa\xE7\xE3o de tais atributos \xE0 informa\xE7\xE3\
            o (ou seja, vincula\xE7\xE3o) pode ser realizada com tecnologias e t\xE9\
            cnicas que fornecem diferentes n\xEDveis de garantia. Por exemplo, os\
            \ sistemas podem vincular criptograficamente atributos \xE0 informa\xE7\
            \xE3o usando assinaturas digitais que suportam chaves criptogr\xE1ficas\
            \ protegidas por dispositivos de hardware (\xE0s vezes conhecidos como\
            \ ra\xEDzes de confian\xE7a de hardware - hardware roots of trust)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(9)
      name: "Security and Privacy Attributes | Attribute Reassignment \u2014 Regrading\
        \ Mechanisms"
      description: 'Change security and privacy attributes associated with information
        only via regrading mechanisms validated using [Assignment: organization-defined
        techniques or procedures].'
      annotation: A regrading mechanism is a trusted process authorized to re-classify
        and re-label data in accordance with a defined policy exception. Validated
        regrading mechanisms are used by organizations to provide the requisite levels
        of assurance for attribute reassignment activities. The validation is facilitated
        by ensuring that regrading mechanisms are single purpose and of limited function.
        Since security and privacy attribute changes can directly affect policy enforcement
        actions, implementing trustworthy regrading mechanisms is necessary to help
        ensure that such mechanisms perform in a consistent and correct mode of operation.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Reatribui\xE7\xE3o de Atributos\
            \ \u2014 Mecanismos de Reclassifica\xE7\xE3o"
          description: "Alterar os atributos de seguran\xE7a e privacidade associados\
            \ \xE0 informa\xE7\xE3o somente por meio de mecanismos de reclassifica\xE7\
            \xE3o (regrading) validados utilizando [Atribui\xE7\xE3o: t\xE9cnicas\
            \ ou procedimentos definidos pela organiza\xE7\xE3o]."
          annotation: "Um mecanismo de reclassifica\xE7\xE3o (regrading) \xE9 um processo\
            \ confi\xE1vel autorizado a reclassificar e rerrotular dados de acordo\
            \ com uma exce\xE7\xE3o de pol\xEDtica definida. Mecanismos de reclassifica\xE7\
            \xE3o validados s\xE3o usados pelas organiza\xE7\xF5es para fornecer os\
            \ n\xEDveis necess\xE1rios de garantia para as atividades de reatribui\xE7\
            \xE3o de atributos. A valida\xE7\xE3o \xE9 facilitada ao garantir que\
            \ os mecanismos de reclassifica\xE7\xE3o sejam de prop\xF3sito \xFAnico\
            \ e de fun\xE7\xE3o limitada. Como as altera\xE7\xF5es nos atributos de\
            \ seguran\xE7a e privacidade podem afetar diretamente as a\xE7\xF5es de\
            \ aplica\xE7\xE3o de pol\xEDtica, a implementa\xE7\xE3o de mecanismos\
            \ de reclassifica\xE7\xE3o confi\xE1veis \xE9 necess\xE1ria para ajudar\
            \ a assegurar que tais mecanismos operem de modo consistente e correto."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-16(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-16(10)
      name: Security and Privacy Attributes | Attribute Configuration by Authorized
        Individuals
      description: Provide authorized individuals the capability to define or change
        the type and value of security and privacy attributes available for association
        with subjects and objects.
      annotation: The content or assigned values of security and privacy attributes
        can directly affect the ability of individuals to access organizational information.
        Thus, it is important for systems to be able to limit the ability to create
        or modify the type and value of attributes available for association with
        subjects and objects to authorized individuals only.
      translations:
        pt:
          name: "Atributos de Seguran\xE7a e Privacidade | Configura\xE7\xE3o de Atributos\
            \ por Indiv\xEDduos Autorizados"
          description: "Fornecer a indiv\xEDduos autorizados a capacidade de definir\
            \ ou alterar o tipo e o valor dos atributos de seguran\xE7a e privacidade\
            \ dispon\xEDveis para associa\xE7\xE3o com sujeitos e objetos."
          annotation: "O conte\xFAdo ou os valores atribu\xEDdos aos atributos de\
            \ seguran\xE7a e privacidade podem afetar diretamente a capacidade dos\
            \ indiv\xEDduos de acessar informa\xE7\xF5es organizacionais. Assim, \xE9\
            \ importante que os sistemas sejam capazes de limitar apenas a indiv\xED\
            duos autorizados a capacidade de criar ou modificar o tipo e o valor dos\
            \ atributos dispon\xEDveis para associa\xE7\xE3o com sujeitos e objetos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17
      name: Remote Access
      description: 'a. Establish and document usage restrictions, configuration/connection
        requirements, and implementation guidance for each type of remote access allowed;
        and

        b. Authorize each type of remote access to the system prior to allowing such
        connections.'
      annotation: Remote access is access to organizational systems (or processes
        acting on behalf of users) that communicate through external networks such
        as the Internet. Types of remote access include dial-up, broadband, and wireless.
        Organizations use encrypted virtual private networks (VPNs) to enhance confidentiality
        and integrity for remote connections. The use of encrypted VPNs provides sufficient
        assurance to the organization that it can effectively treat such connections
        as internal networks if the cryptographic mechanisms used are implemented
        in accordance with applicable laws, executive orders, directives, regulations,
        policies, standards, and guidelines. Still, VPN connections traverse external
        networks, and the encrypted VPN does not enhance the availability of remote
        connections. VPNs with encrypted tunnels can also affect the ability to adequately
        monitor network communications traffic for malicious code. Remote access controls
        apply to systems other than public web servers or systems designed for public
        access. Authorization of each remote access type addresses authorization prior
        to allowing remote access without specifying the specific formats for such
        authorization. While organizations may use information exchange and system
        connection security agreements to manage remote access connections to other
        systems, such agreements are addressed as part of CA-3. Enforcing access restrictions
        for remote access is addressed via AC-3.
      translations:
        pt:
          name: Acesso Remoto
          description: "a. Estabelecer e documentar restri\xE7\xF5es de uso, requisitos\
            \ de configura\xE7\xE3o/conex\xE3o e orienta\xE7\xF5es de implementa\xE7\
            \xE3o para cada tipo de acesso remoto permitido; e\nb. Autorizar cada\
            \ tipo de acesso remoto ao sistema antes de permitir tais conex\xF5es."
          annotation: "Acesso remoto \xE9 o acesso a sistemas organizacionais (ou\
            \ processos que atuam em nome de usu\xE1rios) que se comunicam por meio\
            \ de redes externas, tais como a Internet. Os tipos de acesso remoto incluem\
            \ discado (dial-up), banda larga e sem fio. As organiza\xE7\xF5es usam\
            \ redes privadas virtuais (VPNs) criptografadas para aprimorar a confidencialidade\
            \ e a integridade das conex\xF5es remotas. O uso de VPNs criptografadas\
            \ fornece \xE0 organiza\xE7\xE3o garantia suficiente de que ela pode tratar\
            \ efetivamente tais conex\xF5es como redes internas, desde que os mecanismos\
            \ criptogr\xE1ficos utilizados sejam implementados de acordo com as leis,\
            \ ordens executivas, diretrizes, regulamentos, pol\xEDticas, normas e\
            \ diretrizes aplic\xE1veis. Ainda assim, as conex\xF5es VPN atravessam\
            \ redes externas, e a VPN criptografada n\xE3o aprimora a disponibilidade\
            \ das conex\xF5es remotas. As VPNs com t\xFAneis criptografados tamb\xE9\
            m podem afetar a capacidade de monitorar adequadamente o tr\xE1fego de\
            \ comunica\xE7\xF5es de rede em busca de c\xF3digo malicioso. Os controles\
            \ de acesso remoto aplicam-se a sistemas que n\xE3o sejam servidores web\
            \ p\xFAblicos ou sistemas projetados para acesso p\xFAblico. A autoriza\xE7\
            \xE3o de cada tipo de acesso remoto trata da autoriza\xE7\xE3o antes de\
            \ permitir o acesso remoto, sem especificar os formatos espec\xEDficos\
            \ de tal autoriza\xE7\xE3o. Embora as organiza\xE7\xF5es possam usar acordos\
            \ de seguran\xE7a de troca de informa\xE7\xF5es e de conex\xE3o de sistemas\
            \ para gerenciar conex\xF5es de acesso remoto a outros sistemas, tais\
            \ acordos s\xE3o tratados como parte de CA-3. A aplica\xE7\xE3o de restri\xE7\
            \xF5es de acesso para acesso remoto \xE9 tratada via AC-3."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(1)
      name: Remote Access | Monitoring and Control
      description: Employ automated mechanisms to monitor and control remote access
        methods.
      annotation: Monitoring and control of remote access methods allows organizations
        to detect attacks and help ensure compliance with remote access policies by
        auditing the connection activities of remote users on a variety of system
        components, including servers, notebook computers, workstations, smart phones,
        and tablets. Audit logging for remote access is enforced by AU-2. Audit events
        are defined in AU-2a.
      translations:
        pt:
          name: Acesso Remoto | Monitoramento e Controle
          description: "Empregar mecanismos automatizados para monitorar e controlar\
            \ os m\xE9todos de acesso remoto."
          annotation: "O monitoramento e o controle dos m\xE9todos de acesso remoto\
            \ permitem que as organiza\xE7\xF5es detectem ataques e ajudem a assegurar\
            \ a conformidade com as pol\xEDticas de acesso remoto ao auditar as atividades\
            \ de conex\xE3o dos usu\xE1rios remotos em uma variedade de componentes\
            \ de sistema, incluindo servidores, notebooks, esta\xE7\xF5es de trabalho,\
            \ smartphones e tablets. O registro de auditoria para acesso remoto \xE9\
            \ aplicado por AU-2. Os eventos de auditoria s\xE3o definidos em AU-2a."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(2)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(2)
      name: Remote Access | Protection of Confidentiality and Integrity Using Encryption
      description: Implement cryptographic mechanisms to protect the confidentiality
        and integrity of remote access sessions.
      annotation: Virtual private networks can be used to protect the confidentiality
        and integrity of remote access sessions. Transport Layer Security (TLS) is
        an example of a cryptographic protocol that provides end-to-end communications
        security over networks and is used for Internet communications and online
        transactions.
      translations:
        pt:
          name: "Acesso Remoto | Prote\xE7\xE3o da Confidencialidade e Integridade\
            \ Usando Criptografia"
          description: "Implementar mecanismos criptogr\xE1ficos para proteger a confidencialidade\
            \ e a integridade das sess\xF5es de acesso remoto."
          annotation: "Redes privadas virtuais podem ser usadas para proteger a confidencialidade\
            \ e a integridade das sess\xF5es de acesso remoto. O Transport Layer Security\
            \ (TLS) \xE9 um exemplo de protocolo criptogr\xE1fico que fornece seguran\xE7\
            a de comunica\xE7\xF5es de ponta a ponta em redes e \xE9 usado para comunica\xE7\
            \xF5es na Internet e transa\xE7\xF5es on-line."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(3)
      name: Remote Access | Managed Access Control Points
      description: Route remote accesses through authorized and managed network access
        control points.
      annotation: Organizations consider the Trusted Internet Connections (TIC) initiative
        DHS TIC requirements for external network connections since limiting the number
        of access control points for remote access reduces attack surfaces.
      translations:
        pt:
          name: Acesso Remoto | Pontos de Controle de Acesso Gerenciados
          description: Rotear os acessos remotos por meio de pontos de controle de
            acesso de rede autorizados e gerenciados.
          annotation: "As organiza\xE7\xF5es consideram os requisitos do DHS TIC da\
            \ iniciativa Trusted Internet Connections (TIC) para conex\xF5es de rede\
            \ externas, uma vez que limitar o n\xFAmero de pontos de controle de acesso\
            \ para acesso remoto reduz as superf\xEDcies de ataque."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(4)
      name: Remote Access | Privileged Commands and Access
      description: '(a) Authorize the execution of privileged commands and access
        to security-relevant information via remote access only in a format that provides
        assessable evidence and for the following needs: [Assignment: organization-defined
        needs]; and

        (b) Document the rationale for remote access in the security plan for the
        system.'
      annotation: Remote access to systems represents a significant potential vulnerability
        that can be exploited by adversaries. As such, restricting the execution of
        privileged commands and access to security-relevant information via remote
        access reduces the exposure of the organization and the susceptibility to
        threats by adversaries to the remote access capability.
      translations:
        pt:
          name: Acesso Remoto | Comandos Privilegiados e Acesso
          description: "(a) Autorizar a execu\xE7\xE3o de comandos privilegiados e\
            \ o acesso a informa\xE7\xF5es relevantes para a seguran\xE7a via acesso\
            \ remoto somente em um formato que forne\xE7a evid\xEAncia avali\xE1vel\
            \ e para as seguintes necessidades: [Atribui\xE7\xE3o: necessidades definidas\
            \ pela organiza\xE7\xE3o]; e\n(b) Documentar a justificativa para o acesso\
            \ remoto no plano de seguran\xE7a do sistema."
          annotation: "O acesso remoto a sistemas representa uma potencial vulnerabilidade\
            \ significativa que pode ser explorada por advers\xE1rios. Como tal, restringir\
            \ a execu\xE7\xE3o de comandos privilegiados e o acesso a informa\xE7\xF5\
            es relevantes para a seguran\xE7a via acesso remoto reduz a exposi\xE7\
            \xE3o da organiza\xE7\xE3o e a suscetibilidade a amea\xE7as de advers\xE1\
            rios sobre a capacidade de acesso remoto."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-19(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-19(3)
      name: Access Control for Mobile Devices | Use of Portable Storage Devices with
        No Identifiable Owner
      description: '[Withdrawn: Incorporated into MP-7.]'
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos M\xF3veis | Uso de Dispositivos\
            \ de Armazenamento Port\xE1teis sem Propriet\xE1rio Identific\xE1vel"
          description: '[Retirado: Incorporado em MP-7.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(6)
      name: Remote Access | Protection of Mechanism Information
      description: Protect information about remote access mechanisms from unauthorized
        use and disclosure.
      annotation: Remote access to organizational information by non-organizational
        entities can increase the risk of unauthorized use and disclosure about remote
        access mechanisms. The organization considers including remote access requirements
        in the information exchange agreements with other organizations, as applicable.
        Remote access requirements can also be included in rules of behavior (see
        PL-4) and access agreements (see PS-6).
      translations:
        pt:
          name: "Acesso Remoto | Prote\xE7\xE3o de Informa\xE7\xF5es de Mecanismos"
          description: "Proteger as informa\xE7\xF5es sobre os mecanismos de acesso\
            \ remoto contra uso e divulga\xE7\xE3o n\xE3o autorizados."
          annotation: "O acesso remoto a informa\xE7\xF5es organizacionais por entidades\
            \ n\xE3o organizacionais pode aumentar o risco de uso e divulga\xE7\xE3\
            o n\xE3o autorizados de informa\xE7\xF5es sobre os mecanismos de acesso\
            \ remoto. A organiza\xE7\xE3o considera a inclus\xE3o de requisitos de\
            \ acesso remoto nos acordos de troca de informa\xE7\xF5es com outras organiza\xE7\
            \xF5es, conforme aplic\xE1vel. Os requisitos de acesso remoto tamb\xE9\
            m podem ser inclu\xEDdos nas regras de conduta (consulte PL-4) e nos acordos\
            \ de acesso (consulte PS-6)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-2(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-2(10)
      name: Account Management | Shared and Group Account Credential Change
      description: '[Withdrawn: Incorporated into AC-2k.]'
      translations:
        pt:
          name: "Gerenciamento de Contas | Altera\xE7\xE3o de Credenciais de Contas\
            \ Compartilhadas e de Grupo"
          description: '[Retirado: Incorporado em AC-2k.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(1)
      name: Access Enforcement | Restricted Access to Privileged Functions
      description: '[Withdrawn: Incorporated into AC-6.]'
      translations:
        pt:
          name: "Aplica\xE7\xE3o de Acesso | Acesso Restrito a Fun\xE7\xF5es Privilegiadas"
          description: '[Retirado: Incorporado em AC-6.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(9)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(9)
      name: Remote Access | Disconnect or Disable Access
      description: 'Provide the capability to disconnect or disable remote access
        to the system within [Assignment: organization-defined time period].'
      annotation: The speed of system disconnect or disablement varies based on the
        criticality of missions or business functions and the need to eliminate immediate
        or future remote access to systems.
      translations:
        pt:
          name: Acesso Remoto | Desconectar ou Desabilitar Acesso
          description: "Fornecer a capacidade de desconectar ou desabilitar o acesso\
            \ remoto ao sistema dentro de [Atribui\xE7\xE3o: per\xEDodo de tempo definido\
            \ pela organiza\xE7\xE3o]."
          annotation: "A velocidade da desconex\xE3o ou desabilita\xE7\xE3o do sistema\
            \ varia com base na criticidade das miss\xF5es ou fun\xE7\xF5es de neg\xF3\
            cio e na necessidade de eliminar o acesso remoto imediato ou futuro aos\
            \ sistemas."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-17(10)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-17(10)
      name: Remote Access | Authenticate Remote Commands
      description: 'Implement [Assignment: organization-defined mechanisms] to authenticate
        [Assignment: organization-defined remote commands].'
      annotation: Authenticating remote commands protects against unauthorized commands
        and the replay of authorized commands. The ability to authenticate remote
        commands is important for remote systems for which loss, malfunction, misdirection,
        or exploitation would have immediate or serious consequences, such as injury,
        death, property damage, loss of high value assets, failure of mission or business
        functions, or compromise of classified or controlled unclassified information.
        Authentication mechanisms for remote commands ensure that systems accept and
        execute commands in the order intended, execute only authorized commands,
        and reject unauthorized commands. Cryptographic mechanisms can be used, for
        example, to authenticate remote commands.
      translations:
        pt:
          name: Acesso Remoto | Autenticar Comandos Remotos
          description: "Implementar [Atribui\xE7\xE3o: mecanismos definidos pela organiza\xE7\
            \xE3o] para autenticar [Atribui\xE7\xE3o: comandos remotos definidos pela\
            \ organiza\xE7\xE3o]."
          annotation: "A autentica\xE7\xE3o de comandos remotos protege contra comandos\
            \ n\xE3o autorizados e a repeti\xE7\xE3o (replay) de comandos autorizados.\
            \ A capacidade de autenticar comandos remotos \xE9 importante para sistemas\
            \ remotos cuja perda, mau funcionamento, direcionamento incorreto ou explora\xE7\
            \xE3o teria consequ\xEAncias imediatas ou graves, tais como les\xF5es,\
            \ morte, danos materiais, perda de ativos de alto valor, falha de miss\xE3\
            o ou de fun\xE7\xF5es de neg\xF3cio, ou comprometimento de informa\xE7\
            \xF5es classificadas ou n\xE3o classificadas controladas. Os mecanismos\
            \ de autentica\xE7\xE3o para comandos remotos garantem que os sistemas\
            \ aceitem e executem os comandos na ordem pretendida, executem apenas\
            \ comandos autorizados e rejeitem comandos n\xE3o autorizados. Mecanismos\
            \ criptogr\xE1ficos podem ser usados, por exemplo, para autenticar comandos\
            \ remotos."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-18
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-18
      name: Wireless Access
      description: 'a. Establish configuration requirements, connection requirements,
        and implementation guidance for each type of wireless access; and

        b. Authorize each type of wireless access to the system prior to allowing
        such connections.'
      annotation: Wireless technologies include microwave, packet radio (ultra-high
        frequency or very high frequency), 802.11x, and Bluetooth. Wireless networks
        use authentication protocols that provide authenticator protection and mutual
        authentication.
      translations:
        pt:
          name: Acesso Sem Fio
          description: "a. Estabelecer requisitos de configura\xE7\xE3o, requisitos\
            \ de conex\xE3o e orienta\xE7\xF5es de implementa\xE7\xE3o para cada tipo\
            \ de acesso sem fio; e\nb. Autorizar cada tipo de acesso sem fio ao sistema\
            \ antes de permitir tais conex\xF5es."
          annotation: "As tecnologias sem fio incluem micro-ondas, r\xE1dio de pacotes\
            \ (frequ\xEAncia ultra-alta ou frequ\xEAncia muito alta), 802.11x e Bluetooth.\
            \ As redes sem fio usam protocolos de autentica\xE7\xE3o que fornecem\
            \ prote\xE7\xE3o do autenticador e autentica\xE7\xE3o m\xFAtua."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-18(1)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-18(1)
      name: Wireless Access | Authentication and Encryption
      description: 'Protect wireless access to the system using authentication of
        [Selection (one or more): users; devices] and encryption.'
      annotation: Wireless networking capabilities represent a significant potential
        vulnerability that can be exploited by adversaries. To protect systems with
        wireless access points, strong authentication of users and devices along with
        strong encryption can reduce susceptibility to threats by adversaries involving
        wireless technologies.
      translations:
        pt:
          name: "Acesso Sem Fio | Autentica\xE7\xE3o e Criptografia"
          description: "Proteger o acesso sem fio ao sistema usando autentica\xE7\xE3\
            o de [Sele\xE7\xE3o (um ou mais): usu\xE1rios; dispositivos] e criptografia."
          annotation: "As capacidades de rede sem fio representam uma potencial vulnerabilidade\
            \ significativa que pode ser explorada por advers\xE1rios. Para proteger\
            \ sistemas com pontos de acesso sem fio, a autentica\xE7\xE3o forte de\
            \ usu\xE1rios e dispositivos, juntamente com criptografia forte, pode\
            \ reduzir a suscetibilidade a amea\xE7as de advers\xE1rios que envolvam\
            \ tecnologias sem fio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-3(6)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-3(6)
      name: Access Enforcement | Protection of User and System Information
      description: '[Withdrawn: Incorporated into MP-4 and SC-28.]'
      translations:
        pt:
          name: "Aplica\xE7\xE3o de Acesso | Prote\xE7\xE3o de Informa\xE7\xF5es de\
            \ Usu\xE1rio e do Sistema"
          description: '[Retirado: Incorporado em MP-4 e SC-28.]'
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-18(3)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-18(3)
      name: Wireless Access | Disable Wireless Networking
      description: Disable, when not intended for use, wireless networking capabilities
        embedded within system components prior to issuance and deployment.
      annotation: Wireless networking capabilities that are embedded within system
        components represent a significant potential vulnerability that can be exploited
        by adversaries. Disabling wireless capabilities when not needed for essential
        organizational missions or functions can reduce susceptibility to threats
        by adversaries involving wireless technologies.
      translations:
        pt:
          name: Acesso Sem Fio | Desabilitar Rede Sem Fio
          description: "Desabilitar, quando n\xE3o houver inten\xE7\xE3o de uso, as\
            \ capacidades de rede sem fio embutidas nos componentes do sistema antes\
            \ da emiss\xE3o e da implanta\xE7\xE3o."
          annotation: "As capacidades de rede sem fio embutidas nos componentes do\
            \ sistema representam uma potencial vulnerabilidade significativa que\
            \ pode ser explorada por advers\xE1rios. Desabilitar as capacidades sem\
            \ fio quando n\xE3o s\xE3o necess\xE1rias para miss\xF5es ou fun\xE7\xF5\
            es organizacionais essenciais pode reduzir a suscetibilidade a amea\xE7\
            as de advers\xE1rios que envolvam tecnologias sem fio."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-18(4)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-18(4)
      name: Wireless Access | Restrict Configurations by Users
      description: Identify and explicitly authorize users allowed to independently
        configure wireless networking capabilities.
      annotation: Organizational authorizations to allow selected users to configure
        wireless networking capabilities are enforced, in part, by the access enforcement
        mechanisms employed within organizational systems.
      translations:
        pt:
          name: "Acesso Sem Fio | Restringir Configura\xE7\xF5es pelos Usu\xE1rios"
          description: "Identificar e autorizar explicitamente os usu\xE1rios autorizados\
            \ a configurar de forma independente as capacidades de rede sem fio."
          annotation: "As autoriza\xE7\xF5es organizacionais para permitir que usu\xE1\
            rios selecionados configurem capacidades de rede sem fio s\xE3o aplicadas,\
            \ em parte, pelos mecanismos de aplica\xE7\xE3o de acesso empregados dentro\
            \ dos sistemas organizacionais."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-18(5)
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-18(5)
      name: Wireless Access | Antennas and Transmission Power Levels
      description: Select radio antennas and calibrate transmission power levels to
        reduce the probability that signals from wireless access points can be received
        outside of organization-controlled boundaries.
      annotation: Actions that may be taken to limit unauthorized use of wireless
        communications outside of organization-controlled boundaries include reducing
        the power of wireless transmissions so that the transmissions are less likely
        to emit a signal that can be captured outside of the physical perimeters of
        the organization, employing measures such as emissions security to control
        wireless emanations, and using directional or beamforming antennas that reduce
        the likelihood that unintended receivers will be able to intercept signals.
        Prior to taking such mitigating actions, organizations can conduct periodic
        wireless surveys to understand the radio frequency profile of organizational
        systems as well as other systems that may be operating in the area.
      translations:
        pt:
          name: "Acesso Sem Fio | Antenas e N\xEDveis de Pot\xEAncia de Transmiss\xE3\
            o"
          description: "Selecionar antenas de r\xE1dio e calibrar os n\xEDveis de\
            \ pot\xEAncia de transmiss\xE3o para reduzir a probabilidade de que os\
            \ sinais dos pontos de acesso sem fio possam ser recebidos fora dos limites\
            \ controlados pela organiza\xE7\xE3o."
          annotation: "As a\xE7\xF5es que podem ser tomadas para limitar o uso n\xE3\
            o autorizado de comunica\xE7\xF5es sem fio fora dos limites controlados\
            \ pela organiza\xE7\xE3o incluem reduzir a pot\xEAncia das transmiss\xF5\
            es sem fio, de modo que as transmiss\xF5es tenham menos probabilidade\
            \ de emitir um sinal que possa ser capturado fora dos per\xEDmetros f\xED\
            sicos da organiza\xE7\xE3o, empregar medidas como seguran\xE7a de emiss\xF5\
            es para controlar emana\xE7\xF5es sem fio, e usar antenas direcionais\
            \ ou de conforma\xE7\xE3o de feixe (beamforming) que reduzam a probabilidade\
            \ de que receptores n\xE3o pretendidos sejam capazes de interceptar sinais.\
            \ Antes de tomar tais a\xE7\xF5es mitigadoras, as organiza\xE7\xF5es podem\
            \ realizar levantamentos peri\xF3dicos de redes sem fio para entender\
            \ o perfil de radiofrequ\xEAncia dos sistemas organizacionais, bem como\
            \ de outros sistemas que possam estar operando na \xE1rea."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-19
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-19
      name: Access Control for Mobile Devices
      description: 'a. Establish configuration requirements, connection requirements,
        and implementation guidance for organization-controlled mobile devices, to
        include when such devices are outside of controlled areas; and

        b. Authorize the connection of mobile devices to organizational systems.'
      annotation: 'A mobile device is a computing device that has a small form factor
        such that it can easily be carried by a single individual; is designed to
        operate without a physical connection; possesses local, non-removable or removable
        data storage; and includes a self-contained power source. Mobile device functionality
        may also include voice communication capabilities, on-board sensors that allow
        the device to capture information, and/or built-in features for synchronizing
        local data with remote locations. Examples include smart phones and tablets.
        Mobile devices are typically associated with a single individual. The processing,
        storage, and transmission capability of the mobile device may be comparable
        to or merely a subset of notebook/desktop systems, depending on the nature
        and intended purpose of the device. Protection and control of mobile devices
        is behavior or policy-based and requires users to take physical action to
        protect and control such devices when outside of controlled areas. Controlled
        areas are spaces for which organizations provide physical or procedural controls
        to meet the requirements established for protecting information and systems.

        Due to the large variety of mobile devices with different characteristics
        and capabilities, organizational restrictions may vary for the different classes
        or types of such devices. Usage restrictions and specific implementation guidance
        for mobile devices include configuration management, device identification
        and authentication, implementation of mandatory protective software, scanning
        devices for malicious code, updating virus protection software, scanning for
        critical software updates and patches, conducting primary operating system
        (and possibly other resident software) integrity checks, and disabling unnecessary
        hardware.

        Usage restrictions and authorization to connect may vary among organizational
        systems. For example, the organization may authorize the connection of mobile
        devices to its network and impose a set of usage restrictions, while a system
        owner may withhold authorization for mobile device connection to specific
        applications or impose additional usage restrictions before allowing mobile
        device connections to a system. Adequate security for mobile devices goes
        beyond the requirements specified in AC-19. Many safeguards for mobile devices
        are reflected in other controls. AC-20 addresses mobile devices that are not
        organization-controlled.'
      translations:
        pt:
          name: "Controle de Acesso para Dispositivos M\xF3veis"
          description: "a. Estabelecer requisitos de configura\xE7\xE3o, requisitos\
            \ de conex\xE3o e orienta\xE7\xF5es de implementa\xE7\xE3o para dispositivos\
            \ m\xF3veis controlados pela organiza\xE7\xE3o, inclusive quando tais\
            \ dispositivos estiverem fora de \xE1reas controladas; e\nb. Autorizar\
            \ a conex\xE3o de dispositivos m\xF3veis aos sistemas organizacionais."
          annotation: "Um dispositivo m\xF3vel \xE9 um dispositivo de computa\xE7\xE3\
            o com fator de forma reduzido, de modo que pode ser facilmente transportado\
            \ por uma \xFAnica pessoa; \xE9 projetado para operar sem conex\xE3o f\xED\
            sica; possui armazenamento de dados local, remov\xEDvel ou n\xE3o remov\xED\
            vel; e inclui uma fonte de energia aut\xF4noma. A funcionalidade do dispositivo\
            \ m\xF3vel tamb\xE9m pode incluir recursos de comunica\xE7\xE3o por voz,\
            \ sensores embarcados que permitem ao dispositivo capturar informa\xE7\
            \xF5es e/ou recursos integrados para sincronizar dados locais com locais\
            \ remotos. Exemplos incluem smartphones e tablets. Dispositivos m\xF3\
            veis costumam estar associados a uma \xFAnica pessoa. A capacidade de\
            \ processamento, armazenamento e transmiss\xE3o do dispositivo m\xF3vel\
            \ pode ser compar\xE1vel \xE0 dos sistemas notebook/desktop ou apenas\
            \ um subconjunto destes, dependendo da natureza e da finalidade pretendida\
            \ do dispositivo. A prote\xE7\xE3o e o controle de dispositivos m\xF3\
            veis baseiam-se em comportamento ou pol\xEDtica e exigem que os usu\xE1\
            rios tomem a\xE7\xF5es f\xEDsicas para proteger e controlar tais dispositivos\
            \ quando estiverem fora de \xE1reas controladas. \xC1reas controladas\
            \ s\xE3o espa\xE7os para os quais as organiza\xE7\xF5es fornecem controles\
            \ f\xEDsicos ou procedimentais para atender aos requisitos estabelecidos\
            \ de prote\xE7\xE3o de informa\xE7\xF5es e sistemas.\nDevido \xE0 grande\
            \ variedade de dispositivos m\xF3veis com diferentes caracter\xEDsticas\
            \ e capacidades, as restri\xE7\xF5es organizacionais podem variar conforme\
            \ as diferentes classes ou tipos de tais dispositivos. As restri\xE7\xF5\
            es de uso e as orienta\xE7\xF5es espec\xEDficas de implementa\xE7\xE3\
            o para dispositivos m\xF3veis incluem gerenciamento de configura\xE7\xE3\
            o, identifica\xE7\xE3o e autentica\xE7\xE3o de dispositivos, implementa\xE7\
            \xE3o de software de prote\xE7\xE3o obrigat\xF3rio, varredura de dispositivos\
            \ em busca de c\xF3digo malicioso, atualiza\xE7\xE3o de software de prote\xE7\
            \xE3o contra v\xEDrus, varredura em busca de atualiza\xE7\xF5es e corre\xE7\
            \xF5es cr\xEDticas de software, realiza\xE7\xE3o de verifica\xE7\xF5es\
            \ de integridade do sistema operacional principal (e possivelmente de\
            \ outros softwares residentes) e desativa\xE7\xE3o de hardware desnecess\xE1\
            rio.\nAs restri\xE7\xF5es de uso e a autoriza\xE7\xE3o de conex\xE3o podem\
            \ variar entre os sistemas organizacionais. Por exemplo, a organiza\xE7\
            \xE3o pode autorizar a conex\xE3o de dispositivos m\xF3veis \xE0 sua rede\
            \ e impor um conjunto de restri\xE7\xF5es de uso, enquanto o propriet\xE1\
            rio de um sistema pode reter a autoriza\xE7\xE3o para a conex\xE3o de\
            \ dispositivos m\xF3veis a aplica\xE7\xF5es espec\xEDficas ou impor restri\xE7\
            \xF5es de uso adicionais antes de permitir conex\xF5es de dispositivos\
            \ m\xF3veis a um sistema. Uma seguran\xE7a adequada para dispositivos\
            \ m\xF3veis vai al\xE9m dos requisitos especificados em AC-19. Muitas\
            \ salvaguardas para dispositivos m\xF3veis s\xE3o refletidas em outros\
            \ controles. O AC-20 trata de dispositivos m\xF3veis que n\xE3o s\xE3\
            o controlados pela organiza\xE7\xE3o."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-4(16)

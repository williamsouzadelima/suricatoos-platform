    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-14
      assessable: true
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac
      ref_id: AC-14
      name: Permitted Actions Without Identification or Authentication
      description: 'a. Identify [Assignment: organization-defined user actions] that
        can be performed on the system without identification or authentication consistent
        with organizational mission and business functions; and

        b. Document and provide supporting rationale in the security plan for the
        system, user actions not requiring identification or authentication.'
      annotation: Specific user actions may be permitted without identification or
        authentication if organizations determine that identification and authentication
        are not required for the specified user actions. Organizations may allow a
        limited number of user actions without identification or authentication, including
        when individuals access public websites or other publicly accessible federal
        systems, when individuals use mobile phones to receive calls, or when facsimiles
        are received. Organizations identify actions that normally require identification
        or authentication but may, under certain circumstances, allow identification
        or authentication mechanisms to be bypassed. Such bypasses may occur, for
        example, via a software-readable physical switch that commands bypass of the
        logon functionality and is protected from accidental or unmonitored use. Permitting
        actions without identification or authentication does not apply to situations
        where identification and authentication have already occurred and are not
        repeated but rather to situations where identification and authentication
        have not yet occurred. Organizations may decide that there are no user actions
        that can be performed on organizational systems without identification and
        authentication, and therefore, the value for the assignment operation can
        be none.
      translations:
        pt:
          name: "A\xE7\xF5es Permitidas Sem Identifica\xE7\xE3o ou Autentica\xE7\xE3\
            o"
          description: "a. Identificar [Atribui\xE7\xE3o: a\xE7\xF5es de usu\xE1rio\
            \ definidas pela organiza\xE7\xE3o] que podem ser realizadas no sistema\
            \ sem identifica\xE7\xE3o ou autentica\xE7\xE3o, de forma consistente\
            \ com a miss\xE3o organizacional e as fun\xE7\xF5es de neg\xF3cio; e\n\
            b. Documentar e fornecer justificativa de apoio no plano de seguran\xE7\
            a do sistema para as a\xE7\xF5es de usu\xE1rio que n\xE3o exigem identifica\xE7\
            \xE3o ou autentica\xE7\xE3o."
          annotation: "A\xE7\xF5es espec\xEDficas de usu\xE1rio podem ser permitidas\
            \ sem identifica\xE7\xE3o ou autentica\xE7\xE3o se as organiza\xE7\xF5\
            es determinarem que a identifica\xE7\xE3o e a autentica\xE7\xE3o n\xE3\
            o s\xE3o necess\xE1rias para as a\xE7\xF5es de usu\xE1rio especificadas.\
            \ As organiza\xE7\xF5es podem permitir um n\xFAmero limitado de a\xE7\xF5\
            es de usu\xE1rio sem identifica\xE7\xE3o ou autentica\xE7\xE3o, inclusive\
            \ quando os indiv\xEDduos acessam sites p\xFAblicos ou outros sistemas\
            \ federais de acesso p\xFAblico, quando os indiv\xEDduos usam telefones\
            \ celulares para receber chamadas ou quando fac-s\xEDmiles s\xE3o recebidos.\
            \ As organiza\xE7\xF5es identificam a\xE7\xF5es que normalmente exigem\
            \ identifica\xE7\xE3o ou autentica\xE7\xE3o, mas que podem, sob certas\
            \ circunst\xE2ncias, permitir que os mecanismos de identifica\xE7\xE3\
            o ou autentica\xE7\xE3o sejam contornados. Tais contornos podem ocorrer,\
            \ por exemplo, por meio de uma chave f\xEDsica leg\xEDvel por software\
            \ que comanda o contorno da funcionalidade de logon e que est\xE1 protegida\
            \ contra uso acidental ou n\xE3o monitorado. Permitir a\xE7\xF5es sem\
            \ identifica\xE7\xE3o ou autentica\xE7\xE3o n\xE3o se aplica a situa\xE7\
            \xF5es em que a identifica\xE7\xE3o e a autentica\xE7\xE3o j\xE1 ocorreram\
            \ e n\xE3o s\xE3o repetidas, mas sim a situa\xE7\xF5es em que a identifica\xE7\
            \xE3o e a autentica\xE7\xE3o ainda n\xE3o ocorreram. As organiza\xE7\xF5\
            es podem decidir que n\xE3o h\xE1 a\xE7\xF5es de usu\xE1rio que possam\
            \ ser realizadas nos sistemas organizacionais sem identifica\xE7\xE3o\
            \ e autentica\xE7\xE3o e, portanto, o valor para a opera\xE7\xE3o de atribui\xE7\
            \xE3o pode ser nenhum (none)."
    - urn: urn:intuitem:risk:req_node:nist-sp-800-53-rev5:ac-19(1)

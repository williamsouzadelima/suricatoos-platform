            es inteligentes, como o cart\xE3o de Verifica\xE7\xE3o de Identidade Pessoal\
            \ do Governo dos EUA ou o Cart\xE3o de Acesso Comum do DoD. Al\xE9m de\
            \ autenticar os usu\xE1rios no n\xEDvel do sistema, as organiza\xE7\xF5\
            es tamb\xE9m podem empregar mecanismos de autentica\xE7\xE3o no n\xED\
            vel da aplica\xE7\xE3o, a seu crit\xE9rio, para fornecer maior seguran\xE7\
            a da informa\xE7\xE3o. Independentemente do tipo de acesso (ou seja, local,\
            \ de rede, remoto), as contas n\xE3o privilegiadas s\xE3o autenticadas\
            \ usando op\xE7\xF5es multifator apropriadas para o n\xEDvel de risco.\
            \ As organiza\xE7\xF5es podem prover medidas de seguran\xE7a adicionais,\

          annotation: "A autentica\xE7\xE3o multifator requer o uso de dois ou mais\
            \ fatores diferentes para alcan\xE7ar a autentica\xE7\xE3o. Os fatores\
            \ de autentica\xE7\xE3o s\xE3o definidos da seguinte forma: algo que voc\xEA\
            \ sabe (por exemplo, um n\xFAmero de identifica\xE7\xE3o pessoal [PIN]),\
            \ algo que voc\xEA tem (por exemplo, um autenticador f\xEDsico, como uma\

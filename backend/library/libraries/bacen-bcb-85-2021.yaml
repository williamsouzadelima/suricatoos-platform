name: Resolução BCB nº 85/2021 - Resiliência Operacional
description: Resolução do Banco Central do Brasil, de 08/04/2021, que dispõe sobre a política de segurança cibernética e sobre os requisitos para a contratação de serviços de processamento e armazenamento de dados e de computação em nuvem, com vistas à resiliência operacional das instituições de pagamento e demais instituições autorizadas a funcionar pelo BCB não enquadradas como instituições financeiras.

info:
  contact:
    email: team@suricatoos.com
    name: Suricatoos Development Team
    url: https://suricatoos.com
  description: Swagger API for Penetration Testing Advanced General Intelligence Suricatoos.
  license:
    name: MIT
    url: https://opensource.org/license/mit
  termsOfService: http://swagger.io/terms/
  title: Suricatoos Swagger API
  version: "1.0"
paths:
  /agentlogs/:
    get:
      parameters:
      - collectionFormat: multi
        description: |-
          Filtering result on server e.g. {"value":[...],"field":"...","operator":"..."}
            field is the unique identifier of the table column, different for each endpoint
            value should be integer or string or array type, "value":123 or "value":"string" or "value":[123,456]
            operator value should be one of <,<=,>=,>,=,!=,like,not like,in
            default operator value is 'like' or '=' if field is 'id' or '*_id' or '*_at'
        in: query
        items:
          type: string
        name: filters[]
        type: array
      - description: Field to group results by
        in: query
        name: group
        type: string
      - default: 1
        description: Number of page (since 1)
        in: query
        minimum: 1
        name: page
        required: true
        type: integer
      - default: 5
        description: Amount items per page (min -1, max 1000, -1 means unlimited)
        in: query
        maximum: 1000
        minimum: -1
        name: pageSize
        type: integer
      - collectionFormat: multi
        description: |-
          Sorting result on server e.g. {"prop":"...","order":"..."}
            field order is "ascending" or "descending" value
            order is required if prop is not empty
        in: query
        items:
          type: string
        name: sort[]
        type: array
      - default: init
        description: Type of request
        enum:
        - sort
        - filter
        - init
        - page
        - size
        in: query
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: agentlogs list received successful
          schema:
            allOf:
            - $ref: '#/definitions/SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/services.agentlogs'
              type: object
        "400":
          description: invalid query request data
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: getting agentlogs not permitted
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: internal error on getting agentlogs
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Retrieve agentlogs list
      tags:
      - Agentlogs
  /anonymize/text:
    post:
      consumes:
      - application/json
      description: Replace sensitive data patterns (credentials, keys, PII, etc.)
        in the provided text with safe placeholders.
      parameters:
      - description: Text to anonymize
        in: body
        name: json
        required: true
        schema:
          $ref: '#/definitions/services.anonymizeTextRequest'
      produces:
      - application/json
      responses:
        "200":
          description: anonymized text returned successfully
          schema:
            allOf:
            - $ref: '#/definitions/SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/services.anonymizeTextResponse'
              type: object
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: anonymize.call permission required
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: anonymizer is not configured
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - BearerAuth: []
      summary: Anonymize text
      tags:
      - Anonymize

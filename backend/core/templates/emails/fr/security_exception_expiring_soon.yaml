subject: "Suricatoos CISO: Dérogation de sécurité expirant dans ${days_remaining} jour(s)"
body: |
  Bonjour,

  Vous avez ${exception_count} dérogation(s) de sécurité expirant dans ${days_remaining} jour(s) :


  ## Bienvenue sur Suricatoos CISO !

  **Votre plateforme de gestion GRC tout-en-un**

  Un accès à Suricatoos CISO vous a été accordé. Pour commencer, connectez-vous via le lien ci-dessous en utilisant l'authentification SSO :

  [Se connecter à Suricatoos CISO](${ciso_assistant_url})

  En cas de problème avec le lien, copiez et collez l'URL suivante dans votre navigateur :
  ${ciso_assistant_url}

  Si vous, ou votre organisation, n'avez pas fait cette demande, vous pouvez simplement ignorer cet email.

  En savoir plus sur Suricatoos CISO [ici](https://intuitem.com/).

  Cordialement,
  L'équipe Suricatoos CISO

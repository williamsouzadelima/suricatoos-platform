subject: "Suricatoos CISO : Réinitialisation du mot de passe"
body: |
  <img src="https://intuitem.com/ciso-assistant.png" alt="Suricatoos CISO" width="200">

  **Votre plateforme de gestion GRC tout-en-un**

  Bonjour,

  Nous avons reçu une demande de réinitialisation de mot de passe pour cette adresse email. Cliquez ci-dessous pour continuer :

  [Réinitialiser mon mot de passe](${reset_password_url})

  En cas de problème avec le lien, copiez et collez l'URL suivante dans votre navigateur :
  ${reset_password_url}

  Ce lien ne peut être utilisé qu'une seule fois. S'il a expiré, rendez-vous sur [votre instance](${ciso_assistant_url}) et demandez une nouvelle réinitialisation.

  Si vous, ou votre organisation, n'avez pas fait cette demande, vous pouvez simplement ignorer cet email.

  En savoir plus sur Suricatoos CISO [ici](https://intuitem.com/).

  Cordialement,
  L'équipe Suricatoos CISO

subject: "Suricatoos CISO: Your assignment on '${assessment_name}' has started"
body: |
  Hello,

  Your assignment on the following audit has started and is ready for your input:

  - Audit: ${assessment_name}
  - Framework: ${framework_name}
  - Due Date: ${due_date}

  Please log in to your Suricatoos CISO portal to begin your assessment: [Go to Suricatoos CISO](${ciso_assistant_url}/auditee-dashboard)

  Thank you.

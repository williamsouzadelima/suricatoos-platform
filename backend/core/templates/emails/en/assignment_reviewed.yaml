subject: "Suricatoos CISO: Your assignment on '${assessment_name}' has been ${decision}"
body: |
  Hello,

  Your assignment on the following audit has been reviewed:

  - Audit: ${assessment_name}
  - Decision: ${decision}
  ${reviewer_observation}

  Please log in to your Suricatoos CISO portal for more details: [Go to Suricatoos CISO](${ciso_assistant_url}/auditee-dashboard)

  Thank you.

subject: "Suricatoos CISO: You have ${control_count} expired control(s)"
body: |
  Hello,

  The following controls have expired:

  ${control_list}

  This reminder will stop once the control is marked as active or you update the ETA.
  Log in to your Suricatoos CISO portal and check 'my assignments' section to get to your controls directly: [Go to Suricatoos CISO](${ciso_assistant_url})

  Thank you.

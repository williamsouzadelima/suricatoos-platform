subject: "Suricatoos CISO: Password Reset"
body: |
  <img src="https://intuitem.com/ciso-assistant.png" alt="Suricatoos CISO" width="200">

  **Your all-in-one GRC Management Platform**

  Hello,

  We have received a password reset request for this email. Click below to proceed:

  [Reset my password](${reset_password_url})

  If you have trouble with the link, copy and paste the following URL in your browser:
  ${reset_password_url}

  This link can only be used once. If it has expired, go to [your instance](${ciso_assistant_url}) and request a new password reset.

  If you, or your organization, did not make this request, you can simply ignore this email.

  Learn more about Suricatoos CISO [here](https://intuitem.com/).

  Sincerely,
  Suricatoos CISO Team
